<!DOCTYPE html><head>
<title>LittleJS Moon Patrol</title>
<meta charset=utf-8>
</head><body style="background:#000">
<script src="../dist/littlejs.js?1780071765370"></script>
<script src="../templates/gameFx.js?1780071765370"></script>
<script src="../templates/tweakables.js?1780071765370"></script>
<script src="../templates/menus.js?1780071765370"></script>
<script>
'use strict';

// engine settings
debugWatermark = false;
showEngineVersion = false;
paused = false;

///////////////////////////////////////////////////////////////////////////////
// MOON PATROL — momentum hill-rider
//   LEFT mouse / Space : jump        RIGHT mouse (hold) : fire turret
//   Move mouse to aim the turret. Build speed on the downhills.
///////////////////////////////////////////////////////////////////////////////

// --- world constants (world units; physics is per-second, scaled by timeDelta)
const CAMERA_SCALE   = 32;
const GROUND_BOTTOM  = -40;     // terrain fill floor
const RIDE_HEIGHT    = 0.55;    // rover center above the ground line
const ROVER_SIZE     = vec2(1.7, 0.85);
const MIN_SPEED      = 4;       // engine never fully stalls
const BULLET_SPEED   = 55;
const SHOOT_COOLDOWN = 0.12;    // seconds between shots
const MAX_HEALTH     = 6;
const INVULN_TIME    = 1.1;     // seconds of i-frames after a hit
const BOMB_GRAVITY   = 22;
const JUMP_CUT       = 0.4;     // ascent velocity kept when jump is released early

// physics tuning (live-tweakable — press ~). On window so tweak() can reach it.
var TUNE = {
    thrust:   12,    // forward acceleration along the ground
    gravity:  23,    // gravity (along-slope when grounded, vertical in air)
    drag:     0.55,  // speed bleed; flat-ground cruise ~= thrust/drag
    jump:     13.5,  // upward launch impulse
    maxSpeed: 40,
    lookAhead: 8,    // how far ahead of the rover the camera looks
};

///////////////////////////////////////////////////////////////////////////////
// --- state
let state;            // 'play' | 'dead'
let deathTimer;       // counts up after death before the game-over dialog
let rover;            // { pos, vel, speed, angle, onGround }
let aimDir;           // unit Vector2 the turret points toward
let shootTimer;
let invuln;
let health;
let damageFlash;
let kills;
let bestDist;         // furthest x reached this run (for distance score)

let rocks, ufos, bullets, bombs, particles, powerups;
let nextRockX, nextUfoX;

let sJump, sShoot, sBoom, sThud, sHit, sHeal;

///////////////////////////////////////////////////////////////////////////////
// --- terrain (smooth rolling lunar hills; C1-continuous so slope is clean)

function groundY(x)
{
    return 1.0
        + Math.sin(x*0.080)        * 3.2
        + Math.sin(x*0.170 + 1.7)  * 1.1
        + Math.sin(x*0.034 + 0.6)  * 2.2;
}

function groundSlope(x)
{
    const e = 0.35;
    return (groundY(x + e) - groundY(x - e)) / (2*e);
}

function groundAngle(x) { return Math.atan(groundSlope(x)); }

// rotate an offset in math convention (CCW positive = nose-up on uphill)
function rot(v, a)
{
    const c = Math.cos(a), s = Math.sin(a);
    return vec2(v.x*c - v.y*s, v.x*s + v.y*c);
}

function playSoundSafe(s) { try { s && s.play && s.play(); } catch (e) {} }

///////////////////////////////////////////////////////////////////////////////
// --- particles (per-frame velocity, engine convention)

function burst(pos, count, speed, colA, colB, opts = {})
{
    const sizeBase = opts.size  || 0.14;
    const grav     = opts.grav  != null ? opts.grav : 0.004;
    const lifeMax  = opts.life  || 50;
    const spread   = opts.dir;  // {ang, arc} for directional bursts
    for (let i = 0; i < count; ++i)
    {
        const a   = spread ? spread.ang + (rand()-0.5)*spread.arc : rand(PI*2);
        const spd = speed * (0.4 + rand());
        particles.push({
            pos: pos.copy(),
            vel: vec2(Math.cos(a)*spd, Math.sin(a)*spd),
            life: lifeMax*(0.5+rand()*0.5), max: lifeMax,
            colA, colB, size: sizeBase*(0.7+rand()*0.8), grav,
        });
    }
}

///////////////////////////////////////////////////////////////////////////////
// --- spawning

function spawnRock(x)
{
    rocks.push({ x, w: 1.0 + rand()*1.0, h: 0.9 + rand()*0.9, dead:false });
}

function spawnUfo(x)
{
    ufos.push({
        pos: vec2(x, groundY(x) + 5 + rand()*4),
        phase: rand(PI*2),
        vx: -(3 + rand()*2),
        hp: 1,
        bombTimer: 1.5 + rand()*2.5,
    });
}

function spawnPowerup(pos, amount = 2)
{
    powerups.push({ pos: pos.copy(), vy: 4, life: 9, amount });
}

///////////////////////////////////////////////////////////////////////////////
function resetGame()
{
    state = 'play';
    deathTimer = 0;
    kills = 0;
    health = MAX_HEALTH;
    damageFlash = 0;
    invuln = 0;
    shootTimer = 0;
    aimDir = vec2(1, 0.6).normalize();

    rocks = []; ufos = []; bullets = []; bombs = []; particles = []; powerups = [];

    const x0 = 6;
    rover = {
        pos: vec2(x0, groundY(x0) + RIDE_HEIGHT),
        vel: vec2(0,0),
        speed: 8,
        angle: groundAngle(x0),
        onGround: true,
        jumpCut: false,   // true while a jump can still be cut short
    };
    bestDist = rover.pos.x;

    nextRockX = 26;
    nextUfoX = 48;

    // place camera immediately so the title backdrop is framed correctly
    cameraScale = CAMERA_SCALE;
    cameraPos = vec2(rover.pos.x + TUNE.lookAhead, rover.pos.y + 3.5);
}

///////////////////////////////////////////////////////////////////////////////
function takeDamage(atPos, amount = 1)
{
    if (state != 'play' || invuln > 0) return;
    health = max(0, health - amount);
    damageFlash = 0.4;
    invuln = INVULN_TIME;
    rover.speed *= 0.45;
    addScreenShake(0.6, 0.4);
    playSoundSafe(sHit);
    burst(atPos, 16, 0.18, hsl(.05,.9,.65), hsl(.05,.9,.35), {life:45});
    if (health <= 0) die(atPos);
}

function die(atPos)
{
    if (state == 'dead') return;
    state = 'dead';
    deathTimer = 0;
    addScreenShake(1.4, 0.7);
    playSoundSafe(sBoom);
    burst(atPos, 60, 0.35, hsl(.08,.9,.7), hsl(.0,.9,.3), {life:70, size:0.22});
}

function heal(amount)
{
    const before = health;
    health = min(MAX_HEALTH, health + amount);
    if (health > before)
    {
        playSoundSafe(sHeal);
        burst(rover.pos.add(vec2(0,0.3)), 12, 0.12, hsl(.33,.8,.7), hsl(.33,.8,.4), {life:40});
    }
}

function fire()
{
    if (state != 'play' || shootTimer > 0) return;
    shootTimer = SHOOT_COOLDOWN;
    const muzzle = rover.pos.add(rot(vec2(0.25, 0.45), rover.angle));
    const dir = aimDir;
    bullets.push({ pos: muzzle.add(dir.scale(0.9)), vel: dir.scale(BULLET_SPEED), life: 1.4 });
    playSoundSafe(sShoot);
    burst(muzzle.add(dir.scale(1.0)), 4, 0.12, hsl(.14,.9,.8), hsl(.08,.9,.5),
        {life:14, dir:{ang:Math.atan2(dir.y, dir.x), arc:0.6}, grav:0});
}

///////////////////////////////////////////////////////////////////////////////
// --- update

function gameInit()
{
    saveDataInit('moonPatrol');
    document.addEventListener('contextmenu', e => e.preventDefault());

    setCanvasFixedSize(vec2(1280, 720));
    cameraScale = CAMERA_SCALE;
    setCanvasClearColor(hsl(.66,.55,.06));

    sJump  = new SoundGenerator({ volume:.55, frequency:300, attack:0, release:.14, shapeCurve:1.7, slide:1.4, noise:.02 });
    sShoot = new SoundGenerator({ volume:.45, frequency:680, attack:0, release:.06, shapeCurve:0.8, noise:.01, bitCrush:3 });
    sBoom  = new SoundGenerator({ volume:.9,  frequency:70,  attack:0, release:.30, shapeCurve:0.2, noise:.45, slide:-0.6, delay:0.04 });
    sThud  = new SoundGenerator({ volume:.4,  frequency:120, attack:0, release:.10, shapeCurve:1.3, noise:.08 });
    sHit   = new SoundGenerator({ volume:.7,  frequency:180, attack:0, release:.16, shapeCurve:0.6, noise:.25, slide:-0.8 });
    sHeal  = new SoundGenerator({ volume:.45, frequency:740, attack:0, release:.12, shapeCurve:1.1, slide:0.9 });

    resetGame();
    buildMenus();

    tweakDivider('MOON PATROL');
    tweak('TUNE.thrust',   {min:0,  max:30});
    tweak('TUNE.gravity',  {min:5,  max:50});
    tweak('TUNE.drag',     {min:0,  max:2});
    tweak('TUNE.jump',     {min:5,  max:25});
    tweak('TUNE.maxSpeed', {min:10, max:60});
    tweak('TUNE.lookAhead',{min:0,  max:20});

    showMenu('title');
}

function buildMenus()
{
    if (typeof createMenu != 'function') return;
    installAutoPause();
    createTitleMenu({
        title: 'MOON PATROL',
        subtitle: 'Ride the hills. Blast the saucers.',
        onPlay: startGame,
        revealOnClick: false,
        showBest: true,
        formatBest: n => 'BEST ' + n + 'm',
        items: [
            {type:'button', label:'OPTIONS', onClick: () => pushMenu('options')},
            {type:'button', label:'ABOUT',   onClick: () => pushMenu('about')},
        ],
    });
    createOptionsMenu({
        showResetBest: true,
        extraItems: [
            {type:'checkbox', label:'SCREEN SHAKE', value:isScreenShakeEnabled(), persist:'shake',
                onChange: v => setScreenShakeEnabled(v)},
        ],
    });
    createMenu({
        id:'about', title:'ABOUT', onHide: popMenu,
        items: [
            {type:'text', text:'LEFT mouse or SPACE to jump.\n\nHold RIGHT mouse to fire the ' +
                'turret — move the mouse to aim it. Shoot the UFOs, dodge their bombs, and ' +
                'jump the boulders.\n\nGain speed barreling down the hills; you bleed it ' +
                'climbing back up. Watch the speedometer.'},
            {type:'separator'},
            {type:'button', label:'BACK', onClick: () => hideMenu('about')},
        ],
    });
    createPauseMenu({ onRestart: startGame, onQuit: () => quitToTitle() });
    installDefaultToolbar();
}

function startGame()
{
    resetGame();
    setPlaying(true);
    clearSubmenuStack();
    hideAllMenus();
}

///////////////////////////////////////////////////////////////////////////////
function gameUpdate()
{
    if (bindPauseKey({when: () => isPlaying() && state == 'play'})) return;
    if (!isPlaying()) return;

    const dt = timeDelta;

    if (state == 'dead')
    {
        deathTimer += dt;
        updateEffects(dt);
        if (deathTimer > 0.9 && !isMenuVisible())
            showGameOverDialog({
                score: Math.round(bestDist),
                won: false,
                format: n => n + 'm',
                extraLines: ['UFOs destroyed: ' + kills],
                onContinue: () => quitToTitle(),
            });
        return;
    }

    // --- input
    if (mouseWasPressed(0) || keyWasPressed('Space') || keyWasPressed('ArrowUp'))
        jump();
    aimDir = aimToward();
    if (mouseIsDown(2))
        fire();

    // --- rover physics
    updateRover(dt);

    // distance score = furthest right we've reached
    bestDist = max(bestDist, rover.pos.x);

    // --- spawn ahead of the camera
    const camRight = cameraPos.x + getCameraSize().x/2;
    const d = clamp(rover.pos.x / 1800, 0, 1);   // difficulty 0..1
    while (nextRockX < camRight + 40)
    {
        spawnRock(nextRockX);
        nextRockX += lerp(24, 12, d) + rand()*10;
    }
    while (nextUfoX < camRight + 40)
    {
        spawnUfo(nextUfoX);
        nextUfoX += lerp(50, 24, d) + rand()*20;
    }

    updateBullets(dt);
    updateUfos(dt, d);
    updateBombs(dt);
    updatePowerups(dt, true);
    updateEffects(dt);
    checkCollisions();

    // timers
    shootTimer  = max(0, shootTimer  - dt);
    invuln      = max(0, invuln      - dt);
    damageFlash = max(0, damageFlash - dt);

    // cull behind camera
    const cull = rover.pos.x - 40;
    rocks   = rocks.filter(r => !r.dead && r.x > cull);
    ufos    = ufos.filter(u => u.hp > 0 && u.pos.x > cull - 10);
    bullets = bullets.filter(b => b.life > 0);
    bombs   = bombs.filter(b => b.alive);
    powerups= powerups.filter(p => p.life > 0 && p.pos.x > cull);
}

function aimToward()
{
    const turret = rover.pos.add(rot(vec2(0.25, 0.45), rover.angle));
    return mousePos.subtract(turret).normalize();
}

function jump()
{
    if (state != 'play' || !rover.onGround) return;
    rover.onGround = false;
    const a = rover.angle;
    rover.vel = vec2(Math.cos(a), Math.sin(a)).scale(rover.speed);
    rover.vel.y += TUNE.jump;
    rover.jumpCut = true;
    playSoundSafe(sJump);
    burst(rover.pos.add(vec2(0,-ROVER_SIZE.y/2)), 8, 0.12, hsl(.10,.2,.6), hsl(.10,.2,.35), {life:30});
}

function updateRover(dt)
{
    if (rover.onGround)
    {
        const ang = groundAngle(rover.pos.x);
        // accelerate forward, bleed to drag, gravity helps downhill / fights uphill
        rover.speed += (TUNE.thrust - TUNE.gravity*Math.sin(ang)) * dt;
        rover.speed -= TUNE.drag * rover.speed * dt;
        rover.speed = clamp(rover.speed, MIN_SPEED, TUNE.maxSpeed);

        rover.pos.x += rover.speed * Math.cos(ang) * dt;
        rover.pos.y = groundY(rover.pos.x) + RIDE_HEIGHT;
        rover.angle = lerp(rover.angle, groundAngle(rover.pos.x), 0.25);

        // kick up dust, more the faster we go
        if (rand() < rover.speed/TUNE.maxSpeed * 0.8)
        {
            const back = rover.pos.add(rot(vec2(-0.6,-0.35), rover.angle));
            burst(back, 1, 0.06, hsl(.10,.18,.6), hsl(.10,.12,.4), {life:26, grav:-0.002});
        }
    }
    else
    {
        // variable jump height: trim upward speed if the button is let go while rising
        const holdingJump = mouseIsDown(0) || keyIsDown('Space') || keyIsDown('ArrowUp');
        if (rover.jumpCut && rover.vel.y > 0 && !holdingJump)
        {
            rover.vel.y *= JUMP_CUT;
            rover.jumpCut = false;
        }
        if (rover.vel.y <= 0) rover.jumpCut = false;   // can't cut once falling

        rover.vel.y -= TUNE.gravity * dt;
        rover.pos = rover.pos.add(rover.vel.scale(dt));

        // tilt toward velocity in the air
        const target = clamp(Math.atan2(rover.vel.y, Math.abs(rover.vel.x)+0.1), -0.6, 0.6);
        rover.angle = lerp(rover.angle, target, 0.12);

        const gy = groundY(rover.pos.x) + RIDE_HEIGHT;
        if (rover.pos.y <= gy && rover.vel.y <= 0)
        {
            rover.pos.y = gy;
            rover.onGround = true;
            const ang = groundAngle(rover.pos.x);
            const tangent = vec2(Math.cos(ang), Math.sin(ang));
            rover.speed = max(MIN_SPEED, rover.vel.dot(tangent));
            rover.angle = ang;
            const impact = abs(rover.vel.y);
            if (impact > 5)
            {
                addScreenShake(min(0.6, impact*0.06), 0.25);
                playSoundSafe(sThud);
                burst(rover.pos.add(vec2(0,-ROVER_SIZE.y/2)), 10, 0.14,
                    hsl(.10,.2,.6), hsl(.10,.15,.4), {life:30});
            }
        }
    }
}

function updateBullets(dt)
{
    for (const b of bullets)
    {
        b.pos = b.pos.add(b.vel.scale(dt));
        b.life -= dt;
        for (const u of ufos)
        {
            if (u.hp <= 0) continue;
            if (b.pos.distance(u.pos) < 1.0)
            {
                b.life = 0;
                u.hp = 0;
                kills++;
                addScreenShake(0.3, 0.25);
                playSoundSafe(sBoom);
                burst(u.pos, 24, 0.22, hsl(.82,.6,.7), hsl(.6,.4,.6), {life:50, size:0.18});
                if (rand() < 0.4) spawnPowerup(u.pos, 2);
                break;
            }
        }
    }
}

function updateUfos(dt, d)
{
    for (const u of ufos)
    {
        u.phase += dt*3;
        u.pos.x += u.vx * dt;
        u.pos.y += Math.sin(u.phase) * dt * 1.5;
        const minY = groundY(u.pos.x) + 3;
        if (u.pos.y < minY) u.pos.y = minY;

        // drop bombs at the rover
        u.bombTimer -= dt;
        if (u.bombTimer <= 0 && abs(u.pos.x - rover.pos.x) < 22)
        {
            u.bombTimer = lerp(3.5, 1.6, d) + rand()*1.5;
            const vx = clamp((rover.pos.x - u.pos.x)*0.3, -4, 4);
            bombs.push({ pos: u.pos.copy(), vel: vec2(vx, -2), alive:true });
        }
    }
}

function updateBombs(dt)
{
    for (const b of bombs)
    {
        b.vel.y -= BOMB_GRAVITY * dt;
        b.pos = b.pos.add(b.vel.scale(dt));
        if (b.pos.y <= groundY(b.pos.x) + 0.2)
        {
            b.alive = false;
            burst(b.pos, 14, 0.18, hsl(.05,.9,.65), hsl(.08,.9,.4), {life:36});
            playSoundSafe(sThud);
        }
    }
}

function updatePowerups(dt, allowPickup)
{
    for (const p of powerups)
    {
        p.life -= dt;
        p.vy -= 14 * dt;
        p.pos.y += p.vy * dt;
        const gy = groundY(p.pos.x) + 0.3;
        if (p.pos.y < gy) { p.pos.y = gy; p.vy *= -0.3; }
        if (allowPickup && rover.pos.distance(p.pos) < 1.0)
        {
            heal(p.amount);
            p.life = 0;
        }
    }
}

function updateEffects(dt)
{
    for (const p of particles)
    {
        p.life -= 1;
        p.vel.y -= p.grav;
        p.vel = p.vel.scale(0.98);
        p.pos = p.pos.add(p.vel);
    }
    particles = particles.filter(p => p.life > 0);
}

function checkCollisions()
{
    if (state != 'play' || invuln > 0) return;

    // rocks
    for (const r of rocks)
    {
        if (r.dead) continue;
        const rockPos = vec2(r.x, groundY(r.x) + r.h/2);
        if (isOverlapping(rover.pos, ROVER_SIZE, rockPos, vec2(r.w, r.h)))
        {
            r.dead = true;
            burst(rockPos, 14, 0.16, hsl(.08,.2,.4), hsl(.08,.15,.25), {life:40});
            takeDamage(rockPos, 1);
            return;
        }
    }
    // ufos (ramming)
    for (const u of ufos)
    {
        if (u.hp <= 0) continue;
        if (isOverlapping(rover.pos, ROVER_SIZE, u.pos, vec2(1.6, 0.7)))
        {
            u.hp = 0;
            takeDamage(u.pos, 1);
            return;
        }
    }
    // bombs
    for (const b of bombs)
    {
        if (b.alive && rover.pos.distance(b.pos) < 0.9)
        {
            b.alive = false;
            takeDamage(b.pos, 1);
            return;
        }
    }
}

///////////////////////////////////////////////////////////////////////////////
function gameUpdatePost()
{
    if (!isPlaying()) return;
    cameraScale = CAMERA_SCALE;
    const targetX = rover.pos.x + TUNE.lookAhead;
    const targetY = rover.pos.y + 3.5;
    cameraPos = vec2(
        lerp(cameraPos.x, targetX, 0.25),
        lerp(cameraPos.y, targetY, 0.06));
}

///////////////////////////////////////////////////////////////////////////////
// --- render

function gameRender()
{
    drawBackground();
    drawGround();
    drawEntities();
    drawRover();
}

function drawBackground()
{
    const view = getCameraSize();
    drawRect(cameraPos, view, hsl(.66,.55,.06));

    // starfield (two parallax layers, twinkling) — fills the whole sky
    drawStarLayer(0.15, 2.4, 0.60, 0.14, 1, view);   // far: dense, dim
    drawStarLayer(0.32, 3.6, 0.45, 0.22, 2, view);   // near: sparser, brighter

    drawMoon(cameraPos.x + view.x*0.30, cameraPos.y + view.y*0.28);

    // distant ridges (parallax: scroll slower than the foreground, stay put vertically)
    drawRidge(0.5, hsl(.70,.30,.10), -0.04, 2.6, 0.22);
    drawRidge(0.7, hsl(.72,.38,.16), -0.12, 1.8, 0.38);
}

function starHash(x, y)
{
    let n = (Math.imul(x|0, 73856093) ^ Math.imul(y|0, 19349663)) >>> 0;
    n = (n ^ 61) ^ (n >>> 16); n = Math.imul(n, 9); n ^= n >>> 4;
    n = Math.imul(n, 0x27d4eb2d); n ^= n >>> 15;
    return (n >>> 0) / 4294967296;
}

// One parallax star layer. par<1 scrolls slower than the foreground (distant),
// cell = grid spacing, prob = fraction of cells that hold a star, sizeMax = max
// star size, seed separates layers so they don't overlap identically.
function drawStarLayer(par, cell, prob, sizeMax, seed, view)
{
    const ox = cameraPos.x * (1 - par);
    const oy = cameraPos.y * (1 - par);
    const lx = Math.floor((cameraPos.x - view.x/2 - ox)/cell) - 1;
    const rx = Math.floor((cameraPos.x + view.x/2 - ox)/cell) + 1;
    const by = Math.floor((cameraPos.y - view.y/2 - oy)/cell) - 1;
    const ty = Math.floor((cameraPos.y + view.y/2 - oy)/cell) + 1;
    for (let xi = lx; xi <= rx; ++xi)
    for (let yi = by; yi <= ty; ++yi)
    {
        const h = starHash(xi*4 + seed, yi*7 - seed);
        if (h > prob) continue;
        const wx = (xi + starHash(xi+7, yi+3))*cell + ox;
        const wy = (yi + starHash(xi+11, yi+5))*cell + oy;
        const b = h/prob;                                   // 0..1 brightness ramp
        const tw = 0.55 + 0.45*Math.sin(time*2.5 + h*40);   // twinkle
        const size = 0.06 + b*sizeMax;
        drawRect(vec2(wx, wy), vec2(size), hsl(.62, .12, 1, (0.45 + 0.55*b)*tw));
    }
}

// Crescent moon (smooth): a bright disc carved by an equal-size sky-colored disc
// offset to the left. The difference of two equal circles is a true crescent
// (lune); the dark side shows the sky behind it.
function drawMoon(mx, my)
{
    const mr = 4.8;                      // diameter
    const lit    = hsl(.62,.12,.84);
    const sky    = hsl(.66,.55,.06);     // matches the background sky
    const crater = hsl(.62,.10,.74);

    drawCircle(vec2(mx, my), mr, lit);              // bright moon
    drawCircle(vec2(mx-2.1, my+0.3), mr, sky);      // carve the crescent
    drawCircle(vec2(mx+1.4, my+0.5), 0.6,  crater); // craters on the lit sliver
    drawCircle(vec2(mx+1.5, my-1.0), 0.45, crater);
}

function drawRidge(par, color, screenYFrac, amp, freq)
{
    const view = getCameraSize();
    const left = cameraPos.x - view.x/2 - 5;
    const right = cameraPos.x + view.x/2 + 5;
    const baseY = cameraPos.y + view.y*screenYFrac;  // stays at a fixed screen height
    const step = 1.5;
    let prev;
    for (let x = left; x <= right; x += step)
    {
        const s = x*par;  // parallax: pattern shifts slower than the camera
        const y = baseY + Math.sin(s*freq)*amp + Math.sin(s*freq*2.3 + 2)*amp*0.4;
        const cur = vec2(x, y);
        if (prev)
        {
            const top = (prev.y + cur.y)/2;
            drawRect(vec2((prev.x+cur.x)/2, GROUND_BOTTOM + (top-GROUND_BOTTOM)/2),
                vec2(step+0.1, top-GROUND_BOTTOM), color);
        }
        prev = cur;
    }
}

function drawGround()
{
    const view = getCameraSize();
    const left = cameraPos.x - view.x/2 - 2;
    const right = cameraPos.x + view.x/2 + 2;
    const step = 0.5;
    const fill = hsl(.10,.30,.30);
    const fillDark = hsl(.10,.30,.18);
    const surf = hsl(.10,.25,.62);

    let prev;
    for (let x = Math.floor(left/step)*step; x <= right; x += step)
    {
        const y = groundY(x);
        const h = y - GROUND_BOTTOM;
        // banded fill for a bit of depth
        drawRect(vec2(x, GROUND_BOTTOM + h/2), vec2(step+0.02, h), fill);
        drawRect(vec2(x, y - 0.9), vec2(step+0.02, 1.8), fillDark);
        if (prev) drawLine(prev, vec2(x, y), 0.14, surf);
        prev = vec2(x, y);
    }
}

function drawRover()
{
    const blink = invuln > 0 && (Math.floor(invuln*16) & 1);
    if (state == 'play' && blink) return;

    const a = rover.angle;
    const pos = rover.pos;
    const dead = state == 'dead';
    const body = dead ? hsl(.58,.1,.3) : hsl(.55,.45,.62);
    const dark = hsl(.58,.3,.32);
    const trim = hsl(.55,.5,.85);

    // exhaust flame (rear), flickers with speed
    if (!dead && rover.onGround)
    {
        const flame = pos.add(rot(vec2(-ROVER_SIZE.x/2 - 0.1, -0.05), a));
        const len = 0.3 + rover.speed/TUNE.maxSpeed * 0.6 + rand()*0.2;
        drawLine(flame, pos.add(rot(vec2(-ROVER_SIZE.x/2 - len, -0.05), a)), 0.18,
            hsl(.08,.9,.6, .8));
    }

    // helper to draw a rect attached to the rover frame
    const piece = (off, size, col) => drawRect(pos.add(rot(off, a)), size, col, -a);

    piece(vec2(0, 0.05), ROVER_SIZE, body);                 // chassis
    piece(vec2(-0.2, 0.35), vec2(0.7, 0.4), trim);          // cockpit canopy
    piece(vec2(-0.2, 0.35), vec2(0.6, 0.28), hsl(.55,.6,.4));// canopy glass

    // wheels (suspension wobble look: bigger soft tyres)
    const wheel = (ox) => {
        const w = pos.add(rot(vec2(ox, -ROVER_SIZE.y/2 + 0.05), a));
        drawCircle(w, 0.6, dark);
        drawCircle(w, 0.34, hsl(.58,.2,.7));
        drawCircle(w, 0.12, dark);
    };
    wheel(-0.6); wheel(0.0); wheel(0.6);

    // turret aiming at the mouse
    const turret = pos.add(rot(vec2(0.25, 0.45), a));
    const aim = aimDir;
    drawCircle(turret, 0.34, dark);
    drawLine(turret, turret.add(aim.scale(0.95)), 0.18, hsl(.55,.4,.5));
    drawLine(turret, turret.add(aim.scale(0.95)), 0.08, trim);
}

function drawEntities()
{
    const view = getCameraSize();
    const left = cameraPos.x - view.x/2 - 4;
    const right = cameraPos.x + view.x/2 + 4;

    // rocks
    for (const r of rocks)
    {
        if (r.dead || r.x < left || r.x > right) continue;
        const gy = groundY(r.x);
        const c = vec2(r.x, gy + r.h/2);
        drawRect(c, vec2(r.w, r.h), hsl(.08,.18,.30), 0.15);
        drawRect(c, vec2(r.w*0.7, r.h*0.7), hsl(.08,.16,.38), -0.1);
        drawRect(c.add(vec2(-r.w*0.12, r.h*0.18)), vec2(r.w*0.3, r.h*0.22), hsl(.08,.14,.50, .6));
    }

    // ufos
    for (const u of ufos)
    {
        if (u.hp <= 0 || u.pos.x < left || u.pos.x > right) continue;
        const glow = 0.5 + Math.sin(u.phase*2)*0.5;
        drawEllipse(u.pos, vec2(2.0, 0.7), hsl(.85,.45,.55), 0, 0.08, hsl(.85,.3,.25));
        drawEllipse(u.pos.add(vec2(0,0.25)), vec2(0.9, 0.55), hsl(.55,.4,.8, .9));
        for (let i = -1; i <= 1; ++i)
            drawCircle(u.pos.add(vec2(i*0.6, -0.18)), 0.18, hsl(.12,.9,.5+glow*0.3));
    }

    // bombs
    for (const b of bombs)
    {
        if (!b.alive) continue;
        drawCircle(b.pos, 0.36, hsl(.05,.85,.55));
        drawCircle(b.pos, 0.18, hsl(.10,.9,.8));
    }

    // powerups
    for (const p of powerups)
    {
        const pulse = 0.1 + Math.abs(Math.sin(p.life*3))*0.12;
        drawCircle(p.pos, 0.6 + pulse, hsl(.33,.8,.55, .9));
        drawCircle(p.pos, 0.32, hsl(.33,.3,.2));
        // plus sign
        drawRect(p.pos, vec2(0.34, 0.12), hsl(.33,.9,.8));
        drawRect(p.pos, vec2(0.12, 0.34), hsl(.33,.9,.8));
    }

    // bullets
    for (const b of bullets)
    {
        const dir = b.vel.normalize(0.7);
        drawLine(b.pos, b.pos.subtract(dir), 0.16, hsl(.14,.9,.7));
        drawCircle(b.pos, 0.18, hsl(.14,1,.85));
    }

    // particles
    for (const p of particles)
    {
        const t = clamp(1 - p.life/p.max, 0, 1);
        drawCircle(p.pos, p.size*(1.2-t), p.colA.lerp(p.colB, t));
    }
}

///////////////////////////////////////////////////////////////////////////////
// --- HUD (screen space)

function gameRenderPost()
{
    if (!isPlaying()) return;

    const W = mainCanvasSize.x;
    const H = mainCanvasSize.y;
    const panel = hsl(.62,.5,.08, .65);
    const edge  = hsl(.55,.6,.6, .9);
    const clear = hsl(0,0,0,0);

    // ---- SPEED gauge (bottom-left) ----
    const pw = 260, ph = 70, px = 24, py = H - ph - 24;
    hudPanel(px, py, pw, ph, panel, edge);
    drawTextScreen('SPEED', vec2(px+16, py+22), 20, hsl(.55,.5,.8), 0, clear, 'left');
    const kph = Math.round(rover.speed * 4);
    const fast = rover.speed > TUNE.maxSpeed*0.85;
    drawTextScreen(kph + '', vec2(px+16, py+54), 36, fast ? hsl(.04,.9,.65) : hsl(0,0,1), 0, clear, 'left');
    drawTextScreen('KPH', vec2(px+16 + ('' + kph).length*22 + 14, py+54), 18, hsl(.55,.4,.7), 0, clear, 'left');
    // speed bar
    const barX = px+120, barY = py+44, barW = 124, barH = 16;
    drawRect(vec2(barX + barW/2, barY + barH/2), vec2(barW, barH), hsl(0,0,.12), 0, undefined, true);
    const frac = clamp(rover.speed/TUNE.maxSpeed, 0, 1);
    const barCol = frac > 0.85 ? hsl(.04,.9,.6) : hsl(lerp(.55,.12,frac), .8, .55);
    if (frac > 0)
        drawRect(vec2(barX + (barW*frac)/2, barY + barH/2), vec2(barW*frac, barH), barCol, 0, undefined, true);
    if (fast)
        drawTextScreen('BOOST!', vec2(px + pw/2, py - 14), 20,
            hsl(.04,.9,.65), 3, hsl(0,0,0), 'center');

    // ---- DISTANCE (top-center) ----
    drawTextScreen(Math.round(bestDist) + 'm', vec2(W/2, 48), 46, hsl(0,0,1), 4, hsl(0,0,0,.6));
    drawTextScreen('BEST ' + (getBestScore()|0) + 'm', vec2(W/2, 80), 22, hsl(.55,.4,.75), 3, hsl(0,0,0,.6));

    // ---- HULL pips (bottom-right) ----
    const hpW = 220, hpH = 70, hx = W - hpW - 24, hy = H - hpH - 24;
    hudPanel(hx, hy, hpW, hpH, panel, edge);
    drawTextScreen('HULL', vec2(hx + hpW - 16, hy+22), 20, hsl(.55,.5,.8), 0, clear, 'right');
    const low = health <= 2;
    for (let i = 0; i < MAX_HEALTH; ++i)
    {
        const segW = 26, gap = 6;
        const sx = hx + 16 + i*(segW+gap);
        const sy = hy + 42;
        const on = i < health;
        let col = hsl(0,0,.12);
        if (on) col = low && (Math.floor(time*6)&1) ? hsl(.04,.9,.6)
                    : hsl(lerp(.0,.35, health/MAX_HEALTH), .8, .55);
        drawRect(vec2(sx + segW/2, sy + 11), vec2(segW, 22), col, 0, undefined, true);
    }

    // kills badge
    drawTextScreen('UFO x' + kills, vec2(hx + hpW - 16, hy - 14), 20,
        hsl(.12,.8,.7), 3, hsl(0,0,0,.6), 'right');

    // damage flash vignette
    if (damageFlash > 0)
    {
        const a = clamp(damageFlash, 0, 1) * 0.4;
        drawRect(vec2(W/2, mainCanvasSize.y/2), vec2(W, mainCanvasSize.y), hsl(.02,.9,.5, a), 0, undefined, true);
    }

    // first-run controls hint
    if (bestDist < 60)
        drawTextScreen('LEFT-click / SPACE: jump      hold RIGHT-click: fire (aim with mouse)',
            vec2(W/2, mainCanvasSize.y - 36), 22, hsl(0,0,1,.85), 3, hsl(0,0,0,.7));
}

function hudPanel(x, y, w, h, fill, edge)
{
    drawRect(vec2(x + w/2, y + h/2), vec2(w, h), fill, 0, undefined, true);
    // top accent line
    drawRect(vec2(x + w/2, y + 2), vec2(w, 3), edge, 0, undefined, true);
}

///////////////////////////////////////////////////////////////////////////////
engineInit(gameInit, gameUpdate, gameUpdatePost, gameRender, gameRenderPost);
