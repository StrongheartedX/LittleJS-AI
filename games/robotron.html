    // wave 31–40
    [35, 25,  3, 3, 3,  8,  0, 5,  1],
    [ 0,  0,  3, 3, 3, 16,  0, 0, 13],
    [35, 25,  3, 3, 3,  8,  0, 5,  1],
    [30,  0,  3, 3, 3, 25,  0, 2,  2],
    [27, 15,  0, 0, 25, 2, 23, 1,  2],
    [35, 25,  3, 3, 3,  8,  0, 5,  2],
    [ 0,  0,  3, 3, 3, 16,  0, 0, 14],
    [35, 25,  3, 3, 3,  8,  0, 5,  2],
    [80,  0,  3, 3, 3,  6,  0, 5,  1],
    [30, 15, 10, 10, 10, 2, 25, 1,  1],
];

// Arcade per-wave tuning table (decoded from RRG23.ASM at $2C12).
// Columns: [ROBSPD, RMXSPD, ENFNUM, ENSTIM, CDPTIM, HLKSPD, BSHTIM, BRNSPD, TNKSHT]
// Lower numbers = faster threats (the values are NAP-tick delays, ~1 tick per 60fps frame).
// After wave 40, waves 21–40 repeat (same as the enemy-count table).
const arcadeWaveTuning = [
    [20, 9, 10, 30, 30, 8, 64, 8, 32],   // 1
    [15, 7, 10, 28, 28, 8, 64, 8, 32],   // 2
    [15, 6, 10, 26, 26, 7, 64, 8, 32],   // 3
    [15, 5, 10, 24, 24, 7, 64, 8, 32],   // 4
    [15, 5, 10, 22, 30, 7, 64, 8, 32],   // 5
    [15, 5, 10, 20, 20, 7, 40, 7, 32],   // 6
    [15, 5, 10, 18, 18, 7, 40, 7, 32],   // 7
    [15, 4, 10, 18, 16, 6, 38, 7, 30],   // 8
    [15, 4, 10, 16, 18, 6, 38, 7, 30],   // 9
    [15, 4, 10, 14, 25, 6, 38, 7, 30],   // 10
    [14, 4, 10, 14, 12, 6, 38, 7, 30],   // 11
    [14, 4, 10, 14, 12, 5, 38, 7, 30],   // 12
    [14, 4, 10, 14, 12, 5, 38, 7, 30],   // 13
    [14, 4, 10, 14, 25, 5, 38, 7, 28],   // 14
    [14, 4, 10, 14, 25, 5, 38, 7, 28],   // 15
    [13, 4, 10, 14, 12, 5, 38, 6, 28],   // 16
    [13, 4, 10, 14, 12, 5, 36, 6, 28],   // 17
    [13, 4, 10, 14, 12, 5, 36, 6, 28],   // 18
    [13, 4, 10, 14, 18, 5, 36, 6, 28],   // 19
    [13, 4, 10, 14, 20, 5, 36, 6, 28],   // 20
    [14, 4, 11, 15, 14, 5, 32, 6, 30],   // 21
    [14, 4, 11, 15, 14, 5, 32, 6, 30],   // 22
    [14, 4, 11, 15, 14, 5, 32, 6, 30],   // 23
    [14, 4, 11, 15, 14, 5, 32, 6, 30],   // 24
    [14, 4, 11, 15, 14, 5, 32, 6, 30],   // 25
    [14, 4, 11, 15, 25, 5, 32, 6, 30],   // 26
    [13, 3, 11, 15, 14, 5, 32, 6, 28],   // 27
    [13, 3, 11, 15, 14, 5, 30, 6, 28],   // 28
    [13, 4, 11, 15, 18, 5, 30, 6, 28],   // 29
    [13, 3, 11, 14, 25, 5, 30, 6, 28],   // 30
    [13, 3, 11, 14, 12, 5, 30, 6, 28],   // 31
    [13, 3, 11, 14, 12, 5, 30, 6, 26],   // 32
    [12, 3, 11, 14, 12, 5, 25, 6, 26],   // 33
    [12, 3, 11, 14, 12, 5, 25, 6, 26],   // 34
    [12, 3, 11, 14, 25, 5, 25, 6, 26],   // 35
    [12, 3, 11, 14, 12, 5, 25, 6, 26],   // 36
    [12, 3, 11, 14, 12, 5, 25, 6, 24],   // 37
    [12, 3, 11, 14, 12, 5, 25, 6, 24],   // 38
    [15, 4, 11, 14, 18, 5, 25, 6, 24],   // 39
    [12, 3, 11, 14, 20, 5, 25, 6, 24],   // 40
];

function getWaveTuning(w)
{
    const effW = w > 40 ? ((w - 21) % 20) + 21 : w;
    const d = arcadeWaveTuning[effW - 1];
    return {
        gruntDelay:        d[0],   // ROBSPD — used as a speed scalar (base wave 1 = 20)
        gruntDelayMin:     d[1],   // RMXSPD — per-kill speedup cap
        enforcerDropCount: d[2],   // ENFNUM
        sparkTime:         d[3],   // ENSTIM — frames between enforcer sparks
        spheroidDropTime:  d[4],   // CDPTIM — frames between spheroid drops
        hulkDelay:         d[5],   // HLKSPD — used as a speed scalar (base wave 1 = 8)
        brainShootTime:    d[6],   // BSHTIM — frames between brain cruise missiles
        brainDelay:        d[7],   // BRNSPD — used as a speed scalar (base wave 1 = 8)
        tankShootTime:     d[8],   // TNKSHT — frames between tank shells
    };
}

function getWaveComposition(w)
{
    // After wave 40, waves 21–40 repeat
    const effW = w > 40 ? ((w - 21) % 20) + 21 : w;
    const d = arcadeWaveData[effW - 1];
    return {
        grunts:     d[0],
        electrodes: d[1],
        mommies:    d[2],
        daddies:    d[3],
        mikeys:     d[4],
        humans:     d[2] + d[3] + d[4],
        hulks:      d[5],
        brains:     d[6],
        spheroids:  d[7],
        quarks:     d[8],
        tanks:      0,   // tanks come from quarks only (arcade behavior)
    };
}

///////////////////////////////////////////////////////////////////////////////
// spawning

function clearAllEnemies()      { for (const e of enemies) if (!e.destroyed) e.destroy(); enemies = []; }
function clearAllElectrodes()   { for (const e of electrodes) if (!e.destroyed) e.destroy(); electrodes = []; }
function clearAllHumans()       { for (const h of humans) if (!h.destroyed) h.destroy(); humans = []; }
function clearAllBullets()
{
    for (const b of bullets) if (!b.destroyed) b.destroy();
    for (const b of enemyBullets) if (!b.destroyed) b.destroy();
    bullets = []; enemyBullets = [];
}

function spawnElectrodesForWave(count)
{
    clearAllElectrodes();
    const minBetween = 1.8;
    for (let i=0;i<count;i++)
    {
        const pos = randArenaPosAvoidStuff(electrodeKeepout, minBetween);
        electrodes.push(new Electrode(pos));
    }
}

function spawnHumansForWave(mommies, daddies, mikeys)
{
    clearAllHumans();
    const spawnOne = type =>
    {
        const pos = randArenaPosAvoidStuff(safeZoneRadius, 2.0, 1.6);
        humans.push(new Human(pos, type));
    };
    for (let i=0;i<mommies;i++) spawnOne(0);
    for (let i=0;i<daddies;i++) spawnOne(1);
    for (let i=0;i<mikeys;i++)  spawnOne(2);
}

function countKillableEnemiesAlive()
{
    // Arcade wave-end check: ROBCNT + CIRCNT + ENFCNT + BRNCNT + TNKCNT + SQCNT == 0.
    // Hulks (unkillable) and Progs are explicitly NOT in that list — a wave with only
    // leftover Progs still ends. Humans/posts/projectiles also don't keep the wave alive.
    let n = 0;
    for (const e of enemies)
    {
        if (e.destroyed || !e.killable) continue;
        if (e instanceof Prog) continue;
        n++;
    }
    return n;
}

function spawnGrunt()
{
    // Arcade: grunts spawn at random arena positions, kept outside a safety box around the player.
    // All grunts are 1-hit kills in the arcade — difficulty comes from speed (ROBSPD/RMXSPD)
    // and quantity, never from HP buffs.
    const pos = randArenaPosAvoid(7, electrodeKeepout, enemySpawnElectrodeBuffer);
    const baseSpeed = .030 + rand(0, .012) + min(.02, gameWave * .0015);
    enemies.push(new Grunt(pos, baseSpeed, 1));
}
function spawnHulk()
{
    // Hulks pass through electrodes harmlessly, so no electrode buffer needed
    const pos = randArenaPosAvoid(7, electrodeKeepout);
    const speed = .05 + min(.04, gameWave * .003);
    enemies.push(new Hulk(pos, speed));
}
function spawnBrain()
{
    const pos = randArenaPosAvoid(8, electrodeKeepout, enemySpawnElectrodeBuffer);
    enemies.push(new Brain(pos));
}
function spawnSpheroid()
{
    // Arcade: spheroids enter from the LEFT or RIGHT edge at a random Y.
    // Retry along the edge until we find a Y that isn't sitting on an electrode.
    const onLeft = rand() < .5;
    const inset = .9;
    const x = onLeft ? -arenaHalf.x + arenaPadding + inset
                     :  arenaHalf.x - arenaPadding - inset;
    let pos = vec2(x, 0);
    for (let i = 0; i < 30; i++)
    {
        pos = vec2(x, rand(-arenaHalf.y + arenaPadding + 1, arenaHalf.y - arenaPadding - 1));
        if (!tooCloseToElectrode(pos, enemySpawnElectrodeBuffer)) break;
    }
    enemies.push(new Spheroid(pos));
}
function spawnQuark()
{
    // Arcade: quarks enter from the TOP or BOTTOM edge at a random X — retry to avoid electrodes
    const onTop = rand() < .5;
    const inset = .9;
    const y = onTop ? arenaHalf.y - arenaPadding - inset
                    : -arenaHalf.y + arenaPadding + inset;
    let pos = vec2(0, y);
    for (let i = 0; i < 30; i++)
    {
        pos = vec2(rand(-arenaHalf.x + arenaPadding + 1, arenaHalf.x - arenaPadding - 1), y);
        if (!tooCloseToElectrode(pos, enemySpawnElectrodeBuffer)) break;
    }
    enemies.push(new Quark(pos));
}
function spawnTank()
{
    const pos = randArenaPosAvoid(8, electrodeKeepout, enemySpawnElectrodeBuffer);
    enemies.push(new Tank(pos));
}

function startWave(w)
{
    // Enemies/electrodes/humans were laid out + warp-in particles already played during GET READY.
    // Starting the wave just unlocks the player and begins the speed-ramp timer.
    waveActive = true;
    waveTime = 0;
    playerControlLocked = false;
    respawnTimer = 0;

    sfxWaveStart.play(vec2(0));
    waveStartSweep = 50;
    whiteFlashTimer = 3;
}

function enterGetReadyForWave(nextWave)
{
    gameWave = nextWave;
    waveActive = false;
    waveTime = 0;
    playerControlLocked = true;
    respawnTimer = 0;
    humanRescueBonus = humanRescueStart;  // fresh family each wave
    gruntsKilledThisWave = 0;             // ROBSPD restores to wave default for new wave

    if (player) { player.pos = vec2(0); player.invuln = respawnInvulnFrames; }

    // Telebeam reassembly — fires for every wave (including game start). Player stays
    // hidden until the chunks have mostly converged (warpInHideTimer).
    warpInHideTimer = warpInHideDuration;
    if (player) spawnPlayerWarpIn(player.pos);

    clearAllEnemies();
    clearAllBullets();
    const c = getWaveComposition(nextWave);
    spawnElectrodesForWave(c.electrodes);
    spawnHumansForWave(c.mommies, c.daddies, c.mikeys);

    // Spawn enemies now so they appear alongside electrodes and humans.
    // They're frozen until startWave() unlocks the player (their update() bails on playerControlLocked).
    for (let i=0;i<c.grunts;i++)    spawnGrunt();
    for (let i=0;i<c.hulks;i++)     spawnHulk();
    for (let i=0;i<c.brains;i++)    spawnBrain();
    for (let i=0;i<c.spheroids;i++) spawnSpheroid();
    for (let i=0;i<c.quarks;i++)    spawnQuark();
    // Tanks are spawned only by Quarks, never directly (arcade behavior).
}

function endWave()
{
    // Wave-clear: banner + chime only (no center burst — it overlapped the warp-in
    // for the next wave and read as a confusing explosion).
    waveClearTimer = 90;
    sfxRescue.play(vec2(0));
    enterGetReadyForWave(gameWave + 1);
    interWaveTimer = interWaveDelayFrames;
}

///////////////////////////////////////////////////////////////////////////////
// player + mid-wave respawn

function respawnMidWave()
{
    // Count surviving enemies by type so we can respawn the same count at fresh positions.
    let nG=0, nH=0, nB=0, nS=0, nQ=0, nT=0, nE=0;
    const survivingProgs = [];
    for (const e of enemies)
    {
        if (e.destroyed) continue;
        if      (e instanceof Grunt)    nG++;
        else if (e instanceof Hulk)     nH++;
        else if (e instanceof Brain)    nB++;
        else if (e instanceof Spheroid) nS++;
        else if (e instanceof Quark)    nQ++;
        else if (e instanceof Tank)     nT++;
        else if (e instanceof Enforcer) nE++;
        else if (e instanceof Prog)     survivingProgs.push(e.humanType);
    }
    // Arcade PLEND2 (RRG23.ASM): convert surviving Enforcers into additional Spheroids.
    //   A = ENFCNT / 4 (integer divide, drops fraction)
    //   if A==0 AND CIRCNT==0 AND enforcers exist: force A=1
    //   new CIRCNT = min(old CIRCNT + A, wave-start CIRCNT)
    // Surviving Enforcers are kept (ENFCNT not decremented).
    // NOTE: arcade does NOT do this for Tanks→Quarks — only Enforcers→Spheroids.
    let nSExtra = 0;
    if (nE > 0)
    {
        nSExtra = Math.floor(nE / 4);
        if (nSExtra === 0 && nS === 0) nSExtra = 1;
        const waveStartSpheroids = getWaveComposition(gameWave).spheroids;
        nSExtra = Math.max(0, Math.min(nS + nSExtra, waveStartSpheroids) - nS);
    }

    clearAllEnemies();
    clearAllBullets();
    for (let i=0;i<nG;i++) spawnGrunt();
    for (let i=0;i<nH;i++) spawnHulk();
    for (let i=0;i<nB;i++) spawnBrain();
    for (let i=0;i<nS + nSExtra;i++) spawnSpheroid();
    for (let i=0;i<nQ;i++) spawnQuark();
    for (let i=0;i<nT;i++) spawnTank();
    // Arcade: surviving Enforcers are wiped by GNCIDE — only the converted Spheroids above
    // bring them back (those new Spheroids will drop fresh Enforcers in due time).
    for (const t of survivingProgs)
        enemies.push(new Prog(randEdgeSpawn(), t));

    // Grunt speed ramp restarts (matches arcade — speed climb resets on each death)
    waveTime = 0;
    // Rescue bonus resets to 1000 on death (per FAQ)
    humanRescueBonus = humanRescueStart;
    // Grunt speedup ramp resets on death too (arcade: ROBSPD restores to wave default)
    gruntsKilledThisWave = 0;

    if (player)
    {
        player.pos = vec2(0);
        player.facing = vec2(0,1);
        player.cooldown = 10;
        player.invuln = respawnInvulnFrames;
        // dramatic death burst (much bigger than a kill poof)
        burst(player.pos, 90, rgb(.3,.9,1));
        ringBurst(player.pos, rgb(.4,1,1), 18);
    }
    respawnTimer = respawnPauseFrames;
    playerControlLocked = true;
    // Telebeam reassembly chunks streak in toward the player position
    if (player) spawnPlayerWarpIn(player.pos);

    // ring poofs on the fresh enemy spawns so respawn feels like a wave-start mini-event
    for (const e of enemies)
        ringBurst(e.pos, e.hitColor || rgb(.9,.9,1), 10);
}

class Player extends EngineObject
{
    constructor()
    {
        super(vec2(0), vec2(1));
        this.lives = startingLives;
        this.invuln = 0;
        this.cooldown = 0;
        this.renderOrder = 6;
        this.facing = vec2(0,1);
        this.walkPhase = 0;
        this.moveAmount = 0;
    }
    update()
    {
        if (gameOver) return;
        if (playerControlLocked)
        {
            this.pos = vec2(0);
            if (this.cooldown > 0) this.cooldown--;
            // Freeze invuln during the mid-wave respawn pause so the player still has
            // a real invulnerability window when they regain control.
            if (this.invuln > 0 && respawnTimer === 0) this.invuln--;
            return;
        }
        // MOVEMENT: keyboard WASD + gamepad/touch left stick
        let move = vec2(0);
        if (keyIsDown('KeyW')) move.y += 1;
        if (keyIsDown('KeyS')) move.y -= 1;
        if (keyIsDown('KeyD')) move.x += 1;
        if (keyIsDown('KeyA')) move.x -= 1;
        const leftStick = (typeof gamepadStick === 'function') ? gamepadStick(0) : vec2(0);
        if (leftStick.lengthSquared() > .04) move = move.add(leftStick);
        if (move.lengthSquared() > 0) move = move.normalize(1);
        this.pos = this.pos.add(move.scale(.17));
        this.pos = clampToArena(this.pos, .5);
        this.moveAmount = move.length();
        if (this.moveAmount > .01) this.walkPhase += this.moveAmount * .4;

        // AIM: right stick (twin-stick) > left stick + fire button (touch / single-stick) > mouse
        const rightStick = (typeof gamepadStick === 'function') ? gamepadStick(1) : vec2(0);
        const rightStickActive = rightStick.lengthSquared() > .04;
        const fireButtonHeld = (typeof gamepadIsDown === 'function') && gamepadIsDown(0);
        const leftStickActive = leftStick.lengthSquared() > .04;

        let aimDir = null;
        if (rightStickActive)                       aimDir = rightStick;
        else if (fireButtonHeld && leftStickActive) aimDir = leftStick;
        else                                        aimDir = mousePos.subtract(this.pos);

        if (aimDir.lengthSquared() > .0001)
        {
            const a = aimDir.angle();
            const snapped = Math.round(a / (PI/4)) * (PI/4);
            this.facing = vec2(Math.sin(snapped), Math.cos(snapped));
        }

        // FIRE: mouse left button, right stick pushed (twin-stick auto-fire), or gamepad A button.
        // Arcade (RRG23.ASM LSPROC): 8-tick auto-fire cadence, max 4 player bullets on screen (LCNT cap).
        const shootInput = mouseIsDown(0) || rightStickActive || fireButtonHeld;
        if (this.cooldown > 0) this.cooldown--;
        let aliveBullets = 0;
        for (const b of bullets) if (!b.destroyed) aliveBullets++;
        if (shootInput && this.cooldown <= 0 && aliveBullets < 4)
        {
            // Bullets fire straight from the player — no aim barrel in arcade Robotron
            const bulletSpeed = 1;
            bullets.push(new Bullet(this.pos.copy(), this.facing.scale(bulletSpeed)));
            this.cooldown = 8;
            sfxShoot.play(this.pos);
        }
        if (this.invuln > 0) this.invuln--;
    }
    damage()
    {
        if (this.invuln > 0 || gameOver) return;
        sfxPlayerDie.play(this.pos);
        // chunkier death — big burst + ring shockwave + screen flash + screen shake
        burst(this.pos, 90, rgb(.4,.9,1));
        ringBurst(this.pos, rgb(.6, 1, 1), 24);
        whiteFlashTimer = 8;
        triggerShake(.5, 35);
        this.lives--;
        if (this.lives < 0)
        {
            gameOver = true;
            if (score > best) {
                best = score;
                try { localStorage.setItem('robotron.best', best); } catch(e) {}
            }
            gameOverTimer = 90;
            return;
        }
        respawnMidWave();
    }
    render()
    {
        // hide player during the first half of the mid-wave death pause (breathing room)
        if (respawnTimer > respawnHiddenFrames) return;
        // also hide during the wave-start warp-in (every wave including game start)
        if (warpInHideTimer > 0) return;

        const phase = Math.sin(this.walkPhase);
        const bob = phase * .05;
        const armSwing = phase * .08;
        const legStretch = phase * .06;
        // Invuln rainbow flash — cycles whole body through hues so it stays visible
        // against the white default body color.
        const isInvuln = this.invuln > 0;
        const hue = isInvuln ? (frame * .05) % 1 : 0;
        const body     = isInvuln ? hsl(hue, 1, .7)              : rgb(.95, .95, .95);
        const head     = isInvuln ? hsl((hue + .33) % 1, 1, .6) : rgb(1, .2, .2);
        const headDark = isInvuln ? hsl((hue + .33) % 1, 1, .3) : rgb(.55, .05, .05);
        const dark     = isInvuln ? hsl((hue + .66) % 1, .8, .4): rgb(.25, .25, .3);
        const eyes = rgb(1, 1, 1);

        const bodyCenterY = -.02 + bob;
        const bodyBottomY = bodyCenterY - .275;     // body height .55 / 2

        // shadow
        drawRect(this.pos.add(vec2(0, -.55)), vec2(.7, .14), rgb(0,0,0,.4));

        // legs — height-animated, anchored to body bottom (no detach)
        const baseLegH = .32;
        const leftLegH  = baseLegH + legStretch;
        const rightLegH = baseLegH - legStretch;
        drawRect(this.pos.add(vec2(-.14, bodyBottomY - leftLegH /2)), vec2(.2, leftLegH ), dark);
        drawRect(this.pos.add(vec2( .14, bodyBottomY - rightLegH/2)), vec2(.2, rightLegH), dark);

        // white torso
        drawRect(this.pos.add(vec2(0, bodyCenterY)), vec2(.55, .55), body);

        // arms — both anchored to body Y, swing symmetrically opposite
        drawRect(this.pos.add(vec2(-.35, bodyCenterY + armSwing)), vec2(.16, .42), body);
        drawRect(this.pos.add(vec2( .35, bodyCenterY - armSwing)), vec2(.16, .42), body);

        // big red helmet/head + visor
        drawRect(this.pos.add(vec2(0,    .42 + bob)), vec2(.6, .5), head);
        drawRect(this.pos.add(vec2(0,    .22 + bob)), vec2(.62, .08), headDark);
        drawRect(this.pos.add(vec2(0,    .42 + bob)), vec2(.42, .1), headDark);
        drawRect(this.pos.add(vec2(-.1,  .42 + bob)), vec2(.08, .08), eyes);
        drawRect(this.pos.add(vec2( .1,  .42 + bob)), vec2(.08, .08), eyes);
    }
}

///////////////////////////////////////////////////////////////////////////////
// collisions

function applyElectrodeCollisions()
{
    // Arcade post collision (verified from RRP8.ASM / RRH11.ASM / source pass):
    //   - Player:    dies on contact
    //   - Grunt:     dies on contact, post is also destroyed (ROBOT calls COL0 against PPTR)
    //   - Hulk:      passes through unharmed BUT destroys the post (HULK calls COL0 against PPTR)
    //   - Human:     blocked but unharmed (treated as movement obstacle)
    //   - Everyone else (Brain/Enforcer/Tank/Prog/Spheroid/Quark/sparks/missiles/shells):
    //     no PPTR reference in their source — they pass through harmlessly
    if (player && !gameOver && player.invuln <= 0)
        for (const e of electrodes)
        {
            if (e.destroyed) continue;
            if (isOverlapping(player.pos, vec2(.7), e.pos, e.size)) { player.damage(); return; }
        }
    for (const en of enemies)
    {
        if (en.destroyed) continue;
        if (en instanceof Grunt)
        {
            for (const el of electrodes)
            {
                if (el.destroyed) continue;
                if (isOverlapping(en.pos, en.size, el.pos, el.size))
                {
                    en.killedByElectrode(el.pos);
                    el.destroy();
                    burst(el.pos, 14, rgb(.5, 1, 1));
                    break;
                }
            }
        }
        else if (en instanceof Hulk)
        {
            for (const el of electrodes)
            {
                if (el.destroyed) continue;
                if (isOverlapping(en.pos, en.size, el.pos, el.size))
                {
                    el.destroy();
                    burst(el.pos, 14, rgb(.5, 1, 1));
                    sfxHit.play(el.pos);
                    // Hulk continues unscathed — no break, in case it's overlapping more than one
                }
            }
        }
    }
    // Humans bounce off electrodes (arcade: obstacle, not fatal)
    for (const h of humans)
    {
        if (h.destroyed) continue;
        for (const el of electrodes)
        {
            if (el.destroyed) continue;
            if (isOverlapping(h.pos, h.size, el.pos, el.size))
            {
                const away = h.pos.subtract(el.pos);
                const d = away.length();
                if (d > .001) { h.dir = away.scale(1/d); h.pos = el.pos.add(h.dir.scale(.9)); }
                break;
            }
        }
    }
}

function applyHumanCollisions()
{
    if (player && !gameOver && !playerControlLocked)
        for (const h of humans)
        {
            if (h.destroyed) continue;
            if (isOverlapping(player.pos, vec2(.9), h.pos, h.size)) h.rescue();
        }
    for (const en of enemies)
    {
        if (en.destroyed || en.killable) continue; // only hulks
        for (const h of humans)
        {
            if (h.destroyed) continue;
            if (isOverlapping(en.pos, en.size, h.pos, h.size)) h.kill();
        }
    }
}

function applyPlayerBulletHits()
{
    // player bullets -> killable enemies
    for (const b of bullets)
        for (const e of enemies)
        {
            if (b.destroyed || e.destroyed) continue;
            if (!e.killable) continue;
            if (isOverlapping(b.pos, vec2(.35), e.pos, e.size))
            {
                b.destroy();
                const hitDir = b.vel.lengthSquared() > .001 ? b.vel.normalize(1) : vec2(0,1);
                e.takeHit(1, hitDir);
            }
        }
    // player bullets -> hulks (push, consume bullet)
    for (const b of bullets)
        for (const e of enemies)
        {
            if (b.destroyed || e.destroyed) continue;
            if (e.killable) continue;
            if (isOverlapping(b.pos, vec2(.35), e.pos, e.size))
            {
                const dir = b.vel.lengthSquared() > .001 ? b.vel.normalize(1) : vec2(0,1);
                e.push(dir);
                burst(b.pos, 4, rgb(.6,1,.6));
                b.destroy();
            }
        }
    // Arcade: player bullets can destroy sparks/missiles/shells for 25 pts each (SPKIL/CMKIL/SHLKIL)
    for (const b of bullets)
        for (const eb of enemyBullets)
        {
            if (b.destroyed || eb.destroyed) continue;
            if (isOverlapping(b.pos, vec2(.35), eb.pos, vec2(.32)))
            {
                b.destroy();
                eb.destroy();
                score += scoreEnemyBullet;
                burst(eb.pos, 10, rgb(1,1,.5));
                floaters.push(new FloatText(eb.pos, `${scoreEnemyBullet}`, rgb(1,1,.5)));
            }
        }
    // player bullets -> electrodes (destroy electrode, NO points per arcade)
    for (const b of bullets)
        for (const el of electrodes)
        {
            if (b.destroyed || el.destroyed) continue;
            if (isOverlapping(b.pos, vec2(.35), el.pos, el.size))
            {
                b.destroy();
                el.destroy();
                burst(el.pos, 18, rgb(.6, 1, 1));
                sfxPop.play(el.pos);
                break;
            }
        }
}

function checkBonusLife()
{
    while (player && score >= nextBonusLifeAt)
    {
        player.lives++;
        nextBonusLifeAt += bonusLifeInterval;
        floaters.push(new FloatText(player.pos.add(vec2(0, 1.5)), 'EXTRA LIFE', rgb(.4, 1, 1)));
        sfxRescue.play(player.pos);
    }
}

function applyEnemyBulletPlayer()
{
    if (!player || gameOver || player.invuln > 0) return;
    for (const eb of enemyBullets)
    {
        if (eb.destroyed) continue;
        if (isOverlapping(eb.pos, vec2(.32), player.pos, vec2(.85)))
        {
            eb.destroy();
            player.damage();
            return;
        }
    }
}

///////////////////////////////////////////////////////////////////////////////
// housekeeping

function cleanupLists()
{
    bullets      = bullets.filter(o=>!o.destroyed);
    enemyBullets = enemyBullets.filter(o=>!o.destroyed);
    enemies      = enemies.filter(o=>!o.destroyed);
    electrodes   = electrodes.filter(o=>!o.destroyed);
    humans       = humans.filter(o=>!o.destroyed);
    particles    = particles.filter(p=>p.life > 0);
    floaters     = floaters.filter(f=>f.life > 0);
}

function resetGame()
{
    engineObjectsDestroy(true);
    bullets = []; enemyBullets = [];
    clearAllEnemies(); clearAllElectrodes(); clearAllHumans();
    particles = []; floaters = [];

    score = 0;
    gameOver = false;
    gameOverTimer = 0;
    nextBonusLifeAt = bonusLifeInterval;
    // Reset all global caps (destroy() overrides should have decremented these already,
    // but force-clear in case anything slipped through)
    enforcerCount = sparkCount = cruiseMissileCount = tankCount = shellCount = 0;
    gruntsKilledThisWave = 0;
    // Reset juice effect timers so they don't leak across sessions
    shakeTimer = shakeMag = whiteFlashTimer = waveClearTimer = waveStartSweep = warpInHideTimer = 0;
    cameraPos = vec2(0);

    player = new Player();
    // Lay out wave 1 (electrodes, humans, enemies — all visible during GET READY).
    enterGetReadyForWave(1);
    interWaveTimer = waveStartDelayFrames;
}

///////////////////////////////////////////////////////////////////////////////
// minimal self-tests

function runSelfTests()
{
    console.assert(isOverlapping(vec2(0,0), vec2(1,1), vec2(.4,.4), vec2(1,1)) === true);
    console.assert(isOverlapping(vec2(0,0), vec2(1,1), vec2(10,10), vec2(1,1)) === false);
    // Arcade-exact wave data checks
    const w1 = getWaveComposition(1);
    console.assert(w1.grunts === 15 && w1.electrodes === 5 && w1.humans === 2, 'wave 1 arcade match');
    const w5 = getWaveComposition(5);
    console.assert(w5.brains === 15 && w5.mommies === 15 && w5.mikeys === 1 && w5.daddies === 0, 'wave 5 Mikey-bug brain wave');
    const w7 = getWaveComposition(7);
    console.assert(w7.grunts === 0 && w7.quarks === 10 && w7.hulks === 12, 'wave 7 quark+hulk tank wave');
    const w9 = getWaveComposition(9);
    console.assert(w9.grunts === 60 && w9.electrodes === 0, 'wave 9 grunt wave (no electrodes)');
    const w14 = getWaveComposition(14);
    console.assert(w14.hulks === 20, 'wave 14 hulk wave');
    const w24 = getWaveComposition(24);
    console.assert(w24.spheroids === 6 && w24.quarks === 7, 'wave 24 double trouble');
    // Wave > 40 should repeat the 21–40 cycle
    const w41 = getWaveComposition(41);
    const w21 = getWaveComposition(21);
    console.assert(w41.grunts === w21.grunts && w41.quarks === w21.quarks, 'wave 41 = wave 21 (cycle)');
    console.assert(scoreProg === 100, 'prog score is 100');
}

///////////////////////////////////////////////////////////////////////////////
// LittleJS callbacks

///////////////////////////////////////////////////////////////////////////////
// Menu integration

function setPlaying(p)
{
    isPlaying = p;
}

function startGame()
{
    resetGame();
    setPlaying(true);
}

function quitToTitle()
{
    if (typeof clearSubmenuStack === 'function') clearSubmenuStack();
    if (typeof hideAllMenus === 'function') hideAllMenus();
    setPlaying(false);

    engineObjectsDestroy(true);
    bullets = []; enemyBullets = [];
    clearAllEnemies(); clearAllElectrodes(); clearAllHumans();
    particles = []; floaters = [];
    player = null;
    gameOver = false;
    gameOverTimer = 0;
    waveActive = false;
    score = 0;
    gameWave = 1;
    interWaveTimer = 0;
    respawnTimer = 0;
    spawnAttractDecoration();
    if (typeof showMenu === 'function') showMenu('title');
}

function buildMenus()
{
    if (typeof createMenu !== 'function') return; // menus.js not loaded — fail gracefully

    // Title menu — title is drawn on the canvas (fancy effect) so we suppress the DOM title here
    createTitleMenu({
        title: '',
        onPlay: startGame,
        revealOnClick: false,
        canReveal: () => !isPlaying,
        itemsBefore: [
            {type:'label', id:'bestLabel', text:'BEST 0'},
        ],
        items: [
            {type:'button', label:'OPTIONS', onClick: () => pushMenu('options')},
            {type:'button', label:'HOW TO PLAY', onClick: () => pushMenu('about')},
        ],
        onShow: () =>
        {
            const m = getMenu('title');
            if (m) m.getItem('bestLabel')?.setLabel(`BEST ${best}`);
        },
    });

    // Options menu (shared between title and pause)
    createOptionsMenu({persistKey: 'robotron.volume'});

    // How to play
    createMenu({
        id: 'about',
        title: 'HOW TO PLAY',
        onHide: popMenu,
        items: [
            {type:'text', text:
                'You are the last defender. Robotrons are killing or ' +
                'reprogramming the last human family.\n\n' +
                'MOVE with WASD or left stick.\n' +
                'AIM and FIRE with mouse, right stick, or touch.\n' +
                'Shots snap to 8 directions.\n\n' +
                'TOUCH the family (Mommy, Daddy, Mikey) to rescue them ' +
                '(bonus rises 1000 to 5000).\n\n' +
                'AVOID electrodes — they kill.\n' +
                'HULKS cannot be killed; bullets push them.\n' +
                'BRAINS reprogram humans into PROGS.\n' +
                'SPHEROIDS drop ENFORCERS. QUARKS drop TANKS.'},
            {type:'separator'},
            {type:'button', label:'BACK', onClick: () => hideMenu('about')},
        ],
    });

    // Pause menu
    createPauseMenu({
        onQuit: quitToTitle,
        extraItems: [
            {type:'button', id:'options', label:'OPTIONS', onClick: () => pushMenu('options')},
        ],
    });

    // Game-over menu — score shown on open
    createMenu({
        id: 'gameOver',
        title: 'GAME OVER',
        dismissable: false,
        onShow: () =>
        {
            const m = getMenu('gameOver');
            if (m)
            {
                m.getItem('finalScore')?.setLabel(`SCORE  ${score}`);
                m.getItem('bestScore')?.setLabel(`BEST   ${best}`);
                m.getItem('waveReached')?.setLabel(`WAVE   ${gameWave}`);
            }
        },
        items: [
            {type:'label', id:'finalScore',  text:'SCORE  0'},
            {type:'label', id:'bestScore',   text:'BEST   0'},
            {type:'label', id:'waveReached', text:'WAVE   0'},
            {type:'separator'},
            {type:'button', label:'PLAY AGAIN', onClick: () =>
            {
                hideMenu('gameOver');
                startGame();
            }},
            {type:'button', label:'QUIT TO TITLE', onClick: quitToTitle},
        ],
    });

    // HUD toolbar
    installDefaultToolbar();

    // Show the title menu immediately — no click-to-reveal step.
    showMenu('title');
}

// Auto-fit the camera so the arena fills the canvas (with a small margin for the cyan frame)
function fitCameraToArena()
{
    if (!mainCanvasSize || mainCanvasSize.x < 100) return;
    const marginX = 2.2;
    const marginY = 2.2;
    cameraScale = min(
        mainCanvasSize.x / (arenaSize.x + marginX),
        mainCanvasSize.y / (arenaSize.y + marginY)
    );
}

function gameInit()
{
    // Let the canvas grow with the window. canvasMaxSize caps the internal resolution.
    canvasMaxSize = vec2(2048, 2048);
    cameraPos = vec2(0);
    fitCameraToArena();
    runSelfTests();

    // (menus.js auto-moves LittleJS's debug-overlay key off Escape to ` — no manual remap needed)
    setSoundVolume(.8);
    // Only pause when we're actually playing — keeps attract-mode entities
    // animating behind the title screen.
    installAutoPause();

    buildMenus();
    spawnAttractDecoration();
}

// Title-screen attract mode: family wandering, electrodes pulsing, a few enemies for flavor
function spawnAttractDecoration()
{
    clearAllEnemies();
    clearAllElectrodes();
    clearAllHumans();

    for (let i=0;i<10;i++)
        electrodes.push(new Electrode(randArenaPosAvoidStuff(0, 1.8)));

    for (let i=0;i<6;i++)
        humans.push(new Human(randArenaPosAvoidStuff(0, 1.5, 1.4), i % 3));

    // A few wandering grunts (no player to chase — they pick random headings)
    for (let i=0;i<4;i++)
        enemies.push(new Grunt(randEdgeSpawn(), .04, 1));

    // One hulk marching around (no collision in attract — humans are safe)
    enemies.push(new Hulk(randArenaPosAvoid(0, 5), .05));
}

function updateGruntStepBeat()
{
    // Arcade-style march: a global "step" pulse whose tempo follows the nearest grunt.
    // Two alternating pitches give the classic boom-boom marching cadence.
    if (!player || playerControlLocked) return;
    let nearest = Infinity;
    for (const e of enemies)
    {
        if (e.destroyed || !(e instanceof Grunt)) continue;
        const d = e.pos.subtract(player.pos).length();
        if (d < nearest) nearest = d;
    }
    if (nearest === Infinity) return;            // no grunts on screen — silent

    if (gruntStepTimer > 0) { gruntStepTimer--; return; }

    // Distance → interval: 2 units away ≈ 7 frames, 25+ units ≈ 36 frames
    const interval = clamp(7 + (nearest - 2) * 1.3, 7, 36) | 0;
    const pitch = gruntStepBeat ? 1.0 : .78;     // two-tone march
    const vol   = clamp(1.1 - nearest / 26, .35, 1);
    sfxGruntStep.play(vec2(0), vol, pitch);
    gruntStepBeat ^= 1;
    gruntStepTimer = interval;
}

function gameUpdate()
{
    // Keep the arena fitting the canvas as the window resizes
    fitCameraToArena();

    // DEBUG: N advances to the next wave — also skips the GET READY pause
    if (isPlaying && !gameOver && keyWasPressed('KeyN'))
    {
        if (waveActive)     endWave();            // current wave -> jump to GET READY
        else                interWaveTimer = 0;   // GET READY -> start next wave immediately
    }

    // Quick restart: R resets the whole run (back to wave 1, fresh lives)
    if (isPlaying && keyWasPressed('KeyR'))
        startGame();

    // Pause hotkey — only meaningful when actually playing
    if (isPlaying && !gameOver &&
        (keyWasPressed('Escape') || (typeof gamepadWasPressed === 'function' && gamepadWasPressed(9))))
    {
        if (typeof playMenuSound === 'function') playMenuSound('activate');
        if (typeof showMenu === 'function') showMenu('pause');
        if (typeof inputClearKey === 'function')
        {
            inputClearKey('Escape');
            inputClearKey(9, 1, false, true, false);
        }
        return;
    }

    // update particles/floaters always (visible during pauses)
    for (const p of particles) p.update();
    for (const f of floaters) f.update();
    if (warpInHideTimer > 0) warpInHideTimer--;
    if (warpInSfxDelay > 0 && --warpInSfxDelay === 0) sfxWarpIn.play(vec2(0));

    // Title screen: nothing else to do
    if (!isPlaying) { cleanupLists(); return; }

    if (gameOver)
    {
        if (gameOverTimer > 0)
        {
            gameOverTimer--;
            if (gameOverTimer === 0 && typeof showMenu === 'function')
                showMenu('gameOver');
        }
        cleanupLists();
        return;
    }

    if (respawnTimer > 0)
    {
        respawnTimer--;
        if (respawnTimer === 0) playerControlLocked = false;
        cleanupLists();
        return;
    }

    if (waveActive)
    {
        waveTime++;
        if (countKillableEnemiesAlive() === 0)
            endWave();
        updateGruntStepBeat();
    }
    else
    {
        if (interWaveTimer > 0) interWaveTimer--;
        else                    startWave(gameWave);
    }

    cleanupLists();

    if (!waveActive)
    {
        playerControlLocked = true;
        if (player) player.pos = vec2(0);
    }
}

function gameUpdatePost()
{
    // Skip all collision processing during attract mode (hulks shouldn't kill the demo family, etc.)
    if (!isPlaying) return;

    applyPlayerBulletHits();
    applyElectrodeCollisions();
    applyHumanCollisions();
    applyEnemyBulletPlayer();
    checkBonusLife();

    if (player && !gameOver && player.invuln <= 0)
        for (const e of enemies)
        {
            if (e.destroyed) continue;
            if (isOverlapping(player.pos, vec2(.85), e.pos, e.size)) { player.damage(); break; }
        }

    cleanupLists();
}

function gameRender()
{
    // === SCREEN SHAKE === apply offset to cameraPos before drawing
    if (shakeTimer > 0)
    {
        const decay = shakeTimer / 30;
        const m = shakeMag * decay;
        cameraPos = vec2(rand(-m, m), rand(-m, m));
        shakeTimer--;
        if (shakeTimer === 0) { shakeMag = 0; cameraPos = vec2(0); }
    }
    else
        cameraPos = vec2(0);

    drawRect(cameraPos, vec2(200), rgb(.03,.03,.04));

    // === BACKGROUND DRIFT STARS === filling dead space outside the arena
    for (const s of driftStars)
    {
        s.pos.y += s.speed;
        if (s.pos.y > 35) { s.pos.y = -35; s.pos.x = rand(-60, 60); }
        s.phase += .02;
        // only render if outside the playfield
        if (abs(s.pos.x) < arenaHalf.x + .5 && abs(s.pos.y) < arenaHalf.y + .5) continue;
        const a = .25 + Math.sin(s.phase) * .15;
        drawRect(s.pos, vec2(s.size), rgb(.55, .75, 1, a));
    }

    for (let x=-arenaHalf.x; x<=arenaHalf.x; x+=1)
        drawRect(vec2(x,0), vec2(.02, arenaSize.y), rgb(.06,.06,.08));
    for (let y=-arenaHalf.y; y<=arenaHalf.y; y+=1)
        drawRect(vec2(0,y), vec2(arenaSize.x, .02), rgb(.06,.06,.08));

    // === ARENA BOUNDARY === color cycles slowly, brighter on wave-start sweep
    const borderHue = (time * .04) % 1;
    const borderCol = hsl(borderHue, .65, .65);
    const haloCol   = hsl(borderHue, .65, .35);
    // Wave-start sweep: pulse boundary brightness over ~50 frames
    let sweepBoost = 0;
    if (waveStartSweep > 0)
    {
        sweepBoost = (waveStartSweep / 50);
        waveStartSweep--;
    }
    const baseW = .35 + sweepBoost * .9;
    drawRect(vec2(0), arenaSize.add(vec2(.6 + sweepBoost * .8)), rgb(haloCol.r, haloCol.g, haloCol.b, .9));
    drawRect(vec2(0), arenaSize.add(vec2(baseW)), rgb(
        borderCol.r + sweepBoost * .35,
        borderCol.g + sweepBoost * .35,
        borderCol.b + sweepBoost * .35));
    drawRect(vec2(0), arenaSize.add(vec2(.08)), rgb(.05, .25, .35));
    drawRect(vec2(0), arenaSize, rgb(.02,.02,.04));

    for (const p of particles) p.render();
    drawRect(vec2(0), vec2(safeZoneRadius*2), rgb(0,0,0,.08));
}

function gameRenderPost()
{
    // === FULL-SCREEN WHITE FLASH === short bright pulse on death / wave events
    if (whiteFlashTimer > 0)
    {
        const a = (whiteFlashTimer / 8) * .6;
        drawRect(cameraPos, vec2(200), rgb(1, 1, 1, a));
        whiteFlashTimer--;
    }

    // === WAVE CLEAR BANNER === zoomed text after a wave finishes
    if (waveClearTimer > 0)
    {
        const W = mainCanvasSize.x, H = mainCanvasSize.y;
        const t = 1 - waveClearTimer / 90;            // 0 → 1
        const size = 60 + t * 60;                       // zoom 60→120
        const a = waveClearTimer < 25 ? waveClearTimer / 25 : 1;  // fade out at the end
        const hue = (time * .3) % 1;
        const c = hsl(hue, .8, .7);
        drawTextScreen('WAVE CLEAR', vec2(W/2, H/2 - 20), size,
            rgb(c.r, c.g, c.b, a), 7, rgb(0, 0, 0, a));
        waveClearTimer--;
    }

    for (const f of floaters) f.render();

    const W = mainCanvasSize.x, H = mainCanvasSize.y;

    // Pre-play canvas: chromatic multi-layer title always visible behind/around the menu
    if (!isPlaying)
    {
        const t = time;
        const cx = W / 2;
        const cy = 130;  // top of screen so the menu (centered) doesn't overlap

        const wobbleY = Math.sin(t * 3.5) * 4;
        const wobbleX = Math.cos(t * 2.7) * 5;
        const titleSize = 100 + Math.sin(t * 2) * 4;

        // Chromatic color halos (offset R/G/B layers)
        drawTextScreen('ROBOTRON', vec2(cx + 10 + wobbleX*.4, cy),
            titleSize, rgb(1, .12, .2, .55));
        drawTextScreen('ROBOTRON', vec2(cx - 10 - wobbleX*.4, cy),
            titleSize, rgb(.15, .85, 1, .55));
        drawTextScreen('ROBOTRON', vec2(cx, cy + 8 + wobbleY*.4),
            titleSize, rgb(1, .9, .15, .45));
        drawTextScreen('ROBOTRON', vec2(cx, cy - 8 - wobbleY*.4),
            titleSize, rgb(.7, .25, 1, .45));

        // Main color-cycling layer (rainbow hue drift) on top
        const hue = (t * .12) % 1;
        drawTextScreen('ROBOTRON', vec2(cx, cy + wobbleY),
            titleSize, hsl(hue, .85, .75), 9, rgb(0,0,0));

        // 2048 subtitle — counter-cycling hue, just below the title
        drawTextScreen('Made With LittleJS', vec2(cx, cy + 75),
            52, hsl((hue + .5) % 1, .9, .7), 5, rgb(0,0,0));

        // Pulsing CLICK / TOUCH TO PLAY prompt — only when no menu is up yet
        const menuUp = (typeof isMenuVisible === 'function') && isMenuVisible();
        if (!menuUp)
        {
            const a = .5 + .5 * Math.sin(t * 3);
            const prompt = (typeof isTouchDevice !== 'undefined' && isTouchDevice) ? 'TOUCH TO PLAY' : 'CLICK TO PLAY';
            drawTextScreen(prompt, vec2(cx, H - 80), 30, hsl(0, 0, 1, a), 4, hsl(0, 0, 0, a));
        }
        return;
    }

    // TOP-LEFT — score
    drawTextScreen(`SCORE  ${score}`, vec2(20, 44), 48, rgb(.4,1,1), 7, hsl(0,0,0), 'left');
    drawTextScreen(`BEST   ${best}`,  vec2(20, 96), 36, rgb(.85,.85,.85), 5, hsl(0,0,0), 'left');
    // TOP-RIGHT is reserved for the HUD toolbar (fullscreen / menu buttons)

    // BOTTOM-LEFT — lives + next extra-life threshold
    const bottomOffset = 28;
    if (player)
    {
        drawTextScreen('LIVES', vec2(20, H - bottomOffset), 36, rgb(.7,1,1), 5, hsl(0,0,0), 'left');
        const visibleLives = min(player.lives, 9);
        let x = 180;
        for (let i=0;i<visibleLives;i++)
        {
            drawLifeIcon(x-20, H - bottomOffset);
            x += 34;
        }
        if (player.lives > 9)
            drawTextScreen(`+${player.lives - 9}`, vec2(x + 4, H - bottomOffset), 36, rgb(.7,1,1), 5, hsl(0,0,0), 'left');
        // next extra-life threshold (above LIVES)
        drawTextScreen(`NEXT LIFE ${nextBonusLifeAt}`, vec2(20, H - bottomOffset - 42), 26, rgb(.6, .85, .85), 4, hsl(0,0,0), 'left');
    }

    // BOTTOM-RIGHT — wave number
    drawTextScreen(`WAVE  ${gameWave}`, vec2(W - 20, H - bottomOffset), 48, rgb(1,.8,.3), 7, hsl(0,0,0), 'right');

    // CENTER BIG — between waves
    if (!waveActive && !gameOver && respawnTimer === 0)
    {
        drawTextScreen(`WAVE  ${gameWave}`, vec2(W/2, H/2 - 30), 90, rgb(1,.8,.3), 6, rgb(0,0,0));
        const comp = getWaveComposition(gameWave);
        // Detect special wave types directly from the arcade composition data
        const isBrainWave      = comp.brains > 0;
        const isTankWave       = !isBrainWave && comp.quarks >= 7;
        const isGruntWave      = !isBrainWave && !isTankWave && comp.grunts >= 50;
        const isHulkWave       = !isBrainWave && !isTankWave && comp.hulks >= 15;
        const isDoubleTrouble  = !isBrainWave && !isTankWave && comp.spheroids >= 5 && comp.quarks >= 5;
        const subtitle =
              isBrainWave      ? 'BRAIN WAVE - SAVE THE FAMILY'
            : isTankWave       ? 'TANK ATTACK'
            : isGruntWave      ? 'GRUNT WAVE - SURROUNDED'
            : isHulkWave       ? 'HULK WAVE - GET OUT OF THE CROWD'
            : isDoubleTrouble  ? 'DOUBLE TROUBLE - SPHEROIDS AND QUARKS'
            : (gameWave === 2) ? 'HULKS AND SPHEROIDS APPEAR'
            : comp.quarks > 0  ? 'QUARKS APPEAR'
            : 'GET READY';
        drawTextScreen(subtitle, vec2(W/2, H/2 + 50), 30, rgb(.9,.9,1), 4, rgb(0,0,0));
    }

    // Game-over text is handled by the gameOver menu (built in buildMenus).
}

///////////////////////////////////////////////////////////////////////////////
// Startup LittleJS Engine
engineInit(gameInit, gameUpdate, gameUpdatePost, gameRender, gameRenderPost);

</script>
