///////////////////////////////////////////////////////////////////////////////
// helpers

const clampToArena = (pos, radius=0)=>
{
    const minX = -arenaHalf.x + arenaPadding + radius;
    const maxX =  arenaHalf.x - arenaPadding - radius;
    const minY = -arenaHalf.y + arenaPadding + radius;
    const maxY =  arenaHalf.y - arenaPadding - radius;
    pos.x = clamp(pos.x, minX, maxX);
    pos.y = clamp(pos.y, minY, maxY);
    return pos;
};

function randEdgeSpawn()
{
    const side = randInt(4), inset = .3;
    if (side == 0) return vec2(rand(-arenaHalf.x+inset, arenaHalf.x-inset),  arenaHalf.y-inset);
    if (side == 1) return vec2(rand(-arenaHalf.x+inset, arenaHalf.x-inset), -arenaHalf.y+inset);
    if (side == 2) return vec2( arenaHalf.x-inset, rand(-arenaHalf.y+inset, arenaHalf.y-inset));
    return            vec2(-arenaHalf.x+inset, rand(-arenaHalf.y+inset, arenaHalf.y-inset));
}

function randArenaPosAvoid(minDistFromPlayer, minDistFromCenter, minDistFromElectrodes=0)
{
    for (let i=0;i<80;i++)
    {
        const p = vec2(rand(-arenaHalf.x+2, arenaHalf.x-2), rand(-arenaHalf.y+2, arenaHalf.y-2));
        if (minDistFromCenter && p.length() < minDistFromCenter) continue;
        if (player && minDistFromPlayer && p.subtract(player.pos).length() < minDistFromPlayer) continue;
        if (minDistFromElectrodes && tooCloseToElectrode(p, minDistFromElectrodes)) continue;
        return p;
    }
    return randEdgeSpawn();
}

function tooCloseToElectrode(p, minDist)
{
    for (const e of electrodes)
    {
        if (e.destroyed) continue;
        if (p.subtract(e.pos).length() < minDist) return true;
    }
    return false;
}

function randArenaPosAvoidStuff(minDistFromCenter, minDistBetween, minDistFromHumans=0)
{
    for (let i=0;i<120;i++)
    {
        const p = randArenaPosAvoid(0, minDistFromCenter);
        let ok = true;
        for (const e of electrodes)
        {
            if (e.destroyed) continue;
            if (p.subtract(e.pos).length() < minDistBetween) { ok = false; break; }
        }
        if (ok && minDistFromHumans)
            for (const h of humans)
            {
                if (h.destroyed) continue;
                if (p.subtract(h.pos).length() < minDistFromHumans) { ok = false; break; }
            }
        if (ok) return p;
    }
    return randEdgeSpawn();
}

///////////////////////////////////////////////////////////////////////////////
// particles + floating bonus text

class SimpleParticle
{
    constructor(pos, vel, life, size, color)
    {
        this.pos = pos.copy(); this.vel = vel.copy();
        this.life = life; this.maxLife = life; this.size = size; this.color = color;
    }
    update() { this.pos = this.pos.add(this.vel); this.vel = this.vel.scale(.92); this.life--; }
    render() { drawRect(this.pos, vec2(this.size), this.color); }
}

// Converging particle — eases inward from startPos toward target over its lifetime.
// Used for the player "telebeam" reassembly on respawn.
class ConvergingParticle
{
    constructor(startPos, target, life, size, color)
    {
        this.pos      = startPos.copy();
        this.startPos = startPos.copy();
        this.target   = target.copy();
        this.life     = life;
        this.maxLife  = life;
        this.size     = size;
        this.color    = color;
    }
    update()
    {
        this.life--;
        const t = 1 - this.life / this.maxLife;     // 0 → 1 over lifetime
        const eased = t * t * t;                     // ease-in cubic — accelerates as it reaches center
        this.pos = vec2(
            this.startPos.x + (this.target.x - this.startPos.x) * eased,
            this.startPos.y + (this.target.y - this.startPos.y) * eased);
    }
    render()
    {
        // Brighten + grow slightly as the chunk converges so the assembly feels charged
        const t = 1 - this.life / this.maxLife;
        const a = .5 + t * .5;
        const s = this.size * (1 + t * .4);
        drawRect(this.pos, vec2(s), rgb(this.color.r, this.color.g, this.color.b, a));
    }
}

// Player "telebeam" reassembly — chunks streak inward from far away and snap together at center.
function spawnPlayerWarpIn(target)
{
    // Delay the warp-in sfx ~1s so it lands as the player materializes, not at the start of the chunk streak
    warpInSfxDelay = 30;
    const count = 140;
    for (let i = 0; i < count; i++)
    {
        const ang = rand(0, 6.28);
        const dist = rand(6, 14);                // wide scatter across most of the arena
        const startPos = target.add(vec2(Math.cos(ang), Math.sin(ang)).scale(dist));
        const life = randInt(50, 70);             // tight finish — most done by player-appear time
        const size = rand(.12, .3);              // chunky pieces
        // Mix the player's palette + rainbow flecks
        let c;
        const roll = rand();
        if (roll < .3)      c = rgb(.95, .95, .95);                 // white torso chunks
        else if (roll < .6) c = rgb(1, .25, .25);                   // red helmet chunks
        else                c = hsl(rand(0, 1), 1, .65);            // rainbow accent
        particles.push(new ConvergingParticle(startPos, target, life, size, c));
    }
}

function burst(pos, count, baseColor)
{
    for (let i=0;i<count;i++)
    {
        const v = randVec2(rand(.05,.35));
        const life = randInt(8, 22);
        const size = rand(.06, .18);
        const c = baseColor.mutate?.(.2) || baseColor;
        particles.push(new SimpleParticle(pos, v, life, size, c));
    }
}

// Tight expanding ring — used for materialization at wave start
function ringBurst(pos, color, count = 14)
{
    for (let i=0;i<count;i++)
    {
        const ang = (i / count) * Math.PI * 2 + rand(-.05, .05);
        const speed = rand(.18, .28);
        const vel = vec2(Math.cos(ang), Math.sin(ang)).scale(speed);
        const life = randInt(16, 26);
        particles.push(new SimpleParticle(pos, vel, life, rand(.1, .18), color));
    }
}

// Mini player sprite drawn in screen space — used for the LIVES HUD icons.
// Matches the in-game player look: white torso, red helmet with visor, dark legs.
function drawLifeIcon(cx, cy)
{
    const body     = rgb(.95, .95, .95);
    const head     = rgb(1, .2, .2);
    const headDark = rgb(.55, .05, .05);
    const dark     = rgb(.25, .25, .3);
    const eyes     = rgb(1, 1, 1);

    // legs
    drawRect(vec2(cx - 4, cy + 13), vec2(6, 8), dark, 0, undefined, true);
    drawRect(vec2(cx + 4, cy + 13), vec2(6, 8), dark, 0, undefined, true);
    // white torso
    drawRect(vec2(cx, cy + 3), vec2(16, 14), body, 0, undefined, true);
    // arms (small white bars at the sides)
    drawRect(vec2(cx - 10, cy + 3), vec2(4, 12), body, 0, undefined, true);
    drawRect(vec2(cx + 10, cy + 3), vec2(4, 12), body, 0, undefined, true);
    // red helmet/head
    drawRect(vec2(cx, cy - 10), vec2(20, 14), head, 0, undefined, true);
    // visor band
    drawRect(vec2(cx, cy - 10), vec2(15, 4), headDark, 0, undefined, true);
    drawRect(vec2(cx - 4, cy - 10), vec2(3, 3), eyes, 0, undefined, true);
    drawRect(vec2(cx + 4, cy - 10), vec2(3, 3), eyes, 0, undefined, true);
}

class FloatText
{
    constructor(pos, text, color)
    {
        this.pos = pos.copy(); this.text = text; this.color = color;
        this.life = 60; this.maxLife = 60;
    }
    update() { this.pos.y += .04; this.life--; }
    render()
    {
        const a = this.life / this.maxLife;
        const c = rgb(this.color.r, this.color.g, this.color.b, a);
        drawText(this.text, this.pos, .9, c, .06, rgb(0,0,0,a));
    }
}

///////////////////////////////////////////////////////////////////////////////
// projectiles

class Bullet extends EngineObject
{
    constructor(pos, vel)
    {
        super(pos, vec2(.22));
        this.vel = vel.copy();
        this.life = 60;
        this.renderOrder = 5;
        this.huePhase = rand(0, 1);
    }
    update()
    {
        this.pos = this.pos.add(this.vel);
        this.life--;
        this.huePhase = (this.huePhase + .08) % 1;
        if (this.life <= 0) this.destroy();
        if (abs(this.pos.x) > arenaHalf.x + 2 || abs(this.pos.y) > arenaHalf.y + 2) this.destroy();
    }
    render()
    {
        const angle = this.vel.angle();
        const c = hsl(this.huePhase, 1, .65);
        // outer glow streak (tall rect — angle 0 means pointing up, vel.angle() rotates correctly)
        drawRect(this.pos, vec2(.22, .8), rgb(c.r, c.g, c.b, .35), angle);
        // bright core streak
        drawRect(this.pos, vec2(.14, 2), c, angle);
        // hot white center
        drawRect(this.pos, vec2(.1, 1), rgb(1,1,1), angle);
    }
}

// Spark: arcade-faithful dumb-fire — fixed velocity at fire time, random X/Y acceleration drift,
// no homing. Speed is baked in by the Enforcer based on fire-time distance to player.
class Spark extends EngineObject
{
    constructor(pos, vel)
    {
        super(pos, vec2(.3));
        sparkCount++;
        this.vel = vel.copy();
        this.renderOrder = 5;
        this.phase = rand(0, 1);
        this.spinAngle = rand(0, 6.28);
        this.life = randInt(60, 110);
    }
    destroy()
    {
        if (this.destroyed) return;
        sparkCount--;
        super.destroy();
    }
    update()
    {
        // Arcade: random X/Y acceleration each frame causes sparks to drift unpredictably (no homing)
        this.vel = this.vel.add(vec2(rand(-.004, .004), rand(-.004, .004)));
        this.pos = this.pos.add(this.vel);
        this.phase = (this.phase + .12) % 1;
        this.spinAngle += .35;
        if (--this.life <= 0) this.destroy();
        if (abs(this.pos.x) > arenaHalf.x + 2 || abs(this.pos.y) > arenaHalf.y + 2) this.destroy();
    }
    render()
    {
        const c = hsl(this.phase, 1, .65);
        // glow halo
        drawRect(this.pos, vec2(.55), rgb(c.r, c.g, c.b, .3), this.spinAngle * .5);
        // spinning cross
        drawRect(this.pos, vec2(.55, .15), c, this.spinAngle);
        drawRect(this.pos, vec2(.15, .55), c, this.spinAngle);
        // hot core
        drawRect(this.pos, vec2(.18), rgb(1,1,1));
    }
}

class CruiseMissile extends EngineObject
{
    constructor(pos, target)
    {
        super(pos, vec2(.28));
        cruiseMissileCount++;
        this.target = target;
        this.renderOrder = 5;
        this.segments = [];
        this.huePhase = rand(0, 1);
        this.dir = this.pickDir();
        this.changeTimer = randInt(15, 35);
        this.life = randInt(300, 450);   // arcade: long-lived, bounces off walls
    }
    destroy()
    {
        if (this.destroyed) return;
        cruiseMissileCount--;
        super.destroy();
    }
    pickDir()
    {
        // Snap to one of 8 directions at 45-degree increments — biased toward target
        const tgt = (this.target && !this.target.destroyed) ? this.target : player;
        let baseAngle;
        if (tgt)
        {
            const toT = tgt.pos.subtract(this.pos);
            baseAngle = Math.atan2(toT.y, toT.x);
        }
        else
            baseAngle = rand(0, Math.PI * 2);
        // 30% chance to deviate ±45° (sometimes sideways or away)
        let snapped = Math.round(baseAngle / (Math.PI/4)) * (Math.PI/4);
        const r = rand();
        if (r < .15)      snapped += Math.PI/4;
        else if (r < .3)  snapped -= Math.PI/4;
        else if (r < .35) snapped += Math.PI;   // occasionally away from player
        return vec2(Math.cos(snapped), Math.sin(snapped));
    }
    update()
    {
        this.changeTimer--;
        if (this.changeTimer <= 0)
        {
            this.dir = this.pickDir();
            this.changeTimer = randInt(15, 35);
        }
        const speed = .14;
        this.pos = this.pos.add(this.dir.scale(speed));

        // Arcade: cruise missiles bounce/reflect off playfield boundaries
        const minX = -arenaHalf.x + .3, maxX = arenaHalf.x - .3;
        const minY = -arenaHalf.y + .3, maxY = arenaHalf.y - .3;
        if (this.pos.x < minX) { this.pos.x = minX; this.dir.x =  abs(this.dir.x); }
        if (this.pos.x > maxX) { this.pos.x = maxX; this.dir.x = -abs(this.dir.x); }
        if (this.pos.y < minY) { this.pos.y = minY; this.dir.y =  abs(this.dir.y); }
        if (this.pos.y > maxY) { this.pos.y = maxY; this.dir.y = -abs(this.dir.y); }

        this.segments.unshift(this.pos.copy());
        if (this.segments.length > 30) this.segments.pop();   // path-memory trail (half-length)
        this.huePhase = (this.huePhase + .04) % 1;

        if (--this.life <= 0) this.destroy();
    }
    render()
    {
        // bright color-shifting trail — narrower than the missile head, taper to tail
        const n = this.segments.length;
        for (let i = n - 1; i >= 0; i--)
        {
            const a = 1 - i / n;              // 1 at head, 0 at tail
            const size = .04 + .12 * a;       // max .16 — clearly thinner than .3 head
            const c = hsl((this.huePhase + i * .03) % 1, 1, .55);
            drawRect(this.segments[i], vec2(size), rgb(c.r, c.g, c.b, .35 + .55 * a));
        }
        const head = hsl(this.huePhase, 1, .65);
        drawRect(this.pos, vec2(.45), rgb(head.r, head.g, head.b, .5));
        drawRect(this.pos, vec2(.3), head);
        drawRect(this.pos, vec2(.15), rgb(1, 1, .9));
    }
}

///////////////////////////////////////////////////////////////////////////////
// electrode (deadly static)

class Electrode extends EngineObject
{
    constructor(pos)
    {
        super(pos, vec2(.95, .95));
        this.renderOrder = 2;
        this.pulse = rand(0, 6.28);
        this.shape = randInt(2);              // 0:diamond  1:triangle
        this.hue = 0; // base hue for the rainbow color-shift effect
    }
    update()
    {
        this.pulse += .12;
        this.hue = (this.hue + .02) % 1;     // cycle through the rainbow
    }
    render()
    {
        const p = .92 + Math.sin(this.pulse) * .08;   // subtle breathing, no rotation
        const r = .55 * p;
        const dark  = hsl(this.hue, 1, .45);
        const light = hsl(this.hue, 1, .75);

        if (this.shape === 0)
        {
            // diamond — rotated square, fixed orientation
            drawRect(this.pos, vec2(r * 1.4), dark,  PI/4);
            drawRect(this.pos, vec2(r * 1.0), light, PI/4);
        }
        else
        {
            // triangle — fixed point-up
            const poly = (radius, color) => {
                const pts = [];
                for (let i = 0; i < 3; i++)
                {
                    const a = PI/2 + i * (2 * PI / 3);
                    pts.push(vec2(Math.cos(a) * radius, Math.sin(a) * radius));
                }
                drawPoly(pts, color, 0, undefined, this.pos);
            };
            poly(r * 1.05, dark);
            poly(r * 0.7,  light);
        }
        // bright core
        drawRect(this.pos, vec2(.22 * p), rgb(1,1,1));
    }
}

///////////////////////////////////////////////////////////////////////////////
// killable enemy base (shared takeHit / electrode death)

class KillableEnemy extends EngineObject
{
    constructor(pos, size, hp, scoreValue, hitColor)
    {
        super(pos, size);
        this.hp = hp;
        this.flash = 0;
        this.killable = true;
        this.renderOrder = 4;
        this.scoreValue = scoreValue;
        this.hitColor = hitColor;
    }
    takeHit(dmg, hitDir)
    {
        this.hp -= dmg;
        this.flash = 6;
        this.pos = clampToArena(this.pos.add(hitDir.scale(.2)), this.size.x*.5);
        if (this.hp <= 0)
        {
            this.destroy();
            score += this.scoreValue;
            burst(this.pos, 18, this.hitColor);
            sfxPop.play(this.pos);
            floaters.push(new FloatText(this.pos, `${this.scoreValue}`, this.hitColor));
        }
        else
        {
            burst(this.pos, 6, this.hitColor);
            sfxHit.play(this.pos);
        }
    }
    killedByElectrode()
    {
        this.destroy();
        score += scoreElectrodeKill;
        burst(this.pos, 16, this.hitColor);
        sfxHit.play(this.pos);
    }
}

// enemies

// Grunt: red humanoid, marches toward player in pulses, speeds up over wave
class Grunt extends KillableEnemy
{
    constructor(pos, baseSpeed, hp)
    {
        super(pos, vec2(.9), hp, scoreGrunt, rgb(1,.4,.4));
        this.baseSpeed = baseSpeed;
        this.marchPhase = rand(0, 6.28);
        this.marchStep = 0;
        // Used only in attract mode (no player to chase)
        this.wanderDir = randVec2(1);
        this.wanderTimer = randInt(30, 90);
    }
    destroy()
    {
        if (this.destroyed) return;
        // Arcade: each grunt kill decrements ROBSPD by 1 (clamped at RMXSPD) — survivors get faster
        if (isPlaying) gruntsKilledThisWave++;
        super.destroy();
    }
    getSpeed()
    {
        // True arcade model: effective ROBSPD shrinks by one per grunt killed this wave,
        // clamped at RMXSPD (the per-wave speed ceiling). Speed factor = baseline / effective.
        // Wave 1: ROBSPD=20→RMXSPD=9  (max ~2.2× faster after enough kills)
        // Wave 8: ROBSPD=15→RMXSPD=4  (max ~5× faster — late waves get scary fast)
        const tu = getWaveTuning(gameWave);
        const effDelay = max(tu.gruntDelayMin, tu.gruntDelay - gruntsKilledThisWave);
        const waveMul = 20 / effDelay;
        return this.baseSpeed * waveMul;
    }
    update()
    {
        if (gameOver) return;
        if (isPlaying && (playerControlLocked || !player)) return;
        this.marchPhase += .25;
        if (Math.sin(this.marchPhase) > -.2)
        {
            let dir;
            if (player)
            {
                const toP = player.pos.subtract(this.pos);
                const d = toP.length();
                dir = d > .001 ? toP.scale(1/d) : vec2(0,1);
            }
            else
            {
                // Attract mode: wander randomly
                this.wanderTimer--;
                if (this.wanderTimer <= 0)
                {
                    this.wanderDir = randVec2(1);
                    this.wanderTimer = randInt(30, 90);
                }
                dir = this.wanderDir;
            }
            this.pos = this.pos.add(dir.scale(this.getSpeed()));
            this.pos = clampToArena(this.pos, .45);
            this.marchStep += this.getSpeed();
        }
        if (this.flash > 0) this.flash--;
    }
    render()
    {
        const c = this.flash ? rgb(1,1,1) : rgb(.95,.25,.25);
        const dark = rgb(.5, .08, .08);
        const bob = (Math.floor(this.marchStep * 4) % 2) ? .04 : -.04;
        drawRect(this.pos.add(vec2(0,-.55)), vec2(.7, .14), rgb(0,0,0,.35));
        drawRect(this.pos.add(vec2(-.18, -.42 + bob)), vec2(.22, .28), dark);
        drawRect(this.pos.add(vec2( .18, -.42 - bob)), vec2(.22, .28), dark);
        drawRect(this.pos.add(vec2(0, -.05)), vec2(.6, .55), c);
        drawRect(this.pos.add(vec2(-.42,  bob)), vec2(.18, .4), c);
        drawRect(this.pos.add(vec2( .42, -bob)), vec2(.18, .4), c);
        drawRect(this.pos.add(vec2(0, .35)), vec2(.4, .38), c);
        drawRect(this.pos.add(vec2(-.1, .38)), vec2(.08, .1), rgb(1,1,.2));
        drawRect(this.pos.add(vec2( .1, .38)), vec2(.08, .1), rgb(1,1,.2));
    }
}

// Hulk: indestructible. Arcade target-homing per RRH11.ASM HULKND — picks a target on spawn
// (round-robin through humans, falls back to player), then every 1-32 frames picks a new cardinal
// axis (alternating X and Y based on previous direction) and steps toward target.axis + noise.
class Hulk extends EngineObject
{
    constructor(pos, speed)
    {
        super(pos, vec2(1.4, 1.5));
        this.killable = false;
        this.renderOrder = 4;
        this.speed = speed;
        this.marchDir = vec2(Math.sign(rand(-1,1)) || 1, 0);
        this.marchTimer = randInt(1, 33);
        this.knockback = vec2(0);
        this.walkPhase = 0;
        this.target = this.pickTarget();    // assigned at spawn (GTARG round-robin)
        this.lastAxis = rand() < .5 ? 'x' : 'y';
    }
    pickTarget()
    {
        // Arcade GTARG (RRH11.ASM): rotating cursor walks through HTAB, grabs next live human.
        // No "closest" calculation — pure round-robin assignment.
        const live = humans.filter(h => !h.destroyed);
        if (live.length === 0) return null;
        const t = live[hulkTargetCursor % live.length];
        hulkTargetCursor++;
        return t;
    }
    pickMarchDir()
    {
        // Refresh target if the assigned human died. Falls back to player (PLOBJ in arcade).
        if (this.target && this.target.destroyed) this.target = this.pickTarget();
        const tgt = this.target || (isPlaying ? player : null);
        if (!tgt) { this.marchDir = vec2(0); return; }

        // Alternate X/Y axis (arcade HNDY/HNDX path). Noise ±2 world units ≈ arcade ±16 px.
        this.lastAxis = this.lastAxis === 'x' ? 'y' : 'x';
        const noise = rand(-2, 2);
        if (this.lastAxis === 'x')
        {
            const targetX = tgt.pos.x + noise;
            this.marchDir = vec2(targetX > this.pos.x ? 1 : -1, 0);
        }
        else
        {
            const targetY = tgt.pos.y + noise;
            this.marchDir = vec2(0, targetY > this.pos.y ? 1 : -1);
        }
    }
    push(dir)
    {
        this.knockback = this.knockback.add(dir.scale(.18));
        if (this.marchTimer > 6) this.marchTimer = 6;
    }
    update()
    {
        if (gameOver) return;
        if (isPlaying && playerControlLocked) return;
        this.marchTimer--;
        if (this.marchTimer <= 0)
        {
            this.pickMarchDir();
            this.marchTimer = randInt(1, 33);    // arcade LSEED & $1F + 1
        }
        this.pos = this.pos.add(this.knockback);
        this.knockback = this.knockback.scale(.82);
        // HLKSPD scaling: wave 1 (HLKSPD=8) → 1.0×, late waves (HLKSPD=5) → 1.6×
        const hMul = isPlaying ? (8 / getWaveTuning(gameWave).hulkDelay) : 1;
        this.pos = this.pos.add(this.marchDir.scale(this.speed * hMul));
        this.pos = clampToArena(this.pos, .75);
        this.walkPhase += this.speed * 4;
    }
    render()
    {
        const bob = (Math.floor(this.walkPhase) % 2) ? .05 : -.05;
        const body = rgb(.35, .55, .35), skin = rgb(.55, .75, .45), dark = rgb(.18, .3, .18);
        drawRect(this.pos.add(vec2(0,-.7)), vec2(1.1, .14), rgb(0,0,0,.4));
        drawRect(this.pos.add(vec2(-.35, -.55 + bob)), vec2(.35, .4), dark);
        drawRect(this.pos.add(vec2( .35, -.55 - bob)), vec2(.35, .4), dark);
        drawRect(this.pos.add(vec2(0, -.05)), vec2(1.1, .8), body);
        drawRect(this.pos.add(vec2(0, -.05)), vec2(.55, .35), skin);
        drawRect(this.pos.add(vec2(-.62,  bob*1.5)), vec2(.28, .55), body);
        drawRect(this.pos.add(vec2( .62, -bob*1.5)), vec2(.28, .55), body);
        drawRect(this.pos.add(vec2(0, .55)), vec2(.55, .45), body);
        drawRect(this.pos.add(vec2(-.13, .58)), vec2(.13, .1), rgb(1, .15, .15));
        drawRect(this.pos.add(vec2( .13, .58)), vec2(.13, .1), rgb(1, .15, .15));
    }
}

// Brain: hunts humans and reprograms them into Progs; shoots cruise missiles at player
class Brain extends KillableEnemy
{
    constructor(pos)
    {
        super(pos, vec2(1.1, 1.4), 1, scoreBrain, rgb(.4, 1, .4));
        this.shootTimer = randInt(120, 240);
        this.walkPhase = 0;
        this.brainPulse = rand(0, 6.28);
        this.possessing = null;     // human being reprogrammed
        this.possessTimer = 0;      // frames remaining in the grab
    }
    findHuman()
    {
        // Arcade GETHTG (RRB10.ASM): pure Manhattan distance (|dx|+|dy|),
        // comment in source literally says "SUM OF ABS VALUES DX,DY"
        let best = null, bestDist = Infinity;
        for (const h of humans)
        {
            // skip humans already being possessed by another brain
            if (h.destroyed || h.possessedBy) continue;
            const d = abs(h.pos.x - this.pos.x) + abs(h.pos.y - this.pos.y);
            if (d < bestDist) { bestDist = d; best = h; }
        }
        return best;
    }
    update()
    {
        if (gameOver || playerControlLocked || !player) return;
        // BRNSPD scaling: wave 1 (BRNSPD=8) → 1.0×, late waves (BRNSPD=6) → 1.33×
        const brnMul = 8 / getWaveTuning(gameWave).brainDelay;
        const speed = (.045 + min(.02, gameWave * .001)) * brnMul;

        // POSSESSION: locked onto a human, hover above them while reprogramming
        if (this.possessing && !this.possessing.destroyed)
        {
            this.pos = this.possessing.pos.add(vec2(0, .9));
            this.pos = clampToArena(this.pos, .5);
            this.possessTimer--;
            // sparkle particles arcing between brain and human
            if (this.possessTimer % 3 === 0)
                particles.push(new SimpleParticle(
                    this.possessing.pos.add(vec2(rand(-.2,.2), rand(-.2,.5))),
                    randVec2(rand(.02, .08)), randInt(8, 18), rand(.08, .14),
                    rgb(1, rand(.3, .7), 1)));
            if (this.possessTimer <= 0)
            {
                // reprogram complete: spawn Prog, destroy human
                enemies.push(new Prog(this.possessing.pos.copy(), this.possessing.type));
                burst(this.possessing.pos, 30, rgb(1, .3, .9));
                sfxReprogram.play(this.possessing.pos);
                triggerShake(.1, 12);   // brain conversion punch
                this.possessing.destroy();
                this.possessing = null;
            }
            this.walkPhase += speed * 2;
            this.brainPulse += .25;
            if (this.flash > 0) this.flash--;
            return;
        }
        // possessing target was rescued / killed before we finished — release
        if (this.possessing && this.possessing.destroyed)
        {
            this.possessing = null;
            this.possessTimer = 0;
        }

        const target = this.findHuman();
        if (target)
        {
            const dir = target.pos.subtract(this.pos).normalize(1);
            this.pos = this.pos.add(dir.scale(speed));
            if (isOverlapping(this.pos, this.size, target.pos, target.size))
            {
                // begin possession — 120-frame hold (~2 sec at 60fps)
                this.possessing = target;
                this.possessTimer = 120;
                target.possessedBy = this;
                sfxHit.play(target.pos);
            }
            // Brains also lob the occasional cruise missile at the player even while hunting humans
            this.shootTimer--;
            if (this.shootTimer <= 0 && cruiseMissileCount < MAX_CRUISE_MISSILES && player)
            {
                enemyBullets.push(new CruiseMissile(this.pos.copy(), player));
                const t = getWaveTuning(gameWave);
                this.shootTimer = randInt(t.brainShootTime, t.brainShootTime * 2);
                sfxMissile.play(this.pos);
            }
        }
        else
        {
            // no humans left in arena — close on player and shoot cruise missiles
            const toP = player.pos.subtract(this.pos);
            const d = toP.length();
            if (d > 5)
                this.pos = this.pos.add(toP.scale(speed * .8 / d));
            this.shootTimer--;
            if (this.shootTimer <= 0 && cruiseMissileCount < MAX_CRUISE_MISSILES)
            {
                enemyBullets.push(new CruiseMissile(this.pos.copy(), player));
                const t = getWaveTuning(gameWave);
                this.shootTimer = randInt(t.brainShootTime, t.brainShootTime * 2);
                sfxMissile.play(this.pos);
            }
        }
        this.pos = clampToArena(this.pos, .5);
        this.walkPhase += speed * 5;
        this.brainPulse += .12;
        if (this.flash > 0) this.flash--;
    }
    render()
    {
        const c = this.flash ? rgb(1,1,1) : rgb(.35, .5, 1);    // blue body (matches FAQ)
        const dark = rgb(.1, .2, .55);
        const brainPink = rgb(1, .55, .75);
        const brainWrinkle = rgb(.7, .15, .35);
        const bob = Math.sin(this.walkPhase) * .04;
        const pulse = 1 + Math.sin(this.brainPulse) * .04;

        // shadow
        drawRect(this.pos.add(vec2(0,-.85)), vec2(.6, .14), rgb(0,0,0,.4));
        // tiny legs (intentionally undersized — most of the body mass is the brain)
        drawRect(this.pos.add(vec2(-.13, -.62 + bob*.4)), vec2(.16, .25), dark);
        drawRect(this.pos.add(vec2( .13, -.62 - bob*.4)), vec2(.16, .25), dark);
        // small green robot torso
        drawRect(this.pos.add(vec2(0, -.32)), vec2(.45, .4), c);
        // little arms
        drawRect(this.pos.add(vec2(-.32, -.3)), vec2(.13, .32), c);
        drawRect(this.pos.add(vec2( .32, -.3)), vec2(.13, .32), c);
        // angry eyes (under the brain)
        drawRect(this.pos.add(vec2(-.16, -.05)), vec2(.13, .14), rgb(0,0,0));
        drawRect(this.pos.add(vec2( .16, -.05)), vec2(.13, .14), rgb(0,0,0));
        drawRect(this.pos.add(vec2(-.16, -.04)), vec2(.07, .07), rgb(1, .15, .15));
        drawRect(this.pos.add(vec2( .16, -.04)), vec2(.07, .07), rgb(1, .15, .15));
        // GIANT exposed pink brain dome — the iconic identifying feature
        drawRect(this.pos.add(vec2(0, .42 + bob*.5)), vec2(1.15 * pulse, .8 * pulse), brainPink);
        // brain wrinkles (darker pink bands)
        drawRect(this.pos.add(vec2(0, .65 + bob*.5)), vec2(.95 * pulse, .08), brainWrinkle);
        drawRect(this.pos.add(vec2(0, .42 + bob*.5)), vec2(1.05 * pulse, .06), brainWrinkle);
        drawRect(this.pos.add(vec2(0, .2 + bob*.5)), vec2(.85 * pulse, .06), brainWrinkle);
        // hemisphere divide line
        drawRect(this.pos.add(vec2(0, .42 + bob*.5)), vec2(.07, .78 * pulse), brainWrinkle);
        // tiny highlight on brain
        drawRect(this.pos.add(vec2(-.25, .58 + bob*.5)), vec2(.15, .15), rgb(1, .8, .9, .7));
    }
}

// Prog: reprogrammed family — moves in CARDINAL (90°) steps with a bright color-cycling trail
class Prog extends KillableEnemy
{
    constructor(pos, humanType)
    {
        super(pos, vec2(.55, .9), 1, scoreProg, rgb(1, .2, .85));
        this.humanType = humanType;
        this.walkPhase = rand(0, 6.28);
        this.trailTimer = 0;
        this.eyePulse = rand(0, 6.28);
        this.dir = this.pickCardinalDir();
        this.changeTimer = randInt(20, 50);
        this.huePhase = rand(0, 1);
    }
    pickCardinalDir()
    {
        if (!player) return vec2(1, 0);
        // 85% chance to head roughly toward player on a cardinal axis;
        // 15% chance to pick a random cardinal direction (still wanders a little)
        if (rand() < .85)
        {
            const toP = player.pos.subtract(this.pos);
            if (abs(toP.x) > abs(toP.y))
                return vec2(Math.sign(toP.x) || 1, 0);
            else
                return vec2(0, Math.sign(toP.y) || 1);
        }
        // random cardinal
        const i = randInt(4);
        return [vec2(1,0), vec2(-1,0), vec2(0,1), vec2(0,-1)][i];
    }
    update()
    {
        if (gameOver || playerControlLocked || !player) return;
        const speed = .10 + min(.03, gameWave * .002);

        this.changeTimer--;
        if (this.changeTimer <= 0)
        {
            this.dir = this.pickCardinalDir();
            this.changeTimer = randInt(20, 50);
        }
        const finalDir = this.dir;

        this.pos = this.pos.add(finalDir.scale(speed));
        this.pos = clampToArena(this.pos, .4);
        this.walkPhase += speed * 16;
        this.eyePulse += .3;
        this.huePhase = (this.huePhase + .06) % 1;

        // bright color-cycling trail — clear "danger" indicator
        this.trailTimer++;
        if (this.trailTimer >= 1)
        {
            this.trailTimer = 0;
            const trailVel = finalDir.scale(-.025).add(vec2(rand(-.02, .02), rand(-.02, .02)));
            const c = hsl((this.huePhase + rand(-.1, .1)) % 1, 1, .65);
            particles.push(new SimpleParticle(
                this.pos.add(vec2(rand(-.12, .12), rand(-.18, .18))),
                trailVel,
                randInt(14, 26),
                rand(.14, .24),
                c));
        }

        if (this.flash > 0) this.flash--;
    }
    render()
    {
        const bob = Math.sin(this.walkPhase) * .12;
        const armSwing = Math.sin(this.walkPhase * .8) * .18;
        // Constant white/color flicker so they read as DANGEROUS at a glance
        const flicker = ((frame >> 2) & 1) === 0;
        const baseC = flicker ? rgb(1, 1, 1) : hsl(this.huePhase, 1, .65);
        const c = this.flash ? rgb(1,1,1) : baseC;
        const dark = rgb(.55, .05, .45);
        const skin = flicker ? rgb(1, 1, 1) : hsl((this.huePhase + .15) % 1, .85, .55);
        const eyeGlow = (Math.sin(this.eyePulse) * .5 + .5) * .5 + .5;

        drawRect(this.pos.add(vec2(0,-.5)), vec2(.5, .1), rgb(0,0,0,.45));
        // running legs (more dramatic swing)
        drawRect(this.pos.add(vec2(-.13, -.35 + bob)), vec2(.15, .3), dark);
        drawRect(this.pos.add(vec2( .13, -.35 - bob)), vec2(.15, .3), dark);
        // body
        drawRect(this.pos.add(vec2(0, -.02)), vec2(.46, .46), c);
        // outstretched arms (mid-grab pose)
        drawRect(this.pos.add(vec2(-.38, .15 + armSwing*.3)), vec2(.17, .4), c);
        drawRect(this.pos.add(vec2( .38, .15 - armSwing*.3)), vec2(.17, .4), c);
        // mutated head — bigger and twisted
        drawRect(this.pos.add(vec2(0, .35)), vec2(.34, .34), skin);
        // hair tuft (matches color of original family but darkened/wild)
        drawRect(this.pos.add(vec2(0, .51)), vec2(.36, .1), dark);
        // huge glowing yellow eyes (the key tell — humans have tiny black eyes, progs have glowing yellow)
        drawRect(this.pos.add(vec2(-.09, .36)), vec2(.13, .14), rgb(0,0,0));
        drawRect(this.pos.add(vec2( .09, .36)), vec2(.13, .14), rgb(0,0,0));
        drawRect(this.pos.add(vec2(-.09, .37)), vec2(.10, .10), rgb(1, eyeGlow, .1));
        drawRect(this.pos.add(vec2( .09, .37)), vec2(.10, .10), rgb(1, eyeGlow, .1));
        // snarling mouth
        drawRect(this.pos.add(vec2(0, .23)), vec2(.2, .05), rgb(.4, 0, .25));
    }
}

// Spheroid: red pulsating orb that patrols the arena perimeter. Spawns Enforcers fast on entry.
// Spheroids ignore electrodes (they float at the edge anyway).
class Spheroid extends KillableEnemy
{
    constructor(pos)
    {
        super(pos, vec2(1.3), 1, scoreSpheroid, rgb(1, .3, .3));
        // Arcade: spheroids drift around with random X/Y acceleration, bouncing off walls
        this.vel = randVec2(rand(.05, .15));
        this.accelTimer = randInt(1, 16);
        this.spawnTimer = randInt(25, 70);   // first enforcer drops almost immediately
        this.phase = rand(0, 6.28);
        // Arcade: ceil(rand(1..ENFNUM)/2) — ENFNUM=10 → 1–5 enforcers, ENFNUM=11 → 1–6
        const ENFNUM = getWaveTuning(gameWave).enforcerDropCount;
        this.spawnsRemaining = Math.ceil(randInt(1, ENFNUM + 1) / 2);
        this.fleeing = false;                // CIRC3 escape phase
    }
    update()
    {
        if (gameOver || playerControlLocked) return;

        // Arcade CIRC3 escape phase: constant horizontal velocity, no drops, despawn at X edge
        if (this.fleeing)
        {
            this.pos = this.pos.add(this.vel);
            this.phase += .18;
            if (this.flash > 0) this.flash--;
            const exitX = arenaHalf.x - arenaPadding + .5;
            if (this.pos.x > exitX || this.pos.x < -exitX) this.destroy();
            return;
        }

        // Random X/Y acceleration kicks every 1-15 frames (arcade)
        this.accelTimer--;
        if (this.accelTimer <= 0)
        {
            this.accelTimer = randInt(1, 16);
            // Y kicks are larger than X (arcade: X ±16, Y ±32 in fixed-point)
            this.vel = this.vel.add(vec2(rand(-.06, .06), rand(-.10, .10)));
        }
        // Light damping
        this.vel = this.vel.scale(.98);
        // Cap top speed (arcade clamps X around ±256, Y around ±512 in 16-bit)
        const maxVX = .20, maxVY = .28;
        this.vel.x = clamp(this.vel.x, -maxVX, maxVX);
        this.vel.y = clamp(this.vel.y, -maxVY, maxVY);

        this.pos = this.pos.add(this.vel);

        // Bounce off arena edges
        const inset = .9;
        const maxX = arenaHalf.x - arenaPadding - inset;
        const maxY = arenaHalf.y - arenaPadding - inset;
        if (this.pos.x >  maxX) { this.pos.x =  maxX; this.vel.x = -abs(this.vel.x); }
        if (this.pos.x < -maxX) { this.pos.x = -maxX; this.vel.x =  abs(this.vel.x); }
        if (this.pos.y >  maxY) { this.pos.y =  maxY; this.vel.y = -abs(this.vel.y); }
        if (this.pos.y < -maxY) { this.pos.y = -maxY; this.vel.y =  abs(this.vel.y); }

        this.spawnTimer--;
        if (this.spawnTimer <= 0)
        {
            // Arcade: spheroids refuse to drop when global enforcer cap is hit — they wait instead
            if (enforcerCount < MAX_ENFORCERS)
            {
                enemies.push(new Enforcer(this.pos.copy()));
                burst(this.pos, 22, rgb(1, .4, .4));
                sfxSpawn.play(this.pos);
                const t = getWaveTuning(gameWave);
                this.spawnTimer = randInt(t.spheroidDropTime, t.spheroidDropTime * 3);
                // Arcade CIRC3: after quota, enter escape phase — horizontal flee until off-screen
                if (--this.spawnsRemaining <= 0)
                {
                    this.fleeing = true;
                    this.vel = vec2(rand() < .5 ? -.18 : .18, 0);
                }
            }
            else
                this.spawnTimer = 30;   // try again shortly
        }
        this.phase += .18;
        if (this.flash > 0) this.flash--;
    }
    render()
    {
        const pulse = 1 + Math.sin(this.phase) * .25;
        const c = this.flash ? rgb(1,1,1) : rgb(1, .25 + Math.sin(this.phase)*.15, .25);
        const inner = rgb(1, .7, .7);
        // pulsing red halo
        drawRect(this.pos, vec2(1.6 * pulse), rgb(1, .2, .2, .25), this.phase * .3);
        drawRect(this.pos, vec2(1.3 * pulse), c, this.phase * .4);
        drawRect(this.pos, vec2(.85), inner, -this.phase * .5);
        drawRect(this.pos, vec2(.5), rgb(1, .95, .85));
        drawRect(this.pos, vec2(.22), rgb(1,1,1));
    }
}

// Enforcer: fast blue/yellow Robby-the-Robot. Keeps distance from player, fires spinning sparks.
class Enforcer extends KillableEnemy
{
    constructor(pos)
    {
        super(pos, vec2(.9, 1.1), 1, scoreEnforcer, rgb(.4, .6, 1));
        enforcerCount++;
        this.vel = randVec2(.05);
        this.velTimer = randInt(1, 32);
        this.shootTimer = randInt(50, 100);
        this.walkPhase = rand(0, 6.28);
        this.growTimer = 40;          // arcade: 5 grow frames × NAP 8 ticks each ≈ 40 frames
    }
    destroy()
    {
        if (this.destroyed) return;
        enforcerCount--;
        super.destroy();
    }
    update()
    {
        if (gameOver || playerControlLocked || !player) return;

        // Grow phase: hold position, don't move, don't shoot until fully materialized
        if (this.growTimer > 0) { this.growTimer--; if (this.flash > 0) this.flash--; return; }

        // Arcade: every 0–31 frames, pick a new velocity aimed near (offset) player position
        this.velTimer--;
        if (this.velTimer <= 0)
        {
            const offsetPos = player.pos.add(vec2(rand(-3, 3), rand(-3, 3)));
            const dir = offsetPos.subtract(this.pos);
            const m = dir.length();
            if (m > .001)
            {
                const speed = .09 + min(.05, gameWave * .003);
                this.vel = dir.scale(speed / m);
            }
            this.velTimer = randInt(1, 32);
        }

        this.pos = this.pos.add(this.vel);
        this.pos = clampToArena(this.pos, .5);
        this.walkPhase += .12;

        // Shoot dumb-fire spark — speed baked in by fire-time distance, no homing
        const toP = player.pos.subtract(this.pos);
        const d = toP.length();
        this.shootTimer--;
        if (this.shootTimer <= 0 && sparkCount < MAX_SPARKS && d < 22)
        {
            // Aim at a slightly offset player position (arcade adds noise to aim)
            const offsetPos = player.pos.add(vec2(rand(-1.5, 1.5), rand(-1.5, 1.5)));
            const fireDir = offsetPos.subtract(this.pos);
            const fd = fireDir.length();
            if (fd > .001)
            {
                // Farther away → faster spark (baked in at fire time)
                const speed = clamp(.08 + d * .015, .08, .35);
                enemyBullets.push(new Spark(this.pos.copy(), fireDir.scale(speed / fd)));
                const t = getWaveTuning(gameWave);
                this.shootTimer = randInt(t.sparkTime, t.sparkTime * 2);
                sfxSpark.play(this.pos);
            }
        }

        if (this.flash > 0) this.flash--;
    }
    render()
    {
        // Grow phase: scale up from a small core to full size with sparkle
        if (this.growTimer > 0)
        {
            const t = 1 - this.growTimer / 40;          // 0 → 1
            const s = .25 + t * .9;
            const a = .4 + t * .6;
            drawRect(this.pos, vec2(.85 * s), rgb(.4, .6, 1, a * .35));
            drawRect(this.pos, vec2(.55 * s), rgb(.6, .8, 1, a));
            drawRect(this.pos, vec2(.22 * s), rgb(1, 1, 1, a));
            return;
        }
        const c = this.flash ? rgb(1,1,1) : rgb(.4, .6, 1);
        const dark = rgb(.1, .25, .55);
        const yellow = rgb(1, .85, .25);
        const trackBob = (Math.floor(this.walkPhase * 4) % 2) ? .03 : -.03;

        // shadow
        drawRect(this.pos.add(vec2(0, -.65)), vec2(.8, .12), rgb(0,0,0,.4));
        // tank treads under it
        drawRect(this.pos.add(vec2(0, -.45)), vec2(.95, .25), dark);
        drawRect(this.pos.add(vec2(-.3, -.45 + trackBob)), vec2(.18, .12), rgb(.3, .4, .65));
        drawRect(this.pos.add(vec2( .3, -.45 - trackBob)), vec2(.18, .12), rgb(.3, .4, .65));
        // body (boxy robby torso)
        drawRect(this.pos.add(vec2(0, -.1)), vec2(.75, .55), c);
        // yellow chest panel
        drawRect(this.pos.add(vec2(0, -.1)), vec2(.4, .35), yellow);
        // arms (yellow)
        drawRect(this.pos.add(vec2(-.45, -.05)), vec2(.18, .35), yellow);
        drawRect(this.pos.add(vec2( .45, -.05)), vec2(.18, .35), yellow);
        // rounded dome head
        drawRect(this.pos.add(vec2(0, .35)), vec2(.55, .4), c);
        // visor / eye band
        drawRect(this.pos.add(vec2(0, .35)), vec2(.5, .1), rgb(.1, .1, .15));
        drawRect(this.pos.add(vec2(0, .35)), vec2(.4, .06), rgb(1, .3, .3));
        // antenna
        drawRect(this.pos.add(vec2(0, .65)), vec2(.06, .18), dark);
        drawRect(this.pos.add(vec2(0, .76)), vec2(.14), yellow);
    }
}

// TankShell: bouncing projectile fired by Tank. Bounces off arena walls twice before dying.
class TankShell extends EngineObject
{
    constructor(pos, vel)
    {
        super(pos, vec2(.4));
        shellCount++;
        this.vel = vel.copy();
        this.renderOrder = 5;
        this.bouncesLeft = 2;
        this.phase = 0;
        this.life = randInt(120, 200);   // arcade: ~48–79 ticks, scaled up for larger arena
    }
    destroy()
    {
        if (this.destroyed) return;
        shellCount--;
        super.destroy();
    }
    update()
    {
        this.pos = this.pos.add(this.vel);
        this.phase += .15;
        if (--this.life <= 0) { this.destroy(); return; }
        const minX = -arenaHalf.x + arenaPadding + .2;
        const maxX =  arenaHalf.x - arenaPadding - .2;
        const minY = -arenaHalf.y + arenaPadding + .2;
        const maxY =  arenaHalf.y - arenaPadding - .2;
        let bounced = false;
        if (this.pos.x < minX) { this.pos.x = minX; this.vel.x =  abs(this.vel.x); bounced = true; }
        if (this.pos.x > maxX) { this.pos.x = maxX; this.vel.x = -abs(this.vel.x); bounced = true; }
        if (this.pos.y < minY) { this.pos.y = minY; this.vel.y =  abs(this.vel.y); bounced = true; }
        if (this.pos.y > maxY) { this.pos.y = maxY; this.vel.y = -abs(this.vel.y); bounced = true; }
        if (bounced)
        {
            if (--this.bouncesLeft < 0) { this.destroy(); return; }
            sfxHit.play(this.pos);
            burst(this.pos, 6, rgb(1, .5, .2));
            triggerShake(.06, 6);   // tiny shake on shell bounce
        }
    }
    render()
    {
        const glow = .85 + Math.sin(this.phase) * .15;
        drawRect(this.pos, vec2(.6 * glow), rgb(1, .3, .1, .4));
        drawRect(this.pos, vec2(.4), rgb(1, .5, .2));
        drawRect(this.pos, vec2(.22), rgb(1, 1, .6));
    }
}

// Tank: slow red+blue treaded vehicle. Aims turret at player, fires bouncing shells.
class Tank extends KillableEnemy
{
    constructor(pos)
    {
        super(pos, vec2(1.7, 1.5), 1, scoreTank, rgb(1, .25, .3));
        tankCount++;
        this.vel = randVec2(.04);
        this.shootTimer = randInt(80, 160);
        this.turnTimer = randInt(40, 100);
        this.turretAngle = 0;
        this.growTimer = 40;     // arcade: ~3 mini-tank frames × NAP 12 ticks ≈ 36–48 frames
    }
    destroy()
    {
        if (this.destroyed) return;
        tankCount--;
        super.destroy();
    }
    update()
    {
        if (gameOver || playerControlLocked) return;
        // Grow phase: hold position, don't move, don't shoot until full-size
        if (this.growTimer > 0) { this.growTimer--; if (this.flash > 0) this.flash--; return; }
        this.turnTimer--;
        if (this.turnTimer <= 0)
        {
            // Arcade: tank direction sometimes seeks player (~40%), sometimes random
            if (player && rand() < .4)
            {
                const toP = player.pos.subtract(this.pos);
                const m = toP.length();
                this.vel = m > .001 ? toP.scale(.045 / m) : randVec2(.045);
            }
            else
                this.vel = randVec2(.045);
            this.turnTimer = randInt(60, 140);
        }
        this.pos = this.pos.add(this.vel);
        const minX = -arenaHalf.x + arenaPadding + .85;
        const maxX =  arenaHalf.x - arenaPadding - .85;
        const minY = -arenaHalf.y + arenaPadding + .75;
        const maxY =  arenaHalf.y - arenaPadding - .75;
        if (this.pos.x < minX) { this.pos.x = minX; this.vel.x =  abs(this.vel.x); }
        if (this.pos.x > maxX) { this.pos.x = maxX; this.vel.x = -abs(this.vel.x); }
        if (this.pos.y < minY) { this.pos.y = minY; this.vel.y =  abs(this.vel.y); }
        if (this.pos.y > maxY) { this.pos.y = maxY; this.vel.y = -abs(this.vel.y); }

        if (player)
        {
            const toP = player.pos.subtract(this.pos);
            if (toP.lengthSquared() > .001) this.turretAngle = toP.angle();
            this.shootTimer--;
            if (this.shootTimer <= 0 && shellCount < MAX_SHELLS && toP.length() < 24)
            {
                const dir = vec2(Math.sin(this.turretAngle), Math.cos(this.turretAngle));
                enemyBullets.push(new TankShell(this.pos.add(dir.scale(.9)), dir.scale(.16)));
                sfxMissile.play(this.pos);
                const t = getWaveTuning(gameWave);
                this.shootTimer = randInt(t.tankShootTime, t.tankShootTime * 2);
            }
        }
        if (this.flash > 0) this.flash--;
    }
    render()
    {
        // Mini-tank grow phase: scale up from small treaded blob
        if (this.growTimer > 0)
        {
            const t = 1 - this.growTimer / 40;          // 0 → 1
            const s = .3 + t * .9;
            const a = .4 + t * .6;
            drawRect(this.pos, vec2(1.7 * s, 1.5 * s), rgb(.95, .22, .28, a * .35));
            drawRect(this.pos, vec2(1.1 * s, .9 * s),  rgb(1, .4, .4, a));
            drawRect(this.pos, vec2(.5 * s),           rgb(1, 1, .6, a));
            return;
        }
        const c = this.flash ? rgb(1,1,1) : rgb(.95, .22, .28);    // red body
        const dark = rgb(.35, .05, .08);
        const blue = rgb(.3, .55, 1);
        const blueDark = rgb(.1, .25, .65);
        const trackBob = (Math.floor((this.pos.x + this.pos.y) * 4) % 2) ? .03 : -.03;

        // shadow
        drawRect(this.pos.add(vec2(0, -.85)), vec2(1.8, .16), rgb(0,0,0,.4));
        // treads (top + bottom strips along the body axis)
        drawRect(this.pos.add(vec2(0,  .65)), vec2(1.7, .32), dark);
        drawRect(this.pos.add(vec2(0, -.65)), vec2(1.7, .32), dark);
        // tread wheels (animated bob)
        drawRect(this.pos.add(vec2(-.5,  .65 + trackBob)), vec2(.25, .18), blueDark);
        drawRect(this.pos.add(vec2( .5,  .65 - trackBob)), vec2(.25, .18), blueDark);
        drawRect(this.pos.add(vec2(-.5, -.65 - trackBob)), vec2(.25, .18), blueDark);
        drawRect(this.pos.add(vec2( .5, -.65 + trackBob)), vec2(.25, .18), blueDark);
        // red main body
        drawRect(this.pos, vec2(1.55, 1.0), c);
        // blue side stripe
        drawRect(this.pos, vec2(1.55, .2), blue);
        // turret base (blue)
        drawRect(this.pos, vec2(.85, .85), blueDark);
        drawRect(this.pos, vec2(.7, .7), blue);
        // barrel (rotated toward player)
        const ta = this.turretAngle;
        const tipOffset = vec2(Math.sin(ta), Math.cos(ta));
        drawRect(this.pos.add(tipOffset.scale(.55)), vec2(.22, .9), dark, ta);
        drawRect(this.pos.add(tipOffset.scale(.55)), vec2(.14, .8), c, ta);
        // hatch
        drawRect(this.pos, vec2(.3, .3), rgb(1, .9, .3));
        drawRect(this.pos, vec2(.15, .15), rgb(0,0,0));
    }
}

// Quark: bouncing emerald spawner — drops Tanks like spheroids drop Enforcers
class Quark extends KillableEnemy
{
    constructor(pos)
    {
        super(pos, vec2(1.2), 1, scoreQuark, rgb(.4, .6, 1));
        this.vel = randVec2(.13);
        this.spawnTimer = randInt(40, 100);  // first tank drops fast so the wave feels active
        this.phase = rand(0, 6.28);
        // Same arcade formula as spheroids — ceil(rand(1..ENFNUM)/2)
        const ENFNUM = getWaveTuning(gameWave).enforcerDropCount;
        this.spawnsRemaining = Math.ceil(randInt(1, ENFNUM + 1) / 2);
        this.fleeing = false;                // SQ3 escape phase
    }
    update()
    {
        if (gameOver || playerControlLocked) return;

        // Arcade SQ3 escape phase: constant vertical velocity (2× spheroid speed), no drops
        if (this.fleeing)
        {
            this.pos = this.pos.add(this.vel);
            this.phase += .14;
            if (this.flash > 0) this.flash--;
            const exitY = arenaHalf.y - arenaPadding + .5;
            if (this.pos.y > exitY || this.pos.y < -exitY) this.destroy();
            return;
        }

        this.pos = this.pos.add(this.vel);
        const minX = -arenaHalf.x + arenaPadding + .6;
        const maxX =  arenaHalf.x - arenaPadding - .6;
        const minY = -arenaHalf.y + arenaPadding + .6;
        const maxY =  arenaHalf.y - arenaPadding - .6;
        if (this.pos.x < minX) { this.pos.x = minX; this.vel.x =  abs(this.vel.x); }
        if (this.pos.x > maxX) { this.pos.x = maxX; this.vel.x = -abs(this.vel.x); }
        if (this.pos.y < minY) { this.pos.y = minY; this.vel.y =  abs(this.vel.y); }
        if (this.pos.y > maxY) { this.pos.y = maxY; this.vel.y = -abs(this.vel.y); }
        this.spawnTimer--;
        if (this.spawnTimer <= 0)
        {
            // Arcade: quarks refuse to drop when global tank cap is hit
            if (tankCount < MAX_TANKS)
            {
                enemies.push(new Tank(this.pos.copy()));
                burst(this.pos, 22, rgb(.4, .6, 1));
                sfxSpawn.play(this.pos);
                const t = getWaveTuning(gameWave);
                this.spawnTimer = randInt(t.spheroidDropTime * 2, t.spheroidDropTime * 4);
                // Arcade SQ3: after quota, flee vertically at 2× spheroid speed
                if (--this.spawnsRemaining <= 0)
                {
                    this.fleeing = true;
                    this.vel = vec2(0, rand() < .5 ? -.36 : .36);
                }
            }
            else
                this.spawnTimer = 30;   // wait for shell-cap window
        }
        this.phase += .14;
        if (this.flash > 0) this.flash--;
    }
    render()
    {
        const pulse = 1 + Math.sin(this.phase) * .12;
        const c = this.flash ? rgb(1,1,1) : rgb(1, 1, 1);
        const xCol = rgb(.3, .5, 1);
        const xDark = rgb(.1, .25, .65);
        // outer glow
        drawRect(this.pos, vec2(1.4 * pulse), rgb(.6, .7, 1, .25));
        // white box body
        drawRect(this.pos, vec2(1.15 * pulse), rgb(.2, .35, .8));
        drawRect(this.pos, vec2(1.0 * pulse), c);
        // big blue X in the middle
        drawRect(this.pos, vec2(.2, 1.1 * pulse), xDark,  PI/4);
        drawRect(this.pos, vec2(.2, 1.1 * pulse), xDark, -PI/4);
        drawRect(this.pos, vec2(.12, .95 * pulse), xCol,  PI/4);
        drawRect(this.pos, vec2(.12, .95 * pulse), xCol, -PI/4);
    }
}

///////////////////////////////////////////////////////////////////////////////
// human

class Human extends EngineObject
{
    constructor(pos, type)
    {
        super(pos, vec2(.55, .85));
        this.type = type;
        this.dir = randVec2(1);
        this.changeDirTimer = randInt(20, 90);
        this.walkPhase = rand(0, 6.28);
        this.renderOrder = 3;
        this.startled = 0;
        this.possessedBy = null;
    }
    update()
    {
        if (gameOver) return;
        // In gameplay, freeze during GET READY / pauses. In attract mode (no
        // gameplay yet) skip those gates so humans wander on the title screen.
        if (isPlaying && (playerControlLocked || !waveActive)) return;

        // Drop stale possession reference if the brain was killed mid-grab
        if (this.possessedBy && this.possessedBy.destroyed)
            this.possessedBy = null;

        // Frozen while a brain is reprogramming us — shake but don't walk
        if (this.possessedBy)
        {
            this.startled = 8;
            return;
        }
        let runDir = null;
        // Attract mode: don't react to enemies — just wander randomly so nobody traps them
        if (isPlaying)
        {
            // run from hulks and brains (anything that wants to kill/take them).
            // Only Brains trigger the startled white-flicker — hulks wander aimlessly so
            // their proximity isn't an active threat, just incidental danger.
            for (const e of enemies)
            {
                if (e.destroyed) continue;
                const isHulk = !e.killable;
                const isBrain = e instanceof Brain;
                if (!isHulk && !isBrain) continue;
                const away = this.pos.subtract(e.pos);
                const d = away.length();
                if (d < 4.5)
                {
                    runDir = away.scale(1/Math.max(.01, d));
                    if (isBrain) this.startled = 30;
                    break;
                }
            }
        }
        this.changeDirTimer--;
        if (this.changeDirTimer <= 0)
        {
            this.dir = randVec2(1);
            this.changeDirTimer = randInt(25, 110);
        }
        const useDir = runDir || this.dir;
        const speed = runDir ? .075 : .035;
        this.pos = this.pos.add(useDir.scale(speed));
        const minX = -arenaHalf.x + arenaPadding + .4;
        const maxX =  arenaHalf.x - arenaPadding - .4;
        const minY = -arenaHalf.y + arenaPadding + .5;
        const maxY =  arenaHalf.y - arenaPadding - .5;
        if (this.pos.x < minX) { this.pos.x = minX; this.dir.x =  abs(this.dir.x); }
        if (this.pos.x > maxX) { this.pos.x = maxX; this.dir.x = -abs(this.dir.x); }
        if (this.pos.y < minY) { this.pos.y = minY; this.dir.y =  abs(this.dir.y); }
        if (this.pos.y > maxY) { this.pos.y = maxY; this.dir.y = -abs(this.dir.y); }
        this.walkPhase += speed * 10;
        if (this.startled > 0) this.startled--;
    }
    rescue()
    {
        score += humanRescueBonus;
        burst(this.pos, 30, rgb(1, 1, .3));
        sfxRescue.play(this.pos);
        floaters.push(new FloatText(this.pos.add(vec2(0,.6)), `${humanRescueBonus}`, rgb(1,1,.4)));
        humanRescueBonus = min(humanRescueMax, humanRescueBonus + humanRescueStep);
        this.destroy();
    }
    kill()
    {
        burst(this.pos, 22, rgb(1, .5, .5));
        sfxHumanDie.play(this.pos);
        this.destroy();
    }
    render()
    {
        const phase = Math.sin(this.walkPhase);
        const bob = phase * .04;
        const armSwing = phase * .07;        // symmetric swing around body Y
        const legStretch = phase * .05;       // one leg longer / other shorter
        const palette = [
            { body: rgb(1, .45, .75), head: rgb(1, .85, .7), hair: rgb(.85, .55, .25) },
            { body: rgb(.3, .55, 1),  head: rgb(1, .85, .7), hair: rgb(.25, .15, .1)  },
            { body: rgb(1, .9, .25),  head: rgb(1, .85, .7), hair: rgb(.95, .65, .15) },
        ];
        const c = palette[this.type];

        // Shake violently while being possessed by a brain
        const beingPossessed = this.possessedBy && !this.possessedBy.destroyed;
        const shake = beingPossessed
            ? vec2(rand(-.1, .1), rand(-.1, .1)) : vec2(0);
        const p = this.pos.add(shake);

        // Possessed humans flicker white every few frames (danger tell)
        const possFlicker = beingPossessed && ((frame >> 2) & 1) === 0;
        const flash = possFlicker || (this.startled && (this.startled & 4))
            ? rgb(1,1,1) : c.body;
        const bodyCenterY = -.05 + bob;
        const bodyBottomY = bodyCenterY - .21;       // body height .42 / 2

        // shadow
        drawRect(p.add(vec2(0,-.45)), vec2(.5, .1), rgb(0,0,0,.35));

        // legs — animate by HEIGHT so the top is always anchored to body bottom (no detach)
        const baseLegH = .22;
        const leftLegH  = baseLegH + legStretch;
        const rightLegH = baseLegH - legStretch;
        drawRect(p.add(vec2(-.1, bodyBottomY - leftLegH /2)), vec2(.13, leftLegH ), c.body);
        drawRect(p.add(vec2( .1, bodyBottomY - rightLegH/2)), vec2(.13, rightLegH), c.body);

        // body
        drawRect(p.add(vec2(0, bodyCenterY)), vec2(.42, .42), flash);

        // arms — both anchored to body's Y, swing symmetrically (opposite of each other)
        drawRect(p.add(vec2(-.27, bodyCenterY + armSwing)), vec2(.12, .3), flash);
        drawRect(p.add(vec2( .27, bodyCenterY - armSwing)), vec2(.12, .3), flash);

        // head + hair + eyes ride with the bobbing body
        drawRect(p.add(vec2(0,    .3  + bob)), vec2(.26, .26), c.head);
        drawRect(p.add(vec2(0,    .42 + bob)), vec2(.28, .08), c.hair);
        drawRect(p.add(vec2(-.06, .32 + bob)), vec2(.04), rgb(0,0,0));
        drawRect(p.add(vec2( .06, .32 + bob)), vec2(.04), rgb(0,0,0));
    }
}
