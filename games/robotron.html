<script>
'use strict';

// engine settings
debugWatermark = false;
showEngineVersion = false;

// on-screen touch gamepad (analog left stick + fire button) for mobile
touchGamepadEnable = true;
touchGamepadAnalog = true; // left analog stick
touchGamepadButtonCount = 1; // 1 button for right analog stick
touchGamepadAlpha = .35;

///////////////////////////////////////////////////////////////////////////////
// Robotron 2084-style twin stick
// Save the last family! WASD move, mouse aim + hold to fire.

// world / arena
const arenaSize = vec2(38, 20);
const arenaHalf = arenaSize.scale(.5);
const arenaPadding = 0;  // visual wall == playable edge (no dead band)

// respawn / safety
const safeZoneRadius = 5;
const respawnInvulnFrames = 120;
const respawnPauseFrames = 120;    // mid-wave death pause — 1 sec gone, 1 sec materializing
const respawnHiddenFrames = 60;    // first half: player invisible
const interWaveDelayFrames = 120;
const waveStartDelayFrames = 60;

// electrode placement
const electrodeKeepout = safeZoneRadius + 2.2;
const electrodeMaxCount = 20;

// humans
const humanRescueStart = 1000;
const humanRescueStep = 1000;
const humanRescueMax = 5000;

// scoring (matches Robotron 2084 arcade values)
const scoreGrunt    = 100;
const scoreBrain    = 500;
const scoreProg     = 100;
const scoreSpheroid = 1000;
const scoreEnforcer = 150;
const scoreTank     = 200;
const scoreQuark    = 1000;
const scoreEnemyBullet = 25;       // shooting down sparks / cruise missiles / shells
const scoreElectrodeKill = 0;      // grunt walks into electrode — arcade gives no credit

// lives and bonus (arcade default)
const startingLives = 3;
const bonusLifeInterval = 25000;

// game state
let player;
let bullets = [];        // player bullets
let enemyBullets = [];   // sparks, cruise missiles
let enemies = [];        // grunts, hulks, brains, progs, spheroids, enforcers
let electrodes = [];
let humans = [];
let particles = [];
let floaters = [];
let score = 0;
let best = 0;
let gameOver = false;

let gameWave = 1;
let waveActive = false;
let waveTime = 0;
let interWaveTimer = 0;
let respawnTimer = 0;
let gameOverTimer = 0;          // frames after death before the GAME OVER menu surfaces
let isPlaying = false;          // true once the player hits PLAY (menu system gates state)
let humanRescueBonus = humanRescueStart;
let nextBonusLifeAt = bonusLifeInterval;
let playerControlLocked = true;

// sfx
const sfxShoot     = new SoundGenerator({volume:.28, frequency:520, randomness:.08, attack:0, release:.05, shapeCurve:1.4, noise:.05});
const sfxHit       = new SoundGenerator({volume:.40, frequency:160, randomness:.12, attack:0, release:.12, shapeCurve:.6, slide:-.7, noise:.2});
const sfxPop       = new SoundGenerator({volume:.50, frequency:240, randomness:.22, attack:0, release:.14, shapeCurve:.8, pitchJump:220, pitchJumpTime:.03, noise:.25});
const sfxRescue    = new SoundGenerator({volume:.55, frequency:660, randomness:.05, attack:0, release:.22, shapeCurve:1.2, pitchJump:520, pitchJumpTime:.07});
const sfxHumanDie  = new SoundGenerator({volume:.55, frequency:300, randomness:.10, attack:0, release:.30, shapeCurve:.6, slide:-1.4, noise:.15});
const sfxHulkStep  = new SoundGenerator({volume:.28, frequency:90,  randomness:.10, attack:0, release:.08, shapeCurve:.4, noise:.3});
const sfxPlayerDie = new SoundGenerator({volume:.70, frequency:200, randomness:.20, attack:0, release:.50, shapeCurve:.5, slide:-1.6, noise:.4});
const sfxSpark     = new SoundGenerator({volume:.30, frequency:880, randomness:.30, attack:0, release:.06, shapeCurve:1.8, noise:.1});
const sfxMissile   = new SoundGenerator({volume:.35, frequency:330, randomness:.15, attack:0, release:.15, shapeCurve:.7, slide:.2, noise:.15});
const sfxReprogram = new SoundGenerator({volume:.55, frequency:200, randomness:.25, attack:0, release:.40, shapeCurve:.5, slide:-.8, noise:.5, pitchJump:-180, pitchJumpTime:.1});
const sfxSpawn     = new SoundGenerator({volume:.45, frequency:140, randomness:.10, attack:0, release:.20, shapeCurve:.6, pitchJump:300, pitchJumpTime:.08});
const sfxWaveStart = new SoundGenerator({volume:.35, frequency:520, randomness:.08, attack:0, release:.18, shapeCurve:.9, noise:.06});

///////////////////////////////////////////////////////////////////////////////
// helpers

const clampToArena = (pos, radius=0)=>
{
    const minX = -arenaHalf.x + arenaPadding + radius;
    const maxX =  arenaHalf.x - arenaPadding - radius;
    const minY = -arenaHalf.y + arenaPadding + radius;
    const maxY =  arenaHalf.y - arenaPadding - radius;
    pos.x = clamp(pos.x, minX, maxX);
    pos.y = clamp(pos.y, minY, maxY);
    return pos;
};

const overlapAABB = (aPos, aSize, bPos, bSize)=>
    abs(aPos.x - bPos.x) < (aSize.x + bSize.x) * .5 &&
    abs(aPos.y - bPos.y) < (aSize.y + bSize.y) * .5;

function screenToWorld(s)
{
    return vec2(s.x - mainCanvasSize.x * .5, mainCanvasSize.y * .5 - s.y)
        .scale(1 / cameraScale).add(cameraPos);
}
function drawRectScreen(sp, ss, c, a=0, fill=0)
{
    drawRect(screenToWorld(sp), ss.scale(1/cameraScale), c, a, fill);
}
function getMouseWorld()
{
    if (typeof mousePosScreen != 'undefined') return screenToWorld(mousePosScreen);
    return mousePos;
}

function randEdgeSpawn()
{
    const side = randInt(4), inset = .3;
    if (side == 0) return vec2(rand(-arenaHalf.x+inset, arenaHalf.x-inset),  arenaHalf.y-inset);
    if (side == 1) return vec2(rand(-arenaHalf.x+inset, arenaHalf.x-inset), -arenaHalf.y+inset);
    if (side == 2) return vec2( arenaHalf.x-inset, rand(-arenaHalf.y+inset, arenaHalf.y-inset));
    return            vec2(-arenaHalf.x+inset, rand(-arenaHalf.y+inset, arenaHalf.y-inset));
}

function randArenaPosAvoid(minDistFromPlayer, minDistFromCenter)
{
    for (let i=0;i<80;i++)
    {
        const p = vec2(rand(-arenaHalf.x+2, arenaHalf.x-2), rand(-arenaHalf.y+2, arenaHalf.y-2));
        if (minDistFromCenter && p.length() < minDistFromCenter) continue;
        if (player && minDistFromPlayer && p.subtract(player.pos).length() < minDistFromPlayer) continue;
        return p;
    }
    return randEdgeSpawn();
}

function randArenaPosAvoidStuff(minDistFromCenter, minDistBetween, minDistFromHumans=0)
{
    for (let i=0;i<120;i++)
    {
        const p = randArenaPosAvoid(0, minDistFromCenter);
        let ok = true;
        for (const e of electrodes)
        {
            if (e.destroyed) continue;
            if (p.subtract(e.pos).length() < minDistBetween) { ok = false; break; }
        }
        if (ok && minDistFromHumans)
            for (const h of humans)
            {
                if (h.destroyed) continue;
                if (p.subtract(h.pos).length() < minDistFromHumans) { ok = false; break; }
            }
        if (ok) return p;
    }
    return randEdgeSpawn();
}

///////////////////////////////////////////////////////////////////////////////
// particles + floating bonus text

class SimpleParticle
{
    constructor(pos, vel, life, size, color)
    {
        this.pos = pos.copy(); this.vel = vel.copy();
        this.life = life; this.maxLife = life; this.size = size; this.color = color;
    }
    update() { this.pos = this.pos.add(this.vel); this.vel = this.vel.scale(.92); this.life--; }
    render() { drawRect(this.pos, vec2(this.size), this.color); }
}

function burst(pos, count, baseColor)
{
    for (let i=0;i<count;i++)
    {
        const v = randVec2(rand(.05,.35));
        const life = randInt(8, 22);
        const size = rand(.06, .18);
        const c = baseColor.mutate?.(.2) || baseColor;
        particles.push(new SimpleParticle(pos, v, life, size, c));
    }
}

// Tight expanding ring — used for materialization at wave start
function ringBurst(pos, color, count = 14)
{
    for (let i=0;i<count;i++)
    {
        const ang = (i / count) * Math.PI * 2 + rand(-.05, .05);
        const speed = rand(.18, .28);
        const vel = vec2(Math.cos(ang), Math.sin(ang)).scale(speed);
        const life = randInt(16, 26);
        particles.push(new SimpleParticle(pos, vel, life, rand(.1, .18), color));
    }
}

class FloatText
{
    constructor(pos, text, color)
    {
        this.pos = pos.copy(); this.text = text; this.color = color;
        this.life = 60; this.maxLife = 60;
    }
    update() { this.pos.y += .04; this.life--; }
    render()
    {
        const a = this.life / this.maxLife;
        const c = rgb(this.color.r, this.color.g, this.color.b, a);
        drawText(this.text, this.pos, .9, c, .06, rgb(0,0,0,a));
    }
}

///////////////////////////////////////////////////////////////////////////////
// projectiles

class Bullet extends EngineObject
{
    constructor(pos, vel)
    {
        super(pos, vec2(.22));
        this.vel = vel.copy();
        this.life = 60;
        this.renderOrder = 5;
        this.huePhase = rand(0, 1);
    }
    update()
    {
        this.pos = this.pos.add(this.vel);
        this.life--;
        this.huePhase = (this.huePhase + .08) % 1;
        if (this.life <= 0) this.destroy();
        if (abs(this.pos.x) > arenaHalf.x + 2 || abs(this.pos.y) > arenaHalf.y + 2) this.destroy();
    }
    render()
    {
        const angle = this.vel.angle();
        const c = hsl(this.huePhase, 1, .65);
        // outer glow streak (tall rect — angle 0 means pointing up, vel.angle() rotates correctly)
        drawRect(this.pos, vec2(.22, .8), rgb(c.r, c.g, c.b, .35), angle);
        // bright core streak
        drawRect(this.pos, vec2(.14, 2), c, angle);
        // hot white center
        drawRect(this.pos, vec2(.1, 1), rgb(1,1,1), angle);
    }
}

// Spark: spinning rainbow cross that weakly homes in on the player. Shoot it down for bonus.
class Spark extends EngineObject
{
    constructor(pos, vel)
    {
        super(pos, vec2(.3));
        this.vel = vel.copy();
        this.life = 220;
        this.renderOrder = 5;
        this.phase = rand(0, 1);
        this.spinAngle = rand(0, 6.28);
    }
    update()
    {
        // weak homing on the player
        if (player && !gameOver)
        {
            const toP = player.pos.subtract(this.pos);
            const d = toP.length();
            if (d > .01)
            {
                const desired = toP.scale(.11 / d);
                this.vel = this.vel.scale(.96).add(desired.scale(.05));
            }
        }
        // cap speed so it stays dodgeable
        const sp = this.vel.length();
        const maxSp = .14;
        if (sp > maxSp) this.vel = this.vel.scale(maxSp / sp);

        this.pos = this.pos.add(this.vel);
        this.phase = (this.phase + .12) % 1;
        this.spinAngle += .35;
        this.life--;
        if (this.life <= 0) this.destroy();
        if (abs(this.pos.x) > arenaHalf.x + 2 || abs(this.pos.y) > arenaHalf.y + 2) this.destroy();
    }
    render()
    {
        const c = hsl(this.phase, 1, .65);
        // glow halo
        drawRect(this.pos, vec2(.55), rgb(c.r, c.g, c.b, .3), this.spinAngle * .5);
        // spinning cross
        drawRect(this.pos, vec2(.55, .15), c, this.spinAngle);
        drawRect(this.pos, vec2(.15, .55), c, this.spinAngle);
        // hot core
        drawRect(this.pos, vec2(.18), rgb(1,1,1));
    }
}

class CruiseMissile extends EngineObject
{
    constructor(pos, target)
    {
        super(pos, vec2(.28));
        this.target = target;
        this.life = 480;
        this.renderOrder = 5;
        this.segments = [];
        this.huePhase = rand(0, 1);
        this.dir = this.pickDir();
        this.changeTimer = randInt(15, 35);
    }
    pickDir()
    {
        // Snap to one of 8 directions at 45-degree increments — biased toward target
        const tgt = (this.target && !this.target.destroyed) ? this.target : player;
        let baseAngle;
        if (tgt)
        {
            const toT = tgt.pos.subtract(this.pos);
            baseAngle = Math.atan2(toT.y, toT.x);
        }
        else
            baseAngle = rand(0, Math.PI * 2);
        // 30% chance to deviate ±45° (sometimes sideways or away)
        let snapped = Math.round(baseAngle / (Math.PI/4)) * (Math.PI/4);
        const r = rand();
        if (r < .15)      snapped += Math.PI/4;
        else if (r < .3)  snapped -= Math.PI/4;
        else if (r < .35) snapped += Math.PI;   // occasionally away from player
        return vec2(Math.cos(snapped), Math.sin(snapped));
    }
    update()
    {
        this.life--;
        if (this.life <= 0) { this.destroy(); return; }
        this.changeTimer--;
        if (this.changeTimer <= 0)
        {
            this.dir = this.pickDir();
            this.changeTimer = randInt(15, 35);
        }
        const speed = .10;
        this.pos = this.pos.add(this.dir.scale(speed));
        this.segments.unshift(this.pos.copy());
        if (this.segments.length > 10) this.segments.pop();
        this.huePhase = (this.huePhase + .04) % 1;
        if (abs(this.pos.x) > arenaHalf.x + 2 || abs(this.pos.y) > arenaHalf.y + 2)
            this.destroy();
    }
    render()
    {
        // bright color-shifting trail
        for (let i = this.segments.length - 1; i >= 0; i--)
        {
            const a = 1 - i / this.segments.length;
            const c = hsl((this.huePhase + i * .05) % 1, 1, .55);
            drawRect(this.segments[i], vec2(.22 * (a + .2)), rgb(c.r, c.g, c.b, a * .8));
        }
        const head = hsl(this.huePhase, 1, .65);
        drawRect(this.pos, vec2(.45), rgb(head.r, head.g, head.b, .5));
        drawRect(this.pos, vec2(.3), head);
        drawRect(this.pos, vec2(.15), rgb(1, 1, .9));
    }
}

///////////////////////////////////////////////////////////////////////////////
// electrode (deadly static)

class Electrode extends EngineObject
{
    constructor(pos)
    {
        super(pos, vec2(.95, .95));
        this.renderOrder = 2;
        this.pulse = rand(0, 6.28);
        this.tint = rand() < .5;
    }
    update() { this.pulse += .15; }
    render()
    {
        const p = .85 + Math.sin(this.pulse) * .15;
        const dark = this.tint ? rgb(.0, .55, .9) : rgb(.9, .2, .8);
        const light = rgb(.5, 1, 1);
        drawRect(this.pos, vec2(1.4 * p), rgb(dark.r, dark.g, dark.b, .15));
        drawRect(this.pos, vec2(.32, 1.25 * p), dark,  PI/4);
        drawRect(this.pos, vec2(.32, 1.25 * p), dark, -PI/4);
        drawRect(this.pos, vec2(.16, 1.10 * p), light, PI/4);
        drawRect(this.pos, vec2(.16, 1.10 * p), light, -PI/4);
        drawRect(this.pos, vec2(.28 * p), rgb(1,1,1));
    }
}

///////////////////////////////////////////////////////////////////////////////
// killable enemy base (shared takeHit / electrode death)

class KillableEnemy extends EngineObject
{
    constructor(pos, size, hp, scoreValue, hitColor)
    {
        super(pos, size);
        this.hp = hp;
        this.flash = 0;
        this.killable = true;
        this.renderOrder = 4;
        this.scoreValue = scoreValue;
        this.hitColor = hitColor;
    }
    takeHit(dmg, hitDir)
    {
        this.hp -= dmg;
        this.flash = 6;
        this.pos = clampToArena(this.pos.add(hitDir.scale(.2)), this.size.x*.5);
        if (this.hp <= 0)
        {
            this.destroy();
            score += this.scoreValue;
            burst(this.pos, 18, this.hitColor);
            sfxPop.play(this.pos);
            floaters.push(new FloatText(this.pos, `${this.scoreValue}`, this.hitColor));
        }
        else
        {
            burst(this.pos, 6, this.hitColor);
            sfxHit.play(this.pos);
        }
    }
    killedByElectrode()
    {
        this.destroy();
        score += scoreElectrodeKill;
        burst(this.pos, 16, this.hitColor);
        sfxHit.play(this.pos);
    }
}

///////////////////////////////////////////////////////////////////////////////
// enemies

// Grunt: red humanoid, marches toward player in pulses, speeds up over wave
class Grunt extends KillableEnemy
{
    constructor(pos, baseSpeed, hp)
    {
        super(pos, vec2(.9), hp, scoreGrunt, rgb(1,.4,.4));
        this.baseSpeed = baseSpeed;
        this.marchPhase = rand(0, 6.28);
        this.marchStep = 0;
        // Used only in attract mode (no player to chase)
        this.wanderDir = randVec2(1);
        this.wanderTimer = randInt(30, 90);
    }
    getSpeed()
    {
        // Arcade: grunts crawl at wave start and climb to roughly player speed.
        // Player speed ~.17, base grunt ~.04. Cap ramp at 4x → ~.16 late wave.
        const t = waveTime;
        const ramp = 1 + min(3, t / 1200) * 1.0;
        const waveMul = 1 + (gameWave - 1) * .05;
        return this.baseSpeed * ramp * waveMul;
    }
    update()
    {
        if (gameOver) return;
        if (isPlaying && (playerControlLocked || !player)) return;
        this.marchPhase += .25;
        if (Math.sin(this.marchPhase) > -.2)
        {
            let dir;
            if (player)
            {
                const toP = player.pos.subtract(this.pos);
                const d = toP.length();
                dir = d > .001 ? toP.scale(1/d) : vec2(0,1);
            }
            else
            {
                // Attract mode: wander randomly
                this.wanderTimer--;
                if (this.wanderTimer <= 0)
                {
                    this.wanderDir = randVec2(1);
                    this.wanderTimer = randInt(30, 90);
                }
                dir = this.wanderDir;
            }
            this.pos = this.pos.add(dir.scale(this.getSpeed()));
            this.pos = clampToArena(this.pos, .45);
            this.marchStep += this.getSpeed();
        }
        if (this.flash > 0) this.flash--;
    }
    render()
    {
        const c = this.flash ? rgb(1,1,1) : rgb(.95,.25,.25);
        const dark = rgb(.5, .08, .08);
        const bob = (Math.floor(this.marchStep * 4) % 2) ? .04 : -.04;
        drawRect(this.pos.add(vec2(0,-.55)), vec2(.7, .14), rgb(0,0,0,.35));
        drawRect(this.pos.add(vec2(-.18, -.42 + bob)), vec2(.22, .28), dark);
        drawRect(this.pos.add(vec2( .18, -.42 - bob)), vec2(.22, .28), dark);
        drawRect(this.pos.add(vec2(0, -.05)), vec2(.6, .55), c);
        drawRect(this.pos.add(vec2(-.42,  bob)), vec2(.18, .4), c);
        drawRect(this.pos.add(vec2( .42, -bob)), vec2(.18, .4), c);
        drawRect(this.pos.add(vec2(0, .35)), vec2(.4, .38), c);
        drawRect(this.pos.add(vec2(-.1, .38)), vec2(.08, .1), rgb(1,1,.2));
        drawRect(this.pos.add(vec2( .1, .38)), vec2(.08, .1), rgb(1,1,.2));
    }
}

// Hulk: indestructible. Marches in cardinal directions toward nearest human. Bullets push.
class Hulk extends EngineObject
{
    constructor(pos, speed)
    {
        super(pos, vec2(1.4, 1.5));
        this.killable = false;
        this.renderOrder = 4;
        this.speed = speed;
        this.marchDir = vec2(Math.sign(rand(-1,1)) || 1, 0);
        this.marchTimer = 0;
        this.knockback = vec2(0);
        this.walkPhase = 0;
        this.stepSfx = 0;
    }
    pickMarchDir()
    {
        let target = null, bestDist = Infinity;
        for (const h of humans)
        {
            if (h.destroyed) continue;
            const d = h.pos.subtract(this.pos).length();
            if (d < bestDist) { bestDist = d; target = h; }
        }
        if (!target && player) target = player;
        if (!target) { this.marchDir = vec2(1, 0); return; }
        const diff = target.pos.subtract(this.pos);
        if (abs(diff.x) > abs(diff.y))
            this.marchDir = vec2(Math.sign(diff.x) || 1, 0);
        else
            this.marchDir = vec2(0, Math.sign(diff.y) || 1);
    }
    push(dir)
    {
        this.knockback = this.knockback.add(dir.scale(.18));
        if (this.marchTimer > 6) this.marchTimer = 6;
    }
    update()
    {
        if (gameOver) return;
        if (isPlaying && playerControlLocked) return;
        this.marchTimer--;
        if (this.marchTimer <= 0) { this.pickMarchDir(); this.marchTimer = randInt(50, 110); }
        this.pos = this.pos.add(this.knockback);
        this.knockback = this.knockback.scale(.82);
        this.pos = this.pos.add(this.marchDir.scale(this.speed));
        this.pos = clampToArena(this.pos, .75);
        this.walkPhase += this.speed * 4;
        if (++this.stepSfx > 40) { this.stepSfx = 0; sfxHulkStep.play(this.pos); }
    }
    render()
    {
        const bob = (Math.floor(this.walkPhase) % 2) ? .05 : -.05;
        const body = rgb(.35, .55, .35), skin = rgb(.55, .75, .45), dark = rgb(.18, .3, .18);
        drawRect(this.pos.add(vec2(0,-.7)), vec2(1.1, .14), rgb(0,0,0,.4));
        drawRect(this.pos.add(vec2(-.35, -.55 + bob)), vec2(.35, .4), dark);
        drawRect(this.pos.add(vec2( .35, -.55 - bob)), vec2(.35, .4), dark);
        drawRect(this.pos.add(vec2(0, -.05)), vec2(1.1, .8), body);
        drawRect(this.pos.add(vec2(0, -.05)), vec2(.55, .35), skin);
        drawRect(this.pos.add(vec2(-.62,  bob*1.5)), vec2(.28, .55), body);
        drawRect(this.pos.add(vec2( .62, -bob*1.5)), vec2(.28, .55), body);
        drawRect(this.pos.add(vec2(0, .55)), vec2(.55, .45), body);
        drawRect(this.pos.add(vec2(-.13, .58)), vec2(.13, .1), rgb(1, .15, .15));
        drawRect(this.pos.add(vec2( .13, .58)), vec2(.13, .1), rgb(1, .15, .15));
    }
}

// Brain: hunts humans and reprograms them into Progs; shoots cruise missiles at player
class Brain extends KillableEnemy
{
    constructor(pos)
    {
        super(pos, vec2(1.1, 1.4), 1, scoreBrain, rgb(.4, 1, .4));
        this.shootTimer = randInt(120, 240);
        this.walkPhase = 0;
        this.brainPulse = rand(0, 6.28);
        this.possessing = null;     // human being reprogrammed
        this.possessTimer = 0;      // frames remaining in the grab
    }
    findHuman()
    {
        let best = null, bestDist = Infinity;
        for (const h of humans)
        {
            // skip humans already being possessed by another brain
            if (h.destroyed || h.possessedBy) continue;
            const d = h.pos.subtract(this.pos).length();
            if (d < bestDist) { bestDist = d; best = h; }
        }
        return best;
    }
    update()
    {
        if (gameOver || playerControlLocked || !player) return;
        const speed = .045 + min(.02, gameWave * .001);

        // POSSESSION: locked onto a human, hover above them while reprogramming
        if (this.possessing && !this.possessing.destroyed)
        {
            this.pos = this.possessing.pos.add(vec2(0, .9));
            this.pos = clampToArena(this.pos, .5);
            this.possessTimer--;
            // sparkle particles arcing between brain and human
            if (this.possessTimer % 3 === 0)
                particles.push(new SimpleParticle(
                    this.possessing.pos.add(vec2(rand(-.2,.2), rand(-.2,.5))),
                    randVec2(rand(.02, .08)), randInt(8, 18), rand(.08, .14),
                    rgb(1, rand(.3, .7), 1)));
            if (this.possessTimer <= 0)
            {
                // reprogram complete: spawn Prog, destroy human
                enemies.push(new Prog(this.possessing.pos.copy(), this.possessing.type));
                burst(this.possessing.pos, 30, rgb(1, .3, .9));
                sfxReprogram.play(this.possessing.pos);
                this.possessing.destroy();
                this.possessing = null;
            }
            this.walkPhase += speed * 2;
            this.brainPulse += .25;
            if (this.flash > 0) this.flash--;
            return;
        }
        // possessing target was rescued / killed before we finished — release
        if (this.possessing && this.possessing.destroyed)
        {
            this.possessing = null;
            this.possessTimer = 0;
        }

        const target = this.findHuman();
        if (target)
        {
            const dir = target.pos.subtract(this.pos).normalize(1);
            this.pos = this.pos.add(dir.scale(speed));
            if (overlapAABB(this.pos, this.size, target.pos, target.size))
            {
                // begin possession — 120-frame hold (~2 sec at 60fps)
                this.possessing = target;
                this.possessTimer = 120;
                target.possessedBy = this;
                sfxHit.play(target.pos);
            }
            // Brains also lob the occasional cruise missile at the player even while hunting humans
            this.shootTimer--;
            if (this.shootTimer <= 0 && player)
            {
                enemyBullets.push(new CruiseMissile(this.pos.copy(), player));
                this.shootTimer = randInt(200, 360);
                sfxMissile.play(this.pos);
            }
        }
        else
        {
            // no humans left in arena — close on player and shoot cruise missiles
            const toP = player.pos.subtract(this.pos);
            const d = toP.length();
            if (d > 5)
                this.pos = this.pos.add(toP.scale(speed * .8 / d));
            this.shootTimer--;
            if (this.shootTimer <= 0)
            {
                enemyBullets.push(new CruiseMissile(this.pos.copy(), player));
                this.shootTimer = randInt(140, 260);
                sfxMissile.play(this.pos);
            }
        }
        this.pos = clampToArena(this.pos, .5);
        this.walkPhase += speed * 5;
        this.brainPulse += .12;
        if (this.flash > 0) this.flash--;
    }
    render()
    {
        const c = this.flash ? rgb(1,1,1) : rgb(.35, .5, 1);    // blue body (matches FAQ)
        const dark = rgb(.1, .2, .55);
        const brainPink = rgb(1, .55, .75);
        const brainWrinkle = rgb(.7, .15, .35);
        const bob = Math.sin(this.walkPhase) * .04;
        const pulse = 1 + Math.sin(this.brainPulse) * .04;

        // shadow
        drawRect(this.pos.add(vec2(0,-.85)), vec2(.6, .14), rgb(0,0,0,.4));
        // tiny legs (intentionally undersized — most of the body mass is the brain)
        drawRect(this.pos.add(vec2(-.13, -.62 + bob*.4)), vec2(.16, .25), dark);
        drawRect(this.pos.add(vec2( .13, -.62 - bob*.4)), vec2(.16, .25), dark);
        // small green robot torso
        drawRect(this.pos.add(vec2(0, -.32)), vec2(.45, .4), c);
        // little arms
        drawRect(this.pos.add(vec2(-.32, -.3)), vec2(.13, .32), c);
        drawRect(this.pos.add(vec2( .32, -.3)), vec2(.13, .32), c);
        // angry eyes (under the brain)
        drawRect(this.pos.add(vec2(-.16, -.05)), vec2(.13, .14), rgb(0,0,0));
        drawRect(this.pos.add(vec2( .16, -.05)), vec2(.13, .14), rgb(0,0,0));
        drawRect(this.pos.add(vec2(-.16, -.04)), vec2(.07, .07), rgb(1, .15, .15));
        drawRect(this.pos.add(vec2( .16, -.04)), vec2(.07, .07), rgb(1, .15, .15));
        // GIANT exposed pink brain dome — the iconic identifying feature
        drawRect(this.pos.add(vec2(0, .42 + bob*.5)), vec2(1.15 * pulse, .8 * pulse), brainPink);
        // brain wrinkles (darker pink bands)
        drawRect(this.pos.add(vec2(0, .65 + bob*.5)), vec2(.95 * pulse, .08), brainWrinkle);
        drawRect(this.pos.add(vec2(0, .42 + bob*.5)), vec2(1.05 * pulse, .06), brainWrinkle);
        drawRect(this.pos.add(vec2(0, .2 + bob*.5)), vec2(.85 * pulse, .06), brainWrinkle);
        // hemisphere divide line
        drawRect(this.pos.add(vec2(0, .42 + bob*.5)), vec2(.07, .78 * pulse), brainWrinkle);
        // tiny highlight on brain
        drawRect(this.pos.add(vec2(-.25, .58 + bob*.5)), vec2(.15, .15), rgb(1, .8, .9, .7));
    }
}

// Prog: reprogrammed family — moves in CARDINAL (90°) steps with a bright color-cycling trail
class Prog extends KillableEnemy
{
    constructor(pos, humanType)
    {
        super(pos, vec2(.55, .9), 1, scoreProg, rgb(1, .2, .85));
        this.humanType = humanType;
        this.walkPhase = rand(0, 6.28);
        this.trailTimer = 0;
        this.eyePulse = rand(0, 6.28);
        this.dir = this.pickCardinalDir();
        this.changeTimer = randInt(20, 50);
        this.huePhase = rand(0, 1);
    }
    pickCardinalDir()
    {
        if (!player) return vec2(1, 0);
        // 70% chance to head roughly toward player on a cardinal axis;
        // 30% chance to pick a random cardinal direction
        if (rand() < .7)
        {
            const toP = player.pos.subtract(this.pos);
            if (abs(toP.x) > abs(toP.y))
                return vec2(Math.sign(toP.x) || 1, 0);
            else
                return vec2(0, Math.sign(toP.y) || 1);
        }
        // random cardinal
        const i = randInt(4);
        return [vec2(1,0), vec2(-1,0), vec2(0,1), vec2(0,-1)][i];
    }
    update()
    {
        if (gameOver || playerControlLocked || !player) return;
        const speed = .10 + min(.03, gameWave * .002);

        this.changeTimer--;
        if (this.changeTimer <= 0)
        {
            this.dir = this.pickCardinalDir();
            this.changeTimer = randInt(20, 50);
        }
        const finalDir = this.dir;

        this.pos = this.pos.add(finalDir.scale(speed));
        this.pos = clampToArena(this.pos, .4);
        this.walkPhase += speed * 16;
        this.eyePulse += .3;
        this.huePhase = (this.huePhase + .06) % 1;

        // bright color-cycling trail — clear "danger" indicator
        this.trailTimer++;
        if (this.trailTimer >= 1)
        {
            this.trailTimer = 0;
            const trailVel = finalDir.scale(-.025).add(vec2(rand(-.02, .02), rand(-.02, .02)));
            const c = hsl((this.huePhase + rand(-.1, .1)) % 1, 1, .65);
            particles.push(new SimpleParticle(
                this.pos.add(vec2(rand(-.12, .12), rand(-.18, .18))),
                trailVel,
                randInt(14, 26),
                rand(.14, .24),
                c));
        }

        if (this.flash > 0) this.flash--;
    }
    render()
    {
        const bob = Math.sin(this.walkPhase) * .12;
        const armSwing = Math.sin(this.walkPhase * .8) * .18;
        // Constant white/color flicker so they read as DANGEROUS at a glance
        const flicker = ((frame >> 2) & 1) === 0;
        const baseC = flicker ? rgb(1, 1, 1) : hsl(this.huePhase, 1, .65);
        const c = this.flash ? rgb(1,1,1) : baseC;
        const dark = rgb(.55, .05, .45);
        const skin = flicker ? rgb(1, 1, 1) : hsl((this.huePhase + .15) % 1, .85, .55);
        const eyeGlow = (Math.sin(this.eyePulse) * .5 + .5) * .5 + .5;

        drawRect(this.pos.add(vec2(0,-.5)), vec2(.5, .1), rgb(0,0,0,.45));
        // running legs (more dramatic swing)
        drawRect(this.pos.add(vec2(-.13, -.35 + bob)), vec2(.15, .3), dark);
        drawRect(this.pos.add(vec2( .13, -.35 - bob)), vec2(.15, .3), dark);
        // body
        drawRect(this.pos.add(vec2(0, -.02)), vec2(.46, .46), c);
        // outstretched arms (mid-grab pose)
        drawRect(this.pos.add(vec2(-.38, .15 + armSwing*.3)), vec2(.17, .4), c);
        drawRect(this.pos.add(vec2( .38, .15 - armSwing*.3)), vec2(.17, .4), c);
        // mutated head — bigger and twisted
        drawRect(this.pos.add(vec2(0, .35)), vec2(.34, .34), skin);
        // hair tuft (matches color of original family but darkened/wild)
        drawRect(this.pos.add(vec2(0, .51)), vec2(.36, .1), dark);
        // huge glowing yellow eyes (the key tell — humans have tiny black eyes, progs have glowing yellow)
        drawRect(this.pos.add(vec2(-.09, .36)), vec2(.13, .14), rgb(0,0,0));
        drawRect(this.pos.add(vec2( .09, .36)), vec2(.13, .14), rgb(0,0,0));
        drawRect(this.pos.add(vec2(-.09, .37)), vec2(.10, .10), rgb(1, eyeGlow, .1));
        drawRect(this.pos.add(vec2( .09, .37)), vec2(.10, .10), rgb(1, eyeGlow, .1));
        // snarling mouth
        drawRect(this.pos.add(vec2(0, .23)), vec2(.2, .05), rgb(.4, 0, .25));
    }
}

// Spheroid: red pulsating orb that patrols the arena perimeter. Spawns Enforcers fast on entry.
// Spheroids ignore electrodes (they float at the edge anyway).
class Spheroid extends KillableEnemy
{
    constructor(pos)
    {
        super(pos, vec2(1.3), 1, scoreSpheroid, rgb(1, .3, .3));
        this.cw = rand() < .5;
        this.snapToNearestEdge();
        this.vel = vec2(0);
        this.setEdgeVelocity();
        this.spawnTimer = randInt(25, 70);   // first enforcer drops almost immediately
        this.phase = rand(0, 6.28);
    }
    snapToNearestEdge()
    {
        const inset = .9;
        const maxX = arenaHalf.x - arenaPadding - inset;
        const maxY = arenaHalf.y - arenaPadding - inset;
        const dTop = abs(this.pos.y - maxY);
        const dBot = abs(this.pos.y + maxY);
        const dRight = abs(this.pos.x - maxX);
        const dLeft = abs(this.pos.x + maxX);
        const m = min(min(dTop, dBot), min(dRight, dLeft));
        if (m === dTop)       this.pos.y =  maxY;
        else if (m === dBot)  this.pos.y = -maxY;
        else if (m === dRight) this.pos.x =  maxX;
        else                   this.pos.x = -maxX;
        this.pos.x = clamp(this.pos.x, -maxX, maxX);
        this.pos.y = clamp(this.pos.y, -maxY, maxY);
    }
    setEdgeVelocity()
    {
        const speed = .11;
        const inset = .9;
        const maxX = arenaHalf.x - arenaPadding - inset;
        const maxY = arenaHalf.y - arenaPadding - inset;
        const dTop = abs(this.pos.y - maxY);
        const dBot = abs(this.pos.y + maxY);
        const dRight = abs(this.pos.x - maxX);
        const dLeft = abs(this.pos.x + maxX);
        const m = min(min(dTop, dBot), min(dRight, dLeft));
        if (m === dTop)      this.vel = vec2(this.cw ?  speed : -speed, 0);
        else if (m === dBot) this.vel = vec2(this.cw ? -speed :  speed, 0);
        else if (m === dRight) this.vel = vec2(0, this.cw ? -speed :  speed);
        else                   this.vel = vec2(0, this.cw ?  speed : -speed);
    }
    update()
    {
        if (gameOver || playerControlLocked) return;
        this.pos = this.pos.add(this.vel);
        const inset = .9;
        const maxX = arenaHalf.x - arenaPadding - inset;
        const maxY = arenaHalf.y - arenaPadding - inset;
        let hit = false;
        if (this.pos.x >  maxX) { this.pos.x =  maxX; hit = true; }
        if (this.pos.x < -maxX) { this.pos.x = -maxX; hit = true; }
        if (this.pos.y >  maxY) { this.pos.y =  maxY; hit = true; }
        if (this.pos.y < -maxY) { this.pos.y = -maxY; hit = true; }
        if (hit) this.setEdgeVelocity();

        this.spawnTimer--;
        if (this.spawnTimer <= 0)
        {
            enemies.push(new Enforcer(this.pos.copy()));
            burst(this.pos, 22, rgb(1, .4, .4));
            sfxSpawn.play(this.pos);
            this.spawnTimer = randInt(80, 160);
        }
        this.phase += .18;
        if (this.flash > 0) this.flash--;
    }
    render()
    {
        const pulse = 1 + Math.sin(this.phase) * .25;
        const c = this.flash ? rgb(1,1,1) : rgb(1, .25 + Math.sin(this.phase)*.15, .25);
        const inner = rgb(1, .7, .7);
        // pulsing red halo
        drawRect(this.pos, vec2(1.6 * pulse), rgb(1, .2, .2, .25), this.phase * .3);
        drawRect(this.pos, vec2(1.3 * pulse), c, this.phase * .4);
        drawRect(this.pos, vec2(.85), inner, -this.phase * .5);
        drawRect(this.pos, vec2(.5), rgb(1, .95, .85));
        drawRect(this.pos, vec2(.22), rgb(1,1,1));
    }
}

// Enforcer: fast blue/yellow Robby-the-Robot. Keeps distance from player, fires spinning sparks.
class Enforcer extends KillableEnemy
{
    constructor(pos)
    {
        super(pos, vec2(.9, 1.1), 1, scoreEnforcer, rgb(.4, .6, 1));
        this.vel = randVec2(.07);
        this.shootTimer = randInt(50, 100);
        this.walkPhase = rand(0, 6.28);
    }
    update()
    {
        if (gameOver || playerControlLocked || !player) return;

        const toP = player.pos.subtract(this.pos);
        const d = toP.length();
        const dir = d > .01 ? toP.scale(1/d) : vec2(0, 1);

        // keep ideal distance from player (~8 units)
        const idealDist = 8;
        const radial = clamp((d - idealDist) * .1, -.7, .7);     // toward when far, away when close
        // tangential drift (orbit-style)
        const perp = vec2(-dir.y, dir.x);
        this.walkPhase += .12;
        const tangent = Math.sin(this.walkPhase) * .7 + .3;     // bias to one orbit direction

        const desire = dir.scale(radial).add(perp.scale(tangent));
        this.vel = this.vel.scale(.9).add(desire.scale(.025));

        const maxSp = .15 + min(.06, gameWave * .003);
        const sp = this.vel.length();
        if (sp > maxSp) this.vel = this.vel.scale(maxSp / sp);

        this.pos = this.pos.add(this.vel);
        this.pos = clampToArena(this.pos, .5);

        this.shootTimer--;
        if (this.shootTimer <= 0 && d < 22)
        {
            const aim = dir.scale(.08); // slow but homing
            enemyBullets.push(new Spark(this.pos.copy(), aim));
            this.shootTimer = randInt(70, 150);
            sfxSpark.play(this.pos);
        }

        if (this.flash > 0) this.flash--;
    }
    render()
    {
        const c = this.flash ? rgb(1,1,1) : rgb(.4, .6, 1);
        const dark = rgb(.1, .25, .55);
        const yellow = rgb(1, .85, .25);
        const trackBob = (Math.floor(this.walkPhase * 4) % 2) ? .03 : -.03;

        // shadow
        drawRect(this.pos.add(vec2(0, -.65)), vec2(.8, .12), rgb(0,0,0,.4));
        // tank treads under it
        drawRect(this.pos.add(vec2(0, -.45)), vec2(.95, .25), dark);
        drawRect(this.pos.add(vec2(-.3, -.45 + trackBob)), vec2(.18, .12), rgb(.3, .4, .65));
        drawRect(this.pos.add(vec2( .3, -.45 - trackBob)), vec2(.18, .12), rgb(.3, .4, .65));
        // body (boxy robby torso)
        drawRect(this.pos.add(vec2(0, -.1)), vec2(.75, .55), c);
        // yellow chest panel
        drawRect(this.pos.add(vec2(0, -.1)), vec2(.4, .35), yellow);
        // arms (yellow)
        drawRect(this.pos.add(vec2(-.45, -.05)), vec2(.18, .35), yellow);
        drawRect(this.pos.add(vec2( .45, -.05)), vec2(.18, .35), yellow);
        // rounded dome head
        drawRect(this.pos.add(vec2(0, .35)), vec2(.55, .4), c);
        // visor / eye band
        drawRect(this.pos.add(vec2(0, .35)), vec2(.5, .1), rgb(.1, .1, .15));
        drawRect(this.pos.add(vec2(0, .35)), vec2(.4, .06), rgb(1, .3, .3));
        // antenna
        drawRect(this.pos.add(vec2(0, .65)), vec2(.06, .18), dark);
        drawRect(this.pos.add(vec2(0, .76)), vec2(.14), yellow);
    }
}

// TankShell: bouncing projectile fired by Tank. Bounces off arena walls twice before dying.
class TankShell extends EngineObject
{
    constructor(pos, vel)
    {
        super(pos, vec2(.4));
        this.vel = vel.copy();
        this.life = 360;
        this.renderOrder = 5;
        this.bouncesLeft = 2;
        this.phase = 0;
    }
    update()
    {
        this.pos = this.pos.add(this.vel);
        this.life--;
        this.phase += .15;
        const minX = -arenaHalf.x + arenaPadding + .2;
        const maxX =  arenaHalf.x - arenaPadding - .2;
        const minY = -arenaHalf.y + arenaPadding + .2;
        const maxY =  arenaHalf.y - arenaPadding - .2;
        let bounced = false;
        if (this.pos.x < minX) { this.pos.x = minX; this.vel.x =  abs(this.vel.x); bounced = true; }
        if (this.pos.x > maxX) { this.pos.x = maxX; this.vel.x = -abs(this.vel.x); bounced = true; }
        if (this.pos.y < minY) { this.pos.y = minY; this.vel.y =  abs(this.vel.y); bounced = true; }
        if (this.pos.y > maxY) { this.pos.y = maxY; this.vel.y = -abs(this.vel.y); bounced = true; }
        if (bounced)
        {
            if (--this.bouncesLeft < 0) { this.destroy(); return; }
            sfxHit.play(this.pos);
            burst(this.pos, 6, rgb(1, .5, .2));
        }
        if (this.life <= 0) this.destroy();
    }
    render()
    {
        const glow = .85 + Math.sin(this.phase) * .15;
        drawRect(this.pos, vec2(.6 * glow), rgb(1, .3, .1, .4));
        drawRect(this.pos, vec2(.4), rgb(1, .5, .2));
        drawRect(this.pos, vec2(.22), rgb(1, 1, .6));
    }
}

// Tank: slow red+blue treaded vehicle. Aims turret at player, fires bouncing shells.
class Tank extends KillableEnemy
{
    constructor(pos)
    {
        super(pos, vec2(1.7, 1.5), 1, scoreTank, rgb(1, .25, .3));
        this.vel = randVec2(.04);
        this.shootTimer = randInt(80, 160);
        this.turnTimer = randInt(40, 100);
        this.turretAngle = 0;
    }
    update()
    {
        if (gameOver || playerControlLocked) return;
        this.turnTimer--;
        if (this.turnTimer <= 0)
        {
            this.vel = randVec2(.045);
            this.turnTimer = randInt(60, 140);
        }
        this.pos = this.pos.add(this.vel);
        const minX = -arenaHalf.x + arenaPadding + .85;
        const maxX =  arenaHalf.x - arenaPadding - .85;
        const minY = -arenaHalf.y + arenaPadding + .75;
        const maxY =  arenaHalf.y - arenaPadding - .75;
        if (this.pos.x < minX) { this.pos.x = minX; this.vel.x =  abs(this.vel.x); }
        if (this.pos.x > maxX) { this.pos.x = maxX; this.vel.x = -abs(this.vel.x); }
        if (this.pos.y < minY) { this.pos.y = minY; this.vel.y =  abs(this.vel.y); }
        if (this.pos.y > maxY) { this.pos.y = maxY; this.vel.y = -abs(this.vel.y); }

        if (player)
        {
            const toP = player.pos.subtract(this.pos);
            if (toP.lengthSquared() > .001) this.turretAngle = toP.angle();
            this.shootTimer--;
            if (this.shootTimer <= 0 && toP.length() < 24)
            {
                const dir = vec2(Math.sin(this.turretAngle), Math.cos(this.turretAngle));
                enemyBullets.push(new TankShell(this.pos.add(dir.scale(.9)), dir.scale(.16)));
                sfxMissile.play(this.pos);
                this.shootTimer = randInt(110, 220);
            }
        }
        if (this.flash > 0) this.flash--;
    }
    render()
    {
        const c = this.flash ? rgb(1,1,1) : rgb(.95, .22, .28);    // red body
        const dark = rgb(.35, .05, .08);
        const blue = rgb(.3, .55, 1);
        const blueDark = rgb(.1, .25, .65);
        const trackBob = (Math.floor((this.pos.x + this.pos.y) * 4) % 2) ? .03 : -.03;

        // shadow
        drawRect(this.pos.add(vec2(0, -.85)), vec2(1.8, .16), rgb(0,0,0,.4));
        // treads (top + bottom strips along the body axis)
        drawRect(this.pos.add(vec2(0,  .65)), vec2(1.7, .32), dark);
        drawRect(this.pos.add(vec2(0, -.65)), vec2(1.7, .32), dark);
        // tread wheels (animated bob)
        drawRect(this.pos.add(vec2(-.5,  .65 + trackBob)), vec2(.25, .18), blueDark);
        drawRect(this.pos.add(vec2( .5,  .65 - trackBob)), vec2(.25, .18), blueDark);
        drawRect(this.pos.add(vec2(-.5, -.65 - trackBob)), vec2(.25, .18), blueDark);
        drawRect(this.pos.add(vec2( .5, -.65 + trackBob)), vec2(.25, .18), blueDark);
        // red main body
        drawRect(this.pos, vec2(1.55, 1.0), c);
        // blue side stripe
        drawRect(this.pos, vec2(1.55, .2), blue);
        // turret base (blue)
        drawRect(this.pos, vec2(.85, .85), blueDark);
        drawRect(this.pos, vec2(.7, .7), blue);
        // barrel (rotated toward player)
        const ta = this.turretAngle;
        const tipOffset = vec2(Math.sin(ta), Math.cos(ta));
        drawRect(this.pos.add(tipOffset.scale(.55)), vec2(.22, .9), dark, ta);
        drawRect(this.pos.add(tipOffset.scale(.55)), vec2(.14, .8), c, ta);
        // hatch
        drawRect(this.pos, vec2(.3, .3), rgb(1, .9, .3));
        drawRect(this.pos, vec2(.15, .15), rgb(0,0,0));
    }
}

// Quark: bouncing emerald spawner — drops Tanks like spheroids drop Enforcers
