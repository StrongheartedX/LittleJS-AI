<!DOCTYPE html><head>

 <script>
'use strict';

// engine settings
debugWatermark = false; // Hide debug watermark in corner
showEngineVersion = false; // Hide engine version console display

// Touch gamepad: 8-way digital stick is perfect for a 4-direction grid game.
touchGamepadEnable = true;
touchGamepadAnalog = false;
touchGamepadButtonCount = 0;
touchGamepadAlpha = .35;

// -----------------------------------------------------------------------------
// Pac-Man (tiny) — grid movement + simple ghosts
// Controls: Arrow Keys = move, R = restart
// Goal: eat all pellets; power pellets let you eat ghosts.
// -----------------------------------------------------------------------------

// --- tuneables
const TILE = 1;
const PLAYER_SPEED = .12;       // tiles per frame (60 fps fixed)
const GHOST_SPEED  = .115;
const FRIGHT_SPEED = .075;
const EYE_SPEED    = .19;       // eaten ghosts hustle home as eyes
const POWER_FRAMES = 60*7;
const FRIGHT_FLASH_FRAMES = 60*2; // last 2 seconds of fright blink white
const READY_FRAMES = 60*2;        // "READY!" intro at game start and after a death

// "Cruise Elroy" Blinky: once the maze is mostly cleared, Blinky stops scattering
// and gets a small speed boost so the endgame doesn't drag.
const ELROY_PELLET_THRESHOLD = 50;
const ELROY_SPEED_MULT = 1.07;

// Bonus fruit: appears below the ghost house after eating these pellet counts.
// First fruit gives 100 (cherry), second 300 (strawberry).
const FRUIT_THRESHOLDS = [70, 170];
const FRUIT_VALUES = [100, 300];
const FRUIT_DURATION = 60*9;          // 9 seconds on screen
const FRUIT_FLASH_FRAMES = 60*2;      // last 2 seconds blink to warn it's about to expire
const FRUIT_CELL_X = [13, 14];        // collected if Pac-Man's cell is either of these...
const FRUIT_CELL_Y = 13;              // ...at this row (the open corridor below the house)

// Arcade-style global scatter/chase schedule shared by all live ghosts.
// All four reverse direction on every flip; final phase is permanent chase.
const GHOST_MODE_SCHEDULE = [
    {mode: 'scatter', frames: 60*5},
    {mode: 'chase',   frames: 60*20},
    {mode: 'scatter', frames: 60*5},
    {mode: 'chase',   frames: 60*20},
    {mode: 'scatter', frames: 60*5},
    {mode: 'chase',   frames: Infinity}, // remainder of level
];

const COLLIDE_R2 = (.68)**2;

// --- level state
let gridW, gridH;
let walls;              // Uint8Array gridW*gridH (1=wall)
let pellets;            // Uint8Array gridW*gridH (1=pellet)
let powerPellets;       // Uint8Array gridW*gridH (1=power)
let pelletCount = 0;

let startCell;
let ghostStartCells = [];

// --- game state
let player;
let ghosts = [];
let score = 0;
let lives = 3;
let win = false;
let gameOver = false;
let endHoldTimer = 0; // frames before win/gameOver menu surfaces

let powerTimer = 0;
let ghostEatChain = 0;
let readyTimer = 0;
let slowMoUntil = 0;                // wall-clock deadline (timeReal seconds) for ghost-eat hit-stop
let globalMode = 'scatter';        // current phase mode shared by all ghosts
let globalModeTimer = 0;            // frames remaining in this phase
let globalModePhase = 0;            // index into GHOST_MODE_SCHEDULE
let pelletsEaten = 0;               // pellets+power-pellets eaten this run, drives fruit spawns
let fruitTimer = 0;                 // frames remaining for the current bonus fruit (0 = none on screen)
let fruitsSpawned = 0;              // how many bonus fruits have appeared so far this run

// --- sounds
let sPellet, sPower, sEatGhost, sDie, sWin, sFruit;

// -----------------------------------------------------------------------------
function gameInit()
{
    saveDataInit('pacman');
    setCanvasFixedSize(vec2(600, 720));

    // simple bleeps
    sPellet   = new SoundGenerator({frequency: 780, release: .05, volume: .35, randomness: .02});
    sPower    = new SoundGenerator({frequency: 420, release: .14, volume: .5, randomness: .03, pitchJump: 240, pitchJumpTime: .05});
    sEatGhost = new SoundGenerator({frequency: 980, release: .12, volume: .55, randomness: .02, slide: .25});
    sDie      = new Sound([.7,,528,,.2,.6,,2.3,9,,-99,,.1,,,,,.92,.1,.16,112]); // Powerup 6758
    sWin      = new SoundGenerator({frequency: 640, release: .22, volume: .6, randomness: .02, repeatTime: .08});
    sFruit    = new SoundGenerator({frequency: 540, release: .22, volume: .55, randomness: .04, pitchJump: 380, pitchJumpTime: .07});

    setSoundVolume(.8);
    installAutoPause();

    buildLevel();
    resetRun(true);
    buildMenus();
}

function startGame()
{
    resetRun(true);
    score = 0;
    lives = 3;
    setPlaying(true);
}

function quitToTitleWithCleanup()
{
    quitToTitle(() => { resetRun(true); score = 0; lives = 3; });
}

function buildMenus()
{
    if (typeof createMenu !== 'function') return;

    createTitleMenu({
        title: 'PUC-MAN',
        subtitle: 'Eat all the dots',
        onPlay: startGame,
        revealOnClick: false,
        canReveal: () => !isPlaying(),
        showBest: true,
        formatBest: n => 'BEST ' + n,
        items: [
            {type:'button', label:'OPTIONS',     onClick: () => pushMenu('options')},
            {type:'button', label:'HOW TO PLAY', onClick: () => pushMenu('about')},
        ],
    });

    createOptionsMenu();

    createMenu({
        id: 'about',
        title: 'HOW TO PLAY',
        onHide: popMenu,
        items: [
            {type:'text', text:
                'Eat every pellet without getting caught by the ghosts.\n\n' +
                'MOVE with arrow keys, D-pad, or left stick.\n' +
                'POWER PELLETS (big dots) make ghosts blue — chase them for ' +
                'bonus points. Each ghost eaten in one frenzy is worth more.\n\n' +
                'Bonus fruit appears after eating enough pellets. Clear the maze ' +
                'to win. R restarts, Esc pauses.'},
            {type:'separator'},
            {type:'button', label:'BACK', onClick: () => hideMenu('about')},
        ],
    });

    createPauseMenu({
        onRestart: startGame,
        onQuit:    quitToTitleWithCleanup,
        extraItems: [
            {type:'button', id:'options', label:'OPTIONS', onClick: () => pushMenu('options')},
        ],
    });

    createMenu({
        id: 'gameOver',
        title: 'GAME OVER',
        dismissable: false,
        onShow: () =>
        {
            const m = getMenu('gameOver');
            if (!m) return;
            m.getItem('result')?.setLabel(win ? 'YOU WIN!' : 'GAME OVER');
            m.getItem('finalScore')?.setLabel(`SCORE  ${score}`);
            m.getItem('bestScore')?.setLabel(`BEST   ${getBestScore()}`);
        },
        items: [
            {type:'label', id:'result',     text:'GAME OVER'},
            {type:'label', id:'finalScore', text:'SCORE  0'},
            {type:'label', id:'bestScore',  text:'BEST   0'},
            {type:'separator'},
            {type:'button', label:'PLAY AGAIN', onClick: () =>
            {
                hideMenu('gameOver');
                startGame();
            }},
            {type:'button', label:'QUIT TO TITLE', onClick: quitToTitleWithCleanup},
        ],
    });

    installDefaultToolbar();

    // Show the title menu immediately — no click-to-reveal step.
    showMenu('title');
}

// -----------------------------------------------------------------------------
function gameUpdate()
{
    // Pause hotkey: Esc / gamepad Start. Skipped if game-over menu already up.
    const endMenuShowing = (typeof getTopMenu === 'function') && getTopMenu()?.id === 'gameOver';
    if (isPlaying() && !endMenuShowing &&
        (keyWasPressed('Escape') || gamepadWasPressed(9)))
    {
        if (typeof playMenuSound === 'function') playMenuSound('activate');
        if (typeof showMenu === 'function') showMenu('pause');
        inputClearKey('Escape');
        inputClearKey(9, 1, false, true, false);
        return;
    }

    if (!isPlaying()) return; // title screen: maze sits frozen behind the menu

    if (isPlaying() && !win && !gameOver && keyWasPressed('KeyR'))
        return startGame();

    if (win || gameOver)
    {
        if (!endMenuShowing)
        {
            // Brief on-canvas hold for the result banner, then surface the menu.
            if (endHoldTimer > 0) { endHoldTimer--; return; }
            // Track best on the way to the menu.
            submitBestScore(score);
            if (typeof showMenu === 'function') showMenu('gameOver');
        }
        return;
    }

    // "READY!" intro — freeze player + ghosts so nothing moves until it expires
    if (readyTimer > 0)
    {
        readyTimer--;
        return;
    }

    // power timer
    if (powerTimer > 0)
        powerTimer--;
    else
        ghostEatChain = 0;

    // bonus fruit lifetime
    if (fruitTimer > 0)
        fruitTimer--;

    updatePlayer();
    updateGhosts();
    checkCollisions();

    if (pelletCount <= 0)
    {
        win = true;
        endHoldTimer = 90;
        sWin.play();
    }
}

// -----------------------------------------------------------------------------
function gameUpdatePost()
{
    // Fit the whole maze under the HUD strip; offset the camera so the maze sits below the HUD.
    const hudHeight = 56;
    cameraScale = min(mainCanvasSize.x / gridW, (mainCanvasSize.y - hudHeight) / gridH);
    // Shift camera up in world space (= maze down on screen) by half the HUD height.
    cameraPos = vec2(gridW/2, gridH/2 + (hudHeight/2) / cameraScale);
}

// -----------------------------------------------------------------------------
function gameRender()
{
    // Eat-ghost hit-stop. Managed here (not in gameUpdate) because gameUpdate doesn't
    // run while timeScale is 0 — gameRender keeps firing every real frame, so it can
    // both apply and release the freeze. timeReal is wall-clock and ticks regardless.
    timeScale = (timeReal < slowMoUntil) ? 0 : 1;

    // pure black playfield, like the arcade
    drawRect(vec2(gridW/2, gridH/2), vec2(gridW, gridH), rgb(0,0,0));

    // Walls drawn as arcade-style hollow outlines:
    // for each wall cell, lay down a thin blue edge along every side that faces a non-wall.
    // Internal cell-to-cell wall borders are skipped, so connected wall regions read as one shape.
    const wallColor = rgb(.13, .22, .95);
    const doorColor = rgb(1, .72, .82);
    const t = .18;
    for (let y=0; y<gridH; y++)
    for (let x=0; x<gridW; x++)
    {
        const w = isWallXY(x, y);
        if (w === 1)
        {
            const cx = x + .5, cy = y + .5;
            if (isWallXY(x, y+1) !== 1) drawRect(vec2(cx, y+1-t/2), vec2(1, t), wallColor);
            if (isWallXY(x, y-1) !== 1) drawRect(vec2(cx, y+t/2),   vec2(1, t), wallColor);
            if (isWallXY(x+1, y) !== 1) drawRect(vec2(x+1-t/2, cy), vec2(t, 1), wallColor);
            if (isWallXY(x-1, y) !== 1) drawRect(vec2(x+t/2,   cy), vec2(t, 1), wallColor);
        }
        else if (w === 2)
        {
            drawRect(vec2(x+.5, y+.5), vec2(1, .18), doorColor);
        }
    }

    // pellets
    const pelletColor = rgb(1, .72, .68); // arcade peach
    for (let y=0; y<gridH; y++)
    for (let x=0; x<gridW; x++)
    {
        const i = x + y*gridW;
        if (pellets[i])
            drawRect(vec2(x+.5, y+.5), vec2(.16, .16), pelletColor);
        else if (powerPellets[i])
        {
            const pulse = .42 + .12*oscillate(3, 1, time);
            drawCircle(vec2(x+.5, y+.5), pulse, pelletColor);
        }
    }

    // bonus fruit (drawn under the entities so Pac-Man visually walks over it)
    drawFruit();

    // entities
    for (const g of ghosts)
        drawGhost(g);
    drawPac(player);

    // arcade-style "READY!" banner shown at game start and after each death
    // Placed in the open corridor just below the ghost house (one tile tall)
    if (isPlaying() && readyTimer > 0)
        drawText('READY!', vec2(gridW/2, 13.5), 1.0, rgb(1, .92, 0), .05, rgb(0,0,0));
}

// -----------------------------------------------------------------------------
function gameRenderPost()
{
    if (!isPlaying()) return; // title screen — menu owns the display

    // HUD strip
    drawRect(vec2(mainCanvasSize.x/2, 28), vec2(mainCanvasSize.x, 56), hsl(0,0,0,.55), 0, false, true);

    drawTextScreen(`SCORE ${score.toString().padStart(6,'0')}`, vec2(20, 22), 24, hsl(.58, .2, .92), 3, hsl(0,0,0,.7), 'left');
    drawTextScreen(`LIVES ${lives}`, vec2(mainCanvasSize.x - 20, 22), 24, hsl(.58, .2, .92), 3, hsl(0,0,0,.7), 'right');

    // Brief on-canvas banner while the end-hold timer runs; the gameOver menu owns the rest.
    if ((win || gameOver) && endHoldTimer > 0)
        drawCenterBanner(win ? 'YOU WIN!' : 'GAME OVER', '');
}

// -----------------------------------------------------------------------------
// Level

function buildLevel()
{
    // Arcade-style 28x31 maze. Tile legend:
    //   X = wall, D = ghost door, . = pellet, o = power pellet,
    //   _ = empty walkway (no pellet), S = player spawn, E = ghost spawn
    const rows = [
        'XXXXXXXXXXXXXXXXXXXXXXXXXXXX', //  0
        'X............XX............X', //  1
        'X.XXXX.XXXXX.XX.XXXXX.XXXX.X', //  2
        'XoXXXX.XXXXX.XX.XXXXX.XXXXoX', //  3
        'X.XXXX.XXXXX.XX.XXXXX.XXXX.X', //  4
        'X..........................X', //  5
        'X.XXXX.XX.XXXXXXXX.XX.XXXX.X', //  6
        'X.XXXX.XX.XXXXXXXX.XX.XXXX.X', //  7
        'X......XX....XX....XX......X', //  8
        'XXXXXX.XXXXX_XX_XXXXX.XXXXXX', //  9
        'XXXXXX.XXXXX_XX_XXXXX.XXXXXX', // 10
        'XXXXXX.XX__________XX.XXXXXX', // 11  corridor above the ghost house
        'XXXXXX.XX_XXXDDXXX_XX.XXXXXX', // 12  ghost-house top w/ door (DD)
        'XXXXXX.XX_X______X_XX.XXXXXX', // 13
        '______.___X_EEEE_X___.______', // 14  ghosts start INSIDE the house here
        'XXXXXX.XX_X______X_XX.XXXXXX', // 15
        'XXXXXX.XX_XXXXXXXX_XX.XXXXXX', // 16  ghost-house bottom wall
        'XXXXXX.XX__________XX.XXXXXX', // 17
        'XXXXXX.XX_XXXXXXXX_XX.XXXXXX', // 18
        'XXXXXX.XX_XXXXXXXX_XX.XXXXXX', // 19
        'X............XX............X', // 20
        'X.XXXX.XXXXX.XX.XXXXX.XXXX.X', // 21
        'X.XXXX.XXXXX.XX.XXXXX.XXXX.X', // 22
        'Xo..XX........S.......XX..oX', // 23  player spawn (S)
        'XXX.XX.XX.XXXXXXXX.XX.XX.XXX', // 24
        'XXX.XX.XX.XXXXXXXX.XX.XX.XXX', // 25
        'X......XX....XX....XX......X', // 26
        'X.XXXXXXXXXX.XX.XXXXXXXXXX.X', // 27
        'X.XXXXXXXXXX.XX.XXXXXXXXXX.X', // 28
        'X..........................X', // 29
        'XXXXXXXXXXXXXXXXXXXXXXXXXXXX', // 30
    ];

    gridW = rows[0].length;
    gridH = rows.length;
    walls = new Uint8Array(gridW*gridH);
    pellets = new Uint8Array(gridW*gridH);
    powerPellets = new Uint8Array(gridW*gridH);
    pelletCount = 0;

    startCell = vec2(1,1);
    ghostStartCells = [];

    for (let r=0; r<gridH; r++)
    for (let c=0; c<gridW; c++)
    {
        const ch = rows[r][c];
        const x = c;
        const y = gridH-1-r; // flip so y increases upward
        const i = x + y*gridW;

        if (ch === 'X')           walls[i] = 1;
        else if (ch === 'D')      walls[i] = 2;     // ghost door
        else if (ch === '.')      { pellets[i] = 1;       pelletCount++; }
        else if (ch === 'o')      { powerPellets[i] = 1;  pelletCount++; }
        else if (ch === 'S')      startCell = vec2(x, y);
        else if (ch === 'E')      ghostStartCells.push(vec2(x, y));
        // '_' and anything else = empty walkway, nothing to set
    }
}

function resetRun(isFirst)
{
    score = 0;
    lives = 3;
    win = false;
    gameOver = false;
    powerTimer = 0;
    ghostEatChain = 0;
    pelletsEaten = 0;
    fruitTimer = 0;
    fruitsSpawned = 0;

    // rebuild pellets every run
    buildLevel();

    player = makeMover(startCell, vec2(-1,0));
    player.desiredDir = vec2(-1,0);
    player.faceDir = vec2(-1,0);

    // global mode reset to the first scatter phase of the schedule
    globalModePhase = 0;
    globalMode = GHOST_MODE_SCHEDULE[0].mode;
    globalModeTimer = GHOST_MODE_SCHEDULE[0].frames;

    // colors keyed to ghost personality: Blinky red, Pinky pink, Inky cyan, Clyde orange
    const colors = [rgb(.95,.25,.25), rgb(.95,.55,.9), rgb(.25,.85,.95), rgb(.95,.65,.2)];
    ghosts = [];
    for (let i=0; i<min(4, ghostStartCells.length); i++)
    {
        const g = makeMover(ghostStartCells[i], vec2(-1,0), true);
        g.color = colors[i%colors.length];
        g.frightened = false;
        g.pendingReverse = false;
        g.eaten = false;
        g.homeCell = ghostStartCells[i].copy();
        g.inHouse = true;          // each starts inside the ghost house
        g.respawnTimer = i * 45;   // staggered exit: 0, 0.75s, 1.5s, 2.25s
        ghosts.push(g);
    }

    readyTimer = READY_FRAMES;

    if (!isFirst)
        sPower.play();
}

// -----------------------------------------------------------------------------
// Grid movers

function makeMover(cell, dir, isGhost=false)
{
    return {
        cell: vec2(cell.x, cell.y), // integer
        dir: dir.copy(),            // -1/0/1
        t: 0,                       // 0..1 progress to next cell
        pos: vec2(cell.x+.5, cell.y+.5),
        isGhost,                    // gates whether the ghost door blocks this mover
        eaten: false,               // when true the mover is "eyes" returning home
    };
}

function moverUpdatePos(m)
{
    const base = vec2(m.cell.x+.5, m.cell.y+.5);
    m.pos = base.add(m.dir.scale(m.t));
}

function canMove(cell, dir, asGhost=false, asEaten=false)
{
    if (!dir.x && !dir.y)
        return true;

    let nx = cell.x + dir.x;
    let ny = cell.y + dir.y;

    // wrap tunnels (left/right)
    if (nx < 0) nx = gridW-1;
    else if (nx >= gridW) nx = 0;

    const w = isWallXY(nx, ny);
    if (w === 1) return false;             // solid wall
    if (w === 2)                            // ghost door
    {
        if (!asGhost) return false;        // pac-man bounces off
        return asEaten || dir.y > 0;       // eaten ghosts pass either way; live ghosts only exit upward
    }
    return true;
}

function stepCell(cell, dir)
{
    let nx = cell.x + dir.x;
    let ny = cell.y + dir.y;

    // wrap tunnels (left/right)
    if (nx < 0) nx = gridW-1;
    else if (nx >= gridW) nx = 0;

    return vec2(nx, ny);
}

function tickMover(m, speed, onArriveCenter)
{
    // Robust grid stepping: we may cross a cell center this frame even if speed doesn't divide 1.
    let remaining = speed;

    for (let guard=0; guard<12 && remaining > 0; guard++)
    {
        if (!m.dir.x && !m.dir.y)
            break;

        // if we're at a center and the next cell is blocked, stop immediately (no "bounce"/penetration)
        if (m.t <= 1e-6 && !canMove(m.cell, m.dir, m.isGhost, m.eaten))
        {
            m.dir = vec2(0,0);
            m.t = 0;
            break;
        }

        const distToCenter = 1 - m.t;
        if (remaining < distToCenter)
        {
            m.t += remaining;
            remaining = 0;
            break;
        }

        // arrive at next cell center
        remaining -= distToCenter;
        m.t = 0;

        if (!canMove(m.cell, m.dir, m.isGhost, m.eaten))
        {
            m.dir = vec2(0,0);
            break;
        }

        m.cell = stepCell(m.cell, m.dir);

        // allow game logic to run exactly at centers (turns, eating pellets, ghost AI)
        onArriveCenter && onArriveCenter(m);
    }

    moverUpdatePos(m);
}

function atCellCenter(m)
{
    return m.t <= 1e-6;
}

function reverseMover(m)
{
    // Flip direction instantly mid-cell. The cell we were heading toward becomes the
    // new "from" cell, and our remaining-distance becomes 1 - t. Position is unchanged.
    if (!m.dir.x && !m.dir.y)
        return;
    m.cell = stepCell(m.cell, m.dir);
    m.dir = m.dir.scale(-1);
    m.t = 1 - m.t;
    moverUpdatePos(m);
}

// -----------------------------------------------------------------------------
// Player

function updatePlayer()
{
    // buffer desired direction: the most recent key press wins (arcade-style)
    if (keyWasPressed('ArrowUp'))         player.desiredDir = vec2(0,1);
    else if (keyWasPressed('ArrowDown'))  player.desiredDir = vec2(0,-1);
    else if (keyWasPressed('ArrowLeft'))  player.desiredDir = vec2(-1,0);
    else if (keyWasPressed('ArrowRight')) player.desiredDir = vec2(1,0);

    // gamepad / touch / d-pad: live read, cardinal-only (whichever axis is dominant).
    // Held-stick acts like holding an arcade joystick.
    const stick = gamepadStick(0);
    if (stick.lengthSquared() > .25*.25)
    {
        player.desiredDir = abs(stick.x) > abs(stick.y)
            ? vec2(sign(stick.x), 0)
            : vec2(0, sign(stick.y));
    }

    // mid-cell reverse: if desiredDir is the opposite of current dir, flip instantly
    if ((player.dir.x || player.dir.y) &&
        player.desiredDir.x === -player.dir.x &&
        player.desiredDir.y === -player.dir.y &&
        !atCellCenter(player))
    {
        reverseMover(player);
        player.faceDir = player.dir.copy();
    }

    const onCenter = (p) =>
    {
        // eat pellets/power the instant we reach a cell center
        eatAtCell(p.cell);

        // apply buffered turn at centers
        if (canMove(p.cell, p.desiredDir))
            p.dir = p.desiredDir.copy();
        else if (!canMove(p.cell, p.dir))
            p.dir = vec2(0,0);

        // remember facing direction for drawing
        if (p.dir.x || p.dir.y)
            p.faceDir = p.dir.copy();
    };

    // if already at a center, run center logic before moving
    if (atCellCenter(player))
        onCenter(player);

    tickMover(player, PLAYER_SPEED, onCenter);
}

function eatAtCell(cell)
{
    const i = cell.x + cell.y*gridW;
    let atePellet = false;
    if (pellets[i])
    {
        pellets[i] = 0;
        pelletCount--;
        score += 10;
        sPellet.play();
        atePellet = true;
    }
    else if (powerPellets[i])
    {
        powerPellets[i] = 0;
        pelletCount--;
        score += 50;
        powerTimer = POWER_FRAMES;
        ghostEatChain = 0;
        for (const g of ghosts)
        {
            // eyes returning home ignore the new power pellet — they keep heading to jail
            if (g.eaten) continue;
            g.frightened = true;
            g.pendingReverse = true; // arcade: ghosts reverse the instant fright starts
        }
        sPower.play();
        atePellet = true;
    }

    // Bonus fruit spawn check — fires when crossing a threshold count of pellets eaten
    if (atePellet)
    {
        pelletsEaten++;
        if (fruitTimer <= 0
            && fruitsSpawned < FRUIT_THRESHOLDS.length
            && pelletsEaten >= FRUIT_THRESHOLDS[fruitsSpawned])
        {
            fruitTimer = FRUIT_DURATION;
            fruitsSpawned++;
        }
    }

    // Bonus fruit collection — Pac-Man passes through the fruit cells under the house
    if (fruitTimer > 0 && cell.y === FRUIT_CELL_Y && FRUIT_CELL_X.includes(cell.x))
    {
        score += FRUIT_VALUES[fruitsSpawned - 1] || FRUIT_VALUES[0];
        fruitTimer = 0;
        sFruit.play();
    }
}

// -----------------------------------------------------------------------------
// Ghosts

function updateGhosts()
{
    const powered = powerTimer > 0;
    // fright applies only to ghosts that are out and about — house residents and eyes keep their state
    for (const g of ghosts)
        g.frightened = powered && !g.inHouse && !g.eaten;

    // Tick the global scatter/chase schedule. When the phase flips, all out-and-about
    // ghosts reverse direction (arcade behavior — catches the player off guard).
    if (!powered && globalModeTimer !== Infinity && --globalModeTimer <= 0)
    {
        if (globalModePhase < GHOST_MODE_SCHEDULE.length - 1)
        {
            globalModePhase++;
            const next = GHOST_MODE_SCHEDULE[globalModePhase];
            globalMode = next.mode;
            globalModeTimer = next.frames;
            for (const g of ghosts)
                if (!g.inHouse && !g.eaten)
                    g.pendingReverse = true;
        }
    }

    for (const g of ghosts)
    {
        // jailed: count down, stay put, skip AI + movement entirely
        if (g.respawnTimer > 0)
        {
            g.respawnTimer--;
            moverUpdatePos(g);
            continue;
        }

        // honor a pending reverse (e.g. player just ate a power pellet) — eyes ignore reversal
        if (g.pendingReverse)
        {
            if (!g.eaten) reverseMover(g);
            g.pendingReverse = false;
        }

        const onCenter = (gm) =>
        {
            // eaten ghost arriving at its home cell — turn back into a live ghost and jail it briefly
            if (gm.eaten && gm.cell.x === gm.homeCell.x && gm.cell.y === gm.homeCell.y)
            {
                gm.eaten = false;
                gm.inHouse = true;
                gm.respawnTimer = 45;
                gm.dir = vec2(0, 0);
                return;
            }

            // once we make it above the door, we're out of the house
            if (gm.inHouse && gm.cell.y >= 19)
                gm.inHouse = false;

            const choices = getMoveChoices(gm.cell, true, gm.eaten);

            // Avoid reversing unless forced. Eaten ghosts also follow this rule so the
            // greedy AI can't oscillate between two equally-bad cells. The "free U-turn"
            // they need on first frame is handled by clearing dir to 0 when eaten in
            // checkCollisions — back=(0,0) then matches no direction so nothing filters.
            const back = gm.dir.scale(-1);
            const filtered = choices.filter(d => !(d.x===back.x && d.y===back.y));
            const dirs = filtered.length ? filtered : choices;

            // in-house ghosts head for the exit; eyes home in on their cell; otherwise normal chase/fright
            gm.dir = (gm.frightened && !gm.inHouse && !gm.eaten)
                ? chooseFrightDir(dirs, gm)
                : chooseChaseDir(dirs, gm);
        };

        // if already at a center, decide direction before moving
        if (atCellCenter(g))
            onCenter(g);

        // Blinky "Cruise Elroy": picks up the pace when most pellets are gone
        const isElroy = ghosts[0] === g && pelletCount <= ELROY_PELLET_THRESHOLD && !g.inHouse && !g.eaten;
        const chaseSpd = isElroy ? GHOST_SPEED * ELROY_SPEED_MULT : GHOST_SPEED;
        const spd = g.eaten ? EYE_SPEED : (g.frightened ? FRIGHT_SPEED : chaseSpd);
        tickMover(g, spd, onCenter);
    }
}

function getMoveChoices(cell, asGhost=false, asEaten=false)
{
    const dirs = [vec2(1,0), vec2(-1,0), vec2(0,1), vec2(0,-1)];
    return dirs.filter(d => canMove(cell, d, asGhost, asEaten));
}

// Exit point just above the door — ghosts in the house aim here so the greedy chase
// AI threads them up through the door instead of bouncing around inside.
const HOUSE_EXIT = vec2(13, 19);

// Per-personality scatter corners. Each ghost retreats to a different corner when scattering.
function ghostScatterCorner(idx)
{
    switch (idx)
    {
        case 0: return vec2(gridW-2, gridH-2); // Blinky → top-right
        case 1: return vec2(1, gridH-2);       // Pinky  → top-left
        case 2: return vec2(gridW-2, 1);       // Inky   → bottom-right
        default: return vec2(1, 1);            // Clyde  → bottom-left
    }
}

// Compute each ghost's chase target based on its personality (Blinky/Pinky/Inky/Clyde).
function getGhostTarget(g)
{
    if (g.eaten)   return g.homeCell;
    if (g.inHouse) return HOUSE_EXIT;

    const idx = ghosts.indexOf(g);

    // Cruise Elroy Blinky ignores scatter — once the maze is mostly cleared he locks on.
    const isElroy = (idx === 0) && (pelletCount <= ELROY_PELLET_THRESHOLD);
    if (globalMode === 'scatter' && !isElroy)
        return ghostScatterCorner(idx);

    const pacCell = player.cell;
    const pacDir  = (player.faceDir && (player.faceDir.x || player.faceDir.y)) ? player.faceDir : vec2(1, 0);

    const dx = pacCell.x - g.cell.x;
    const dy = pacCell.y - g.cell.y;
    const dist2 = dx*dx + dy*dy;

    switch (idx)
    {
        case 0: // Blinky — chase Pac-Man's tile directly
            return pacCell;
        case 1: // Pinky — ambush 4 tiles ahead, but at close range chase directly so you
                //         can't simply walk away from him
            if (dist2 < 16) return pacCell;
            return vec2(pacCell.x + pacDir.x*4, pacCell.y + pacDir.y*4);
        case 2: // Inky — pivot 2 ahead of Pac, then mirror through Blinky's tile
        {
            const pivot = vec2(pacCell.x + pacDir.x*2, pacCell.y + pacDir.y*2);
            const blinky = (ghosts[0] && !ghosts[0].eaten) ? ghosts[0].cell : pacCell;
            return vec2(2*pivot.x - blinky.x, 2*pivot.y - blinky.y);
        }
        case 3: // Clyde — chase like Blinky when far (>5 tiles), retreat to corner when close
            return (dist2 > 25) ? pacCell : ghostScatterCorner(3);
    }
    return pacCell;
}

function chooseChaseDir(dirs, g)
{
    const targetCell = getGhostTarget(g);

    // pick direction that minimizes squared distance to target tile
    let best = dirs[0];
    let bestD = 1e9;
    for (const d of dirs)
    {
        const n = stepCell(g.cell, d);
        const dx = targetCell.x - n.x;
        const dy = targetCell.y - n.y;
        const dist = dx*dx + dy*dy;
        if (dist < bestD)
        {
            bestD = dist;
            best = d;
        }
    }
    return best;
}

function chooseFrightDir(dirs, g)
{
    // When powered up, ghosts try to run AWAY from the player.
    // Pick direction that MAXIMIZES distance to player.
    let best = dirs[0];
    let bestD = -1;
    for (const d of dirs)
    {
        const n = stepCell(g.cell, d);
        const dx = player.cell.x - n.x;
        const dy = player.cell.y - n.y;
        const dist = dx*dx + dy*dy;
        if (dist > bestD)
        {
            bestD = dist;
            best = d;
        }
    }
    return best;
}

function randomChoice(a)
{
    return a[randInt(a.length)];
}

// -----------------------------------------------------------------------------
// Collisions + life

function checkCollisions()
{
    for (const g of ghosts)
    {
        // eyes already returning home don't interact with Pac-Man at all
        if (g.eaten)
            continue;
        if (g.pos.distanceSquared(player.pos) > COLLIDE_R2)
            continue;

        if (g.frightened)
        {
            ghostEatChain++;
            const ghostScore = 200 * (1 << min(3, ghostEatChain-1));
            score += ghostScore;
            sEatGhost.play();

            // Become eyes and head home from wherever Pac-Man caught us. The travel back
            // happens at EYE_SPEED via the eaten branch in updateGhosts.
            // Clear dir + snap to the cell center so the very first onCenter decision
            // can pick any direction (including a U-turn toward home) — afterwards the
            // no-reverse filter applies normally and prevents stuck oscillation.
            g.eaten = true;
            g.frightened = false;
            g.pendingReverse = false;
            g.dir = vec2(0, 0);
            g.t = 0;
            moverUpdatePos(g);

            // arcade hit-stop: hard-freeze briefly so the eat lands with some oomph
            slowMoUntil = timeReal + 0.25;
        }
        else if (!g.inHouse)
        {
            // only ghosts that are actually out of the house can hurt the player
            onPlayerDie();
            return;
        }
    }
}

function onPlayerDie()
{
    lives--;
    sDie.play();

    if (lives <= 0)
    {
        gameOver = true;
        endHoldTimer = 90;
        return;
    }

    // reset positions only
    player.cell = startCell.copy();
    player.dir = vec2(-1,0);
    player.desiredDir = vec2(-1,0);
    player.faceDir = vec2(-1,0);
    player.t = 0;
    moverUpdatePos(player);

    for (let i=0; i<ghosts.length; i++)
    {
        const g = ghosts[i];
        g.cell = g.homeCell.copy();
        g.dir = vec2(-1,0);
        g.t = 0;
        g.pendingReverse = false;
        g.inHouse = true;
        g.eaten = false;
        g.respawnTimer = i * 45;
        moverUpdatePos(g);
    }

    powerTimer = 0;
    ghostEatChain = 0;
    readyTimer = READY_FRAMES;
}

// -----------------------------------------------------------------------------
// Collision helpers (grid)

function isWallXY(x, y)
{
    if (x < 0 || y < 0 || x >= gridW || y >= gridH)
        return 1;
    return walls[x + y*gridW];
}

function setWallXY(x, y, v)
{
    if (x < 0 || y < 0 || x >= gridW || y >= gridH)
        return;
    walls[x + y*gridW] = v ? 1 : 0;
}

// -----------------------------------------------------------------------------
// Drawing helpers

function drawPac(p)
{
    const diameter = .9;
    const r = diameter / 2;

    // face the last movement direction so the mouth points the right way when stopped
    const face = (p.faceDir && (p.faceDir.x || p.faceDir.y)) ? p.faceDir : (p.desiredDir || vec2(1,0));
    const faceAngle = face.angle();

    // chomp animation: open/close as a fraction 0..1.
    // Frozen during the READY intro so Pac-Man holds a still, slightly-open pose.
    const moving = (p.dir.x || p.dir.y) && readyTimer <= 0;
    const phase = moving ? oscillate(6, 1, time) : .25;
    const halfMouth = phase * PI/4.5;          // up to 40-degree half-angle

    if (halfMouth < .03)
    {
        // mouth essentially closed — just a solid circle
        drawCircle(p.pos, diameter, rgb(1, .92, 0));
        return;
    }

    // Single yellow polygon: apex at Pac-Man's center, then arc around the body
    // from one mouth edge, all the way around, to the other mouth edge.
    // The mouth gap is the wedge BETWEEN the two arc endpoints (back through the center).
    const N = 32;
    const sweep = 2*PI - 2*halfMouth;
    const points = [vec2(0, 0)];
    for (let i = 0; i <= N; i++)
    {
        const a = halfMouth + sweep * (i / N);
        points.push(vec2(Math.sin(a)*r, Math.cos(a)*r));
    }
    drawPoly(points, rgb(1, .92, 0), 0, rgb(0,0,0), p.pos, faceAngle);
}


// Build the ghost body outline once — dome on top, scalloped 3-hump bottom.
const _ghostShape = (() =>
{
    const r = .42;
    const sideY = -.32;
    const humpDepth = .14;
    const N = 12;
    const pts = [];
    // dome semicircle: (-r,0) over (0,r) to (r,0)
    for (let i = 0; i <= N; i++)
    {
        const a = PI - PI * (i/N);
        pts.push(vec2(r * Math.cos(a), r * Math.sin(a)));
    }
    // right side straight down
    pts.push(vec2(r, sideY));
    // 3 scalloped humps right -> left
    pts.push(vec2( 2*r/3, sideY - humpDepth));
    pts.push(vec2(   r/3, sideY));
    pts.push(vec2(     0, sideY - humpDepth));
    pts.push(vec2(  -r/3, sideY));
    pts.push(vec2(-2*r/3, sideY - humpDepth));
    // left side back up to the dome
    pts.push(vec2(-r, sideY));
    return pts;
})();

function drawGhost(g)
{
    // eaten ghosts are eyes-only — no body, no bob, no fright color
    const eaten = g.eaten;
    const frightened = !eaten && (powerTimer > 0) && !g.inHouse;
    // last 2 seconds of fright: alternate blue/white at ~4 Hz to warn the player
    const flashing = frightened && powerTimer < FRIGHT_FLASH_FRAMES && (((powerTimer/15)|0) & 1);
    const bodyColor = flashing ? rgb(.95,.95,.98) : (frightened ? rgb(.13,.13,.95) : g.color);

    const bob = eaten ? 0 : .045*oscillate(1.8, 1, time + g.cell.x*.13 + g.cell.y*.17);
    const center = g.pos.add(vec2(0, bob));

    // body as a single polygon — skipped entirely while returning home as eyes
    if (!eaten)
        drawPoly(_ghostShape, bodyColor, 0, rgb(0,0,0), center, 0);

    // face
    const eyeY = .08;
    const eyeDX = .15;
    if (frightened)
    {
        // pac-style scared face: small dot eyes + a wavy mouth band
        const faceColor = flashing ? rgb(.9,.15,.15) : rgb(.95,.95,.98);
        drawRect(center.add(vec2(-eyeDX, eyeY)), vec2(.10, .14), faceColor);
        drawRect(center.add(vec2(+eyeDX, eyeY)), vec2(.10, .14), faceColor);

        // zigzag mouth as a single polygon
        const mw = .19, mh = .04, by = -.12;
        const seg = mw/3;
        const top = [
            vec2(-mw, by), vec2(-mw+seg*.5, by+mh), vec2(-mw+seg, by),
            vec2(-mw+seg*1.5, by+mh), vec2(-mw+seg*2, by),
            vec2(-mw+seg*2.5, by+mh), vec2( mw, by),
        ];
        const bot = top.slice().reverse().map(v => vec2(v.x, v.y - .06));
        drawPoly(top.concat(bot), faceColor, 0, rgb(0,0,0), center, 0);
    }
    else
    {
        // arcade-style eyes: large whites, dark-blue pupil that drifts toward motion
        const look = (g.dir.x || g.dir.y) ? g.dir.normalize().scale(.06) : vec2();
        const eL = center.add(vec2(-eyeDX, eyeY));
        const eR = center.add(vec2(+eyeDX, eyeY));
        // ~2x previous size; whites are taller than wide like the arcade
        drawEllipse(eL, vec2(.22, .28), rgb(1,1,1));
        drawEllipse(eR, vec2(.22, .28), rgb(1,1,1));
        drawCircle(eL.add(look), .14, rgb(.08,.18,.65));
        drawCircle(eR.add(look), .14, rgb(.08,.18,.65));
    }
}

// Arcade-style bonus cherry, rendered with primitives. Hidden when fruitTimer is 0
// and blinks during the final FRUIT_FLASH_FRAMES so the player knows time's running out.
function drawFruit()
{
    if (fruitTimer <= 0) return;
    if (fruitTimer < FRUIT_FLASH_FRAMES && (((fruitTimer/8)|0) & 1)) return;

    const cx = gridW/2;
    const cy = FRUIT_CELL_Y + .5;

    // two cherries (slight color difference between them so they read as separate)
    drawCircle(vec2(cx - .15, cy - .05), .42, rgb(.95, .12, .12));
    drawCircle(vec2(cx + .15, cy - .05), .42, rgb(.82, .08, .08));

    // highlights for that glossy arcade look
    drawCircle(vec2(cx - .22, cy - .14), .12, rgb(1, .6, .6));
    drawCircle(vec2(cx + .09, cy - .14), .12, rgb(1, .55, .55));

    // stems converging up to a joining point
    const joinX = cx + .03;
    const joinY = cy + .35;
    const stemColor = rgb(.45, .26, .12);
    drawLine(vec2(cx - .14, cy + .14), vec2(joinX, joinY), .06, stemColor);
    drawLine(vec2(cx + .19, cy + .14), vec2(joinX, joinY), .06, stemColor);

    // a small tilted leaf at the stem join
    drawEllipse(vec2(joinX + .18, joinY - .04), vec2(.22, .1), rgb(.25, .8, .25), -.6);
}

function drawCenterBanner(title, subtitle)
{
    drawRect(mainCanvasSize.scale(.5), vec2(720, 190), hsl(0,0,0,.7), 0, false, true);
    drawTextScreen(title, vec2(mainCanvasSize.x/2, mainCanvasSize.y/2 - 18), 92, hsl(.12,.2,1), 10, hsl(0,0,0,.9));
    drawTextScreen(subtitle, vec2(mainCanvasSize.x/2, mainCanvasSize.y/2 + 62), 30, hsl(.58,.1,.95), 6, hsl(0,0,0,.9));
}
// -----------------------------------------------------------------------------
// Startup LittleJS Engine
engineInit(gameInit, gameUpdate, gameUpdatePost, gameRender, gameRenderPost);
