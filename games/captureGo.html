<!DOCTYPE html><head>
<title>Capture Go</title>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
</head><body style="background:#000">
<script src="../dist/littlejs.js?1.18.12"></script>
<script src="../templates/menus.js"></script>
<script src="../templates/gameAI.js"></script>
<script src="../templates/soundGenerator.js"></script>
<script>
'use strict';

// engine settings, do not remove
debugWatermark = false;
showEngineVersion = false;
paused = false;

gravity = vec2(0, 0);
cameraPos = vec2(0, 0);
cameraScale = 60;

///////////////////////////////////////////////////////////////////////////////
// CAPTURE GO (ATARI GO) — 9×9

const BOARD_SIZE = 9;
const CELL_SIZE  = 1.0;   // world units between intersections
const STONE_RADIUS = 0.4; // world units

const STONE_EMPTY = 0;
const STONE_BLACK = 1;
const STONE_WHITE = 2;

const PLAYER_HUMAN = STONE_BLACK;
const PLAYER_AI    = STONE_WHITE;

// Hoshi (star-point) intersections
const HOSHI = [[2,2],[2,6],[4,4],[6,2],[6,6]];

// Orthogonal directions
const DIRS = [[-1,0],[1,0],[0,-1],[0,1]];

///////////////////////////////////////////////////////////////////////////////
// GAME STATE

let board = [];
let currentPlayer = STONE_BLACK;
let gameOver  = false;
let winner    = null;
let lastMove  = null;   // {row, col}
let blackCaptures = 0;  // stones black has captured (white stones removed)
let whiteCaptures = 0;  // stones white has captured (black stones removed)

// Ko: store the board hash (JSON string) BEFORE the previous player's last
// move so we can reject moves that recreate it.
let previousBoardHash = null; // board state before the opponent's last move
let boardHashBeforeMove = null; // scratch used during move processing

let isPlaying = false;
let gameMode  = 'pvp'; // 'pvp' | 'ai' | 'aivai'
let difficulty = 'hard'; // 'easy' | 'medium' | 'hard' — loaded from localStorage in gameInit

// AI timing
let aiThinkTimer = 0;
const AI_THINK_DELAY = 0.6;
const AI_VS_AI_DELAY = 0.6;

// Animation
let hoverIntersection = null; // {row, col} under cursor
let placingStone = null;      // {row, col, progress} for spawn pop animation
const PLACE_DURATION = 0.18;

// Sounds
let sfxPlace, sfxWin, sfxLose, sfxSelect;

///////////////////////////////////////////////////////////////////////////////
// BOARD LOGIC HELPERS

function initBoard()
{
    board = [];
    for (let r = 0; r < BOARD_SIZE; r++)
    {
        board[r] = [];
        for (let c = 0; c < BOARD_SIZE; c++)
            board[r][c] = STONE_EMPTY;
    }
    currentPlayer = STONE_BLACK;
    gameOver      = false;
    winner        = null;
    lastMove      = null;
    blackCaptures = 0;
    whiteCaptures = 0;
    previousBoardHash = null;
    boardHashBeforeMove = null;
    placingStone  = null;
    hoverIntersection = null;
}

function getOpponent(player)
{
    return player === STONE_BLACK ? STONE_WHITE : STONE_BLACK;
}

function isInBounds(row, col)
{
    return row >= 0 && row < BOARD_SIZE && col >= 0 && col < BOARD_SIZE;
}

// BFS: find the group containing (row, col) and count its liberties.
// Returns { stones: [{row,col},...], liberties: number }.
function getGroupAndLiberties(b, row, col)
{
    const color = b[row][col];
    if (color === STONE_EMPTY) return { stones: [], liberties: 0 };

    const visited   = new Set();
    const libertySet = new Set();
    const stones    = [];
    const queue     = [{row, col}];
    visited.add(`${row},${col}`);

    while (queue.length > 0)
    {
        const {row: r, col: c} = queue.shift();
        stones.push({row: r, col: c});

        for (const [dr, dc] of DIRS)
        {
            const nr = r + dr, nc = c + dc;
            if (!isInBounds(nr, nc)) continue;
            const key = `${nr},${nc}`;
            if (b[nr][nc] === STONE_EMPTY)
            {
                libertySet.add(key);
            }
            else if (b[nr][nc] === color && !visited.has(key))
            {
                visited.add(key);
                queue.push({row: nr, col: nc});
            }
        }
    }
    return { stones, liberties: libertySet.size };
}

// Deep-copy a board array.
function cloneBoard(b)
{
    return b.map(row => [...row]);
}

function boardHash(b)
{
    return JSON.stringify(b);
}

// Place a stone on board b at (row, col) for player, apply captures.
// Returns { newBoard, captured } or { newBoard: null } if illegal (occupied /
// suicide / ko). koHash is the board hash to reject (optional).
// State-parameterized version — operates on any board, used by both live game and AI search.
function applyMoveAndCapturesForState(b, row, col, player, koHash)
{
    if (b[row][col] !== STONE_EMPTY)
        return { newBoard: null, captured: 0 };

    const nb = cloneBoard(b);
    nb[row][col] = player;

    const opponent = getOpponent(player);
    let captured = 0;

    // Check all orthogonal neighbors for opponent groups with 0 liberties.
    const checkedGroups = new Set();
    for (const [dr, dc] of DIRS)
    {
        const nr = row + dr, nc = col + dc;
        if (!isInBounds(nr, nc)) continue;
        if (nb[nr][nc] !== opponent) continue;
        const key = `${nr},${nc}`;
        if (checkedGroups.has(key)) continue;

        const { stones, liberties } = getGroupAndLiberties(nb, nr, nc);
        // Mark all stones of this group as checked.
        for (const s of stones)
            checkedGroups.add(`${s.row},${s.col}`);

        if (liberties === 0)
        {
            // Capture the whole group.
            for (const s of stones)
                nb[s.row][s.col] = STONE_EMPTY;
            captured += stones.length;
        }
    }

    // Suicide check: player's new group must have at least 1 liberty.
    const { liberties: ownLiberties } = getGroupAndLiberties(nb, row, col);
    if (ownLiberties === 0)
        return { newBoard: null, captured: 0 }; // suicide — illegal

    // Ko check: resulting board must not match the provided hash.
    if (koHash !== null && koHash !== undefined && boardHash(nb) === koHash)
        return { newBoard: null, captured: 0 }; // ko — illegal

    return { newBoard: nb, captured };
}

// Thin wrapper — delegates to state version using the live board and ko hash.
function applyMoveAndCaptures(b, row, col, player, koHash)
{
    return applyMoveAndCapturesForState(b, row, col, player, koHash);
}

// State-parameterized legality check — used by both live game and AI search.
function isLegalMoveForState(b, row, col, player, koHash)
{
    const { newBoard } = applyMoveAndCapturesForState(b, row, col, player, koHash);
    return newBoard !== null;
}

// Thin wrapper — delegates to state version using the live board and ko hash.
function isLegalMove(b, row, col, player, koHash)
{
    return isLegalMoveForState(b, row, col, player, koHash);
}

///////////////////////////////////////////////////////////////////////////////
// AI ADAPTER

function getCurrentState()
{
    return {
        board: board.map(row => [...row]),
        currentPlayer: currentPlayer,
        gameOver: gameOver,
        previousBoardHash: previousBoardHash,
    };
}

// Heuristic eval for Capture Go (non-terminal positions).
// Returns a score that is positive when player has the advantage.
// Dominant signal: atari detection (group with 1 liberty is about to be captured).
function evalCaptureGo(b, player)
{
    const opponent = player === STONE_BLACK ? STONE_WHITE : STONE_BLACK;
    let score = 0;

    const seen = new Set();
    for (let row = 0; row < BOARD_SIZE; row++)
    {
        for (let col = 0; col < BOARD_SIZE; col++)
        {
            const stone = b[row][col];
            if (stone === STONE_EMPTY) continue;
            const key = row + ',' + col;
            if (seen.has(key)) continue;
            const group = getGroupAndLiberties(b, row, col);
            for (const s of group.stones) seen.add(s.row + ',' + s.col);

            // sign: +1 if this group belongs to player, -1 if opponent
            const sign = (stone === player) ? 1 : -1;

            // Liberty term: more liberties = harder to capture.
            score += sign * group.liberties;

            // Atari penalty/bonus: group with exactly 1 liberty is in immediate danger.
            // Own group in atari is very bad; opponent group in atari is very good.
            if (group.liberties === 1)
                score += sign * -50;
        }
    }
    return score;
}

// Pure-functional adapter for gameAI.js search.
// State shape: { board, currentPlayer, gameOver, previousBoardHash }
const captureGoGame = {
    getOpponent: (player) => player === STONE_BLACK ? STONE_WHITE : STONE_BLACK,
    getCurrentPlayer: (state) => state.currentPlayer,
    isTerminal: (state) => state.gameOver,

    getLegalMoves(state, player)
    {
        const moves = [];
        for (let row = 0; row < BOARD_SIZE; row++)
        {
            for (let col = 0; col < BOARD_SIZE; col++)
            {
                if (isLegalMoveForState(state.board, row, col, player, state.previousBoardHash))
                    moves.push({row, col});
            }
        }
        return moves;
    },

    applyMove(state, move, player)
    {
        const result = applyMoveAndCapturesForState(state.board, move.row, move.col, player, state.previousBoardHash);
        // result.newBoard should always be non-null here (getLegalMoves only returns legal moves)
        const opponent = player === STONE_BLACK ? STONE_WHITE : STONE_BLACK;
        return {
            board: result.newBoard,
            currentPlayer: opponent,
            gameOver: result.captured > 0,
            previousBoardHash: JSON.stringify(state.board), // board state BEFORE this move
        };
    },

    evaluate(state, player)
    {
        // Terminal: by the time isTerminal is true, the player who just moved won.
        // state.currentPlayer is whoever moves next — the loser.
        // So if gameOver and state.currentPlayer === player, player LOST.
        if (state.gameOver)
            return state.currentPlayer === player ? -10000 : 10000;
        return evalCaptureGo(state.board, player);
    },
};

function strategyForDifficulty(d)
{
    if (d === 'easy')   return randomAI;
    if (d === 'medium') return greedyAI;
    return (game, state) => alphaBetaAI(game, state, 5); // 'hard' — depth 5
}

function findBestAIMove()
{
    return strategyForDifficulty(difficulty)(captureGoGame, getCurrentState());
}

///////////////////////////////////////////////////////////////////////////////
// LIVE GAME MOVE

function makeMove(row, col)
{
    if (gameOver || !isPlaying) return false;
    if (!isInBounds(row, col)) return false;

    const { newBoard, captured } = applyMoveAndCaptures(
        board, row, col, currentPlayer, previousBoardHash
    );
    if (newBoard === null) return false; // illegal

    // The ko hash for the NEXT player to use is the current board state
    // BEFORE this move (i.e. what we don't want them to recreate).
    const newKoHash = boardHash(board);

    // Commit.
    board         = newBoard;
    previousBoardHash = newKoHash;
    lastMove      = { row, col };

    // Update capture counts.
    if (currentPlayer === STONE_BLACK)
        blackCaptures += captured;
    else
        whiteCaptures += captured;

    // Start placement pop animation.
    placingStone = { row, col, progress: 0 };

    sfxPlace && sfxPlace.play();

    // Win check — any capture ends the game immediately.
    if (captured > 0)
    {
        gameOver = true;
        winner   = currentPlayer;
        if (gameMode === 'pvp')
        {
            sfxWin  && sfxWin.play();
        }
        else if (gameMode === 'ai')
        {
            if (winner === PLAYER_HUMAN)
                sfxWin  && sfxWin.play();
            else
                sfxLose && sfxLose.play();
        }
        else if (gameMode === 'aivai')
        {
            sfxSelect && sfxSelect.play();
        }
        return true;
    }

    // Switch player.
    currentPlayer = getOpponent(currentPlayer);
    return true;
}

///////////////////////////////////////////////////////////////////////////////
// RENDERING HELPERS

// Convert grid intersection (row, col) to world position.
// Row 0 = top, row 8 = bottom. Y-up world space, so row 0 → highest Y.
function getIntersectionWorldPos(row, col)
{
    const halfSpan = (BOARD_SIZE - 1) * CELL_SIZE / 2;
    return vec2(
        -halfSpan + col * CELL_SIZE,
         halfSpan - row * CELL_SIZE
    );
}

// Snap mouse world position to nearest intersection within half a cell.
function worldPosToIntersection(worldPos)
{
    const halfSpan = (BOARD_SIZE - 1) * CELL_SIZE / 2;
    const col = Math.round((worldPos.x + halfSpan) / CELL_SIZE);
    const row = Math.round((-worldPos.y + halfSpan) / CELL_SIZE);
    if (!isInBounds(row, col)) return null;
    // Reject if the mouse is more than half a cell away from the intersection.
    const iPos = getIntersectionWorldPos(row, col);
    if (Math.abs(worldPos.x - iPos.x) > CELL_SIZE * 0.5) return null;
    if (Math.abs(worldPos.y - iPos.y) > CELL_SIZE * 0.5) return null;
    return { row, col };
}

// Draw a single stone (circle + specular highlight).
function drawStone(pos, stoneColor, scale)
{
    scale = scale === undefined ? 1 : scale;
    const r = STONE_RADIUS * scale;
    const diam = r * 2;

    // Shadow
    drawCircle(pos.add(vec2(0.05, -0.05)), r * 0.96, rgb(0, 0, 0, 0.28));

    const baseColor  = stoneColor === STONE_BLACK ? hsl(0, 0, 0.1)  : hsl(0, 0, 0.95);
    drawCircle(pos, r, baseColor);

    // Specular highlight — upper-left, ~30% of diameter, 45% opacity
    const off = diam * 0.2;
    const specR = r * 0.3;
    const specColor = stoneColor === STONE_BLACK
        ? rgb(1, 1, 1, 0.45)
        : rgb(1, 1, 1, 0.55);
    drawCircle(pos.add(vec2(-off, off)), specR, specColor);
}

// Draw the board: background, grid lines, hoshi, stones, last-move marker,
// hover ghost.
function drawBoard()
{
    const halfSpan  = (BOARD_SIZE - 1) * CELL_SIZE / 2;
    const boardHalf = halfSpan + CELL_SIZE * 0.7; // extra margin around edges

    // Wooden board background.
    drawRect(vec2(0, 0), vec2(boardHalf * 2 + 0.1), rgb(0.08, 0.06, 0.04));
    drawRect(vec2(0, 0), vec2(boardHalf * 2),        hsl(0.1, 0.4, 0.65));

    // Grid lines (9 horizontal + 9 vertical).
    const lineColor = rgb(0.18, 0.12, 0.06);
    for (let i = 0; i < BOARD_SIZE; i++)
    {
        const x = -halfSpan + i * CELL_SIZE;
        const y = -halfSpan + i * CELL_SIZE;
        // Vertical
        drawLine(vec2(x, -halfSpan), vec2(x, halfSpan), 0.04, lineColor);
        // Horizontal
        drawLine(vec2(-halfSpan, y), vec2(halfSpan, y), 0.04, lineColor);
    }

    // Star points (hoshi).
    for (const [r, c] of HOSHI)
    {
        const pos = getIntersectionWorldPos(r, c);
        drawCircle(pos, 0.11, lineColor);
    }

    // Last-move pulsing ring.
    if (lastMove && !gameOver)
    {
        const pos    = getIntersectionWorldPos(lastMove.row, lastMove.col);
        const pulse  = 1 + Math.sin(time * 6) * 0.1;
        const ringR  = STONE_RADIUS * 1.3 * pulse;
        drawCircle(pos, ringR, hsl(0.12, 0.9, 0.55, 0.55));
    }

    // Hover ghost stone (semi-transparent, only when legal).
    if (isPlaying && !gameOver && hoverIntersection)
    {
        const { row, col } = hoverIntersection;
        if (board[row][col] === STONE_EMPTY
            && isLegalMove(board, row, col, currentPlayer, previousBoardHash))
        {
            const pos  = getIntersectionWorldPos(row, col);
            const alpha = 0.38;
            const ghostColor = currentPlayer === STONE_BLACK
                ? rgb(0.1, 0.1, 0.1, alpha)
                : rgb(0.95, 0.95, 0.95, alpha);
            drawCircle(pos, STONE_RADIUS, ghostColor);
        }
    }

    // Stones.
    for (let row = 0; row < BOARD_SIZE; row++)
    {
        for (let col = 0; col < BOARD_SIZE; col++)
        {
            const cell = board[row][col];
            if (cell === STONE_EMPTY) continue;
            const pos = getIntersectionWorldPos(row, col);

            // Placement pop animation for the most-recently-placed stone.
            if (placingStone && placingStone.row === row && placingStone.col === col)
            {
                const scale = min(placingStone.progress * 1.3, 1);
                drawStone(pos, cell, scale);
            }
            else
            {
                drawStone(pos, cell);
            }
        }
    }
}

function drawUI()
{
    const sw = mainCanvasSize.x;
    const sh = mainCanvasSize.y;

    // Capture counts.
    drawTextScreen(`Black captures: ${blackCaptures}`, vec2(20, 30), 28, WHITE, 4, BLACK, 'left');
    drawTextScreen(`White captures: ${whiteCaptures}`, vec2(20, 66), 28, WHITE, 4, BLACK, 'left');

    // Current player indicator.
    if (!gameOver)
    {
        let turnText;
        if (gameMode === 'ai')
            turnText = currentPlayer === PLAYER_HUMAN ? "Your Turn" : "AI Thinking...";
        else if (gameMode === 'aivai')
            turnText = currentPlayer === STONE_BLACK ? "AI Black Thinking..." : "AI White Thinking...";
        else
            turnText = currentPlayer === STONE_BLACK ? "Black's Turn" : "White's Turn";
        const turnColor = currentPlayer === STONE_BLACK ? rgb(0.85, 0.85, 0.85) : rgb(1, 1, 1);
        drawTextScreen(turnText, vec2(20, 102), 26, turnColor, 4, BLACK, 'left');
    }

    // Game-over banner.
    if (gameOver)
    {
        const cx = sw / 2, cy = sh / 2;
        drawTextScreen('CAPTURE GO', vec2(cx, cy - 60), 64, hsl(0.1, 0.9, 0.55), 6, BLACK);
        let resultText, resultColor;
        if (gameMode === 'ai')
        {
            resultText  = winner === PLAYER_HUMAN ? 'You Win!' : 'AI Wins!';
            resultColor = winner === PLAYER_HUMAN ? rgb(0, 1, 0.3) : rgb(1, 0.3, 0.3);
        }
        else if (gameMode === 'aivai')
        {
            resultText  = winner === STONE_BLACK ? 'AI Black Wins!' : 'AI White Wins!';
            resultColor = winner === STONE_BLACK ? rgb(0.8, 0.8, 0.8) : rgb(1, 1, 1);
        }
        else
        {
            resultText  = winner === STONE_BLACK ? 'Black Wins!' : 'White Wins!';
            resultColor = winner === STONE_BLACK ? rgb(0.8, 0.8, 0.8) : rgb(1, 1, 1);
        }
        drawTextScreen(resultText, vec2(cx, cy), 52, resultColor, 5, BLACK);
        drawTextScreen('Press R to restart or ESC to pause',
            vec2(cx, cy + 60), 24, WHITE, 3, BLACK);
    }

    // Hint.
    if (!gameOver)
    {
        drawTextScreen('R: Restart | ESC: Pause',
            vec2(sw / 2, sh - 28), 20, rgb(0.6, 0.6, 0.6), 2, BLACK);
    }
}

///////////////////////////////////////////////////////////////////////////////
// GAME FLOW

function setPlaying(p)
{
    isPlaying = p;
    const hud = getToolbar('hud');
    if (hud) p ? hud.show() : hud.hide();
}

function startGame(mode)
{
    gameMode = mode;
    initBoard();
    aiThinkTimer = 0;
    setPlaying(true);
    hideMenu('title');
}

function setDifficulty(d)
{
    difficulty = d;
    localStorage.setItem('captureGo.difficulty', d);
    refreshDifficultyUI();
}

function refreshDifficultyUI()
{
    const grid = getMenu('options')?.getItem('difficultyGrid');
    if (grid)
    {
        grid.setCell(0, {earned: difficulty === 'easy'});
        grid.setCell(1, {earned: difficulty === 'medium'});
        grid.setCell(2, {earned: difficulty === 'hard'});
    }
    const title = getMenu('title');
    const upper = difficulty.toUpperCase();
    title?.getItem('vsAI')?.setLabel(`PLAYER VS AI · ${upper}`);
    title?.getItem('aiVsAi')?.setLabel(`AI VS AI · ${upper}`);
}

function quitToTitle()
{
    setPlaying(false);
    clearSubmenuStack();
    hideAllMenus();
    showMenu('title');
}

///////////////////////////////////////////////////////////////////////////////
// GAME LOOP

async function gameInit()
{
    setCanvasFixedSize(vec2(1280, 720));
    cameraPos       = vec2(0, 0);
    canvasClearColor = new Color().setHex('#0d0d14');
    difficulty = localStorage.getItem('captureGo.difficulty') || 'hard';
    setSoundVolume(0.8);

    // One callback drives `paused` for every menu (including dialogs).
    setMenuVisibilityCallback(v => paused = v);

    // Gameplay sounds.
    sfxPlace  = new SoundGenerator({frequency: 300, release: 0.05, volume: 0.3});
    sfxWin    = new SoundGenerator({frequency: 660, release: 0.3,  pitchJump: 220, pitchJumpTime: 0.1, volume: 0.6});
    sfxLose   = new SoundGenerator({frequency: 220, release: 0.35, slide: -0.5,   volume: 0.5});
    sfxSelect = new SoundGenerator({frequency: 550, release: 0.08, volume: 0.4});

    // Global menu sounds.
    const sound_select   = new Sound([.5,,910,,,.02,2,.07,-5,-33,,,,,,,,.25]);
    const sound_activate = new Sound([.7,,30,.01,,.02,1,3.4,94,,,,,,,,,.67]);
    setMenuSounds({
        select:   () => sound_select.play(),
        activate: () => sound_activate.play(),
    });

    // ----- title menu -----
    createMenu({
        id: 'title',
        title: 'CAPTURE GO',
        dismissable: false,
        onStart: () => startGame('ai'),
        items: [
            {type:'button', id:'vsAI',   label:'PLAYER VS AI',     onClick: () => startGame('ai')},
            {type:'button',              label:'PLAYER VS PLAYER', onClick: () => startGame('pvp')},
            {type:'button', id:'aiVsAi', label:'AI VS AI',         onClick: () => startGame('aivai')},
            {type:'button',              label:'OPTIONS',          onClick: () => pushMenu('options')},
            {type:'button',              label:'ABOUT',            onClick: () => pushMenu('about')},
        ],
    });

    // ----- options menu -----
    createMenu({
        id: 'options',
        title: 'OPTIONS',
        onHide: popMenu,
        items: [
            {type:'label', text:'DIFFICULTY'},
            {type:'grid', id:'difficultyGrid', columns:3, cells: [
                {label:'EASY',   title:'Random moves',               onClick: () => setDifficulty('easy')},
                {label:'MEDIUM', title:'Greedy 1-ply',               onClick: () => setDifficulty('medium')},
                {label:'HARD',   title:'Alpha-beta search depth 5',  onClick: () => setDifficulty('hard')},
            ]},
            {type:'separator'},
            {type:'slider', id:'volume', label:'VOLUME', value: 0.8, min:0, max:1,
                persist:'captureGo.volume',
                onChange: v => setSoundVolume(v)},
            {type:'separator'},
            {type:'button', label:'FULLSCREEN', onClick: toggleFullscreen},
            {type:'button', label:'BACK',       onClick: () => hideMenu('options')},
        ],
    });

    // ----- about menu -----
    createMenu({
        id: 'about',
        title: 'ABOUT',
        onHide: popMenu,
        items: [
            {type:'text', text:'Place stones to capture opponent groups. First capture wins. ' +
                'Standard Go capture rules apply — a group with zero liberties is removed. ' +
                'Suicide and ko are forbidden.'},
            {type:'separator'},
            {type:'button', label:'BACK', onClick: () => hideMenu('about')},
        ],
    });

    // ----- pause menu -----
    createMenu({
        id: 'pause',
        title: 'PAUSED',
        initialItemId: 'resume',
        items: [
            {type:'button', id:'resume',  label:'RESUME',  onClick: () => hideMenu('pause')},
            {type:'button', id:'restart', label:'RESTART', onClick: () => { initBoard(); hideMenu('pause'); }},
            {type:'button', id:'options', label:'OPTIONS', onClick: () => pushMenu('options')},
            {type:'button',               label:'QUIT TO TITLE', onClick: () =>
            {
                showConfirmDialog({message: 'Quit to title?', onYes: quitToTitle});
            }},
        ],
    });

    // ----- HUD toolbar -----
    createToolbar({
        id: 'hud',
        anchor: 'top-right',
        direction: 'horizontal',
        items: [
            {type:'button', id:'fs',   label:'⛶', title:'Toggle fullscreen', hideOnTouch:true, onClick: toggleFullscreen},
            {type:'button', id:'menu', label:'☰', title:'Menu', onClick: () =>
            {
                if (isMenuVisible()) { clearSubmenuStack(); hideAllMenus(); }
                else showMenu('pause');
            }},
        ],
    });

    initBoard();
    setPlaying(false);
    showMenu('title');
    refreshDifficultyUI();
}

function gameUpdate()
{
    if (bindPauseKey({when: () => isPlaying})) return;
    if (!isPlaying) return;

    // Placement pop animation.
    if (placingStone)
    {
        placingStone.progress += timeDelta / PLACE_DURATION;
        if (placingStone.progress >= 1)
            placingStone = null;
    }

    // Restart hotkey.
    if (keyWasPressed('KeyR'))
        initBoard();

    if (gameOver) return;

    // Update hover intersection.
    hoverIntersection = worldPosToIntersection(mousePos);

    // AI move — covers 'ai' mode (AI is white) and 'aivai' mode (AI plays both sides).
    const isAITurn = (gameMode === 'ai' && currentPlayer === PLAYER_AI) || gameMode === 'aivai';
    if (isAITurn)
    {
        const delay = gameMode === 'aivai' ? AI_VS_AI_DELAY : AI_THINK_DELAY;
        aiThinkTimer += timeDelta;
        if (aiThinkTimer >= delay)
        {
            const move = findBestAIMove();
            if (move)
            {
                makeMove(move.row, move.col);
                aiThinkTimer = 0;
            }
        }
    }

    // Human input — PvP always, or PvAI when it's the human's turn. Never in aivai.
    const isHumanTurn = gameMode === 'pvp' || (gameMode === 'ai' && currentPlayer === PLAYER_HUMAN);
    if (isHumanTurn && mouseWasPressed(0) && hoverIntersection)
    {
        const { row, col } = hoverIntersection;
        if (isLegalMove(board, row, col, currentPlayer, previousBoardHash))
        {
            makeMove(row, col);
            aiThinkTimer = 0;
        }
    }
}

function gameUpdatePost()
{
    cameraPos = vec2(0, 0);
}

// gameRender draws the board behind the title menu (empty board on load).
function gameRender()
{
    drawBoard();
}

function gameRenderPost()
{
    if (isPlaying) drawUI();
}

///////////////////////////////////////////////////////////////////////////////
engineInit(gameInit, gameUpdate, gameUpdatePost, gameRender, gameRenderPost);

</script>
