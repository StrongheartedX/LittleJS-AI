<!DOCTYPE html><head>
<title>LittleJS Pegball</title>
<meta charset=utf-8>
</head><body style="background:#000">
<script src="../dist/littlejs.js?1780071765370"></script>
<script src="../templates/gameFx.js?1780071765370"></script>
<script src="../templates/menus.js?1780071765370"></script>
<script>
'use strict';

// engine settings
debugWatermark = false;
showEngineVersion = false;

///////////////////////////////////////////////////////////////////////////////
// Tuning

const BOARD_W = 18, BOARD_H = 28;
const BALL_R = .5;
const PEG_R = .4;
const PEG_FADE = .4;       // seconds for hit peg to vanish
const SUBSTEPS = 4;         // physics substeps per frame (prevents tunneling)
const SHOOT_SPEED = 22;
const GRAVITY_Y = 28;
const SLOWMO_TIME = 3;      // seconds of slow-mo when power peg is hit
const SLOWMO_SCALE = .35;   // gameplay time multiplier while slow-mo is active

///////////////////////////////////////////////////////////////////////////////
// State

let cannonPos, aimDir;
let pegs, bucket, activeBall;
let particles, scorePops, stars, trail;
let score, ballsRemaining, orangeLeft, comboCount, maxCombo;
let win, gameOver;
let endDialogShown;  // prevents re-triggering the game-over dialog
let slowMoT;         // real-time seconds remaining of slow-mo



let sfxShoot, sfxPeg, sfxOrange, sfxPower, sfxBucket, sfxLose, sfxWin;

///////////////////////////////////////////////////////////////////////////////
function gameInit()
{
    saveDataInit('peggle');
    cameraScale = 26;
    cameraPos = vec2(0, 0);
    gravity = vec2(0, 0); // ball gravity is applied manually

    initSounds();
    createStars();
    resetGame();
    buildMenus();
    showMenu('title');
}

function initSounds()
{
    sfxShoot   = new SoundGenerator({frequency:420, release:.08, volume:.7, shapeCurve:1.4});
    sfxPeg     = new SoundGenerator({frequency:520, release:.08, volume:.55});
    sfxOrange  = new SoundGenerator({frequency:740, release:.14, volume:.9, slide:.5});
    sfxPower   = new SoundGenerator({frequency:1000,release:.35, volume:1,  slide:1.6, shapeCurve:.8});
    sfxBucket  = new SoundGenerator({frequency:260, release:.2,  volume:1,  noise:.15});
    sfxLose    = new SoundGenerator({frequency:140, release:.2,  volume:.6, slide:-.6, shapeCurve:.7});
    sfxWin     = new SoundGenerator({frequency:660, release:.4,  volume:1,  slide:.9});
}

function createStars()
{
    stars = [];
    for (let i = 0; i < 80; i++)
        stars.push({
            pos: vec2(rand(-BOARD_W/2 + .5, BOARD_W/2 - .5),
                      rand(-BOARD_H/2 + .5, BOARD_H/2 - .5)),
            phase: rand(0, PI*2),
            speed: rand(.6, 1.5),
            size: rand(.04, .1),
        });
}

function resetGame()
{
    cannonPos = vec2(0, BOARD_H/2 - 1.7);
    aimDir = vec2(0, -1);
    score = 0;
    ballsRemaining = 10;
    activeBall = null;
    win = gameOver = false;
    endDialogShown = false;
    slowMoT = 0;
    comboCount = maxCombo = 0;
    trail = [];
    particles = [];
    scorePops = [];

    createPegs();
    createBucket();
}

function createPegs()
{
    pegs = [];

    // Hex-offset (brick) grid
    const cols = 10, rows = 11;
    const hSpacing = (BOARD_W - 2.2) / (cols - 1);
    const vSpacing = 1.55;
    const xStart = -BOARD_W/2 + 1.1;
    const yStart = -BOARD_H/2 + 4;

    const candidates = [];
    for (let r = 0; r < rows; r++)
    {
        const xOff = (r % 2) ? hSpacing/2 : 0;
        for (let c = 0; c < cols; c++)
        {
            const x = xStart + xOff + c * hSpacing + rand(-.08, .08);
            const y = yStart + r * vSpacing + rand(-.06, .06);
            if (x < -BOARD_W/2 + .9 || x > BOARD_W/2 - .9) continue;
            if (y > cannonPos.y - 2.5) continue;
            candidates.push(vec2(x, y));
        }
    }

    // Pick orange pegs that are spread apart
    const targetOranges = 14;
    const minDist = 2.6;
    const shuffled = [...candidates];
    for (let i = shuffled.length - 1; i > 0; i--)
    {
        const j = randInt(i + 1);
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
    }
    const oranges = new Set();
    for (const pos of shuffled)
    {
        if (oranges.size >= targetOranges) break;
        let ok = true;
        for (const o of oranges)
            if (pos.distance(o) < minDist) { ok = false; break; }
        if (ok) oranges.add(pos);
    }

    // One power peg per round, picked from the non-orange candidates
    const nonOrange = candidates.filter(p => !oranges.has(p));
    const powerPeg = nonOrange.length ? nonOrange[randInt(nonOrange.length)] : null;

    for (const pos of candidates)
        pegs.push({
            pos,
            r: PEG_R,
            hit: false,
            dead: false,
            fadeTime: 0,
            orange: oranges.has(pos),
            power: pos === powerPeg,
            phase: rand(0, PI*2),
        });

    orangeLeft = oranges.size;
}

function createBucket()
{
    bucket = {
        pos: vec2(0, -BOARD_H/2 + 1.1),
        size: vec2(4.2, .8),
        t: 0,
    };
}

///////////////////////////////////////////////////////////////////////////////
// Menus

function buildMenus()
{
    installAutoPause();

    createTitleMenu({
        title:    'PEGBALL',
        subtitle: 'knock out every orange peg',
        revealOnClick: false,
        onPlay: () => { resetGame(); setPlaying(true); },
        items: [
            {type:'button', label:'OPTIONS', onClick: () => pushMenu('options')},
            {type:'button', label:'ABOUT',   onClick: () => pushMenu('about')},
        ],
    });

    createPauseMenu({
        onQuit: () => {
            resetGame();
            setPlaying(false);
            showMenu('title');
        },
        extraItems: [
            {type:'button', label:'OPTIONS',
                onClick: () => pushMenu('options')},
        ],
    });

    createOptionsMenu({
        persistKey: 'volume',
    });

    createMenu({
        id: 'about',
        title: 'ABOUT',
        dismissable: true,
        onHide: popMenu,
        items: [
            {type:'text', text:
                'Knock out every ORANGE peg to win. You have 10 balls. ' +
                'Land in the moving yellow bucket for a FREE BALL. ' +
                'Hit pegs without stopping to build a COMBO multiplier.\n\n' +
                'Aim with the mouse, click or press SPACE to shoot. ' +
                'Press ESC to pause.\n\n' +
                'Made with LittleJS.'},
            {type:'separator'},
            {type:'button', label:'BACK', onClick: () => hideMenu('about')},
        ],
    });

    installDefaultToolbar();
}

function showEndDialog()
{
    showConfirmDialog({
        title:    win ? 'YOU WIN!' : 'GAME OVER',
        icon:     win ? '🏆' : '💥',
        message:  'Score: ' + score + '\nBest combo: x' + maxCombo,
        yesLabel: 'PLAY AGAIN',
        noLabel:  'QUIT',
        onYes: () => { resetGame(); setPlaying(true); },
        onNo:  () => { resetGame(); setPlaying(false); showMenu('title'); },
    });
}

///////////////////////////////////////////////////////////////////////////////
function gameUpdate()
{
    // Esc / Start opens pause menu mid-game
    if (bindPauseKey({when: () => isPlaying() && !gameOver})) return;

    updateInput();

    // Slow-mo timer counts down in real time; gameplay updates use a scaled dt
    let scale = 1;
    if (slowMoT > 0)
    {
        slowMoT -= timeDelta;
        scale = SLOWMO_SCALE;
    }
    const dt = timeDelta * scale;

    if (activeBall && !gameOver)
    {
        const subDt = dt / SUBSTEPS;
        for (let i = 0; i < SUBSTEPS; i++)
        {
            if (!activeBall) break;
            stepBall(subDt);
        }
        if (activeBall)
        {
            trail.push({pos: activeBall.pos.copy(), life: 1});
            if (trail.length > 14) trail.shift();
        }
    }

    for (let i = trail.length - 1; i >= 0; i--)
    {
        trail[i].life -= dt * 5;
        if (trail[i].life <= 0) trail.splice(i, 1);
    }

    updateBucket(dt);
    updatePegs(dt);
    updateParticles(dt);
    updateScorePops(dt);

    if (activeBall && activeBall.pos.y < -BOARD_H/2 - 3)
        loseBall();

    // Surface end-of-round dialog once the ball is gone
    if (gameOver && !endDialogShown && !activeBall)
    {
        endDialogShown = true;
        showEndDialog();
    }
}

function gameUpdatePost()
{
    cameraPos = vec2(0, 0);
}

function updatePegs(dt)
{
    for (const p of pegs)
    {
        if (p.hit && !p.dead)
        {
            p.fadeTime += dt;
            if (p.fadeTime > PEG_FADE) p.dead = true;
        }
    }
}

function updateParticles(dt)
{
    for (let i = particles.length - 1; i >= 0; i--)
    {
        const p = particles[i];
        p.pos = p.pos.add(p.vel.scale(dt));
        p.vel = p.vel.scale(.9);
        p.vel.y -= 18 * dt;
        p.life -= dt * 1.8;
        if (p.life <= 0) particles.splice(i, 1);
    }
}

function updateScorePops(dt)
{
    for (let i = scorePops.length - 1; i >= 0; i--)
    {
        const s = scorePops[i];
        s.pos.y += dt * 2.5;
        s.life -= dt * 1.2;
        if (s.life <= 0) scorePops.splice(i, 1);
    }
}

function emitParticles(pos, hue, count)
{
    for (let i = 0; i < count; i++)
    {
        const a = rand(0, PI*2);
        const speed = rand(4, 11);
        particles.push({
            pos: pos.copy(),
            vel: vec2(Math.cos(a), Math.sin(a)).scale(speed),
            life: 1,
            hue,
            size: rand(.08, .2),
        });
    }
}

function addScorePop(pos, text, hue, big)
{
    scorePops.push({
        pos: pos.copy(),
        text,
        life: 1,
        hue,
        size: big ? 1.3 : .9,
    });
}

function updateInput()
{
    // Always update the aim direction so the cannon tracks the mouse,
    // but only shoot while actually playing.
    const toMouse = mousePos.subtract(cannonPos);
    if (toMouse.length() > .01) aimDir = toMouse.normalize();

    const minAng = -PI * .95, maxAng = -PI * .05;
    let ang = Math.atan2(aimDir.y, aimDir.x);
    ang = clamp(ang, minAng, maxAng);
    aimDir = vec2(Math.cos(ang), Math.sin(ang));

    if (!isPlaying() || gameOver) return;
    if ((mouseWasPressed(0) || keyWasPressed('Space')) && !activeBall && ballsRemaining > 0)
        shootBall();
}

function shootBall()
{
    ballsRemaining--;
    activeBall = {
        pos: cannonPos.add(aimDir.scale(BALL_R + 1.4)),
        vel: aimDir.scale(SHOOT_SPEED),
        r: BALL_R,
    };
    comboCount = 0;
    sfxShoot.play();
}

function loseBall()
{
    activeBall = null;
    trail = [];

    if (gameOver) return; // win was already triggered mid-shot; dialog handler fires next frame

    sfxLose.play();
    if (ballsRemaining <= 0)
    {
        win = false;
        gameOver = true;
        submitBestScore(score);
    }
}

function updateBucket(dt)
{
    if (gameOver) return;
    bucket.t += dt;
    const xRange = BOARD_W/2 - bucket.size.x/2 - .6;
    bucket.pos.x = Math.sin(bucket.t * 1.4) * xRange;

    if (!activeBall) return;
    if (isOverlapping(activeBall.pos, vec2(activeBall.r*2), bucket.pos, bucket.size) &&
        activeBall.vel.y < 0)
    {
        score += 2500;
        ballsRemaining++;
        addScorePop(bucket.pos.add(vec2(0, 1)), 'FREE BALL +2500', .15, true);
        emitParticles(bucket.pos, .15, 18);
        activeBall = null;
        trail = [];
        sfxBucket.play();
    }
}

function stepBall(dt)
{
    activeBall.vel.y -= GRAVITY_Y * dt;
    activeBall.pos = activeBall.pos.add(activeBall.vel.scale(dt));

    const wL = -BOARD_W/2 + activeBall.r;
    const wR =  BOARD_W/2 - activeBall.r;
    if (activeBall.pos.x < wL) { activeBall.pos.x = wL; activeBall.vel.x =  Math.abs(activeBall.vel.x) * .7; }
    if (activeBall.pos.x > wR) { activeBall.pos.x = wR; activeBall.vel.x = -Math.abs(activeBall.vel.x) * .7; }

    const top = BOARD_H/2 - activeBall.r - .2;
    if (activeBall.pos.y > top)
    {
        activeBall.pos.y = top;
        activeBall.vel.y = -Math.abs(activeBall.vel.y) * .6;
    }

    for (const p of pegs)
    {
        if (p.dead || p.hit) continue;
        const d = activeBall.pos.subtract(p.pos);
        const dist = d.length();
        const minDist = activeBall.r + p.r;
        if (dist < minDist && dist > 0)
        {
            const n = d.scale(1 / dist);
            activeBall.pos = p.pos.add(n.scale(minDist + .001));
            const v = activeBall.vel;
            const vn = n.scale(v.dot(n));
            const vt = v.subtract(vn);
            activeBall.vel = vt.subtract(vn).scale(.78);

            p.hit = true;
            p.fadeTime = 0;
            comboCount++;
            if (comboCount > maxCombo) maxCombo = comboCount;
            const multiplier = 1 + Math.floor((comboCount - 1) / 4);

            let baseVal, hue, particleCount, popBig;
            if (p.power)
            {
                baseVal = 5000;
                hue = .33;
                particleCount = 26;
                popBig = true;
                slowMoT = Math.max(slowMoT, SLOWMO_TIME);
                sfxPower.play();
            }
            else if (p.orange)
            {
                baseVal = 1000;
                hue = .08;
                particleCount = 14;
                popBig = true;
                orangeLeft--;
                playPegSound(true, comboCount);
                if (orangeLeft <= 0)
                {
                    win = true;
                    gameOver = true;
                    sfxWin.play();
                    submitBestScore(score);
                }
            }
            else
            {
                baseVal = 100;
                hue = .58;
                particleCount = 8;
                popBig = false;
                playPegSound(false, comboCount);
            }

            const val = baseVal * multiplier;
            score += val;
            addScorePop(p.pos, '+' + val, hue, popBig);
            emitParticles(p.pos, hue, particleCount);

            const sp = activeBall.vel.length();
            if (sp < 3.5) activeBall.vel = activeBall.vel.normalize().scale(3.5);

            break;
        }
    }
}

function playPegSound(orange, combo)
{
    const s = orange ? sfxOrange : sfxPeg;
    const base = orange ? 740 : 520;
    s.frequency = base * (1 + Math.min(combo - 1, 14) * .07);
    s.play();
}

///////////////////////////////////////////////////////////////////////////////
function gameRender()
{
    // Backboard
    drawRectGradient(vec2(0, 0), vec2(BOARD_W, BOARD_H),
        hsl(.65, .75, .14), hsl(.62, .85, .04));

    // Twinkling stars
    for (const s of stars)
    {
        const tw = .5 + .5 * Math.sin(time * s.speed + s.phase);
        drawRect(s.pos, vec2(s.size, s.size),
            hsl(.6, .3, .75, .3 + .7 * tw));
    }

    // Board frame
    const fT = .25;
    const frameC = hsl(.62, .5, .35);
    drawRect(vec2(0,  BOARD_H/2 + fT/2), vec2(BOARD_W + fT*2, fT), frameC);
    drawRect(vec2(0, -BOARD_H/2 - fT/2), vec2(BOARD_W + fT*2, fT), frameC);
    drawRect(vec2(-BOARD_W/2 - fT/2, 0), vec2(fT, BOARD_H + fT*2), frameC);
    drawRect(vec2( BOARD_W/2 + fT/2, 0), vec2(fT, BOARD_H + fT*2), frameC);

    // Pegs (with glow on oranges, fade-out animation on hit)
    for (const p of pegs)
    {
        if (p.dead) continue;
        let scale = 1, alpha = 1;
        if (p.hit)
        {
            const t = p.fadeTime / PEG_FADE;
            scale = 1 + t * .6;
            alpha = 1 - t;
        }
        const r = p.r * scale;
        if (p.power)
        {
            // Faster sparkle pulse so the player can spot it
            const pulse = .8 + .2 * Math.sin(time * 7 + p.phase);
            drawCircle(p.pos, r * 4,   hsl(.33, 1, .55, .15 * pulse * alpha));
            drawCircle(p.pos, r * 2.8, hsl(.33, 1, .6,  .35 * pulse * alpha));
            drawCircle(p.pos, r * 2,   hsl(.33, .95, .55 * pulse, alpha), .08, hsl(0,0,0,alpha));
        }
        else if (p.orange)
        {
            const pulse = .85 + .15 * Math.sin(time * 4 + p.phase);
            drawCircle(p.pos, r * 3.2, hsl(.08, 1, .55, .15 * pulse * alpha));
            drawCircle(p.pos, r * 2.4, hsl(.08, 1, .6,  .3  * pulse * alpha));
            drawCircle(p.pos, r * 2,   hsl(.08, .95, .55 * pulse, alpha), .08, hsl(0,0,0,alpha));
        }
        else
        {
            drawCircle(p.pos, r * 2, hsl(.58, .65, .55, alpha), .08, hsl(0,0,0,alpha));
        }
        drawCircle(p.pos.add(vec2(-r*.3, r*.3)), r * .7, hsl(0, 0, 1, .32 * alpha));
    }

    // Bucket
    drawRect(bucket.pos.add(vec2(0, -.1)), bucket.size.add(vec2(.3, .3)), hsl(.05, .3, .12));
    drawRectGradient(bucket.pos, bucket.size,
        hsl(.13, .85, .55), hsl(.11, .85, .35));
    drawRect(bucket.pos.add(vec2(0, bucket.size.y/2 - .08)),
        vec2(bucket.size.x - .4, .1), hsl(.16, .9, .85));

    // Particles
    for (const p of particles)
    {
        const s = p.size * Math.min(1, p.life * 2);
        drawRect(p.pos, vec2(s, s), hsl(p.hue, .9, .6 + .3 * p.life, p.life));
    }

    // Ball trail
    for (const t of trail)
        drawCircle(t.pos, BALL_R * 1.8 * t.life, hsl(.55, .85, .85, t.life * .45));

    // Ball
    if (activeBall)
    {
        drawCircle(activeBall.pos, activeBall.r * 3,   hsl(.55, .9, .8, .12));
        drawCircle(activeBall.pos, activeBall.r * 2.3, hsl(.55, .9, .85, .25));
        drawCircle(activeBall.pos, activeBall.r * 2,   hsl(.55, .7, .75), .08, hsl(0,0,0));
        drawCircle(activeBall.pos.add(vec2(-activeBall.r*.3, activeBall.r*.3)),
            activeBall.r * .65, hsl(0, 0, 1, .55));
    }

    // Cannon base + rotating barrel
    drawCircle(cannonPos, 1.9, hsl(.05, .4, .12));
    drawCircle(cannonPos, 1.55, hsl(.05, .55, .25));
    {
        const ang = aimDir.angle();
        const barrelLen = 1.6, barrelW = .6;
        const bc = cannonPos.add(aimDir.scale(barrelLen/2 + .25));
        drawRect(bc, vec2(barrelW + .15, barrelLen + .15), hsl(.05, .55, .15), ang);
        drawRect(bc, vec2(barrelW,        barrelLen),       hsl(.06, .75, .42), ang);
        drawCircle(cannonPos.add(aimDir.scale(barrelLen + .15)), .35, hsl(.05, .55, .15));
    }
    drawCircle(cannonPos, .95, hsl(.06, .7, .45));
    drawCircle(cannonPos, .6,  hsl(.06, .5, .25));

    // Aim guide
    if (isPlaying() && !gameOver && ballsRemaining > 0 && !activeBall)
    {
        const start = cannonPos.add(aimDir.scale(2.1));
        for (let i = 0; i < 6; i++)
        {
            const dp = start.add(aimDir.scale(i * .75));
            const f = 1 - i / 6;
            drawCircle(dp, .22, hsl(.12, .1, 1, f * .85));
        }
    }

    // Score pops (in front of everything in world space)
    for (const sp of scorePops)
    {
        const life = Math.min(1, sp.life * 1.3);
        drawText(sp.text, sp.pos, sp.size,
            hsl(sp.hue, 1, .8, life), .15, hsl(0, 0, 0, life));
    }
}

///////////////////////////////////////////////////////////////////////////////
function gameRenderPost()
{
    if (!isPlaying()) return;

    const cx = mainCanvasSize.x / 2;
    const top = 38;

    drawTextScreen('SCORE  ' + score,
        vec2(40, top), 32, hsl(0,0,1), 4, hsl(0,0,0), 'left');
    drawTextScreen('ORANGE  ' + orangeLeft,
        vec2(40, top + 30), 22, hsl(.08, 1, .65), 3, hsl(0,0,0), 'left');
    drawTextScreen('BALLS  ' + ballsRemaining + (activeBall ? '*' : ''),
        vec2(cx, top), 32, hsl(0,0,1), 4, hsl(0,0,0), 'center');

    if (comboCount >= 2 && activeBall)
    {
        const wobble = 1 + Math.sin(time * 8) * .05;
        drawTextScreen('x' + comboCount + '  COMBO!',
            vec2(cx, top + 50), 38 * wobble,
            hsl(.12, 1, .65), 5, hsl(0,0,0), 'center');
    }

    if (slowMoT > 0)
    {
        const fade = Math.min(1, slowMoT);
        const wobble = 1 + Math.sin(time * 12) * .08;
        drawTextScreen('POWER!',
            vec2(cx, mainCanvasSize.y * .25), 72 * wobble,
            hsl(.33, 1, .65, fade), 6, hsl(0, 0, 0, fade), 'center');
    }
}

///////////////////////////////////////////////////////////////////////////////
engineInit(gameInit, gameUpdate, gameUpdatePost, gameRender, gameRenderPost);

</script>
</body>
</html>
