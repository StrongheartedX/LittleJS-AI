<!DOCTYPE html><head>
<title>Pool</title>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
</head><body style="background:#000">
<script src="../dist/littlejs.js?1.18.14"></script>
<script src="../templates/soundGenerator.js"></script>
<script src="../dist/box2d.wasm.js?1.18.0"></script>
<script src="../templates/menus.js"></script>
<script>
'use strict';

// engine settings
debugWatermark = false;
showEngineVersion = false;
paused = false;

gravity = vec2(0, 0);
cameraPos = vec2(0, 0);
cameraScale = 32;
canvasMaxSize = vec2(2048, 2048);

///////////////////////////////////////////////////////////////////////////////
// pool (box2d)

// table layout (world units)
const TABLE_SIZE   = vec2(30, 16);      // inner felt
const RAIL_THICK   = 2.2;               // wood rail outside felt
const WALL_THICK   = 3;                 // collider thickness (overlaps rail visually)
const BALL_DIAM    = 1;
const POCKET_DIAM  = 1.6;
const MAX_HIT      = 6;                 // max aim length in world units
const HIT_IMPULSE  = 8;                 // impulse scale per unit of aim
const STOP_SPEED   = 0.15;

// pool ball colors (index = ball number)
const ballColors = [
    rgb(.95,.95,.95),   // 0 - cue (white)
    rgb(1, .82, .05),   // 1 - yellow
    rgb(.10,.25,.78),   // 2 - blue
    rgb(.85,.10,.10),   // 3 - red
    rgb(.45,.10,.55),   // 4 - purple
    rgb(.96,.50,.05),   // 5 - orange
    rgb(.05,.55,.25),   // 6 - green
    rgb(.55,.15,.10),   // 7 - maroon
    rgb(.08,.08,.08),   // 8 - black
];
function ballColor(n)
{
    if (n <= 8) return ballColors[n];
    return ballColors[n - 8]; // 9..15 use same colors but get a stripe
}
function isStriped(n) { return n > 8; }

// game state
let cueBall;
let balls = [];          // numbered balls (1..15) still on table
let pockets = [];
let railObj;             // static body for rails
let shots = 0;
let isPlaying = false;
let won = false;
let scratchedThisShot = false;
let aimAngle = 0;        // remembered for cue stick during motion

// sounds
let sfxHit, sfxBreak, sfxPocket, sfxScratch, sfxWin;

///////////////////////////////////////////////////////////////////////////////
// helpers — drawing

function drawTable()
{
    // wood rail border
    drawRect(vec2(), TABLE_SIZE.add(vec2(RAIL_THICK*2)), rgb(.30,.16,.06));
    // inner wood highlight
    drawRect(vec2(), TABLE_SIZE.add(vec2(RAIL_THICK*1.55)), rgb(.42,.24,.10));
    // dark inner trim
    drawRect(vec2(), TABLE_SIZE.add(vec2(.6)), rgb(.05,.04,.02));
    // felt
    drawRect(vec2(), TABLE_SIZE, rgb(.10,.42,.20));

    // diamond markers along the rails (decorative)
    const dx = TABLE_SIZE.x / 8;
    const dy = TABLE_SIZE.y / 4;
    const railY = TABLE_SIZE.y/2 + RAIL_THICK/2;
    const railX = TABLE_SIZE.x/2 + RAIL_THICK/2;
    for (let i = -3; i <= 3; i++)
    {
        if (i === 0) continue;
        drawCircle(vec2(i*dx,  railY), .22, rgb(.95,.92,.85));
        drawCircle(vec2(i*dx, -railY), .22, rgb(.95,.92,.85));
    }
    for (let i = -1; i <= 1; i++)
    {
        if (i === 0) continue;
        drawCircle(vec2( railX, i*dy), .22, rgb(.95,.92,.85));
        drawCircle(vec2(-railX, i*dy), .22, rgb(.95,.92,.85));
    }

    // head string / foot spot dots
    const headX = -TABLE_SIZE.x/4;
    drawLine(vec2(headX, -TABLE_SIZE.y/2), vec2(headX, TABLE_SIZE.y/2), .04, rgb(1,1,1,.10));
    drawCircle(vec2(TABLE_SIZE.x/4, 0), .12, rgb(1,1,1,.25));
    drawCircle(vec2(headX, 0),         .12, rgb(1,1,1,.25));
}

function drawPocket(pos)
{
    // soft outer shadow
    drawCircle(pos, POCKET_DIAM*2.0, rgb(0,0,0,.25));
    drawCircle(pos, POCKET_DIAM*1.55, rgb(0,0,0,.55));
    // black hole
    drawCircle(pos, POCKET_DIAM*1.10, rgb(0,0,0,1));
    // tiny rim highlight
    drawCircle(pos, POCKET_DIAM*0.90, rgb(.08,.04,.02,1));
}

function drawCueStick(ballPos, dir, power)
{
    // cue sits opposite the aim direction (pulls back as power grows)
    const back  = dir.scale(-1);
    const pull  = .8 + power * 2.2;
    const tip   = ballPos.add(back.scale(.6 + pull));
    const butt  = ballPos.add(back.scale(.6 + pull + 8));
    // shadow
    drawLine(tip.add(vec2(.12,-.12)), butt.add(vec2(.12,-.12)), .18, rgb(0,0,0,.35));
    // shaft (light wood)
    drawLine(tip, butt, .14, rgb(.86,.72,.42));
    // wrap near butt
    const wrapA = ballPos.add(back.scale(.6 + pull + 5.5));
    const wrapB = ballPos.add(back.scale(.6 + pull + 7));
    drawLine(wrapA, wrapB, .18, rgb(.18,.08,.04));
    // ferrule + tip
    const ferA = ballPos.add(back.scale(.6 + pull));
    const ferB = ballPos.add(back.scale(.6 + pull + .25));
    drawLine(ferA, ferB, .16, rgb(.95,.95,.90));
    drawCircle(tip, .14, rgb(.30,.18,.55));
}

///////////////////////////////////////////////////////////////////////////////
// physics objects

class Ball extends Box2dObject
{
    constructor(pos, number=0)
    {
        super(pos, vec2(BALL_DIAM), 0, 0, ballColor(number));
        this.number = number;

        // pool ball physics — bouncy off rails, low rolling damping
        this.addCircle(BALL_DIAM, vec2(), 1, .04, .92);
        this.setLinearDamping(.5);
        this.setAngularDamping(.5);
        this.setBullet(true);          // continuous collision so balls don't tunnel through walls at speed
        this.setFixedRotation(true);   // we render the number upright
    }

    beginContact(other)
    {
        // play click on ball-vs-ball / ball-vs-rail (skip sensors)
        const s = this.getSpeed();
        if (s > 1)
            sfxHit.play(this.pos, clamp(s/16, .15, 1), 1 + (this.number ? .02 : 0));
    }

    update()
    {
        super.update();
        if (this.pocketed)
        {
            if (this === cueBall)
            {
                // SCRATCH — pause and respawn from the menu (see gameUpdate)
                scratchedThisShot = true;
                sfxScratch.play();
                this.destroy();
                cueBall = null;
            }
            else
            {
                sfxPocket.play(undefined, .9);
                this.destroy();
                const i = balls.indexOf(this);
                if (i >= 0) balls.splice(i, 1);
                if (!balls.length)
                {
                    won = true;
                    sfxWin.play();
                }
            }
        }
    }

    render()
    {
        // shadow
        drawCircle(this.pos.add(vec2(.10,-.12)), BALL_DIAM*1.02, rgb(0,0,0,.35));

        if (this.number === 0)
        {
            // cue ball — plain white with a hint of shading
            drawCircle(this.pos, BALL_DIAM, rgb(1,1,1));
            drawCircle(this.pos.add(vec2(-.18,.18)), BALL_DIAM*.40, rgb(1,1,1,.85));
            drawCircle(this.pos.add(vec2(.20,-.20)), BALL_DIAM*.25, rgb(.75,.75,.78,.6));
            return;
        }

        const c = ballColor(this.number);

        if (isStriped(this.number))
        {
            // white ball base, then a colored band painted across the middle
            // and clipped to the circle so the edges curve cleanly.
            drawCircle(this.pos, BALL_DIAM, rgb(1,1,1));
            drawCanvas2D(this.pos, vec2(BALL_DIAM), 0, false, (ctx) =>
            {
                ctx.beginPath();
                ctx.arc(0, 0, .5, 0, Math.PI*2);
                ctx.clip();
                ctx.fillStyle = c.toString();
                ctx.fillRect(-.5, -.24, 1, .48);
            });
        }
        else
        {
            // solid color body
            drawCircle(this.pos, BALL_DIAM, c);
        }

        // white circle for the number
        drawCircle(this.pos, BALL_DIAM*.34, rgb(1,1,1));
        // number text (slightly raised so it visually centers)
        drawText(''+this.number, this.pos.add(vec2(0,-.04)), .42, BLACK);

        // top-left specular highlight
        drawCircle(this.pos.add(vec2(-.22,.22)), BALL_DIAM*.18, rgb(1,1,1,.55));
    }
}

class Pocket extends Box2dStaticObject
{
    constructor(pos)
    {
        super(pos);
        this.pos = pos.copy();
        this.addCircle(POCKET_DIAM, vec2(), 0, 0, 0, true); // sensor
    }
    beginContact(other) { other.pocketed = 1; }
    render() {} // drawn in gameRender so it sits under the balls
}

///////////////////////////////////////////////////////////////////////////////
// table / rack setup

function buildTable()
{
    // boundary walls (rectangular for now — pocket openings are handled by
    // pockets sensoring the ball before it reaches the corner)
    railObj = new Box2dStaticObject;
    railObj.color = rgb(0,0,0,0); // invisible — drawTable() paints the rails
    railObj.render = () => {};
    const halfX = TABLE_SIZE.x/2 + WALL_THICK/2;
    const halfY = TABLE_SIZE.y/2 + WALL_THICK/2;
    const restitution = .85, friction = .15;
    railObj.addBox(vec2(TABLE_SIZE.x + WALL_THICK*2, WALL_THICK), vec2(0,  halfY), 0, 0, friction, restitution);
    railObj.addBox(vec2(TABLE_SIZE.x + WALL_THICK*2, WALL_THICK), vec2(0, -halfY), 0, 0, friction, restitution);
    railObj.addBox(vec2(WALL_THICK, TABLE_SIZE.y),                 vec2( halfX, 0), 0, 0, friction, restitution);
    railObj.addBox(vec2(WALL_THICK, TABLE_SIZE.y),                 vec2(-halfX, 0), 0, 0, friction, restitution);

    // 6 pockets — 4 corners + 2 side
    const px = TABLE_SIZE.x/2 - .3;
    const py = TABLE_SIZE.y/2 - .3;
    pockets.push(new Pocket(vec2(-px, -py)));
    pockets.push(new Pocket(vec2( px, -py)));
    pockets.push(new Pocket(vec2(-px,  py)));
    pockets.push(new Pocket(vec2( px,  py)));
    pockets.push(new Pocket(vec2( 0,  -py)));
    pockets.push(new Pocket(vec2( 0,   py)));
}

function rackBalls()
{
    // racked at the "foot spot" — quarter of the table from the right rail
    const apex = vec2(TABLE_SIZE.x/4, 0);
    // standard 5-row triangle, ball numbers placed in a fixed order
    const rackNumbers = [
        [1],
        [9, 2],
        [10, 8, 3],
        [11, 4, 12, 5],
        [6, 13, 7, 14, 15],
    ];
    const dy = BALL_DIAM * 1.02;
    const dx = dy * Math.cos(Math.PI/6);
    for (let row = 0; row < rackNumbers.length; row++)
    {
        for (let col = 0; col <= row; col++)
        {
            const n = rackNumbers[row][col];
            const x = apex.x + row * dx;
            const y = apex.y + (col - row/2) * dy;
            balls.push(new Ball(vec2(x, y), n));
        }
    }
}

function spawnCueBall()
{
    cueBall = new Ball(vec2(-TABLE_SIZE.x/4, 0), 0);
}

function clearTable()
{
    if (cueBall) { cueBall.destroy(); cueBall = null; }
    for (const b of balls) b.destroy();
    balls.length = 0;
    for (const p of pockets) p.destroy();
    pockets.length = 0;
    if (railObj) { railObj.destroy(); railObj = null; }
}

function newGame()
{
    clearTable();
    buildTable();
    rackBalls();
    spawnCueBall();
    shots = 0;
    won = false;
    scratchedThisShot = false;
}

///////////////////////////////////////////////////////////////////////////////
// aim / shoot

function allStopped()
{
    if (cueBall && cueBall.getSpeed() > STOP_SPEED) return false;
    for (const b of balls)
        if (b.getSpeed() > STOP_SPEED) return false;
    return true;
}

function canShoot()
{
    return isPlaying && !won && cueBall && allStopped();
}

function getAim()
{
    // aim from cue ball toward the mouse, clamped to MAX_HIT length
    const d = mousePos.subtract(cueBall.pos);
    const len = min(d.length(), MAX_HIT);
    const dir = d.length() > 0 ? d.normalize() : vec2(1,0);
    return { dir, power: len / MAX_HIT, len };
}

///////////////////////////////////////////////////////////////////////////////
// menus + input

function setPlaying(p)
{
    isPlaying = p;
    const hud = getToolbar('hud');
    if (hud) p ? hud.show() : hud.hide();
}

function startPlay()
{
    // createTitleMenu auto-hides 'title' after onPlay returns.
    newGame();
    setPlaying(true);
}

async function gameInit()
{
    await box2dInit();

    // canvas fit
    canvasClearColor = rgb(.05,.07,.05);
    setCanvasFixedSize(vec2(1280, 720));
    cameraPos = vec2();
    cameraScale = 36;

    // sounds — short ZzFX clicks for cushion / ball contacts
    sfxHit     = new Sound([,.1, 2e3, , , .01, , , , , , , , 1]);
    sfxPocket  = new SoundGenerator({volume:.8, frequency:180, attack:0, release:.18, shapeCurve:1.2, slide:-2.2, noise:.04});
    sfxScratch = new SoundGenerator({volume:.7, frequency:120, attack:0, release:.30, shapeCurve:1.6, slide:-1.4, noise:.10});
    sfxBreak   = new SoundGenerator({volume:.9, frequency:240, attack:0, release:.20, shapeCurve:1.3, slide:-1.8, noise:.06});
    sfxWin     = new SoundGenerator({volume:.9, frequency:520, attack:0, release:.45, shapeCurve:1.1, slide:1.5, pitchJump:200, pitchJumpTime:.12});

    // pause whenever any menu is visible
    setMenuVisibilityCallback(v => paused = v);

    // global UI sounds
    const sound_select   = new Sound([.4,,910,,,.02,2,.07,-5,-33,,,,,,,,.25]);
    const sound_activate = new Sound([.6,,30,.01,,.02,1,3.4,94,,,,,,,,,.67]);
    setMenuSounds({
        select:   () => sound_select.play(),
        activate: () => sound_activate.play(),
    });

    // ----- title menu (no click-to-reveal — surfaced immediately at end of init) -----
    createTitleMenu({
        title: 'POOL',
        subtitle: 'Sink them all',
        onPlay: startPlay,
        revealOnClick: false,
        items: [
            {type:'button', label:'ABOUT', onClick: () => pushMenu('about')},
        ],
    });

    // ----- about menu -----
    createMenu({
        id: 'about',
        title: 'HOW TO PLAY',
        onHide: popMenu,
        items: [
            {type:'text', text:'Move the mouse to aim from the cue ball. ' +
                'Distance from the cue ball sets your shot power (longer = harder). ' +
                'Click to break.\n\n' +
                'Sink all 15 balls in as few shots as possible. ' +
                'Scratching (sinking the cue ball) costs you a stroke and respawns the cue.'},
            {type:'separator'},
            {type:'button', label:'BACK', onClick: () => hideMenu('about')},
        ],
    });

    // ----- pause menu -----
    createMenu({
        id: 'pause',
        title: 'PAUSED',
        initialItemId: 'resume',
        items: [
            {type:'button', id:'resume', label:'RESUME',     onClick: () => hideMenu('pause')},
            {type:'button', id:'rack',   label:'NEW RACK',   onClick: () =>
            {
                showConfirmDialog({
                    message: 'Start a fresh rack?',
                    onYes: () => { newGame(); hideMenu('pause'); },
                });
            }},
            {type:'button', id:'quit',   label:'QUIT TO TITLE', onClick: () =>
            {
                showConfirmDialog({
                    message: 'Quit to title?',
                    onYes: () =>
                    {
                        clearSubmenuStack();
                        hideAllMenus();
                        newGame();           // reset so the title backdrop shows a fresh rack
                        setPlaying(false);
                        showMenu('title');
                    },
                });
            }},
        ],
    });

    // ----- HUD toolbar -----
    createToolbar({
        id: 'hud',
        anchor: 'top-right',
        direction: 'horizontal',
        items: [
            {type:'button', id:'fs',   label:'⛶', title:'Fullscreen', onClick: toggleFullscreen, hideOnTouch:true},
            {type:'button', id:'menu', label:'☰', title:'Menu', onClick: () =>
            {
                if (isMenuVisible()) { clearSubmenuStack(); hideAllMenus(); }
                else showMenu('pause');
            }},
        ],
    });
    getToolbar('hud')?.hide();

    // Rack the table once so the title menu has gameplay behind it instead
    // of a black screen, then surface the title (menus.js pauses physics
    // automatically, so the rack just sits there until PLAY).
    newGame();
    showMenu('title');
}

///////////////////////////////////////////////////////////////////////////////
function gameUpdate()
{
    if (!isPlaying) return;

    // Esc / Start opens pause
    if (bindPauseKey({when: () => isPlaying})) return;

    // Respawn cue ball after a scratch once everything has stopped
    if (!cueBall && allStopped() && !won)
        spawnCueBall();

    // Shooting — impulse scales with the raw aim length (already capped at
    // MAX_HIT) so the demo's "feel" is preserved: max length 6 * HIT_IMPULSE 8
    // = max impulse 48, ~6× the previous (power/MAX_HIT) divisor mistake.
    if (canShoot() && mouseWasPressed(0))
    {
        const {dir, power, len} = getAim();
        if (power > .04 && len > .25)
        {
            cueBall.applyImpulse(dir.scale(len * HIT_IMPULSE));
            shots++;
            scratchedThisShot = false;
            (shots === 1 ? sfxBreak : sfxHit).play(undefined, .8);
        }
    }

    // remember aim angle so the cue stick can fade in next time we stop
    if (cueBall)
    {
        const d = mousePos.subtract(cueBall.pos);
        if (d.lengthSquared() > .01) aimAngle = d.angle();
    }
}

function gameUpdatePost()
{
    setCameraPos(vec2());
}

///////////////////////////////////////////////////////////////////////////////
function gameRender()
{
    // Drawn every frame — table + pockets sit behind the title menu
    // as a backdrop. Numbered balls / cue ball render themselves as
    // engine objects (also always-on), so the rack is visible too.
    drawTable();
    for (const p of pockets) drawPocket(p.pos);
}

function gameRenderPost()
{
    if (!isPlaying) return;

    // aim preview + cue stick
    if (canShoot())
    {
        const {dir, power, len} = getAim();
        const tip = cueBall.pos.add(dir.scale(len));

        // dotted aim line (drawn as short segments)
        const segCount = 14;
        for (let i = 0; i < segCount; i++)
        {
            const t0 = i / segCount;
            const t1 = (i + 0.45) / segCount;
            const a  = cueBall.pos.add(dir.scale(len * t0));
            const b  = cueBall.pos.add(dir.scale(len * t1));
            drawLine(a, b, .08, rgb(1,1,1, .25 + power * .35));
        }
        // arrow tip
        const perp = vec2(-dir.y, dir.x);
        const headLen = .9, headWid = .55;
        const base = tip.subtract(dir.scale(headLen));
        drawPoly([tip, base.add(perp.scale(headWid*.5)), base.subtract(perp.scale(headWid*.5))],
            rgb(1, .95, .6, .8));

        // cue stick on the opposite side
        drawCueStick(cueBall.pos, dir, power);

        // power readout
        drawTextScreen(`POWER ${(power*100|0)}%`,
            vec2(mainCanvasSize.x/2, mainCanvasSize.y - 36),
            32, WHITE, 4, rgb(0,0,0,.7));
    }

    // HUD
    const remaining = balls.length;
    const hud = `SHOTS  ${shots}        REMAINING  ${remaining}`;
    drawTextScreen(hud,
        vec2(mainCanvasSize.x/2, 36),
        32, WHITE, 4, rgb(0,0,0,.7));

    if (scratchedThisShot && allStopped())
        drawTextScreen('SCRATCH!',
            vec2(mainCanvasSize.x/2, 80),
            42, rgb(1,.55,.3), 5, rgb(0,0,0,.8));

    if (won)
    {
        drawTextScreen('CLEARED THE TABLE!',
            vec2(mainCanvasSize.x/2, mainCanvasSize.y/2 - 30),
            72, rgb(1,1,.7), 8, rgb(0,0,0,.85));
        drawTextScreen(`${shots} shots — open the menu (☰) for a new rack`,
            vec2(mainCanvasSize.x/2, mainCanvasSize.y/2 + 36),
            28, WHITE, 4, rgb(0,0,0,.8));
    }
}

///////////////////////////////////////////////////////////////////////////////
engineInit(gameInit, gameUpdate, gameUpdatePost, gameRender, gameRenderPost);
</script></body></html>
