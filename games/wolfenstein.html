<script>
'use strict';

debugWatermark = false;
showEngineVersion = false;
paused = false;
gravity = vec2();
cameraPos = vec2();
canvasMaxSize = vec2(2048);
setTileDefaultBleed(0);
tilesPixelated = false;
touchGamepadCenterButtonSize = 0;

// Touch gamepad: left-side virtual analog stick (move), right-side face-button
// area also tracked as an analog stick — perfect for twin-stick / FPS look on
// mobile. `touchGamepadButtonCount = 1` collapses the face buttons into one
// pad whose touch position drives gamepadStick(1).
touchGamepadEnable = true;
touchGamepadAnalog = true;
touchGamepadButtonCount = 1;

///////////////////////////////////////////////////////////////////////////////
// LEVEL
// # wall   . floor   P player start   G ranged guard   M melee enemy   X exit
// L lamp (decoration)   B barrel (decoration)
// + health pickup       * ammo pickup
const LEVEL_ASCII = [
    '########################',
    '#....L####.*....G.....##',
    '#.P.............##..G.##',
    '#.....####......##....##',
    '#.....####...........L##',
    '#############.######.###',
    '#############.######.###',
    '#############.######.###',
    '#....####L......+##...+#',
    '#....####.G......##....#',
    '#G...####...#....##+.G.#',
    '#..*.####.....#..#######',
    '#..........B.M...#G...B#',
    '##.######.......G#.....X',
    '##....############.....#',
    '#####.##############.###',
    '#...........########.###',
    '#..*........####..B.G..#',
    '#....#B..M..####.......#',
    '#....#......####...#...#',
    '#.#####+....####.......#',
    '#.G..#.............M...#',
    '#...........####.+.....#',
    '########################',
];
const LEVEL_W = LEVEL_ASCII[0].length;
const LEVEL_H = LEVEL_ASCII.length;
let levelGrid;             // levelGrid[y][x] -> '#' wall, 'X' exit, 'L'/'B' decoration, '.' floor
let exitPos = null;        // center of the X cell, used for the win-trigger distance check
let playerStartPos = vec2(2, 2);
let enemySpawns = [];      // [{pos, kind:'guard'|'melee'}]
let decorations = [];      // [{pos, kind:'lamp'|'barrel'}]
let pickups = [];          // [{pos, kind:'health'|'ammo'}]

function parseLevel(rows)
{
    levelGrid = [];
    enemySpawns = [];
    decorations = [];
    pickups = [];
    exitPos = null;
    // ASCII row 0 = top; map it to high world Y so reading order matches the map
    for (let y = 0; y < rows.length; ++y)
    {
        const wy = LEVEL_H - 1 - y;
        levelGrid[wy] = [];
        for (let x = 0; x < rows[y].length; ++x)
        {
            const c = rows[y][x];
            const center = vec2(x + .5, wy + .5);
            if (c === '#') levelGrid[wy][x] = '#';
            else if (c === 'X')
            {
                // exit reads as a wall to raycast/collision so the player can't
                // walk into the door cell — they're stopped at the threshold,
                // which is also where the win-trigger fires (distance check).
                levelGrid[wy][x] = 'X';
                exitPos = center;
            }
            else
            {
                levelGrid[wy][x] = '.';
                if      (c === 'P') playerStartPos = center;
                else if (c === 'G') enemySpawns.push({pos: center, kind: 'guard'});
                else if (c === 'M') enemySpawns.push({pos: center, kind: 'melee'});
                else if (c === 'L') { levelGrid[wy][x] = 'L'; decorations.push({pos: center, kind: 'lamp'}); }
                else if (c === 'B') { levelGrid[wy][x] = 'B'; decorations.push({pos: center, kind: 'barrel'}); }
                else if (c === '+') pickups.push({pos: center, kind: 'health'});
                else if (c === '*') pickups.push({pos: center, kind: 'ammo'});
            }
        }
    }
}

function isWallAt(p)
{
    const x = Math.floor(p.x), y = Math.floor(p.y);
    if (x < 0 || x >= LEVEL_W || y < 0 || y >= LEVEL_H) return true;
    const c = levelGrid[y][x];
    return c === '#' || c === 'X';
}

// Movement collision — walls plus decoration cells. Rays/bullets/LOS keep
// using isWallAt so visuals stay the same; only movement stops at L/B cells.
function isBlocking(p)
{
    const x = Math.floor(p.x), y = Math.floor(p.y);
    if (x < 0 || x >= LEVEL_W || y < 0 || y >= LEVEL_H) return true;
    const c = levelGrid[y][x];
    return c === '#' || c === 'X' || c === 'L' || c === 'B';
}

// Wall tile index: exit cell uses the metal locked-door tile (so the player
// reads it as "do not pass through" — the win-trigger fires when they touch
// it). Otherwise alternate 3 brick/stone/tech variants.
function wallTileAt(x, y)
{
    if (levelGrid[y]?.[x] === 'X') return 7;
    return (x * 3 + y * 7 + ((x + y) & 1) * 11) % 3;
}

///////////////////////////////////////////////////////////////////////////////
// STATE
let isAlive = true;
let playerPos = vec2(), playerAngle = 0;
let playerHP = 100;
let playerAmmo = 0;
const PLAYER_MAX_HP = 100;
const MAX_AMMO = 60;
const STARTING_AMMO = 24;
const HEALTH_PICKUP_AMT = 25;
const AMMO_PICKUP_AMT = 12;
let hitFlashT = 0, muzzleFlashT = 0, deathFlashT = 0;
let kills = 0;
let enemies = [];

///////////////////////////////////////////////////////////////////////////////
// RENDER CONSTANTS
const FOV = 1.3;                       // horizontal field of view, radians (~75°)
const SLICE_W = 15;                    // slice rect half-width in screen world units
const SLICE_STEP = 0.1;
const MAX_DIST = 30;
const ANGLE_PER_X = (FOV / 2) / SLICE_W;
const SCREEN_X_PER_RAD = SLICE_W / (FOV / 2);
const PROJ = 20;                       // 1wu world height → PROJ/perpDist screen units. Lower = walls take up less vertical screen at a given distance (less claustrophobic)

// Tile sampler — mutated per slice to point at a 2-pixel column of a wall tile
let wallSliceInfo;
const CELL_STRIDE = 512, CELL_PAD = 6, CELL_PIX = 500;
function tileCellPx(idx)
{
    const col = idx % 4, row = Math.floor(idx / 4);
    return vec2(col * CELL_STRIDE + CELL_PAD, row * CELL_STRIDE + CELL_PAD);
}

let guardIdleTile, guardShootTile, guardDeadTile, gunIdleTile, gunFireTile, exitTile;
let metalDoorTile, meleeTile;
let lampTile, barrelTile, sparkTile, healthTile, ammoTile;

// Short-lived puffs spawned at wall impact points. Updated in gameUpdate,
// rendered through the same painter's-algorithm drawList so they sort with
// walls and other sprites.
let hitEffects = [];

// A* pathfinder over the 16x16 grid — built once in gameInit, reads the
// current levelGrid via its isWalkable override so resetWorld doesn't need
// to rebuild it.
let pathFinder;

///////////////////////////////////////////////////////////////////////////////
// ATLAS PAINTERS
function paintBrick(ctx)
{
    ctx.fillStyle = '#5a2820';
    ctx.fillRect(0, 0, 500, 500);
    ctx.strokeStyle = '#1a0808';
    ctx.lineWidth = 9;
    for (let row = 0; row < 9; ++row)
    {
        const y = row * 56 - 4;
        const off = (row & 1) * 60;
        for (let col = -1; col < 6; ++col)
        {
            const x = col * 110 + off;
            const r = 110 + ((col * 43 + row * 17) % 35);
            const g = 50 + ((col * 17 + row * 23) % 22);
            const b = 40 + ((col * 7 + row * 11) % 18);
            ctx.fillStyle = `rgb(${r},${g},${b})`;
            ctx.fillRect(x + 2, y + 2, 106, 52);
            ctx.strokeRect(x, y, 110, 56);
        }
    }
}
function paintStone(ctx)
{
    ctx.fillStyle = '#3a4045';
    ctx.fillRect(0, 0, 500, 500);
    ctx.strokeStyle = '#10141a';
    ctx.lineWidth = 9;
    let i = 0;
    for (let y = 0; y < 500; )
    {
        const h = 60 + ((i * 31) % 60);
        for (let x = 0; x < 500; )
        {
            const w = 70 + ((i * 47) % 90);
            const r = 90 + ((i * 53) % 40);
            const g = 95 + ((i * 41) % 40);
            const b = 100 + ((i * 37) % 40);
            ctx.fillStyle = `rgb(${r},${g},${b})`;
            ctx.fillRect(x, y, w, h);
            ctx.strokeRect(x, y, w, h);
            x += w; ++i;
        }
        y += h; ++i;
    }
}
function paintTech(ctx)
{
    ctx.fillStyle = '#1a242e';
    ctx.fillRect(0, 0, 500, 500);
    ctx.strokeStyle = '#06090c';
    ctx.lineWidth = 5;
    for (let row = 0; row < 4; ++row)
    for (let col = 0; col < 4; ++col)
    {
        const x = col * 125 + 4, y = row * 125 + 4;
        const k = (col + row) & 1;
        ctx.fillStyle = k ? '#2a4055' : '#22323e';
        ctx.fillRect(x, y, 117, 117);
        ctx.strokeRect(x, y, 117, 117);
        ctx.fillStyle = '#0a1218';
        for (const [dx, dy] of [[12, 12], [105, 12], [12, 105], [105, 105]])
        {
            ctx.beginPath();
            ctx.arc(x + dx, y + dy, 6, 0, Math.PI * 2);
            ctx.fill();
        }
        if (k)
        {
            ctx.fillStyle = '#ff3a3a';
            ctx.fillRect(x + 50, y + 50, 17, 17);
        }
    }
}
function paintGuard(ctx, firing)
{
    // body
    ctx.fillStyle = '#3a3a4a';
    ctx.fillRect(150, 200, 200, 240);
    // head
    ctx.fillStyle = '#e8c39a';
    ctx.beginPath();
    ctx.arc(250, 150, 80, 0, Math.PI * 2);
    ctx.fill();
    // helmet
    ctx.fillStyle = '#222';
    ctx.beginPath();
    ctx.arc(250, 130, 85, Math.PI, 0);
    ctx.fill();
    ctx.fillRect(165, 125, 170, 18);
    // eyes
    ctx.fillStyle = '#fff';
    ctx.fillRect(216, 150, 22, 14);
    ctx.fillRect(262, 150, 22, 14);
    ctx.fillStyle = '#000';
    ctx.fillRect(224, 152, 10, 10);
    ctx.fillRect(270, 152, 10, 10);
    // gun
    ctx.fillStyle = '#111';
    if (firing)
    {
        ctx.fillRect(160, 280, 220, 30);
        // muzzle flash
        const g = ctx.createRadialGradient(395, 295, 5, 395, 295, 75);
        g.addColorStop(0, '#fff');
        g.addColorStop(.4, '#ffd24a');
        g.addColorStop(1, 'rgba(255,140,0,0)');
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.arc(395, 295, 75, 0, Math.PI * 2);
        ctx.fill();
    }
    else
        ctx.fillRect(210, 280, 80, 80);
    // legs
    ctx.fillStyle = '#202028';
    ctx.fillRect(170, 420, 70, 60);
    ctx.fillRect(260, 420, 70, 60);
}
function paintGuardIdle(ctx)  { paintGuard(ctx, false); }
function paintGuardShoot(ctx) { paintGuard(ctx, true); }

function paintMelee(ctx)
{
    // shirtless mutant, arms up, snarling
    // legs
    ctx.fillStyle = '#503020';
    ctx.fillRect(170, 420, 70, 60);
    ctx.fillRect(260, 420, 70, 60);
    // torso (fleshy)
    ctx.fillStyle = '#b88060';
    ctx.fillRect(160, 240, 180, 200);
    // chest shading
    ctx.fillStyle = '#a06848';
    ctx.fillRect(160, 240, 30, 200);
    ctx.fillRect(310, 240, 30, 200);
    // raised arms
    ctx.fillStyle = '#b88060';
    ctx.fillRect(80, 210, 70, 130);    // left upper arm
    ctx.fillRect(350, 210, 70, 130);   // right upper arm
    // fists
    ctx.fillStyle = '#8a5838';
    ctx.fillRect(80, 175, 70, 45);
    ctx.fillRect(350, 175, 70, 45);
    // head (bald, large)
    ctx.fillStyle = '#c08868';
    ctx.beginPath();
    ctx.arc(250, 160, 78, 0, Math.PI * 2);
    ctx.fill();
    // skin shading on head
    ctx.fillStyle = 'rgba(0,0,0,.15)';
    ctx.beginPath();
    ctx.arc(280, 180, 50, 0, Math.PI * 2);
    ctx.fill();
    // glowing red eyes — fill + small halo
    for (const ex of [222, 278])
    {
        const g = ctx.createRadialGradient(ex, 152, 2, ex, 152, 16);
        g.addColorStop(0,  '#ff8080');
        g.addColorStop(.4, '#d01010');
        g.addColorStop(1,  'rgba(120,0,0,0)');
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.arc(ex, 152, 16, 0, Math.PI * 2);
        ctx.fill();
    }
    // snarling mouth, white teeth
    ctx.fillStyle = '#300';
    ctx.fillRect(216, 192, 68, 22);
    ctx.fillStyle = '#f4ecd0';
    for (let i = 0; i < 5; ++i)
        ctx.fillRect(220 + i * 13, 195, 8, 16);
    // blood smears on chest
    ctx.fillStyle = '#7a0808';
    ctx.fillRect(228, 260, 16, 60);
    ctx.fillRect(244, 295, 12, 80);
    ctx.fillRect(260, 280, 10, 40);
}
function paintGuardDead(ctx)
{
    // pool — at the very bottom of the frame so feet/blood land on the floor when billboarded
    ctx.fillStyle = '#5a0808';
    ctx.beginPath();
    ctx.ellipse(250, 480, 220, 22, 0, 0, Math.PI * 2);
    ctx.fill();
    // sprawled body
    ctx.fillStyle = '#3a3a4a';
    ctx.fillRect(100, 440, 300, 50);
    // head end
    ctx.fillStyle = '#e8c39a';
    ctx.beginPath();
    ctx.arc(110, 458, 48, 0, Math.PI * 2);
    ctx.fill();
    // helmet
    ctx.fillStyle = '#222';
    ctx.beginPath();
    ctx.arc(110, 445, 52, Math.PI, 0);
    ctx.fill();
    // X eyes
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 6;
    for (const ex of [93, 128])
    {
        ctx.beginPath();
        ctx.moveTo(ex - 7, 452); ctx.lineTo(ex + 7, 468);
        ctx.moveTo(ex - 7, 468); ctx.lineTo(ex + 7, 452);
        ctx.stroke();
    }
}
function paintGun(ctx, firing)
{
    // gun shifted down so the muzzle flash fits inside the 500x500 cell
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(170, 360, 160, 140);          // grip (bottom)
    ctx.fillStyle = '#2a2a2a';
    ctx.fillRect(200, 290, 100, 80);           // body
    // barrel
    ctx.fillStyle = '#3a3a3a';
    ctx.fillRect(230, 180, 40, 120);
    ctx.fillStyle = '#666';
    ctx.fillRect(238, 162, 24, 22);
    // sight
    ctx.fillStyle = '#888';
    ctx.fillRect(244, 152, 12, 12);
    if (firing)
    {
        const g = ctx.createRadialGradient(250, 140, 8, 250, 140, 100);
        g.addColorStop(0, '#fff');
        g.addColorStop(.35, '#ffd24a');
        g.addColorStop(1, 'rgba(255,80,0,0)');
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.arc(250, 140, 100, 0, Math.PI * 2);
        ctx.fill();
    }
}
function paintGunIdle(ctx) { paintGun(ctx, false); }
function paintGunFire(ctx) { paintGun(ctx, true); }
function paintLamp(ctx)
{
    // pole
    ctx.fillStyle = '#1a0e04';
    ctx.fillRect(238, 250, 24, 240);
    // base
    ctx.fillStyle = '#0a0602';
    ctx.beginPath();
    ctx.ellipse(250, 492, 60, 14, 0, 0, Math.PI * 2);
    ctx.fill();
    // soft halo behind the shade — walls behind partially read through
    const g = ctx.createRadialGradient(250, 205, 4, 250, 205, 135);
    g.addColorStop(0,  'rgba(255,208,112,.55)');
    g.addColorStop(.35,'rgba(212,128,40,.32)');
    g.addColorStop(.7, 'rgba(122, 54, 8,.14)');
    g.addColorStop(1,  'rgba( 60, 20, 0,0)');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(250, 205, 135, 0, Math.PI * 2);
    ctx.fill();
    // trapezoidal lamp shade — dimmer at top, brighter at the bottom rim where the light spills out
    const shadeG = ctx.createLinearGradient(0, 160, 0, 250);
    shadeG.addColorStop(0,  '#c47820');
    shadeG.addColorStop(.55,'#ffc24a');
    shadeG.addColorStop(1,  '#fff2b8');
    ctx.fillStyle = shadeG;
    ctx.beginPath();
    ctx.moveTo(220, 160);
    ctx.lineTo(280, 160);
    ctx.lineTo(304, 250);
    ctx.lineTo(196, 250);
    ctx.closePath();
    ctx.fill();
    // dark outline so the shade reads as a solid object against the glow
    ctx.strokeStyle = '#3a1c08';
    ctx.lineWidth = 4;
    ctx.stroke();
    // glowing bottom rim — the "lit" edge of the shade
    ctx.fillStyle = '#fff8d8';
    ctx.fillRect(196, 244, 108, 6);
}

function paintHealth(ctx)
{
    // floor shadow
    ctx.fillStyle = 'rgba(0,0,0,.45)';
    ctx.beginPath();
    ctx.ellipse(250, 460, 130, 18, 0, 0, Math.PI * 2);
    ctx.fill();
    // white medkit box
    ctx.fillStyle = '#f4f4f4';
    ctx.fillRect(110, 200, 280, 240);
    ctx.strokeStyle = '#3a3a3a';
    ctx.lineWidth = 8;
    ctx.strokeRect(110, 200, 280, 240);
    // green cross (the Red Cross emblem is a protected symbol — green is the
    // common game-safe substitute, same shape, unambiguously medical)
    ctx.fillStyle = '#28a848';
    ctx.fillRect(228, 240, 44, 160);    // vertical bar
    ctx.fillRect(170, 298, 160, 44);    // horizontal bar
    // dark green inner shading for a bit of depth
    ctx.fillStyle = '#106820';
    ctx.fillRect(228, 240, 8, 160);
    ctx.fillRect(170, 298, 160, 8);
    // a little highlight on the box top
    ctx.fillStyle = 'rgba(255,255,255,.4)';
    ctx.fillRect(118, 208, 264, 14);
}

function paintAmmo(ctx)
{
    // floor shadow
    ctx.fillStyle = 'rgba(0,0,0,.45)';
    ctx.beginPath();
    ctx.ellipse(250, 460, 140, 18, 0, 0, Math.PI * 2);
    ctx.fill();
    // brown wooden crate
    ctx.fillStyle = '#5a3818';
    ctx.fillRect(115, 230, 270, 210);
    ctx.strokeStyle = '#2a1a08';
    ctx.lineWidth = 6;
    ctx.strokeRect(115, 230, 270, 210);
    // bullets sticking out the top
    for (let i = 0; i < 4; ++i)
    {
        const x = 140 + i * 60;
        // brass casing
        ctx.fillStyle = '#d09838';
        ctx.fillRect(x, 150, 40, 90);
        ctx.strokeStyle = '#7a5818';
        ctx.lineWidth = 2;
        ctx.strokeRect(x, 150, 40, 90);
        // bullet tip
        ctx.fillStyle = '#a86838';
        ctx.beginPath();
        ctx.moveTo(x,      150);
        ctx.lineTo(x + 20, 110);
        ctx.lineTo(x + 40, 150);
        ctx.closePath();
        ctx.fill();
    }
    // crate slats
    ctx.strokeStyle = '#2a1a08';
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.moveTo(115, 300); ctx.lineTo(385, 300);
    ctx.moveTo(115, 370); ctx.lineTo(385, 370);
    ctx.stroke();
}

function paintSpark(ctx)
{
    // soft white→amber→transparent radial glow used for wall-impact puffs
    const g = ctx.createRadialGradient(250, 250, 4, 250, 250, 230);
    g.addColorStop(0,   '#ffffff');
    g.addColorStop(.18, '#fff0a8');
    g.addColorStop(.5,  '#ff9028');
    g.addColorStop(1,   'rgba(255,40,0,0)');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(250, 250, 230, 0, Math.PI * 2);
    ctx.fill();
}

function paintBarrel(ctx)
{
    // floor shadow
    ctx.fillStyle = 'rgba(0,0,0,.5)';
    ctx.beginPath();
    ctx.ellipse(250, 495, 110, 14, 0, 0, Math.PI * 2);
    ctx.fill();
    // body
    ctx.fillStyle = '#6a3a14';
    ctx.fillRect(160, 170, 180, 320);
    // top ellipse (lid)
    ctx.fillStyle = '#8a5a20';
    ctx.beginPath();
    ctx.ellipse(250, 170, 90, 18, 0, 0, Math.PI * 2);
    ctx.fill();
    // dark bands
    ctx.fillStyle = '#2a1408';
    ctx.fillRect(160, 210, 180, 14);
    ctx.fillRect(160, 340, 180, 14);
    ctx.fillRect(160, 470, 180, 14);
    // left/right shading for fake cylindrical curve
    ctx.fillStyle = 'rgba(0,0,0,.30)';
    ctx.fillRect(160, 170, 28, 320);
    ctx.fillRect(312, 170, 28, 320);
    // hazard stripe
    ctx.fillStyle = '#ffc844';
    ctx.fillRect(195, 280, 110, 22);
    ctx.fillStyle = '#000';
    for (let i = 0; i < 6; ++i)
        ctx.fillRect(200 + i * 18, 282, 8, 18);
}

function paintExit(ctx)
{
    ctx.fillStyle = '#221606';
    ctx.fillRect(0, 0, 500, 500);
    ctx.fillStyle = '#8a5a18';
    ctx.fillRect(110, 60, 280, 430);
    ctx.strokeStyle = '#2a1804';
    ctx.lineWidth = 8;
    ctx.strokeRect(110, 60, 280, 430);
    ctx.strokeRect(135, 90, 230, 170);
    ctx.strokeRect(135, 285, 230, 170);
    ctx.fillStyle = '#ffd24a';
    ctx.beginPath();
    ctx.arc(340, 280, 14, 0, Math.PI * 2);
    ctx.fill();
}

function paintMetalDoor(ctx)
{
    // dark steel frame
    ctx.fillStyle = '#1e2228';
    ctx.fillRect(0, 0, 500, 500);
    // recessed door panel
    ctx.fillStyle = '#3a4048';
    ctx.fillRect(40, 40, 420, 420);
    ctx.strokeStyle = '#080a0e';
    ctx.lineWidth = 6;
    ctx.strokeRect(40, 40, 420, 420);
    // rivets around the perimeter — reads as heavy hardware
    ctx.fillStyle = '#0a0c10';
    for (let i = 0; i < 6; ++i)
    {
        const t = 70 + i * 72;
        ctx.beginPath(); ctx.arc(t,  70, 10, 0, Math.PI * 2); ctx.fill();    // top row
        ctx.beginPath(); ctx.arc(t, 430, 10, 0, Math.PI * 2); ctx.fill();    // bottom row
    }
    for (let i = 0; i < 4; ++i)
    {
        const t = 130 + i * 80;
        ctx.beginPath(); ctx.arc( 70, t, 10, 0, Math.PI * 2); ctx.fill();    // left col
        ctx.beginPath(); ctx.arc(430, t, 10, 0, Math.PI * 2); ctx.fill();    // right col
    }
    // inset lock panel
    ctx.fillStyle = '#1a1e24';
    ctx.fillRect(165, 180, 170, 180);
    ctx.strokeStyle = '#06080a';
    ctx.lineWidth = 4;
    ctx.strokeRect(165, 180, 170, 180);
    // keypad grid (3x3)
    ctx.fillStyle = '#4a5058';
    for (let r = 0; r < 3; ++r)
    for (let c = 0; c < 3; ++c)
        ctx.fillRect(180 + c * 50, 195 + r * 50, 38, 38);
    // tiny keypad highlights
    ctx.fillStyle = 'rgba(255,255,255,.08)';
    for (let r = 0; r < 3; ++r)
    for (let c = 0; c < 3; ++c)
        ctx.fillRect(180 + c * 50, 195 + r * 50, 38, 3);
    // red "LOCKED" indicator with glow halo above the keypad
    const g = ctx.createRadialGradient(250, 130, 4, 250, 130, 42);
    g.addColorStop(0,   '#ff8080');
    g.addColorStop(.25, '#e02020');
    g.addColorStop(.7,  'rgba(170,16,16,.35)');
    g.addColorStop(1,   'rgba(120,16,16,0)');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(250, 130, 42, 0, Math.PI * 2);
    ctx.fill();
    // hazard stripes at the bottom edge — extra "do not enter" reading
    for (let i = 0; i < 9; ++i)
    {
        ctx.fillStyle = (i & 1) ? '#ffc844' : '#1a1408';
        ctx.fillRect(40 + i * 46.7, 470, 47, 20);
    }
}

// Pick a random walkable (floor) tile within `radius` cells of `center`.
// Returns the tile center in world coords, or null if none found.
function pickRandomWalkableNear(center, radius)
{
    for (let tries = 0; tries < 16; ++tries)
    {
        const tx = Math.floor(center.x) + Math.floor(rand(-radius, radius + 1));
        const ty = Math.floor(center.y) + Math.floor(rand(-radius, radius + 1));
        if (tx < 0 || tx >= LEVEL_W || ty < 0 || ty >= LEVEL_H) continue;
        if (levelGrid[ty][tx] === '.') return vec2(tx + .5, ty + .5);
    }
    return null;
}

function resetWorld()
{
    parseLevel(LEVEL_ASCII);
    playerPos = playerStartPos.copy();
    playerAngle = PI / 2;           // LittleJS angle convention: 0=north, +PI/2=east
    bobPhase = bobAmount = 0;
    hitEffects = [];
    playerHP = PLAYER_MAX_HP;
    playerAmmo = STARTING_AMMO;
    isAlive = true;
    kills = 0;
    hitFlashT = 0; muzzleFlashT = 0; deathFlashT = 0;
    enemies = enemySpawns.map(spawn => ({
        pos:           spawn.pos.copy(),
        homePos:       spawn.pos.copy(),
        hp:            2,
        alive:         true,
        seenPlayer:    false,
        state:         'idle',                       // 'idle' | 'shoot' (only used by ranged guards)
        windup:        0,
        shootCooldown: 0.5 + rand(0, 1),
        // Behavioral kind: 'melee' = fast charger; otherwise random sentry/patroller (ranged)
        kind:          spawn.kind === 'melee' ? 'melee'
                       : (rand() < .5 ? 'patroller' : 'sentry'),
        path:          [],
        pathIndex:     0,
        repathTimer:   0,
        searchTime:    0,
        lastKnownPlayerPos: null,
        patrolTarget:  null,
        patrolPauseTimer: rand(0, 2),
    }));
}

function startGame()
{
    resetWorld();
    setPlaying(true);
}

function quitToTitleWithCleanup()
{
    quitToTitle(resetWorld);
}

let mouseSensitivityDefault = .002; 
let mouseSensitivity = mouseSensitivityDefault;      // radians per screen-pixel of mouse movement
let invertX = false;
let bobPhase = 0, bobAmount = 0;
const GAMEPAD_LOOK_SPEED = .045; // rad per frame at full right-stick deflection

function gameUpdate()
{
    if (bindPauseKey({when: () => isPlaying() && isAlive})) return;
    if (!isPlaying() || !isAlive) return;

    // ---- desktop: mouse capture + fire ----
    const wantLock = mouseWasPressed(0);
    if (!isTouchDevice && wantLock && !pointerLockIsActive())
        pointerLockRequest();
    else if (!isTouchDevice && wantLock && pointerLockIsActive())
        playerFire();

    if (pointerLockIsActive())
        playerAngle += mouseDeltaScreen.x * mouseSensitivity * (invertX ? -1 : 1);

    // ---- gamepad / touch: stick 0 moves, stick 1 looks, button 0 fires ----
    // (gamepadStick / gamepadWasPressed merge physical pads AND the touchGamepad
    //  enabled at the top of the script — so this works on desktop+controller
    //  and mobile/touch with no extra branching.)
    const stick1 = gamepadStick(1);
    if (Math.abs(stick1.x) > .08)
        playerAngle += stick1.x * GAMEPAD_LOOK_SPEED * (invertX ? -1 : 1);
    if (gamepadWasPressed(0))
        playerFire();

    // movement: keyDirection().y = forward, .x = strafe; gamepad stick overrides if pushed harder
    // LittleJS angle is CW-positive (0=north), so player-right = facing + PI/2.
    let input = keyDirection();
    const stick0 = gamepadStick(0);
    if (stick0.lengthSquared() > input.lengthSquared())
        input = stick0;
    const fwd   = vec2().setAngle(playerAngle, 1);
    const right = vec2().setAngle(playerAngle + PI / 2, 1);
    const speed = .08;
    const vel = fwd.scale(input.y * speed).add(right.scale(input.x * speed));

    // weapon bob phase: advance while moving, ease bob amplitude in/out
    const moving = input.lengthSquared() > 0;
    bobAmount = lerp(bobAmount, moving ? 1 : 0, .15);
    if (moving) bobPhase += .42;

    const normal = vec2();
    let newPos = playerPos.add(vel);
    if (lineTest(playerPos, newPos, isBlocking, normal))
    {
        const d = vel.dot(normal);
        newPos = newPos.subtract(vec2(d * normal.x, d * normal.y));
        if (!isBlocking(newPos)) playerPos = newPos;
    }
    else playerPos = newPos;

    // Keep a small buffer between the player and adjacent blocking cells so
    // extreme close-ups can't push perpDist below the render cutoff. Without
    // this you can graze a wall hard enough to see the backdrop through it.
    const BUF = .07;
    const cx = Math.floor(playerPos.x), cy = Math.floor(playerPos.y);
    if (isBlocking(vec2(cx + 1.1, playerPos.y)) && playerPos.x > cx + 1 - BUF)
        playerPos = vec2(cx + 1 - BUF, playerPos.y);
    if (isBlocking(vec2(cx - .1,  playerPos.y)) && playerPos.x < cx + BUF)
        playerPos = vec2(cx + BUF,     playerPos.y);
    if (isBlocking(vec2(playerPos.x, cy + 1.1)) && playerPos.y > cy + 1 - BUF)
        playerPos = vec2(playerPos.x, cy + 1 - BUF);
    if (isBlocking(vec2(playerPos.x, cy - .1))  && playerPos.y < cy + BUF)
        playerPos = vec2(playerPos.x, cy + BUF);

    // enemies
    for (const e of enemies) updateEnemy(e);

    // pickup collection — walk near one to consume it
    for (let i = pickups.length - 1; i >= 0; --i)
    {
        const p = pickups[i];
        if (playerPos.distance(p.pos) > .55) continue;
        if (p.kind === 'health')
            playerHP = Math.min(PLAYER_MAX_HP, playerHP + HEALTH_PICKUP_AMT);
        else if (p.kind === 'ammo')
            playerAmmo = Math.min(MAX_AMMO, playerAmmo + AMMO_PICKUP_AMT);
        pickups.splice(i, 1);
        sndPickup.play();
    }

    // bullet impact puffs
    for (let i = hitEffects.length - 1; i >= 0; --i)
    {
        const p = hitEffects[i];
        p.age += 1/60;
        if (p.age >= p.life) { hitEffects.splice(i, 1); continue; }
        p.pos = p.pos.add(p.vel);
        p.vel = p.vel.scale(.88);     // damping
    }

    // win on standing on exit OR all enemies dead AND on exit
    if (exitPos && enemies.every(e => !e.alive) && playerPos.distance(exitPos) < .8)
        triggerVictory();

    // tick screen-flash timers
    hitFlashT = Math.max(0, hitFlashT - 1/60);
    muzzleFlashT = Math.max(0, muzzleFlashT - 1/60);
}

function playerFire()
{
    if (playerAmmo <= 0)
    {
        sndEmpty.play();
        return;
    }
    --playerAmmo;
    muzzleFlashT = .08;
    sndShoot.play();

    // hitscan: first enemy along the ray closer than the first wall wins
    const dir = vec2().setAngle(playerAngle, 1);
    const endPos = playerPos.add(dir.scale(MAX_DIST));
    const wallNormal = vec2();
    const wallHit = lineTest(playerPos, endPos, isWallAt, wallNormal);
    const wallDist = wallHit ? wallHit.distance(playerPos) : MAX_DIST;

    let target = null, targetT = wallDist;
    for (const e of enemies)
    {
        if (!e.alive) continue;
        const toE = e.pos.subtract(playerPos);
        const t = toE.dot(dir);          // distance along the aim ray
        if (t < 0 || t > targetT) continue;
        const closest = playerPos.add(dir.scale(t));
        const perp = e.pos.distance(closest);
        if (perp < .45) { target = e; targetT = t; }
    }
    if (target)
    {
        if (--target.hp <= 0) killEnemy(target);
        else target.seenPlayer = true; // wakes the rest of its squad logic too via dist check
    }
    else if (wallHit)
        spawnWallHit(wallHit, wallNormal);
}

function spawnWallHit(pos, normal)
{
    // tangent runs along the wall surface (perpendicular to normal)
    const tx = -normal.y, ty = normal.x;
    // bright central flash — short and bright
    hitEffects.push({
        pos:   pos.add(normal.scale(.04)),
        vel:   vec2(0, 0),
        age:   0,
        life:  .12,
        scale: .18,
    });
    // a few sparks shooting outward from the wall with a tight cone
    for (let i = 0; i < 5; ++i)
    {
        const along = rand(-1, 1) * .22;     // mostly straight out, only a little lateral spread
        const out   = .8 + rand() * .5;      // strong outward bias
        let dx = normal.x * out + tx * along;
        let dy = normal.y * out + ty * along;
        const len = Math.hypot(dx, dy) || 1;
        const sp  = .012 + rand() * .015;
        hitEffects.push({
            pos:   pos.add(normal.scale(.04)),
            vel:   vec2(dx / len * sp, dy / len * sp),
            age:   0,
            life:  .22 + rand() * .12,
            scale: .06,
        });
    }
    sndWallHit.play();
}

function killEnemy(e)
{
    e.alive = false;
    e.state = 'idle';
    ++kills;
    sndEnemyDie.play();
    // splatter — speeds are PER-FRAME (≈30 wu/s at .5)
    new ParticleEmitter(
        e.pos, 0,                                   // pos, angle
        .4, .15, 80, PI,                            // emitSize, emitTime, emitRate, emitConeAngle
        undefined,                                  // tileInfo (untextured)
        new Color(1, .1, .1, 1), new Color(.4, 0, 0, 1),
        new Color(1, .3, .3, 0), new Color(.2, 0, 0, 0),
        .35,                                        // particleTime
        .15, .35,                                   // sizeStart, sizeEnd
        .35, .04,                                   // speed (per-frame), angleSpeed
        .95, 1, 0,                                  // damping, angleDamping, gravityScale
        PI, .2, .1,                                 // particleConeAngle, fadeRate, randomness
        false, true                                 // collideTiles, additive
    );
}

const ENEMY_SPEED = .032;         // world units per frame (player moves .08)
const ENEMY_IDEAL_DIST = 3.5;     // ranged guards stop and shoot at this range
const ENEMY_SIGHT_DIST = 14;
const ENEMY_PATROL_SPEED = .018;  // slower wander
const ENEMY_SEARCH_SECONDS = 5;   // give up on hunting after this many sec of no-LOS

// Melee charger constants
const MELEE_SPEED = .055;         // ~70% of player walking speed — closes fast
const MELEE_ATTACK_RANGE = .9;
const MELEE_ATTACK_DAMAGE = 16;
const MELEE_ATTACK_COOLDOWN = .8;

function moveEnemyToward(e, target, speed = ENEMY_SPEED)
{
    const toward = target.subtract(e.pos);
    const len = toward.length();
    if (len < .001) return;
    const step = toward.scale(speed / len);
    const normal = vec2();
    let newPos = e.pos.add(step);
    if (lineTest(e.pos, newPos, isBlocking, normal))
    {
        // slide along the surface so the guard doesn't get stuck on corners
        const d = step.dot(normal);
        newPos = newPos.subtract(vec2(d * normal.x, d * normal.y));
        if (!isBlocking(newPos)) e.pos = newPos;
    }
    else e.pos = newPos;
}

function updateEnemy(e)
{
    if (!e.alive) return;
    const dist = e.pos.distance(playerPos);
    const losClear = !lineTest(e.pos, playerPos, isWallAt);
    const canSee = losClear && dist < ENEMY_SIGHT_DIST;

    // ---- sense / alert ----
    if (canSee)
    {
        if (!e.seenPlayer)
        {
            sndAlert.play();
            e.seenPlayer = true;
            e.path = [];      // force a fresh path next step
        }
        e.lastKnownPlayerPos = playerPos.copy();
        e.searchTime = 0;
    }
    else if (e.seenPlayer)
    {
        e.searchTime += 1/60;
        if (e.searchTime > ENEMY_SEARCH_SECONDS)
        {
            // gave up — back to patrol/sentry behavior
            e.seenPlayer = false;
            e.lastKnownPlayerPos = null;
            e.path = [];
        }
    }

    // ---- choose movement goal ----
    let goal = null;
    let chasing = false;
    const stopDist = e.kind === 'melee' ? MELEE_ATTACK_RANGE * .9 : ENEMY_IDEAL_DIST;
    if (e.seenPlayer && canSee && dist > stopDist)
    {
        goal = playerPos;
        chasing = true;       // repath more aggressively
    }
    else if (e.seenPlayer && !canSee && e.lastKnownPlayerPos)
    {
        if (e.pos.distance(e.lastKnownPlayerPos) > .5)
            goal = e.lastKnownPlayerPos;
        else
        {
            // reached last-known and didn't find them — give up immediately
            e.lastKnownPlayerPos = null;
            e.seenPlayer = false;
            e.path = [];
        }
    }
    else if (!e.seenPlayer && e.kind === 'patroller')
    {
        if (e.patrolPauseTimer > 0)
            e.patrolPauseTimer -= 1/60;
        else
        {
            // pick a new patrol target if we don't have one yet
            if (!e.patrolTarget)
            {
                e.patrolTarget = pickRandomWalkableNear(e.homePos, 4);
                e.path = [];
            }
            // reached target → pause briefly, then pick a new one next tick
            if (e.patrolTarget && e.pos.distance(e.patrolTarget) < .4)
            {
                e.patrolTarget = null;
                e.patrolPauseTimer = 1 + rand(0, 2);
            }
            else if (e.patrolTarget)
                goal = e.patrolTarget;
        }
    }
    // sentries with no LOS just stand still — goal stays null

    // ---- refresh path ----
    if (goal)
    {
        e.repathTimer += 1/60;
        const threshold = chasing ? .4 : 1.5;
        if (e.path.length === 0 || e.repathTimer > threshold)
        {
            e.path = pathFinder.findPath(e.pos, goal);
            e.pathIndex = 0;
            e.repathTimer = 0;
        }
    }

    // ---- walk along path (skip while shooting so the guard commits) ----
    if (e.state !== 'shoot' && e.path.length > 0 && e.pathIndex < e.path.length)
    {
        const wp = e.path[e.pathIndex];
        if (e.pos.distance(wp) < .15)
            ++e.pathIndex;
        else
        {
            let speed;
            if (e.kind === 'melee')     speed = MELEE_SPEED;
            else if (e.seenPlayer)      speed = ENEMY_SPEED;
            else                        speed = ENEMY_PATROL_SPEED;
            moveEnemyToward(e, wp, speed);
        }
    }

    // ---- attack ----
    if (e.kind === 'melee')
    {
        // melee: charge into player, swing on cooldown when in range
        if (canSee && dist < MELEE_ATTACK_RANGE)
        {
            e.shootCooldown -= 1/60;
            if (e.shootCooldown <= 0)
            {
                if (!lineTest(e.pos, playerPos, isWallAt))
                {
                    damagePlayer(MELEE_ATTACK_DAMAGE);
                    sndEnemyShoot.play();   // reuse the enemy-shoot sound for the swing impact
                }
                e.shootCooldown = MELEE_ATTACK_COOLDOWN;
            }
        }
        else if (e.shootCooldown > .3)
            e.shootCooldown = .3;           // re-arm quickly the moment they get close
    }
    else
    {
        // ranged guard: telegraph + shoot
        if (canSee && dist <= ENEMY_IDEAL_DIST + .5)
        {
            if (e.state === 'idle')
            {
                e.shootCooldown -= 1/60;
                if (e.shootCooldown <= 0)
                {
                    e.state = 'shoot';
                    e.windup = .55;
                }
            }
            else if (e.state === 'shoot')
            {
                e.windup -= 1/60;
                if (e.windup <= 0)
                {
                    e.state = 'idle';
                    e.shootCooldown = 1.0 + rand(0, .6);
                    if (!lineTest(e.pos, playerPos, isWallAt))
                    {
                        const dmg = Math.round(8 + 14 * Math.max(0, 1 - dist / ENEMY_SIGHT_DIST));
                        damagePlayer(dmg);
                        sndEnemyShoot.play();
                    }
                }
            }
        }
        else
        {
            e.state = 'idle';
            if (e.shootCooldown > .4) e.shootCooldown = .4;
            e.windup = 0;
        }
    }
}

function damagePlayer(amount)
{
    playerHP -= amount;
    hitFlashT = .35;
    sndHurt.play();
    if (playerHP <= 0)
    {
        playerHP = 0;
        isAlive = false;
        deathFlashT = 1;
        setPlaying(false);
        showMenu('dead');
    }
}

function triggerVictory()
{
    sndVictory.play();
    setPlaying(false);
    const stats = getMenu('victory').getItem('vstats');
    if (stats) stats.setLabel(`HP LEFT ${playerHP} / ${PLAYER_MAX_HP}`);
    showMenu('victory');
}

///////////////////////////////////////////////////////////////////////////////
// RENDER
function drawFloorCeiling(h)
{
    const pos = vec2(), size = vec2(SLICE_W * 2 + 2, .12);
    const c = rgb();
    for (let y = -h; y < h; y += .1)
    {
        const p = 1 - Math.min(1, Math.abs(y / h));
        if (y > 0)
            c.setHSLA(.6, .15, .04 + (1 - p) * .25);    // ceiling: cool dark
        else
            c.setHSLA(.08, .35, .06 + (1 - p) * .35);   // floor: warm dark
        pos.y = y;
        drawRect(pos, size, c);
    }
}

function gameRender()
{
    // fit the slice rect across the canvas width
    cameraScale = mainCanvasSize.x / (2 * SLICE_W);
    const h = (mainCanvasSize.y / cameraScale) / 2;

    drawFloorCeiling(h);

    // unified painter's list — wall slices + sprites, all entries have a .dist
    const drawList = [];

    const wallNormal = vec2();
    const wallEnd = vec2();
    for (let sx = -SLICE_W; sx < SLICE_W; sx += SLICE_STEP)
    {
        // LittleJS CW-positive convention: right-of-screen = larger angle = CW of forward
        const relAng = sx * ANGLE_PER_X;
        const rayAng = playerAngle + relAng;
        wallEnd.x = playerPos.x + Math.sin(rayAng) * MAX_DIST;
        wallEnd.y = playerPos.y + Math.cos(rayAng) * MAX_DIST;
        const hit = lineTest(playerPos, wallEnd, isWallAt, wallNormal);
        if (!hit) continue;
        const rayDist = hit.distance(playerPos);
        const perpDist = rayDist * Math.cos(relAng);
        if (perpDist < .001) continue;       // only skip truly degenerate hits; near-wall slices stay drawn

        // pick which cell we entered (step back into the cell along the ray normal)
        const cellProbe = hit.subtract(vec2(wallNormal.x * .001, wallNormal.y * .001));
        const cx = Math.floor(cellProbe.x), cy = Math.floor(cellProbe.y);
        const tileIdx = wallTileAt(cx, cy);
        const origin = tileCellPx(tileIdx);

        // u-coordinate along the wall surface: pick the axis perpendicular to the normal
        // walls are axis-aligned, so exactly one of normal.x/normal.y is non-zero
        const u = Math.abs(wallNormal.x) > .5
            ? (hit.y - Math.floor(hit.y))   // vertical wall — sample along Y
            : (hit.x - Math.floor(hit.x));  // horizontal wall — sample along X
        // clamp so the 2-px sample never crosses the right tile edge into the
        // atlas gutter — that's what was showing as transparent vertical cracks
        // at every cell seam.
        const samplePx = origin.x + Math.min(CELL_PIX - 2, u * CELL_PIX);

        // lighting: face the +X-leaning light, shadow walls facing away
        const lit = Math.max(0, wallNormal.x * .5 + wallNormal.y * .8);
        const fogT = Math.min(1, perpDist / MAX_DIST);
        const bright = Math.max(.08, .55 - fogT * .45 + lit * .35);

        const _sx = sx, _samplePx = samplePx, _originY = origin.y,
              _perpDist = perpDist, _bright = bright;
        drawList.push({
            dist: perpDist,
            draw: () =>
            {
                wallSliceInfo.pos.x = _samplePx;
                wallSliceInfo.pos.y = _originY;
                // cap slice height so an extreme close-up doesn't push gigantic geometry into webgl
                const sz = vec2(SLICE_STEP * 1.5, Math.min(5000, PROJ / _perpDist));
                drawTile(vec2(_sx, 0), sz, wallSliceInfo, hsl(0, 0, _bright));
            },
        });
    }

    // sprites: enemies + exit
    function pushSprite(worldPos, tile, opts)
    {
        const toS = worldPos.subtract(playerPos);
        const dist = toS.length();
        if (dist > MAX_DIST || dist < .1) return;
        // LittleJS angle convention: Vector2.angle() is atan2(x, y), 0 = +Y, CW positive
        let relAng = Math.atan2(toS.x, toS.y) - playerAngle;
        while (relAng >  PI) relAng -= 2 * PI;
        while (relAng < -PI) relAng += 2 * PI;
        if (Math.abs(relAng) > FOV / 2 + .8) return;     // very off-screen
        const perpDist = dist * Math.cos(relAng);
        if (perpDist < .15) return;
        const screenX = relAng * SCREEN_X_PER_RAD;       // CW of forward = right of screen
        const scale = opts?.scale ?? 1;
        const sizeW = scale * SCREEN_X_PER_RAD / perpDist;
        const sizeH = scale * PROJ / perpDist;
        const fogT = Math.min(1, perpDist / MAX_DIST);
        const dim = opts?.noFog ? 1 : (1 - fogT * .55);
        const tint = (opts?.tint ?? 1) * dim;
        // grounded:true shifts a small sprite down so its bottom edge sits at
        // the floor instead of floating at horizon-level.
        const groundShift = opts?.grounded ? -(1 - scale) * PROJ / (2 * perpDist) : 0;
        const yOff = (opts?.yOff ?? 0) + groundShift;
        // Default: grayscale tint with full alpha (existing behavior — enemies, walls, lamps).
        // For effects that should fade out, pass {color: WHITE} — Color.scale fades alpha too.
        const baseColor = opts?.color;
        const color = baseColor ? baseColor.scale(tint) : hsl(0, 0, tint);
        drawList.push({
            dist: perpDist,
            draw: () => drawTile(vec2(screenX, yOff), vec2(sizeW, sizeH), tile, color),
        });
    }

    for (const e of enemies)
    {
        if (e.alive)
        {
            let tile;
            if (e.kind === 'melee')
                tile = meleeTile;
            else
                tile = e.state === 'shoot' && e.windup < .25 ? guardShootTile : guardIdleTile;
            pushSprite(e.pos, tile);
        }
        else
            pushSprite(e.pos, guardDeadTile, {tint: .8});
    }
    // decorations: lamps glow (no fog dimming + sine pulse); barrels are normal billboards
    for (const d of decorations)
    {
        if (d.kind === 'lamp')
        {
            const pulse = .72 + .08 * Math.sin(time * 4 + d.pos.x * 1.3 + d.pos.y * .7);
            pushSprite(d.pos, lampTile, {tint: pulse, noFog: true});
        }
        else if (d.kind === 'barrel')
            pushSprite(d.pos, barrelTile);
    }
    // pickups — small floor-resting billboards with a gentle hover bob
    for (const p of pickups)
    {
        const bob = Math.sin(time * 3 + p.pos.x * 1.1 + p.pos.y * .7) * .08;
        const tile = p.kind === 'health' ? healthTile : ammoTile;
        pushSprite(p.pos, tile, {yOff: bob, scale: .32, grounded: true});
    }
    // bullet-impact puffs — short-lived, fade out via alpha
    for (const p of hitEffects)
    {
        const t = p.age / p.life;       // 0 → 1 over lifetime
        const fade = 1 - t;
        pushSprite(p.pos, sparkTile, {
            tint:   fade,
            color:  WHITE,              // makes Color.scale fade alpha too
            noFog:  true,
            scale:  p.scale * (1 + t * .6),  // expand a bit as they fade
        });
    }

    // painter's algorithm — far first
    drawList.sort((a, b) => b.dist - a.dist);
    for (const item of drawList) item.draw();
}

function gameRenderPost()
{
    if (!isPlaying()) return;
    const W = mainCanvasSize.x, H = mainCanvasSize.y;

    // 1st-person gun with walk-bob
    const gunTile = muzzleFlashT > 0 ? gunFireTile : gunIdleTile;
    const gunSide = Math.min(W, H) * .55;
    const bobX = Math.sin(bobPhase) * gunSide * .035 * bobAmount;
    const bobY = Math.abs(Math.sin(bobPhase)) * gunSide * .03 * bobAmount;
    drawTile(vec2(W / 2 + bobX, H - gunSide * .30 + bobY), vec2(gunSide), gunTile,
        WHITE, 0, false, undefined, true, true);

    // crosshair
    const cx = W / 2, cy = H / 2, r = 10;
    drawRect(vec2(cx, cy), vec2(r * 2, 2), WHITE, 0, false, true);
    drawRect(vec2(cx, cy), vec2(2, r * 2), WHITE, 0, false, true);

    // HP bar
    const bw = 240, bh = 18;
    const bx = 30, by = 30;
    drawRect(vec2(bx + bw / 2, by + bh / 2), vec2(bw + 6, bh + 6),
        new Color(0, 0, 0, .7), 0, false, true);
    drawRect(vec2(bx + bw / 2, by + bh / 2), vec2(bw, bh),
        new Color(.1, .05, .05, 1), 0, false, true);
    const hpFrac = playerHP / PLAYER_MAX_HP;
    drawRect(vec2(bx + (bw * hpFrac) / 2, by + bh / 2),
        vec2(bw * hpFrac, bh),
        hsl(hpFrac * .33, .8, .5), 0, false, true);
    drawTextScreen(`HP ${playerHP}`, vec2(bx + 10, by + bh / 2 + 1),
        18, WHITE, 3, BLACK, 'left');

    // ammo counter just right of the HP bar; goes red when low
    const ammoColor = playerAmmo === 0 ? hsl(0, 1, .65)
        : playerAmmo < 5 ? hsl(.05, 1, .65)
        : WHITE;
    drawTextScreen(`AMMO ${playerAmmo}`,
        vec2(bx + bw + 18, by + bh / 2 + 1),
        18, ammoColor, 3, BLACK, 'left');

    // kill counter
    drawTextScreen(`GUARDS ${kills}/${enemies.length}`,
        vec2(W / 2, 35), 22, WHITE, 3, BLACK);

    // hint when all dead
    if (enemies.every(e => !e.alive) && exitPos)
        drawTextScreen('REACH THE EXIT', vec2(W / 2, 80),
            22, hsl(.13, 1, .7), 3, BLACK);

    // minimap, top-left
    drawMinimap();

    // hit flash
    if (hitFlashT > 0)
    {
        const a = (hitFlashT / .35) * .55;
        drawRect(vec2(W / 2, H / 2), vec2(W, H),
            new Color(1, 0, 0, a), 0, false, true);
    }
}

// Top-left minimap. Screen space (Y-down), world is Y-up, so the Y axis is
// flipped here to keep north at the top of the map. Walls/exit/decorations are
// drawn as cells, alive enemies + pickups as dots, and the player as a dot with
// a short facing arrow.
function drawMinimap()
{
    const W = mainCanvasSize.x, H = mainCanvasSize.y;
    const mapSize = Math.min(W, H) * .22;    // overall pixel size of the square map
    const cell = mapSize / LEVEL_W;
    const ox = 30, oy = 64;                  // origin: just below the HP bar
    // world (x, y-up) -> minimap pixel (y-down, north at top)
    const toScreen = (wx, wy) => vec2(ox + wx * cell, oy + (LEVEL_H - wy) * cell);
    const center = vec2(ox + mapSize / 2, oy + mapSize / 2);

    // framed backdrop
    drawRect(center, vec2(mapSize + 10, mapSize + 10), new Color(.6, .55, .65, .5), 0, false, true);
    drawRect(center, vec2(mapSize + 4, mapSize + 4), new Color(0, 0, 0, .6), 0, false, true);

    // cells (floor is left as the dark backdrop)
    for (let gy = 0; gy < LEVEL_H; ++gy)
    for (let gx = 0; gx < LEVEL_W; ++gx)
    {
        const c = levelGrid[gy][gx];
        let col;
        if      (c === '#')              col = new Color(.5, .46, .55, .95);  // wall
        else if (c === 'X')              col = new Color(.95, .78, .2, 1);    // exit
        else if (c === 'L' || c === 'B') col = new Color(.4, .32, .22, .85);  // decoration
        else continue;
        drawRect(toScreen(gx + .5, gy + .5), vec2(cell, cell), col, 0, false, true);
    }

    // pickups
    for (const p of pickups)
    {
        const col = p.kind === 'health' ? new Color(.25, .9, .35, 1) : new Color(.95, .8, .3, 1);
        drawRect(toScreen(p.pos.x, p.pos.y), vec2(cell * .55, cell * .55), col, 0, false, true);
    }

    // alive enemies
    for (const e of enemies)
    {
        if (!e.alive) continue;
        const col = e.kind === 'melee' ? new Color(1, .4, .85, 1) : new Color(1, .25, .2, 1);
        drawRect(toScreen(e.pos.x, e.pos.y), vec2(cell * .65, cell * .65), col, 0, false, true);
    }

    // player + facing arrow (forward world delta = (sin a, cos a); screen Y inverted)
    const pc = toScreen(playerPos.x, playerPos.y);
    const fwd = vec2(Math.sin(playerAngle), -Math.cos(playerAngle));
    drawLine(pc, pc.add(fwd.scale(cell * 2)), 3, new Color(1, 1, 1, 1), vec2(), 0, false, true);
    drawRect(pc, vec2(cell * .75, cell * .75), new Color(.3, .9, 1, 1), 0, false, true);
}

///////////////////////////////////////////////////////////////////////////////
engineInit(gameInit, gameUpdate, () => {}, gameRender, gameRenderPost);
</script></body></html>
