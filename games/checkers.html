<!DOCTYPE html><head>
<title>LittleJS Checkers</title>
<meta charset="utf-8">
</head><body style="background:#000">
<script src="../dist/littlejs.js?1.18.0"></script>
<script>
'use strict';

// engine settings, do not remove
debugWatermark = false;
showEngineVersion = false;
paused = false;

gravity = vec2(0, 0);
cameraPos = vec2(0, 0);
cameraScale = 42;

// AI can use this class to make sound effects
class SoundGenerator extends Sound
{
    constructor(params = {})
    {
        const {
            volume = 1,
            randomness = .05,
            frequency = 220,
            attack = 0,
            release = .1,
            shapeCurve = 1,
            slide = 0,
            pitchJump = 0,
            pitchJumpTime = 0,
            repeatTime = 0,
            noise = 0,
            bitCrush = 0,
            delay = 0,
        } = params;

        super([volume, randomness, frequency, attack, 0, release, 0, shapeCurve, slide, 0,
            pitchJump, pitchJumpTime, repeatTime, noise, 0, bitCrush, delay, 1, 0, 0, 0]);
    }
}

///////////////////////////////////////////////////////////////////////////////
// CHECKERS GAME

const BOARD_SIZE = 8;
const CELL_SIZE = 1.8;
const PIECE_RADIUS = 0.65;

const P_EMPTY = 0;
const P_RED = 1;
const P_BLACK = 2;
const P_RED_KING = 3;
const P_BLACK_KING = 4;

const PLAYER_RED = 1;
const PLAYER_BLACK = 2;

const PLAYER_HUMAN = PLAYER_RED;
const PLAYER_AI = PLAYER_BLACK;

// Game state
let board = [];
let currentPlayer = PLAYER_RED;
let gameOver = false;
let winner = null;
let redCount = 12;
let blackCount = 12;
let gameMode = 'menu'; // 'menu', 'pvp', 'ai'
let selectedCell = null;
let allPlayerMoves = [];   // all legal moves for currentPlayer
let pieceValidMoves = [];  // legal moves starting from selectedCell
let mustContinueJump = false;
let moveHistory = [];
let lastMove = null;

// Animation
let movingPiece = null; // {fromRow, fromCol, toRow, toCol, piece, progress, capture, capturedPiece}
const MOVE_DURATION = 0.25;

// UI
let btnVsAI, btnVsPlayer;

// Sounds
let sfxMove, sfxCapture, sfxKing, sfxWin, sfxLose, sfxSelect;

///////////////////////////////////////////////////////////////////////////////
// BOARD LOGIC

function playerOf(piece)
{
    if (piece === P_RED || piece === P_RED_KING) return PLAYER_RED;
    if (piece === P_BLACK || piece === P_BLACK_KING) return PLAYER_BLACK;
    return 0;
}

function isKing(piece)
{
    return piece === P_RED_KING || piece === P_BLACK_KING;
}

function getOpponent(player)
{
    return player === PLAYER_RED ? PLAYER_BLACK : PLAYER_RED;
}

function isInBounds(row, col)
{
    return row >= 0 && row < BOARD_SIZE && col >= 0 && col < BOARD_SIZE;
}

function initBoard()
{
    board = [];
    for (let row = 0; row < BOARD_SIZE; row++)
    {
        board[row] = [];
        for (let col = 0; col < BOARD_SIZE; col++)
        {
            // Pieces only on dark squares (row+col) odd
            if ((row + col) % 2 === 1)
            {
                if (row < 3) board[row][col] = P_BLACK;      // top rows = black
                else if (row > 4) board[row][col] = P_RED;   // bottom rows = red
                else board[row][col] = P_EMPTY;
            }
            else
                board[row][col] = P_EMPTY;
        }
    }

    currentPlayer = PLAYER_RED;
    gameOver = false;
    winner = null;
    redCount = 12;
    blackCount = 12;
    selectedCell = null;
    pieceValidMoves = [];
    mustContinueJump = false;
    moveHistory = [];
    lastMove = null;
    movingPiece = null;

    updateAllPlayerMoves();
}

function getPieceMoves(row, col)
{
    const piece = board[row][col];
    const moves = [];
    const jumps = [];
    if (piece === P_EMPTY) return {moves, jumps};

    const player = playerOf(piece);
    const king = isKing(piece);

    // Red moves up (row decreases), Black moves down (row increases); Kings move both ways.
    let dirs;
    if (king)                        dirs = [[-1,-1],[-1,1],[1,-1],[1,1]];
    else if (player === PLAYER_RED)  dirs = [[-1,-1],[-1,1]];
    else                             dirs = [[1,-1],[1,1]];

    for (const [dr, dc] of dirs)
    {
        const nr = row + dr, nc = col + dc;
        if (!isInBounds(nr, nc)) continue;

        if (board[nr][nc] === P_EMPTY)
        {
            moves.push({row: nr, col: nc, capture: null});
        }
        else if (playerOf(board[nr][nc]) === getOpponent(player))
        {
            const jr = row + dr * 2, jc = col + dc * 2;
            if (isInBounds(jr, jc) && board[jr][jc] === P_EMPTY)
                jumps.push({row: jr, col: jc, capture: {row: nr, col: nc}});
        }
    }

    return {moves, jumps};
}

function updateAllPlayerMoves()
{
    allPlayerMoves = [];
    let anyJumps = false;

    for (let row = 0; row < BOARD_SIZE; row++)
    {
        for (let col = 0; col < BOARD_SIZE; col++)
        {
            if (playerOf(board[row][col]) === currentPlayer)
            {
                const {jumps} = getPieceMoves(row, col);
                for (const j of jumps)
                {
                    anyJumps = true;
                    allPlayerMoves.push({fromRow: row, fromCol: col, toRow: j.row, toCol: j.col, capture: j.capture});
                }
            }
        }
    }

    // Jumps are mandatory: if any jumps exist, only jumps are legal.
    if (!anyJumps)
    {
        for (let row = 0; row < BOARD_SIZE; row++)
        {
            for (let col = 0; col < BOARD_SIZE; col++)
            {
                if (playerOf(board[row][col]) === currentPlayer)
                {
                    const {moves} = getPieceMoves(row, col);
                    for (const m of moves)
                        allPlayerMoves.push({fromRow: row, fromCol: col, toRow: m.row, toCol: m.col, capture: null});
                }
            }
        }
    }

    if (allPlayerMoves.length === 0 && !gameOver)
        endGame(getOpponent(currentPlayer));
}

function getValidMovesForPiece(row, col)
{
    return allPlayerMoves.filter(m => m.fromRow === row && m.fromCol === col);
}

function makeMove(move)
{
    // Save history for undo
    moveHistory.push({
        board: board.map(r => [...r]),
        currentPlayer,
        redCount,
        blackCount,
        lastMove: lastMove ? {...lastMove} : null
    });

    const piece = board[move.fromRow][move.fromCol];

    // Set up animation BEFORE mutating the board
    let capturedPiece = P_EMPTY;
    if (move.capture)
        capturedPiece = board[move.capture.row][move.capture.col];

    movingPiece = {
        fromRow: move.fromRow, fromCol: move.fromCol,
        toRow: move.toRow, toCol: move.toCol,
        piece: piece,
        progress: 0,
        capture: move.capture,
        capturedPiece: capturedPiece
    };

    board[move.fromRow][move.fromCol] = P_EMPTY;
    board[move.toRow][move.toCol] = piece;

    let promoted = false;
    if (move.capture)
    {
        board[move.capture.row][move.capture.col] = P_EMPTY;
        if (playerOf(capturedPiece) === PLAYER_RED) redCount--;
        else blackCount--;
        sfxCapture && sfxCapture.play();
    }
    else
    {
        sfxMove && sfxMove.play();
    }

    // King promotion
    if (piece === P_RED && move.toRow === 0)
    {
        board[move.toRow][move.toCol] = P_RED_KING;
        promoted = true;
        sfxKing && sfxKing.play();
    }
    else if (piece === P_BLACK && move.toRow === BOARD_SIZE - 1)
    {
        board[move.toRow][move.toCol] = P_BLACK_KING;
        promoted = true;
        sfxKing && sfxKing.play();
    }

    lastMove = {fromRow: move.fromRow, fromCol: move.fromCol, toRow: move.toRow, toCol: move.toCol};

    // Multi-jump: after capture, if the moved piece can jump again (and wasn't just promoted), continue.
    let canContinue = false;
    if (move.capture && !promoted)
    {
        const {jumps} = getPieceMoves(move.toRow, move.toCol);
        if (jumps.length > 0)
        {
            canContinue = true;
            selectedCell = {row: move.toRow, col: move.toCol};
            allPlayerMoves = jumps.map(j => ({fromRow: move.toRow, fromCol: move.toCol, toRow: j.row, toCol: j.col, capture: j.capture}));
            pieceValidMoves = allPlayerMoves.slice();
            mustContinueJump = true;
        }
    }

    if (!canContinue)
    {
        mustContinueJump = false;
        selectedCell = null;
        pieceValidMoves = [];
        currentPlayer = getOpponent(currentPlayer);
        updateAllPlayerMoves();
    }

    // Win if opponent has no pieces
    if (redCount === 0)      endGame(PLAYER_BLACK);
    else if (blackCount === 0) endGame(PLAYER_RED);
}

function endGame(winnerPlayer)
{
    gameOver = true;
    winner = winnerPlayer;
    if (gameMode === 'ai')
    {
        if (winner === PLAYER_HUMAN) sfxWin && sfxWin.play();
        else sfxLose && sfxLose.play();
    }
}

function undoMove()
{
    if (moveHistory.length === 0 || gameOver) return false;

    const undoCount = (gameMode === 'ai' && moveHistory.length >= 2) ? 2 : 1;

    for (let i = 0; i < undoCount && moveHistory.length > 0; i++)
    {
        const state = moveHistory.pop();
        board = state.board;
        currentPlayer = state.currentPlayer;
        redCount = state.redCount;
        blackCount = state.blackCount;
        lastMove = state.lastMove;
    }

    selectedCell = null;
    pieceValidMoves = [];
    mustContinueJump = false;
    movingPiece = null;
    updateAllPlayerMoves();
    sfxSelect && sfxSelect.play();
    return true;
}

///////////////////////////////////////////////////////////////////////////////
// AI

function evaluateBoard(player)
{
    let score = 0;
    for (let row = 0; row < BOARD_SIZE; row++)
    {
        for (let col = 0; col < BOARD_SIZE; col++)
        {
            const p = board[row][col];
            if (p === P_EMPTY) continue;

            let val = isKing(p) ? 3 : 1;
            // Advancement bonus (more valuable the further up board)
            if (p === P_RED)   val += (BOARD_SIZE - 1 - row) * 0.08;
            if (p === P_BLACK) val += row * 0.08;
            // Back row defenders worth a bit extra
            if (p === P_RED   && row === BOARD_SIZE - 1) val += 0.3;
            if (p === P_BLACK && row === 0)              val += 0.3;

            if (playerOf(p) === player) score += val;
            else score -= val;
        }
    }
    return score;
}

function findBestAIMove()
{
    if (allPlayerMoves.length === 0) return null;

    let best = null;
    let bestScore = -Infinity;

    for (const move of allPlayerMoves)
    {
        // Simulate
        const oldBoard = board.map(r => [...r]);
        const oldRed = redCount, oldBlack = blackCount;

        const piece = board[move.fromRow][move.fromCol];
        board[move.fromRow][move.fromCol] = P_EMPTY;
        board[move.toRow][move.toCol] = piece;

        if (move.capture)
        {
            const cap = board[move.capture.row][move.capture.col];
            if (playerOf(cap) === PLAYER_RED) redCount--;
            else blackCount--;
            board[move.capture.row][move.capture.col] = P_EMPTY;
        }

        // Promotion in sim
        if (piece === P_BLACK && move.toRow === BOARD_SIZE - 1)
            board[move.toRow][move.toCol] = P_BLACK_KING;
        if (piece === P_RED && move.toRow === 0)
            board[move.toRow][move.toCol] = P_RED_KING;

        const score = evaluateBoard(PLAYER_AI) + rand(0, 0.3);

        if (score > bestScore)
        {
            bestScore = score;
            best = move;
        }

        board = oldBoard;
        redCount = oldRed;
        blackCount = oldBlack;
    }

    return best;
}

///////////////////////////////////////////////////////////////////////////////
// RENDERING

function getCellWorldPos(row, col)
{
    const boardOffset = -(BOARD_SIZE * CELL_SIZE) / 2;
    return vec2(
        boardOffset + col * CELL_SIZE + CELL_SIZE / 2,
        boardOffset + (BOARD_SIZE - 1 - row) * CELL_SIZE + CELL_SIZE / 2
    );
}

function worldPosToCell(worldPos)
{
    const boardOffset = -(BOARD_SIZE * CELL_SIZE) / 2;
    const col = Math.floor((worldPos.x - boardOffset) / CELL_SIZE);
    const row = BOARD_SIZE - 1 - Math.floor((worldPos.y - boardOffset) / CELL_SIZE);
    if (isInBounds(row, col)) return {row, col};
    return null;
}

function drawPiece(pos, piece, scale = 1)
{
    const r = PIECE_RADIUS * scale;
    const player = playerOf(piece);

    // Shadow
    drawCircle(pos.add(vec2(0.1, -0.1)), r * 2 * 0.95, rgb(0, 0, 0, 0.4));

    const main = player === PLAYER_RED ? hsl(0,    0.85, 0.45) : hsl(0, 0, 0.12);
    const dark = player === PLAYER_RED ? hsl(0,    0.85, 0.25) : hsl(0, 0, 0.02);
    const hi   = player === PLAYER_RED ? hsl(0.02, 0.8,  0.65) : hsl(0, 0, 0.35);

    drawCircle(pos, r * 2,        dark);
    drawCircle(pos, r * 2 * 0.88, main);
    drawCircle(pos, r * 2 * 0.7,  dark);
    drawCircle(pos, r * 2 * 0.62, main);
    drawCircle(pos.add(vec2(-0.18 * scale, 0.18 * scale)), r * 2 * 0.28, hi);

    if (isKing(piece))
    {
        drawCircle(pos, r * 2 * 0.42, hsl(.12, 1, .55));
        drawText('K', pos.add(vec2(0, -0.04)), r * 1.05, rgb(.2, .1, 0), 0.08, hsl(.13, 1, .8));
    }
}

function drawBoard()
{
    const boardWorldSize = BOARD_SIZE * CELL_SIZE;

    // Frame
    drawRect(vec2(0, 0), vec2(boardWorldSize + 0.6), hsl(.08, .7, .12));
    drawRect(vec2(0, 0), vec2(boardWorldSize + 0.3), hsl(.08, .6, .25));

    // Squares
    for (let row = 0; row < BOARD_SIZE; row++)
    {
        for (let col = 0; col < BOARD_SIZE; col++)
        {
            const pos = getCellWorldPos(row, col);
            const light = (row + col) % 2 === 0;
            const color = light ? hsl(.1, .4, .8) : hsl(.07, .7, .22);
            drawRect(pos, vec2(CELL_SIZE), color);
        }
    }

    // Last move highlight
    if (lastMove && !gameOver)
    {
        const fromPos = getCellWorldPos(lastMove.fromRow, lastMove.fromCol);
        const toPos   = getCellWorldPos(lastMove.toRow, lastMove.toCol);
        drawRect(fromPos, vec2(CELL_SIZE * 0.95), rgb(1, 1, 0.3, 0.2));
        drawRect(toPos,   vec2(CELL_SIZE * 0.95), rgb(1, 1, 0.3, 0.3));
    }

    // Selected piece highlight
    if (selectedCell)
    {
        const pos = getCellWorldPos(selectedCell.row, selectedCell.col);
        const pulse = 1 + Math.sin(time * 5) * 0.08;
        drawRect(pos, vec2(CELL_SIZE * 0.95 * pulse), rgb(0.3, 1, 0.3, 0.35));
    }

    // Valid move indicators for selected piece
    if (selectedCell && !gameOver)
    {
        for (const m of pieceValidMoves)
        {
            const pos = getCellWorldPos(m.toRow, m.toCol);
            const color = m.capture ? rgb(1, 0.3, 0.3, 0.7) : rgb(0.3, 1, 0.4, 0.6);
            drawCircle(pos, PIECE_RADIUS * 2 * 0.6, color);
        }
    }

    // Hint: pulse pieces that have legal moves when nothing selected
    if (!selectedCell && !gameOver && !movingPiece &&
        (gameMode === 'pvp' || currentPlayer === PLAYER_HUMAN))
    {
        const hintAlpha = 0.3 + Math.sin(time * 4) * 0.15;
        const seen = new Set();
        for (const m of allPlayerMoves)
        {
            const key = m.fromRow + ',' + m.fromCol;
            if (seen.has(key)) continue;
            seen.add(key);
            const pos = getCellWorldPos(m.fromRow, m.fromCol);
            drawRect(pos, vec2(CELL_SIZE * 0.85), rgb(0.3, 1, 0.5, hintAlpha));
        }
    }

    // Pieces
    for (let row = 0; row < BOARD_SIZE; row++)
    {
        for (let col = 0; col < BOARD_SIZE; col++)
        {
            if (board[row][col] === P_EMPTY) continue;
            // Skip the piece currently being animated at its destination
            if (movingPiece && movingPiece.toRow === row && movingPiece.toCol === col) continue;
            drawPiece(getCellWorldPos(row, col), board[row][col]);
        }
    }

    // Animated moving piece
    if (movingPiece)
    {
        const t = movingPiece.progress;

        // Fading captured piece
        if (movingPiece.capture && t < 0.9)
        {
            const capPos = getCellWorldPos(movingPiece.capture.row, movingPiece.capture.col);
            const scale = 1 - t * 0.9;
            drawPiece(capPos, movingPiece.capturedPiece, Math.max(scale, 0.1));
        }

        const fromPos = getCellWorldPos(movingPiece.fromRow, movingPiece.fromCol);
        const toPos   = getCellWorldPos(movingPiece.toRow, movingPiece.toCol);
        const pos = fromPos.lerp(toPos, t);
        pos.y += Math.sin(t * Math.PI) * 0.25; // little hop
        drawPiece(pos, movingPiece.piece);
    }
}

function drawUI()
{
    const screenSize = vec2(mainCanvasSize.x, mainCanvasSize.y);

    // Scores
    drawTextScreen(`Red: ${redCount}`,   vec2(30, 30), 32, rgb(1, 0.5, 0.5), 4, BLACK, 'left');
    drawTextScreen(`Black: ${blackCount}`, vec2(30, 70), 32, rgb(0.8, 0.8, 0.8), 4, BLACK, 'left');

    // Current player
    if (!gameOver)
    {
        const playerText = gameMode === 'ai'
            ? (currentPlayer === PLAYER_HUMAN ? 'Your Turn' : 'AI Thinking...')
            : (currentPlayer === PLAYER_RED ? "Red's Turn" : "Black's Turn");
        const color = currentPlayer === PLAYER_RED ? rgb(1, 0.4, 0.4) : rgb(0.9, 0.9, 0.9);
        drawTextScreen(playerText, vec2(30, 110), 28, color, 4, BLACK, 'left');

        if (mustContinueJump)
            drawTextScreen('Continue jumping!', vec2(30, 145), 22,
                rgb(1, 0.9, 0.2), 3, BLACK, 'left');
    }

    // Undo
    if (moveHistory.length > 0 && !gameOver)
    {
        drawTextScreen(`U: Undo (${moveHistory.length})`, vec2(30, screenSize.y - 60), 18,
            rgb(0.6, 0.8, 1), 2, BLACK, 'left');
    }

    // Game over
    if (gameOver)
    {
        drawTextScreen('GAME OVER', vec2(screenSize.x / 2, screenSize.y / 2 - 60), 64,
            rgb(1, 0.8, 0), 6, BLACK);

        let resultText, resultColor;
        if (gameMode === 'ai')
        {
            resultText = winner === PLAYER_HUMAN ? 'You Win!' : 'AI Wins!';
            resultColor = winner === PLAYER_HUMAN ? rgb(0, 1, 0.3) : rgb(1, 0.3, 0.3);
        }
        else
        {
            resultText = winner === PLAYER_RED ? 'Red Wins!' : 'Black Wins!';
            resultColor = winner === PLAYER_RED ? rgb(1, 0.4, 0.4) : rgb(1, 1, 1);
        }

        drawTextScreen(resultText, vec2(screenSize.x / 2, screenSize.y / 2), 48,
            resultColor, 5, BLACK);

        drawTextScreen('Press R to restart or ESC for menu', vec2(screenSize.x / 2, screenSize.y / 2 + 60), 24,
            WHITE, 3, BLACK);
    }

    // Controls
    drawTextScreen('U: Undo | R: Restart | ESC: Menu', vec2(screenSize.x / 2, screenSize.y - 30), 20,
        rgb(0.7, 0.7, 0.7), 2, BLACK);
}

function drawMenu()
{
    const screenSize = vec2(mainCanvasSize.x, mainCanvasSize.y);

    drawTextScreen('CHECKERS', vec2(screenSize.x / 2, 230), 150, hsl(0, 0.7, 0.55), 8, hsl(0, 0.9, 0.15), 'center', undefined, 'bold');

    const instructY = screenSize.y - 150;
    drawTextScreen('How to Play:', vec2(screenSize.x / 2, instructY), 28,
        rgb(0.8, 0.8, 0.8), 3, BLACK);
    drawTextScreen('Move diagonally. Jump to capture (jumps are required).', vec2(screenSize.x / 2, instructY + 40), 22,
        rgb(0.7, 0.7, 0.7), 2, BLACK);
    drawTextScreen('Reach the far row to become a King!', vec2(screenSize.x / 2, instructY + 70), 22,
        rgb(0.7, 0.7, 0.7), 2, BLACK);
}

///////////////////////////////////////////////////////////////////////////////
// GAME LOOP

let aiThinkTimer = 0;
const AI_THINK_DELAY = 0.5;

async function gameInit()
{
    setCanvasFixedSize(vec2(1280, 720));
    cameraPos = vec2(0, 0);

    // UI system
    new UISystemPlugin();
    uiSystem.defaultCornerRadius = 8;
    uiSystem.defaultLineWidth = 3;

    const cx = 640, cy = 360;

    btnVsAI = new UIButton(vec2(cx, cy), vec2(500, 100), 'PLAYER VS AI');
    btnVsAI.color = hsl(.55, .7, .35);
    btnVsAI.hoverColor = hsl(.55, .8, .5);
    btnVsAI.textColor = WHITE;
    btnVsAI.textLineColor = BLACK;
    btnVsAI.textLineWidth = 6;
    btnVsAI.onClick = () => startGame('ai');

    btnVsPlayer = new UIButton(vec2(cx, cy + 120), vec2(500, 100), 'PLAYER VS PLAYER');
    btnVsPlayer.color = hsl(.02, .7, .4);
    btnVsPlayer.hoverColor = hsl(.02, .8, .55);
    btnVsPlayer.textColor = WHITE;
    btnVsPlayer.textLineColor = BLACK;
    btnVsPlayer.textLineWidth = 6;
    btnVsPlayer.onClick = () => startGame('pvp');

    // Sounds
    sfxMove    = new SoundGenerator({frequency: 320, release: 0.06, volume: 0.25});
    sfxCapture = new SoundGenerator({frequency: 180, release: 0.15, pitchJump: 80, pitchJumpTime: 0.05, volume: 0.5, noise: 0.2});
    sfxKing    = new SoundGenerator({frequency: 550, release: 0.3, pitchJump: 440, pitchJumpTime: 0.08, volume: 0.5});
    sfxWin     = new SoundGenerator({frequency: 660, release: 0.35, pitchJump: 220, pitchJumpTime: 0.1, volume: 0.6});
    sfxLose    = new SoundGenerator({frequency: 220, release: 0.4, slide: -0.5, volume: 0.5});
    sfxSelect  = new SoundGenerator({frequency: 550, release: 0.08, volume: 0.35});

    btnVsAI.soundClick = sfxSelect;
    btnVsPlayer.soundClick = sfxSelect;

    showMenuButtons(true);
    gameMode = 'menu';
}

function showMenuButtons(visible)
{
    btnVsAI.visible = visible;
    btnVsPlayer.visible = visible;
}

function startGame(mode)
{
    gameMode = mode;
    showMenuButtons(false);
    initBoard();
    aiThinkTimer = 0;
}

function gameUpdate()
{
    if (gameMode === 'menu') return;

    // Advance move animation
    if (movingPiece)
    {
        movingPiece.progress += timeDelta / MOVE_DURATION;
        if (movingPiece.progress >= 1) movingPiece = null;
    }

    // Keyboard controls
    if (keyWasPressed('KeyR'))
    {
        initBoard();
        aiThinkTimer = 0;
    }

    if (keyWasPressed('KeyU'))
    {
        undoMove();
        aiThinkTimer = 0;
    }

    if (keyWasPressed('Escape'))
    {
        gameMode = 'menu';
        showMenuButtons(true);
        return;
    }

    if (gameOver) return;

    // Block input while a piece is animating
    if (movingPiece) return;

    // AI turn
    if (gameMode === 'ai' && currentPlayer === PLAYER_AI)
    {
        aiThinkTimer += timeDelta;
        if (aiThinkTimer >= AI_THINK_DELAY)
        {
            const move = findBestAIMove();
            if (move)
            {
                makeMove(move);
                aiThinkTimer = 0;
            }
        }
        return;
    }

    // Human input
    if (mouseWasPressed(0))
    {
        const cell = worldPosToCell(mousePos);
        if (!cell) return;

        // If a piece is selected, try to move to clicked cell
        if (selectedCell)
        {
            const move = pieceValidMoves.find(m => m.toRow === cell.row && m.toCol === cell.col);
            if (move)
            {
                makeMove(move);
                return;
            }

            // Clicked the same piece: deselect (unless mid multi-jump, which is locked in)
            if (!mustContinueJump &&
                cell.row === selectedCell.row && cell.col === selectedCell.col)
            {
                selectedCell = null;
                pieceValidMoves = [];
                sfxSelect && sfxSelect.play();
                return;
            }
        }

        // Try selecting a piece of current player that has legal moves
        if (!mustContinueJump && playerOf(board[cell.row][cell.col]) === currentPlayer)
        {
            const moves = getValidMovesForPiece(cell.row, cell.col);
            if (moves.length > 0)
            {
                selectedCell = {row: cell.row, col: cell.col};
                pieceValidMoves = moves;
                sfxSelect && sfxSelect.play();
            }
        }
    }
}

function gameUpdatePost()
{
    cameraPos = vec2(0, 0);
}

function gameRender()
{
    drawRect(cameraPos, vec2(100, 100), rgb(0.05, 0.05, 0.08));
    if (gameMode === 'menu') return;
    drawBoard();
}

function gameRenderPost()
{
    if (gameMode === 'menu') drawMenu();
    else drawUI();
}

///////////////////////////////////////////////////////////////////////////////
engineInit(gameInit, gameUpdate, gameUpdatePost, gameRender, gameRenderPost);

</script>
