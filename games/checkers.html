<script>
'use strict';

// engine settings, do not remove
debugWatermark = false;
showEngineVersion = false;
paused = false;

gravity = vec2(0, 0);
cameraPos = vec2(0, 0);
cameraScale = 42;

///////////////////////////////////////////////////////////////////////////////
// CHECKERS GAME

const BOARD_SIZE = 8;
const CELL_SIZE = 1.8;
const PIECE_RADIUS = 0.65;

const P_EMPTY = 0;
const P_RED = 1;
const P_BLACK = 2;
const P_RED_KING = 3;
const P_BLACK_KING = 4;

const PLAYER_RED = 1;
const PLAYER_BLACK = 2;

const PLAYER_HUMAN = PLAYER_RED;
const PLAYER_AI = PLAYER_BLACK;

// Game state
let board = [];
let currentPlayer = PLAYER_RED;
let gameOver = false;
let winner = null;
let redCount = 12;
let blackCount = 12;
let gameMode = 'pvp'; // 'pvp' | 'ai' | 'aivai'
let difficulty = 'hard'; // 'easy' | 'medium' | 'hard' — loaded in gameInit
let selectedCell = null;
let allPlayerMoves = [];   // all legal moves for currentPlayer
let pieceValidMoves = [];  // legal moves starting from selectedCell
let mustContinueJump = false;
let moveHistory = [];
let lastMove = null;

// Animation
let movingPiece = null; // {fromRow, fromCol, toRow, toCol, piece, progress, capture, capturedPiece}
const MOVE_DURATION = 0.25;

// Sounds
let sfxMove, sfxCapture, sfxKing, sfxWin, sfxLose, sfxSelect;

///////////////////////////////////////////////////////////////////////////////
// BOARD LOGIC

function playerOf(piece)
{
    if (piece === P_RED || piece === P_RED_KING) return PLAYER_RED;
    if (piece === P_BLACK || piece === P_BLACK_KING) return PLAYER_BLACK;
    return 0;
}

function isKing(piece)
{
    return piece === P_RED_KING || piece === P_BLACK_KING;
}

function getOpponent(player)
{
    return player === PLAYER_RED ? PLAYER_BLACK : PLAYER_RED;
}

function isInBounds(row, col)
{
    return row >= 0 && row < BOARD_SIZE && col >= 0 && col < BOARD_SIZE;
}

function initBoard()
{
    board = [];
    for (let row = 0; row < BOARD_SIZE; row++)
    {
        board[row] = [];
        for (let col = 0; col < BOARD_SIZE; col++)
        {
            // Pieces only on dark squares (row+col) odd
            if ((row + col) % 2 === 1)
            {
                if (row < 3) board[row][col] = P_BLACK;      // top rows = black
                else if (row > 4) board[row][col] = P_RED;   // bottom rows = red
                else board[row][col] = P_EMPTY;
            }
            else
                board[row][col] = P_EMPTY;
        }
    }

    currentPlayer = PLAYER_RED;
    gameOver = false;
    winner = null;
    redCount = 12;
    blackCount = 12;
    selectedCell = null;
    pieceValidMoves = [];
    mustContinueJump = false;
    moveHistory = [];
    lastMove = null;
    movingPiece = null;

    updateAllPlayerMoves();
    aiGeneration++;
    aiSearching = false;
    aiProgress = '';
}

function getPieceMoves(row, col)
{
    const piece = board[row][col];
    const moves = [];
    const jumps = [];
    if (piece === P_EMPTY) return {moves, jumps};

    const player = playerOf(piece);
    const king = isKing(piece);

    // Red moves up (row decreases), Black moves down (row increases); Kings move both ways.
    let dirs;
    if (king)                        dirs = [[-1,-1],[-1,1],[1,-1],[1,1]];
    else if (player === PLAYER_RED)  dirs = [[-1,-1],[-1,1]];
    else                             dirs = [[1,-1],[1,1]];

    for (const [dr, dc] of dirs)
    {
        const nr = row + dr, nc = col + dc;
        if (!isInBounds(nr, nc)) continue;

        if (board[nr][nc] === P_EMPTY)
        {
            moves.push({row: nr, col: nc, capture: null});
        }
        else if (playerOf(board[nr][nc]) === getOpponent(player))
        {
            const jr = row + dr * 2, jc = col + dc * 2;
            if (isInBounds(jr, jc) && board[jr][jc] === P_EMPTY)
                jumps.push({row: jr, col: jc, capture: {row: nr, col: nc}});
        }
    }

    return {moves, jumps};
}

function updateAllPlayerMoves()
{
    allPlayerMoves = [];
    let anyJumps = false;

    for (let row = 0; row < BOARD_SIZE; row++)
    {
        for (let col = 0; col < BOARD_SIZE; col++)
        {
            if (playerOf(board[row][col]) === currentPlayer)
            {
                const {jumps} = getPieceMoves(row, col);
                for (const j of jumps)
                {
                    anyJumps = true;
                    allPlayerMoves.push({fromRow: row, fromCol: col, toRow: j.row, toCol: j.col, capture: j.capture});
                }
            }
        }
    }

    // Jumps are mandatory: if any jumps exist, only jumps are legal.
    if (!anyJumps)
    {
        for (let row = 0; row < BOARD_SIZE; row++)
        {
            for (let col = 0; col < BOARD_SIZE; col++)
            {
                if (playerOf(board[row][col]) === currentPlayer)
                {
                    const {moves} = getPieceMoves(row, col);
                    for (const m of moves)
                        allPlayerMoves.push({fromRow: row, fromCol: col, toRow: m.row, toCol: m.col, capture: null});
                }
            }
        }
    }

    if (allPlayerMoves.length === 0 && !gameOver)
        endGame(getOpponent(currentPlayer));
}

function getValidMovesForPiece(row, col)
{
    return allPlayerMoves.filter(m => m.fromRow === row && m.fromCol === col);
}

function makeMove(move)
{
    // Save history for undo
    moveHistory.push({
        board: board.map(r => [...r]),
        currentPlayer,
        redCount,
        blackCount,
        lastMove: lastMove ? {...lastMove} : null
    });

    const piece = board[move.fromRow][move.fromCol];

    // Set up animation BEFORE mutating the board
    let capturedPiece = P_EMPTY;
    if (move.capture)
        capturedPiece = board[move.capture.row][move.capture.col];

    movingPiece = {
        fromRow: move.fromRow, fromCol: move.fromCol,
        toRow: move.toRow, toCol: move.toCol,
        piece: piece,
        progress: 0,
        capture: move.capture,
        capturedPiece: capturedPiece
    };

    board[move.fromRow][move.fromCol] = P_EMPTY;
    board[move.toRow][move.toCol] = piece;

    let promoted = false;
    if (move.capture)
    {
        board[move.capture.row][move.capture.col] = P_EMPTY;
        if (playerOf(capturedPiece) === PLAYER_RED) redCount--;
        else blackCount--;
        sfxCapture && sfxCapture.play();
    }
    else
    {
        sfxMove && sfxMove.play();
    }

    // King promotion
    if (piece === P_RED && move.toRow === 0)
    {
        board[move.toRow][move.toCol] = P_RED_KING;
        promoted = true;
        sfxKing && sfxKing.play();
    }
    else if (piece === P_BLACK && move.toRow === BOARD_SIZE - 1)
    {
        board[move.toRow][move.toCol] = P_BLACK_KING;
        promoted = true;
        sfxKing && sfxKing.play();
    }

    lastMove = {fromRow: move.fromRow, fromCol: move.fromCol, toRow: move.toRow, toCol: move.toCol};

    // Multi-jump: after capture, if the moved piece can jump again (and wasn't just promoted), continue.
    let canContinue = false;
    if (move.capture && !promoted)
    {
        const {jumps} = getPieceMoves(move.toRow, move.toCol);
        if (jumps.length > 0)
        {
            canContinue = true;
            selectedCell = {row: move.toRow, col: move.toCol};
            allPlayerMoves = jumps.map(j => ({fromRow: move.toRow, fromCol: move.toCol, toRow: j.row, toCol: j.col, capture: j.capture}));
            pieceValidMoves = allPlayerMoves.slice();
            mustContinueJump = true;
        }
    }

    if (!canContinue)
    {
        mustContinueJump = false;
        selectedCell = null;
        pieceValidMoves = [];
        currentPlayer = getOpponent(currentPlayer);
        updateAllPlayerMoves();
    }

    // Win if opponent has no pieces
    if (redCount === 0)      endGame(PLAYER_BLACK);
    else if (blackCount === 0) endGame(PLAYER_RED);
}

function endGame(winnerPlayer)
{
    gameOver = true;
    winner = winnerPlayer;
    if (gameMode === 'ai')
    {
        if (winner === PLAYER_HUMAN) sfxWin && sfxWin.play();
        else sfxLose && sfxLose.play();
    }
    else if (gameMode === 'aivai')
        sfxSelect && sfxSelect.play();
}

function undoMove()
{
    if (moveHistory.length === 0 || gameOver) return false;

    const undoCount = (gameMode === 'ai' && moveHistory.length >= 2) ? 2 : 1;

    for (let i = 0; i < undoCount && moveHistory.length > 0; i++)
    {
        const state = moveHistory.pop();
        board = state.board;
        currentPlayer = state.currentPlayer;
        redCount = state.redCount;
        blackCount = state.blackCount;
        lastMove = state.lastMove;
    }

    selectedCell = null;
    pieceValidMoves = [];
    mustContinueJump = false;
    movingPiece = null;
    updateAllPlayerMoves();
    sfxSelect && sfxSelect.play();
    return true;
}

///////////////////////////////////////////////////////////////////////////////
// AI adapter — pure-functional view of the game for gameAI.js search.
// State shape: { board, currentPlayer, gameOver, redCount, blackCount }.
// Move shape:  { fromRow, fromCol, toRow, toCol, capture: {row, col} | null }

function getCurrentState()
{
    return {
        board: board.map(r => [...r]),
        currentPlayer: currentPlayer,
        gameOver: gameOver,
        redCount: redCount,
        blackCount: blackCount,
    };
}

// Pure-functional helpers that work on a state board rather than the global board.
function playerOfPiece(piece)
{
    if (piece === P_RED   || piece === P_RED_KING)   return PLAYER_RED;
    if (piece === P_BLACK || piece === P_BLACK_KING) return PLAYER_BLACK;
    return 0;
}

function isKingPiece(piece) { return piece === P_RED_KING || piece === P_BLACK_KING; }

function isAdvancingMove(move, player)
{
    if (player === PLAYER_RED)   return move.toRow < move.fromRow;
    if (player === PLAYER_BLACK) return move.toRow > move.fromRow;
    return false;
}

function getPieceMovesForState(b, row, col)
{
    const piece = b[row][col];
    const moves = [], jumps = [];
    if (piece === P_EMPTY) return {moves, jumps};

    const player = playerOfPiece(piece);
    const king   = isKingPiece(piece);

    let dirs;
    if (king)                        dirs = [[-1,-1],[-1,1],[1,-1],[1,1]];
    else if (player === PLAYER_RED)  dirs = [[-1,-1],[-1,1]];
    else                             dirs = [[1,-1],[1,1]];

    for (const [dr, dc] of dirs)
    {
        const nr = row + dr, nc = col + dc;
        if (nr < 0 || nr >= BOARD_SIZE || nc < 0 || nc >= BOARD_SIZE) continue;

        if (b[nr][nc] === P_EMPTY)
        {
            moves.push({row: nr, col: nc, capture: null});
        }
        else if (playerOfPiece(b[nr][nc]) !== player && playerOfPiece(b[nr][nc]) !== 0)
        {
            const jr = row + dr * 2, jc = col + dc * 2;
            if (jr >= 0 && jr < BOARD_SIZE && jc >= 0 && jc < BOARD_SIZE && b[jr][jc] === P_EMPTY)
                jumps.push({row: jr, col: jc, capture: {row: nr, col: nc}});
        }
    }

    return {moves, jumps};
}

function getLegalMovesForState(b, player)
{
    const allMoves = [];
    let anyJumps = false;

    for (let row = 0; row < BOARD_SIZE; row++)
        for (let col = 0; col < BOARD_SIZE; col++)
            if (playerOfPiece(b[row][col]) === player)
            {
                const {jumps} = getPieceMovesForState(b, row, col);
                for (const j of jumps)
                {
                    anyJumps = true;
                    allMoves.push({fromRow: row, fromCol: col, toRow: j.row, toCol: j.col, capture: j.capture});
                }
            }

    if (!anyJumps)
        for (let row = 0; row < BOARD_SIZE; row++)
            for (let col = 0; col < BOARD_SIZE; col++)
                if (playerOfPiece(b[row][col]) === player)
                {
                    const {moves} = getPieceMovesForState(b, row, col);
                    for (const m of moves)
                        allMoves.push({fromRow: row, fromCol: col, toRow: m.row, toCol: m.col, capture: null});
                }

    // Move ordering: captures first, then advancing moves, then the rest.
    // First-touch order at each search node (killer-move heuristic in
    // gameAI.js still takes precedence on subsequent visits).
    allMoves.sort((a, b) =>
    {
        const aCap = a.capture ? 1 : 0;
        const bCap = b.capture ? 1 : 0;
        if (aCap !== bCap) return bCap - aCap;
        // Within same capture-status, advancing moves first.
        const aAdv = isAdvancingMove(a, player) ? 1 : 0;
        const bAdv = isAdvancingMove(b, player) ? 1 : 0;
        return bAdv - aAdv;
    });
    return allMoves;
}

const checkersGame = {
    getOpponent: (player) => player === PLAYER_RED ? PLAYER_BLACK : PLAYER_RED,
    getCurrentPlayer: (state) => state.currentPlayer,
    isTerminal: (state) => state.gameOver,

    getLegalMoves(state, player)
    {
        return getLegalMovesForState(state.board, player);
    },

    applyMove(state, move, player)
    {
        const newBoard = state.board.map(r => [...r]);
        let newRed = state.redCount, newBlack = state.blackCount;

        const piece = newBoard[move.fromRow][move.fromCol];
        newBoard[move.fromRow][move.fromCol] = P_EMPTY;
        newBoard[move.toRow][move.toCol] = piece;

        if (move.capture)
        {
            const cap = newBoard[move.capture.row][move.capture.col];
            if (playerOfPiece(cap) === PLAYER_RED) newRed--;
            else newBlack--;
            newBoard[move.capture.row][move.capture.col] = P_EMPTY;
        }

        // King promotion
        let promoted = false;
        if (piece === P_RED && move.toRow === 0)
        {
            newBoard[move.toRow][move.toCol] = P_RED_KING;
            promoted = true;
        }
        else if (piece === P_BLACK && move.toRow === BOARD_SIZE - 1)
        {
            newBoard[move.toRow][move.toCol] = P_BLACK_KING;
            promoted = true;
        }

        // Check terminal conditions
        if (newRed === 0)
            return {board: newBoard, currentPlayer: PLAYER_BLACK, gameOver: true, redCount: newRed, blackCount: newBlack};
        if (newBlack === 0)
            return {board: newBoard, currentPlayer: PLAYER_RED, gameOver: true, redCount: newRed, blackCount: newBlack};

        // Multi-jump continuation: if a capture was made and piece was not promoted,
        // check if the piece can jump again. If so, same player continues.
        if (move.capture && !promoted)
        {
            const {jumps} = getPieceMovesForState(newBoard, move.toRow, move.toCol);
            if (jumps.length > 0)
                return {board: newBoard, currentPlayer: player, gameOver: false, redCount: newRed, blackCount: newBlack};
        }

        // Switch to opponent; check if opponent has any moves.
        const opponent = getOpponent(player);
        const opponentMoves = getLegalMovesForState(newBoard, opponent);
        if (opponentMoves.length === 0)
            return {board: newBoard, currentPlayer: player, gameOver: true, redCount: newRed, blackCount: newBlack};

        return {board: newBoard, currentPlayer: opponent, gameOver: false, redCount: newRed, blackCount: newBlack};
    },

    evaluate(state, player)
    {
        const b = state.board;
        const opponent = getOpponent(player);
        let score = 0;

        for (let row = 0; row < BOARD_SIZE; row++)
        {
            for (let col = 0; col < BOARD_SIZE; col++)
            {
                const p = b[row][col];
                if (p === P_EMPTY) continue;

                let val = isKingPiece(p) ? 3 : 1;
                // Advancement bonus
                if (p === P_RED)   val += (BOARD_SIZE - 1 - row) * 0.08;
                if (p === P_BLACK) val += row * 0.08;
                // Back row defenders
                if (p === P_RED   && row === BOARD_SIZE - 1) val += 0.3;
                if (p === P_BLACK && row === 0)              val += 0.3;

                if (playerOfPiece(p) === player) score += val;
                else score -= val;
            }
        }

        // Mobility — restricted opponents lose in checkers
        const playerMoves = checkersGame.getLegalMoves(state, player);
        const opponentMoves = checkersGame.getLegalMoves(state, opponent);
        score += (playerMoves.length - opponentMoves.length) * 0.5;

        // Center control — middle-board pieces have more options
        for (let r = 0; r < BOARD_SIZE; r++)
        {
            for (let c = 2; c <= 5; c++)
            {
                const piece = b[r][c];
                if (piece !== P_EMPTY)
                {
                    if (playerOfPiece(piece) === player) score += 0.1;
                    else if (playerOfPiece(piece) === opponent) score -= 0.1;
                }
            }
        }

        // Available-jumps bonus — captures gain material on the next move
        const playerJumps = playerMoves.filter(m => m.capture);
        const opponentJumps = opponentMoves.filter(m => m.capture);
        score += (playerJumps.length - opponentJumps.length) * 0.2;

        // Endgame king positioning — kings on the long diagonals dominate
        let totalPieces = 0;
        for (let r = 0; r < BOARD_SIZE; r++)
            for (let c = 0; c < BOARD_SIZE; c++)
                if (b[r][c] !== P_EMPTY) totalPieces++;

        if (totalPieces <= 6)
        {
            for (let r = 0; r < BOARD_SIZE; r++)
            {
                for (let c = 0; c < BOARD_SIZE; c++)
                {
                    const piece = b[r][c];
                    if (!isKingPiece(piece)) continue;
                    const onLongDiag = (r === c) || (r + c === BOARD_SIZE - 1);
                    if (!onLongDiag) continue;
                    if (playerOfPiece(piece) === player) score += 0.5;
                    else if (playerOfPiece(piece) === opponent) score -= 0.5;
                }
            }
        }

        // Trade-tempo bonus: when ahead in material, reward fewer total
        // pieces on the board (trades simplify in our favor). When behind,
        // penalize fewer pieces (less material left to recover with).
        // Baseline 24 = starting total (12 + 12).
        let tradeTotalPieces = 0;
        let playerMaterial = 0, opponentMaterial = 0;
        for (let r = 0; r < BOARD_SIZE; r++)
        {
            for (let c = 0; c < BOARD_SIZE; c++)
            {
                const p = b[r][c];
                if (p === P_EMPTY) continue;
                tradeTotalPieces++;
                const owner = playerOfPiece(p);
                const value = isKingPiece(p) ? 3 : 1;
                if (owner === player) playerMaterial += value;
                else opponentMaterial += value;
            }
        }
        const materialDiff = playerMaterial - opponentMaterial;
        if (materialDiff > 0)
            score += (24 - tradeTotalPieces) * 0.1;
        else if (materialDiff < 0)
            score -= (24 - tradeTotalPieces) * 0.1;

        return score;
    },
};

function strategyForDifficulty(d)
{
    if (d === 'easy')   return (game, state, opts) => randomAI(game, state);
    if (d === 'medium') return (game, state, opts) => alphaBetaAI(game, state, 4, opts);
    // HARD: adaptive depth based on piece count. Branching drops dramatically
    // as pieces come off, so we can search much deeper in the endgame.
    return (game, state, opts) =>
    {
        let pieces = 0;
        for (let r = 0; r < BOARD_SIZE; r++)
            for (let c = 0; c < BOARD_SIZE; c++)
                if (state.board[r][c] !== P_EMPTY) pieces++;
        const depth = pieces > 20 ? 8 : pieces > 12 ? 9 : pieces > 6 ? 10 : 12;
        return alphaBetaAI(game, state, depth, opts);
    };
}

function findBestAIMove(opts = {})
{
    if (allPlayerMoves.length === 0) return Promise.resolve(null);
    return Promise.resolve(strategyForDifficulty(difficulty)(checkersGame, getCurrentState(), opts));
}

function setDifficulty(d)
{
    difficulty = d;
    saveData({difficulty: d});
    refreshDifficultyUI();
}

function refreshDifficultyUI()
{
    const grid = getMenu('options')?.getItem('difficultyGrid');
    if (grid)
    {
        grid.setCell(0, {earned: difficulty === 'easy'});
        grid.setCell(1, {earned: difficulty === 'medium'});
        grid.setCell(2, {earned: difficulty === 'hard'});
    }
    const title = getMenu('title');
    const upper = difficulty.toUpperCase();
    title?.getItem('vsAI')?.setLabel(`PLAYER VS AI · ${upper}`);
    title?.getItem('aiVsAi')?.setLabel(`AI VS AI · ${upper}`);
}

///////////////////////////////////////////////////////////////////////////////
// RENDERING

function getCellWorldPos(row, col)
{
    const boardOffset = -(BOARD_SIZE * CELL_SIZE) / 2;
    return vec2(
        boardOffset + col * CELL_SIZE + CELL_SIZE / 2,
        boardOffset + (BOARD_SIZE - 1 - row) * CELL_SIZE + CELL_SIZE / 2
    );
}

function worldPosToCell(worldPos)
{
    const boardOffset = -(BOARD_SIZE * CELL_SIZE) / 2;
    const col = Math.floor((worldPos.x - boardOffset) / CELL_SIZE);
    const row = BOARD_SIZE - 1 - Math.floor((worldPos.y - boardOffset) / CELL_SIZE);
    if (isInBounds(row, col)) return {row, col};
    return null;
}

function drawPiece(pos, piece, scale = 1)
{
    const r = PIECE_RADIUS * scale;
    const player = playerOf(piece);

    // Shadow
    drawCircle(pos.add(vec2(0.1, -0.1)), r * 2 * 0.95, rgb(0, 0, 0, 0.4));

    const main = player === PLAYER_RED ? hsl(0,    0.85, 0.45) : hsl(0, 0, 0.12);
    const dark = player === PLAYER_RED ? hsl(0,    0.85, 0.25) : hsl(0, 0, 0.02);
    const hi   = player === PLAYER_RED ? hsl(0.02, 0.8,  0.65) : hsl(0, 0, 0.35);

    drawCircle(pos, r * 2,        dark);
    drawCircle(pos, r * 2 * 0.88, main);
    drawCircle(pos, r * 2 * 0.7,  dark);
    drawCircle(pos, r * 2 * 0.62, main);
    drawCircle(pos.add(vec2(-0.18 * scale, 0.18 * scale)), r * 2 * 0.28, hi);

    if (isKing(piece))
    {
        drawCircle(pos, r * 2 * 0.42, hsl(.12, 1, .55));
        drawText('K', pos.add(vec2(0, -0.04)), r * 1.05, rgb(.2, .1, 0), 0.08, hsl(.13, 1, .8));
    }
}

function drawBoard()
{
    const boardWorldSize = BOARD_SIZE * CELL_SIZE;

    // Frame
    drawRect(vec2(0, 0), vec2(boardWorldSize + 0.6), hsl(.08, .7, .12));
    drawRect(vec2(0, 0), vec2(boardWorldSize + 0.3), hsl(.08, .6, .25));

    // Squares
    for (let row = 0; row < BOARD_SIZE; row++)
    {
        for (let col = 0; col < BOARD_SIZE; col++)
        {
            const pos = getCellWorldPos(row, col);
            const light = (row + col) % 2 === 0;
            const color = light ? hsl(.1, .4, .8) : hsl(.07, .7, .22);
            drawRect(pos, vec2(CELL_SIZE), color);
        }
    }

    // Last move highlight
    if (lastMove && !gameOver)
    {
        const fromPos = getCellWorldPos(lastMove.fromRow, lastMove.fromCol);
        const toPos   = getCellWorldPos(lastMove.toRow, lastMove.toCol);
        drawRect(fromPos, vec2(CELL_SIZE * 0.95), rgb(1, 1, 0.3, 0.2));
        drawRect(toPos,   vec2(CELL_SIZE * 0.95), rgb(1, 1, 0.3, 0.3));
    }

    // Selected piece highlight (gameplay only)
    if (isPlaying() && selectedCell)
    {
        const pos = getCellWorldPos(selectedCell.row, selectedCell.col);
        const pulse = 1 + Math.sin(time * 5) * 0.08;
        drawRect(pos, vec2(CELL_SIZE * 0.95 * pulse), rgb(0.3, 1, 0.3, 0.35));
    }

    // Valid move indicators for selected piece (gameplay only)
    if (isPlaying() && selectedCell && !gameOver)
    {
        for (const m of pieceValidMoves)
        {
            const pos = getCellWorldPos(m.toRow, m.toCol);
            const color = m.capture ? rgb(1, 0.3, 0.3, 0.7) : rgb(0.3, 1, 0.4, 0.6);
            drawCircle(pos, PIECE_RADIUS * 2 * 0.6, color);
        }
    }

    // Hint: pulse pieces that have legal moves when nothing selected (gameplay only)
    if (isPlaying() && !selectedCell && !gameOver && !movingPiece &&
        (gameMode === 'pvp' || (gameMode === 'ai' && currentPlayer === PLAYER_HUMAN)))
    {
        const hintAlpha = 0.3 + Math.sin(time * 4) * 0.15;
        const seen = new Set();
        for (const m of allPlayerMoves)
        {
            const key = m.fromRow + ',' + m.fromCol;
            if (seen.has(key)) continue;
            seen.add(key);
            const pos = getCellWorldPos(m.fromRow, m.fromCol);
            drawRect(pos, vec2(CELL_SIZE * 0.85), rgb(0.3, 1, 0.5, hintAlpha));
        }
    }

    // Pieces
    for (let row = 0; row < BOARD_SIZE; row++)
    {
        for (let col = 0; col < BOARD_SIZE; col++)
        {
            if (board[row][col] === P_EMPTY) continue;
            // Skip the piece currently being animated at its destination
            if (movingPiece && movingPiece.toRow === row && movingPiece.toCol === col) continue;
            drawPiece(getCellWorldPos(row, col), board[row][col]);
        }
    }

    // Animated moving piece
    if (movingPiece)
    {
        const t = movingPiece.progress;

        // Fading captured piece
        if (movingPiece.capture && t < 0.9)
        {
            const capPos = getCellWorldPos(movingPiece.capture.row, movingPiece.capture.col);
            const scale = 1 - t * 0.9;
            drawPiece(capPos, movingPiece.capturedPiece, Math.max(scale, 0.1));
        }

        const fromPos = getCellWorldPos(movingPiece.fromRow, movingPiece.fromCol);
        const toPos   = getCellWorldPos(movingPiece.toRow, movingPiece.toCol);
        const pos = fromPos.lerp(toPos, t);
        pos.y += Math.sin(t * Math.PI) * 0.25; // little hop
        drawPiece(pos, movingPiece.piece);
    }
}

function drawUI()
{
    const screenSize = vec2(mainCanvasSize.x, mainCanvasSize.y);

    // Scores
    drawTextScreen(`Red: ${redCount}`,   vec2(30, 30), 32, rgb(1, 0.5, 0.5), 4, BLACK, 'left');
    drawTextScreen(`Black: ${blackCount}`, vec2(30, 70), 32, rgb(0.8, 0.8, 0.8), 4, BLACK, 'left');

    // Current player
    if (!gameOver)
    {
        let playerText;
        if (gameMode === 'ai')
        {
            if (currentPlayer === PLAYER_HUMAN) playerText = 'Your Turn';
            else playerText = aiProgress || 'AI Thinking...';
        }
        else if (gameMode === 'aivai')
        {
            if (aiProgress) {
                const side = currentPlayer === PLAYER_RED ? 'Red' : 'Black';
                playerText = `AI ${side} — ${aiProgress.replace('AI Thinking... ', '').replace('AI Thinking...', 'thinking...')}`;
            } else {
                playerText = currentPlayer === PLAYER_RED ? 'AI Red Thinking...' : 'AI Black Thinking...';
            }
        }
        else
            playerText = currentPlayer === PLAYER_RED ? "Red's Turn" : "Black's Turn";
        const color = currentPlayer === PLAYER_RED ? rgb(1, 0.4, 0.4) : rgb(0.9, 0.9, 0.9);
        drawTextScreen(playerText, vec2(30, 110), 28, color, 4, BLACK, 'left');

        if (mustContinueJump)
            drawTextScreen('Continue jumping!', vec2(30, 145), 22,
                rgb(1, 0.9, 0.2), 3, BLACK, 'left');
    }

    // Undo
    if (moveHistory.length > 0 && !gameOver)
    {
        drawTextScreen(`U: Undo (${moveHistory.length})`, vec2(30, screenSize.y - 60), 18,
            rgb(0.6, 0.8, 1), 2, BLACK, 'left');
    }

    // Game over
    if (gameOver)
    {
        drawTextScreen('GAME OVER', vec2(screenSize.x / 2, screenSize.y / 2 - 60), 64,
            rgb(1, 0.8, 0), 6, BLACK);

        let resultText, resultColor;
        if (gameMode === 'ai')
        {
            resultText = winner === PLAYER_HUMAN ? 'You Win!' : 'AI Wins!';
            resultColor = winner === PLAYER_HUMAN ? rgb(0, 1, 0.3) : rgb(1, 0.3, 0.3);
        }
        else if (gameMode === 'aivai')
        {
            resultText = winner === PLAYER_RED ? 'AI Red Wins!' : 'AI Black Wins!';
            resultColor = winner === PLAYER_RED ? rgb(1, 0.4, 0.4) : rgb(0.9, 0.9, 0.9);
        }
        else
        {
            resultText = winner === PLAYER_RED ? 'Red Wins!' : 'Black Wins!';
            resultColor = winner === PLAYER_RED ? rgb(1, 0.4, 0.4) : rgb(1, 1, 1);
        }

        drawTextScreen(resultText, vec2(screenSize.x / 2, screenSize.y / 2), 48,
            resultColor, 5, BLACK);

        drawTextScreen('Press R to restart or ESC to pause', vec2(screenSize.x / 2, screenSize.y / 2 + 60), 24,
            WHITE, 3, BLACK);
    }

    // Controls
    drawTextScreen('U: Undo | R: Restart | ESC: Pause', vec2(screenSize.x / 2, screenSize.y - 30), 20,
        rgb(0.7, 0.7, 0.7), 2, BLACK);
}

///////////////////////////////////////////////////////////////////////////////
// GAME LOOP

let aiThinkTimer = 0;
let aiSearching = false;
let aiProgress = '';
let aiGeneration = 0;
const AI_THINK_DELAY = 0.5;
const AI_VS_AI_DELAY = 0.6;

async function gameInit()
{
    saveDataInit('checkers');
    setCanvasFixedSize(vec2(720, 900));
    cameraPos = vec2(0, 0);
    canvasClearColor = new Color().setHex('#0d0d14');
    difficulty = getSaveData().difficulty ?? 'hard';

    // One callback drives `paused` for every menu (including dialogs).
    installAutoPause();

    // Sounds (gameplay)
    sfxMove    = new SoundGenerator({frequency: 320, release: 0.06, volume: 0.25});
    sfxCapture = new SoundGenerator({frequency: 180, release: 0.15, pitchJump: 80, pitchJumpTime: 0.05, volume: 0.5, noise: 0.2});
    sfxKing    = new SoundGenerator({frequency: 550, release: 0.3, pitchJump: 440, pitchJumpTime: 0.08, volume: 0.5});
    sfxWin     = new SoundGenerator({frequency: 660, release: 0.35, pitchJump: 220, pitchJumpTime: 0.1, volume: 0.6});
    sfxLose    = new SoundGenerator({frequency: 220, release: 0.4, slide: -0.5, volume: 0.5});
    sfxSelect  = new SoundGenerator({frequency: 550, release: 0.08, volume: 0.35});

    // ----- title menu -----
    createMenu({
        id: 'title',
        title: 'CHECKERS',
        dismissable: false,
        onStart: () => startGame('ai'),
        items: [
            {type:'button', id:'vsAI',   label:'PLAYER VS AI',     onClick: () => startGame('ai')},
            {type:'button',              label:'PLAYER VS PLAYER', onClick: () => startGame('pvp')},
            {type:'button', id:'aiVsAi', label:'AI VS AI',         onClick: () => startGame('aivai')},
            {type:'button',              label:'OPTIONS',          onClick: () => pushMenu('options')},
            {type:'button',              label:'ABOUT',            onClick: () => pushMenu('about')},
        ],
    });

    // ----- options menu -----
    createOptionsMenu({
        persistKey: 'volume',
        extraItems: [
            {type:'separator'},
            {type:'label', text:'DIFFICULTY'},
            {type:'grid', id:'difficultyGrid', columns:3, cells: [
                {label:'EASY',   title:'Random moves',                  onClick: () => setDifficulty('easy')},
                {label:'MEDIUM', title:'Alpha-beta search depth 4',     onClick: () => setDifficulty('medium')},
                {label:'HARD',   title:'Adaptive depth (8-12) by piece count', onClick: () => setDifficulty('hard')},
            ]},
        ],
    });

    // ----- about menu -----
    createMenu({
        id: 'about',
        title: 'ABOUT',
        onHide: popMenu,
        items: [
            {type:'text', text:'Checkers — move diagonally and jump over opponent pieces to capture them. ' +
                'Captures are mandatory. Reach the far row to become a King and move in any direction. ' +
                'Capture all opponent pieces or leave them with no legal moves to win. ' +
                'Includes a watchable AI-vs-AI mode.'},
            {type:'separator'},
            {type:'button', label:'BACK', onClick: () => hideMenu('about')},
        ],
    });

    // ----- pause menu -----
    createPauseMenu({
        onRestart: () => { initBoard(); aiThinkTimer = 0; },
        onQuit:    quitToTitleWithCleanup,
        extraItems: [
            {type:'button', label:'OPTIONS', onClick: () => pushMenu('options')},
        ],
    });

    // ----- HUD toolbar -----
    installDefaultToolbar();

    initBoard();
    setPlaying(false);
    showMenu('title');
    refreshDifficultyUI();
}



function quitToTitleWithCleanup()
{
    quitToTitle(() => { aiGeneration++; aiSearching = false; aiProgress = ''; });
}

function startGame(mode)
{
    gameMode = mode;
    initBoard();
    aiThinkTimer = 0;
    setPlaying(true);
    hideMenu('title');
}

function gameUpdate()
{
    if (bindPauseKey({when: () => isPlaying()})) return;
    if (!isPlaying()) return;

    // Advance move animation
    if (movingPiece)
    {
        movingPiece.progress += timeDelta / MOVE_DURATION;
        if (movingPiece.progress >= 1) movingPiece = null;
    }

    // Keyboard controls
    if (keyWasPressed('KeyR'))
    {
        initBoard();
        aiThinkTimer = 0;
    }

    if (keyWasPressed('KeyU'))
    {
        undoMove();
        aiThinkTimer = 0;
    }

    if (gameOver) return;

    // Block input while a piece is animating
    if (movingPiece) return;

    // AI turn
    const isAITurn = (gameMode === 'ai' && currentPlayer === PLAYER_AI) || gameMode === 'aivai';
    if (isAITurn && aiSearching) return;
    if (isAITurn && !aiSearching)
    {
        const delay = gameMode === 'aivai' ? AI_VS_AI_DELAY : AI_THINK_DELAY;
        aiThinkTimer += timeDelta;
        if (aiThinkTimer >= delay)
        {
            aiSearching = true;
            aiProgress = 'AI Thinking...';
            const myGen = aiGeneration;
            findBestAIMove({
                onProgress: (d, n) => {
                    if (myGen === aiGeneration) aiProgress = `AI Thinking... ${Math.round(d / n * 100)}%`;
                }
            }).then(move => {
                if (myGen !== aiGeneration) { aiSearching = false; aiProgress = ''; return; }
                if (move) makeMove(move);
                aiSearching = false;
                aiProgress = '';
                aiThinkTimer = 0;
            });
        }
        return;
    }

    // Human input — PvP always, or PvAI when it's the human's turn. Never in aivai.
    const isHumanTurn = gameMode === 'pvp' || (gameMode === 'ai' && currentPlayer === PLAYER_HUMAN);
    if (isHumanTurn && mouseWasPressed(0))
    {
        const cell = worldPosToCell(mousePos);
        if (!cell) return;

        // If a piece is selected, try to move to clicked cell
        if (selectedCell)
        {
            const move = pieceValidMoves.find(m => m.toRow === cell.row && m.toCol === cell.col);
            if (move)
            {
                makeMove(move);
                return;
            }

            // Clicked the same piece: deselect (unless mid multi-jump, which is locked in)
            if (!mustContinueJump &&
                cell.row === selectedCell.row && cell.col === selectedCell.col)
            {
                selectedCell = null;
                pieceValidMoves = [];
                sfxSelect && sfxSelect.play();
                return;
            }
        }

        // Try selecting a piece of current player that has legal moves
        if (!mustContinueJump && playerOf(board[cell.row][cell.col]) === currentPlayer)
        {
            const moves = getValidMovesForPiece(cell.row, cell.col);
            if (moves.length > 0)
            {
                selectedCell = {row: cell.row, col: cell.col};
                pieceValidMoves = moves;
                sfxSelect && sfxSelect.play();
            }
        }
    }
}

function gameUpdatePost()
{
    cameraPos = vec2(0, 0);
}

function gameRender()
{
    drawBoard();
}

function gameRenderPost()
{
    if (isPlaying()) drawUI();
}

///////////////////////////////////////////////////////////////////////////////
engineInit(gameInit, gameUpdate, gameUpdatePost, gameRender, gameRenderPost);

</script>
