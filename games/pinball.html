<!DOCTYPE html><head>
<title>LittleJS Pinball</title>
<meta charset="utf-8">
</head><body style="background:#000">
<script src="../dist/littlejs.js?1.18.0"></script>
<script src="../dist/box2d.wasm.js?1.18.0"></script>
<script>
'use strict';

debugWatermark = false;
showEngineVersion = false;
paused = false;
setDebugKey('Backquote');

gravity = vec2(0, -30);
cameraScale = 24;

class SoundGenerator extends Sound
{
    constructor(params = {})
    {
        const {
            volume=1, randomness=.05, frequency=220, attack=0, release=.1,
            shapeCurve=1, slide=0, pitchJump=0, pitchJumpTime=0, repeatTime=0,
            noise=0, bitCrush=0, delay=0,
        } = params;
        super([volume, randomness, frequency, attack, 0, release, 0, shapeCurve, slide, 0,
            pitchJump, pitchJumpTime, repeatTime, noise, 0, bitCrush, delay, 1, 0, 0, 0]);
    }
}

///////////////////////////////////////////////////////////////////////////////
// Layout

const PLAY_W = 20;                       // symmetric playfield width
const PLAY_H = 34;                       // taller table
const WALL_T = 0.3;

// Vertical walls end where the dome begins
const WALL_TOP_Y = 20;

// Playfield spans x = -10 to +10 (symmetric around x=0)
const PLAY_HALF_W = PLAY_W / 2;          // 10

// Launch lane is a separate channel to the right of the playfield
const LANE_INNER_X = PLAY_HALF_W + WALL_T/2;     // 10.15 - playfield right wall center
const LANE_OUTER_X = PLAY_HALF_W + 2 + WALL_T/2; // 12.15 - lane outer wall center
const LANE_CENTER_X = (LANE_INNER_X + LANE_OUTER_X) / 2;  // 11.15
const LANE_FLOOR_Y = 0.9;
const LANE_BOTTOM = 1.5;

// Top arcs
const DOME_CENTER = vec2(0, WALL_TOP_Y);
const DOME_RADIUS = 10;                  // inner arc - the playfield ceiling
const RAIL_RADIUS = 12;                  // outer arc - the launcher top rail
const DOME_END_ANGLE = 2.0;              // inner arc stops before full semicircle (leaves left exit open)
const RAIL_END_ANGLE = 2.4;              // outer rail extends a bit further

const BALL_DIAMETER = 1;
const BALL_SPAWN = vec2(LANE_CENTER_X, 2.3);

const FLIPPER_LENGTH = 3.2;
const FLIPPER_THICKNESS = 0.5;
const FLIPPER_REST_ANGLE = 0.35;
const FLIPPER_FLIP_ANGLE = 0.85;
const FLIPPER_MOTOR_SPEED = 45;
const FLIPPER_MOTOR_TORQUE = 20000;
const LEFT_PIVOT = vec2(-4.2, 3.4);
const RIGHT_PIVOT = vec2(4.2, 3.4);

const DRAIN_Y = -1.5;
const LAUNCH_MIN = 38;
const LAUNCH_MAX = 60;

const WALL_COLOR = hsl(0.55, 0.4, 0.7);
const RAIL_COLOR = hsl(0.55, 0.5, 0.6);
const SLING_COLOR = hsl(0, 0.8, 0.45);
const FLIPPER_COLOR = hsl(0.05, 0.9, 0.55);
const BALL_COLOR = hsl(0, 0, 0.9);

///////////////////////////////////////////////////////////////////////////////
// State

let ball = null;
let leftFlipper, rightFlipper;
let bumpers = [];
let slingshots = [];
let score = 0;
let highScore = 0;
let ballsLeft = 3;
let gameOver = false;
let launchCharge = 0;
let hasLaunchedEver = false;
let sfxBumper, sfxFlipper, sfxDrain, sfxLaunch, sfxWall, sfxSling;

///////////////////////////////////////////////////////////////////////////////
// Ball

class Ball extends Box2dObject
{
    constructor(pos)
    {
        super(pos, vec2(BALL_DIAMETER), undefined, 0, BALL_COLOR);
        this.addCircle(BALL_DIAMETER, vec2(), 1, 0.05, 0.25);
        this.setBullet(true);
        this.setLinearDamping(0.15);
    }
    beginContact(other)
    {
        const speed = this.getLinearVelocity().length();
        if (speed > 7 && !(other instanceof Bumper) && !(other instanceof Flipper) && !(other instanceof Slingshot))
            sfxWall && sfxWall.play(this.pos, 0.4, clamp(speed/20, 0.5, 2));
    }
    render()
    {
        drawCircle(this.pos, BALL_DIAMETER, BALL_COLOR, 0.08, BLACK);
        drawCircle(this.pos.add(vec2(-0.15, 0.15)), 0.3, hsl(0, 0, 1, 0.5));
    }
}

///////////////////////////////////////////////////////////////////////////////
// Bumper

class Bumper extends Box2dStaticObject
{
    constructor(pos, radius = 1)
    {
        super(pos, vec2(radius * 2));
        this.radius = radius;
        this.addCircle(radius * 2, vec2(), 0, 0.1, 1.2);
        this.flashTime = 0;
    }
    beginContact(other)
    {
        if (other === ball)
        {
            this.flashTime = 0.2;
            score += 100;
            sfxBumper && sfxBumper.play(this.pos);
            const dir = other.pos.subtract(this.pos).normalize();
            other.applyAcceleration(dir.scale(18));
        }
    }
    render()
    {
        const flash = this.flashTime > 0;
        const outer = flash ? WHITE : hsl(0.13, 0.9, 0.55);
        const inner = flash ? hsl(0.13, 1, 0.85) : hsl(0.13, 0.9, 0.35);
        drawCircle(this.pos, this.radius * 2, outer, 0.15, BLACK);
        drawCircle(this.pos, this.radius * 1.1, inner);
        this.flashTime = Math.max(0, this.flashTime - 1/60);
    }
}

///////////////////////////////////////////////////////////////////////////////
// Slingshot

class Slingshot extends Box2dStaticObject
{
    constructor(pos, size, angle, kickDir)
    {
        super(pos, size, undefined, angle);
        this.addBox(size, vec2(), 0, 0, 0.1, 0.4);
        this.color = SLING_COLOR;
        this.kickDir = kickDir;
        this.flashTime = 0;
    }
    beginContact(other)
    {
        if (other === ball)
        {
            this.flashTime = 0.12;
            score += 25;
            sfxSling && sfxSling.play(this.pos);
            other.applyAcceleration(this.kickDir.scale(10));
        }
    }
    render()
    {
        const color = this.flashTime > 0 ? WHITE : SLING_COLOR;
        drawRect(this.pos, this.size, color, this.angle);
        this.flashTime = Math.max(0, this.flashTime - 1/60);
    }
}

///////////////////////////////////////////////////////////////////////////////
// Flipper

class Flipper extends Box2dObject
{
    constructor(pivotPos, facingRight)
    {
        const dir = facingRight ? 1 : -1;
        const centerPos = pivotPos.add(vec2(dir * FLIPPER_LENGTH / 2, 0));
        super(centerPos, vec2(FLIPPER_LENGTH, FLIPPER_THICKNESS), undefined, 0, FLIPPER_COLOR);
        this.pivotPos = pivotPos;
        this.facingRight = facingRight;
        this.addBox(vec2(FLIPPER_LENGTH, FLIPPER_THICKNESS), vec2(), 0, 3, 0.1, 0.05);
        this.setBullet(true);
        this.setAngularDamping(0.5);

        this.anchor = new Box2dStaticObject(pivotPos, vec2(0.2));
        this.joint = new Box2dRevoluteJoint(this.anchor, this, pivotPos);
        this.joint.enableLimit(true);
        if (facingRight)
            this.joint.setLimits(-FLIPPER_REST_ANGLE, FLIPPER_FLIP_ANGLE);
        else
            this.joint.setLimits(-FLIPPER_FLIP_ANGLE, FLIPPER_REST_ANGLE);
        this.joint.enableMotor(true);
        this.joint.setMaxMotorTorque(FLIPPER_MOTOR_TORQUE);
        this.setMotor(false);
    }
    setMotor(active)
    {
        const dir = this.facingRight ? 1 : -1;
        const speed = (active ? FLIPPER_MOTOR_SPEED : -FLIPPER_MOTOR_SPEED) * dir;
        this.joint.setMotorSpeed(speed);
    }
    render()
    {
        drawRect(this.pos, vec2(FLIPPER_LENGTH, FLIPPER_THICKNESS), FLIPPER_COLOR, this.angle);
        drawCircle(this.pivotPos, FLIPPER_THICKNESS * 1.4, hsl(0, 0, 0.2));
    }
}

///////////////////////////////////////////////////////////////////////////////
// World build helpers

function addWall(pos, size, angle = 0, color = WALL_COLOR)
{
    const w = new Box2dStaticObject(pos, size, undefined, angle);
    w.addBox(size);
    w.color = color;
    return w;
}

function buildArc(center, radius, startA, endA, numSegs, thickness = 0.3, color = RAIL_COLOR)
{
    for (let i = 0; i < numSegs; i++)
    {
        const a1 = startA + (endA - startA) * (i / numSegs);
        const a2 = startA + (endA - startA) * ((i + 1) / numSegs);
        const p1 = vec2(center.x + radius * Math.cos(a1), center.y + radius * Math.sin(a1));
        const p2 = vec2(center.x + radius * Math.cos(a2), center.y + radius * Math.sin(a2));
        const mid = p1.add(p2).scale(0.5);
        const length = p1.distance(p2);
        const segAngle = Math.atan2(p2.y - p1.y, p2.x - p1.x);
        addWall(mid, vec2(length + 0.08, thickness), -segAngle, color);
    }
}

function buildWorld()
{
    // Playfield side walls (up to where the dome takes over)
    addWall(vec2(-LANE_INNER_X, WALL_TOP_Y/2), vec2(WALL_T, WALL_TOP_Y));
    addWall(vec2(LANE_INNER_X, WALL_TOP_Y/2), vec2(WALL_T, WALL_TOP_Y));

    // Launch lane outer wall
    addWall(vec2(LANE_OUTER_X, WALL_TOP_Y/2), vec2(WALL_T, WALL_TOP_Y));

    // Lane floor
    const laneFloorW = LANE_OUTER_X - LANE_INNER_X + WALL_T;
    addWall(vec2(LANE_CENTER_X, LANE_FLOOR_Y), vec2(laneFloorW, 0.3));

    // Playfield dome (inner arc): ceiling of the main playfield, stops short on the left for exit
    buildArc(DOME_CENTER, DOME_RADIUS, 0, DOME_END_ANGLE, 14);

    // Launcher top rail (outer arc): curved channel over the dome that guides the launched ball
    buildArc(DOME_CENTER, RAIL_RADIUS, 0, RAIL_END_ANGLE, 18);

    // Slingshots above flippers (symmetric, near flipper pivots)
    slingshots.push(new Slingshot(vec2(-6.25, 5.5), vec2(4.0, 0.6), 0.686, vec2(0.633, 0.774)));
    slingshots.push(new Slingshot(vec2(6.25, 5.5), vec2(4.0, 0.6), -0.686, vec2(-0.633, 0.774)));

    // Bumpers (upper triangle, symmetric about x=0)
    bumpers.push(new Bumper(vec2(-3, 14), 1.0));
    bumpers.push(new Bumper(vec2(3, 14), 1.0));
    bumpers.push(new Bumper(vec2(0, 18), 1.0));

    // Flippers
    leftFlipper = new Flipper(LEFT_PIVOT, true);
    rightFlipper = new Flipper(RIGHT_PIVOT, false);
}

///////////////////////////////////////////////////////////////////////////////
// Launch

function canLaunch()
{
    if (!ball) return false;
    // Ball is in the lane (right of playfield wall) near the floor and slow
    return ball.pos.x > LANE_INNER_X + WALL_T/2
        && ball.pos.y < 5
        && ball.getLinearVelocity().length() < 3;
}

function launchBall(power)
{
    if (!ball) return;
    ball.setLinearVelocity(vec2(0, power));
    hasLaunchedEver = true;
    sfxLaunch && sfxLaunch.play(ball.pos);
}

function spawnBall()
{
    if (ball) { ball.destroy(); ball = null; }
    ball = new Ball(BALL_SPAWN);
    launchCharge = 0;
}

function loseBall()
{
    sfxDrain && sfxDrain.play();
    ballsLeft--;
    if (ballsLeft <= 0)
    {
        gameOver = true;
        highScore = Math.max(highScore, score);
    }
    else
    {
        spawnBall();
    }
}

function resetGame()
{
    score = 0;
    ballsLeft = 3;
    gameOver = false;
    hasLaunchedEver = false;
    spawnBall();
}

///////////////////////////////////////////////////////////////////////////////

async function gameInit()
{
    setCanvasFixedSize(vec2(720, 1080));
    cameraPos = vec2(0, PLAY_H/2);

    await box2dInit();

    sfxBumper = new SoundGenerator({ frequency: 440, release: 0.08, volume: 0.4, pitchJump: 200, pitchJumpTime: 0.02 });
    sfxSling = new SoundGenerator({ frequency: 320, release: 0.06, volume: 0.35, pitchJump: 120, pitchJumpTime: 0.02 });
    sfxFlipper = new SoundGenerator({ frequency: 180, release: 0.05, volume: 0.3, noise: 0.3 });
    sfxDrain = new SoundGenerator({ frequency: 120, release: 0.4, volume: 0.5, slide: -0.2 });
    sfxLaunch = new SoundGenerator({ frequency: 90, release: 0.3, volume: 0.5, slide: 0.3 });
    sfxWall = new SoundGenerator({ frequency: 300, release: 0.04, volume: 0.2, noise: 0.2 });

    buildWorld();
    resetGame();
}

function gameUpdate()
{
    if (gameOver)
    {
        if (keyWasPressed('Space') || keyWasPressed('Enter'))
            resetGame();
        return;
    }

    const leftPressed = keyWasPressed('ArrowLeft') || keyWasPressed('KeyA') || keyWasPressed('KeyZ');
    const rightPressed = keyWasPressed('ArrowRight') || keyWasPressed('KeyD') || keyWasPressed('Slash');
    const leftActive = keyIsDown('ArrowLeft') || keyIsDown('KeyA') || keyIsDown('KeyZ');
    const rightActive = keyIsDown('ArrowRight') || keyIsDown('KeyD') || keyIsDown('Slash');
    if (leftPressed) sfxFlipper && sfxFlipper.play(leftFlipper.pos, 0.5);
    if (rightPressed) sfxFlipper && sfxFlipper.play(rightFlipper.pos, 0.5);
    leftFlipper.setMotor(leftActive);
    rightFlipper.setMotor(rightActive);

    if (canLaunch())
    {
        if (keyIsDown('Space'))
            launchCharge = Math.min(LAUNCH_MAX, launchCharge + 1.2);
        else if (launchCharge > 0)
        {
            launchBall(Math.max(LAUNCH_MIN, launchCharge));
            launchCharge = 0;
        }
    }
    else
    {
        launchCharge = 0;
    }

    if (ball && ball.pos.y < DRAIN_Y) loseBall();
}

function gameUpdatePost()
{
    cameraPos = vec2(0, PLAY_H/2);
}

function gameRender()
{
    // Playfield rectangle (below the dome)
    drawRectGradient(vec2(0, WALL_TOP_Y/2), vec2(PLAY_W, WALL_TOP_Y),
                     hsl(0.62, 0.6, 0.15), hsl(0.7, 0.5, 0.05));
    // Dome interior fill
    drawCircle(DOME_CENTER, DOME_RADIUS * 2, hsl(0.62, 0.6, 0.18));

    // Lane tint (narrow strip on the right, outside playfield)
    const laneH = WALL_TOP_Y - LANE_FLOOR_Y;
    drawRect(vec2(LANE_CENTER_X, (WALL_TOP_Y + LANE_FLOOR_Y)/2),
             vec2(LANE_OUTER_X - LANE_INNER_X, laneH),
             hsl(0.7, 0.3, 0.12));

    // Launcher gauge inside the lane
    if (canLaunch())
    {
        const frac = launchCharge / LAUNCH_MAX;
        drawRect(vec2(LANE_CENTER_X, 6), vec2(0.35, 8), hsl(0, 0, 0.15));
        if (frac > 0)
            drawRect(vec2(LANE_CENTER_X, 2 + frac * 4), vec2(0.35, frac * 8), hsl(0.33 - frac * 0.33, 1, 0.5));
    }
}

function gameRenderPost()
{
    drawTextScreen('SCORE: ' + score, vec2(mainCanvasSize.x/2, 40), 30, WHITE, 4, BLACK);
    drawTextScreen('BALLS: ' + ballsLeft, vec2(80, 40), 22, WHITE, 3, BLACK);
    if (highScore)
        drawTextScreen('HI: ' + highScore, vec2(mainCanvasSize.x - 100, 40), 22, hsl(0.15, 1, 0.7), 3, BLACK);

    if (gameOver)
    {
        drawTextScreen('GAME OVER', vec2(mainCanvasSize.x/2, mainCanvasSize.y/2 - 40), 60, hsl(0, 0.9, 0.6), 5, BLACK);
        drawTextScreen('Press SPACE to restart', vec2(mainCanvasSize.x/2, mainCanvasSize.y/2 + 20), 24, WHITE, 3, BLACK);
    }
    else if (canLaunch())
    {
        const msg = hasLaunchedEver ? 'Hold SPACE to relaunch' : 'Hold SPACE to launch';
        drawTextScreen(msg, vec2(mainCanvasSize.x/2, mainCanvasSize.y - 60), 22, WHITE, 3, BLACK);
    }

    drawTextScreen('A/D or Arrows: Flippers', vec2(mainCanvasSize.x/2, mainCanvasSize.y - 30), 16, hsl(0, 0, 0.7), 2, BLACK);
}

engineInit(gameInit, gameUpdate, gameUpdatePost, gameRender, gameRenderPost);

</script>
</body></html>
