<!DOCTYPE html><head>
<title>LittleJS Connect 4</title>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
</head><body style="background:#000">
<script src="../dist/littlejs.js?1.18.12"></script>
<script src="../templates/menus.js"></script>
<script src="../templates/soundGenerator.js"></script>
<script src="../templates/gameAI.js"></script>
<script>
'use strict';

// engine settings, do not remove
debugWatermark = false;
showEngineVersion = false;
paused = false;

gravity = vec2(0, 0);
cameraPos = vec2(0, 0);
cameraScale = 42;

///////////////////////////////////////////////////////////////////////////////
// CONNECT 4 GAME

const ROWS = 6;
const COLS = 7;
const CELL_SIZE = 1.8;
const DISC_RADIUS = 0.7;

const DISC_EMPTY = 0;
const DISC_RED = 1;
const DISC_YELLOW = 2;

const PLAYER_HUMAN = DISC_RED;
const PLAYER_AI = DISC_YELLOW;

// Game state
let board = [];
let currentPlayer = DISC_RED;
let gameOver = false;
let winner = null;
let gameMode = 'pvp'; // 'pvp' | 'ai' | 'aivai' — set on startGame
let difficulty = 'hard'; // 'easy' | 'medium' | 'hard' — loaded from localStorage in gameInit
let moveHistory = [];
let winningCells = []; // [{row, col}, ...] for highlighting

// Center-first move ordering — dramatically improves alpha-beta pruning
const COLUMN_ORDER = [3, 2, 4, 1, 5, 0, 6];

// Animation
let droppingDisc = null; // {col, targetRow, currentY, player}
const DROP_SPEED = 25; // world units per second

// UI
let hoverCol = -1;
let isPlaying = false;

// Sounds
let sfxDrop, sfxWin, sfxLose, sfxSelect;

///////////////////////////////////////////////////////////////////////////////
// BOARD LOGIC

function initBoard()
{
    board = [];
    for (let row = 0; row < ROWS; row++)
    {
        board[row] = [];
        for (let col = 0; col < COLS; col++)
            board[row][col] = DISC_EMPTY;
    }

    currentPlayer = DISC_RED;
    gameOver = false;
    winner = null;
    winningCells = [];
    moveHistory = [];
    droppingDisc = null;
    aiGeneration++;
    aiSearching = false;
    aiProgress = '';
}

function getOpponent(player)
{
    return player === DISC_RED ? DISC_YELLOW : DISC_RED;
}

function getLowestEmptyRowForState(b, col)
{
    for (let row = 0; row < ROWS; row++)
    {
        if (b[row][col] === DISC_EMPTY)
            return row;
    }
    return -1; // column full
}

function countActiveThreats(board, player)
{
    // An "active threat" is a 4-window where `player` has 3 stones and the
    // remaining empty cell is the next playable cell in its column. If the
    // player has ≥2 active threats, the opponent can only block one.
    const directions = [[0, 1], [1, 0], [1, 1], [1, -1]];
    let threats = 0;
    for (let row = 0; row < ROWS; row++)
    {
        for (let col = 0; col < COLS; col++)
        {
            for (const [dr, dc] of directions)
            {
                let mine = 0, theirs = 0, emptyR = -1, emptyC = -1;
                let inBounds = true;
                for (let i = 0; i < 4; i++)
                {
                    const r = row + dr * i;
                    const c = col + dc * i;
                    if (r < 0 || r >= ROWS || c < 0 || c >= COLS) { inBounds = false; break; }
                    if (board[r][c] === player) mine++;
                    else if (board[r][c] === DISC_EMPTY) { emptyR = r; emptyC = c; }
                    else theirs++;
                }
                if (!inBounds) continue;
                if (mine !== 3 || theirs !== 0) continue;
                // Window has exactly 3 player + 1 empty. Is the empty cell playable now?
                if (emptyR === 0 || board[emptyR - 1][emptyC] !== DISC_EMPTY)
                    threats++;
            }
        }
    }
    return threats;
}

function getLowestEmptyRow(col)
{
    return getLowestEmptyRowForState(board, col);
}

function getValidColumns()
{
    const cols = [];
    for (let col = 0; col < COLS; col++)
    {
        if (board[ROWS - 1][col] === DISC_EMPTY)
            cols.push(col);
    }
    return cols;
}

function checkWinForState(b, row, col, player)
{
    const directions = [[0, 1], [1, 0], [1, 1], [1, -1]];

    for (const [dr, dc] of directions)
    {
        const cells = [{row, col}];

        // Check positive direction
        for (let i = 1; i < 4; i++)
        {
            const r = row + dr * i;
            const c = col + dc * i;
            if (r < 0 || r >= ROWS || c < 0 || c >= COLS || b[r][c] !== player)
                break;
            cells.push({row: r, col: c});
        }

        // Check negative direction
        for (let i = 1; i < 4; i++)
        {
            const r = row - dr * i;
            const c = col - dc * i;
            if (r < 0 || r >= ROWS || c < 0 || c >= COLS || b[r][c] !== player)
                break;
            cells.push({row: r, col: c});
        }

        if (cells.length >= 4)
            return cells;
    }

    return null;
}

function checkWinFrom(row, col, player)
{
    return checkWinForState(board, row, col, player);
}

function makeMove(col, player)
{
    const row = getLowestEmptyRow(col);
    if (row < 0)
        return false;

    // Save state for undo
    moveHistory.push({
        board: board.map(r => [...r]),
        currentPlayer: currentPlayer
    });

    board[row][col] = player;

    // Start drop animation
    const targetPos = getCellWorldPos(row, col);
    const startY = getCellWorldPos(ROWS, col).y + CELL_SIZE;
    droppingDisc = {col, targetRow: row, currentY: startY, targetY: targetPos.y, player};

    sfxDrop && sfxDrop.play();

    // Check for win
    const win = checkWinFrom(row, col, player);
    if (win)
    {
        gameOver = true;
        winner = player;
        winningCells = win;

        if (gameMode === 'ai')
        {
            if (player === PLAYER_HUMAN)
                sfxWin && sfxWin.play();
            else
                sfxLose && sfxLose.play();
        }
        else if (gameMode === 'aivai')
            sfxSelect && sfxSelect.play();
    }
    else if (getValidColumns().length === 0)
    {
        // Draw
        gameOver = true;
        winner = null;
        if (gameMode === 'aivai')
            sfxSelect && sfxSelect.play();
    }

    // Switch player
    currentPlayer = getOpponent(currentPlayer);
    return true;
}

function undoMove()
{
    if (moveHistory.length === 0 || gameOver)
        return false;

    const undoCount = (gameMode === 'ai' && moveHistory.length >= 2) ? 2 : 1;

    for (let i = 0; i < undoCount && moveHistory.length > 0; i++)
    {
        const state = moveHistory.pop();
        board = state.board;
        currentPlayer = state.currentPlayer;
    }

    droppingDisc = null;
    winningCells = [];
    sfxSelect && sfxSelect.play();
    return true;
}

///////////////////////////////////////////////////////////////////////////////
// AI adapter — pure-functional view of the game for gameAI.js search.
// State shape: { board, currentPlayer, gameOver }.

function getCurrentState()
{
    return {
        board: board.map(r => [...r]),
        currentPlayer: currentPlayer,
        gameOver: gameOver,
    };
}

const connect4Game = {
    getOpponent: (player) => player === DISC_RED ? DISC_YELLOW : DISC_RED,
    getCurrentPlayer: (state) => state.currentPlayer,
    isTerminal: (state) => state.gameOver,

    getLegalMoves(state, player)
    {
        // Center-first ordering baked in via COLUMN_ORDER for better pruning
        const moves = [];
        for (const col of COLUMN_ORDER)
        {
            if (getLowestEmptyRowForState(state.board, col) >= 0)
                moves.push({col});
        }
        return moves;
    },

    applyMove(state, move, player)
    {
        const newBoard = state.board.map(r => [...r]);
        const row = getLowestEmptyRowForState(newBoard, move.col);
        newBoard[row][move.col] = player;

        let nextGameOver = false;
        if (checkWinForState(newBoard, row, move.col, player))
        {
            nextGameOver = true;
        }
        else
        {
            // Check draw: any DISC_EMPTY in top row means board is not full
            let full = true;
            for (let c = 0; c < COLS; c++)
            {
                if (newBoard[ROWS - 1][c] === DISC_EMPTY) { full = false; break; }
            }
            if (full) nextGameOver = true;
        }

        const opponent = player === DISC_RED ? DISC_YELLOW : DISC_RED;
        return {board: newBoard, currentPlayer: opponent, gameOver: nextGameOver};
    },

    evaluate(state, player)
    {
        const b = state.board;
        const opponent = player === DISC_RED ? DISC_YELLOW : DISC_RED;
        let score = 0;

        // Evaluate all windows of 4
        for (let row = 0; row < ROWS; row++)
        {
            for (let col = 0; col < COLS; col++)
            {
                const directions = [[0, 1], [1, 0], [1, 1], [1, -1]];

                for (const [dr, dc] of directions)
                {
                    let mine = 0, theirs = 0, empty = 0;

                    for (let i = 0; i < 4; i++)
                    {
                        const r = row + dr * i;
                        const c = col + dc * i;
                        if (r < 0 || r >= ROWS || c < 0 || c >= COLS)
                        {
                            mine = -1;
                            break;
                        }
                        if (b[r][c] === player) mine++;
                        else if (b[r][c] === opponent) theirs++;
                        else empty++;
                    }

                    if (mine < 0) continue;

                    if (mine === 4) score += 1000;
                    else if (mine === 3 && empty === 1) score += 50;
                    else if (mine === 2 && empty === 2) score += 10;
                    if (theirs === 3 && empty === 1) score -= 80;
                    if (theirs === 4) score -= 1000;
                }
            }
        }

        // Center column preference
        for (let row = 0; row < ROWS; row++)
        {
            if (b[row][3] === player) score += 6;
            if (b[row][3] === opponent) score -= 6;
        }

        // Double-threat bonus — two simultaneous immediately-playable winning
        // threats can't both be blocked.
        const playerThreats = countActiveThreats(b, player);
        const opponentThreats = countActiveThreats(b, opponent);
        if (playerThreats >= 2) score += 500;
        if (opponentThreats >= 2) score -= 500;

        return score;
    },
};

function strategyForDifficulty(d)
{
    if (d === 'easy')   return (game, state, opts) => randomAI(game, state);
    if (d === 'medium') return (game, state, opts) => greedyAI(game, state);
    return (game, state, opts) => alphaBetaAI(game, state, 9, opts); // 'hard' (depth 9 with ID + TT)
}

function findBestAIMove(opts = {})
{
    const validCols = getValidColumns();
    if (validCols.length === 0) return Promise.resolve(null);
    return Promise.resolve(strategyForDifficulty(difficulty)(connect4Game, getCurrentState(), opts));
}

function setDifficulty(d)
{
    difficulty = d;
    localStorage.setItem('connect4.difficulty', d);
    refreshDifficultyUI();
}

function refreshDifficultyUI()
{
    const grid = getMenu('options')?.getItem('difficultyGrid');
    if (grid)
    {
        grid.setCell(0, {earned: difficulty === 'easy'});
        grid.setCell(1, {earned: difficulty === 'medium'});
        grid.setCell(2, {earned: difficulty === 'hard'});
    }
    const title = getMenu('title');
    const upper = difficulty.toUpperCase();
    title?.getItem('vsAI')?.setLabel(`PLAYER VS AI · ${upper}`);
    title?.getItem('aiVsAi')?.setLabel(`AI VS AI · ${upper}`);
}

///////////////////////////////////////////////////////////////////////////////
// RENDERING

function getCellWorldPos(row, col)
{
    const boardOffset = vec2(
        -(COLS * CELL_SIZE) / 2,
        -(ROWS * CELL_SIZE) / 2
    );

    return vec2(
        boardOffset.x + col * CELL_SIZE + CELL_SIZE / 2,
        boardOffset.y + row * CELL_SIZE + CELL_SIZE / 2
    );
}

function worldPosToCol(worldPos)
{
    const boardOffset = -(COLS * CELL_SIZE) / 2;
    const col = Math.floor((worldPos.x - boardOffset) / CELL_SIZE);
    if (col >= 0 && col < COLS)
        return col;
    return -1;
}

function getDiscColor(player)
{
    if (player === DISC_RED)
        return hsl(0, .85, .5);
    return hsl(.15, .95, .55);
}

function getDiscHighlight(player)
{
    if (player === DISC_RED)
        return hsl(0, .6, .7);
    return hsl(.15, .7, .75);
}

function drawDisc(pos, player, scale = 1)
{
    const r = DISC_RADIUS * scale;

    // Shadow
    drawCircle(pos.add(vec2(0.06, -0.06)), r * 2 * 0.95, rgb(0, 0, 0, 0.3));

    // Main disc
    drawCircle(pos, r * 2, getDiscColor(player));

    // Highlight
    drawCircle(pos.add(vec2(-0.12 * scale, 0.12 * scale)), r * 2 * 0.3, getDiscHighlight(player));
}

function drawBoard()
{
    const boardW = COLS * CELL_SIZE;
    const boardH = ROWS * CELL_SIZE;
    const boardCenter = vec2(0, 0);

    // Board frame
    drawRect(boardCenter, vec2(boardW + 0.5, boardH + 0.5), rgb(0.05, 0.05, 0.2));
    drawRect(boardCenter, vec2(boardW, boardH), hsl(.62, .75, .35));

    // Draw all holes behind pieces
    for (let row = 0; row < ROWS; row++)
    {
        for (let col = 0; col < COLS; col++)
        {
            const pos = getCellWorldPos(row, col);
            drawCircle(pos, DISC_RADIUS * 2, rgb(0.02, 0.02, 0.06));
        }
    }

    // Draw placed discs on top
    for (let row = 0; row < ROWS; row++)
    {
        for (let col = 0; col < COLS; col++)
        {
            if (board[row][col] !== DISC_EMPTY)
            {
                const pos = getCellWorldPos(row, col);
                const isDropping = droppingDisc && droppingDisc.col === col && droppingDisc.targetRow === row;

                if (isDropping)
                    drawDisc(vec2(pos.x, droppingDisc.currentY), droppingDisc.player);
                else
                    drawDisc(pos, board[row][col]);
            }
        }
    }

    // Winning cells highlight
    if (gameOver && winningCells.length > 0)
    {
        for (const cell of winningCells)
        {
            const pos = getCellWorldPos(cell.row, cell.col);
            const pulse = 1 + Math.sin(time * 6) * 0.1;
            drawCircle(pos, DISC_RADIUS * 2.2 * pulse, rgb(1, 1, 1, 0.4));
        }
    }

    // Hover indicator at top (gameplay only — keep the bobbing ghost off the title)
    const isHumanTurn = gameMode !== 'aivai' && (gameMode === 'pvp' || currentPlayer === PLAYER_HUMAN);
    if (isPlaying && !gameOver && hoverCol >= 0 && !droppingDisc && isHumanTurn)
    {
        const isValid = board[ROWS - 1][hoverCol] === DISC_EMPTY;
        if (isValid)
        {
            const topPos = getCellWorldPos(ROWS, hoverCol);
            const bobY = Math.sin(time * 4) * 0.1;
            drawDisc(topPos.add(vec2(0, bobY)), currentPlayer, 0.8);
        }
    }
}

function drawUI()
{
    const screenSize = vec2(mainCanvasSize.x, mainCanvasSize.y);

    // Current player indicator
    if (!gameOver)
    {
        let playerText;
        if (gameMode === 'ai')
        {
            if (currentPlayer === PLAYER_HUMAN) playerText = "Your Turn (Red)";
            else playerText = aiProgress || "AI Thinking...";
        }
        else if (gameMode === 'aivai')
        {
            if (aiProgress) {
                const side = currentPlayer === DISC_RED ? "Red" : "Yellow";
                playerText = `AI ${side} — ${aiProgress.replace('AI Thinking... ', '').replace('AI Thinking...', 'thinking...')}`;
            } else {
                playerText = currentPlayer === DISC_RED ? "AI Red Thinking..." : "AI Yellow Thinking...";
            }
        }
        else
            playerText = currentPlayer === DISC_RED ? "Red's Turn" : "Yellow's Turn";

        const color = getDiscColor(currentPlayer);
        drawTextScreen(playerText, vec2(screenSize.x / 2, 35), 32, color, 4, BLACK);
    }

    // Undo hint
    if (moveHistory.length > 0 && !gameOver)
    {
        drawTextScreen(`U: Undo`, vec2(30, 30), 18,
            rgb(0.6, 0.8, 1), 2, BLACK, 'left');
    }

    // Game over message
    if (gameOver)
    {
        drawTextScreen('GAME OVER', vec2(screenSize.x / 2, screenSize.y / 2 - 60), 64,
            rgb(1, 0.8, 0), 6, BLACK);

        let resultText;
        let resultColor;

        if (winner === null)
        {
            resultText = "It's a Draw!";
            resultColor = WHITE;
        }
        else if (gameMode === 'ai')
        {
            resultText = winner === PLAYER_HUMAN ? "You Win!" : "AI Wins!";
            resultColor = winner === PLAYER_HUMAN ? rgb(0, 1, 0.3) : rgb(1, 0.3, 0.3);
        }
        else if (gameMode === 'aivai')
        {
            resultText = winner === DISC_RED ? "AI Red Wins!" : "AI Yellow Wins!";
            resultColor = getDiscColor(winner);
        }
        else
        {
            resultText = winner === DISC_RED ? "Red Wins!" : "Yellow Wins!";
            resultColor = getDiscColor(winner);
        }

        drawTextScreen(resultText, vec2(screenSize.x / 2, screenSize.y / 2), 48,
            resultColor, 5, BLACK);

        drawTextScreen('Press R to restart or ESC to pause', vec2(screenSize.x / 2, screenSize.y / 2 + 60), 24,
            WHITE, 3, BLACK);
    }

    // Controls
    drawTextScreen('U: Undo | R: Restart | ESC: Pause', vec2(screenSize.x / 2, screenSize.y - 30), 20,
        rgb(0.7, 0.7, 0.7), 2, BLACK);
}

///////////////////////////////////////////////////////////////////////////////
// GAME LOOP

let aiThinkTimer = 0;
let aiSearching = false;
let aiProgress = '';
let aiGeneration = 0;
const AI_THINK_DELAY = 0.6;
const AI_VS_AI_DELAY = 0.5;

async function gameInit()
{
    setCanvasFixedSize(vec2(1280, 720));
    cameraPos = vec2(0, 0);
    canvasClearColor = new Color().setHex('#0d0d14');
    difficulty = localStorage.getItem('connect4.difficulty') || 'hard';

    // One callback drives `paused` for every menu (including dialogs).
    setMenuVisibilityCallback(v => paused = v);

    sfxDrop = new SoundGenerator({frequency: 180, release: 0.08, volume: 0.4});
    sfxWin = new SoundGenerator({frequency: 660, release: 0.3, pitchJump: 220, pitchJumpTime: 0.1, volume: 0.6});
    sfxLose = new SoundGenerator({frequency: 220, release: 0.35, slide: -0.5, volume: 0.5});
    sfxSelect = new SoundGenerator({frequency: 550, release: 0.08, volume: 0.4});

    // Global menu sounds (LittleJS Sound class — routes through engine audio).
    const sound_select   = new Sound([.5,,910,,,.02,2,.07,-5,-33,,,,,,,,.25]);
    const sound_activate = new Sound([.7,,30,.01,,.02,1,3.4,94,,,,,,,,,.67]);
    setMenuSounds({
        select:   () => sound_select.play(),
        activate: () => sound_activate.play(),
    });

    // ----- title menu -----
    createMenu({
        id: 'title',
        title: 'CONNECT 4',
        dismissable: false,
        onStart: () => startGame('ai'),
        items: [
            {type:'button', id:'vsAI',   label:'PLAYER VS AI',     onClick: () => startGame('ai')},
            {type:'button',              label:'PLAYER VS PLAYER', onClick: () => startGame('pvp')},
            {type:'button', id:'aiVsAi', label:'AI VS AI',         onClick: () => startGame('aivai')},
            {type:'button',              label:'OPTIONS',          onClick: () => pushMenu('options')},
            {type:'button',              label:'ABOUT',            onClick: () => pushMenu('about')},
        ],
    });

    // ----- options menu -----
    createMenu({
        id: 'options',
        title: 'OPTIONS',
        onHide: popMenu,
        items: [
            {type:'label', text:'DIFFICULTY'},
            {type:'grid', id:'difficultyGrid', columns:3, cells: [
                {label:'EASY',   title:'Random moves',                   onClick: () => setDifficulty('easy')},
                {label:'MEDIUM', title:'Greedy 1-ply',                   onClick: () => setDifficulty('medium')},
                {label:'HARD',   title:'Alpha-beta search to depth 7',   onClick: () => setDifficulty('hard')},
            ]},
            {type:'separator'},
            {type:'slider', id:'volume', label:'VOLUME', value: 0.8, min:0, max:1,
                persist:'connect4.volume',
                onChange: v => setSoundVolume(v)},
            {type:'separator'},
            {type:'button', label:'FULLSCREEN', onClick: toggleFullscreen},
            {type:'button', label:'BACK',       onClick: () => hideMenu('options')},
        ],
    });

    // ----- about menu -----
    createMenu({
        id: 'about',
        title: 'ABOUT',
        onHide: popMenu,
        items: [
            {type:'text', text:'Connect 4 — drop discs into columns to connect four in a row. ' +
                'Horizontal, vertical, or diagonal! First to four wins. ' +
                'Includes a watchable AI-vs-AI mode.'},
            {type:'separator'},
            {type:'button', label:'BACK', onClick: () => hideMenu('about')},
        ],
    });

    // ----- pause menu -----
    createMenu({
        id: 'pause',
        title: 'PAUSED',
        initialItemId: 'resume',
        items: [
            {type:'button', id:'resume',  label:'RESUME',  onClick: () => hideMenu('pause')},
            {type:'button', id:'restart', label:'RESTART', onClick: () => { initBoard(); aiThinkTimer = 0; hideMenu('pause'); }},
            {type:'button', id:'options', label:'OPTIONS', onClick: () => pushMenu('options')},
            {type:'button',               label:'QUIT TO TITLE', onClick: () =>
            {
                showConfirmDialog({message: 'Quit to title?', onYes: quitToTitle});
            }},
        ],
    });

    // ----- HUD toolbar (gameplay-only — setPlaying toggles visibility) -----
    createToolbar({
        id: 'hud',
        anchor: 'top-right',
        direction: 'horizontal',
        items: [
            {type:'button', id:'fs',   label:'⛶', title:'Toggle fullscreen', hideOnTouch:true, onClick: toggleFullscreen},
            {type:'button', id:'menu', label:'☰', title:'Menu', onClick: () =>
            {
                if (isMenuVisible()) { clearSubmenuStack(); hideAllMenus(); }
                else showMenu('pause');
            }},
        ],
    });

    initBoard();
    setPlaying(false);
    showMenu('title');
    refreshDifficultyUI();
}

function setPlaying(p)
{
    isPlaying = p;
    const hud = getToolbar('hud');
    if (hud) p ? hud.show() : hud.hide();
}

function quitToTitle()
{
    aiGeneration++;
    aiSearching = false;
    aiProgress = '';
    setPlaying(false);
    clearSubmenuStack();
    hideAllMenus();
    showMenu('title');
}

function startGame(mode)
{
    gameMode = mode;
    initBoard();
    aiThinkTimer = 0;
    setPlaying(true);
    hideMenu('title');
}

function gameUpdate()
{
    if (bindPauseKey({when: () => isPlaying})) return;
    if (!isPlaying) return;

    // Update drop animation
    if (droppingDisc)
    {
        droppingDisc.currentY -= DROP_SPEED * timeDelta;
        if (droppingDisc.currentY <= droppingDisc.targetY)
        {
            droppingDisc.currentY = droppingDisc.targetY;
            droppingDisc = null;
        }
    }

    // Input
    if (keyWasPressed('KeyR'))
    {
        initBoard();
        aiThinkTimer = 0;
    }

    if (keyWasPressed('KeyU'))
    {
        undoMove();
        aiThinkTimer = 0;
    }

    if (gameOver)
        return;

    // Update hover column
    hoverCol = worldPosToCol(mousePos);

    // AI turn — covers both 'ai' mode (AI is yellow only) and 'aivai' mode (AI plays both sides).
    const isAITurn = (gameMode === 'ai' && currentPlayer === PLAYER_AI) || gameMode === 'aivai';
    if (isAITurn && !aiSearching && !droppingDisc)
    {
        const delay = gameMode === 'aivai' ? AI_VS_AI_DELAY : AI_THINK_DELAY;
        aiThinkTimer += timeDelta;
        if (aiThinkTimer >= delay)
        {
            aiSearching = true;
            aiProgress = 'AI Thinking...';
            const myGen = aiGeneration;
            findBestAIMove({
                onProgress: (d, n) => {
                    if (myGen === aiGeneration) aiProgress = `AI Thinking... ${Math.round(d / n * 100)}%`;
                }
            }).then(move => {
                if (myGen !== aiGeneration) { aiSearching = false; aiProgress = ''; return; }
                if (move && move.col >= 0) makeMove(move.col, currentPlayer);
                aiSearching = false;
                aiProgress = '';
                aiThinkTimer = 0;
            });
        }
    }

    // Human input — PvP always, or PvAI when it's the human's turn. Never in aivai.
    const isHumanTurn = gameMode === 'pvp' || (gameMode === 'ai' && currentPlayer === PLAYER_HUMAN);
    if (isHumanTurn && mouseWasPressed(0) && !droppingDisc)
    {
        const col = worldPosToCol(mousePos);
        if (col >= 0 && board[ROWS - 1][col] === DISC_EMPTY)
        {
            makeMove(col, currentPlayer);
            aiThinkTimer = 0;
        }
    }
}

function gameUpdatePost()
{
    cameraPos = vec2(0, 0);
}

function gameRender()
{
    drawBoard();
}

function gameRenderPost()
{
    if (isPlaying) drawUI();
}

///////////////////////////////////////////////////////////////////////////////
engineInit(gameInit, gameUpdate, gameUpdatePost, gameRender, gameRenderPost);

</script>
