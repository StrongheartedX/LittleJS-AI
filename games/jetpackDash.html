<script>
'use strict';

// engine settings, do not remove
debugWatermark = false;
showEngineVersion = false;
paused = false;

// engine defaults
gravity = vec2(0, -0.001);     // tiny negative so groundObject sign tests work if needed later
// match the in-game camera offset (player at world x=0 sits at the left third) so the
// title-screen preview lines up with how the level looks the moment PLAY is pressed
cameraPos = vec2(8, 6);
cameraScale = 48;
canvasMaxSize = vec2(2048, 2048);
canvasClearColor = new Color().setHex('#1a1a2a');

///////////////////////////////////////////////////////////////////////////////
// JETPACK DASH — prototype built on the menus.js helper

// sprite tile indices in the generated atlas
const TILE_PLAYER  = 0;
const TILE_COIN    = 1;
const TILE_SHIELD  = 2;
const TILE_MISSILE = 3;
const TILE_ZAP     = 4;
const TILE_LASER   = 5;

// world / camera
const SCROLL_SPEED_DEFAULT = 0.15;   // world units per frame at 60fps
const CEILING_Y_DEFAULT    = 12;
let scrollSpeed = SCROLL_SPEED_DEFAULT;
let ceilingY    = CEILING_Y_DEFAULT;
let playerStartScreenX = -8;         // world x offset of player from cameraPos.x

// spawn director
const CHUNK_WIDTH_DEFAULT = 7;
const MIN_GAP_DEFAULT     = 2.5;
const SPAWN_AHEAD         = 30;   // world units past the camera to keep spawned
let chunkWidth = CHUNK_WIDTH_DEFAULT;
let minGap     = MIN_GAP_DEFAULT;
let nextSpawnX = 0;

// missile tunables
const MISSILE_WARN_DEFAULT  = 1.0;
const MISSILE_SPEED_DEFAULT = 0.45;
let missileWarnTime = MISSILE_WARN_DEFAULT;
let missileSpeed    = MISSILE_SPEED_DEFAULT;

// laser tunables
const LASER_ROTATE_DEFAULT = 0.6;   // rad/s
let laserRotateSpeed = LASER_ROTATE_DEFAULT;

// player physics
const THRUST_FORCE_DEFAULT = 0.018;
const GRAVITY_Y_DEFAULT    = -0.012;
const MAX_RISE_DEFAULT     = 0.35;
const MAX_FALL_DEFAULT     = 0.55;
let thrustForce = THRUST_FORCE_DEFAULT;
let gravityY    = GRAVITY_Y_DEFAULT;
let maxRiseSpeed = MAX_RISE_DEFAULT;
let maxFallSpeed = MAX_FALL_DEFAULT;

// player state
let player;                  // Player instance, recreated each run
let alive = false;
let distance = 0;            // floored player.pos.x in meters
let deathTimer = 0;          // counts up after death; opens dialog at ~1s
let coins = 0;

// sound effects (assigned in gameInit)
let sndThrust, sndCoin, sndShieldPickup, sndShieldBreak,
    sndMissileWarn, sndMissileLaunch, sndHit;

// shield
const SHIELD_CHANCE_DEFAULT = 0.06;
let shieldChance = SHIELD_CHANCE_DEFAULT;
let hasShield = false;
let shieldInvuln = 0;        // seconds of post-break invuln remaining

// persistence
let bestDistance = 0;
let totalCoins = 0;

function loadProgress()
{
    bestDistance = parseInt(localStorage.getItem('jetpackDash_best')   || '0', 10) || 0;
    totalCoins   = parseInt(localStorage.getItem('jetpackDash_coins') || '0', 10) || 0;
}

function saveProgress()
{
    localStorage.setItem('jetpackDash_best',  String(bestDistance));
    localStorage.setItem('jetpackDash_coins', String(totalCoins));
}

///////////////////////////////////////////////////////////////////////////////
function startRun()
{
    // wipe any leftover objects from a prior run
    engineObjectsDestroy();

    alive = true;
    deathTimer = 0;
    distance = 0;
    coins = 0;
    hasShield = false;
    shieldInvuln = 0;

    // player sits at world x=0; camera offset keeps it ~1/3 from left of screen
    player = new Player(vec2(0, ceilingY / 2));
    player.velocity = vec2(scrollSpeed, 0);

    cameraPos = vec2(player.pos.x - playerStartScreenX, ceilingY / 2);
    nextSpawnX = 25;   // ~3s of clear runway before the first chunk spawns
    setPlaying(true);
}

function killPlayer()
{
    if (!alive) return;
    alive = false;
    deathTimer = 0;
    sndHit && sndHit.play();

    // silence the jetpack flame
    if (player && player.thrustEmitter) player.thrustEmitter.emitRate = 0;

    // explosion burst — one-shot emitter that self-destructs after emitTime
    if (player)
    {
        new ParticleEmitter(
            player.pos.copy(),       // pos
            0,                       // angle (cone is full circle below)
            0.4,                     // emitSize (circular)
            0.15,                    // emitTime (auto-destroys after)
            300,                     // emitRate (burst)
            PI,                      // emitConeAngle (full circle)
            undefined,               // tileInfo (colored square)
            hsl(.12, 1, .7, 1),      // colorStartA (yellow)
            hsl(.02, 1, .55, 1),     // colorStartB (red-orange)
            hsl(.0,  1, .3, 0),      // colorEndA
            hsl(.0,  0, .1, 0),      // colorEndB (smoky end)
            0.7,                     // particleTime
            0.6,                     // sizeStart
            0.05,                    // sizeEnd
            0.4,                     // speed
            0.1,                     // angleSpeed
            0.93,                    // damping
            1,                       // angleDamping
            0.4,                     // gravityScale (chunks arc down)
            PI,                      // particleConeAngle
            0.1,                     // fadeRate
            0.5,                     // randomness
            false,                   // collideTiles
            true,                    // additive
            true,                    // randomColorLinear
            1e9                      // renderOrder
        );
    }
}

function returnToTitle()
{
    setPlaying(false);
    engineObjectsDestroy();
    player = undefined;
    // reset camera to the start-of-level preview view
    cameraPos = vec2(-playerStartScreenX, ceilingY / 2);
    clearSubmenuStack();
    hideAllMenus();
    showMenu('title');
}

///////////////////////////////////////////////////////////////////////////////
// Slab-based line-segment vs AABB test. Returns true if segment intersects box.
function segmentHitsBox(p0, p1, boxCenter, boxSize)
{
    const dx = p1.x - p0.x, dy = p1.y - p0.y;
    const bx = boxCenter.x, by = boxCenter.y;
    const hx = boxSize.x / 2, hy = boxSize.y / 2;
    let tmin = 0, tmax = 1;

    // X slab
    if (Math.abs(dx) < 1e-9)
    {
        if (p0.x < bx - hx || p0.x > bx + hx) return false;
    }
    else
    {
        const t1 = (bx - hx - p0.x) / dx;
        const t2 = (bx + hx - p0.x) / dx;
        const lo = Math.min(t1, t2), hi = Math.max(t1, t2);
        tmin = Math.max(tmin, lo);
        tmax = Math.min(tmax, hi);
        if (tmin > tmax) return false;
    }
    // Y slab
    if (Math.abs(dy) < 1e-9)
    {
        if (p0.y < by - hy || p0.y > by + hy) return false;
    }
    else
    {
        const t1 = (by - hy - p0.y) / dy;
        const t2 = (by + hy - p0.y) / dy;
        const lo = Math.min(t1, t2), hi = Math.max(t1, t2);
        tmin = Math.max(tmin, lo);
        tmax = Math.min(tmax, hi);
        if (tmin > tmax) return false;
    }
    return true;
}

///////////////////////////////////////////////////////////////////////////////
class Hazard extends EngineObject
{
    constructor(pos, size, tileIndex)
    {
        super(pos, size, tileIndex !== undefined ? tile(tileIndex) : undefined);
        this.gravityScale = 0;
        this.damping = 1;
    }

    update()
    {
        // despawn well behind the camera
        if (this.pos.x < cameraPos.x - 25) { this.destroy(); return; }
        super.update();
    }

    hitsPlayer(p)
    {
        const dx = Math.abs(p.pos.x - this.pos.x);
        const dy = Math.abs(p.pos.y - this.pos.y);
        return dx < (this.size.x + p.size.x) / 2 &&
               dy < (this.size.y + p.size.y) / 2;
    }
}

class Zapper extends Hazard
{
    // axis: 'v' (vertical beam, caps top/bottom) or 'h' (horizontal beam)
    constructor(pos, length, axis)
    {
        const size = axis === 'v' ? vec2(0.5, length) : vec2(length, 0.5);
        super(pos, size);
        this.axis = axis;
        this.length = length;
    }

    render()
    {
        const t = time * 30;
        const half = this.length / 2 - 0.25;
        const nodeA = this.axis === 'v'
            ? this.pos.add(vec2(0, +half))
            : this.pos.add(vec2(+half, 0));
        const nodeB = this.axis === 'v'
            ? this.pos.add(vec2(0, -half))
            : this.pos.add(vec2(-half, 0));
        drawTile(nodeA, vec2(0.8), tile(TILE_ZAP));
        drawTile(nodeB, vec2(0.8), tile(TILE_ZAP));

        // jittery beam — three offset line segments for an electric look
        for (let s = 0; s < 3; s++)
        {
            const jitter = Math.sin(t + s * 1.3) * 0.08;
            const a = this.axis === 'v'
                ? nodeA.add(vec2(jitter, 0))
                : nodeA.add(vec2(0, jitter));
            const b = this.axis === 'v'
                ? nodeB.add(vec2(jitter, 0))
                : nodeB.add(vec2(0, jitter));
            drawLine(a, b, 0.1, hsl(.16, 1, .7, 0.9));
        }
    }
}

///////////////////////////////////////////////////////////////////////////////
class Missile extends Hazard
{
    constructor(targetY)
    {
        // spawn off-screen right; position is held until the warning expires
        const pos = vec2(cameraPos.x + 18, targetY);
        super(pos, vec2(1.4, 0.6), TILE_MISSILE);
        this.warnTimer = missileWarnTime;
        this.flying = false;
        this.targetY = targetY;
        this._beepTimer = 0;

        // flame trail behind the missile (emitter sits at the tail offset).
        // emitRate stays 0 until launch; flame angle PI/2 emits to the right
        // (behind a left-moving missile).
        this.flameEmitter = this.addChild(new ParticleEmitter(
            vec2(),
            PI/2,               // emit toward +X (behind left-moving missile)
            0.2, 0, 0, 0.5,
            undefined,
            hsl(.10, 1, .7, 1), hsl(.04, 1, .6, 1),
            hsl(.0,  1, .3, 0), hsl(.0,  1, .2, 0),
            0.25, 0.35, 0.05,
            0.2, 0,
            0.95, 1, 0,
            0.4, 0.1, 0.3,
            false, true, true, 1e9
        ), vec2(0.7, 0));   // local offset: trail emerges from the rear

        sndMissileWarn && sndMissileWarn.play();
    }

    update()
    {
        // despawn behind camera (same rule as Hazard base, kept here so the warning
        // anchor logic stays in one place)
        if (this.pos.x < cameraPos.x - 25) { this.destroy(); return; }

        if (!this.flying)
        {
            // hold position at the screen edge during the warning phase
            this.pos.x = cameraPos.x + 18;
            this.warnTimer -= 1/60;

            // periodic warn beep so it doesn't sound like a one-shot
            this._beepTimer -= 1/60;
            if (this._beepTimer <= 0)
            {
                sndMissileWarn && sndMissileWarn.play();
                this._beepTimer = 0.25;
            }

            if (this.warnTimer <= 0)
            {
                this.flying = true;
                this.flameEmitter.emitRate = 100;
                sndMissileLaunch && sndMissileLaunch.play();
            }
            super.update();
            return;
        }

        // flying — engine moves pos via velocity; we just set it
        this.velocity = vec2(-missileSpeed, 0);
        super.update();
    }

    hitsPlayer(p)
    {
        if (!this.flying) return false;
        return super.hitsPlayer(p);
    }

    render()
    {
        if (this.flying)
        {
            drawTile(this.pos, vec2(1.6, 0.8), tile(TILE_MISSILE));
            return;
        }
        // warning arrow at right screen edge, blinking
        const blink = Math.sin(time * 20) > 0;
        if (!blink) return;
        const rightX = cameraPos.x + 14;
        drawLine(vec2(rightX, this.targetY),       vec2(rightX - 1, this.targetY + 0.6), 0.15, hsl(0, 1, .55));
        drawLine(vec2(rightX - 1, this.targetY+.6),vec2(rightX - 2, this.targetY),       0.15, hsl(0, 1, .55));
        drawLine(vec2(rightX, this.targetY),       vec2(rightX - 1, this.targetY - 0.6), 0.15, hsl(0, 1, .55));
        drawLine(vec2(rightX - 1, this.targetY-.6),vec2(rightX - 2, this.targetY),       0.15, hsl(0, 1, .55));
    }
}

///////////////////////////////////////////////////////////////////////////////
class Laser extends Hazard
{
    constructor(pos, beamLength, dirSign)
    {
        super(pos, vec2(0.8), TILE_LASER);
        this.beamLength = beamLength;
        this.angle = Math.random() * Math.PI * 2;
        this.dir = dirSign;             // +1 CW or -1 CCW
    }

    update()
    {
        if (this.pos.x < cameraPos.x - 25) { this.destroy(); return; }
        this.angle += laserRotateSpeed * (1/60) * this.dir;
        super.update();
    }

    beamEnd()
    {
        return this.pos.add(vec2(Math.cos(this.angle), Math.sin(this.angle))
            .scale(this.beamLength));
    }

    hitsPlayer(p)
    {
        return segmentHitsBox(this.pos, this.beamEnd(), p.pos, p.size);
    }

    render()
    {
        drawTile(this.pos, vec2(0.9), tile(TILE_LASER));
        const end = this.beamEnd();
        // outer glow
        drawLine(this.pos, end, 0.18, hsl(0, 1, .5, 0.4));
        // core beam
        drawLine(this.pos, end, 0.08, hsl(0, 1, .7, 0.95));
        // tip dot
        drawTile(end, vec2(0.3), tile(TILE_LASER));
    }
}

///////////////////////////////////////////////////////////////////////////////
class Coin extends EngineObject
{
    constructor(pos)
    {
        super(pos, vec2(0.7), tile(TILE_COIN));
        this.gravityScale = 0;
        this.damping = 1;
        this.spin = Math.random() * 6.28;
    }

    update()
    {
        if (this.pos.x < cameraPos.x - 25) { this.destroy(); return; }
        this.spin += 0.15;
        super.update();
    }

    render()
    {
        // squash on X to fake a spin
        const sx = Math.abs(Math.cos(this.spin)) * 0.7 + 0.05;
        drawTile(this.pos, vec2(sx, 0.7), tile(TILE_COIN));
    }

    tryCollect(p)
    {
        const dx = Math.abs(p.pos.x - this.pos.x);
        const dy = Math.abs(p.pos.y - this.pos.y);
        if (dx < (this.size.x + p.size.x)/2 &&
            dy < (this.size.y + p.size.y)/2)
        {
            this.destroy();
            coins += 1;
            sndCoin && sndCoin.play();
            return true;
        }
        return false;
    }
}

///////////////////////////////////////////////////////////////////////////////
class ShieldPickup extends EngineObject
{
    constructor(pos)
    {
        super(pos, vec2(1.2), tile(TILE_SHIELD));
        this.gravityScale = 0;
        this.damping = 1;
    }

    update()
    {
        if (this.pos.x < cameraPos.x - 25) { this.destroy(); return; }
        super.update();
    }

    tryCollect(p)
    {
        const dx = Math.abs(p.pos.x - this.pos.x);
        const dy = Math.abs(p.pos.y - this.pos.y);
        if (dx < (this.size.x + p.size.x)/2 &&
            dy < (this.size.y + p.size.y)/2)
        {
            this.destroy();
            hasShield = true;
            sndShieldPickup && sndShieldPickup.play();
            return true;
        }
        return false;
    }
}

///////////////////////////////////////////////////////////////////////////////
function spawnChunk(chunkX)
{
    // Decide a safe-gap Y band — center of the gap and its half-height
    const gapCenter = lerp(2 + minGap/2, ceilingY - 2 - minGap/2, Math.random());
    const gapHalf   = minGap / 2;

    // difficulty-ramped weights for hazard type
    const d = distance;
    const wMissile = clamp(0.05 + d / 4000, 0.05, 0.35);
    const wLaser   = clamp(0.02 + d / 5000, 0.02, 0.25);
    const roll = Math.random();

    if (roll < wMissile)
    {
        // missile crosses near gapCenter, slightly randomized
        const y = clamp(gapCenter + (Math.random() - 0.5) * 2, 1.5, ceilingY - 1.5);
        new Missile(y);
    }
    else if (roll < wMissile + wLaser)
    {
        // anchor on ceiling or floor; beam extends toward the gap
        const onCeil = Math.random() < 0.5;
        const anchorY = onCeil ? ceilingY - 0.6 : 0.6;
        const beamLen = lerp(2.5, 4.5, Math.random());
        const dirSign = Math.random() < 0.5 ? 1 : -1;
        new Laser(vec2(chunkX, anchorY), beamLen, dirSign);
    }
    else
    {
        // zapper above or below the safe gap
        const placeAbove = Math.random() < 0.5;
        if (placeAbove)
        {
            const top = ceilingY - 0.5;
            const bot = gapCenter + gapHalf;
            if (top - bot >= 1.2)
            {
                const y = (top + bot) / 2;
                const len = top - bot;
                new Zapper(vec2(chunkX, y), len, 'v');
            }
        }
        else
        {
            const bot = 0.5;
            const top = gapCenter - gapHalf;
            if (top - bot >= 1.2)
            {
                const y = (top + bot) / 2;
                const len = top - bot;
                new Zapper(vec2(chunkX, y), len, 'v');
            }
        }
    }

    // coin pattern in the safe gap — pick one of: line, arc, stair
    const patternRoll = Math.random();
    const startX = chunkX - 1;
    const endX   = chunkX + 2;
    const count  = 5;

    if (patternRoll < 0.4)
    {
        // horizontal line at gapCenter
        for (let i = 0; i < count; i++)
        {
            const t = i / (count - 1);
            new Coin(vec2(lerp(startX, endX, t), gapCenter));
        }
    }
    else if (patternRoll < 0.75)
    {
        // arc — sine wave centered on gapCenter
        for (let i = 0; i < count; i++)
        {
            const t = i / (count - 1);
            const x = lerp(startX, endX, t);
            const y = gapCenter + Math.sin(t * Math.PI) * Math.min(1.2, gapHalf - 0.3);
            new Coin(vec2(x, y));
        }
    }
    else
    {
        // stair — descend or ascend across the gap height
        const dir = Math.random() < 0.5 ? 1 : -1;
        const amp = Math.min(gapHalf - 0.3, 1.2);
        for (let i = 0; i < count; i++)
        {
            const t = i / (count - 1);
            const x = lerp(startX, endX, t);
            const y = gapCenter + dir * (t - 0.5) * amp * 2;
            new Coin(vec2(x, y));
        }
    }

    // occasionally drop a shield in the safe gap, biased toward the gap center
    if (Math.random() < shieldChance)
    {
        new ShieldPickup(vec2(chunkX + chunkWidth/2, gapCenter));
    }
}

///////////////////////////////////////////////////////////////////////////////
class Player extends EngineObject
{
    constructor(pos)
    {
        super(pos, vec2(1.4, 1.6), tile(TILE_PLAYER));
        this.gravityScale = 0;          // we apply our own gravity
        this.damping = 1;
        this.friction = 0;
        this.restitution = 0;
        this.thrusting = false;

        // thrust flame emitter — parented to player so it follows along.
        // emitRate starts at 0 and is toggled on in update() while thrusting.
        this.thrustEmitter = this.addChild(new ParticleEmitter(
            vec2(),                 // local pos handled by addChild's localPos arg
            PI,                     // emit downward (PI = vec2(0,-1) in LittleJS angle convention)
            vec2(0.6, 0.1),         // rect across both nozzles
            0,                      // emitTime forever
            0,                      // emitRate off until thrusting
            0.5,                    // emitConeAngle
            undefined,              // untextured colored squares
            hsl(.10, 1, .7, 1),     // colorStartA — yellow
            hsl(.04, 1, .6, 1),     // colorStartB — orange
            hsl(.0,  1, .3, 0),     // colorEndA   — faded red
            hsl(.0,  1, .2, 0),     // colorEndB
            0.3,                    // particleTime
            0.35,                   // sizeStart
            0.05,                   // sizeEnd
            0.15,                   // speed
            0,                      // angleSpeed
            0.95,                   // damping
            1,                      // angleDamping
            0,                      // gravityScale (don't drag flames down by world gravity)
            0.4,                    // particleConeAngle
            0.1,                    // fadeRate
            0.3,                    // randomness
            false,                  // collideTiles
            true,                   // additive
            true,                   // randomColorLinear
            1e9                     // renderOrder
        ), vec2(0, -0.7));
    }

    update()
    {
        if (!alive) { super.update(); return; }

        // input
        this.thrusting = mouseIsDown(0) ||
            keyIsDown('Space') || keyIsDown('ArrowUp') ||
            gamepadIsDown(0);

        // thrust loop — retrigger every 0.12s while held
        if (this.thrusting && alive)
        {
            if (!this._thrustTimer || this._thrustTimer <= 0)
            {
                sndThrust && sndThrust.play();
                this._thrustTimer = 0.12;
            }
            this._thrustTimer -= 1/60;
        }
        else
        {
            this._thrustTimer = 0;
        }

        // apply per-frame gravity + thrust
        this.velocity.y += gravityY;
        if (this.thrusting) this.velocity.y += thrustForce;

        // clamp vertical speed
        this.velocity.y = clamp(this.velocity.y, -maxFallSpeed, maxRiseSpeed);

        // horizontal velocity is the scroll rate (engine moves pos via velocity)
        this.velocity.x = scrollSpeed;

        super.update();

        // toggle the thrust flame
        this.thrustEmitter.emitRate = (this.thrusting && alive) ? 80 : 0;

        // hazard collisions (with shield absorb)
        if (shieldInvuln > 0) shieldInvuln -= 1/60;
        else
        {
            for (const obj of engineObjects)
            {
                if (obj instanceof Hazard && obj.hitsPlayer(this))
                {
                    if (hasShield)
                    {
                        hasShield = false;
                        shieldInvuln = 0.6;
                        sndShieldBreak && sndShieldBreak.play();
                    }
                    else
                    {
                        killPlayer();
                    }
                    break;
                }
            }
        }

        // coin / shield pickup pass
        for (const obj of engineObjects)
        {
            if (obj instanceof Coin)              obj.tryCollect(this);
            else if (obj instanceof ShieldPickup) obj.tryCollect(this);
        }

        // floor and ceiling are runway surfaces, not death — clamp pos+velocity.
        // hazards do the killing.
        const half = this.size.y / 2;
        if (this.pos.y < half)
        {
            this.pos.y = half;
            if (this.velocity.y < 0) this.velocity.y = 0;
            this.grounded = true;
        }
        else
        {
            this.grounded = false;
        }
        if (this.pos.y > ceilingY - half)
        {
            this.pos.y = ceilingY - half;
            if (this.velocity.y > 0) this.velocity.y = 0;
        }
    }

    render()
    {
        // hide the player entirely once dead — explosion takes over visually
        if (!alive) return;

        // flicker during invuln — skip the sprite this frame to flash
        if (shieldInvuln > 0 && Math.floor(time * 20) % 2 === 0)
            return;

        super.render();   // draws TILE_PLAYER via the engine

        if (hasShield)
        {
            // pulsing translucent bubble
            const r = 1.3 + Math.sin(time * 5) * 0.08;
            drawTile(this.pos, vec2(r * 2), tile(TILE_SHIELD));
        }
    }
}

///////////////////////////////////////////////////////////////////////////////
// Pause the engine whenever any menu (including alert/confirm dialogs) is
// visible. setMenuVisibilityCallback fires for every show/hide, so we don't
// have to wire onShow/onHide on each individual menu — and we can't miss
// dialogs created internally by showAlertDialog / showConfirmDialog. Without
// this, alert dialogs leave paused=false, letting gameUpdate run on the same
// frame as a menu Esc and re-open pause on top of the surfaced menu.

// HUD toolbar is always visible now; isPlaying is still tracked because
// gameplay code uses it for pause / input gating.
let isPlaying = false;
function setPlaying(p)
{
    isPlaying = p;
}

async function gameInit()
{
    loadProgress();

    // ----- procedural sprite atlas (textureGenerator) -----
    // drawToTexture's drawFn is called as (ctx, tileIndex); the cell is
    // a TILE_SIZE square (currently 500x500 in textureGenerator.js).
    // Close over a local const so the painters can use S consistently.
    const S = 500;
    initDrawToTexture();

    // 0 — player + jetpack
    drawToTexture(TILE_PLAYER, (ctx) => {
        ctx.fillStyle = '#2a64c8';
        ctx.fillRect(S*0.25, S*0.15, S*0.5, S*0.6);
        ctx.fillStyle = '#ffd2a3';
        ctx.beginPath(); ctx.arc(S*0.5, S*0.22, S*0.13, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#222';
        ctx.fillRect(S*0.4, S*0.2, S*0.2, S*0.06);
        ctx.fillStyle = '#1a1a2a';
        ctx.fillRect(S*0.32, S*0.72, S*0.12, S*0.18);
        ctx.fillRect(S*0.56, S*0.72, S*0.12, S*0.18);
        ctx.fillStyle = '#888';
        ctx.fillRect(S*0.12, S*0.32, S*0.16, S*0.4);
        ctx.fillRect(S*0.72, S*0.32, S*0.16, S*0.4);
        ctx.fillStyle = '#333';
        ctx.fillRect(S*0.14, S*0.7, S*0.12, S*0.06);
        ctx.fillRect(S*0.74, S*0.7, S*0.12, S*0.06);
    }, 'player with jetpack');

    // 1 — coin
    drawToTexture(TILE_COIN, (ctx) => {
        const grd = ctx.createRadialGradient(S*0.5, S*0.5, S*0.05, S*0.5, S*0.5, S*0.45);
        grd.addColorStop(0, '#ffeb6b');
        grd.addColorStop(1, '#c8902b');
        ctx.fillStyle = grd;
        ctx.beginPath(); ctx.arc(S*0.5, S*0.5, S*0.42, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = '#7a5b18'; ctx.lineWidth = S*0.04;
        ctx.beginPath(); ctx.arc(S*0.5, S*0.5, S*0.42, 0, Math.PI*2); ctx.stroke();
        ctx.fillStyle = '#7a5b18';
        ctx.font = `bold ${S*0.5}px sans-serif`;
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText('$', S*0.5, S*0.54);
    }, 'coin');

    // 2 — shield bubble pickup
    drawToTexture(TILE_SHIELD, (ctx) => {
        const grd = ctx.createRadialGradient(S*0.5, S*0.5, S*0.05, S*0.5, S*0.5, S*0.48);
        grd.addColorStop(0, 'rgba(180,255,255,0.95)');
        grd.addColorStop(0.7, 'rgba(80,200,255,0.5)');
        grd.addColorStop(1, 'rgba(80,200,255,0.0)');
        ctx.fillStyle = grd;
        ctx.beginPath(); ctx.arc(S*0.5, S*0.5, S*0.48, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = '#a0eaff'; ctx.lineWidth = S*0.03;
        ctx.beginPath(); ctx.arc(S*0.5, S*0.5, S*0.42, 0, Math.PI*2); ctx.stroke();
    }, 'shield bubble');

    // 3 — missile body (faces left)
    drawToTexture(TILE_MISSILE, (ctx) => {
        ctx.fillStyle = '#aaa';
        ctx.fillRect(S*0.2, S*0.4, S*0.55, S*0.2);
        ctx.fillStyle = '#c44';
        ctx.beginPath();
        ctx.moveTo(S*0.2, S*0.4); ctx.lineTo(S*0.04, S*0.5); ctx.lineTo(S*0.2, S*0.6);
        ctx.closePath(); ctx.fill();
        ctx.fillStyle = '#666';
        ctx.beginPath();
        ctx.moveTo(S*0.75, S*0.4); ctx.lineTo(S*0.92, S*0.32); ctx.lineTo(S*0.92, S*0.5);
        ctx.lineTo(S*0.92, S*0.68); ctx.lineTo(S*0.75, S*0.6); ctx.closePath(); ctx.fill();
    }, 'missile facing left');

    // 4 — zapper node
    drawToTexture(TILE_ZAP, (ctx) => {
        ctx.fillStyle = '#333';
        ctx.beginPath(); ctx.arc(S*0.5, S*0.5, S*0.32, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#ff0';
        ctx.beginPath(); ctx.arc(S*0.5, S*0.5, S*0.16, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = '#ff0'; ctx.lineWidth = S*0.04;
        ctx.beginPath(); ctx.arc(S*0.5, S*0.5, S*0.32, 0, Math.PI*2); ctx.stroke();
    }, 'zapper node');

    // 5 — laser node
    drawToTexture(TILE_LASER, (ctx) => {
        ctx.fillStyle = '#222';
        ctx.beginPath(); ctx.arc(S*0.5, S*0.5, S*0.32, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#f44';
        ctx.beginPath(); ctx.arc(S*0.5, S*0.5, S*0.18, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = '#f88'; ctx.lineWidth = S*0.04;
        ctx.beginPath(); ctx.arc(S*0.5, S*0.5, S*0.32, 0, Math.PI*2); ctx.stroke();
    }, 'laser node');

    // Match the engine's master volume to whatever the options slider starts at,
    // so the very first menu sound plays at the user-visible volume.
    setSoundVolume(.8);

    // One callback drives `paused` for every menu, including dialogs.
    installAutoPause();

    // sounds — full set defined here so every gameplay event has audio.
    sndThrust        = new SoundGenerator({ frequency: 90,  release: 0.12, volume: 0.25, noise: 0.6 });
    sndCoin          = new SoundGenerator({ frequency: 1200, attack: 0.005, release: 0.08, volume: 0.4, pitchJump: 600, pitchJumpTime: 0.05 });
    sndShieldPickup  = new SoundGenerator({ frequency: 880,  attack: 0.005, release: 0.25, volume: 0.4, pitchJump: 600, pitchJumpTime: 0.1 });
    sndShieldBreak   = new SoundGenerator({ frequency: 220,  attack: 0.005, release: 0.18, volume: 0.5, noise: 0.6 });
    sndMissileWarn   = new SoundGenerator({ frequency: 1100, release: 0.06, volume: 0.3 });
    sndMissileLaunch = new SoundGenerator({ frequency: 240,  release: 0.4,  volume: 0.5, slide: -3 });
    sndHit           = new SoundGenerator({ frequency: 110,  release: 0.3,  volume: 0.7, noise: 0.7 });


    // ----- title menu -----
    // dismissable: true lets the player Esc / B back to the canvas prompt;
    // attachClickToReveal (set up at the end of gameInit) re-shows the
    // menu on the next click / Space / Enter / A / Start.
    // onStart wires gamepad Start to launch "play" directly without the
    // player having to navigate to the PLAY item first.
    const playFromTitle = () => { titleMenu.hide(); startRun(); };
    const titleMenu = createMenu({
        id: 'title',
        title: 'JETPACK DASH',
        dismissable: true,
        onStart: playFromTitle,
        items: [
            {type:'label',  text:'Hold to fly. Dodge. Collect.'},
            {type:'label',  id:'bestLabel', text:'Best: 0 M'},
            {type:'button', label:'PLAY',    onClick: playFromTitle},
            {type:'button', label:'ABOUT',   onClick: () => pushMenu('about')},
        ],
        onShow: () =>
        {
            const lbl = getMenu('title').getItem('bestLabel');
            if (lbl && lbl.setLabel) lbl.setLabel('Best: ' + bestDistance + ' M');
            else if (lbl && lbl.setValue) lbl.setValue('Best: ' + bestDistance + ' M');
        },
    });

    // ----- about menu (demos the `text` item: wrapping multi-line paragraph) -----
    createMenu({
        id: 'about',
        title: 'ABOUT',
        onHide: popMenu,
        items: [
            {type:'label', text:'Jetpack Dash'},
            {type:'text', text:'Hold MOUSE / SPACE / UP / A to thrust. ' +
                'Release to fall. Don\'t hit zappers, missiles, lasers, ceiling, or floor. ' +
                'Collect coins. Shield bubbles absorb one hit.\n\nBuilt with LittleJS.'},
            {type:'separator'},
            {type:'button', label:'BACK', onClick: () => hideMenu('about')},
        ],
    });

    // ----- pause menu (initialItemId defaults selection to RESUME) -----
    createPauseMenu({
        onQuit: returnToTitle,
    });

    // ----- HUD toolbar (always visible; grays the hamburger over title) -----
    installDefaultToolbar();

    // Show the title menu immediately so the player lands on it instead of
    // a "CLICK TO PLAY" prompt. attachClickToReveal stays as a safety net so
    // the menu re-opens if the player dismisses it with Esc / B.
    showMenu('title');
    attachClickToReveal('title', () => !isPlaying);

    // ----- tweakables panel (press ~ to toggle) -----
    tweakEngineDefaults();

    tweakDivider('Player');
    tweak('thrustForce',  {min: 0.005, max: 0.05});
    tweak('gravityY',     {min: -0.03, max: 0});
    tweak('maxRiseSpeed', {min: 0.1, max: 0.8});
    tweak('maxFallSpeed', {min: 0.1, max: 1.0});

    tweakDivider('World');
    tweak('scrollSpeed', {min: 0.05, max: 0.4});
    tweak('ceilingY',    {min: 8, max: 18});

    tweakDivider('Spawning');
    tweak('chunkWidth',    {min: 4, max: 14});
    tweak('minGap',        {min: 1.5, max: 4});
    tweak('shieldChance',  {min: 0, max: 0.3});

    tweakDivider('Missile');
    tweak('missileWarnTime', {min: 0.3, max: 2});
    tweak('missileSpeed',    {min: 0.2, max: 0.8});

    tweakDivider('Laser');
    tweak('laserRotateSpeed', {min: 0.2, max: 1.5});
}

///////////////////////////////////////////////////////////////////////////////
function gameUpdate()
{
    // pause hotkey — gate so it doesn't fire from the pre-play state
    if (isPlaying && alive &&
        (keyWasPressed('Escape') || gamepadWasPressed(9)))
    {
        playMenuSound('activate');
        showMenu('pause');
        inputClearKey('Escape');
        inputClearKey(9, 1, false, true, false);
        return;
    }

    if (!isPlaying || !player) return;

    // camera follows the player horizontally; vertical stays centered
    cameraPos = vec2(player.pos.x - playerStartScreenX, ceilingY / 2);
    distance = Math.max(0, Math.floor(player.pos.x));

    // spawn chunks ahead of the camera
    if (alive)
    {
        while (cameraPos.x + SPAWN_AHEAD > nextSpawnX)
        {
            spawnChunk(nextSpawnX);
            nextSpawnX += chunkWidth;
        }
    }

    // after death, give the player a moment to fall, then surface dialog
    if (!alive)
    {
        deathTimer += 1/60;
        if (deathTimer > 1)
        {
            deathTimer = -999;  // prevent re-trigger
            if (distance > bestDistance) bestDistance = distance;
            totalCoins += coins;
            saveProgress();
            showAlertDialog({
                title: 'CRASHED',
                message: 'Distance: ' + distance + ' M\n' +
                         'Coins: '    + coins    + '\n' +
                         'Best: '     + bestDistance + ' M\n' +
                         'Lifetime: ' + totalCoins + ' coins',
                onOk: returnToTitle,
            });
        }
    }
}

function gameUpdatePost()
{
}

function gameRender()
{
    const camX = cameraPos.x;
    // stripes are anchored to even-integer world positions so they scroll
    // smoothly past the camera instead of snapping per-frame.
    const base = Math.floor(camX / 2) * 2;

    // floor — dark base with yellow hazard stripes
    drawRect(vec2(camX, -0.5), vec2(60, 1), hsl(.08, .3, .15));
    for (let x = base - 30; x <= base + 30; x += 2)
        drawRect(vec2(x + 0.5, -0.15), vec2(1, 0.15), hsl(.13, .9, .5));

    // ceiling
    drawRect(vec2(camX, ceilingY + 0.5), vec2(60, 1), hsl(.08, .3, .15));
    for (let x = base - 30; x <= base + 30; x += 2)
        drawRect(vec2(x + 0.5, ceilingY + 0.15), vec2(1, 0.15), hsl(.13, .9, .5));

    // pre-play preview — static player at the start position so the title
    // menu sits on top of a glimpse of the level instead of an empty void.
    // Engine is paused while the menu is up, so this stays put.
    if (!isPlaying)
        drawTile(vec2(0, ceilingY / 2), vec2(1.4, 1.6), tile(TILE_PLAYER));
}

function gameRenderPost()
{
    // Pre-play / post-quit prompt — only when not playing AND no menu
    // is up (i.e. the player dismissed the title with Esc). Pulses opacity
    // so it reads as "do something". Adapts to touch devices via isTouchDevice.
    if (!isPlaying && !isMenuVisible())
    {
        const prompt = isTouchDevice ? 'TOUCH TO PLAY' : 'CLICK TO PLAY';
        const a = 0.5 + 0.5 * Math.sin(time * 3);
        drawTextScreen(prompt, vec2(mainCanvasSize.x/2, mainCanvasSize.y/2),
            48, hsl(0, 0, 1, a), 6, hsl(0, 0, 0, a));
    }

    // in-game HUD — distance, coins, best
    if (isPlaying && player)
    {
        const pad = 14;
        drawTextScreen('DISTANCE: ' + distance + ' M',
            vec2(pad, 30), 22, hsl(0,0,1), 3, hsl(0,0,0), 'left');
        drawTextScreen('COINS: ' + coins,
            vec2(pad, 58), 22, hsl(.13,1,.6), 3, hsl(0,0,0), 'left');
        drawTextScreen('BEST: ' + bestDistance + ' M',
            vec2(pad, 86), 18, hsl(0,0,.7), 3, hsl(0,0,0), 'left');
        if (hasShield)
            drawTextScreen('SHIELD',
                vec2(pad, 110), 18, hsl(.55,1,.65), 3, hsl(0,0,0), 'left');
    }
}

///////////////////////////////////////////////////////////////////////////////
engineInit(gameInit, gameUpdate, gameUpdatePost, gameRender, gameRenderPost);
</script></body></html>
