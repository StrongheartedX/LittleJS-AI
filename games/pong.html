    <script src="../dist/littlejs.js?1780071765370"></script>
    <script src="../templates/gameFx.js?1780071765370"></script>

    <script>
    'use strict';

// engine settings
debugWatermark = false; // Hide debug watermark in corner
showEngineVersion = false; // Hide engine version console display

///////////////////////////////////////////////////////////////////////////////////////////////
    // Pong State

    const fieldSize = vec2(40, 22);          // world units
    const halfField = fieldSize.scale(.5);

    const paddleSize = vec2(1.1, 5.2);
    const ballSize   = vec2(1.0, 1.0);

    const paddleSpeed = 18;
    const aiSpeed     = 14;          // capped so fast, wide shots can beat the AI

    const ballStartSpeed  = 30;      // serve speed at the start of each rally
    const ballSpeedup     = 5;     // added to ball speed on every paddle hit
    const maxBallSpeed    = 70;      // rally speed ceiling
    const maxBounceAngle  = 1.15;    // ~66 deg off horizontal at the paddle edges

    // ball spin (curveball): a moving paddle imparts spin that bends the ball's path
    const spinGain   = .085;    // paddle vertical speed -> spin (rad/sec)
    const maxSpin    = 3.2;     // cap on imparted spin
    const spinDecay  = 1.6;     // how fast spin bleeds off per second

    let left = { pos: vec2(-halfField.x + 2.2, 0), vy: 0 };
    let right = { pos: vec2( halfField.x - 2.2, 0), vy: 0 };

    let ball = { pos: vec2(0,0), vel: vec2(0,0) };
    let ballSpin = 0;                // current curveball spin (rad/sec), bends the ball's path

    let crtEnabled = true;           // CRT post-process toggle (options menu)

    let scoreL = 0;
    let scoreR = 0;

    let waitingForServe = true;
    let gameOver = false;
    let aiRight = true; // press T to toggle

    // AI configuration
    const aiErrorMargin = 1.8;      // random aim offset, rolled ONCE per volley (keeps it beatable, no jitter)
    const aiSmoothing   = 0.15;     // how quickly AI velocity eases toward its desired velocity
    let aiTargetY  = 0;             // where AI wants to move
    let aiPredictedY = 0;           // predicted ball Y at paddle, locked in for the current volley
    let aiVel      = 0;             // smoothed paddle velocity (eliminates snap/jitter)
    let aiBallDir  = 0;             // sign of ball.vel.x last frame, used to detect a new volley

    // Sounds
    let sfxPaddle, sfxWall, sfxScore, sfxServe;

    // FX state
    const COLOR_L = hsl(.50, .9, .65);   // cyan (left team)
    const COLOR_R = hsl(.95, .9, .65);   // magenta (right team)
    const TRAIL_LEN = 14;

    let leftFlash = 0, rightFlash = 0;
    let leftScoreFlash = 0, rightScoreFlash = 0;
    let bgFlash = 0, bgFlashColor = COLOR_L;
    let lastHitter = 0;                  // -1 left, +1 right, 0 none
    let ballTrail = [];                  // {pos, color}

    // squash & stretch (0 = rest, 1 = just got hit, decays each frame)
    let ballSquash  = 0;                 // ball stretches along travel on impact
    let leftSquash  = 0, rightSquash = 0;// paddles recoil on impact

    // danger state — ramps up as the ball nears max speed
    const dangerColor = hsl(.02, .95, .55);  // hot red
    const dangerStart = 33;                  // speed where the danger effect begins
    let dangerLevel = 0;                     // 0..1

    function ballTintColor()
    {
            if (lastHitter < 0) return COLOR_L;
            if (lastHitter > 0) return COLOR_R;
            return hsl(0, 0, 1);
    }

    function colorLerp(a, b, k)
    {
            return new Color(lerp(a.r, b.r, k), lerp(a.g, b.g, k), lerp(a.b, b.b, k), 1);
    }

    function spawnHitBurst(pos, color)
    {
            new ParticleEmitter(
                    pos, 0,                       // pos, angle
                    vec2(.1),                     // emitSize
                    .06,                          // emitTime
                    400,                          // emitRate
                    PI,                           // emitConeAngle (full burst)
                    undefined,
                    color, color,
                    new Color(color.r, color.g, color.b, 0),
                    new Color(color.r, color.g, color.b, 0),
                    .55,                          // particleTime
                    .35, .05,                     // sizeStart, sizeEnd
                    .5,                           // speed
                    0, .9, 1, 0,                  // angleSpeed, damping, angleDamping, gravityScale
                    PI, .1, .6,                   // particleConeAngle, fadeRate, randomness
                    false, true,                  // collideTiles, additive
            );
    }

    ///////////////////////////////////////////////////////////////////////////////////////////////
    // Helpers

    function aabbOverlap(posA, sizeA, posB, sizeB)
    {
            return Math.abs(posA.x - posB.x) < (sizeA.x + sizeB.x) * .5 &&
                          Math.abs(posA.y - posB.y) < (sizeA.y + sizeB.y) * .5;
    }

    function clampPaddleY(p)
    {
            const limit = halfField.y - paddleSize.y/2;
            p.pos.y = clamp(p.pos.y, -limit, limit);
    }

    // Bounce the ball off a paddle. dirX is the outgoing x direction (+1 = right, -1 = left).
    // Where the ball strikes the paddle sets the angle; every hit also speeds the ball up.
    function bounceOffPaddle(paddle, dirX)
    {
            // snap ball to the paddle face so it can't tunnel through on a fast frame
            ball.pos.x = paddle.pos.x + dirX * (paddleSize.x + ballSize.x) * .5;

            // hit position drives the bounce angle (steep near the edges, flat in the middle)
            const offset = clamp((ball.pos.y - paddle.pos.y) / (paddleSize.y * .5), -1, 1);
            const angle  = offset * maxBounceAngle;

            // faster and faster: add a fixed boost each hit, up to the rally ceiling
            const speed = min(ball.vel.length() + ballSpeedup, maxBallSpeed);
            ball.vel = vec2(dirX * Math.cos(angle), Math.sin(angle)).scale(speed);

            // a moving paddle slices the ball, imparting spin that curves its flight
            // (sign chosen so the ball curves in the direction the paddle was moving)
            ballSpin = clamp(-paddle.vy * spinGain * dirX, -maxSpin, maxSpin);

            ballSquash = 1; // snappy stretch on the way out
    }

    // Predict where ball will be when it reaches a given x position
    function predictBallY(targetX)
    {
            if (ball.vel.x === 0) return 0;
            
            let simPos = ball.pos.copy();
            let simVel = ball.vel.copy();
            const yLimit = halfField.y - ballSize.y/2;
            const maxSteps = 500;
            
            for (let i = 0; i < maxSteps; i++)
            {
                    // Step simulation
                    const dt = 0.016; // ~60fps step
                    simPos = simPos.add(simVel.scale(dt));
                    
                    // Wall bounces
                    if (simPos.y > yLimit) { simPos.y = yLimit; simVel.y = -Math.abs(simVel.y); }
                    if (simPos.y < -yLimit) { simPos.y = -yLimit; simVel.y = Math.abs(simVel.y); }
                    
                    // Check if reached target x
                    if ((simVel.x > 0 && simPos.x >= targetX) || (simVel.x < 0 && simPos.x <= targetX))
                            return simPos.y;
            }
            return 0;
    }

    function resetRound(servingToRight)
    {
            ball.pos = vec2(0, 0);
            ball.vel = vec2(0, 0);
            ballSpin = 0;
            waitingForServe = true;
            gameOver = false;

            // tiny nudge so it doesn't always serve dead-center
            left.pos.y = 0;
            right.pos.y = 0;

            // store who serves next on the ball object
            ball._serveDir = servingToRight ? 1 : -1;
    }

    function serve()
    {
            if (!waitingForServe || gameOver)
                    return;

            // Serve direction: +x goes right, -x goes left
            const dirX = ball._serveDir ?? (randBool() ? 1 : -1);
            const angle = rand(-.25, .25); // slight vertical variance
            ball.vel = vec2(dirX, angle).normalize(ballStartSpeed);
            waitingForServe = false;
            sfxServe?.play(ball.pos);
    }

    function addScore(leftScored)
    {
            if (leftScored) scoreL++;
            else scoreR++;

            sfxScore?.play();
            addScreenShake(.3, .21);
            bgFlash = 1;
            bgFlashColor = leftScored ? COLOR_L : COLOR_R;
            if (leftScored) leftScoreFlash = 1;
            else rightScoreFlash = 1;
            lastHitter = 0;
            ballTrail.length = 0;

            // win at 10
            if (scoreL >= 10 || scoreR >= 10)
            {
                    gameOver = true;
                    ball.vel = vec2(0,0);
                    waitingForServe = true;
                    return;
            }

            // Next serve goes toward the player who just conceded
            resetRound(leftScored ? false : true);
    }

    ///////////////////////////////////////////////////////////////////////////////////////////////
    // LittleJS Callbacks

    // Push the CRT on/off state into the post-process shader's uEnable uniform.
    // Call ONLY between frames (init / menu toggle) — never mid-render: changing the
    // active GL program while the engine has a pending geometry batch makes that batch
    // flush through the wrong shader and corrupts the whole scene. We restore the
    // engine's instanced shader afterward so the next frame draws normally.
    function applyCrt()
    {
            if (!postProcess || !postProcess.shader || !glContext) return;
            glContext.useProgram(postProcess.shader);
            const loc = glContext.getUniformLocation(postProcess.shader, 'uEnable');
            if (loc) glContext.uniform1f(loc, crtEnabled ? 1 : 0);
            glSetInstancedMode(true); // rebind the engine's sprite shader
    }

    function gameInit()
    {
            // prime the save blob before any persisted menu items are built
            saveDataInit('Pong');

            // fixed canvas for consistent feel
            setCanvasFixedSize(vec2(1280, 720));

            // camera centered; choose scale so field fits nicely
            setCameraPos(vec2(0, 0));
            cameraScale = 32;

            // CRT vibe over the whole frame (scanlines, bloom, curvature, chromatic aberration)
            new PostProcessPlugin(tvShader);
            applyCrt(); // default the shader's uEnable uniform on (uniforms default to 0 = bypass)

            // Sounds (simple, punchy)
            sfxPaddle = new SoundGenerator({ volume:.7, frequency:520, release:.07, shapeCurve:1.8, randomness:.08 });
            sfxWall   = new SoundGenerator({ volume:.55, frequency:880, release:.06, shapeCurve:1.2, randomness:.04 });
            sfxServe  = new SoundGenerator({ volume:.55, frequency:320, release:.12, slide:.35, shapeCurve:1.6, randomness:.06 });
            sfxScore  = new SoundGenerator({ volume:1,  frequency:220, attack:0, release:.35, slide:-1.1, pitchJump:660, pitchJumpTime:.08, shapeCurve:1.3, randomness:.02 });

            resetRound(true);
            buildMenus();
            showMenu('title');
    }

    function startGame()
    {
            scoreL = scoreR = 0;
            resetRound(true);
            setPlaying(true);
            clearSubmenuStack();
            hideAllMenus();
    }

    function buildMenus()
    {
            if (typeof createMenu !== 'function') return;

            installAutoPause();

            createTitleMenu({
                    title: 'PONG',
                    subtitle: '',
                    onPlay: startGame,
                    revealOnClick: false,
                    items: [
                            {type:'button', label:'OPTIONS', onClick: () => pushMenu('options')},
                    ],
            });

            createPauseMenu({
                    onRestart: startGame,
                    onQuit:    quitToTitle,
                    extraItems: [
                            {type:'button', label:'OPTIONS', onClick: () => pushMenu('options')},
                    ],
            });

            createOptionsMenu({
                    extraItems: [
                            {type:'separator'},
                            {type:'checkbox', id:'crt', label:'CRT EFFECT', value:true,
                                    persist:'crt', onChange: v => { crtEnabled = v; applyCrt(); }},
                    ],
            });

            installDefaultToolbar();
    }

    function gameUpdate()
    {
            if (bindPauseKey({when: () => isPlaying() && !gameOver})) return;
            if (!isPlaying()) return;

            // Reset camera to origin each frame so the gameFx screen-shake plugin
            // (between gameUpdate and gameUpdatePost) can nudge cameraPos cleanly.
            setCameraPos(vec2(0, 0));

            if (keyWasPressed('KeyR'))
            {
                    scoreL = scoreR = 0;
                    resetRound(true);
            }

            if (keyWasPressed('KeyT'))
                    aiRight = !aiRight;

            if (keyWasPressed('Space') || mouseWasPressed(0))
            {
                    if (gameOver)
                    {
                            scoreL = scoreR = 0;
                            resetRound(true);
                    }
                    serve();
            }

            // remember where the paddles were so we can measure their speed (for ball spin)
            const prevLeftY = left.pos.y, prevRightY = right.pos.y;

            // Paddle input — mouse takes priority, keyboard still works
            const keyDir = keyDirection().y;
            if (keyDir)
                    left.pos.y += keyDir * paddleSpeed * timeDelta;
            else
                    left.pos.y = mousePos.y;
            clampPaddleY(left);

            if (!aiRight)
            {
                    right.pos.y += keyDirection().y * paddleSpeed * timeDelta;
            }
            else
            {
                    // AI: lock in one prediction per volley, then ease toward it smoothly.
                    if (waitingForServe || gameOver)
                    {
                            aiTargetY = 0; // drift to center when waiting
                    }
                    else if (ball.vel.x > 0)
                    {
                            // Ball just turned toward the AI? Predict the intercept ONCE and
                            // bake in a fixed aim error for the whole volley (stable = no jitter).
                            if (aiBallDir <= 0)
                                    aiPredictedY = predictBallY(right.pos.x) + rand(-aiErrorMargin, aiErrorMargin);
                            aiTargetY = aiPredictedY;
                    }
                    else
                    {
                            aiTargetY = ball.pos.y * 0.3; // ball going away - relax toward center
                    }
                    aiBallDir = sign(ball.vel.x);

                    // Smoothly accelerate toward the target (P-controller + velocity easing).
                    const diff = aiTargetY - right.pos.y;
                    const desiredVel = clamp(diff * 5, -aiSpeed, aiSpeed);
                    aiVel = lerp(aiVel, desiredVel, aiSmoothing);
                    right.pos.y += aiVel * timeDelta;
            }
            clampPaddleY(right);

            // paddle vertical speed this frame (clamped so a fast mouse flick can't over-spin)
            left.vy  = clamp((left.pos.y  - prevLeftY)  / timeDelta, -paddleSpeed, paddleSpeed);
            right.vy = clamp((right.pos.y - prevRightY) / timeDelta, -paddleSpeed, paddleSpeed);

            // Ball update
            if (waitingForServe || gameOver)
                    return;

            ball.pos = ball.pos.add(ball.vel.scale(timeDelta));

            // spin curves the ball: rotate its velocity, then let the spin bleed off
            if (ballSpin)
            {
                    ball.vel = ball.vel.rotate(ballSpin * timeDelta);
                    ballSpin -= ballSpin * spinDecay * timeDelta;
            }

            // Wall bounce
            const yLimit = halfField.y - ballSize.y/2;
            if (ball.pos.y > yLimit)
            {
                    ball.pos.y = yLimit;
                    ball.vel.y = -Math.abs(ball.vel.y);
                    sfxWall?.play(ball.pos);
                    spawnHitBurst(ball.pos, ballTintColor());
                    addScreenShake(.06, .05);
                    ballSquash = .6;
            }
            else if (ball.pos.y < -yLimit)
            {
                    ball.pos.y = -yLimit;
                    ball.vel.y = Math.abs(ball.vel.y);
                    sfxWall?.play(ball.pos);
                    spawnHitBurst(ball.pos, ballTintColor());
                    addScreenShake(.06, .05);
                    ballSquash = .6;
            }

            // Left paddle
            if (ball.vel.x < 0 && aabbOverlap(ball.pos, ballSize, left.pos, paddleSize))
            {
                    bounceOffPaddle(left, 1);
                    sfxPaddle?.play(ball.pos);

                    lastHitter = -1;
                    leftFlash = 1;
                    leftSquash = 1;
                    // faster rallies hit harder
                    addScreenShake(.08 + ball.vel.length() / maxBallSpeed * .12, .12);
                    spawnHitBurst(ball.pos, COLOR_L);
            }

            // Right paddle
            if (ball.vel.x > 0 && aabbOverlap(ball.pos, ballSize, right.pos, paddleSize))
            {
                    bounceOffPaddle(right, -1);
                    sfxPaddle?.play(ball.pos);

                    lastHitter = 1;
                    rightFlash = 1;
                    rightSquash = 1;
                    addScreenShake(.08 + ball.vel.length() / maxBallSpeed * .12, .12);
                    spawnHitBurst(ball.pos, COLOR_R);
            }

            // Danger ramps up as the ball approaches max speed
            dangerLevel = clamp((ball.vel.length() - dangerStart) / (maxBallSpeed - dangerStart), 0, 1);
            if (dangerLevel > 0)
                    addScreenShake(.02 * dangerLevel, .05); // low continuous rumble at top speed

            // Scoring
            if (ball.pos.x < -halfField.x - 2)
                    addScore(false);
            else if (ball.pos.x > halfField.x + 2)
                    addScore(true);
    }

    function gameUpdatePost()
    {
            // cameraPos is centered in gameUpdate; gameFx screen-shake plugin nudges it.
            leftFlash       = max(0, leftFlash       - timeDelta * 4);
            rightFlash      = max(0, rightFlash      - timeDelta * 4);
            leftScoreFlash  = max(0, leftScoreFlash  - timeDelta * 1.2);
            rightScoreFlash = max(0, rightScoreFlash - timeDelta * 1.2);
            bgFlash         = max(0, bgFlash         - timeDelta * 1.8);

            // squash & stretch springs back quickly
            ballSquash  = max(0, ballSquash  - timeDelta * 6);
            leftSquash  = max(0, leftSquash  - timeDelta * 6);
            rightSquash = max(0, rightSquash - timeDelta * 6);

            if (!waitingForServe && !gameOver)
            {
                    // trail glows hotter (toward red) as danger rises
                    ballTrail.push({ pos: ball.pos.copy(), color: colorLerp(ballTintColor(), dangerColor, dangerLevel) });
                    if (ballTrail.length > TRAIL_LEN)
                            ballTrail.shift();
            }
            else
            {
                    dangerLevel = 0;
                    if (ballTrail.length)
                            ballTrail.length = 0;
            }
    }

    function gameRender()
    {
            // background
            drawRect(vec2(0, 0), vec2(200), rgb(.08,.08,.08));

            // playfield (tinted briefly toward scoring team on a score)
            const fieldBase = rgb(.12, .12, .12);
            let fieldCol = bgFlash > 0
                    ? colorLerp(fieldBase, bgFlashColor, bgFlash * .5)
                    : fieldBase;
            if (dangerLevel > 0)
                    fieldCol = colorLerp(fieldCol, rgb(.16, .03, .03), dangerLevel * .5);
            drawRect(vec2(0, 0), fieldSize, fieldCol);

            // center dashed line
            const dashCount = 18;
            for (let i=0; i<dashCount; i++)
            {
                    const t = (i/(dashCount-1))*2 - 1;
                    const y = t * (halfField.y - 1);
                    drawRect(vec2(0, y), vec2(.35, .7), rgb(.85,.85,.85));
            }

            // ball trail (additive-feeling: older = smaller, more transparent)
            for (let i = 0; i < ballTrail.length; ++i)
            {
                    const t = ballTrail[i];
                    const k = (i + 1) / (ballTrail.length + 1);
                    const c = new Color(t.color.r, t.color.g, t.color.b, k * .55);
                    drawRect(t.pos, ballSize.scale(k * .9), c);
            }

            // paddles — flash to team color on hit, white at rest; recoil (squash) on impact
            const leftCol  = colorLerp(rgb(.95,.95,.95), COLOR_L, leftFlash);
            const rightCol = colorLerp(rgb(.95,.95,.95), COLOR_R, rightFlash);
            const lPadSize = vec2(paddleSize.x * (1 - leftSquash  * .4), paddleSize.y * (1 + leftSquash  * .18));
            const rPadSize = vec2(paddleSize.x * (1 - rightSquash * .4), paddleSize.y * (1 + rightSquash * .18));
            drawRect(left.pos,  lPadSize, leftCol);
            drawRect(right.pos, rPadSize, rightCol);

            // ball — glow halo (sized with speed, flaring red & pulsing in the danger zone)
            const speedT = clamp((ball.vel.length() - ballStartSpeed) / max(1,maxBallSpeed - ballStartSpeed), 0, 1);
            const dangerPulse = dangerLevel * (.6 + .4 * Math.sin(time * 22));
            const haloCol = colorLerp(ballTintColor(), dangerColor, dangerLevel);
            drawRect(
                    ball.pos,
                    ballSize.scale(1.6 + speedT * 1.4 + dangerPulse * 1.3),
                    new Color(haloCol.r, haloCol.g, haloCol.b, .18 + speedT * .25 + dangerPulse * .3),
            );

            // core — stretched along travel direction on impact, tinted hot when dangerous
            const ballAngle    = ball.vel.lengthSquared() ? ball.vel.angle() : 0;
            const ballDrawSize = vec2(ballSize.x * (1 - ballSquash * .4), ballSize.y * (1 + ballSquash * .7));
            const coreCol      = colorLerp(rgb(1,1,1), dangerColor, dangerLevel * .6);
            drawRect(ball.pos, ballDrawSize, coreCol, ballAngle);

            // top/bottom border lines (pulse red at top speed)
            const borderCol   = colorLerp(rgb(.2,.2,.2), dangerColor, dangerPulse);
            const borderThick = .15 + dangerPulse * .35;
            drawRect(vec2(0, halfField.y + .15), vec2(fieldSize.x, borderThick), borderCol);
            drawRect(vec2(0,-halfField.y - .15), vec2(fieldSize.x, borderThick), borderCol);
    }

    function gameRenderPost()
    {
            // score — split so each half pulses & tints with its team color on a score
            const cx     = mainCanvasSize.x / 2;
            const lSize  = 80 * (1 + leftScoreFlash  * .6);
            const rSize  = 80 * (1 + rightScoreFlash * .6);
            const lTxtC  = colorLerp(hsl(0, 0, 1), COLOR_L, leftScoreFlash);
            const rTxtC  = colorLerp(hsl(0, 0, 1), COLOR_R, rightScoreFlash);
            engineImageFont.drawTextScreen(`${scoreL}`, vec2(cx - 90, 70), lSize, true, lTxtC);
            engineImageFont.drawTextScreen(`${scoreR}`, vec2(cx + 90, 70), rSize, true, rTxtC);

            // hints
            const lines = [];

            // status message
            if (gameOver)
            {
                    const winner = scoreL > scoreR ? 'Left Wins!' : 'Right Wins!';
                    lines.unshift(winner);
                    lines.unshift('');
                    lines.unshift('Game Over');
            }

            const x = mainCanvasSize.x/2;
            let y = mainCanvasSize.y - 120;
            for (const s of lines)
            {
                    engineImageFont.drawTextScreen(s, vec2(x, y), 26, true, hsl(0,0,1));
                    y += 28;
            }
    }

    // ------------------------------------------------------------
    // CRT post-process shader, juiced up from the Space Invaders version:
    // barrel curvature + chromatic aberration + neon bloom + static + scanlines + vignette.
    // (includeMainCanvas=true pulls the HUD/menus through the shader too — kept mild so text stays readable.)
    const tvShader = `
    uniform float uEnable; // 0 = bypass the CRT effect (options toggle)

    float hash(vec2 p)
    {
        p = fract(p * .3197);
        return fract(1. + sin(51.*p.x + 73.*p.y) * 13753.3);
    }

    void mainImage(out vec4 c, vec2 p)
    {
        p /= iResolution.xy;

        // bypass to a clean pass-through when the CRT effect is disabled
        if (uEnable < .5) { c = texture(iChannel0, p); return; }

        // subtle CRT barrel curvature
        vec2 cuv = p - .5;
        float curve = dot(cuv, cuv);
        p += cuv * curve * .10;

        // chromatic aberration — split RGB radially, stronger toward the edges
        float ca = .0014 * (1. + curve * 3.);
        vec2 dir = normalize(cuv + 1e-5);
        c.r = texture(iChannel0, p - dir * ca).r;
        c.g = texture(iChannel0, p).g;
        c.b = texture(iChannel0, p + dir * ca).b;
        c.a = 1.;

        // neon bloom (brighter cross blur than the invaders version)
        const float blurSize = .0026;
        const float bloomIntensity = .34;
        vec4 bloom = vec4(0);
        bloom += texture(iChannel0, p + vec2(-2.*blurSize, 0)) * .12;
        bloom += texture(iChannel0, p + vec2(   -blurSize, 0)) * .24;
        bloom += texture(iChannel0, p)                         * .28;
        bloom += texture(iChannel0, p + vec2(    blurSize, 0)) * .24;
        bloom += texture(iChannel0, p + vec2( 2.*blurSize, 0)) * .12;
        bloom += texture(iChannel0, p + vec2(0, -2.*blurSize)) * .12;
        bloom += texture(iChannel0, p + vec2(0,    -blurSize)) * .24;
        bloom += texture(iChannel0, p)                         * .28;
        bloom += texture(iChannel0, p + vec2(0,     blurSize)) * .24;
        bloom += texture(iChannel0, p + vec2(0,  2.*blurSize)) * .12;
        c += bloom * bloomIntensity;

        // faint static noise
        const float staticAlpha = .05;
        const float staticScale = .002;
        c += staticAlpha * hash(floor(p / staticScale) + mod(iTime * 500., 1e3));

        // scan lines
        const float scanlineAlpha = .28;
        c *= 1. - scanlineAlpha * cos(p.y * 1. * iResolution.y);

        // dark vignette around edges
        float dx = 2.*p.x - 1., dy = 2.*p.y - 1.;
        c *= 1. - pow((dx*dx + dy*dy) / 2., 6.);

        // black border outside the curved screen
        if (p.x < 0. || p.x > 1. || p.y < 0. || p.y > 1.)
            c = vec4(0, 0, 0, 1);
    }`;

    // Startup LittleJS Engine
    engineInit(gameInit, gameUpdate, gameUpdatePost, gameRender, gameRenderPost);
    </script>
