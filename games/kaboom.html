<script>
'use strict';

debugWatermark = false;
showEngineVersion = false;
paused = false;
gravity = vec2(0, 0);
cameraPos = vec2(0, 0);
cameraScale = 38;
canvasMaxSize = vec2(2048, 2048);

///////////////////////////////////////////////////////////////////////////////
// Kaboom! — classic Activision paddle-catcher style.
// Mad Bomber paces the rooftop dropping bombs. Sweep stacked buckets to catch
// every bomb. Miss one and the bottom bucket explodes (and so do the rest of
// the wave). Run out of buckets — game over.

// World layout (world units; cameraScale=38 → ~50 wide x ~28 tall at 1920x1080)
const FIELD_LEFT   = -13;
const FIELD_RIGHT  =  13;
const ROOF_Y          =  8;     // bomber's feet (low enough that his head fits on screen)
const FLOOR_Y         = -11.5;  // ground line (where misses explode)
const BUCKET_BOTTOM_Y = -11;    // y of the BOTTOM bucket center (sits on ground)
const BUCKET_GAP      =  1.1;   // vertical gap between stacked buckets
const BOMBER_RANGE    =  9.5;   // bomber wander range — kept ≤ bucket max reach
const BOMB_R          =  0.45;  // bomb radius (collision)

// Difficulty curve
const bombsPerWave   = w => 10 + (w - 1) * 5;
const bombFallSpeed  = w => 7 + (w - 1) * 1.4;           // world units / sec
const bombInterval   = w => max(0.18, 0.85 - (w - 1) * 0.07);
const bomberSpeed    = w => 4 + (w - 1) * 0.9;
const bomberFlipProb = w => 0.005 + (w - 1) * 0.002;     // chance/frame of reversing
const bucketHalfW    = w => max(1.2, 2.8 - (w - 1) * 0.15);

// State
let score, wave, lives, bucketsAwarded;
let bucketX, bucketTargetX;
let bomber;          // {x, vx, dropTimer, laughTimer}
let bombs;           // [{pos, vel, fuse}]
let particles;       // [{pos, vel, life, maxLife, color, size}]
let starField;       // stable star positions for the night sky
let treeField;       // foreground trees/bushes on the sides of the building
let windowSeeds;     // stable blink seeds for windows
let bombsSpawned, bombsCaught, bombsInWave;
let gameOverShown;
let waveSpawnTimer;  // seconds until next bomb in current wave
let waveStartDelay;  // seconds before first bomb of wave
let waveClearTimer;  // seconds remaining until next wave starts (0 = not waiting)
let missFreezeTimer; // brief pause after a miss
let missShakeTimer = 0; // remaining seconds of post-miss shake (gates game-over dialog)
let waveBannerText, waveBannerTimer;

// Sounds
let sfxCatch, sfxMiss, sfxFuse, sfxClear, sfxBucketUp, sfxStep;

///////////////////////////////////////////////////////////////////////////////
// HELPERS

// color = [h, s, l] — stored as components so we can re-emit each frame with
// fading alpha (hsl(...) returns a Color object that doesn't keep its inputs).
function spawnParticles(pos, count, speed, color, life=1, gravityScale=1) {
    for (let i = 0; i < count; i++) {
        const a = rand(0, PI * 2);
        const s = speed * rand(0.4, 1.2);
        particles.push({
            pos: pos.copy(),
            vel: vec2(Math.cos(a) * s, Math.sin(a) * s),
            life, maxLife: life, h: color[0], s: color[1], l: color[2], gravityScale,
            size: rand(0.15, 0.4),
        });
    }
}

// Stack is anchored at BUCKET_BOTTOM_Y so when a bucket is lost the catching
// bucket moves DOWN — the bottom of the stack sits on the ground regardless of
// how many lives remain. i=0 is the bottom; i=lives-1 is the catching bucket.
function bucketCenterY(i) { return BUCKET_BOTTOM_Y + i * BUCKET_GAP; }
function bucketTopY()     { return BUCKET_BOTTOM_Y + (lives - 1) * BUCKET_GAP; }

///////////////////////////////////////////////////////////////////////////////
// GAME FLOW

function startGame() {
    score = 0;
    lives = 3;
    bucketsAwarded = 0;
    bucketX = 0;
    bucketTargetX = 0;
    bombs = [];
    particles = [];
    bomber = { x: -BOMBER_RANGE * 0.5, vx: bomberSpeed(1), dropTimer: 0, laughTimer: 0 };
    setPlaying(true);
    gameOverShown = false;
    waveBannerText = '';
    waveBannerTimer = 0;
    startWave(1);
}

function startWave(w) {
    wave = w;
    bombsSpawned = 0;
    bombsCaught = 0;
    bombsInWave = bombsPerWave(w);
    waveSpawnTimer = 0;
    waveStartDelay = 1.2;
    waveClearTimer = 0;
    bomber.vx = (bomber.vx >= 0 ? 1 : -1) * bomberSpeed(w);
    waveBannerText = `WAVE ${w}`;
    waveBannerTimer = 2.0;
}

function spawnBomb() {
    const facing = bomber.vx >= 0 ? 1 : -1;
    // Spawn from the throwing hand — must match the dropping pose in
    // drawBomber so the bomb visibly comes OUT OF his hand.
    const handX = bomber.x + facing * 1.4;
    const handY = ROOF_Y + 1.7 - 0.5;     // bodyY - 0.5 (dropping arm dip)
    bombs.push({
        pos: vec2(handX, handY),
        vel: vec2(0, -bombFallSpeed(wave)),
        fuse: rand(0, PI * 2),
    });
    bomber.dropTimer = 0.18;
    sfxFuse?.play(undefined, 0.35, 0.9 + wave * 0.04, 0.1);
    bombsSpawned++;
}

function catchBomb(b) {
    bombsCaught++;
    const points = wave;
    score += points;
    sfxCatch?.play(undefined, 0.45, 1 + min(0.6, bombsCaught * 0.006), 0.15);
    spawnParticles(b.pos, 5, 2.5, [.13, 1, .7], 0.4, 0.2);

    // Classic Kaboom: get a bucket back every 1000 points.
    const earned = Math.floor(score / 1000);
    if (earned > bucketsAwarded && lives < 3) {
        bucketsAwarded = earned;
        lives++;
        sfxBucketUp?.play(undefined, 0.6);
        showMenuToast({
            icon: '🪣', title: 'BUCKET BONUS!',
            text: '+1 bucket', duration: 2200, position: 'top-right',
        });
    } else if (earned > bucketsAwarded) {
        bucketsAwarded = earned;
    }
}

function missBomb(missedBomb) {
    lives--;
    addScreenShake(0.7, 28/60);
    missShakeTimer = 28/60;
    sfxMiss?.play(undefined, 0.95);
    missFreezeTimer = 0.9;

    // Big ground explosion at the miss point.
    const groundPos = vec2(missedBomb.pos.x, FLOOR_Y + 0.2);
    spawnParticles(groundPos, 40, 9, [.04, 1, .55], 1.0, 0.3);
    spawnParticles(groundPos, 25, 5, [.11, 1, .7], 1.2, 0.2);
    spawnParticles(groundPos, 18, 3, [0, 0, .9], 0.7, 0.1);

    // Detonate every other in-flight bomb harmlessly (classic mechanic).
    for (const b of bombs) {
        if (b !== missedBomb) {
            spawnParticles(b.pos, 10, 4, [.05, 1, .55], 0.6, 0.3);
            spawnParticles(b.pos, 6, 2, [.13, 1, .7], 0.5, 0.2);
        }
    }
    bombs = [];

    if (lives <= 0) {
        setPlaying(false);
        // Defer the game-over dialog until the explosion settles so the
        // player sees the shake before the modal eats the screen.
        gameOverShown = false;
    }
}

function checkWaveClear() {
    if (waveClearTimer > 0) return;
    if (bombsSpawned >= bombsInWave && bombs.length === 0) {
        const bonus = wave * 50 + bombsCaught * wave * 2;
        score += bonus;
        sfxClear?.play(undefined, 0.7);
        waveBannerText = `WAVE ${wave} CLEAR  +${bonus}`;
        waveBannerTimer = 2.0;
        waveClearTimer = 2.0;
    }
}

function showGameOver() {
    gameOverShown = true;
    submitBestScore(score);
    const summary = getMenu('gameover').getItem('summary');
    summary.setLabel(`SCORE  ${score}\nBEST  ${getBestScore()}\nWAVE  ${wave}`);
    showMenu('gameover');
}

///////////////////////////////////////////////////////////////////////////////
// UPDATE

function updateBomber(dt) {
    if (waveClearTimer > 0) return;       // bomber takes a breather between waves
    if (waveStartDelay > 0) return;

    // Pace back and forth with random flips. Speed scales with wave.
    bomber.x += bomber.vx * dt;
    if (bomber.x > BOMBER_RANGE)  { bomber.x = BOMBER_RANGE;  bomber.vx = -Math.abs(bomber.vx); }
    if (bomber.x < -BOMBER_RANGE) { bomber.x = -BOMBER_RANGE; bomber.vx =  Math.abs(bomber.vx); }
    if (rand() < bomberFlipProb(wave)) bomber.vx = -bomber.vx;

    if (bomber.dropTimer > 0)  bomber.dropTimer  -= dt;
    if (bomber.laughTimer > 0) bomber.laughTimer -= dt;
}

function updateBucket(dt) {
    const maxX = FIELD_RIGHT - bucketHalfW(wave) - 0.3;
    const kx = keyDirection().x;
    if (kx !== 0)
        bucketTargetX = clamp(bucketTargetX + kx * 28 * dt, -maxX, maxX);
    else
        bucketTargetX = clamp(mousePos.x, -maxX, maxX);
    // Direct assignment — paddle games live on instant response.
    bucketX = bucketTargetX;
}

function updateBombs(dt) {
    if (missFreezeTimer > 0) return;
    if (waveClearTimer > 0) return;

    // Spawn cadence
    if (waveStartDelay > 0) {
        waveStartDelay -= dt;
    } else if (bombsSpawned < bombsInWave) {
        waveSpawnTimer -= dt;
        if (waveSpawnTimer <= 0) {
            spawnBomb();
            waveSpawnTimer = bombInterval(wave) * rand(0.75, 1.25);
        }
    }

    const halfW = bucketHalfW(wave);
    const catchY = bucketTopY();
    const bucketHalfH = 0.5;

    for (let i = bombs.length; i--;) {
        const b = bombs[i];
        b.pos.y += b.vel.y * dt;
        b.fuse += dt * 12;

        // Smoke trail — small gray wisps just above the bomb (where it
        // just was). As the bomb falls past, the wisps recede upward
        // naturally, drawing the trail. behind:true so they render under
        // the bomb instead of obscuring it.
        if (rand() < 0.75) {
            particles.push({
                pos: b.pos.copy().add(vec2(rand(-0.1, 0.1), rand(0.1, 0.3))),
                vel: vec2(rand(-0.4, 0.4), rand(0, 0.6)),
                life: 0.55, maxLife: 0.55,
                h: 0, s: 0, l: 0.55 + rand(0, 0.15),
                gravityScale: -0.05,                  // very slight rise
                size: rand(0.12, 0.22),
                behind: true,
            });
        }
        // Occasional bright fuse spark from the wick.
        if (rand() < 0.35) {
            particles.push({
                pos: b.pos.copy().add(vec2(rand(-0.05, 0.05), BOMB_R + 0.42)),
                vel: vec2(rand(-1, 1), rand(0.5, 2)),
                life: 0.3, maxLife: 0.3,
                h: 0.11, s: 1, l: 0.7,
                gravityScale: 0.3,
                size: rand(0.06, 0.1),
                behind: true,
            });
        }

        // Catch test: only the TOP (highest) bucket catches. Lower buckets
        // are visual lives only — classic Kaboom rules.
        const dx = Math.abs(b.pos.x - bucketX);
        const dy = b.pos.y - catchY;
        if (dx < halfW + BOMB_R && Math.abs(dy) < bucketHalfH + BOMB_R && b.vel.y < 0) {
            catchBomb(b);
            bombs.splice(i, 1);
            continue;
        }

        // Floor hit = miss.
        if (b.pos.y < FLOOR_Y) {
            missBomb(b);
            return;     // bombs was wiped inside missBomb
        }
    }
}

function updateParticles(dt) {
    for (let i = particles.length; i--;) {
        const p = particles[i];
        p.pos.x += p.vel.x * dt;
        p.pos.y += p.vel.y * dt;
        p.vel.y -= 18 * dt * p.gravityScale;
        p.vel.x *= 0.96;
        p.vel.y *= 0.99;
        p.life -= dt;
        if (p.life <= 0) particles.splice(i, 1);
    }
}

///////////////////////////////////////////////////////////////////////////////
// RENDER

function drawSkyAndStars() {
    drawRect(vec2(0, 0), vec2(120, 60), hsl(.66, .35, .08));
    // timeReal keeps advancing through pause/title; `time` doesn't.
    // Three layers drift at different speeds for parallax depth.
    const layerSpeed = [0.25, 0.55, 1.1];
    const layerBright = [0.5, 0.75, 1.0];
    const W = 70;
    for (const s of starField) {
        const drift = timeReal * layerSpeed[s.layer];
        const x = ((s.x0 - drift) % W + W * 1.5) % W - W/2;
        const tw = 0.5 + 0.5 * Math.sin(timeReal * 2 + s.phase);
        const b = layerBright[s.layer];
        drawRect(vec2(x, s.y), vec2(s.size, s.size),
                 hsl(0, 0, b * (0.6 + 0.4 * tw), 0.5 + 0.5 * tw));
    }
}

function drawBuilding() {
    const bw = 22;
    const bx = 0;
    const buildingTop = ROOF_Y - 0.2;
    const buildingBot = FLOOR_Y;
    const buildingMid = (buildingTop + buildingBot) / 2;
    const buildingH = buildingTop - buildingBot;

    // Body
    drawRect(vec2(bx, buildingMid), vec2(bw, buildingH), hsl(0, 0, .13));
    // Vertical edge shading
    drawRect(vec2(bx - bw/2 + 0.3, buildingMid), vec2(0.6, buildingH), hsl(0, 0, .09));
    drawRect(vec2(bx + bw/2 - 0.3, buildingMid), vec2(0.6, buildingH), hsl(0, 0, .17));
    // Roof ledge / parapet
    drawRect(vec2(bx, buildingTop + 0.15), vec2(bw + 0.6, 0.5), hsl(0, 0, .22));
    drawRect(vec2(bx, buildingTop + 0.4), vec2(bw + 1.0, 0.2), hsl(0, 0, .28));

    // Windows
    const cols = 9, rows = 7;
    const padX = 1.5, padY = 1.5;
    const left = bx - bw/2 + padX;
    const top  = buildingTop - padY;
    const colStep = (bw - padX * 2) / (cols - 1);
    const rowStep = (buildingH - padY * 2 - 1) / (rows - 1);
    const winW = 1.3, winH = 0.85;

    for (let r = 0; r < rows; r++)
    for (let c = 0; c < cols; c++) {
        const x = left + c * colStep;
        const y = top - r * rowStep;
        const seed = windowSeeds[r * cols + c];
        const phase = (timeReal * 0.35 + seed) % 5;
        const lit = phase < 2;
        // Frame
        drawRect(vec2(x, y), vec2(winW + 0.18, winH + 0.18), hsl(0, 0, .07));
        // Glass
        drawRect(vec2(x, y), vec2(winW, winH), lit ? hsl(.13, .85, .58) : hsl(.62, .25, .1));
        // Crossbars
        drawRect(vec2(x, y), vec2(0.08, winH), hsl(0, 0, .06));
        drawRect(vec2(x, y), vec2(winW, 0.08), hsl(0, 0, .06));
    }

    // Ground — extends well below the visible area so any aspect ratio
    // shows pavement instead of sky under the building.
    drawRect(vec2(0, FLOOR_Y - 6), vec2(80, 12), hsl(.08, .2, .12));
    drawRect(vec2(0, FLOOR_Y - 0.05), vec2(80, 0.12), hsl(0, 0, .25));
}

function drawPineTree(x, y, size) {
    // Trunk
    const trunkW = size * 0.2;
    const trunkH = size * 0.7;
    drawRect(vec2(x, y + trunkH/2), vec2(trunkW, trunkH), hsl(.08, .55, .12));

    // Foliage — 3 stacked triangles tapering up, pine-silhouette style
    const foliageColor = hsl(.32, .5, .14);
    for (let i = 0; i < 3; i++) {
        const fy = y + trunkH * 0.4 + size * (0.4 + i * 0.55);
        const fw = size * (1.3 - i * 0.3);
        const fh = size * 0.95;
        drawPoly([
            vec2(x - fw/2, fy),
            vec2(x + fw/2, fy),
            vec2(x, fy + fh),
        ], foliageColor);
    }
}

function drawBush(x, y, size) {
    // Overlapping circles — rounded shrub silhouette.
    const c1 = hsl(.32, .45, .15);
    const c2 = hsl(.32, .55, .18);
    drawCircle(vec2(x - size*0.4, y + size*0.5),  size*1.2, c1);
    drawCircle(vec2(x + size*0.4, y + size*0.5),  size*1.2, c1);
    drawCircle(vec2(x,             y + size*0.9), size*1.3, c2);
}

function drawTrees() {
    for (const t of treeField) {
        if (t.type === 'pine') drawPineTree(t.x, FLOOR_Y, t.size);
        else                   drawBush(t.x, FLOOR_Y, t.size);
    }
}

function drawBomber() {
    // On the title screen, paused = true so gameUpdate doesn't run and
    // bomber.x is frozen. Drive a slow sinusoidal pace from `timeReal`
    // (advances through pause) so the attract-mode backdrop stays alive.
    const onTitle = !isPlaying() && lives > 0;
    const titlePhase = timeReal * 0.45;
    const x = onTitle ? Math.sin(titlePhase) * BOMBER_RANGE * 0.65 : bomber.x;
    const y = ROOF_Y;
    const moving = isPlaying() && waveClearTimer <= 0 && waveStartDelay <= 0;
    const facing = onTitle
        ? (Math.cos(titlePhase) >= 0 ? 1 : -1)
        : (bomber.vx >= 0 ? 1 : -1);
    const walkPhase = (onTitle ? timeReal : time) * 6 * (moving || onTitle ? 1 : 0);
    const stepBob = Math.abs(Math.sin(walkPhase)) * 0.08;

    // Legs (striped red/white pants)
    const legY = y + 0.55 + stepBob;
    drawRect(vec2(x - 0.32, legY), vec2(0.45, 1.1), hsl(0, .8, .5));
    drawRect(vec2(x + 0.32, legY), vec2(0.45, 1.1), hsl(0, .8, .5));
    for (let i = 0; i < 4; i++) {
        const sy = legY + 0.4 - i * 0.3;
        drawRect(vec2(x - 0.32, sy), vec2(0.45, 0.08), hsl(0, 0, .95));
        drawRect(vec2(x + 0.32, sy), vec2(0.45, 0.08), hsl(0, 0, .95));
    }
    // Feet
    drawRect(vec2(x - 0.4, legY - 0.6), vec2(0.7, 0.25), hsl(0, 0, .08));
    drawRect(vec2(x + 0.4, legY - 0.6), vec2(0.7, 0.25), hsl(0, 0, .08));

    // Body (yellow shirt)
    const bodyY = y + 1.7 + stepBob * 0.3;
    drawRect(vec2(x, bodyY), vec2(1.5, 1.2), hsl(.14, .85, .55));
    drawRect(vec2(x, bodyY + 0.55), vec2(1.7, 0.2), hsl(.14, .9, .65));     // shoulder line
    // Belt
    drawRect(vec2(x, bodyY - 0.6), vec2(1.55, 0.18), hsl(.05, .3, .4));
    drawRect(vec2(x, bodyY - 0.6), vec2(0.3, 0.18), hsl(.13, .0, .9));      // buckle

    // Throwing arm — extends forward, dips down + reaches further when
    // dropping. Hand position MUST match spawnBomb's handX/handY so the
    // bomb visibly leaves his hand.
    const throwShoulder = vec2(x + facing * 0.5, bodyY + 0.4);
    const throwReach    = bomber.dropTimer > 0 ? 1.4 : 1.0;
    const throwDip      = bomber.dropTimer > 0 ? -0.5 : -0.1;
    const throwHand     = vec2(x + facing * throwReach, bodyY + throwDip);
    drawLine(throwShoulder, throwHand, 0.22, hsl(.08, .5, .8));
    drawCircle(throwHand, 0.36, hsl(.08, .5, .8));

    // Holding arm — bent at elbow, cradles the pile against his chest on
    // the side OPPOSITE to facing.
    const holdShoulder = vec2(x - facing * 0.5, bodyY + 0.4);
    const holdElbow    = vec2(x - facing * 0.65, bodyY - 0.1);
    const holdHand     = vec2(x - facing * 0.2, bodyY - 0.3);
    drawLine(holdShoulder, holdElbow, 0.22, hsl(.08, .5, .8));
    drawLine(holdElbow,    holdHand,  0.22, hsl(.08, .5, .8));
    drawCircle(holdHand, 0.36, hsl(.08, .5, .8));

    // Pile of remaining bombs in his off-hand — shrinks as he drops them.
    // On title (attract), show a full pile so he looks menacing.
    const remainingBombs = isPlaying()
        ? max(0, bombsInWave - bombsSpawned)
        : (onTitle ? 5 : 0);
    drawBombPile(holdHand.x, holdHand.y + 0.22, min(remainingBombs, 5));

    // Head (yellow with mustache + wicked grin)
    const headY = y + 3.0 + stepBob * 0.4;
    drawCircle(vec2(x, headY), 1.3, hsl(.11, .75, .68), 0.06, hsl(0, 0, .05));
    // Hat
    drawRect(vec2(x, headY + 0.5), vec2(1.5, 0.3), hsl(0, .3, .25));
    drawRect(vec2(x, headY + 0.7), vec2(0.8, 0.3), hsl(0, .3, .25));
    // Eyes
    drawCircle(vec2(x - 0.35, headY + 0.05), 0.38, hsl(0, 0, 1));
    drawCircle(vec2(x + 0.35, headY + 0.05), 0.38, hsl(0, 0, 1));
    drawCircle(vec2(x - 0.35 + facing * 0.05, headY + 0.05), 0.15, hsl(0, 0, .05));
    drawCircle(vec2(x + 0.35 + facing * 0.05, headY + 0.05), 0.15, hsl(0, 0, .05));
    // Eyebrows — angry slant
    drawLine(vec2(x - 0.55, headY + 0.3),
             vec2(x - 0.15, headY + 0.15), 0.1, hsl(0, 0, .05));
    drawLine(vec2(x + 0.55, headY + 0.3),
             vec2(x + 0.15, headY + 0.15), 0.1, hsl(0, 0, .05));
    // Big bulbous nose — pinker than the yellow skin tone
    drawCircle(vec2(x, headY - 0.05), 0.5, hsl(.02, .6, .62));
    drawCircle(vec2(x - 0.1, headY + 0.05), 0.2, hsl(.02, .55, .8));
    // Mustache
    drawRect(vec2(x, headY - 0.3), vec2(0.9, 0.2), hsl(0, 0, .05));
}

// Layouts for the held bomb pile. Each entry positions bombs so the pile
// looks balanced at every count (a single bomb sits centered; a full pile
// is a 3-on-bottom, 2-on-top triangle).
function bombPilePositions(n) {
    if (n <= 0) return [];
    if (n === 1) return [[0, 0.1]];
    if (n === 2) return [[-0.25, 0], [0.25, 0]];
    if (n === 3) return [[-0.3, 0], [0, 0], [0.3, 0]];
    if (n === 4) return [[-0.28, 0], [0.28, 0], [-0.14, 0.4], [0.14, 0.4]];
    return [[-0.3, 0], [0, 0], [0.3, 0], [-0.15, 0.4], [0.15, 0.4]];
}

function drawBombPile(cx, cy, count) {
    if (count <= 0) return;
    const positions = bombPilePositions(min(count, 5));
    const r = 0.22;
    for (const p of positions) {
        const px = cx + p[0], py = cy + p[1];
        drawCircle(vec2(px, py), r * 2, hsl(0, 0, .08), 0.04, hsl(0, 0, .3));
        drawCircle(vec2(px - r * 0.25, py + r * 0.25), r * 0.4, hsl(0, 0, .35));
        drawLine(vec2(px, py + r),
                 vec2(px + 0.05, py + r + 0.12), 0.05, hsl(.08, .4, .4));
    }
}

function drawBomb(b) {
    // Bomb body
    drawCircle(b.pos, BOMB_R * 2, hsl(0, 0, .08), 0.05, hsl(0, 0, .3));
    // Highlight
    drawCircle(b.pos.add(vec2(-BOMB_R * 0.3, BOMB_R * 0.3)), BOMB_R * 0.4, hsl(0, 0, .3));
    // Fuse stick
    drawLine(b.pos.add(vec2(0, BOMB_R)),
             b.pos.add(vec2(0.08, BOMB_R + 0.4)), 0.07, hsl(.08, .4, .4));
    // Spark
    const sparkSize = 0.18 + 0.08 * Math.sin(b.fuse);
    drawCircle(b.pos.add(vec2(0.08, BOMB_R + 0.42)), sparkSize, hsl(.12, 1, .75));
    drawCircle(b.pos.add(vec2(0.08, BOMB_R + 0.42)), sparkSize * 0.5, hsl(0, 0, 1));
}

function drawBuckets() {
    if (lives <= 0) return;
    const halfW = bucketHalfW(wave);
    const h = 1.0;

    for (let i = 0; i < lives; i++) {
        const cy = bucketCenterY(i);
        const isTop = i === lives - 1;     // highest bucket catches
        // Trapezoidal body (rect + triangular sides via lines)
        drawRect(vec2(bucketX, cy), vec2(halfW * 2 * 0.85, h), hsl(.55, .55, .55));
        drawRect(vec2(bucketX, cy - 0.1), vec2(halfW * 2 * 0.75, h - 0.2), hsl(.55, .5, .42));
        // Rim
        drawRect(vec2(bucketX, cy + h/2), vec2(halfW * 2 + 0.2, 0.2), hsl(.55, .65, .72));
        drawRect(vec2(bucketX, cy + h/2 + 0.05), vec2(halfW * 2 + 0.3, 0.08), hsl(.55, .75, .88));

    }
}

function drawParticles(behindLayer=false) {
    for (const p of particles) {
        if (!!p.behind !== behindLayer) continue;
        const a = clamp(p.life / p.maxLife, 0, 1);
        drawRect(p.pos, vec2(p.size, p.size), hsl(p.h, p.s, p.l, a));
    }
}

function gameUpdate() {
    if (bindPauseKey({ when: () => isPlaying() && lives > 0 })) return;

    // Reset camera each frame so the gameFx screen-shake plugin (which adds
    // to cameraPos after gameUpdate) can nudge cleanly.
    setCameraPos(vec2(0, 0));

    const dt = 1/60;     // LittleJS fixed-step
    if (waveBannerTimer > 0) waveBannerTimer -= dt;
    if (missShakeTimer > 0) missShakeTimer = max(0, missShakeTimer - dt);

    if (!isPlaying()) {
        // Game over modal surfacing — wait until shake settles.
        if (lives <= 0 && !gameOverShown && missShakeTimer <= 0 && particles.length < 5) {
            showGameOver();
        }
        // Still tick particles/bomber for visual life on title/attract.
        if (!gameOverShown) {
            updateParticles(dt);
            // Mild bomber pacing on title for attract flavor.
            if (!lives || lives > 0) {
                bomber.x += bomber.vx * dt * 0.6;
                if (bomber.x > BOMBER_RANGE)  { bomber.x = BOMBER_RANGE;  bomber.vx = -Math.abs(bomber.vx); }
                if (bomber.x < -BOMBER_RANGE) { bomber.x = -BOMBER_RANGE; bomber.vx =  Math.abs(bomber.vx); }
            }
        }
        return;
    }

    if (missFreezeTimer > 0) {
        missFreezeTimer -= dt;
        updateBucket(dt);
        updateParticles(dt);
        return;
    }

    if (waveClearTimer > 0) {
        waveClearTimer -= dt;
        if (waveClearTimer <= 0) startWave(wave + 1);
        updateBucket(dt);
        updateBomber(dt);
        updateParticles(dt);
        return;
    }

    updateBucket(dt);
    updateBomber(dt);
    updateBombs(dt);
    updateParticles(dt);
    checkWaveClear();
}

function gameUpdatePost() {
    // Auto-fit camera so the play area shows on any aspect ratio (portrait
    // phones, ultrawide, etc.). Field uses ~26w x ~28h of world units
    // (taller side fits bomber's head + sky margin).
    cameraScale = Math.min(mainCanvasSize.x / 26, mainCanvasSize.y / 28);
    // Screen-shake is applied by the gameFx engine plugin (between gameUpdate
    // and gameUpdatePost); cameraPos base is reset at the top of gameUpdate.
}

function gameRender() {
    drawSkyAndStars();
    drawBuilding();
    drawTrees();
    drawBomber();
    drawParticles(true);                 // trail smoke + sparks (behind bombs)
    for (const b of bombs) drawBomb(b);
    drawBuckets();
    drawParticles(false);                // explosions / catch sparks (on top)
}

function gameRenderPost() {
    // HUD only when actually playing.
    if (!isPlaying()) return;

    const cx = mainCanvasSize.x / 2;
    drawTextScreen(`SCORE  ${score}`,
        vec2(24, 36), 32, hsl(0, 0, 1), 5, hsl(0, 0, 0), 'left');
    drawTextScreen(`BEST  ${getBestScore()}`,
        vec2(24, 72), 20, hsl(0, 0, .8), 4, hsl(0, 0, 0), 'left');

    drawTextScreen(`WAVE ${wave}`,
        vec2(cx, 36), 28, hsl(.13, 1, .7), 5, hsl(0, 0, 0), 'center');
    if (bombsInWave > 0) {
        drawTextScreen(`${bombsCaught} / ${bombsInWave}`,
            vec2(cx, 68), 20, hsl(0, 0, .9), 4, hsl(0, 0, 0), 'center');
    }

    // Cinematic wave banner (replaces the corner toasts that fought the HUD)
    if (waveBannerTimer > 0) {
        const t = waveBannerTimer;
        // Fade in over the first 0.2s, fade out over the last 0.5s.
        const fadeIn  = clamp((2.0 - t) / 0.2, 0, 1);
        const fadeOut = clamp(t / 0.5, 0, 1);
        const a = fadeIn * fadeOut;
        const grow = 1 + 0.15 * (1 - fadeIn);    // small pop-in
        const size = 80 * grow;
        drawTextScreen(waveBannerText,
            vec2(cx, mainCanvasSize.y / 2 - 40),
            size, hsl(.04, .9, .6, a), 8, hsl(0, 0, 0, a * 0.9), 'center');
    }
}

engineInit(gameInit, gameUpdate, gameUpdatePost, gameRender, gameRenderPost);
