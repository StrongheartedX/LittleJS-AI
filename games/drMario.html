<meta charset=utf-8>
</head><body>
<script src="../dist/littlejs.js?1780071765370"></script>
<script src="../templates/gameFx.js?1780071765370"></script>
<script src="../templates/menus.js?1780071765370"></script>
<script>
'use strict';

// engine settings
debugWatermark = false;
showEngineVersion = false;

///////////////////////////////////////////////////////////////////////////////////
// Dr. Mario
// - Grid based pill dropping
// - Match 4+ same color in a row/col to clear
// - Clear all viruses to win

const GRID_W = 8;
const GRID_H = 16;

const COLOR_LIST = [
    rgb(0.95, 0.22, 0.22),
    rgb(0.25, 0.50, 0.98),
    rgb(0.98, 0.86, 0.22),
];

const COLOR_SHADOW = [
    rgb(0.55, 0.08, 0.08),
    rgb(0.08, 0.20, 0.55),
    rgb(0.55, 0.50, 0.10),
];

// timing (all dt-based)
const START_DROP_CPS    = 1.5;     // initial fall speed (cells/sec)
const MAX_DROP_MULT     = 3.0;     // max multiplier as you clear viruses
const SOFT_DROP_MULT    = 18;
const LOCK_DELAY        = .35;     // grace at the bottom
const MOVE_DAS          = .16;
const MOVE_ARR          = .05;
const CLEAR_FLASH_TIME  = .22;     // flash before column wipe begins
const CLEAR_STEP_TIME   = .055;    // time between columns wiped
const POST_CLEAR_PAUSE  = .12;
const PARTICLE_LIFE     = .6;
const PARTICLES_PER_CELL = 8;

// board cell: null | {kind:'virus'|'pill', c, linkId, linkDir, flash}
let board = [];
let virusCount = 0;
let initialVirusCount = 0;
let score = 0;
let level = 1;

let active = null;        // {x,y,o,cA,cB}
let nextPill = null;
let linkIdGen = 1;
let state = 'play';       // play | gameover | win

// menu / session state

// drop / lock
let fallAcc = 0;
let lockTimer = -1;

// movement DAS/ARR
let moveDir = 0;
let moveDasTimer = 0;
let moveArrTimer = 0;

// clear / chain
let clearAnim = null;
let activeChain = 0;
let postClearPause = 0;

// particles
let particles = [];

// flash for "you can't spawn" style indicators (unused for now)
const sfxMove     = new SoundGenerator({volume:.22, frequency:520, release:.03, randomness:.02});
const sfxRotate   = new SoundGenerator({volume:.35, frequency:720, release:.05, slide:-.4, randomness:.03});
const sfxLock     = new SoundGenerator({volume:.35, frequency:180, release:.08, noise:.05, randomness:.02});
const sfxHardDrop = new SoundGenerator({volume:.5,  frequency:240, release:.08, slide:-.4, randomness:.02});
const sfxClear    = new SoundGenerator({volume:.45, frequency:620, release:.12, pitchJump:220, pitchJumpTime:.02, randomness:.05});
const sfxChain    = new SoundGenerator({volume:.55, frequency:880, release:.18, slide:.4, randomness:.03});
const sfxWin      = new SoundGenerator({volume:.55, frequency:440, attack:.01, release:.35, slide:.5, randomness:.01});
const sfxLose     = new SoundGenerator({volume:.55, frequency:140, attack:.01, release:.40, slide:-.6, noise:.08, randomness:.02});

///////////////////////////////////////////////////////////////////////////////////
// Helpers

function cellKey(x,y){ return x + ',' + y; }
function inBounds(x,y){ return x>=0 && x<GRID_W && y>=0 && y<GRID_H; }
function getCell(x,y){ return inBounds(x,y) ? board[y*GRID_W + x] : {blocked:true}; }
function setCell(x,y,v){ if (inBounds(x,y)) board[y*GRID_W + x] = v; }
function isEmpty(x,y){ return inBounds(x,y) && !getCell(x,y); }

function relFromOrient(o)
{
    // grid: y increases downward
    if (o==0) return {x:1,y:0};
    if (o==1) return {x:0,y:1};
    if (o==2) return {x:-1,y:0};
    return {x:0,y:-1};
}

function gridToWorld(x,y)
{
    // grid y is down; world y is up
    const cx = (GRID_W/2 - .5);
    const cy = (GRID_H/2 - .5);
    return vec2(x - cx, (GRID_H - 1 - y) - cy);
}

function randColorIndex(){ return randInt(0, COLOR_LIST.length); }
function makeNextPill(){ nextPill = {cA: randColorIndex(), cB: randColorIndex()}; }

function currentGravityCps()
{
    const fracCleared = initialVirusCount > 0
        ? clamp((initialVirusCount - virusCount) / initialVirusCount, 0, 1) : 0;
    return START_DROP_CPS * (1 + fracCleared * (MAX_DROP_MULT - 1));
}

///////////////////////////////////////////////////////////////////////////////////
// Pill control

function spawnPill()
{
    if (!nextPill) makeNextPill();
    active = {
        x: Math.floor(GRID_W/2) - 1,
        y: 0,
        o: 0,
        cA: nextPill.cA,
        cB: nextPill.cB,
    };
    makeNextPill();
    fallAcc = 0;
    lockTimer = -1;
    moveDir = 0;
    moveDasTimer = 0;
    moveArrTimer = 0;

    if (!canPlace(active.x, active.y, active.o))
    {
        active = null;
        setState('gameover');
    }
}

function canPlace(x,y,o)
{
    const r = relFromOrient(o);
    return isEmpty(x,y) && isEmpty(x+r.x, y+r.y);
}

function isGrounded()
{
    return active && !canPlace(active.x, active.y+1, active.o);
}

function tryMove(dx,dy, silent=false)
{
    if (!active) return false;
    const nx = active.x + dx;
    const ny = active.y + dy;
    if (canPlace(nx, ny, active.o))
    {
        active.x = nx;
        active.y = ny;
        if (!silent && dx) sfxMove.play();
        // moving down resets lock timer (matches Tetris-style behavior)
        if (dy > 0) lockTimer = -1;
        return true;
    }
    return false;
}

function tryRotate(dir=1)
{
    if (!active) return false;
    const o2 = (active.o + (dir>0?1:3)) & 3;
    const kicks = [
        {x:0,y:0},
        {x:1,y:0},
        {x:-1,y:0},
        {x:0,y:-1},
        {x:2,y:0},
        {x:-2,y:0},
    ];
    for (const k of kicks)
    {
        const nx = active.x + k.x;
        const ny = active.y + k.y;
        if (canPlace(nx, ny, o2))
        {
            active.x = nx;
            active.y = ny;
            active.o = o2;
            sfxRotate.play();
            return true;
        }
    }
    return false;
}

function ghostY()
{
    if (!active) return 0;
    let gy = active.y;
    while (canPlace(active.x, gy+1, active.o)) gy++;
    return gy;
}

function hardDrop()
{
    if (!active) return;
    let drops = 0;
    while (tryMove(0,1,true)) drops++;
    if (drops) sfxHardDrop.play();
    score += drops * 2;
    addScreenShake(.55, .28);
    lockActive();
}

function lockActive()
{
    if (!active) return;
    const r = relFromOrient(active.o);
    const ax=active.x, ay=active.y;
    const bx=ax+r.x, by=ay+r.y;
    const id = linkIdGen++;

    setCell(ax, ay, {kind:'pill', c:active.cA, linkId:id, linkDir:{x:r.x,y:r.y}});
    setCell(bx, by, {kind:'pill', c:active.cB, linkId:id, linkDir:{x:-r.x,y:-r.y}});
    active = null;
    sfxLock.play();

    // begin resolve (animated)
    activeChain = 0;
    tryStartClearOrSpawn();
}

function tryStartClearOrSpawn()
{
    const matches = findMatches();
    if (matches.size)
        startClearAnim(matches);
    else
    {
        activeChain = 0;
        if (virusCount <= 0) setState('win');
        else spawnPill();
    }
}

function unlinkOtherHalf(x,y,cell)
{
    if (!cell || cell.kind !== 'pill' || !cell.linkDir) return;
    const ox = x + cell.linkDir.x;
    const oy = y + cell.linkDir.y;
    const other = getCell(ox,oy);
    if (other && other.kind === 'pill' && other.linkId === cell.linkId)
    {
        other.linkDir = null;
        other.linkId = 0;
        setCell(ox,oy,other);
    }
}

///////////////////////////////////////////////////////////////////////////////////
// Matching

function findMatches()
{
    const toClear = new Set();

    // rows
    for (let y=0; y<GRID_H; y++)
    {
        let runColor = -1, runStart = 0, runLen = 0;
        for (let x=0; x<=GRID_W; x++)
        {
            const cell = x<GRID_W ? getCell(x,y) : null;
            const c = cell ? cell.c : -1;
            if (c !== runColor)
            {
                if (runLen >= 4 && runColor >= 0)
                    for (let rx=runStart; rx<runStart+runLen; rx++) toClear.add(cellKey(rx,y));
                runColor = c;
                runStart = x;
                runLen = cell ? 1 : 0;
            }
            else
                runLen++;
        }
    }

    // cols
    for (let x=0; x<GRID_W; x++)
    {
        let runColor = -1, runStart = 0, runLen = 0;
        for (let y=0; y<=GRID_H; y++)
        {
            const cell = y<GRID_H ? getCell(x,y) : null;
            const c = cell ? cell.c : -1;
            if (c !== runColor)
            {
                if (runLen >= 4 && runColor >= 0)
                    for (let ry=runStart; ry<runStart+runLen; ry++) toClear.add(cellKey(x,ry));
                runColor = c;
                runStart = y;
                runLen = cell ? 1 : 0;
            }
            else
                runLen++;
        }
    }

    return toClear;
}

function applyGravityOnce()
{
    let moved = false;
    for (let y=GRID_H-2; y>=0; y--)
    for (let x=0; x<GRID_W; x++)
    {
        const cell = getCell(x,y);
        if (!cell || cell.kind !== 'pill') continue;

        if (cell.linkDir)
        {
            const ox = x + cell.linkDir.x;
            const oy = y + cell.linkDir.y;
            const other = getCell(ox,oy);
            if (!other || other.kind !== 'pill' || other.linkId !== cell.linkId)
            {
                cell.linkDir = null;
                cell.linkId = 0;
                setCell(x,y,cell);
            }
            else
            {
                const isRoot = (y < oy) || (y === oy && x < ox);
                if (!isRoot) continue;

                if (cell.linkDir.y !== 0)
                {
                    const lower = y > oy ? {x:x,y:y} : {x:ox,y:oy};
                    if (isEmpty(lower.x, lower.y+1))
                    {
                        const a = getCell(x,y);
                        const b = getCell(ox,oy);
                        setCell(x,y,null);
                        setCell(ox,oy,null);
                        setCell(x,y+1,a);
                        setCell(ox,oy+1,b);
                        moved = true;
                    }
                }
                else
                {
                    if (isEmpty(x,y+1) && isEmpty(ox,oy+1))
                    {
                        const a = getCell(x,y);
                        const b = getCell(ox,oy);
                        setCell(x,y,null);
                        setCell(ox,oy,null);
                        setCell(x,y+1,a);
                        setCell(ox,oy+1,b);
                        moved = true;
                    }
                }
                continue;
            }
        }

        if (!cell.linkDir && isEmpty(x,y+1))
        {
            setCell(x,y,null);
            setCell(x,y+1,cell);
            moved = true;
        }
    }
    return moved;
}

function settleGravity()
{
    while (applyGravityOnce()) {}
}

///////////////////////////////////////////////////////////////////////////////////
// Clear animation

function startClearAnim(toClearSet)
{
    activeChain++;

    // count viruses + add score
    let virusesInClear = 0;
    for (const k of toClearSet)
    {
        const [xs, ys] = k.split(',');
        const cell = getCell(xs|0, ys|0);
        if (cell && cell.kind === 'virus') virusesInClear++;
    }
    const cleared = toClearSet.size;
    score += virusesInClear * 100 * activeChain;
    score += (cleared - virusesInClear) * 10 * activeChain;

    // mark cells as flashing (for highlight in render)
    for (const k of toClearSet)
    {
        const [xs, ys] = k.split(',');
        const cell = getCell(xs|0, ys|0);
        if (cell) cell.flash = true;
    }

    // group by column for staggered wipe
    const colMap = new Map();
    for (const k of toClearSet)
    {
        const [xs, ys] = k.split(',');
        const x = xs|0, y = ys|0;
        if (!colMap.has(x)) colMap.set(x, []);
        colMap.get(x).push({x, y});
    }
    const sortedCols = [...colMap.keys()].sort((a,b)=>a-b);

    clearAnim = {
        cells: colMap,
        cols: sortedCols,
        idx: 0,
        timer: 0,
        flashTimer: CLEAR_FLASH_TIME,
        chainAtStart: activeChain,
    };

    if (activeChain > 1) sfxChain.play();
    else sfxClear.play();
    addScreenShake(.35, .18 + activeChain*.06);
}

function stepClearAnim(dt)
{
    if (clearAnim.flashTimer > 0)
    {
        clearAnim.flashTimer -= dt;
        return;
    }
    clearAnim.timer += dt;
    while (clearAnim && clearAnim.timer >= CLEAR_STEP_TIME)
    {
        clearAnim.timer -= CLEAR_STEP_TIME;
        if (clearAnim.idx >= clearAnim.cols.length)
        {
            finishClearAnim();
            return;
        }
        wipeColumn(clearAnim.cols[clearAnim.idx++]);
    }
}

function wipeColumn(col)
{
    const cells = clearAnim.cells.get(col);
    for (const {x,y} of cells)
    {
        const cell = getCell(x,y);
        if (!cell) continue;
        if (cell.kind === 'virus') virusCount--;
        if (cell.kind === 'pill') unlinkOtherHalf(x,y,cell);
        spawnCellParticles(x, y, cell.c);
        setCell(x, y, null);
    }
}

function finishClearAnim()
{
    clearAnim = null;
    settleGravity();
    const more = findMatches();
    if (more.size)
        startClearAnim(more);
    else
        postClearPause = POST_CLEAR_PAUSE;
}

///////////////////////////////////////////////////////////////////////////////////
// Particles

function spawnCellParticles(gx, gy, colorIdx)
{
    const wp = gridToWorld(gx, gy);
    const base = COLOR_LIST[colorIdx] || rgb(.7,.7,.7);
    for (let i=0; i<PARTICLES_PER_CELL; i++)
    {
        const a = rand(0, 2*PI);
        const sp = rand(3, 8);
        particles.push({
            pos: wp.add(vec2(rand(-.2,.2), rand(-.2,.2))),
            vel: vec2(Math.cos(a)*sp, Math.sin(a)*sp + rand(1,3)),
            life: PARTICLE_LIFE,
            lifeMax: PARTICLE_LIFE,
            size: rand(.08, .22),
            color: base,
        });
    }
}

function updateParticles(dt)
{
    const gPar = -14;
    for (let i=particles.length-1; i>=0; i--)
    {
        const p = particles[i];
        p.life -= dt;
        if (p.life <= 0) { particles.splice(i,1); continue; }
        p.vel = p.vel.add(vec2(0, gPar*dt)).scale(0.985);
        p.pos = p.pos.add(p.vel.scale(dt));
    }
}

function renderParticles()
{
    for (const p of particles)
    {
        const t = clamp(p.life / p.lifeMax, 0, 1);
        const c = p.color.copy();
        c.a = t;
        drawRect(p.pos, vec2(p.size), c);
    }
}

///////////////////////////////////////////////////////////////////////////////////
// New game

function newGame()
{
    board = new Array(GRID_W*GRID_H).fill(null);
    score = 0;
    linkIdGen = 1;
    particles = [];
    clearAnim = null;
    postClearPause = 0;
    activeChain = 0;

    // scaled by level
    const virusTarget = clamp(8 + level*3, 8, GRID_W*Math.floor(GRID_H*.55));
    virusCount = 0;

    let tries = 0;
    while (virusCount < virusTarget && tries++ < 20000)
    {
        const x = randInt(0, GRID_W);
        const y = randInt(Math.floor(GRID_H*0.45), GRID_H);
        if (!isEmpty(x,y)) continue;
        // avoid placing a virus that already forms a 3-in-a-row (would be a free clear)
        const c = randColorIndex();
        if (countNeighborSameColor(x,y,c) >= 2) continue;
        setCell(x,y,{kind:'virus', c, linkId:0, linkDir:null});
        virusCount++;
    }
    initialVirusCount = virusCount;

    active = null;
    nextPill = null;
    makeNextPill();
    spawnPill();
    state = 'play';
}

function countNeighborSameColor(x,y,c)
{
    let same = 0;
    for (const [dx,dy] of [[-1,0],[1,0],[0,-1],[0,1]])
    {
        const cell = getCell(x+dx, y+dy);
        if (cell && cell.c === c) same++;
    }
    return same;
}

function setState(s)
{
    if (state === s) return;
    state = s;
    if (s === 'win') { sfxWin.play(); level++; }
    if (s === 'gameover') sfxLose.play();
    if (s === 'win' || s === 'gameover') {
        submitBestScore(score);
    }
}

///////////////////////////////////////////////////////////////////////////////////
// Menus

function startGame()
{
    newGame();
    setPlaying(true);
    clearSubmenuStack();
    hideAllMenus();
}

function buildMenus()
{
    if (typeof createMenu !== 'function') return;

    // Only pause when a game is actually running. Title menu sits over
    // the canvas without freezing anything.
    installAutoPause();

    createTitleMenu({
        title: 'DR. PILL',
        subtitle: '',
        onPlay: startGame,
        revealOnClick: false,
    });

    createPauseMenu({
        onRestart: startGame,
        onQuit:    quitToTitle,
    });

    installDefaultToolbar();
}

///////////////////////////////////////////////////////////////////////////////////
function gameInit()
{
    saveDataInit('drMario');
    setCanvasFixedSize(vec2(780, 720));
    setCameraScale(32);
    setCameraPos(vec2(0,0));
    newGame();

    buildMenus();
    showMenu('title');
}

///////////////////////////////////////////////////////////////////////////////////
function gameUpdate()
{
    if (bindPauseKey({when: () => isPlaying() && state === 'play'})) return;
    if (!isPlaying()) return;

    // Reset camera so the gameFx screen-shake plugin (after gameUpdate) can nudge.
    setCameraPos(vec2(0, 0));

    updateParticles(timeDelta);

    if (keyWasPressed('KeyR'))
        newGame();

    if (state !== 'play') return;

    // resolve animation has full control
    if (clearAnim) { stepClearAnim(timeDelta); return; }
    if (postClearPause > 0)
    {
        postClearPause -= timeDelta;
        if (postClearPause <= 0)
        {
            postClearPause = 0;
            if (virusCount <= 0) setState('win');
            else if (!active) spawnPill();
        }
        return;
    }

    if (!active) return;

    // discrete inputs (keyboard + gamepad)
    if (keyWasPressed('ArrowUp') || keyWasPressed('KeyX') || gamepadWasPressed(0))
        tryRotate(1);
    if (keyWasPressed('KeyZ') || gamepadWasPressed(2))
        tryRotate(-1);
    if (keyWasPressed('Space') || gamepadWasPressed(3))
        hardDrop();

    // horizontal DAS/ARR
    const stick = gamepadStick(0);
    const dir = keyDirection();
    const leftDown  = dir.x < 0 || stick.x < -.3;
    const rightDown = dir.x > 0 || stick.x >  .3;
    const newDir = rightDown && !leftDown ? 1 : leftDown && !rightDown ? -1 : 0;

    if (newDir !== moveDir)
    {
        moveDir = newDir;
        moveDasTimer = 0;
        moveArrTimer = 0;
        if (moveDir)
        {
            tryMove(moveDir, 0);
            moveDasTimer = MOVE_DAS;
        }
    }
    else if (moveDir)
    {
        moveDasTimer -= timeDelta;
        if (moveDasTimer <= 0)
        {
            moveArrTimer -= timeDelta;
            if (moveArrTimer <= 0)
            {
                tryMove(moveDir, 0);
                moveArrTimer = MOVE_ARR;
            }
        }
    }

    // gravity (with soft drop)
    const soft = dir.y < 0 || stick.y > .3;
    const cps = currentGravityCps() * (soft ? SOFT_DROP_MULT : 1);
    fallAcc += cps * timeDelta;
    while (fallAcc >= 1)
    {
        fallAcc -= 1;
        if (!tryMove(0, 1))
        {
            if (lockTimer < 0) lockTimer = LOCK_DELAY;
            break;
        }
    }

    // lock delay
    if (lockTimer >= 0)
    {
        lockTimer -= timeDelta;
        if (lockTimer <= 0)
        {
            while (tryMove(0, 1, true)) {}
            lockActive();
        }
    }
}

///////////////////////////////////////////////////////////////////////////////////
function gameUpdatePost()
{
    // cameraPos base is reset to origin at the top of gameUpdate so the gameFx
    // screen-shake plugin (between gameUpdate and gameUpdatePost) can nudge it.
}

///////////////////////////////////////////////////////////////////////////////////
// Rendering

function gameRender()
{
    // background
    drawRect(vec2(0,0), vec2(40, 26), rgb(0.06,0.06,0.09));

    // bottle frame
    drawRect(vec2(0,0), vec2(GRID_W + 2.4, GRID_H + 2.4), rgb(0.20,0.22,0.28));
    drawRect(vec2(0,0), vec2(GRID_W + 0.7, GRID_H + 0.7), rgb(0.04,0.04,0.06));
    drawRect(vec2(0, GRID_H/2 + .9), vec2(3, .6), rgb(0.20,0.22,0.28)); // bottle neck

    // grid lines
    for (let x=0; x<=GRID_W; x++)
    {
        const pA = gridToWorld(x-.5, 0-.5);
        const pB = gridToWorld(x-.5, GRID_H-.5);
        drawLine(pA, pB, 0.03, rgb(1,1,1,0.05));
    }
    for (let y=0; y<=GRID_H; y++)
    {
        const pA = gridToWorld(0-.5, y-.5);
        const pB = gridToWorld(GRID_W-.5, y-.5);
        drawLine(pA, pB, 0.03, rgb(1,1,1,0.05));
    }

    // ghost piece (under everything)
    if (state === 'play' && active && !clearAnim && !postClearPause)
        drawGhost();

    // board cells
    const flashOn = clearAnim && (Math.floor((CLEAR_FLASH_TIME - clearAnim.flashTimer)*22)%2 === 0);
    for (let y=0; y<GRID_H; y++)
    for (let x=0; x<GRID_W; x++)
    {
        const cell = getCell(x,y);
        if (!cell) continue;
        const flashing = cell.flash && flashOn;
        drawCellShape(cell, gridToWorld(x,y), {flash: flashing});
    }

    // active pill
    if (state === 'play' && active && !clearAnim && !postClearPause)
    {
        const r = relFromOrient(active.o);
        const aPos = gridToWorld(active.x, active.y);
        const bPos = gridToWorld(active.x + r.x, active.y + r.y);
        drawCellShape({kind:'pill', c:active.cA, linkDir:{x:r.x,y:r.y}, linkId:1}, aPos);
        drawCellShape({kind:'pill', c:active.cB, linkDir:{x:-r.x,y:-r.y}, linkId:1}, bPos);
    }

    // particles
    renderParticles();

    // next preview
    const uiX = (GRID_W/2 + 5.0);
    const uiY = (GRID_H/2 - 1.0);
    drawText('NEXT', vec2(uiX, uiY+1.6), 1.0, hsl(0,0,1), 0.18, hsl(0,0,0));
    if (nextPill)
    {
        drawCellShape({kind:'pill', c:nextPill.cA, linkDir:{x:1,y:0}, linkId:1}, vec2(uiX-0.55, uiY));
        drawCellShape({kind:'pill', c:nextPill.cB, linkDir:{x:-1,y:0}, linkId:1}, vec2(uiX+0.55, uiY));
    }

    // virus counter
    const vY = uiY - 3.5;
    drawText('VIRUSES', vec2(uiX, vY+1.2), 0.9, hsl(0,0,1), 0.16, hsl(0,0,0));
    drawText(String(Math.max(0, virusCount)), vec2(uiX, vY-.1), 1.8, hsl(.0,.7,.7), 0.22, hsl(0,0,0));

    // score
    const sY = vY - 3.0;
    drawText('SCORE', vec2(uiX, sY+1.0), 0.9, hsl(0,0,1), 0.16, hsl(0,0,0));
    drawText(String(score), vec2(uiX, sY-.2), 1.2, hsl(.15,.9,.7), 0.18, hsl(0,0,0));

    // level
    const lY = sY - 2.4;
    drawText(`LEVEL ${level}`, vec2(uiX, lY), 0.8, hsl(0,0,.85), 0.14, hsl(0,0,0));
}

function drawGhost()
{
    const r = relFromOrient(active.o);
    const gy = ghostY();
    if (gy <= active.y) return;
    const ga = gridToWorld(active.x, gy);
    const gb = gridToWorld(active.x + r.x, gy + r.y);
    const ghostOpts = {brightness: 0.35};
    drawCellShape({kind:'pill', c:active.cA, linkDir:{x:r.x, y:r.y}, linkId:1}, ga, ghostOpts);
    drawCellShape({kind:'pill', c:active.cB, linkDir:{x:-r.x, y:-r.y}, linkId:1}, gb, ghostOpts);
}

///////////////////////////////////////////////////////////////////////////////////
function gameRenderPost()
{
    const top = 38;
    const centerX = mainCanvasSize.x/2;

    drawTextScreen('DR. PILL', vec2(centerX, top), 42, hsl(0.58,0.30,0.90), 5, hsl(0,0,0));

    const info = 'Arrows/A-D move  |  Down soft drop  |  Up/X rot CW  |  Z rot CCW  |  Space hard drop  |  R restart';
    drawTextScreen(info, vec2(centerX, mainCanvasSize.y - 30), 16, hsl(0,0,.8), 3, hsl(0,0,0));

    if (state === 'win')
    {
        drawTextScreen('STAGE CLEAR!', vec2(centerX, mainCanvasSize.y/2 - 30), 64, hsl(0.35,0.9,0.6), 6, hsl(0,0,0));
        drawTextScreen('Press R for next level', vec2(centerX, mainCanvasSize.y/2 + 30), 22, hsl(0,0,1), 3, hsl(0,0,0));
    }
    else if (state === 'gameover')
    {
        drawTextScreen('GAME OVER', vec2(centerX, mainCanvasSize.y/2 - 30), 64, hsl(0,0.8,0.6), 6, hsl(0,0,0));
        drawTextScreen('Press R to retry', vec2(centerX, mainCanvasSize.y/2 + 30), 22, hsl(0,0,1), 3, hsl(0,0,0));
    }
}

///////////////////////////////////////////////////////////////////////////////////
// Pill / virus rendering

function drawCellShape(cell, worldPos, opts={})
{
    const b = opts.brightness !== undefined ? opts.brightness : 1;
    const colIdx = cell.c|0;
    const base = COLOR_LIST[colIdx];
    const shad = COLOR_SHADOW[colIdx];

    if (cell.kind === 'virus')
    {
        const bob = Math.sin(time*3 + worldPos.x*0.7 + worldPos.y*0.5) * 0.04;
        const wp = worldPos.add(vec2(0, bob));
        const body = opts.flash ? rgb(b,b,b) : rgb(base.r*b, base.g*b, base.b*b);
        drawCircle(wp, 0.82, body, 0.10, rgb(0,0,0,.6));
        // eyes
        drawCircle(wp.add(vec2(-0.18, 0.08)), 0.18, rgb(b,b,b));
        drawCircle(wp.add(vec2( 0.18, 0.08)), 0.18, rgb(b,b,b));
        const pupilShift = vec2(Math.sin(time*1.7)*.04, Math.cos(time*1.3)*.03);
        drawCircle(wp.add(vec2(-0.18, 0.08)).add(pupilShift), 0.09, rgb(0,0,0));
        drawCircle(wp.add(vec2( 0.18, 0.08)).add(pupilShift), 0.09, rgb(0,0,0));
        // mouth
        drawRect(wp.add(vec2(0,-.22)), vec2(.35,.08), rgb(0,0,0));
        return;
    }

    // PILL HALF
    const thickness = 0.78;
    const r = thickness * 0.5;
    const edge = 0.50;
    const edge2 = 0.54;
    const r2 = r + 0.06;
    const t2 = thickness + 0.12;
    const fillColor = opts.flash ? rgb(b,b,b) : rgb(base.r*b, base.g*b, base.b*b);
    const outlineColor = rgb(0,0,0, 0.5);
    const hi  = rgb(b, b, b, 0.30);
    const sh  = rgb(shad.r*b, shad.g*b, shad.b*b, 0.30);

    // convert grid linkDir to world axis (flip y)
    const wdir = cell.linkDir ? vec2(cell.linkDir.x, -cell.linkDir.y) : vec2(0,0);

    if (!cell.linkDir)
    {
        // full capsule (orphan half)
        drawFullCapsule(worldPos, fillColor, outlineColor, edge, edge2, r, r2, thickness, t2, hi, sh, b);
    }
    else if (Math.abs(wdir.x) > 0)
    {
        drawHalf(true, Math.sign(wdir.x), worldPos, fillColor, outlineColor, edge, edge2, r, r2, thickness, t2, hi, sh, b);
    }
    else
    {
        drawHalf(false, Math.sign(wdir.y), worldPos, fillColor, outlineColor, edge, edge2, r, r2, thickness, t2, hi, sh, b);
    }
}

function drawFullCapsule(p, fill, ol, edge, edge2, r, r2, t, t2, hi, sh, b=1)
{
    const ccL = -edge + r,  ccR =  edge - r;
    const ccL2 = -edge2 + r2, ccR2 = edge2 - r2;
    const rectLen  = ccR  - ccL;
    const rectLen2 = ccR2 - ccL2;

    drawRect(p, vec2(rectLen2, t2), ol);
    drawCircle(p.add(vec2(ccL2,0)), r2*2, ol);
    drawCircle(p.add(vec2(ccR2,0)), r2*2, ol);

    drawRect(p, vec2(rectLen, t), fill);
    drawCircle(p.add(vec2(ccL,0)), r*2, fill);
    drawCircle(p.add(vec2(ccR,0)), r*2, fill);

    // top highlight band
    drawRect(p.add(vec2(0, t*0.22)), vec2(rectLen*0.85, t*0.20), hi);
    // bottom shadow band
    drawRect(p.add(vec2(0,-t*0.22)), vec2(rectLen*0.85, t*0.20), sh);
    // specular dot
    drawCircle(p.add(vec2(-edge*0.55, t*0.22)), r*0.55, rgb(b, b, b, 0.4));
}

function drawHalf(axisH, toOtherSign, p, fill, ol, edge, edge2, r, r2, t, t2, hi, sh, b=1)
{
    const roundedAtNeg = toOtherSign > 0;
    const cc  = roundedAtNeg ? -edge  + r  :  edge  - r;
    const cc2 = roundedAtNeg ? -edge2 + r2 :  edge2 - r2;
    const rectMin  = roundedAtNeg ? cc  : -edge;
    const rectMax  = roundedAtNeg ? edge:  cc;
    const rectMin2 = roundedAtNeg ? cc2 : -edge2;
    const rectMax2 = roundedAtNeg ? edge2: cc2;
    const rectLen  = rectMax  - rectMin;
    const rectLen2 = rectMax2 - rectMin2;
    const rectC  = (rectMin  + rectMax ) * 0.5;
    const rectC2 = (rectMin2 + rectMax2) * 0.5;

    if (axisH)
    {
        // outline
        drawRect(p.add(vec2(rectC2, 0)), vec2(rectLen2, t2), ol);
        drawCircle(p.add(vec2(cc2, 0)), r2*2, ol);
        // fill
        drawRect(p.add(vec2(rectC, 0)), vec2(rectLen, t), fill);
        drawCircle(p.add(vec2(cc, 0)), r*2, fill);
        // top highlight
        drawRect(p.add(vec2(rectC, t*0.22)), vec2(rectLen*0.95, t*0.20), hi);
        // bottom shadow
        drawRect(p.add(vec2(rectC,-t*0.22)), vec2(rectLen*0.95, t*0.20), sh);
        // seam on the flat (connecting) side
        const seamX = roundedAtNeg ? edge - 0.02 : -edge + 0.02;
        drawRect(p.add(vec2(seamX, 0)), vec2(0.08, t*0.85), rgb(0,0,0, 0.30));
        // specular
        drawCircle(p.add(vec2(cc - 0.06, t*0.22)), r*0.50, rgb(b, b, b, 0.35));
    }
    else
    {
        drawRect(p.add(vec2(0, rectC2)), vec2(t2, rectLen2), ol);
        drawCircle(p.add(vec2(0, cc2)), r2*2, ol);
        drawRect(p.add(vec2(0, rectC)), vec2(t, rectLen), fill);
        drawCircle(p.add(vec2(0, cc)), r*2, fill);
        drawRect(p.add(vec2(-t*0.22, rectC)), vec2(t*0.20, rectLen*0.95), hi);
        drawRect(p.add(vec2( t*0.22, rectC)), vec2(t*0.20, rectLen*0.95), sh);
        const seamY = roundedAtNeg ? edge - 0.02 : -edge + 0.02;
        drawRect(p.add(vec2(0, seamY)), vec2(t*0.85, 0.08), rgb(0,0,0, 0.30));
        drawCircle(p.add(vec2(-t*0.22, cc + 0.06)), r*0.50, rgb(b, b, b, 0.35));
    }
}

///////////////////////////////////////////////////////////////////////////////////
engineInit(gameInit, gameUpdate, gameUpdatePost, gameRender, gameRenderPost);

</script>
