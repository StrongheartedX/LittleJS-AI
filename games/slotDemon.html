<script src="../dist/littlejs.js?1780071765370"></script>
<script src="../templates/gameFx.js?1780071765370"></script>
<script src="../templates/textureGenerator.js?1780071765370"></script>
<script src="../templates/tweakables.js?1780071765370"></script>

<script>
'use strict';

// engine settings, do not remove
debugWatermark = false;
showEngineVersion = false;
paused = false;

// engine settings, customize if necessary
gravity = vec2(0, 0);
cameraPos = vec2(0, 0);
cameraScale = 32;
// Default LittleJS canvas cap is 1920x1080 — raise it so the canvas
// fills modern high-res monitors instead of letterboxing.
canvasMaxSize = vec2(2048, 2048);

// ---- CONFIG (single source of balance truth) ----
const BALANCE = {
    // weighted symbol table: rising payout, falling weight (cherry -> demon).
    // Fewer symbol types + a heavier common symbol = more frequent wins.
    // Win chance per spin ≈ sum of (weight/total)^reelCount over all symbols.
    symbols: [
        { emoji: '🍒', weight: 50, payout: 2 },
        { emoji: '🔔', weight: 28, payout: 4 },
        { emoji: '💎', weight: 15, payout: 12 },
        { emoji: '😈', weight: 7,  payout: 40 },   // demon = jackpot
    ],
    reelCount: 3,            // 3 reels; win = all reels equal
    payoutBase: 1,           // multiplied by symbol.payout, level, demon mult
    wildEmoji: '⭐',
    wildChancePerWild: 0.05, // +5% chance per reel that a reel becomes wild

    machineCostBase: 25,  machineCostScale: 1.55,
    pitCostBase: 200,     pitCostScale: 3,
    pitStart: 5,          pitExpand: 5,
    levelCostBase: 50,    levelCostScale: 2,   // per-machine level cost doubles
    wildCostBase: 150,    wildCostScale: 3,
    sellRefund: 0.5,

    decayRate: 0.05,         // base energy/sec drained (1.0 = full bar; ~20s at imp)
    spinInterval: 1.0,       // seconds per spin at full energy & speedMult 1
};

// MVP ships only `standard`. Volatility profiles add entries later (symbolTable/payoutShape unused for now).
const MACHINE_TYPES = {
    standard: { name: 'Slot', symbolTable: null /* falls back to BALANCE.symbols */, payoutShape: 'balanced' },
};

// `ability` hooks are no-ops in MVP; board-aware behaviors fill them in the matchup pass.
const noop = () => {};
const DEMON_TYPES = {
    imp:   { name: 'Imp',   tile: 0, cost: 50,  costScale: 1.5, decayMult: 1,   payoutMult: 1,   speedMult: 1,   ability: noop },
    greed: { name: 'Greed', tile: 1, cost: 200, costScale: 1.6, decayMult: 1,   payoutMult: 1.3, speedMult: 1,   ability: noop },
    wrath: { name: 'Wrath', tile: 2, cost: 200, costScale: 1.6, decayMult: 1,   payoutMult: 1,   speedMult: 1.6, ability: noop },
    sloth: { name: 'Sloth', tile: 3, cost: 300, costScale: 1.7, decayMult: 0.3, payoutMult: 1,   speedMult: 1,   ability: noop },
};

// symbol/tile index helpers (atlas tiles 0-3 = demons, 4+ = symbols, last = wild)
const symbolTileIndex = (sym) => 4 + BALANCE.symbols.indexOf(sym);
const wildTileIndex = () => 4 + BALANCE.symbols.length;

// ---- GLOBALS ----
let cash = 0;
let pitCapacity = BALANCE.pitStart;
let machines = [];          // Machine[]
let demons = [];            // Demon[]
let demonsBought = {};      // type -> count (for cost scaling)
let stats = { sacrifices: 0 };
let saveTimer;              // autosave cadence (set in gameInit)

// ---- CAMERA PAN STATE ----
// Mouse-drag pans the board; a press that releases without crossing the
// drag threshold counts as a click (spin/refresh) instead.
let panStartMouse = null, panStartCam = null, panMoved = false;
const PAN_DRAG_PX = 8;   // screen-pixel movement before it counts as a drag, not a click

function boardBounds()
{
    // Bounds over ALL pit slots (0..pitCapacity-1), not just placed machines,
    // so the camera frames and clamps to the whole pit (empty slots included).
    let min = null, max = null;
    for (let i=0;i<pitCapacity;++i)
    {
        const p = cellToPos(vec2(i%GRID_COLS, Math.floor(i/GRID_COLS)));
        if (!min) { min = p.copy(); max = p.copy(); }
        else
        {
            min = vec2(Math.min(min.x, p.x), Math.min(min.y, p.y));
            max = vec2(Math.max(max.x, p.x), Math.max(max.y, p.y));
        }
    }
    return min ? { min, max } : { min: vec2(), max: vec2() };
}
function clampCamera()
{
    const b = boardBounds(), pad = 6;
    cameraPos = vec2(clamp(cameraPos.x, b.min.x - pad, b.max.x + pad),
                     clamp(cameraPos.y, b.min.y - pad, b.max.y + pad));
}
// Frame the pit: zoom so all grid COLUMNS fit in the play area (window minus the
// docked shop, ~230px), then center the pit there. The pit only ever grows in
// rows (≤ GRID_COLS wide), so the width-fit is stable; tall pits are panned.
// Called on new game / load; the player can still pan freely afterward.
const SHOP_PX = 230;
function centerCamera()
{
    const b = boardBounds();
    const mid = b.min.add(b.max).scale(0.5);
    const cols = Math.min(pitCapacity, GRID_COLS);
    const pitWidth = (cols - 1) * CELL.x + CELL.x*1.1;        // end-to-end span + a margin cell
    const playW = Math.max(200, mainCanvasSize.x - SHOP_PX);
    cameraScale = Math.min(32, playW / pitWidth);             // never zoom past the default
    // place the pit's center at the center of the play area (left of the shop)
    cameraPos = vec2(mid.x + SHOP_PX / (2 * cameraScale), mid.y);
}

// cost helpers
const demonCost = (type) => Math.ceil(DEMON_TYPES[type].cost * DEMON_TYPES[type].costScale ** (demonsBought[type] || 0));
const machineCost = () => Math.ceil(BALANCE.machineCostBase * BALANCE.machineCostScale ** machines.length);
const pitCost = () => Math.ceil(BALANCE.pitCostBase * BALANCE.pitCostScale ** ((pitCapacity - BALANCE.pitStart) / BALANCE.pitExpand));
const wildCost = (m) => Math.ceil(BALANCE.wildCostBase * BALANCE.wildCostScale ** m.wildCount);
const levelCost = (m) => Math.ceil(BALANCE.levelCostBase * BALANCE.levelCostScale ** (m.level - 1));
const canAfford = (n) => cash >= n;

// ---- SPRITE ATLAS ----
// Atlas layout: tiles 0-3 = the four demons (DEMON_TYPES[key].tile),
// tiles 4..(4+symbols.length-1) = symbol emojis in BALANCE.symbols order,
// next tile = wild emoji (== wildTileIndex()). 500x500 px draw space.
function buildSprites()
{
    initDrawToTexture();
    // demons (placeholder shapes now; refine later with /iterate-sprite)
    const demonColors = { imp:'#c33', greed:'#3a3', wrath:'#e60', sloth:'#36c' };
    for (const key in DEMON_TYPES)
    {
        const col = demonColors[key];
        drawToTexture(DEMON_TYPES[key].tile, (ctx) => {
            ctx.fillStyle = col;
            ctx.beginPath(); ctx.arc(250, 270, 170, 0, 7); ctx.fill();   // body
            ctx.fillStyle = '#fff';
            ctx.beginPath(); ctx.arc(195,240,35,0,7); ctx.arc(305,240,35,0,7); ctx.fill();  // eyes
            ctx.fillStyle = '#000';
            ctx.beginPath(); ctx.arc(195,245,15,0,7); ctx.arc(305,245,15,0,7); ctx.fill();  // pupils
            ctx.fillStyle = col;  // horns
            ctx.beginPath(); ctx.moveTo(140,140); ctx.lineTo(110,40); ctx.lineTo(180,120); ctx.fill();
            ctx.beginPath(); ctx.moveTo(360,140); ctx.lineTo(390,40); ctx.lineTo(320,120); ctx.fill();
        }, `${key} demon`);
    }
    // symbol emojis (incl. wild) as text glyphs
    const symbolTiles = [...BALANCE.symbols.map(s => s.emoji), BALANCE.wildEmoji];
    symbolTiles.forEach((emoji, i) => {
        drawToTexture(4 + i, (ctx) => {
            ctx.font = '380px serif';
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText(emoji, 250, 270);
        }, `symbol ${emoji}`);
    });
}

// weighted symbol roll
function rollSymbol()
{
    let total = 0; for (const s of BALANCE.symbols) total += s.weight;
    let r = rand(total), acc = 0;
    for (const s of BALANCE.symbols) { acc += s.weight; if (r < acc) return s; }
    return BALANCE.symbols[0];
}

// ---- WIN FX + SOUNDS ----
let floatTexts = [];   // {text, pos, color, life}
function spawnFloatText(text, pos, color) { floatTexts.push({text, pos: pos.copy(), color, life: 1}); }

// unlock a medal by id (no-op if medals aren't built yet or already unlocked;
// MenuMedal.unlock() is idempotent and fires its toast only once).
function unlockMedal(i) { if (typeof medals !== 'undefined' && medals[i]) medals[i].unlock(); }

// Transient big-win banner (shown on a jackpot/top-symbol win). An UNSET Timer's
// .elapsed() returns false (NaN comparison), so we also gate on a non-empty
// bannerText to keep the banner hidden at startup until showBanner() runs.
let bannerTimer = new Timer(), bannerText = '';
function showBanner(text) { bannerText = text; bannerTimer.set(1.5); }
function spawnWinBurst(pos, big)
{
    // ParticleEmitter(pos, angle, emitSize, emitTime, emitRate, emitConeAngle,
    //   tileInfo, colorStartA, colorStartB, colorEndA, colorEndB, particleTime,
    //   sizeStart, sizeEnd, speed, angleSpeed, damping, angleDamping,
    //   gravityScale, particleConeAngle, fadeRate, randomness, collideTiles, additive)
    // Finite burst: emitTime ~0.1s, emitRate sized so total ≈ count.
    const count = big ? 60 : 20;
    new ParticleEmitter(
        pos,                          // pos
        0,                            // angle
        1.5,                          // emitSize (circle diameter)
        0.1,                          // emitTime (short burst)
        count / 0.1,                  // emitRate -> ~count particles
        2.2,                          // emitConeAngle (mostly upward spread)
        tile(wildTileIndex()),        // tileInfo (star/wild glyph)
        hsl(.13, 1, .7),              // colorStartA (gold)
        hsl(.06, 1, .6),             // colorStartB (orange)
        hsl(.13, 1, .7, 0),           // colorEndA (gold, alpha 0)
        hsl(.06, 1, .6, 0),           // colorEndB (orange, alpha 0)
        0.5,                          // particleTime
        big ? 1.0 : 0.7,              // sizeStart
        0.1,                          // sizeEnd
        0.3,                          // speed (PER FRAME, <= 0.4)
        0.1,                          // angleSpeed
        0.95,                         // damping
        1,                            // angleDamping
        1,                            // gravityScale (fall back down)
        PI,                           // particleConeAngle
        0.2                           // fadeRate
    );
}

let sfxWin, sfxSpin, sfxRefresh, sfxSleep;   // SoundGenerator instances
function buildSounds()
{
    // Short dry low click for each spin.
    sfxSpin = new SoundGenerator({
        volume: .4, frequency: 180, attack: 0, release: .06,
        shapeCurve: 0, slide: -2, noise: .05,
    });
    // Brighter, richer chime for a win.
    sfxWin = new SoundGenerator({
        volume: .6, frequency: 520, attack: .01, release: .25,
        shapeCurve: 1, slide: 1, pitchJump: 220, pitchJumpTime: .06,
    });
    // Bright "power-up" blip when a demon is refreshed (high freq, quick attack, short release, slight upward jump).
    sfxRefresh = new SoundGenerator({
        volume: .4, frequency: 700, attack: .005, release: .12,
        shapeCurve: 1, slide: 2, pitchJump: 300, pitchJumpTime: .05,
    });
    // Low descending "powering-down" tone when a demon falls asleep (low freq, downward slide + drop).
    sfxSleep = new SoundGenerator({
        volume: .4, frequency: 220, attack: .01, release: .2,
        shapeCurve: 1, slide: -3, pitchJump: -120, pitchJumpTime: .08,
    });
}

///////////////////////////////////////////////////////////////////////////////
// GRID MATH + MACHINE ENTITY
// Grid-as-truth: each machine owns an integer `cell`; its world pixel pos is
// derived via cellToPos. The atlas was built with initDrawToTexture(), which
// calls setTileDefaultSize(vec2(500)), so tile(index) resolves to the correct
// 500px atlas tile without passing an explicit size (matches textureGame.html,
// which never hand-specifies the atlas tile size either).

const GRID_COLS = 5;
const CELL = vec2(6, 7);                 // world-units per machine cell (w,h)
const cellToPos = (cell) => vec2((cell.x - (GRID_COLS-1)/2) * CELL.x, -cell.y * CELL.y);
const nextFreeCell = () => {
    const i = machines.length;
    return vec2(i % GRID_COLS, Math.floor(i / GRID_COLS));
};
const machineAtPos = (p) => machines.find(m => isOverlapping(m.pos, m.size, p, vec2(0.1)));
function demonAtPos(p) { return demons.find(d => isOverlapping(d.pos, d.size, p, vec2(0.1))); }

class Machine extends EngineObject
{
    constructor(cell)
    {
        super(cellToPos(cell), vec2(CELL.x*0.9, CELL.y*0.9));
        this.cell = cell;
        this.level = 1;
        this.wildCount = 0;
        this.assignedDemon = null;
        this.reels = [];                 // current displayed symbols (objects from BALANCE.symbols)
        for (let i=0;i<BALANCE.reelCount;++i) this.reels.push(rollSymbol());
        this.flash = 0;                  // win flash amount (0..1)
        // reel-spin animation state (per reel): a vertical scroll where the
        // incoming symbol slides down from the top while the current exits the
        // bottom; masked above/below so only the slot window shows.
        this.spinning = false;
        this.spinSilent = false;         // demon auto-spins are silent; manual clicks tick
        this.finalReels = [];            // decided result, slid into place as reels stop
        this.reelNext = [];              // incoming symbol above each reel
        this.reelScroll = [];            // 0..1 scroll progress within the current step
        this.reelStop = [];              // per-reel stop Timers (staggered L->R)
        this.reelStopped = [];           // per-reel locked flag
    }
    update()
    {
        if (this.flash > 0) this.flash = max(0, this.flash - timeDelta*3);
        if (this.spinning) this.updateSpin();
        super.update();
    }
    // Start a spin: decide the result up front, then animate the reels cycling
    // and stopping staggered left-to-right. silent=true for demon auto-spins so
    // continuous auto-play doesn't machine-gun the sfx; manual clicks tick.
    spin(silent = false)
    {
        if (this.spinning) return;   // ignore re-triggers mid-spin
        const wildChance = this.wildCount * BALANCE.wildChancePerWild;
        this.finalReels = [];
        this.reelNext = [];
        this.reelScroll = [];
        this.reelStop = [];
        this.reelStopped = [];
        for (let i=0;i<BALANCE.reelCount;++i)
        {
            this.finalReels.push(rand() < wildChance ? '__WILD__' : rollSymbol());
            this.reelNext.push(rollSymbol());               // first incoming symbol
            this.reelScroll.push(0);
            this.reelStop.push(new Timer(0.4 + i*0.22));    // staggered stop L->R
            this.reelStopped.push(false);
        }
        this.spinning = true;
        this.spinSilent = silent;
        if (!silent) sfxSpin.play(this.pos);   // spin-start whir
    }
    updateSpin()
    {
        const REEL_SPEED = 9;   // symbol-steps per second while whirring
        for (let i=0;i<BALANCE.reelCount;++i)
        {
            if (this.reelStopped[i]) continue;
            this.reelScroll[i] += timeDelta * REEL_SPEED;
            // each completed step commits the incoming symbol and queues the next
            while (this.reelScroll[i] >= 1 && !this.reelStopped[i])
            {
                this.reelScroll[i] -= 1;
                this.reels[i] = this.reelNext[i];           // incoming -> current
                if (this.reelStop[i].elapsed() && this.reels[i] === this.finalReels[i])
                {
                    // landed on the result after the stop time -> lock it in
                    this.reelStopped[i] = true;
                    this.reelScroll[i] = 0;
                    if (!this.spinSilent) sfxSpin.play(this.pos, 0.5);   // reel-stop tick
                }
                else
                    // past the stop time force the result in so it slides to a stop
                    this.reelNext[i] = this.reelStop[i].elapsed() ? this.finalReels[i] : rollSymbol();
            }
        }
        if (this.reelStopped.every(s => s)) { this.spinning = false; this.resolveWin(); }
    }
    resolveWin()
    {
        // win = all non-wild reels share one symbol (wilds match anything); all-wild = top jackpot
        const real = this.reels.filter(r => r !== '__WILD__');
        let win = null;
        if (real.length === 0) win = BALANCE.symbols[BALANCE.symbols.length-1];
        else if (real.every(r => r === real[0])) win = real[0];
        if (win)
        {
            const mult = (1 + 0.5*(this.level-1)) * (this.assignedDemon ? DEMON_TYPES[this.assignedDemon.type].payoutMult : 1);
            const payout = Math.ceil(BALANCE.payoutBase * win.payout * mult);
            cash += payout;
            this.onWin(payout, win);
        }
    }
    onWin(payout, sym)
    {
        this.flash = 1;
        spawnFloatText('+' + payout, this.pos, hsl(.13,1,.6));
        if (sym === BALANCE.symbols[BALANCE.symbols.length-1]) showBanner('JACKPOT! +' + payout);
        const big = sym === BALANCE.symbols[BALANCE.symbols.length-1] || payout >= 100;
        if (big && isScreenShakeEnabled()) addScreenShake(0.4, 0.3);
        sfxWin.play(this.pos, big ? 1 : 0.5);
        spawnWinBurst(this.pos, big);
        unlockMedal(0);                                                  // First Win
        if (sym === BALANCE.symbols[BALANCE.symbols.length-1]) unlockMedal(1);   // Jackpot
    }
    render() {}   // suppress default; we draw via draw() from gameRender for layer control
    draw()
    {
        // cabinet
        drawRect(this.pos, this.size, this.flash > 0 ? hsl(0,0,1,this.flash) : hsl(.85,.4,.25));
        drawRect(this.pos, this.size.scale(0.96), hsl(.85,.3,.15));

        const slotW = this.size.x / (BALANCE.reelCount+1);
        const windowH = slotW*0.9;            // visible slot-window height (one symbol)
        const rowY = this.pos.y + 0.6;        // vertical center of the reel row
        const symSize = vec2(slotW*0.8);
        const drawSym = (sym, x, y) =>
        {
            const idx = sym === '__WILD__' ? wildTileIndex() : symbolTileIndex(sym);
            drawTile(vec2(x, y), symSize, tile(idx));
        };
        // reel windows + (scrolling) symbols
        for (let i=0;i<BALANCE.reelCount;++i)
        {
            const x = this.pos.x + (i-(BALANCE.reelCount-1)/2)*slotW;
            drawRect(vec2(x, rowY), vec2(slotW*0.9, windowH), hsl(0,0,.95));   // window bg
            if (this.spinning && !this.reelStopped[i])
            {
                const p = this.reelScroll[i];                         // 0..1 within the step
                drawSym(this.reels[i],    x, rowY - p*windowH);       // current exits the bottom
                drawSym(this.reelNext[i], x, rowY + (1-p)*windowH);   // incoming slides in from top
            }
            else
                drawSym(this.reels[i], x, rowY);                      // settled
        }
        // mask bars (cabinet-colored) hide the scroll above/below the window row,
        // so the slot reads like a real reel spinning behind a window.
        const maskH = windowH*1.25, maskW = this.size.x*0.95;   // covers overflow, stays clear of the cabinet outline
        drawRect(vec2(this.pos.x, rowY + windowH/2 + maskH/2), vec2(maskW, maskH), hsl(.85,.3,.15));
        drawRect(vec2(this.pos.x, rowY - windowH/2 - maskH/2), vec2(maskW, maskH), hsl(.85,.3,.15));

        // level label (after masks so it's never covered)
        drawText('Lv ' + this.level, this.pos.add(vec2(0, -this.size.y/2+0.6)), 0.8, hsl(0,0,1));
    }
}

class Demon extends EngineObject
{
    constructor(type, machine)
    {
        // sit on the lower part of its OWN machine cabinet (not in the gap below)
        super(machine.pos.add(vec2(0, -machine.size.y/2 + 0.9)), vec2(2.2));
        this.type = type;
        this.machine = machine;
        this.energy = 1;
        machine.assignedDemon = this;
        this.spinClock = 0;
    }
    update()
    {
        const def = DEMON_TYPES[this.type];
        const wasAwake = this.energy > 0;
        this.energy = max(0, this.energy - timeDelta * BALANCE.decayRate * def.decayMult);
        if (wasAwake && this.energy <= 0) sfxSleep.play(this.pos);   // awake->asleep transition
        if (this.energy > 0)
        {
            this.spinClock += timeDelta * this.energy * def.speedMult;
            if (this.spinClock >= BALANCE.spinInterval) { this.spinClock = 0; this.machine.spin(true); }
        }
        super.update();
    }
    refresh() { this.energy = 1; sfxRefresh.play(this.pos); }
    render() {}   // suppressed; drawn via draw() from gameRender (same pattern as Machine)
    draw()
    {
        const asleep = this.energy <= 0;
        drawTile(this.pos, this.size, tile(DEMON_TYPES[this.type].tile), asleep ? hsl(0,0,.5) : WHITE);
        // energy bar just under the demon
        const barW = this.size.x, by = -1.5;
        drawRect(this.pos.add(vec2(0, by)), vec2(barW, 0.3), hsl(0,0,.2));
        drawRect(this.pos.add(vec2(-barW/2 + barW*this.energy/2, by)), vec2(barW*this.energy, 0.3), hsl(this.energy*0.33, 1, .5));
        if (asleep) drawText('z', this.pos.add(vec2(1.2, 1.2)), 1.2, hsl(.6,.5,.9));
    }
}

// ---- PIT SPAWN ----
function spawnMachine()
{
    if (machines.length >= pitCapacity) return null;
    const m = new Machine(nextFreeCell());
    machines.push(m);
    return m;
}
function newGame()
{
    machines.forEach(m => m.destroy()); machines = [];
    demons.forEach(d => d.destroy());   demons = [];
    cash = 0; pitCapacity = BALANCE.pitStart; demonsBought = {}; stats = { sacrifices:0 };
    spawnMachine();   // start with one machine to click
    centerCamera();   // frame the lone starting machine in the middle of the view
}

///////////////////////////////////////////////////////////////////////////////
// SAVE / LOAD
// Serialize only TOP-LEVEL game state (cash/pit/machines/demons/etc.). Options
// (volume, screen shake) live under blob.options, owned entirely by the menu
// `persist:` items — we never touch that section here. saveData() shallow-merges
// these top-level fields via Object.assign, so the persisted `options` survive.
// loadGame is a `demons` creator: it must push each restored demon exactly once
// (the Demon ctor sets machine.assignedDemon but does NOT push) — the only other
// place that pushes to `demons` is placeDemon().

function saveGame()
{
    saveData({
        cash, pitCapacity, demonsBought, stats,
        machines: machines.map(m => ({ x:m.cell.x, y:m.cell.y, level:m.level, wild:m.wildCount })),
        demons: demons.map(d => ({ type:d.type, mx:d.machine.cell.x, my:d.machine.cell.y, energy:d.energy })),
    });
}
function loadGame()
{
    const b = getSaveData();
    if (!b || b.cash === undefined) { newGame(); return false; }
    machines.forEach(m => m.destroy()); machines = [];
    demons.forEach(d => d.destroy());   demons = [];
    cash = b.cash;
    pitCapacity = b.pitCapacity != null ? b.pitCapacity : BALANCE.pitStart;
    demonsBought = b.demonsBought || {};
    stats = b.stats || { sacrifices: 0 };
    for (const md of (b.machines || []))
    {
        const m = new Machine(vec2(md.x, md.y));
        m.level = md.level; m.wildCount = md.wild || 0;
        machines.push(m);
    }
    for (const dd of (b.demons || []))
    {
        const host = machines.find(m => m.cell.x === dd.mx && m.cell.y === dd.my);
        if (host)
        {
            const dm = new Demon(dd.type, host);   // ctor sets host.assignedDemon
            dm.energy = dd.energy;
            demons.push(dm);                        // loader pushes (ctor does not)
        }
    }
    if (!machines.length) spawnMachine();
    centerCamera();   // frame the restored board centered in the view
    return true;
}

///////////////////////////////////////////////////////////////////////////////
// ECONOMY
// Every buy function guards canAfford() and no-ops when unaffordable, so menu
// disabling is feedback only — never relied on for correctness.

// Every purchase saves immediately (saveGame) so a reload never loses a
// discrete action — the autosave timer only covers passive win cash.
function buyMachine()
{
    if (machines.length >= pitCapacity) return;
    const c = machineCost(); if (!canAfford(c)) return;
    cash -= c; spawnMachine(); saveGame();
}
function expandPit()
{
    const c = pitCost(); if (!canAfford(c)) return;
    cash -= c; pitCapacity += BALANCE.pitExpand; saveGame();
}
function cheapestLevelMachine(){ return machines.slice().sort((a,b)=>levelCost(a)-levelCost(b))[0]; }
function levelUpMachine()
{
    const m = cheapestLevelMachine(); if (!m) return;
    const c = levelCost(m); if (!canAfford(c)) return;
    cash -= c; m.level++; saveGame();
}
function cheapestWildMachine(){ return machines.slice().sort((a,b)=>wildCost(a)-wildCost(b))[0]; }
function buyWild()
{
    const m = cheapestWildMachine(); if (!m) return;
    const c = wildCost(m); if (!canAfford(c)) return;
    cash -= c; m.wildCount++; saveGame();
}
function sacrificeOldestSpecific(d){ const i=demons.indexOf(d); if(i>=0)demons.splice(i,1); if(d.machine)d.machine.assignedDemon=null; d.destroy(); }
function sellMachine()
{
    if (machines.length <= 1) return;            // keep at least one
    const refund = Math.ceil(machineCost()/BALANCE.machineCostScale * BALANCE.sellRefund);
    const m = machines[machines.length-1];       // sell most recent
    if (m.assignedDemon) sacrificeOldestSpecific(m.assignedDemon);
    m.destroy(); machines.pop();
    cash += refund; saveGame();
}

// ---- demon purchase (auto-assign; sacrifice when pit is full & all manned) ----
function openMachineForDemon(){ return machines.find(m => !m.assignedDemon) || null; }
function placeDemon(type, cost)   // assumes an open machine exists; pushes exactly once
{
    const target = openMachineForDemon(); if (!target) return;
    cash -= cost;
    demonsBought[type] = (demonsBought[type] || 0) + 1;
    demons.push(new Demon(type, target));   // Demon ctor sets target.assignedDemon; we push here
    unlockMedal(2);                          // Hired Help (first demon)
    saveGame();
}
function sacrificeOldest()
{
    const d = demons.shift(); if (!d) return;
    if (d.machine) d.machine.assignedDemon = null;
    d.destroy();
    ++stats.sacrifices;
    unlockMedal(3);                          // Sacrifice (first banish)
}
function buyDemon(type)
{
    const cost = demonCost(type);
    if (!canAfford(cost)) return;
    if (openMachineForDemon()) { placeDemon(type, cost); return; }
    // no open machine:
    if (machines.length < pitCapacity)         // room to add a machine, then place
    {
        spawnMachine();
        placeDemon(type, cost);
        return;
    }
    // pit full AND all manned -> sacrifice prompt
    if (demons.length > 0)
        showConfirmDialog({ message:'The pit is full. Banish a demon to make room for ' + DEMON_TYPES[type].name + '?',
            title:'SACRIFICE', icon:'🔥',
            onYes: () => { sacrificeOldest(); placeDemon(type, cost); } });
}

///////////////////////////////////////////////////////////////////////////////
// DOCKED SHOP PANEL (HTML/CSS, anchored top-right)
// An always-visible DOM panel — deliberately NOT a menus.js menu — so it never
// pauses the game: demons keep draining and machines keep spinning while you
// shop. Buttons mirror the economy fns; refreshShopPanel() updates live $costs
// and disabled state every frame (called from gameRenderPost, which runs even
// when a modal menu has paused gameUpdate). The pointerOverShop flag gates
// canvas input so clicks on the panel don't also spin/pan the board behind it.

let shopPanel = null, shopButtons = [], pointerOverShop = false;

function buildShopPanel()
{
    const style = document.createElement('style');
    style.textContent =
        '#slot-shop{position:fixed;top:58px;right:8px;width:212px;max-height:calc(100vh - 70px);' +
        'overflow-y:auto;box-sizing:border-box;padding:10px;background:rgba(20,0,16,.92);' +
        'border:2px solid #f0a;border-radius:12px;font-family:sans-serif;color:#fff;z-index:5;' +
        'user-select:none;display:none;flex-direction:column;gap:6px;box-shadow:0 0 16px #000;}' +
        '#slot-shop .shop-title{font-weight:bold;text-align:center;letter-spacing:2px;color:#f0a;' +
        'font-size:18px;margin-bottom:2px;}' +
        '#slot-shop .shop-div{height:1px;background:rgba(255,0,170,.3);margin:3px 0;}' +
        '#slot-shop button{display:block;width:100%;box-sizing:border-box;padding:8px 6px;' +
        'background:#3a0a2e;color:#fff;border:1px solid rgba(255,0,170,.4);border-radius:8px;' +
        'font:inherit;font-size:13px;cursor:pointer;text-align:left;}' +
        '#slot-shop button:hover:not(:disabled){background:#5a1046;}' +
        '#slot-shop button:disabled{opacity:.4;cursor:default;}';
    document.head.appendChild(style);

    shopPanel = document.createElement('div');
    shopPanel.id = 'slot-shop';
    const title = document.createElement('div');
    title.className = 'shop-title';
    title.textContent = 'SHOP';
    shopPanel.appendChild(title);

    // entry: {label, cost(): number|null, act(), disabled?(): bool} or {div:true}
    const entries = [
        { label:'Buy Machine',   cost:() => machineCost(), act: buyMachine },
        { label:'Expand Pit +5', cost:() => pitCost(),     act: expandPit },
        { div:true },
        ...Object.keys(DEMON_TYPES).map(key => ({
            label:'Buy ' + DEMON_TYPES[key].name, cost:() => demonCost(key), act:() => buyDemon(key) })),
        { div:true },
        { label:'Level Up', cost:() => { const m = cheapestLevelMachine(); return m ? levelCost(m) : null; }, act: levelUpMachine },
        { label:'Buy Wild', cost:() => { const m = cheapestWildMachine(); return m ? wildCost(m) : null; }, act: buyWild },
        { label:'Sell Machine (50%)', cost:() => null, act: sellMachine, disabled:() => machines.length <= 1 },
    ];

    shopButtons = [];
    for (const e of entries)
    {
        if (e.div) { const d = document.createElement('div'); d.className = 'shop-div'; shopPanel.appendChild(d); continue; }
        const btn = document.createElement('button');
        btn.addEventListener('click', () => { e.act(); refreshShopPanel(); });
        shopPanel.appendChild(btn);
        shopButtons.push({ btn, e });
    }

    // Keep panel interaction from leaking to the canvas (spin/pan): pointerOverShop
    // (checked in gameUpdate) is the reliable guard; stopPropagation is a belt-and-
    // suspenders backstop for any document-level listeners.
    shopPanel.addEventListener('pointerenter', () => pointerOverShop = true);
    shopPanel.addEventListener('pointerleave', () => pointerOverShop = false);
    shopPanel.addEventListener('pointerdown', e => e.stopPropagation());
    document.body.appendChild(shopPanel);
}

function refreshShopPanel()
{
    if (!shopPanel) return;
    // Visible only during active play and when no modal menu (options/title/
    // dialog) is up — modals pause the game and would overlap the panel.
    const show = isPlaying() && !isMenuVisible();
    shopPanel.style.display = show ? 'flex' : 'none';
    if (!show) return;
    for (const { btn, e } of shopButtons)
    {
        const c = e.cost ? e.cost() : null;
        btn.textContent = c == null ? e.label : `${e.label} ($${c})`;
        btn.disabled = e.disabled ? e.disabled() : (c == null || !canAfford(c));
    }
}

///////////////////////////////////////////////////////////////////////////////
// setMenuVisibilityCallback drives `paused` for every menus.js menu (title,
// options, medals, about, dialogs), so opening any of those freezes the world.
// The docked shop panel is plain DOM, NOT a menu, so it does NOT pause the game.
// Gameplay code gates on isPlaying() from menus.js.

async function gameInit()
{
    // Primes the unified save blobs. Must come before any menu construction
    // so persist: items can read their stored values on init.
    saveDataInit('SlotDemon');

    // Build the procedural sprite atlas (demons + symbol/wild emoji tiles).
    buildSprites();

    // Gameplay sfx (SoundGenerator — gameplay audio per project rules).
    buildSounds();

    // Dark red-black hellish backdrop for the pit.
    canvasClearColor = hsl(0, .3, .06);

    // Match the engine's master volume to whatever the options slider starts at,
    // so the very first menu sound plays at the user-visible volume.
    setSoundVolume(.8);

    // One callback drives `paused` for every menu, including dialogs.
    setMenuVisibilityCallback(v => paused = v);

    // ----- global UI sounds (LittleJS Sound class wraps zzfx params and
    //       routes through the engine's audio system, so master volume,
    //       muting, and user-gesture gating all just work). -----
    const sound_select   = new Sound([.5,,910,,,.02,2,.07,-5,-33,,,,,,,,.25]);
    const sound_activate = new Sound([.7,,30,.01,,.02,1,3.4,94,,,,,,,,,.67]);
    setMenuSounds({
        select:   () => sound_select.play(),
        activate: () => sound_activate.play(),
    });

    // No title screen — Slot Demon boots straight into play (see setPlaying at
    // the end of gameInit). The only menu is OPTIONS, opened from the toolbar ☰,
    // which links out to MEDALS and ABOUT.

    // ----- medals menu (grid demo + MenuMedal integration) -----
    // MenuMedal extends LittleJS's Medal — same persistence, same `medals`
    // map registration, but unlock() fires a DOM toast (top-left) instead
    // of pushing to the engine's canvas display queue.
    const allMedals = [
        new MenuMedal(0, 'First Win',  'Win your first spin.',        '🏆'),
        new MenuMedal(1, 'Jackpot',    'Hit the demon jackpot.',      '😈'),
        new MenuMedal(2, 'Hired Help', 'Summon your first demon.',    '👹'),
        new MenuMedal(3, 'Sacrifice',  'Banish a demon to the void.', '🔥'),
    ];
    medalsInit('SlotDemon');   // loads `unlocked` from localStorage

    const medalCellOf = m => ({
        icon: m.icon, label: m.name, title: m.description, earned: m.unlocked,
        onClick: () => showAlertDialog({title: m.name, icon: m.icon, message: m.description}),
    });

    createMenu({
        id: 'medals',
        title: 'MEDALS',
        // Re-sync the grid each time the menu opens so newly-unlocked
        // medals show as "earned" without needing a full rebuild.
        onShow: () =>
        {
            const grid = getMenu('medals').getItem('medalGrid');
            allMedals.forEach((m, i) => grid.setCell(i, {earned: m.unlocked}));
        },
        onHide: popMenu,
        items: [
            {type:'grid', id:'medalGrid', columns:2, cells: allMedals.map(medalCellOf)},
            {type:'separator'},
            {type:'button', label:'BACK', onClick: () => hideMenu('medals')},
        ],
    });

    // ----- options menu (the only menu; opened from the toolbar ☰) -----
    // `persist:'key'` on slider/checkbox auto-loads from localStorage on init
    // and auto-saves on change; onChange also fires once at init with the
    // resolved value so the effect (setSoundVolume / setScreenShakeEnabled)
    // applies the saved value immediately. MEDALS / ABOUT are pushed as sub-menus.
    createMenu({
        id: 'options',
        title: 'OPTIONS',
        onHide: popMenu,
        items: [
            {type:'slider',   id:'volume', label:'VOLUME',       value: 0.8, min:0, max:1,
                persist:'volume',
                onChange: v => setSoundVolume(v)},
            {type:'separator'},
            {type:'checkbox', id:'shake',  label:'SCREEN SHAKE', value: true,
                persist:'shake',
                onChange: v => setScreenShakeEnabled(v)},
            {type:'button',   label:'FULLSCREEN', onClick: toggleFullscreen},
            {type:'separator'},
            {type:'button',   label:'MEDALS', onClick: () => pushMenu('medals')},
            {type:'button',   label:'ABOUT',  onClick: () => pushMenu('about')},
            {type:'separator'},
            // Explicit progress wipe. newGame() resets state, saveGame() persists
            // the fresh state over the old blob.
            {type:'button',   label:'RESET GAME', title:'Erase all progress and start over',
                onClick: () => showConfirmDialog({
                    message:'Erase all progress and start over?', title:'RESET', icon:'⚠️',
                    onYes: () => { newGame(); saveGame(); } })},
            {type:'separator'},
            {type:'button',   label:'BACK',       onClick: () => hideMenu('options')},
        ],
    });

    // ----- about menu (demos the `text` item: wrapping multi-line paragraph) -----
    createMenu({
        id: 'about',
        title: 'ABOUT',
        onHide: popMenu,
        items: [
            {type:'label', text:'SLOT DEMON'},
            {type:'text',  text:'Run a casino in Hell. Click machines to spin, ' +
                'then buy demons to work the reels for you. Expand the pit, level ' +
                'up machines, and build an infernal money engine.'},
            {type:'separator'},
            {type:'button', label:'BACK', onClick: () => hideMenu('about')},
        ],
    });

    // ----- docked shop panel (HTML/CSS, anchored top-right, ALWAYS visible
    // during play). It's a DOM panel rather than a menus.js menu so it does NOT
    // pause the game — demons keep draining and machines keep spinning while you
    // shop. Built/refreshed by buildShopPanel()/refreshShopPanel(). -----
    buildShopPanel();

    // ----- toolbar (mute / fullscreen / menu, top-right) -----
    // No pause menu — an idle game has no reason to pause. The ☰ button opens
    // OPTIONS (volume, shake, medals, about, reset), and closes any open menu
    // when one is up. mute + fullscreen are the standard helpers.
    installDefaultToolbar({
        onHamburger: () =>
        {
            if (isMenuVisible()) { clearSubmenuStack(); hideAllMenus(); }
            else if (isPlaying()) showMenu('options');
        },
    });

    // Restore saved progress (or start fresh if there's no save). Options
    // (volume/shake) are restored separately by the menu persist: items.
    loadGame();

    // ----- live-balancing tweakables (press ~ to toggle the panel) -----
    // Expose BALANCE on window so tweak() dotted paths resolve to the SAME
    // object the game reads each frame. (getByPath in tweakables.js resolves
    // via indirect eval, which would already see the top-level `const BALANCE`,
    // but window.BALANCE makes the binding explicit and guaranteed.) These
    // three fields are READ from BALANCE every frame and never reassigned, so
    // panel edits take effect live.
    window.BALANCE = BALANCE;

    // Dev cheat: type giveMoney() in the browser console (or giveMoney(50000)
    // for a specific amount). Adds cash and saves so it persists.
    window.giveMoney = (amount = 100000) => { cash += amount; saveGame(); return cash; };

    tweakDivider('Slot Demon');
    tweak('BALANCE.decayRate',    {min:0.005, max:0.2});
    tweak('BALANCE.spinInterval', {min:0.2,   max:3});
    tweak('BALANCE.payoutBase',   {min:1,     max:20});
    tweakEngineDefaults();

    // Autosave cadence: while playing, persist every couple seconds (explicit
    // purchases also save immediately; this mainly catches win cash).
    saveTimer = new Timer(2);

    // No title screen — boot straight into the game.
    setPlaying(true);
}

///////////////////////////////////////////////////////////////////////////////
function gameUpdate()
{
    // No pause: an idle game has no reason to pause, so there's no pause key.
    if (!isPlaying()) return;

    // Press/hold/release: a click (spin/refresh) vs a drag (pan camera).
    // The action fires on RELEASE only when the cursor didn't move past the
    // drag threshold. screenToWorldDelta flips Y (x/scale, y/-scale), so the
    // formula cameraPos = startCam - worldDelta moves the board WITH the cursor
    // on both axes — verified, no per-axis adjustment needed.
    // pointerOverShop guard: don't arm a spin/pan when the press lands on the
    // docked DOM shop panel (its buttons handle their own clicks).
    if (mouseWasPressed(0) && !isMenuVisible() && !pointerOverShop)
    {
        panStartMouse = mousePosScreen.copy();
        panStartCam = cameraPos.copy();
        panMoved = false;
    }
    if (mouseIsDown(0) && panStartMouse)
    {
        const moved = mousePosScreen.subtract(panStartMouse);
        if (moved.length() > PAN_DRAG_PX) panMoved = true;
        if (panMoved)
        {
            // pan so the board follows the cursor: move camera opposite the drag.
            cameraPos = panStartCam.subtract(screenToWorldDelta(mousePosScreen.subtract(panStartMouse)));
            clampCamera();
        }
    }
    if (mouseWasReleased(0) && panStartMouse)
    {
        // Click a demon to refresh its energy; else click an UNMANNED machine to spin it.
        // Demons render above machines, so check demons FIRST.
        if (!panMoved && !isMenuVisible())
        {
            const d = demonAtPos(mousePos);
            if (d) d.refresh();
            else { const m = machineAtPos(mousePos); if (m && !m.assignedDemon) m.spin(); }   // spin() plays its own sfx
        }
        panStartMouse = null;
    }

    // advance floating win texts
    for (const f of floatTexts) { f.pos.y += timeDelta*2; f.life -= timeDelta; }
    floatTexts = floatTexts.filter(f => f.life > 0);

    // periodic autosave while playing (catches win cash between explicit saves)
    if (saveTimer.elapsed()) { saveGame(); saveTimer.set(2); }
}

function gameUpdatePost()
{
}

// Draw a framed recess for every pit slot (0..pitCapacity-1) so the player can
// always see how big the pit is and which slots are still open. Machines draw
// on top of their slots; empty slots show a faint "+".
function drawPit()
{
    for (let i=0;i<pitCapacity;++i)
    {
        const p = cellToPos(vec2(i%GRID_COLS, Math.floor(i/GRID_COLS)));
        drawRect(p, vec2(CELL.x*0.96, CELL.y*0.96), hsl(.85,.35,.18));   // slot frame
        drawRect(p, vec2(CELL.x*0.86, CELL.y*0.86), hsl(.85,.25,.09));   // recess
        if (i >= machines.length)                                        // open slot hint
            drawText('+', p, 2.5, hsl(.85,.3,.4));
    }
}

function gameRender()
{
    // Pit slots first (shows pit size + open slots), then machines on top.
    drawPit();
    machines.forEach(m => m.draw());

    // demons render above their machines (so clicks check demons first)
    demons.forEach(d => d.draw());

    // floating win texts (rise and fade)
    for (const f of floatTexts)
        drawText(f.text, f.pos, 1.2, new Color(f.color.r, f.color.g, f.color.b, f.life));
}

function gameRenderPost()
{
    // Refresh the docked DOM shop panel (live costs / disabled state / show-hide).
    // Done here (not gameUpdate) so it stays correct even while a modal menu has
    // paused gameUpdate — gameRenderPost runs every frame regardless of pause.
    refreshShopPanel();

    // Cash HUD — pinned to the top-LEFT (left-aligned so big numbers don't run
    // off the left edge), with the demon count stacked underneath. Drawn here in
    // screen pixels; a toolbar label can't live-update (menus.js only ticks menu
    // items, not toolbar items).
    if (isPlaying())
    {
        drawTextScreen('$' + Math.floor(cash), vec2(20, 36), 40,
            hsl(.13,1,.7), 4, BLACK, 'left');
        drawTextScreen('👹 ' + demons.length + (demons.length === 1 ? ' demon' : ' demons'),
            vec2(22, 74), 26, hsl(.13,.6,.85), 3, BLACK, 'left');
    }

    // Transient jackpot banner. An unset Timer reports elapsed()===false, so
    // the bannerText guard keeps it hidden until showBanner() first fires.
    if (bannerText && !bannerTimer.elapsed())
        drawTextScreen(bannerText, vec2(mainCanvasSize.x/2, mainCanvasSize.y*0.25), 80, hsl(.13,1,.6), 6, BLACK);
}

///////////////////////////////////////////////////////////////////////////////
engineInit(gameInit, gameUpdate, gameUpdatePost, gameRender, gameRenderPost);
</script></body></html>
