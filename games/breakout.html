<!DOCTYPE html><head>
<title>LittleJS Breakout</title>
<meta charset="utf-8">
</head><body style="background:#000">
<script src="../dist/littlejs.js?1.18.15"></script>
<script src="../templates/soundGenerator.js"></script>
<script src="../templates/menus.js"></script>
<script>
'use strict';

// engine settings, do not remove
debugWatermark = false;
showEngineVersion = false;
paused = false;

gravity = vec2(0, 0);
cameraPos = vec2(0, 0);
cameraScale = 32;

///////////////////////////////////////////////////////////////////////////////
// Breakout + Predictable Special Powerup Bricks

// world size
const levelSize = vec2(38, 20);

// brick types
const BRICK_NORMAL = 0;
const BRICK_SILVER = 1;
const BRICK_GOLD   = 2;

const BRICK_SCORE = [100, 200, 0]; // indexed by type

// Levels: each row is a string in left-to-right order. Characters:
//   . = empty
//   n = normal brick (color by row)
//   s = silver (2 hits)
//   g = gold (unbreakable)
// Grid is 18 wide (2-unit bricks across a 38-unit field with 1-unit walls).
// Up to 8 rows fit comfortably (top brick row at y=19, bottom at y=12).
const LEVELS = [
    // 1: Wall (8 rows of normal bricks)
    [
        'nnnnnnnnnnnnnnnnnn',
        'nnnnnnnnnnnnnnnnnn',
        'nnnnnnnnnnnnnnnnnn',
        'nnnnnnnnnnnnnnnnnn',
        'nnnnnnnnnnnnnnnnnn',
        'nnnnnnnnnnnnnnnnnn',
        'nnnnnnnnnnnnnnnnnn',
        'nnnnnnnnnnnnnnnnnn',
    ],
    // 2: Pyramid (widest at top, narrowing)
    [
        'nnnnnnnnnnnnnnnnnn',
        '.nnnnnnnnnnnnnnnn.',
        '..nnnnnnnnnnnnnn..',
        '...nnnnnnnnnnnn...',
        '....nnnnnnnnnn....',
        '.....nnnnnnnn.....',
        '......nnnnnn......',
        '.......nnnn.......',
    ],
    // 3: Castle (gold battlements frame normal interior)
    [
        'g.g.g.g.g.g.g.g.g.',
        'gggggggggggggggggg',
        'g.nnnnnnnnnnnnnn.g',
        'g.nnnnnnnnnnnnnn.g',
        'g.nnnnnnnnnnnnnn.g',
        'g.nnnnnnnnnnnnnn.g',
        'gggggggggggggggggg',
        '..................',
    ],
    // 4: Checkerboard of normal + silver
    [
        'nsnsnsnsnsnsnsnsns',
        'snsnsnsnsnsnsnsnsn',
        'nsnsnsnsnsnsnsnsns',
        'snsnsnsnsnsnsnsnsn',
        'nsnsnsnsnsnsnsnsns',
        'snsnsnsnsnsnsnsnsn',
        'nsnsnsnsnsnsnsnsns',
        'snsnsnsnsnsnsnsnsn',
    ],
    // 5: Gauntlet (maze of mixed bricks)
    [
        'gg..ssss....ssss..',
        'gg..snnnnnnnns....',
        '....snnnnnnnns..gg',
        'ssssnnnnnnnnnnssss',
        'snnnnnggggggnnnnnn',
        'snnnnnnnnnnnnnnnns',
        'ssss..nnnnnn..ssss',
        '....gg........gg..',
    ],
];

// tuning
const SPECIAL_BRICKS_PER_LEVEL = 8; // only these drop powerups
const PADDLE_BASE = vec2(6, .7);
const PADDLE_WIDEN_STEP = 1;
const PADDLE_WIDEN_MAX = 12;

const STICKY_DURATION = 10;
const LASER_DURATION = 10;
const FIREBALL_DURATION = 8;
const SLOW_DURATION = 10;
const SLOW_FACTOR = 0.65;

// menu / session state
let isPlaying = false;
let highScore = 0;

// game state
let paddlePos, paddleSize;
let paddleExtra = 0; // extra width from W powerup

let balls = [];      // {pos, vel, size, stuck, stuckOffsetX}
let bullets = [];    // {pos, vel, size}
let bricks = [];     // {pos, size, color, alive, special, dropType, type, hp, maxHp}
let powerups = [];   // {pos, vel, size, type}

let ballSpeed;
let score = 0;
let lives = 3;
let level = 1;   // 1..LEVELS.length
let wave  = 1;   // increments after clearing level LEVELS.length
const BALL_BASE_SPEED = 18;
let state = 'serve'; // serve | lose (otherwise playing)
let combo = 1;
let floatTexts = []; // {pos, vel, text, color, life, maxLife}

let shatter = [];        // {pos, size, color, life, maxLife}
let screenShake = 0;     // current magnitude
let shakeEnabled = true; // toggled via options (Task 7)
let paddleFlash = 0;     // 0..1, decays
const BALL_TRAIL_LEN = 8;

let stickyTimer = 0;
let laserTimer = 0;
let laserCooldown = 0;
let fireballTimer = 0;
let slowTimer = 0;

// sounds
let sfxBounce, sfxBrick, sfxLose, sfxWin, sfxPower, sfxLaser;


function applyPaddleWidth()
{
    const w = clamp(PADDLE_BASE.x + paddleExtra, PADDLE_BASE.x, PADDLE_WIDEN_MAX);
    paddleSize = vec2(w, PADDLE_BASE.y);
}

function makeBall(pos, vel, size = .8)
{
    return { pos: pos.copy(), vel: vel.copy(), size, stuck: false, stuckOffsetX: 0, trail: [] };
}

function anyStuckBalls()
{
    for (const b of balls)
        if (b.stuck) return true;
    return false;
}

function releaseStuckBalls()
{
    for (const b of balls)
    {
        if (!b.stuck) continue;
        b.stuck = false;

        // release direction based on where it stuck
        const offset = b.stuckOffsetX / (paddleSize.x / 2);
        const x = clamp(offset, -1, 1);
        b.vel = vec2(x * 1.2, 1).normalize(ballSpeed);
    }
}

function fireLaser()
{
    if (laserTimer <= 0 || laserCooldown > 0)
        return;

    const y = paddlePos.y + paddleSize.y / 2 + .25;
    const x1 = paddlePos.x - paddleSize.x / 2 + .35;
    const x2 = paddlePos.x + paddleSize.x / 2 - .35;
    const v = vec2(0, 26);

    bullets.push({ pos: vec2(x1, y), vel: v, size: vec2(.22, .7) });
    bullets.push({ pos: vec2(x2, y), vel: v, size: vec2(.22, .7) });

    laserCooldown = .14;
    sfxLaser.play();
}

// Resolve ball (AABB) vs rect (AABB). Mutates ball pos/vel.
function resolveBallRect(ball, rectPos, rectSize)
{
    if (!isOverlapping(ball.pos, vec2(ball.size), rectPos, rectSize))
        return;

    const halfB = ball.size / 2;
    const dx = ball.pos.x - rectPos.x;
    const dy = ball.pos.y - rectPos.y;
    const px = (rectSize.x / 2 + halfB) - abs(dx);
    const py = (rectSize.y / 2 + halfB) - abs(dy);

    if (px < py)
    {
        const sx = sign(dx) || 1;
        ball.pos.x += px * sx;
        ball.vel.x = abs(ball.vel.x) * sx;
    }
    else
    {
        const sy = sign(dy) || 1;
        ball.pos.y += py * sy;
        ball.vel.y = abs(ball.vel.y) * sy;
    }
}

function powerupColor(type)
{
    switch (type)
    {
        case 'W': return hsl(.58, .9, .6);   // blue
        case 'M': return hsl(.32, .9, .6);   // green
        case 'T': return hsl(.12, .9, .62);  // yellow
        case 'L': return hsl(0,   .9, .65);  // red
        case 'F': return hsl(.07, 1,  .55);  // orange
        case 'S': return hsl(.50, .85, .6);  // cyan
        case '1': return hsl(.85, .9, .65);  // pink (1UP — drawn as "1UP")
        default:  return hsl(0, 0, .8);
    }
}

function drawPowerLetter(pos, type, scale = 1)
{
    const text = type === '1' ? '1UP' : type;
    const size = (type === '1' ? .5 : .8) * scale;
    drawText(text, pos, size, hsl(0, 0, 1), .25, hsl(0, 0, 0), 'center');
}

function resetPaddle()
{
    paddleExtra = 0;
    applyPaddleWidth();
    paddlePos = vec2(levelSize.x / 2, 1.2);
}

function resetBall()
{
    balls.length = 0;
    bullets.length = 0;

    ballSpeed = ballSpeed || BALL_BASE_SPEED;
    const size = .8;
    const pos = paddlePos.add(vec2(0, paddleSize.y / 2 + size / 2 + .2));
    balls.push(makeBall(pos, vec2(0, 0), size));

    state = 'serve';
}

function launchBall()
{
    const angle = rand(.25, .75) * PI; // 45..135 degrees
    balls[0].vel = vec2(Math.cos(angle), Math.sin(angle)).normalize(ballSpeed);
}

function buildLevel()
{
    bricks.length = 0;

    const layout = LEVELS[(level - 1) % LEVELS.length];
    const rows = layout.length;
    const brickSize = vec2(2, 1);

    for (let r = 0; r < rows; ++r)
    {
        const row = layout[r];
        for (let c = 0; c < row.length; ++c)
        {
            const ch = row[c];
            if (ch === '.') continue;

            const x = 2 + c * 2;            // 1-unit left margin + half brick offset
            const y = levelSize.y - 1 - r;  // top row at y=19, descending

            let type = BRICK_NORMAL, hp = 1;
            if (ch === 's') { type = BRICK_SILVER; hp = 2; }
            else if (ch === 'g') { type = BRICK_GOLD; hp = Infinity; }

            // Color: normal bricks ramp by row (warm at top in original game,
            // but rows here are top-down — keep the same hue ramp).
            const t = percent(r, 0, rows - 1);
            const color = hsl(lerp(.05, .55, t), .9, .6);

            bricks.push({
                pos: vec2(x, y),
                size: brickSize,
                color,
                alive: true,
                special: false,
                dropType: '',
                type,
                hp,
                maxHp: hp,
            });
        }
    }

    // Specials: 4 + level + (wave-1)*2, capped at 16; pick from non-gold bricks.
    const targetSpecials = min(16, 4 + level + (wave - 1) * 2);
    const idx = [];
    for (let i = 0; i < bricks.length; ++i)
        if (bricks[i].type !== BRICK_GOLD)
            idx.push(i);

    // Fisher-Yates with engine RNG
    for (let i = idx.length - 1; i > 0; --i)
    {
        const j = randInt(i + 1);
        const t = idx[i]; idx[i] = idx[j]; idx[j] = t;
    }

    const n = min(targetSpecials, idx.length);
    for (let k = 0; k < n; ++k)
    {
        const b = bricks[idx[k]];
        b.special = true;
        const r = rand(100);
        b.dropType =
            r < 28 ? 'W' :
            r < 46 ? 'M' :
            r < 60 ? 'T' :
            r < 74 ? 'L' :
            r < 84 ? 'F' :
            r < 94 ? 'S' :
                    '1';
    }
}

function spawnPowerupFromBrick(brick)
{
    if (!brick.special || !brick.dropType)
        return;

    powerups.push({
        pos: brick.pos.copy(),
        vel: vec2(0, -7),
        size: vec2(1.2, .8),
        type: brick.dropType,
    });
}

function addShake(amount)
{
    if (shakeEnabled)
        screenShake = max(screenShake, amount);
}

function addShatter(brick)
{
    shatter.push({
        pos:     brick.pos.copy(),
        size:    brick.size.copy(),
        color:   brick.color,
        life:    0,
        maxLife: .15,
    });
}

// Returns true if the brick was destroyed this call.
function damageBrick(brick)
{
    if (brick.type === BRICK_GOLD)
    {
        sfxBounce.play();
        return false;
    }

    brick.hp--;
    if (brick.hp > 0)
    {
        sfxBounce.play();
        return false;
    }

    brick.alive = false;
    addShatter(brick);
    addShake(.05);

    const c = brick.color;
    new ParticleEmitter(
        brick.pos, 0,                    // pos, angle
        brick.size.scale(.8),            // emitSize (rect)
        .1,                              // emitTime (one short burst)
        140,                             // emitRate
        PI,                              // emitConeAngle (full)
        undefined,                       // tileInfo
        c, c,                            // colorStartA/B
        new Color(c.r, c.g, c.b, 0),     // colorEndA (fade alpha)
        new Color(c.r, c.g, c.b, 0),     // colorEndB
        .4,                              // particleTime
        .15, .05,                        // sizeStart, sizeEnd
        4,                               // speed
        0,                               // angleSpeed
        .95,                             // damping
        1,                               // angleDamping
        .3,                              // gravityScale (slight downward)
        PI,                              // particleConeAngle
        .1,                              // fadeRate
        .3,                              // randomness
        false,                           // collideTiles
        true,                            // additive
    );

    const base = BRICK_SCORE[brick.type];
    const gained = base * combo;
    score += gained;
    sfxBrick.play();
    spawnPowerupFromBrick(brick);

    if (combo >= 2)
    {
        floatTexts.push({
            pos: brick.pos.copy(),
            vel: vec2(0, 4),
            text: `x${combo}`,
            color: hsl(.12, 1, .7),
            life: 0,
            maxLife: .6,
        });
    }

    combo++;
    return true;
}

function applyPowerup(type)
{
    sfxPower.play();

    if (type === 'W')
    {
        paddleExtra = min(paddleExtra + PADDLE_WIDEN_STEP, PADDLE_WIDEN_MAX - PADDLE_BASE.x);
        applyPaddleWidth();
    }
    else if (type === 'M')
    {
        if (!balls.length)
            return;

        const src = balls[balls.length - 1];
        const baseDir = src.vel.length() ? src.vel.normalize() : vec2(0, 1);
        const a = baseDir.angle();
        balls.push(makeBall(src.pos, vec2(Math.cos(a + .35), Math.sin(a + .35)).normalize(ballSpeed), src.size));
        balls.push(makeBall(src.pos, vec2(Math.cos(a - .35), Math.sin(a - .35)).normalize(ballSpeed), src.size));
    }
    else if (type === 'T')
    {
        stickyTimer = STICKY_DURATION;
    }
    else if (type === 'L')
    {
        laserTimer = LASER_DURATION;
        laserCooldown = 0;
    }
    else if (type === 'F') fireballTimer = FIREBALL_DURATION;
    else if (type === 'S') slowTimer = SLOW_DURATION;
    else if (type === '1') lives++;
}

function resetRunState()
{
    powerups.length = 0;
    bullets.length = 0;
    floatTexts.length = 0;
    shatter.length = 0;
    paddleFlash = 0;
    stickyTimer = 0;
    laserTimer = 0;
    laserCooldown = 0;
    fireballTimer = 0;
    slowTimer = 0;
}

function advanceLevel()
{
    level++;
    if (level > LEVELS.length)
    {
        level = 1;
        wave++;
    }

    // Speed scales by wave only; resets to base when wave=1.
    ballSpeed = BALL_BASE_SPEED * Math.pow(1.10, wave - 1);

    combo = 1;
    resetRunState();
    // Keep paddleExtra and lives; new level should feel like progress, not reset.
    buildLevel();
    resetBall();
}

function resetGame()
{
    score = 0;
    lives = 3;
    level = 1;
    wave  = 1;
    state = 'serve';
    ballSpeed = BALL_BASE_SPEED;
    combo = 1;
    screenShake = 0;

    resetPaddle();
    resetRunState();
    buildLevel();
    resetBall();
}

function startNewGame()
{
    resetGame();
    isPlaying = true;
}

function backToTitle()
{
    isPlaying = false;
    clearSubmenuStack();
    hideAllMenus();
    // Reset for attract-mode rendering — a frozen world, not a black canvas.
    resetGame();
    isPlaying = false;
    const t = getMenu('title');
    if (t)
    {
        t.getItem('bestLabel')?.setLabel(`Best: ${highScore}`);
        showMenu('title');
    }
}

///////////////////////////////////////////////////////////////////////////////
async function gameInit()
{
    cameraPos = levelSize.scale(.5);

    sfxBounce = new SoundGenerator({ volume: .6, frequency: 400, release: .06, shapeCurve: 1.6 });
    sfxBrick  = new SoundGenerator({ volume: .7, frequency: 620, release: .08, slide: -1.2, shapeCurve: 1.2 });
    sfxLose   = new SoundGenerator({ volume: .8, frequency: 180, release: .25, slide: -1.0, noise: .1 });
    sfxWin    = new SoundGenerator({ volume: .8, frequency: 520, release: .35, slide: .6, pitchJump: 220, pitchJumpTime: .08 });
    sfxPower  = new SoundGenerator({ volume: .75, frequency: 740, release: .12, pitchJump: 260, pitchJumpTime: .03, shapeCurve: 1.1 });
    sfxLaser  = new SoundGenerator({ volume: .55, frequency: 980, release: .06, slide: 1.5, shapeCurve: 1.8 });

    highScore = parseInt(localStorage.getItem('breakout.highScore') || '0', 10);

    // One callback drives `paused` for every menu (including dialogs).
    setMenuVisibilityCallback(v => paused = v);

    // UI sounds
    const sound_select   = new Sound([.5,,910,,,.02,2,.07,-5,-33,,,,,,,,.25]);
    const sound_activate = new Sound([.7,,30,.01,,.02,1,3.4,94,,,,,,,,,.67]);
    setMenuSounds({
        select:   () => sound_select.play(),
        activate: () => sound_activate.play(),
    });

    createTitleMenu({
        id: 'title',
        title: 'BREAKOUT',
        subtitle: 'Clear all 5 levels, then loop with rising speed',
        revealOnClick: false,
        canReveal: () => !isPlaying,
        itemsBefore: [
            {type:'label', id:'bestLabel', text:`Best: ${highScore}`},
        ],
        items: [
            {type:'button', label:'OPTIONS', onClick: () => pushMenu('options')},
            {type:'button', label:'ABOUT',   onClick: () => pushMenu('about')},
        ],
        onPlay: startNewGame,
    });

    createMenu({
        id: 'options',
        title: 'OPTIONS',
        onHide: popMenu,
        items: [
            {type:'slider',   id:'sfxVol', label:'SFX VOLUME', value:.8, min:0, max:1,
                persist:'breakout.sfxVolume',
                onChange: v => setSoundVolume(v)},
            {type:'checkbox', id:'shake',  label:'SCREEN SHAKE', value:true,
                persist:'breakout.shake',
                onChange: v => shakeEnabled = v},
            {type:'separator'},
            {type:'button',   label:'BACK', onClick: () => hideMenu('options')},
        ],
    });

    createMenu({
        id: 'about',
        title: 'ABOUT',
        onHide: popMenu,
        items: [
            {type:'text', text:'A LittleJS breakout.\n\nMove the paddle with the mouse or A/D. ' +
                'Click or Space to launch, fire lasers, and release sticky balls.\n\n' +
                'Powerups: W=Wide M=Multi T=Sticky L=Laser F=Fire S=Slow 1UP=Life.'},
            {type:'separator'},
            {type:'button', label:'BACK', onClick: () => hideMenu('about')},
        ],
    });

    createMenu({
        id: 'pause',
        title: 'PAUSED',
        initialItemId: 'resume',
        items: [
            {type:'button', id:'resume',  label:'RESUME',  onClick: () => hideMenu('pause')},
            {type:'button', id:'options', label:'OPTIONS', onClick: () => pushMenu('options')},
            {type:'button', id:'quit',    label:'QUIT TO TITLE', onClick: () =>
            {
                showConfirmDialog({
                    message: 'Quit to title?',
                    onYes: backToTitle,
                });
            }},
        ],
    });

    // Build the attract-mode backdrop world (frozen bricks/paddle/ball
    // while the title is up), then show the title menu over it.
    resetGame();
    isPlaying = false;
    showMenu('title');
}

///////////////////////////////////////////////////////////////////////////////
function gameUpdate()
{
    const dt = timeDelta;

    if (!isPlaying)
        return;

    if (bindPauseKey({when: () => isPlaying && state !== 'lose'}))
        return;

    if (keyWasPressed('KeyR'))
        startNewGame();

    // paddle controls (keyboard overrides mouse)
    const left  = keyIsDown('ArrowLeft') || keyIsDown('KeyA');
    const right = keyIsDown('ArrowRight') || keyIsDown('KeyD');
    const dir = (right ? 1 : 0) - (left ? 1 : 0);

    if (dir)
        paddlePos.x += dir * 24 * dt;
    else
        paddlePos.x = mousePos.x;

    paddlePos.x = clamp(paddlePos.x, paddleSize.x / 2, levelSize.x - paddleSize.x / 2);

    // timers
    if (stickyTimer > 0) stickyTimer = max(0, stickyTimer - dt);
    if (laserTimer  > 0) laserTimer  = max(0, laserTimer  - dt);
    if (laserCooldown > 0) laserCooldown = max(0, laserCooldown - dt);
    if (fireballTimer > 0) fireballTimer = max(0, fireballTimer - dt);
    if (slowTimer     > 0) slowTimer     = max(0, slowTimer     - dt);

    // serve state keeps ball attached to paddle
    if (state === 'serve')
    {
        const b = balls[0];
        b.pos = paddlePos.add(vec2(0, paddleSize.y / 2 + b.size / 2 + .2));
        if (mouseWasPressed(0) || keyWasPressed('Space') || keyWasPressed('Enter'))
        {
            launchBall();
            state = 'play';
        }
        return;
    }

    if (state === 'lose')
        return;

    // action: if any stuck, release first; otherwise fire laser
    const actionPressed = mouseWasPressed(0) || keyWasPressed('Space') || keyWasPressed('Enter');
    if (actionPressed && anyStuckBalls())
        releaseStuckBalls();
    else if (actionPressed)
        fireLaser();

    updatePowerups(dt);
    updateBullets(dt);
    updateBalls(dt);
    updateFloatTexts(dt);
    updateJuice(dt);

    // level clear check (gold doesn't count — only breakable bricks)
    for (const b of bricks)
        if (b.alive && b.type !== BRICK_GOLD)
            return;

    sfxWin.play();
    advanceLevel();
}

function updateFloatTexts(dt)
{
    for (let i = floatTexts.length; i--;)
    {
        const t = floatTexts[i];
        t.life += dt;
        t.pos = t.pos.add(t.vel.scale(dt));
        if (t.life >= t.maxLife)
            floatTexts.splice(i, 1);
    }
}

function updateJuice(dt)
{
    if (screenShake > 0)
        screenShake = max(0, screenShake - dt * 1.5);

    if (paddleFlash > 0)
        paddleFlash = max(0, paddleFlash - dt * 6);

    for (let i = shatter.length; i--;)
    {
        const s = shatter[i];
        s.life += dt;
        if (s.life >= s.maxLife)
            shatter.splice(i, 1);
    }
}

function updatePowerups(dt)
{
    for (let i = powerups.length; i--;)
    {
        const p = powerups[i];
        p.pos = p.pos.add(p.vel.scale(dt));

        if (p.pos.y < -2)
        {
            powerups.splice(i, 1);
            continue;
        }

        if (isOverlapping(p.pos, p.size, paddlePos, paddleSize))
        {
            applyPowerup(p.type);
            addShake(.10);
            powerups.splice(i, 1);
        }
    }
}

function updateBullets(dt)
{
    for (let i = bullets.length; i--;)
    {
        const s = bullets[i];
        s.pos = s.pos.add(s.vel.scale(dt));

        if (s.pos.y > levelSize.y + 2)
        {
            bullets.splice(i, 1);
            continue;
        }

        for (const b of bricks)
        {
            if (!b.alive) continue;
            if (!isOverlapping(s.pos, s.size, b.pos, b.size))
                continue;

            if (b.type === BRICK_GOLD)
            {
                bullets.splice(i, 1);
                break;
            }
            damageBrick(b);
            bullets.splice(i, 1);
            break;
        }
    }
}

function updateBalls(dt)
{
    for (const ball of balls)
    {
        // stuck balls ride the paddle
        if (ball.stuck)
        {
            ball.pos.x = clamp(paddlePos.x + ball.stuckOffsetX, ball.size / 2, levelSize.x - ball.size / 2);
            ball.pos.y = paddlePos.y + paddleSize.y / 2 + ball.size / 2 + .001;
            continue;
        }

        const effectiveSpeed = ballSpeed * (slowTimer > 0 ? SLOW_FACTOR : 1);
        if (ball.vel.length() > 0)
            ball.vel = ball.vel.normalize(effectiveSpeed);

        // Push trail BEFORE moving (gives a visible lag behind the ball)
        ball.trail.push(ball.pos.copy());
        if (ball.trail.length > BALL_TRAIL_LEN)
            ball.trail.shift();

        ball.pos = ball.pos.add(ball.vel.scale(dt));
        const r = ball.size / 2;

        // walls
        if (ball.pos.x - r < 0) { ball.pos.x = r; ball.vel.x = abs(ball.vel.x); sfxBounce.play(); }
        else if (ball.pos.x + r > levelSize.x) { ball.pos.x = levelSize.x - r; ball.vel.x = -abs(ball.vel.x); sfxBounce.play(); }
        if (ball.pos.y + r > levelSize.y) { ball.pos.y = levelSize.y - r; ball.vel.y = -abs(ball.vel.y); sfxBounce.play(); }

        // paddle (only if moving down)
        if (ball.vel.y < 0 && isOverlapping(ball.pos, vec2(ball.size), paddlePos, paddleSize))
        {
            if (stickyTimer > 0)
            {
                ball.stuck = true;
                ball.stuckOffsetX = clamp(ball.pos.x - paddlePos.x, -paddleSize.x / 2 + r, paddleSize.x / 2 - r);
                ball.vel = vec2(0, 0);
                ball.pos.y = paddlePos.y + paddleSize.y / 2 + r + .001;
                combo = 1;
                paddleFlash = 1;
                sfxBounce.play();
            }
            else
            {
                ball.pos.y = paddlePos.y + paddleSize.y / 2 + r + .001;
                const offset = (ball.pos.x - paddlePos.x) / (paddleSize.x / 2);
                const x = clamp(offset, -1, 1);
                ball.vel = vec2(x * 1.2, 1).normalize(effectiveSpeed);
                combo = 1;
                paddleFlash = 1;
                sfxBounce.play();
            }
        }

        // bricks (one hit per ball per frame)
        for (const b of bricks)
        {
            if (!b.alive) continue;
            if (!isOverlapping(ball.pos, vec2(ball.size), b.pos, b.size))
                continue;

            if (fireballTimer > 0 && b.type !== BRICK_GOLD)
            {
                // Fireball: destroy normal AND silver in one hit, no bounce.
                // Gold falls through to the normal resolveBallRect bounce below.
                b.hp = 1;     // force damageBrick to destroy in one tick
                damageBrick(b);
                continue;     // keep flying through the row
            }

            resolveBallRect(ball, b.pos, b.size);
            damageBrick(b);
            ball.vel = ball.vel.normalize(effectiveSpeed);
            break;
        }
    }

    // remove balls that fell out
    for (let i = balls.length; i--;)
        if (!balls[i].stuck && balls[i].pos.y + balls[i].size / 2 < 0)
            balls.splice(i, 1);

    // lose life if no balls remain
    if (!balls.length)
    {
        lives--;
        combo = 1;
        sfxLose.play();
        addShake(.40);

        if (lives <= 0)
        {
            state = 'lose';
            isPlaying = false;

            const isNewBest = score > highScore;
            if (isNewBest)
            {
                highScore = score;
                localStorage.setItem('breakout.highScore', String(highScore));
            }

            const msg = isNewBest
                ? `New best! ${score}`
                : `Final score: ${score}\nBest: ${highScore}`;
            showAlertDialog({
                title: 'GAME OVER',
                icon: '💥',
                message: msg,
                onOk: backToTitle,
            });
            return;
        }

        // death resets paddle size + temporary powers
        paddleExtra = 0;
        applyPaddleWidth();
        resetRunState();
        resetBall();
    }
}

///////////////////////////////////////////////////////////////////////////////
function gameUpdatePost()
{
    cameraPos = levelSize.scale(.5);
    if (screenShake > 0)
        cameraPos = cameraPos.add(vec2(rand(-1, 1), rand(-1, 1)).scale(screenShake));

    const fit = min(mainCanvasSize.x / levelSize.x, mainCanvasSize.y / levelSize.y);
    cameraScale = fit * .95;
}

///////////////////////////////////////////////////////////////////////////////
function gameRender()
{
    // background
    drawRect(cameraPos, levelSize.scale(3), rgb(.05, .05, .07));
    drawRect(cameraPos, levelSize, rgb(.08, .08, .11));

    // bricks
    for (const b of bricks)
    {
        if (!b.alive) continue;

        const inset = b.size.subtract(vec2(.08, .08));
        if (b.type === BRICK_GOLD)
        {
            drawRect(b.pos, b.size.subtract(vec2(.02, .02)), hsl(.13, .85, .55));
            drawRect(b.pos, inset, hsl(.13, .95, .7));
        }
        else if (b.type === BRICK_SILVER)
        {
            const damaged = b.hp < b.maxHp;
            drawRect(b.pos, b.size.subtract(vec2(.02, .02)), hsl(0, 0, damaged ? .35 : .55));
            drawRect(b.pos, inset, hsl(0, 0, damaged ? .55 : .82));
        }
        else if (b.special)
        {
            const pulse = 1 + .03 * Math.sin(time * 6 + b.pos.x);
            const frame = powerupColor(b.dropType);
            drawRect(b.pos, b.size.subtract(vec2(.02, .02)).scale(pulse), frame);
            drawRect(b.pos, inset.scale(pulse), b.color);
            drawPowerLetter(b.pos, b.dropType, pulse);
        }
        else
            drawRect(b.pos, inset, b.color);
    }

    // shatter (fading destroyed bricks)
    for (const s of shatter)
    {
        const k = 1 - s.life / s.maxLife;
        const c = s.color.copy();
        c.a = k;
        drawRect(s.pos, s.size.scale(k), c);
    }

    // powerups
    for (const p of powerups)
    {
        const pulse = 1 + .15 * Math.sin(time * 8);
        const c = powerupColor(p.type);
        drawRect(p.pos, p.size.scale(1.4 * pulse), new Color(c.r, c.g, c.b, .25));
        drawRect(p.pos, p.size, c);
        drawPowerLetter(p.pos, p.type);
    }

    // bullets
    for (const s of bullets)
        drawRect(s.pos, s.size, hsl(0, 0, 1));

    // paddle
    let paddleCol = stickyTimer > 0 ? hsl(.12, .75, .75) :
                    laserTimer > 0 ? hsl(0, .75, .72) :
                                     hsl(0, 0, .95);
    if (paddleFlash > 0)
    {
        const k = paddleFlash;
        paddleCol = new Color(
            lerp(paddleCol.r, 1, k),
            lerp(paddleCol.g, 1, k),
            lerp(paddleCol.b, 1, k),
            1,
        );
    }
    drawRect(paddlePos, paddleSize, paddleCol);

    // balls
    for (const b of balls)
    {
        for (let i = 0; i < b.trail.length; ++i)
        {
            const k = (i + 1) / (b.trail.length + 1);
            drawCircle(b.trail[i], b.size * k, hsl(.12, .9, .6, k * .4));
        }

        const ballColor =
            fireballTimer > 0 ? hsl(.07, 1, .6) :
            slowTimer     > 0 ? hsl(.50, .9, .7) :
                                hsl(.12, .9, .6);
        drawCircle(b.pos, b.size, ballColor);
    }

    // floating combo text
    for (const t of floatTexts)
    {
        const k = 1 - t.life / t.maxLife;
        const c = t.color.copy();
        c.a = k;
        drawText(t.text, t.pos, .9, c, .2, hsl(0, 0, 0, k), 'center');
    }
}

///////////////////////////////////////////////////////////////////////////////
function gameRenderPost()
{
    if (isPlaying && state === 'serve')
    {
        drawTextScreen(`Click or Space to launch`,
            vec2(mainCanvasSize.x / 2, mainCanvasSize.y - 70), 36,
            hsl(0, 0, 1), 6, hsl(0, 0, 0));
    }

    if (isPlaying)
    {
        drawTextScreen(`Score ${score}`, vec2(16, 16), 28, hsl(0, 0, 1), 4, hsl(0, 0, 0), 'left');
        drawTextScreen(`Wave ${wave}  Level ${level}/${LEVELS.length}`,
            vec2(mainCanvasSize.x / 2, 16), 24, hsl(0, 0, 1), 4, hsl(0, 0, 0));
        drawTextScreen(`Lives ${lives}`, vec2(mainCanvasSize.x - 16, 16), 28, hsl(0, 0, 1), 4, hsl(0, 0, 0), 'right');

        if (combo >= 2)
        {
            drawTextScreen(`x${combo} COMBO`,
                vec2(mainCanvasSize.x / 2, 80),
                32, hsl(.12, 1, .7), 4, hsl(0, 0, 0));
        }

        let status = '';
        if (paddleExtra > 0) status += `WIDE +${paddleExtra.toFixed(0)}   `;
        if (stickyTimer > 0) status += `STICKY ${stickyTimer.toFixed(0)}s   `;
        if (laserTimer  > 0) status += `LASER ${laserTimer.toFixed(0)}s   `;
        if (fireballTimer > 0) status += `FIRE ${fireballTimer.toFixed(0)}s   `;
        if (slowTimer   > 0) status += `SLOW ${slowTimer.toFixed(0)}s   `;
        if (balls.length > 1) status += `BALLS ${balls.length}`;
        if (status)
            drawTextScreen(status, vec2(mainCanvasSize.x / 2, 42), 22, hsl(0, 0, .95), 4, hsl(0, 0, 0));

        drawTextScreen(`W=Wide M=Multi T=Sticky L=Laser F=Fire S=Slow 1UP=Life`,
            vec2(mainCanvasSize.x / 2, mainCanvasSize.y - 18), 18, hsl(0, 0, .8), 4, hsl(0, 0, 0));

        if (laserTimer > 0)
            drawTextScreen(`Laser: Click/Space to shoot`, vec2(mainCanvasSize.x / 2, mainCanvasSize.y - 40), 18,
                hsl(0, 0, .9), 4, hsl(0, 0, 0));

        if (stickyTimer > 0)
            drawTextScreen(`Sticky: balls stick to paddle · Click/Space to release`, vec2(mainCanvasSize.x / 2, mainCanvasSize.y - 58), 18,
                hsl(0, 0, .9), 4, hsl(0, 0, 0));
    }
}

///////////////////////////////////////////////////////////////////////////////
engineInit(gameInit, gameUpdate, gameUpdatePost, gameRender, gameRenderPost);

</script>
