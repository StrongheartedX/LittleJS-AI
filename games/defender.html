<script>
'use strict';

debugWatermark = false;
showEngineVersion = false;
paused = false;

gravity = vec2(0, 0);
cameraPos = vec2(0, 0);
cameraScale = 24;
canvasMaxSize = vec2(2048, 2048);
canvasClearColor = new Color(0, 0, 0.03);

///////////////////////////////////////////////////////////////////////////////
// Defender constants
const WORLD_W = 220;     // wrap-around horizontal world size (world units)
const SKY_TOP = 22;      // ceiling (world units, +y is up)
const GROUND_Y = -14;    // baseline terrain height
const HUMAN_COUNT = 10;
const RADAR_H_SCREEN = 80;     // radar height in screen-space pixels
const RADAR_MARGIN = 12;
const EXTRA_LIFE_EVERY = 10000;

///////////////////////////////////////////////////////////////////////////////
// Game state
let score, lives, smartBombs, wave, nextExtra;
let humansAlive, planetDestroyed, mutantWavesLeft;
let isPlaying, gameOver;
let player;
let enemies, bullets, humans, particles;
let terrain;             // array of terrain heights along world X
let stars;               // pre-generated starfield: [{x, y, b, s, phase}, ...]
let baiterTimer;
let bombFlash;           // 0..1 white flash after smart bomb
let shakeTimer;
let spawnTimer;          // staggered spawns at wave start
let pendingSpawns;       // queue of enemies to spawn

///////////////////////////////////////////////////////////////////////////////
// Sounds
let sfxShoot, sfxExplode, sfxEnemyShoot, sfxLanderGrab, sfxSaved, sfxBomb,
    sfxHyper, sfxPickup, sfxThrust, sfxMutate, sfxExtraLife, sfxAlarm;

function initSounds()
{
    sfxShoot      = new SoundGenerator({volume:.4, frequency:1200, attack:.005, release:.05, slide:-3, shapeCurve:0});
    sfxExplode    = new SoundGenerator({volume:.6, frequency:80, attack:.02, release:.4, noise:.8, slide:-.5});
    sfxEnemyShoot = new SoundGenerator({volume:.3, frequency:600, attack:.005, release:.06, slide:1, shapeCurve:0});
    sfxLanderGrab = new SoundGenerator({volume:.4, frequency:400, attack:.01, release:.2, repeatTime:.04, pitchJump:200, pitchJumpTime:.02});
    sfxSaved      = new SoundGenerator({volume:.5, frequency:440, attack:.01, release:.3, pitchJump:880, pitchJumpTime:.1});
    sfxBomb       = new SoundGenerator({volume:.8, frequency:60, attack:.05, release:1.0, noise:.6, slide:-.2});
    sfxHyper      = new SoundGenerator({volume:.5, frequency:200, attack:.02, release:.4, slide:3, noise:.3});
    sfxPickup     = new SoundGenerator({volume:.4, frequency:660, attack:.01, release:.15, pitchJump:330, pitchJumpTime:.05});
    sfxThrust     = new SoundGenerator({volume:.05, frequency:120, attack:.01, release:.08, noise:.5});
    sfxMutate     = new SoundGenerator({volume:.5, frequency:200, attack:.05, release:.3, repeatTime:.08, pitchJump:300, pitchJumpTime:.04});
    sfxExtraLife  = new SoundGenerator({volume:.6, frequency:660, attack:.01, release:.3, pitchJump:330, pitchJumpTime:.1, repeatTime:.15});
    sfxAlarm      = new SoundGenerator({volume:.3, frequency:880, attack:.01, release:.15, slide:-2});
}

///////////////////////////////////////////////////////////////////////////////
// Wrap helpers (world wraps horizontally around WORLD_W)
function wrapX(x) { return mod(x, WORLD_W); }
function wrapDX(toX, fromX)
{
    let d = toX - fromX;
    d -= Math.round(d / WORLD_W) * WORLD_W;
    return d;
}
function camDrawX(x) { return cameraPos.x + wrapDX(x, cameraPos.x); }
function dpos(p)     { return vec2(camDrawX(p.x), p.y); }

///////////////////////////////////////////////////////////////////////////////
// Terrain — jagged mountain ridgeline, wraps seamlessly
function genTerrain()
{
    terrain = [];
    const N = 440;
    // sum sines whose periods divide N so the ridgeline matches at the wrap seam
    for (let i = 0; i < N; i++)
    {
        const t = i / N * Math.PI * 2;
        const h = GROUND_Y +
            Math.sin(t * 3 + 0.5)  * 1.6 +
            Math.sin(t * 7 + 1.3)  * 1.0 +
            Math.sin(t * 13 + 2.1) * 0.6 +
            Math.sin(t * 22 + 0.7) * 0.3;
        terrain.push(h);
    }
}
function terrainAt(x)
{
    x = wrapX(x);
    const N = terrain.length;
    const f = (x / WORLD_W) * N;
    const i0 = Math.floor(f) % N;
    const i1 = (i0 + 1) % N;
    return lerp(terrain[i0], terrain[i1], f - Math.floor(f));
}

// Pre-generated starfield. Stars live in world space and wrap with the world.
// Each star has a `depth` in (0, 1] for parallax — 1.0 moves with the world,
// lower values appear further away and drift more slowly with the camera.
// Three discrete layers (far/mid/near) read cleaner than uniform depth.
const STAR_Y_LOW  = -16;     // a bit below the terrain trough
const STAR_Y_HIGH = SKY_TOP + 4;
const STAR_LAYERS = [
    {count: 240, depth: .25, sizeMul: .7,  brightMul: .55}, // far
    {count: 180, depth: .55, sizeMul: 1.0, brightMul: .8 }, // mid
    {count:  90, depth: 1.0, sizeMul: 1.3, brightMul: 1.0}, // near (move with world)
];
function genStars()
{
    stars = [];
    const rg = new RandomGenerator(8472);
    for (const layer of STAR_LAYERS)
    {
        for (let i = 0; i < layer.count; i++)
        {
            stars.push({
                x:         rg.float(0, WORLD_W),
                y:         rg.float(STAR_Y_LOW, STAR_Y_HIGH),
                b:         rg.float(.35, 1) * layer.brightMul,
                s:         rg.float(.05, .12) * layer.sizeMul,
                phase:     rg.float(0, Math.PI * 2),
                depth:     layer.depth,
            });
        }
    }
}

///////////////////////////////////////////////////////////////////////////////
// Particles for explosions
function spark(pos, count, color, speed = .4, life = .8)
{
    for (let i = 0; i < count; i++)
    {
        const a = rand(0, Math.PI * 2);
        const s = rand(speed * .3, speed);
        particles.push({
            pos: pos.copy(),
            vel: vec2(Math.cos(a) * s, Math.sin(a) * s),
            life: new Timer(life * rand(.6, 1.2)),
            color: color,
            size: rand(.15, .35),
        });
    }
}

///////////////////////////////////////////////////////////////////////////////
// Bullet — plain object, friendly or enemy
function spawnBullet(pos, vel, friendly, color, life = 1.0)
{
    bullets.push({
        pos: pos.copy(),
        vel: vel.copy(),
        friendly: friendly,
        life: new Timer(life),
        color: color,
    });
}

///////////////////////////////////////////////////////////////////////////////
// Player ship
class Player
{
    constructor()
    {
        this.pos = vec2(0, 5);
        this.size = vec2(2.8, 1.1);
        this.velocity = vec2();
        this.facing = 1;
        this.shootCool = new Timer();
        this.invincible = new Timer(2);
        this.dead = false;
        this.respawn = new Timer();
        this.holding = null;
        this.thrusting = false;
        this.hyperCool = new Timer();
    }

    update()
    {
        if (this.dead)
        {
            if (lives > 0 && this.respawn.elapsed())
                this.doRespawn();
            return;
        }

        const up    = keyIsDown('ArrowUp')    || keyIsDown('KeyW');
        const down  = keyIsDown('ArrowDown')  || keyIsDown('KeyS');
        const right = keyIsDown('ArrowRight') || keyIsDown('KeyD');
        const left  = keyIsDown('ArrowLeft')  || keyIsDown('KeyA');

        if (up)   this.velocity.y += .05;
        if (down) this.velocity.y -= .05;
        this.thrusting = false;
        if (right) { this.facing = 1;  this.velocity.x += .05; this.thrusting = true; }
        if (left)  { this.facing = -1; this.velocity.x -= .05; this.thrusting = true; }

        this.velocity.y *= .93;
        if (!this.thrusting) this.velocity.x *= .985;
        this.velocity = this.velocity.clampLength(.75);

        this.pos.x = wrapX(this.pos.x + this.velocity.x);
        this.pos.y += this.velocity.y;

        // Ground / ceiling bounds
        const ground = terrainAt(this.pos.x) + .9;
        if (this.pos.y < ground)
        {
            this.pos.y = ground;
            if (this.velocity.y < 0) this.velocity.y = 0;
            // Scraping the ground drops a held human
            if (this.holding) this.dropHuman();
        }
        if (this.pos.y > SKY_TOP)
        {
            this.pos.y = SKY_TOP;
            if (this.velocity.y > 0) this.velocity.y = 0;
        }

        // Fire
        if (keyIsDown('KeyZ') || keyIsDown('Space')) this.fire();
        // Smart bomb
        if (keyWasPressed('KeyX')) doSmartBomb();
        // Hyperspace
        if (keyWasPressed('KeyC')) doHyperspace();

        // Engine thrust sound (occasionally)
        if (this.thrusting && !(frame % 6)) sfxThrust.play(this.pos, .4, 1 + rand(-.1, .1));

        // Pick up falling humans
        if (!this.holding)
        {
            for (const h of humans)
            {
                if (h.dead || h.heldBy) continue;
                if (!h.falling) continue;
                if (Math.abs(wrapDX(this.pos.x, h.pos.x)) < 1.0 &&
                    Math.abs(this.pos.y - h.pos.y) < 1.0)
                {
                    this.holding = h;
                    h.heldBy = this;
                    h.falling = false;
                    sfxPickup.play();
                }
            }
        }
        if (this.holding)
        {
            // Carry below ship
            this.holding.pos = vec2(this.pos.x, this.pos.y - .9);
        }
    }

    dropHuman()
    {
        if (!this.holding) return;
        const h = this.holding;
        h.heldBy = null;
        h.standing = true;
        h.falling = false;
        h.pos = vec2(this.pos.x, terrainAt(this.pos.x) + .4);
        this.holding = null;
        addScore(500);
        sfxSaved.play();
    }

    fire()
    {
        if (this.shootCool.active()) return;
        this.shootCool.set(.09);
        const bx = this.pos.x + this.facing * 1.6;
        spawnBullet(vec2(bx, this.pos.y), vec2(this.facing * 1.6, 0),
            true, hsl(.14, 1, .7), .7);
        sfxShoot.play();
    }

    doRespawn()
    {
        this.dead = false;
        this.invincible.set(2.5);
        this.pos = vec2(cameraPos.x, 6);
        this.velocity = vec2();
        this.holding = null;
    }

    die()
    {
        if (this.dead || this.invincible.active()) return;
        this.dead = true;
        this.respawn.set(2);
        spark(this.pos, 40, hsl(.55, .8, .7), .6, 1.2);
        spark(this.pos, 20, hsl(.13, 1, .7), .8, 1.0);
        sfxExplode.play();
        shakeTimer.set(.4);
        if (this.holding)
        {
            this.holding.heldBy = null;
            this.holding.falling = true;
            this.holding = null;
        }
        lives--;
        if (lives <= 0)
        {
            // Wait for explosion fade then game over
            setTimeout(doGameOver, 1500);
        }
    }

    render()
    {
        if (this.dead) return;
        const p = this.pos;
        const f = this.facing;
        const blink = this.invincible.active() && (Math.floor(time * 18) % 2);
        if (blink) return;
        const dp = dpos(p);
        const bodyCol = hsl(.55, .3, .85);
        // body
        drawRect(dp.add(vec2(-f * .2, 0)), vec2(2.2, .35), bodyCol);
        // pointed nose
        drawRect(dp.add(vec2(f * 1.2, 0)), vec2(.6, .2), hsl(.13, 1, .7));
        drawRect(dp.add(vec2(f * 1.5, 0)), vec2(.3, .1), hsl(.13, 1, .8));
        // cockpit
        drawRect(dp.add(vec2(-f * .5, .35)), vec2(.7, .35), bodyCol);
        drawRect(dp.add(vec2(-f * .5, .45)), vec2(.4, .15), hsl(.55, 1, .6));
        // wing under
        drawRect(dp.add(vec2(-f * .1, -.3)), vec2(1.8, .2), hsl(.55, .2, .55));
        // engine
        if (this.thrusting && (frame % 2))
        {
            drawRect(dp.add(vec2(-f * 1.4, 0)), vec2(.7, .25), hsl(.05, 1, .6));
            drawRect(dp.add(vec2(-f * 1.7, 0)), vec2(.4, .15), hsl(.15, 1, .8));
        }
        // held human
        if (this.holding) drawHumanFigure(this.holding.pos);
    }
}

///////////////////////////////////////////////////////////////////////////////
// Human figure helper (used by held human render too)
function drawHumanFigure(p)
{
    const dp = dpos(p);
    drawRect(dp.add(vec2(0, -.1)), vec2(.25, .5), hsl(.07, .8, .7));
    drawRect(dp.add(vec2(0, .3)), vec2(.3, .25), hsl(.6, .4, .4)); // shirt
    drawCircle(dp.add(vec2(0, .55)), .3, hsl(.07, .9, .85));        // head
}

///////////////////////////////////////////////////////////////////////////////
// Human civilian
class Human
{
    constructor(x)
    {
        this.pos = vec2(x, terrainAt(x) + .4);
        this.velocity = vec2();
        this.walking = false;
        this.standing = true;
        this.heldBy = null;
        this.falling = false;
        this.dead = false;
        this.walkDir = randSign();
        this.walkTimer = new Timer(rand(1, 3));
    }

    update()
    {
        if (this.dead || this.heldBy) return;

        if (this.falling)
        {
            this.velocity.y -= .03;
            this.pos.y += this.velocity.y;
            const g = terrainAt(this.pos.x) + .4;
            if (this.pos.y <= g)
            {
                this.pos.y = g;
                if (this.velocity.y < -.35)
                {
                    // Splat
                    this.dead = true;
                    humansAlive--;
                    spark(this.pos, 8, hsl(0, 1, .6), .3, .6);
                    checkPlanetDestroyed();
                }
                else
                {
                    this.falling = false;
                    this.standing = true;
                }
                this.velocity.y = 0;
            }
            return;
        }

        // Walking on ground
        this.pos.y = terrainAt(this.pos.x) + .4;
        if (this.walkTimer.elapsed())
        {
            this.walking = !this.walking;
            this.walkTimer.set(rand(1, 3));
            if (this.walking) this.walkDir = randSign();
        }
        if (this.walking)
            this.pos.x = wrapX(this.pos.x + this.walkDir * .025);
    }

    render()
    {
        if (this.dead) return;
        if (this.heldBy && this.heldBy === player) return; // drawn by player render
        drawHumanFigure(this.pos);
    }
}

///////////////////////////////////////////////////////////////////////////////
// Lander — descends, grabs human, ascends to become a mutant
class Lander
{
    constructor(x, y)
    {
        this.pos = vec2(x, y);
        this.size = vec2(1.2, 1.1);
        this.velocity = vec2();
        this.color = hsl(.3, 1, .55);
        this.radarColor = hsl(.3, 1, .55);
        this.scoreValue = 150;
        this.type = 'lander';
        this.state = 'descend';
        this.target = null;
        this.shootCool = new Timer(rand(1.5, 4));
        this.dead = false;
        this.carrying = null;
    }

    findHuman()
    {
        let best = null, bd = 1e9;
        for (const h of humans)
        {
            if (h.dead || h.heldBy || h.falling) continue;
            const dx = Math.abs(wrapDX(h.pos.x, this.pos.x));
            if (dx < bd) { bd = dx; best = h; }
        }
        return best;
    }

    update()
    {
        if (this.state === 'descend')
        {
            if (!this.target || this.target.dead || this.target.heldBy || this.target.falling)
                this.target = this.findHuman();

            if (this.target)
            {
                const dx = wrapDX(this.target.pos.x, this.pos.x);
                this.velocity.x = clamp(dx * .05, -.06, .06);
                const groundClear = terrainAt(this.pos.x) + 1.3;
                if (this.pos.y > groundClear)
                    this.velocity.y = -.04;
                else
                    this.velocity.y = -.005;
                if (Math.abs(dx) < .5 && this.pos.y < groundClear + .5)
                {
                    // Grab!
                    this.carrying = this.target;
                    this.target.heldBy = this;
                    this.target.walking = false;
                    this.target.standing = false;
                    this.state = 'ascend';
                    sfxLanderGrab.play();
                }
            }
            else
            {
                // No humans left to grab; drift sideways looking
                this.velocity.x = .03;
                this.velocity.y = lerp(this.velocity.y, 0, .1);
            }
        }
        else if (this.state === 'ascend')
        {
            this.velocity.x = lerp(this.velocity.x, 0, .1);
            this.velocity.y = .045;
            if (this.carrying)
                this.carrying.pos = vec2(this.pos.x, this.pos.y - 1.1);
            if (this.pos.y > SKY_TOP - 1)
            {
                // Become a mutant; the held human is killed
                if (this.carrying)
                {
                    this.carrying.dead = true;
                    this.carrying.heldBy = null;
                    humansAlive--;
                    checkPlanetDestroyed();
                }
                enemies.push(new Mutant(this.pos.x, this.pos.y));
                sfxMutate.play();
                this.dead = true;
                return;
            }
        }

        this.pos.x = wrapX(this.pos.x + this.velocity.x);
        this.pos.y += this.velocity.y;

        // Shoot at player
        if (player && !player.dead && !this.shootCool.active())
        {
            this.shootCool.set(rand(2, 5));
            const dx = wrapDX(player.pos.x, this.pos.x);
            const dy = player.pos.y - this.pos.y;
            const dir = vec2(dx, dy).normalize(.45);
            spawnBullet(this.pos, dir, false, hsl(.3, 1, .7), 3);
            sfxEnemyShoot.play(this.pos, .4);
        }
    }

    hit()
    {
        if (this.dead) return;
        addScore(this.scoreValue);
        if (this.carrying)
        {
            // Score bonus for saving a human from a lander
            addScore(500);
            this.carrying.heldBy = null;
            this.carrying.falling = true;
            this.carrying.velocity = vec2(0, this.velocity.y);
            this.carrying = null;
        }
        spark(this.pos, 14, this.color, .5, .8);
        sfxExplode.play(this.pos, .5);
        this.dead = true;
    }

    render()
    {
        const dp = dpos(this.pos);
        const c = this.color;
        // Dome
        drawRect(dp.add(vec2(0, .35)), vec2(.7, .35), c);
        drawRect(dp.add(vec2(0, .5)), vec2(.4, .2), hsl(.13, 1, .7));
        // Body
        drawRect(dp, vec2(1.2, .35), c);
        // Legs
        drawRect(dp.add(vec2(-.45, -.4)), vec2(.18, .55), c);
        drawRect(dp.add(vec2(.45, -.4)), vec2(.18, .55), c);
        if (this.carrying) drawHumanFigure(this.carrying.pos);
    }
}

///////////////////////////////////////////////////////////////////////////////
// Mutant — chases the player erratically and shoots
class Mutant
{
    constructor(x, y)
    {
        this.pos = vec2(x, y);
        this.size = vec2(1.2, 1.2);
        this.velocity = vec2();
        this.color = hsl(.95, 1, .55);
        this.radarColor = hsl(.95, 1, .55);
        this.scoreValue = 150;
        this.type = 'mutant';
        this.shootCool = new Timer(rand(.5, 1.5));
        this.jerkCool = new Timer();
        this.dead = false;
    }

    update()
    {
        if (!player || player.dead) { this.velocity = this.velocity.scale(.95); }
        else if (this.jerkCool.elapsed())
        {
            this.jerkCool.set(rand(.25, .6));
            const dx = wrapDX(player.pos.x, this.pos.x);
            const dy = player.pos.y - this.pos.y;
            const dir = vec2(dx, dy).normalize(.1);
            this.velocity = dir.add(vec2(rand(-.05, .05), rand(-.05, .05)));
        }
        this.pos.x = wrapX(this.pos.x + this.velocity.x);
        this.pos.y += this.velocity.y;
        const g = terrainAt(this.pos.x) + .8;
        if (this.pos.y < g) { this.pos.y = g; this.velocity.y = Math.abs(this.velocity.y); }
        if (this.pos.y > SKY_TOP) { this.pos.y = SKY_TOP; this.velocity.y = -Math.abs(this.velocity.y); }

        if (player && !player.dead && !this.shootCool.active())
        {
            this.shootCool.set(rand(.8, 2));
            const dx = wrapDX(player.pos.x, this.pos.x);
            const dy = player.pos.y - this.pos.y;
            const dir = vec2(dx, dy).normalize(.55);
            spawnBullet(this.pos, dir, false, hsl(.95, 1, .7), 3);
            sfxEnemyShoot.play(this.pos, .35, 1.4);
        }
    }

    hit()
    {
        if (this.dead) return;
        addScore(this.scoreValue);
        spark(this.pos, 14, this.color, .5, .8);
        sfxExplode.play(this.pos, .5);
        this.dead = true;
    }

    render()
    {
        const dp = dpos(this.pos);
        const c = this.color;
        // Jagged shape: central body + 4 arms
        drawRect(dp, vec2(.7, .7), c);
        drawRect(dp.add(vec2(-.55, .25)), vec2(.35, .2), c);
        drawRect(dp.add(vec2(.55, .25)), vec2(.35, .2), c);
        drawRect(dp.add(vec2(-.55, -.25)), vec2(.35, .2), c);
        drawRect(dp.add(vec2(.55, -.25)), vec2(.35, .2), c);
        drawRect(dp, vec2(.3, .3), hsl(.13, 1, .8));
    }
}

///////////////////////////////////////////////////////////////////////////////
// Bomber — slow, lays mines along its path
class Bomber
{
    constructor(x, y)
    {
        this.pos = vec2(x, y);
        this.size = vec2(2, .8);
        this.velocity = vec2(randSign() * .06, 0);
        this.color = hsl(.6, .8, .55);
        this.radarColor = hsl(.6, .8, .55);
        this.scoreValue = 250;
        this.type = 'bomber';
        this.mineTimer = new Timer(rand(1, 2));
        this.dead = false;
    }
    update()
    {
        // Sinusoidal vertical drift
        this.velocity.y = Math.sin(time * 1.3 + this.pos.x) * .03;
        this.pos.x = wrapX(this.pos.x + this.velocity.x);
        this.pos.y += this.velocity.y;
        this.pos.y = clamp(this.pos.y, terrainAt(this.pos.x) + 3, SKY_TOP - 1);
        if (!this.mineTimer.active())
        {
            this.mineTimer.set(rand(1, 2.5));
            enemies.push(new Mine(this.pos.x, this.pos.y));
        }
    }
    hit()
    {
        if (this.dead) return;
        addScore(this.scoreValue);
        spark(this.pos, 16, this.color, .6, .9);
        sfxExplode.play(this.pos, .5);
        this.dead = true;
    }
    render()
    {
        const dp = dpos(this.pos);
        const c = this.color;
        drawRect(dp, vec2(2, .35), c);
        drawRect(dp.add(vec2(-.7, .2)), vec2(.3, .25), c);
        drawRect(dp.add(vec2(.7, .2)), vec2(.3, .25), c);
        drawRect(dp.add(vec2(0, -.3)), vec2(.4, .25), c);
        drawRect(dp.add(vec2(0, 0)), vec2(.3, .15), hsl(.13, 1, .8));
    }
}

// Mine — static hazard dropped by bombers (no score, just dangerous)
class Mine
{
    constructor(x, y)
    {
        this.pos = vec2(x, y);
        this.size = vec2(.6, .6);
        this.velocity = vec2();
        this.color = hsl(.6, .8, .6);
        this.radarColor = hsl(.6, .8, .6);
        this.scoreValue = 0;
        this.type = 'mine';
        this.life = new Timer(15);
        this.dead = false;
    }
    update()
    {
        if (this.life.elapsed()) this.dead = true;
    }
    hit()
    {
        if (this.dead) return;
        spark(this.pos, 8, this.color, .4, .6);
        sfxExplode.play(this.pos, .3);
        this.dead = true;
    }
    render()
    {
        const dp = dpos(this.pos);
        const pulse = .5 + .5 * Math.sin(time * 8);
        drawCircle(dp, .5, this.color);
        drawCircle(dp, .25, hsl(.05, 1, pulse));
    }
}

///////////////////////////////////////////////////////////////////////////////
// Pod — floating; when shot, releases swarmers
class Pod
{
    constructor(x, y)
    {
        this.pos = vec2(x, y);
        this.size = vec2(1.4, 1.4);
        this.velocity = vec2(rand(-.02, .02), rand(-.02, .02));
        this.color = hsl(.78, .7, .55);
        this.radarColor = hsl(.78, .7, .55);
        this.scoreValue = 1000;
        this.type = 'pod';
        this.dead = false;
    }
    update()
    {
        this.pos.x = wrapX(this.pos.x + this.velocity.x);
        this.pos.y += this.velocity.y;
        if (this.pos.y < terrainAt(this.pos.x) + 2)
            this.velocity.y = Math.abs(this.velocity.y);
        if (this.pos.y > SKY_TOP - 1)
            this.velocity.y = -Math.abs(this.velocity.y);
    }
    hit()
    {
        if (this.dead) return;
        addScore(this.scoreValue);
        spark(this.pos, 24, this.color, .7, 1.0);
        sfxExplode.play(this.pos, .6);
        // Release 4 swarmers
        for (let i = 0; i < 4; i++)
            enemies.push(new Swarmer(this.pos.x + rand(-.5, .5), this.pos.y + rand(-.5, .5)));
        this.dead = true;
    }
    render()
    {
        const dp = dpos(this.pos);
        const pulse = .8 + .2 * Math.sin(time * 4);
        drawCircle(dp, 1.4 * pulse, this.color);
        drawCircle(dp, .8, hsl(.85, 1, .7));
        drawCircle(dp, .3, hsl(.13, 1, .9));
    }
}

///////////////////////////////////////////////////////////////////////////////
// Swarmer — small, fast, harasses player
class Swarmer
{
    constructor(x, y)
    {
        this.pos = vec2(x, y);
        this.size = vec2(.7, .7);
        this.velocity = vec2(rand(-.3, .3), rand(-.3, .3));
        this.color = hsl(.85, 1, .7);
        this.radarColor = hsl(.85, 1, .7);
        this.scoreValue = 150;
        this.type = 'swarmer';
        this.jerkCool = new Timer();
        this.dead = false;
    }
    update()
    {
        if (this.jerkCool.elapsed() && player && !player.dead)
        {
            this.jerkCool.set(rand(.15, .35));
            const dx = wrapDX(player.pos.x, this.pos.x);
            const dy = player.pos.y - this.pos.y;
            const dir = vec2(dx, dy).normalize(.13);
            this.velocity = dir.add(vec2(rand(-.05, .05), rand(-.05, .05)));
        }
        this.pos.x = wrapX(this.pos.x + this.velocity.x);
        this.pos.y += this.velocity.y;
        const g = terrainAt(this.pos.x) + .6;
        if (this.pos.y < g) { this.pos.y = g; this.velocity.y = Math.abs(this.velocity.y); }
        if (this.pos.y > SKY_TOP) { this.pos.y = SKY_TOP; this.velocity.y = -Math.abs(this.velocity.y); }
    }
    hit()
    {
        if (this.dead) return;
        addScore(this.scoreValue);
        spark(this.pos, 8, this.color, .5, .6);
        sfxExplode.play(this.pos, .3, 1.5);
        this.dead = true;
    }
    render()
    {
        const dp = dpos(this.pos);
        drawCircle(dp, .55, this.color);
        drawCircle(dp, .25, hsl(.0, 1, .9));
    }
}

///////////////////////////////////////////////////////////////////////////////
// Baiter — fast saucer that appears if the wave takes too long
class Baiter
{
    constructor(x, y)
    {
        this.pos = vec2(x, y);
        this.size = vec2(1.4, .6);
        this.velocity = vec2(randSign() * .25, 0);
        this.color = hsl(0, 0, .95);
        this.radarColor = hsl(0, 0, .95);
        this.scoreValue = 200;
        this.type = 'baiter';
        this.shootCool = new Timer(rand(.5, 1.5));
        this.dead = false;
    }
    update()
    {
        if (player && !player.dead)
        {
            const dy = player.pos.y - this.pos.y;
            this.velocity.y = clamp(dy * .04, -.15, .15);
        }
        this.pos.x = wrapX(this.pos.x + this.velocity.x);
        this.pos.y += this.velocity.y;
        this.pos.y = clamp(this.pos.y, terrainAt(this.pos.x) + 1.5, SKY_TOP - .5);
        if (player && !player.dead && !this.shootCool.active())
        {
            this.shootCool.set(rand(.6, 1.4));
            const dx = wrapDX(player.pos.x, this.pos.x);
            const dy = player.pos.y - this.pos.y;
            const dir = vec2(dx, dy).normalize(.7);
            spawnBullet(this.pos, dir, false, hsl(0, 0, 1), 3);
            sfxEnemyShoot.play(this.pos, .4, 1.2);
        }
    }
    hit()
    {
        if (this.dead) return;
        addScore(this.scoreValue);
        spark(this.pos, 14, this.color, .6, .8);
        sfxExplode.play(this.pos, .5);
        this.dead = true;
    }
    render()
    {
        const dp = dpos(this.pos);
        drawEllipse(dp, vec2(1.6, .35), this.color);
        drawEllipse(dp.add(vec2(0, .15)), vec2(.6, .25), hsl(.55, 1, .7));
    }
}

///////////////////////////////////////////////////////////////////////////////
// Score / extra life
function addScore(n)
{
    score += n;
    while (score >= nextExtra && nextExtra < 1_000_000)
    {
        lives++;
        smartBombs++;
        nextExtra += EXTRA_LIFE_EVERY;
        sfxExtraLife.play();
    }
}

///////////////////////////////////////////////////////////////////////////////
// Smart bomb — wipes everything currently on screen
function doSmartBomb()
{
    if (smartBombs <= 0 || !player || player.dead) return;
    smartBombs--;
    bombFlash = 1;
    sfxBomb.play();
    shakeTimer.set(.5);
    const halfView = getCameraSize().x / 2 + 2;
    for (const e of enemies)
    {
        if (e.dead) continue;
        if (e.type === 'mine') { e.hit(); continue; }
        if (Math.abs(wrapDX(e.pos.x, cameraPos.x)) <= halfView)
            e.hit();
    }
    // Wipe enemy bullets in view too
    for (const b of bullets)
        if (!b.friendly && Math.abs(wrapDX(b.pos.x, cameraPos.x)) <= halfView)
            b.life.set(0);
}

///////////////////////////////////////////////////////////////////////////////
// Hyperspace — teleport somewhere random, with a chance to die
function doHyperspace()
{
    if (!player || player.dead || player.hyperCool.active()) return;
    player.hyperCool.set(.4);
    sfxHyper.play();
    if (rand() < .15)
    {
        // Bad jump — you die
        player.die();
        return;
    }
    player.pos = vec2(rand(0, WORLD_W), rand(0, SKY_TOP - 2));
    player.velocity = vec2();
    player.invincible.set(1.5);
}

///////////////////////////////////////////////////////////////////////////////
// Wave management
function landersInWave()
{
    return clamp(4 + wave, 5, 15);
}
function buildWave()
{
    pendingSpawns = [];
    if (planetDestroyed)
    {
        // Mutant waves: only mutants (and the occasional pod/swarmer burst)
        const n = 8 + wave;
        for (let i = 0; i < n; i++) pendingSpawns.push('mutant');
        if (wave % 2 === 0)
            for (let i = 0; i < 2; i++) pendingSpawns.push('pod');
    }
    else
    {
        const n = landersInWave();
        for (let i = 0; i < n; i++) pendingSpawns.push('lander');
        if (wave >= 2) for (let i = 0; i < Math.min(wave - 1, 4); i++) pendingSpawns.push('pod');
        if (wave >= 3) for (let i = 0; i < Math.min(wave - 2, 3); i++) pendingSpawns.push('bomber');
    }
    baiterTimer.set(45 - clamp(wave * 2, 0, 25));
    spawnTimer.set(0);
}
function spawnOne(type)
{
    let x, y;
    do {
        x = rand(0, WORLD_W);
    } while (player && Math.abs(wrapDX(x, player.pos.x)) < 12);
    if (type === 'lander')      enemies.push(new Lander(x, SKY_TOP - rand(2, 5)));
    else if (type === 'mutant') enemies.push(new Mutant(x, rand(SKY_TOP - 6, SKY_TOP - 1)));
    else if (type === 'pod')    enemies.push(new Pod(x, rand(2, SKY_TOP - 2)));
    else if (type === 'bomber') enemies.push(new Bomber(x, rand(2, SKY_TOP - 2)));
    else if (type === 'baiter') enemies.push(new Baiter(x, SKY_TOP - 3));
}

function landersOrMutantsLeft()
{
    return enemies.some(e => !e.dead && (e.type === 'lander' || e.type === 'mutant'));
}

function waveComplete()
{
    // Bonus for surviving humans (only if planet not destroyed)
    if (!planetDestroyed)
        addScore(humansAlive * 100 * wave);
    wave++;
    if (planetDestroyed)
    {
        mutantWavesLeft--;
        if (mutantWavesLeft <= 0)
            restorePlanet();
    }
    buildWave();
}

function restorePlanet()
{
    planetDestroyed = false;
    humansAlive = HUMAN_COUNT;
    humans.length = 0;
    for (let i = 0; i < HUMAN_COUNT; i++)
        humans.push(new Human(rand(0, WORLD_W)));
}

function checkPlanetDestroyed()
{
    if (humansAlive <= 0 && !planetDestroyed)
    {
        planetDestroyed = true;
        mutantWavesLeft = 3;
        sfxAlarm.play();
        // Convert all remaining landers to mutants
        for (const e of enemies)
        {
            if (e.dead) continue;
            if (e.type === 'lander')
            {
                enemies.push(new Mutant(e.pos.x, e.pos.y));
                e.dead = true;
            }
        }
    }
}

///////////////////////////////////////////////////////////////////////////////
// Collisions: bullets vs enemies / player; enemies vs player
function bulletHits()
{
    for (const b of bullets)
    {
        if (!b.life.active()) continue;
        if (b.friendly)
        {
            for (const e of enemies)
            {
                if (e.dead) continue;
                const dx = Math.abs(wrapDX(b.pos.x, e.pos.x));
                const dy = Math.abs(b.pos.y - e.pos.y);
                if (dx < (e.size.x + .35) / 2 && dy < (e.size.y + .15) / 2)
                {
                    e.hit();
                    b.life.set(0);
                    break;
                }
            }
        }
        else if (player && !player.dead && !player.invincible.active())
        {
            const dx = Math.abs(wrapDX(b.pos.x, player.pos.x));
            const dy = Math.abs(b.pos.y - player.pos.y);
            if (dx < (player.size.x + .35) / 2 && dy < (player.size.y + .15) / 2)
            {
                b.life.set(0);
                player.die();
            }
        }
    }
}

function enemyHitsPlayer()
{
    if (!player || player.dead || player.invincible.active()) return;
    for (const e of enemies)
    {
        if (e.dead) continue;
        const dx = Math.abs(wrapDX(e.pos.x, player.pos.x));
        const dy = Math.abs(e.pos.y - player.pos.y);
        if (dx < (e.size.x + player.size.x) / 2 && dy < (e.size.y + player.size.y) / 2)
        {
            if (e.type !== 'mine') e.hit();
            else e.dead = true;
            player.die();
            return;
        }
    }
}

///////////////////////////////////////////////////////////////////////////////
function gameUpdate()
{
    if (isPlaying && bindPauseKey({when: () => isPlaying && !gameOver})) return;

    // Player input + simulation (only while actually playing)
    if (player) player.update();

    // World simulation runs in both attract mode and gameplay
    for (const e of enemies) if (!e.dead) e.update();
    for (const h of humans) if (!h.dead) h.update();
    for (const b of bullets)
    {
        if (!b.life.active()) continue;
        b.pos.x = wrapX(b.pos.x + b.vel.x);
        b.pos.y += b.vel.y;
    }
    for (const p of particles)
    {
        if (!p.life.active()) continue;
        p.pos.x = wrapX(p.pos.x + p.vel.x);
        p.pos.y += p.vel.y;
        p.vel = p.vel.scale(.92);
    }

    bulletHits();
    enemyHitsPlayer();

    enemies = enemies.filter(e => !e.dead);
    bullets = bullets.filter(b => b.life.active());
    particles = particles.filter(p => p.life.active());

    if (isPlaying)
    {
        // Wave / spawn logic — only during real gameplay
        if (pendingSpawns.length && !spawnTimer.active())
        {
            spawnOne(pendingSpawns.shift());
            spawnTimer.set(rand(.4, 1.2));
        }
        if (!pendingSpawns.length && !landersOrMutantsLeft() && !player.dead)
            waveComplete();

        if (!baiterTimer.active() && !planetDestroyed)
        {
            baiterTimer.set(15);
            pendingSpawns.push('baiter');
        }
    }
    else
    {
        // Attract mode: keep the scene populated
        if (!spawnTimer.active() && enemies.length < 8)
        {
            spawnTimer.set(rand(2, 4));
            const roll = rand();
            if (roll < .6) enemies.push(new Lander(rand(0, WORLD_W), SKY_TOP - rand(2, 6)));
            else if (roll < .9) enemies.push(new Mutant(rand(0, WORLD_W), rand(4, SKY_TOP - 2)));
            else enemies.push(new Pod(rand(0, WORLD_W), rand(4, SKY_TOP - 4)));
        }
        // Top up humans if landers have stolen them all
        if (humansAlive < HUMAN_COUNT && rand() < .005)
        {
            humans.push(new Human(rand(0, WORLD_W)));
            humansAlive++;
        }
    }

    bombFlash = max(0, bombFlash - .04);
}

///////////////////////////////////////////////////////////////////////////////
function gameUpdatePost()
{
    let camX, camY;
    if (player)
    {
        // Lead the player in facing direction, wrap-aware lerp. cameraPos.x
        // is NOT wrapped — kept monotonic so parallax stars don't jump at
        // the world seam (wrapDX-based draw math handles arbitrary values).
        const lead = 10;
        const targetX = wrapX(player.pos.x + player.facing * lead);
        const dx = wrapDX(targetX, cameraPos.x);
        camX = cameraPos.x + dx * .04;
        camY = 2 + clamp((player.pos.y - 2) * .25, -3, 3);
    }
    else
    {
        // Attract mode: slow continuous pan, also unwrapped for parallax
        camX = cameraPos.x + .05;
        camY = 2;
    }
    if (shakeTimer.active())
    {
        const s = shakeTimer.getPercent();
        const m = (1 - s) * .5;
        camX += rand(-m, m);
        camY += rand(-m, m);
    }
    cameraPos = vec2(camX, camY);
}

///////////////////////////////////////////////////////////////////////////////
// Render
function drawStars()
{
    const cs = getCameraSize();
    const halfW = cs.x / 2 + 1;
    const yMin = cameraPos.y - cs.y / 2 - 1;
    const yMax = cameraPos.y + cs.y / 2 + 1;
    for (const st of stars)
    {
        if (st.y < yMin || st.y > yMax) continue;
        // Parallax: apparent world x lags camera motion by (1 - depth). For
        // depth=1 the star sits in world (full speed); depth→0 nails it to
        // the camera (no drift). wrapDX makes the field tile seamlessly.
        const apparentX = st.x + cameraPos.x * (1 - st.depth);
        const dx = wrapDX(apparentX, cameraPos.x);
        if (Math.abs(dx) > halfW) continue;
        const a = .6 + .4 * Math.sin(time * 2 + st.phase);
        drawRect(vec2(cameraPos.x + dx, st.y),
            vec2(st.s, st.s), hsl(0, 0, st.b, a));
    }
}

function drawTerrain()
{
    const cs = getCameraSize();
    const left  = cameraPos.x - cs.x / 2 - 1;
    const right = cameraPos.x + cs.x / 2 + 1;
    const step = .5;
    const points = [];
    for (let x = left; x <= right; x += step)
        points.push(vec2(camDrawX(x), terrainAt(x)));
    // Fill below ridgeline
    const bottomY = -20;
    const polyPts = [];
    polyPts.push(vec2(points[0].x, bottomY));
    for (const p of points) polyPts.push(p);
    polyPts.push(vec2(points[points.length-1].x, bottomY));
    drawPoly(polyPts, hsl(.3, .35, .1));
    // Ridgeline highlight
    for (let i = 1; i < points.length; i++)
        drawLine(points[i-1], points[i], .15, hsl(.3, .8, .55));
}

function drawBullets()
{
    for (const b of bullets)
    {
        if (!b.life.active()) continue;
        const dp = vec2(camDrawX(b.pos.x), b.pos.y);
        // long streak in motion direction
        const len = b.vel.length() * .8 + .3;
        drawRect(dp, vec2(.18, len), b.color, b.vel.angle());
        drawCircle(dp, .12, hsl(0, 0, 1));
    }
}

function drawParticles()
{
    for (const p of particles)
    {
        if (!p.life.active()) continue;
        const a = 1 - p.life.getPercent();
        const c = p.color.copy();
        c.a = a;
        drawRect(vec2(camDrawX(p.pos.x), p.pos.y), vec2(p.size, p.size), c);
    }
}

function gameRender()
{
    drawStars();
    drawTerrain();
    // Humans
    for (const h of humans) if (!h.dead) h.render();
    // Enemies
    for (const e of enemies) if (!e.dead) e.render();
    // Player
    if (player) player.render();
    // Bullets
    drawBullets();
    // Particles
    drawParticles();
}

///////////////////////////////////////////////////////////////////////////////
// Screen-space HUD (radar + score / lives / smart bombs / wave)
function drawRadar(ctx)
{
    const w = mainCanvasSize.x - 2 * RADAR_MARGIN;
    const h = RADAR_H_SCREEN;
    const x = RADAR_MARGIN;
    const y = RADAR_MARGIN;

    ctx.save();
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(x, y, w, h);
    ctx.strokeStyle = '#0a8';
    ctx.lineWidth = 2;
    ctx.strokeRect(x, y, w, h);

    // Helpers: map world (x, y) -> radar pixel position
    const camX = cameraPos.x;
    const worldXToRadar = wx =>
    {
        // Center the radar on the camera so the player sits in the middle
        let d = wrapDX(wx, camX);
        // normalize d into [-WORLD_W/2, WORLD_W/2)
        return x + w / 2 + (d / WORLD_W) * w;
    };
    const worldYToRadar = wy =>
    {
        // map y from [GROUND_Y - 2, SKY_TOP] to top..bottom (radar)
        const top = SKY_TOP, bot = GROUND_Y - 2;
        const t = (wy - bot) / (top - bot);
        return y + h - t * h;
    };

    // Mini terrain ridge
    ctx.beginPath();
    const step = 2;
    for (let px = 0; px <= w; px += step)
    {
        const wx = camX + (px - w / 2) / w * WORLD_W;
        const th = terrainAt(wx);
        const py = worldYToRadar(th);
        if (px === 0) ctx.moveTo(x + px, py);
        else ctx.lineTo(x + px, py);
    }
    ctx.strokeStyle = '#283';
    ctx.lineWidth = 1;
    ctx.stroke();

    // Humans (small white pixels at ground)
    ctx.fillStyle = '#fff';
    for (const hh of humans)
    {
        if (hh.dead) continue;
        ctx.fillRect(worldXToRadar(hh.pos.x) - 1, worldYToRadar(hh.pos.y) - 1, 2, 3);
    }

    // Enemies (color coded)
    for (const e of enemies)
    {
        if (e.dead) continue;
        ctx.fillStyle = e.radarColor.toString();
        const px = worldXToRadar(e.pos.x);
        const py = worldYToRadar(e.pos.y);
        ctx.fillRect(px - 2, py - 2, 4, 4);
    }

    // Bullets — small dots
    ctx.fillStyle = '#ff0';
    for (const b of bullets)
    {
        if (!b.life.active()) continue;
        if (b.friendly) ctx.fillStyle = '#ff0';
        else ctx.fillStyle = '#f44';
        ctx.fillRect(worldXToRadar(b.pos.x), worldYToRadar(b.pos.y), 1, 1);
    }

    // Player (bright yellow triangle)
    if (player && !player.dead)
    {
        ctx.fillStyle = '#ff0';
        const px = worldXToRadar(player.pos.x);
        const py = worldYToRadar(player.pos.y);
        ctx.beginPath();
        if (player.facing > 0)
        {
            ctx.moveTo(px + 6, py);
            ctx.lineTo(px - 3, py - 4);
            ctx.lineTo(px - 3, py + 4);
        }
        else
        {
            ctx.moveTo(px - 6, py);
            ctx.lineTo(px + 3, py - 4);
            ctx.lineTo(px + 3, py + 4);
        }
        ctx.closePath();
        ctx.fill();
    }

    // Viewport indicator (rectangle showing what the camera sees)
    const cs = getCameraSize();
    const vL = -cs.x / 2;
    const vR =  cs.x / 2;
    ctx.strokeStyle = 'rgba(255,255,255,0.5)';
    ctx.lineWidth = 1;
    ctx.strokeRect(
        x + w / 2 + (vL / WORLD_W) * w,
        y,
        (cs.x / WORLD_W) * w,
        h);
    ctx.restore();
}

function drawHud(ctx)
{
    ctx.save();
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 28px monospace';
    ctx.textBaseline = 'top';
    ctx.textAlign = 'left';
    ctx.fillStyle = '#0fc';
    ctx.fillText(String(score).padStart(6, '0'),
        RADAR_MARGIN, RADAR_MARGIN + RADAR_H_SCREEN + 8);

    // Lives — small ship icons
    ctx.fillStyle = '#cfc';
    for (let i = 0; i < lives - 1; i++)
    {
        const lx = RADAR_MARGIN + 160 + i * 22;
        const ly = RADAR_MARGIN + RADAR_H_SCREEN + 14;
        ctx.fillRect(lx, ly + 6, 18, 4);
        ctx.fillRect(lx + 12, ly + 4, 6, 8);
    }
    // Smart bombs
    ctx.fillStyle = '#f80';
    for (let i = 0; i < smartBombs; i++)
    {
        const bx = RADAR_MARGIN + 160 + i * 16;
        const by = RADAR_MARGIN + RADAR_H_SCREEN + 36;
        ctx.beginPath();
        ctx.arc(bx + 5, by + 5, 5, 0, Math.PI * 2);
        ctx.fill();
    }

    // Wave + humans on right
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 22px monospace';
    ctx.textAlign = 'right';
    ctx.fillText(`WAVE ${wave}`,
        mainCanvasSize.x - RADAR_MARGIN,
        RADAR_MARGIN + RADAR_H_SCREEN + 8);
    ctx.fillStyle = planetDestroyed ? '#f44' : '#fff';
    ctx.fillText(`HUMANS ${humansAlive}`,
        mainCanvasSize.x - RADAR_MARGIN,
        RADAR_MARGIN + RADAR_H_SCREEN + 36);
    if (planetDestroyed)
    {
        ctx.fillStyle = '#f44';
        ctx.textAlign = 'center';
        ctx.font = 'bold 36px monospace';
        ctx.fillText(`PLANET DESTROYED — MUTANT WAVES LEFT: ${mutantWavesLeft}`,
            mainCanvasSize.x / 2, RADAR_MARGIN + RADAR_H_SCREEN + 70);
    }

    ctx.restore();
}

function gameRenderPost()
{
    if (!isPlaying) return;

    const ctx = mainContext;
    drawRadar(ctx);
    drawHud(ctx);

    // Smart bomb flash overlay
    if (bombFlash > 0)
    {
        ctx.save();
        ctx.fillStyle = `rgba(255,255,255,${bombFlash})`;
        ctx.fillRect(0, 0, mainCanvasSize.x, mainCanvasSize.y);
        ctx.restore();
    }
}

///////////////////////////////////////////////////////////////////////////////
engineInit(gameInit, gameUpdate, gameUpdatePost, gameRender, gameRenderPost);
</script></body></html>
