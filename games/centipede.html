<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>LittleJS – Centipede (prototype)</title>
  <style>
    /* LittleJS sets body styles too, but keeping this helps prevent page flash */
    html, body { margin:0; padding:0; background:#000; overflow:hidden; }
  </style>
</head>
<body>
  <script src="../dist/littlejs.js?1.18.15"></script>
  <script src="../templates/soundGenerator.js"></script>
  <script src="../templates/textureGenerator.js"></script>
  <script src="../templates/menus.js"></script>
  <script>
  'use strict';

  // engine settings
  debugWatermark = false;
  showEngineVersion = false;

  // Touch gamepad: analog stick + 1 face button (fire). Player needs free 2D
  // movement (not just 4-dir), so analog is the right call.
  touchGamepadEnable = true;
  touchGamepadAnalog = true;
  touchGamepadButtonCount = 2;
  touchGamepadAlpha = .35;

// SFX
  const sShoot = new SoundGenerator({volume:.35, frequency:900, release:.05, shapeCurve:1.8, slide:-2});
  const sHit   = new SoundGenerator({volume:.45, frequency:280, release:.08, shapeCurve:.9, noise:.12});
  const sSplit = new SoundGenerator({volume:.55, frequency:160, release:.18, shapeCurve:.6, noise:.05});
  const sDie   = new SoundGenerator({volume:.55, frequency:90,  release:.35, shapeCurve:.2, noise:.18, slide:-.5});
  const sSpider    = new SoundGenerator({volume:.3,  frequency:540, release:.05, shapeCurve:.5, noise:.22, slide:.3});
  const sSpiderDie = new SoundGenerator({volume:.55, frequency:480, release:.22, shapeCurve:.4, noise:.18, slide:-.6});
  const sExtraLife = new SoundGenerator({volume:.6,  frequency:1200, release:.3, shapeCurve:1, slide:.6});

  ///////////////////////////////////////////////////////////////////////////////
  // Grid / game constants
  const gridSize = vec2(40, 26);                  // cells
  const levelSize = gridSize.copy();              // world units (1 unit == 1 cell)
  const playerMinY = 0;                           // player center Y minimum
  const playerMaxY = 4;                           // player can move up into this zone
  const turnUpZoneY = 4;                          // when centipede hits obstacles near player, it tends to turn upward

  const bulletSpeed = 22;                         // world units / second
  const playerSpeed = 18;                         // world units / second

  const mushroomHP = 4;
  const mushroomCountBase = 42;

  const BONUS_LIFE_AT = 12000;

  // semicircle polygon for the mushroom cap — flat bottom (y=0), arc above
  const MUSHROOM_CAP_RADIUS = .6;
  const MUSHROOM_CAP_POINTS = (() => {
      const pts = [];
      const segments = 16;
      for (let i = 0; i <= segments; ++i)
      {
          const a = i / segments * Math.PI;
          pts.push(vec2(-MUSHROOM_CAP_RADIUS * Math.cos(a),
                        MUSHROOM_CAP_RADIUS * Math.sin(a)));
      }
      return pts;
  })();

  ///////////////////////////////////////////////////////////////////////////////
  // Game state
  let player;
  let mushrooms;          // Map<key, Mushroom>
  let centipedes;         // Array<CentipedeChain>
  let segmentLookup;      // Map<key, {chain, index}>
  let score, lives, level;
  let bestScore = 0;
  let gameOver, gameWon, winTimer;
  let spider;             // current Spider instance or null
  let spiderSpawnTimer;   // seconds until next spider
  let nextBonusLifeAt;    // score threshold for next free life
  let isPlaying = false;
  let gameOverHoldTimer = 0; // seconds before the GAME OVER menu surfaces

  // bottom-zone state: once the centipede touches the player area, reinforcement heads start spawning from the top-right
  let bottomReached;
  let reinforcementTimer;
  let reinforcementsThisLevel;

  // Sprite atlas — each TileInfo is built procedurally by paint functions in gameInit.
  // Press P to save the atlas + AI prompt; press L to reload centipede.png from disk.
  // Drop a `centipede.png` next to this file (2048x2048, 4x4 grid of 500px tiles, 6px gutters)
  // and it will load automatically on startup.
  const sprites = {
      player: null,
      bullet: null,
      mushroomByHp: [],   // index 0..3 == hp 1..4
      head: null,
      body: null,
      spider: null,
  };

  function cellKey(x, y) { return (x|0) + ',' + (y|0); }
  function clampCell(c) { c.x = clamp(c.x|0, 0, gridSize.x-1); c.y = clamp(c.y|0, 0, gridSize.y-1); return c; }
  function posToCell(pos) { return clampCell(vec2(pos.x|0, pos.y|0)); }
  function cellCenter(cell) { return vec2(cell.x + .5, cell.y + .5); }

  function inBoundsCell(cell)
  {
      return cell.x >= 0 && cell.x < gridSize.x && cell.y >= 0 && cell.y < gridSize.y;
  }

  ///////////////////////////////////////////////////////////////////////////////
  // Render helpers (fake outline by drawing a slightly larger black rect first)
  function drawOutlinedRect(pos, size, color, outline=rgb(0,0,0,.9))
  {
      drawRect(pos, size.add(vec2(.12)), outline);
      drawRect(pos, size, color);
  }

  ///////////////////////////////////////////////////////////////////////////////
  // Scoring

  function addScore(pts)
  {
      score += pts;
      while (score >= nextBonusLifeAt)
      {
          lives++;
          nextBonusLifeAt += BONUS_LIFE_AT;
          sExtraLife.play(player.pos, 1, 1);
          new ScorePopup(player.pos.add(vec2(0, 1.6)), 'EXTRA LIFE');
      }
  }

  ///////////////////////////////////////////////////////////////////////////////
  // Sparks (small fade-out squares used for hits, kills, and crunch effects)
  // Named "Spark" because LittleJS already exports a "Particle" class.

  class Spark extends EngineObject
  {
      constructor(pos, vel, color, lifeSpan=.6, size=.22)
      {
          super(pos.copy(), vec2(size));
          this.setCollision(false, false, false, false);
          this.mass = 0;
          this.vel = vel.copy();
          this.color = color;
          this.lifeTime = 0;
          this.maxLife = lifeSpan;
          this.renderOrder = 15;
      }

      update()
      {
          this.lifeTime += timeDelta;
          this.pos = this.pos.add(this.vel.scale(timeDelta));
          this.vel = this.vel.scale(.9);
          if (this.lifeTime >= this.maxLife) this.destroy();
      }

      render()
      {
          const t = 1 - this.lifeTime / this.maxLife;
          const c = rgb(this.color.r, this.color.g, this.color.b, t);
          drawRect(this.pos, vec2(this.size.x * t), c);
      }
  }

  function spawnBurst(pos, color, count=8, speed=4)
  {
      for (let i = 0; i < count; ++i)
      {
          const angle = (i / count) * Math.PI * 2 + rand(-.3, .3);
          const v = vec2(Math.cos(angle), Math.sin(angle)).scale(speed * rand(.5, 1.2));
          new Spark(pos, v, color, rand(.4, .7), rand(.15, .28));
      }
  }

  ///////////////////////////////////////////////////////////////////////////////
  // Sprite painters — each fills a 500x500 tile in the atlas.
  // Canvas Y is down; LittleJS samples with V inverted, so canvas-top → world-top.
  // Head + spider sprites face RIGHT; mirror when motion is leftward.

  function paintPlayer(ctx)
  {
      const cx = 250, cy = 250;
      ctx.lineWidth = 18;
      ctx.lineJoin = 'round';
      ctx.strokeStyle = '#000';

      // ship hull — trapezoid pointing up
      ctx.fillStyle = '#33ddff';
      ctx.beginPath();
      ctx.moveTo(cx - 210, cy + 150);
      ctx.lineTo(cx + 210, cy + 150);
      ctx.lineTo(cx + 90, cy - 60);
      ctx.lineTo(cx - 90, cy - 60);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();

      // barrel/turret
      ctx.fillStyle = '#33ddff';
      ctx.beginPath();
      ctx.rect(cx - 38, cy - 220, 76, 160);
      ctx.fill();
      ctx.stroke();

      // cockpit
      ctx.fillStyle = '#0d4d5d';
      ctx.beginPath();
      ctx.arc(cx, cy + 50, 55, 0, Math.PI * 2);
      ctx.fill();
  }

  function paintBullet(ctx)
  {
      const cx = 250;
      ctx.lineWidth = 14;
      ctx.strokeStyle = '#000';
      ctx.fillStyle = '#ffea3a';
      ctx.beginPath();
      ctx.rect(cx - 55, 80, 110, 350);
      ctx.fill();
      ctx.stroke();
      // hot tip
      ctx.fillStyle = '#ffffff';
      ctx.beginPath();
      ctx.arc(cx, 110, 32, 0, Math.PI * 2);
      ctx.fill();
  }

  function paintMushroom(ctx, capColor, dotCount)
  {
      const cx = 250;
      const capCy = 230;            // dome's flat baseline (top of canvas → top in world)
      const stemTop = capCy + 5;
      ctx.lineWidth = 18;
      ctx.lineJoin = 'round';
      ctx.strokeStyle = '#000';

      // stem
      ctx.fillStyle = '#f4ecd0';
      ctx.beginPath();
      ctx.rect(cx - 80, stemTop + 30, 160, 150);
      ctx.fill();
      ctx.stroke();

      // gill ring just below the cap
      ctx.fillStyle = '#cbc3a8';
      ctx.beginPath();
      ctx.rect(cx - 220, stemTop, 440, 45);
      ctx.fill();
      ctx.stroke();

      // cap (semicircle dome, flat bottom at capCy)
      const rad = 220;
      ctx.fillStyle = capColor;
      ctx.beginPath();
      ctx.arc(cx, capCy, rad, Math.PI, 0, false);  // arc the top half
      ctx.closePath();
      ctx.fill();
      ctx.stroke();

      // white polka dots on the dome (fewer when damaged)
      ctx.fillStyle = '#ffffff';
      if (dotCount >= 1) { ctx.beginPath(); ctx.arc(cx - 90, capCy - 70, 55, 0, Math.PI * 2); ctx.fill(); }
      if (dotCount >= 2) { ctx.beginPath(); ctx.arc(cx + 75, capCy - 30, 45, 0, Math.PI * 2); ctx.fill(); }
      if (dotCount >= 3) { ctx.beginPath(); ctx.arc(cx + 30, capCy - 140, 38, 0, Math.PI * 2); ctx.fill(); }
  }

  function paintCentipedeBody(ctx)
  {
      const cx = 250, cy = 250;
      // legs (drawn first so they tuck behind the body)
      ctx.strokeStyle = '#175c1c';
      ctx.lineWidth = 26;
      ctx.lineCap = 'round';
      for (let i = 0; i < 4; ++i)
      {
          const x = cx + (i - 1.5) * 90;
          ctx.beginPath();
          ctx.moveTo(x, cy + 110);
          ctx.lineTo(x + (i % 2 ? -25 : 25), cy + 230);
          ctx.stroke();
      }

      // round body
      ctx.fillStyle = '#5bf270';
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 18;
      ctx.beginPath();
      ctx.arc(cx, cy, 195, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
  }

  function paintCentipedeHead(ctx)
  {
      const cx = 250, cy = 250;
      // legs (drawn first)
      ctx.strokeStyle = '#175c1c';
      ctx.lineWidth = 26;
      ctx.lineCap = 'round';
      for (let i = 0; i < 4; ++i)
      {
          const x = cx + (i - 1.5) * 90;
          ctx.beginPath();
          ctx.moveTo(x, cy + 110);
          ctx.lineTo(x + (i % 2 ? -25 : 25), cy + 230);
          ctx.stroke();
      }

      // head body
      ctx.fillStyle = '#ff5566';
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 18;
      ctx.beginPath();
      ctx.arc(cx, cy, 195, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();

      // antennae sweeping forward-right (sprite faces right)
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 14;
      ctx.lineCap = 'round';
      ctx.beginPath(); ctx.moveTo(cx + 60, cy - 130); ctx.lineTo(cx + 170, cy - 240); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(cx + 110, cy - 100); ctx.lineTo(cx + 240, cy - 170); ctx.stroke();

      // big white eyes (stacked on the right/front side)
      ctx.fillStyle = '#ffffff';
      ctx.lineWidth = 8;
      ctx.beginPath(); ctx.arc(cx + 70, cy - 65, 60, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
      ctx.beginPath(); ctx.arc(cx + 70, cy + 65, 60, 0, Math.PI * 2); ctx.fill(); ctx.stroke();

      // pupils looking right
      ctx.fillStyle = '#000';
      ctx.beginPath(); ctx.arc(cx + 95, cy - 65, 28, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx + 95, cy + 65, 28, 0, Math.PI * 2); ctx.fill();
  }

  function paintSpider(ctx)
  {
      const cx = 250, cy = 250;
      // 8 legs splayed out, drawn first
      ctx.strokeStyle = '#3d0040';
      ctx.lineWidth = 22;
      ctx.lineCap = 'round';
      for (let i = 0; i < 4; ++i)
      {
          const t = (i - 1.5) * 40;            // vertical attach offset
          const reach = 230;
          const drop = 90 + i * 12;
          // left side
          ctx.beginPath();
          ctx.moveTo(cx - 60, cy + t);
          ctx.lineTo(cx - 180, cy + t + drop * .5);
          ctx.lineTo(cx - reach, cy + t + drop);
          ctx.stroke();
          // right side
          ctx.beginPath();
          ctx.moveTo(cx + 60, cy + t);
          ctx.lineTo(cx + 180, cy + t + drop * .5);
          ctx.lineTo(cx + reach, cy + t + drop);
          ctx.stroke();
      }

      // abdomen (rear = left, since sprite faces right)
      ctx.fillStyle = '#e240f0';
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 18;
      ctx.beginPath();
      ctx.arc(cx - 70, cy + 20, 165, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();

      // belly highlight
      ctx.fillStyle = '#6b1080';
      ctx.beginPath();
      ctx.arc(cx - 90, cy + 70, 80, 0, Math.PI * 2);
      ctx.fill();

      // head (front = right)
      ctx.fillStyle = '#e240f0';
      ctx.strokeStyle = '#000';
      ctx.beginPath();
      ctx.arc(cx + 90, cy - 30, 115, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();

      // yellow eyes
      ctx.fillStyle = '#fff044';
      ctx.lineWidth = 8;
      ctx.beginPath(); ctx.arc(cx + 55, cy - 70, 48, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
      ctx.beginPath(); ctx.arc(cx + 145, cy - 60, 48, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
      // pupils
      ctx.fillStyle = '#000';
      ctx.beginPath(); ctx.arc(cx + 68, cy - 70, 22, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx + 158, cy - 60, 22, 0, Math.PI * 2); ctx.fill();

      // fangs
      ctx.strokeStyle = '#e8e0c0';
      ctx.lineWidth = 14;
      ctx.beginPath(); ctx.moveTo(cx + 60, cy + 60); ctx.lineTo(cx + 55, cy + 130); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(cx + 115, cy + 60); ctx.lineTo(cx + 120, cy + 130); ctx.stroke();
  }

  function buildSpriteAtlas()
  {
      initDrawToTexture();

      sprites.player = drawToTexture(0,
          paintPlayer,
          'cyan retro arcade starship pointing up, dark cockpit dome, black outline, 2D top-down sprite');
      sprites.bullet = drawToTexture(1,
          paintBullet,
          'small bright yellow vertical laser bolt with white hot tip, dark outline');

      const capColors = [
          { hex:'#b3b3b3', desc:'gray (nearly destroyed)' },   // hp=1
          { hex:'#f0d640', desc:'yellow' },                     // hp=2
          { hex:'#f08c40', desc:'orange' },                     // hp=3
          { hex:'#f04050', desc:'red (fresh)' },                // hp=4
      ];
      for (let hp = 1; hp <= 4; ++hp)
      {
          const cap = capColors[hp-1];
          const dots = hp >= 4 ? 3 : hp >= 2 ? 2 : 1;
          sprites.mushroomByHp[hp-1] = drawToTexture(
              1 + hp,  // tiles 2,3,4,5
              ctx => paintMushroom(ctx, cap.hex, dots),
              'mushroom with ' + cap.desc + ' dome cap, white polka dots, cream stem with gill ring, black outline, top-down arcade sprite');
      }

      sprites.head = drawToTexture(6,
          paintCentipedeHead,
          'red centipede head facing right, two big white eyes with black pupils on the right side, two antennae, four green legs hanging below, top-down arcade sprite');
      sprites.body = drawToTexture(7,
          paintCentipedeBody,
          'round green centipede body segment, four green legs hanging below, black outline, top-down arcade sprite');
      sprites.spider = drawToTexture(8,
          paintSpider,
          'purple two-body spider facing right, large abdomen and smaller head, eight splayed two-segment legs, big yellow eyes with black pupils, pale fangs, top-down arcade sprite');
  }

  ///////////////////////////////////////////////////////////////////////////////
  // Objects

  class Player extends EngineObject
  {
      constructor()
      {
          super(vec2(levelSize.x/2, playerMinY + .5), vec2(1.2, .8));
          this.setCollision(false, false, false, false);
          this.cooldown = 0;
      }
      update()
      {
          // movement: keyboard 8-dir, OR analog stick (gamepad/touch), OR mouse-follow
          const right = keyIsDown('ArrowRight') || keyIsDown('KeyD');
          const left  = keyIsDown('ArrowLeft')  || keyIsDown('KeyA');
          const up    = keyIsDown('ArrowUp')    || keyIsDown('KeyW');
          const down  = keyIsDown('ArrowDown')  || keyIsDown('KeyS');

          let move = vec2((right?1:0) - (left?1:0), (up?1:0) - (down?1:0));

          // Stick adds in — preserves analog magnitude so a half-pushed stick
          // moves at half speed.
          const stick = gamepadStick(0);
          if (stick.lengthSquared() > .15*.15)
              move = move.add(stick);

          const movingByKeyOrStick = move.lengthSquared() > .05;

          if (movingByKeyOrStick)
          {
              // Cap the input vector to length 1 so diagonal + stick can't exceed playerSpeed.
              if (move.lengthSquared() > 1) move = move.normalize();
              this.pos = this.pos.add(move.scale(playerSpeed * timeDelta));
          }
          else
          {
              // mouse movement: go to the closest valid position to the mouse
              const inCanvas =
                  mousePosScreen.x >= 0 && mousePosScreen.y >= 0 &&
                  mousePosScreen.x <= mainCanvasSize.x && mousePosScreen.y <= mainCanvasSize.y;

              if (inCanvas)
              {
                  // tight mouse tracking — snap directly to the clamped mouse position
                  this.pos = vec2(
                      clamp(mousePos.x, .6, levelSize.x - .6),
                      clamp(mousePos.y, playerMinY + .5, playerMaxY + .5)
                  );
              }
          }

          // clamp to player area
          this.pos.x = clamp(this.pos.x, .6, levelSize.x - .6);
          this.pos.y = clamp(this.pos.y, playerMinY + .5, playerMaxY + .5);

          // shooting (hold to keep firing) — Space, mouse, or A button (0)
          this.cooldown = max(0, this.cooldown - timeDelta);
          const shooting = keyIsDown('Space') || mouseIsDown(0) || gamepadIsDown(0);
          if (!gameOver && !gameWon && shooting && this.cooldown <= 0)
          {
              this.cooldown = .12;
              new Bullet(this.pos.add(vec2(0, .7)));
              sShoot.play(this.pos, 1);
          }

          // restart hotkey during gameplay only — game-over no longer restarts
          // on click/Enter/Space; the gameOver menu handles that.
          if (isPlaying && !gameOver && !gameWon && keyWasPressed('KeyR'))
              startGame();
      }

      render()
      {
          drawTile(this.pos.add(vec2(0, .15)), vec2(2), sprites.player, WHITE);
      }
  }

  class Bullet extends EngineObject
  {
      constructor(pos)
      {
          super(pos, vec2(.18, .6));
          this.setCollision(false, false, false, false);
          this.velocity = vec2(0, bulletSpeed);
          this.life = 1.3; // seconds
          this.renderOrder = 10;
      }

      update()
      {
          // kill offscreen / after time
          this.life -= timeDelta;
          if (this.life <= 0 || this.pos.y > levelSize.y + 2)
          {
              this.destroy();
              return;
          }

          // handle impacts using grid cell collision (fast + retro)
          const cell = posToCell(this.pos);

          // spider (position-based, checked before grid lookups)
          if (spider && !spider.destroyed &&
              isOverlapping(this.pos, this.size, spider.pos, spider.size))
          {
              spider.hitByBullet();
              this.destroy();
              return;
          }

          // mushrooms
          const m = mushrooms.get(cellKey(cell.x, cell.y));
          if (m)
          {
              m.damage();
              sHit.play(this.pos, 1, 1 + rand(-.1,.1));
              this.destroy();
              return;
          }

          // centipede segment
          const hit = segmentLookup.get(cellKey(cell.x, cell.y));
          if (hit)
          {
              hitSegment(hit.chain, hit.index, cell);
              sSplit.play(this.pos, 1, 1 + rand(-.08,.08));
              this.destroy();
              return;
          }
      }

      render()
      {
          drawTile(this.pos, vec2(2), sprites.bullet, WHITE);
      }
  }

  class Mushroom extends EngineObject
  {
      constructor(cell)
      {
          super(cellCenter(cell), vec2(.9, .9));
          this.setCollision(false, false, false, false);
          this.cell = cell.copy();
          this.hp = mushroomHP;
          this.renderOrder = -5;
      }

      damage()
      {
          this.hp--;
          spawnBurst(this.pos, rgb(1, 1, 1), 3, 2.5);
          if (this.hp <= 0)
          {
              mushrooms.delete(cellKey(this.cell.x, this.cell.y));
              this.destroy();
              addScore(1);
              spawnBurst(this.pos, rgb(.95, .5, .25), 6, 3);
          }
      }

      render()
      {
          const hp = clamp(this.hp, 1, 4);
          drawTile(this.pos, vec2(1.2), sprites.mushroomByHp[hp - 1], WHITE);
      }
  }

  class Segment extends EngineObject
  {
      constructor(cell, isHead=false)
      {
          super(cellCenter(cell), vec2(.9, .9));
          this.setCollision(false, false, false, false);
          this.cell = cell.copy();
          this.isHead = isHead;
          this.headDirX = -1;
          this.renderOrder = 0;
      }

      setCell(cell)
      {
          this.cell = cell.copy();
          this.pos = cellCenter(cell);
      }

      render()
      {
          const sprite = this.isHead ? sprites.head : sprites.body;
          // head sprite faces right; mirror when motion is leftward
          const mirror = this.isHead && this.headDirX < 0;
          drawTile(this.pos, vec2(1.2), sprite, WHITE, 0, mirror);
      }
  }

  ///////////////////////////////////////////////////////////////////////////////
  // Spider — diagonal bouncer in the player zone

  class Spider extends EngineObject
  {
      constructor()
      {
          const fromLeft = !randInt(2);
          const startX = fromLeft ? -.5 : levelSize.x + .5;
          const startY = playerMinY + .5 + rand(0, 3);
          super(vec2(startX, startY), vec2(1.2, .8));
          this.setCollision(false, false, false, false);
          this.mass = 0; // no gravity
          const hspeed = 5 + (level-1) * .35;
          const vspeed = 4 + (level-1) * .25;
          this.vel = vec2((fromLeft?1:-1) * hspeed, (randInt(2)?1:-1) * vspeed);
          this.dirChangeTimer = rand(.2, .5);
          this.chirpTimer = 0;
          this.zoneTop = playerMaxY + 2;
          this.zoneBottom = .5;
          this.renderOrder = 2;
      }

      update()
      {
          if (gameOver || gameWon) return;

          // chirp
          this.chirpTimer -= timeDelta;
          if (this.chirpTimer <= 0)
          {
              this.chirpTimer = .25 + rand(0, .15);
              sSpider.play(this.pos, .55, 1 + rand(-.15, .15));
          }

          // jittery direction changes — flip vertical, occasionally lurch toward player
          this.dirChangeTimer -= timeDelta;
          if (this.dirChangeTimer <= 0)
          {
              this.dirChangeTimer = rand(.2, .55);
              if (!randInt(2))
                  this.vel.y = -this.vel.y;
              // ~1 in 4 chance to bias toward the player on this flip
              if (!randInt(4))
                  this.vel.y = sign(player.pos.y - this.pos.y) * abs(this.vel.y);
          }

          // move
          this.pos = this.pos.add(this.vel.scale(timeDelta));

          // bounce off zone top/bottom
          if (this.pos.y > this.zoneTop && this.vel.y > 0)
          {
              this.vel.y = -abs(this.vel.y);
              this.pos.y = this.zoneTop;
          }
          if (this.pos.y < this.zoneBottom && this.vel.y < 0)
          {
              this.vel.y = abs(this.vel.y);
              this.pos.y = this.zoneBottom;
          }

          // eat mushroom on current cell
          const cell = posToCell(this.pos);
          const key = cellKey(cell.x, cell.y);
          const m = mushrooms.get(key);
          if (m)
          {
              mushrooms.delete(key);
              m.destroy();
              sHit.play(this.pos, .4, .7);
              spawnBurst(this.pos, rgb(.95, .35, .35), 5, 3);
          }

          // exit playfield
          if (this.pos.x < -2 || this.pos.x > levelSize.x + 2)
              this.destroy();
      }

      hitByBullet()
      {
          const d = this.pos.distance(player.pos);
          const pts = d < 2 ? 900 : d < 4 ? 600 : 300;
          addScore(pts);
          new ScorePopup(this.pos, pts);
          sSpiderDie.play(this.pos, 1);
          spawnBurst(this.pos, rgb(.9, .25, .9), 12, 5.5);
          spawnBurst(this.pos, rgb(1, 1, .3), 6, 4);
          this.destroy();
      }

      render()
      {
          // spider sprite faces right; mirror when motion is leftward
          const mirror = this.vel.x < 0;
          drawTile(this.pos, vec2(2), sprites.spider, WHITE, 0, mirror);
      }
  }

  class ScorePopup extends EngineObject
  {
      constructor(pos, points)
      {
          super(pos.copy(), vec2());
          this.setCollision(false, false, false, false);
          this.mass = 0;
          this.points = points;
          this.life = 0;
          this.maxLife = 1.0;
          this.renderOrder = 20;
      }

      update()
      {
          this.life += timeDelta;
          this.pos.y += timeDelta * 1.5;
          if (this.life >= this.maxLife) this.destroy();
      }

      render()
      {
          const a = 1 - this.life / this.maxLife;
          drawText(this.points + '', this.pos, 1, rgb(1,1,.3,a), .12, rgb(0,0,0,a));
      }
  }

  ///////////////////////////////////////////////////////////////////////////////
  // Centipede chains (not EngineObjects themselves)

  class CentipedeChain
  {
      constructor(cells, dirX=-1)
      {
          this.dirX = dirX;
          this.dirY = -1;          // -1 descending, +1 ascending
          this.hitBottom = false;  // once true, the chain bounces in the player zone
          this.stepTimer = 0;
          this.stepEvery = max(.08, .14 - (level-1)*.01); // slightly faster each level

          this.segments = cells.map((c,i)=> new Segment(c, i===0));
      }

      destroy()
      {
          for (const s of this.segments)
              s.destroy();
          this.segments.length = 0;
      }

      get length() { return this.segments.length; }

      update(dt)
      {
          if (!this.segments.length) return;

          this.stepTimer += dt;
          while (this.stepTimer >= this.stepEvery)
          {
              this.stepTimer -= this.stepEvery;
              this.stepOnce();
          }
      }

      stepOnce()
      {
          if (!this.segments.length) return;

          // head cell
          const head = this.segments[0];
          const hx = head.cell.x, hy = head.cell.y;

          // try moving horizontally
          const nx = hx + this.dirX;
          const forwardCell = vec2(nx, hy);

          const blockedByWall = nx < 0 || nx >= gridSize.x;
          const blockedByMushroom = !blockedByWall && mushrooms.has(cellKey(forwardCell.x, forwardCell.y));

          let newHeadCell;
          if (blockedByWall || blockedByMushroom)
          {
              this.dirX *= -1;
              let newY = hy + this.dirY;
              if (newY < 0)
              {
                  // hit floor — start ascending and bounce within player zone from now on
                  this.dirY = +1;
                  this.hitBottom = true;
                  newY = 0;
              }
              else if (this.hitBottom && this.dirY === +1 && newY > turnUpZoneY)
              {
                  // hit top of player zone after bouncing — descend again
                  this.dirY = -1;
                  newY = turnUpZoneY;
              }
              else if (newY > gridSize.y - 1)
              {
                  this.dirY = -1;
                  newY = gridSize.y - 1;
              }
              newHeadCell = vec2(hx, newY);
          }
          else
              newHeadCell = forwardCell;

          // shift body
          for (let i=this.segments.length-1; i>0; --i)
              this.segments[i].setCell(this.segments[i-1].cell);
          head.setCell(newHeadCell);

          // keep head flag on segment[0] and propagate facing
          for (let i=0; i<this.segments.length; ++i)
              this.segments[i].isHead = (i===0);
          this.segments[0].headDirX = this.dirX;
      }

      rebuildLookup(map)
      {
          for (let i=0; i<this.segments.length; ++i)
          {
              const c = this.segments[i].cell;
              map.set(cellKey(c.x, c.y), {chain:this, index:i});
          }
      }
  }

  ///////////////////////////////////////////////////////////////////////////////
  // Game setup

  function resetGame()
  {
      engineObjectsDestroy();

      mushrooms = new Map();
      centipedes = [];
      segmentLookup = new Map();

      score = 0;
      lives = 3;
      level = 1;
      gameOver = false;
      gameWon = false;
      winTimer = 0;
      spider = null;
      spiderSpawnTimer = rand(5, 8);
      nextBonusLifeAt = BONUS_LIFE_AT;
      bottomReached = false;
      reinforcementTimer = 0;
      reinforcementsThisLevel = 0;

      // player
      player = new Player();

      spawnLevel();
  }

  function spawnLevel()
  {
      // clear any old level objects but keep player
      for (const o of engineObjects)
      {
          if (o === player) continue;
          o.destroy();
      }

      // rebuild maps
      mushrooms.clear();
      centipedes.length = 0;
      segmentLookup.clear();

      // reset bottom-zone state for the new wave
      bottomReached = false;
      reinforcementTimer = 0;
      reinforcementsThisLevel = 0;

      // spawn mushrooms
      const avoidRadius2 = 16; // keep them away from the player start
      const target = mushroomCountBase + (level-1)*6;
      let tries = 0;
      while (mushrooms.size < target && tries++ < target*40)
      {
          const cell = vec2(randInt(gridSize.x), randInt(gridSize.y-6) + 6); // mostly upper area
          if (mushrooms.has(cellKey(cell.x, cell.y))) continue;

          const d2 = cellCenter(cell).distanceSquared(vec2(levelSize.x/2, playerMinY + .5));
          if (d2 < avoidRadius2) continue;

          // avoid very top row so centipede has room
          if (cell.y >= gridSize.y-1) continue;

          const m = new Mushroom(cell);
          mushrooms.set(cellKey(cell.x, cell.y), m);
      }

      // spawn a centipede chain across the top
      const len = 12 + min(8, level*2);
      const startY = gridSize.y - 2;
      const startX = clamp((gridSize.x/2|0) - (len/2|0), 0, gridSize.x-len);
      const cells = [];
      for (let i=0; i<len; ++i)
          cells.push(vec2(startX+i, startY));
      centipedes.push(new CentipedeChain(cells, -1));

      // reset player
      player.pos = vec2(levelSize.x/2, playerMinY + .5);
      player.cooldown = 0;

      rebuildSegmentLookup();
  }

  function rebuildSegmentLookup()
  {
      segmentLookup.clear();
      for (const c of centipedes)
          c.rebuildLookup(segmentLookup);
  }

  function hitSegment(chain, index, cell)
  {
      // spawn a mushroom where it got hit (if empty)
      const key = cellKey(cell.x, cell.y);
      if (!mushrooms.has(key))
      {
          const m = new Mushroom(cell);
          // mushrooms created from hits start partially damaged for variety
          m.hp = 2 + randInt(3); // 2-4
          mushrooms.set(key, m);
      }

      // score — head = 100, body = 10 (arcade values)
      const isHeadHit = chain.segments[index].isHead;
      addScore(isHeadHit ? 100 : 10);

      // visible kill burst
      spawnBurst(cellCenter(cell), isHeadHit ? rgb(1, .35, .4) : rgb(.35, .95, .45), 7, 4);

      // split centipede: remove the hit segment, tail becomes a new chain
      const tail = chain.segments.splice(index + 1);
      const killed = chain.segments.splice(index, 1);
      for (const s of killed) s.destroy();

      // new chain from the tail
      if (tail.length)
      {
          // re-home tail segments into a new chain (keep their cells)
          const tailCells = tail.map(s=>s.cell.copy());
          for (const s of tail) s.destroy();
          const tailChain = new CentipedeChain(tailCells, chain.dirX);
          tailChain.dirY = chain.dirY;
          tailChain.hitBottom = chain.hitBottom;
          centipedes.push(tailChain);
      }

      // if chain empty, remove it
      if (!chain.length)
          centipedes = centipedes.filter(c=>c !== chain);

      rebuildSegmentLookup();

      // win if no segments left
      if (!centipedes.length)
      {
          gameWon = true;
          winTimer = 0;
          level++;
      }
  }

  function playerDie()
  {
      if (gameOver) return;
      lives--;
      sDie.play(player.pos, 1, 1 + rand(-.08,.08));
      spawnBurst(player.pos, rgb(.2, .9, 1), 14, 5);
      spawnBurst(player.pos, rgb(1, 1, 1), 6, 7);

      if (lives <= 0)
      {
          gameOver = true;
          gameOverHoldTimer = 1.5;
          return;
      }

      // quick reset position
      player.pos = vec2(levelSize.x/2, playerMinY + .5);
      player.cooldown = .25;
  }

  ///////////////////////////////////////////////////////////////////////////////
  // Engine callbacks

  async function gameInit()
  {
      debugShowErrors();

      setShowSplashScreen(false);
      setCanvasFixedSize(vec2(1280, 720));
      setCameraScale(30);
      setCameraPos(levelSize.scale(.5));
      setCanvasPixelated(false);
      setTilesPixelated(false);

      // build the procedural sprite atlas, then try to swap in centipede.png
      // if one is sitting next to this file (silent 404 if missing).
      // Awaiting the swap means the engine never renders the procedural
      // pixels — the PNG is uploaded before the first frame.
      buildSpriteAtlas();
      await useAtlasImage('centipede.png');

      try { bestScore = +localStorage.getItem('centipede.best') || 0; } catch(e) { bestScore = 0; }

      setSoundVolume(.8);
      installAutoPause(() => isPlaying);

      resetGame();
      buildMenus();
  }

  function startGame()
  {
      resetGame();
      isPlaying = true;
  }

  function quitToTitle()
  {
      if (typeof clearSubmenuStack === 'function') clearSubmenuStack();
      if (typeof hideAllMenus === 'function') hideAllMenus();
      resetGame();
      isPlaying = false;
      if (typeof showMenu === 'function') showMenu('title');
  }

  function buildMenus()
  {
      if (typeof createMenu !== 'function') return;

      createTitleMenu({
          title: 'CENTIPEDE',
          subtitle: 'Shoot the centipede',
          onPlay: startGame,
          revealOnClick: false,
          canReveal: () => !isPlaying,
          itemsBefore: [
              {type:'label', id:'bestLabel', text:`BEST ${bestScore}`},
          ],
          items: [
              {type:'button', label:'OPTIONS',     onClick: () => pushMenu('options')},
              {type:'button', label:'HOW TO PLAY', onClick: () => pushMenu('about')},
          ],
          onShow: () => {
              const m = getMenu('title');
              if (m) m.getItem('bestLabel')?.setLabel(`BEST ${bestScore}`);
          },
      });

      createMenu({
          id: 'options', title: 'OPTIONS', onHide: popMenu,
          items: [
              {type:'slider', id:'volume', label:'VOLUME', value:.8, min:0, max:1,
                  persist:'centipede.volume',
                  onChange: v => setSoundVolume(v)},
              {type:'separator'},
              {type:'button', label:'FULLSCREEN', onClick: toggleFullscreen},
              {type:'separator'},
              {type:'button', label:'BACK', onClick: () => hideMenu('options')},
          ],
      });

      createMenu({
          id: 'about', title: 'HOW TO PLAY', onHide: popMenu,
          items: [
              {type:'text', text:
                  'Shoot the centipede before it reaches you.\n\n' +
                  'MOVE with arrow keys, WASD, mouse, or left stick.\n' +
                  'FIRE with Space, click, or A button (hold to keep firing).\n\n' +
                  'Head segments are 100, body segments are 10. Shooting a middle ' +
                  'segment splits the chain and grows a mushroom field. Spiders ' +
                  'eat mushrooms and are worth bonus points. Stay in the bottom ' +
                  'zone — don\'t get touched. Esc pauses.'},
              {type:'separator'},
              {type:'button', label:'BACK', onClick: () => hideMenu('about')},
          ],
      });

      createMenu({
          id: 'pause', title: 'PAUSED', initialItemId: 'resume',
          items: [
              {type:'button', id:'resume',  label:'RESUME',        onClick: () => hideMenu('pause')},
              {type:'button', id:'restart', label:'RESTART',       onClick: () => { hideMenu('pause'); startGame(); }},
              {type:'button', id:'options', label:'OPTIONS',       onClick: () => pushMenu('options')},
              {type:'button', id:'quit',    label:'QUIT TO TITLE', onClick: () => {
                  showConfirmDialog({ message:'Quit to title?', onYes: quitToTitle });
              }},
          ],
      });

      createMenu({
          id: 'gameOver', title: 'GAME OVER', dismissable: false,
          onShow: () => {
              const m = getMenu('gameOver');
              if (!m) return;
              m.getItem('finalScore')?.setLabel(`SCORE  ${score}`);
              m.getItem('bestScore')?.setLabel(`BEST   ${bestScore}`);
              m.getItem('levelReached')?.setLabel(`LEVEL  ${level}`);
          },
          items: [
              {type:'label', id:'finalScore',   text:'SCORE  0'},
              {type:'label', id:'bestScore',    text:'BEST   0'},
              {type:'label', id:'levelReached', text:'LEVEL  0'},
              {type:'separator'},
              {type:'button', label:'PLAY AGAIN',    onClick: () => { hideMenu('gameOver'); startGame(); }},
              {type:'button', label:'QUIT TO TITLE', onClick: quitToTitle},
          ],
      });

      installDefaultToolbar();

      // Show the title menu immediately — no click-to-reveal step.
      showMenu('title');
  }

  function gameUpdate()
  {
      // Pause hotkey: Esc / gamepad Start. Skipped if gameOver menu is up.
      const endMenuShowing = (typeof getTopMenu === 'function') && getTopMenu()?.id === 'gameOver';
      if (isPlaying && !endMenuShowing &&
          (keyWasPressed('Escape') || gamepadWasPressed(9)))
      {
          if (typeof playMenuSound === 'function') playMenuSound('activate');
          if (typeof showMenu === 'function') showMenu('pause');
          inputClearKey('Escape');
          inputClearKey(9, 1, false, true, false);
          return;
      }

      // atlas tools: P saves atlas + prompt, L reloads centipede.png from disk
      if (keyWasPressed('KeyP'))
      {
          saveAtlasImage('centipede');
          saveAtlasPrompt('centipede-prompt');
      }
      if (keyWasPressed('KeyL'))
          useAtlasImage('centipede.png');

      // Attract mode: nothing animates on the title (no centipedes spawned yet),
      // and the game-over menu surfaces after a brief on-canvas hold.
      if (!isPlaying) return;

      if (gameOver && !endMenuShowing)
      {
          gameOverHoldTimer -= timeDelta;
          if (gameOverHoldTimer <= 0)
          {
              if (score > bestScore)
              {
                  bestScore = score;
                  try { localStorage.setItem('centipede.best', bestScore); } catch(e) {}
              }
              if (typeof showMenu === 'function') showMenu('gameOver');
          }
      }

      // update centipedes and collisions
      if (!gameOver && !gameWon)
      {
          for (const c of centipedes)
              c.update(timeDelta);
          rebuildSegmentLookup();

          // player collision with segments
          for (const c of centipedes)
          {
              for (const s of c.segments)
              {
                  if (isOverlapping(player.pos, player.size, s.pos, s.size))
                  {
                      playerDie();
                      break;
                  }
              }
          }

          // detect first time the centipede reaches the player zone
          if (!bottomReached)
          {
              for (const c of centipedes)
              {
                  for (const s of c.segments)
                      if (s.cell.y <= 1)
                      {
                          bottomReached = true;
                          reinforcementTimer = 3; // grace period before first reinforcement
                          break;
                      }
                  if (bottomReached) break;
              }
          }

          // once bottom is reached, spawn reinforcement single-head chains from the top-right
          const maxReinf = 3 + level;
          if (bottomReached && reinforcementsThisLevel < maxReinf && centipedes.length > 0)
          {
              reinforcementTimer -= timeDelta;
              if (reinforcementTimer <= 0)
              {
                  reinforcementTimer = max(2.5, 5 - level * .3);
                  const cell = vec2(gridSize.x - 1, gridSize.y - 1);
                  // clear the spawn cell so it can move
                  const sk = cellKey(cell.x, cell.y);
                  const blocking = mushrooms.get(sk);
                  if (blocking) { blocking.destroy(); mushrooms.delete(sk); }
                  centipedes.push(new CentipedeChain([cell], -1));
                  reinforcementsThisLevel++;
                  rebuildSegmentLookup();
              }
          }

          // spider spawn / cleanup / player collision
          if (spider && spider.destroyed)
          {
              spider = null;
              spiderSpawnTimer = rand(4, 7) - clamp((level-1) * .3, 0, 3);
          }
          if (!spider)
          {
              spiderSpawnTimer -= timeDelta;
              if (spiderSpawnTimer <= 0)
                  spider = new Spider();
          }
          else if (isOverlapping(player.pos, player.size, spider.pos, spider.size))
          {
              spider.destroy();
              spider = null;
              spiderSpawnTimer = rand(4, 7);
              playerDie();
          }
      }

      // next level after a win
      if (gameWon)
      {
          winTimer += timeDelta;
          if (winTimer > 1.0)
          {
              winTimer = 0;
              gameWon = false;
              spawnLevel();
          }
      }
  }

  function gameUpdatePost()
  {
      // keep camera steady
      setCameraPos(levelSize.scale(.5));
  }

  function gameRender()
  {
      // background
      drawRect(cameraPos, vec2(200), rgb(.05,.06,.08));

      // playfield boundary
      drawRect(cameraPos, levelSize.add(vec2(.2)), rgb(0,0,0,.9));
      drawRect(cameraPos, levelSize, rgb(.08,.09,.11));

      // subtle grid
      for (let x=0; x<=gridSize.x; ++x)
          drawLine(vec2(x,0), vec2(x,gridSize.y), .03, rgb(0,0,0,.22));
      for (let y=0; y<=gridSize.y; ++y)
          drawLine(vec2(0,y), vec2(gridSize.x,y), .03, rgb(0,0,0,.22));

      // player zone line
      drawLine(vec2(0, playerMaxY+1), vec2(gridSize.x, playerMaxY+1), .06, rgb(1,1,1,.08));
  }

  function gameRenderPost()
  {
      if (!isPlaying) return; // title screen — menu owns the display

      // HUD
      const left = 18;
      const top = 16;
      drawTextScreen(`Score ${score}`, vec2(left, top), 22, rgb(1,1,1), 4, rgb(0,0,0), 'left');
      drawTextScreen(`Lives ${lives}`, vec2(left, top+26), 22, rgb(1,1,1), 4, rgb(0,0,0), 'left');
      drawTextScreen(`Level ${level}`, vec2(left, top+52), 22, rgb(1,1,1), 4, rgb(0,0,0), 'left');

      // Brief on-canvas banner before the gameOver menu surfaces.
      if (gameOver && gameOverHoldTimer > 0)
          drawTextScreen('GAME OVER', vec2(mainCanvasSize.x/2, mainCanvasSize.y/2), 52, rgb(1,.35,.35), 8, rgb(0,0,0));
      else if (gameWon)
          drawTextScreen('CLEARED!  Next wave…', vec2(mainCanvasSize.x/2, mainCanvasSize.y/2), 52, rgb(.35,1,.55), 8, rgb(0,0,0));
  }

  // Startup
  engineInit(gameInit, gameUpdate, gameUpdatePost, gameRender, gameRenderPost);

  </script>
