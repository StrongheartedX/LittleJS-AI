<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>LittleJS Froggit</title>
  <style>
    html, body { margin:0; padding:0; background:#000; overflow:hidden; }
    canvas { image-rendering: pixelated; }
  </style>
</head>
<body>
  <script src="../dist/littlejs.js?1780012197793"></script>
  <script src="../templates/gameFx.js?1780012197793"></script>
  <script src="../templates/textureGenerator.js?1780012197793"></script>
  <script src="../templates/menus.js?1780012197793"></script>
  <script>
  'use strict';

  // engine settings
  debugWatermark = false;
  showEngineVersion = false;

  // Touch: tap one of the four screen triangles (divided by the diagonals) to
  // hop in that direction. Handled directly in handleInput — no touch gamepad.
  touchGamepadEnable = false;

  // ------------------------------------------------------------
  // Frogger (primitives only)

  const LEVEL_W = 30;
  const LEVEL_H = 20;
  const DT = 1/60;

  // Generous off-screen padding so cars/logs spawn and wrap
  // well outside the visible camera area (no pop-in).
  const OFFSCREEN_PAD = 10;

  const ROAD_MIN_Y  = 4;
  const ROAD_MAX_Y  = 8;
  const RIVER_MIN_Y = 11;
  const RIVER_MAX_Y = 15;
  const HOME_Y      = 16;

  const frogSize = vec2(.75, .75);

  // ---- Texture atlas ----
  // Every moving entity is blitted from a 16-tile / 500px atlas built in
  // gameInit. Car bodies are painted in grayscale ("base") so drawTile's
  // color multiply tints them to a random hue; a second "detail" tile
  // (windows / lights / trim, in true colors) blits on top with no tint.
  const sprites = {};

  // World-space render footprints the body tiles are drawn at (the tiles are
  // square 500px; tiny vertical squish from non-square footprints is fine for
  // these stylized shapes). Wheels are a separate shared tile placed at axles.
  const carRender = {
    sedan:  vec2(2.0, 1.10),
    wagon:  vec2(2.2, 1.12),
    sports: vec2(2.0, 1.12),
    bus:    vec2(3.3, 1.30),
  };
  const TRUCK_CAB     = vec2(1.10, 1.18);
  const TRUCK_TRAILER = vec2(1.70, 1.24);
  const TRUCK_GAP     = -.15;
  const TIRE_SIZE     = vec2(.62, .62);
  // Raise each car this fraction of its height within its lane so it sits on
  // the road instead of straddling the lane line.
  const CAR_LIFT      = .35;

  // ---- Wheel placement ----  (one place to tweak where tires sit)
  // Fractions are of the relevant body's render size; tweak + reload.
  const WHEEL = {
    drop:        .42,  // axle below body center, as a fraction of car HEIGHT
    axle:        .30,  // front/rear axles from center, as a fraction of car WIDTH
    truckDrop:   .50,  // truck axle drop, in WORLD units (cab/trailer differ)
    cabAxle:     .0,  // cab axle toward the front (fraction of cab width)
    trailerRear: .30,  // trailer rear axle toward the back (fraction of trailer width)
    trailerMid:  .2,  // trailer mid axle toward the front (fraction of trailer width)
  };

  const homeSlots = 5;
  const homeXs = Array.from({length: homeSlots}, (_,i)=>
    (3 + i * (LEVEL_W-6)/(homeSlots-1))
  );

  // Game state
  let frog, cars = [], logs = [];
  // Short-lived death particles. The player vanishes on death and these
  // play in its place — same effect for road and water, just a different hue.
  let particles = [];
  let reached = new Array(homeSlots).fill(false);
  let lives = 3, level = 1;
  let bestLevel = 1;
  let respawnTimer;
  let gameOver = false;
  let gameOverHoldTimer = 0; // seconds before gameOver menu surfaces

  // Sounds
  let sHop, sDie, sHome, sLevel;

  function gridToWorld(gx, gy) { return vec2(gx + .5, gy + .5); }
  function worldToGridPos(p) { return vec2(Math.floor(p.x), Math.floor(p.y)); }

  function clampFrogGrid(g) {
    g.x = clamp(g.x, 0, LEVEL_W-1);
    g.y = clamp(g.y, 0, LEVEL_H-1);
    return g;
  }

  function overlapAABB(posA, sizeA, posB, sizeB) {
    return Math.abs(posA.x - posB.x) < (sizeA.x + sizeB.x)/2 &&
           Math.abs(posA.y - posB.y) < (sizeA.y + sizeB.y)/2;
  }

  function resetRun(full=false) {
    frog.grid = vec2(Math.floor(LEVEL_W/2), 1);
    frog.pos = gridToWorld(frog.grid.x, frog.grid.y);
    frog.carryVx = 0;
    frog.facing = vec2(0, 1);
    frog.hopAnim = 0;
    frog.onLog = null;
    if (full) {
      reached.fill(false);
      lives = 3;
      level = 1;
      buildLanes();
    }
  }

  function buildLanes() {
    cars.length = 0;
    logs.length = 0;

    const speedScale = (1 + (level-1) * .12) * .5;

    // ---- Cars ----
    const carKinds = ['sedan','wagon','sports','truck','bus'];
    const roadDefs = [
      {y:4, dir: 1, speed: 5.5, count: 3, w: 2.0, kind:'sedan'},
      {y:5, dir:-1, speed: 7.0, count: 3, w: 2.2, kind:'wagon'},
      {y:6, dir: 1, speed: 8.5, count: 3, w: 1.6, kind:'sports'},
      {y:7, dir:-1, speed: 6.0, count: 3, w: 2.8, kind:'truck'},
      {y:8, dir: 1, speed: 7.8, count: 2, w: 3.2, kind:'bus'},
    ];
    for (const d of roadDefs) {
      const totalSpan = LEVEL_W + OFFSCREEN_PAD*2;
      for (let i=0; i<d.count; i++) {
        const x = -OFFSCREEN_PAD + (i * totalSpan / d.count) + rand(0, 2);
        cars.push({
          pos: vec2(x, d.y + .5),
          size: vec2(d.w, .85),
          vx: d.dir * d.speed * speedScale,
          dir: d.dir,
          kind: d.kind,
          color: hsl(((d.y*37 + i*61) % 360)/360, .85, .55),
          seed: rand(0, 1000),
        });
      }
    }

    // ---- Logs ----
    const riverDefs = [
      {y:11, dir:-1, speed: 3.5, count: 4, w: 4.5},
      {y:12, dir: 1, speed: 4.2, count: 4, w: 3.6},
      {y:13, dir:-1, speed: 4.8, count: 3, w: 5.5},
      {y:14, dir: 1, speed: 3.9, count: 5, w: 3.2},
      {y:15, dir:-1, speed: 4.4, count: 4, w: 4.0},
    ];
    for (const d of riverDefs) {
      const totalSpan = LEVEL_W + OFFSCREEN_PAD*2;
      for (let i=0; i<d.count; i++) {
        const x = -OFFSCREEN_PAD + (i * totalSpan / d.count) + rand(0, 2);
        logs.push({
          pos: vec2(x, d.y + .5),
          size: vec2(d.w, .85),
          vx: d.dir * d.speed * speedScale,
          color: hsl(28/360, .55, .32 + .04*(i%3)),
          seed: rand(0, 1000),
        });
      }
    }
  }

  function killFrog() {
    if (respawnTimer.active()) return;

    // Pick a particle palette by where the frog died (water vs. dry land).
    const gy = frog.grid.y;
    const inWater = gy >= RIVER_MIN_Y && gy <= HOME_Y;
    const hue = inWater ? 205/360 : 105/360;
    const sat = inWater ? .55 : .75;
    const light = inWater ? .70 : .45;

    for (let i = 0; i < 24; i++) {
      const a = rand(0, Math.PI * 2);
      const s = rand(1.8, 4.2);
      particles.push({
        pos: frog.pos.copy(),
        vel: vec2(Math.cos(a) * s, Math.sin(a) * s * .6 + rand(1.6, 3.4)),
        life: 0,
        maxLife: rand(.55, .95),
        h: hue,
        s: sat,
        l: light + rand(-.10, .12),
        size: rand(.07, .15),
      });
    }

    sDie.play(frog.pos);
    lives--;
    respawnTimer.set(1);
    if (lives < 0) {
      gameOver = true;
      gameOverHoldTimer = 1.4;
      if (level > bestLevel) {
        bestLevel = level;
        saveData({bestLevel});
      }
    }
  }

  function reachHome(slotIndex) {
    if (reached[slotIndex]) return;
    reached[slotIndex] = true;
    sHome.play(frog.pos);
    resetRun(false);

    if (reached.every(Boolean)) {
      level++;
      sLevel.play(vec2(LEVEL_W/2, HOME_Y+.5));
      reached.fill(false);
      buildLanes();
    }
  }

  function tryMove(dx, dy) {
    if (respawnTimer.active()) return;

    const g = frog.grid.copy();
    g.x += dx;
    g.y += dy;

    if (g.x < 0 || g.x >= LEVEL_W || g.y < 0 || g.y >= LEVEL_H) {
      killFrog();
      return;
    }
    if (g.y > HOME_Y) return;

    frog.grid = g;
    frog.pos = gridToWorld(frog.grid.x, frog.grid.y);
    frog.carryVx = 0;
    frog.facing = vec2(dx, dy);
    frog.hopAnim = 1;
    sHop.play(frog.pos);
  }

  // Last cardinal direction from the analog/touch stick — used to edge-trigger
  // hops so holding the stick doesn't auto-hop every frame.
  let lastStickDir = vec2();

  function handleInput() {
    // Keyboard: one-shot hop per press (arcade-style)
    const up    = keyWasPressed('ArrowUp')   || keyWasPressed('KeyW');
    const down  = keyWasPressed('ArrowDown') || keyWasPressed('KeyS');
    const left  = keyWasPressed('ArrowLeft') || keyWasPressed('KeyA');
    const right = keyWasPressed('ArrowRight')|| keyWasPressed('KeyD');

    if (up)    return tryMove(0, 1);
    if (down)  return tryMove(0,-1);
    if (left)  return tryMove(-1,0);
    if (right) return tryMove(1, 0);

    // Physical D-pad buttons (12-15) — edge-triggered automatically.
    if (gamepadWasPressed(12)) return tryMove(0, 1);
    if (gamepadWasPressed(13)) return tryMove(0,-1);
    if (gamepadWasPressed(14)) return tryMove(-1,0);
    if (gamepadWasPressed(15)) return tryMove(1, 0);

    // Touch: tap one of the four screen triangles (split by the diagonals).
    // Top triangle hops up, bottom hops down, left/right hop sideways.
    if (isTouchDevice && mouseWasPressed(0) && !isMenuVisible()) {
      const dx = mousePosScreen.x - mainCanvasSize.x * .5;
      const dy = mousePosScreen.y - mainCanvasSize.y * .5;
      if (abs(dx) > abs(dy)) return tryMove(sign(dx), 0);
      if (dy !== 0)          return tryMove(0, sign(-dy)); // screen-y is down-positive; world-y is up
    }

    // Stick (analog only — touch gamepad is disabled): pick dominant cardinal,
    // but only hop on the
    // frame the stick crosses INTO that direction. Returning to neutral arms
    // the next hop.
    const stick = gamepadStick(0);
    let dir = vec2();
    if (stick.lengthSquared() > .5*.5) {
      dir = abs(stick.x) > abs(stick.y)
        ? vec2(sign(stick.x), 0)
        : vec2(0, sign(stick.y));
    }
    if ((dir.x !== lastStickDir.x || dir.y !== lastStickDir.y) &&
        (dir.x || dir.y))
    {
      tryMove(dir.x, dir.y);
    }
    lastStickDir = dir;
  }

  function updateObstacles(arr) {
    for (const o of arr) {
      o.pos.x += o.vx * DT;
      const pad = o.size.x/2 + OFFSCREEN_PAD;
      if (o.pos.x < -pad) o.pos.x = LEVEL_W + pad;
      if (o.pos.x > LEVEL_W + pad) o.pos.x = -pad;
    }
  }

  function frogWorldChecks() {
    if (respawnTimer.active()) return;

    for (const c of cars) {
      if (overlapAABB(frog.pos, frogSize, c.pos, c.size)) {
        killFrog();
        return;
      }
    }

    const gy = frog.grid.y;
    const inRiver = gy >= RIVER_MIN_Y && gy <= RIVER_MAX_Y;
    if (inRiver) {
      let onLog = null;
      for (const l of logs) {
        if (overlapAABB(frog.pos, frogSize, l.pos, l.size)) { onLog = l; break; }
      }
      frog.onLog = onLog;
      if (!onLog) { killFrog(); return; }

      frog.carryVx = onLog.vx;
      frog.pos.x += frog.carryVx * DT;

      if (frog.pos.x < .25 || frog.pos.x > LEVEL_W - .25) {
        killFrog();
        return;
      }
      frog.grid = clampFrogGrid(worldToGridPos(frog.pos));
    } else {
      frog.onLog = null;
    }

    if (frog.grid.y === HOME_Y) {
      let best = -1, bestDx = 999;
      for (let i=0;i<homeSlots;i++) {
        const dx = Math.abs(frog.pos.x - (homeXs[i] + .5));
        if (dx < bestDx) { bestDx = dx; best = i; }
      }
      if (bestDx < 1.3) reachHome(best);
      else killFrog();
    }
  }

  // ------------------------------------------------------------
  // Engine callbacks

  function gameInit() {
    saveDataInit('frogger');
    setCanvasFixedSize(vec2(960, 540));
    cameraScale = 28;
    setCameraPos(vec2(LEVEL_W/2, LEVEL_H/2));

    buildAtlas();

    frog = {
      grid: vec2(Math.floor(LEVEL_W/2), 1),
      pos: vec2(),
      carryVx: 0,
      facing: vec2(0, 1),
      hopAnim: 0,
      onLog: null,
    };

    respawnTimer = new Timer(); respawnTimer.unset();

    sHop  = new SoundGenerator({ volume:.6, frequency:640, randomness:.08, attack:0, release:.06, shapeCurve:1.6 });
    sDie  = new SoundGenerator({ volume:.9, frequency:180, randomness:.2,  attack:0, release:.28, shapeCurve:.6, slide:-1.6, noise:.15 });
    sHome = new SoundGenerator({ volume:.8, frequency:720, randomness:.06, attack:0, release:.14, shapeCurve:1.2, pitchJump:360, pitchJumpTime:.04 });
    sLevel= new SoundGenerator({ volume:.9, frequency:420, randomness:.03, attack:0, release:.35, shapeCurve:1.1, repeatTime:.08, pitchJump:140, pitchJumpTime:.02 });

    bestLevel = getSaveData().bestLevel ?? 1;

    setSoundVolume(.8);
    if (typeof installAutoPause === 'function')
        installAutoPause();

    buildLanes();
    resetRun(true);
    buildMenus();
  }

  function startGame() {
    gameOver = false;
    resetRun(true);
    setPlaying(true);
  }

  function quitToTitleWithCleanup() {
    quitToTitle(() => { gameOver = false; resetRun(true); });
  }

  function buildMenus() {
    if (typeof createMenu !== 'function') return;

    createTitleMenu({
      title: 'FROGGIT',
      subtitle: 'Cross the road and the river',
      onPlay: startGame,
      revealOnClick: false,
      canReveal: () => !isPlaying(),
      itemsBefore: [
        {type:'label', id:'bestLabel', text:`BEST LEVEL ${bestLevel}`},
      ],
      items: [
        {type:'button', label:'OPTIONS',     onClick: () => pushMenu('options')},
        {type:'button', label:'HOW TO PLAY', onClick: () => pushMenu('about')},
      ],
      onShow: () => {
        const m = getMenu('title');
        if (m) m.getItem('bestLabel')?.setLabel(`BEST LEVEL ${bestLevel}`);
      },
    });

    createOptionsMenu();

    createMenu({
      id: 'about', title: 'HOW TO PLAY', onHide: popMenu,
      items: [
        {type:'text', text:
          'Get five frogs home, one at a time.\n\n' +
          'HOP with arrow keys, WASD, D-pad, or left stick. On touch, tap one ' +
          'of the four screen edges — the direction you tap is the way you hop.\n\n' +
          'Avoid the cars on the road; ride logs across the river — don\'t touch ' +
          'the water. Fill all five home slots and the level repeats faster.\n\n' +
          'Three lives. Esc pauses.'},
        {type:'separator'},
        {type:'button', label:'BACK', onClick: () => hideMenu('about')},
      ],
    });

    createPauseMenu({
      onRestart: startGame,
      onQuit:    quitToTitleWithCleanup,
      extraItems: [
        {type:'button', label:'OPTIONS', onClick: () => pushMenu('options')},
      ],
    });

    createMenu({
      id: 'gameOver', title: 'GAME OVER', dismissable: false,
      onShow: () => {
        const m = getMenu('gameOver');
        if (!m) return;
        m.getItem('levelReached')?.setLabel(`LEVEL  ${level}`);
        m.getItem('bestLabel')?.setLabel(`BEST   ${bestLevel}`);
      },
      items: [
        {type:'label', id:'levelReached', text:'LEVEL  0'},
        {type:'label', id:'bestLabel',    text:'BEST   0'},
        {type:'separator'},
        {type:'button', label:'PLAY AGAIN',    onClick: () => { hideMenu('gameOver'); startGame(); }},
        {type:'button', label:'QUIT TO TITLE', onClick: quitToTitleWithCleanup},
      ],
    });

    installDefaultToolbar();

    // Show the title menu immediately — no click-to-reveal step.
    showMenu('title');
  }

  function gameUpdate() {
    // Pause hotkey: Esc / gamepad Start. Skipped if gameOver menu is up.
    const endMenuShowing = (typeof getTopMenu === 'function') && getTopMenu()?.id === 'gameOver';
    if (isPlaying() && !endMenuShowing &&
        (keyWasPressed('Escape') || gamepadWasPressed(9)))
    {
      if (typeof playMenuSound === 'function') playMenuSound('activate');
      if (typeof showMenu === 'function') showMenu('pause');
      inputClearKey('Escape');
      inputClearKey(9, 1, false, true, false);
      return;
    }

    if (!isPlaying()) {
      // Attract: keep cars / logs scrolling so the title screen feels alive.
      updateObstacles(cars);
      updateObstacles(logs);
      return;
    }

    if (gameOver) {
      // Tick remaining death particles so they finish their arcs cleanly.
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.life += DT;
        p.vel.y -= 8 * DT;
        p.pos.x += p.vel.x * DT;
        p.pos.y += p.vel.y * DT;
        if (p.life >= p.maxLife) particles.splice(i, 1);
      }
      if (!endMenuShowing) {
        gameOverHoldTimer -= DT;
        if (gameOverHoldTimer <= 0 && typeof showMenu === 'function')
          showMenu('gameOver');
      }
      return;
    }

    if (respawnTimer.elapsed()) {
      respawnTimer.unset();
      resetRun(false);
    }

    handleInput();
    updateObstacles(cars);
    updateObstacles(logs);
    frogWorldChecks();

    // tick & cull death particles (simple gravity arcs)
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.life += DT;
      p.vel.y -= 8 * DT;
      p.pos.x += p.vel.x * DT;
      p.pos.y += p.vel.y * DT;
      if (p.life >= p.maxLife) particles.splice(i, 1);
    }

    if (frog.hopAnim > 0)
      frog.hopAnim = Math.max(0, frog.hopAnim - DT * 6);
  }

  function gameUpdatePost() {
    setCameraPos(vec2(LEVEL_W/2, LEVEL_H/2));
  }

  // ------------------------------------------------------------
  // Atlas paint functions — each fills the 500x500 tile. Cars/trucks face
  // RIGHT (front + headlights at large x); they're mirrored when moving left.
  // Bodies are grayscale (white = full tint, darker grays = baked shading).

  function carBaseGrad(ctx, top, bot) {
    const g = ctx.createLinearGradient(0, top, 0, bot);
    g.addColorStop(0,  '#ffffff');
    g.addColorStop(.5, '#e8e8e8');
    g.addColorStop(1,  '#a6a6a6');
    return g;
  }

  function paintSedanBase(ctx) {
    ctx.lineJoin = 'round'; ctx.strokeStyle = '#454545'; ctx.lineWidth = 14;
    ctx.fillStyle = carBaseGrad(ctx, 110, 390);
    ctx.beginPath(); ctx.roundRect(150, 118, 205, 122, [78,78,12,12]); ctx.fill(); ctx.stroke();
    ctx.beginPath(); ctx.roundRect(28, 212, 444, 168, [55,78,55,55]); ctx.fill(); ctx.stroke();
  }
  function paintSedanDetail(ctx) {
    ctx.fillStyle = '#bfe6ff';
    ctx.beginPath(); ctx.roundRect(168, 138, 168, 80, [48,48,8,8]); ctx.fill();
    ctx.fillStyle = 'rgba(70,86,98,.5)'; ctx.fillRect(246, 138, 12, 80);
    ctx.fillStyle = '#fff1a0'; ctx.beginPath(); ctx.roundRect(442, 248, 26, 54, 9); ctx.fill();
    ctx.fillStyle = '#ff4736'; ctx.beginPath(); ctx.roundRect(33, 252, 24, 50, 9); ctx.fill();
    ctx.strokeStyle = 'rgba(40,44,48,.35)'; ctx.lineWidth = 6;
    ctx.beginPath(); ctx.moveTo(250, 232); ctx.lineTo(250, 372); ctx.stroke();
  }

  function paintWagonBase(ctx) {
    ctx.lineJoin = 'round'; ctx.strokeStyle = '#454545'; ctx.lineWidth = 14;
    ctx.fillStyle = carBaseGrad(ctx, 100, 390);
    ctx.beginPath(); ctx.roundRect(72, 108, 298, 134, [34,82,12,12]); ctx.fill(); ctx.stroke();
    ctx.beginPath(); ctx.roundRect(28, 210, 444, 172, [55,60,55,55]); ctx.fill(); ctx.stroke();
  }
  function paintWagonDetail(ctx) {
    ctx.fillStyle = '#bfe6ff';
    ctx.beginPath(); ctx.roundRect(90, 130, 128, 88, [26,10,8,8]); ctx.fill();
    ctx.beginPath(); ctx.roundRect(238, 130, 118, 88, [10,44,8,8]); ctx.fill();
    ctx.fillStyle = 'rgba(70,86,98,.5)'; ctx.fillRect(224, 128, 14, 92);
    ctx.fillStyle = '#fff1a0'; ctx.beginPath(); ctx.roundRect(442, 250, 26, 52, 9); ctx.fill();
    ctx.fillStyle = '#ff4736'; ctx.beginPath(); ctx.roundRect(33, 250, 24, 52, 9); ctx.fill();
    ctx.fillStyle = 'rgba(40,44,48,.5)'; ctx.fillRect(40, 344, 420, 14);
  }

  function paintSportsBase(ctx) {
    ctx.lineJoin = 'round'; ctx.strokeStyle = '#3a3a3a'; ctx.lineWidth = 14;
    ctx.fillStyle = carBaseGrad(ctx, 180, 380);
    ctx.beginPath(); ctx.roundRect(175, 196, 170, 72, [54,32,8,8]); ctx.fill(); ctx.stroke();
    ctx.beginPath(); ctx.roundRect(24, 250, 452, 130, [70,92,52,52]); ctx.fill(); ctx.stroke();
  }
  function paintSportsDetail(ctx) {
    ctx.fillStyle = '#bfe6ff';
    ctx.beginPath(); ctx.roundRect(190, 210, 140, 48, [36,24,6,6]); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,.85)'; ctx.fillRect(40, 300, 420, 20);
    ctx.fillStyle = '#fff1a0'; ctx.beginPath(); ctx.roundRect(446, 286, 22, 48, 8); ctx.fill();
    ctx.fillStyle = '#ff4736'; ctx.beginPath(); ctx.roundRect(33, 290, 22, 44, 8); ctx.fill();
  }

  function paintBusBase(ctx) {
    ctx.lineJoin = 'round'; ctx.strokeStyle = '#4a4a4a'; ctx.lineWidth = 14;
    ctx.fillStyle = carBaseGrad(ctx, 70, 400);
    ctx.beginPath(); ctx.roundRect(24, 78, 452, 316, [60,60,50,50]); ctx.fill(); ctx.stroke();
  }
  function paintBusDetail(ctx) {
    ctx.fillStyle = '#bfe6ff';
    ctx.beginPath(); ctx.roundRect(44, 120, 412, 108, 16); ctx.fill();
    ctx.fillStyle = 'rgba(70,86,98,.55)';
    for (let i = 1; i < 5; i++) ctx.fillRect(44 + i*82, 118, 12, 112);
    ctx.fillStyle = 'rgba(255,255,255,.5)'; ctx.fillRect(34, 300, 432, 16);
    ctx.fillStyle = '#fff1a0'; ctx.beginPath(); ctx.roundRect(446, 330, 24, 44, 8); ctx.fill();
  }

  function paintCabBase(ctx) {
    ctx.lineJoin = 'round'; ctx.strokeStyle = '#454545'; ctx.lineWidth = 16;
    ctx.fillStyle = carBaseGrad(ctx, 80, 400);
    ctx.beginPath(); ctx.roundRect(60, 90, 380, 300, [70,70,40,40]); ctx.fill(); ctx.stroke();
  }
  function paintCabDetail(ctx) {
    ctx.fillStyle = '#bfe6ff';
    ctx.beginPath(); ctx.roundRect(250, 120, 170, 120, [20,46,10,10]); ctx.fill();
    ctx.fillStyle = '#fff1a0'; ctx.beginPath(); ctx.roundRect(410, 300, 30, 62, 10); ctx.fill();
    ctx.fillStyle = 'rgba(40,44,48,.6)'; ctx.fillRect(404, 250, 40, 42);
  }

  function paintTrailerBase(ctx) {
    ctx.lineJoin = 'round'; ctx.strokeStyle = '#454545'; ctx.lineWidth = 16;
    ctx.fillStyle = carBaseGrad(ctx, 70, 410);
    ctx.beginPath(); ctx.roundRect(30, 80, 440, 320, [36,36,30,30]); ctx.fill(); ctx.stroke();
  }
  function paintTrailerDetail(ctx) {
    ctx.strokeStyle = 'rgba(40,44,48,.4)'; ctx.lineWidth = 8;
    for (let i = 1; i < 5; i++) { ctx.beginPath(); ctx.moveTo(30 + i*88, 92); ctx.lineTo(30 + i*88, 390); ctx.stroke(); }
    ctx.strokeStyle = 'rgba(40,44,48,.55)'; ctx.lineWidth = 10;
    ctx.beginPath(); ctx.roundRect(44, 96, 96, 290, 12); ctx.stroke();
  }

  function paintTire(ctx) {
    ctx.fillStyle = '#161616'; ctx.beginPath(); ctx.arc(250, 250, 232, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#383838'; ctx.beginPath(); ctx.arc(250, 250, 150, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#9a9a9a'; ctx.beginPath(); ctx.arc(250, 250, 92, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#5a5a5a'; ctx.beginPath(); ctx.arc(250, 250, 36, 0, Math.PI*2); ctx.fill();
  }

  function paintLog(ctx) {
    ctx.lineJoin = 'round';
    const g = ctx.createLinearGradient(0, 80, 0, 420);
    g.addColorStop(0, '#a9743f'); g.addColorStop(.5, '#8a5a2c'); g.addColorStop(1, '#5f3c1c');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.roundRect(18, 90, 464, 320, 44); ctx.fill();
    ctx.strokeStyle = '#4a2e15'; ctx.lineWidth = 12; ctx.stroke();
    // bark grooves
    ctx.strokeStyle = 'rgba(60,38,18,.5)'; ctx.lineWidth = 9;
    for (const gx of [165, 250, 335]) { ctx.beginPath(); ctx.moveTo(gx, 104); ctx.lineTo(gx, 396); ctx.stroke(); }
    // cut-face rings at both ends
    const rings = [['#7a4f27',1],['#9a6a38',.74],['#b5854c',.5],['#caa06a',.26]];
    for (const ex of [78, 422])
      for (const [col, k] of rings) {
        ctx.fillStyle = col;
        ctx.beginPath(); ctx.ellipse(ex, 250, 52*k, 150*k, 0, 0, Math.PI*2); ctx.fill();
      }
  }

  function paintFrog(ctx) {
    // painted facing UP (head at small y); rotated by facing at draw time
    ctx.lineJoin = 'round';
    const green = '#54b62e', dark = '#2f7a1a', light = '#7fd94f';
    ctx.fillStyle = dark;
    ctx.beginPath(); ctx.ellipse(118, 360, 72, 96, -.5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(382, 360, 72, 96,  .5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(132, 198, 46, 78, -.3, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(368, 198, 46, 78,  .3, 0, Math.PI*2); ctx.fill();
    const bg = ctx.createRadialGradient(250, 220, 36, 250, 255, 200);
    bg.addColorStop(0, light); bg.addColorStop(1, green);
    ctx.fillStyle = bg;
    ctx.beginPath(); ctx.ellipse(250, 262, 150, 180, 0, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = dark; ctx.lineWidth = 10; ctx.stroke();
    ctx.fillStyle = dark;
    ctx.beginPath(); ctx.arc(202, 300, 21, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(298, 300, 21, 0, Math.PI*2); ctx.fill();
    for (const ex of [185, 315]) {
      ctx.fillStyle = green; ctx.beginPath(); ctx.arc(ex, 122, 66, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = dark; ctx.lineWidth = 8; ctx.stroke();
      ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(ex, 126, 42, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#111'; ctx.beginPath(); ctx.arc(ex, 116, 21, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(ex - 9, 107, 8, 0, Math.PI*2); ctx.fill();
    }
  }

  function paintLily(ctx) {
    const g = ctx.createRadialGradient(250, 225, 30, 250, 250, 230);
    g.addColorStop(0, '#5aa64a'); g.addColorStop(1, '#2f6b28');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(250, 250, 226, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#234f1e'; ctx.lineWidth = 14; ctx.stroke();
    // cut the wedge notch out so the water behind shows through
    ctx.globalCompositeOperation = 'destination-out';
    ctx.beginPath(); ctx.moveTo(250, 250); ctx.lineTo(182, 504); ctx.lineTo(318, 504); ctx.closePath(); ctx.fill();
    ctx.globalCompositeOperation = 'source-over';
    // radial veins
    ctx.strokeStyle = 'rgba(20,60,18,.5)'; ctx.lineWidth = 8;
    for (let i = 0; i < 7; i++) {
      const a = -Math.PI/2 + (i-3)*.6;
      ctx.beginPath(); ctx.moveTo(250, 250);
      ctx.lineTo(250 + Math.cos(a)*210, 250 + Math.sin(a)*210); ctx.stroke();
    }
  }

  function buildAtlas() {
    initDrawToTexture();
    sprites.sedanBase     = drawToTexture(0,  paintSedanBase,     'white sedan body, side view, tintable');
    sprites.sedanDetail   = drawToTexture(1,  paintSedanDetail,   'sedan blue windows, yellow headlight, red taillight overlay');
    sprites.wagonBase     = drawToTexture(2,  paintWagonBase,     'white station-wagon body with long roof, tintable');
    sprites.wagonDetail   = drawToTexture(3,  paintWagonDetail,   'wagon two side windows + trim + lights overlay');
    sprites.sportsBase    = drawToTexture(4,  paintSportsBase,    'white low sleek sports-car body, tintable');
    sprites.sportsDetail  = drawToTexture(5,  paintSportsDetail,  'sports car windshield, white racing stripe, lights overlay');
    sprites.cabBase       = drawToTexture(6,  paintCabBase,       'white truck cab box, tintable');
    sprites.cabDetail     = drawToTexture(7,  paintCabDetail,     'truck cab windshield, headlight, grille overlay');
    sprites.trailerBase   = drawToTexture(8,  paintTrailerBase,   'white truck trailer / cargo box, tintable');
    sprites.trailerDetail = drawToTexture(9,  paintTrailerDetail, 'trailer panel seams and rear-door frame overlay');
    sprites.busBase       = drawToTexture(10, paintBusBase,       'white tall bus body, tintable');
    sprites.busDetail     = drawToTexture(11, paintBusDetail,     'bus window row, door, stripe, headlight overlay');
    sprites.tire          = drawToTexture(12, paintTire,          'black rubber tire with gray hub, top wheel');
    sprites.log           = drawToTexture(13, paintLog,           'brown floating log with bark grooves and cut-face rings');
    sprites.frog          = drawToTexture(14, paintFrog,          'green cartoon frog from above, big eyes, facing up');
    sprites.lily          = drawToTexture(15, paintLily,          'green lily pad with notch, top view');
  }

  // ------------------------------------------------------------
  // Rendering

  function drawTire(x, y) { drawTile(vec2(x, y), TIRE_SIZE, sprites.tire, WHITE); }

  function drawLaneBackground() {
    // Extend visuals well beyond playable area so wraparound is invisible.
    const W = LEVEL_W + OFFSCREEN_PAD*2 + 8;
    const cx = LEVEL_W/2;

    // start/median grass base layer covers the whole screen
    drawRect(vec2(cx, LEVEL_H/2), vec2(W, LEVEL_H+2), hsl(120/360,.45,.22));

    // Road
    const roadH = (ROAD_MAX_Y - ROAD_MIN_Y + 1);
    drawRect(vec2(cx, ROAD_MIN_Y + roadH/2), vec2(W, roadH), hsl(0,0,.15));

    // road edge curbs
    drawRect(vec2(cx, ROAD_MIN_Y), vec2(W, .12), hsl(0,0,.85));
    drawRect(vec2(cx, ROAD_MAX_Y+1), vec2(W, .12), hsl(0,0,.85));

    // dashed lane separators
    for (let y=ROAD_MIN_Y+1; y<=ROAD_MAX_Y; y++) {
      for (let x = -OFFSCREEN_PAD; x < LEVEL_W + OFFSCREEN_PAD; x += 1.4) {
        drawRect(vec2(x + .35, y), vec2(.7, .07), hsl(50/360,.85,.55,.85));
      }
    }

    // River
    const riverH = (LEVEL_H - RIVER_MIN_Y);
    drawRect(vec2(cx, RIVER_MIN_Y + riverH/2), vec2(W, riverH), hsl(205/360,.65,.30));

    // moving ripples
    for (let i=0; i<28; i++) {
      const baseX = (i*1.5) % LEVEL_W;
      const x = baseX + Math.sin(time*.4 + i*1.7) * .4;
      const y = RIVER_MIN_Y + .3 + ((i*1.13) % (riverH - .6));
      drawRect(vec2(x, y), vec2(.5, .06), hsl(0,0,1,.20));
    }

    // banks
    drawRect(vec2(cx, RIVER_MIN_Y), vec2(W, .18), hsl(35/360,.5,.35));
    drawRect(vec2(cx, RIVER_MAX_Y+1), vec2(W, .18), hsl(35/360,.5,.35));

    // grass tufts on median
    for (let i=0; i<12; i++) {
      const x = (i*2.7 + (i%3)*.7) % LEVEL_W;
      const y = 9.5 + ((i%2)?.4:-.4);
      drawCircle(vec2(x, y), .18, hsl(120/360,.6,.32));
    }
    // tufts on start grass
    for (let i=0; i<14; i++) {
      const x = (i*2.3 + 1.1) % LEVEL_W;
      const y = 1 + ((i%3)*.8);
      drawCircle(vec2(x, y), .15, hsl(120/360,.6,.32));
    }

    // home row (still water)
    drawRect(vec2(cx, HOME_Y+.5), vec2(W, 1), hsl(205/360,.55,.27));

    // hedges between home slots
    for (let i=0; i<=homeSlots; i++) {
      const x0 = i===0 ? -OFFSCREEN_PAD : homeXs[i-1] + 1.4;
      const x1 = i===homeSlots ? LEVEL_W + OFFSCREEN_PAD : homeXs[i] - .4;
      const w = x1 - x0;
      drawRect(vec2(x0 + w/2, HOME_Y+.5), vec2(w, 1), hsl(120/360,.6,.18));
      for (let j=0; j<Math.floor(w*1.2); j++) {
        drawCircle(vec2(x0 + (j+.5)*w/(w*1.2|0), HOME_Y + .85 + (j%2)*.05), .15, hsl(120/360,.7,.26));
      }
    }

    // home pads (lily pads)
    for (let i=0;i<homeSlots;i++) {
      const p = vec2(homeXs[i]+.5, HOME_Y+.5);
      // lily pad
      drawTile(p, vec2(1.6, 1.0), sprites.lily, WHITE);
      if (reached[i]) {
        // same renderer as the player frog, just facing up with no hop.
        // Per-pad breathing phase so they don't all inhale in lockstep.
        drawFrog(p, vec2(0, 1), 0, i * 1.7);
      }
    }
  }

  // ------------------------------------------------------------
  // Per-obstacle vertical bounce helpers. The base y stored on the
  // obstacle is the MINIMUM position; bounce only ever adds upward.

  function carBumpY(c) {
    // small fast bumps, less than half a wheel
    const a = Math.sin(time*14 + c.seed*.7)*.5 + .5;
    const b = Math.sin(time*9  + c.seed   )*.5 + .5;
    return a*.045 + b*.025;
  }

  function logBumpY(l) {
    // slow gentle float on the water
    const a = Math.sin(time*1.4 + l.seed*.4)*.5 + .5;
    return a*.09;
  }

  function drawCar(c) {
    const bumpY = carBumpY(c);
    const liftH = (c.kind === 'truck' ? TRUCK_TRAILER.y : carRender[c.kind].y);
    const lift = liftH * CAR_LIFT;
    const x = c.pos.x, y = c.pos.y + lift + bumpY;
    const dir = c.dir;            // 1 right, -1 left
    const mir = dir < 0;          // tiles are painted facing right

    // shadow sits at the bottom of the wheels (no bob) as the ground reference
    drawRect(vec2(x, c.pos.y + lift - liftH*.42 - .20), vec2(c.size.x*.96, .14), hsl(0,0,0,.35));

    if (c.kind === 'truck') {
      // cab on the leading side, trailer trailing; tires under both
      const total = TRUCK_CAB.x + TRUCK_GAP + TRUCK_TRAILER.x;
      const cabX = x + dir * (total/2 - TRUCK_CAB.x/2);
      const trX  = x - dir * (total/2 - TRUCK_TRAILER.x/2);
      const wy   = y - WHEEL.truckDrop;
      drawTile(vec2(trX, y),  TRUCK_TRAILER, sprites.trailerBase,   WHITE,   0, mir);
      drawTile(vec2(trX, y),  TRUCK_TRAILER, sprites.trailerDetail, WHITE,   0, mir);
      drawTile(vec2(cabX, y), TRUCK_CAB,     sprites.cabBase,       c.color, 0, mir);
      drawTile(vec2(cabX, y), TRUCK_CAB,     sprites.cabDetail,     WHITE,   0, mir);
      // wheels drawn on top of the body
      drawTire(cabX + dir*TRUCK_CAB.x*WHEEL.cabAxle, wy);       // cab front axle
      drawTire(trX  - dir*TRUCK_TRAILER.x*WHEEL.trailerRear, wy); // trailer rear axle
      drawTire(trX  + dir*TRUCK_TRAILER.x*WHEEL.trailerMid, wy);  // trailer mid axle
      return;
    }

    const r = carRender[c.kind];
    const wy = y - r.y*WHEEL.drop;
    drawTile(vec2(x, y), r, sprites[c.kind + 'Base'],   c.color, 0, mir);
    drawTile(vec2(x, y), r, sprites[c.kind + 'Detail'], WHITE,   0, mir);
    // wheels drawn on top of the body
    drawTire(x - r.x*WHEEL.axle, wy);
    drawTire(x + r.x*WHEEL.axle, wy);
  }

  function drawLog(l) {
    const bumpY = logBumpY(l);
    const w = l.size.x, x = l.pos.x, y = l.pos.y + bumpY;

    // soft water shadow stays at the water surface
    drawEllipse(vec2(x, l.pos.y - .35), vec2(w*.95, .25), hsl(0,0,0,.30));

    drawTile(vec2(x, y), vec2(w, .98), sprites.log, WHITE);
  }

  function drawFrog(basePos = frog.pos, facing = frog.facing, hopAnimT = frog.hopAnim, breathPhase = 0) {
    const hopArc = Math.sin(hopAnimT * Math.PI);  // 0..1..0
    const p = basePos.add(vec2(0, hopArc * .25));

    // Breathing scales the body ±5%; the hop adds a little extra puff.
    const breath = Math.sin(time * 1.8 + breathPhase) * .05;
    const s = 1.35 * (1 + breath) * (1 + hopArc * .12);

    // shadow — anchored to basePos so it stays grounded during the hop
    drawEllipse(basePos.add(vec2(0,-.42)), vec2(1.10, .34),
      hsl(0,0,0, .42 - hopArc*.12));

    // frog tile is painted facing up; rotate it to point along `facing`
    drawTile(p, vec2(s, s), sprites.frog, WHITE, facing.angle());
  }

  // Debug collision overlay — shown only while the engine debug overlay is on
  // (toggle with the ~ / backtick key). Outlines every gameplay hit shape.
  function drawDebugCollision() {
    for (const c of cars) debugRect(c.pos, c.size, hsl(0,1,.5));    // vehicles: red
    for (const l of logs) debugRect(l.pos, l.size, hsl(.5,1,.5));   // logs: cyan
    // home-slot capture windows: |x - slot| < 1.3 at the HOME_Y row (green)
    for (let i = 0; i < homeSlots; i++)
      debugRect(vec2(homeXs[i]+.5, HOME_Y+.5), vec2(2.6, 1), hsl(.33,1,.5));
    // player frog: yellow (only while the live frog is on screen)
    if (isPlaying() && !gameOver && !respawnTimer.active())
      debugRect(frog.pos, frogSize, hsl(.15,1,.5));
  }

  function gameRender() {
    drawLaneBackground();
    // Draw back-to-front: higher-y (further back) first so lower-y obstacles
    // overlap and read as nearer the viewer.
    const byDepth = (a, b) => b.pos.y - a.pos.y;
    for (const l of [...logs].sort(byDepth)) drawLog(l);
    for (const c of [...cars].sort(byDepth)) drawCar(c);

    // Alive player frog — disappears on death (particles play instead) and on title.
    if (isPlaying() && !gameOver && !respawnTimer.active()) {
      const logBump = frog.onLog ? logBumpY(frog.onLog) : 0;
      drawFrog(frog.pos.add(vec2(0, logBump)), frog.facing, frog.hopAnim);
    }

    // Death particles on top of everything so they read clearly.
    for (const p of particles) {
      const t = p.life / p.maxLife;
      const alpha = Math.max(0, 1 - t);
      drawCircle(p.pos, p.size * (1 - t*.4), hsl(p.h, p.s, p.l, alpha));
    }

    if (debugOverlay) drawDebugCollision();
  }

  function gameRenderPost() {
    if (!isPlaying()) return; // title screen — menu owns the display

    // Minimal HUD: lives + level only
    drawTextScreen(`LIVES  ${Math.max(0,lives)}     LEVEL  ${level}`,
      vec2(mainCanvasSize.x/2, 30), 26,
      hsl(105/360,.55,.85), 4, hsl(0,0,0));

    // Brief on-canvas banner; the gameOver menu owns the rest.
    if (gameOver && gameOverHoldTimer > 0) {
      drawTextScreen('GAME OVER',
        vec2(mainCanvasSize.x/2, mainCanvasSize.y/2), 90,
        hsl(0, .8, .55), 8, hsl(0,0,0));
    }
  }

  // Startup
  engineInit(gameInit, gameUpdate, gameUpdatePost, gameRender, gameRenderPost);
  </script>
</body>
</html>
