<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>LittleJS Froggit</title>
  <style>
    html, body { margin:0; padding:0; background:#000; overflow:hidden; }
    canvas { image-rendering: pixelated; }
  </style>
</head>
<body>
  <script src="../dist/littlejs.js?1780012197793"></script>
  <script src="../templates/gameFx.js?1780012197793"></script>
  <script src="../templates/textureGenerator.js?1780012197793"></script>
  <script src="../templates/menus.js?1780012197793"></script>
  <script>
  'use strict';

  // engine settings
  debugWatermark = false;
  showEngineVersion = false;

  // Touch: tap one of the four screen triangles (divided by the diagonals) to
  // hop in that direction. Handled directly in handleInput — no touch gamepad.
  touchGamepadEnable = false;

  // ------------------------------------------------------------
  // Frogger (primitives only)

  const LEVEL_W = 30;
  const LEVEL_H = 20;
  const DT = 1/60;

  // Generous off-screen padding so cars/logs spawn and wrap
  // well outside the visible camera area (no pop-in).
  const OFFSCREEN_PAD = 10;

  // Layout. The road starts at a fixed row (start grass = rows 0..3, frog
  // spawns at row 2). The number of road + river lanes VARIES per level, so the
  // band extents and home row are computed each level by computeLayout() and
  // grow upward into the spare rows near the top of the view.
  const ROAD_MIN_Y  = 4;        // first road lane (fixed)
  const MEDIAN_ROWS = 2;        // safe grass rows between road and river
  let ROAD_LANES = 5, RIVER_LANES = 5;
  let ROAD_MAX_Y = 8, RIVER_MIN_Y = 11, RIVER_MAX_Y = 15, HOME_Y = 16;

  // Lane counts ramp with level; home is kept at row <= 18 (one row of margin
  // below the top of the view) so the lily pads never clip.
  function computeLayout() {
    const diff = level - 1;
    ROAD_LANES  = clamp(4 + Math.floor(diff/2), 4, 7);   // 4 → 7
    RIVER_LANES = clamp(5 + Math.floor(diff/3), 5, 6);   // 5 → 6
    RIVER_LANES = Math.min(RIVER_LANES, 12 - ROAD_LANES); // keep HOME_Y <= 18
    ROAD_MAX_Y  = ROAD_MIN_Y + ROAD_LANES - 1;
    RIVER_MIN_Y = ROAD_MAX_Y + MEDIAN_ROWS + 1;
    RIVER_MAX_Y = RIVER_MIN_Y + RIVER_LANES - 1;
    HOME_Y      = RIVER_MAX_Y + 1;
  }

  const frogSize = vec2(.75, .75);

  // ---- Texture atlas ----
  // Every moving entity is blitted from a 16-tile / 500px atlas built in
  // gameInit. Car bodies are painted in grayscale ("base") so drawTile's
  // color multiply tints them to a random hue; a second "detail" tile
  // (windows / lights / trim, in true colors) blits on top with no tint.
  const sprites = {};

  // World-space render footprints the body tiles are drawn at (the tiles are
  // square 500px; tiny vertical squish from non-square footprints is fine for
  // these stylized shapes). Wheels are a separate shared tile placed at axles.
  const carRender = {
    sedan:  vec2(2.0, 1.10),
    wagon:  vec2(2.2, 1.12),
    sports: vec2(2.0, 1.12),
    bus:    vec2(3.3, 1.30),
  };
  const TRUCK_CAB     = vec2(1.10, 1.18);
  const TRUCK_TRAILER = vec2(1.70, 1.24);
  const TRUCK_GAP     = -.15;
  const TIRE_SIZE     = vec2(.62, .62);
  // Raise each car this fraction of its height within its lane so it sits on
  // the road instead of straddling the lane line.
  const CAR_LIFT      = .35;

  // ---- Log 3-slice ----  Logs vary in width, so the single atlas tile is
  // baked at a reference width then drawn as fixed end caps + a stretched
  // middle (so the round end caps never smear). See paintLog / drawLog.
  const LOG_BAKE_W   = 4.0;                          // world width the tile is baked at
  const LOG_CAP_FRAC = .2;                           // each end cap = this fraction of the tile
  const LOG_CAP_PX   = Math.round(500 * LOG_CAP_FRAC); // cap width in tile pixels
  const LOG_CAP_W    = LOG_BAKE_W * LOG_CAP_FRAC;    // cap width in world units (drawn fixed)
  let logCapTile, logMidTile;                        // sub-regions of atlas tile 13

  // ---- Wheel placement ----  (one place to tweak where tires sit)
  // Fractions are of the relevant body's render size; tweak + reload.
  const WHEEL = {
    drop:        .42,  // axle below body center, as a fraction of car HEIGHT
    axle:        .30,  // front/rear axles from center, as a fraction of car WIDTH
    truckDrop:   .50,  // truck axle drop, in WORLD units (cab/trailer differ)
    cabAxle:     .0,  // cab axle toward the front (fraction of cab width)
    trailerRear: .30,  // trailer rear axle toward the back (fraction of trailer width)
    trailerMid:  .2,  // trailer mid axle toward the front (fraction of trailer width)
  };

  const homeSlots = 5;
  const homeXs = Array.from({length: homeSlots}, (_,i)=>
    (3 + i * (LEVEL_W-6)/(homeSlots-1))
  );

  // Game state
  let frog, cars = [], logs = [];
  // Pre-rendered static background (road/river/grass/hedges/lily pads). The
  // camera never moves, so this is rendered once into an offscreen canvas
  // layer and blitted as a single quad each frame. Only ripples + reached
  // frogs stay dynamic.
  let bgLayer = null, bgKey = '';   // bgKey = lane-count signature the cache was painted for
  // Short-lived death particles. The player vanishes on death and these
  // play in its place — same effect for road and water, just a different hue.
  let particles = [];
  let reached = new Array(homeSlots).fill(false);
  let lives = 3, level = 1;
  let bestLevel = 1;
  let respawnTimer;
  let gameOver = false;
  let gameOverHoldTimer = 0; // seconds before gameOver menu surfaces
  // Per-crossing countdown: drains while the current frog is mid-crossing;
  // hitting zero costs a life. Shrinks per level for added late-game pressure.
  // It does NOT start draining until the player makes the first hop, so there's
  // no pressure to move immediately at spawn / after a death.
  let crossTimer = 0, crossTimerMax = 1, crossStarted = false;
  function levelCrossTime() { return Math.max(8, 22 - (level-1)*1.5); }

  // Score (reset each new game). Points: forward hops, frog home, time bonus,
  // level clear, and the bonus fly.
  let score = 0;
  let newHighScore = false;   // set on game over if this run beat the record
  // Bonus fly: occasionally lands on an empty home pad for a few seconds;
  // reaching THAT pad while it's there scores FLY_BONUS. flySlot<0 = none.
  let flySlot = -1, flyLife = 0, flyCooldown = 4;
  const FLY_BONUS = 200;

  // Sounds
  let sHop, sDie, sHome, sLevel, sTick, sFly;

  function gridToWorld(gx, gy) { return vec2(gx + .5, gy + .5); }
  function worldToGridPos(p) { return vec2(Math.floor(p.x), Math.floor(p.y)); }

  function clampFrogGrid(g) {
    g.x = clamp(g.x, 0, LEVEL_W-1);
    g.y = clamp(g.y, 0, LEVEL_H-1);
    return g;
  }

  function overlapAABB(posA, sizeA, posB, sizeB) {
    return Math.abs(posA.x - posB.x) < (sizeA.x + sizeB.x)/2 &&
           Math.abs(posA.y - posB.y) < (sizeA.y + sizeB.y)/2;
  }

  function resetRun(full=false) {
    frog.grid = vec2(Math.floor(LEVEL_W/2), 2);
    frog.pos = gridToWorld(frog.grid.x, frog.grid.y);
    frog.carryVx = 0;
    frog.facing = vec2(0, 1);
    frog.hopAnim = 0;
    frog.onLog = null;
    frog.maxRow = frog.grid.y;   // furthest row this crossing (for forward-hop score)
    if (full) {
      reached.fill(false);
      lives = 3;
      level = 1;
      buildLanes();
    }
    // fresh crossing timer for the new frog — paused until the first hop
    crossTimerMax = levelCrossTime();
    crossTimer = crossTimerMax;
    crossStarted = false;
  }

  function buildLanes() {
    computeLayout();          // sets ROAD_LANES/RIVER_LANES + band extents for this level
    cars.length = 0;
    logs.length = 0;

    // Difficulty ramp by level. diff = 0 on level 1 (the authored baseline).
    const diff = level - 1;
    const speedScale   = .5 * (1 + diff * .16);             // everything faster each level
    const densityBonus = Math.min(3, Math.floor(diff / 2)); // +1 car/lane every 2 levels, cap +3
    const totalSpan = LEVEL_W + OFFSCREEN_PAD*2;
    // Level 1 alternates directions for a clean baseline; later levels randomize.
    const laneDir = i => (level > 1) ? (rand() < .5 ? 1 : -1) : (i%2 ? -1 : 1);

    // ---- Cars ---- one lane per road row. Each lane shares a direction + speed
    // (so cars stay evenly spaced), but every car picks a random type.
    const carKinds = ['sedan','wagon','sports','truck','bus'];
    const CAR_W = { sedan:2.0, wagon:2.2, sports:2.0, truck:2.7, bus:3.3 };
    for (let lane = 0; lane < ROAD_LANES; lane++) {
      const y = ROAD_MIN_Y + lane;
      const dir = laneDir(lane);
      const speed = rand(5, 9);
      const count = 3 + densityBonus;
      for (let i=0; i<count; i++) {
        const kind = carKinds[Math.floor(rand() * carKinds.length)];
        const w = CAR_W[kind];
        const x = -OFFSCREEN_PAD + (i * totalSpan / count) + rand(0, 2);
        cars.push({
          pos: vec2(x, y + .5),
          size: vec2(w, .85),
          vx: dir * speed * speedScale,
          dir,
          kind,
          color: hsl(rand(), .8, .55),
          seed: rand(0, 1000),
        });
      }
    }

    // ---- Logs ---- one lane per river row. Log COUNT comes from the lane's
    // width (fewer big logs) so gaps stay fair; the river escalates via speed.
    for (let lane = 0; lane < RIVER_LANES; lane++) {
      const y = RIVER_MIN_Y + lane;
      const dir = laneDir(lane);
      const speed = rand(3.3, 5.0);
      const w = rand(3.2, 5.5);
      const count = clamp(Math.round(16 / w), 3, 5);
      for (let i=0; i<count; i++) {
        const x = -OFFSCREEN_PAD + (i * totalSpan / count) + rand(0, 2);
        logs.push({
          pos: vec2(x, y + .5),
          size: vec2(w, .85),
          vx: dir * speed * speedScale,
          seed: rand(0, 1000),
        });
      }
    }
  }

  function killFrog() {
    if (respawnTimer.active()) return;

    // Pick a particle palette by where the frog died (water vs. dry land).
    const gy = frog.grid.y;
    const inWater = gy >= RIVER_MIN_Y && gy <= HOME_Y;
    const hue = inWater ? 205/360 : 105/360;
    const sat = inWater ? .55 : .75;
    const light = inWater ? .70 : .45;

    for (let i = 0; i < 24; i++) {
      const a = rand(0, Math.PI * 2);
      const s = rand(1.8, 4.2);
      particles.push({
        pos: frog.pos.copy(),
        vel: vec2(Math.cos(a) * s, Math.sin(a) * s * .6 + rand(1.6, 3.4)),
        life: 0,
        maxLife: rand(.55, .95),
        h: hue,
        s: sat,
        l: light + rand(-.10, .12),
        size: rand(.07, .15),
      });
    }

    sDie.play(frog.pos);
    addScreenShake(.5, .35);
    lives--;
    respawnTimer.set(1);
    if (lives < 0) {
      gameOver = true;
      gameOverHoldTimer = 1.4;
      if (level > bestLevel) {
        bestLevel = level;
        saveData({bestLevel});
      }
      newHighScore = (typeof submitBestScore === 'function') ? submitBestScore(score) : false;
    }
  }

  function reachHome(slotIndex) {
    if (reached[slotIndex]) return;
    reached[slotIndex] = true;
    sHome.play(frog.pos);

    // home bonus + leftover-time bonus (read crossTimer before resetRun clears it)
    score += 50 + Math.floor(crossTimer) * 10;
    // bonus fly waiting on this pad?
    if (slotIndex === flySlot) {
      score += FLY_BONUS;
      flySlot = -1;
      sFly.play(frog.pos);
    }

    resetRun(false);

    if (reached.every(Boolean)) {
      level++;
      score += 1000;                    // level-clear bonus
      sLevel.play(vec2(LEVEL_W/2, HOME_Y+.5));
      reached.fill(false);
      flySlot = -1; flyCooldown = 4;     // clear any fly for the fresh board
      buildLanes();
      // new level → apply its (shorter) crossing time to the next frog
      crossTimerMax = levelCrossTime();
      crossTimer = crossTimerMax;
    }
  }

  function tryMove(dx, dy) {
    if (respawnTimer.active()) return;

    const g = frog.grid.copy();
    g.x += dx;
    g.y += dy;

    if (g.x < 0 || g.x >= LEVEL_W || g.y < 0 || g.y >= LEVEL_H) {
      killFrog();
      return;
    }
    if (g.y > HOME_Y) return;

    frog.grid = g;
    frog.pos = gridToWorld(frog.grid.x, frog.grid.y);
    frog.carryVx = 0;
    frog.facing = vec2(dx, dy);
    frog.hopAnim = 1;
    sHop.play(frog.pos);
    crossStarted = true;   // first hop starts the crossing countdown

    // Score forward progress only (net-new rows), so hopping back and forth
    // can't farm points.
    if (frog.grid.y > frog.maxRow) {
      score += 10 * (frog.grid.y - frog.maxRow);
      frog.maxRow = frog.grid.y;
    }
  }

  // Last cardinal direction from the analog/touch stick — used to edge-trigger
  // hops so holding the stick doesn't auto-hop every frame.
  let lastStickDir = vec2();

  function handleInput() {
    // Keyboard: one-shot hop per press (arcade-style)
    const up    = keyWasPressed('ArrowUp')   || keyWasPressed('KeyW');
    const down  = keyWasPressed('ArrowDown') || keyWasPressed('KeyS');
    const left  = keyWasPressed('ArrowLeft') || keyWasPressed('KeyA');
    const right = keyWasPressed('ArrowRight')|| keyWasPressed('KeyD');

    if (up)    return tryMove(0, 1);
    if (down)  return tryMove(0,-1);
    if (left)  return tryMove(-1,0);
    if (right) return tryMove(1, 0);

    // Physical D-pad buttons (12-15) — edge-triggered automatically.
    if (gamepadWasPressed(12)) return tryMove(0, 1);
    if (gamepadWasPressed(13)) return tryMove(0,-1);
    if (gamepadWasPressed(14)) return tryMove(-1,0);
    if (gamepadWasPressed(15)) return tryMove(1, 0);

    // Touch: tap one of the four screen triangles (split by the diagonals).
    // Top triangle hops up, bottom hops down, left/right hop sideways.
    if (isTouchDevice && mouseWasPressed(0) && !isMenuVisible()) {
      const dx = mousePosScreen.x - mainCanvasSize.x * .5;
      const dy = mousePosScreen.y - mainCanvasSize.y * .5;
      if (abs(dx) > abs(dy)) return tryMove(sign(dx), 0);
      if (dy !== 0)          return tryMove(0, sign(-dy)); // screen-y is down-positive; world-y is up
    }

    // Mouse (non-touch): click hops one step in the direction of the cursor
    // RELATIVE TO THE FROG. mousePos and frog.pos are both world-space (y-up),
    // so no y flip is needed here.
    if (!isTouchDevice && mouseWasPressed(0) && !isMenuVisible()) {
      const dx = mousePos.x - frog.pos.x;
      const dy = mousePos.y - frog.pos.y;
      if (abs(dx) > abs(dy)) return tryMove(sign(dx), 0);
      if (dy !== 0)          return tryMove(0, sign(dy));
    }

    // Stick (analog only — touch gamepad is disabled): pick dominant cardinal,
    // but only hop on the
    // frame the stick crosses INTO that direction. Returning to neutral arms
    // the next hop.
    const stick = gamepadStick(0);
    let dir = vec2();
    if (stick.lengthSquared() > .5*.5) {
      dir = abs(stick.x) > abs(stick.y)
        ? vec2(sign(stick.x), 0)
        : vec2(0, sign(stick.y));
    }
    if ((dir.x !== lastStickDir.x || dir.y !== lastStickDir.y) &&
        (dir.x || dir.y))
    {
      tryMove(dir.x, dir.y);
    }
    lastStickDir = dir;
  }

  function updateObstacles(arr) {
    // Wrap over a FIXED span (independent of each obstacle's width) so cars in
    // a lane that share a speed keep their exact spacing forever. Using a
    // width-based boundary makes mixed-width cars loop over different distances
    // and slowly drift into clumps. OFFSCREEN_PAD (10) keeps even wide buses
    // fully off-screen at the wrap edges, so there's no pop-in.
    const span = LEVEL_W + OFFSCREEN_PAD*2;
    const lo = -OFFSCREEN_PAD, hi = LEVEL_W + OFFSCREEN_PAD;
    for (const o of arr) {
      o.pos.x += o.vx * DT;
      if (o.pos.x <  lo) o.pos.x += span;
      if (o.pos.x >= hi) o.pos.x -= span;
    }
  }

  // Bonus fly: lands on a random empty home pad for a few seconds, then leaves.
  function updateFly() {
    if (flySlot >= 0) {
      flyLife -= DT;
      if (flyLife <= 0) flySlot = -1;   // flew off before you got there
      return;
    }
    flyCooldown -= DT;
    if (flyCooldown <= 0) {
      const empty = [];
      for (let i = 0; i < homeSlots; i++) if (!reached[i]) empty.push(i);
      if (empty.length) {
        flySlot = empty[Math.floor(rand() * empty.length)];
        flyLife = rand(4, 6);
      }
      flyCooldown = rand(6, 11);
    }
  }

  function frogWorldChecks() {
    if (respawnTimer.active()) return;

    for (const c of cars) {
      if (overlapAABB(frog.pos, frogSize, c.pos, c.size)) {
        killFrog();
        return;
      }
    }

    const gy = frog.grid.y;
    const inRiver = gy >= RIVER_MIN_Y && gy <= RIVER_MAX_Y;
    if (inRiver) {
      let onLog = null;
      for (const l of logs) {
        if (overlapAABB(frog.pos, frogSize, l.pos, l.size)) { onLog = l; break; }
      }
      frog.onLog = onLog;
      if (!onLog) { killFrog(); return; }

      frog.carryVx = onLog.vx;
      frog.pos.x += frog.carryVx * DT;

      if (frog.pos.x < .25 || frog.pos.x > LEVEL_W - .25) {
        killFrog();
        return;
      }
      frog.grid = clampFrogGrid(worldToGridPos(frog.pos));
    } else {
      frog.onLog = null;
    }

    if (frog.grid.y === HOME_Y) {
      let best = -1, bestDx = 999;
      for (let i=0;i<homeSlots;i++) {
        const dx = Math.abs(frog.pos.x - (homeXs[i] + .5));
        if (dx < bestDx) { bestDx = dx; best = i; }
      }
      if (bestDx < 1.3) reachHome(best);
      else killFrog();
    }
  }

  // ------------------------------------------------------------
  // Engine callbacks

  function gameInit() {
    saveDataInit('frogger');
    setCanvasFixedSize(vec2(960, 540));
    cameraScale = 28;
    setCameraPos(vec2(LEVEL_W/2, LEVEL_H/2));

    buildAtlas();

    frog = {
      grid: vec2(Math.floor(LEVEL_W/2), 2),
      pos: vec2(),
      carryVx: 0,
      facing: vec2(0, 1),
      hopAnim: 0,
      onLog: null,
    };

    respawnTimer = new Timer(); respawnTimer.unset();

    sHop  = new SoundGenerator({ volume:.6, frequency:640, randomness:.08, attack:0, release:.06, shapeCurve:1.6 });
    sDie  = new SoundGenerator({ volume:.9, frequency:180, randomness:.2,  attack:0, release:.28, shapeCurve:.6, slide:-1.6, noise:.15 });
    sHome = new SoundGenerator({ volume:.8, frequency:720, randomness:.06, attack:0, release:.14, shapeCurve:1.2, pitchJump:360, pitchJumpTime:.04 });
    sLevel= new SoundGenerator({ volume:.9, frequency:420, randomness:.03, attack:0, release:.35, shapeCurve:1.1, repeatTime:.08, pitchJump:140, pitchJumpTime:.02 });
    sTick = new SoundGenerator({ volume:.5, frequency:900, randomness:0,   attack:0, release:.05, shapeCurve:2 });
    sFly  = new SoundGenerator({ volume:.7, frequency:1040,randomness:.04, attack:0, release:.12, shapeCurve:1.3, pitchJump:520, pitchJumpTime:.05 });

    bestLevel = getSaveData().bestLevel ?? 1;

    setSoundVolume(.8);
    // Only auto-pause the engine for in-game menus (the pause menu). On the
    // title screen isPlaying() is false, so the world keeps running and the
    // attract loop scrolls traffic behind the menu.
    if (typeof installAutoPause === 'function')
        installAutoPause(() => isPlaying());

    buildLanes();
    resetRun(true);
    buildMenus();
  }

  function startGame() {
    gameOver = false;
    score = 0;
    newHighScore = false;
    flySlot = -1; flyCooldown = 4;
    resetRun(true);
    setPlaying(true);
  }

  function quitToTitleWithCleanup() {
    quitToTitle(() => { gameOver = false; resetRun(true); });
  }

  // Debug: jump to the next level from the browser console — call nextLevel().
  // Bumps the level (faster cars/logs), reshuffles obstacles, resets the frog.
  function nextLevel() {
    level++;
    reached.fill(false);
    buildLanes();
    resetRun(false);
    console.log('Jumped to level', level);
  }
  window.nextLevel = nextLevel;

  function buildMenus() {
    if (typeof createMenu !== 'function') return;

    createTitleMenu({
      title: 'FROGGIT',
      subtitle: 'Cross the road and the river',
      onPlay: startGame,
      revealOnClick: false,
      canReveal: () => !isPlaying(),
      itemsBefore: [
        {type:'label', id:'highLabel', text:`HIGH SCORE ${getBestScore()}`},
        {type:'label', id:'bestLabel', text:`BEST LEVEL ${bestLevel}`},
      ],
      items: [
        {type:'button', label:'OPTIONS',     onClick: () => pushMenu('options')},
        {type:'button', label:'HOW TO PLAY', onClick: () => pushMenu('about')},
      ],
      onShow: () => {
        const m = getMenu('title');
        if (!m) return;
        m.getItem('highLabel')?.setLabel(`HIGH SCORE ${getBestScore()}`);
        m.getItem('bestLabel')?.setLabel(`BEST LEVEL ${bestLevel}`);
      },
    });

    createOptionsMenu();

    createMenu({
      id: 'about', title: 'HOW TO PLAY', onHide: popMenu,
      items: [
        {type:'text', text:
          'Get five frogs home, one at a time.\n\n' +
          'HOP with arrow keys, WASD, D-pad, or left stick. On touch, tap one ' +
          'of the four screen edges — the direction you tap is the way you hop.\n\n' +
          'Avoid the cars on the road; ride logs across the river — don\'t touch ' +
          'the water. Fill all five home slots and the level repeats faster.\n\n' +
          'Three lives. Esc pauses.'},
        {type:'separator'},
        {type:'button', label:'BACK', onClick: () => hideMenu('about')},
      ],
    });

    createPauseMenu({
      onRestart: startGame,
      onQuit:    quitToTitleWithCleanup,
      extraItems: [
        {type:'button', label:'OPTIONS', onClick: () => pushMenu('options')},
      ],
    });

    createMenu({
      id: 'gameOver', title: 'GAME OVER', dismissable: false,
      onShow: () => {
        const m = getMenu('gameOver');
        if (!m) return;
        m.getItem('scoreLabel')?.setLabel(`SCORE  ${score}`);
        m.getItem('highLabel')?.setLabel((newHighScore ? 'NEW HIGH!  ' : 'HIGH  ') + getBestScore());
        m.getItem('levelReached')?.setLabel(`LEVEL  ${level}`);
        m.getItem('bestLabel')?.setLabel(`BEST LV  ${bestLevel}`);
      },
      items: [
        {type:'label', id:'scoreLabel',   text:'SCORE  0'},
        {type:'label', id:'highLabel',    text:'HIGH  0'},
        {type:'label', id:'levelReached', text:'LEVEL  0'},
        {type:'label', id:'bestLabel',    text:'BEST LV  0'},
        {type:'separator'},
        {type:'button', label:'PLAY AGAIN',    onClick: () => { hideMenu('gameOver'); startGame(); }},
        {type:'button', label:'QUIT TO TITLE', onClick: quitToTitleWithCleanup},
      ],
    });

    installDefaultToolbar();

    // Show the title menu immediately — no click-to-reveal step.
    showMenu('title');
  }

  function gameUpdate() {
    // Pin the camera here (before plugins run) so the gameFx screen-shake
    // plugin — which nudges cameraPos after gameUpdate — isn't wiped by a
    // later re-pin. Each frame: set base, then the plugin adds its offset.
    setCameraPos(vec2(LEVEL_W/2, LEVEL_H/2));

    // Pause hotkey: Esc / gamepad Start. Skipped if gameOver menu is up.
    const endMenuShowing = (typeof getTopMenu === 'function') && getTopMenu()?.id === 'gameOver';
    if (isPlaying() && !endMenuShowing &&
        (keyWasPressed('Escape') || gamepadWasPressed(9)))
    {
      if (typeof playMenuSound === 'function') playMenuSound('activate');
      if (typeof showMenu === 'function') showMenu('pause');
      inputClearKey('Escape');
      inputClearKey(9, 1, false, true, false);
      return;
    }

    if (!isPlaying()) {
      // Attract: keep cars / logs scrolling so the title screen feels alive.
      updateObstacles(cars);
      updateObstacles(logs);
      return;
    }

    if (gameOver) {
      // Tick remaining death particles so they finish their arcs cleanly.
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.life += DT;
        p.vel.y -= 8 * DT;
        p.pos.x += p.vel.x * DT;
        p.pos.y += p.vel.y * DT;
        if (p.life >= p.maxLife) particles.splice(i, 1);
      }
      if (!endMenuShowing) {
        gameOverHoldTimer -= DT;
        if (gameOverHoldTimer <= 0 && typeof showMenu === 'function')
          showMenu('gameOver');
      }
      return;
    }

    if (respawnTimer.elapsed()) {
      respawnTimer.unset();
      resetRun(false);
    }

    handleInput();
    updateObstacles(cars);
    updateObstacles(logs);
    frogWorldChecks();

    // Crossing countdown — runs only while the live frog is in play (not during
    // the respawn freeze) and only once the player has made the first hop.
    if (!respawnTimer.active() && crossStarted) {
      const before = crossTimer;
      crossTimer -= DT;
      // low-time warning: a tick once per second while under 3s
      if (crossTimer > 0 && crossTimer < 3 &&
          Math.floor(before) !== Math.floor(crossTimer))
        sTick.play();
      if (crossTimer <= 0) { crossTimer = 0; killFrog(); }
    }

    updateFly();

    // tick & cull death particles (simple gravity arcs)
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.life += DT;
      p.vel.y -= 8 * DT;
      p.pos.x += p.vel.x * DT;
      p.pos.y += p.vel.y * DT;
      if (p.life >= p.maxLife) particles.splice(i, 1);
    }

    if (frog.hopAnim > 0)
      frog.hopAnim = Math.max(0, frog.hopAnim - DT * 6);
  }

  function gameUpdatePost() {
    // camera is pinned at the top of gameUpdate (see note there)
  }

    const g = ctx.createLinearGradient(0, top, 0, bot);
    g.addColorStop(0,  '#ffffff');
    g.addColorStop(.5, '#e8e8e8');
    g.addColorStop(1,  '#a6a6a6');
    return g;
  }

  function paintTire(ctx) {

    ctx.fillStyle = '#383838'; ctx.beginPath(); ctx.arc(250, 250, 150, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#9a9a9a'; ctx.beginPath(); ctx.arc(250, 250, 92, 0, Math.PI*2); ctx.fill();

  }

  function paintFrog(ctx) {
    // painted facing UP (head at small y); rotated by facing at draw time
    ctx.lineJoin = 'round';
    const green = '#54b62e', dark = '#2f7a1a', light = '#7fd94f';
    ctx.fillStyle = dark;
    ctx.beginPath(); ctx.ellipse(118, 360, 72, 96, -.5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(382, 360, 72, 96,  .5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(132, 198, 46, 78, -.3, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(368, 198, 46, 78,  .3, 0, Math.PI*2); ctx.fill();
    const bg = ctx.createRadialGradient(250, 220, 36, 250, 255, 200);
    bg.addColorStop(0, light); bg.addColorStop(1, green);
    ctx.fillStyle = bg;
    ctx.beginPath(); ctx.ellipse(250, 262, 150, 180, 0, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = dark; ctx.lineWidth = 10; ctx.stroke();
    ctx.fillStyle = dark;
    ctx.beginPath(); ctx.arc(202, 300, 21, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(298, 300, 21, 0, Math.PI*2); ctx.fill();
    for (const ex of [185, 315]) {
      ctx.fillStyle = green; ctx.beginPath(); ctx.arc(ex, 122, 66, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = dark; ctx.lineWidth = 8; ctx.stroke();
      ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(ex, 126, 42, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#111'; ctx.beginPath(); ctx.arc(ex, 116, 21, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(ex - 9, 107, 8, 0, Math.PI*2); ctx.fill();
    }
  }

  function paintLily(ctx) {
    const g = ctx.createRadialGradient(250, 225, 30, 250, 250, 230);
    g.addColorStop(0, '#5aa64a'); g.addColorStop(1, '#2f6b28');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(250, 250, 226, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#234f1e'; ctx.lineWidth = 14; ctx.stroke();
    // cut the wedge notch out so the water behind shows through
    ctx.globalCompositeOperation = 'destination-out';
    ctx.beginPath(); ctx.moveTo(250, 250); ctx.lineTo(182, 504); ctx.lineTo(318, 504); ctx.closePath(); ctx.fill();
    ctx.globalCompositeOperation = 'source-over';
    // radial veins
    ctx.strokeStyle = 'rgba(20,60,18,.5)'; ctx.lineWidth = 28;
    for (let i = 0; i < 7; i++) {
      const a = -Math.PI/2 + (i-3)*.6;
      ctx.beginPath(); ctx.moveTo(250, 250);
      ctx.lineTo(250 + Math.cos(a)*220, 250 + Math.sin(a)*220); ctx.stroke();
    }
  }

  // Log baked at a reference width (LOG_BAKE_W × .85), drawn world-local and
  // centred so 1px in the cap regions maps 1:1 to world when the caps are blit
  // at LOG_CAP_W. The middle (grooves/knot/bands) is the part that stretches.
  function paintLog(ctx) {
    const W = LOG_BAKE_W, h = .85;
    ctx.save();
    ctx.translate(250, 250);            // composes with the tile's draw origin
    ctx.scale(500/W, -500/h);           // world-local → tile px, +y up
    const rect = (cx,cy,sx,sy,c) => { ctx.fillStyle = c.toString(); ctx.fillRect(cx-sx/2, cy-sy/2, sx, sy); };
    const elli = (cx,cy,dx,dy,c) => { ctx.fillStyle = c.toString(); ctx.beginPath(); ctx.ellipse(cx,cy,dx/2,dy/2,0,0,Math.PI*2); ctx.fill(); };
    const circ = (cx,cy,d,c)    => { ctx.fillStyle = c.toString(); ctx.beginPath(); ctx.arc(cx,cy,d/2,0,Math.PI*2); ctx.fill(); };

    const cs = .9; // center scale
    const co = (1 - cs) / 2; // center offset to keep the scaled middle centred in the tile
    rect(co, 0,     cs*W,     h,     hsl(28/360,.55,.34));   // body
    rect(co, h*.22, cs*W*.98, h*.18, hsl(28/360,.55,.46));   // top highlight band
    rect(co,-h*.30, cs*W*.98, h*.15, hsl(28/360,.5, .20));   // bottom shadow band
    const ringColors = [
      hsl(28/360,.45,.22), hsl(28/360,.5,.32), hsl(28/360,.55,.42), hsl(28/360,.55,.55),
    ];
    for (const side of [-1, 1]) {                        // concentric end caps (inset from edge)
      const ex = side*(W/2 - .2);
      elli(ex,0, .35, h*.98, ringColors[0]);
      elli(ex,0, .25, h*.7,  ringColors[1]);
      elli(ex,0, .16, h*.45, ringColors[2]);
      elli(ex,0, .07, h*.20, ringColors[3]);
    }
    // grooves + knot kept within |x|<1 so they land in the stretchable middle
    for (let i=0; i<3; i++) {
      const ox = (((i*97+37)%100)/100 - .5) * 2.0;
      rect(ox, .02, .06, h*.65, hsl(28/360,.5,.22));
    }
    circ(.05,.05, .14, hsl(28/360,.6,.18));
    circ(.05,.05, .07, hsl(28/360,.5,.30));
    ctx.restore();
  }

  function buildAtlas() {
    initDrawToTexture();
    sprites.sedanBase     = drawToTexture(0,  paintSedanBase,     'white sedan body, side view, tintable');
    sprites.sedanDetail   = drawToTexture(1,  paintSedanDetail,   'sedan blue windows, yellow headlight, red taillight overlay');
    sprites.wagonBase     = drawToTexture(2,  paintWagonBase,     'white station-wagon body with long roof, tintable');
    sprites.wagonDetail   = drawToTexture(3,  paintWagonDetail,   'wagon two side windows + trim + lights overlay');
    sprites.sportsBase    = drawToTexture(4,  paintSportsBase,    'white low sleek sports-car body, tintable');
    sprites.sportsDetail  = drawToTexture(5,  paintSportsDetail,  'sports car windshield, white racing stripe, lights overlay');
    sprites.cabBase       = drawToTexture(6,  paintCabBase,       'white truck cab box, tintable');
    sprites.cabDetail     = drawToTexture(7,  paintCabDetail,     'truck cab windshield, headlight, grille overlay');
    sprites.trailerBase   = drawToTexture(8,  paintTrailerBase,   'white truck trailer / cargo box, tintable');
    sprites.trailerDetail = drawToTexture(9,  paintTrailerDetail, 'trailer panel seams and rear-door frame overlay');
    sprites.busBase       = drawToTexture(10, paintBusBase,       'white tall bus body, tintable');
    sprites.busDetail     = drawToTexture(11, paintBusDetail,     'bus window row, door, stripe, headlight overlay');
    sprites.tire          = drawToTexture(12, paintTire,          'black rubber tire with gray hub, top wheel');
    sprites.log           = drawToTexture(13, paintLog,           'brown log: ringed cut ends + banded body (3-slice)');
    sprites.frog          = drawToTexture(14, paintFrog,          'green cartoon frog from above, big eyes, facing up');
    sprites.lily          = drawToTexture(15, paintLily,          'green lily pad with notch, top view');

    // Sub-regions of the log tile for 3-slice drawing: left cap, stretchable
    // middle, right cap (the right cap reuses the left, mirrored).
    const lp = sprites.log.pos, ltex = sprites.log.textureInfo;
    logCapTile = new TileInfo(vec2(lp.x, lp.y),              vec2(LOG_CAP_PX, 500),        ltex, 0, 0);
    logMidTile = new TileInfo(vec2(lp.x + LOG_CAP_PX, lp.y), vec2(500 - 2*LOG_CAP_PX, 500), ltex, 0, 0);
  }

  // ------------------------------------------------------------
  // Rendering

  function drawTire(x, y) { drawTile(vec2(x, y), TIRE_SIZE, sprites.tire, WHITE); }

  // Paint the STATIC background into a 2D context. All the engine's world-space
  // draw helpers accept (..., useWebGL=false, screenSpace=false, context), which
  // routes them through worldToScreen into the given canvas — so the same code
  // that drew on-screen now renders once into the offscreen layer.
  function paintStaticBackground(ctx) {
    const rect = (p,s,c) => drawRect(p, s, c, 0, false, false, ctx);
    const circ = (p,d,c) => drawCircle(p, d, c, 0, undefined, false, false, ctx);

    // Extend visuals well beyond playable area so wraparound is invisible.
    const W = LEVEL_W + OFFSCREEN_PAD*2 + 8;
    const cx = LEVEL_W/2;

    // start/median grass base layer covers the whole screen
    rect(vec2(cx, LEVEL_H/2), vec2(W, LEVEL_H+2), hsl(120/360,.45,.22));

    // Road
    const roadH = (ROAD_MAX_Y - ROAD_MIN_Y + 1);
    rect(vec2(cx, ROAD_MIN_Y + roadH/2), vec2(W, roadH), hsl(0,0,.15));

    // road edge curbs
    rect(vec2(cx, ROAD_MIN_Y), vec2(W, .12), hsl(0,0,.85));
    rect(vec2(cx, ROAD_MAX_Y+1), vec2(W, .12), hsl(0,0,.85));

    // dashed lane separators
    for (let y=ROAD_MIN_Y+1; y<=ROAD_MAX_Y; y++) {
      for (let x = -OFFSCREEN_PAD; x < LEVEL_W + OFFSCREEN_PAD; x += 1.4) {
        rect(vec2(x + .35, y), vec2(.7, .07), hsl(50/360,.85,.55,.85));
      }
    }

    // River
    const riverH = (LEVEL_H - RIVER_MIN_Y);
    rect(vec2(cx, RIVER_MIN_Y + riverH/2), vec2(W, riverH), hsl(205/360,.65,.30));

    // banks
    rect(vec2(cx, RIVER_MIN_Y), vec2(W, .18), hsl(35/360,.5,.35));
    rect(vec2(cx, RIVER_MAX_Y+1), vec2(W, .18), hsl(35/360,.5,.35));

    // grass tufts on median (between the road and the river — position varies
    // with lane counts)
    const medianY = (ROAD_MAX_Y + RIVER_MIN_Y) / 2;
    for (let i=0; i<12; i++) {
      const x = (i*2.7 + (i%3)*.7) % LEVEL_W;
      const y = medianY + ((i%2)?.4:-.4);
      circ(vec2(x, y), .18, hsl(120/360,.6,.32));
    }
    // tufts on start grass
    for (let i=0; i<14; i++) {
      const x = (i*2.3 + 1.1) % LEVEL_W;
      const y = 1 + ((i%3)*.8);
      circ(vec2(x, y), .15, hsl(120/360,.6,.32));
    }

    // home row (still water)
    rect(vec2(cx, HOME_Y+.5), vec2(W, 1), hsl(205/360,.55,.27));

    // hedges between home slots
    for (let i=0; i<=homeSlots; i++) {
      const x0 = i===0 ? -OFFSCREEN_PAD : homeXs[i-1] + 1.4;
      const x1 = i===homeSlots ? LEVEL_W + OFFSCREEN_PAD : homeXs[i] - .4;
      const w = x1 - x0;
      rect(vec2(x0 + w/2, HOME_Y+.5), vec2(w, 1), hsl(120/360,.6,.18));
      for (let j=0; j<Math.floor(w*1.2); j++) {
        circ(vec2(x0 + (j+.5)*w/(w*1.2|0), HOME_Y + .85 + (j%2)*.05), .15, hsl(120/360,.7,.26));
      }
    }

    // home pads (lily pads) — static; the reached-home frogs animate on top
    for (let i=0;i<homeSlots;i++) {
      const p = vec2(homeXs[i]+.5, HOME_Y+.5);
      drawTile(p, vec2(1.6, 1.0), sprites.lily, WHITE, 0, false, undefined, false, false, ctx);
    }
  }

  // Build the offscreen background lazily, and repaint it whenever the lane
  // counts change (the road/river bands resize per level). Camera is fixed, so
  // the only thing that invalidates the cache is the layout.
  function ensureBackground() {
    if (!bgLayer) {
      bgLayer = new CanvasLayer(vec2(), vec2(1), 0, 0, mainCanvasSize.copy(), true);
      bgLayer.render = () => {};   // we blit it ourselves in gameRender (draw order)
    }
    const key = ROAD_LANES + 'x' + RIVER_LANES;
    if (key !== bgKey) {
      bgLayer.context.clearRect(0, 0, bgLayer.canvas.width, bgLayer.canvas.height);
      paintStaticBackground(bgLayer.context);
      bgLayer.updateWebGL();
      bgKey = key;
    }
  }

  // Animated water ripples — the one thing on the background that still moves.
  function drawWaterRipples() {
    const riverH = LEVEL_H - RIVER_MIN_Y;
    for (let i=0; i<28; i++) {
      const baseX = (i*1.5) % LEVEL_W;
      const x = baseX + Math.sin(time*.4 + i*1.7) * .4;
      const y = RIVER_MIN_Y + .3 + ((i*1.13) % (riverH - .6));
      drawRect(vec2(x, y), vec2(.5, .06), hsl(0,0,1,.20));
    }
  }

  // Breathing frogs sitting on filled home pads (drawn live, not cached).
  function drawHomeFrogs() {
    for (let i=0;i<homeSlots;i++) {
      if (!reached[i]) continue;
      // Per-pad breathing phase so they don't all inhale in lockstep.
      drawFrog(vec2(homeXs[i]+.5, HOME_Y+.5), vec2(0, 1), 0, i * 1.7);
    }
  }

  // Bonus fly sitting on an empty pad (drawn with primitives — atlas is full).
  function drawFly() {
    if (flySlot < 0) return;
    const c = vec2(homeXs[flySlot]+.5, HOME_Y + .5 + Math.sin(time*8)*.04);
    const wa = .18 + Math.sin(time*30)*.05;            // fluttering wings
    drawEllipse(c.add(vec2(-.14,.06)), vec2(.30, wa), hsl(0,0,1,.6));
    drawEllipse(c.add(vec2( .14,.06)), vec2(.30, wa), hsl(0,0,1,.6));
    drawEllipse(c, vec2(.24,.36), hsl(0,0,.1));         // body
    drawCircle(c.add(vec2(-.07,.15)), .10, hsl(0,.7,.5)); // eyes
    drawCircle(c.add(vec2( .07,.15)), .10, hsl(0,.7,.5));
  }

  // ------------------------------------------------------------
  // Per-obstacle vertical bounce helpers. The base y stored on the
  // obstacle is the MINIMUM position; bounce only ever adds upward.

  function carBumpY(c) {
    // small fast bumps, less than half a wheel
    const a = Math.sin(time*14 + c.seed*.7)*.5 + .5;
    const b = Math.sin(time*9  + c.seed   )*.5 + .5;
    return a*.045 + b*.025;
  }

  function logBumpY(l) {
    // slow gentle float on the water
    const a = Math.sin(time*1.4 + l.seed*.4)*.5 + .5;
    return a*.09;
  }

  function drawCar(c) {
    const bumpY = carBumpY(c);
    const liftH = (c.kind === 'truck' ? TRUCK_TRAILER.y : carRender[c.kind].y);
    const lift = liftH * CAR_LIFT;
    const x = c.pos.x, y = c.pos.y + lift + bumpY;
    const dir = c.dir;            // 1 right, -1 left
    const mir = dir < 0;          // tiles are painted facing right

    // shadow sits at the bottom of the wheels (no bob) as the ground reference
    drawRect(vec2(x, c.pos.y + lift - liftH*.42 - .20), vec2(c.size.x*.96, .14), hsl(0,0,0,.35));

    if (c.kind === 'truck') {
      // cab on the leading side, trailer trailing; tires under both
      const total = TRUCK_CAB.x + TRUCK_GAP + TRUCK_TRAILER.x;
      const cabX = x + dir * (total/2 - TRUCK_CAB.x/2);
      const trX  = x - dir * (total/2 - TRUCK_TRAILER.x/2);
      const wy   = y - WHEEL.truckDrop;
      drawTile(vec2(trX, y),  TRUCK_TRAILER, sprites.trailerBase,   WHITE,   0, mir);
      drawTile(vec2(trX, y),  TRUCK_TRAILER, sprites.trailerDetail, WHITE,   0, mir);
      drawTile(vec2(cabX, y), TRUCK_CAB,     sprites.cabBase,       c.color, 0, mir);
      drawTile(vec2(cabX, y), TRUCK_CAB,     sprites.cabDetail,     WHITE,   0, mir);
      // wheels drawn on top of the body
      drawTire(cabX + dir*TRUCK_CAB.x*WHEEL.cabAxle, wy);       // cab front axle
      drawTire(trX  - dir*TRUCK_TRAILER.x*WHEEL.trailerRear, wy); // trailer rear axle
      drawTire(trX  + dir*TRUCK_TRAILER.x*WHEEL.trailerMid, wy);  // trailer mid axle
      return;
    }

    const r = carRender[c.kind];
    const wy = y - r.y*WHEEL.drop;
    drawTile(vec2(x, y), r, sprites[c.kind + 'Base'],   c.color, 0, mir);
    drawTile(vec2(x, y), r, sprites[c.kind + 'Detail'], WHITE,   0, mir);
    // wheels drawn on top of the body
    drawTire(x - r.x*WHEEL.axle, wy);
    drawTire(x + r.x*WHEEL.axle, wy);
  }

  function drawLog(l) {
    // 3-slice the atlas log tile: fixed-size end caps (never smear) + a middle
    // stretched to this log's width. No shadow — it floats on the water.
    const w = l.size.x, h = l.size.y;
    const x = l.pos.x, y = l.pos.y + logBumpY(l);
    const capW = LOG_CAP_W, edge = w/2 - capW/2;
    drawTile(vec2(x, y),        vec2(w - capW*2, h), logMidTile, WHITE);
    drawTile(vec2(x - edge, y), vec2(capW, h),       logCapTile, WHITE);            // left cap
    drawTile(vec2(x + edge, y), vec2(capW, h),       logCapTile, WHITE, 0, true);   // right cap (mirrored)
  }

  function drawFrog(basePos = frog.pos, facing = frog.facing, hopAnimT = frog.hopAnim, breathPhase = 0) {
    const hopArc = Math.sin(hopAnimT * Math.PI);  // 0..1..0
    const p = basePos.add(vec2(0, hopArc * .25));

    // Breathing scales the body ±5%; the hop adds a little extra puff.
    const breath = Math.sin(time * 1.8 + breathPhase) * .05;
    const s = 1.35 * (1 + breath) * (1 + hopArc * .12);

    // shadow — anchored to basePos so it stays grounded during the hop.
    // When facing down the legs are at the top, so put the shadow up there.
    const shadowY = facing.y < 0 ? .42 : -.42;
    drawEllipse(basePos.add(vec2(0, shadowY)), vec2(1.10, .34),
      hsl(0,0,0, .42 - hopArc*.12));

    // frog tile is painted facing up; rotate it to point along `facing`
    drawTile(p, vec2(s, s), sprites.frog, WHITE, facing.angle());
  }

  // Debug collision overlay — shown only while the engine debug overlay is on
  // (toggle with the ~ / backtick key). Outlines every gameplay hit shape.
  function drawDebugCollision() {
    for (const c of cars) debugRect(c.pos, c.size, hsl(0,1,.5));    // vehicles: red
    for (const l of logs) debugRect(l.pos, l.size, hsl(.5,1,.5));   // logs: cyan
    // home-slot capture windows: |x - slot| < 1.3 at the HOME_Y row (green)
    for (let i = 0; i < homeSlots; i++)
      debugRect(vec2(homeXs[i]+.5, HOME_Y+.5), vec2(2.6, 1), hsl(.33,1,.5));
    // player frog: yellow (only while the live frog is on screen)
    if (isPlaying() && !gameOver && !respawnTimer.active())
      debugRect(frog.pos, frogSize, hsl(.15,1,.5));
  }

  // Per-level time-of-day mood. The whole background is cached once, so we
  // just multiply the blit by this tint — free recolor, cycles every 4 levels.
  function levelTint() {
    return [
      WHITE,                      // day
      new Color(1.0, .80, .58),   // dusk (warm)
      new Color(.48, .58, .92),   // night (cool + darker)
      new Color(.92, .76, .98),   // dawn (soft violet)
    ][(level-1) % 4];
  }

  function gameRender() {
    // Pre-rendered static background blitted as one screen-space quad, tinted
    // by the current level's time-of-day mood.
    ensureBackground();
    bgLayer.draw(mainCanvasSize.scale(.5), mainCanvasSize, levelTint(), 0, false, undefined, true);
    drawWaterRipples();
    drawHomeFrogs();
    drawFly();

    // Draw cars, logs, AND the player together, sorted back-to-front by y:
    // higher y (further back) first, lower y (nearer) last/on top. So the frog
    // can sit behind a car that's one row below it, or in front of one above.
    const drawables = [];
    for (const l of logs) drawables.push({ y: l.pos.y, draw: () => drawLog(l) });
    for (const c of cars) drawables.push({ y: c.pos.y, draw: () => drawCar(c) });

    // Alive player frog — disappears on death (particles play instead) and on title.
    if (isPlaying() && !gameOver && !respawnTimer.active()) {
      const logBump = frog.onLog ? logBumpY(frog.onLog) : 0;
      // tiny bias so the frog draws in front of a log it's riding at the same row
      drawables.push({ y: frog.pos.y - .001,
        draw: () => drawFrog(frog.pos.add(vec2(0, logBump)), frog.facing, frog.hopAnim) });
    }

    drawables.sort((a, b) => b.y - a.y);
    for (const d of drawables) d.draw();

    // Death particles on top of everything so they read clearly.
    for (const p of particles) {
      const t = p.life / p.maxLife;
      const alpha = Math.max(0, 1 - t);
      drawCircle(p.pos, p.size * (1 - t*.4), hsl(p.h, p.s, p.l, alpha));
    }

    if (debugOverlay) drawDebugCollision();
  }

  function gameRenderPost() {
    if (!isPlaying()) return; // title screen — menu owns the display

    // HUD lives along the bottom corners, leaving the top open for added lanes.
    // Score (prominent) bottom-right; lives/level bottom-left. The crossing-timer
    // bar sits centered between them.
    const hudY = mainCanvasSize.y - 24;
    drawTextScreen(`${score}`,
      vec2(mainCanvasSize.x - 20, hudY), 36,
      hsl(50/360,.9,.7), 5, hsl(0,0,0), 'right');
    drawTextScreen(`LIVES  ${Math.max(0,lives)}      LEVEL  ${level}`,
      vec2(20, hudY), 22,
      hsl(105/360,.55,.85), 4, hsl(0,0,0), 'left');

    // Crossing-timer bar at the bottom — drains as you cross; green → red, and
    // blinks while under 3s. Hidden on game over.
    if (!gameOver) {
      const frac = clamp(crossTimer / crossTimerMax, 0, 1);
      const low = crossTimer < 3;
      const blink = low ? .55 + .35*Math.sin(time*16) : .5;  // pulse when low
      const barW = 320, barH = 16, cx = mainCanvasSize.x/2, by = mainCanvasSize.y - 28;
      drawRect(vec2(cx, by), vec2(barW+8, barH+8), hsl(0,0,0,.55), 0, glEnable, true);
      const fillW = barW * frac;
      drawRect(vec2(cx - barW/2 + fillW/2, by), vec2(fillW, barH),
        hsl(low ? 0 : frac*.33, .9, blink), 0, glEnable, true);
    }

    // Brief on-canvas banner; the gameOver menu owns the rest.
    if (gameOver && gameOverHoldTimer > 0) {
      drawTextScreen('GAME OVER',
        vec2(mainCanvasSize.x/2, mainCanvasSize.y/2), 90,
        hsl(0, .8, .55), 8, hsl(0,0,0));
    }
  }

  // Startup
  engineInit(gameInit, gameUpdate, gameUpdatePost, gameRender, gameRenderPost);
  </script>
</body>
</html>
