<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>LittleJS Froggit</title>
  <style>
    html, body { margin:0; padding:0; background:#000; overflow:hidden; }
    canvas { image-rendering: pixelated; }
  </style>
</head>
<body>
  <script src="../dist/littlejs.js?1780012197793"></script>
  <script src="../templates/gameFx.js?1780012197793"></script>
  <script src="../templates/menus.js?1780012197793"></script>
  <script>
  'use strict';

  // engine settings
  debugWatermark = false;
  showEngineVersion = false;

  // Touch: tap one of the four screen triangles (divided by the diagonals) to
  // hop in that direction. Handled directly in handleInput — no touch gamepad.
  touchGamepadEnable = false;

  // ------------------------------------------------------------
  // Frogger (primitives only)

  const LEVEL_W = 30;
  const LEVEL_H = 20;
  const DT = 1/60;

  // Generous off-screen padding so cars/logs spawn and wrap
  // well outside the visible camera area (no pop-in).
  const OFFSCREEN_PAD = 10;

  const ROAD_MIN_Y  = 4;
  const ROAD_MAX_Y  = 8;
  const RIVER_MIN_Y = 11;
  const RIVER_MAX_Y = 15;
  const HOME_Y      = 16;

  const frogSize = vec2(.75, .75);

  const homeSlots = 5;
  const homeXs = Array.from({length: homeSlots}, (_,i)=>
    (3 + i * (LEVEL_W-6)/(homeSlots-1))
  );

  // Game state
  let frog, cars = [], logs = [];
  // Short-lived death particles. The player vanishes on death and these
  // play in its place — same effect for road and water, just a different hue.
  let particles = [];
  let reached = new Array(homeSlots).fill(false);
  let lives = 3, level = 1;
  let bestLevel = 1;
  let respawnTimer;
  let gameOver = false;
  let gameOverHoldTimer = 0; // seconds before gameOver menu surfaces

  // Sounds
  let sHop, sDie, sHome, sLevel;

  function gridToWorld(gx, gy) { return vec2(gx + .5, gy + .5); }
  function worldToGridPos(p) { return vec2(Math.floor(p.x), Math.floor(p.y)); }

  function clampFrogGrid(g) {
    g.x = clamp(g.x, 0, LEVEL_W-1);
    g.y = clamp(g.y, 0, LEVEL_H-1);
    return g;
  }

  function overlapAABB(posA, sizeA, posB, sizeB) {
    return Math.abs(posA.x - posB.x) < (sizeA.x + sizeB.x)/2 &&
           Math.abs(posA.y - posB.y) < (sizeA.y + sizeB.y)/2;
  }

  function resetRun(full=false) {
    frog.grid = vec2(Math.floor(LEVEL_W/2), 1);
    frog.pos = gridToWorld(frog.grid.x, frog.grid.y);
    frog.carryVx = 0;
    frog.facing = vec2(0, 1);
    frog.hopAnim = 0;
    frog.onLog = null;
    if (full) {
      reached.fill(false);
      lives = 3;
      level = 1;
      buildLanes();
    }
  }

  function buildLanes() {
    cars.length = 0;
    logs.length = 0;

    const speedScale = (1 + (level-1) * .12) * .5;

    // ---- Cars ----
    const carKinds = ['sedan','wagon','sports','truck','bus'];
    const roadDefs = [
      {y:4, dir: 1, speed: 5.5, count: 3, w: 2.0, kind:'sedan'},
      {y:5, dir:-1, speed: 7.0, count: 3, w: 2.2, kind:'wagon'},
      {y:6, dir: 1, speed: 8.5, count: 3, w: 1.6, kind:'sports'},
      {y:7, dir:-1, speed: 6.0, count: 3, w: 2.8, kind:'truck'},
      {y:8, dir: 1, speed: 7.8, count: 2, w: 3.2, kind:'bus'},
    ];
    for (const d of roadDefs) {
      const totalSpan = LEVEL_W + OFFSCREEN_PAD*2;
      for (let i=0; i<d.count; i++) {
        const x = -OFFSCREEN_PAD + (i * totalSpan / d.count) + rand(0, 2);
        cars.push({
          pos: vec2(x, d.y + .5),
          size: vec2(d.w, .85),
          vx: d.dir * d.speed * speedScale,
          dir: d.dir,
          kind: d.kind,
          color: hsl(((d.y*37 + i*61) % 360)/360, .85, .55),
          seed: rand(0, 1000),
        });
      }
    }

    // ---- Logs ----
    const riverDefs = [
      {y:11, dir:-1, speed: 3.5, count: 4, w: 4.5},
      {y:12, dir: 1, speed: 4.2, count: 4, w: 3.6},
      {y:13, dir:-1, speed: 4.8, count: 3, w: 5.5},
      {y:14, dir: 1, speed: 3.9, count: 5, w: 3.2},
      {y:15, dir:-1, speed: 4.4, count: 4, w: 4.0},
    ];
    for (const d of riverDefs) {
      const totalSpan = LEVEL_W + OFFSCREEN_PAD*2;
      for (let i=0; i<d.count; i++) {
        const x = -OFFSCREEN_PAD + (i * totalSpan / d.count) + rand(0, 2);
        logs.push({
          pos: vec2(x, d.y + .5),
          size: vec2(d.w, .85),
          vx: d.dir * d.speed * speedScale,
          color: hsl(28/360, .55, .32 + .04*(i%3)),
          seed: rand(0, 1000),
        });
      }
    }
  }

  function killFrog() {
    if (respawnTimer.active()) return;

    // Pick a particle palette by where the frog died (water vs. dry land).
    const gy = frog.grid.y;
    const inWater = gy >= RIVER_MIN_Y && gy <= HOME_Y;
    const hue = inWater ? 205/360 : 105/360;
    const sat = inWater ? .55 : .75;
    const light = inWater ? .70 : .45;

    for (let i = 0; i < 24; i++) {
      const a = rand(0, Math.PI * 2);
      const s = rand(1.8, 4.2);
      particles.push({
        pos: frog.pos.copy(),
        vel: vec2(Math.cos(a) * s, Math.sin(a) * s * .6 + rand(1.6, 3.4)),
        life: 0,
        maxLife: rand(.55, .95),
        h: hue,
        s: sat,
        l: light + rand(-.10, .12),
        size: rand(.07, .15),
      });
    }

    sDie.play(frog.pos);
    lives--;
    respawnTimer.set(1);
    if (lives < 0) {
      gameOver = true;
      gameOverHoldTimer = 1.4;
      if (level > bestLevel) {
        bestLevel = level;
        saveData({bestLevel});
      }
    }
  }

  function reachHome(slotIndex) {
    if (reached[slotIndex]) return;
    reached[slotIndex] = true;
    sHome.play(frog.pos);
    resetRun(false);

    if (reached.every(Boolean)) {
      level++;
      sLevel.play(vec2(LEVEL_W/2, HOME_Y+.5));
      reached.fill(false);
      buildLanes();
    }
  }

  function tryMove(dx, dy) {
    if (respawnTimer.active()) return;

    const g = frog.grid.copy();
    g.x += dx;
    g.y += dy;

    if (g.x < 0 || g.x >= LEVEL_W || g.y < 0 || g.y >= LEVEL_H) {
      killFrog();
      return;
    }
    if (g.y > HOME_Y) return;

    frog.grid = g;
    frog.pos = gridToWorld(frog.grid.x, frog.grid.y);
    frog.carryVx = 0;
    frog.facing = vec2(dx, dy);
    frog.hopAnim = 1;
    sHop.play(frog.pos);
  }

  // Last cardinal direction from the analog/touch stick — used to edge-trigger
  // hops so holding the stick doesn't auto-hop every frame.
  let lastStickDir = vec2();

  function handleInput() {
    // Keyboard: one-shot hop per press (arcade-style)
    const up    = keyWasPressed('ArrowUp')   || keyWasPressed('KeyW');
    const down  = keyWasPressed('ArrowDown') || keyWasPressed('KeyS');
    const left  = keyWasPressed('ArrowLeft') || keyWasPressed('KeyA');
    const right = keyWasPressed('ArrowRight')|| keyWasPressed('KeyD');

    if (up)    return tryMove(0, 1);
    if (down)  return tryMove(0,-1);
    if (left)  return tryMove(-1,0);
    if (right) return tryMove(1, 0);

    // Physical D-pad buttons (12-15) — edge-triggered automatically.
    if (gamepadWasPressed(12)) return tryMove(0, 1);
    if (gamepadWasPressed(13)) return tryMove(0,-1);
    if (gamepadWasPressed(14)) return tryMove(-1,0);
    if (gamepadWasPressed(15)) return tryMove(1, 0);

    // Touch: tap one of the four screen triangles (split by the diagonals).
    // Top triangle hops up, bottom hops down, left/right hop sideways.
    if (isTouchDevice && mouseWasPressed(0) && !isMenuVisible()) {
      const dx = mousePosScreen.x - mainCanvasSize.x * .5;
      const dy = mousePosScreen.y - mainCanvasSize.y * .5;
      if (abs(dx) > abs(dy)) return tryMove(sign(dx), 0);
      if (dy !== 0)          return tryMove(0, sign(-dy)); // screen-y is down-positive; world-y is up
    }

    // Stick (analog only — touch gamepad is disabled): pick dominant cardinal,
    // but only hop on the
    // frame the stick crosses INTO that direction. Returning to neutral arms
    // the next hop.
    const stick = gamepadStick(0);
    let dir = vec2();
    if (stick.lengthSquared() > .5*.5) {
      dir = abs(stick.x) > abs(stick.y)
        ? vec2(sign(stick.x), 0)
        : vec2(0, sign(stick.y));
    }
    if ((dir.x !== lastStickDir.x || dir.y !== lastStickDir.y) &&
        (dir.x || dir.y))
    {
      tryMove(dir.x, dir.y);
    }
    lastStickDir = dir;
  }

  function updateObstacles(arr) {
    for (const o of arr) {
      o.pos.x += o.vx * DT;
      const pad = o.size.x/2 + OFFSCREEN_PAD;
      if (o.pos.x < -pad) o.pos.x = LEVEL_W + pad;
      if (o.pos.x > LEVEL_W + pad) o.pos.x = -pad;
    }
  }

  function frogWorldChecks() {
    if (respawnTimer.active()) return;

    for (const c of cars) {
      if (overlapAABB(frog.pos, frogSize, c.pos, c.size)) {
        killFrog();
        return;
      }
    }

    const gy = frog.grid.y;
    const inRiver = gy >= RIVER_MIN_Y && gy <= RIVER_MAX_Y;
    if (inRiver) {
      let onLog = null;
      for (const l of logs) {
        if (overlapAABB(frog.pos, frogSize, l.pos, l.size)) { onLog = l; break; }
      }
      frog.onLog = onLog;
      if (!onLog) { killFrog(); return; }

      frog.carryVx = onLog.vx;
      frog.pos.x += frog.carryVx * DT;

      if (frog.pos.x < .25 || frog.pos.x > LEVEL_W - .25) {
        killFrog();
        return;
      }
      frog.grid = clampFrogGrid(worldToGridPos(frog.pos));
    } else {
      frog.onLog = null;
    }

    if (frog.grid.y === HOME_Y) {
      let best = -1, bestDx = 999;
      for (let i=0;i<homeSlots;i++) {
        const dx = Math.abs(frog.pos.x - (homeXs[i] + .5));
        if (dx < bestDx) { bestDx = dx; best = i; }
      }
      if (bestDx < 1.3) reachHome(best);
      else killFrog();
    }
  }

  // ------------------------------------------------------------
  // Engine callbacks

  function gameInit() {
    saveDataInit('frogger');
    setCanvasFixedSize(vec2(960, 540));
    cameraScale = 28;
    setCameraPos(vec2(LEVEL_W/2, LEVEL_H/2));

    frog = {
      grid: vec2(Math.floor(LEVEL_W/2), 1),
      pos: vec2(),
      carryVx: 0,
      facing: vec2(0, 1),
      hopAnim: 0,
      onLog: null,
    };

    respawnTimer = new Timer(); respawnTimer.unset();

    sHop  = new SoundGenerator({ volume:.6, frequency:640, randomness:.08, attack:0, release:.06, shapeCurve:1.6 });
    sDie  = new SoundGenerator({ volume:.9, frequency:180, randomness:.2,  attack:0, release:.28, shapeCurve:.6, slide:-1.6, noise:.15 });
    sHome = new SoundGenerator({ volume:.8, frequency:720, randomness:.06, attack:0, release:.14, shapeCurve:1.2, pitchJump:360, pitchJumpTime:.04 });
    sLevel= new SoundGenerator({ volume:.9, frequency:420, randomness:.03, attack:0, release:.35, shapeCurve:1.1, repeatTime:.08, pitchJump:140, pitchJumpTime:.02 });

    bestLevel = getSaveData().bestLevel ?? 1;

    setSoundVolume(.8);
    if (typeof installAutoPause === 'function')
        installAutoPause();

    buildLanes();
    resetRun(true);
    buildMenus();
  }

  function startGame() {
    gameOver = false;
    resetRun(true);
    setPlaying(true);
  }

  function quitToTitleWithCleanup() {
    quitToTitle(() => { gameOver = false; resetRun(true); });
  }

  function buildMenus() {
    if (typeof createMenu !== 'function') return;

    createTitleMenu({
      title: 'FROGGIT',
      subtitle: 'Cross the road and the river',
      onPlay: startGame,
      revealOnClick: false,
      canReveal: () => !isPlaying(),
      itemsBefore: [
        {type:'label', id:'bestLabel', text:`BEST LEVEL ${bestLevel}`},
      ],
      items: [
        {type:'button', label:'OPTIONS',     onClick: () => pushMenu('options')},
        {type:'button', label:'HOW TO PLAY', onClick: () => pushMenu('about')},
      ],
      onShow: () => {
        const m = getMenu('title');
        if (m) m.getItem('bestLabel')?.setLabel(`BEST LEVEL ${bestLevel}`);
      },
    });

    createOptionsMenu();

    createMenu({
      id: 'about', title: 'HOW TO PLAY', onHide: popMenu,
      items: [
        {type:'text', text:
          'Get five frogs home, one at a time.\n\n' +
          'HOP with arrow keys, WASD, D-pad, or left stick. On touch, tap one ' +
          'of the four screen edges — the direction you tap is the way you hop.\n\n' +
          'Avoid the cars on the road; ride logs across the river — don\'t touch ' +
          'the water. Fill all five home slots and the level repeats faster.\n\n' +
          'Three lives. Esc pauses.'},
        {type:'separator'},
        {type:'button', label:'BACK', onClick: () => hideMenu('about')},
      ],
    });

    createPauseMenu({
      onRestart: startGame,
      onQuit:    quitToTitleWithCleanup,
      extraItems: [
        {type:'button', label:'OPTIONS', onClick: () => pushMenu('options')},
      ],
    });

    createMenu({
      id: 'gameOver', title: 'GAME OVER', dismissable: false,
      onShow: () => {
        const m = getMenu('gameOver');
        if (!m) return;
        m.getItem('levelReached')?.setLabel(`LEVEL  ${level}`);
        m.getItem('bestLabel')?.setLabel(`BEST   ${bestLevel}`);
      },
      items: [
        {type:'label', id:'levelReached', text:'LEVEL  0'},
        {type:'label', id:'bestLabel',    text:'BEST   0'},
        {type:'separator'},
        {type:'button', label:'PLAY AGAIN',    onClick: () => { hideMenu('gameOver'); startGame(); }},
        {type:'button', label:'QUIT TO TITLE', onClick: quitToTitleWithCleanup},
      ],
    });

    installDefaultToolbar();

    // Show the title menu immediately — no click-to-reveal step.
    showMenu('title');
  }

  function gameUpdate() {
    // Pause hotkey: Esc / gamepad Start. Skipped if gameOver menu is up.
    const endMenuShowing = (typeof getTopMenu === 'function') && getTopMenu()?.id === 'gameOver';
    if (isPlaying() && !endMenuShowing &&
        (keyWasPressed('Escape') || gamepadWasPressed(9)))
    {
      if (typeof playMenuSound === 'function') playMenuSound('activate');
      if (typeof showMenu === 'function') showMenu('pause');
      inputClearKey('Escape');
      inputClearKey(9, 1, false, true, false);
      return;
    }

    if (!isPlaying()) {
      // Attract: keep cars / logs scrolling so the title screen feels alive.
      updateObstacles(cars);
      updateObstacles(logs);
      return;
    }

    if (gameOver) {
      // Tick remaining death particles so they finish their arcs cleanly.
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.life += DT;
        p.vel.y -= 8 * DT;
        p.pos.x += p.vel.x * DT;
        p.pos.y += p.vel.y * DT;
        if (p.life >= p.maxLife) particles.splice(i, 1);
      }
      if (!endMenuShowing) {
        gameOverHoldTimer -= DT;
        if (gameOverHoldTimer <= 0 && typeof showMenu === 'function')
          showMenu('gameOver');
      }
      return;
    }

    if (respawnTimer.elapsed()) {
      respawnTimer.unset();
      resetRun(false);
    }

    handleInput();
    updateObstacles(cars);
    updateObstacles(logs);
    frogWorldChecks();

    // tick & cull death particles (simple gravity arcs)
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.life += DT;
      p.vel.y -= 8 * DT;
      p.pos.x += p.vel.x * DT;
      p.pos.y += p.vel.y * DT;
      if (p.life >= p.maxLife) particles.splice(i, 1);
    }

    if (frog.hopAnim > 0)
      frog.hopAnim = Math.max(0, frog.hopAnim - DT * 6);
  }

  function gameUpdatePost() {
    setCameraPos(vec2(LEVEL_W/2, LEVEL_H/2));
  }

  // ------------------------------------------------------------
  // Rendering

  function drawLaneBackground() {
    // Extend visuals well beyond playable area so wraparound is invisible.
    const W = LEVEL_W + OFFSCREEN_PAD*2 + 8;
    const cx = LEVEL_W/2;

    // start/median grass base layer covers the whole screen
    drawRect(vec2(cx, LEVEL_H/2), vec2(W, LEVEL_H+2), hsl(120/360,.45,.22));

    // Road
    const roadH = (ROAD_MAX_Y - ROAD_MIN_Y + 1);
    drawRect(vec2(cx, ROAD_MIN_Y + roadH/2), vec2(W, roadH), hsl(0,0,.15));

    // road edge curbs
    drawRect(vec2(cx, ROAD_MIN_Y), vec2(W, .12), hsl(0,0,.85));
    drawRect(vec2(cx, ROAD_MAX_Y+1), vec2(W, .12), hsl(0,0,.85));

    // dashed lane separators
    for (let y=ROAD_MIN_Y+1; y<=ROAD_MAX_Y; y++) {
      for (let x = -OFFSCREEN_PAD; x < LEVEL_W + OFFSCREEN_PAD; x += 1.4) {
        drawRect(vec2(x + .35, y), vec2(.7, .07), hsl(50/360,.85,.55,.85));
      }
    }

    // River
    const riverH = (LEVEL_H - RIVER_MIN_Y);
    drawRect(vec2(cx, RIVER_MIN_Y + riverH/2), vec2(W, riverH), hsl(205/360,.65,.30));

    // moving ripples
    for (let i=0; i<28; i++) {
      const baseX = (i*1.5) % LEVEL_W;
      const x = baseX + Math.sin(time*.4 + i*1.7) * .4;
      const y = RIVER_MIN_Y + .3 + ((i*1.13) % (riverH - .6));
      drawRect(vec2(x, y), vec2(.5, .06), hsl(0,0,1,.20));
    }

    // banks
    drawRect(vec2(cx, RIVER_MIN_Y), vec2(W, .18), hsl(35/360,.5,.35));
    drawRect(vec2(cx, RIVER_MAX_Y+1), vec2(W, .18), hsl(35/360,.5,.35));

    // grass tufts on median
    for (let i=0; i<12; i++) {
      const x = (i*2.7 + (i%3)*.7) % LEVEL_W;
      const y = 9.5 + ((i%2)?.4:-.4);
      drawCircle(vec2(x, y), .18, hsl(120/360,.6,.32));
    }
    // tufts on start grass
    for (let i=0; i<14; i++) {
      const x = (i*2.3 + 1.1) % LEVEL_W;
      const y = 1 + ((i%3)*.8);
      drawCircle(vec2(x, y), .15, hsl(120/360,.6,.32));
    }

    // home row (still water)
    drawRect(vec2(cx, HOME_Y+.5), vec2(W, 1), hsl(205/360,.55,.27));

    // hedges between home slots
    for (let i=0; i<=homeSlots; i++) {
      const x0 = i===0 ? -OFFSCREEN_PAD : homeXs[i-1] + 1.4;
      const x1 = i===homeSlots ? LEVEL_W + OFFSCREEN_PAD : homeXs[i] - .4;
      const w = x1 - x0;
      drawRect(vec2(x0 + w/2, HOME_Y+.5), vec2(w, 1), hsl(120/360,.6,.18));
      for (let j=0; j<Math.floor(w*1.2); j++) {
        drawCircle(vec2(x0 + (j+.5)*w/(w*1.2|0), HOME_Y + .85 + (j%2)*.05), .15, hsl(120/360,.7,.26));
      }
    }

    // home pads (lily pads)
    for (let i=0;i<homeSlots;i++) {
      const p = vec2(homeXs[i]+.5, HOME_Y+.5);
      // lily pad
      drawEllipse(p, vec2(1.4, .8),  hsl(95/360,.5,.30));
      drawEllipse(p, vec2(1.1, .55), hsl(95/360,.55,.38));
      // notch
      drawRect(p.add(vec2(0,-.05)), vec2(.18, .8), hsl(205/360,.55,.27));
      if (reached[i]) {
        // same renderer as the player frog, just facing up with no hop.
        // Per-pad breathing phase so they don't all inhale in lockstep.
        drawFrog(p, vec2(0, 1), 0, i * 1.7);
      }
    }
  }

  // ------------------------------------------------------------
  // Per-obstacle vertical bounce helpers. The base y stored on the
  // obstacle is the MINIMUM position; bounce only ever adds upward.

  function carBumpY(c) {
    // small fast bumps, less than half a wheel
    const a = Math.sin(time*14 + c.seed*.7)*.5 + .5;
    const b = Math.sin(time*9  + c.seed   )*.5 + .5;
    return a*.045 + b*.025;
  }

  function logBumpY(l) {
    // slow gentle float on the water
    const a = Math.sin(time*1.4 + l.seed*.4)*.5 + .5;
    return a*.09;
  }

  function drawCar(c) {
    const bumpY = carBumpY(c);
    const w = c.size.x, h = c.size.y;
    const x = c.pos.x, y0 = c.pos.y;
    const y = y0 + bumpY;
    const pos = vec2(x, y);
    const dir = c.dir; // 1 right, -1 left

    // shadow stays on the road as the ground reference
    drawRect(vec2(x, y0 - .42), vec2(w*.95, .12), hsl(0,0,0,.35));

    if (c.kind === 'bus') {
      drawRect(pos, vec2(w, h*.92), c.color);
      drawRect(pos.add(vec2(0, h*.18)), vec2(w*.88, h*.38), hsl(200/360,.5,.8,.85));
      // window dividers
      for (let i=-2; i<=2; i++)
        drawRect(pos.add(vec2(i*w*.16, h*.18)), vec2(.05, h*.38), hsl(0,0,.1));
      // door at back
      drawRect(pos.add(vec2(-dir*w*.32, -.04)), vec2(.12, h*.55), hsl(0,0,.08));
      // stripe
      drawRect(pos.add(vec2(0, -h*.18)), vec2(w*.94, .06), hsl(0,0,1,.4));
    }
    else if (c.kind === 'truck') {
      // cargo box (back)
      drawRect(pos.add(vec2(-dir*w*.22, 0)), vec2(w*.55, h*.95), hsl(0,0,.85));
      drawRect(pos.add(vec2(-dir*w*.22, 0)), vec2(w*.55, h*.95), hsl(0,0,.85), .04, hsl(0,0,.3));
      // panel lines on cargo
      drawRect(pos.add(vec2(-dir*w*.22, 0)), vec2(.05, h*.85), hsl(0,0,.35));
      // cab
      drawRect(pos.add(vec2(dir*w*.30, 0)), vec2(w*.4, h*.95), c.color);
      drawRect(pos.add(vec2(dir*w*.32, h*.18)), vec2(w*.28, h*.32), hsl(200/360,.5,.85,.9));
    }
    else if (c.kind === 'sports') {
      // sleek low car: lower body wider, cabin smaller
      drawRect(pos, vec2(w, h*.55), c.color);
      drawRect(pos.add(vec2(-dir*w*.05, h*.18)), vec2(w*.55, h*.32), hsl(0,0,.05));
      // racing stripe
      drawRect(pos, vec2(w, .08), hsl(0,0,1,.6));
    }
    else if (c.kind === 'wagon') {
      drawRect(pos, vec2(w, h*.92), c.color);
      drawRect(pos.add(vec2(0, h*.18)), vec2(w*.78, h*.32), hsl(200/360,.5,.85,.9));
      // pillar between front/back windows
      drawRect(pos.add(vec2(0, h*.18)), vec2(.06, h*.32), c.color);
      // side trim
      drawRect(pos.add(vec2(0, -h*.18)), vec2(w*.88, .05), hsl(0,0,.1));
    }
    else {
      // sedan
      drawRect(pos, vec2(w, h*.85), c.color);
      drawRect(pos.add(vec2(0, h*.18)), vec2(w*.65, h*.3), hsl(200/360,.5,.85,.9));
      drawRect(pos.add(vec2(-dir*.05, h*.18)), vec2(.05, h*.3), c.color);
    }

    // wheels (front + back) — bump along with the body
    const wy = y - h*.42;
    drawCircle(vec2(x - w*.32, wy), .30, hsl(0,0,.08));
    drawCircle(vec2(x + w*.32, wy), .30, hsl(0,0,.08));
    drawCircle(vec2(x - w*.32, wy), .14, hsl(0,0,.45));
    drawCircle(vec2(x + w*.32, wy), .14, hsl(0,0,.45));
    // truck/bus extra wheels
    if (c.kind === 'truck' || c.kind === 'bus') {
      const xMid = x + (c.kind==='truck' ? -dir*w*.05 : 0);
      drawCircle(vec2(xMid, wy), .30, hsl(0,0,.08));
      drawCircle(vec2(xMid, wy), .14, hsl(0,0,.45));
    }

    // headlights / taillights (only on horizontal cars; ours all are)
    const fx = x + dir * w*.5;
    drawCircle(vec2(fx, y - .12), .11, hsl(55/360,.95,.78));
    drawCircle(vec2(fx, y + .12), .11, hsl(55/360,.95,.78));
    const bx = x - dir * w*.5;
    drawCircle(vec2(bx, y - .12), .08, hsl(0,.85,.55));
    drawCircle(vec2(bx, y + .12), .08, hsl(0,.85,.55));
  }

  function drawLog(l) {
    const bumpY = logBumpY(l);
    const w = l.size.x, h = l.size.y;
    const x = l.pos.x, y0 = l.pos.y;
    const y = y0 + bumpY;

    // soft water shadow stays at the water surface
    drawEllipse(vec2(x, y0 - .35), vec2(w*.95, .25), hsl(0,0,0,.30));

    // base log body (floats)
    drawRect(vec2(x, y), vec2(w, h), l.color);
    // top highlight band
    drawRect(vec2(x, y + h*.22), vec2(w*.96, h*.18), hsl(28/360,.55,.46));
    // bottom shadow band
    drawRect(vec2(x, y - h*.30), vec2(w*.96, h*.15), hsl(28/360,.5,.20));

    // end caps with concentric rings
    const ringColors = [
      hsl(28/360,.45,.22),
      hsl(28/360,.5, .32),
      hsl(28/360,.55,.42),
      hsl(28/360,.55,.55),
    ];
    for (const side of [-1, 1]) {
      const ex = x + side*(w/2 - .05);
      drawEllipse(vec2(ex, y), vec2(.35, h*.98), ringColors[0]);
      drawEllipse(vec2(ex, y), vec2(.25, h*.7),  ringColors[1]);
      drawEllipse(vec2(ex, y), vec2(.16, h*.45), ringColors[2]);
      drawEllipse(vec2(ex, y), vec2(.07, h*.20), ringColors[3]);
    }

    // bark knots/grooves (stable per log via seed)
    const knots = 3;
    for (let i=0; i<knots; i++) {
      const t = (((l.seed * 11) + i*97) % 100) / 100;
      const ox = (t - .5) * (w - .8);
      drawRect(vec2(x + ox, y + .02), vec2(.06, h*.65), hsl(28/360,.5,.22));
    }
    // a single knot
    const kt = ((l.seed * 31) % 100) / 100;
    const kox = (kt - .5) * (w - 1.0);
    drawCircle(vec2(x + kox, y + .05), .14, hsl(28/360,.6,.18));
    drawCircle(vec2(x + kox, y + .05), .07, hsl(28/360,.5,.30));
  }

  function drawFrog(basePos = frog.pos, facing = frog.facing, hopAnimT = frog.hopAnim, breathPhase = 0) {
    const hopArc = Math.sin(hopAnimT * Math.PI);  // 0..1..0
    const p = basePos.add(vec2(0, hopArc * .25));

    // Breathing — body scales ±5% around its normal size on a slow cycle.
    // Eye sizes stay constant; their positions move outward as the body grows.
    const breath = Math.sin(time * 1.8 + breathPhase) * .05;
    const bs = 1 + breath;

    const f = facing;
    const perp = vec2(-f.y, f.x);

    const green     = hsl(105/360,.75,.42);
    const greenDark = hsl(105/360,.80,.27);

    // shadow — always visible, sits on the ground below the body.
    // Anchored to basePos so it doesn't rise with the hop, grounding the frog.
    drawEllipse(basePos.add(vec2(0,-.42)), vec2(1.10, .34),
      hsl(0,0,0, .42 - hopArc*.12));

    // back legs (sticking out behind, splayed) — scale with breath
    const back = vec2(-f.x*.30*bs, -f.y*.30*bs);
    const legL = p.add(back).add(perp.scale( .22*bs));
    const legR = p.add(back).add(perp.scale(-.22*bs));
    drawCircle(legL, .26, greenDark);
    drawCircle(legR, .26, greenDark);
    drawCircle(legL, .18, green);
    drawCircle(legR, .18, green);

    // body — slight stretch in direction of motion when hopping, plus breath
    const stretch = 1 + hopArc * .15;
    const squish  = 1 - hopArc * .10;
    const horiz   = Math.abs(f.x) > 0;
    const bw = (horiz ? stretch : squish) * .8 * bs;
    const bh = (horiz ? squish  : stretch) * .8 * bs;
    drawEllipse(p, vec2(bw, bh), green);

    // two small symmetric back spots — scale outward with breath
    drawCircle(p.add(perp.scale( .18*bs)), .07, greenDark);
    drawCircle(p.add(perp.scale(-.18*bs)), .07, greenDark);

    // eyes — big cartoony bumps on the front-top of the head (~2x).
    // Size stays constant; position adjusts outward as the body breathes.
    const eyeFwd = p.add(vec2(f.x*.20*bs, f.y*.20*bs));
    const eyeL2  = eyeFwd.add(perp.scale( .24*bs));
    const eyeR2  = eyeFwd.add(perp.scale(-.24*bs));
    // green eye bumps
    drawCircle(eyeL2, .42, green);
    drawCircle(eyeR2, .42, green);
    // whites
    drawCircle(eyeL2.add(vec2(0,.04)), .30, hsl(0,0,1));
    drawCircle(eyeR2.add(vec2(0,.04)), .30, hsl(0,0,1));
    // pupils — look forward
    drawCircle(eyeL2.add(vec2(f.x*.06, f.y*.06 + .04)), .14, hsl(0,0,0));
    drawCircle(eyeR2.add(vec2(f.x*.06, f.y*.06 + .04)), .14, hsl(0,0,0));
    // shiny highlights
    drawCircle(eyeL2.add(vec2(f.x*.06 - .05, f.y*.06 + .11)), .05, hsl(0,0,1));
    drawCircle(eyeR2.add(vec2(f.x*.06 - .05, f.y*.06 + .11)), .05, hsl(0,0,1));
  }

  function gameRender() {
    drawLaneBackground();
    for (const l of logs) drawLog(l);
    for (const c of cars) drawCar(c);

    // Alive player frog — disappears on death (particles play instead) and on title.
    if (isPlaying() && !gameOver && !respawnTimer.active()) {
      const logBump = frog.onLog ? logBumpY(frog.onLog) : 0;
      drawFrog(frog.pos.add(vec2(0, logBump)), frog.facing, frog.hopAnim);
    }

    // Death particles on top of everything so they read clearly.
    for (const p of particles) {
      const t = p.life / p.maxLife;
      const alpha = Math.max(0, 1 - t);
      drawCircle(p.pos, p.size * (1 - t*.4), hsl(p.h, p.s, p.l, alpha));
    }
  }

  function gameRenderPost() {
    if (!isPlaying()) return; // title screen — menu owns the display

    // Minimal HUD: lives + level only
    drawTextScreen(`LIVES  ${Math.max(0,lives)}     LEVEL  ${level}`,
      vec2(mainCanvasSize.x/2, 30), 26,
      hsl(105/360,.55,.85), 4, hsl(0,0,0));

    // Brief on-canvas banner; the gameOver menu owns the rest.
    if (gameOver && gameOverHoldTimer > 0) {
      drawTextScreen('GAME OVER',
        vec2(mainCanvasSize.x/2, mainCanvasSize.y/2), 90,
        hsl(0, .8, .55), 8, hsl(0,0,0));
    }
  }

  // Startup
  engineInit(gameInit, gameUpdate, gameUpdatePost, gameRender, gameRenderPost);
  </script>
</body>
</html>
