<!DOCTYPE html><head>
<title>LittleJS Plinker</title>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
#littlejs-menus {
    --menu-bg:           rgba(8, 12, 28, 0.92);
    --menu-fg:           #fff;
    --menu-accent:       #ffd23f;
    --menu-border-width: 3px;
}
</style>
</head><body style="background:#000">
<script src="../dist/littlejs.js?1780012197793"></script>
<script src="../dist/box2d.wasm.js?1780012197793"></script>
<script src="../templates/menus.js?1780012197793"></script>
<script src="../templates/gameFx.js?1780012197793"></script>
<script>
'use strict';

///////////////////////////////////////////////////////////////////////////////
// Engine settings
debugWatermark = false;
showEngineVersion = false;
paused = false;

gravity = vec2(0, 0); // overridden in gameInit after box2dInit
cameraPos = vec2(0, 0);
cameraScale = 32;
canvasMaxSize = vec2(2048, 2048);

///////////////////////////////////////////////////////////////////////////////
// Board layout (world units, y is up)
const BOARD_WIDTH    = 22;
const BOARD_HEIGHT   = 30;
const PEG_ROWS       = 10;
const PEG_COLS_TOP   = 4;          // pegs in top row
const PEG_RADIUS     = 0.32;
const PEG_SPACING    = 1.9;        // distance between peg centers
const SLOT_COUNT     = 9;
const BALL_LIMIT     = 100;        // balls per run
const BALL_RADIUS    = 0.55;
const DROP_LINE_Y    = BOARD_HEIGHT/2 - 1.5;
const FLOOR_Y        = -BOARD_HEIGHT/2;
const SLOT_TOP_Y     = FLOOR_Y + 4;
const SLOT_VALUES    = [5, 10, 20, 50, 100, 50, 20, 10, 5]; // center = high
const SLOT_COLORS    = SLOT_VALUES.map(v =>
    hsl(percent(v, 5, 100) * .12 + .55, .9, .55));
const BALL_COLORS    = [
    hsl(.02, .9, .6), hsl(.10, .9, .6), hsl(.30, .9, .55),
    hsl(.55, .9, .6), hsl(.78, .9, .65), hsl(.92, .9, .6),
];

///////////////////////////////////////////////////////////////////////////////
// Game state
let score          = 0;
let dropCount      = 0;
let runOver        = false;
let aimX           = 0;
let dropCooldown   = new Timer();
let pegs           = [];          // Box2dStaticObject[]
let slots          = [];          // {x, value, flashTimer}
let balls          = [];          // PlinkoBall[]
let scorePops      = [];          // {pos, value, life, color}

///////////////////////////////////////////////////////////////////////////////
// Sounds
let sndPeg, sndDrop, sndScore, sndBig;

function initSounds()
{
    sndPeg = new SoundGenerator({
        volume: .3, frequency: 600, attack: .002, release: .07,
        shapeCurve: 1, randomness: .15, slide: -2,
    });
    sndDrop = new SoundGenerator({
        volume: .4, frequency: 220, attack: .002, release: .12,
        shapeCurve: 1.5, slide: 4,
    });
    sndScore = new SoundGenerator({
        volume: .3, frequency: 520, attack: .005, release: .22,
        shapeCurve: 1.2,
    });
    sndBig = new SoundGenerator({
        volume: .5, frequency: 520, attack: .005, release: .4,
        shapeCurve: 1.2, pitchJump: 260, pitchJumpTime: .12,
    });

}

///////////////////////////////////////////////////////////////////////////////
// Plinko ball — uses the Box2D contact callback to make peg-hit SFX & pops.
class PlinkoBall extends Box2dObject
{
    constructor(pos, color)
    {
        super(pos, vec2(BALL_RADIUS*2), undefined, 0, color);
        this.addCircle(BALL_RADIUS*2, vec2(), 1, .1, .55);
        this.body.SetLinearDamping(0.05);
        this.body.SetBullet(true); // continuous collision so fast balls
                                   // can't tunnel through pegs
        this.scored = false;
        this.lineColor = hsl(0, 0, 0, .6);
        this.lineWidth = .08;
        this.pegSoundCooldown = new Timer();
    }

    beginContact(other)
    {
        if (other && other.isPeg)
        {
            const speed = this.getLinearVelocity().length();

            // skip soft taps and per-ball-throttle so a single ball can't
            // spam the speakers when it nestles between two pegs
            if (speed > 2.5 && !this.pegSoundCooldown.active())
            {
                const pitch = clamp(.7 + speed * .03, .7, 1.6);
                const vol   = clamp(.05 + speed * .02, .15, .55);
                sndPeg.play(this.pos, vol, pitch);
                this.pegSoundCooldown.set(.05);
            }

            // brief peg flash (always — visual feedback is fine even on soft hits)
            other.flashTimer.set(.18);

            // tiny burst of sparks
            for (let i = 4; i--;)
            {
                scorePops.push({
                    pos:   this.pos.copy(),
                    value: '',
                    life:  .35,
                    maxLife: .35,
                    vel:   randVec2(rand(.05, .15)),
                    color: hsl(rand(.1, .15), 1, .8),
                    size:  .25,
                });
            }
        }
    }

    render()
    {
        // glossy ball — base color + subtle highlight
        drawCircle(this.pos, BALL_RADIUS*2, this.color, .08, hsl(0,0,0,.5));
        drawCircle(this.pos.add(vec2(-BALL_RADIUS*.35, BALL_RADIUS*.35)),
            BALL_RADIUS*.55, hsl(0, 0, 1, .35));
    }
}

///////////////////////////////////////////////////////////////////////////////
// Build the pegs, walls, slot dividers, and floor.
function buildBoard()
{
    // clear previous
    pegs.forEach(p => p.destroy());
    pegs = [];
    slots = [];

    // Outer walls (one big static body with three edges)
    const walls = new Box2dStaticObject(vec2(0, 0));
    walls.color = hsl(0, 0, .15);
    walls.lineColor = hsl(.13, .9, .55);
    walls.lineWidth = .12;
    const left  = -BOARD_WIDTH/2;
    const right =  BOARD_WIDTH/2;
    const top   =  BOARD_HEIGHT/2;
    const bot   =  FLOOR_Y;
    walls.addEdge(vec2(left,  top), vec2(left,  bot), 0, .2, .3);
    walls.addEdge(vec2(right, top), vec2(right, bot), 0, .2, .3);
    walls.addEdge(vec2(left,  bot), vec2(right, bot), 0, .2, .3);
    pegs.push(walls);

    // Pegs in a triangular grid (each row +1 peg, alternating offset)
    for (let row = 0; row < PEG_ROWS; row++)
    {
        const y = DROP_LINE_Y - 2.5 - row * PEG_SPACING * .9;
        if (y < SLOT_TOP_Y + 1.2) break; // leave room above slots
        const colsInRow = PEG_COLS_TOP + row;
        const totalW = (colsInRow - 1) * PEG_SPACING;
        const startX = -totalW / 2;
        for (let c = 0; c < colsInRow; c++)
        {
            const x = startX + c * PEG_SPACING;
            if (x < left + .8 || x > right - .8) continue;
            const peg = new Box2dStaticObject(vec2(x, y));
            peg.color = hsl(.13, .9, .8);
            peg.lineColor = hsl(.13, .8, .4);
            peg.lineWidth = .08;
            peg.addCircle(PEG_RADIUS*2, vec2(), 0, .05, .65);
            peg.isPeg = true;
            peg.flashTimer = new Timer();
            pegs.push(peg);
        }
    }

    // Slot dividers (vertical walls between slots)
    const slotWidth = BOARD_WIDTH / SLOT_COUNT;
    for (let i = 0; i <= SLOT_COUNT; i++)
    {
        const x = left + i * slotWidth;
        const divider = new Box2dStaticObject(vec2(x, SLOT_TOP_Y - 1.5));
        divider.color = hsl(.6, .3, .3);
        divider.lineColor = hsl(.6, .4, .15);
        divider.addBox(vec2(.25, 3));
        pegs.push(divider);
    }

    // Slot scoring zones (logical only — the floor catches the ball)
    for (let i = 0; i < SLOT_COUNT; i++)
    {
        const x = left + slotWidth * (i + .5);
        slots.push({
            x:          x,
            width:      slotWidth - .3,
            value:      SLOT_VALUES[i],
            color:      SLOT_COLORS[i],
            flashTimer: new Timer(),
        });
    }
}

///////////////////////////////////////////////////////////////////////////////
// Drop a ball at the current aim position.
function dropBall()
{
    if (dropCooldown.active()) return;
    if (dropCount >= BALL_LIMIT) return; // out of balls
    dropCooldown.set(.12);

    const x = clamp(aimX, -BOARD_WIDTH/2 + 1, BOARD_WIDTH/2 - 1);
    const ball = new PlinkoBall(
        vec2(x, DROP_LINE_Y),
        BALL_COLORS[dropCount % BALL_COLORS.length]);
    // tiny random nudge so identical drops don't always go the same place
    ball.body.SetLinearVelocity(box2d.vec2dTo(vec2(rand(-.5, .5), 0)));
    balls.push(ball);
    dropCount++;
    sndDrop.play(vec2(x, DROP_LINE_Y), .6, 1 + rand(-.05, .05));
}

///////////////////////////////////////////////////////////////////////////////
// Check each ball — when it falls past the slot tops, score it & remove it.
function checkScoring()
{
    for (let i = balls.length; i--;)
    {
        const b = balls[i];
        if (b.destroyed) { balls.splice(i, 1); continue; }

        // ball reached the bottom — score it ONCE, find which slot it landed in
        if (!b.scored && b.pos.y < SLOT_TOP_Y - 1.5)
        {
            const slotWidth = BOARD_WIDTH / SLOT_COUNT;
            const idx = clamp(
                Math.floor((b.pos.x + BOARD_WIDTH/2) / slotWidth),
                0, SLOT_COUNT - 1);
            const slot = slots[idx];
            score += slot.value;
            slot.flashTimer.set(.6);
            b.scored = true;
            b.scoreColor = slot.color;

            // popup text
            scorePops.push({
                pos:     vec2(slot.x, SLOT_TOP_Y - 1),
                value:   '+' + slot.value,
                life:    1.2,
                maxLife: 1.2,
                vel:     vec2(0, .04),
                color:   slot.color,
                size:    1.5,
            });

            // sound — bigger sound for jackpot slots, gentler pitch curve
            if (slot.value >= 100)
                sndBig.play(b.pos, .7, 1);
            else
                sndScore.play(b.pos, .55, .85 + (slot.value/100) * .5);

            // flagged to explode — pops within the next second
            b.cleanupTimer = new Timer(rand(.4, .9));
        }

        // fuse burned out — explode, shove nearby balls, and remove it
        if (b.cleanupTimer && b.cleanupTimer.elapsed())
        {
            spawnExplosion(b.pos, b.scoreColor || hsl(.13, .9, .6));
            pushNearbyBalls(b.pos, b);
            if (!b.destroyed) b.destroy();
            balls.splice(i, 1);
        }
        else if (b.pos.y < FLOOR_Y - 5)
        {
            // safety net — somehow escaped
            if (!b.destroyed) b.destroy();
            balls.splice(i, 1);
        }
    }

    // run ends once every ball is used and the board has cleared
    if (dropCount >= BALL_LIMIT && balls.length === 0 && !runOver && isPlaying())
    {
        runOver = true;
        showGameOverDialog({ score, onContinue: endRunToTitle });
    }

    // best score persistence
    submitBestScore(score);
}

///////////////////////////////////////////////////////////////////////////////
// Burst of sparks + an expanding ring when a scored ball pops.
function spawnExplosion(pos, color)
{
    sndScore.play(pos, .35, 1.4);
    scorePops.push({
        pos: pos.copy(), value: '', ring: true,
        life: .4, maxLife: .4, vel: vec2(), color, size: 4,
    });
    for (let i = 14; i--;)
    {
        const l = rand(.3, .6);
        scorePops.push({
            pos:   pos.copy(),
            value: '',
            life:  l,
            maxLife: l,
            vel:   randVec2(rand(.1, .35)),
            color: color.copy(),
            size:  rand(.2, .45),
        });
    }
}

///////////////////////////////////////////////////////////////////////////////
// Give nearby balls a tiny outward shove when one explodes.
function pushNearbyBalls(pos, exploder)
{
    const R = 3.5; // push radius in world units
    for (const o of balls)
    {
        if (o === exploder || o.destroyed) continue;
        const d = o.pos.subtract(pos);
        const dist = d.length();
        if (dist > R || dist < .01) continue;
        const strength = (1 - dist / R) * 5; // wu/sec, gentle nudge
        o.setLinearVelocity(o.getLinearVelocity().add(d.normalize(strength)));
    }
}

///////////////////////////////////////////////////////////////////////////////
// Tear down the current run and return to the title.
function endRunToTitle()
{
    clearSubmenuStack();
    hideAllMenus();
    setPlaying(false);
    resetGame();
    showMenu('title');
}

///////////////////////////////////////////////////////////////////////////////
// Score popups — animated drifting text above the slots.
function updatePops()
{
    for (let i = scorePops.length; i--;)
    {
        const p = scorePops[i];
        p.life -= 1/60;
        p.pos = p.pos.add(p.vel);
        if (p.life <= 0) scorePops.splice(i, 1);
    }
}

function drawPops()
{
    scorePops.forEach(p =>
    {
        const a = clamp(p.life / p.maxLife, 0, 1);
        if (p.ring)
        {
            const t = 1 - a;                 // expand as it fades
            const c = p.color.copy(); c.a = a;
            drawCircle(p.pos, p.size * (.3 + t), hsl(0, 0, 0, 0), .2, c);
        }
        else if (p.value)
        {
            const c = p.color.copy(); c.a = a;
            const oc = hsl(0,0,0,a);
            drawText(p.value, p.pos, p.size, c, .15, oc);
        }
        else
        {
            const c = p.color.copy(); c.a = a;
            drawCircle(p.pos, p.size * a, c);
        }
    });
}

///////////////////////////////////////////////////////////////////////////////
// Reset the run.
function resetGame()
{
    balls.forEach(b => { if (!b.destroyed) b.destroy(); });
    balls = [];
    scorePops = [];
    score = 0;
    dropCount = 0;
    runOver = false;
}

///////////////////////////////////////////////////////////////////////////////


///////////////////////////////////////////////////////////////////////////////
async function gameInit()
{
    saveDataInit('plinko');
    // Box2D first — every body needs the world to exist.
    await box2dInit();

    canvasClearColor = new Color().setHex('#0a0e1a');
    gravity = vec2(0, -50);

    setSoundVolume(.7);
    installAutoPause();

    initSounds();

    buildBoard();

    // ---------- Title ----------
    const playFromTitle = () =>
    {
        resetGame();
        setPlaying(true);
        hideMenu('title');
    };
    createTitleMenu({
        title: 'PLINKER',
        subtitle: 'Drop. Bounce. Score.',
        onPlay: playFromTitle,
        revealOnClick: false,
        canReveal: () => !isPlaying(),
        showBest: true,
        items: [
            {type:'button', label:'OPTIONS', onClick: () => pushMenu('options')},
            {type:'button', label:'HOW TO PLAY', onClick: () => pushMenu('about')},
        ],
    });

    // ---------- Options ----------
    createOptionsMenu({
        persistKey: 'volume',
        showResetBest: true,
        resetBestMessage: 'Erase your best score?',
    });

    // ---------- About ----------
    createMenu({
        id: 'about',
        title: 'HOW TO PLAY',
        onHide: popMenu,
        items: [
            {type:'text', text:
                'Move the aimer with the MOUSE or LEFT/RIGHT (A/D) keys.\n\n' +
                'CLICK or press SPACE to drop a ball — you get 100 per run.\n\n' +
                'Center slot scores 100, edges score 5. Stack up the score.\n\n' +
                'ESC or START to pause.'},
            {type:'separator'},
            {type:'button', label:'BACK', onClick: () => hideMenu('about')},
        ],
    });

    // ---------- Pause ----------
    createPauseMenu({
        onQuit: () =>
        {
            clearSubmenuStack();
            hideAllMenus();
            setPlaying(false);
            resetGame();
            showMenu('title');
        },
        quitMessage: 'Quit to title? Your run will end.',
        onShow: () =>
        {
            const m = getMenu('pause');
            m?.getItem('pauseScore')?.setLabel(`Score: ${score|0}`);
        },
        extraItems: [
            {type:'label',     id:'pauseScore', text:'Score: 0'},
            {type:'separator'},
            {type:'button',    id:'options',    label:'OPTIONS', onClick: () => pushMenu('options')},
        ],
    });

    // ---------- HUD toolbar ----------
    installDefaultToolbar();

    setPlaying(false);
    showMenu('title');
}

///////////////////////////////////////////////////////////////////////////////
function gameUpdate()
{
    // Pause on Esc / Start
    if (bindPauseKey({when: () => isPlaying()})) return;

    if (!isPlaying()) return;

    // Aim follows the mouse X by default; arrow / A-D keys override and
    // nudge it (last input wins).
    const dir = keyDirection();
    if (dir.x)
        aimX += dir.x * .35;
    else
        aimX = mousePos.x;
    aimX = clamp(aimX, -BOARD_WIDTH/2 + 1, BOARD_WIDTH/2 - 1);

    if (mouseWasPressed(0) || keyWasPressed('Space') || gamepadWasPressed(0))
        dropBall();

    checkScoring();
    updatePops();
}

///////////////////////////////////////////////////////////////////////////////
function gameUpdatePost() {}

///////////////////////////////////////////////////////////////////////////////
function gameRender()
{
    // Background gradient panel behind the board.
    drawRectGradient(vec2(0, 0), vec2(BOARD_WIDTH, BOARD_HEIGHT),
        hsl(.62, .5, .15), hsl(.7, .6, .05));

    if (!isPlaying()) return;

    // Slot floor — colored bands matching SLOT_COLORS, with flashing pulse.
    const slotWidth = BOARD_WIDTH / SLOT_COUNT;
    slots.forEach(s =>
    {
        const t = s.flashTimer.active() ? s.flashTimer.getPercent() : 0;
        const flash = 1 - t;
        const c = s.color.copy();
        c.a = .65 + flash * .35;
        drawRect(vec2(s.x, SLOT_TOP_Y - 2.5), vec2(s.width, 2.5), c);
        // value text inside the slot
        drawText(String(s.value),
            vec2(s.x, SLOT_TOP_Y - 1.7),
            1.1 + flash * .4,
            hsl(0, 0, 1), .15, hsl(0, 0, 0));
    });

    // Aim guide — dotted line + ball preview at top of the board.
    const aimClamped = clamp(aimX, -BOARD_WIDTH/2 + 1, BOARD_WIDTH/2 - 1);
    const a = .35 + .2 * Math.sin(time * 4);
    drawLine(vec2(aimClamped, DROP_LINE_Y - 1),
             vec2(aimClamped, DROP_LINE_Y - 3),
             .12, hsl(.13, .9, .7, a));
    drawCircle(vec2(aimClamped, DROP_LINE_Y),
        BALL_RADIUS*2, hsl(.13, .9, .7, .4), .08, hsl(.13, .9, .7));
}

///////////////////////////////////////////////////////////////////////////////
function gameRenderPost()
{
    // Peg flash — fade overlay highlight on hit pegs (drawn over body).
    pegs.forEach(p =>
    {
        if (p.isPeg && p.flashTimer.active())
        {
            const t = 1 - p.flashTimer.getPercent();
            drawCircle(p.pos, PEG_RADIUS*2 + t*.5,
                hsl(.13, 1, .8, t * .7));
        }
    });

    // Score popups & particle pops.
    drawPops();

    if (isPlaying())
    {
        // Score HUD
        drawTextScreen('SCORE  ' + score,
            vec2(mainCanvasSize.x/2, 50), 50,
            hsl(.13, 1, .7), 5, hsl(0, 0, 0));
        drawTextScreen('BEST  ' + getBestScore(),
            vec2(mainCanvasSize.x/2, 95), 24,
            hsl(0, 0, .85), 3, hsl(0, 0, 0));
        drawTextScreen('BALLS  ' + (BALL_LIMIT - dropCount),
            vec2(mainCanvasSize.x/2, 125), 20,
            hsl(0, 0, .7), 2, hsl(0, 0, 0));
    }
    else if (!isMenuVisible())
    {
        // Pre-play prompt — pulses to invite a click.
        const prompt = isTouchDevice ? 'TOUCH TO PLAY' : 'CLICK TO PLAY';
        const aPulse = 0.5 + 0.5 * Math.sin(time * 3);
        drawTextScreen(prompt,
            vec2(mainCanvasSize.x/2, mainCanvasSize.y/2),
            48, hsl(0, 0, 1, aPulse), 6, hsl(0, 0, 0, aPulse));
    }
}

///////////////////////////////////////////////////////////////////////////////
engineInit(gameInit, gameUpdate, gameUpdatePost, gameRender, gameRenderPost);
</script></body></html>
