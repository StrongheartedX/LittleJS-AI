<script>
'use strict';

// engine settings
debugWatermark = false;
showEngineVersion = false;
paused = false;
canvasMaxSize = vec2(2048, 2048);

// world settings
gravity = vec2(0, -42);
cameraPos = vec2(0, 1);
cameraScale = 44;

//------------------------------------------------------------------------------
// constants

const SPAWN_POS    = vec2(-8.5, -5.05);    // ball rests on the floor (FLOOR_Y + BALL_RADIUS)
const DRAG_CENTER  = vec2(-8.5, -3);       // drag radius / gradient center, suspended above the floor
const HOOP_BASE_X  = 7.5;
const HOOP_Y       = 2.5;
const RIM_HALF_W   = 0.85;        // distance from rim center to each peg center
const RIM_PEG_R    = 0.13;
const BOARD_OFFSET = vec2(1.05, 0.65); // backboard offset from rim center (right & up)
const BOARD_SIZE   = vec2(0.3, 1.6);
const FLOOR_Y      = -5.6;
const LEVEL_LEFT   = -11;
const LEVEL_RIGHT  = 11;
const LEVEL_TOP    = 8;

const BALL_RADIUS       = 0.55;
const GRAB_RADIUS       = BALL_RADIUS * 1.4;   // forgiving click radius around the ball
const MAX_DRAG          = BALL_RADIUS * 10;    // drag beyond this auto-launches
const VEL_WINDOW        = 0.08;                // seconds of mouse history used for release velocity
const MAX_LAUNCH_SPEED  = 40;                  // cap on flick velocity, world units per second

const TIME_LIMIT       = 60;
const RACK_TRANSIT     = 0.35;    // seconds for next ball to fly in onto the pedestal
const RACK_START_POS   = vec2(-14, -4.5);  // off-screen-left feed position
const SCORE_BASE       = 2;
const SCORE_SWISH      = 3;   // bonus for a clean shot (no rim/board touch)
const STREAK_FOR_FIRE  = 3;

const COLOR_BG       = new Color().setHex('#101a30');
const COLOR_FLOOR    = hsl(.08, .55, .32);
const COLOR_LINE     = hsl(0, 0, .9, .8);
const COLOR_BOARD    = hsl(0, 0, .95);
const COLOR_BOARD_T  = hsl(.02, .9, .55);   // backboard target square
const COLOR_RIM      = hsl(.02, .9, .55);
const COLOR_NET      = hsl(0, 0, .85, .65);
const COLOR_BALL     = hsl(.07, .85, .55);
const COLOR_BALL_DK  = hsl(.06, .8, .22);
const COLOR_RETICLE  = hsl(.15, .9, .65, .85);

//------------------------------------------------------------------------------
// sounds

const sThrow   = new SoundGenerator({frequency: 240, slide: -2,   release: .12, volume: .55, randomness: .12});
const sSwish   = new SoundGenerator({frequency: 880, pitchJump: 1400, pitchJumpTime: .04, release: .28, volume: .7});
const sScore   = new SoundGenerator({frequency: 620, pitchJump: 900,  pitchJumpTime: .04, release: .22, volume: .6});
const sClank   = new SoundGenerator({frequency: 180, slide: -3,   release: .09, volume: .45, randomness: .2, noise: .3});
const sBuzzer  = new SoundGenerator({frequency: 130, release: .9,  volume: .7, noise: .15, shapeCurve: .4});
const sFire    = new SoundGenerator({frequency: 300, pitchJump: 1600, pitchJumpTime: .15, release: .4, volume: .6});

//------------------------------------------------------------------------------
// state

// 'buzzer' is a grace period after time runs out — the clock reads 0:00 but
// any ball already in the air still gets to land (and possibly score). The
// game ends once that ball is at rest.
let gamePhase    = 'title';   // 'title' | 'playing' | 'buzzer' | 'gameover'
let score        = 0;
let timeLeft     = TIME_LIMIT;
let streak       = 0;
let onFire       = false;
let balls        = [];
let dragging     = false;
let dragPos      = SPAWN_POS.copy();
let grabOffset   = vec2();  // ball-center minus mouse at grab time, so the click point stays under the cursor
let mouseTrail   = [];     // [{pos, t}, ...] for computing release velocity
let rackAnim     = null;   // {t} while a ball is animating onto the pedestal; null = ball is resting on pedestal
let hoopOffsetX  = 0;
// Standalone accumulator for the hoop's sin-wave phase. Mirrors elapsed game
// time during 'playing', then keeps advancing during 'buzzer' so the hoop
// doesn't freeze mid-sweep while a buzzer-beater is in the air.
let hoopElapsed  = 0;

//------------------------------------------------------------------------------
// hoop / scoring geometry

function getHoopCenter() { return vec2(HOOP_BASE_X + hoopOffsetX, HOOP_Y); }
function getLeftPeg()    { const h = getHoopCenter(); return vec2(h.x - RIM_HALF_W, h.y); }
function getRightPeg()   { const h = getHoopCenter(); return vec2(h.x + RIM_HALF_W, h.y); }
function getBoardPos()   { const h = getHoopCenter(); return vec2(h.x + BOARD_OFFSET.x, h.y + BOARD_OFFSET.y); }

//------------------------------------------------------------------------------
// Drag-to-throw launch: the player grabs the ball, drags it with the mouse,
// and on release the ball flies with whatever velocity the mouse had over the
// last VEL_WINDOW seconds. Drag beyond MAX_DRAG and it auto-launches.

function launchBall(pos, vel)
{
    balls.push(new Ball(pos, vel));
    sThrow.play();
}

// Velocity computed across the recorded mouse trail — averages out jitter
// while still capturing a sharp flick at release. Capped at MAX_LAUNCH_SPEED
// so frantic flicks don't fly off-screen.
function getMouseVelocity()
{
    if (mouseTrail.length < 2) return vec2();
    const a = mouseTrail[0], b = mouseTrail[mouseTrail.length - 1];
    const dt = b.t - a.t;
    if (dt < .001) return vec2();
    const v = b.pos.subtract(a.pos).scale(1/dt);
    const speed = v.length();
    return speed > MAX_LAUNCH_SPEED ? v.scale(MAX_LAUNCH_SPEED / speed) : v;
}

// Compute where the rack ball should be drawn (animating in from off-screen,
// or resting on the pedestal once the animation finishes).
function getRackBallPose()
{
    if (!rackAnim) return { pos: SPAWN_POS, rot: 0 };
    const u = clamp(rackAnim.t / RACK_TRANSIT, 0, 1);
    const e = 1 - (1 - u) * (1 - u);                // ease-out
    const flat = RACK_START_POS.lerp(SPAWN_POS, e);
    const arc  = Math.sin(e * Math.PI) * 1.4;       // up-and-over bump
    const dist = SPAWN_POS.x - RACK_START_POS.x;
    return { pos: vec2(flat.x, flat.y + arc), rot: -e * dist * 1.1 };
}

//------------------------------------------------------------------------------
// ball

class Ball
{
    constructor(pos, vel)
    {
        this.pos  = pos.copy();
        this.vel  = vel.copy();
        this.rot  = 0;
        this.spin = -vel.x * .35;
        this.touchedRimOrBoard = false;
        this.scored = false;
        // Per-ball floor: drops one notch on every bounce so the ball sinks
        // through the ground over successive bounces instead of resting.
        this.floorY = FLOOR_Y;
        this.dead = false;
    }

    update()
    {
        const prevY = this.pos.y;

        // integrate
        this.vel = this.vel.add(gravity.scale(timeDelta));
        this.pos = this.pos.add(this.vel.scale(timeDelta));
        this.rot += this.spin * timeDelta;

        // floor — bounce against the per-ball floorY, then sink it for next time
        if (this.pos.y - BALL_RADIUS < this.floorY)
        {
            this.pos.y = this.floorY + BALL_RADIUS;
            this.vel.y = -this.vel.y * .55;
            this.vel.x *= .82;
            this.spin = -this.vel.x * .35;
            if (abs(this.vel.y) < 1) this.vel.y = 0;
            this.floorY -= 1;
        }

        // side walls
        if (this.pos.x - BALL_RADIUS < LEVEL_LEFT)
        {
            this.pos.x = LEVEL_LEFT + BALL_RADIUS;
            this.vel.x = -this.vel.x * .6;
        }
        if (this.pos.x + BALL_RADIUS > LEVEL_RIGHT)
        {
            this.pos.x = LEVEL_RIGHT - BALL_RADIUS;
            this.vel.x = -this.vel.x * .6;
        }

        // backboard (front face = left side)
        const board = getBoardPos();
        if (isOverlapping(this.pos, vec2(BALL_RADIUS*2), board, BOARD_SIZE))
        {
            const boardLeftX = board.x - BOARD_SIZE.x/2;
            // resolve only if the ball came from the front (left of board)
            if (this.vel.x > 0 && this.pos.x < board.x)
            {
                this.pos.x = boardLeftX - BALL_RADIUS;
                this.vel.x = -this.vel.x * .5;
                this.touchedRimOrBoard = true;
                sClank.play();
            }
            else
            {
                // squeeze out top/bottom if ball clipped a corner
                const above = this.pos.y > board.y;
                this.pos.y = board.y + (above ? 1 : -1) * (BOARD_SIZE.y/2 + BALL_RADIUS);
                this.vel.y = -this.vel.y * .4;
            }
        }

        // rim pegs (circle bumpers) — split velocity into normal/tangent so
        // tangential motion isn't over-damped; without this the ball can rest
        // on top of a peg instead of bouncing off.
        for (const peg of [getLeftPeg(), getRightPeg()])
        {
            const delta = this.pos.subtract(peg);
            const dist = delta.length();
            const sumR = BALL_RADIUS + RIM_PEG_R;
            if (dist < sumR && dist > 0.0001)
            {
                const n = delta.scale(1/dist);
                this.pos = peg.add(n.scale(sumR + .002));
                const vn = this.vel.dot(n);
                if (vn < 0)
                {
                    const tangent = vec2(-n.y, n.x);
                    const vt = this.vel.dot(tangent);
                    const restitution = 0.72;
                    const friction    = 0.94;
                    this.vel = n.scale(-vn * restitution).add(tangent.scale(vt * friction));
                    this.touchedRimOrBoard = true;
                    sClank.play();
                }
            }
        }

        // score sensor: ball crossed downward through sensorY between the pegs
        if (!this.scored && this.vel.y < 0)
        {
            const h = getHoopCenter();
            const sensorY = h.y - 0.2;
            const inX = abs(this.pos.x - h.x) < (RIM_HALF_W - RIM_PEG_R - 0.05);
            const crossedDown = prevY > sensorY && this.pos.y <= sensorY;
            if (crossedDown && inX)
            {
                this.scored = true;
                onBallScored(this);
            }
        }

        // cleanup: only when the ball has sunk past the bottom of the screen
        // (or left the level horizontally). The sinking-floor handles the
        // "come to rest" case by dragging the ball down through the world.
        const screenBottom = cameraPos.y - mainCanvasSize.y / cameraScale / 2;
        if (this.pos.y + BALL_RADIUS < screenBottom || this.pos.x < LEVEL_LEFT - 4 || this.pos.x > LEVEL_RIGHT + 4)
            this.dead = true;
    }

    render() { drawBasketball(this.pos, this.rot); }
}

//------------------------------------------------------------------------------
// scoring

function onBallScored(ball)
{
    const swish = !ball.touchedRimOrBoard;
    let points = swish ? SCORE_SWISH : SCORE_BASE;
    if (onFire) points += 1;
    score += points;

    streak++;
    if (!onFire && streak >= STREAK_FOR_FIRE)
    {
        onFire = true;
        sFire.play();
        showMenuToast({icon:'🔥', title:'ON FIRE', text:'+1 per shot until you miss', duration: 2, position:'top-left'});
    }

    if (swish) sSwish.play();
    else sScore.play();
}

function registerMissIfNoMakeWithin(ball)
{
    // called when a ball dies without scoring -> resets streak
    if (!ball.scored && gamePhase === 'playing')
    {
        if (streak > 0 || onFire)
        {
            streak = 0;
            onFire = false;
        }
    }
}

//------------------------------------------------------------------------------
// game flow

function quitToTitleWithCleanup()
{
    quitToTitle(() => { gamePhase = 'title'; balls.length = 0; });
}

function startGame()
{
    gamePhase = 'playing';
    score = 0;
    timeLeft = TIME_LIMIT;
    streak = 0;
    onFire = false;
    balls.length = 0;
    dragging = false;
    dragPos = SPAWN_POS.copy();
    mouseTrail = [];
    rackAnim = null;
    hoopOffsetX = 0;
}

function endGame()
{
    gamePhase = 'gameover';
    dragging = false;
    submitBestScore(score);
    // surface game-over menu (refresh its labels first)
    const m = getMenu('gameover');
    m.getItem('finalScore').setLabel(`SCORE: ${score}`);
    m.getItem('bestScore').setLabel(`BEST:  ${getBestScore()}`);
    showMenu('gameover');
}

//------------------------------------------------------------------------------
// hoop motion

function updateHoopMotion()
{
    // Keep the hoop animating during 'buzzer' too — otherwise a ball already
    // in flight aimed at the moving hoop would suddenly target empty air.
    if (gamePhase !== 'playing' && gamePhase !== 'buzzer')
    {
        hoopOffsetX = 0;
        hoopElapsed = 0;
        return;
    }
    // Mirror elapsed game time while playing; once the clock hits zero, keep
    // the phase advancing on its own so the sin wave keeps sweeping at the
    // max-tempo settings instead of locking at one position.
    if (gamePhase === 'playing') hoopElapsed = TIME_LIMIT - timeLeft;
    else hoopElapsed += timeDelta;
    // Continuous ramp: slow gentle drift at the start, fast wide sweeps by the end.
    const t = clamp(hoopElapsed / TIME_LIMIT, 0, 1);
    const amp  = 1.2 + t * 1.8;   // 1.2 → 3.0
    const freq = 0.7 + t * 1.2;   // 0.7 → 1.9
    hoopOffsetX = Math.sin(hoopElapsed * freq) * amp;
}

//------------------------------------------------------------------------------
// init

async function gameInit()
{
    saveDataInit('basketball');
    canvasClearColor = COLOR_BG;
    setSoundVolume(.7);
    // Title has its own attract-mode behind the menu — leave it animating.
    installAutoPause(() => gamePhase === 'playing');

    const sound_select   = new Sound([.4,,720,,,.02,2,.07,-5,-33,,,,,,,,.25]);
    const sound_activate = new Sound([.6,,90,.01,,.05,1,2.5,40,,,,,,,,,.5]);
    setMenuSounds({
        select:   () => sound_select.play(),
        activate: () => sound_activate.play(),
    });

    // ----- title menu -----
    createTitleMenu({
        id: 'title',
        title: 'FREE THROW',
        subtitle: '60 seconds. Make it count.',
        playLabel: 'PLAY',
        revealOnClick: false,
        canReveal: () => gamePhase !== 'playing',
        showBest: true,
        onPlay: () => startGame(),
        items: [
            {type:'button', label:'OPTIONS', onClick: () => pushMenu('options')},
            {type:'button', label:'ABOUT',   onClick: () => pushMenu('about')},
        ],
    });

    // ----- options menu -----
    createOptionsMenu({
        persistKey: 'volume',
        showResetBest: true,
    });

    // ----- about -----
    createMenu({
        id: 'about',
        title: 'HOW TO PLAY',
        onHide: popMenu,
        items: [
            {type:'text', text:'Click the ball and DRAG it like a slingshot. Release to throw — '+
                'the ball flies with the velocity you flicked. Drag too far and it auto-launches.\n\n'+
                'Make = 2 pts. Swish (no rim, no board) = 3 pts. 3 in a row lights you up — +1 per shot until you miss.\n\n'+
                'The hoop never stops moving — it just gets faster as the clock runs down.'},
            {type:'separator'},
            {type:'button', label:'BACK', onClick: () => hideMenu('about')},
        ],
    });

    // ----- pause menu -----
    createPauseMenu({
        onQuit: quitToTitleWithCleanup,
        quitLabel: 'QUIT',
        extraItems: [
            {type:'button', label:'OPTIONS', onClick: () => pushMenu('options')},
        ],
    });

    // ----- game-over menu -----
    createMenu({
        id: 'gameover',
        title: 'TIME!',
        dismissable: false,
        items: [
            {type:'label',  id:'finalScore', text:'SCORE: 0'},
            {type:'label',  id:'bestScore',  text:'BEST:  0'},
            {type:'separator'},
            {type:'button', label:'PLAY AGAIN', onClick: () =>
            {
                hideMenu('gameover');
                startGame();
            }},
            {type:'button', label:'TITLE', onClick: () =>
            {
                hideMenu('gameover');
                gamePhase = 'title';
                balls.length = 0;
                showMenu('title');
            }},
        ],
    });

    // ----- HUD toolbar -----
    installDefaultToolbar();

    showMenu('title');
}

//------------------------------------------------------------------------------
// update

function gameUpdate()
{
    updateHoopMotion();

    // tick balls (always — so the title screen demo / leftovers still settle)
    for (const b of balls) b.update();
    for (const b of balls) if (b.dead) registerMissIfNoMakeWithin(b);
    balls = balls.filter(b => !b.dead);

    if (gamePhase === 'buzzer')
    {
        // Time's up — wait for any in-flight ball to finish its arc, then end.
        if (balls.length === 0) endGame();
        return;
    }

    if (gamePhase === 'playing')
    {
        // pause hotkey
        if (bindPauseKey({when: () => gamePhase === 'playing'})) return;

        // timer
        timeLeft = max(0, timeLeft - timeDelta);
        if (timeLeft <= 0)
        {
            sBuzzer.play();
            dragging = false;
            rackAnim = null;
            // If a shot is still in the air, give it a chance to land
            // (buzzer-beater rule). Otherwise end immediately.
            if (balls.length > 0) { gamePhase = 'buzzer'; return; }
            endGame();
            return;
        }

        // tick the rack-in animation
        if (rackAnim)
        {
            rackAnim.t += timeDelta;
            if (rackAnim.t >= RACK_TRANSIT) rackAnim = null;
        }

        // record mouse trail (for release velocity)
        mouseTrail.push({pos: mousePos.copy(), t: time});
        while (mouseTrail.length > 0 && time - mouseTrail[0].t > VEL_WINDOW) mouseTrail.shift();

        // grab / drag / release
        if (!dragging && mouseWasPressed(0))
        {
            const ballNow = rackAnim ? getRackBallPose().pos : SPAWN_POS;
            if (mousePos.distance(ballNow) < GRAB_RADIUS)
            {
                dragging = true;
                rackAnim = null;
                grabOffset = ballNow.subtract(mousePos);   // keep grab point under the cursor
                dragPos = ballNow.copy();
                mouseTrail = [{pos: mousePos.copy(), t: time}];
            }
        }
        if (dragging)
        {
            dragPos = mousePos.add(grabOffset);
            const offset = dragPos.subtract(DRAG_CENTER);
            const dist = offset.length();

            if (dist > MAX_DRAG)
            {
                // ripped past the limit — auto-launch from the ring with current flick velocity
                const launchPos = DRAG_CENTER.add(offset.normalize(MAX_DRAG));
                launchBall(launchPos, getMouseVelocity());
                dragging = false;
                rackAnim = { t: 0 };
            }
            else if (mouseWasReleased(0))
            {
                // any release counts as a launch — even a zero-velocity drop
                launchBall(dragPos, getMouseVelocity());
                dragging = false;
                rackAnim = { t: 0 };
            }
        }
    }
    else
    {
        dragging = false;
        rackAnim = null;
    }
}

function gameUpdatePost() {}

//------------------------------------------------------------------------------
// render

function drawCourt()
{
    // wood floor
    drawRect(vec2(0, FLOOR_Y - 1.5), vec2(LEVEL_RIGHT*2 + 4, 3), COLOR_FLOOR);
    // top edge of the floor (subtle highlight where it meets the back wall)
    drawLine(vec2(LEVEL_LEFT - 2, FLOOR_Y), vec2(LEVEL_RIGHT + 2, FLOOR_Y), .08, hsl(.08, .55, .42));
    // free-throw stripe under spawn
    drawLine(vec2(SPAWN_POS.x - 1.5, FLOOR_Y + .04), vec2(SPAWN_POS.x + 1.5, FLOOR_Y + .04), .14, COLOR_LINE);
}

// Vertical dashed red line rising from the floor at the drag center, length =
// MAX_DRAG. Lets the player gauge the radius distance against the ground.
function drawDragRadiusGuide()
{
    const x = DRAG_CENTER.x + MAX_DRAG;
    const yBase = FLOOR_Y - 4;
    const yTop  = FLOOR_Y + .02;
    const dashLen = .3, gapLen = .4, step = dashLen + gapLen;
    const color = WHITE;
    for (let y = yTop; y>yBase; y -= step)
        drawLine(vec2(x, y), vec2(x, max(y - dashLen, yBase)), .3, color);
}

function drawHoopAssembly()
{
    const h = getHoopCenter();
    const board = getBoardPos();

    // pole holding the board up (behind the board)
    drawRect(vec2(board.x + BOARD_SIZE.x/2 + 0.12, (board.y + LEVEL_TOP) / 2),
             vec2(0.2, LEVEL_TOP - board.y), hsl(0, 0, .22));

    // backboard slab (side view)
    drawRect(board, BOARD_SIZE, COLOR_BOARD);
    // red trim band along the front face (visual hint of the target)
    drawRect(vec2(board.x - BOARD_SIZE.x/2 + 0.03, board.y), vec2(0.06, BOARD_SIZE.y - 0.1), COLOR_BOARD_T);

    // rim (drawn as a thin bar with two peg-end caps)
    const leftPeg  = getLeftPeg();
    const rightPeg = getRightPeg();
    drawRect(vec2(h.x, h.y), vec2(RIM_HALF_W * 2, .1), COLOR_RIM);
    drawCircle(leftPeg,  RIM_PEG_R * 2, COLOR_RIM, .03, hsl(.02, .9, .25));
    drawCircle(rightPeg, RIM_PEG_R * 2, COLOR_RIM, .03, hsl(.02, .9, .25));

    // net (4 vertical strands tapering inward)
    const netTop = h.y - .04;
    const netH   = 0.85;
    const strands = 5;
    for (let i = 0; i < strands; i++)
    {
        const f = i / (strands - 1);
        const xTop = h.x - RIM_HALF_W + f * RIM_HALF_W * 2;
        const xBot = h.x - (RIM_HALF_W - 0.25) + f * (RIM_HALF_W - 0.25) * 2;
        drawLine(vec2(xTop, netTop), vec2(xBot, netTop - netH), .04, COLOR_NET);
    }
    // net horizontal rings
    for (let r = 1; r <= 2; r++)
    {
        const t = r / 3;
        const y = netTop - netH * t;
        const w = RIM_HALF_W * 2 * (1 - 0.3 * t);
        drawLine(vec2(h.x - w/2, y), vec2(h.x + w/2, y), .03, COLOR_NET);
    }
}

// Draws a basketball: orange body, dark seam pattern (one diameter + one
// perpendicular + two side curves, all rotating with `rot`), and a soft
// highlight in the upper-left for shape.
function drawBasketball(pos, rot)
{
    const r  = BALL_RADIUS;
    const cs = Math.cos(rot), sn = Math.sin(rot);

    // body
    drawCircle(pos, r * 2, COLOR_BALL, .07, COLOR_BALL_DK);

    // soft top-left highlight (does not rotate — represents the light source)
    drawCircle(pos.add(vec2(-r * .35, r * .35)), r * .85, hsl(.09, .9, .72, .35));

    // two straight diameter seams at 90° to each other
    const lw = .07;
    const seamR = r * .96;
    const a = vec2( cs * seamR,  sn * seamR);
    const b = vec2(-sn * seamR,  cs * seamR);
    drawLine(pos.subtract(a), pos.add(a), lw, COLOR_BALL_DK);
    drawLine(pos.subtract(b), pos.add(b), lw * .85, COLOR_BALL_DK);

    // two side curves — elliptical arcs at ±halfWidth, drawn as a polyline.
    // Each arc is sampled in the ball's local frame (before rotation), then
    // rotated into world space so the curves spin with the ball.
    const N = 12;
    const halfWidth = r * .58;
    for (const sign of [-1, 1])
    {
        let prev = null;
        for (let i = 0; i <= N; i++)
        {
            const t = i / N;
            const ang = t * Math.PI - Math.PI / 2;
            const lx = sign * halfWidth * Math.cos(ang);
            const ly = r * .94 * Math.sin(ang);
            const x = lx * cs - ly * sn;
            const y = lx * sn + ly * cs;
            const p = pos.add(vec2(x, y));
            if (prev) drawLine(prev, p, lw * .85, COLOR_BALL_DK);
            prev = p;
        }
    }
}

function gameRender()
{
    drawRectGradient(vec2(0, FLOOR_Y + 10), vec2(40,20), hsl(0,0,1,.5), CLEAR_BLACK);

    // soft radial glow marking the drag zone (radius = MAX_DRAG)
    drawCircleGradient(DRAG_CENTER, MAX_DRAG * 2, hsl(.6, .5, .6, .35), hsl(.6, .5, .6, 0));

    drawCourt();
    drawHoopAssembly();
    drawDragRadiusGuide();

    // rack ball animates in after each shot, landing on the floor.
    if (gamePhase === 'playing')
    {
        if (dragging)
        {
            drawBasketball(dragPos, 0);
        }
        else
        {
            const pose = getRackBallPose();
            drawBasketball(pose.pos, pose.rot);
        }
    }
    else
    {
        drawBasketball(SPAWN_POS, 0);
    }

    for (const b of balls) b.render();
}

//------------------------------------------------------------------------------
// HUD

function gameRenderPost()
{
    const c = mainCanvasSize;

    if (gamePhase === 'playing' || gamePhase === 'buzzer')
    {
        // score (top center)
        drawTextScreen(`${score}`, vec2(c.x/2, 56), 60, hsl(0,0,1), 4, hsl(0,0,0));

        // time (top right area, but offset from HUD toolbar)
        const tStr = Math.ceil(timeLeft).toString().padStart(2, '0');
        const tColor = timeLeft < 10 ? hsl(.02, .9, .65) : hsl(.13, .9, .65);
        drawTextScreen(`0:${tStr}`, vec2(c.x/2, 100), 28, tColor, 3, hsl(0,0,0));

        // streak (top left)
        if (streak > 0)
        {
            const label = onFire ? `🔥 ${streak}` : `× ${streak}`;
            const col = onFire ? hsl(.05, 1, .65) : hsl(0,0,.95);
            drawTextScreen(label, vec2(80, 56), 32, col, 3, hsl(0,0,0));
        }

    }
    else if (gamePhase === 'title')
    {
        // big title overlay drawn beneath the menu — actually the menu covers
        // it, so we just paint a soft prompt while reveal is pending.
    }
}

//------------------------------------------------------------------------------
engineInit(gameInit, gameUpdate, gameUpdatePost, gameRender, gameRenderPost);

</script></body></html>
