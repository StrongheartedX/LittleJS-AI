<title>LittleJS Geometry Jump</title>
<meta charset=utf-8>
</head><body>
<script src="../dist/littlejs.js?1780071765370"></script>
<script src="../templates/gameFx.js?1780071765370"></script>
<script src="../templates/menus.js?1780071765370"></script>
<script>
'use strict';

// engine settings
debugWatermark = false; // Hide debug watermark in corner
showEngineVersion = false; // Hide engine version console display

// --- Geometry Dash-ish micro runner ------------------------------------------
// Untextured primitives only: cube auto-runs, jump over spikes/blocks.

// Tunables (fixed 60fps; do not multiply by dt)
const RUN_SPEED   = .13;   // world units per frame (faster)   // world units per frame (a bit faster)
const GRAVITY     = -.03;  // units per frame^2 (slower fall/floatier arc)  // units per frame^2
const JUMP_VEL    = .52;   // lower jump height  // tuned w/ GRAVITY to keep ~same jump height   // units per frame
const MAX_FALL    = -1.0;  // cap fall speed so drops don't get too snappy
const FLOOR_Y     = 0;

const PLAYER_SIZE = vec2(.80);

// Game state
let state;            // 'play' | 'dead' | 'win'
let player;
let solids = [];
let spikes = [];
let endX = 0;
let levelStartX = 2;
let particles = [];
let trail = [];       // glowing motion trail behind the cube
let campaignComplete = false;

// run / progression state
const TOTAL_LEVELS = 5;
let mode = 'classic';     // 'classic' | 'remix' | 'daily'
let levelIndex = 0;       // 0-based current level
let runSpeed = RUN_SPEED; // per-level run speed (gentle ramp)
let rng;                  // seeded RandomGenerator for level layout

// hard-coded, beatability-verified seeds for Classic (one per level)
const CLASSIC_SEEDS = [ 1337, 24681, 99173, 51234, 70007 ];

// per-level visual theme (hue values 0..1): bg sky, blocks, hazards (spikes/bars)
const LEVEL_PALETTES = [
    {bg: .58, block: .58, haz: .02},   // 1 - teal/blue, red spikes
    {bg: .75, block: .72, haz: .95},   // 2 - violet, pink spikes
    {bg: .40, block: .35, haz: .02},   // 3 - green, red spikes
    {bg: .07, block: .08, haz: .95},   // 4 - sunset orange, pink spikes
    {bg: .88, block: .83, haz: .04},   // 5 - magenta, orange spikes
];
const LEVEL_NAMES = ['WARMUP', 'VOLTAGE', 'OVERGROWTH', 'INFERNO', 'SINGULARITY'];
let pal = LEVEL_PALETTES[0];

// highest unlocked level (1-based) per mode, persisted. Daily isn't gated.
let unlocked = {classic: 1, remix: 1};

// Sounds
let sJump, sDie, sWin;

function resetGame()
{
    state = 'play';
    particles.length = 0;
    trail.length = 0;

    player = {
        pos: vec2(2, 1),
        velY: 0,
        grounded: false,
        wasGrounded: true,
        angle: 0,
        land: 0,    // landing-squash impulse (1 -> 0)
    };
}

// --- level building helpers --------------------------------------------------
// style: 0=normal block, 1=ceiling bar (go-under)
function addBlock(x, y, w=1, h=1, style=0)
{
    solids.push({pos: vec2(x + w/2, y + h/2), size: vec2(w, h), style});
}
function addSpike(x, y=0, w=1, h=1)
{
    spikes.push({x, y, w, h});
}

// --- procedural level generation ---------------------------------------------
// Each pattern places obstacles starting at world-x `x` and returns the
// horizontal width it consumed. The generator then adds a fair run-up gap so
// every hazard has clear take-off and landing room.

// --- basics (Level 1) ---
function patSingleSpike(x){ addSpike(x, 0, 1, 1); return 1; }
function patDoubleSpike(x){ addSpike(x, 0, 1, 2); return 1; }
function patStepBlock(x){ addBlock(x, 0, 2, 1); return 2; }
function patCeilingBar(x){ const w = 3 + rng.int(3); addBlock(x, 0.86, w, 0.64, 1); return w; }

// --- compound / combo mechanics (later levels) ---
// n adjacent ground spikes, cleared in a single arc
function patCluster(x, n){ for (let i=0; i<n; ++i) addSpike(x+i, 0, 1, 1); return n; }
// raised plateau (jump up onto it) with a spike on the deck (jump again to clear)
function patPlatformSpike(x){
    const w = 8 + rng.int(3);          // 8..10 wide deck (room to land + run up to spike)
    addBlock(x, 0, w, 2, 0);           // solid plateau, deck top at y=2
    addSpike(x + (w-3), 2, 1, 1);      // spike near the far end -> run-up after landing
    return w;
}
// short wall crowned with a spike: clear the whole thing in one jump
function patSpikeWall(x){ addBlock(x, 0, 1, 2, 0); addSpike(x, 2, 1, 1); return 1; }
// tall wall: a big single jump
function patTallWall(x){ addBlock(x, 0, 1, 3, 0); return 1; }
// two-tier ascending steps, then a drop
function patStairs(x){ addBlock(x, 0, 2, 1, 0); addBlock(x+2, 0, 2, 2, 0); return 4; }

// Pattern registry. `minLevel` gates when a mechanic appears (1-based level);
// `ceiling` flags go-under bars (need extra run-up); `padAfter` adds recovery
// room after landing-heavy patterns. Insertion order is the rng pick order.
const PATTERNS = [
    { fn: patSingleSpike,                minLevel: 1 },
    { fn: patDoubleSpike,                minLevel: 1 },
    { fn: patStepBlock,                  minLevel: 1 },
    { fn: patCeilingBar,                 minLevel: 1, ceiling: true },
    { fn: x => patCluster(x, 2),         minLevel: 2 },
    { fn: patPlatformSpike,              minLevel: 2, padAfter: 1 },
    { fn: x => patCluster(x, 3),         minLevel: 3 },
    { fn: patSpikeWall,                  minLevel: 3, padAfter: 1 },
    { fn: patTallWall,                   minLevel: 4, padAfter: 1 },
    { fn: patStairs,                     minLevel: 4, padAfter: 1 },
];

// Pattern pool gated by level number (1-based).
function patternsForLevel(level){ return PATTERNS.filter(p => p.minLevel <= level); }

function seedForLevel(modeName, level)
{
    if (modeName === 'classic')
        return CLASSIC_SEEDS[level] || (1234567 + level*7919);
    if (modeName === 'daily')
    {
        const d = new Date();
        const base = d.getFullYear()*10000 + (d.getMonth()+1)*100 + d.getDate();
        return base + level*7919;   // all levels derived from today's date
    }
    // remix: fresh random non-zero seed per level (global rand, varies each run)
    return randInt(1, 1e9) + level;
}

function buildLevel()
{
    solids.length = 0;
    spikes.length = 0;

    const seed = seedForLevel(mode, levelIndex);
    rng = new RandomGenerator(seed || 1);       // guard: seed must be non-zero
    runSpeed = RUN_SPEED + levelIndex * .008;   // gentle per-level speed ramp
    pal = LEVEL_PALETTES[levelIndex % LEVEL_PALETTES.length];

    const pats   = patternsForLevel(levelIndex + 1);
    const length = 70 + levelIndex * 18;        // later levels run longer

    levelStartX = 2;
    let x = 8;                                  // initial run-up before first hazard
    const stopX = x + length;
    let prevWasCeiling = false;
    while (x < stopX)
    {
        const pd = pats[rng.int(pats.length)];
        // extra run-up before a go-under bar so you land in time
        if (pd.ceiling && !prevWasCeiling) x += 1.5;

        const span = pd.fn(x);
        x += span;

        // fair run-up gap before the next hazard (tightens slightly per level)
        const minGap = max(4, 5.5 - levelIndex * .25);
        const maxGap = max(minGap + 2, 8 - levelIndex * .3);
        x += rng.float(minGap, maxGap) + (pd.padAfter || 0);
        prevWasCeiling = !!pd.ceiling;
    }
    endX = x + 6;       // clear run-out to the finish line

    // decorative under-floor tiles (skipped by collision + draw)
    for (let i = 0; i < endX + 12; ++i) addBlock(i, -1, 1, 1);
}

function wantJump()
{
    return keyWasPressed('Space') || keyWasPressed('ArrowUp') || mouseWasPressed(0) || gamepadWasPressed(0);
}

function aabbOverlap(posA, sizeA, posB, sizeB)
{
    return isOverlapping(posA, sizeA, posB, sizeB);
}

function pointInTri(p, a, b, c)
{
    // barycentric
    const v0 = c.subtract(a);
    const v1 = b.subtract(a);
    const v2 = p.subtract(a);
    const dot00 = v0.dot(v0);
    const dot01 = v0.dot(v1);
    const dot02 = v0.dot(v2);
    const dot11 = v1.dot(v1);
    const dot12 = v1.dot(v2);
    const invDen = 1 / (dot00 * dot11 - dot01 * dot01);
    const u = (dot11 * dot02 - dot01 * dot12) * invDen;
    const v = (dot00 * dot12 - dot01 * dot02) * invDen;
    return u >= 0 && v >= 0 && (u + v) <= 1;
}

function killPlayer()
{
    if (state !== 'play') return;
    state = 'dead';
    sDie.play(player.pos);
    addScreenShake(.7, .4);
    trail.length = 0;

    // shatter the cube into spinning neon fragments
    for (let i=0; i<14; ++i)
    {
        const a = rand(PI*2);
        const sp = rand(.45, .15);
        particles.push({
            pos: player.pos.add(randVec2(.2)),
            vel: vec2(Math.cos(a), Math.sin(a)).scale(sp).add(vec2(0, .15)),
            life: rand(55, 35),
            maxLife: 55,
            size: rand(.30, .14),
            angle: rand(PI*2),
            spin: rand(-.4, .4),
            hue: .90,
        });
    }
    // bright spark flecks
    for (let i=0; i<14; ++i)
    {
        const a = rand(PI*2);
        const sp = rand(.55, .25);
        particles.push({
            pos: player.pos.copy(),
            vel: vec2(Math.cos(a), Math.sin(a)).scale(sp),
            life: rand(28, 14),
            maxLife: 28,
            size: rand(.12, .05),
            angle: 0,
            spin: 0,
            hue: .95,
        });
    }
}

function winGame()
{
    if (state !== 'play') return;
    state = 'win';
    campaignComplete = (levelIndex + 1 >= TOTAL_LEVELS);
    sWin.play(player.pos);
    addScreenShake(.4, .3);

    // unlock the next level for this mode (Daily isn't an unlockable campaign)
    if (mode !== 'daily' && levelIndex + 2 <= TOTAL_LEVELS)
    {
        const next = levelIndex + 2;
        if (next > (unlocked[mode] || 1)) { unlocked[mode] = next; saveData({unlocked}); }
    }

    // confetti burst
    for (let i=0; i<30; ++i)
    {
        const a = rand(PI*2);
        const sp = rand(.6, .2);
        particles.push({
            pos: player.pos.add(randVec2(.3)),
            vel: vec2(Math.cos(a), Math.sin(a)).scale(sp).add(vec2(0, .25)),
            life: rand(70, 40),
            maxLife: 70,
            size: rand(.22, .10),
            angle: rand(PI*2),
            spin: rand(-.5, .5),
            hue: rand(),
        });
    }
}

// brief corner toast announcing the level + its theme name
function announceLevel()
{
    if (typeof showMenuToast === 'function')
        showMenuToast({
            icon: '🚀',
            title: `LEVEL ${levelIndex+1}`,
            text: LEVEL_NAMES[levelIndex % LEVEL_NAMES.length],
            duration: 1.8,
            position: 'top-left',
        });
}

// advance to the next level after a clear (or end the campaign)
function advanceLevel()
{
    if (levelIndex + 1 < TOTAL_LEVELS)
    {
        levelIndex++;
        buildLevel();
        resetGame();
        announceLevel();
    }
    else
        quitToTitle(titleBackdrop);   // campaign finished -> back to title
}

// spawn a quick puff of dust at a contact point
function spawnDust(pos, count, spread, hue=.62)
{
    for (let i=0; i<count; ++i)
    {
        const a = rand(PI*2);
        const sp = rand(spread, spread*.3);
        particles.push({
            pos: pos.add(randVec2(.15)),
            vel: vec2(Math.cos(a), Math.sin(a)*.6 + .04).scale(sp),
            life: rand(22, 12),
            maxLife: 22,
            size: rand(.16, .07),
            angle: 0,
            spin: 0,
            hue,
        });
    }
}

function updateParticles()
{
    for (let i=particles.length; i--;)
    {
        const p = particles[i];
        p.life -= 1;
        p.vel.y += GRAVITY * .35;
        p.vel = p.vel.scale(.97);
        p.pos = p.pos.add(p.vel);
        p.angle += p.spin || 0;
        p.size *= .98;
        if (p.life <= 0 || p.size < .02)
            particles.splice(i, 1);
    }

    // fade the motion trail
    for (let i=trail.length; i--;)
    {
        trail[i].t -= .06;
        if (trail[i].t <= 0)
            trail.splice(i, 1);
    }
}

function playerStep()
{
    const prev = player.pos.copy();
    const wasGrounded = player.grounded;

    // glowing motion trail (denser while airborne)
    trail.push({pos: player.pos.copy(), t: 1, air: !player.grounded});

    // auto-run (constant speed, even while jumping)
    player.pos.x += runSpeed;

    // jump
    if (player.grounded && wantJump())
    {
        player.velY = JUMP_VEL;
        player.grounded = false;
        sJump.play(player.pos);
        spawnDust(vec2(player.pos.x, FLOOR_Y + .05), 6, .22, .62);
    }

    // gravity
    player.velY = max(MAX_FALL, player.velY + GRAVITY);
    player.pos.y += player.velY;

    // floor collide
    const halfY = PLAYER_SIZE.y/2;
    if (player.pos.y - halfY < FLOOR_Y)
    {
        player.pos.y = FLOOR_Y + halfY;
        player.velY = 0;
        player.grounded = true;
    }
    else
        player.grounded = false;

    // block collide
    for (const b of solids)
    {
        // skip under-floor visuals (we used y=-1 for looks)
        if (b.pos.y + b.size.y/2 <= FLOOR_Y) continue;

        if (!aabbOverlap(player.pos, PLAYER_SIZE, b.pos, b.size))
            continue;

        const blockTop    = b.pos.y + b.size.y/2;
        const blockBottom = b.pos.y - b.size.y/2;
        const prevBottom  = prev.y - halfY;
        const prevTop     = prev.y + halfY;
        const currBottom  = player.pos.y - halfY;
        const currTop     = player.pos.y + halfY;

        const comingFromAbove = prevBottom >= blockTop - 1e-6;
        const passingTop      = currBottom < blockTop;

        if (comingFromAbove && passingTop)
        {
            // land
            player.pos.y = blockTop + halfY;
            player.velY = 0;
            player.grounded = true;
        }
        else
        {
            // side/underside bonk is death
            killPlayer();
            return;
        }
    }

    // spike collide (triangle test)
    const hx = PLAYER_SIZE.x/2;
    const hy = PLAYER_SIZE.y/2;
    const corners = [
        vec2(player.pos.x - hx, player.pos.y - hy),
        vec2(player.pos.x + hx, player.pos.y - hy),
        vec2(player.pos.x - hx, player.pos.y + hy),
        vec2(player.pos.x + hx, player.pos.y + hy),
    ];

    for (const s of spikes)
    {
        const spikeCenter = vec2(s.x + s.w/2, s.y + s.h/2);
        const spikeSize   = vec2(s.w, s.h);

        if (!aabbOverlap(player.pos, PLAYER_SIZE, spikeCenter, spikeSize))
            continue;

        const a = vec2(s.x,           s.y);
        const b = vec2(s.x + s.w,     s.y);
        const c = vec2(s.x + s.w/2,   s.y + s.h);

        // If any player corner is inside triangle => hit
        for (const p of corners)
        {
            if (pointInTri(p, a, b, c))
            {
                killPlayer();
                return;
            }
        }

        // extra safety: if player is very low and overlapping bbox, treat as hit
        if (player.pos.y - hy < s.y + .1)
        {
            killPlayer();
            return;
        }
    }

    // landing impact (just touched down after being airborne)
    if (!wasGrounded && player.grounded && state === 'play')
    {
        player.land = 1;
        spawnDust(vec2(player.pos.x, player.pos.y - PLAYER_SIZE.y/2 + .05), 7, .26, .62);
        addScreenShake(.06, .12);
    }
    player.land *= .82;
    player.wasGrounded = player.grounded;

    // fall out
    if (player.pos.y < -6)
        killPlayer();

    // win
    if (player.pos.x > endX)
        winGame();

    // cube rotation vibe
    if (!player.grounded)
        player.angle += .28;
    else
    {
        // ease toward nearest 90° multiple
        const target = Math.round(player.angle / (PI/2)) * (PI/2);
        player.angle = lerpAngle(player.angle, target, .35);
    }
}

function drawSpike(s)
{
    const a = vec2(s.x,           s.y);
    const b = vec2(s.x + s.w,     s.y);
    const c = vec2(s.x + s.w/2,   s.y + s.h);

    // glow halo
    const ga = vec2(s.x - .2,         s.y);
    const gb = vec2(s.x + s.w + .2,   s.y);
    const gc = vec2(s.x + s.w/2,      s.y + s.h + .3);
    drawPoly([ga,gb,gc], hsl(pal.haz, .9, .6, .24));

    // body with crisp bright outline
    drawPoly([a,b,c], hsl(pal.haz, .9, .62), .08, hsl(pal.haz + .02, 1, .82));
    // highlight edge
    drawLine(c, a.lerp(b,.5), .06, hsl(0,0,1,.4));
}

function drawBlock(b)
{
    const isCeil = b.style === 1;
    const hue = isCeil ? pal.haz : pal.block;

    // soft outer glow so the block lifts off the dark background
    drawRect(b.pos, b.size.add(vec2(.5)), hsl(hue, .85, .55, .18));

    // bright neon rim (slightly larger than the body)
    drawRect(b.pos, b.size.add(vec2(.16)), hsl(hue, .95, .72));

    // bright body + darker inner panel for depth
    drawRect(b.pos, b.size, hsl(hue, .80, .52));
    drawRect(b.pos, b.size.scale(.72), hsl(hue, .60, isCeil ? .26 : .32));

    // extra-bright edge facing the player (top for normal, bottom for ceiling)
    const edgeY = isCeil ? b.pos.y - b.size.y/2 : b.pos.y + b.size.y/2;
    drawLine(vec2(b.pos.x - b.size.x/2, edgeY), vec2(b.pos.x + b.size.x/2, edgeY), .09, hsl(hue, 1, .88, .9));
}

function drawBackground()
{
    const camSize = getCameraSize();

    // sky (slow beat pulse + gentle hue drift around the level palette)
    const pulse = .12 + .03 * (Math.sin(time * 2.4) * .5 + .5);
    const hue = pal.bg + .04 * Math.sin(time * .15);
    drawRect(cameraPos, camSize.scale(1.05), hsl(hue, .5, pulse));

    // parallax stripes
    const left = cameraPos.x - camSize.x/2;
    const right = cameraPos.x + camSize.x/2;
    const stripeH = camSize.y;
    const t = time;
    for (let i=0; i<14; ++i)
    {
        const x = left + ((i*6 + t*1.2) % (camSize.x + 30));
        const pos = vec2(x, cameraPos.y);
        drawRect(pos, vec2(1.5, stripeH), hsl(pal.bg, .45, .16, .14));
    }

    // subtle grid
    const gx0 = Math.floor(left) - 1;
    const gx1 = Math.ceil(right) + 1;
    const gy0 = Math.floor(cameraPos.y - camSize.y/2) - 1;
    const gy1 = Math.ceil(cameraPos.y + camSize.y/2) + 1;
    for (let x=gx0; x<=gx1; ++x)
        drawLine(vec2(x, gy0), vec2(x, gy1), .03, hsl(0,0,1,.06));
    for (let y=gy0; y<=gy1; ++y)
        drawLine(vec2(gx0, y), vec2(gx1, y), .03, hsl(0,0,1,.06));
}

function drawFloor()
{
    const camSize = getCameraSize();
    const w = camSize.x + 10;
    const centerX = cameraPos.x;

    // floor slab
    drawRect(vec2(centerX, -0.5), vec2(w, 1), hsl(pal.bg, .25, .07));

    // top edge
    drawLine(vec2(centerX - w/2, 0), vec2(centerX + w/2, 0), .08, hsl(0,0,1,.22));
}

function drawPlayer()
{
    // ground shadow (shrinks as cube rises)
    const h = max(0, player.pos.y - FLOOR_Y);
    const shA = clamp(.3 - h*.06, .05, .3);
    const shW = clamp(.95 - h*.05, .45, .95);
    drawRect(vec2(player.pos.x, FLOOR_Y + .04), vec2(shW, .14), hsl(0,0,0,shA));

    // landing squash: wider + shorter for a frame or two
    const sq = player.land;
    const size = vec2(PLAYER_SIZE.x * (1 + .45*sq), PLAYER_SIZE.y * (1 - .45*sq));

    // soft neon glow
    drawRect(player.pos, size.scale(1.7), hsl(.90, .85, .6, .12), player.angle);
    drawRect(player.pos, size.scale(1.35), hsl(.90, .85, .6, .16), player.angle);

    // cube body
    drawRect(player.pos, size, hsl(.90, .80, .60), player.angle);
    drawRect(player.pos, size.scale(.78), hsl(.90, .72, .38), player.angle);

    // tiny face dot
    const eyeOffset = vec2(.16, .08).rotate(player.angle);
    drawRect(player.pos.add(eyeOffset), vec2(.10, .10), hsl(0,0,1,.9), player.angle);
}

function drawTrail()
{
    for (const n of trail)
    {
        const w = (n.air ? .62 : .42) * n.t;
        drawRect(n.pos, vec2(PLAYER_SIZE.x * w), hsl(.90, .85, .62, .35 * n.t));
    }
}

function drawFinish()
{
    // glowing goal portal at the end of the level
    for (let i=4; i>=1; --i)
        drawRect(vec2(endX, 3.5), vec2(.45*i, 8), hsl(.33, .9, .55, .1));
    drawRect(vec2(endX, 3.5), vec2(.4, 8), hsl(.33, 1, .65, .85));

    // checker flag band near the top of the pole
    for (let i=0; i<5; ++i)
        drawRect(vec2(endX + .55, 6.6 - i*.5), vec2(.5, .5), (i%2) ? hsl(0,0,1) : hsl(0,0,.1));
}

function drawParticles()
{
    for (const p of particles)
    {
        const a = clamp(p.life / (p.maxLife || 40), 0, 1);
        drawRect(p.pos, vec2(p.size), hsl(p.hue ?? .90, .80, .65, a), p.angle || 0);
    }
}

///////////////////////////////////////////////////////////////////////////////
// Menus

// start a fresh run in a mode at a given level index
function startRun(modeName, startIndex)
{
    mode = modeName;
    levelIndex = startIndex | 0;
    campaignComplete = false;
    buildLevel();
    resetGame();
    setPlaying(true);
    clearSubmenuStack();
    hideAllMenus();
    announceLevel();
}

// retry the current level layout (keeps the same generated level, all modes)
function restartLevel()
{
    resetGame();
    setPlaying(true);
    clearSubmenuStack();
    hideAllMenus();
}

// rebuild a clean Level-1 backdrop to sit behind the title screen on quit
function titleBackdrop()
{
    mode = 'classic';
    levelIndex = 0;
    campaignComplete = false;
    buildLevel();
    resetGame();
}

// build one level-select menu for a mode; grid cells gate on `unlocked`
function buildLevelSelect(modeName, id, title)
{
    const cells = [];
    for (let i = 0; i < TOTAL_LEVELS; ++i)
    {
        const lv = i + 1;
        cells.push({
            label: `LEVEL ${lv}`,
            title: LEVEL_NAMES[i],
            icon: '🚀',
            onClick: () =>
            {
                if ((unlocked[modeName] || 1) >= lv)
                    startRun(modeName, i);
                else
                    showMenuToast({icon:'🔒', title:'LOCKED', text:`Clear level ${lv-1} first`, duration:1.4});
            },
        });
    }
    createMenu({
        id, title,
        onHide: popMenu,
        onShow: () =>
        {
            const grid = getMenu(id).getItem('grid');
            for (let i = 0; i < TOTAL_LEVELS; ++i)
            {
                const open = (unlocked[modeName] || 1) >= i + 1;
                grid.setCell(i, {earned: open, icon: open ? '🚀' : '🔒', label: open ? `LEVEL ${i+1}` : 'LOCKED'});
            }
        },
        items: [
            {type:'grid', id:'grid', columns: 5, cells},
            {type:'separator'},
            {type:'button', label:'BACK', onClick: () => hideMenu(id)},
        ],
    });
}

function buildMenus()
{
    if (typeof createMenu !== 'function') return;

    // pause gameplay only while a run is active (title sits over a frozen backdrop)
    installAutoPause();

    // global UI sounds
    const sndSelect   = new Sound([.5,,910,,,.02,2,.07,-5,-33,,,,,,,,.25]);
    const sndActivate = new Sound([.7,,30,.01,,.02,1,3.4,94,,,,,,,,,.67]);
    setMenuSounds({
        select:   () => sndSelect.play(),
        activate: () => sndActivate.play(),
    });

    // ----- title: three modes -----
    createMenu({
        id: 'title',
        title: 'GEOMETRY JUMP',
        dismissable: false,
        onStart: () => pushMenu('levelClassic'),
        items: [
            {type:'label',  text:'DEFY THE GEOMETRY'},
            {type:'button', id:'classic', label:'CLASSIC', title:'Curated 5-level campaign (same every time)', onClick: () => pushMenu('levelClassic')},
            {type:'button', label:'REMIX',  title:'Same levels, fresh random layout each run',           onClick: () => pushMenu('levelRemix')},
            {type:'button', label:'DAILY',  title:"Today's seed - one shared run for everyone",          onClick: () => startRun('daily', 0)},
            {type:'separator'},
            {type:'button', label:'OPTIONS', onClick: () => pushMenu('options')},
            {type:'button', label:'ABOUT',   onClick: () => pushMenu('about')},
        ],
    });

    // ----- level-select grids (Classic + Remix) -----
    buildLevelSelect('classic', 'levelClassic', 'CLASSIC');
    buildLevelSelect('remix',   'levelRemix',   'REMIX');

    // ----- options -----
    createMenu({
        id: 'options',
        title: 'OPTIONS',
        onHide: popMenu,
        items: [
            {type:'slider',   id:'volume', label:'VOLUME', value:.7, min:0, max:1, persist:'volume',
                onChange: v => setSoundVolume(v)},
            {type:'separator'},
            {type:'checkbox', id:'shake', label:'SCREEN SHAKE', value:true, persist:'shake',
                onChange: v => setScreenShakeEnabled(v)},
            {type:'button',   label:'FULLSCREEN', onClick: toggleFullscreen},
            {type:'separator'},
            {type:'button',   label:'RESET PROGRESS', onClick: () => showConfirmDialog({
                title:'RESET PROGRESS', icon:'⚠️', message:'Re-lock all levels in Classic and Remix?',
                onYes: () => { unlocked = {classic:1, remix:1}; saveData({unlocked});
                    showMenuToast({icon:'🔄', title:'Progress reset'}); },
            })},
            {type:'button',   label:'BACK', onClick: () => hideMenu('options')},
        ],
    });

    // ----- about -----
    createMenu({
        id: 'about',
        title: 'ABOUT',
        onHide: popMenu,
        items: [
            {type:'label', text:'GEOMETRY JUMP'},
            {type:'text',  text:'An auto-running cube - tap SPACE / CLICK / UP to jump over spikes, ' +
                'walls and platforms and reach the goal portal.\n\n' +
                'CLASSIC: a fixed 5-level campaign.\n' +
                'REMIX: the same levels, randomized every run.\n' +
                'DAILY: one shared seed per day.'},
            {type:'separator'},
            {type:'button', label:'BACK', onClick: () => hideMenu('about')},
        ],
    });

    // ----- pause -----
    createMenu({
        id: 'pause',
        title: 'PAUSED',
        initialItemId: 'resume',
        items: [
            {type:'button', id:'resume', label:'RESUME',        onClick: () => hideMenu('pause')},
            {type:'button',              label:'RESTART',       onClick: () => restartLevel()},
            {type:'button',              label:'OPTIONS',       onClick: () => pushMenu('options')},
            {type:'button',              label:'QUIT TO TITLE', onClick: () => showConfirmDialog({
                message:'Quit to title?', onYes: () => quitToTitle(titleBackdrop)})},
        ],
    });

    installDefaultToolbar();
}

///////////////////////////////////////////////////////////////////////////////
function gameInit()
{
    saveDataInit('geometryDash');
    const sd = getSaveData();
    unlocked = sd.unlocked ?? {classic: 1, remix: 1};
    unlocked.classic = unlocked.classic ?? 1;
    unlocked.remix   = unlocked.remix   ?? 1;
    // called once after the engine starts up
    setShowSplashScreen(false);
    setCanvasFixedSize(vec2(1280, 720));
    cameraScale = 64;

    sJump = new SoundGenerator({frequency: 520, attack: 0, release: .08, shapeCurve: 1.2, volume: .55, randomness: .03});
    sDie  = new SoundGenerator({frequency: 140, attack: 0, release: .22, shapeCurve: .4,  volume: .85, noise: .2,  randomness: .08});
    sWin  = new SoundGenerator({frequency: 740, attack: 0, release: .18, shapeCurve: 1.3, volume: .7,  pitchJump: 220, pitchJumpTime: .06});

    buildLevel();
    resetGame();

    buildMenus();
    showMenu('title');
}

///////////////////////////////////////////////////////////////////////////////
function gameUpdate()
{
    if (bindPauseKey({when: () => isPlaying() && state === 'play'})) return;
    if (!isPlaying()) return;

    // called every frame at 60 frames per second
    if (state !== 'play')
    {
        updateParticles();
        if (wantJump() || keyWasPressed('KeyR'))
        {
            if (state === 'win' && !keyWasPressed('KeyR'))
                advanceLevel();     // clear -> next level (or finish campaign)
            else
                resetGame();        // crash (or R) -> retry current level
        }
        return;
    }

    // R restarts the current level mid-run
    if (keyWasPressed('KeyR'))
    {
        resetGame();
        return;
    }

    playerStep();
    updateParticles();
}

///////////////////////////////////////////////////////////////////////////////
function gameUpdatePost()
{
    // called after physics and objects are updated
    // setup camera and prepare for render
    const lookAhead = 7.2;
    const targetX = player.pos.x + lookAhead;
    const targetY = 4;
    cameraPos = vec2(targetX, targetY);
    cameraAngle = 0;
}

///////////////////////////////////////////////////////////////////////////////
function gameRender()
{
    // called before objects are rendered
    drawBackground();
    drawFloor();

    // draw solids
    for (const b of solids)
    {
        // only draw in-view-ish (cheap test)
        if (b.pos.y + b.size.y/2 <= FLOOR_Y) continue; // skip under-floor visuals
        drawBlock(b);
    }

    // spikes
    for (const s of spikes)
        drawSpike(s);

    drawFinish();
    drawTrail();
    drawParticles();
    drawPlayer();
}

///////////////////////////////////////////////////////////////////////////////
function gameRenderPost()
{
    if (!isPlaying()) return;   // no HUD over the title screen

    // HUD
    const progress = clamp((player.pos.x - levelStartX) / (endX - levelStartX), 0, 1);
    const pct = (progress * 100)|0;

    // Geometry-Dash-style progress bar
    const cx = mainCanvasSize.x/2;
    const barW = mainCanvasSize.x * .46;
    const barH = 22;
    const by = 40;
    const left = cx - barW/2;
    drawRect(vec2(cx, by), vec2(barW + 10, barH + 10), hsl(0,0,0,.55), 0, false, true);
    drawRect(vec2(cx, by), vec2(barW, barH), hsl(.62,.4,.18), 0, false, true);
    if (progress > 0)
        drawRect(vec2(left + barW*progress/2, by), vec2(barW*progress, barH), hsl(.33,.85,.55), 0, false, true);
    // bright leading edge
    if (progress > 0 && progress < 1)
        drawRect(vec2(left + barW*progress, by), vec2(4, barH), hsl(.33,1,.8), 0, false, true);
    drawTextScreen(`${pct}%`, vec2(cx, by + 1), 18, hsl(0,0,1,.95), 3, hsl(0,0,0,.7), 'center', undefined, 'bold');

    // level readout (left of the bar)
    drawTextScreen(`LEVEL ${levelIndex+1}/${TOTAL_LEVELS}`, vec2(left - 70, by + 1), 22, hsl(.9,.8,.7), 3, hsl(0,0,0,.7), 'center', undefined, 'bold');
    
    if (state === 'dead')
    {
        drawTextScreen('CRASH!', vec2(mainCanvasSize.x/2, mainCanvasSize.y/2 - 60), 110, hsl(0, .9, .6), 10, hsl(0,0,0,.8));
        drawTextScreen('Press SPACE / CLICK to try again', vec2(mainCanvasSize.x/2, mainCanvasSize.y/2 + 30), 44, hsl(0,0,1,.9), 6, hsl(0,0,0,.8));
    }
    else if (state === 'win')
    {
        const title  = campaignComplete ? 'CAMPAIGN COMPLETE!' : 'LEVEL CLEAR!';
        const prompt = campaignComplete ? 'Press SPACE / CLICK to return to title' : 'Press SPACE / CLICK for next level';
        drawTextScreen(title, vec2(mainCanvasSize.x/2, mainCanvasSize.y/2 - 60), campaignComplete ? 84 : 110, hsl(.33, .9, .55), 10, hsl(0,0,0,.8));
        drawTextScreen(prompt, vec2(mainCanvasSize.x/2, mainCanvasSize.y/2 + 30), 44, hsl(0,0,1,.9), 6, hsl(0,0,0,.8));
    }
}

///////////////////////////////////////////////////////////////////////////////
// Startup LittleJS Engine
engineInit(gameInit, gameUpdate, gameUpdatePost, gameRender, gameRenderPost);

</script>
