<!DOCTYPE html><head>
<title>LittleJS Snake</title>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
</head><body style="background:#000">
<script src="../dist/littlejs.js?1780071765370"></script>
<script src="../templates/gameFx.js?1780071765370"></script>
<script src="../templates/menus.js?1780071765370"></script>
<script>
'use strict';

// engine settings, do not remove
debugWatermark = false;
showEngineVersion = false;
paused = false;

// engine settings, customize if necessary
gravity = vec2(0, 0);
cameraScale = 34;
canvasMaxSize = vec2(2048, 2048);

///////////////////////////////////////////////////////////////////////////////
// Snake (grid-based)

const gridW = 24;
const gridH = 18;
const cellSize = 1;

// Tunables
const stepIntervalStart = .12;
const stepIntervalMin   = .06;
const stepSpeedup       = .003;
const deathFreezeTime   = .55; // brief freeze before game-over menu surfaces

// bonus fruit (time-limited, positive)
const bonusLifeTime = 6;    // seconds a bonus fruit stays on the board
const bonusValue    = 5;    // points awarded for a bonus fruit
const bonusGrow     = 2;    // segments gained from a bonus fruit
const bonusChance   = 22;   // % roll per normal food eaten (once warmed up)
const bonusMinScore = 5;    // bonuses only start appearing past this score

// layout
const fieldOffsetY  = .8;   // shift the playfield up to open a bottom HUD strip

let snake, oldSnake, dir, nextDir;  // oldSnake = pre-tick snapshot for smooth glide
let food;
let bonus, bonusTimer, bonusLifeMax; // bonus cell (or 0), remaining time, max time
let grow;
let score;
let alive;
let stepTimer, stepInterval;

// juice
let particles;       // array of {pos, vel, life, lifeMax, size, color}
let foodPulseTimer;  // ticks up from 0; used to pulse food size
let scorePopTimer;   // brief score-bump animation
let growPulseTimer;  // brief snake-grow flash
let deathFreezeTimer;// counts down after death before menu opens
let snakeFlashTimer; // flash on death
let foodSpawnTimer;  // small grow-in animation when food appears

// sounds (created in gameInit so user-gesture audio is happy)
let sEat, sBonus, sDie, sStep;

///////////////////////////////////////////////////////////////////////////////
// Helpers

function clampDir(d)
{
    if (!snake || !snake.length) return d;
    return (d.x === -dir.x && d.y === -dir.y) ? dir : d;
}

function cellToWorld(c)
{
    return vec2((c.x - gridW/2 + .5) * cellSize,
                (c.y - gridH/2 + .5) * cellSize + fieldOffsetY);
}

function isCellInBounds(c)
{
    return c.x >= 0 && c.y >= 0 && c.x < gridW && c.y < gridH;
}

function cellEquals(a,b){ return a.x === b.x && a.y === b.y; }

function cellOnSnake(c)
{
    for (const s of snake)
        if (cellEquals(s, c)) return true;
    return false;
}

function randEmptyCell()
{
    for (let i=0; i<200; ++i)
    {
        const c = vec2(randInt(gridW), randInt(gridH));
        if (cellOnSnake(c)) continue;
        if (food && cellEquals(c, food)) continue;
        if (bonus && cellEquals(c, bonus)) continue;
        return c;
    }
    for (let y=0; y<gridH; ++y)
    for (let x=0; x<gridW; ++x)
    {
        const c = vec2(x,y);
        if (!cellOnSnake(c) && (!food || !cellEquals(c, food)) && (!bonus || !cellEquals(c, bonus)))
            return c;
    }
    return vec2(0,0);
}

///////////////////////////////////////////////////////////////////////////////
// Game state

function resetGame()
{
    const start = vec2(gridW/2|0, gridH/2|0);
    snake = [start.copy(), start.add(vec2(-1,0)), start.add(vec2(-2,0)), start.add(vec2(-3,0))];
    oldSnake = snake.map(s => s.copy());
    dir = vec2(1,0);
    nextDir = dir;

    grow = 0;
    score = 0;
    alive = true;

    stepInterval = stepIntervalStart;
    stepTimer = stepInterval;

    food = randEmptyCell();
    bonus = 0;
    bonusTimer = 0;
    bonusLifeMax = bonusLifeTime;

    particles = [];
    foodPulseTimer = 0;
    scorePopTimer = 0;
    growPulseTimer = 0;
    deathFreezeTimer = 0;
    snakeFlashTimer = 0;
    foodSpawnTimer = .25;
}

function spawnParticles(worldPos, color, count, speedMin, speedMax, life=.6)
{
    for (let i=0; i<count; ++i)
    {
        const a = rand(0, PI*2);
        const speed = rand(speedMin, speedMax);
        particles.push({
            pos: worldPos.add(vec2(rand(-.15,.15), rand(-.15,.15))),
            vel: vec2(Math.cos(a), Math.sin(a)).scale(speed),
            life: life * rand(.7, 1.1),
            lifeMax: life,
            size: rand(.10, .22),
            color: color.copy(),
        });
    }
}

function updateParticles(dt)
{
    for (let i=particles.length-1; i>=0; --i)
    {
        const p = particles[i];
        p.life -= dt;
        if (p.life <= 0) { particles.splice(i,1); continue; }
        // gentle drag, no gravity (top-down)
        p.vel = p.vel.scale(.92);
        p.pos = p.pos.add(p.vel.scale(dt));
    }
}

function renderParticles()
{
    for (const p of particles)
    {
        const t = clamp(p.life / p.lifeMax, 0, 1);
        const c = p.color.copy();
        c.a *= t;
        drawRect(p.pos, vec2(p.size * (.6 + .4*t)), c);
    }
}

// depleting ring drawn as short line segments around a circle (frac of full)
function drawTimerRing(center, radius, frac, color)
{
    const segs = 40;
    const n = Math.ceil(segs * clamp(frac, 0, 1));
    for (let i=0; i<n; ++i)
    {
        const a0 = -PI/2 + (i  /segs) * PI*2;
        const a1 = -PI/2 + ((i+1)/segs) * PI*2;
        const p0 = center.add(vec2(Math.cos(a0), Math.sin(a0)).scale(radius));
        const p1 = center.add(vec2(Math.cos(a1), Math.sin(a1)).scale(radius));
        drawLine(p0, p1, .11, color);
    }
}

///////////////////////////////////////////////////////////////////////////////
// Step / consume / die

function die()
{
    if (!alive) return;
    alive = false;
    sDie && sDie.play();

    // death feedback: particle burst at head, screen shake, brief freeze, flash
    const headWorld = cellToWorld(snake[0]);
    spawnParticles(headWorld, hsl(.33, .9, .6), 26, 4, 11, .8);
    spawnParticles(headWorld, hsl(0,    .9, .6),  8, 2,  6, .55);
    addScreenShake(.55, .35);
    deathFreezeTimer = deathFreezeTime;
    snakeFlashTimer = .4;

    submitBestScore(score);
}

function eatFood()
{
    score++;
    grow++;
    sEat && sEat.play();

    // juice
    const fp = cellToWorld(food);
    spawnParticles(fp, hsl(.12, 1, .6), 14, 3, 8, .5);
    spawnParticles(fp, hsl(.04, 1, .6),  4, 2, 5, .4);
    addScreenShake(.10, .12);
    scorePopTimer  = .35;
    growPulseTimer = .25;
    foodSpawnTimer = .25;

    stepInterval = max(stepIntervalMin, stepIntervalStart - score * stepSpeedup);

    food = randEmptyCell();

    // chance to spawn a time-limited bonus fruit once you're warmed up
    if (!bonus && score >= bonusMinScore && randInt(100) < bonusChance)
        spawnBonus();
}

function spawnBonus()
{
    bonus = randEmptyCell();
    bonusTimer = bonusLifeMax = bonusLifeTime;
}

function eatBonus()
{
    score += bonusValue;
    grow  += bonusGrow;
    sBonus && sBonus.play();

    // big golden burst
    const bp = cellToWorld(bonus);
    spawnParticles(bp, hsl(.13, 1, .65), 24, 3, 9, .6);
    spawnParticles(bp, hsl(.05, .9, .7),  8, 2, 6, .45);
    addScreenShake(.18, .16);
    scorePopTimer  = .45;
    growPulseTimer = .30;

    bonus = 0;
    bonusTimer = 0;

    stepInterval = max(stepIntervalMin, stepIntervalStart - score * stepSpeedup);
}

function tick()
{
    dir = clampDir(nextDir);
    oldSnake = snake.map(s => s.copy()); // snapshot for smooth glide rendering

    const head = snake[0];
    const newHead = head.add(dir);

    if (!isCellInBounds(newHead))
        return die();

    const willRemoveTail = (grow <= 0);
    for (let i=0; i<snake.length; ++i)
    {
        const s = snake[i];
        if (!cellEquals(s, newHead)) continue;
        if (willRemoveTail && i === snake.length-1)
            break;
        return die();
    }

    snake.unshift(newHead);

    if (cellEquals(newHead, food))
        eatFood();
    else if (bonus && cellEquals(newHead, bonus))
        eatBonus();
    else
        sStep && sStep.play();

    if (grow > 0) grow--;
    else snake.pop();
}

///////////////////////////////////////////////////////////////////////////////
// Input

function handleInput()
{
    // Use keyDirection for arrow/WASD movement; gamepad d-pad / left stick.
    const kd = keyDirection();
    const stick = gamepadStick(0);
    const gx = (gamepadIsDown(14) ? -1 : 0) + (gamepadIsDown(15) ? 1 : 0);
    const gy = (gamepadIsDown(13) ? -1 : 0) + (gamepadIsDown(12) ? 1 : 0);

    let want = vec2(0,0);
    if (kd.x || kd.y) want = vec2(Math.sign(kd.x), Math.sign(kd.y));
    else if (gx || gy) want = vec2(gx, gy);
    else if (Math.abs(stick.x) > .4 || Math.abs(stick.y) > .4)
    {
        want = Math.abs(stick.x) > Math.abs(stick.y)
            ? vec2(Math.sign(stick.x), 0)
            : vec2(0, Math.sign(stick.y));
    }

    if (want.x || want.y)
    {
        // restrict to one axis at a time so diagonal taps pick a sane direction
        if (want.x && want.y) want = vec2(want.x, 0);
        nextDir = clampDir(want);
    }
}

///////////////////////////////////////////////////////////////////////////////
// Menus

function startNewRun()
{
    resetGame();
    setPlaying(true);
    hideAllMenus();
}

function buildMenus()
{
    createTitleMenu({
        title: 'SNAKE',
        subtitle: 'Eat the apples. Grab the gold. Avoid the walls.',
        onPlay: startNewRun,
        canReveal: () => !isPlaying(),
        items: [
            {type:'button', label:'OPTIONS', onClick: () => pushMenu('options')},
            {type:'button', label:'ABOUT',   onClick: () => pushMenu('about')},
        ],
    });

    createOptionsMenu();

    createMenu({
        id: 'about',
        title: 'ABOUT',
        onHide: popMenu,
        items: [
            {type:'label', text:'A LittleJS prototype.'},
            {type:'text',  text:'Move with the Arrow keys or WASD. Eat the red apples ' +
                'to grow and score. Now and then a golden fruit appears — grab it before ' +
                'it vanishes for a big bonus. Avoid the walls and yourself. ' +
                'Press Esc or Start to pause.'},
            {type:'separator'},
            {type:'button', label:'BACK', onClick: () => hideMenu('about')},
        ],
    });

    createPauseMenu({
        onQuit: quitToTitle,
        extraItems: [
            {type:'button', label:'OPTIONS', onClick: () => pushMenu('options')},
        ],
    });

    installDefaultToolbar();
}

function showGameOverMenu()
{
    const newBest = score >= getBestScore() && score > 0;
    // Destroy any prior instance so labels are current
    const prev = getMenu('gameover');
    if (prev) prev.destroy();

    createMenu({
        id: 'gameover',
        title: 'GAME OVER',
        dismissable: false,
        initialItemId: 'again',
        items: [
            {type:'label', text: `Score: ${score}`},
            {type:'label', text: newBest ? `New Best!` : `Best: ${getBestScore()}`},
            {type:'separator'},
            {type:'button', id:'again', label:'PLAY AGAIN', onClick: startNewRun},
            {type:'button', label:'TITLE', onClick: quitToTitle},
        ],
    });
    showMenu('gameover');
}

///////////////////////////////////////////////////////////////////////////////
async function gameInit()
{
    saveDataInit('snake');
    canvasClearColor = BLACK;
    setCanvasFixedSize(vec2(1280, 720));
    cameraScale = 34;
    cameraPos = vec2(0,0);

    // sounds (constructed after engine init so audio context can resume on gesture)
    sEat    = new SoundGenerator({volume:.7, frequency:520, release:.06, shapeCurve:1.2, pitchJump:120, pitchJumpTime:.02});
    sBonus  = new SoundGenerator({volume:.8, frequency:700, release:.18, shapeCurve:1.1, pitchJump:380, pitchJumpTime:.06});
    sDie    = new SoundGenerator({volume:1,  frequency:90,  release:.35, noise:.25, shapeCurve:.6, slide:-.4, delay:.03});
    sStep   = new SoundGenerator({volume:.10, frequency:380, release:.015, shapeCurve:1.4});

    // Pause whenever a gameplay menu (pause/dialog) is up. Title menu sits
    // over the frozen board without freezing the engine. Default menu sounds
    // ship in menus.js — no per-game setMenuSounds needed.
    installAutoPause();

    // initial state — title up, no run in progress
    setPlaying(false);
    resetGame();

    buildMenus();
    showMenu('title');
}

///////////////////////////////////////////////////////////////////////////////
function gameUpdate()
{
    // Pause shortcut — only while a run is in progress (otherwise title owns Esc)
    if (bindPauseKey({when: () => isPlaying() && alive})) return;

    // Reset camera to origin each frame so the gameFx screen-shake plugin
    // (which adds to cameraPos after gameUpdate) can nudge cleanly.
    cameraPos = vec2(0, 0);

    handleInput();

    // animation timers
    foodPulseTimer += timeDelta;
    if (foodSpawnTimer > 0) foodSpawnTimer -= timeDelta;
    if (scorePopTimer  > 0) scorePopTimer  -= timeDelta;
    if (growPulseTimer > 0) growPulseTimer -= timeDelta;
    if (snakeFlashTimer> 0) snakeFlashTimer-= timeDelta;

    updateParticles(timeDelta);

    // tick down the time-limited bonus fruit; puff away if it expires
    if (alive && bonus)
    {
        bonusTimer -= timeDelta;
        if (bonusTimer <= 0)
        {
            spawnParticles(cellToWorld(bonus), hsl(0,0,.85), 8, 1, 4, .4);
            bonus = 0;
        }
    }

    if (!alive)
    {
        // brief freeze, then surface the game-over menu (which pauses the game)
        if (deathFreezeTimer > 0)
        {
            deathFreezeTimer -= timeDelta;
            if (deathFreezeTimer <= 0)
                showGameOverMenu();
        }
        return;
    }

    stepTimer -= timeDelta;
    while (stepTimer <= 0)
    {
        stepTimer += stepInterval;
        tick();
        if (!alive) break;
    }
}

///////////////////////////////////////////////////////////////////////////////
function gameUpdatePost()
{
    // cameraPos is reset to origin at the top of gameUpdate so the gameFx
    // screen-shake plugin (between gameUpdate and gameUpdatePost) can nudge it.
}

///////////////////////////////////////////////////////////////////////////////
function gameRender()
{
    // background
    drawRectGradient(cameraPos, getCameraSize(), hsl(0,0,.06), hsl(0,0,.12));

    // playfield — centered at (0, fieldOffsetY). cameraPos shake from the gameFx
    // plugin moves all world-space drawing together.
    const fieldSize   = vec2(gridW*cellSize, gridH*cellSize);
    const fieldCenter = vec2(0, fieldOffsetY);
    drawRect(fieldCenter, fieldSize.add(vec2(.7)), hsl(.34,.45,.30));        // soft frame
    drawRect(fieldCenter, fieldSize.add(vec2(.4)), hsl(.34,.25,.16));
    drawRectGradient(fieldCenter, fieldSize, hsl(.34,.20,.10), hsl(.34,.18,.07));

    // subtle grid lines
    {
        const halfW = gridW/2;
        const halfH = gridH/2;
        const col = hsl(.34,.15,.35,.18);
        for (let x=-halfW; x<=halfW; ++x)
            drawLine(vec2(x,-halfH+fieldOffsetY), vec2(x,halfH+fieldOffsetY), .03, col);
        for (let y=-halfH; y<=halfH; ++y)
            drawLine(vec2(-halfW,y+fieldOffsetY), vec2(halfW,y+fieldOffsetY), .03, col);
    }

    // food — cute red apple with grow-in + gentle pulse, highlight and leaf
    {
        const p = cellToWorld(food);
        const pulse  = .72 + Math.sin(foodPulseTimer * 6) * .05;
        const growIn = foodSpawnTimer > 0 ? clamp(1 - foodSpawnTimer/.25, 0, 1) : 1;
        const size   = pulse * (.45 + .55*growIn);
        drawCircle(p, size + .22, hsl(.99, .8, .55, .18));                  // soft glow
        drawCircle(p, size,       hsl(.99, .75, .57));                      // apple body
        drawCircle(p.add(vec2(-.14,.14)), size*.28, hsl(.04,.7,.85,.9));    // highlight
        drawCircle(p.add(vec2(.10, size*.85)), size*.22, hsl(.34,.6,.45));  // leaf
    }

    // bonus fruit — time-limited gold with a depleting timer ring; blinks late
    if (bonus)
    {
        const p     = cellToWorld(bonus);
        const frac  = clamp(bonusTimer / bonusLifeMax, 0, 1);
        const warn  = bonusTimer < 1.8;
        const blink = warn ? .55 + .45*Math.sin(time*16) : 1;
        const pulse = .80 + Math.sin(foodPulseTimer * 8) * .07;
        drawCircle(p, pulse + .45, hsl(.13, 1, .60, .15*blink));            // glow
        drawCircle(p, pulse + .22, hsl(.13, 1, .62, .22*blink));
        drawCircle(p, pulse,       hsl(.13, 1, .56, blink));                // body
        drawCircle(p, pulse*.6,    hsl(.16, 1, .82, blink));                // bright core
        drawCircle(p.add(vec2(-.16,.16)), pulse*.18, hsl(0,0,1,.8*blink));  // sparkle
        drawTimerRing(p, pulse + .55, frac, hsl(.13, 1, .72, blink));
    }

    // snake — smooth glide between cells as a rounded, connected tube
    const flash     = snakeFlashTimer > 0 ? Math.sin(snakeFlashTimer * 40) > 0 : false;
    const headSwell = growPulseTimer > 0 ? .14 * (growPulseTimer / .30) : 0;
    const prog      = alive ? clamp(1 - stepTimer/stepInterval, 0, 1) : 1;

    // interpolated world position of each segment (oldSnake[i] -> snake[i])
    const pts = [];
    for (let i=0; i<snake.length; ++i)
    {
        const from = oldSnake[i] || snake[i];
        pts.push(cellToWorld(from).lerp(cellToWorld(snake[i]), prog));
    }

    // body: tail -> head so the head sits on top; capsule = thick line + round joints
    const bodyW = .86;
    for (let i=pts.length-1; i>=0; --i)
    {
        const t = i / max(1, snake.length-1);
        const col = (!alive && flash)
            ? hsl(0, 1, lerp(.45, .65, 1-t))
            : hsl(.34, .62, lerp(.32, .56, 1-t));   // pastel green, brighter toward head
        if (i > 0) drawLine(pts[i], pts[i-1], bodyW, col);
        drawCircle(pts[i], bodyW, col);
    }

    // head cap (brighter) + googly eyes + occasional tongue flick
    {
        const hp   = pts[0];
        const hcol = (!alive && flash) ? hsl(0,1,.62) : hsl(.34, .72, .60);
        drawCircle(hp, bodyW + headSwell, hcol);

        if (alive)
        {
            const forward   = vec2(dir.x, dir.y);
            const side      = vec2(-dir.y, dir.x);   // perpendicular to forward
            const eyeFwd    = .15;                    // toward leading edge of head
            const eyeSep    = .20;                    // separation between eyes
            const eyeD      = .30;                    // eye diameter (white sclera)
            const pupilD    = .15;                    // pupil diameter
            const pupilLean = forward.scale(.05);     // pupils peek slightly forward

            // playful tongue flick out the front
            if (Math.sin(time*3) > .9)
            {
                const base = hp.add(forward.scale(bodyW*.45));
                drawLine(base, base.add(forward.scale(.30)), .07, hsl(.98,.85,.6));
            }

            const eyeA = hp.add(forward.scale(eyeFwd)).add(side.scale( eyeSep));
            const eyeB = hp.add(forward.scale(eyeFwd)).add(side.scale(-eyeSep));
            drawCircle(eyeA, eyeD, hsl(0,0,1));
            drawCircle(eyeB, eyeD, hsl(0,0,1));
            drawCircle(eyeA.add(pupilLean), pupilD, hsl(0,0,.05));
            drawCircle(eyeB.add(pupilLean), pupilD, hsl(0,0,.05));
        }
    }

    renderParticles();
}

///////////////////////////////////////////////////////////////////////////////
function gameRenderPost()
{
    if (!isPlaying()) return; // title screen owns the canvas; menu draws its own

    const cx = mainCanvasSize.x/2;
    const by = mainCanvasSize.y - 42;   // bottom HUD baseline, below the playfield

    // Score (pops on eat) + best, in the bottom strip
    const popScale  = scorePopTimer > 0 ? 1 + .35 * (scorePopTimer / .45) : 1;
    const scoreSize = 38 * popScale;
    drawTextScreen(`${score}`, vec2(cx, by), scoreSize, hsl(.34,.7,.88), 5, hsl(0,0,0));
    drawTextScreen(`BEST  ${getBestScore()}`, vec2(cx, by + 28), 17, hsl(0,0,1,.7), 3, hsl(0,0,0,.8));

    // bonus indicator on the left of the bottom strip while a bonus is live
    if (alive && bonus)
    {
        const warn = bonusTimer < 1.8;
        const a = warn ? .55 + .45*Math.sin(time*16) : 1;
        drawTextScreen(`★ +${bonusValue}`, vec2(150, by - 6), 24, hsl(.13,1,.7,a), 3, hsl(0,0,0,.8));
        drawTextScreen(`${Math.ceil(bonusTimer)}s`, vec2(150, by + 22), 16, hsl(0,0,1,.85), 2, hsl(0,0,0,.8));
    }

    // first-time hint, faint near the top of the field (fades out once you score)
    if (alive && score < 2)
    {
        const help = isTouchDevice
            ? 'Swipe / d-pad to steer'
            : 'Arrow keys or WASD to move    Esc to pause';
        const a = .5 + .35 * Math.sin(time * 2.5);
        drawTextScreen(help, vec2(cx, 34), 17, hsl(0,0,1,a), 3, hsl(0,0,0,a));
    }
}

///////////////////////////////////////////////////////////////////////////////
engineInit(gameInit, gameUpdate, gameUpdatePost, gameRender, gameRenderPost);

</script></body></html>
