<title>LittleJS Games</title>
<link rel="icon" href="logo.png">
<link rel="apple-touch-icon" href="logo.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0b0e14">
<style>
  :root {
    --bg: #0b0e14;
    --bg-2: #0e1320;
    --panel: #141a26;
    --panel-2: #1c2332;
    --border: #252e40;
    --text: #e6edf3;
    --muted: #8b949e;
    --accent: #58a6ff;
    --accent-2: #ff7eb6;
    --accent-bg: #1a2f4d;
    --chip-bg: #232b3c;
    --chip-text: #adbac7;

    /* Per-category accent + translucent fill, applied via --cat-color / --cat-bg
       CSS vars set on chips/tiles/row headers at build time. */
    --cat-arcade:  #58a6ff;   --cat-arcade-bg:  rgba(88,166,255,.18);
    --cat-shooter: #ff7eb6;   --cat-shooter-bg: rgba(255,126,182,.18);
    --cat-puzzle:  #bb86fc;   --cat-puzzle-bg:  rgba(187,134,252,.18);
    --cat-board:   #f7c948;   --cat-board-bg:   rgba(247,201,72,.18);
    --cat-sports:  #4ade80;   --cat-sports-bg:  rgba(74,222,128,.18);
    --cat-construction: #ff9744; --cat-construction-bg: rgba(255,151,68,.18);
  }
  * { box-sizing: border-box; }
  /* `height: 100%` on iOS measures the layout viewport (which extends behind
     the browser URL bar in portrait), pushing fixed elements off-screen at
     the top. `100dvh` measures the dynamic visible viewport — correct on
     iOS, falls back to 100% on browsers that don't understand dvh. */
  html, body { margin: 0; padding: 0; height: 100%; height: 100dvh; overflow: hidden; }
  body {
    background: var(--bg);
    color: var(--text);
    font: 14px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    display: flex;
    /* Disable text selection on the launcher chrome — every clickable element
       launches a game, so accidental selections just get in the way. The
       iframe content is in its own document and is unaffected. */
    user-select: none;
    -webkit-user-select: none;
  }
  /* …but keep text inputs selectable, obviously. */
  input, textarea { user-select: text; -webkit-user-select: text; }
  button { font: inherit; color: inherit; cursor: pointer; }

  /* ===================== Sidebar ===================== */
  #sidebar {
    width: 300px;
    flex: 0 0 300px;
    background: var(--panel);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  #sidebar-header { padding: 14px 14px 10px; border-bottom: 1px solid var(--border); }

  /* Sidebar logo — clickable "home" button */
  #sidebar-logo-wrap {
    display: flex;
    justify-content: center;
    margin-bottom: 12px;
    cursor: pointer;
  }
  #sidebar-logo {
    height: 64px;
    width: auto;
    filter: drop-shadow(0 0 12px rgba(88, 166, 255, .35));
    transition: transform .15s, filter .15s;
    animation: splat .55s cubic-bezier(.34, 1.56, .64, 1);
  }
  #sidebar-logo-wrap:hover #sidebar-logo {
    transform: scale(1.05);
    filter: drop-shadow(0 0 18px rgba(255, 126, 182, .55));
  }

  #search {
    width: 100%;
    padding: 7px 10px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font: inherit;
    outline: none;
  }
  #search:focus { border-color: var(--accent); }

  #filter-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-top: 10px;
  }
  .chip-filter {
    background: var(--chip-bg);
    color: var(--chip-text);
    border: 1px solid transparent;
    padding: 3px 9px;
    border-radius: 11px;
    font-size: 11px;
    text-transform: lowercase;
    letter-spacing: .3px;
    transition: background .1s, color .1s, border-color .1s;
  }
  .chip-filter:hover { background: var(--panel-2); color: var(--text); }
  .chip-filter.active {
    background: var(--cat-bg, var(--accent-bg));
    color: var(--text);
    border-color: var(--cat-color, var(--accent));
  }

  /* overflow-anchor: none disables Chrome's scroll-anchoring at the list
     bottom. Without it, hovering the last card expands its body, which
     grows scrollHeight, which the browser "corrects" by shifting scrollTop —
     and that shift moves the card out from under the cursor, triggering a
     hover-collapse-anchor-expand oscillation loop. */
  #list { flex: 1; overflow-y: auto; padding: 6px 0; overflow-anchor: none; }
  #list::-webkit-scrollbar { width: 10px; }
  #list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 5px; }
  /* Suppress hover during scroll — otherwise each card under the cursor
     briefly expands as the list slides by, causing visible flicker. */
  #list.scrolling { pointer-events: none; }

  .card {
    padding: 8px 14px;
    border-left: 3px solid transparent;
    cursor: pointer;
    user-select: none;
    transition: background .08s;
  }
  .card:hover { background: var(--panel-2); }
  .card.selected {
    background: var(--accent-bg);
    border-left-color: var(--accent);
  }
  .card .title {
    font-weight: 500;
    font-size: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  /* Fixed-width emoji slot so titles line up regardless of glyph width. */
  .card .title .emoji {
    font-size: 18px;
    line-height: 1;
    flex: 0 0 22px;
    text-align: center;
  }
  .card .title .name { flex: 1; min-width: 0; }
  .card .body {
    max-height: 0;
    overflow: hidden;
    opacity: 0;
    transition: max-height .15s, opacity .15s, margin-top .15s;
  }
  .card:hover .body, .card.selected .body {
    max-height: 200px;
    opacity: 1;
    margin-top: 6px;
  }
  .card .desc { color: var(--muted); font-size: 12.5px; margin-bottom: 6px; }
  .chips { display: flex; flex-wrap: wrap; gap: 4px; }
  .chip {
    background: var(--chip-bg);
    color: var(--chip-text);
    padding: 1px 7px;
    border-radius: 10px;
    font-size: 10.5px;
    text-transform: lowercase;
    letter-spacing: .3px;
  }
  .empty { padding: 20px 16px; color: var(--muted); font-size: 13px; text-align: center; }

  /* High-score badge — gold accent, used on tiles + sidebar cards. */
  .score-badge {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    background: rgba(247, 201, 72, .14);
    color: #f7c948;
    border: 1px solid rgba(247, 201, 72, .35);
    padding: 1px 7px;
    border-radius: 8px;
    font-size: 10.5px;
    font-weight: 600;
    letter-spacing: .2px;
    line-height: 1.3;
  }
  .card .body .score-badge { margin-bottom: 6px; }
  .tile .score-badge {
    align-self: flex-start;
    justify-self: start;
    margin: 2px 0 4px;
  }

  /* "Best Scores" row — tiles show the score number prominently instead of
     a description, since the whole point of this row is the number. */
  .tile.score-tile .score-big {
    font-size: 18px;
    font-weight: 700;
    color: #f7c948;
    margin-top: 2px;
    letter-spacing: .3px;
  }

  /* Subtle divider that separates "main" games from under-construction ones
     at the bottom of the sidebar list. */
  .list-divider {
    margin: 14px 14px 4px;
    padding-top: 10px;
    border-top: 1px dashed var(--border);
    color: var(--cat-construction);
    font-size: 10.5px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1.2px;
  }

  /* Sidebar footer — controls live here so they never overlap the game */
  #sidebar-footer {
    padding: 10px 14px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 6px;
  }
  #sidebar-footer .btn {
    flex: 1;
    text-align: center;
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 7px 10px;
    border-radius: 6px;
    font-size: 12px;
    text-decoration: none;
    transition: background .1s, border-color .1s, opacity .1s;
  }
  #sidebar-footer .btn:hover:not(.disabled) {
    background: var(--accent-bg);
    border-color: var(--accent);
  }
  #sidebar-footer .btn.disabled { opacity: .35; cursor: not-allowed; pointer-events: none; }

  /* ===================== Stage ===================== */
  #stage {
    flex: 1;
    position: relative;
    overflow: hidden;
    /* gradient base lives on the stage so the starfield canvas can paint
       transparent on top without losing the welcome backdrop. */
    background: linear-gradient(180deg, var(--bg-2) 0%, var(--bg) 100%);
  }
  #frame { width: 100%; height: 100%; border: 0; display: block; position: relative; z-index: 2; }
  #starfield { position: absolute; inset: 0; pointer-events: none; z-index: 0; }

  /* ===================== Welcome screen ===================== */
  #welcome {
    position: absolute;
    inset: 0;
    overflow-y: auto;
    z-index: 1;
    background:
      radial-gradient(ellipse at 50% 0%, rgba(88, 166, 255, .12) 0%, transparent 55%),
      radial-gradient(ellipse at 80% 100%, rgba(255, 126, 182, .08) 0%, transparent 50%);
    padding: 40px 48px 60px;
  }
  #welcome::-webkit-scrollbar { width: 10px; }
  #welcome::-webkit-scrollbar-thumb { background: var(--border); border-radius: 5px; }

  #welcome-hero {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 32px;
  }
  #welcome-logo {
    width: min(220px, 30vw);
    height: auto;
    filter: drop-shadow(0 8px 28px rgba(88, 166, 255, .45))
            drop-shadow(0 0 40px rgba(255, 126, 182, .2));
    animation: splat .7s cubic-bezier(.34, 1.56, .64, 1),
               float 5s ease-in-out infinite 1s;
  }
  #welcome-tagline {
    margin-top: 14px;
    color: var(--muted);
    font-size: 14px;
    letter-spacing: .5px;
  }

  #quick-actions {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin-bottom: 36px;
    flex-wrap: wrap;
  }
  .quick-btn {
    background: linear-gradient(135deg, var(--accent-bg), var(--panel));
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 22px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 500;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    transition: transform .12s, border-color .12s, box-shadow .12s;
  }
  .quick-btn:hover {
    transform: translateY(-2px);
    border-color: var(--accent);
    box-shadow: 0 6px 20px rgba(88, 166, 255, .25);
  }
  .quick-btn.primary {
    background: linear-gradient(135deg, var(--accent), #2978d3);
    border-color: var(--accent);
  }
  .quick-btn.primary:hover {
    box-shadow: 0 6px 24px rgba(88, 166, 255, .5);
  }
  .quick-btn .icon { font-size: 16px; }
  .quick-btn .sub {
    color: rgba(255, 255, 255, .7);
    font-size: 12px;
    margin-left: 4px;
  }

  .row { margin-bottom: 32px; max-width: 100%; }
  .row h2 {
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--muted);
    margin: 0 0 12px;
    padding-left: 4px;
  }
  .row .tiles {
    display: flex;
    gap: 14px;
    overflow-x: auto;
    overflow-y: hidden;
    padding: 12px 4px 14px;     /* top padding gives hover-lift room */
    cursor: grab;
  }
  .row .tiles.dragging { cursor: grabbing; }
  .row .tiles.dragging .tile { pointer-events: none; }

  /* Row header — small colored bar + category emoji */
  .row h2 .row-bar {
    display: inline-block;
    width: 4px;
    height: 14px;
    margin-right: 8px;
    vertical-align: -2px;
    border-radius: 2px;
    background: var(--cat-color, var(--accent));
  }
  .row h2 .row-emoji {
    margin-right: 6px;
    filter: drop-shadow(0 0 6px var(--cat-color, var(--accent)));
  }
  .row .tiles::-webkit-scrollbar { height: 8px; }
  .row .tiles::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* Tiles wrapper hosts the edge scroll buttons */
  .tiles-wrap { position: relative; }

  /* Edge buttons — full-height columns at left/right that combine the
     fade gradient and the click target. Chevron sits inside the fade. */
  .edge-scroll {
    position: absolute;
    top: 0;
    bottom: 12px;               /* clear the horizontal scrollbar */
    width: 64px;
    border: 0;
    padding: 0 14px;
    display: flex;
    align-items: center;
    font-size: 30px;
    line-height: 1;
    color: var(--text);
    opacity: .55;
    z-index: 2;
    transition: opacity .15s;
    text-shadow: 0 0 6px var(--bg), 0 0 12px var(--bg);
  }
  .edge-scroll:hover { opacity: 1; }
  .edge-scroll[hidden] { display: none; }
  .edge-scroll.left {
    left: 0;
    background: linear-gradient(to right, var(--bg) 25%, transparent);
    justify-content: flex-start;
  }
  .edge-scroll.right {
    right: 0;
    background: linear-gradient(to left, var(--bg) 25%, transparent);
    justify-content: flex-end;
  }

  .tile {
    flex: 0 0 auto;
    position: relative;
    background: linear-gradient(135deg, var(--panel) 0%, var(--panel-2) 100%);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    padding-left: 18px;            /* room for the category color stripe */
    cursor: pointer;
    overflow: hidden;
    transition: transform .15s, border-color .15s, box-shadow .15s;
    display: flex;
    gap: 12px;
  }
  /* Category color stripe down the left edge */
  .tile::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 4px;
    background: var(--cat-color, var(--border));
  }
  .tile:hover {
    transform: translateY(-4px) scale(1.02);
    border-color: var(--cat-color, var(--accent));
    box-shadow: 0 10px 28px rgba(0, 0, 0, .45),
                0 0 0 1px var(--cat-color, rgba(88, 166, 255, .3));
  }
  .tile .emoji {
    font-size: 32px;
    line-height: 1;
    flex: 0 0 auto;
    filter: drop-shadow(0 2px 6px rgba(0, 0, 0, .5));
  }
  .tile .info {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
  }
  .tile .name { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
  .tile .desc {
    color: var(--muted);
    font-size: 12px;
    line-height: 1.35;
    flex: 1;
  }
  .tile .chips { margin-top: 8px; }
  .tiles.top .tile .emoji { font-size: 44px; }

  /* Top picks — larger tiles with a gradient face */
  .tiles.top .tile {
    width: 220px;
    min-height: 140px;
    background: linear-gradient(135deg, #1a2f4d 0%, #2d1a3e 100%);
    border-color: #3a4862;
  }
  .tiles.top .tile .name { font-size: 16px; }
  .tiles.top .tile .desc { font-size: 12.5px; }

  /* Top tile: emoji + name on top row, rest spans full width below. */
  .tiles.top .tile {
    display: grid;
    grid-template-columns: auto 1fr;
    column-gap: 12px;
    row-gap: 6px;
    align-items: start;
  }
  .tiles.top .tile .emoji { align-self: center; }
  .tiles.top .tile .info { display: contents; }
  .tiles.top .tile .info .name {
    align-self: center;
    margin-bottom: 0;
  }
  .tiles.top .tile:has(.score-badge) .emoji { grid-row: 1 / span 2; }
  .tiles.top .tile .info .score-badge {
    grid-column: 2;
    margin: 0;
  }
  .tiles.top .tile .info .desc,
  .tiles.top .tile .info .chips {
    grid-column: 1 / -1;
    margin: 0;
  }

  /* Standard category tiles */
  .row:not(.row-top) .tile { width: 170px; min-height: 100px; }
  .row:not(.row-top) .tile .desc {
    display: -webkit-box;
    -webkit-line-clamp: 2;
    line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  /* About blurb at the bottom of the welcome screen */
  #about {
    margin-top: 24px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
    color: var(--muted);
    font-size: 13px;
    line-height: 1.6;
    text-align: center;
  }
  #about a { color: var(--accent); text-decoration: none; }
  #about a:hover { text-decoration: underline; }

  @keyframes splat {
    0%   { transform: scale(0) rotate(-6deg); opacity: 0; }
    60%  { transform: scale(1.12) rotate(2deg); opacity: 1; }
    100% { transform: scale(1) rotate(0); }
  }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-8px); }
  }

  /* ===================== Mobile drawer chrome (hidden on desktop) ===================== */
  #hamburger {
    display: none;             /* shown only via mobile media query */
    position: fixed;
    top: 10px;
    left: 10px;
    z-index: 100;
    width: 40px;
    height: 40px;
    background: rgba(20, 26, 38, .5);
    border: 1px solid rgba(255, 255, 255, .15);
    border-radius: 8px;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    padding: 0;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    transition: background .15s, border-color .15s, opacity .15s;
  }
  #hamburger:hover,
  #hamburger:active { background: rgba(20, 26, 38, .92); border-color: var(--accent); }
  /* Auto-hide states: .faded after a few seconds of no interaction,
     .hidden while the drawer is open (button would otherwise sit on top). */
  #hamburger { transition: opacity .45s, transform .25s, background .15s, border-color .15s; }
  #hamburger.faded { opacity: .25; }
  #hamburger.hidden { opacity: 0; pointer-events: none; transform: translateX(-30px); }

  /* 2×2 grid icon — clearly "library / apps", and doesn't collide with the
     hamburger pattern many games use for their own pause menus. */
  #hamburger .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 3px;
    width: 20px;
    height: 20px;
  }
  #hamburger .grid span {
    background: var(--text);
    border-radius: 2px;
  }
  #backdrop {
    display: none;             /* shown only via mobile media query */
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, .55);
    z-index: 50;
    opacity: 0;
    pointer-events: none;
    transition: opacity .22s;
  }
  #backdrop.show { opacity: 1; pointer-events: auto; }

  /* ===================== Polish: stagger + wiggle + dice + sparkle ===================== */

  /* Tile entrance — staggered fade+rise. --i is set per-tile in makeTile,
     capped so wide rows don't take forever to finish populating. */
  .tile {
    animation: tile-enter .3s ease-out backwards;
    animation-delay: calc(var(--i, 0) * 25ms);
  }
  @keyframes tile-enter {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Emoji wiggle on tile hover — fires once per hover-in, doesn't loop. */
  .tile:hover .emoji { animation: emoji-wiggle .5s ease-in-out; }
  @keyframes emoji-wiggle {
    0%, 100% { transform: rotate(0) scale(1); }
    25%      { transform: rotate(-14deg) scale(1.15); }
    60%      { transform: rotate(10deg)  scale(1.08); }
  }

  /* Random-button die roll — quick tumble before navigating. */
  .quick-btn .icon { display: inline-block; }
  .quick-btn .icon.rolling { animation: dice-roll .28s ease-out; }
  @keyframes dice-roll {
    0%   { transform: rotate(0)      scale(1); }
    50%  { transform: rotate(180deg) scale(1.3); }
    100% { transform: rotate(360deg) scale(1); }
  }

  /* Logo idle sparkles — small white square that rotates while floating up. */
  .sparkle {
    position: absolute;
    pointer-events: none;
    background: #fff;
    border-radius: 1px;
    box-shadow: 0 0 8px rgba(255, 255, 255, .8),
                0 0 14px rgba(180, 220, 255, .4);
    z-index: 3;
    animation: sparkle-float 1.3s ease-out forwards;
  }
  @keyframes sparkle-float {
    0%   { opacity: 0; transform: translateY(0)    rotate(0)      scale(.3); }
    18%  { opacity: 1; transform: translateY(-10px) rotate(140deg) scale(1);  }
    100% { opacity: 0; transform: translateY(-60px) rotate(540deg) scale(.4); }
  }

  /* Respect OS-level "reduce motion" preference — kill the playful animations
     that aren't required for understanding the page. Starfield + sparkle JS
     loops are skipped in setupStarfield / setupSparkles for the same reason. */
  @media (prefers-reduced-motion: reduce) {
    .tile,
    .tile:hover .emoji,
    .quick-btn .icon.rolling,
    .sparkle,
    #welcome-logo,
    #sidebar-logo { animation: none !important; }
    .tile { opacity: 1; transform: none; }
  }

  /* ===================== Mobile / narrow viewport ===================== */
  @media (max-width: 720px) {
    /* Sidebar becomes an overlay drawer — hidden offscreen by default,
       slid in by the hamburger button. */
    #sidebar {
      position: fixed;
      top: 0; left: 0; bottom: 0;
      width: 320px;
      max-width: 85vw;
      flex: none;
      z-index: 60;
      transform: translateX(-100%);
      transition: transform .25s ease-out;
      box-shadow: 4px 0 24px rgba(0, 0, 0, .5);
    }
    #sidebar.open { transform: translateX(0); }
    #hamburger { display: flex; }
    /* In-game on mobile: hide the drawer toggle. Browsing the library
       while playing isn't useful here, and the button just covers game
       UI. Browser back returns to the library. */
    body.in-game #hamburger { display: none; }
    #backdrop  { display: block; }

    /* Stage takes the whole width once the sidebar is fixed-positioned. */
    #stage { width: 100%; }

    /* Welcome screen tweaks — extra top padding so the hamburger doesn't
       overlap the logo, smaller side padding for more content width. */
    #welcome { padding: 60px 16px 40px; }
    #welcome-hero { margin-bottom: 24px; }
    #welcome-tagline { font-size: 13px; }

    /* Bigger touch targets + readable text inside the drawer. */
    #sidebar-header { padding: 14px 14px 12px; }
    #search { padding: 11px 12px; font-size: 15px; }
    .card { padding: 12px 14px; }
    .card .title { font-size: 16px; }
    .card .title .emoji { font-size: 22px; flex-basis: 28px; }
    .card .desc { font-size: 13.5px; }
    .chip { padding: 2px 8px; font-size: 11.5px; }

    /* Hide the category filter chips and the footer buttons on mobile —
       the drawer is cramped enough already; leave just the logo, search,
       and game list. (Footer actions are still reachable from the welcome
       screen or via the iframe game's own UI / OS share.) */
    #filter-chips { display: none; }
    #sidebar-footer { display: none; }

    /* Welcome tiles — slightly bigger text so they're readable on phones. */
    .tile .name { font-size: 15px; }
    .tile .desc { font-size: 12.5px; }
    .tiles.top .tile { width: 200px; min-height: 130px; }
    .row:not(.row-top) .tile { width: 160px; min-height: 96px; }
    .row h2 { font-size: 14px; }

    /* Quick-action buttons big enough to tap comfortably. */
    .quick-btn { padding: 14px 22px; font-size: 15px; }
  }
</style>
</head>
<body>

const CATEGORIES = [

];
const catByKey = Object.fromEntries(CATEGORIES.map(c => [c.key, c]));
const LAST_GAME_KEY = 'littlejs-games-last';
const RECENT_KEY    = 'littlejs-games-recent';
const RECENT_LIMIT  = 8;
const BASE_TITLE    = document.title;
// Honor the user's OS-level "reduce motion" preference for sparkles, starfield,
// dice-roll wait, and CSS animations (handled via @media prefers-reduced-motion).
const reducedMotion = matchMedia('(prefers-reduced-motion: reduce)').matches;

const sidebarLogoWrap = document.getElementById('sidebar-logo-wrap');
const listEl = document.getElementById('list');
const searchEl = document.getElementById('search');
const filterChipsEl = document.getElementById('filter-chips');
const frameEl = document.getElementById('frame');
const welcomeEl = document.getElementById('welcome');
const sourceBtn = document.getElementById('sourceBtn');
const fullscreenBtn = document.getElementById('fullscreenBtn');
const shareBtn = document.getElementById('shareBtn');
// Base URL for the per-game "Source ↗" button — points at the game file on GitHub.
const SOURCE_BASE = 'https://github.com/KilledByAPixel/LittleJS-AI/blob/main/games/';
const MAIN_REPO   = 'https://github.com/KilledByAPixel/LittleJS-AI';

let currentFile = null;
let activeCategory = 'all'; // sidebar filter

// ===================== Sidebar list =====================

// Locale-aware number formatter for high-score badges ("1,234,567").
const numFmt = new Intl.NumberFormat();

// Read a game's high score. Supports both:
//   scoreKey:'somegame.bestField'    → for unmigrated games, reads localStorage[scoreKey] literally
//   scoreKey:'robotron.bestScore'    → tries the literal key first; if absent, walks dotted
//                                       prefixes looking for a key whose JSON payload contains
//                                       the remaining path (here: key 'robotron',
//                                       field 'bestScore')
// Returns a number, or null if missing / unparsable / no scoreKey set.
function getHighScore(g) {
  if (!g.scoreKey) return null;

  // 1) Literal key — the common case for games like robotron.best, tetris.best, etc.
  const literal = localStorage.getItem(g.scoreKey);
  if (literal != null) {
    const n = parseFloat(literal);
    if (!isNaN(n)) return n;
  }

  // 2) Dotted JSON-path fallback — walk prefixes right-to-left until we find
  //    a real localStorage entry whose JSON contains the remaining path.
  const parts = g.scoreKey.split('.');
  for (let i = parts.length - 1; i > 0; i--) {
    const key = parts.slice(0, i).join('.');
    const raw = localStorage.getItem(key);
    if (raw == null) continue;
    let v;
    try { v = JSON.parse(raw); } catch { continue; }
    for (const p of parts.slice(i)) {
      if (v == null || typeof v !== 'object') { v = undefined; break; }
      v = v[p];
    }
    if (typeof v === 'string') {
      const n = parseFloat(v);
      if (!isNaN(n)) return n;
    }
    if (typeof v === 'number') return v;
  }
  return null;
}

// Recently-played history (newest first). Stored as an array of filenames.
function getRecent() {
  try { return JSON.parse(localStorage.getItem(RECENT_KEY)) || []; }
  catch { return []; }
}
function pushRecent(file) {
  const next = [file, ...getRecent().filter(f => f !== file)].slice(0, RECENT_LIMIT);
  localStorage.setItem(RECENT_KEY, JSON.stringify(next));
}

function makeCard(g) {
  const card = document.createElement('div');
  card.className = 'card';
  card.dataset.file = g.file;
  card.innerHTML =
    '<div class="title"><span class="emoji"></span><span class="name"></span></div>' +
    '<div class="body">' +
      '<div class="desc"></div>' +
      '<div class="chips"></div>' +
    '</div>';
  card.querySelector('.emoji').textContent = g.emoji || '';
  card.querySelector('.name').textContent = g.name;
  card.querySelector('.desc').textContent = g.desc;
  // High score badge inside the expanded body, before the description.
  const score = getHighScore(g);
  if (score != null) {
    const body = card.querySelector('.body');
    const badge = document.createElement('div');
    badge.className = 'score-badge';
    badge.textContent = '🏆 ' + numFmt.format(score);
    body.insertBefore(badge, body.firstChild);
  }
  const chipsEl = card.querySelector('.chips');
  for (const t of g.tags) {
    const chip = document.createElement('span');
    chip.className = 'chip';
    chip.textContent = t;
    chipsEl.appendChild(chip);
  }
  card.addEventListener('click', () => selectGame(g.file));
  return card;
}

function renderList() {
  listEl.innerHTML = '';
  const q = searchEl.value.trim().toLowerCase();
  // Two buckets — render regular alphabetically, then a divider, then the
  // under-construction games so they sink to the bottom of the list.
  const regular = [];
  const construction = [];
  for (const g of GAMES) {
    if (activeCategory !== 'all' && g.category !== activeCategory) continue;
    if (q) {
      const hay = (g.name + ' ' + g.desc + ' ' + g.tags.join(' ')).toLowerCase();
      if (!hay.includes(q)) continue;
    }
    (g.category === 'construction' ? construction : regular).push(g);
  }
  const appendCard = g => {
    const card = makeCard(g);
    if (g.file === currentFile) card.classList.add('selected');
    listEl.appendChild(card);
  };
  for (const g of regular) appendCard(g);
  if (regular.length && construction.length) {
    const divider = document.createElement('div');
    divider.className = 'list-divider';
    divider.textContent = '🚧 Under Construction';
    listEl.appendChild(divider);
  }
  for (const g of construction) appendCard(g);
  if (regular.length + construction.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty';
    empty.textContent = 'No games match.';
    listEl.appendChild(empty);
  }
}

// ===================== Filter chips =====================

function buildFilterChips() {
  const all = [{ key:'all', label:'All' }, ...CATEGORIES];
  for (const c of all) {
    const btn = document.createElement('button');
    btn.className = 'chip-filter' + (c.key === 'all' ? ' active' : '');
    btn.dataset.cat = c.key;
    btn.textContent = (c.emoji ? c.emoji + ' ' : '') + c.label;
    // Tint the active state in the category's accent color.
    if (c.color) {
      btn.style.setProperty('--cat-color', c.color);
      btn.style.setProperty('--cat-bg', c.colorBg);
    }
    btn.addEventListener('click', () => {
      activeCategory = c.key;
      for (const el of filterChipsEl.children) {
        el.classList.toggle('active', el.dataset.cat === c.key);
      }
      renderList();
    });
    filterChipsEl.appendChild(btn);
  }
}

function makeTile(g, index) {
  const tile = document.createElement('div');
  tile.className = 'tile';
  tile.innerHTML =
    '<div class="emoji"></div>' +
    '<div class="info">' +
      '<div class="name"></div>' +
      '<div class="desc"></div>' +

    '</div>';
  tile.querySelector('.emoji').textContent = g.emoji || '';
  tile.querySelector('.name').textContent = g.name;
  tile.querySelector('.desc').textContent = g.desc;
  const chipsEl = tile.querySelector('.chips');
  for (const t of g.tags.slice(0, 3)) {
    const chip = document.createElement('span');
    chip.className = 'chip';
    chip.textContent = t;
    chipsEl.appendChild(chip);
  }
  // Color the left stripe + hover border by category.
  const cat = catByKey[g.category];
  if (cat) tile.style.setProperty('--cat-color', cat.color);
  // High-score badge in the top-right corner (skipped when no score saved).
  const score = getHighScore(g);
  if (score != null) {
    const badge = document.createElement('div');
    badge.className = 'score-badge';
    badge.textContent = '🏆 ' + numFmt.format(score);
    const info = tile.querySelector('.info');
    info.insertBefore(badge, info.querySelector('.desc'));
  }
  // Stagger the entrance animation by position; cap so wide rows finish fast.
  if (index != null) tile.style.setProperty('--i', Math.min(index, 12));
  tile.addEventListener('click', () => selectGame(g.file));
  return tile;
}

function buildWelcome() {
  welcomeEl.innerHTML = '';

  // Hero — logo + tagline
  const hero = document.createElement('div');

  welcomeEl.appendChild(hero);

  // Quick actions — Continue + Random
  const quick = document.createElement('div');
  quick.id = 'quick-actions';

  const lastFile = localStorage.getItem(LAST_GAME_KEY);
  const lastGame = lastFile && gameByFile[lastFile];
  if (lastGame) {
    const cont = document.createElement('button');
    cont.className = 'quick-btn primary';
    cont.innerHTML = '<span class="icon">▶</span>Continue<span class="sub">' + lastGame.name + '</span>';
    cont.addEventListener('click', () => selectGame(lastGame.file));
    quick.appendChild(cont);
  }

  const playable = GAMES.filter(g => g.category !== 'test');
  const rand = document.createElement('button');
  rand.className = 'quick-btn';
  rand.innerHTML = '<span class="icon">🎲</span>Random Game';
  rand.addEventListener('click', () => {
    const pick = () => {
      const g = playable[Math.floor(Math.random() * playable.length)];
      selectGame(g.file);
    };
    if (reducedMotion) { pick(); return; }
    const icon = rand.querySelector('.icon');
    // Re-add the class so the animation restarts on subsequent clicks.
    icon.classList.remove('rolling');
    void icon.offsetWidth;
    icon.classList.add('rolling');
    setTimeout(pick, 260);
  });
  quick.appendChild(rand);

  welcomeEl.appendChild(quick);

  // Top Picks (no category — uses neutral accent for the row bar)
  const topGames = GAMES.filter(g => g.top != null).sort((a, b) => a.top - b.top);
  if (topGames.length) {
    welcomeEl.appendChild(buildRow('Top Picks', '⭐', topGames, true, null));
  }

  // Best Scores — only renders if at least one game has a stored high score.
  // Sorted by recency: most-recently-played first, then non-recent games at
  // the bottom (alphabetical for stable ordering).
  const recentFiles = getRecent();
  const scoreEntries = GAMES
    .map(g => ({ game: g, score: getHighScore(g) }))
    .filter(x => x.score != null)
    .sort((a, b) => {
      const ai = recentFiles.indexOf(a.game.file);
      const bi = recentFiles.indexOf(b.game.file);
      if (ai === -1 && bi === -1) return a.game.name.localeCompare(b.game.name);
      if (ai === -1) return 1;
      if (bi === -1) return -1;
      return ai - bi;
    });
  if (scoreEntries.length) {
    welcomeEl.appendChild(buildScoreRow(scoreEntries));
  }

  // Recently Played — only renders once the user has launched at least one
  // game. Sits right under Top Picks (and Best Scores) so it's the first
  // personal section.
  const recentGames = recentFiles.map(f => gameByFile[f]).filter(Boolean);
  if (recentGames.length) {
    welcomeEl.appendChild(buildRow('Recently Played', '🕘', recentGames, false, null));
  }

  // Category rows — each row tints its bar + emoji in the category color.
  for (const cat of CATEGORIES) {
    const games = GAMES.filter(g => g.category === cat.key);
    if (games.length) welcomeEl.appendChild(buildRow(cat.label, cat.emoji, games, false, cat));
  }

  // One-line "about" footer.
  const about = document.createElement('div');
  about.id = 'about';
  about.innerHTML =
    'Built with <a href="https://github.com/KilledByAPixel/LittleJS" target="_blank" rel="noopener">LittleJS</a>' +
    ' — a tiny, fast, open-source HTML5 game engine.';
  welcomeEl.appendChild(about);
}

// Variant of makeTile that swaps the description for a big score number.
// Used only in the "Best Scores" row.
function makeScoreTile(g, score, index) {
  const tile = document.createElement('div');
  tile.className = 'tile score-tile';
  tile.innerHTML =
    '<div class="emoji"></div>' +
    '<div class="info">' +
      '<div class="name"></div>' +
      '<div class="score-big"></div>' +
    '</div>';
  tile.querySelector('.emoji').textContent = g.emoji || '';
  tile.querySelector('.name').textContent = g.name;
  tile.querySelector('.score-big').textContent = numFmt.format(score);
  const cat = catByKey[g.category];
  if (cat) tile.style.setProperty('--cat-color', cat.color);
  if (index != null) tile.style.setProperty('--i', Math.min(index, 12));
  tile.addEventListener('click', () => selectGame(g.file));
  return tile;
}

// Wraps buildRow's structure for the score-tile content, since the standard
// makeTile draws desc + chips rather than a big score line.
function buildScoreRow(entries) {
  // Reuse buildRow by passing a placeholder; we'll replace its tiles below.
  const row = buildRow('Best Scores', '🏆', entries.map(e => e.game), false, null);
  const tiles = row.querySelector('.tiles');
  tiles.innerHTML = '';
  entries.forEach((e, i) => tiles.appendChild(makeScoreTile(e.game, e.score, i)));
  return row;
}

function buildRow(label, rowEmoji, games, isTop, cat) {
  const row = document.createElement('section');
  row.className = 'row' + (isTop ? ' row-top' : '');
  // Color the row's accent bar (and the row emoji's glow) by category.
  if (cat) row.style.setProperty('--cat-color', cat.color);

  const h2 = document.createElement('h2');
  h2.innerHTML =
    '<span class="row-bar"></span>' +
    (rowEmoji ? '<span class="row-emoji">' + rowEmoji + '</span>' : '') +
    '<span class="row-label"></span>';
  h2.querySelector('.row-label').textContent = label;
  row.appendChild(h2);

  const wrap = document.createElement('div');
  wrap.className = 'tiles-wrap';
  const tiles = document.createElement('div');
  tiles.className = 'tiles' + (isTop ? ' top' : '');
  for (let i = 0; i < games.length; i++) tiles.appendChild(makeTile(games[i], i));
  wrap.appendChild(tiles);

  const leftBtn = document.createElement('button');
  leftBtn.className = 'edge-scroll left';
  leftBtn.setAttribute('aria-label', 'Scroll left');
  leftBtn.innerHTML = '&#8249;';
  leftBtn.hidden = true;
  leftBtn.addEventListener('click', () => {
    tiles.scrollBy({ left: -tiles.clientWidth * 0.85, behavior: 'smooth' });
  });

  const rightBtn = document.createElement('button');
  rightBtn.className = 'edge-scroll right';
  rightBtn.setAttribute('aria-label', 'Scroll right');
  rightBtn.innerHTML = '&#8250;';
  rightBtn.hidden = true;
  rightBtn.addEventListener('click', () => {
    tiles.scrollBy({ left: tiles.clientWidth * 0.85, behavior: 'smooth' });
  });

  wrap.appendChild(leftBtn);
  wrap.appendChild(rightBtn);
  row.appendChild(wrap);

  const update = () => {
    const atStart = tiles.scrollLeft <= 5;
    const atEnd = tiles.scrollLeft + tiles.clientWidth >= tiles.scrollWidth - 5;
    leftBtn.hidden = atStart;
    rightBtn.hidden = atEnd;
  };
  tiles.addEventListener('scroll', update, { passive: true });
  new ResizeObserver(update).observe(tiles);

  // ---- Click-and-drag to scroll (mouse only — touch keeps native scroll) ----
  // Capture the pointer ONLY after a real drag is detected (>4px). Capturing
  // on pointerdown would redirect the click event from the tile to the row
  // container, so plain clicks would never reach the tile's launch handler.
  let downX = 0, downScroll = 0, pointerId = 0, isDown = false, moved = false;
  tiles.addEventListener('pointerdown', e => {
    if (e.pointerType !== 'mouse' || e.button !== 0) return;
    if (e.target.closest('.edge-scroll')) return; // let arrow clicks work
    isDown = true;
    moved = false;
    downX = e.clientX;
    downScroll = tiles.scrollLeft;
    pointerId = e.pointerId;
  });
  tiles.addEventListener('pointermove', e => {
    if (!isDown) return;
    const dx = e.clientX - downX;
    if (!moved && Math.abs(dx) > 4) {
      moved = true;
      tiles.classList.add('dragging');
      // Only now do we need capture — to keep tracking past the row edges.
      tiles.setPointerCapture(pointerId);
    }
    if (moved) tiles.scrollLeft = downScroll - dx;
  });
  const endDrag = e => {
    if (!isDown) return;
    isDown = false;
    tiles.classList.remove('dragging');
    if (tiles.hasPointerCapture(e.pointerId)) tiles.releasePointerCapture(e.pointerId);
  };
  tiles.addEventListener('pointerup', endDrag);
  tiles.addEventListener('pointercancel', endDrag);
  // Suppress the click that follows a real drag so tiles don't launch.
  tiles.addEventListener('click', e => {
    if (moved) { e.stopPropagation(); e.preventDefault(); moved = false; }
  }, true);

  return row;
}

// ===================== Stage state =====================

// Navigate the iframe without polluting the browser's session history.
// Setting iframe.src adds an entry the user has to back out of (the symptom:
// browser back navigates the iframe to about:blank instead of returning to
// the library). location.replace() does the same load, no history entry.
function loadIframe(url) {
  if (frameEl.contentWindow) frameEl.contentWindow.location.replace(url);
  else frameEl.src = url;
}

function showWelcome(pushHistory = true) {
  const wasGame = currentFile !== null;
  currentFile = null;
  document.body.classList.remove('in-game');
  document.title = BASE_TITLE;
  loadIframe('about:blank');
  frameEl.style.display = 'none';
  welcomeEl.style.display = 'block';
  welcomeEl.scrollTop = 0;
  // Source + Fullscreen stay enabled on the welcome screen — Source links to
  // the repo, Fullscreen fullscreens the entire page (sidebar + welcome).
  sourceBtn.href = MAIN_REPO;
  sourceBtn.title = 'View the LittleJS-AI repo on GitHub';
  fullscreenBtn.title = 'Fullscreen the whole page';
  shareBtn.title = 'Share the LittleJS Mini Arcade';
  // Push a history entry only on user-driven game→library transitions,
  // so the browser back button can return to the previously played game.
  const clean = location.pathname + location.search;
  if (location.hash) {
    if (pushHistory && wasGame) history.pushState(null, '', clean);
    else history.replaceState(null, '', clean);
  }
  for (const c of listEl.querySelectorAll('.card')) c.classList.remove('selected');
  buildWelcome(); // refresh continue button in case last-game changed
}

function selectGame(file, pushHistory = true) {
  const g = gameByFile[file];
  if (!g) return;
  const wasLibrary = currentFile === null;
  currentFile = file;
  document.body.classList.add('in-game');
  document.title = g.name + ' · ' + BASE_TITLE;
  pushRecent(file);
  // Cache-bust so edits to a game show up without manual reload.
  loadIframe(file + '?t=' + Date.now());
  frameEl.style.display = 'block';
  welcomeEl.style.display = 'none';
  sourceBtn.href = SOURCE_BASE + file;
  sourceBtn.title = "View this game's source on GitHub";
  fullscreenBtn.title = 'Play this game fullscreen';
  shareBtn.title = 'Share a link to this game';
  localStorage.setItem(LAST_GAME_KEY, file);
  const newHash = '#' + file.replace(/\.html$/, '');
  if (location.hash !== newHash) {
    // Push only on the first library→game step so back returns to library.
    // Between games (game→game) replace, so back doesn't have to walk
    // through every game the user tried.
    if (pushHistory && wasLibrary) history.pushState(null, '', newHash);
    else history.replaceState(null, '', newHash);
  }
  for (const c of listEl.querySelectorAll('.card')) {
    c.classList.toggle('selected', c.dataset.file === file);
  }
}

function loadFromHash() {
  // Called on initial load and on hashchange (back/forward). Don't push more
  // history entries in response to navigation the browser already performed.
  const raw = decodeURIComponent(location.hash.replace(/^#/, ''));
  // Accept either #mario or #mario.html so old bookmarks still work.
  const file = raw && (gameByFile[raw] ? raw : gameByFile[raw + '.html'] ? raw + '.html' : null);
  if (file) selectGame(file, false);
  else showWelcome(false);
}

// ===================== Wire-up =====================

sidebarLogoWrap.addEventListener('click', showWelcome);
searchEl.addEventListener('input', renderList);
window.addEventListener('hashchange', loadFromHash);

// While the sidebar list is scrolling, disable hover effects so cards
// passing under the cursor don't all briefly expand-collapse.
let listScrollTimer;
listEl.addEventListener('scroll', () => {
  listEl.classList.add('scrolling');
  clearTimeout(listScrollTimer);
  listScrollTimer = setTimeout(() => listEl.classList.remove('scrolling'), 150);
}, { passive: true });
fullscreenBtn.addEventListener('click', () => {
  if (currentFile) {
    // Game loaded → fullscreen the iframe. No toggle here; games have their
    // own controls and the user can press Escape to exit anyway.
    if (frameEl.requestFullscreen) frameEl.requestFullscreen();
  } else {
    // Library view → toggle the whole page in/out of fullscreen.
    if (document.fullscreenElement) document.exitFullscreen();
    else if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
  }
});

// Share — uses the native share sheet on mobile/Safari, falls back to copying
// the URL to the clipboard with a brief "Copied!" label swap.
shareBtn.addEventListener('click', async () => {
  const url = location.href;
  const title = currentFile
    ? (gameByFile[currentFile].name + ' · LittleJS Mini Arcade')
    : 'LittleJS Mini Arcade';
  if (navigator.share) {
    try { await navigator.share({ title, url }); return; }
    catch (e) { if (e && e.name === 'AbortError') return; /* else fall through */ }
  }
  try {
    await navigator.clipboard.writeText(url);
    const orig = shareBtn.textContent;
    shareBtn.textContent = 'Copied!';
    setTimeout(() => { shareBtn.textContent = orig; }, 1200);
  } catch {
    prompt('Copy this URL:', url);
  }
});

// ===================== Mobile drawer toggle =====================
const sidebarEl = document.getElementById('sidebar');
const hamburgerBtn = document.getElementById('hamburger');
const backdropEl = document.getElementById('backdrop');

function setDrawer(open) {
  sidebarEl.classList.toggle('open', open);
  backdropEl.classList.toggle('show', open);
  // Hide the toggle button while the drawer covers its position.
  hamburgerBtn.classList.toggle('hidden', open);
  refreshFade();
}
// Fade the hamburger to 25% after 3s of no interaction so it stops obscuring
// game UI underneath. Any pointer interaction with it resets the timer.
let fadeTimer;
function refreshFade() {
  clearTimeout(fadeTimer);
  hamburgerBtn.classList.remove('faded');
  if (sidebarEl.classList.contains('open')) return;
  fadeTimer = setTimeout(() => hamburgerBtn.classList.add('faded'), 3000);
}
hamburgerBtn.addEventListener('pointerdown', refreshFade);
hamburgerBtn.addEventListener('pointerenter', refreshFade);
hamburgerBtn.addEventListener('click', () => setDrawer(!sidebarEl.classList.contains('open')));
backdropEl.addEventListener('click', () => setDrawer(false));
// Tapping anything that switches view (a sidebar game card, the home logo)
// should also close the drawer so the user lands cleanly on their pick.
listEl.addEventListener('click', e => { if (e.target.closest('.card')) setDrawer(false); });
sidebarLogoWrap.addEventListener('click', () => setDrawer(false));
refreshFade(); // start the initial fade timer

document.addEventListener('keydown', e => {
  if (document.activeElement === searchEl && e.key !== 'Escape') return;
  const cards = Array.from(listEl.querySelectorAll('.card'));
  if (e.key === 'ArrowDown' && cards.length) {
    e.preventDefault();
    const idx = cards.findIndex(c => c.classList.contains('selected'));
    const newIdx = Math.min(cards.length - 1, idx + 1);
    // Skip if already at the last card — otherwise selectGame would re-launch
    // the same file and look like a reload.
    if (newIdx === idx) return;
    const next = cards[newIdx];
    selectGame(next.dataset.file);
    next.scrollIntoView({ block:'nearest' });
  } else if (e.key === 'ArrowUp' && cards.length) {
    e.preventDefault();
    const idx = cards.findIndex(c => c.classList.contains('selected'));
    const newIdx = Math.max(0, idx - 1);
    if (newIdx === idx) return;
    const prev = cards[newIdx];
    selectGame(prev.dataset.file);
    prev.scrollIntoView({ block:'nearest' });
  } else if (e.key === '/' && document.activeElement !== searchEl) {
    e.preventDefault();
    searchEl.focus();
    searchEl.select();
  } else if (e.key === 'Escape' && document.activeElement === searchEl) {
    searchEl.value = '';
    renderList();
    searchEl.blur();
  }
});

// ===================== Ambient effects (starfield + logo sparkles) =====================

function setupStarfield() {
  if (reducedMotion) return;
  const canvas = document.createElement('canvas');
  canvas.id = 'starfield';
  const stage = document.getElementById('stage');
  stage.insertBefore(canvas, welcomeEl);
  const ctx = canvas.getContext('2d');
  const stars = Array.from({ length: 80 }, () => ({
    x: Math.random(),
    y: Math.random(),
    z: 0.3 + Math.random() * 0.7,         // brightness + size
    vy: -(0.0002 + Math.random() * 0.0006), // upward drift (perceptible)
  }));
  // Read the STAGE dimensions, not the canvas — the canvas's own clientWidth
  // can be 0 before its first layout, which previously left the drawing
  // buffer at the default 300×150 and squashed stars into the top-left.
  const resize = () => {
    canvas.width = stage.clientWidth;
    canvas.height = stage.clientHeight;
  };
  resize();
  new ResizeObserver(resize).observe(stage);

  function frame() {
    const w = canvas.width, h = canvas.height;
    ctx.clearRect(0, 0, w, h);
    if (currentFile === null) {
      for (const s of stars) {
        s.y += s.vy;
        if (s.y < -0.05) { s.y = 1.05; s.x = Math.random(); }
        ctx.globalAlpha = s.z * 0.55;
        const size = Math.max(1, Math.round(s.z * 2.4));
        ctx.fillStyle = '#fff';
        ctx.fillRect(s.x * w, s.y * h, size, size);
      }
      ctx.globalAlpha = 1;
    }
    requestAnimationFrame(frame);
  }
  frame();
}

function setupSparkles() {
  if (reducedMotion) return;
  // Small white rotating square that rises off the logo. ~1.5/sec while
  // welcome is up; capped variation in size + a touch of horizontal jitter
  // so they don't look like a regular grid.
  setInterval(() => {
    if (currentFile !== null) return;
    const logo = document.getElementById('welcome-logo');
    if (!logo) return;
    const logoRect = logo.getBoundingClientRect();
    const welcomeRect = welcomeEl.getBoundingClientRect();

    const sparkle = document.createElement('div');
    sparkle.className = 'sparkle';
    // Spawn anywhere along the bottom edge of the logo so they "lift off".
    const x = logoRect.left - welcomeRect.left + welcomeEl.scrollLeft
              + Math.random() * logoRect.width;
    const y = logoRect.top  - welcomeRect.top  + welcomeEl.scrollTop
              + logoRect.height * (0.7 + Math.random() * 0.3);
    const size = 4 + Math.random() * 5;
    sparkle.style.left = x + 'px';
    sparkle.style.top  = y + 'px';
    sparkle.style.width  = size + 'px';
    sparkle.style.height = size + 'px';
    welcomeEl.appendChild(sparkle);
    sparkle.addEventListener('animationend', () => sparkle.remove());
  }, 650);
}

buildFilterChips();
renderList();
loadFromHash();
setupStarfield();
setupSparkles();
