<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>LittleJS Games</title>
<link rel="icon" href="logo.png">
<style>
  :root {
    --bg: #0b0e14;
    --bg-2: #0e1320;
    --panel: #141a26;
    --panel-2: #1c2332;
    --border: #252e40;
    --text: #e6edf3;
    --muted: #8b949e;
    --accent: #58a6ff;
    --accent-2: #ff7eb6;
    --accent-bg: #1a2f4d;
    --chip-bg: #232b3c;
    --chip-text: #adbac7;

    /* Per-category accent + translucent fill, applied via --cat-color / --cat-bg
       CSS vars set on chips/tiles/row headers at build time. */
    --cat-arcade:  #58a6ff;   --cat-arcade-bg:  rgba(88,166,255,.18);
    --cat-shooter: #ff7eb6;   --cat-shooter-bg: rgba(255,126,182,.18);
    --cat-puzzle:  #bb86fc;   --cat-puzzle-bg:  rgba(187,134,252,.18);
    --cat-board:   #f7c948;   --cat-board-bg:   rgba(247,201,72,.18);
    --cat-sports:  #4ade80;   --cat-sports-bg:  rgba(74,222,128,.18);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
  body {
    background: var(--bg);
    color: var(--text);
    font: 14px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    display: flex;
  }
  button { font: inherit; color: inherit; cursor: pointer; }

  /* ===================== Sidebar ===================== */
  #sidebar {
    width: 300px;
    flex: 0 0 300px;
    background: var(--panel);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  #sidebar-header { padding: 14px 14px 10px; border-bottom: 1px solid var(--border); }

  /* Sidebar logo — clickable "home" button */
  #sidebar-logo-wrap {
    display: flex;
    justify-content: center;
    margin-bottom: 12px;
    cursor: pointer;
  }
  #sidebar-logo {
    height: 64px;
    width: auto;
    filter: drop-shadow(0 0 12px rgba(88, 166, 255, .35));
    transition: transform .15s, filter .15s;
    animation: splat .55s cubic-bezier(.34, 1.56, .64, 1);
  }
  #sidebar-logo-wrap:hover #sidebar-logo {
    transform: scale(1.05);
    filter: drop-shadow(0 0 18px rgba(255, 126, 182, .55));
  }

  #search {
    width: 100%;
    padding: 7px 10px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font: inherit;
    outline: none;
  }
  #search:focus { border-color: var(--accent); }

  #filter-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-top: 10px;
  }
  .chip-filter {
    background: var(--chip-bg);
    color: var(--chip-text);
    border: 1px solid transparent;
    padding: 3px 9px;
    border-radius: 11px;
    font-size: 11px;
    text-transform: lowercase;
    letter-spacing: .3px;
    transition: background .1s, color .1s, border-color .1s;
  }
  .chip-filter:hover { background: var(--panel-2); color: var(--text); }
  .chip-filter.active {
    background: var(--cat-bg, var(--accent-bg));
    color: var(--text);
    border-color: var(--cat-color, var(--accent));
  }

  #list { flex: 1; overflow-y: auto; padding: 6px 0; }
  #list::-webkit-scrollbar { width: 10px; }
  #list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 5px; }

  .card {
    padding: 8px 14px;
    border-left: 3px solid transparent;
    cursor: pointer;
    user-select: none;
    transition: background .08s;
  }
  .card:hover { background: var(--panel-2); }
  .card.selected {
    background: var(--accent-bg);
    border-left-color: var(--accent);
  }
  .card .title {
    font-weight: 500;
    font-size: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card .title .emoji { font-size: 18px; line-height: 1; flex: 0 0 auto; }
  .card .title .name { flex: 1; min-width: 0; }
  .card .body {
    max-height: 0;
    overflow: hidden;
    opacity: 0;
    transition: max-height .15s, opacity .15s, margin-top .15s;
  }
  .card:hover .body, .card.selected .body {
    max-height: 200px;
    opacity: 1;
    margin-top: 6px;
  }
  .card .desc { color: var(--muted); font-size: 12.5px; margin-bottom: 6px; }
  .chips { display: flex; flex-wrap: wrap; gap: 4px; }
  .chip {
    background: var(--chip-bg);
    color: var(--chip-text);
    padding: 1px 7px;
    border-radius: 10px;
    font-size: 10.5px;
    text-transform: lowercase;
    letter-spacing: .3px;
  }
  .empty { padding: 20px 16px; color: var(--muted); font-size: 13px; text-align: center; }

  /* Sidebar footer — controls live here so they never overlap the game */
  #sidebar-footer {
    padding: 10px 14px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 6px;
  }
  #sidebar-footer .btn {
    flex: 1;
    text-align: center;
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 7px 10px;
    border-radius: 6px;
    font-size: 12px;
    text-decoration: none;
    transition: background .1s, border-color .1s, opacity .1s;
  }
  #sidebar-footer .btn:hover:not(.disabled) {
    background: var(--accent-bg);
    border-color: var(--accent);
  }
  #sidebar-footer .btn.disabled { opacity: .35; cursor: not-allowed; pointer-events: none; }

  /* ===================== Stage ===================== */
  #stage { flex: 1; position: relative; background: #000; overflow: hidden; }
  #frame { width: 100%; height: 100%; border: 0; display: block; }

  /* ===================== Welcome screen ===================== */
  #welcome {
    position: absolute;
    inset: 0;
    overflow-y: auto;
    background:
      radial-gradient(ellipse at 50% 0%, rgba(88, 166, 255, .12) 0%, transparent 55%),
      radial-gradient(ellipse at 80% 100%, rgba(255, 126, 182, .08) 0%, transparent 50%),
      linear-gradient(180deg, var(--bg-2) 0%, var(--bg) 100%);
    padding: 40px 48px 60px;
  }
  #welcome::-webkit-scrollbar { width: 10px; }
  #welcome::-webkit-scrollbar-thumb { background: var(--border); border-radius: 5px; }

  #welcome-hero {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 32px;
  }
  #welcome-logo {
    width: min(220px, 30vw);
    height: auto;
    filter: drop-shadow(0 8px 28px rgba(88, 166, 255, .45))
            drop-shadow(0 0 40px rgba(255, 126, 182, .2));
    animation: splat .7s cubic-bezier(.34, 1.56, .64, 1),
               float 5s ease-in-out infinite 1s;
  }
  #welcome-tagline {
    margin-top: 14px;
    color: var(--muted);
    font-size: 14px;
    letter-spacing: .5px;
  }

  #quick-actions {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin-bottom: 36px;
    flex-wrap: wrap;
  }
  .quick-btn {
    background: linear-gradient(135deg, var(--accent-bg), var(--panel));
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 22px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 500;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    transition: transform .12s, border-color .12s, box-shadow .12s;
  }
  .quick-btn:hover {
    transform: translateY(-2px);
    border-color: var(--accent);
    box-shadow: 0 6px 20px rgba(88, 166, 255, .25);
  }
  .quick-btn.primary {
    background: linear-gradient(135deg, var(--accent), #2978d3);
    border-color: var(--accent);
  }
  .quick-btn.primary:hover {
    box-shadow: 0 6px 24px rgba(88, 166, 255, .5);
  }
  .quick-btn .icon { font-size: 16px; }
  .quick-btn .sub {
    color: rgba(255, 255, 255, .7);
    font-size: 12px;
    margin-left: 4px;
  }

  .row { margin-bottom: 32px; max-width: 100%; }
  .row h2 {
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--muted);
    margin: 0 0 12px;
    padding-left: 4px;
  }
  .row .tiles {
    display: flex;
    gap: 14px;
    overflow-x: auto;
    overflow-y: hidden;
    padding: 12px 4px 14px;     /* top padding gives hover-lift room */
    cursor: grab;
  }
  .row .tiles.dragging { cursor: grabbing; }
  .row .tiles.dragging .tile { pointer-events: none; }

  /* Row header — small colored bar + category emoji */
  .row h2 .row-bar {
    display: inline-block;
    width: 4px;
    height: 14px;
    margin-right: 8px;
    vertical-align: -2px;
    border-radius: 2px;
    background: var(--cat-color, var(--accent));
  }
  .row h2 .row-emoji {
    margin-right: 6px;
    filter: drop-shadow(0 0 6px var(--cat-color, var(--accent)));
  }
  .row .tiles::-webkit-scrollbar { height: 8px; }
  .row .tiles::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* Tiles wrapper hosts the edge scroll buttons */
  .tiles-wrap { position: relative; }

  /* Edge buttons — full-height columns at left/right that combine the
     fade gradient and the click target. Chevron sits inside the fade. */
  .edge-scroll {
    position: absolute;
    top: 0;
    bottom: 12px;               /* clear the horizontal scrollbar */
    width: 64px;
    border: 0;
    padding: 0 14px;
    display: flex;
    align-items: center;
    font-size: 30px;
    line-height: 1;
    color: var(--text);
    opacity: .55;
    z-index: 2;
    transition: opacity .15s;
    text-shadow: 0 0 6px var(--bg), 0 0 12px var(--bg);
  }
  .edge-scroll:hover { opacity: 1; }
  .edge-scroll[hidden] { display: none; }
  .edge-scroll.left {
    left: 0;
    background: linear-gradient(to right, var(--bg) 25%, transparent);
    justify-content: flex-start;
  }
  .edge-scroll.right {
    right: 0;
    background: linear-gradient(to left, var(--bg) 25%, transparent);
    justify-content: flex-end;
  }

  .tile {
    flex: 0 0 auto;
    position: relative;
    background: linear-gradient(135deg, var(--panel) 0%, var(--panel-2) 100%);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    padding-left: 18px;            /* room for the category color stripe */
    cursor: pointer;
    overflow: hidden;
    transition: transform .15s, border-color .15s, box-shadow .15s;
    display: flex;
    gap: 12px;
  }
  /* Category color stripe down the left edge */
  .tile::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 4px;
    background: var(--cat-color, var(--border));
  }
  .tile:hover {
    transform: translateY(-4px) scale(1.02);
    border-color: var(--cat-color, var(--accent));
    box-shadow: 0 10px 28px rgba(0, 0, 0, .45),
                0 0 0 1px var(--cat-color, rgba(88, 166, 255, .3));
  }
  .tile .emoji {
    font-size: 32px;
    line-height: 1;
    flex: 0 0 auto;
    filter: drop-shadow(0 2px 6px rgba(0, 0, 0, .5));
  }
  .tile .info {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
  }
  .tile .name { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
  .tile .desc {
    color: var(--muted);
    font-size: 12px;
    line-height: 1.35;
    flex: 1;
  }
  .tile .chips { margin-top: 8px; }
  .tiles.top .tile .emoji { font-size: 44px; }

  /* Top picks — larger tiles with a gradient face */
  .tiles.top .tile {
    width: 220px;
    min-height: 140px;
    background: linear-gradient(135deg, #1a2f4d 0%, #2d1a3e 100%);
    border-color: #3a4862;
  }
  .tiles.top .tile .name { font-size: 16px; }
  .tiles.top .tile .desc { font-size: 12.5px; }

  /* Standard category tiles */
  .row:not(.row-top) .tile { width: 170px; min-height: 100px; }
  .row:not(.row-top) .tile .desc {
    display: -webkit-box;
    -webkit-line-clamp: 2;
    line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  @keyframes splat {
    0%   { transform: scale(0) rotate(-6deg); opacity: 0; }
    60%  { transform: scale(1.12) rotate(2deg); opacity: 1; }
    100% { transform: scale(1) rotate(0); }
  }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-8px); }
  }
</style>
</head>
<body>

<aside id="sidebar">
  <div id="sidebar-header">
    <div id="sidebar-logo-wrap" title="Back to library">
      <img id="sidebar-logo" src="logo.png" alt="LittleJS">
    </div>
    <input id="search" type="text" placeholder="Search..." autocomplete="off" spellcheck="false">
    <div id="filter-chips"></div>
  </div>
  <div id="list"></div>
  <div id="sidebar-footer">
    <button class="btn disabled" id="reloadBtn" title="Reload the current game">Reload</button>
    <button class="btn disabled" id="fullscreenBtn" title="Play fullscreen">Full ⛶</button>
    <a class="btn disabled" id="openBtn" target="_blank" rel="noopener" title="Open in a new tab">Open ↗</a>
  </div>
</aside>

<main id="stage">
  <div id="welcome"></div>
  <iframe id="frame" allow="autoplay; gamepad; fullscreen" style="display:none;"></iframe>
</main>

<script>
'use strict';

// category: row grouping in the welcome screen (one per game).
// emoji:    single grapheme used as "boxart" on tiles + sidebar cards.
// tags:     descriptive chips on the card.
// top:      1..N — appears in the "Top Picks" row at that rank. Unset = not featured.
const GAMES = [
  { file:'2048.html',           name:'2048', emoji:'🔢',            category:'puzzle',  desc:'Slide numbered tiles to combine matching pairs.',          tags:['puzzle','grid'] },
  { file:'asteroids.html',      name:'Asteroids', emoji:'🌑',       category:'shooter', desc:'Rotate-and-thrust shooter — blast drifting space rocks.', tags:['arcade','shooter'], top:10 },
  { file:'baseball.html',       name:'Baseball', emoji:'⚾',        category:'sports',  desc:'Pitch, swing, and run the bases.',                         tags:['sports'] },
  { file:'basketball.html',     name:'Pop-a-Shot', emoji:'🏀',      category:'sports',  desc:'Sink as many shots as you can before the clock runs out.', tags:['sports','arcade'] },
  { file:'breakout.html',       name:'Breakout', emoji:'🧱',        category:'arcade',  desc:'Bounce a ball off a paddle to clear bricks.',              tags:['arcade','paddle'] },
  { file:'captureGo.html',      name:'Capture Go', emoji:'⚫',      category:'board',   desc:'Simplified Go — capture stones by surrounding them.',      tags:['board','strategy'] },
  { file:'centipede.html',      name:'Centipede', emoji:'🐛',       category:'shooter', desc:'Shoot the descending centipede before it reaches you.',    tags:['arcade','shooter'] },
  { file:'checkers.html',       name:'Checkers', emoji:'🔴',        category:'board',   desc:'Classic 8×8 jump-to-capture board game.',                  tags:['board','strategy'] },
  { file:'chess.html',          name:'Chess', emoji:'♟️',           category:'board',   desc:'Two-player chess with full standard rules.',               tags:['board','strategy'] },
  { file:'columns.html',        name:'Columns', emoji:'💎',         category:'puzzle',  desc:'Match three jewels by rotating falling columns.',          tags:['puzzle','falling'] },
  { file:'combat.html',         name:'Combat', emoji:'🪖',          category:'arcade',  desc:'Two-player tank duels.',                                   tags:['arcade','multiplayer'] },
  { file:'connect4.html',       name:'Connect 4', emoji:'🟡',       category:'board',   desc:'Drop discs to line up four in a row.',                     tags:['board','strategy'] },
  { file:'defender.html',       name:'Defender', emoji:'🛸',        category:'shooter', desc:'Side-scrolling shooter — protect humans from aliens.',     tags:['arcade','shooter'] },
  { file:'drMario.html',        name:'Dr. Mario', emoji:'💊',       category:'puzzle',  desc:'Match falling pills with viruses to clear them.',          tags:['puzzle','falling'] },
  { file:'flappyBird.html',     name:'Flappy Bird', emoji:'🐦',     category:'arcade',  desc:'Tap to flap through pipe gaps.',                           tags:['arcade','one-button'] },
  { file:'frogger.html',        name:'Frogger', emoji:'🐸',         category:'arcade',  desc:'Hop across traffic and rivers to safety.',                 tags:['arcade'], top:5},
  { file:'geometryDash.html',   name:'Geometry Dash', emoji:'🔺',   category:'arcade',  desc:'Rhythm-jump through spike obstacles.',                     tags:['arcade','runner'] },
  { file:'gradius.html',        name:'Gradius', emoji:'🚀',         category:'shooter', desc:'Power up your ship and blast through horizontal levels.',  tags:['shooter','scrolling'] },
  { file:'jetpackDash.html',    name:'Jetpack Dash', emoji:'🪂',    category:'arcade',  desc:'Boost upward to dodge hazards.',                           tags:['arcade','runner'] },
  { file:'joust.html',          name:'Joust', emoji:'🦅',           category:'arcade',  desc:'Flap-jump knight combat — outheight your enemy.',          tags:['arcade'] },
  { file:'kaboom.html',         name:'Kaboom', emoji:'💣',          category:'arcade',  desc:'Catch bombs dropped by a mad bomber.',                     tags:['arcade','paddle'] },
  { file:'lunarLander.html',    name:'Lunar Lander', emoji:'🌙',    category:'arcade',  desc:'Burn fuel to touch down softly.',                          tags:['physics','arcade'] },
  { file:'match3.html',         name:'Match 3', emoji:'💠',         category:'puzzle',  desc:'Swap adjacent gems to make matches of three.',             tags:['puzzle','grid'] },
  { file:'microRacer.html',     name:'Micro Racer', emoji:'🏎️',     category:'arcade',  desc:'Top-down racing on a tight track.',                        tags:['racing'] },
  { file:'minesweeper.html',    name:'Minesweeper', emoji:'🚩',     category:'puzzle',  desc:'Reveal cells without hitting a mine.',                     tags:['puzzle','grid'] },
  { file:'miniGolf.html',       name:'Mini Golf', emoji:'⛳',       category:'sports',  desc:'Aim and putt across miniature courses.',                   tags:['sports','physics'] },
  { file:'missileCommand.html', name:'Missile Command', emoji:'🎯', category:'shooter', desc:'Defend cities from incoming nukes.',                       tags:['arcade','shooter'], top:1 },
  { file:'moonPatrol.html',     name:'Moon Patrol', emoji:'🌝',     category:'arcade',  desc:'Side-scrolling moon buggy — jump craters, shoot enemies.', tags:['arcade','scrolling'] },
  { file:'mrDriller.html',      name:'Mr. Driller', emoji:'⛏️',     category:'puzzle',  desc:'Drill down through colored blocks while managing air.',    tags:['puzzle','action'] },
  { file:'orbitswarm.html',     name:'OrbitSwarm', emoji:'🌀',      category:'shooter', desc:'Orbit a star and shoot the incoming swarm.',               tags:['arcade','shooter'] },
  { file:'othello.html',        name:'Othello', emoji:'⚪',         category:'board',   desc:'Flank to flip — capture the most stones.',                 tags:['board','strategy'] },
  { file:'pacman.html',         name:'Pac-Man', emoji:'👻',         category:'arcade',  desc:'Eat dots and dodge ghosts in a maze.',                     tags:['arcade','maze'], top:4 },
  { file:'peggle.html',         name:'Peggle', emoji:'🟣',          category:'puzzle',  desc:'Aim balls at pegs to clear the board.',                    tags:['physics','puzzle'] },
  { file:'pinball.html',        name:'Pinball', emoji:'🪩',         category:'arcade',  desc:'Launch a ball, hit the flippers, chase the score.',        tags:['physics','arcade']},
  { file:'plinko.html',         name:'Plinko', emoji:'🪙',          category:'puzzle',  desc:'Drop chips down a peg field for prizes.',                  tags:['physics','arcade'] },
  { file:'polePosition.html',   name:'Pole Position', emoji:'🏁',   category:'arcade',  desc:'Pseudo-3D racing — steer through the curves.',             tags:['racing'] },
  { file:'pong.html',           name:'Pong', emoji:'🏓',            category:'arcade',  desc:'Two-paddle bounce, first to score wins.',                  tags:['arcade','paddle'] },
  { file:'pool.html',           name:'Pool', emoji:'🎱',            category:'sports',  desc:'8-ball pool with cue physics.',                            tags:['sports','physics'], top:5 },
  { file:'puzzleFighter.html',  name:'Puzzle Fighter', emoji:'💢',  category:'puzzle',  desc:'Stack falling gems to build chain combos.',                tags:['puzzle','falling'] },
  { file:'riverRaid.html',      name:'River Raid', emoji:'✈️',      category:'shooter', desc:'Vertical-scrolling river shooter — watch your fuel.',      tags:['shooter','scrolling'] },
  { file:'robotron.html',       name:'Robotron', emoji:'🤖',        category:'shooter', desc:'Twin-stick shooter — save the humans.',                    tags:['arcade','shooter','twin-stick'], top:3 },
  { file:'skiing.html',         name:'Skiing', emoji:'⛷️',          category:'arcade',  desc:'Slalom through gates downhill.',                           tags:['arcade','racing'] },
  { file:'snake.html',          name:'Snake', emoji:'🐍',           category:'arcade',  desc:'Eat to grow, don’t crash into yourself.',             tags:['arcade','grid'] },
  { file:'snood.html',          name:'Snood', emoji:'🎈',           category:'puzzle',  desc:'Aim and shoot snoods to clear the board.',                 tags:['puzzle','physics'] },
  { file:'sokoban.html',        name:'Sokoban', emoji:'📦',         category:'puzzle',  desc:'Push boxes onto target squares.',                          tags:['puzzle','grid'] },
  { file:'spaceInvaders.html',  name:'Space Invaders', emoji:'👾',  category:'shooter', desc:'Shoot descending alien formations.',                       tags:['arcade','shooter'], top:10 },
  { file:'spyhunter.html',      name:'Spy Hunter', emoji:'🕵️',      category:'arcade',  desc:'Top-down driving with car combat.',                        tags:['arcade','driving'] },
  { file:'tetris.html',         name:'Tetris', emoji:'🟦',          category:'puzzle',  desc:'Stack falling tetrominoes to clear lines.',                tags:['puzzle','falling'], top:10 },
];

GAMES.sort((a, b) => a.name.localeCompare(b.name));
const gameByFile = Object.fromEntries(GAMES.map(g => [g.file, g]));

// Display name, emoji, and accent color (referencing CSS vars) per category.
// Used for row headers, filter chips, and tile color stripes.
const CATEGORIES = [
  { key:'arcade',  label:'Arcade',  emoji:'🕹️', color:'var(--cat-arcade)',  colorBg:'var(--cat-arcade-bg)'  },
  { key:'shooter', label:'Shooter', emoji:'💥', color:'var(--cat-shooter)', colorBg:'var(--cat-shooter-bg)' },
  { key:'puzzle',  label:'Puzzle',  emoji:'🧩', color:'var(--cat-puzzle)',  colorBg:'var(--cat-puzzle-bg)'  },
  { key:'board',   label:'Board',   emoji:'🎲', color:'var(--cat-board)',   colorBg:'var(--cat-board-bg)'   },
  { key:'sports',  label:'Sports',  emoji:'⚽', color:'var(--cat-sports)',  colorBg:'var(--cat-sports-bg)'  },
];
const catByKey = Object.fromEntries(CATEGORIES.map(c => [c.key, c]));
const LAST_GAME_KEY = 'littlejs-games-last';

const sidebarLogoWrap = document.getElementById('sidebar-logo-wrap');
const listEl = document.getElementById('list');
const searchEl = document.getElementById('search');
const filterChipsEl = document.getElementById('filter-chips');
const frameEl = document.getElementById('frame');
const welcomeEl = document.getElementById('welcome');
const reloadBtn = document.getElementById('reloadBtn');
const fullscreenBtn = document.getElementById('fullscreenBtn');
const openBtn = document.getElementById('openBtn');

let currentFile = null;
let activeCategory = 'all'; // sidebar filter

// ===================== Sidebar list =====================

function makeCard(g) {
  const card = document.createElement('div');
  card.className = 'card';
  card.dataset.file = g.file;
  card.innerHTML =
    '<div class="title"><span class="emoji"></span><span class="name"></span></div>' +
    '<div class="body">' +
      '<div class="desc"></div>' +
      '<div class="chips"></div>' +
    '</div>';
  card.querySelector('.emoji').textContent = g.emoji || '';
  card.querySelector('.name').textContent = g.name;
  card.querySelector('.desc').textContent = g.desc;
  const chipsEl = card.querySelector('.chips');
  for (const t of g.tags) {
    const chip = document.createElement('span');
    chip.className = 'chip';
    chip.textContent = t;
    chipsEl.appendChild(chip);
  }
  card.addEventListener('click', () => selectGame(g.file));
  return card;
}

function renderList() {
  listEl.innerHTML = '';
  const q = searchEl.value.trim().toLowerCase();
  let shown = 0;
  for (const g of GAMES) {
    if (activeCategory !== 'all' && g.category !== activeCategory) continue;
    if (q) {
      const hay = (g.name + ' ' + g.desc + ' ' + g.tags.join(' ')).toLowerCase();
      if (!hay.includes(q)) continue;
    }
    const card = makeCard(g);
    if (g.file === currentFile) card.classList.add('selected');
    listEl.appendChild(card);
    shown++;
  }
  if (shown === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty';
    empty.textContent = 'No games match.';
    listEl.appendChild(empty);
  }
}

// ===================== Filter chips =====================

function buildFilterChips() {
  const all = [{ key:'all', label:'All' }, ...CATEGORIES];
  for (const c of all) {
    const btn = document.createElement('button');
    btn.className = 'chip-filter' + (c.key === 'all' ? ' active' : '');
    btn.dataset.cat = c.key;
    btn.textContent = (c.emoji ? c.emoji + ' ' : '') + c.label;
    // Tint the active state in the category's accent color.
    if (c.color) {
      btn.style.setProperty('--cat-color', c.color);
      btn.style.setProperty('--cat-bg', c.colorBg);
    }
    btn.addEventListener('click', () => {
      activeCategory = c.key;
      for (const el of filterChipsEl.children) {
        el.classList.toggle('active', el.dataset.cat === c.key);
      }
      renderList();
    });
    filterChipsEl.appendChild(btn);
  }
}

// ===================== Welcome screen =====================

function makeTile(g) {
  const tile = document.createElement('div');
  tile.className = 'tile';
  tile.innerHTML =
    '<div class="emoji"></div>' +
    '<div class="info">' +
      '<div class="name"></div>' +
      '<div class="desc"></div>' +
      '<div class="chips"></div>' +
    '</div>';
  tile.querySelector('.emoji').textContent = g.emoji || '';
  tile.querySelector('.name').textContent = g.name;
  tile.querySelector('.desc').textContent = g.desc;
  const chipsEl = tile.querySelector('.chips');
  for (const t of g.tags.slice(0, 3)) {
    const chip = document.createElement('span');
    chip.className = 'chip';
    chip.textContent = t;
    chipsEl.appendChild(chip);
  }
  // Color the left stripe + hover border by category.
  const cat = catByKey[g.category];
  if (cat) tile.style.setProperty('--cat-color', cat.color);
  tile.addEventListener('click', () => selectGame(g.file));
  return tile;
}

function buildWelcome() {
  welcomeEl.innerHTML = '';

  // Hero — logo + tagline
  const hero = document.createElement('div');
  hero.id = 'welcome-hero';
  hero.innerHTML =
    '<img id="welcome-logo" src="logo.png" alt="LittleJS">' +
    '<div id="welcome-tagline">' + GAMES.length + ' games · pick one to play</div>';
  welcomeEl.appendChild(hero);

  // Quick actions — Continue + Random
  const quick = document.createElement('div');
  quick.id = 'quick-actions';

  const lastFile = localStorage.getItem(LAST_GAME_KEY);
  const lastGame = lastFile && gameByFile[lastFile];
  if (lastGame) {
    const cont = document.createElement('button');
    cont.className = 'quick-btn primary';
    cont.innerHTML = '<span class="icon">▶</span>Continue<span class="sub">' + lastGame.name + '</span>';
    cont.addEventListener('click', () => selectGame(lastGame.file));
    quick.appendChild(cont);
  }

  const playable = GAMES.filter(g => g.category !== 'test');
  const rand = document.createElement('button');
  rand.className = 'quick-btn';
  rand.innerHTML = '<span class="icon">🎲</span>Random Game';
  rand.addEventListener('click', () => {
    const g = playable[Math.floor(Math.random() * playable.length)];
    selectGame(g.file);
  });
  quick.appendChild(rand);

  welcomeEl.appendChild(quick);

  // Top Picks (no category — uses neutral accent for the row bar)
  const topGames = GAMES.filter(g => g.top != null).sort((a, b) => a.top - b.top);
  if (topGames.length) {
    welcomeEl.appendChild(buildRow('Top Picks', '⭐', topGames, true, null));
  }

  // Category rows — each row tints its bar + emoji in the category color.
  for (const cat of CATEGORIES) {
    const games = GAMES.filter(g => g.category === cat.key);
    if (games.length) welcomeEl.appendChild(buildRow(cat.label, cat.emoji, games, false, cat));
  }
}

function buildRow(label, rowEmoji, games, isTop, cat) {
  const row = document.createElement('section');
  row.className = 'row' + (isTop ? ' row-top' : '');
  // Color the row's accent bar (and the row emoji's glow) by category.
  if (cat) row.style.setProperty('--cat-color', cat.color);

  const h2 = document.createElement('h2');
  h2.innerHTML =
    '<span class="row-bar"></span>' +
    (rowEmoji ? '<span class="row-emoji">' + rowEmoji + '</span>' : '') +
    '<span class="row-label"></span>';
  h2.querySelector('.row-label').textContent = label;
  row.appendChild(h2);

  const wrap = document.createElement('div');
  wrap.className = 'tiles-wrap';
  const tiles = document.createElement('div');
  tiles.className = 'tiles' + (isTop ? ' top' : '');
  for (const g of games) tiles.appendChild(makeTile(g));
  wrap.appendChild(tiles);

  const leftBtn = document.createElement('button');
  leftBtn.className = 'edge-scroll left';
  leftBtn.setAttribute('aria-label', 'Scroll left');
  leftBtn.innerHTML = '&#8249;';
  leftBtn.hidden = true;
  leftBtn.addEventListener('click', () => {
    tiles.scrollBy({ left: -tiles.clientWidth * 0.85, behavior: 'smooth' });
  });

  const rightBtn = document.createElement('button');
  rightBtn.className = 'edge-scroll right';
  rightBtn.setAttribute('aria-label', 'Scroll right');
  rightBtn.innerHTML = '&#8250;';
  rightBtn.hidden = true;
  rightBtn.addEventListener('click', () => {
    tiles.scrollBy({ left: tiles.clientWidth * 0.85, behavior: 'smooth' });
  });

  wrap.appendChild(leftBtn);
  wrap.appendChild(rightBtn);
  row.appendChild(wrap);

  const update = () => {
    const atStart = tiles.scrollLeft <= 5;
    const atEnd = tiles.scrollLeft + tiles.clientWidth >= tiles.scrollWidth - 5;
    leftBtn.hidden = atStart;
    rightBtn.hidden = atEnd;
  };
  tiles.addEventListener('scroll', update, { passive: true });
  new ResizeObserver(update).observe(tiles);

  // ---- Click-and-drag to scroll (mouse only — touch keeps native scroll) ----
  let downX = 0, downScroll = 0, dragging = false, moved = false;
  tiles.addEventListener('pointerdown', e => {
    if (e.pointerType !== 'mouse' || e.button !== 0) return;
    if (e.target.closest('.edge-scroll')) return; // let arrow clicks work
    dragging = true;
    moved = false;
    downX = e.clientX;
    downScroll = tiles.scrollLeft;
    tiles.setPointerCapture(e.pointerId);
  });
  tiles.addEventListener('pointermove', e => {
    if (!dragging) return;
    const dx = e.clientX - downX;
    if (!moved && Math.abs(dx) > 4) {
      moved = true;
      tiles.classList.add('dragging');
    }
    if (moved) tiles.scrollLeft = downScroll - dx;
  });
  const endDrag = e => {
    if (!dragging) return;
    dragging = false;
    tiles.classList.remove('dragging');
    if (tiles.hasPointerCapture(e.pointerId)) tiles.releasePointerCapture(e.pointerId);
  };
  tiles.addEventListener('pointerup', endDrag);
  tiles.addEventListener('pointercancel', endDrag);
  // Suppress the click that follows a real drag so tiles don't launch.
  tiles.addEventListener('click', e => {
    if (moved) { e.stopPropagation(); e.preventDefault(); moved = false; }
  }, true);

  return row;
}

// ===================== Stage state =====================

// Navigate the iframe without polluting the browser's session history.
// Setting iframe.src adds an entry the user has to back out of (the symptom:
// browser back navigates the iframe to about:blank instead of returning to
// the library). location.replace() does the same load, no history entry.
function loadIframe(url) {
  if (frameEl.contentWindow) frameEl.contentWindow.location.replace(url);
  else frameEl.src = url;
}

function showWelcome(pushHistory = true) {
  const wasGame = currentFile !== null;
  currentFile = null;
  loadIframe('about:blank');
  frameEl.style.display = 'none';
  welcomeEl.style.display = 'block';
  welcomeEl.scrollTop = 0;
  reloadBtn.classList.add('disabled');
  fullscreenBtn.classList.add('disabled');
  openBtn.classList.add('disabled');
  openBtn.removeAttribute('href');
  // Push a history entry only on user-driven game→library transitions,
  // so the browser back button can return to the previously played game.
  const clean = location.pathname + location.search;
  if (location.hash) {
    if (pushHistory && wasGame) history.pushState(null, '', clean);
    else history.replaceState(null, '', clean);
  }
  for (const c of listEl.querySelectorAll('.card')) c.classList.remove('selected');
  buildWelcome(); // refresh continue button in case last-game changed
}

function selectGame(file, pushHistory = true) {
  const g = gameByFile[file];
  if (!g) return;
  const wasLibrary = currentFile === null;
  currentFile = file;
  // Cache-bust so edits to a game show up without manual reload.
  loadIframe(file + '?t=' + Date.now());
  frameEl.style.display = 'block';
  welcomeEl.style.display = 'none';
  reloadBtn.classList.remove('disabled');
  fullscreenBtn.classList.remove('disabled');
  openBtn.classList.remove('disabled');
  openBtn.href = file;
  localStorage.setItem(LAST_GAME_KEY, file);
  const newHash = '#' + file.replace(/\.html$/, '');
  if (location.hash !== newHash) {
    // Push only on the first library→game step so back returns to library.
    // Between games (game→game) replace, so back doesn't have to walk
    // through every game the user tried.
    if (pushHistory && wasLibrary) history.pushState(null, '', newHash);
    else history.replaceState(null, '', newHash);
  }
  for (const c of listEl.querySelectorAll('.card')) {
    c.classList.toggle('selected', c.dataset.file === file);
  }
}

function loadFromHash() {
  // Called on initial load and on hashchange (back/forward). Don't push more
  // history entries in response to navigation the browser already performed.
  const raw = decodeURIComponent(location.hash.replace(/^#/, ''));
  // Accept either #mario or #mario.html so old bookmarks still work.
  const file = raw && (gameByFile[raw] ? raw : gameByFile[raw + '.html'] ? raw + '.html' : null);
  if (file) selectGame(file, false);
  else showWelcome(false);
}

// ===================== Wire-up =====================

sidebarLogoWrap.addEventListener('click', showWelcome);
searchEl.addEventListener('input', renderList);
window.addEventListener('hashchange', loadFromHash);
reloadBtn.addEventListener('click', () => {
  if (currentFile) loadIframe(currentFile + '?t=' + Date.now());
});
fullscreenBtn.addEventListener('click', () => {
  if (currentFile && frameEl.requestFullscreen) frameEl.requestFullscreen();
});

document.addEventListener('keydown', e => {
  if (document.activeElement === searchEl && e.key !== 'Escape') return;
  const cards = Array.from(listEl.querySelectorAll('.card'));
  if (e.key === 'ArrowDown' && cards.length) {
    e.preventDefault();
    const idx = cards.findIndex(c => c.classList.contains('selected'));
    const next = cards[Math.min(cards.length - 1, idx + 1)] || cards[0];
    selectGame(next.dataset.file);
    next.scrollIntoView({ block:'nearest' });
  } else if (e.key === 'ArrowUp' && cards.length) {
    e.preventDefault();
    const idx = cards.findIndex(c => c.classList.contains('selected'));
    const prev = cards[Math.max(0, idx - 1)] || cards[0];
    selectGame(prev.dataset.file);
    prev.scrollIntoView({ block:'nearest' });
  } else if (e.key === '/' && document.activeElement !== searchEl) {
    e.preventDefault();
    searchEl.focus();
    searchEl.select();
  } else if (e.key === 'Escape' && document.activeElement === searchEl) {
    searchEl.value = '';
    renderList();
    searchEl.blur();
  }
});

buildFilterChips();
renderList();
loadFromHash();
</script>
</body>
</html>
