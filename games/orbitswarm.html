<script>

'use strict';

// engine settings, do not remove
debugWatermark = false;
showEngineVersion = false;
debugKey = 'Backquote';

// engine settings
gravity = vec2(0, 0);
cameraPos = vec2(0, 0);
cameraScale = 19;

///////////////////////////////////////////////////////////////////////////////
// OrbitSwarm
//
// Controls
// - Click + drag from your planet to a target to send ships
// - 1/2/3/4 sets send percent: 10/25/50/100
// - Mouse wheel while dragging adjusts percent
// - R restarts, Esc returns to title
//
// Ships launch in a rapid stream and arrive/attack one at a time.
//
// NOTE: Sound effects are disabled for now.

// -------------------------------------------------------------
// Constants / helpers

const OWNER_NEUTRAL = 0;
const OWNER_PLAYER  = 1;
const OWNER_AI      = 2;

const WORLD_SIZE = vec2(60, 40);
const PLANET_COUNT_DEFAULT = 15;

const FLEET_SPEED = 1.9;                // world units per second
const SHIP_DRAW_LIMIT = 180;            // max ship instances to draw per fleet

// Capacity tuning
const CAPACITY_SCALE = .5;              // scales ALL planet capacities
const MAX_SHIPS = 300;                  // absolute hard cap (safety)

// stream combat tuning
const LAUNCH_DUR_MIN = .8;
const LAUNCH_DUR_MAX = 2.0;
const ARRIVAL_PROCESS_CAP = 40;         // max ships processed per frame per fleet

// background starfield
const STAR_FIELD_SIZE = vec2(180, 110);
const STAR_COUNT = 1600;
const NEBULA_CLUSTER_COUNT = 5;      // number of nebula clusters
const NEBULA_BLOBS_PER_CLUSTER = 12; // blobs per cluster for realistic look

// difficulty settings
let difficulty = 'medium'; // 'easy', 'medium', 'hard'
const DIFFICULTY_SETTINGS = {
    easy: {
        aiInterval: [2.5, 3.5],       // AI acts slower
        playerStartShips: 70,
        aiStartShips: 20,
        aiVisionError: 0.3,           // AI misjudges enemy ships by up to 30%
        planetCount: 10,              // fewer planets
    },
    medium: {
        aiInterval: [1.4, 2.0],
        playerStartShips: 50,
        aiStartShips: 30,
        aiVisionError: 0.12,
        planetCount: 15,
    },
    hard: {
        aiInterval: [0.7, 1.2],       // AI acts faster
        playerStartShips: 40,
        aiStartShips: 50,
        aiVisionError: 0,             // AI has perfect information
        planetCount: 15,
    }
};

// AI strategy constants (same across all difficulties)
const AI_MIN_SHIPS_TO_ATTACK = 22;    // AI waits until it has this many ships
const AI_SEND_FRACTION = 0.5;         // AI sends 50% of ships per attack
const AI_SEND_FRACTION_LARGE = 0.7;   // AI sends 70% when it has lots of ships

// debug display
let debugShowStats = false;

// -------------------------------------------------------------
// container for sprite atlas tiles
let spriteAtlas;

// sprite drawing helpers
function drawEllipseSprite(pos, size=vec2(1), color=WHITE)
{ drawTile(pos, size, spriteAtlas.circle, color); }
function drawCircleSprite(pos, size=1, color=WHITE)
{ drawTile(pos, vec2(size), spriteAtlas.circle, color); }
function drawDotSprite(pos, size=1, color=WHITE)
{ drawTile(pos, vec2(size), spriteAtlas.dot, color); }

// -------------------------------------------------------------
// Sound disabled (stubs)

const sfx = { play: function(){} };
const sfxSelect  = sfx;
const sfxSend    = sfx;
const sfxHit     = sfx;
const sfxCapture = sfx;
const sfxWin     = sfx;
const sfxLose    = sfx;
const sfxBuy     = sfx;
const sfxNope    = sfx;

// -------------------------------------------------------------
// Planet stats

function recalcPlanetStats(p)
{
    p.capacity = min(MAX_SHIPS, p.baseCapacity);
    p.production = p.baseProduction;
    p.ships = min(p.capacity, p.ships);
}

// -------------------------------------------------------------
// Game state classes

class Planet
{
    constructor(pos, radius)
    {
        this.pos = pos;
        this.radius = radius;
        this.owner = OWNER_NEUTRAL;

        // base stats (size-based)
        this.baseProduction = radius * 1.0;
        this.baseCapacity = max((60*CAPACITY_SCALE)|0, (radius * 60 * CAPACITY_SCALE) | 0);

        // derived stats
        this.production = 0;
        this.capacity = 0;

        // ships
        this.ships = 0;
        this.visualShipCount = 0;  // for smooth orbit interpolation

        // cosmetic
        this.seed = randInt(1e9);

        // init stats + starter ships
        recalcPlanetStats(this);
        this.ships = min(this.capacity, (radius * 10) | 0);
        this.visualShipCount = this.ships;  // start synced
    }
}

class Fleet
{
    constructor(from, to, owner, count)
    {
        this.from = from;
        this.to = to;
        this.owner = owner;

        this.count = count|0;
        this.time = 0;

        // launch stream duration (1-2s-ish depending on count)
        this.launchDuration = clamp(0.6 + this.count / 80, LAUNCH_DUR_MIN, LAUNCH_DUR_MAX);
        this.launchRate = this.count / this.launchDuration; // ships per second

        const dir = to.pos.subtract(from.pos).normalize();
        this.dir = dir;
        this.perp = vec2(-dir.y, dir.x);

        const dist = max(.1, from.pos.distance(to.pos) - from.radius - to.radius);
        this.travelTime = dist / FLEET_SPEED;

        this.processedArrivals = 0;
        this.swirl = rand(0, 6.28);

        // ship instances (visual only) - each gets a launch delay
        const visualCount = min(SHIP_DRAW_LIMIT, this.count);
        this.visualShips = [];
        for (let i = 0; i < visualCount; ++i)
        {
            const delay = (i / max(1, visualCount-1)) * this.launchDuration;

            const back = rand(0, 2.4) + rand(0, 2.4);
            const side = rand(-.65, .65);
            const wobblePhase = rand(0, 6.28);
            const wobbleAmt = rand(.05, .22);
            const speedJitter = rand(.92, 1.06);

            this.visualShips.push({ delay:delay, back:back, side:side, wobblePhase:wobblePhase, wobbleAmt:wobbleAmt, speedJitter:speedJitter });
        }
    }

    arrivedCount(t)
    {
        const x = t - this.travelTime;
        return x <= 0 ? 0 : clamp((x * this.launchRate)|0, 0, this.count);
    }

    processOneArrival()
    {
        const planet = this.to;
        if (!planet) return;

        if (planet.owner == this.owner)
        {
            planet.ships = min(planet.capacity, (planet.ships|0) + 1);
            return;
        }

        // each invader reduces defender count by 1
        planet.ships = (planet.ships|0) - 1;

        // spawn explosion at planet edge
        const arrivalPos = planet.pos.subtract(this.dir.scale(planet.radius + rand(.1, .5)))
            .add(this.perp.scale(rand(-.4, .4)));
        const defenderHue = ownerHue(planet.owner);
        spawnExplosion(arrivalPos, defenderHue);

        // capture when count goes negative
        if (planet.ships < 0)
        {
            planet.owner = this.owner;
            planet.ships = min(planet.capacity, -planet.ships);
            recalcPlanetStats(planet);
            sfxCapture.play();
        }
    }

    update(dt)
    {
        this.time += dt;

        // arrivals (process incrementally)
        const arrived = this.arrivedCount(this.time);
        let toProcess = arrived - this.processedArrivals;
        toProcess = min(toProcess, ARRIVAL_PROCESS_CAP);

        for (let i = 0; i < toProcess; ++i)
        {
            this.processOneArrival();
            this.processedArrivals++;
        }

        return this.processedArrivals >= this.count;
    }
}

// -------------------------------------------------------------
// Background

let stars = [];
let nebulas = [];
let starDrift = vec2(0, 0);

// Star color temperatures (hue, saturation, lightness)
const STAR_COLORS = [
    { hue: 0,    sat: 0,   lit: 1 },     // white (most common)
    { hue: 0,    sat: 0,   lit: .95 },   // white
    { hue: 0,    sat: 0,   lit: .9 },    // white
    { hue: .6,   sat: .5,  lit: .85 },   // blue-white
    { hue: .58,  sat: .7,  lit: .8 },    // blue
    { hue: .55,  sat: .8,  lit: .75 },   // deep blue
    { hue: .08,  sat: .6,  lit: .8 },    // orange
    { hue: .05,  sat: .7,  lit: .75 },   // orange-red
    { hue: .0,   sat: .6,  lit: .7 },    // red
];

function initStarfield()
{
    // Random seed for each new game
    const rng = new RandomGenerator(randInt(2147483647));
    
    stars.length = 0;
    nebulas.length = 0;
    starDrift = vec2(0, 0);

    // Generate stars with colors
    for (let i = 0; i < STAR_COUNT; ++i)
    {
        const layer = rng.int(3);
        const speed = layer == 0 ? 1.0 : layer == 1 ? .55 : .28;
        const size = layer == 0 ? rng.float(.10, .18) : layer == 1 ? rng.float(.07, .13) : rng.float(.04, .08);
        const tw = rng.float(0, 6.28);
        
        // Most stars white, some colored
        const colorRoll = rng.float();
        let colorIdx = 0;
        if (colorRoll > .92) colorIdx = rng.int(3, 9);      // 8% colored
        else if (colorRoll > .7) colorIdx = rng.int(0, 3);  // 22% various white
        const starColor = STAR_COLORS[colorIdx];

        stars.push({
            pos: vec2(rng.float(-STAR_FIELD_SIZE.x/2, STAR_FIELD_SIZE.x/2), rng.float(-STAR_FIELD_SIZE.y/2, STAR_FIELD_SIZE.y/2)),
            speed: speed,
            size: size,
            tw: tw,
            hue: starColor.hue,
            sat: starColor.sat,
            lit: starColor.lit
        });
    }

    // Generate nebula clusters - each cluster is a group of overlapping blobs
    // This creates more realistic, cloud-like nebula structures
    for (let c = 0; c < NEBULA_CLUSTER_COUNT; ++c)
    {
        // Cluster center
        const cx = rng.float(-STAR_FIELD_SIZE.x/2 + 20, STAR_FIELD_SIZE.x/2 - 20);
        const cy = rng.float(-STAR_FIELD_SIZE.y/2 + 15, STAR_FIELD_SIZE.y/2 - 15);
        
        // Cluster base hue (with slight variation per blob)
        const baseHue = rng.float(0, 1);
        const clusterSize = rng.float(18, 35);  // overall cluster spread
        
        for (let b = 0; b < NEBULA_BLOBS_PER_CLUSTER; ++b)
        {
            // Blob position - gaussian-ish distribution around cluster center
            const angle = rng.float(0, 6.28);
            const dist = rng.float(0, clusterSize) * rng.float(0.3, 1);  // cluster toward center
            const bx = cx + Math.cos(angle) * dist;
            const by = cy + Math.sin(angle) * dist * 0.6;  // squish vertically
            
            // Blob size - varied
            const r = rng.float(6, 18);
            
            // Blob color - slight hue variation from base
            const hueShift = rng.float(-.08, .08);
            const hue = (baseHue + hueShift + 1) % 1;
            
            // Blob opacity - outer blobs fainter
            const distFromCenter = Math.sqrt((bx-cx)*(bx-cx) + (by-cy)*(by-cy));
            const distFactor = 1 - (distFromCenter / (clusterSize * 1.2));
            const a = rng.float(.05, .1) * Math.max(.3, distFactor);
            
            nebulas.push({
                pos: vec2(bx, by),
                r: r,
                hue: hue,
                sat: rng.float(.4, .7),
                lit: rng.float(.12, .22),
                a: a
            });
        }
    }
    
    // Sort nebulas by size (draw larger ones first for proper layering)
    nebulas.sort((a, b) => b.r - a.r);
}

function wrapInField(p)
{
    const hx = STAR_FIELD_SIZE.x/2;
    const hy = STAR_FIELD_SIZE.y/2;
    if (p.x < -hx) p.x += STAR_FIELD_SIZE.x;
    if (p.x >  hx) p.x -= STAR_FIELD_SIZE.x;
    if (p.y < -hy) p.y += STAR_FIELD_SIZE.y;
    if (p.y >  hy) p.y -= STAR_FIELD_SIZE.y;
}

function updateStarfield(dt)
{
    starDrift = starDrift.add(vec2(rand(-.08, .08), rand(-.05, .05)).scale(dt));
    const maxDrift = .9;
    starDrift.x = clamp(starDrift.x, -maxDrift, maxDrift);
    starDrift.y = clamp(starDrift.y, -maxDrift, maxDrift);

    for (let i = 0; i < stars.length; ++i)
    {
        const s = stars[i];
        s.tw += dt * 1.6;
        s.pos = s.pos.add(starDrift.scale(dt * s.speed));
        wrapInField(s.pos);
    }
}

function renderStarfield()
{
    // set additive blending
    setBlendMode(true);

    // Deep space background
    drawRect(vec2(0, 0), vec2(500, 300), hsl(.62, .22, .03));

    // Nebulas (sorted by size, larger first)
    for (let i = 0; i < nebulas.length; ++i)
    {
        const n = nebulas[i];
        // Main blob
        drawDotSprite(n.pos, n.r * 2, hsl(n.hue, n.sat, n.lit, n.a));
    }

    // Stars using drawRect (faster than drawCircleSprite)
    for (let i = 0; i < stars.length; ++i)
    {
        const s = stars[i];
        const twinkle = 1 + Math.sin(s.tw) * .2;
        const d = s.size * twinkle;
        drawRect(s.pos, vec2(d, d), hsl(s.hue, s.sat, s.lit, .8));
    }

    // set normal blending
    setBlendMode();
}

// -------------------------------------------------------------
// Rendering helpers

const lightDir = vec2(-.7, .5).normalize();

function rotate2(v, a)
{
    const c = Math.cos(a), s = Math.sin(a);
    return vec2(v.x*c - v.y*s, v.x*s + v.y*c);
}

function drawWedge(pos, dir, size, color)
{
    const a = Math.atan2(dir.y, dir.x);
    drawTile(pos, vec2(size, size*1.5), spriteAtlas.triangle, color, PI/2 - a);
}

// -------------------------------------------------------------
// Ship explosion effects

let explosionEffects = []; // {pos, particles[]}

function spawnExplosion(pos, hue)
{
    const particles = [];
    const count = 6 + randInt(4);  // 6-9 particles
    for (let i = 0; i < count; ++i)
    {
        const ang = rand(0, 6.28);
        const speed = rand(.8, 2.5);
        particles.push({
            pos: pos.copy(),
            vel: vec2(Math.cos(ang) * speed, Math.sin(ang) * speed),
            size: rand(.08, .16),
            life: rand(.15, .35),
            maxLife: rand(.15, .35),
            hue: hue
        });
    }
    explosionEffects.push({ particles });
}

function updateExplosionEffects(dt)
{
    for (let i = explosionEffects.length; i--;)
    {
        const e = explosionEffects[i];
        let alive = false;
        for (let j = e.particles.length; j--;)
        {
            const p = e.particles[j];
            p.life -= dt;
            if (p.life <= 0)
            {
                e.particles.splice(j, 1);
                continue;
            }
            alive = true;
            p.pos = p.pos.add(p.vel.scale(dt));
            p.vel = p.vel.scale(.92);  // friction
        }
        if (!alive)
            explosionEffects.splice(i, 1);
    }
}

function renderExplosionEffects()
{
    for (let i = 0; i < explosionEffects.length; ++i)
    {
        const e = explosionEffects[i];
        for (let j = 0; j < e.particles.length; ++j)
        {
            const p = e.particles[j];
            const t = clamp(p.life / p.maxLife);
            const a = t;  // fade out
            const size = p.size * (1 + (1-t) * .5);  // grow slightly as it fades
            drawCircleSprite(p.pos, size, hsl(p.hue, .9, .6, a));
            // bright core
            drawCircleSprite(p.pos, size * .5, hsl(p.hue, .5, .9, a * .8));
        }
    }
}

// -------------------------------------------------------------
// UI helpers

function ownerHue(owner)
{
    if (owner == OWNER_PLAYER) return .58;
    if (owner == OWNER_AI)     return .02;
    return .62;
}

function ownerColor(owner, alpha)
{
    if (alpha === undefined) alpha = 1;
    if (owner == OWNER_PLAYER) return hsl(.58, .9, .55, alpha);
    if (owner == OWNER_AI)     return hsl(.02, .9, .55, alpha);
    return hsl(0, 0, .55, alpha);
}

function planetAt(pos)
{
    let bestP = null;
    let bestD = 1e9;
    for (let i = 0; i < planets.length; ++i)
    {
        const p = planets[i];
        const d = p.pos.distance(pos);
        if (d <= p.radius && d < bestD)
        {
            bestD = d;
            bestP = p;
        }
    }
    return bestP;
}

// -------------------------------------------------------------
// Game globals

let planets = [];
let fleets = [];

let gameOver = 0;
let isPlaying = false;
let gameTimer = 0;  // tracks play time in seconds

let dragSource = null;
let dragTarget = null;
let dragPercent = .5;
let sendPreset = 3;
let aiTimer = 0;
let selectedPlanet = null;

// -------------------------------------------------------------
// Gameplay

function startGame(diff)
{
    if (diff) difficulty = diff;
    resetGame();
    isPlaying = true;
    gameTimer = 0;
    clearSubmenuStack();
    hideAllMenus();
}

function quitToTitle()
{
    isPlaying = false;
    gameOver = 0;
    planets.length = 0;
    fleets.length = 0;
    dragSource = dragTarget = null;
    dragPercent = .5;
    sendPreset = 3;
    aiTimer = 0;
    selectedPlanet = null;
    initStarfield();
    explosionEffects.length = 0;
    showMenu('title');
}

function resetGame()
{
    planets.length = 0;
    fleets.length = 0;
    gameOver = 0;
    dragSource = dragTarget = null;
    dragPercent = .5;
    sendPreset = 3;
    aiTimer = 0;
    selectedPlanet = null;
    explosionEffects.length = 0;

    initStarfield();

    // generate planets
    const triesMax = 2000;
    let tries = 0;

    const diffSettings = DIFFICULTY_SETTINGS[difficulty];
    const planetCount = diffSettings.planetCount || PLANET_COUNT_DEFAULT;
    
    while (planets.length < planetCount && tries++ < triesMax)
    {
        const radius = rand(1.5, 2.8);  // smaller planets
        const pos = vec2(
            rand(-WORLD_SIZE.x/2 + 6, WORLD_SIZE.x/2 - 6),
            rand(-WORLD_SIZE.y/2 + 5, WORLD_SIZE.y/2 - 5)
        );

        let ok = true;
        for (let i = 0; i < planets.length; ++i)
        {
            const p = planets[i];
            const minDist = p.radius + radius + 1.8;
            if (p.pos.distance(pos) < minDist) { ok = false; break; }
        }
        if (!ok) continue;

        planets.push(new Planet(pos, radius));
    }

    // pick two far apart planets for player/ai
    let a = 0, b = 1, best = -1;
    for (let i = 0; i < planets.length; ++i)
    for (let j = i+1; j < planets.length; ++j)
    {
        const d = planets[i].pos.distance(planets[j].pos);
        if (d > best) { best = d; a = i; b = j; }
    }

    const playerHome = planets[a];
    const aiHome = planets[b];
    
    playerHome.owner = OWNER_PLAYER;
    playerHome.ships = min(playerHome.capacity, diffSettings.playerStartShips);
    playerHome.baseProduction *= 1.1;
    recalcPlanetStats(playerHome);

    aiHome.owner = OWNER_AI;
    aiHome.ships = min(aiHome.capacity, diffSettings.aiStartShips);
    recalcPlanetStats(aiHome);

    for (let i = 0; i < planets.length; ++i)
    {
        const p = planets[i];
        if (p.owner == OWNER_NEUTRAL)
        {
            p.ships = min(p.capacity, (p.radius * rand(7, 13)) | 0);
        }
    }

    selectedPlanet = playerHome;
}

function sendFleet(from, to, owner, fraction)
{
    if (!from || !to) return;
    if (from.owner != owner) return;

    const count = max(1, (from.ships * fraction) | 0);
    if (count <= 0 || from.ships < 2) return;

    from.ships -= count;
    fleets.push(new Fleet(from, to, owner, count));
    sfxSend.play();
}

// -------------------------------------------------------------
// AI

function aiStep()
{
    if (gameOver) return;

    const diffSettings = DIFFICULTY_SETTINGS[difficulty];
    const aiPlanets = planets.filter(function(p){ return p.owner == OWNER_AI; });
    if (!aiPlanets.length) return;

    let source = null;
    let most = 0;
    for (let i = 0; i < aiPlanets.length; ++i)
    {
        const p = aiPlanets[i];
        if (p.ships > most) { most = p.ships; source = p; }
    }

    if (!source || source.ships < AI_MIN_SHIPS_TO_ATTACK) return;

    let bestTarget = null;
    let bestScore = -1;

    for (let i = 0; i < planets.length; ++i)
    {
        const t = planets[i];
        if (t.owner == OWNER_AI) continue;

        const dist = max(1, source.pos.distance(t.pos));
        
        // Apply vision error: AI misestimates enemy ship count
        const visionError = 1 + (rand() - 0.5) * 2 * diffSettings.aiVisionError;
        const perceivedShips = t.ships * visionError;
        
        const defenders = perceivedShips + (t.owner ? t.production * (dist / FLEET_SPEED) : 0);

        const value = t.production * (t.owner == OWNER_PLAYER ? 1.15 : 1.0);
        const score = value / (defenders + 5) * (1 / dist);

        if (score > bestScore) { bestScore = score; bestTarget = t; }
    }

    if (!bestTarget) return;

    const fraction = source.ships > 85 ? AI_SEND_FRACTION_LARGE : AI_SEND_FRACTION;
    sendFleet(source, bestTarget, OWNER_AI, fraction);
}

// -------------------------------------------------------------
// Drawing

function drawTitleDecor()
{
    const t = time;  // use engine time for animation
    
    // Blue planet (player style)
    const p1 = vec2(-18, 6);
    const r1 = 7.5;
    drawCircleSprite(p1, r1*2, hsl(.58, .55, .25, .95), .14, hsl(.58, .85, .6));
    drawCircleSprite(p1.add(lightDir.scale(r1*.28)), r1*1.25, hsl(.58, .65, .6, .18));
    
    // Orbiting blue ships around blue planet
    const blueShipCount = 8;
    for (let i = 0; i < blueShipCount; i++)
    {
        const angle = t * 0.7 + (i / blueShipCount) * PI * 2;
        const orbitR = r1 + 2.5 + Math.sin(t * 1.2 + i) * 0.5;
        const shipPos = p1.add(vec2(Math.cos(angle) * orbitR, Math.sin(angle) * orbitR * 0.6));
        const shipDir = vec2(-Math.sin(angle), Math.cos(angle) * 0.6).normalize();
        drawWedge(shipPos, shipDir, 0.55, hsl(.58, .85, .65));
    }

    // Red planet (enemy style)
    const p2 = vec2(22, -8);
    const r2 = 5.3;
    drawCircleSprite(p2, r2*2, hsl(.02, .55, .23, .95), .14, hsl(.02, .85, .6));
    drawCircleSprite(p2.add(lightDir.scale(r2*.28)), r2*1.25, hsl(.02, .65, .6, .18));
    
    // Orbiting red ships around red planet
    const redShipCount = 6;
    for (let i = 0; i < redShipCount; i++)
    {
        const angle = -t * 0.8 + (i / redShipCount) * PI * 2;  // opposite direction
        const orbitR = r2 + 2 + Math.sin(t * 1.5 + i * 2) * 0.4;
        const shipPos = p2.add(vec2(Math.cos(angle) * orbitR, Math.sin(angle) * orbitR * 0.6));
        const shipDir = vec2(Math.sin(angle), -Math.cos(angle) * 0.6).normalize();
        drawWedge(shipPos, shipDir, 0.45, hsl(.02, .85, .6));
    }
    
    // Small neutral planet with slow-orbiting ships
    const p3 = vec2(5, 12);
    const r3 = 3.2;
    drawCircleSprite(p3, r3*2, hsl(0, .05, .30, .95), .12, hsl(0, .1, .5));
    drawCircleSprite(p3.add(lightDir.scale(r3*.28)), r3*1.1, hsl(0, .05, .5, .15));
    
    const neutralShipCount = 4;
    for (let i = 0; i < neutralShipCount; i++)
    {
        const angle = t * 0.4 + (i / neutralShipCount) * PI * 2;
        const orbitR = r3 + 1.5;
        const shipPos = p3.add(vec2(Math.cos(angle) * orbitR, Math.sin(angle) * orbitR * 0.5));
        const shipDir = vec2(-Math.sin(angle), Math.cos(angle) * 0.5).normalize();
        drawWedge(shipPos, shipDir, 0.35, hsl(0, .1, .55));
    }
}

function drawPlanet(p)
{
    const hue = ownerHue(p.owner);
    const sel = p == selectedPlanet;
    const isTarget = p == dragTarget;  // Check if this is the send target

    const baseSat0 = p.owner ? .7 : .18;
    const baseLit0 = p.owner ? .38 : .30;
    const baseSat = sel ? min(1, baseSat0 + .35) : baseSat0;
    const baseLit = sel ? min(1, baseLit0 + .45) : baseLit0;  // much brighter when selected

    const base = hsl(hue, baseSat, baseLit, .95);
    const outline = ownerColor(p.owner, 1);

    if (sel)
    {
        drawCircleSprite(p.pos, p.radius*2 + .65, hsl(0, 0, 1, .15));  // brighter glow
        drawCircleSprite(p.pos, p.radius*2 + .95, hsl(0, 0, 1, .08));
    }
    
    // Highlight send target planet with pulsing glow
    if (isTarget && dragSource)
    {
        const targetPulse = .5 + .5 * Math.sin(time * 9);
        const targetHue = ownerHue(OWNER_PLAYER);
        drawCircleSprite(p.pos, p.radius*2 + 1.8 + targetPulse * .4, hsl(targetHue, .9, .65, .35 + targetPulse * .15));
        drawCircleSprite(p.pos, p.radius*2 + 1.2 + targetPulse * .3, hsl(targetHue, .95, .75, .45 + targetPulse * .2));
        drawCircleSprite(p.pos, p.radius*2 + .6 + targetPulse * .2, hsl(targetHue, 1, .85, .55 + targetPulse * .25));
    }

    // Atmospheric halo (additive glow effect)
    const atmoSat = p.owner ? .7 : .2;
    const atmoLit = p.owner ? .6 : .4;

    // Hazy atmosphere layer BEHIND planet using dot tiles (drawn before planet)
    setBlendMode(true);  // Enable additive blending
    drawDotSprite(p.pos, p.radius*2 + 2.5, hsl(hue, atmoSat, atmoLit, .15));
    drawDotSprite(p.pos, p.radius*2 + 2.1, hsl(hue, atmoSat, atmoLit + .1, .20));
    drawDotSprite(p.pos, p.radius*2 + 1.5, hsl(hue, atmoSat, atmoLit + .15, .25));
    drawDotSprite(p.pos, p.radius*2, base, .14, outline);
    setBlendMode(false);  // Disable additive blending

    // Draw main planet circle
    drawCircleSprite(p.pos, p.radius*2, base, .14, outline);

    // Draw highlight
    const lightPos = p.pos.add(lightDir.scale(p.radius*.28));
    drawDotSprite(lightPos, p.radius*1.5, hsl(hue, p.owner ? .75 : .25, .58, .5));

    // selection ring (solid white) - inside the capacity ring for visibility
    if (sel)
    {
        drawCircleSprite(p.pos, p.radius*2 + .25, hsl(0,0,0,0), .20, hsl(0,0,1,1));
        drawCircleSprite(p.pos, p.radius*2 + .45, hsl(0,0,0,0), .08, hsl(0,0,1,.5));
    }

    // subtle production ring
    const ring = p.radius*2 + .55;
    drawCircleSprite(p.pos, ring, hsl(0,0,0,0), .08, hsl(hue, .25, .5, .25));

    // capacity ring (player only)
    if (p.owner == OWNER_PLAYER)
    {
        const frac = clamp((p.ships|0) / max(1, p.capacity));
        const capR = p.radius + .62;
        const thick = .24;

        drawCircleSprite(p.pos, capR*2, hsl(0,0,0,0), thick, hsl(0,0,1,.10));

        const segs = 56;
        const start = -Math.PI/2;
        const endSeg = (frac * segs) | 0;
        const col = hsl(hue, .85, .62, .85);

        for (let s = 0; s < endSeg; ++s)
        {
            const a0 = start + (s / segs) * 6.28;
            const a1 = start + ((s + 1) / segs) * 6.28;
            const p0 = p.pos.add(vec2(Math.cos(a0), Math.sin(a0)).scale(capR));
            const p1 = p.pos.add(vec2(Math.cos(a1), Math.sin(a1)).scale(capR));
            drawLine(p0, p1, thick, col);
        }
    }

    // orbiting ship visuals (neutral + player only)
    if (p.owner != OWNER_AI && (p.ships|0) > 0)
    {
        // Smoothly interpolate visual ship count toward actual count
        // Speed: roughly matches production rate (instant for decreases)
        const targetCount = min(p.capacity, p.ships|0);
        if (p.visualShipCount < targetCount)
            p.visualShipCount = min(targetCount, p.visualShipCount + p.production * timeDelta * 2);
        else
            p.visualShipCount = targetCount;  // instant decrease
        
        const shipCount = p.visualShipCount | 0;
        if (shipCount > 0)
        {
            const perRing = 70;
            const rings2 = ((shipCount + perRing - 1) / perRing) | 0;

            const spin = ((p.seed % 200) / 200 - .5) * .18;
            const baseAng = time * (.35 + spin);
            
            // Use fractional part for smooth spacing interpolation
            const fracPart = p.visualShipCount - (p.visualShipCount | 0);

            let idx = 0;
            for (let r = 0; r < rings2; ++r)
            {
                const start2 = r * perRing;
                const end2 = min(shipCount, start2 + perRing);
                const n = end2 - start2;
                // Interpolate spacing: blend between n and n+1 ships spacing
                const effectiveN = n + fracPart;
                const orbitR = p.radius + .95 + r * .38;

                for (let j = 0; j < n; ++j, ++idx)
                {
                    const off = ((p.seed % 997) / 997) * 6.28;
                    const a = baseAng + off + (j / effectiveN) * 6.28;
                    const wob = Math.sin(time * 1.2 + idx * .37) * .05;

                    const pos = p.pos.add(vec2(Math.cos(a), Math.sin(a)).scale(orbitR + wob));
                    const tdir = vec2(-Math.sin(a), Math.cos(a));
                    drawWedge(pos, tdir, .26, hsl(hue, p.owner ? .8 : .2, .65, .75));
                }
            }
        }
    }

    // number display (player, and AI when debug mode enabled)
    if (p.owner == OWNER_PLAYER || (p.owner == OWNER_AI && debugShowStats))
    {
        const textCol = p.owner == OWNER_PLAYER ? hsl(0,0,1) : hsl(.02, .9, .85);
        drawText(p.ships|0, p.pos, 1.6, textCol, .18, hsl(0,0,0));
    }
    
    // Show only ship count for neutral planets
    if (p.owner == OWNER_NEUTRAL)
    {
        drawText(p.ships|0, p.pos, 1.6, hsl(0, 0, .85), .18, hsl(0,0,0));
    }
}

// -------------------------------------------------------------
// LittleJS callbacks

function gameInit()
{
    spriteAtlas =
    {
        // large tiles
        circle:  tile(0, 256),
        dot:     tile(1, 256),
        triangle:tile(2, 256),
    };

    initStarfield();
    buildMenus();
    showMenu('title');
}

function buildMenus()
{
    if (typeof createMenu !== 'function') return;

    // Only pause for in-game menus (pause/dialog). The title menu sits over
    // the animated starfield + planet decor and shouldn't freeze them.
    installAutoPause(() => isPlaying);

    createTitleMenu({
        title: '',     // canvas draws ORBITSWARM
        subtitle: '',
        playLabel: 'EASY',
        onPlay: () => startGame('easy'),
        revealOnClick: false,
        items: [
            {type:'button', label:'MEDIUM', onClick: () => startGame('medium')},
            {type:'button', label:'HARD',   onClick: () => startGame('hard')},
            {type:'button', label:'ABOUT',  onClick: () => pushMenu('about')},
        ],
    });

    createMenu({
        id: 'about',
        title: 'HOW TO PLAY',
        onHide: popMenu,
        items: [
            {type:'text', text:
                'Conquer the galaxy.\n\n' +
                'DRAG from a planet you own to another to send ships.\n' +
                'Wheel or 1-4 sets the send percentage (10/25/50/100).\n' +
                'R restarts, Esc pauses.\n\n' +
                'Higher difficulties give the AI faster reactions and better information.'},
            {type:'separator'},
            {type:'button', label:'BACK', onClick: () => hideMenu('about')},
        ],
    });

    createMenu({
        id: 'pause',
        title: 'PAUSED',
        initialItemId: 'resume',
        items: [
            {type:'button', id:'resume', label:'RESUME',        onClick: () => hideMenu('pause')},
            {type:'button',              label:'RESTART',       onClick: () => { hideMenu('pause'); resetGame(); gameTimer = 0; }},
            {type:'button',              label:'QUIT TO TITLE', onClick: () =>
                showConfirmDialog({
                    message: 'Quit to title?',
                    onYes: () => quitToTitle(),
                })},
        ],
    });

    installDefaultToolbar();
}

function gameUpdate()
{
    if (bindPauseKey({when: () => isPlaying && !gameOver})) return;

    if (!isPlaying)
    {
        updateStarfield(timeDelta);
        return;
    }

    // Debug toggle: show troop/defense stats on all planets
    if (keyWasPressed('KeyG'))
        debugShowStats = !debugShowStats;

    if (keyWasPressed('KeyR'))
        resetGame();

    // send percent presets
    if (keyWasPressed('Digit1')) { sendPreset = 1; dragPercent = .10; }
    if (keyWasPressed('Digit2')) { sendPreset = 2; dragPercent = .25; }
    if (keyWasPressed('Digit3')) { sendPreset = 3; dragPercent = .50; }
    if (keyWasPressed('Digit4')) { sendPreset = 4; dragPercent = 1.00; }

    if (gameOver)
    {
        if (keyWasPressed('Space') || mouseWasPressed(0))
            quitToTitle();
        updateStarfield(timeDelta);
        return;
    }

    updateStarfield(timeDelta);
    updateExplosionEffects(timeDelta);
    
    // track play time
    gameTimer += timeDelta;

    // planet production (ships only)
    for (let i = 0; i < planets.length; ++i)
    {
        const p = planets[i];
        if (p.owner != OWNER_NEUTRAL)
        {
            p.ships = min(p.capacity, p.ships + p.production * timeDelta);
        }
    }

    // mouse
    const hover = planetAt(mousePos);

    if (mouseWasPressed(0))
    {
        if (hover)
        {
            selectedPlanet = hover;
            sfxSelect.play();
            // Only allow drag from player planets
            dragSource = hover.owner == OWNER_PLAYER ? hover : null;
            dragTarget = null;
            
            // Reset to 50% on every click
            //dragPercent = .5;
            //sendPreset = 3;
        }
    }

    if (dragSource)
    {
        dragTarget = hover;

        if (mouseWheel)
        {
            dragPercent = clamp(dragPercent - mouseWheel * .05);
            const snaps = [.10, .25, .50, 1.0];
            for (let i = 0; i < snaps.length; ++i)
                if (abs(dragPercent - snaps[i]) < .03) dragPercent = snaps[i];
        }

        if (mouseWasReleased(0))
        {
            if (dragTarget && dragTarget != dragSource)
                sendFleet(dragSource, dragTarget, OWNER_PLAYER, dragPercent);

            dragSource = null;
            dragTarget = null;
        }
    }

    // fleets
    for (let i = fleets.length; i--;)
        if (fleets[i].update(timeDelta))
            fleets.splice(i, 1);

    // AI
    aiTimer -= timeDelta;
    if (aiTimer <= 0)
    {
        const diffSettings = DIFFICULTY_SETTINGS[difficulty];
        aiTimer = rand(diffSettings.aiInterval[0], diffSettings.aiInterval[1]);
        aiStep();
    }

    // win/lose
    const playerAlive = planets.some(function(p){ return p.owner == OWNER_PLAYER; });
    const aiAlive = planets.some(function(p){ return p.owner == OWNER_AI; });

    if (!playerAlive || !aiAlive)
        gameOver = aiAlive ? -1 : 1;
}

function gameUpdatePost()
{
    cameraPos = vec2(0, 0);
}

function gameRender()
{
    renderStarfield();

    if (!isPlaying)
    {
        drawTitleDecor();
        return;
    }

    for (let i = 0; i < planets.length; ++i)
        drawPlanet(planets[i]);

    // fleets (triangle wedge stream)
    for (let fi = 0; fi < fleets.length; ++fi)
    {
        const f = fleets[fi];
        const c = ownerColor(f.owner, 1);
        const startPos = f.from.pos.add(f.dir.scale(f.from.radius + .3));

        for (let si = 0; si < f.visualShips.length; ++si)
        {
            const s = f.visualShips[si];
            const localT = f.time - s.delay;
            if (localT <= 0) continue;
            if (localT >= f.travelTime) continue;

            const tt = clamp(localT / max(.001, f.travelTime));
            const wobble = Math.sin((tt*6.28) + f.swirl) * .18;
            const side = f.perp.scale(wobble);

            let pos = startPos.add(f.dir.scale(FLEET_SPEED * localT)).add(side);
            const tWob = Math.sin(localT * 5.5 * s.speedJitter + s.wobblePhase) * s.wobbleAmt;
            pos = pos.subtract(f.dir.scale(s.back)).add(f.perp.scale(s.side + tWob));

            drawWedge(pos, f.dir, .32, c);
        }
    }

    renderExplosionEffects();

    // drag line + send preview
    if (dragSource)
    {
        const targetPos = dragTarget ? dragTarget.pos : mousePos;
        const beamHue = ownerHue(OWNER_PLAYER);
        
        // Pulsing effect for drag line
        const pulse = .5 + .5 * Math.sin(time * 8);
        // Scale line thickness based on send percentage (10% to 100%)
        const widthScale = .5 + dragPercent * 2;  // ranges from .5 to 2.5
        const outerThick = (.35 + pulse * .15) * widthScale;  // pulses and scales
        const innerThick = (.15 + pulse * .08) * widthScale;  // pulses and scales
        const outerAlpha = .6 + pulse * .25;
        const innerAlpha = .75 + pulse * .2;
        
        // Outer glow layer
        drawLine(dragSource.pos, targetPos, outerThick, hsl(beamHue, .85, .55, outerAlpha));
        // Inner bright core
        drawLine(dragSource.pos, targetPos, innerThick, hsl(beamHue, .95, .78, innerAlpha));

        const sendCount = max(1, (dragSource.ships * dragPercent)|0);
        drawText((dragPercent*100|0) + '%  (' + sendCount + ')', mousePos.add(vec2(0, 2.2)),
            1.2, hsl(0,0,1), .18, hsl(0,0,0));
    }
}

function gameRenderPost()
{
    if (!isPlaying)
    {
        const cx = mainCanvasSize.x/2;
        const cy = mainCanvasSize.y/2;

        // Pulsing title effect
        const t = time;
        const huePulse = .4 + Math.sin(t * 1.8) * .08;

        // Glow layers behind title (centered, sits above the menu panel)
        for(let i = 0; i < 9; ++i)
            drawTextScreen('ORBITSWARM', vec2(cx, cy - 180-i*8), 110 + Math.sin(t * 2.5+i) * 2+i*3, hsl(huePulse+i*.1, 1, i/11), 0, BLACK, undefined,undefined, 'bold');

        return;
    }

    // Simple HUD - controls at bottom
    const cx = mainCanvasSize.x / 2;
    const helpY = mainCanvasSize.y - 20;
    
    drawTextScreen('Drag: Send Ships  |  Wheel or 1-4: Set %  |  R: Restart  |  Esc: Pause', 
        vec2(cx, helpY), 18, hsl(0,0,.7), 3, hsl(0,0,0));

    // Debug mode indicator
    if (debugShowStats)
        drawTextScreen('DEBUG MODE (G)', vec2(cx, 30), 18, hsl(.14, .8, .6), 3, hsl(0,0,0));

    if (gameOver)
    {
        const msg = gameOver == 1 ? 'YOU WIN!' : 'YOU LOSE!';
        drawTextScreen(msg, vec2(cx, mainCanvasSize.y/2 - 30),
            100, hsl(gameOver==1?.33:.02, .9, .6), 12, hsl(0,0,0));
        
        // Show time on win
        if (gameOver == 1)
        {
            const mins = (gameTimer / 60) | 0;
            const secs = (gameTimer % 60) | 0;
            const timeStr = 'Time: ' + mins + ':' + (secs < 10 ? '0' : '') + secs;
            drawTextScreen(timeStr, vec2(cx, mainCanvasSize.y/2 + 60),
                40, hsl(0,0,1), 6, hsl(0,0,0));
        }

        drawTextScreen('Press Space or Escape',
            vec2(cx, mainCanvasSize.y/2 + 120),
            28, hsl(0,0,.8), 5, hsl(0,0,0));
    }
}

///////////////////////////////////////////////////////////////////////////////
// Startup
engineInit(gameInit, gameUpdate, gameUpdatePost, gameRender, gameRenderPost, ['tiles.png']);

</script>
