<script>
'use strict';

debugWatermark = false;
showEngineVersion = false;
gravity = vec2(0, 0);
cameraPos = vec2(0, 0);
cameraScale = 32;
canvasMaxSize = vec2(2048, 2048);
tilesPixelated = false;

///////////////////////////////////////////////////////////////////////////////
// Config
const BALL_R       = 0.55;           // ball radius in world units
const BALL_D       = BALL_R * 2;     // diameter = arc spacing between balls
const NUM_COLORS   = 5;
const BALL_COLORS  = [
    hsl(0,    1, .58),  // red
    hsl(.58,  1, .58),  // blue
    hsl(.33, .9, .48),  // green
    hsl(.13,  1, .55),  // yellow
    hsl(.83,  1, .62),  // magenta
];

const SPIRAL_INNER_R   = 4;          // hole radius (lose when head arrives here)
const SPIRAL_OUTER_R   = 14;         // spawn radius
const SPIRAL_TURNS     = 3.25;
const PATH_SAMPLES     = 2400;       // polyline density

const CHAIN_SPEED      = 0.9;        // arc units per second
const CHAIN_CATCHUP    = 6;          // extra speed when catching up to front
const SHOT_SPEED       = 28;         // world units per second
const PLAYER_RADIUS    = 1.0;        // visual size of the center turret

const BALLS_PER_LEVEL  = 60;

// Spiral tile spans this many world units along each side. Balls live inside
// SPIRAL_OUTER_R (~14) so 32 gives a small margin for the dark border stroke.
const ARENA_SIZE       = 32;

///////////////////////////////////////////////////////////////////////////////
// State
let path = [];                 // [{pos, arc}], arc grows as we move from outer to inner
let pathTotalArc = 0;

let chain = [];                // [{arc, colorIdx}], chain[0] is FRONT (closest to hole)
let ballsRemaining = 0;
let shots  = [];               // [{pos, vel, colorIdx}]
let nextShotColor = 0;
let loadedShotColor = 0;
let aimDir = vec2(1, 0);       // unit vector — pointing right at startup
let score = 0;
let gameOverPending = false;
let currentCombo = 0;          // resets on shoot, increments per pop event
let floatingTexts = [];        // [{pos, vel, text, color, age, life, size}]

const DANGER_START = .82;      // path-arc ratio at which danger warning kicks in
const DANGER_FULL  = 1.0;      // path-arc ratio at full panic

let sound_shoot, sound_pop, sound_click, sound_lose, sound_combo;

// Pre-rendered sprites (built once at gameInit) so per-frame rendering is just
// a handful of textured quads instead of 2400+ overlapping drawLine quads.
let tile_spiral, tile_ball, tile_glow;

///////////////////////////////////////////////////////////////////////////////
// Spiral path: build a polyline from outer end (arc=0) to inner hole (arc=max).
function buildPath()
{
    path = [];
    const thetaMax = SPIRAL_TURNS * 2 * PI;
    const dr = (SPIRAL_OUTER_R - SPIRAL_INNER_R);
    let prev = null;
    let arc  = 0;
    for (let i = 0; i <= PATH_SAMPLES; i++)
    {
        const t     = i / PATH_SAMPLES;             // 0 outer -> 1 inner
        const theta = thetaMax * (1 - t);           // outer has high theta, hole has theta=0
        const r     = SPIRAL_INNER_R + dr * (theta / thetaMax);
        const pos   = vec2(Math.cos(theta) * r, Math.sin(theta) * r);
        if (prev) arc += pos.distance(prev);
        path.push({pos, arc});
        prev = pos;
    }
    pathTotalArc = arc;
}

// Bake the spiral background + a reusable ball sprite + a soft glow into
// the texture atlas. Called once at gameInit after buildPath so the spiral
// stroke can follow the exact same polyline the chain rides on.
function buildTextures()
{
    initDrawToTexture(4);            // 4x4 atlas → 500x500 px per tile

    const TS = 500;
    const px = TS / ARENA_SIZE;      // pixels per world unit inside the tile

    // ---- Tile 0: spiral groove. One smooth canvas-2D path beats 2400
    //              overlapping drawLine quads at tight curves. ----
    tile_spiral = drawToTexture(0, (ctx) =>
    {
        ctx.lineCap  = 'round';
        ctx.lineJoin = 'round';

        // Build the path once, reuse for the outer + inner stroke passes.
        ctx.beginPath();
        for (let i = 0; i < path.length; i++)
        {
            const p = path[i].pos;
            const x = TS/2 + p.x * px;
            const y = TS/2 - p.y * px;        // flip Y: world Y-up → canvas Y-down
            i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        }

        // Dark outer rim (slightly wider than the groove).
        ctx.strokeStyle = '#160826';
        ctx.lineWidth   = (BALL_D + .45) * px;
        ctx.stroke();

        // Inner groove a touch lighter so the rim reads as a recessed track.
        ctx.strokeStyle = '#2a1647';
        ctx.lineWidth   = (BALL_D + .05) * px;
        ctx.stroke();

        // Hole at the inner end of the spiral — radial gradient → matte black.
        const holePos = path[path.length - 1].pos;
        const hx = TS/2 + holePos.x * px;
        const hy = TS/2 - holePos.y * px;
        const holeR = BALL_D * 1.8 * px;
        const grad = ctx.createRadialGradient(hx, hy, 0, hx, hy, holeR);
        grad.addColorStop(0,  '#000');
        grad.addColorStop(.6, '#08031a');
        grad.addColorStop(1,  'rgba(8,3,26,0)');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(hx, hy, holeR, 0, 2*PI);
        ctx.fill();
    }, 'spiral groove background');

    // ---- Tile 1: shaded ball sphere. Drawn white-to-dark so a multiplicative
    //              tint produces a "marble" of any color (white tint → no
    //              change, red tint → red sphere with dark edges, etc.). ----
    tile_ball = drawToTexture(1, (ctx) =>
    {
        const cx = TS/2, cy = TS/2, r = TS/2 - 4;

        // Dark outline ring so balls read clearly against the groove.
        ctx.fillStyle = '#000';
        ctx.beginPath(); ctx.arc(cx, cy, r, 0, 2*PI); ctx.fill();

        // Sphere body — off-center radial gradient gives the volumetric look.
        const grad = ctx.createRadialGradient(cx - r*.4, cy - r*.4, 0, cx, cy, r);
        grad.addColorStop(0,   'rgba(255,255,255,1)');
        grad.addColorStop(.35, 'rgba(230,230,230,1)');
        grad.addColorStop(.75, 'rgba(110,110,110,1)');
        grad.addColorStop(1,   'rgba(28,28,28,1)');
        ctx.fillStyle = grad;
        ctx.beginPath(); ctx.arc(cx, cy, r - 6, 0, 2*PI); ctx.fill();

        // No baked-in highlight: the multiplicative tint would recolor it
        // (red ball ⇒ red speck). The true white specular is added at draw
        // time via a separate additive pass using tile_glow — see drawBall.
    }, 'ball sphere');

    // ---- Tile 2: soft white glow. Drawn additively for danger auras and
    //              the hole warning pulse. Alpha-0 additive color keeps the
    //              halo from doubling up its own alpha. ----
    tile_glow = drawToTexture(2, (ctx) =>
    {
        const cx = TS/2, cy = TS/2, r = TS/2;
        const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
        grad.addColorStop(0,  'rgba(255,255,255,1)');
        grad.addColorStop(.4, 'rgba(255,255,255,.55)');
        grad.addColorStop(1,  'rgba(255,255,255,0)');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, TS, TS);
    }, 'soft glow');
}

// Position at a given arc length (0 = outer spawn, pathTotalArc = inner hole).
function pathPointAt(s)
{
    if (s <= 0) return path[0].pos;
    if (s >= pathTotalArc) return path[path.length - 1].pos;
    let lo = 0, hi = path.length - 1;
    while (lo + 1 < hi)
    {
        const m = (lo + hi) >> 1;
        if (path[m].arc <= s) lo = m; else hi = m;
    }
    const a = path[lo], b = path[hi];
    const t = (s - a.arc) / (b.arc - a.arc);
    return a.pos.lerp(b.pos, t);
}

///////////////////////////////////////////////////////////////////////////////
// Chain
function pickSpawnColor()
{
    if (chain.length === 0) return randInt(NUM_COLORS);
    // Avoid spawning the same color as the rear ball (no auto 3-runs from spawning).
    const last = chain[chain.length - 1].colorIdx;
    let c;
    do { c = randInt(NUM_COLORS); } while (c === last);
    return c;
}

function pickShotColor()
{
    // Only emit colors that exist in the chain so a held color is never useless.
    if (chain.length === 0) return randInt(NUM_COLORS);
    const available = [];
    const seen = new Set();
    for (const b of chain)
        if (!seen.has(b.colorIdx)) { seen.add(b.colorIdx); available.push(b.colorIdx); }
    return available[randInt(available.length)];
}

function updateChain(dt)
{
    // Base forward motion toward the hole.
    const dv = CHAIN_SPEED * dt;
    for (const b of chain) b.arc += dv;

    // Catch-up: any ball with extra gap to its front neighbor closes it
    // — this is how post-pop gaps eventually heal and combo.
    const catchup = CHAIN_CATCHUP * dt;
    for (let i = 1; i < chain.length; i++)
    {
        const ideal = chain[i - 1].arc - BALL_D;
        if (chain[i].arc < ideal)
            chain[i].arc = Math.min(chain[i].arc + catchup, ideal);
    }

    // Spawn new balls at the back (arc=0) once previous back has cleared.
    if (ballsRemaining > 0)
    {
        const back = chain[chain.length - 1];
        if (!back || back.arc >= BALL_D)
        {
            chain.push({arc: 0, colorIdx: pickSpawnColor()});
            ballsRemaining--;
        }
    }
}

// Glowing additive particle burst — auto-managed by the engine as an EngineObject.
function spawnPopBurst(pos, color)
{
    new ParticleEmitter(
        pos, 0,                                // pos, angle
        BALL_R * .4,                           // emitSize
        .12,                                   // emitTime (short burst)
        320,                                   // emitRate
        PI,                                    // emitConeAngle (full circle)
        undefined,                             // tileInfo (untextured)
        color,                                 // colorStartA
        color.lerp(WHITE, .6),                 // colorStartB
        new Color(color.r, color.g, color.b, 0),// colorEndA
        new Color(1, 1, 1, 0),                 // colorEndB
        .55,                                   // particleTime
        .35, .05,                              // sizeStart, sizeEnd
        .5,                                     // particleSpeed
        0,                                     // angleSpeed
        .88, 1, 0,                             // damping, angleDamping, gravityScale
        PI, .15, .5,                          // particleConeAngle, fadeRate, randomness
        false, true,                           // collideTiles, additive
    );
}

function spawnFloatingText(pos, text, color, combo)
{
    floatingTexts.push({
        pos:   pos.copy(),
        vel:   vec2(0, 3.5),
        text:  text,
        color: color,
        age:   0,
        life:  combo > 1 ? 1.4 : 1.0,
        size:  combo > 1 ? .9 + Math.min(combo, 5) * .15 : .8,
    });
}

function updateFloatingTexts(dt)
{
    for (let i = floatingTexts.length - 1; i >= 0; i--)
    {
        const t = floatingTexts[i];
        t.age += dt;
        t.pos = t.pos.add(t.vel.scale(dt));
        t.vel = t.vel.scale(.92);
        if (t.age >= t.life) floatingTexts.splice(i, 1);
    }
}

// 0 at safe distance, ramps to 1 as the chain head approaches the hole.
function dangerOf(arc)
{
    return clamp((arc / pathTotalArc - DANGER_START) / (DANGER_FULL - DANGER_START), 0, 1);
}

function chainDanger()
{
    return chain.length === 0 ? 0 : dangerOf(chain[0].arc);
}

// Find any run of 3+ same-color balls that are all touching (gap <= BALL_D)
// and pop them. Returns true if anything popped.
function popMatches()
{
    let popped = false;
    let i = 0;
    while (i < chain.length)
    {
        let j = i;
        while (j + 1 < chain.length
            && chain[j + 1].colorIdx === chain[i].colorIdx
            && chain[j].arc - chain[j + 1].arc <= BALL_D + 0.01)
            j++;
        const len = j - i + 1;
        if (len >= 3)
        {
            const popPos = pathPointAt((chain[i].arc + chain[j].arc) / 2);
            const popColor = BALL_COLORS[chain[i].colorIdx];
            for (let k = i; k <= j; k++)
                spawnPopBurst(pathPointAt(chain[k].arc), BALL_COLORS[chain[k].colorIdx]);
            currentCombo++;
            const base   = len * 10 + (len - 3) * 5;
            const earned = base * currentCombo;
            score += earned;
            const txt = currentCombo > 1
                ? '+' + earned + '  x' + currentCombo
                : '+' + earned;
            spawnFloatingText(popPos, txt, popColor, currentCombo);
            chain.splice(i, len);
            (currentCombo > 1 ? sound_combo : sound_pop).play(popPos, 1, 1 + .12 * (currentCombo - 1));
            popped = true;
            // After splice, the new chain[i] is what was just behind the popped run.
            // It now has a gap to chain[i-1]; catch-up will close it next frames.
            // Don't advance i — a fresh adjacency may have formed.
        }
        else i = j + 1;
    }
    return popped;
}

///////////////////////////////////////////////////////////////////////////////
// Insertion when a shot collides with the chain.
function tryInsertShot(shot)
{
    // Find the chain ball with the closest world position.
    let bestIdx = -1, bestDist = Infinity, bestPos = null;
    for (let i = 0; i < chain.length; i++)
    {
        const p = pathPointAt(chain[i].arc);
        const d = p.distance(shot.pos);
        if (d < bestDist) { bestDist = d; bestIdx = i; bestPos = p; }
    }
    if (bestIdx < 0 || bestDist > BALL_D) return false;

    // Pick insertion side based on whether the shot is closer to the front or
    // back neighbor of the closest ball. Edge cases use whichever neighbor exists.
    const frontN = chain[bestIdx - 1];
    const backN  = chain[bestIdx + 1];
    let insertIdx;
    if (!frontN && !backN) insertIdx = bestIdx + 1;
    else if (!frontN)
    {
        const bn = pathPointAt(backN.arc);
        insertIdx = (shot.pos.distance(bn) < shot.pos.distance(bestPos)) ? bestIdx + 1 : bestIdx;
    }
    else if (!backN)
    {
        const fn = pathPointAt(frontN.arc);
        insertIdx = (shot.pos.distance(fn) < shot.pos.distance(bestPos)) ? bestIdx : bestIdx + 1;
    }
    else
    {
        const fn = pathPointAt(frontN.arc);
        const bn = pathPointAt(backN.arc);
        insertIdx = (shot.pos.distance(fn) < shot.pos.distance(bn)) ? bestIdx : bestIdx + 1;
    }

    // Decide the new ball's arc value to put it between its neighbors.
    let newArc;
    if (insertIdx === 0)
        newArc = chain[0].arc + BALL_D;
    else if (insertIdx >= chain.length)
        newArc = chain[chain.length - 1].arc - BALL_D;
    else
        newArc = (chain[insertIdx - 1].arc + chain[insertIdx].arc) / 2;

    chain.splice(insertIdx, 0, {arc: newArc, colorIdx: shot.colorIdx});

    // Enforce min spacing — shove the front section forward if needed (visible
    // "lurch toward the hole" that makes a bad shot scary).
    for (let i = insertIdx; i > 0; i--)
    {
        const minFront = chain[i].arc + BALL_D;
        if (chain[i - 1].arc < minFront) chain[i - 1].arc = minFront;
    }
    // And shove the back section backward if needed (shouldn't normally
    // trigger since we chose mid-gap, but covers tight insertions).
    for (let i = insertIdx + 1; i < chain.length; i++)
    {
        const maxBack = chain[i - 1].arc - BALL_D;
        if (chain[i].arc > maxBack) chain[i].arc = maxBack;
    }

    popMatches();
    return true;
}

///////////////////////////////////////////////////////////////////////////////
// Game flow
function newGame()
{
    chain = [];
    shots = [];
    floatingTexts = [];
    currentCombo = 0;
    ballsRemaining = BALLS_PER_LEVEL;
    score = 0;
    gameOverPending = false;
    // Pre-spawn a starter chain so the player has something to shoot at on frame 1.
    const startArc = pathTotalArc * .35;
    const preSpawn = 10;
    for (let i = 0; i < preSpawn; i++)
        chain.push({arc: startArc - i * BALL_D, colorIdx: pickSpawnColor()});
    ballsRemaining = Math.max(0, BALLS_PER_LEVEL - preSpawn);
    loadedShotColor = pickShotColor();
    nextShotColor   = pickShotColor();
}

function endGame(won)
{
    if (gameOverPending) return;
    gameOverPending = true;
    submitBestScore(score|0);
    if (!won) sound_lose.play();
    showAlertDialog({
        title: won ? 'CLEARED!' : 'GAME OVER',
        icon:  won ? '★' : '☠',
        message: 'Score: ' + score,
        onOk: () => {
            setPlaying(false);
            newGame();          // refresh title backdrop with a new starter chain
            showMenu('title');
        },
    });
}

function shootBall()
{
    const origin = aimDir.scale(PLAYER_RADIUS * 1.1);
    shots.push({pos: origin, vel: aimDir.scale(SHOT_SPEED), colorIdx: loadedShotColor});
    sound_shoot.play(origin);
    loadedShotColor = nextShotColor;
    nextShotColor = pickShotColor();
    currentCombo = 0;     // each new shot resets the combo counter
}

function swapShot()
{
    const t = loadedShotColor;
    loadedShotColor = nextShotColor;
    nextShotColor = t;
    sound_click.play();
}

///////////////////////////////////////////////////////////////////////////////
// Menus

async function gameInit()
{
    saveDataInit('zuma');
    canvasClearColor = new Color().setHex('#0a0418');

    buildPath();
    buildTextures();
    newGame();

    setSoundVolume(.6);
    installAutoPause();

    sound_shoot = new SoundGenerator({frequency: 520, attack: 0,    release: .12, shapeCurve: 1, slide: -3,  noise: .05, volume: .7});
    sound_pop   = new SoundGenerator({frequency: 380, attack: .01,  release: .25, shapeCurve: 1, slide:  6,  pitchJump: 200, pitchJumpTime: .04, volume: .9});
    sound_combo = new SoundGenerator({frequency: 520, attack: .005, release: .35, shapeCurve: 1, slide:  10, pitchJump: 360, pitchJumpTime: .05, volume: 1.0});
    sound_click = new SoundGenerator({frequency: 750, attack: 0,    release: .05, shapeCurve: 1, volume: .4});
    sound_lose  = new SoundGenerator({frequency: 180, attack: 0,    release: .8,  shapeCurve: 1, slide: -2,  noise: .1,  volume: .9});

    createTitleMenu({
        title: 'ZOOMI',
        subtitle: 'Shoot the spiral. Match 3+ to pop.',
        revealOnClick: false,
        canReveal: () => !isPlaying(),
        onPlay: () => { newGame(); setPlaying(true); },
        items: [
            {type:'button', label:'OPTIONS', onClick: () => pushMenu('options')},
            {type:'button', label:'HOW TO PLAY', onClick: () => pushMenu('about')},
        ],
    });

    createOptionsMenu();

    createMenu({
        id: 'about',
        title: 'HOW TO PLAY',
        onHide: popMenu,
        items: [
            {type:'text', text:
                'You are the turret at the center of the screen.\n\n' +
                'Balls travel along the spiral toward the hole at the center. ' +
                'Aim with the mouse, click to shoot the loaded ball into the chain. ' +
                'When 3 or more same-colored balls touch, they pop.\n\n' +
                'Press SPACE or right-click to swap your loaded ball with the next one.\n\n' +
                'Clear every ball to win. If the chain head reaches the hole, you lose.'},
            {type:'separator'},
            {type:'button', label:'BACK', onClick: () => hideMenu('about')},
        ],
    });

    createPauseMenu({
        onQuit: () =>
        {
            clearSubmenuStack(); hideAllMenus();
            setPlaying(false); newGame(); showMenu('title');
        },
        extraItems: [
            {type:'button', id:'options', label:'OPTIONS', onClick: () => pushMenu('options')},
        ],
    });

    installDefaultToolbar();

    showMenu('title');
}

///////////////////////////////////////////////////////////////////////////////
function fitCameraToCanvas()
{
    // Fit the spiral (outerR + a small margin) into the smaller canvas dimension.
    const fitR = SPIRAL_OUTER_R + 1.5;
    cameraScale = Math.min(mainCanvasSize.x, mainCanvasSize.y) / (2 * fitR);
}

function gameUpdate()
{
    fitCameraToCanvas();

    if (bindPauseKey({when: () => isPlaying() && !gameOverPending})) return;
    if (!isPlaying() || gameOverPending) return;

    // Aim
    if (mousePos.lengthSquared() > 0.0001) aimDir = mousePos.normalize();

    // Shoot / swap
    if (mouseWasPressed(0)) shootBall();
    if (mouseWasPressed(2) || keyWasPressed('Space')) swapShot();

    // Move shots
    const dt = timeDelta;
    for (const s of shots) s.pos = s.pos.add(s.vel.scale(dt));

    // Shot/chain collision
    for (let i = shots.length - 1; i >= 0; i--)
    {
        const s = shots[i];
        if (tryInsertShot(s))
        {
            shots.splice(i, 1);
            continue;
        }
        // Off-screen cull
        if (s.pos.length() > SPIRAL_OUTER_R + 3) shots.splice(i, 1);
    }

    // Update chain + check combos from catch-up closing gaps
    updateChain(dt);
    popMatches();

    updateFloatingTexts(dt);

    // Win / Lose
    if (chain.length === 0 && ballsRemaining === 0) endGame(true);
    else if (chain.length > 0 && chain[0].arc >= pathTotalArc) endGame(false);
}

function gameUpdatePost() { }

///////////////////////////////////////////////////////////////////////////////
// Render
function drawSpiralGroove()
{
    // One textured quad replaces 2400 stitched line-quads — no more curve
    // distortion at tight inner turns.
    drawTile(vec2(0, 0), vec2(ARENA_SIZE), tile_spiral);
}

function drawHoleWarning()
{
    const d = chainDanger();
    if (d <= 0) return;
    const pulse = .5 + .5 * Math.sin(time * 7);
    const intensity = d * (.6 + .4 * pulse);
    drawTile(
        path[path.length - 1].pos,
        vec2(BALL_D * (6 + 4 * pulse * d)),
        tile_glow,
        CLEAR_BLACK, 0, false,                       // multiplicative pass invisible
        new Color(intensity, intensity * .12, 0, 0), // additive red (alpha 0 — additive only)
    );
}

function drawBall(pos, colorIdx, radiusOverride)
{
    const r = radiusOverride !== undefined ? radiusOverride : BALL_R;
    // Tinted shaded sphere — multiplicative pass.
    drawTile(pos, vec2(r * 2), tile_ball, BALL_COLORS[colorIdx]);
    // Specular effect
    drawTile(
        pos.add(vec2(-r * .3, r * .3)),
        vec2(r * .9),
        tile_glow,
        WHITE, 0, false,
        new Color(.9, .9, .9, 0),
    );
}

function drawChainBall(b)
{
    const pos = pathPointAt(b.arc);
    const d = dangerOf(b.arc);
    if (d > 0)
    {
        const pulse = .5 + .5 * Math.sin(time * 8);
        const intensity = d * (.5 + .35 * pulse);
        drawTile(
            pos,
            vec2(BALL_D * (2.6 + .8 * pulse * d)),
            tile_glow,
            CLEAR_BLACK, 0, false,
            new Color(intensity, intensity * .15, 0, 0),
        );
    }
    drawBall(pos, b.colorIdx);
}

function gameRender()
{
    // Backdrop visible on title too — spiral, hole warning, chain, shots.
    drawSpiralGroove();
    drawHoleWarning();
    for (const b of chain) drawChainBall(b);
    for (const s of shots) drawBall(s.pos, s.colorIdx);

    // Turret + aim — only meaningful during gameplay.
    if (isPlaying() || gameOverPending)
    {
        drawCircle(vec2(0, 0), PLAYER_RADIUS * 2 + .25, hsl(0, 0, 0));
        drawCircle(vec2(0, 0), PLAYER_RADIUS * 2,       hsl(.13, .8, .35));
        drawCircle(vec2(0, 0), PLAYER_RADIUS * 1.5,     hsl(.13, .9, .5));

        const tip = aimDir.scale(PLAYER_RADIUS * 1.6);
        drawLine(vec2(0, 0), tip, .35, hsl(0, 0, .1));
        drawLine(vec2(0, 0), tip, .22, hsl(.13, .9, .7));

        drawBall(tip, loadedShotColor, BALL_R * .9);
        drawBall(aimDir.scale(-PLAYER_RADIUS * .55), nextShotColor, BALL_R * .55);

        const guideEnd = aimDir.scale(SPIRAL_OUTER_R);
        const dashes = 18;
        for (let i = 0; i < dashes; i += 2)
        {
            const a = tip.lerp(guideEnd, i / dashes);
            const b = tip.lerp(guideEnd, (i + 1) / dashes);
            drawLine(a, b, .05, hsl(0, 0, 1, .15));
        }
    }

    // Floating scores (rendered last so they sit on top of the chain).
    for (const t of floatingTexts)
    {
        const fade = 1 - t.age / t.life;
        const fg = new Color(t.color.r, t.color.g, t.color.b, fade);
        const bg = new Color(0, 0, 0, .6 * fade);
        drawText(t.text, t.pos, t.size, fg, .12, bg);
    }
}

function gameRenderPost()
{
    // Danger vignette is part of the gameplay backdrop, so it tracks the
    // chain state regardless of whether a menu is up.
    const d = chainDanger();
    if (d > 0)
    {
        const pulse = .5 + .5 * Math.sin(time * 5);
        // Larger ellipse pushes the colored ring further off-screen so only
        // a soft rim bleeds in at the edges — the center stays clear.
        drawEllipseGradient(
            vec2(mainCanvasSize.x / 2, mainCanvasSize.y / 2),
            vec2(mainCanvasSize.x * 2.2, mainCanvasSize.y * 2.2),
            new Color(1, 0, 0, 0),
            new Color(.6, 0, 0, d * (.18 + .14 * pulse)),
            0, true, true,
        );
    }

    if (!isPlaying()) return;

    drawTextScreen('SCORE  ' + score,
        vec2(20, 30), 28, hsl(0, 0, 1), 4, hsl(0, 0, 0), 'left');
    drawTextScreen('REMAINING  ' + (ballsRemaining + chain.length),
        vec2(mainCanvasSize.x / 2, 30), 24, hsl(.13, 1, .8), 4, hsl(0, 0, 0));

    if (currentCombo > 1)
    {
        const flash = .5 + .5 * Math.sin(time * 18);
        drawTextScreen('COMBO  x' + currentCombo,
            vec2(mainCanvasSize.x / 2, 70),
            32 + 6 * Math.min(currentCombo, 5),
            hsl(0, 1, .6 + .2 * flash), 5, hsl(0, 0, 0));
    }
}

///////////////////////////////////////////////////////////////////////////////
engineInit(gameInit, gameUpdate, gameUpdatePost, gameRender, gameRenderPost);
</script></body></html>
