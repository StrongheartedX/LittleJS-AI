<!DOCTYPE html><head>
<title>Zuma</title>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
#littlejs-menus {
    --menu-bg:     rgba(15, 5, 30, 0.92);
    --menu-fg:     #fff;
    --menu-accent: #ffcc44;
    --menu-font:   'Trebuchet MS', sans-serif;
    --menu-radius: 14px;
}
</style>
</head><body style="background:#000">
<script src="../dist/littlejs.js?1.18.15"></script>
<script src="../templates/menus.js"></script>
<script src="../templates/soundGenerator.js"></script>
<script>
'use strict';

debugWatermark = false;
showEngineVersion = false;
gravity = vec2(0, 0);
cameraPos = vec2(0, 0);
cameraScale = 32;
canvasMaxSize = vec2(2048, 2048);

///////////////////////////////////////////////////////////////////////////////
// Config
const BALL_R       = 0.55;           // ball radius in world units
const BALL_D       = BALL_R * 2;     // diameter = arc spacing between balls
const NUM_COLORS   = 5;
const BALL_COLORS  = [
    hsl(0,    1, .58),  // red
    hsl(.58,  1, .58),  // blue
    hsl(.33, .9, .48),  // green
    hsl(.13,  1, .55),  // yellow
    hsl(.83,  1, .62),  // magenta
];

const SPIRAL_INNER_R   = 4;          // hole radius (lose when head arrives here)
const SPIRAL_OUTER_R   = 14;         // spawn radius
const SPIRAL_TURNS     = 3.25;
const PATH_SAMPLES     = 2400;       // polyline density

const CHAIN_SPEED      = 0.9;        // arc units per second
const CHAIN_CATCHUP    = 6;          // extra speed when catching up to front
const SHOT_SPEED       = 28;         // world units per second
const PLAYER_RADIUS    = 1.0;        // visual size of the center turret

const BALLS_PER_LEVEL  = 60;

///////////////////////////////////////////////////////////////////////////////
// State
let path = [];                 // [{pos, arc}], arc grows as we move from outer to inner
let pathTotalArc = 0;

let chain = [];                // [{arc, colorIdx}], chain[0] is FRONT (closest to hole)
let ballsRemaining = 0;
let shots  = [];               // [{pos, vel, colorIdx}]
let nextShotColor = 0;
let loadedShotColor = 0;
let aimDir = vec2(1, 0);       // unit vector — pointing right at startup
let score = 0;
let isPlaying = false;
let gameOverPending = false;

let sound_shoot, sound_pop, sound_click, sound_lose;

///////////////////////////////////////////////////////////////////////////////
// Spiral path: build a polyline from outer end (arc=0) to inner hole (arc=max).
function buildPath()
{
    path = [];
    const thetaMax = SPIRAL_TURNS * 2 * PI;
    const dr = (SPIRAL_OUTER_R - SPIRAL_INNER_R);
    let prev = null;
    let arc  = 0;
    for (let i = 0; i <= PATH_SAMPLES; i++)
    {
        const t     = i / PATH_SAMPLES;             // 0 outer -> 1 inner
        const theta = thetaMax * (1 - t);           // outer has high theta, hole has theta=0
        const r     = SPIRAL_INNER_R + dr * (theta / thetaMax);
        const pos   = vec2(Math.cos(theta) * r, Math.sin(theta) * r);
        if (prev) arc += pos.distance(prev);
        path.push({pos, arc});
        prev = pos;
    }
    pathTotalArc = arc;
}

// Position at a given arc length (0 = outer spawn, pathTotalArc = inner hole).
function pathPointAt(s)
{
    if (s <= 0) return path[0].pos;
    if (s >= pathTotalArc) return path[path.length - 1].pos;
    let lo = 0, hi = path.length - 1;
    while (lo + 1 < hi)
    {
        const m = (lo + hi) >> 1;
        if (path[m].arc <= s) lo = m; else hi = m;
    }
    const a = path[lo], b = path[hi];
    const t = (s - a.arc) / (b.arc - a.arc);
    return a.pos.lerp(b.pos, t);
}

///////////////////////////////////////////////////////////////////////////////
// Chain
function pickSpawnColor()
{
    if (chain.length === 0) return randInt(NUM_COLORS);
    // Avoid spawning the same color as the rear ball (no auto 3-runs from spawning).
    const last = chain[chain.length - 1].colorIdx;
    let c;
    do { c = randInt(NUM_COLORS); } while (c === last);
    return c;
}

function pickShotColor()
{
    // Only emit colors that exist in the chain so a held color is never useless.
    if (chain.length === 0) return randInt(NUM_COLORS);
    const available = [];
    const seen = new Set();
    for (const b of chain)
        if (!seen.has(b.colorIdx)) { seen.add(b.colorIdx); available.push(b.colorIdx); }
    return available[randInt(available.length)];
}

function updateChain(dt)
{
    // Base forward motion toward the hole.
    const dv = CHAIN_SPEED * dt;
    for (const b of chain) b.arc += dv;

    // Catch-up: any ball with extra gap to its front neighbor closes it
    // — this is how post-pop gaps eventually heal and combo.
    const catchup = CHAIN_CATCHUP * dt;
    for (let i = 1; i < chain.length; i++)
    {
        const ideal = chain[i - 1].arc - BALL_D;
        if (chain[i].arc < ideal)
            chain[i].arc = Math.min(chain[i].arc + catchup, ideal);
    }

    // Spawn new balls at the back (arc=0) once previous back has cleared.
    if (ballsRemaining > 0)
    {
        const back = chain[chain.length - 1];
        if (!back || back.arc >= BALL_D)
        {
            chain.push({arc: 0, colorIdx: pickSpawnColor()});
            ballsRemaining--;
        }
    }
}

// Find any run of 3+ same-color balls that are all touching (gap <= BALL_D)
// and pop them. Returns true if anything popped.
function popMatches()
{
    let popped = false;
    let i = 0;
    while (i < chain.length)
    {
        let j = i;
        while (j + 1 < chain.length
            && chain[j + 1].colorIdx === chain[i].colorIdx
            && chain[j].arc - chain[j + 1].arc <= BALL_D + 0.01)
            j++;
        const len = j - i + 1;
        if (len >= 3)
        {
            const popPos = pathPointAt((chain[i].arc + chain[j].arc) / 2);
            chain.splice(i, len);
            score += len * 10 + (len - 3) * 5;
            sound_pop.play(popPos);
            popped = true;
            // After splice, the new chain[i] is what was just behind the popped run.
            // It now has a gap to chain[i-1]; catch-up will close it next frames.
            // Don't advance i — a fresh adjacency may have formed.
        }
        else i = j + 1;
    }
    return popped;
}

///////////////////////////////////////////////////////////////////////////////
// Insertion when a shot collides with the chain.
function tryInsertShot(shot)
{
    // Find the chain ball with the closest world position.
    let bestIdx = -1, bestDist = Infinity, bestPos = null;
    for (let i = 0; i < chain.length; i++)
    {
        const p = pathPointAt(chain[i].arc);
        const d = p.distance(shot.pos);
        if (d < bestDist) { bestDist = d; bestIdx = i; bestPos = p; }
    }
    if (bestIdx < 0 || bestDist > BALL_D) return false;

    // Pick insertion side based on whether the shot is closer to the front or
    // back neighbor of the closest ball. Edge cases use whichever neighbor exists.
    const frontN = chain[bestIdx - 1];
    const backN  = chain[bestIdx + 1];
    let insertIdx;
    if (!frontN && !backN) insertIdx = bestIdx + 1;
    else if (!frontN)
    {
        const bn = pathPointAt(backN.arc);
        insertIdx = (shot.pos.distance(bn) < shot.pos.distance(bestPos)) ? bestIdx + 1 : bestIdx;
    }
    else if (!backN)
    {
        const fn = pathPointAt(frontN.arc);
        insertIdx = (shot.pos.distance(fn) < shot.pos.distance(bestPos)) ? bestIdx : bestIdx + 1;
    }
    else
    {
        const fn = pathPointAt(frontN.arc);
        const bn = pathPointAt(backN.arc);
        insertIdx = (shot.pos.distance(fn) < shot.pos.distance(bn)) ? bestIdx : bestIdx + 1;
    }

    // Decide the new ball's arc value to put it between its neighbors.
    let newArc;
    if (insertIdx === 0)
        newArc = chain[0].arc + BALL_D;
    else if (insertIdx >= chain.length)
        newArc = chain[chain.length - 1].arc - BALL_D;
    else
        newArc = (chain[insertIdx - 1].arc + chain[insertIdx].arc) / 2;

    chain.splice(insertIdx, 0, {arc: newArc, colorIdx: shot.colorIdx});

    // Enforce min spacing — shove the front section forward if needed (visible
    // "lurch toward the hole" that makes a bad shot scary).
    for (let i = insertIdx; i > 0; i--)
    {
        const minFront = chain[i].arc + BALL_D;
        if (chain[i - 1].arc < minFront) chain[i - 1].arc = minFront;
    }
    // And shove the back section backward if needed (shouldn't normally
    // trigger since we chose mid-gap, but covers tight insertions).
    for (let i = insertIdx + 1; i < chain.length; i++)
    {
        const maxBack = chain[i - 1].arc - BALL_D;
        if (chain[i].arc > maxBack) chain[i].arc = maxBack;
    }

    popMatches();
    return true;
}

///////////////////////////////////////////////////////////////////////////////
// Game flow
function newGame()
{
    chain = [];
    shots = [];
    ballsRemaining = BALLS_PER_LEVEL;
    score = 0;
    gameOverPending = false;
    // Pre-spawn a starter chain so the player has something to shoot at on frame 1.
    const startArc = pathTotalArc * .35;
    const preSpawn = 10;
    for (let i = 0; i < preSpawn; i++)
        chain.push({arc: startArc - i * BALL_D, colorIdx: pickSpawnColor()});
    ballsRemaining = Math.max(0, BALLS_PER_LEVEL - preSpawn);
    loadedShotColor = pickShotColor();
    nextShotColor   = pickShotColor();
}

function endGame(won)
{
    if (gameOverPending) return;
    gameOverPending = true;
    if (!won) sound_lose.play();
    showAlertDialog({
        title: won ? 'CLEARED!' : 'GAME OVER',
        icon:  won ? '★' : '☠',
        message: 'Score: ' + score,
        onOk: () => {
            setPlaying(false);
            showMenu('title');
        },
    });
}

function shootBall()
{
    const origin = aimDir.scale(PLAYER_RADIUS * 1.1);
    shots.push({pos: origin, vel: aimDir.scale(SHOT_SPEED), colorIdx: loadedShotColor});
    sound_shoot.play(origin);
    loadedShotColor = nextShotColor;
    nextShotColor = pickShotColor();
}

function swapShot()
{
    const t = loadedShotColor;
    loadedShotColor = nextShotColor;
    nextShotColor = t;
    sound_click.play();
}

///////////////////////////////////////////////////////////////////////////////
// Menus
let setPlaying;

async function gameInit()
{
    canvasClearColor = new Color().setHex('#0a0418');

    buildPath();
    newGame();

    setSoundVolume(.6);
    setMenuVisibilityCallback(v => paused = v);

    const sound_select   = new Sound([.4,,910,,,.02,2,.07,-5,-33,,,,,,,,.25]);
    const sound_activate = new Sound([.6,,30,.01,,.02,1,3.4,94,,,,,,,,,.67]);
    setMenuSounds({ select: () => sound_select.play(), activate: () => sound_activate.play() });

    sound_shoot = new SoundGenerator({frequency: 520, attack: 0,    release: .12, shapeCurve: 1, slide: -3,  noise: .05, volume: .7});
    sound_pop   = new SoundGenerator({frequency: 380, attack: .01,  release: .25, shapeCurve: 1, slide:  6,  pitchJump: 200, pitchJumpTime: .04, volume: .9});
    sound_click = new SoundGenerator({frequency: 750, attack: 0,    release: .05, shapeCurve: 1, volume: .4});
    sound_lose  = new SoundGenerator({frequency: 180, attack: 0,    release: .8,  shapeCurve: 1, slide: -2,  noise: .1,  volume: .9});

    let _isPlaying = false;
    setPlaying = (p) => {
        _isPlaying = p;
        isPlaying = p;
        const hud = getToolbar('hud');
        if (hud) p ? hud.show() : hud.hide();
    };

    createTitleMenu({
        title: 'ZUMA',
        subtitle: 'Shoot the spiral. Match 3+ to pop.',
        revealOnClick: false,
        canReveal: () => !isPlaying,
        onPlay: () => { newGame(); setPlaying(true); },
        items: [
            {type:'button', label:'OPTIONS', onClick: () => pushMenu('options')},
            {type:'button', label:'HOW TO PLAY', onClick: () => pushMenu('about')},
        ],
    });

    createMenu({
        id: 'options',
        title: 'OPTIONS',
        onHide: popMenu,
        items: [
            {type:'slider', id:'volume', label:'VOLUME', value:.6, min:0, max:1,
                persist:'zuma.volume', onChange: v => setSoundVolume(v)},
            {type:'separator'},
            {type:'button', label:'FULLSCREEN', onClick: toggleFullscreen},
            {type:'button', label:'BACK', onClick: () => hideMenu('options')},
        ],
    });

    createMenu({
        id: 'about',
        title: 'HOW TO PLAY',
        onHide: popMenu,
        items: [
            {type:'text', text:
                'You are the turret at the center of the screen.\n\n' +
                'Balls travel along the spiral toward the hole at the center. ' +
                'Aim with the mouse, click to shoot the loaded ball into the chain. ' +
                'When 3 or more same-colored balls touch, they pop.\n\n' +
                'Press SPACE or right-click to swap your loaded ball with the next one.\n\n' +
                'Clear every ball to win. If the chain head reaches the hole, you lose.'},
            {type:'separator'},
            {type:'button', label:'BACK', onClick: () => hideMenu('about')},
        ],
    });

    createMenu({
        id: 'pause',
        title: 'PAUSED',
        initialItemId: 'resume',
        items: [
            {type:'button', id:'resume',  label:'RESUME',  onClick: () => hideMenu('pause')},
            {type:'button', id:'options', label:'OPTIONS', onClick: () => pushMenu('options')},
            {type:'button', id:'quit',    label:'QUIT TO TITLE', onClick: () => {
                showConfirmDialog({ message:'Quit to title?', onYes: () => {
                    clearSubmenuStack(); hideAllMenus();
                    setPlaying(false); newGame(); showMenu('title');
                }});
            }},
        ],
    });

    createToolbar({
        id: 'hud', anchor: 'top-right', direction: 'horizontal',
        items: [
            {type:'button', id:'fs',   label:'⛶', title:'Toggle fullscreen', onClick: toggleFullscreen},
            {type:'button', id:'menu', label:'☰', title:'Menu', onClick: () => {
                if (isMenuVisible()) { clearSubmenuStack(); hideAllMenus(); }
                else showMenu('pause');
            }},
        ],
    });

    showMenu('title');
}

///////////////////////////////////////////////////////////////////////////////
function fitCameraToCanvas()
{
    // Fit the spiral (outerR + a small margin) into the smaller canvas dimension.
    const fitR = SPIRAL_OUTER_R + 1.5;
    cameraScale = Math.min(mainCanvasSize.x, mainCanvasSize.y) / (2 * fitR);
}

function gameUpdate()
{
    fitCameraToCanvas();

    if (bindPauseKey({when: () => isPlaying && !gameOverPending})) return;
    if (!isPlaying || gameOverPending) return;

    // Aim
    if (mousePos.lengthSquared() > 0.0001) aimDir = mousePos.normalize();

    // Shoot / swap
    if (mouseWasPressed(0)) shootBall();
    if (mouseWasPressed(2) || keyWasPressed('Space')) swapShot();

    // Move shots
    const dt = timeDelta;
    for (const s of shots) s.pos = s.pos.add(s.vel.scale(dt));

    // Shot/chain collision
    for (let i = shots.length - 1; i >= 0; i--)
    {
        const s = shots[i];
        if (tryInsertShot(s))
        {
            shots.splice(i, 1);
            continue;
        }
        // Off-screen cull
        if (s.pos.length() > SPIRAL_OUTER_R + 3) shots.splice(i, 1);
    }

    // Update chain + check combos from catch-up closing gaps
    updateChain(dt);
    popMatches();

    // Win / Lose
    if (chain.length === 0 && ballsRemaining === 0) endGame(true);
    else if (chain.length > 0 && chain[0].arc >= pathTotalArc) endGame(false);
}

function gameUpdatePost() { }

///////////////////////////////////////////////////////////////////////////////
// Render
function drawSpiralGroove()
{
    // Faint trough showing the path.
    const c = hsl(.7, .2, .12);
    for (let i = 0; i < path.length - 1; i += 1)
    {
        drawLine(path[i].pos, path[i + 1].pos, BALL_D + 0.15, c);
    }
    // Darker rim at the hole.
    drawCircle(path[path.length - 1].pos, BALL_D * 1.6, hsl(0, 0, 0));
    drawCircle(path[path.length - 1].pos, BALL_D * 1.3, hsl(.7, .3, .05));
}

function drawBall(pos, colorIdx, radiusOverride)
{
    const r = radiusOverride !== undefined ? radiusOverride : BALL_R;
    const base = BALL_COLORS[colorIdx];
    drawCircle(pos, r * 2,        base);
    drawCircle(pos, r * 1.85,     base, .08, hsl(0, 0, 0, .35));
    // Highlight (top-left), semi-transparent white.
    drawCircle(pos.add(vec2(-r * .35, r * .35)), r * .8, new Color(1, 1, 1, .35));
}

function gameRender()
{
    drawSpiralGroove();

    if (!isPlaying && !gameOverPending) return;

    // Chain
    for (const b of chain) drawBall(pathPointAt(b.arc), b.colorIdx);

    // Shots
    for (const s of shots) drawBall(s.pos, s.colorIdx);

    // Player turret
    drawCircle(vec2(0, 0), PLAYER_RADIUS * 2 + .25, hsl(0, 0, 0));
    drawCircle(vec2(0, 0), PLAYER_RADIUS * 2,       hsl(.13, .8, .35));
    drawCircle(vec2(0, 0), PLAYER_RADIUS * 1.5,     hsl(.13, .9, .5));

    // Barrel
    const tip = aimDir.scale(PLAYER_RADIUS * 1.6);
    drawLine(vec2(0, 0), tip, .35, hsl(0, 0, .1));
    drawLine(vec2(0, 0), tip, .22, hsl(.13, .9, .7));

    // Loaded ball sits at the tip; next ball peeks from the back of the turret.
    drawBall(tip, loadedShotColor, BALL_R * .9);
    drawBall(aimDir.scale(-PLAYER_RADIUS * .55), nextShotColor, BALL_R * .55);

    // Faint aim guideline
    const guideEnd = aimDir.scale(SPIRAL_OUTER_R);
    const dashes = 18;
    for (let i = 0; i < dashes; i += 2)
    {
        const a = tip.lerp(guideEnd, i / dashes);
        const b = tip.lerp(guideEnd, (i + 1) / dashes);
        drawLine(a, b, .05, hsl(0, 0, 1, .15));
    }
}

function gameRenderPost()
{
    if (!isPlaying) return;
    // HUD: score (top-left), balls remaining (top-center).
    drawTextScreen('SCORE  ' + score,
        vec2(20, 30), 28, hsl(0, 0, 1), 4, hsl(0, 0, 0), 'left');
    drawTextScreen('REMAINING  ' + (ballsRemaining + chain.length),
        vec2(mainCanvasSize.x / 2, 30), 24, hsl(.13, 1, .8), 4, hsl(0, 0, 0));
}

///////////////////////////////////////////////////////////////////////////////
engineInit(gameInit, gameUpdate, gameUpdatePost, gameRender, gameRenderPost);
</script></body></html>
