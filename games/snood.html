<script>
'use strict';

// engine settings, do not remove
debugWatermark = false; // Hide debug watermark in corner
showEngineVersion = false; // Hide engine version console display
paused = false;

///////////////////////////////////////////////////////////////////////////////
// SNOOD (bubble shooter) prototype

// Playfield layout
const BUBBLE_DIAM  = 1;
const BUBBLE_R     = BUBBLE_DIAM/2;
const SQRT3_OVER_2 = 0.8660254037844386;
const ROW_STEP_Y   = BUBBLE_DIAM * SQRT3_OVER_2;

const COLS         = 12;
const ROWS_MAX     = 20;        // total grid storage
const ROWS_VISIBLE = 16;        // camera framing + lose line
const START_ROWS   = 7;

const DESCEND_SECONDS_PER_ROW = 14;            // continuous descent rate
const DESCEND_SPEED = ROW_STEP_Y / DESCEND_SECONDS_PER_ROW;
const MIN_SHOT_ANGLE = 10 * PI/180;            // radians from +X
const MAX_SHOT_ANGLE = 170 * PI/180;

// Field dimensions (account for odd-row half offset)
const FIELD_W = COLS*BUBBLE_DIAM + BUBBLE_DIAM/2;
const FIELD_LEFT  = -FIELD_W/2;
const FIELD_RIGHT =  FIELD_W/2;
const FIELD_MIN_X = FIELD_LEFT  + BUBBLE_R;
const FIELD_MAX_X = FIELD_RIGHT - BUBBLE_R;

const TOP_Y    = 8;
const SHOOT_Y  = -8;
const BOTTOM_Y = SHOOT_Y;
const LOSE_Y   = TOP_Y - (ROWS_VISIBLE-1)*ROW_STEP_Y;

// Pop / fall FX tuning
const POP_LIFE        = .22;
const POP_SCALE_MAX   = 1.4;
const SHARD_LIFE      = .4;
const SHARD_COUNT     = 7;
const SHARD_SPEED_MIN = 3;
const SHARD_SPEED_MAX = 7;
const FX_GRAVITY      = -38;  // world y is up-positive
const FALL_ROW_DELAY  = .025; // cascade stagger per row above bottom-most
const FALL_PUSH_K     = .5;   // dx-to-vx scaling for horizontal spread
const FALL_PUSH_MAX   = 2.5;
const FALL_KILL_Y     = SHOOT_Y - 4;

// Colors (solid primitives)
const COLORS = [
    hsl(0.02, 1, .55),
    hsl(0.13, 1, .55),
    hsl(0.33, 1, .50),
    hsl(0.58, 1, .60),
    hsl(0.78, 1, .60),
    hsl(0.92, 1, .60),
];
const OUTLINE = hsl(0,0,0,.8);

// Sounds
let sShoot, sPop, sDrop, sLose, sWin, sTick;

// Game state
let grid;
let aimAngle;
let projectile; // {pos, vel, colorIndex}
let currentColorIndex, nextColorIndex;
let score, shots, gameOver, gameWin;
let descendOffset;    // continuous descent offset (rolls over into addRow at ROW_STEP_Y)
let incomingRow;      // next row that's queued to become row 0 at the next rollover
let gridParity;       // toggles every addRow so existing bubbles keep their hex xOff after a row shift
let popFX;            // active match-pop effects (expanding fades + shards)
let fallers;          // disconnected bubbles falling off the bottom

function resetGame()
{
    score = 0;
    shots = 0;
    gameOver = false;
    gameWin = false;
    projectile = null;
    popFX = [];
    fallers = [];

    // make empty grid
    grid = Array.from({length: ROWS_MAX}, ()=> Array.from({length: COLS}, ()=> null));

    // seed starting bubbles
    for (let r=0; r<START_ROWS; ++r)
    {
        for (let c=0; c<COLS; ++c)
        {
            // add some gaps in lower starting rows
            const gapChance = r < 3 ? 0 : r < 5 ? .15 : .25;
            if (rand() < gapChance) continue;
            grid[r][c] = randInt(COLORS.length);
        }
    }

    // setup shooter
    aimAngle = PI/2;

    descendOffset = 0;
    gridParity = 0;
    genIncomingRow();

    // set initial queue
    currentColorIndex = pickShootColor();
    nextColorIndex    = pickShootColor();
}

function genIncomingRow()
{
    incomingRow = Array.from({length: COLS},
        ()=> rand() < .12 ? null : randInt(COLORS.length));
}

function pickShootColor()
{
    // pick from colors currently present to avoid impossible shots
    const present = new Set();
    for (let r=0; r<ROWS_MAX; ++r)
    for (let c=0; c<COLS; ++c)
    {
        const v = grid[r][c];
        if (v !== null) present.add(v);
    }
    if (incomingRow)
        for (let c=0; c<COLS; ++c)
        {
            const v = incomingRow[c];
            if (v !== null) present.add(v);
        }
    if (!present.size)
        return randInt(COLORS.length);

    const arr = Array.from(present);
    return arr[randInt(arr.length)];
}

function gridToWorld(r, c)
{
    // xOff alternates by row for the hex packing. gridParity flips on every addRow,
    // which inverts the alternation — so an existing bubble whose data shifted from
    // row r-1 to row r keeps the same x. Only the new top row gets the "new" offset.
    const xOff = ((r ^ gridParity) & 1) ? BUBBLE_R : 0;
    const x = FIELD_LEFT + BUBBLE_R + xOff + c*BUBBLE_DIAM;
    const y = TOP_Y - r*ROW_STEP_Y - descendOffset;
    return vec2(x, y);
}

function worldToGrid(pos)
{
    // estimate row (account for continuous descent offset)
    let r = Math.round((TOP_Y - descendOffset - pos.y)/ROW_STEP_Y);
    r = clamp(r, 0, ROWS_MAX-1);

    const xOff = ((r ^ gridParity) & 1) ? BUBBLE_R : 0;
    let c = Math.round((pos.x - (FIELD_LEFT + BUBBLE_R + xOff))/BUBBLE_DIAM);
    c = clamp(c, 0, COLS-1);

    return {r, c};
}

function inBounds(r,c)
{
    return r>=0 && r<ROWS_MAX && c>=0 && c<COLS;
}

function neighbors(r,c)
{
    // 6-neighbors on offset hex grid — parity-adjusted so the relation flips with gridParity
    const odd = (r ^ gridParity) & 1;
    const list = [
        [r, c-1],
        [r, c+1],
        [r-1, c + (odd?0:-1)],
        [r-1, c + (odd?1:0)],
        [r+1, c + (odd?0:-1)],
        [r+1, c + (odd?1:0)],
    ];
    return list.filter(([rr,cc])=>inBounds(rr,cc));
}

function findNearestEmptyCell(worldPos)
{
    const {r: r0, c: c0} = worldToGrid(worldPos);

    // if empty, easy
    if (grid[r0][c0] === null)
        return {r: r0, c: c0};

    // search nearby ring up to distance 2
    let best = null;
    let bestD2 = 1e9;

    for (let dr=-2; dr<=2; ++dr)
    for (let dc=-2; dc<=2; ++dc)
    {
        const r = r0 + dr;
        const c = c0 + dc;
        if (!inBounds(r,c)) continue;
        if (grid[r][c] !== null) continue;

        const p = gridToWorld(r,c);
        const d2 = p.distanceSquared(worldPos);
        if (d2 < bestD2)
            bestD2 = d2, best = {r,c};
    }

    // fallback: find any empty in row range
    if (!best)
    {
        for (let r=0; r<ROWS_MAX; ++r)
        for (let c=0; c<COLS; ++c)
            if (grid[r][c] === null)
                return {r,c};
    }

    return best;
}

function bfsClusterSameColor(rStart, cStart)
{
    const color = grid[rStart][cStart];
    if (color === null) return [];

    const key = (r,c)=> r + ',' + c;
    const q = [[rStart, cStart]];
    const visited = new Set([key(rStart,cStart)]);
    const out = [];

    while (q.length)
    {
        const [r,c] = q.pop();
        out.push([r,c]);
        for (const [rr,cc] of neighbors(r,c))
        {
            const k = key(rr,cc);
            if (visited.has(k)) continue;
            if (grid[rr][cc] !== color) continue;
            visited.add(k);
            q.push([rr,cc]);
        }
    }
    return out;
}

function removeCells(cells)
{
    for (const [r,c] of cells)
        grid[r][c] = null;
}

function spawnPopFX(cells)
{
    // Must be called BEFORE removeCells so we can still read grid[r][c] for color.
    for (const [r,c] of cells)
    {
        const v = grid[r][c];
        if (v === null) continue;
        const color = COLORS[v];
        const pos = gridToWorld(r,c);

        // expanding fading ring at the bubble's location
        popFX.push({kind:'pop', pos: pos.copy(), color, time:0, life:POP_LIFE});

        // colored shards flying outward
        for (let i=0; i<SHARD_COUNT; ++i)
        {
            const ang = rand(0, 2*PI);
            const speed = rand(SHARD_SPEED_MIN, SHARD_SPEED_MAX);
            popFX.push({
                kind:'shard',
                pos: pos.copy(),
                vel: vec2(Math.cos(ang)*speed, Math.sin(ang)*speed),
                color,
                time:0,
                life:SHARD_LIFE,
            });
        }
    }
}

function dropFloating(impactPos)
{
    // mark all bubbles connected to top
    const key = (r,c)=> r + ',' + c;
    const q = [];
    const anchored = new Set();

    for (let c=0; c<COLS; ++c)
        if (grid[0][c] !== null)
            q.push([0,c]), anchored.add(key(0,c));

    while (q.length)
    {
        const [r,c] = q.pop();
        for (const [rr,cc] of neighbors(r,c))
        {
            if (grid[rr][cc] === null) continue;
            const k = key(rr,cc);
            if (anchored.has(k)) continue;
            anchored.add(k);
            q.push([rr,cc]);
        }
    }

    // collect disconnected cells with current world pos + color, then clear them
    const disconnected = [];
    let maxR = -1;
    for (let r=0; r<ROWS_MAX; ++r)
    for (let c=0; c<COLS; ++c)
    {
        if (grid[r][c] === null) continue;
        if (anchored.has(key(r,c))) continue;
        disconnected.push({r, pos: gridToWorld(r,c), color: COLORS[grid[r][c]]});
        if (r > maxR) maxR = r;
        grid[r][c] = null;
    }

    if (!disconnected.length) return;

    score += disconnected.length * 5;
    sDrop.play();

    // convert to fallers: bottom-most (highest r) drops first, others stagger up;
    // horizontal kick scales with distance from the impact point so they spread.
    for (const d of disconnected)
    {
        let vx = 0;
        if (impactPos)
        {
            const dx = d.pos.x - impactPos.x;
            vx = clamp(dx * FALL_PUSH_K, -FALL_PUSH_MAX, FALL_PUSH_MAX);
        }
        fallers.push({
            pos: d.pos,
            vel: vec2(vx, 0),
            color: d.color,
            delay: (maxR - d.r) * FALL_ROW_DELAY,
        });
    }
}

function resolveAfterPlacement(r, c, impactPos)
{
    // match-3 pop
    const cluster = bfsClusterSameColor(r,c);
    if (cluster.length >= 3)
    {
        spawnPopFX(cluster);
        removeCells(cluster);
        score += cluster.length * 10;
        sPop.play();
        dropFloating(impactPos);
    }

    // win check
    let any = false;
    for (let rr=0; rr<ROWS_MAX && !any; ++rr)
    for (let cc=0; cc<COLS && !any; ++cc)
        any = grid[rr][cc] !== null;

    if (!any)
    {
        gameWin = true;
        gameOver = true;
        sWin.play();
        endGame();
    }
}

function addRow()
{
    // push down
    for (let r=ROWS_MAX-1; r>0; --r)
        for (let c=0; c<COLS; ++c)
            grid[r][c] = grid[r-1][c];

    // promote the previewed incoming row to the top, then queue a new one
    for (let c=0; c<COLS; ++c)
        grid[0][c] = incomingRow[c];
    genIncomingRow();

    // flip parity so every existing bubble keeps the xOff it already had — only the
    // brand-new top row gets the alternate offset (which is the correct hex continuation).
    gridParity ^= 1;

    sTick && sTick.play();

    // lose check — any bubble at or past the lose line
    if (anyBubblePastLoseLine())
        triggerLose();
}

function anyBubblePastLoseLine()
{
    for (let r=0; r<ROWS_MAX; ++r)
    for (let c=0; c<COLS; ++c)
    {
        if (grid[r][c] === null) continue;
        if (TOP_Y - r*ROW_STEP_Y - descendOffset <= LOSE_Y)
            return true;
    }
    return false;
}

function triggerLose()
{
    if (gameOver) return;
    gameOver = true;
    gameWin = false;
    sLose.play();
    endGame();
}

function shoot()
{
    if (gameOver || projectile) return;

    // shoot in the current aim direction (aimAngle is continuously updated from mouse)
    const shooterPos = vec2(0, SHOOT_Y);
    const dir = vec2(Math.cos(aimAngle), Math.sin(aimAngle));

    projectile = {
        pos: shooterPos.copy(),
        vel: dir.scale(26),
        colorIndex: currentColorIndex,
    };

    // rotate queue
    currentColorIndex = nextColorIndex;
    nextColorIndex = pickShootColor();

    shots++;

    // Shot-based addRow removed — it shifted the grid down by ROW_STEP_Y instantly,
    // which read as the entire playfield popping down. Continuous descent handles row addition.

    sShoot.play();
}

function integrateProjectile()
{
    if (!projectile) return;

    // move
    projectile.pos = projectile.pos.add(projectile.vel.scale(timeDelta));

    // bounce walls
    if (projectile.pos.x < FIELD_MIN_X)
    {
        projectile.pos.x = FIELD_MIN_X;
        projectile.vel.x = Math.abs(projectile.vel.x);
    }
    if (projectile.pos.x > FIELD_MAX_X)
    {
        projectile.pos.x = FIELD_MAX_X;
        projectile.vel.x = -Math.abs(projectile.vel.x);
    }

    // hit top — cap at row 0's visual level, but never above the mask edge so the
    // projectile doesn't sail into the hidden ceiling area before placement
    if (projectile.pos.y > TOP_Y - max(.5, descendOffset))
    {
        placeProjectile(projectile.pos);
        return;
    }

    // collide with existing bubbles
    const hitR2 = (BUBBLE_DIAM * .96) ** 2;
    for (let r=0; r<ROWS_MAX; ++r)
    for (let c=0; c<COLS; ++c)
    {
        const v = grid[r][c];
        if (v === null) continue;
        const p = gridToWorld(r,c);
        if (p.distanceSquared(projectile.pos) < hitR2)
        {
            // place near the impact point
            placeProjectile(projectile.pos);
            return;
        }
    }

    // fell below shooter (shouldn't happen, but safety)
    if (projectile.pos.y < SHOOT_Y - 2)
        projectile = null;
}

function placeProjectile(worldPos)
{
    const cell = findNearestEmptyCell(worldPos);
    if (!cell)
        return triggerLose();

    const {r,c} = cell;
    grid[r][c] = projectile.colorIndex;
    projectile = null;

    // if any bubble has crossed the lose line, lose
    if (anyBubblePastLoseLine())
        return triggerLose();

    resolveAfterPlacement(r, c, worldPos);
}

function updateFX()
{
    // pop / shard FX
    for (let i=popFX.length-1; i>=0; --i)
    {
        const fx = popFX[i];
        fx.time += timeDelta;
        if (fx.kind === 'shard')
        {
            fx.vel.y += FX_GRAVITY * timeDelta;
            fx.pos = fx.pos.add(fx.vel.scale(timeDelta));
        }
        if (fx.time >= fx.life) popFX.splice(i, 1);
    }

    // falling disconnected bubbles
    for (let i=fallers.length-1; i>=0; --i)
    {
        const f = fallers[i];
        if (f.delay > 0)
        {
            f.delay -= timeDelta;
            continue;
        }
        f.vel.y += FX_GRAVITY * timeDelta;
        f.pos = f.pos.add(f.vel.scale(timeDelta));
        if (f.pos.y < FALL_KILL_Y) fallers.splice(i, 1);
    }
}

///////////////////////////////////////////////////////////////////////////////


function startNewGame()
{
    resetGame();
    setPlaying(true);
    hideAllMenus();
}

function endGame()
{
    // Surface a menus.js dialog so pause-callback drives `paused` for us.
    showGameOverDialog({
        won: gameWin,
        score,
        extraLines: ['Shots: ' + shots],
    });
}

function gameInit()
{
    saveDataInit('snood');
    // called once after the engine starts up
    //setCanvasMaxSize(vec2(1280, 720));
    // Canvas clear matches the panel tint so any area outside the play rectangle
    // (above the wall, beside the panel, etc.) blends in instead of reading as a black bar.
    setCanvasClearColor(hsl(.6, .18, .14));
    setShowSplashScreen(false);

    // sound
    sShoot = new Sound([,,30,.01,,.01,1,1.4,94,-12,,,,,,,,.47,.01]);
    sPop   = new Sound([.9,,84,.01,,.01,,2.7,-50,,-400,.01,,,25,,,.8,.01,,-1e3]);
    sDrop  = new SoundGenerator({volume:.25, frequency:180, attack:.001, sustain:.02, release:.18, shape:1, slide:-.15});
    sLose  = new SoundGenerator({volume:.5,  frequency:120, attack:.01,  sustain:.08, release:.35, shape:3, slide:-.25, noise:.06});
    sWin   = new SoundGenerator({volume:.45, frequency:640, attack:.01,  sustain:.05, release:.25, shape:0, slide:.15, repeatTime:.08});
    sTick  = new SoundGenerator({volume:.30, frequency:300, attack:.001, sustain:.02, release:.10, shape:2, slide:-.10, noise:.02});

    // ----- menus.js wiring -----
    installAutoPause();

    // ----- title menu -----
    // Stays up at startup (no click-to-reveal). onShow resets the field so the
    // grid behind the menu is always a fresh game — PLAY just drops the player
    // straight in without re-resetting.
    createTitleMenu({
        title: 'BOBBLE POP',
        subtitle: 'Bubble Shooter — Match 3+ to pop. Clear the field!',
        revealOnClick: false,
        onShow: resetGame,
        onPlay: () => setPlaying(true),
        items: [
            {type:'button', label:'OPTIONS', onClick: () => pushMenu('options')},
            {type:'button', label:'ABOUT',   onClick: () => pushMenu('about')},
        ],
    });

    // ----- options menu -----
    createOptionsMenu();

    // ----- about menu -----
    createMenu({
        id: 'about',
        title: 'ABOUT',
        onHide: popMenu,
        items: [
            {type:'text', text:'Aim with the mouse and click to shoot.\n\n' +
                'Match 3 or more bubbles of the same color to pop them. ' +
                'Disconnected clusters fall away for bonus points.\n\n' +
                'The bubble grid slowly descends over time. ' +
                'Don\'t let bubbles cross the danger line!'},
            {type:'separator'},
            {type:'button', label:'BACK', onClick: () => hideMenu('about')},
        ],
    });

    // ----- pause menu -----
    createPauseMenu({
        onQuit: () =>
        {
            clearSubmenuStack();
            hideAllMenus();
            setPlaying(false);
            showMenu('title');
        },
        extraItems: [
            {type:'button', id:'options', label:'OPTIONS', onClick: () => pushMenu('options')},
            {type:'button', id:'restart', label:'RESTART', onClick: () =>
            {
                showConfirmDialog({
                    message: 'Restart current game?',
                    onYes: () => { clearSubmenuStack(); startNewGame(); },
                });
            }},
        ],
    });

    // ----- HUD toolbar -----
    installDefaultToolbar();

    setPlaying(false);
    showMenu('title'); // title's onShow runs resetGame
}

///////////////////////////////////////////////////////////////////////////////
function gameUpdate()
{
    // called every frame at 60 frames per second
    // Note: gameUpdate only runs when paused=false (no menu visible).

    // pause shortcut — only meaningful while actually playing
    if (bindPauseKey({when: () => isPlaying() && !gameOver})) return;

    if (!isPlaying()) return;

    // restart shortcut
    if (keyWasPressed('KeyR'))
    {
        startNewGame();
        return;
    }

    if (!gameOver)
    {
        // continuous descent — when offset reaches a full row, snap the grid down
        descendOffset += DESCEND_SPEED * timeDelta;
        if (descendOffset >= ROW_STEP_Y)
        {
            descendOffset -= ROW_STEP_Y;
            addRow();
        }

        // mouse aim (updates every frame)
        const shooterPos = vec2(0, SHOOT_Y);
        if (mouseInWindow)
        {
            let dir = mousePos.subtract(shooterPos);
            if (dir.lengthSquared() < .001)
                dir = vec2(0, 1);

            const ang = Math.atan2(dir.y, dir.x);
            aimAngle = clamp(ang, MIN_SHOT_ANGLE, MAX_SHOT_ANGLE);
        }

        // mouse shoot only
        if (mouseWasPressed(0))
            shoot();

        integrateProjectile();
    }

    updateFX();
}

///////////////////////////////////////////////////////////////////////////////
function gameUpdatePost()
{
    // called after physics and objects are updated
    // setup camera and prepare for render

    // frame the whole field — tight around the play area, shooter, and preview
    const visibleTop = TOP_Y - .5;
    const visibleBot = SHOOT_Y - .7;
    const worldW = FIELD_W + 1.2;
    const worldH = visibleTop - visibleBot;
    cameraScale = min(mainCanvasSize.x/worldW, mainCanvasSize.y/worldH);
    cameraPos = vec2(0, (visibleTop + visibleBot)/2);
    cameraAngle = 0;
}

///////////////////////////////////////////////////////////////////////////////
function gameRender()
{
    // called before objects are rendered

    // outer panel — extends slightly past the walls, blends with canvas-clear color
    const panelTop = TOP_Y;
    const panelBot = SHOOT_Y - 1;
    const panelPos = vec2(0, (panelTop + panelBot)/2);
    const panelSize = vec2(FIELD_W + 1.2, panelTop - panelBot);
    drawRect(panelPos, panelSize, hsl(.6, .18, .14));

    // playfield interior — darker tint inside the walls so the column reads as
    // the "screen" and the area beside it reads as the cabinet/frame
    drawRect(panelPos, vec2(FIELD_W, panelTop - panelBot), hsl(.62, .35, .07));

    // walls — lighter and slightly tinted to read against the panel
    const wallTop = TOP_Y;
    const wallBot = SHOOT_Y - 1;
    drawLine(vec2(FIELD_LEFT, wallBot), vec2(FIELD_LEFT, wallTop), .1, hsl(.6, .25, .38));
    drawLine(vec2(FIELD_RIGHT, wallBot), vec2(FIELD_RIGHT, wallTop), .1, hsl(.6, .25, .38));
    drawLine(vec2(FIELD_LEFT, wallTop), vec2(FIELD_RIGHT, wallTop), .1, hsl(.6, .25, .38));

    // ceiling highlight — thin accent line just under the mask edge
    const accentY = TOP_Y - .55;
    drawLine(vec2(FIELD_LEFT, accentY), vec2(FIELD_RIGHT, accentY), .03, hsl(.6, .4, .55, .5));

    // lose line indicator — warning red
    drawLine(vec2(FIELD_LEFT, LOSE_Y), vec2(FIELD_RIGHT, LOSE_Y), .08, hsl(.02, .9, .55, .55));
}

function drawAimLine()
{
    // Ray-march from the shooter along the aim direction, reflecting off side
    // walls, stopping when we hit a bubble or reach the top. Plot a small dot
    // every few steps so the path reads as a dashed guide.
    const shooterPos = vec2(0, SHOOT_Y);
    let dir = vec2(Math.cos(aimAngle), Math.sin(aimAngle));
    let pos = shooterPos.add(dir.scale(BUBBLE_R * 2.4)); // start past the arrow tip

    const stepSize = .25;
    const maxSteps = 220;
    const hitR2 = (BUBBLE_DIAM * .96) ** 2;
    const topCapY = TOP_Y - max(.5, descendOffset);

    for (let i = 0; i < maxSteps; ++i)
    {
        pos = pos.add(dir.scale(stepSize));

        if (pos.x < FIELD_MIN_X) { pos.x = FIELD_MIN_X; dir.x = abs(dir.x); }
        if (pos.x > FIELD_MAX_X) { pos.x = FIELD_MAX_X; dir.x = -abs(dir.x); }

        if (pos.y > topCapY) break;

        let hit = false;
        for (let r=0; r<ROWS_MAX && !hit; ++r)
        for (let c=0; c<COLS && !hit; ++c)
        {
            if (grid[r][c] === null) continue;
            if (gridToWorld(r,c).distanceSquared(pos) < hitR2) hit = true;
        }
        if (hit) break;

        // dashed look — draw every other step, fade with distance
        if ((i & 1) === 0)
        {
            const fade = 1 - i/maxSteps;
            drawCircle(pos, .09, hsl(0,0,1,.45*fade));
        }
    }
}

///////////////////////////////////////////////////////////////////////////////
function gameRenderPost()
{
    // draw bubbles — flash white any bubble whose bottom has crossed the lose
    // line but whose center hasn't (game-ending threshold). Last-chance warning.
    const flashPulse = .5 + .5 * Math.sin(time * 14);
    for (let r=0; r<ROWS_MAX; ++r)
    for (let c=0; c<COLS; ++c)
    {
        const v = grid[r][c];
        if (v === null) continue;
        const p = gridToWorld(r,c);
        let fill = COLORS[v];
        if (p.y > LOSE_Y && p.y - BUBBLE_R < LOSE_Y)
        {
            const k = flashPulse * .85;
            fill = fill.copy();
            fill.r = fill.r * (1-k) + k;
            fill.g = fill.g * (1-k) + k;
            fill.b = fill.b * (1-k) + k;
        }
        drawCircle(p, BUBBLE_DIAM, fill, .06, OUTLINE);
        // tiny highlight
        drawCircle(p.add(vec2(-.12,.12)), .22, hsl(0,0,1,.5));
    }

    // falling disconnected bubbles
    for (const f of fallers)
    {
        drawCircle(f.pos, BUBBLE_DIAM, f.color, .06, OUTLINE);
        drawCircle(f.pos.add(vec2(-.12,.12)), .22, hsl(0,0,1,.18));
    }

    // pop FX — expanding fades + flying shards
    for (const fx of popFX)
    {
        const t = fx.time / fx.life;
        if (fx.kind === 'pop')
        {
            const scale = 1 + (POP_SCALE_MAX - 1) * t;
            const alpha = 1 - t;
            const fill = fx.color.copy();
            fill.a = alpha * .8;
            const outline = hsl(0, 0, 1, alpha);
            drawCircle(fx.pos, BUBBLE_DIAM * scale, fill, .04, outline);
        }
        else // shard
        {
            const alpha = 1 - t;
            const c = fx.color.copy();
            c.a = alpha;
            drawCircle(fx.pos, .28 * (1 - t*.4), c);
        }
    }

    // ceiling mask — same color as panel/canvas so the hidden strip reads as a
    // continuation of the play surface instead of a black bar above the wall
    drawRect(vec2(0, TOP_Y + 5 - .5), vec2(60, 10), hsl(.6, .18, .14));

    // projectile
    if (projectile)
    {
        drawCircle(projectile.pos, BUBBLE_DIAM, COLORS[projectile.colorIndex], .06, OUTLINE);
        drawCircle(projectile.pos.add(vec2(-.12,.12)), .22, hsl(0,0,1,.18));
    }

    // dotted aim line — simulates the projectile path (including wall bounces)
    // so the player can see where their shot will land
    if (!projectile && !gameOver && isPlaying())
        drawAimLine();

    // shooter + arrow-style aim
    const shooterPos = vec2(0, SHOOT_Y);
    const dir = vec2(Math.cos(aimAngle), Math.sin(aimAngle));
    const aimStart = shooterPos.add(dir.scale(BUBBLE_R)); // start just outside the shooter bubble
    const aimEnd = shooterPos.add(dir.scale(2));
    const aimColor = hsl(0, 0, 1);
    const arrowWidth = .1;
    // arrowhead — two wings rotated ±0.5 rad back from the tip
    const headLen = .55;
    const headSpread = .55;
    const wing1 = aimEnd.add(vec2().setAngle(-PI/2-aimAngle - headSpread, headLen));
    const wing2 = aimEnd.add(vec2().setAngle(-PI/2-aimAngle + headSpread, headLen));
    // draw arrow as a poly
    drawLine(shooterPos.add(dir.scale(-2)), shooterPos.add(dir.scale(1.6)), arrowWidth, aimColor);
    drawPoly([aimEnd, wing1, wing2], aimColor, arrowWidth, CLEAR_WHITE);

    drawCircle(shooterPos, BUBBLE_DIAM, COLORS[currentColorIndex], .06, OUTLINE);

    // next bubble preview + NEXT label
    const nextPos = shooterPos.add(vec2(3.5, 0));
    drawText('NEXT', nextPos.add(vec2(-1.1, 0)), .5, hsl(0,0,1), .08, hsl(0,0,0));
    const nextCirclePos = nextPos.add(vec2(0,.05));
    drawCircle(nextCirclePos, .65, COLORS[nextColorIndex], .05, OUTLINE);
    drawCircle(nextCirclePos.add(vec2(-.08, .08)), .2, hsl(0,0,1,.18));

    // score / shots — world space, right-aligned just left of the shooter to mirror NEXT
    drawText(
        `SCORE ${score}`,
        vec2(-2.0, SHOOT_Y ),
        .5,
        hsl(0,0,1),
        .08,
        hsl(0,0,0),
        'right'
    );
}

///////////////////////////////////////////////////////////////////////////////
// Startup LittleJS Engine
engineInit(gameInit, gameUpdate, gameUpdatePost, gameRender, gameRenderPost);

</script>
