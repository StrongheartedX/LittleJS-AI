<script>
'use strict';

// engine settings
debugWatermark = false;
showEngineVersion = false;
paused = false;
gravity = vec2(0, 0);
cameraPos = vec2(0, 0);
inputWASDEmulateDirection = false;

///////////////////////////////////////////////////////////////////////////////
// Constants

const BOARD_W = 6;
const BOARD_H_VISIBLE = 13;
const BOARD_H = 15;            // 2 extra spawn rows above visible
const SPAWN_COL = 3;           // 0-indexed; "4th column" in arcade terms

const COLOR_R = 0, COLOR_G = 1, COLOR_B = 2, COLOR_Y = 3;
const GEM_COLORS = [
    rgb(1, .2, .25),   // 0 R
    rgb(.15, .95, .4), // 1 G
    rgb(.2, .55, 1),   // 2 B
    rgb(1, .9, .2),    // 3 Y
];

// Board world-space layout
const BOARD_GAP = 5;
const BOARD_X_P1 = -BOARD_GAP/2 - BOARD_W;
const BOARD_X_P2 = BOARD_GAP/2;
const BOARD_Y = -BOARD_H_VISIBLE / 2;

///////////////////////////////////////////////////////////////////////////////
// Gem factories

function gemRegular(color) { return { type:'regular', color, powerGemId:-1 }; }
function gemCrash(color)   { return { type:'crash',   color }; }
function gemCounter(color, countdown) { return { type:'counter', color, countdown }; }
function gemDiamond()      { return { type:'diamond' }; }

///////////////////////////////////////////////////////////////////////////////
// Grid helpers

function inBounds(x, y) { return x >= 0 && x < BOARD_W && y >= 0 && y < BOARD_H; }

function emptyGrid()
{
    return [...Array(BOARD_W)].map(()=> Array(BOARD_H).fill(null));
}

function isRegular(g) { return g && g.type === 'regular'; }

///////////////////////////////////////////////////////////////////////////////
// Power gems — flag-then-cluster model (design doc §7.1)
//
// A power gem is monochrome regular gems forming a solid rectangle, BUT once
// two same-color power gems touch they count as one larger gem regardless of
// the combined shape (doc §7.3). The clone-breaking mistake is tracking "the
// one true rectangle"; instead we:
//
//   1. FLAG every cell covered by ANY axis-aligned >=2x2 monochrome rectangle
//      of regular gems. (A cell is "in a power gem" if some 2x2+ block covers it.)
//   2. CLUSTER flagged cells into power gems by 4-connectivity (same color).
//      Each connected blob shares one powerGemId — so a 2x2 touching a 2x3
//      becomes a single size-10 gem, and (because gravity groups cells by
//      powerGemId via buildGravityComponents) that blob falls as one rigid
//      unit and never shears. Loose (non-flagged) regular cells get id -1.
//
// powerGemId is reassigned from scratch every call; the values are arbitrary,
// only "same id == same rigid power gem within this grid" matters. Recomputing
// after every settle is stable: rigid gravity preserves a blob's shape, so the
// same flags/clusters re-derive — a power gem only loses cells when destroyed.
//
// Returns true if any cell's power membership (in-a-gem vs loose) changed, so
// the resolution loop can tell when the board has settled.

function mergePowerGems(grid)
{
    const isPow = (x, y) => isRegular(grid[x][y]) && grid[x][y].powerGemId >= 0;
    const colorAt = (x, y) => isRegular(grid[x][y]) ? grid[x][y].color : -1;

    // Snapshot prior membership (for the changed flag).
    const before = [...Array(BOARD_W)].map((_, x) =>
        Array.from({length: BOARD_H}, (_, y) => isPow(x, y)));

    // Step 1: flag cells covered by any >=2-wide AND >=2-tall monochrome rect.
    const flag = [...Array(BOARD_W)].map(() => Array(BOARD_H).fill(false));
    for (let x1 = 0; x1 < BOARD_W; x1++)
    for (let y1 = 0; y1 < BOARD_H; y1++)
    {
        const color = colorAt(x1, y1);
        if (color < 0) continue;
        // widest same-color run rightward from (x1,y1)
        let xRun = x1;
        while (xRun + 1 < BOARD_W && colorAt(xRun + 1, y1) === color) xRun++;
        // for each width >=2, climb rows while the full-width band stays mono
        for (let x2 = x1 + 1; x2 <= xRun; x2++)
        {
            let y2 = y1, canClimb = true;
            while (canClimb && y2 + 1 < BOARD_H)
            {
                for (let x = x1; x <= x2; x++)
                    if (colorAt(x, y2 + 1) !== color) { canClimb = false; break; }
                if (canClimb) y2++;
            }
            if (y2 >= y1 + 1)   // height >=2 (width already >=2)
                for (let x = x1; x <= x2; x++)
                for (let y = y1; y <= y2; y++)
                    flag[x][y] = true;
        }
    }

    // Reset all ids, then cluster flagged same-color cells by 4-connectivity.
    for (let x = 0; x < BOARD_W; x++)
    for (let y = 0; y < BOARD_H; y++)
        if (isRegular(grid[x][y])) grid[x][y].powerGemId = -1;

    let nextId = 1;
    const seen = [...Array(BOARD_W)].map(() => Array(BOARD_H).fill(false));
    const dirs = [[1,0],[-1,0],[0,1],[0,-1]];
    for (let sx = 0; sx < BOARD_W; sx++)
    for (let sy = 0; sy < BOARD_H; sy++)
    {
        if (!flag[sx][sy] || seen[sx][sy]) continue;
        const color = colorAt(sx, sy);
        const id = nextId++;
        const stack = [[sx, sy]];
        seen[sx][sy] = true;
        while (stack.length)
        {
            const [x, y] = stack.pop();
            grid[x][y].powerGemId = id;
            for (const [dx, dy] of dirs)
            {
                const nx = x + dx, ny = y + dy;
                if (!inBounds(nx, ny) || seen[nx][ny]) continue;
                if (!flag[nx][ny] || colorAt(nx, ny) !== color) continue;
                seen[nx][ny] = true;
                stack.push([nx, ny]);
            }
        }
    }

    // changed = did any cell flip between in-a-gem and loose?
    for (let x = 0; x < BOARD_W; x++)
    for (let y = 0; y < BOARD_H; y++)
        if (before[x][y] !== isPow(x, y)) return true;
    return false;
}

///////////////////////////////////////////////////////////////////////////////
// Piece geometry

const ROT_OFFSETS = [
    vec2(0,  1),  // 0: b above
    vec2(1,  0),  // 1: b right
    vec2(0, -1),  // 2: b below
    vec2(-1, 0),  // 3: b left
];

function pieceCells(piece, x, y, rot)
{
    x = (x !== undefined) ? x : piece.x;
    y = (y !== undefined) ? y : piece.y;
    rot = (rot !== undefined) ? rot : piece.rot;
    const o = ROT_OFFSETS[rot];
    return [
        { x: x, y: y, gem: piece.a },
        { x: x + o.x, y: y + o.y, gem: piece.b },
    ];
}

function pieceCanPlace(grid, piece, x, y, rot)
{
    const cells = pieceCells(piece, x, y, rot);
    for (const c of cells)
    {
        if (c.x < 0 || c.x >= BOARD_W) return false;
        if (c.y < 0) return false;
        if (c.y < BOARD_H && grid[c.x][c.y]) return false;
    }
    return true;
}

function pieceTryMove(grid, piece, dx, dy)
{
    if (pieceCanPlace(grid, piece, piece.x + dx, piece.y + dy, piece.rot))
    { piece.x += dx; piece.y += dy; return true; }
    return false;
}

function pieceTryRotate(grid, piece, dir)
{
    const nr = (piece.rot + dir + 4) % 4;
    const kicks = [vec2(0,0), vec2(-1,0), vec2(1,0), vec2(0,1)];
    for (const k of kicks)
    {
        if (pieceCanPlace(grid, piece, piece.x + k.x, piece.y + k.y, nr))
        { piece.x += k.x; piece.y += k.y; piece.rot = nr; return true; }
    }
    return false;
}

function lockPieceWithSeparation(grid, piece)
{
    const cells = pieceCells(piece);
    // Sort top-down so we place the lower cell first
    cells.sort((c1, c2) => c1.y - c2.y);

    const placed = [];

    for (const c of cells)
    {
        if (c.y >= BOARD_H) continue;  // overflow → ignored here, caller handles game-over

        // Column drop: find lowest empty cell at this column at or below c.y
        let landY = c.y;
        while (landY > 0 && !grid[c.x][landY - 1]) landY--;
        grid[c.x][landY] = c.gem;
        placed.push([c.x, landY]);
    }

    return placed;
}

///////////////////////////////////////////////////////////////////////////////
// Rigid gravity (power gems fall as units)

function buildGravityComponents(grid)
{
    const compIndex = [...Array(BOARD_W)].map(()=> Array(BOARD_H).fill(-1));
    const comps = [];
    const idMap = new Map();

    for (let x = 0; x < BOARD_W; x++)
    for (let y = 0; y < BOARD_H; y++)
    {
        const g = grid[x][y];
        if (!g) continue;

        let key;
        if (g.type === 'regular' && g.powerGemId >= 0) key = 'p' + g.powerGemId;
        else key = 's' + x + ',' + y;

        let cid = idMap.get(key);
        if (cid === undefined)
        {
            cid = comps.length;
            idMap.set(key, cid);
            comps.push({ id: cid, cells: [] });
        }
        comps[cid].cells.push([x, y]);
        compIndex[x][y] = cid;
    }

    return { comps, compIndex };
}

function applyGravity(grid)
{
    let movedAny = false;

    while (true)
    {
        const { comps, compIndex } = buildGravityComponents(grid);
        const willFall = new Array(comps.length).fill(false);

        let changed = true;
        while (changed)
        {
            changed = false;
            for (const comp of comps)
            {
                if (willFall[comp.id]) continue;
                let ok = true;
                for (const [x, y] of comp.cells)
                {
                    if (y === 0) { ok = false; break; }
                    const belowId = compIndex[x][y - 1];
                    if (belowId === -1) continue;            // empty below
                    if (belowId === comp.id) continue;       // self
                    if (willFall[belowId]) continue;         // below also falling
                    ok = false; break;
                }
                if (ok) { willFall[comp.id] = true; changed = true; }
            }
        }

        let any = false;
        for (const f of willFall) if (f) { any = true; break; }
        if (!any) return movedAny;

        // Collect cells to move, then apply
        const moves = [];
        for (const comp of comps)
        {
            if (!willFall[comp.id]) continue;
            for (const [x, y] of comp.cells) moves.push({ x, y, gem: grid[x][y] });
        }
        for (const m of moves) grid[m.x][m.y] = null;
        for (const m of moves) grid[m.x][m.y - 1] = m.gem;
        movedAny = true;
    }
}

///////////////////////////////////////////////////////////////////////////////
// Crash detonation

function detectCrashClears(grid)
{
    const toClear = new Set();
    const dirs = [[1,0],[-1,0],[0,1],[0,-1]];
    const keyOf = (x, y) => x + ',' + y;

    // Find every crash gem that touches a same-color regular or same-color crash
    const triggers = [];
    for (let x = 0; x < BOARD_W; x++)
    for (let y = 0; y < BOARD_H; y++)
    {
        const g = grid[x][y];
        if (!g || g.type !== 'crash') continue;
        for (const [dx, dy] of dirs)
        {
            const nx = x + dx, ny = y + dy;
            if (!inBounds(nx, ny)) continue;
            const ng = grid[nx][ny];
            if (!ng) continue;
            if ((ng.type === 'regular' || ng.type === 'crash') && ng.color === g.color)
            { triggers.push([x, y]); break; }
        }
    }

    if (triggers.length === 0) return [];

    // Flood-fill same-color connected {regular + crash} from each trigger
    const cascadeStack = triggers.slice();
    const seenColors = new Set();   // 'x,y' marked already
    while (cascadeStack.length)
    {
        const [x, y] = cascadeStack.pop();
        const key = keyOf(x, y);
        if (seenColors.has(key)) continue;
        const g = grid[x][y];
        if (!g) continue;
        if (g.type !== 'regular' && g.type !== 'crash') continue;
        seenColors.add(key);
        toClear.add(key);

        // Power gem: include all its cells
        if (g.type === 'regular' && g.powerGemId >= 0)
        {
            for (let xx = 0; xx < BOARD_W; xx++)
            for (let yy = 0; yy < BOARD_H; yy++)
            {
                const gg = grid[xx][yy];
                if (gg && gg.type === 'regular' && gg.powerGemId === g.powerGemId)
                {
                    toClear.add(keyOf(xx, yy));
                    cascadeStack.push([xx, yy]);  // re-flood from each power-gem cell
                }
            }
        }

        for (const [dx, dy] of dirs)
        {
            const nx = x + dx, ny = y + dy;
            if (!inBounds(nx, ny)) continue;
            const ng = grid[nx][ny];
            if (!ng) continue;
            if ((ng.type === 'regular' || ng.type === 'crash') && ng.color === g.color)
                cascadeStack.push([nx, ny]);
        }
    }

    // Counter gems adjacent to any cleared cell also clear
    const finalSet = new Set(toClear);
    for (const key of toClear)
    {
        const [sx, sy] = key.split(',').map(v => +v);
        for (const [dx, dy] of dirs)
        {
            const nx = sx + dx, ny = sy + dy;
            if (!inBounds(nx, ny)) continue;
            const ng = grid[nx][ny];
            if (ng && ng.type === 'counter') finalSet.add(keyOf(nx, ny));
        }
    }

    return [...finalSet].map(k => k.split(',').map(v => +v));
}

///////////////////////////////////////////////////////////////////////////////
// Counter gem countdown tick

function tickCounterGems(grid)
{
    let flipped = false;
    for (let x = 0; x < BOARD_W; x++)
    for (let y = 0; y < BOARD_H; y++)
    {
        const g = grid[x][y];
        if (!g || g.type !== 'counter') continue;
        g.countdown--;
        if (g.countdown <= 0)
        {
            grid[x][y] = gemRegular(g.color);
            flipped = true;
        }
    }
    return flipped;
}

///////////////////////////////////////////////////////////////////////////////
// Damage formula

function powerGemDamage(n)
{
    if (n < 4) return 0;
    if (n <= 9)  return 2 * n;
    if (n <= 16) return 2 * n + Math.floor(0.5 * n);
    if (n <= 25) return 3 * n;
    if (n <= 36) return Math.floor(3.5 * n);
    return 4 * n + 1;  // 37-49, FAQ estimate
}

function chainBonusFor(wave)
{
    if (wave <= 1) return 0;
    if (wave === 2) return 2;
    if (wave === 3) return 4;
    if (wave === 4) return 10;
    if (wave === 5) return 16;
    if (wave === 6) return 22;
    if (wave === 7) return 28;
    return 34;
}

// Counter gems are cheap "filler" — worth half a regular when destroyed (§13).
const COUNTER_GEM_VALUE = 0.5;

// result = {
//   regularsDestroyed: number (loose, not part of power gems),
//   crashesDestroyed: number,
//   countersDestroyed: number (optional — counter gems swept up this clear),
//   powerGemSizes: number[]  // each size of a power gem destroyed this clear
// }
// opts = { chainWave, isDiamondInitiated, allClear, characterMultiplier }
function computeDamage(result, opts)
{
    const wave = opts.chainWave;
    const isDiamond = !!opts.isDiamondInitiated;
    const allClear = !!opts.allClear;
    const mult = opts.characterMultiplier || 1.0;
    const counters = result.countersDestroyed || 0;

    // Sum power gem damage; simultaneous bonus = +2 per extra power gem
    let pg = 0;
    let pgTotalCells = 0;
    for (const s of result.powerGemSizes) { pg += powerGemDamage(s); pgTotalCells += s; }
    if (result.powerGemSizes.length > 1)
        pg += 2 * (result.powerGemSizes.length - 1);

    let total = pg + result.regularsDestroyed + result.crashesDestroyed
              + counters * COUNTER_GEM_VALUE;

    // Decade bonus: +1 per 10n+1 threshold of (regulars + power gem cells).
    // Counter gems are excluded from the decade count (doc §13).
    const decadeBase = result.regularsDestroyed + pgTotalCells;
    if (decadeBase >= 11) total += Math.floor((decadeBase - 1) / 10);

    // Chain bonus added to wave total
    total += chainBonusFor(wave);

    // Diamond penalty on first wave only
    if (wave === 1 && isDiamond) total = Math.floor(total * 0.8);

    // All-clear bonus
    if (allClear) total += 6;

    // Character multiplier
    total = Math.floor(total * mult);

    return total;
}

///////////////////////////////////////////////////////////////////////////////
// Counter gem drop algorithm

const COL_FILL_ORDER = [0, 1, 2, 4, 5, 3];

function columnHeight(grid, col)
{
    let h = 0;
    for (let y = BOARD_H - 1; y >= 0; y--)
        if (grid[col][y]) { h = y + 1; break; }
    return h;
}

function dropCounterGems(grid, count, pattern, startCountdown)
{
    if (count <= 0) return 0;
    const groups = Math.ceil(count / 6);
    const patternRows = pattern.length;
    let placed = 0;

    for (let g = 0; g < groups; g++)
    {
        const row = (g) % patternRows;
        let inGroup = 0;
        for (const col of COL_FILL_ORDER)
        {
            if (inGroup >= 6) break;
            if (placed >= count) return placed;
            const h = columnHeight(grid, col);
            if (h >= BOARD_H) continue;
            const color = pattern[row][col];
            grid[col][h] = gemCounter(color, startCountdown);
            placed++;
            inGroup++;
        }
    }
    return placed;
}

///////////////////////////////////////////////////////////////////////////////
// Defense subtraction

// Returns {
//   remainingIncoming,  // counter gems that still drop on the defender
//   flipback,           // counter gems sent back to original attacker (full strength)
//   newOutgoing,        // remaining outgoing damage (after defense used) added to opponent's queue
//   defendedRatio       // ratio of incoming canceled (0..1)
// }
function applyDefense(incoming, outgoing)
{
    if (outgoing <= 0)
        return { remainingIncoming: incoming, flipback: 0, newOutgoing: 0, defendedRatio: 0 };

    if (incoming <= 0)
        return { remainingIncoming: 0, flipback: 0, newOutgoing: outgoing, defendedRatio: 0 };

    const defenseValue = Math.floor(outgoing / 2);
    if (defenseValue >= incoming)
    {
        const consumed = incoming;
        const flipback = defenseValue - incoming;
        const remainingOutgoingShare = outgoing - 2 * consumed;
        const passThrough = Math.max(0, remainingOutgoingShare);
        return {
            remainingIncoming: 0,
            flipback,
            newOutgoing: passThrough,
            defendedRatio: 1
        };
    }
    else
    {
        return {
            remainingIncoming: incoming - defenseValue,
            flipback: 0,
            newOutgoing: 0,
            defendedRatio: defenseValue / incoming
        };
    }
}

///////////////////////////////////////////////////////////////////////////////
// Diamond resolution

// (dx, dy) is the cell where the diamond landed. Returns:
//   { cleared: [[x,y], ...], color: number | null, tech: bool }
function resolveDiamond(grid, dx, dy)
{
    if (!inBounds(dx, dy) || !grid[dx][dy] || grid[dx][dy].type !== 'diamond')
        return { cleared: [], color: null, tech: false };

    // Color = color of cell directly below
    const below = dy > 0 ? grid[dx][dy - 1] : null;
    if (!below || below.type === 'diamond')
    {
        // Tech bonus: just remove the diamond, no clears, no attack
        grid[dx][dy] = null;
        return { cleared: [], color: null, tech: true };
    }
    const targetColor = below.color;

    grid[dx][dy] = null;  // remove diamond itself
    const cleared = [];
    for (let x = 0; x < BOARD_W; x++)
    for (let y = 0; y < BOARD_H; y++)
    {
        const g = grid[x][y];
        if (!g) continue;
        if ((g.type === 'regular' || g.type === 'crash' || g.type === 'counter') && g.color === targetColor)
            cleared.push([x, y]);
    }

    return { cleared, color: targetColor, tech: false };
}

///////////////////////////////////////////////////////////////////////////////
// Character patterns (X' / HDR-rebalanced)
// Index by row, row 0 = first dropped (bottom of opponent stack)

const PATTERN_RYU = [
    [COLOR_R, COLOR_G, COLOR_B, COLOR_Y, COLOR_R, COLOR_G],  // row 0 (bottom)
    [COLOR_R, COLOR_G, COLOR_B, COLOR_Y, COLOR_R, COLOR_G],
    [COLOR_B, COLOR_Y, COLOR_R, COLOR_G, COLOR_B, COLOR_Y],
    [COLOR_R, COLOR_G, COLOR_B, COLOR_Y, COLOR_R, COLOR_G],  // row 3 (top)
];
const PATTERN_CHUNLI = [
    [COLOR_R, COLOR_R, COLOR_G, COLOR_G, COLOR_B, COLOR_B],
    [COLOR_R, COLOR_R, COLOR_G, COLOR_G, COLOR_B, COLOR_B],
    [COLOR_Y, COLOR_Y, COLOR_R, COLOR_R, COLOR_G, COLOR_G],
    [COLOR_Y, COLOR_Y, COLOR_R, COLOR_R, COLOR_G, COLOR_G],
];
const PATTERN_SAKURA = [
    [COLOR_G, COLOR_R, COLOR_R, COLOR_R, COLOR_R, COLOR_Y],
    [COLOR_G, COLOR_B, COLOR_B, COLOR_B, COLOR_B, COLOR_Y],
    [COLOR_Y, COLOR_R, COLOR_R, COLOR_R, COLOR_R, COLOR_G],
    [COLOR_Y, COLOR_B, COLOR_B, COLOR_B, COLOR_B, COLOR_G],
];
const PATTERN_KEN = [
    [COLOR_R, COLOR_R, COLOR_R, COLOR_R, COLOR_R, COLOR_R],
    [COLOR_G, COLOR_G, COLOR_G, COLOR_G, COLOR_G, COLOR_G],
    [COLOR_B, COLOR_B, COLOR_B, COLOR_B, COLOR_B, COLOR_B],
    [COLOR_Y, COLOR_Y, COLOR_Y, COLOR_Y, COLOR_Y, COLOR_Y],
];

const CHARACTERS = [
    { id:'ryu',    name:'RYO',     pattern: PATTERN_RYU,    multiplier: 1.0, portrait:'circle',   color: rgb(.9,.9,.95) },
    { id:'ken',    name:'KEZ',     pattern: PATTERN_KEN,    multiplier: 1.0, portrait:'triangle', color: rgb(1,.55,.15) },
    { id:'chunli', name:'CHIN-LU', pattern: PATTERN_CHUNLI, multiplier: 1.2, portrait:'diamond',  color: rgb(.35,.65,1) },
    { id:'sakura', name:'SOKARA',  pattern: PATTERN_SAKURA, multiplier: 1.0, portrait:'star',     color: rgb(1,.5,.75) },
];

function characterById(id) { return CHARACTERS.find(c => c.id === id); }

///////////////////////////////////////////////////////////////////////////////
// Board resolution (chain loop, accumulates damage)

function clearCells(grid, cellList)
{
    for (const [x, y] of cellList) grid[x][y] = null;
}

// opts = { isDiamondInitiated, characterMultiplier }
// Returns { totalDamage, waves, allClear, anyChange }
function resolveBoard(grid, opts)
{
    const characterMultiplier = (opts && opts.characterMultiplier) || 1.0;
    const isDiamondInitiated = !!(opts && opts.isDiamondInitiated);

    let totalDamage = 0;
    let waves = 0;
    let anyChange = false;
    let diamondOnFirstWave = isDiamondInitiated;

    while (true)
    {
        // 1. Merge new rectangles
        let merged = mergePowerGems(grid);
        if (merged) anyChange = true;

        // 2. Crash detonations
        const clears = detectCrashClears(grid);
        if (clears.length === 0)
        {
            // 3. If nothing to clear, just settle gravity once and exit if no movement
            const moved = applyGravity(grid);
            if (!moved) break;
            anyChange = true;
            continue;
        }

        // Accounting
        let regularsDestroyed = 0;
        let crashesDestroyed = 0;
        let countersDestroyed = 0;
        const powerGemSizes = [];
        const seenPowerGems = new Map();
        for (const [x, y] of clears)
        {
            const g = grid[x][y];
            if (!g) continue;
            if (g.type === 'counter') { countersDestroyed++; continue; }
            if (g.type === 'crash') crashesDestroyed++;
            else if (g.type === 'regular')
            {
                if (g.powerGemId >= 0)
                {
                    const cur = seenPowerGems.get(g.powerGemId) || 0;
                    seenPowerGems.set(g.powerGemId, cur + 1);
                }
                else regularsDestroyed++;
            }
        }
        for (const size of seenPowerGems.values()) powerGemSizes.push(size);

        waves++;
        const result = { regularsDestroyed, crashesDestroyed, countersDestroyed, powerGemSizes };
        const dmg = computeDamage(result, {
            chainWave: waves,
            isDiamondInitiated: diamondOnFirstWave,
            characterMultiplier,
            allClear: false
        });
        diamondOnFirstWave = false;
        totalDamage += dmg;

        clearCells(grid, clears);
        anyChange = true;

        applyGravity(grid);
    }

    // All-clear check
    let empty = true;
    for (let x = 0; x < BOARD_W && empty; x++)
    for (let y = 0; y < BOARD_H && empty; y++)
        if (grid[x][y]) empty = false;

    if (empty && waves > 0) totalDamage += 6;

    return { totalDamage, waves, allClear: empty && waves > 0, anyChange };
}

///////////////////////////////////////////////////////////////////////////////
// Chain animation — same chain logic as resolveBoard, but operates on a clone
// of the grid and records each wave's cleared cells (with their gem type/color)
// so the real grid can animate one wave at a time.

function previewChain(grid, opts)
{
    const sim = cloneGrid(grid);
    const characterMultiplier = (opts && opts.characterMultiplier) || 1.0;
    let diamondOnFirstWave = !!(opts && opts.isDiamondInitiated);
    let totalDamage = 0;
    const waves = [];

    while (true)
    {
        mergePowerGems(sim);
        const clears = detectCrashClears(sim);
        if (clears.length === 0)
        {
            const moved = applyGravity(sim);
            if (!moved) break;
            continue;
        }

        const cellSnapshots = clears.map(([x, y]) =>
        {
            const g = sim[x][y];
            return { x, y, type: g.type, color: g.type === 'diamond' ? -1 : g.color };
        });

        let regularsDestroyed = 0;
        let crashesDestroyed = 0;
        let countersDestroyed = 0;
        const seenPowerGems = new Map();
        for (const [x, y] of clears)
        {
            const g = sim[x][y];
            if (!g) continue;
            if (g.type === 'counter') { countersDestroyed++; continue; }
            if (g.type === 'crash') crashesDestroyed++;
            else if (g.type === 'regular')
            {
                if (g.powerGemId >= 0)
                {
                    const cur = seenPowerGems.get(g.powerGemId) || 0;
                    seenPowerGems.set(g.powerGemId, cur + 1);
                }
                else regularsDestroyed++;
            }
        }
        const powerGemSizes = [...seenPowerGems.values()];
        const waveNum = waves.length + 1;
        const dmg = computeDamage(
            { regularsDestroyed, crashesDestroyed, countersDestroyed, powerGemSizes },
            { chainWave: waveNum, isDiamondInitiated: diamondOnFirstWave, characterMultiplier, allClear: false }
        );
        diamondOnFirstWave = false;
        totalDamage += dmg;

        waves.push({ cells: cellSnapshots, damage: dmg });

        clearCells(sim, clears);
        applyGravity(sim);
    }

    let empty = true;
    for (let x = 0; x < BOARD_W && empty; x++)
    for (let y = 0; y < BOARD_H && empty; y++)
        if (sim[x][y]) empty = false;
    if (empty && waves.length > 0) totalDamage += 6;

    return { totalDamage, waves, allClear: empty && waves.length > 0 };
}

function startChainWave(board, waveIdx)
{
    const a = board.chainAnim;
    a.waveIndex = waveIdx;
    // Refresh PG connectors so the user sees the rectangle shape before the burst.
    mergePowerGems(board.grid);
    const wave = a.waves[waveIdx];
    const step = waveIdx + 1;                          // chain step (1-based)
    const intensity = clamp(1 + wave.cells.length / 8, 1, 2.5);
    for (const cell of wave.cells)
    {
        const rowDelay = (BOARD_H_VISIBLE - cell.y) * 0.015;
        spawnClearParticles(board.index, cell, rowDelay, intensity);
    }

    // Impact scales with how much popped AND how deep the chain is.
    const punch = clamp(.1 + (step - 1) * .12 + wave.cells.length * .02, .1, .8);
    addScreenShake(punch, .12 + step * .03);
    screenFlash = clamp(screenFlash + .1 + (step - 1) * .12 + wave.cells.length * .012, 0, .6);

    // CHAIN x2+ pop over the board.
    if (step >= 2) board.chainPop = { n: step, t: 1 };

    a.phase = 'showing';
    a.timer = 0.14;
}

function tickChainAnimation(board)
{
    const a = board.chainAnim;
    if (!a) return;
    a.timer -= timeDelta;
    if (a.timer > 0) return;

    if (a.phase === 'init')
    {
        startChainWave(board, 0);
        return;
    }
    if (a.phase === 'showing')
    {
        const wave = a.waves[a.waveIndex];
        const positions = wave.cells.map(c => [c.x, c.y]);
        clearCells(board.grid, positions);
        applyGravity(board.grid);
        if (a.waveIndex > 0) sCrash?.play();
        else sClear?.play();
        a.phase = 'gap';
        a.timer = 0.10;
        return;
    }
    if (a.phase === 'gap')
    {
        const next = a.waveIndex + 1;
        if (next >= a.waves.length)
        {
            const onLock = a.onLock;
            const totalDamage = a.totalDamage;
            const allClear = a.allClear;
            const waveCount = a.waves.length;
            board.chainAnim = null;
            mergePowerGems(board.grid);
            tickCounterGems(board.grid);
            if (allClear) sAllClear?.play();
            if (onLock) onLock(board, { totalDamage, waves: waveCount, allClear });
            return;
        }
        startChainWave(board, next);
        return;
    }
}

///////////////////////////////////////////////////////////////////////////////
// Deterministic PRNG (mulberry32) for shared piece sequence

function makeRng(seed)
{
    let t = seed >>> 0;
    return function() {
        t = (t + 0x6D2B79F5) >>> 0;
        let x = t;
        x = Math.imul(x ^ (x >>> 15), x | 1);
        x ^= x + Math.imul(x ^ (x >>> 7), x | 61);
        return ((x ^ (x >>> 14)) >>> 0) / 4294967296;
    };
}

function makePieceSequence(seed, length)
{
    const rng = makeRng(seed);
    const r = (n) => Math.floor(rng() * n);
    const pieces = [];
    for (let i = 0; i < length; i++)
    {
        // Every 25th piece (1-indexed: 25, 50, 75...) → diamond on top + regular on bottom
        if ((i + 1) % 25 === 0)
        {
            pieces.push({ a: gemRegular(r(4)), b: gemDiamond() });
            continue;
        }
        const mk = () => {
            const isCrash = r(100) < 18;
            const c = r(4);
            return isCrash ? gemCrash(c) : gemRegular(c);
        };
        pieces.push({ a: mk(), b: mk() });
    }
    return pieces;
}

///////////////////////////////////////////////////////////////////////////////
// Match orchestration

class GameMatch
{
    constructor(p1Char, p2Char, seed)
    {
        this.boards = [new Board(p1Char), new Board(p2Char)];
        this.boards[0].index = 0;
        this.boards[1].index = 1;
        this.sequence = makePieceSequence(seed, 2000);
        this.seqIndex = [0, 0];
        this.elapsed = 0;
        this.winner = -1;
    }

    spawn(boardIdx)
    {
        const piece = this.sequence[this.seqIndex[boardIdx]++];
        this.boards[boardIdx].spawnNext(piece);
    }

    onLock(boardIdx, lockResult)
    {
        const me = this.boards[boardIdx];
        const opp = this.boards[1 - boardIdx];

        // Defense math against my own incoming queue
        const def = applyDefense(me.incomingQueue, lockResult.totalDamage);
        me.incomingQueue = def.remainingIncoming;
        if (def.defendedRatio >= 0.5) me.nextOutgoingCountdown = 3;
        else me.nextOutgoingCountdown = 5;

        // Drop residual incoming on me using opp's pattern
        if (me.incomingQueue > 0)
        {
            dropCounterGems(me.grid, me.incomingQueue, opp.character.pattern, me.nextOutgoingCountdown);
            me.incomingQueue = 0;
            sCounterLand?.play();
        }

        // Outgoing
        if (def.newOutgoing > 0) opp.incomingQueue += def.newOutgoing;
        if (def.flipback > 0)    opp.incomingQueue += def.flipback;

        // Spawn next for me unless game over
        if (!me.gameOver) this.spawn(boardIdx);
        if (me.gameOver) this.winner = 1 - boardIdx;
    }

    update(controllers)
    {
        if (this.winner >= 0) return;
        this.elapsed += timeDelta;

        // Speed ramp: 1.0s/cell → 0.5s/cell over first 90s; *1.5 after 3.5min
        const t = this.elapsed;
        let interval = 1.0 - Math.min(1, t / 90) * 0.5;
        if (t > 210) interval /= 1.5;
        this.boards[0].fallInterval = interval;
        this.boards[1].fallInterval = interval;

        for (let i = 0; i < 2; i++)
        {
            const b = this.boards[i];
            if (b.chainAnim) { tickChainAnimation(b); continue; }
            if (!b.active) continue;
            const c = controllers[i];
            c.update(b);
            boardTick(b, c, (board, res) => this.onLock(i, res));
        }
    }
}

///////////////////////////////////////////////////////////////////////////////
// Board

class Board
{
    constructor(character)
    {
        this.grid = emptyGrid();
        this.character = character || CHARACTERS[0];
        this.score = 0;
        this.chain = 0;
        this.active = null;
        this.next = null;
        this.fallTimer = 0;
        this.fallInterval = 1.0;
        this.lockTimer = 0;
        this.gameOver = false;
        this.incomingQueue = 0;
        this.pendingDiamondInitiator = false;
        this.nextOutgoingCountdown = 5;
        this.chainAnim = null;
        this.index = 0;
    }

    spawnNext(piece)
    {
        if (this.gameOver) return;
        this.active = {
            a: piece.a, b: piece.b,
            // Spawn the pair in the hidden buffer just above the visible field
            // (bottom gem at row 13, top at 14 — both within BOARD_H=15) so it
            // enters at the top of the well rather than floating a row higher.
            x: SPAWN_COL, y: BOARD_H_VISIBLE,
            rot: 0
        };
        if (!pieceCanPlace(this.grid, this.active, this.active.x, this.active.y, 0))
        {
            this.gameOver = true;
            this.active = null;
        }
        this.fallTimer = this.fallInterval;
        this.lockTimer = 0;
    }
}

let p1Board, p2Board;
let p1Controller, p2Controller;
let currentMatch;
let demoBoards = null;   // decorative gem-filled boards shown behind the title/menus
let controllers;
let sMove, sRotate, sSoft, sLock, sClear, sCrash, sCountTick, sAllClear, sCounterLand, sGameOver;

///////////////////////////////////////////////////////////////////////////////
// Rendering

function boardOrigin(boardIndex)
{
    return vec2(boardIndex === 0 ? BOARD_X_P1 : BOARD_X_P2, BOARD_Y);
}

function cellPos(boardIndex, x, y)
{
    return boardOrigin(boardIndex).add(vec2(x + 0.5, y + 0.5));
}

// Linear blend between two colors (k=0 → a, k=1 → b).
function colorLerp(a, b, k)
{
    return new Color(lerp(a.r, b.r, k), lerp(a.g, b.g, k), lerp(a.b, b.b, k), 1);
}

// A beveled single-cell gem face (light top/left, shadow bottom/right + glint).
function drawGemTile(pos, col, size)
{
    const light = colorLerp(col, rgb(1,1,1), .35);
    const dark  = colorLerp(col, rgb(0,0,0), .35);
    const b = size * .17, h = size * .5;
    drawRect(pos, vec2(size), col);
    drawRect(pos.add(vec2(0,  h - b/2)), vec2(size, b), light);
    drawRect(pos.add(vec2(-h + b/2, 0)), vec2(b, size), light);
    drawRect(pos.add(vec2(0, -h + b/2)), vec2(size, b), dark);
    drawRect(pos.add(vec2( h - b/2, 0)), vec2(b, size), dark);
    drawRect(pos.add(vec2(-size*.22, size*.22)), vec2(size*.2), rgb(1,1,1,.32));
}

// Per-color shape glyph (colorblind aid): R=triangle, G=circle, B=diamond, Y=square.
// Drawn as a dark outline + light core so it reads on every hue.
function drawGemGlyph(pos, ci, scale = 1, alpha = 1)
{
    const draw = (r, c) =>
    {
        if (ci === 0)
        {
            const p = [];
            for (let i = 0; i < 3; i++)
            { const a = -PI/2 + i * 2*PI/3; p.push(vec2(Math.cos(a)*r, Math.sin(a)*r)); }
            drawPoly(p, c, 0, c, pos);
        }
        else if (ci === 1) drawCircle(pos, r * 1.7, c);
        else if (ci === 2) drawRect(pos, vec2(r * 1.5), c, PI/4);
        else               drawRect(pos, vec2(r * 1.35), c);
    };
    draw(.30 * scale, rgb(0, 0, 0, .40 * alpha));   // outline
    draw(.21 * scale, rgb(1, 1, 1, .62 * alpha));   // core
}

function drawGem(pos, gem, isActive)
{
    if (gem.type === 'regular')
    {
        drawGemTile(pos, GEM_COLORS[gem.color], .92);
        drawGemGlyph(pos, gem.color);
        if (isActive) drawRect(pos, vec2(1.0, 1.0), rgb(1,1,1,.16));
    }
    else if (gem.type === 'crash')
    {
        const c = GEM_COLORS[gem.color];
        drawCircle(pos, 1.02, rgb(0,0,0,.30));                       // dark rim
        drawCircle(pos, .92, c);
        drawCircle(pos, .58, colorLerp(c, rgb(1,1,1), .20));         // lit core
        const tw = .5 + .5 * Math.sin(time*6 + pos.x*2 + pos.y*3);   // fuse twinkle
        drawCircle(pos.add(vec2(-.16, .16)), .2 + .06*tw, rgb(1,1,1,.5 + .25*tw));
        drawGemGlyph(pos, gem.color, .72, .75);
        if (isActive) drawCircle(pos, 1.0, rgb(1,1,1,.18));
    }
    else if (gem.type === 'counter')
    {
        const pulse = gem.countdown <= 2 ? .5 + .5*Math.sin(time*8) : 1;
        const c = GEM_COLORS[gem.color];
        drawGemTile(pos, c.scale(.55 + .35*pulse), .92);
        drawRect(pos, vec2(.64, .64), rgb(0,0,0,.20));               // caged inner well
        drawText('' + gem.countdown, pos, .85, rgb(1,1,1), .1, rgb(0,0,0));
    }
    else if (gem.type === 'diamond')
    {
        drawRect(pos, vec2(.92, .92), rgb(.6,.85,1,.35), PI/4);      // glow
        drawRect(pos, vec2(.78, .78), rgb(1,1,1,.9), PI/4);
        drawRect(pos, vec2(.46, .46), rgb(.8,.92,1,.95), PI/4);
        drawCircle(pos, .22, rgb(1,1,1,.95));
    }
}

function drawBoardFrame(boardIndex, accent)
{
    const origin = boardOrigin(boardIndex);
    const center = origin.add(vec2(BOARD_W/2, BOARD_H_VISIBLE/2));
    accent = accent || rgb(.5,.5,.5);
    const rim = rgb(accent.r, accent.g, accent.b);
    // team-color rim → dark bevel → recessed well
    drawRect(center, vec2(BOARD_W + .8, BOARD_H_VISIBLE + .8), rgb(rim.r, rim.g, rim.b, .9));
    drawRect(center, vec2(BOARD_W + .5, BOARD_H_VISIBLE + .5), rgb(.02, .02, .05));
    drawRect(center, vec2(BOARD_W, BOARD_H_VISIBLE), rgb(.07, .07, .10));
    // inner top-edge highlight / bottom shade for a touch of depth
    drawRect(origin.add(vec2(BOARD_W/2, BOARD_H_VISIBLE - .04)), vec2(BOARD_W, .08), rgb(1,1,1,.05));
    drawRect(origin.add(vec2(BOARD_W/2, .04)),                   vec2(BOARD_W, .08), rgb(0,0,0,.25));
    for (let x = 0; x <= BOARD_W; x++)
        drawLine(origin.add(vec2(x, 0)), origin.add(vec2(x, BOARD_H_VISIBLE)), .03, rgb(1,1,1,.05));
    for (let y = 0; y <= BOARD_H_VISIBLE; y++)
        drawLine(origin.add(vec2(0, y)), origin.add(vec2(BOARD_W, y)), .03, rgb(1,1,1,.05));
}

// Soft screen-space vignette so the bright field sits in a darker surround.
function drawVignette()
{
    const c = mainCanvasSize.scale(.5);
    drawEllipseGradient(c, vec2(mainCanvasSize.x * 1.35, mainCanvasSize.y * 1.5),
        rgb(0,0,0,0), rgb(0,0,0,.5), 0, false, true);
}

// The two boards currently on screen (real match, or the title demo).
function shownBoards()
{
    if (p1Board) return [p1Board, p2Board];
    if (demoBoards) return demoBoards;
    return [null, null];
}
function boardAccent(board, index)
{
    return (board && board.character) ? board.character.color
        : CHARACTERS[index % CHARACTERS.length].color;
}

function drawBoardGems(board, boardIndex)
{
    const grid = board.grid;
    const isPowerCell = (x, y, id) =>
    {
        const c = (x >= 0 && x < BOARD_W && y >= 0) ? grid[x][y] : null;
        return c && c.type === 'regular' && c.powerGemId === id;
    };

    // Power gems: render each connected component as ONE continuous block so
    // joined gems read as a single larger gem (no seams, no black dot where four
    // corners meet). Cells are filled slightly oversized so neighbours tile with
    // no gap; a bevel is drawn only on the OUTER border edges of the component,
    // which makes the whole shape look like one raised gem.
    for (let x = 0; x < BOARD_W; x++)
    for (let y = 0; y < BOARD_H_VISIBLE; y++)
    {
        const g = grid[x][y];
        if (!g || g.type !== 'regular' || g.powerGemId < 0) continue;
        drawRect(cellPos(boardIndex, x, y), vec2(1.02, 1.02), GEM_COLORS[g.color]);
    }
    const BEV = .16;
    for (let x = 0; x < BOARD_W; x++)
    for (let y = 0; y < BOARD_H_VISIBLE; y++)
    {
        const g = grid[x][y];
        if (!g || g.type !== 'regular' || g.powerGemId < 0) continue;
        const id = g.powerGemId;
        const pos = cellPos(boardIndex, x, y);
        const col = GEM_COLORS[g.color];
        const light = colorLerp(col, rgb(1,1,1), .35);
        const dark  = colorLerp(col, rgb(0,0,0), .35);
        // Top (+y) / left (-x) edges catch light; bottom (-y) / right (+x) fall in shadow.
        if (!isPowerCell(x, y+1, id)) drawRect(pos.add(vec2(0,  .5 - BEV/2)), vec2(1.02, BEV), light);
        if (!isPowerCell(x-1, y, id)) drawRect(pos.add(vec2(-.5 + BEV/2, 0)), vec2(BEV, 1.02), light);
        if (!isPowerCell(x, y-1, id)) drawRect(pos.add(vec2(0, -.5 + BEV/2)), vec2(1.02, BEV), dark);
        if (!isPowerCell(x+1, y, id)) drawRect(pos.add(vec2( .5 - BEV/2, 0)), vec2(BEV, 1.02), dark);
        // A small glint on the component's top-left exterior corner.
        if (!isPowerCell(x, y+1, id) && !isPowerCell(x-1, y, id))
            drawRect(pos.add(vec2(-.22, .22)), vec2(.2, .2), rgb(1,1,1,.4));
        // Color glyph on each cell so a fused gem's color stays readable.
        drawGemGlyph(pos, g.color, 1, .85);
    }

    // Loose gems + crash / counter / diamond — drawn with their own tile style.
    for (let x = 0; x < BOARD_W; x++)
    for (let y = 0; y < BOARD_H_VISIBLE; y++)
    {
        const g = grid[x][y];
        if (!g) continue;
        if (g.type === 'regular' && g.powerGemId >= 0) continue; // already drawn above
        drawGem(cellPos(boardIndex, x, y), g, false);
    }

    // Lock pop — brief white flash on the cells a piece just landed in.
    if (board.lockFlash && board.lockFlash.t > 0)
        for (const [x, y] of board.lockFlash.cells)
            if (y < BOARD_H_VISIBLE)
                drawRect(cellPos(boardIndex, x, y), vec2(.96), rgb(1,1,1, board.lockFlash.t * .5));

    // Active piece + ghost
    if (board.active && !board.gameOver)
    {
        let ghostY = board.active.y;
        while (pieceCanPlace(board.grid, board.active, board.active.x, ghostY - 1, board.active.rot))
            ghostY--;
        if (ghostY !== board.active.y)
        {
            for (const c of pieceCells(board.active, board.active.x, ghostY, board.active.rot))
            {
                if (c.y < 0 || c.y >= BOARD_H_VISIBLE) continue;
                const base = c.gem.type === 'diamond' ? rgb(1,1,1) : GEM_COLORS[c.gem.color];
                const ghost = rgb(base.r * .5, base.g * .5, base.b * .5, .5);
                const gp = cellPos(boardIndex, c.x, c.y);
                // Match the gem's real silhouette so a crash reads as a crash
                // even in the landing preview.
                if (c.gem.type === 'crash')        drawCircle(gp, .9, ghost);
                else if (c.gem.type === 'diamond') drawRect(gp, vec2(.9, .9), ghost, Math.PI/4);
                else                               drawRect(gp, vec2(.9, .9), ghost);
            }
        }
        for (const c of pieceCells(board.active))
        {
            if (c.y < 0) continue;
            const drawY = Math.min(c.y, BOARD_H_VISIBLE - 1);
            const yOffset = c.y >= BOARD_H_VISIBLE ? c.y - (BOARD_H_VISIBLE - 1) : 0;
            drawGem(cellPos(boardIndex, c.x, drawY).add(vec2(0, yOffset)), c.gem, true);
        }
    }

    // CHAIN xN pop — scales up and fades over the board on a multi-step chain.
    if (board.chainPop && board.chainPop.t > 0)
    {
        const k = board.chainPop.t;                  // 1 → 0
        const scale = 1 + (1 - k) * .9;
        const a = Math.min(1, k * 1.6);
        const p = boardOrigin(boardIndex).add(vec2(BOARD_W/2, BOARD_H_VISIBLE * .58));
        drawText('CHAIN x' + board.chainPop.n, p, 1.7 * scale,
            rgb(1, .85, .2, a), .14, rgb(0, 0, 0, a));
    }
}

function drawPortrait(character, pos, sizePx, ctx)
{
    const c = character.color;
    const s = sizePx;
    ctx = ctx || mainContext;
    const r = s * .5;
    ctx.save();
    ctx.translate(pos.x, pos.y);
    if (character.portrait === 'circle')
    {
        ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI*2);
        ctx.fillStyle = c.toString(); ctx.fill();
    }
    else if (character.portrait === 'triangle')
    {
        ctx.beginPath();
        ctx.moveTo(0, -r);
        ctx.lineTo(r*.95, r*.7);
        ctx.lineTo(-r*.95, r*.7);
        ctx.closePath();
        ctx.fillStyle = c.toString(); ctx.fill();
    }
    else if (character.portrait === 'diamond')
    {
        ctx.beginPath();
        ctx.moveTo(0, -r);
        ctx.lineTo(r, 0);
        ctx.lineTo(0, r);
        ctx.lineTo(-r, 0);
        ctx.closePath();
        ctx.fillStyle = c.toString(); ctx.fill();
    }
    else if (character.portrait === 'star')
    {
        const pts = 5;
        ctx.beginPath();
        for (let i = 0; i < pts * 2; i++)
        {
            const angle = (i / (pts * 2)) * Math.PI * 2 - Math.PI / 2;
            const radius = (i % 2 === 0) ? r : r * 0.45;
            const x = Math.cos(angle) * radius;
            const y = Math.sin(angle) * radius;
            i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        }
        ctx.closePath();
        ctx.fillStyle = c.toString(); ctx.fill();
    }
    ctx.restore();
}

// Small canvas-2D color glyph for the NEXT preview (matches the in-board glyphs).
function drawSimpleGlyph(ctx, ci, cx, cy, sz)
{
    const r = sz * .26;
    ctx.beginPath();
    if (ci === 0) { ctx.moveTo(cx, cy-r); ctx.lineTo(cx+r*.87, cy+r*.55); ctx.lineTo(cx-r*.87, cy+r*.55); ctx.closePath(); }
    else if (ci === 1) ctx.arc(cx, cy, r, 0, Math.PI*2);
    else if (ci === 2) { ctx.moveTo(cx, cy-r); ctx.lineTo(cx+r, cy); ctx.lineTo(cx, cy+r); ctx.lineTo(cx-r, cy); ctx.closePath(); }
    else ctx.rect(cx-r*.8, cy-r*.8, r*1.6, r*1.6);
    ctx.lineWidth = 1.5; ctx.strokeStyle = 'rgba(0,0,0,.45)'; ctx.stroke();
    ctx.fillStyle = 'rgba(255,255,255,.62)'; ctx.fill();
}

function drawSimpleGem(ctx, gem, cx, cy, sz)
{
    ctx.save();
    const c = (gem.type === 'diamond') ? rgb(1,1,1,.9) : GEM_COLORS[gem.color];
    if (gem.type === 'crash')
    {
        ctx.beginPath(); ctx.arc(cx, cy, sz/2, 0, Math.PI*2);
        ctx.fillStyle = c.toString(); ctx.fill();
        drawSimpleGlyph(ctx, gem.color, cx, cy, sz);
    }
    else if (gem.type === 'diamond')
    {
        ctx.translate(cx, cy); ctx.rotate(Math.PI/4);
        ctx.fillStyle = c.toString();
        ctx.fillRect(-sz/2, -sz/2, sz, sz);
    }
    else
    {
        ctx.fillStyle = c.toString();
        ctx.fillRect(cx - sz/2, cy - sz/2, sz, sz);
        if (gem.type === 'counter')
        {
            ctx.fillStyle = '#fff';
            ctx.font = 'bold ' + Math.floor(sz*.8) + 'px sans-serif';
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText(gem.countdown, cx, cy);
        }
        else drawSimpleGlyph(ctx, gem.color, cx, cy, sz);
    }
    ctx.restore();
}

///////////////////////////////////////////////////////////////////////////////
// Particle bursts on gem clears

const particles = [];
let screenFlash = 0;                 // 0..1 full-screen white flash on big clears

function spawnClearParticles(boardIdx, cell, delay = 0, intensity = 1)
{
    if (boardIdx === undefined || boardIdx < 0) return;
    const pos = cellPos(boardIdx, cell.x, cell.y);
    const color = cell.type === 'diamond' ? rgb(1,1,1) : GEM_COLORS[cell.color];

    const count = Math.round(9 * intensity);
    const speedMul = 1 + (intensity - 1) * .5;
    for (let i = 0; i < count; i++)
    {
        const angle = (i / count) * Math.PI * 2 + rand(-.2, .2);
        const speed = (.04 + rand(0, .04)) * speedMul;
        particles.push({
            pos: pos.copy(),
            vel: vec2(Math.cos(angle) * speed, Math.sin(angle) * speed),
            color,
            age: -delay,
            duration: .35,
        });
    }
    particles.push({
        pos: pos.copy(),
        vel: vec2(),
        color: rgb(1,1,1),
        age: -delay,
        duration: .18,
        isFlash: true,
    });
}

function updateParticles()
{
    for (let i = particles.length - 1; i >= 0; i--)
    {
        const p = particles[i];
        p.age += timeDelta;
        if (p.age < 0) continue;
        if (p.age >= p.duration) { particles.splice(i, 1); continue; }
        p.pos = p.pos.add(p.vel);
        p.vel = p.vel.scale(.92);
    }
}

function renderParticles()
{
    for (const p of particles)
    {
        if (p.age < 0) continue;
        const t = p.age / p.duration;
        const alpha = 1 - t;
        const base = p.isFlash ? .35 : .14;
        const size = p.isFlash ? base * (1 - t * .4) : base * (1 + t * .5);
        const c = p.color;
        drawCircle(p.pos, size, rgb(c.r, c.g, c.b, alpha));
    }
}

{

// Controllers

// Control schemes. In a two-human match P1 uses WASD and P2 uses the arrows
// (distinct, so they can share one keyboard). When P1 is the only human (vs CPU)
// they get KEYMAP_SOLO, which accepts EITHER scheme.
const KEYMAP_WASD = {
    left: ['KeyA'], right: ['KeyD'],
    softDrop: ['KeyS'], hardDrop: ['KeyW', 'ShiftLeft'],
    rotCCW: ['KeyZ'], rotCW: ['KeyX'],
};
const KEYMAP_ARROWS = {
    left: ['ArrowLeft'], right: ['ArrowRight'],
    softDrop: ['ArrowDown'], hardDrop: ['ArrowUp', 'Space'],
    rotCCW: ['Comma'], rotCW: ['Period'],
};
const KEYMAP_SOLO = {
    left: ['KeyA', 'ArrowLeft'], right: ['KeyD', 'ArrowRight'],
    softDrop: ['KeyS', 'ArrowDown'], hardDrop: ['KeyW', 'ShiftLeft', 'ArrowUp', 'Space'],
    rotCCW: ['KeyZ', 'Comma'], rotCW: ['KeyX', 'Period'],
};

function anyPressed(codes) { for (const k of codes) if (keyWasPressed(k)) return true; return false; }
function anyDown(codes)    { for (const k of codes) if (keyIsDown(k))    return true; return false; }

// Gamepad mapping (player one only, primary gamepad):
//   D-pad L/R (14/15) or left-stick X  -> move      (edge-triggered)
//   D-pad Up (12) or Y (3)             -> hard drop  (edge-triggered)
//   A (0) / RB (5)                     -> rotate CW
//   B (1) / LB (4)                     -> rotate CCW
//   D-pad Down (13) or left-stick down -> soft drop  (held)
// (Start / button 9 is reserved for pause, handled in gameUpdate.)
class HumanController
{
    constructor(keymap, gamepad = false)
    {
        this.keymap = keymap;
        this.gamepad = gamepad;   // player one also reads the primary gamepad
        this.hardDropping = false;
        this.gpStickX = 0;        // last analog-stick horizontal dir, for edge taps
    }

    update(board)
    {
        if (!board.active || board.gameOver) return;
        const km = this.keymap;
        const gp = this.gamepad;

        // Analog stick → a one-shot left/right tap only on crossing into a side.
        let stickL = false, stickR = false;
        if (gp)
        {
            const sx = gamepadStick(0).x;
            const dir = sx > .4 ? 1 : sx < -.4 ? -1 : 0;
            if (dir !== this.gpStickX)
            {
                stickL = dir < 0;
                stickR = dir > 0;
                this.gpStickX = dir;
            }
        }

        const left  = anyPressed(km.left)    || (gp && gamepadWasPressed(14)) || stickL;
        const right = anyPressed(km.right)   || (gp && gamepadWasPressed(15)) || stickR;
        const ccw   = anyPressed(km.rotCCW)  || (gp && (gamepadWasPressed(0) ||gamepadWasPressed(2) || gamepadWasPressed(4)));
        const cw    = anyPressed(km.rotCW)   || (gp && (gamepadWasPressed(1) || gamepadWasPressed(5)));
        const hard  = anyPressed(km.hardDrop)|| (gp && (gamepadWasPressed(12) || gamepadWasPressed(3)));

        if (!this.hardDropping)
        {
            if (left  && pieceTryMove(board.grid, board.active, -1, 0)) sMove?.play();
            if (right && pieceTryMove(board.grid, board.active,  1, 0)) sMove?.play();
            if (ccw   && pieceTryRotate(board.grid, board.active, -1))  sRotate?.play();
            if (cw    && pieceTryRotate(board.grid, board.active,  1))  sRotate?.play();
            if (hard) this.hardDropping = true;
        }
    }

    fallSpeed(board)
    {
        if (this.hardDropping) return 0;
        let soft = anyDown(this.keymap.softDrop);
        if (this.gamepad && (gamepadIsDown(13) || gamepadStick(0).y > .4)) soft = true;
        return soft ? 0.025 : board.fallInterval;
    }
}

function boardTick(board, controller, onLock)
{
    if (board.gameOver || !board.active) return;

    const step = controller.fallSpeed(board);
    // Clamp fallTimer so a sudden speed change (soft-drop press) takes effect immediately
    // instead of waiting for the previous (slower) interval to drain.
    if (board.fallTimer > step) board.fallTimer = step;
    board.fallTimer -= timeDelta;

    while (board.fallTimer <= 0 && board.active)
    {
        board.fallTimer += Math.max(.001, step);

        if (pieceTryMove(board.grid, board.active, 0, -1))
        {
            board.lockTimer = 0;
        }
        else
        {
            board.lockTimer += step;
            if (board.lockTimer >= 0.3 || controller.hardDropping)
            {
                const isDiamondPiece = (board.active.a.type === 'diamond' || board.active.b.type === 'diamond');
                const placed = lockPieceWithSeparation(board.grid, board.active);
                board.lockFlash = { cells: placed, t: 1 };   // brief white pop on landed cells
                board.active = null;
                controller.hardDropping = false;
                sLock?.play();

                // Diamond pre-clear: instant, with particle burst on each cleared cell.
                if (isDiamondPiece)
                {
                    let diamondPos = null;
                    for (let x = 0; x < BOARD_W && !diamondPos; x++)
                    for (let y = 0; y < BOARD_H && !diamondPos; y++)
                        if (board.grid[x][y] && board.grid[x][y].type === 'diamond')
                            diamondPos = [x, y];
                    if (diamondPos)
                    {
                        const dr = resolveDiamond(board.grid, diamondPos[0], diamondPos[1]);
                        if (dr.cleared.length > 0)
                        {
                            for (const [cx, cy] of dr.cleared)
                            {
                                const g = board.grid[cx][cy];
                                spawnClearParticles(board.index, { x: cx, y: cy, type: g.type, color: g.color });
                            }
                            clearCells(board.grid, dr.cleared);
                            applyGravity(board.grid);
                        }
                    }
                }

                // Preview the chain on a clone so we can animate each wave separately.
                const chainData = previewChain(board.grid, {
                    isDiamondInitiated: isDiamondPiece,
                    characterMultiplier: board.character.multiplier
                });
                board.score += chainData.totalDamage;
                board.chain = chainData.waves.length;

                if (chainData.waves.length === 0)
                {
                    // No chain — finalize immediately.
                    tickCounterGems(board.grid);
                    // Recompute power gems on the REAL board so newly-formed
                    // gems (e.g. a fresh 2x2) join/show connectors right away.
                    // Without this, the only thing that ever merged the live
                    // board was a chain animation, so power gems formed without
                    // a detonation looked disconnected until an unrelated break.
                    mergePowerGems(board.grid);
                    if (board.gameOver) sGameOver?.play();
                    if (onLock) onLock(board, {
                        totalDamage: chainData.totalDamage,
                        waves: 0,
                        allClear: chainData.allClear,
                    });
                    return;
                }

                // Start chain animation; onLock fires when it completes.
                board.chainAnim = {
                    waves: chainData.waves,
                    totalDamage: chainData.totalDamage,
                    allClear: chainData.allClear,
                    waveIndex: -1,
                    timer: 0.08,
                    phase: 'init',
                    onLock,
                };
                return;
            }
        }
    }
}

///////////////////////////////////////////////////////////////////////////////
// AI

const AI_WEIGHTS = {
    easy: {
        powerGemPotential:5, bombMatch:3, bombWaste:-1, colorClustering:1,
        heightPenalty:-1, col4Penalty:-2, tower:0, counterAdj:1,
        opponentPattern:0, clearImmediate:5, chainPotential:0,
        decideMs:700, moveCellsPerSec:3, targetJitter:true,
    },
    normal: {
        powerGemPotential:15, bombMatch:10, bombWaste:-5, colorClustering:3,
        heightPenalty:-2, col4Penalty:-4, tower:4, counterAdj:3,
        opponentPattern:2, clearImmediate:20, chainPotential:0,
        decideMs:350, moveCellsPerSec:5, targetJitter:false,
    },
    hard: {
        powerGemPotential:25, bombMatch:20, bombWaste:-10, colorClustering:5,
        heightPenalty:-3, col4Penalty:-8, tower:8, counterAdj:6,
        opponentPattern:6, clearImmediate:50, chainPotential:15,
        decideMs:150, moveCellsPerSec:8, targetJitter:false,
    },
};

function cloneGrid(grid)
{
    const out = [...Array(BOARD_W)].map(()=> Array(BOARD_H).fill(null));
    for (let x = 0; x < BOARD_W; x++)
    for (let y = 0; y < BOARD_H; y++)
    {
        const g = grid[x][y];
        if (!g) continue;
        if (g.type === 'regular') out[x][y] = { type:'regular', color:g.color, powerGemId:g.powerGemId };
        else if (g.type === 'crash') out[x][y] = gemCrash(g.color);
        else if (g.type === 'counter') out[x][y] = gemCounter(g.color, g.countdown);
        else out[x][y] = gemDiamond();
    }
    return out;
}

function findLandingY(grid, piece, x, rot)
{
    let y = BOARD_H + 1;
    if (!pieceCanPlace(grid, piece, x, y, rot)) return -1;
    while (pieceCanPlace(grid, piece, x, y - 1, rot)) y--;
    return y;
}

function scorePlacement(board, piece, x, rot, opponentPattern, weights)
{
    if (!pieceCanPlace(board.grid, piece, x, BOARD_H, rot)) return -Infinity;
    const landY = findLandingY(board.grid, piece, x, rot);
    if (landY < 0) return -Infinity;

    const sim = cloneGrid(board.grid);
    const simPiece = { a: piece.a, b: piece.b, x, y: landY, rot };
    lockPieceWithSeparation(sim, simPiece);
    const before = sim.map(col => col.filter(c => c).length).reduce((a,b)=>a+b, 0);
    const res = resolveBoard(sim, { characterMultiplier: 1 });
    const after = sim.map(col => col.filter(c => c).length).reduce((a,b)=>a+b, 0);
    const cleared = before - after;

    let score = 0;

    // Power gem potential - count power-gem cells after sim
    let pgCells = 0;
    for (let x2 = 0; x2 < BOARD_W; x2++)
    for (let y2 = 0; y2 < BOARD_H; y2++)
    {
        const g = sim[x2][y2];
        if (g && g.type === 'regular' && g.powerGemId >= 0) pgCells++;
    }
    score += pgCells * weights.powerGemPotential / 4;

    if (cleared > 0) score += weights.clearImmediate + cleared * 2;
    if (res.waves > 1) score += weights.chainPotential * (res.waves - 1);

    let maxH = 0;
    for (let cx = 0; cx < BOARD_W; cx++)
    {
        const h = columnHeight(sim, cx);
        if (h > maxH) maxH = h;
        if (cx === SPAWN_COL) score += weights.col4Penalty * Math.max(0, h - 3);
    }
    score += weights.heightPenalty * Math.max(0, maxH - 6);

    const placedCells = pieceCells({a:piece.a, b:piece.b, x, y: landY, rot});

    // Bomb match / waste
    for (const c of placedCells)
    {
        if (c.gem.type !== 'crash') continue;
        let matched = false;
        for (const [dx, dy] of [[1,0],[-1,0],[0,1],[0,-1]])
        {
            const nx = c.x + dx, ny = c.y + dy;
            if (!inBounds(nx, ny)) continue;
            const ng = sim[nx][ny];
            if (ng && (ng.type === 'regular' || ng.type === 'crash') && ng.color === c.gem.color)
            { matched = true; break; }
        }
        score += matched ? weights.bombMatch : weights.bombWaste;
    }

    // Color clustering for regular gems
    for (const c of placedCells)
    {
        if (c.gem.type !== 'regular') continue;
        let cluster = 0;
        for (const [dx, dy] of [[1,0],[-1,0],[0,1],[0,-1]])
        {
            const nx = c.x + dx, ny = c.y + dy;
            if (!inBounds(nx, ny)) continue;
            const ng = sim[nx][ny];
            if (ng && ng.type === 'regular' && ng.color === c.gem.color) cluster++;
        }
        score += cluster * weights.colorClustering;
    }

    // Tower of power: bias regular gems toward cols 0/1 stacking same color
    for (const c of placedCells)
    {
        if (c.gem.type !== 'regular') continue;
        if (c.x > 1) continue;
        if (c.y > 0)
        {
            const below = sim[c.x][c.y - 1];
            if (below && below.type === 'regular' && below.color === c.gem.color)
                score += weights.tower;
        }
    }

    // Counter gem adjacency on own board
    for (const c of placedCells)
    {
        for (const [dx, dy] of [[1,0],[-1,0],[0,1],[0,-1]])
        {
            const nx = c.x + dx, ny = c.y + dy;
            if (!inBounds(nx, ny)) continue;
            const ng = sim[nx][ny];
            if (ng && ng.type === 'counter') score += weights.counterAdj;
        }
    }

    // Opponent pattern defense: reward same-color regulars where opponent's next pattern row would land
    if (opponentPattern && weights.opponentPattern > 0)
    {
        for (const c of placedCells)
        {
            if (c.gem.type !== 'regular') continue;
            const patColor = opponentPattern[0][c.x];
            if (patColor === c.gem.color) score += weights.opponentPattern;
        }
    }

    return score;
}

class AIController
{
    constructor(difficulty, opponentBoard)
    {
        this.weights = AI_WEIGHTS[difficulty];
        this.opponent = opponentBoard;
        this.target = null;
        this.decideTimer = 0;
        this.moveCooldown = 0;
        this.hardDropping = false;
    }

    pickTarget(board)
    {
        const piece = board.active;
        if (!piece) return null;
        const candidates = [];
        for (let rot = 0; rot < 4; rot++)
        for (let x = 0; x < BOARD_W; x++)
        {
            const oppPattern = this.opponent ? this.opponent.character.pattern : null;
            const s = scorePlacement(board, piece, x, rot, oppPattern, this.weights);
            if (s > -Infinity) candidates.push({ x, rot, s });
        }
        if (candidates.length === 0) return null;
        candidates.sort((a, b) => b.s - a.s);
        if (this.weights.targetJitter && candidates.length > 2)
        {
            const idx = randInt(3);
            return candidates[idx];
        }
        return candidates[0];
    }

    update(board)
    {
        if (!board.active || board.gameOver) return;
        if (!this.target)
        {
            this.decideTimer += timeDelta * 1000;
            if (this.decideTimer >= this.weights.decideMs)
            {
                this.target = this.pickTarget(board);
                this.decideTimer = 0;
            }
            return;
        }

        this.moveCooldown -= timeDelta;
        if (this.moveCooldown > 0) return;
        const moveDelay = 1 / this.weights.moveCellsPerSec;

        if (board.active.rot !== this.target.rot)
        {
            const diff = (this.target.rot - board.active.rot + 4) % 4;
            pieceTryRotate(board.grid, board.active, diff <= 2 ? 1 : -1);
            this.moveCooldown = moveDelay;
            return;
        }

        if (board.active.x < this.target.x)
        {
            pieceTryMove(board.grid, board.active, 1, 0);
            this.moveCooldown = moveDelay;
            return;
        }
        else if (board.active.x > this.target.x)
        {
            pieceTryMove(board.grid, board.active, -1, 0);
            this.moveCooldown = moveDelay;
            return;
        }

        this.hardDropping = true;
        this.target = null;
    }

    fallSpeed(board)
    {
        // AI uses soft-drop speed (not instant) so the player can see where
        // the piece is going. Still fast enough to feel snappy.
        return this.hardDropping ? 0.04 : board.fallInterval;
    }
}
