// Unit tests (stub - tasks add cases here)

function runUnitTests()
{
    const fails = [];
    const assert = (cond, msg) =>
    {
        if (cond) console.log('TEST PASS:', msg);
        else { console.error('TEST FAIL:', msg); fails.push(msg); }
    };

    // (tests added in later tasks)

    // --- Power gem merge tests ---
    {
        const place = (g, x, y, color) => { g[x][y] = gemRegular(color); };

        // 2x2 forms one power gem
        let g = emptyGrid();
        place(g, 0, 0, COLOR_R); place(g, 1, 0, COLOR_R);
        place(g, 0, 1, COLOR_R); place(g, 1, 1, COLOR_R);
        mergePowerGems(g);
        const id1 = g[0][0].powerGemId;
        assert(id1 >= 0, 'merge: 2x2 gets a powerGemId');
        assert(g[1][1].powerGemId === id1, 'merge: 2x2 shares one id');

        // L-shape (3 cells) does NOT merge
        g = emptyGrid();
        place(g, 0, 0, COLOR_G); place(g, 1, 0, COLOR_G); place(g, 0, 1, COLOR_G);
        mergePowerGems(g);
        assert(g[0][0].powerGemId === -1, 'merge: L-shape does not merge');

        // 2x2 with one off-color hole does NOT merge
        g = emptyGrid();
        place(g, 0, 0, COLOR_B); place(g, 1, 0, COLOR_B);
        place(g, 0, 1, COLOR_Y); place(g, 1, 1, COLOR_B);
        mergePowerGems(g);
        assert(g[0][0].powerGemId === -1, 'merge: mixed-color bbox does not merge');

        // Adjacent 2x2 + 2x2 = 4x2 (or 2x4) when filled
        g = emptyGrid();
        for (let x = 0; x < 4; x++)
        for (let y = 0; y < 2; y++) place(g, x, y, COLOR_R);
        mergePowerGems(g);
        const idAll = g[0][0].powerGemId;
        let allSame = true;
        for (let x = 0; x < 4; x++)
        for (let y = 0; y < 2; y++)
            if (g[x][y].powerGemId !== idAll) allSame = false;
        assert(allSame, 'merge: 4x2 filled region shares one id');

        // Counter gem in the middle blocks merge
        g = emptyGrid();
        place(g, 0, 0, COLOR_Y); place(g, 1, 0, COLOR_Y);
        place(g, 0, 1, COLOR_Y); g[1][1] = gemCounter(COLOR_Y, 5);
        mergePowerGems(g);
        assert(g[0][0].powerGemId === -1, 'merge: counter gem blocks rectangle');

        // Return value: true when something changed, false on a stable grid
        g = emptyGrid();
        for (let x = 0; x < 2; x++)
        for (let y = 0; y < 2; y++) place(g, x, y, COLOR_R);
        assert(mergePowerGems(g) === true,  'merge: returns true when 2x2 newly formed');
        assert(mergePowerGems(g) === false, 'merge: returns false on stable grid (idempotent)');

        // Extension: 2x2 grows to 2x3, existing id preserved
        g = emptyGrid();
        for (let x = 0; x < 2; x++)
        for (let y = 0; y < 2; y++) place(g, x, y, COLOR_B);
        mergePowerGems(g);
        const extId = g[0][0].powerGemId;
        place(g, 0, 2, COLOR_B); place(g, 1, 2, COLOR_B);
        mergePowerGems(g);
        assert(g[0][2].powerGemId === extId, 'merge: 2x2 extending to 2x3 keeps existing id');
        assert(g[0][0].powerGemId === extId, 'merge: original cells still have same id after extension');

        // L-shape with embedded 2x2: the 2x2 corner should still form a power gem
        g = emptyGrid();
        place(g, 0, 0, COLOR_R); place(g, 1, 0, COLOR_R); place(g, 2, 0, COLOR_R);
        place(g, 0, 1, COLOR_R); place(g, 1, 1, COLOR_R);
        mergePowerGems(g);
        const lid = g[0][0].powerGemId;
        assert(lid >= 0, 'merge: L-shape forms a PG at the embedded 2x2');
        assert(g[1][1].powerGemId === lid && g[1][0].powerGemId === lid, 'merge: 2x2 cells share id inside L-shape');
        assert(g[2][0].powerGemId === -1, 'merge: the extra L-shape cell stays loose');

        // Two same-color 2x2 PGs separated, then connected by 2 cells → merge into one 4x2
        g = emptyGrid();
        for (let x = 0; x < 2; x++)
        for (let y = 0; y < 2; y++) place(g, x, y, COLOR_G);
        mergePowerGems(g);
        const idA = g[0][0].powerGemId;
        for (let x = 4; x < 6; x++)
        for (let y = 0; y < 2; y++) place(g, x, y, COLOR_G);
        mergePowerGems(g);
        const idB = g[4][0].powerGemId;
        assert(idA !== idB, 'merge: separated 2x2s get different ids');
        place(g, 2, 0, COLOR_G); place(g, 2, 1, COLOR_G);
        place(g, 3, 0, COLOR_G); place(g, 3, 1, COLOR_G);
        mergePowerGems(g);
        const mergedId = g[0][0].powerGemId;
        for (let x = 0; x < 6; x++)
        for (let y = 0; y < 2; y++)
            assert(g[x][y].powerGemId === mergedId, 'merge: 6x2 unified after connector cells (col '+x+')');

        // Diamond breaks a PG → leftover cells become loose regulars
        g = emptyGrid();
        for (let x = 0; x < 2; x++)
        for (let y = 0; y < 2; y++) place(g, x, y, COLOR_Y);
        mergePowerGems(g);
        const pgId = g[0][0].powerGemId;
        assert(pgId >= 0, 'merge: 2x2 yellow PG formed');
        g[0][0] = null;  // simulate diamond carve
        mergePowerGems(g);
        assert(g[1][0].powerGemId === -1, 'merge: leftover cell after partial-clear resets to loose');
        assert(g[0][1].powerGemId === -1, 'merge: other leftover also loose');
        assert(g[1][1].powerGemId === -1, 'merge: 3-cell L cannot stay as PG');
    }

    // --- Piece tests ---
    {
        // Rotation offsets
        const p = { a: gemRegular(COLOR_R), b: gemRegular(COLOR_G), x: 3, y: 5, rot: 0 };
        let cells = pieceCells(p);
        assert(cells[0].x === 3 && cells[0].y === 5, 'piece: a at (3,5)');
        assert(cells[1].x === 3 && cells[1].y === 6, 'piece: b above a (rot 0)');

        cells = pieceCells(p, 3, 5, 1);
        assert(cells[1].x === 4 && cells[1].y === 5, 'piece: b right of a (rot 1)');

        cells = pieceCells(p, 3, 5, 2);
        assert(cells[1].x === 3 && cells[1].y === 4, 'piece: b below a (rot 2)');

        cells = pieceCells(p, 3, 5, 3);
        assert(cells[1].x === 2 && cells[1].y === 5, 'piece: b left of a (rot 3)');

        // Move blocked by wall
        let g = emptyGrid();
        const p2 = { a: gemRegular(COLOR_R), b: gemRegular(COLOR_G), x: 0, y: 5, rot: 0 };
        assert(!pieceTryMove(g, p2, -1, 0), 'piece: cannot move into left wall');
        assert(pieceTryMove(g, p2, 1, 0), 'piece: can move right');

        // Separation on lock: vertical pair, both land at base
        g = emptyGrid();
        const pv = { a: gemRegular(COLOR_R), b: gemRegular(COLOR_G), x: 2, y: 5, rot: 0 };
        lockPieceWithSeparation(g, pv);
        assert(g[2][0] && g[2][0].color === COLOR_R, 'separation: vertical a lands at bottom');
        assert(g[2][1] && g[2][1].color === COLOR_G, 'separation: vertical b stacks on a');

        // Separation: horizontal pair with one side over a tall column
        g = emptyGrid();
        g[3][0] = gemRegular(COLOR_B);
        g[3][1] = gemRegular(COLOR_B);
        g[3][2] = gemRegular(COLOR_B);
        const ph = { a: gemRegular(COLOR_R), b: gemRegular(COLOR_G), x: 2, y: 5, rot: 1 };
        // a at col 2, b at col 3
        lockPieceWithSeparation(g, ph);
        assert(g[2][0] && g[2][0].color === COLOR_R, 'separation: a falls to bottom of empty col');
        assert(g[3][3] && g[3][3].color === COLOR_G, 'separation: b lands on top of stacked col');

        // Rotate: in-place rotation when room is available
        g = emptyGrid();
        const pr = { a: gemRegular(COLOR_R), b: gemRegular(COLOR_G), x: 3, y: 5, rot: 0 };
        assert(pieceTryRotate(g, pr, 1) && pr.rot === 1, 'rotate: CW from rot 0 to rot 1');
        assert(pieceTryRotate(g, pr, -1) && pr.rot === 0, 'rotate: CCW back to rot 0');

        // Rotate: wall kick at left wall (piece at x=0, rotating to rot=3 would put b at x=-1; kick right)
        g = emptyGrid();
        const pk = { a: gemRegular(COLOR_R), b: gemRegular(COLOR_G), x: 0, y: 5, rot: 0 };
        assert(pieceTryRotate(g, pk, -1), 'rotate: wall-kick succeeds from x=0 to rot 3');
        assert(pk.rot === 3 && pk.x === 1, 'rotate: kicked right to x=1');

        // Rotate: blocked entirely (boxed in on all sides)
        g = emptyGrid();
        g[0][5] = gemRegular(COLOR_B);
        g[2][5] = gemRegular(COLOR_B);
        g[1][6] = gemRegular(COLOR_B);
        g[1][4] = gemRegular(COLOR_B);
        const pb = { a: gemRegular(COLOR_R), b: gemRegular(COLOR_G), x: 1, y: 5, rot: 0 };
        // rot 0: b at (1,6) blocked. rot 1: b at (2,5) blocked. kicks shift by (-1,0)->b at (1,5) self-pos but a at (0,5) blocked. (+1,0)->a at (2,5) blocked. (0,+1)->b at (2,6) free, a at (1,6) blocked. All kicks fail.
        assert(!pieceTryRotate(g, pb, 1), 'rotate: returns false when all kicks blocked');
        assert(pb.rot === 0, 'rotate: failure leaves rot unchanged');

        // Separation: rot=2 (b below a, same column) — sort ensures b lands first
        g = emptyGrid();
        const p2c = { a: gemRegular(COLOR_R), b: gemRegular(COLOR_G), x: 2, y: 5, rot: 2 };
        lockPieceWithSeparation(g, p2c);
        assert(g[2][0] && g[2][0].color === COLOR_G, 'separation: rot 2 b lands at y=0');
        assert(g[2][1] && g[2][1].color === COLOR_R, 'separation: rot 2 a lands at y=1 (above b)');
    }

    // --- Gravity tests ---
    {
        // Single gem floats → falls to floor
        let g = emptyGrid();
        g[2][5] = gemRegular(COLOR_R);
        applyGravity(g);
        assert(g[2][0] && g[2][5] === null, 'gravity: single gem falls to floor');

        // Power gem (2x2) falls as a unit
        g = emptyGrid();
        g[1][3] = gemRegular(COLOR_R); g[2][3] = gemRegular(COLOR_R);
        g[1][4] = gemRegular(COLOR_R); g[2][4] = gemRegular(COLOR_R);
        mergePowerGems(g);
        applyGravity(g);
        assert(g[1][0] && g[2][0] && g[1][1] && g[2][1], 'gravity: 2x2 power gem lands at floor');
        assert(g[1][3] === null, 'gravity: cells above are vacated');

        // Stacked: B singleton at col 1 floor; 2x2 power gem above; col 2 of PG free above
        // PG must keep both cells at same y; col 1 supported by B → bottom row of PG at y=1
        g = emptyGrid();
        g[1][0] = gemRegular(COLOR_B);
        g[1][3] = gemRegular(COLOR_R); g[2][3] = gemRegular(COLOR_R);
        g[1][4] = gemRegular(COLOR_R); g[2][4] = gemRegular(COLOR_R);
        mergePowerGems(g);
        applyGravity(g);
        assert(g[1][0] && g[1][0].color === COLOR_B, 'gravity: B singleton stays at floor');
        assert(g[1][1] && g[1][1].color === COLOR_R, 'gravity: power gem bottom row at y=1 (supported by B)');
        assert(g[1][3] === null && g[2][3] === null, 'gravity: power gem vacated original cells');

        // Return value: true when something moved, false on stable grid
        g = emptyGrid();
        g[3][5] = gemRegular(COLOR_R);
        assert(applyGravity(g) === true, 'gravity: returns true when something fell');
        assert(applyGravity(g) === false, 'gravity: returns false on stable grid');

        // Lockstep: PG above singleton above empty — both fall, PG rests on singleton
        g = emptyGrid();
        g[3][3] = gemRegular(COLOR_Y);            // singleton
        g[3][5] = gemRegular(COLOR_R); g[4][5] = gemRegular(COLOR_R);   // PG bottom row
        g[3][6] = gemRegular(COLOR_R); g[4][6] = gemRegular(COLOR_R);   // PG top row
        mergePowerGems(g);
        applyGravity(g);
        assert(g[3][0] && g[3][0].color === COLOR_Y, 'gravity: lockstep — singleton lands at y=0');
        assert(g[3][1] && g[3][1].color === COLOR_R, 'gravity: lockstep — PG col 3 bottom at y=1 (on singleton)');
        assert(g[4][1] && g[4][1].color === COLOR_R, 'gravity: lockstep — PG col 4 also at y=1 (rigid)');
        assert(g[4][0] === null, 'gravity: lockstep — col 4 y=0 stays empty under rigid PG');

        // Power gem partially on floor → stays put
        g = emptyGrid();
        g[0][0] = gemRegular(COLOR_B); g[1][0] = gemRegular(COLOR_B);
        g[0][1] = gemRegular(COLOR_B); g[1][1] = gemRegular(COLOR_B);
        mergePowerGems(g);
        assert(applyGravity(g) === false, 'gravity: PG on floor returns false (no movement)');
        assert(g[0][0] && g[1][0] && g[0][1] && g[1][1], 'gravity: PG on floor stays put');

        // Uneven support: col 5 supported, col 4 empty under PG — PG rests at y=1
        g = emptyGrid();
        g[5][0] = gemRegular(COLOR_B);
        g[4][3] = gemRegular(COLOR_R); g[5][3] = gemRegular(COLOR_R);
        g[4][4] = gemRegular(COLOR_R); g[5][4] = gemRegular(COLOR_R);
        mergePowerGems(g);
        applyGravity(g);
        assert(g[5][0] && g[5][0].color === COLOR_B, 'gravity: uneven — B support stays at floor');
        assert(g[5][1] && g[5][1].color === COLOR_R, 'gravity: uneven — PG col 5 at y=1');
        assert(g[4][1] && g[4][1].color === COLOR_R, 'gravity: uneven — PG col 4 also at y=1 (rigid)');
        assert(g[4][0] === null, 'gravity: uneven — col 4 y=0 stays empty under PG');
    }

    // --- Crash detonation tests ---
    {
        // Single crash next to nothing: no clears
        let g = emptyGrid();
        g[2][0] = gemCrash(COLOR_R);
        assert(detectCrashClears(g).length === 0, 'crash: lone bomb no detonation');

        // Crash next to same-color regular → both clear
        g = emptyGrid();
        g[2][0] = gemCrash(COLOR_R);
        g[3][0] = gemRegular(COLOR_R);
        let cleared = detectCrashClears(g);
        assert(cleared.length === 2, 'crash: bomb+regular both clear (2 cells)');

        // Crash next to off-color: no clear
        g = emptyGrid();
        g[2][0] = gemCrash(COLOR_R);
        g[3][0] = gemRegular(COLOR_B);
        assert(detectCrashClears(g).length === 0, 'crash: off-color no detonation');

        // Chain of same-color regulars all clear
        g = emptyGrid();
        g[0][0] = gemCrash(COLOR_G);
        g[1][0] = gemRegular(COLOR_G); g[2][0] = gemRegular(COLOR_G); g[3][0] = gemRegular(COLOR_G);
        cleared = detectCrashClears(g);
        assert(cleared.length === 4, 'crash: linear chain 4 cells clear');

        // Adjacent counter gem also destroyed
        g = emptyGrid();
        g[0][0] = gemCrash(COLOR_Y); g[1][0] = gemRegular(COLOR_Y);
        g[2][0] = gemCounter(COLOR_B, 3);  // off-color counter, but adjacent → cleared
        cleared = detectCrashClears(g);
        assert(cleared.length === 3, 'crash: adjacent counter also cleared');

        // Counter with active countdown does NOT trigger detonation by like color
        g = emptyGrid();
        g[0][0] = gemCrash(COLOR_R);
        g[1][0] = gemCounter(COLOR_R, 4);
        assert(detectCrashClears(g).length === 0, 'crash: active counter does not trigger detonation');

        // Power gem with one cell touched: entire power gem clears
        g = emptyGrid();
        g[0][0] = gemRegular(COLOR_B); g[1][0] = gemRegular(COLOR_B);
        g[0][1] = gemRegular(COLOR_B); g[1][1] = gemRegular(COLOR_B);
        mergePowerGems(g);
        g[2][0] = gemCrash(COLOR_B);
        cleared = detectCrashClears(g);
        assert(cleared.length === 5, 'crash: touching a power gem cell clears all 4 + bomb');

        // Same-color bomb chain
        g = emptyGrid();
        g[0][0] = gemCrash(COLOR_R); g[1][0] = gemCrash(COLOR_R); g[2][0] = gemRegular(COLOR_R);
        cleared = detectCrashClears(g);
        assert(cleared.length === 3, 'crash: bomb-to-bomb chain clears connected bombs + regular');

        // On-color active counter adjacent to clearing region IS destroyed (by adjacency, not by color match)
        g = emptyGrid();
        g[0][0] = gemCrash(COLOR_Y); g[1][0] = gemRegular(COLOR_Y);
        g[2][0] = gemCounter(COLOR_Y, 3);
        cleared = detectCrashClears(g);
        assert(cleared.length === 3, 'crash: on-color active counter cleared by adjacency');
    }

    // --- Counter gem tick tests ---
    {
        let g = emptyGrid();
        g[0][0] = gemCounter(COLOR_R, 3);
        g[1][0] = gemCounter(COLOR_B, 1);
        g[2][0] = gemRegular(COLOR_G);

        let flipped = tickCounterGems(g);
        assert(g[0][0].type === 'counter' && g[0][0].countdown === 2, 'tick: countdown 3→2');
        assert(g[1][0].type === 'regular' && g[1][0].color === COLOR_B, 'tick: countdown 1→flip to regular');
        assert(flipped === true, 'tick: returns true when a gem flipped');
        assert(g[2][0].type === 'regular' && g[2][0].color === COLOR_G, 'tick: regular gem untouched');

        flipped = tickCounterGems(g);
        assert(flipped === false, 'tick: returns false when nothing flipped this round');
        assert(g[0][0].countdown === 1, 'tick: countdown 2→1');
    }

    // --- Damage formula tests ---
    {
        // 2x2 power gem + 1 bomb, wave 1, no diamond, no allClear
        let d = computeDamage(
            { regularsDestroyed: 0, crashesDestroyed: 1, powerGemSizes: [4] },
            { chainWave: 1, characterMultiplier: 1 }
        );
        assert(d === 9, '2x2+bomb = 9 (FAQ: ' + d + ')');

        // 3x2 (6) + 1 bomb = 13
        d = computeDamage(
            { regularsDestroyed: 0, crashesDestroyed: 1, powerGemSizes: [6] },
            { chainWave: 1, characterMultiplier: 1 }
        );
        assert(d === 13, '3x2+bomb = 13');

        // 4x2 (8) + 1 bomb = 17
        d = computeDamage(
            { regularsDestroyed: 0, crashesDestroyed: 1, powerGemSizes: [8] },
            { chainWave: 1, characterMultiplier: 1 }
        );
        assert(d === 17, '4x2+bomb = 17');

        // 5x2 (10) + 1 bomb = 26
        d = computeDamage(
            { regularsDestroyed: 0, crashesDestroyed: 1, powerGemSizes: [10] },
            { chainWave: 1, characterMultiplier: 1 }
        );
        assert(d === 26, '5x2+bomb = 26 (got ' + d + ')');

        // 6x2 (12) + 1 bomb = 32 (30 + 1 decade + 1 bomb)
        d = computeDamage(
            { regularsDestroyed: 0, crashesDestroyed: 1, powerGemSizes: [12] },
            { chainWave: 1, characterMultiplier: 1 }
        );
        assert(d === 32, '6x2+bomb = 32 (got ' + d + ')');

        // Chain wave 4 bonus = +10
        d = computeDamage(
            { regularsDestroyed: 0, crashesDestroyed: 1, powerGemSizes: [4] },
            { chainWave: 4, characterMultiplier: 1 }
        );
        assert(d === 19, '2x2+bomb wave-4 = 9+10 = 19 (got ' + d + ')');

        // Chun-Li 120% multiplier
        d = computeDamage(
            { regularsDestroyed: 0, crashesDestroyed: 1, powerGemSizes: [4] },
            { chainWave: 1, characterMultiplier: 1.2 }
        );
        assert(d === 10, 'Chun-Li 2x2+bomb = floor(9*1.2) = 10 (got ' + d + ')');

        // Diamond first wave penalty
        d = computeDamage(
            { regularsDestroyed: 5, crashesDestroyed: 0, powerGemSizes: [] },
            { chainWave: 1, isDiamondInitiated: true, characterMultiplier: 1 }
        );
        assert(d === 4, 'Diamond 5 regulars = floor(5*.8) = 4 (got ' + d + ')');

        // All-clear bonus +6
        d = computeDamage(
            { regularsDestroyed: 5, crashesDestroyed: 1, powerGemSizes: [] },
            { chainWave: 1, allClear: true, characterMultiplier: 1 }
        );
        assert(d === 12, 'all clear: 5+1+6 = 12 (got ' + d + ')');
    }

    // --- Drop algorithm tests ---
    {
        // Ken X' pattern (row 0 = bottom = first dropped):
        // row 0: RRRRRR
        // row 1: GGGGGG
        // row 2: BBBBBB
        // row 3: YYYYYY
        const kenPattern = [
            [COLOR_R, COLOR_R, COLOR_R, COLOR_R, COLOR_R, COLOR_R],
            [COLOR_G, COLOR_G, COLOR_G, COLOR_G, COLOR_G, COLOR_G],
            [COLOR_B, COLOR_B, COLOR_B, COLOR_B, COLOR_B, COLOR_B],
            [COLOR_Y, COLOR_Y, COLOR_Y, COLOR_Y, COLOR_Y, COLOR_Y],
        ];

        // Attack 5: cols 1,2,3,5,6 (indices 0,1,2,4,5) get 1 each; col 4 (index 3) skipped
        let g = emptyGrid();
        dropCounterGems(g, 5, kenPattern, 5);
        assert(g[0][0] && g[0][0].color === COLOR_R, 'drop: col 1 gets red');
        assert(g[1][0] && g[2][0] && g[4][0] && g[5][0], 'drop: cols 2,3,5,6 also filled');
        assert(g[3][0] === null, 'drop: col 4 skipped at attack-5');

        // Attack 6: col 4 also gets one
        g = emptyGrid();
        dropCounterGems(g, 6, kenPattern, 5);
        assert(g[3][0] && g[3][0].color === COLOR_R, 'drop: attack-6 fills col 4 last');

        // Attack 12: full row 1 + full row 2
        g = emptyGrid();
        dropCounterGems(g, 12, kenPattern, 5);
        for (let x = 0; x < 6; x++) assert(g[x][0] && g[x][0].color === COLOR_R, 'drop: row 1 all R (col '+x+')');
        for (let x = 0; x < 6; x++) assert(g[x][1] && g[x][1].color === COLOR_G, 'drop: row 2 all G (col '+x+')');

        // Countdown value
        assert(g[0][0].countdown === 5, 'drop: countdown starts at 5');

        // Full column → discard
        g = emptyGrid();
        for (let y = 0; y < BOARD_H; y++) g[0][y] = gemRegular(COLOR_B);  // col 0 full
        const placed = dropCounterGems(g, 6, kenPattern, 5);
        assert(placed === 5, 'drop: 6 gems but col 0 full → 5 placed (1 discarded)');
    }

    // --- Defense tests ---
    {
        // No incoming → outgoing passes through
        let r = applyDefense(0, 10);
        assert(r.newOutgoing === 10 && r.remainingIncoming === 0 && r.flipback === 0, 'defense: no incoming, outgoing 10 passes');

        // No outgoing → incoming unchanged
        r = applyDefense(20, 0);
        assert(r.remainingIncoming === 20 && r.flipback === 0, 'defense: no outgoing, full incoming');

        // Partial defense: 10 incoming, 6 outgoing (defense=3) → incoming 7 remains, no flipback
        r = applyDefense(10, 6);
        assert(r.remainingIncoming === 7, 'defense: partial subtract (10-3=7), got ' + r.remainingIncoming);
        assert(r.newOutgoing === 0, 'defense: no leftover outgoing in partial');
        assert(r.flipback === 0, 'defense: no flipback in partial');

        // Full cancel: 5 incoming, 20 outgoing (defense=10) → fully canceled, 5 flipback, 10 newOutgoing
        r = applyDefense(5, 20);
        assert(r.remainingIncoming === 0, 'defense: full cancel sets incoming 0');
        assert(r.flipback === 5, 'defense: excess defense flipback (5), got ' + r.flipback);
        assert(r.newOutgoing === 10, 'defense: remaining outgoing 10 (20 - 2*5), got ' + r.newOutgoing);

        // ≥50% threshold flag
        r = applyDefense(10, 10);  // defense=5, exactly 50%
        assert(r.defendedRatio >= 0.5, 'defense: 50% threshold flagged (got ' + r.defendedRatio + ')');

        r = applyDefense(10, 8);  // defense=4, 40%
        assert(r.defendedRatio < 0.5, 'defense: <50% not flagged (got ' + r.defendedRatio + ')');
    }

    // --- Diamond tests ---
    {
        // Diamond on a red regular → clears all reds
        let g = emptyGrid();
        g[2][0] = gemRegular(COLOR_R);
        g[2][1] = gemDiamond();
        g[3][0] = gemRegular(COLOR_R);
        g[4][0] = gemRegular(COLOR_B);
        g[1][3] = gemCrash(COLOR_R);
        g[5][2] = gemCounter(COLOR_R, 4);
        let r = resolveDiamond(g, 2, 1);
        assert(r.color === COLOR_R, 'diamond: color resolved to red');
        assert(r.cleared.length === 4, 'diamond: 4 red cells cleared (got '+r.cleared.length+')');
        assert(!r.tech, 'diamond: not tech bonus');
        assert(g[2][1] === null, 'diamond: diamond itself removed');

        // Diamond on floor → tech bonus
        g = emptyGrid();
        g[2][0] = gemDiamond();
        r = resolveDiamond(g, 2, 0);
        assert(r.tech === true, 'diamond: floor landing = tech bonus');
        assert(r.cleared.length === 0, 'diamond: tech bonus clears nothing');
        assert(g[2][0] === null, 'diamond: tech bonus still removes diamond');
    }

    // --- resolveBoard integration tests ---
    {
        // 2x2 red power gem + red crash adjacent → wave 1, expected damage 9
        // Add a blue spectator at (5,0) to prevent all-clear bonus
        let g = emptyGrid();
        g[0][0] = gemRegular(COLOR_R); g[1][0] = gemRegular(COLOR_R);
        g[0][1] = gemRegular(COLOR_R); g[1][1] = gemRegular(COLOR_R);
        g[2][0] = gemCrash(COLOR_R);
        g[5][0] = gemRegular(COLOR_B);  // spectator, prevents all-clear
        let res = resolveBoard(g, { characterMultiplier: 1.0 });
        assert(res.totalDamage === 9, 'resolve: 2x2 PG + crash = 9 (got ' + res.totalDamage + ')');
        assert(res.waves === 1, 'resolve: single wave');
        assert(res.allClear === false, 'resolve: spectator prevents all-clear');

        // Same setup WITHOUT spectator should trigger all-clear bonus
        g = emptyGrid();
        g[0][0] = gemRegular(COLOR_R); g[1][0] = gemRegular(COLOR_R);
        g[0][1] = gemRegular(COLOR_R); g[1][1] = gemRegular(COLOR_R);
        g[2][0] = gemCrash(COLOR_R);
        res = resolveBoard(g, { characterMultiplier: 1.0 });
        assert(res.allClear === true, 'resolve: empty after clear = all clear');
        assert(res.totalDamage === 15, 'resolve: 2x2 PG + crash + all-clear bonus = 9+6 = 15');

        // Pattern check
        assert(PATTERN_KEN[0].every(c => c === COLOR_R), 'patterns: Ken row 0 all R');
        assert(PATTERN_CHUNLI[0][0] === COLOR_R && PATTERN_CHUNLI[0][2] === COLOR_G, 'patterns: Chun-Li row 0 RRGGBB');
        assert(PATTERN_SAKURA[0][0] === COLOR_G && PATTERN_SAKURA[0][5] === COLOR_Y, 'patterns: Sakura row 0 GRRRRY');
        assert(PATTERN_RYU[2][0] === COLOR_B, 'patterns: Ryu row 2 starts with B (BYRGBY)');
    }

    // --- Diamond integration test ---
    {
        // Simulate a diamond piece landing on a red regular gem.
        // After resolveDiamond + resolveBoard, all reds should be gone.
        let g = emptyGrid();
        g[2][0] = gemRegular(COLOR_R);
        g[3][0] = gemRegular(COLOR_R);
        g[4][0] = gemRegular(COLOR_B);
        g[2][1] = gemDiamond();
        // Mimic boardTick's diamond resolution wiring:
        const dr = resolveDiamond(g, 2, 1);
        assert(dr.color === COLOR_R, 'integration: diamond color resolved');
        clearCells(g, dr.cleared);
        applyGravity(g);
        assert(g[2][0] === null || g[2][0].color === COLOR_B, 'integration: reds gone, blue may have fallen to (2,0)');
        let foundRed = false;
        for (let x = 0; x < BOARD_W; x++)
        for (let y = 0; y < BOARD_H; y++)
            if (g[x][y] && g[x][y].color === COLOR_R) foundRed = true;
        assert(!foundRed, 'integration: no red gems remain after diamond');
    }

    if (fails.length === 0) console.log('All unit tests passed.');
    else console.error('UNIT TEST FAILURES:', fails.length);
}

///////////////////////////////////////////////////////////////////////////////
// Match state + menus

let matchState = 'title';        // 'title' | 'playing' | 'roundover'
let chosenMode = 'cpu';          // 'cpu' | 'pvp'
let chosenDifficulty = 'normal';
let chosenP1Char = CHARACTERS[0];
let chosenP2Char = CHARACTERS[1];

function quitToTitle()
{
    matchState = 'title';
    currentMatch = null;
    p1Board = null; p2Board = null;
    clearSubmenuStack();
    hideAllMenus();
    showMenu('title');
}

function buildCharacterItems(onPick)
{
    return CHARACTERS.map(char => ({
        type: 'button',
        label: char.name,
        id: 'char-' + char.id,
        title: 'Damage: ' + Math.floor(char.multiplier * 100) + '%',
        onClick: () => onPick(char),
    }));
}

function setupMenus()
{
    createTitleMenu({
        title: 'PUZZLE FIGHTER',
        subtitle: 'Two-player gem combat',
        playLabel: 'PLAY',
        onPlay: () => {
            hideMenu('title');
            showMenu('mode');
        },
        items: [
            { type:'button', label:'ABOUT', onClick: () => pushMenu('about') },
        ],
        canReveal: () => matchState === 'title',
    });

    createMenu({
        id: 'mode',
        title: 'CHOOSE MODE',
        dismissable: true,
        onHide: (reason) => { if (reason === 'dismiss') showMenu('title'); },
        items: [
            { type:'button', label:'VS CPU',    onClick: () => { chosenMode = 'cpu'; pushMenu('difficulty'); } },
            { type:'button', label:'VS PLAYER', onClick: () => { chosenMode = 'pvp'; pushMenu('p1select'); } },
        ],
    });

    createMenu({
        id: 'difficulty',
        title: 'DIFFICULTY',
        dismissable: true,
        onHide: popMenu,
        items: [
            { type:'button', label:'EASY',   onClick: () => { chosenDifficulty = 'easy';   pushMenu('p1select'); } },
            { type:'button', label:'NORMAL', onClick: () => { chosenDifficulty = 'normal'; pushMenu('p1select'); } },
            { type:'button', label:'HARD',   onClick: () => { chosenDifficulty = 'hard';   pushMenu('p1select'); } },
        ],
    });

    createMenu({
        id: 'p1select',
        title: 'PLAYER 1',
        subtitle: 'Pick your fighter',
        dismissable: true,
        onHide: popMenu,
        items: buildCharacterItems(char => {
            chosenP1Char = char;
            if (chosenMode === 'pvp') pushMenu('p2select');
            else
            {
                chosenP2Char = CHARACTERS[randInt(CHARACTERS.length)];
                startMatchFromSelection();
            }
        }),
    });

    createMenu({
        id: 'p2select',
        title: 'PLAYER 2',
        subtitle: 'Pick your fighter',
        dismissable: true,
        onHide: popMenu,
        items: buildCharacterItems(char => {
            chosenP2Char = char;
            startMatchFromSelection();
        }),
    });

    createMenu({
        id: 'about',
        title: 'ABOUT',
        dismissable: true,
        onHide: popMenu,
        items: [
            { type:'text', text:"Faithful clone of Super Puzzle Fighter II Turbo. X' rebalanced drop patterns. Single self-contained LittleJS prototype." },
        ],
    });

    createMenu({
        id: 'pause',
        title: 'PAUSED',
        dismissable: true,
        items: [
            { type:'button', label:'RESUME',          onClick: () => hideMenu('pause') },
            { type:'button', label:'RESTART',         onClick: () => { hideMenu('pause'); startMatchFromSelection(); } },
            { type:'button', label:'QUIT TO TITLE',   onClick: () => { showConfirmDialog({
                message:'Quit to title?',
                onYes: () => quitToTitle(),
            }); } },
        ],
    });

    createMenu({
        id: 'roundover',
        title: 'ROUND OVER',
        dismissable: false,
        items: [
            { type:'label', id:'roundresult', text:'' },
            { type:'button', label:'REMATCH',          onClick: () => { hideMenu('roundover'); startMatchFromSelection(); } },
            { type:'button', label:'CHARACTER SELECT', onClick: () => { hideMenu('roundover'); matchState = 'title'; showMenu('p1select'); } },
            { type:'button', label:'QUIT TO TITLE',    onClick: () => quitToTitle() },
        ],
    });

    setMenuVisibilityCallback(v => paused = v);
}

function startMatchFromSelection()
{
    const seed = (Date.now() & 0x7FFFFFFF) || 1;
    const aiDiff = chosenMode === 'cpu' ? chosenDifficulty : null;
    startMatch(chosenP1Char, chosenP2Char, seed, aiDiff);
    matchState = 'playing';
    clearSubmenuStack();
    hideAllMenus();
}

function checkRoundOver()
{
    if (matchState !== 'playing') return;
    if (!currentMatch || currentMatch.winner < 0) return;
    matchState = 'roundover';
    const menu = getMenu('roundover');
    if (menu)
    {
        const item = menu.getItem('roundresult');
        const w = currentMatch.winner;
        let txt;
        if (chosenMode === 'pvp') txt = w === 0 ? 'PLAYER 1 WINS' : 'PLAYER 2 WINS';
        else txt = w === 0 ? 'YOU WIN' : 'CPU WINS';
        if (item) item.setLabel(txt);
    }
    showMenu('roundover');
}

///////////////////////////////////////////////////////////////////////////////
async function gameInit()
{
    setCanvasFixedSize(vec2(1050, 720));
    cameraPos = vec2(0, 0);
    cameraScale = 50;

    setupMenus();

    sMove    = new SoundGenerator({frequency:520,release:.05,volume:.4,shapeCurve:1.5});
    sRotate  = new SoundGenerator({frequency:720,release:.06,volume:.5,slide:-.2});
    sSoft    = new SoundGenerator({frequency:260,release:.04,volume:.3});
    sLock    = new SoundGenerator({frequency:180,release:.09,volume:.6,noise:.05});
    sClear   = new SoundGenerator({frequency:820,release:.12,volume:.7,slide:.4,delay:.02});
    sCrash   = new SoundGenerator({frequency:140,release:.2,volume:.8,noise:.2,bitCrush:.2,delay:.05});
    sCountTick = new SoundGenerator({frequency:380,release:.05,volume:.3,slide:-.1});
    sAllClear  = new SoundGenerator({frequency:880,release:.4,volume:.9,slide:1});
    sCounterLand = new SoundGenerator({frequency:120,release:.12,volume:.6,noise:.1});
    sGameOver  = new SoundGenerator({frequency:120,release:.6,volume:.9,slide:-.5,noise:.1});

    const menuSelectSound = new Sound([1,.1,400,,.05,.1,1]);
    const menuActivateSound = new Sound([1,.1,600,,.05,.1,2]);
    setMenuSounds({
        select: () => menuSelectSound.play(),
        activate: () => menuActivateSound.play(),
    });

    matchState = 'title';
    showMenu('title');

    runUnitTests();
}

function startMatch(p1Char, p2Char, seed, aiDifficulty)
{
    currentMatch = new GameMatch(p1Char, p2Char, seed);
    const oppForAI = currentMatch.boards[0];
    controllers = [
        new HumanController(KEYMAP_P1),
        aiDifficulty ? new AIController(aiDifficulty, oppForAI) : new HumanController(KEYMAP_P2),
    ];
    currentMatch.spawn(0);
    currentMatch.spawn(1);
    p1Board = currentMatch.boards[0];
    p2Board = currentMatch.boards[1];
}

function gameUpdate()
{
    if (matchState === 'playing' && currentMatch)
    {
        if (keyWasPressed('KeyR'))
        {
            startMatchFromSelection();
            return;
        }
        if (bindPauseKey({ when: () => matchState === 'playing' })) return;
        currentMatch.update(controllers);
        checkRoundOver();
    }
}
function gameUpdatePost() { cameraPos = vec2(0, 0); }
function gameRender()
{
    drawRectGradient(cameraPos, getCameraSize(), BLACK, rgb(.2,.2,.2));
    drawBoardFrame(0);
    drawBoardFrame(1);
    if (p1Board) drawBoardGems(p1Board, 0);
    if (p2Board) drawBoardGems(p2Board, 1);
}
function gameRenderPost()
{
    if (matchState === 'playing' && currentMatch)
    {
        const ctx = mainContext;
        const cx = mainCanvasSize.x / 2;

        // Mirrored arcade layout: P1 on left-of-center, P2 on right-of-center.
        // Rows top-to-bottom: NEXT preview, character portrait + name, score/chain/incoming.
        const colOffset = 70;
        const Y_NEXT_LABEL    = 160;
        const Y_NEXT_GEM_TOP  = 185;
        const Y_NEXT_GEM_BOT  = 210;
        const Y_PORTRAIT      = 290;
        const Y_NAME          = 335;
        const Y_SCORE         = 375;
        const Y_CHAIN         = 400;
        const Y_INC_LABEL     = 450;
        const Y_INC_COUNT     = 475;

        for (let i = 0; i < 2; i++)
        {
            const b = currentMatch.boards[i];
            const px = i === 0 ? cx - colOffset : cx + colOffset;

            // NEXT preview (top of column)
            drawTextScreen('NEXT', vec2(px, Y_NEXT_LABEL), 14, hsl(0,0,.7), 2);
            const nextIdx = currentMatch.seqIndex[i];
            const nextPiece = currentMatch.sequence[nextIdx];
            if (nextPiece)
            {
                const ws = 22;
                drawSimpleGem(ctx, nextPiece.b, px, Y_NEXT_GEM_TOP, ws);
                drawSimpleGem(ctx, nextPiece.a, px, Y_NEXT_GEM_BOT, ws);
            }

            // Fighter name (middle)
            drawTextScreen(b.character.name, vec2(px, Y_NAME), 32, b.character.color, 6, hsl(0,0,0));

            // Score + chain (bottom)
            drawTextScreen('SCORE ' + b.score, vec2(px, Y_SCORE), 16, hsl(.16,1,.8), 3, hsl(0,0,0));
            drawTextScreen('CHAIN ' + b.chain, vec2(px, Y_CHAIN), 14, hsl(.55,1,.8), 3, hsl(0,0,0));

            // Incoming warning (only when there's pressure)
            const inc = b.incomingQueue;
            if (inc > 0)
            {
                let label = 'CAUTION';
                let col = rgb(1, 1, .3);
                if (inc > 30) { label = 'DANGER';  col = rgb(1, .3, .3); }
                else if (inc > 10) { label = 'WARNING'; col = rgb(1, .6, .2); }
                drawTextScreen(label, vec2(px, Y_INC_LABEL), 18, col, 4, hsl(0,0,0));
                drawTextScreen('INCOMING ' + inc, vec2(px, Y_INC_COUNT), 14, hsl(0,0,1), 3, hsl(0,0,0));
            }
        }
    }
}

engineInit(gameInit, gameUpdate, gameUpdatePost, gameRender, gameRenderPost);

</script>
