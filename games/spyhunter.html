// Spy Hunter prototype: top-down endless road. Mouse steers, mouse aims guns.
// Enemy kinds based on the arcade game:
//   - Switchblade (red, side blades): can be shot
//   - Bulletproof Bully (light blue, chunky): bullets bounce, must ram off road
//   - Enforcer (yellow, roof gun): can be shot, fires back at player
//   - Civilian Limo (blue) / Civilian Wagon (brown): hitting/shooting them is bad

// road anchors — sorted by y, ascending. roadCenterX(y) is smoothstep between bracketing anchors.
let roadAnchors = [];

function resetRoad()
{
    // seed a long straight behind/around the start so initial spawns are predictable
    roadAnchors = [];
    for (let y = -200; y <= 200; y += ROAD_ANCHOR_SPACING)
        roadAnchors.push({y, x: 0});
}

function ensureRoadAhead(targetY)
{
    while (roadAnchors[roadAnchors.length-1].y < targetY)
    {
        const last = roadAnchors[roadAnchors.length-1];
        let newX;
        if (randBool(ROAD_STRAIGHT_CHANCE))
            newX = last.x; // straight segment
        else
        {
            const drift = rand(-1, 1) * ROAD_DRIFT_AMOUNT;
            newX = clamp(last.x * ROAD_RECENTER_PULL + drift, -ROAD_MAX_OFFSET, ROAD_MAX_OFFSET);
        }
        roadAnchors.push({y: last.y + ROAD_ANCHOR_SPACING, x: newX});
    }
    // garbage-collect anchors well behind the camera
    while (roadAnchors.length > 4 && roadAnchors[1].y < cameraPos.y - 60)
        roadAnchors.shift();
}

function roadCenterX(y)
{
    if (roadAnchors.length < 2) return 0;
    // forward-moving game; linear scan is fine for small anchor counts
    for (let i = 0; i < roadAnchors.length - 1; i++)
    {
        const a = roadAnchors[i];
        const b = roadAnchors[i+1];
        if (y >= a.y && y <= b.y)
        {
            const t = (y - a.y) / (b.y - a.y);
            const s = t * t * (3 - 2*t); // smoothstep — no kinks at anchors
            return lerp(a.x, b.x, s);
        }
    }
    if (y < roadAnchors[0].y) return roadAnchors[0].x;
    return roadAnchors[roadAnchors.length-1].x;
}

function laneX(i)
{
    return (i - (LANES-1)/2) * LANE_SPACING;
}

function clampToRoad(x, halfSizeX, y)
{
    const cx = roadCenterX(y);
    return clamp(x, cx - ROAD_HALF + halfSizeX, cx + ROAD_HALF - halfSizeX);
}

function overlapAABB(a, b)
{
    return isOverlapping(a.pos, a.size, b.pos, b.size);
}

{

    const smokeA = rgb(.20,.20,.22,.55);
    const smokeB = rgb(.12,.12,.14,.45);
    const smokeEnd = rgb(.08,.08,.09,0);

    const rateScale = big ? 1.25 : 1;
    const sizeScale = big ? 1.15 : 1;

        pos, 0, vec2(0), .045, 90*rateScale, PI, undefined,
        sparkA, sparkB, sparkEnd, sparkEnd,

    );

        pos, 0, vec2(.2), .08, 38*rateScale, PI, undefined,

        .65, .55*sizeScale, .95*sizeScale, 4.2, 4,
        .95, .98, 0, PI, .04, .45, false, false
    );
}

///////////////////////////////////////////////////////////////////////////////
// Rendering helpers — flat arcade look with stacked rects to taper noses.
//
// rp = "rotated part": positions the part by rotating its local offset around
// the car's center, then draws the rect itself rotated by the same angle.
// LittleJS positive angle = clockwise (matches Vector2.rotate).

function rp(pos, angle, ox, oy, sx, sy, color)
{
    drawRect(pos.add(vec2(ox, oy).rotate(angle)), vec2(sx, sy), color, angle);
}

// Body-centered rect — covers the whole car size.
function rpBody(pos, angle, size, color)
{
    drawRect(pos, size, color, angle);
}

function drawWheels(pos, size, angle, color=rgb(.05,.05,.07))
{
    const wheelW = max(.22, size.x * .22);
    const wheelH = max(.34, size.y * .18);
    const xOff   = size.x/2 + wheelW/2 - .06;
    const yF     = size.y * .27;
    const yB     = -size.y * .27;
    rp(pos, angle, -xOff,  yF, wheelW, wheelH, color);
    rp(pos, angle, -xOff,  yB, wheelW, wheelH, color);
    rp(pos, angle,  xOff,  yF, wheelW, wheelH, color);
    rp(pos, angle,  xOff,  yB, wheelW, wheelH, color);
}

function drawTailLights(pos, size, angle)
{
    rp(pos, angle, -size.x*.27, -size.y/2 + .12, .28, .18, rgb(1,.20,.20));
    rp(pos, angle,  size.x*.27, -size.y/2 + .12, .28, .18, rgb(1,.20,.20));
}

function renderPlayer(pos, size, angle=0)
{
    drawWheels(pos, size, angle);
    rp(pos, angle, 0, -size.y/2 + .08, size.x*1.02, .22, rgb(.05,.05,.07)); // rear spoiler
    rpBody(pos, angle, size, rgb(.10,.55,1));                                // body
    rp(pos, angle, 0, .10,             size.x*.78, size.y*.58, rgb(.06,.42,.85)); // cabin
    rp(pos, angle, 0, size.y*.35,      size.x*.86, size.y*.28, rgb(.10,.55,1));   // hood
    rp(pos, angle, 0, size.y/2 - .18,  size.x*.62, .36,        rgb(.10,.55,1));   // front taper
    rp(pos, angle, 0, .55,             size.x*.62, size.y*.20, rgb(.80,.92,1));   // windshield
    rp(pos, angle, 0, .05,             .16,        size.y*.78, rgb(1,1,1,.30));   // center stripe
    rp(pos, angle, 0, size.y/2 - .07,  size.x*.92, .18,        rgb(.04,.04,.06)); // front bumper
    rp(pos, angle, -.55, size.y*.30,   .18, .55, rgb(.10,.10,.12));               // left gun
    rp(pos, angle,  .55, size.y*.30,   .18, .55, rgb(.10,.10,.12));               // right gun
    drawTailLights(pos, size, angle);
}

function renderSwitchblade(pos, size, angle=0)
{

    rp(pos, angle, -size.x/2 - .56, 0, .16, .34, rgb(.90,.90,.95));     // left blade tip
    rp(pos, angle,  size.x/2 + .56, 0, .16, .34, rgb(.90,.90,.95));     // right blade tip
    rpBody(pos, angle, size, rgb(.95,.18,.18));
    rp(pos, angle, 0, size.y*.36,      size.x*.82, size.y*.26, rgb(.95,.18,.18));
    rp(pos, angle, 0, size.y/2 - .18,  size.x*.55, .34,        rgb(.85,.10,.10));
    rp(pos, angle, 0, .05,             size.x*.72, size.y*.52, rgb(.72,.08,.08));
    rp(pos, angle, 0, .45,             size.x*.58, size.y*.18, rgb(.10,.10,.14));
    rp(pos, angle, 0, 0,               .10,        size.y*.62, rgb(.10,.02,.02));
    rp(pos, angle, 0, size.y/2 - .06,  size.x*.7,  .18,        rgb(.10,.05,.05));
    drawTailLights(pos, size, angle);
}

function renderBully(pos, size, angle=0)

function renderCivWagon(pos, size, angle=0)

function renderCarByKind(kind, pos, size, angle=0)
{
    if (kind == KIND_SWITCHBLADE) renderSwitchblade(pos, size, angle);
    else if (kind == KIND_BULLY)  renderBully(pos, size, angle);
    else if (kind == KIND_ENFORCER) renderEnforcer(pos, size, angle);
    else if (kind == KIND_CIV_BLUE) renderCivBlue(pos, size, angle);
    else renderCivWagon(pos, size, angle);
}

// Tangent angle of the road at y — positive = clockwise (matches LittleJS).
// Sampled with a small central difference for stability.
function roadAngleAtY(y)
{
    const eps = .8;
    const dx = roadCenterX(y + eps) - roadCenterX(y - eps);
    const dy = 2 * eps;
    return Math.atan2(dx, dy);
}

///////////////////////////////////////////////////////////////////////////////
class Bullet extends EngineObject
{
    constructor(pos, vel)
    {
        super(pos, vec2(.20, .65));
        this.vel = vel;
        // bullet's natural orientation is along +y, so angle from +y to velocity dir (CW positive)
        this.angle = Math.atan2(vel.x, vel.y);
        this.life = new Timer(1.6);
        this.renderOrder = 6;
    }
    update()
    {
        this.pos = this.pos.add(this.vel.scale(timeDelta));
        if (this.life.elapsed() || abs(this.pos.x) > ROAD_HALF + 6 || this.pos.y > cameraPos.y + 50 || this.pos.y < cameraPos.y - 50)
            this.destroy();
    }
    render()
    {
        drawRect(this.pos, this.size, rgb(1,1,.2), this.angle);
    }
}

class EnemyBullet extends EngineObject
{
    constructor(pos, vel)
    {
        super(pos, vec2(.24, .55));
        this.vel = vel;
        this.angle = Math.atan2(vel.x, vel.y);
        this.life = new Timer(2.4);
        this.renderOrder = 6;
    }
    update()
    {
        this.pos = this.pos.add(this.vel.scale(timeDelta));
        const offScreen = abs(this.pos.x) > ROAD_HALF + 6 ||
                          this.pos.y > cameraPos.y + 50 ||
                          this.pos.y < cameraPos.y - 50;
        if (this.life.elapsed() || offScreen)
            this.destroy();
    }
    render()
    {
        drawRect(this.pos, this.size, rgb(1,.45,.10), this.angle);
    }
}

// Black puddle dropped behind the player. Lethal to any car that touches it.
class OilSlick extends EngineObject
{
    constructor(pos)
    {
        super(pos, OIL_SIZE);
        this.life = new Timer(OIL_LIFETIME);
        this.renderOrder = 2;        // under cars
    }
    update()
    {
        if (this.life.elapsed() || this.pos.y < cameraPos.y - 45)
            this.destroy();
    }
    render()
    {
        const pct = this.life.getPercent();
        const fadeIn = pct < .08 ? pct/.08 : 1;
        const fadeOut = pct > .85 ? (1-pct)/.15 : 1;
        const a = min(fadeIn, fadeOut);
        drawRect(this.pos, this.size, rgb(.04,.04,.05, .92*a));
        // a couple oil sheen highlights so it's not just a flat black blob
        drawRect(this.pos.add(vec2(-.4, .2)), vec2(this.size.x*.36, this.size.y*.30), rgb(.16,.16,.20, .55*a));
        drawRect(this.pos.add(vec2( .5,-.15)), vec2(this.size.x*.28, this.size.y*.22), rgb(.12,.12,.16, .45*a));
    }
}

// Smoke cloud dropped behind the player. Confuses cars that drive through it.
class SmokeScreen extends EngineObject
{
    constructor(pos)
    {
        super(pos, SMOKE_SIZE);
        this.life = new Timer(SMOKE_LIFETIME);
        this.renderOrder = 5;        // above cars
        this.seed = rand(0, 100);
    }
    update()
    {
        if (this.life.elapsed() || this.pos.y < cameraPos.y - 45)
            this.destroy();
    }
    render()
    {
        const pct = this.life.getPercent();
        const fadeIn = pct < .12 ? pct/.12 : 1;
        const fadeOut = pct > .75 ? (1-pct)/.25 : 1;
        const a = min(fadeIn, fadeOut);
        // animated billowing puffs using a few overlapping rects
        for (let i = 0; i < 6; i++)
        {
            const ph = (i + this.seed) * 1.7;
            const ox = Math.sin(time*1.3 + ph) * .45;
            const oy = Math.cos(time*1.1 + ph*1.4) * .35;
            const sx = this.size.x * (.55 + .1*Math.sin(time + ph));
            const sy = this.size.y * (.55 + .1*Math.cos(time*.8 + ph));
            drawRect(this.pos.add(vec2(ox, oy)), vec2(sx, sy), rgb(.55,.55,.58, .28*a));
        }
    }
}

// Roadside prop kinds
const PROP_SIGN        = 0;
const PROP_TREE_ROUND  = 1;
const PROP_POST        = 2;
const PROP_BILLBOARD   = 3;
const PROP_BUSH        = 4;
const PROP_PINE        = 5;
const PROP_ROCKS       = 6;
const PROP_STREETLIGHT = 7;
const PROP_KIND_COUNT  = 8;

const PROP_SIZES = {
    [PROP_SIGN]:        vec2(1.20, 2.20),
    [PROP_TREE_ROUND]:  vec2(1.30, 2.80),
    [PROP_POST]:        vec2(0.80, 1.60),
    [PROP_BILLBOARD]:   vec2(1.70, 2.00),
    [PROP_BUSH]:        vec2(1.20, 0.85),
    [PROP_PINE]:        vec2(1.55, 3.00),
    [PROP_ROCKS]:       vec2(1.40, 1.05),
    [PROP_STREETLIGHT]: vec2(1.00, 3.00),
};

class RoadsideProp extends EngineObject
{
    constructor(pos, kind)
    {
        const size = PROP_SIZES[kind] || vec2(1, 1);
        super(pos, size);
        this.kind = kind;
        this.renderOrder = 1;
        this.flip = randBool();
        this.variant = rand();   // small per-instance color/shape variation
    }
    update()
    {
        if (this.pos.y < cameraPos.y - 40)
            this.destroy();
    }
    render()
    {
        const x = this.pos.x;
        const y = this.pos.y;
        // ground shadow
        drawRect(vec2(x, y - this.size.y/2 + .15), vec2(this.size.x*1.1, .25), rgb(0,0,0,.25));

        switch (this.kind)
        {
            case PROP_SIGN:
                drawRect(vec2(x, y - .7),  vec2(.18, 1.2),  rgb(.35,.30,.22));
                drawRect(vec2(x, y + .25), vec2(1.2, .7),   rgb(.85,.85,.9));
                drawRect(vec2(x, y + .25), vec2(1.05, .55), rgb(.15,.25,.85,.95));
                break;

            case PROP_TREE_ROUND:
                drawRect(vec2(x, y - .55), vec2(.30, 1.00), rgb(.32,.22,.15));
                drawRect(vec2(x, y + .55), vec2(1.25, 1.15), rgb(.08,.35,.12));
                drawRect(vec2(x + (this.flip?-.35:.35), y + .85), vec2(.85, .75), rgb(.06,.28,.10));
                break;

            case PROP_POST:
                drawRect(vec2(x, y - .2),  vec2(.22, 1.3),  rgb(.75,.75,.75));
                drawRect(vec2(x, y + .55), vec2(.28, .18),  rgb(1,.25,.25));
                break;

            case PROP_BILLBOARD:
                drawRect(vec2(x, y - .6),  vec2(.22, 1.1),  rgb(.30,.22,.15));
                drawRect(vec2(x, y + .35), vec2(1.7, .9),   rgb(.12,.12,.14));
                drawRect(vec2(x, y + .35), vec2(1.45, .65), rgb(.95,.75,.1,.9));
                break;

            case PROP_BUSH:
                // low rounded clumps using stacked rects; greens vary by variant
                {
                    const tint = lerp(0.05, .15, this.variant);
                    const a = rgb(.08+tint, .38+tint*.5, .14+tint);
                    const b = rgb(.12+tint, .44+tint*.5, .18+tint);
                    drawRect(vec2(x,          y - .12), vec2(1.10, .50), a);
                    drawRect(vec2(x - .25,    y + .05), vec2(0.65, .42), b);
                    drawRect(vec2(x + .22,    y + .00), vec2(0.55, .38), b);
                    drawRect(vec2(x + (this.flip?.05:-.10), y + .18), vec2(.45, .28), a);
                }
                break;

            case PROP_PINE:
                // triangular cone via three stacked tapering rects
                drawRect(vec2(x, y - 1.05), vec2(.32, .90), rgb(.30,.20,.12));
                drawRect(vec2(x, y - .25), vec2(1.45, .55), rgb(.05,.30,.12));
                drawRect(vec2(x, y + .25), vec2(1.05, .55), rgb(.07,.34,.14));
                drawRect(vec2(x, y + .75), vec2(0.65, .55), rgb(.09,.38,.16));
                drawRect(vec2(x, y + 1.18), vec2(.28, .35), rgb(.10,.40,.18));
                break;

            case PROP_ROCKS:
                {
                    const g = lerp(.42, .58, this.variant);
                    drawRect(vec2(x,         y - .12), vec2(1.20, .70), rgb(g, g-.02, g-.04));
                    drawRect(vec2(x - .30,   y + .15), vec2(.65,  .55), rgb(g+.08, g+.04, g+.02));
                    drawRect(vec2(x + .30,   y + .20), vec2(.55,  .50), rgb(g-.05, g-.07, g-.08));
                    drawRect(vec2(x + (this.flip?-.05:.10), y + .35), vec2(.35, .35), rgb(g+.12, g+.08, g+.06));
                }
                break;

            case PROP_STREETLIGHT:
                {
                    // pole stretched the full prop height so the lamp head sits high
                    drawRect(vec2(x, y - .20), vec2(.18, 2.40), rgb(.55,.55,.58));
                    // arm hangs over the road (use flip to bend toward the road; sign of x tells which side)
                    const lampSide = x < 0 ? 1 : -1;
                    drawRect(vec2(x + lampSide*.30, y + 1.10), vec2(.80, .12), rgb(.55,.55,.58));
                    // lamp head + warm glow
                    drawRect(vec2(x + lampSide*.55, y + 1.00), vec2(.42, .26), rgb(.20,.20,.22));
                    drawRect(vec2(x + lampSide*.55, y +  .80), vec2(.55, .22), rgb(1, .92, .55, .55));
                }
                break;
        }
    }
}

class Car extends EngineObject
{
    constructor(pos, kind)
    {
        const info = KIND_INFO[kind];
        super(pos, info.size);

        this.kind = kind;
        this.hostile = info.hostile;
        this.bulletproof = info.bulletproof;
        this.pursuitBoost = info.pursuitBoost || 0;
        this.hp = info.hp;
        this.baseSpeed = max(3.0, info.baseSpeed + rand(-info.speedVar, info.speedVar));
        this.speed = this.baseSpeed;

        this.turnTimer = new Timer(rand(.4, 1.6));
        this.targetLane = randInt(LANES);
        this.aggression = this.hostile ? rand(.45, .85) : rand(.05, .25);
        this.fireTimer = info.shoots ? new Timer(rand(.6, 1.5)) : null;
        this.renderOrder = 3;

        // small horizontal velocity used when being rammed (bully)
        this.rammedVX = 0;

        // flashes white briefly when hit but not destroyed
        this.hitFlash = new Timer();

        // pursuit state — hostile cars cycle between cruising and chasing the player
        this.pursuing = false;
        this.pursuitTimer = new Timer();
        this.pursuitCooldown = new Timer();

        // confusion state — set when in a smoke screen, causes chaotic swerving
        this.confusedTimer = new Timer();
        this.confusionStepTimer = new Timer();
        this.confusedTargetX = pos.x;

        // visual heading — lerped toward the road's tangent angle so cars look like they're following the road
        this.angle = roadAngleAtY(pos.y);
    }

    update()
    {
        const confused = this.confusedTimer.active();

        // pursuit logic — hostile cars chase the player in bursts; confused cars can't pursue
        if (this.hostile && player && !gameOver && !confused)
        {
            const dy = this.pos.y - player.pos.y;
            if (this.pursuing)
            {
                if (this.pursuitTimer.elapsed() || dy > 12 || dy < -30)
                {
                    this.pursuing = false;
                    this.pursuitCooldown.set(rand(2.0, 4.0));
                }
            }
            else if (!this.pursuitCooldown.active() && Math.abs(dy) < 14)
            {
                this.pursuing = true;
                this.pursuitTimer.set(rand(4.0, 7.0));
            }
        }
        if (confused && this.pursuing)
        {
            this.pursuing = false;
            this.pursuitCooldown.set(rand(2.0, 4.0));
        }

        // target speed
        let targetSpeed;
        if (this.pursuing && player)
            targetSpeed = player.speed + this.pursuitBoost;
        else
            targetSpeed = this.baseSpeed;
        this.speed = lerp(this.speed, targetSpeed, .04);

        // forward motion
        this.pos.y += this.speed * timeDelta;

        // lane-target selection
        if (this.turnTimer.elapsed())
        {
            this.turnTimer.set(rand(this.hostile?.45:.85, this.hostile?1.1:1.8));
            if (player && randBool(this.aggression))
            {
                const playerRoadX = player.pos.x - roadCenterX(player.pos.y);
                const playerLane = clamp(Math.round((playerRoadX / LANE_SPACING) + (LANES-1)/2), 0, LANES-1);
                const drift = this.hostile ? (randInt(3)-1) : (randBool(.7)?0:(randInt(3)-1));
                this.targetLane = clamp(playerLane + drift, 0, LANES-1);
            }
            else
                this.targetLane = randInt(LANES);
        }

        const beingRammed = this.kind == KIND_BULLY && abs(this.rammedVX) > .5;
        if (confused)
        {
            // chaotic swerving while in the smoke
            if (!this.confusionStepTimer.active())
            {
                this.confusionStepTimer.set(rand(.10, .22));
                const cx = roadCenterX(this.pos.y);
                this.confusedTargetX = cx + rand(-ROAD_HALF + 1, ROAD_HALF - 1);
            }
            this.pos.x = lerp(this.pos.x, this.confusedTargetX, .22);
        }
        else if (!beingRammed)
        {
            // lane target follows the curving road
            const targetX = roadCenterX(this.pos.y) + laneX(this.targetLane);
            const steer = this.kind == KIND_BULLY ? .05 :
                          this.hostile ? .12 : .035;  // civilians cruise their lanes gently
            this.pos.x = lerp(this.pos.x, targetX, steer);
        }

        // ramming displacement (from player pushing the bully)
        if (this.rammedVX)
        {
            this.pos.x += this.rammedVX * timeDelta;
            this.rammedVX = lerp(this.rammedVX, 0, .035);
        }

        // bully + bulletproof cars can be pushed off the road; everyone else clamps
        if (this.kind == KIND_BULLY)
        {
            const roadCx = roadCenterX(this.pos.y);
            if (abs(this.pos.x - roadCx) > ROAD_HALF + this.size.x*.5 + .4)
            {
                sndBoom.play(this.pos, 1, rand(.95,1.05));
                explodeCar(this.pos, true);
                awardKill(SCORE_BULLY_RAM);
                this.destroy();
                return;
            }
        }
        else
        {
            this.pos.x = clampToRoad(this.pos.x, this.size.x/2, this.pos.y);
        }

        // attenuate heading toward the road's local tangent angle
        const targetAngle = roadAngleAtY(this.pos.y);
        this.angle = lerp(this.angle, targetAngle, .15);

        // enforcer fires periodically toward player; confused enforcers miss wildly
        if (this.fireTimer && this.fireTimer.elapsed() && player && !gameOver)
        {
            this.fireTimer.set(rand(1.2, 2.2));
            const muzzle = this.pos.add(vec2(0, this.size.y/2 + .25));
            const aim = player.pos.subtract(muzzle);
            let dir = aim.length() > .1 ? aim.scale(1/aim.length()) : vec2(0, -1);
            if (confused)
                dir = dir.rotate(rand(-1, 1) * .8);
            const vel = dir.scale(ENEMY_BULLET_SPEED);
            enemyBullets.push(new EnemyBullet(muzzle, vel));
            sndEnemyShoot.play(this.pos, 1, rand(.95,1.1));
        }

        if (this.pos.y < cameraPos.y - 45)
            this.destroy();
    }

    render()
    {
        renderCarByKind(this.kind, this.pos, this.size, this.angle);
        if (this.hitFlash.active())
            drawRect(this.pos, this.size.add(vec2(.10)), rgb(1,1,1,.55), this.angle);
    }
}

function spawnHitSpark(pos)
{
    new ParticleEmitter(
        pos, 0, vec2(0), .04, 22, PI, undefined,
        rgb(1,1,.85,.95), rgb(1,.65,.20,.90),
        rgb(.35,.20,.10,0), rgb(.35,.20,.10,0),
        .20, .14, .04, 9, 9,
        .92, .92, 0, PI, .08, .35, false, false
    );
}

// big sustained explosion when the player runs out of lives
function triggerGameOver()
{
    if (gameOver) return;
    gameOver = true;
    if (score > bestScore) {
        bestScore = score;
        try { localStorage.setItem('spyhunter.best', bestScore|0); } catch(e) {}
    }
    if (!player) return;

    // sustained fire/sparks for ~0.6s
    new ParticleEmitter(
        player.pos, 0, vec2(1.2), .65, 70, PI, undefined,
        rgb(1,.80,.20,.95), rgb(1,.42,.10,.90),
        rgb(.25,.10,.04,0), rgb(.25,.10,.04,0),
        .38, .40, .12, 18, 20,
        .92, .92, 0, PI, .12, .8, false, false
    );
    // sustained smoke for ~1s
    new ParticleEmitter(
        player.pos, 0, vec2(.7), 1.0, 45, PI, undefined,
        rgb(.22,.20,.22,.65), rgb(.14,.12,.14,.55),
        rgb(.06,.06,.08,0), rgb(.06,.06,.08,0),
        1.0, .85, 1.4, 5.5, 5,
        .96, .98, 0, PI, .05, .55, false, false
    );
    sndBoom.play(player.pos, 1, .55);
    sndBoom.play(player.pos, 1, .75);
}

function announce(text, color=hsl(.13,1,.6), duration=1.6)
{
    announceText = text;
    announceColor = color;
    announceTimer.set(duration);
}

function awardKill(amount)
{
    score += amount * scoreMultiplier;
    killsForMultBonus++;
    const prev = scoreMultiplier;
    if (killsForMultBonus >= MULT_KILLS_TO_3X) scoreMultiplier = 3;
    else if (killsForMultBonus >= MULT_KILLS_TO_2X) scoreMultiplier = 2;
    if (scoreMultiplier > prev)
    {
        sndMultUp.play(0, 1, 1 + (scoreMultiplier-1)*.15);
        announce('SCORE x' + scoreMultiplier, hsl(.13,1,.6));
    }

    // hostile-kill progress also feeds the special weapon stocks (independent of multiplier — civilians don't reset these)
    if (++killsForOil >= KILLS_PER_OIL && player && player.oilSlickAmmo < MAX_OIL)
    {
        killsForOil = 0;
        player.oilSlickAmmo++;
        sndPickup.play();
        announce('+OIL SLICK', hsl(.08, .8, .55));
    }
    if (++killsForSmoke >= KILLS_PER_SMOKE && player && player.smokeAmmo < MAX_SMOKE)
    {
        killsForSmoke = 0;
        player.smokeAmmo++;
        sndPickup.play(0, 1, 1.25);
        announce('+SMOKE SCREEN', hsl(.58, .55, .75));
    }
}

function dropOilSlick()
{
    if (!player || gameOver || player.oilSlickAmmo <= 0) return;
    player.oilSlickAmmo--;
    const dropY = player.pos.y - player.size.y/2 - 1.0;
    oilSlicks.push(new OilSlick(vec2(player.pos.x, dropY)));
    sndOilDrop.play(player.pos);
}

function dropSmokeScreen()
{
    if (!player || gameOver || player.smokeAmmo <= 0) return;
    player.smokeAmmo--;
    const dropY = player.pos.y - player.size.y/2 - 1.5;
    smokeScreens.push(new SmokeScreen(vec2(player.pos.x, dropY)));
    sndSmokeDrop.play(player.pos);
}

function penalizeCivilian()
{
    score = max(0, score - CIVILIAN_PENALTY);
    if (scoreMultiplier > 1)
    {
        sndMultDown.play();
        announce('CIVILIAN! MULTIPLIER LOST', hsl(0,.85,.6));
    }
    scoreMultiplier = 1;
    killsForMultBonus = 0;
}

function checkExtraLife()
{
    if (!player || player.lives >= MAX_LIVES) return;
    if (score >= extraLifeAt)
    {
        player.lives++;
        extraLifeAt += EXTRA_LIFE_INTERVAL;
        sndExtraLife.play();
        announce('EXTRA LIFE', hsl(.55,.7,.8));
    }
}

class PlayerCar extends EngineObject
{
    constructor()
    {
        super(vec2(0, -2), vec2(1.55, 3.0));
        this.speed = 0;             // start stopped; cruise pulls speed up
        this.passedMinSpeed = false; // once we cross PLAYER_MIN_SPEED for the first time, the floor applies
        this.fireCooldown = new Timer();
        this.lives = 3;
        this.invuln = new Timer();
        this.renderOrder = 4;
        this.angle = 0;
        this.smoothedVX = 0;   // exponentially smoothed horizontal velocity — drives the body lean
        this.prevX = this.pos.x;
        this.oilSlickAmmo = 0;
        this.smokeAmmo = 0;
    }

    update()
    {
        if (gameOver)
        {
            // skid to a stop; no input, no steering
            this.speed = max(0, this.speed - 18 * timeDelta);
            this.pos.y += this.speed * timeDelta;
            return;
        }

        // speed control (W/S only)
        const accel = (keyIsDown('ArrowUp') || keyIsDown('KeyW')) ? 1 : 0;
        const brake = (keyIsDown('ArrowDown') || keyIsDown('KeyS')) ? 1 : 0;
        this.speed += (accel - brake) * PLAYER_ACCEL * timeDelta;
        this.speed = lerp(this.speed, PLAYER_CRUISE, .02);
        // min-speed floor doesn't apply until the player has reached cruising speed at least once
        if (this.speed >= PLAYER_MIN_SPEED) this.passedMinSpeed = true;
        const minSpeed = this.passedMinSpeed ? PLAYER_MIN_SPEED : 0;
        this.speed = clamp(this.speed, minSpeed, PLAYER_MAX_SPEED);

        // forward
        this.pos.y += this.speed * timeDelta;

        // steering — mouse drives target; A/D nudges target as fallback
        let targetX = clampToRoad(mousePos.x, this.size.x/2, this.pos.y);
        const left  = (keyIsDown('ArrowLeft')  || keyIsDown('KeyA')) ? 1 : 0;
        const right = (keyIsDown('ArrowRight') || keyIsDown('KeyD')) ? 1 : 0;
        if (left || right)
            targetX = clampToRoad(this.pos.x + (right - left) * KEY_STEER_TARGET_OFFSET, this.size.x/2, this.pos.y);

        // tight tracking
        this.pos.x = lerp(this.pos.x, targetX, STEER_TIGHTNESS);
        this.pos.x = clampToRoad(this.pos.x, this.size.x/2, this.pos.y);

        // lean the body based on horizontal motion (not the road) — attenuates back to 0 when motion stops
        const dt = max(timeDelta, .001);
        const vx = (this.pos.x - this.prevX) / dt;
        this.prevX = this.pos.x;
        this.smoothedVX = lerp(this.smoothedVX, vx, .22);
        const LEAN_MAX = PI/6;                  // 30° cap so the car never points sideways
        const targetAngle = clamp(this.smoothedVX * .035, -LEAN_MAX, LEAN_MAX);
        this.angle = lerp(this.angle, targetAngle, .22);

        // shooting — bullets always fly straight ahead in the car's heading direction
        const wantFire = (keyIsDown('Space') || mouseIsDown(0));
        if (wantFire && !this.fireCooldown.active() && !gameOver)
        {
            this.fireCooldown.set(PLAYER_FIRE_COOLDOWN);

            const fwd = vec2(0, 1).rotate(this.angle);
            const side = vec2(.55, 0).rotate(this.angle);
            const muzzleY = this.size.y/2 + .25;
            const noseOffset = fwd.scale(muzzleY);
            const muzzleL = this.pos.add(noseOffset).subtract(side);
            const muzzleR = this.pos.add(noseOffset).add(side);

            const bVel = fwd.scale(PLAYER_BULLET_SPEED);

            bullets.push(new Bullet(muzzleL, bVel), new Bullet(muzzleR, bVel));
            sndShoot.play(this.pos, 1, 1.08);
        }
    }

    render()
    {
        if (gameOver)
        {
            // burned-out hulk: charred body + smoldering interior
            drawRect(this.pos, this.size, rgb(.10,.09,.10), this.angle);
            drawRect(this.pos, vec2(this.size.x*.78, this.size.y*.58), rgb(.22,.16,.12), this.angle);
            drawRect(this.pos.add(vec2(0, .15).rotate(this.angle)), vec2(this.size.x*.55, this.size.y*.30), rgb(.45,.18,.06,.85), this.angle);
            return;
        }
        if (this.invuln.active() && ((time*10|0)%2))
            drawRect(this.pos, this.size.add(vec2(.35)), rgb(1,1,1,.22), this.angle);
        renderPlayer(this.pos, this.size, this.angle);
    }
}

///////////////////////////////////////////////////////////////////////////////
function pickKind(progress)
{
    // progress is 0..1 over distance
    const hostileShare = lerp(.30, .55, progress);
    if (rand() > hostileShare)
        return randBool(.65) ? KIND_CIV_BLUE : KIND_CIV_WAGON;

    // hostile mix — enforcer + bully unlock with progress
    const enforcerW = lerp(0,    .35, progress);
    const bullyW    = lerp(0,    .30, progress);
    const switchW   = 1 - enforcerW - bullyW;
    const h = rand();
    if (h < switchW)              return KIND_SWITCHBLADE;
    if (h < switchW + enforcerW)  return KIND_ENFORCER;
    return KIND_BULLY;
}

function spawnCar()
{
    if (!player) return;
    // always spawn above the visible top of the screen, regardless of zoom
    const camSize = getCameraSize();
    const topY = cameraPos.y + camSize.y/2;
    const y = topY + rand(2, 14);
    const lane = randInt(LANES);
    const x = roadCenterX(y) + laneX(lane) + rand(-.25, .25);
    const progress = min(distance / 1400, 1);
    const kind = pickKind(progress);
    cars.push(new Car(vec2(x, y), kind));
}

function spawnProp()
{
    if (!player) return;
    const y = player.pos.y + rand(35, 75);
    const side = randBool() ? -1 : 1;
    // wider spawn range now that the camera is zoomed out further; offset from the road's centerline at this y
    const x = roadCenterX(y) + side * (ROAD_HALF + rand(1.8, 14.0));
    // weighted kind pick — bushes and trees most common, signs/lights rarer
    const r = rand();
    let kind;
    if      (r < .26) kind = PROP_BUSH;
    else if (r < .46) kind = PROP_TREE_ROUND;
    else if (r < .62) kind = PROP_PINE;
    else if (r < .74) kind = PROP_ROCKS;
    else if (r < .84) kind = PROP_POST;
    else if (r < .90) kind = PROP_STREETLIGHT;
    else if (r < .96) kind = PROP_SIGN;
    else              kind = PROP_BILLBOARD;
    props.push(new RoadsideProp(vec2(x, y), kind));
}

function resetGame()
{
    engineObjectsDestroy();
    bullets.length = 0;
    enemyBullets.length = 0;
    cars.length = 0;
    props.length = 0;
    oilSlicks.length = 0;
    smokeScreens.length = 0;

    score = 0;
    distance = 0;
    gameOver = false;
    scoreMultiplier = 1;
    killsForMultBonus = 0;
    killsForOil = 0;
    killsForSmoke = 0;
    extraLifeAt = EXTRA_LIFE_INTERVAL;
    announceTimer.unset();

    carSpawnTimer.unset();
    propSpawnTimer.unset();

    resetRoad();
    player = new PlayerCar();
    // no initial car seed — let the player start on an empty road; cars enter from above as the player gets moving
    for (let i=0; i<14; i++) spawnProp();
}

function runSanityTests()
{
    ASSERT(isVector2(vec2(1,2)), 'vec2 should return a Vector2');
    ASSERT(clamp(5, 0, 3) === 3, 'clamp should clamp high');
    ASSERT(clamp(-1, 0, 3) === 0, 'clamp should clamp low');
    ASSERT(laneX(1) === 0, 'middle lane should be x=0 for 3 lanes');
    ASSERT(typeof drawRect === 'function', 'drawRect should exist');
    ASSERT(typeof ParticleEmitter === 'function', 'ParticleEmitter should exist');
    ASSERT(KIND_INFO[KIND_SWITCHBLADE].hostile === true, 'switchblade hostile');
    ASSERT(KIND_INFO[KIND_BULLY].bulletproof === true, 'bully bulletproof');
    ASSERT(KIND_INFO[KIND_CIV_BLUE].hostile === false, 'civilian not hostile');
}

///////////////////////////////////////////////////////////////////////////////
async function gameInit()
{
    setCanvasFixedSize(vec2(1280, 720));
    runSanityTests();
    resetGame();
    buildMenus();
    showMenu('title');
}

function startGame()
{
    resetGame();
    isPlaying = true;
    clearSubmenuStack();
    hideAllMenus();
}

function quitToTitle()
{
    isPlaying = false;
    clearSubmenuStack();
    hideAllMenus();
    showMenu('title');
}

function buildMenus()
{
    if (typeof createMenu !== 'function') return;

    installAutoPause();

    createTitleMenu({
        title: 'SPY HUNTER',
        subtitle: '',
        onPlay: startGame,
        revealOnClick: false,
    });

    createPauseMenu({
        onRestart: startGame,
        onQuit:    quitToTitle,
    });

    installDefaultToolbar();
}

///////////////////////////////////////////////////////////////////////////////
function gameUpdate()
{
    if (bindPauseKey({when: () => isPlaying && !gameOver})) return;
    if (!isPlaying) return;

    if (keyWasPressed('KeyR'))
        resetGame();

    // generate road anchors far enough ahead so spawns/AI always have a defined road
    ensureRoadAhead(cameraPos.y + 120);

    if (!player || gameOver)
        return;

    distance += player.speed * timeDelta;
    score += player.speed * timeDelta * .45;
    checkExtraLife();

    // special weapon drops
    if (keyWasPressed('KeyZ')) dropOilSlick();
    if (keyWasPressed('KeyX')) dropSmokeScreen();

    // spawn cars — wait until the player is actually cruising so traffic doesn't pile up off-screen at startup
    if (!carSpawnTimer.active())
    {
        const d = min(distance / 1200, 1);
        carSpawnTimer.set(lerp(2.35, 1.55, d));
        if (player.passedMinSpeed)
        {
            if (cars.length < 7) spawnCar();
            if (cars.length < 7 && randBool(lerp(.02, .08, d))) spawnCar();
        }
    }

    // spawn props — denser, with frequent doubles/triples for varied roadsides
    if (!propSpawnTimer.active())
    {
        propSpawnTimer.set(rand(.14, .30));
        spawnProp();
        if (randBool(.55)) spawnProp();
        if (randBool(.30)) spawnProp();
    }

    // player bullets vs cars
    for (const b of bullets)
    {
        if (b.destroyed) continue;
        for (const c of cars)
        {
            if (c.destroyed) continue;
            if (!overlapAABB(b, c)) continue;

            if (c.bulletproof)
            {
                // ricochet — small spark, slight nudge to the car away from impact
                b.destroy();
                sndRicochet.play(b.pos, 1, rand(.95,1.1));
                new ParticleEmitter(
                    b.pos, 0, vec2(0), .03, 18, PI, undefined,
                    rgb(1,1,.7,.9), rgb(1,.6,.2,.9),
                    rgb(.3,.2,.1,0), rgb(.3,.2,.1,0),
                    .15, .12, .04, 8, 8,
                    .9, .9, 0, PI, .08, .3, false, false
                );
                break;
            }

            b.destroy();
            c.hp--;
            c.hitFlash.set(.09);
            spawnHitSpark(b.pos);

            if (c.hostile)
            {
                sndHitBad.play(c.pos, 1, rand(.9, 1.1));
                if (c.hp <= 0)
                {
                    c.destroy();
                    sndBoom.play(c.pos, 1, rand(.95,1.05));
                    explodeCar(c.pos, true);
                    awardKill(c.kind == KIND_ENFORCER ? SCORE_ENFORCER : SCORE_SWITCHBLADE);
                }
            }
            else
            {
                sndHitCiv.play(c.pos, 1, rand(.95, 1.05));
                if (c.hp <= 0)
                {
                    c.destroy();
                    explodeCar(c.pos, false);
                    penalizeCivilian();
                }
            }
            break;
        }
    }

    // player vs cars
    if (!player.invuln.active())
    {
        for (const c of cars)
        {
            if (c.destroyed) continue;
            if (!overlapAABB(player, c)) continue;

            if (c.kind == KIND_BULLY)
            {
                // ram contest — accumulate sideways push as long as contact holds
                const dx = c.pos.x - player.pos.x;
                const pushDir = dx >= 0 ? 1 : -1;
                c.rammedVX = clamp(c.rammedVX + pushDir * 4, -22, 22);
                // small player kickback + slight speed scrub
                player.pos.x -= pushDir * .10;
                player.speed = max(PLAYER_MIN_SPEED, player.speed - 1);
                // sound throttle so we don't machine-gun the hit sfx
                if (!player.bullyTouchTimer || !player.bullyTouchTimer.active())
                {
                    player.bullyTouchTimer = player.bullyTouchTimer || new Timer();
                    player.bullyTouchTimer.set(.18);
                    sndHitBad.play(player.pos, 1, .8);
                }
                continue;
            }

            // every other car kills you
            c.destroy();
            sndBoom.play(player.pos, 1, .9);
            explodeCar(player.pos, true);
            player.lives--;
            player.invuln.set(1.1);
            player.speed = max(PLAYER_MIN_SPEED, player.speed - 7);
            if (player.lives <= 0)
                triggerGameOver();
            break;
        }
    }

    // enemy bullets vs player
    if (!player.invuln.active())
    {
        for (const b of enemyBullets)
        {
            if (b.destroyed) continue;
            if (!overlapAABB(b, player)) continue;
            b.destroy();
            sndBoom.play(player.pos, 1, .95);
            explodeCar(player.pos, false);
            player.lives--;
            player.invuln.set(1.1);
            if (player.lives <= 0)
                triggerGameOver();
            break;
        }
    }

    // oil slicks vs cars — any car that touches an oil slick spins out and dies
    for (const o of oilSlicks)
    {
        if (o.destroyed) continue;
        for (const c of cars)
        {
            if (c.destroyed) continue;
            if (!isOverlapping(o.pos, o.size, c.pos, c.size)) continue;
            sndCarOiled.play(c.pos, 1, rand(.95, 1.1));
            explodeCar(c.pos, true);
            c.destroy();
            if (c.hostile)
            {
                const reward = c.kind == KIND_ENFORCER ? SCORE_ENFORCER
                              : c.kind == KIND_BULLY   ? SCORE_BULLY_RAM
                              :                          SCORE_SWITCHBLADE;
                awardKill(reward);
            }
            else
            {
                penalizeCivilian();
            }
        }
    }

    // smoke screens vs cars — cars in the cloud get confused (refreshed each frame in contact)
    for (const s of smokeScreens)
    {
        if (s.destroyed) continue;
        for (const c of cars)
        {
            if (c.destroyed) continue;
            if (!isOverlapping(s.pos, s.size, c.pos, c.size)) continue;
            c.confusedTimer.set(SMOKE_CONFUSION_DURATION);
        }
    }

    bullets = bullets.filter(o=>!o.destroyed);
    enemyBullets = enemyBullets.filter(o=>!o.destroyed);
    cars = cars.filter(o=>!o.destroyed);
    props = props.filter(o=>!o.destroyed);
    oilSlicks = oilSlicks.filter(o=>!o.destroyed);
    smokeScreens = smokeScreens.filter(o=>!o.destroyed);
}

///////////////////////////////////////////////////////////////////////////////
function gameUpdatePost()
{
    cameraPos = vec2(0, player ? player.pos.y + CAMERA_LOOKAHEAD : 0);
}

///////////////////////////////////////////////////////////////////////////////
function gameRender()
{
    const camSize = getCameraSize();
    const startY = cameraPos.y - camSize.y/2 - 2;
    const endY   = cameraPos.y + camSize.y/2 + 2;

    // grass (full screen)
    drawRect(cameraPos, camSize, rgb(.05,.25,.07));

    // gray road surface drawn as thin Y-slices so it can follow the curve
    const sliceH = .80;
    const sliceColor   = rgb(.16,.16,.17);
    const sliceHilight = rgb(.10,.10,.12,.30);
    const dirtSide     = rgb(.03,.18,.05);
    for (let y = startY; y < endY; y += sliceH)
    {
        const cx = roadCenterX(y + sliceH/2);
        drawRect(vec2(cx - ROAD_HALF - 2.2, y + sliceH/2), vec2(4.0, sliceH), dirtSide);
        drawRect(vec2(cx + ROAD_HALF + 2.2, y + sliceH/2), vec2(4.0, sliceH), dirtSide);
        drawRect(vec2(cx, y + sliceH/2), vec2(ROAD_WIDTH, sliceH), sliceColor);
        drawRect(vec2(cx, y + sliceH/2), vec2(ROAD_WIDTH*.92, sliceH), sliceHilight);
    }

    // smooth white edge lines drawn as polylines through sampled centerline + offset
    const edgeColor = rgb(.95,.95,.95);
    const sampleStep = .8;
    const leftPoints = [];
    const rightPoints = [];
    for (let y = startY; y <= endY + sampleStep; y += sampleStep)
    {
        const cx = roadCenterX(y);
        leftPoints.push (vec2(cx - ROAD_HALF + .25, y));
        rightPoints.push(vec2(cx + ROAD_HALF - .25, y));
    }
    drawLineList(leftPoints,  .22, edgeColor);
    drawLineList(rightPoints, .22, edgeColor);

    // dashed center line — each dash is a single tilted line segment so it aligns with the road's slope
    const scroll = player ? player.pos.y : 0;
    const dashH = 1.6;
    const gapH  = 1.4;
    for (let y = startY; y < endY + 6; y += dashH + gapH)
    {
        const y0 = y - mod(scroll, dashH + gapH);
        const y1 = y0 + dashH;
        drawLine(
            vec2(roadCenterX(y0), y0),
            vec2(roadCenterX(y1), y1),
            .32, rgb(1,1,1));
    }

    // intro hint
    if (distance < 50 && !gameOver)
    {
        drawText('Mouse: steer   LMB/Space: fire   W/S: throttle   Z: oil slick   X: smoke screen',
            cameraPos.add(vec2(0, -camSize.y*.36)), .72, rgb(1,1,1), .14, rgb(0,0,0));
        drawText('Hostiles will chase you — drop OIL behind to kill pursuers.  Ram BLUE Bully off the road or oil it.  Avoid civilians.',
            cameraPos.add(vec2(0, -camSize.y*.42)), .60, rgb(1,1,.7), .14, rgb(0,0,0));
    }
}

///////////////////////////////////////////////////////////////////////////////
function drawHudColumn(label, value, x, valueColor)
{
    const W = mainCanvasSize.x;
    const H = mainCanvasSize.y;
    const labelY = H - HUD_HEIGHT + 18;
    const valueY = H - 18;
    drawTextScreen(label, vec2(x, labelY), 16, hsl(0,0,.65), 3, hsl(0,0,0));
    drawTextScreen(value, vec2(x, valueY), 34, valueColor,    4, hsl(0,0,0));
}

function gameRenderPost()
{
    const W = mainCanvasSize.x;
    const H = mainCanvasSize.y;

    // bottom HUD band background (screen-space rectangles)
    drawRect(vec2(W/2, H - HUD_HEIGHT/2), vec2(W, HUD_HEIGHT), rgb(0,0,0,.62), 0, false, true);
    drawRect(vec2(W/2, H - HUD_HEIGHT + 1), vec2(W, 2),        rgb(1,1,1,.35), 0, false, true);

    // HUD columns
    const spd = player ? player.speed.toFixed(0) : '0';
    const lives = player ? player.lives : 0;
    const livesStr = lives > 0 ? '★'.repeat(lives) : '-';
    const oilStr = player ? String(player.oilSlickAmmo) : '0';
    const smokeStr = player ? String(player.smokeAmmo) : '0';
    const multColor = scoreMultiplier > 1 ? hsl(.13,1,.6) : hsl(0,0,.8);
    const oilColor = (player && player.oilSlickAmmo > 0) ? hsl(.08,.8,.6) : hsl(0,0,.5);
    const smokeColor = (player && player.smokeAmmo > 0) ? hsl(.58,.5,.78) : hsl(0,0,.5);

    drawHudColumn('SCORE',   (score|0).toString().padStart(6,'0'), W * .10, hsl(0,0,1));
    drawHudColumn('MULT',    'x' + scoreMultiplier,                W * .26, multColor);
    drawHudColumn('SPEED',   spd,                                  W * .42, hsl(.55,.7,.8));
    drawHudColumn('LIVES',   livesStr,                             W * .58, hsl(0,.6,.7));
    drawHudColumn('OIL [Z]', oilStr,                               W * .74, oilColor);
    drawHudColumn('SMOKE [X]', smokeStr,                           W * .90, smokeColor);

    // announcement (extra life / multiplier change)
    if (announceTimer.active())
    {
        const pct = announceTimer.getPercent();      // 0..1, 1 at expiry
        const alpha = pct < .75 ? 1 : (1-pct)/.25;   // hold then fade
        const fade = announceColor.copy();
        fade.a = alpha;
        drawTextScreen(announceText, vec2(W/2, H * .25), 56, fade, 6, hsl(0,0,0,alpha));
    }

    if (gameOver)
    {
        drawTextScreen('GAME OVER', vec2(W/2, H/2 - 40), 120, hsl(0,1,.6), 8, hsl(0,0,0));
        drawTextScreen('Press R to restart', vec2(W/2, H/2 + 50), 60, hsl(0,0,1), 6, hsl(0,0,0));
    }
}

///////////////////////////////////////////////////////////////////////////////
engineInit(gameInit, gameUpdate, gameUpdatePost, gameRender, gameRenderPost);

</script>
