<!DOCTYPE html><head>
<title>LittleJS Step Sequencer</title>
<meta charset="utf-8">
</head><body style="background:#000">
<script src="../dist/littlejs.js?1.18.15"></script>
<script src="../templates/soundGenerator.js"></script>
<script>
'use strict';

debugWatermark = false;
showEngineVersion = false;
paused = false;

const stepCount = 8, trackCount = 16, sequencer = [];
const buttonSize = vec2(68, 28);
const customSlotCount = 4, drumCount = 4;
const customSounds = [null, null, null, null];
let currentStep = 0, stepTime = 0, tempo = 240;
let isPlaying = false, eraseMode = false;

const STORAGE_KEY = 'ljs_sequencer_v1';
let saveTimer = 0;
function scheduleSave()
{
    if (saveTimer) clearTimeout(saveTimer);
    saveTimer = setTimeout(saveState, 200);
}
function saveState()
{
    saveTimer = 0;
    const cells = [];
    for (let track = 0; track < trackCount; track++)
    for (let step = 0; step < stepCount; step++)
    {
        const idx = step + track*stepCount;
        if (sequencer[idx]) cells.push(`${track},${step}`);
    }
    const blob = { version:1, tempo, cells, customSounds };
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(blob)); }
    catch (e) { console.warn('sequencer: saveState failed', e); }
}
function loadState()
{
    let blob;
    try
    {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return null;
        blob = JSON.parse(raw);
    }
    catch (e) { console.warn('sequencer: loadState parse failed', e); return null; }
    if (!blob || blob.version !== 1) return null;
    return blob;
}

const sound_piano = new Sound([.3,0,220,,.1]);
const sound_drumKick  = new Sound([,,99,,,.02,,,,,,,,2]);
const sound_drumSnare = new Sound([2,.1,300,.02,.02,.1,4,2,,,,,,5]);
const sound_drumClap  = new Sound([1.5,,200,.01,.02,.1,4,,,,,,.05]);
const sound_drumHat   = new Sound([,,1e3,,,.01,4,,,,,,,,,,,,,,4e3]);

const majorScale = [0,2,4,5,7,9,11];
const scale = majorScale;

// track 0..3   = custom slots (sound looked up at play time from customSounds[])
// track 4..7   = drums (kick, snare, clap, hat)
// track 8..15  = piano notes (one octave including the octave repeat at semitone 12)
function getTrackConfig(track)
{
    if (track < customSlotCount)
    {
        const slot = track;
        const slotHues = [0.0, 0.08, 0.45, 0.85];
        return { kind:'custom', slot, hue:slotHues[slot], label:`S${slot+1}` };
    }
    if (track < customSlotCount + drumCount)
    {
        const drum = track - customSlotCount;
        const drumSounds = [sound_drumKick, sound_drumSnare, sound_drumClap, sound_drumHat];
        const drumLabels = ['KICK', 'SNRE', 'CLAP', 'HAT'];
        const drumHues   = [0.0,    0.1,    0.55,   0.15];
        return { kind:'drum', sound:drumSounds[drum], hue:drumHues[drum], label:drumLabels[drum] };
    }
    const noteIndex = track - customSlotCount - drumCount; // 0..7
    const octave = floor(noteIndex / scale.length);
    const scaleNote = noteIndex % scale.length;
    const semitone = scale[scaleNote] + 12*octave;
    const hue = 0.6 - scaleNote/40 + octave*0.2;
    const noteNames = ['C','D','E','F','G','A','B'];
    const label = noteNames[scaleNote] + (octave > 0 ? '+' : '');
    return { kind:'piano', sound:sound_piano, semitone, hue, label };
}

function parseZzfxText(text)
{
    let s = (text || '').trim();
    const wrapMatch = s.match(/^new\s+Sound\s*\(\s*(\[[\s\S]*\])\s*\)\s*;?\s*$/i);
    if (wrapMatch) s = wrapMatch[1];
    s = s.trim();
    if (!s.startsWith('[') || !s.endsWith(']'))
        throw new Error('expected [ ... ]');
    let padded = '';
    for (let i = 0; i < s.length; i++)
    {
        padded += s[i];
        if (s[i] === '[' || s[i] === ',')
        {
            let j = i + 1;
            while (j < s.length && /\s/.test(s[j])) j++;
            if (j < s.length && (s[j] === ',' || s[j] === ']'))
                padded += 'null';
        }
    }
    const arr = JSON.parse(padded);
    if (!Array.isArray(arr) || arr.length < 1)
        throw new Error('not an array');
    for (const v of arr)
        if (v !== null && (typeof v !== 'number' || !isFinite(v)))
            throw new Error('non-numeric element');
    return arr;
}

function formatZzfxArray(arr)
{
    return '[' + arr.map(v => v === null ? '' : String(v)).join(',') + ']';
}

class UITrackLabel extends UIButton
{
    constructor(track)
    {
        let pos = vec2(-1, trackCount-1-track);
        pos = pos.multiply(buttonSize);
        pos = pos.add(vec2(240, 40)).subtract(mainCanvasSize.scale(.5));
        super(pos, buttonSize);

        this.track = track;
        this.cornerRadius = 4;
        this.shadowColor = CLEAR_BLACK;
        const cfg = getTrackConfig(track);
        this.kind = cfg.kind;
        this.hue = cfg.hue;
        this.semitone = cfg.semitone;
        this.builtInSound = cfg.sound;
        this.text = cfg.label;
        this.textHeight = 14;
    }
    onClick()
    {
        if (this.kind === 'piano') this.builtInSound.playNote(this.semitone);
        else if (this.kind === 'drum') this.builtInSound.play();
        else if (this.kind === 'custom') openPasteModal(this.track);
    }
    render()
    {
        const empty = this.kind === 'custom' && !customSounds[this.track];
        if (this.kind === 'custom')
            this.text = empty ? 'PASTE' : `S${this.track+1}`;
        const sat = empty ? .15 : .6;
        const lit = empty ? .2 : .3;
        this.color = this.isActiveObject() ? hsl(this.hue, .8, .5) : hsl(this.hue, sat, lit);
        super.render();
    }
}

class UISequencerButton extends UIButton
{
    constructor(step, track)
    {
        let pos = vec2(step, trackCount-1-track);
        pos = pos.multiply(buttonSize);
        pos = pos.add(vec2(240, 40)).subtract(mainCanvasSize.scale(.5));
        super(pos, buttonSize);

        this.step = step;
        this.track = track;
        this.cornerRadius = 0;
        this.dragActivate = true;
        this.isOn = false;
        this.shadowColor = CLEAR_BLACK;

        const cfg = getTrackConfig(track);
        this.kind = cfg.kind;
        this.hue = cfg.hue;
        this.semitone = cfg.semitone;
        this.builtInSound = cfg.sound; // undefined for custom slots
    }
    onPress()
    {
        if (mouseWasPressed(0))
            eraseMode = this.isOn;
        this.isOn = !eraseMode;
        eraseMode || this.playSound();
        const index = this.step + this.track*stepCount;
        sequencer[index] = eraseMode ? 0 : this;
        scheduleSave();
    }
    render()
    {
        const empty = this.kind === 'custom' && !customSounds[this.track];
        this.activeColor = eraseMode ? RED : WHITE;
        const sat = empty ? .2 : (this.isOn ? 1 : .5);
        const lit = empty ? (this.isOn ? .3 : .1) : (this.isOn ? .5 : .15);
        this.color = this.isActiveObject() ? BLACK : hsl(this.hue, sat, lit);
        if (isPlaying && this.step == currentStep)
            this.color = this.color.lerp(WHITE, .5);
        super.render();
    }
    getSound()
    {
        if (this.kind === 'custom')
        {
            const params = customSounds[this.track];
            return params ? new Sound(params) : null;
        }
        return this.builtInSound;
    }
    playSound()
    {
        const snd = this.getSound();
        if (!snd) return;
        if (this.kind === 'piano') snd.playNote(this.semitone);
        else snd.play();
    }
}

let pasteModal = null;

function openPasteModal(slot)
{
    if (pasteModal) { pasteModal.destroy(); pasteModal = null; }

    const modal = new UIObject(vec2(), vec2(700, 320));
    pasteModal = modal;

    modal.addChild(new UIText(vec2(0,-110), vec2(600, 40), `Custom Sound — Slot ${slot+1}`));

    const input = new UITextInput(vec2(0,-40), vec2(640, 60),
        customSounds[slot] ? formatZzfxArray(customSounds[slot]) : '');
    input.maxLength = 200;
    input.textHeight = 32;
    modal.addChild(input);

    const errorText = new UIText(vec2(0,10), vec2(640, 30), '');
    errorText.color = RED;
    errorText.textHeight = 18;
    modal.addChild(errorText);

    const tryParse = ()=>
    {
        try { return parseZzfxText(input.text); }
        catch (e) { errorText.text = 'Parse error: ' + e.message; return null; }
    };

    const btnAudition = new UIButton(vec2(-220, 90), vec2(140, 50), 'AUDITION');
    btnAudition.onClick = ()=>
    {
        errorText.text = '';
        const arr = tryParse();
        if (arr) new Sound(arr).play();
    };
    modal.addChild(btnAudition);

    const btnSave = new UIButton(vec2(-70, 90), vec2(140, 50), 'SAVE');
    btnSave.onClick = ()=>
    {
        errorText.text = '';
        const arr = tryParse();
        if (!arr) return;
        customSounds[slot] = arr;
        scheduleSave();
        closePasteModal();
    };
    modal.addChild(btnSave);

    const btnClear = new UIButton(vec2(80, 90), vec2(140, 50), 'CLEAR');
    btnClear.disabled = !customSounds[slot];
    btnClear.onClick = ()=>
    {
        customSounds[slot] = null;
        scheduleSave();
        closePasteModal();
    };
    modal.addChild(btnClear);

    const btnCancel = new UIButton(vec2(230, 90), vec2(140, 50), 'CANCEL');
    btnCancel.onClick = closePasteModal;
    modal.addChild(btnCancel);
}

function closePasteModal()
{
    if (pasteModal) { pasteModal.destroy(); pasteModal = null; }
}

function clearAllCells()
{
    for (const obj of uiSystem.uiObjects)
        if (obj instanceof UISequencerButton)
            obj.isOn = false;
    sequencer.length = 0;
    scheduleSave();
}

function gameInit()
{
    new UISystemPlugin;
    uiSystem.defaultCornerRadius = 8;
    uiSystem.defaultShadowColor = BLACK;
    canvasClearColor = GRAY;

    const saved = loadState();
    if (saved)
    {
        tempo = saved.tempo;
        for (let i = 0; i < customSlotCount; i++)
            customSounds[i] = saved.customSounds[i] || null;
    }

    for (let step=stepCount; step--;)
    for (let track=trackCount; track--;)
        new UISequencerButton(step, track);

    if (saved && saved.cells)
    {
        const buttonByKey = new Map();
        for (const obj of uiSystem.uiObjects)
            if (obj instanceof UISequencerButton)
                buttonByKey.set(`${obj.track},${obj.step}`, obj);
        for (const cell of saved.cells)
        {
            const btn = buttonByKey.get(cell);
            if (!btn) continue;
            btn.isOn = true;
            const [t, s] = cell.split(',').map(Number);
            sequencer[s + t*stepCount] = btn;
        }
    }

    for (let track=trackCount; track--;)
        new UITrackLabel(track);

    const clearButton = new UIButton(vec2(100,500).subtract(mainCanvasSize.scale(.5)), vec2(140,60), 'CLEAR');
    clearButton.onClick = ()=>
    {
        uiSystem.showConfirmDialog('Clear pattern?', ()=> clearAllCells());
    };

    const playButton = new UIButton(vec2(660,500).subtract(mainCanvasSize.scale(.5)), vec2(180,60), 'PLAY');
    playButton.onClick = ()=>
    {
        isPlaying = !isPlaying;
        currentStep = stepTime = 0;
        playButton.text = isPlaying ? 'STOP' : 'PLAY';
    };

    const minTempo = 120, maxTempo = 480;
    const tempoPercent = percent(tempo, minTempo, maxTempo);
    const tempoSlider = new UISlider(vec2(380,500).subtract(mainCanvasSize.scale(.5)), vec2(340,40), tempoPercent);
    tempoSlider.onChange = ()=>
    {
        tempo = lerp(minTempo, maxTempo, tempoSlider.value);
        tempo = floor(tempo/10) * 10;
        tempoSlider.text = `${tempo} BPM`;
        scheduleSave();
    };
    tempoSlider.onChange();
}

function gameUpdate()
{
    if (!isPlaying)
        return;

    const lastStepTime = stepTime;
    const lastStep = currentStep;
    stepTime += timeDelta*tempo/60;
    currentStep = floor(stepTime) % stepCount;
    if (currentStep == lastStep && lastStepTime)
        return;

    for (let i=trackCount; i--;)
    {
        const index = currentStep + i*stepCount;
        const noteButton = sequencer[index];
        noteButton && noteButton.playSound();
    }
}

engineInit(gameInit, gameUpdate);
</script></body></html>
