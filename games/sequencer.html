<!DOCTYPE html><head>
<title>LittleJS Music Sequencer</title>
<meta charset="utf-8">
<style>
#littlejs-menus .ljs-menu-panel[data-menu-id="paste"] [data-item-id="error"] {
    color: #f55;
    min-height: 1.2em;
}
#littlejs-menus .ljs-menu-panel[data-menu-id="controls"] {
    top: var(--toolbar-margin, 0.5em);
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: row;
    align-items: center;
    gap: 12px;
    padding: 6px 12px;
}
#littlejs-menus .ljs-menu-panel[data-menu-id="controls"] .ljs-slider {
    min-width: 180px;
    margin: 0;
}
</style>
</head><body style="background:#000">
<script src="../dist/littlejs.js?1780071765370"></script>
<script src="../templates/menus.js?1780071765370"></script>
<script src="../templates/gameFx.js?1780071765370"></script>
<script>
'use strict';

debugWatermark = false;
showEngineVersion = false;
paused = false;

const stepCount = 8, trackCount = 16, sequencer = [];
const buttonSize = vec2(68, 28);
// Center the labels-plus-grid block on the canvas (canvas-center coords).
// X: labels at step=-1, cells at step 0..stepCount-1, total stepCount+1 columns;
// center of that range is (stepCount-1)/2, but we want labels visible too,
// so shift right by half a button so label column doesn't go off the left.
const gridOrigin = vec2(buttonSize.x * (1 - stepCount/2), buttonSize.y * (0.5 - trackCount/2));
const customSlotCount = 4, drumCount = 4;
const customSounds = [null, null, null, null];
let currentStep = 0, stepTime = 0, tempo = 240;
let currentSlot = 0;
let eraseMode = false;

let saveTimer = 0;
function scheduleSave()
{
    if (saveTimer) clearTimeout(saveTimer);
    saveTimer = setTimeout(saveState, 200);
}
function saveState()
{
    saveTimer = 0;
    const cells = [];
    for (let track = 0; track < trackCount; track++)
    for (let step = 0; step < stepCount; step++)
    {
        const idx = step + track*stepCount;
        if (sequencer[idx]) cells.push(`${track},${step}`);
    }
    const blob = { version:1, tempo, cells, customSounds };
    try { saveData({state: blob}); }
    catch (e) { console.warn('sequencer: saveState failed', e); }
}
function loadState()
{
    try
    {
        const blob = getSaveData().state;
        if (!blob || blob.version !== 1) return null;
        return blob;
    }
    catch (e) { console.warn('sequencer: loadState failed', e); return null; }
}

const sound_piano = new Sound([.3,0,220,,.1]);
const sound_drumKick  = new Sound([3,,99,,,.02,,,,,,,,2]);
const sound_drumSnare = new Sound([.8,,,,,.09,,,,,,,,5,,,,,,,70]); // Loaded Sound 8388
const sound_drumClap  = new Sound([4,0,2100,,,.02,1,.07,-35,,,,,,,,.01,.25]); // wood hit - Copy 1
const sound_drumHat   = new Sound([,,1e3,,,.01,4,,,,,,,,,,,,,,4e3]);

const majorScale = [0,2,4,5,7,9,11];
const scale = majorScale;

// track 0..3   = custom slots (sound looked up at play time from customSounds[])
// track 4..7   = drums (kick, snare, clap, hat)
// track 8..15  = piano notes (one octave including the octave repeat at semitone 12)
function getTrackConfig(track)
{
    if (track < customSlotCount)
    {
        const slot = track;
        const slotHues = [0.0, 0.08, 0.45, 0.85];
        return { kind:'custom', slot, hue:slotHues[slot], label:`S${slot+1}` };
    }
    if (track < customSlotCount + drumCount)
    {
        const drum = track - customSlotCount;
        const drumSounds = [sound_drumKick, sound_drumSnare, sound_drumClap, sound_drumHat];
        const drumLabels = ['KICK', 'SNRE', 'CLAP', 'HAT'];
        const drumHues   = [0.0,    0.1,    0.55,   0.15];
        return { kind:'drum', sound:drumSounds[drum], hue:drumHues[drum], label:drumLabels[drum] };
    }
    const noteIndex = track - customSlotCount - drumCount; // 0..7
    const octave = floor(noteIndex / scale.length);
    const scaleNote = noteIndex % scale.length;
    const semitone = scale[scaleNote] + 12*octave;
    const hue = 0.6 - scaleNote/40 + octave*0.2;
    const noteNames = ['C','D','E','F','G','A','B'];
    const label = noteNames[scaleNote] + (octave > 0 ? '+' : '');
    return { kind:'piano', sound:sound_piano, semitone, hue, label };
}

function parseZzfxText(text)
{
    let code = (text || '').trim();
    if (!code) throw new Error('empty input');

    // Strip optional 'new Sound(' or '[' wrapper — take everything after the
    // first '[' if present, else after the first '(', else use the raw text.
    code = code.split('[')[1] || code.split('(')[1] || code;

    // Validate: each comma-separated part must be empty or a finite number.
    // Trailing ']' / ')' / whitespace is fine — parseFloat ignores them.
    const parts = code.split(',');
    for (const p of parts)
    {
        if (p.trim() === '') continue;
        if (!Number.isFinite(parseFloat(p)))
            throw new Error('invalid zzfx code');
    }

    // Build the param array: undefined for blanks (zzfx uses defaults),
    // numbers otherwise.
    return parts.map(p =>
    {
        const f = parseFloat(p);
        return Number.isFinite(f) ? f : undefined;
    });
}

function formatZzfxArray(arr)
{
    return '[' + arr.map(v => v == null ? '' : String(v)).join(',') + ']';
}

class UITrackLabel extends UIButton
{
    constructor(track)
    {
        const pos = vec2(-1, trackCount-1-track).multiply(buttonSize).add(gridOrigin);
        super(pos, buttonSize);

        this.track = track;
        this.cornerRadius = 4;
        this.shadowColor = CLEAR_BLACK;
        const cfg = getTrackConfig(track);
        this.kind = cfg.kind;
        this.hue = cfg.hue;
        this.semitone = cfg.semitone;
        this.builtInSound = cfg.sound;
        this.text = cfg.label;
        this.textHeight = 14;
    }
    onClick()
    {
        if (isMenuVisible() && getTopMenu()?.id !== 'controls') return;
        if (this.kind === 'piano') this.builtInSound.playNote(this.semitone);
        else if (this.kind === 'drum') this.builtInSound.play();
        else if (this.kind === 'custom') openPasteForSlot(this.track);
    }
    render()
    {
        const empty = this.kind === 'custom' && !customSounds[this.track];
        if (this.kind === 'custom')
            this.text = empty ? 'PASTE' : `S${this.track+1}`;
        const sat = empty ? .15 : .6;
        const lit = empty ? .2 : .3;
        this.color = this.isActiveObject() ? hsl(this.hue, .8, .5) : hsl(this.hue, sat, lit);
        super.render();
    }
}

class UISequencerButton extends UIButton
{
    constructor(step, track)
    {
        const pos = vec2(step, trackCount-1-track).multiply(buttonSize).add(gridOrigin);
        super(pos, buttonSize);

        this.step = step;
        this.track = track;
        this.cornerRadius = 0;
        this.dragActivate = true;
        this.isOn = false;
        this.shadowColor = CLEAR_BLACK;

        const cfg = getTrackConfig(track);
        this.kind = cfg.kind;
        this.hue = cfg.hue;
        this.semitone = cfg.semitone;
        this.builtInSound = cfg.sound; // undefined for custom slots
    }
    onPress()
    {
        if (isMenuVisible() && getTopMenu()?.id !== 'controls') return;
        if (mouseWasPressed(0))
            eraseMode = this.isOn;
        this.isOn = !eraseMode;
        eraseMode || this.playSound();
        const index = this.step + this.track*stepCount;
        sequencer[index] = eraseMode ? 0 : this;
        scheduleSave();
    }
    render()
    {
        const empty = this.kind === 'custom' && !customSounds[this.track];
        this.activeColor = eraseMode ? RED : WHITE;
        const sat = empty ? .2 : (this.isOn ? 1 : .5);
        const lit = empty ? (this.isOn ? .3 : .1) : (this.isOn ? .5 : .15);
        this.color = this.isActiveObject() ? BLACK : hsl(this.hue, sat, lit);
        if (isPlaying() && this.step == currentStep)
            this.color = this.color.lerp(WHITE, .5);
        super.render();
    }
    getSound()
    {
        if (this.kind === 'custom')
        {
            const params = customSounds[this.track];
            return params ? new Sound(params) : null;
        }
        return this.builtInSound;
    }
    playSound()
    {
        const snd = this.getSound();
        if (!snd) return;
        if (this.kind === 'piano') snd.playNote(this.semitone);
        else snd.play();
    }
}

function buildPasteDialog()
{
    createMenu({
        id: 'paste',
        title: 'CUSTOM SOUND',
        dismissable: true,
        items: [
            {type:'label',  id:'slotLabel', text:'Slot 1'},
            {type:'input',  id:'params',    label:'zzfx', value:''},
            {type:'text',   id:'error',     text:''},
            {type:'button', id:'audition',  label:'AUDITION', onClick: pasteAudition},
            {type:'button', id:'save',      label:'SAVE',     onClick: pasteSave},
            {type:'button', id:'clear',     label:'CLEAR',    onClick: pasteClearSlot},
            {type:'button', id:'cancel',    label:'CANCEL',   onClick: () => hideMenu('paste')},
        ],
    });
}

function getPasteItem(id) { return getMenu('paste').getItem(id); }

function openPasteForSlot(slot)
{
    currentSlot = slot;
    const params = customSounds[slot];
    getPasteItem('slotLabel').setLabel(`Slot ${slot+1}`);
    getPasteItem('params').setValue(params ? formatZzfxArray(params) : '');
    getPasteItem('error').setLabel('');
    getPasteItem('clear').setDisabled(!params);
    showMenu('paste');
}

function pasteAudition()
{
    const arr = pasteTryParse();
    if (arr) new Sound(arr).play();
}

function pasteSave()
{
    const arr = pasteTryParse();
    if (!arr) return;
    customSounds[currentSlot] = arr;
    scheduleSave();
    hideMenu('paste');
}

function pasteClearSlot()
{
    customSounds[currentSlot] = null;
    scheduleSave();
    hideMenu('paste');
}

function pasteTryParse()
{
    const text = getPasteItem('params').getValue();
    try
    {
        const arr = parseZzfxText(text);
        getPasteItem('error').setLabel('');
        return arr;
    }
    catch (e)
    {
        getPasteItem('error').setLabel('Parse error: ' + e.message);
        return null;
    }
}

function applyTempo(v)
{
    tempo = v;
    scheduleSave();
}

function buildControlsMenu()
{
    createMenu({
        id: 'controls',
        backdrop: false,
        dismissable: false,
        items: [
            {type:'slider', id:'tempo', label:'TEMPO', title:'Tempo (BPM)',
                min: 120, max: 480, step: 10, value: tempo,
                onChange: v => applyTempo(v)},
            {type:'slider', id:'volume', label:'VOLUME', title:'Volume',
                min: 0, max: 1, step: 0.05, value: soundVolume,
                persist: 'volume',
                onChange: v => setSoundVolume(v)},
        ],
    });
}

function clearAllCells()
{
    for (const obj of uiSystem.uiObjects)
        if (obj instanceof UISequencerButton)
            obj.isOn = false;
    sequencer.length = 0;
    scheduleSave();
}

function gameInit()
{
    saveDataInit('sequencer');
    new UISystemPlugin;
    uiSystem.defaultCornerRadius = 8;
    uiSystem.defaultShadowColor = BLACK;
    canvasClearColor = GRAY;

    const saved = loadState();
    if (saved)
    {
        tempo = saved.tempo;
        for (let i = 0; i < customSlotCount; i++)
            customSounds[i] = saved.customSounds[i] || null;
    }

    for (let step=stepCount; step--;)
    for (let track=trackCount; track--;)
        new UISequencerButton(step, track);

    if (saved && saved.cells)
    {
        const buttonByKey = new Map();
        for (const obj of uiSystem.uiObjects)
            if (obj instanceof UISequencerButton)
                buttonByKey.set(`${obj.track},${obj.step}`, obj);
        for (const cell of saved.cells)
        {
            const btn = buttonByKey.get(cell);
            if (!btn) continue;
            btn.isOn = true;
            const [t, s] = cell.split(',').map(Number);
            sequencer[s + t*stepCount] = btn;
        }
    }

    for (let track=trackCount; track--;)
        new UITrackLabel(track);

    createToolbar({
        id: 'transport',
        anchor: 'top-left',
        direction: 'horizontal',
        items: [
            {type:'button', id:'play',
                label: isPlaying() ? '■' : '▶',
                title: 'Play / Stop',
                onClick: ()=>
                {
                    setPlaying(!isPlaying());
                    currentStep = stepTime = 0;
                    getToolbar('transport').getItem('play').setLabel(isPlaying() ? '■' : '▶');
                }},
        ],
    });
    getToolbar('transport').show();

    createToolbar({
        id: 'global',
        anchor: 'top-right',
        direction: 'horizontal',
        items: [
            {type:'button', id:'clear', label:'🗑',
                title: 'Clear pattern',
                onClick: ()=> showConfirmDialog({
                    title: 'CLEAR',
                    icon: '🗑',
                    message: 'Clear pattern?',
                    yesLabel: 'CLEAR',
                    noLabel: 'CANCEL',
                    onYes: ()=> { clearAllCells(); showMenu('controls'); },
                })},
            {type:'button', id:'fullscreen', label:'⛶',
                title: 'Toggle fullscreen',
                hideOnTouch: true,
                onClick: toggleFullscreen},
        ],
    });
    getToolbar('global').show();
    buildControlsMenu();
    showMenu('controls');
    buildPasteDialog();
}

function gameUpdate()
{
    if (!isPlaying())
        return;

    const lastStepTime = stepTime;
    const lastStep = currentStep;
    stepTime += timeDelta*tempo/60;
    currentStep = floor(stepTime) % stepCount;
    if (currentStep == lastStep && lastStepTime)
        return;

    for (let i=trackCount; i--;)
    {
        const index = currentStep + i*stepCount;
        const noteButton = sequencer[index];
        noteButton && noteButton.playSound();
    }
}

engineInit(gameInit, gameUpdate);
</script></body></html>
