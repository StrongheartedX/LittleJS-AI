<script>
'use strict';

// engine settings
debugWatermark = false;
showEngineVersion = false;

///////////////////////////////////////////////////////////////////////////////
// Tile system
///////////////////////////////////////////////////////////////////////////////

const LEVEL_W = 214;
const LEVEL_H = 18;

const TT = {
    EMPTY: 0,
    GROUND: 1,
    BRICK:  2,
    QBLOCK: 3,
    USED:   4,
    PIPE:   5,
    FLAG:   6,
    POLE:   7, // flag pole (non-solid)
};

const tileMap = new Map();
const tileKey = (x, y) => `${x|0},${y|0}`;

// per ? block: 'mushroom' | 'star' | (anything else / missing => coin)
const qBlockContents = new Map();

function setTile(x, y, t)
{
    if (x < 0 || y < 0 || x >= LEVEL_W || y >= LEVEL_H) return;
    if (t === TT.EMPTY) tileMap.delete(tileKey(x,y));
    else tileMap.set(tileKey(x,y), t);
}

function getTile(x, y) { return tileMap.get(tileKey(x,y)) || TT.EMPTY; }

function isSolidType(t)
{ return t === TT.GROUND || t === TT.BRICK || t === TT.QBLOCK || t === TT.USED || t === TT.PIPE || t === TT.FLAG; }

function isSolidAt(x, y) { return isSolidType(getTile(x, y)); }

function fillRectTiles(x0, y0, w, h, t)
{
    for (let x = x0; x < x0 + w; x++)
    for (let y = y0; y < y0 + h; y++)
        setTile(x, y, t);
}

// brick / qblock bump animation: key -> startTime
const tileBumps = new Map();
function bumpTile(x, y) { tileBumps.set(tileKey(x, y), time); }
function getTileBumpOffset(x, y)
{
    const start = tileBumps.get(tileKey(x, y));
    if (start === undefined) return 0;
    const t = (time - start) / .18;
    if (t > 1) { tileBumps.delete(tileKey(x, y)); return 0; }
    return Math.sin(t * Math.PI) * .35;
}

function addPipe(x, h) { fillRectTiles(x, 1, 2, h, TT.PIPE); }

///////////////////////////////////////////////////////////////////////////////
// Level: SMB 1-1 inspired layout
///////////////////////////////////////////////////////////////////////////////

const enemySpawns = []; // populated by buildLevel
const coinSpawns  = [];

function buildLevel()
{
    tileMap.clear();
    tileBumps.clear();
    qBlockContents.clear();
    enemySpawns.length = 0;
    coinSpawns.length = 0;

    // continuous ground row at y=0
    for (let x = 0; x < LEVEL_W; x++)
        setTile(x, 0, TT.GROUND);

    // pits (clear ground)
    const pits = [
        [69, 3],
        [86, 2],
        [120, 4],
        [157, 3],
    ];
    for (const [x, w] of pits)
        for (let xx = x; xx < x + w; xx++) setTile(xx, 0, TT.EMPTY);

    // -- early section: lonely ? block + four-block row --
    setTile(16, 4, TT.QBLOCK);

    setTile(20, 4, TT.BRICK);
    setTile(21, 4, TT.QBLOCK);
    setTile(22, 4, TT.BRICK);
    setTile(23, 4, TT.QBLOCK);
    setTile(24, 4, TT.BRICK);
    setTile(22, 8, TT.QBLOCK);

    // -- four pipes (heights 2, 3, 4, 4) --
    addPipe(28, 2);
    addPipe(38, 3);
    addPipe(46, 4);
    addPipe(57, 4);

    // -- after pipes: brick + ? + brick + a coin row above --
    setTile(77, 4, TT.BRICK);
    setTile(78, 4, TT.QBLOCK);
    setTile(79, 4, TT.BRICK);
    for (let x = 77; x <= 79; x++) setTile(x, 8, TT.BRICK);

    // -- mid-section bricks --
    setTile(94, 4, TT.BRICK);
    setTile(98, 4, TT.QBLOCK);
    setTile(101, 4, TT.BRICK);

    // floating bricks above
    fillRectTiles(108, 8, 3, 1, TT.BRICK);

    // -- staircase up to a high block area --
    fillRectTiles(115, 1, 1, 1, TT.BRICK);
    fillRectTiles(116, 1, 1, 2, TT.BRICK);
    fillRectTiles(117, 1, 1, 3, TT.BRICK);
    fillRectTiles(118, 1, 1, 4, TT.BRICK);

    // floating platform over the big pit
    fillRectTiles(122, 7, 4, 1, TT.BRICK);

    // descending stair after the pit
    fillRectTiles(125, 1, 1, 4, TT.BRICK);
    fillRectTiles(126, 1, 1, 3, TT.BRICK);
    fillRectTiles(127, 1, 1, 2, TT.BRICK);
    fillRectTiles(128, 1, 1, 1, TT.BRICK);

    // floating coin row
    fillRectTiles(133, 8, 4, 1, TT.BRICK);
    setTile(135, 4, TT.QBLOCK);

    // brick + ? + brick chain
    setTile(140, 4, TT.BRICK);
    setTile(141, 4, TT.QBLOCK);
    setTile(142, 4, TT.BRICK);

    // -- ground staircase up, plateau, staircase down (classic SMB beat) --
    for (let i = 0; i < 4; i++)
        fillRectTiles(149 + i, 1, 1, i + 1, TT.GROUND);
    fillRectTiles(153, 1, 2, 4, TT.GROUND);
    for (let i = 0; i < 4; i++)
        fillRectTiles(155 + i, 1, 1, 4 - i, TT.GROUND);

    // after pit
    setTile(168, 4, TT.QBLOCK);

    // -- final 8-step staircase before flag --
    for (let i = 0; i < 8; i++)
        fillRectTiles(178 + i, 1, 1, i + 1, TT.GROUND);

    // flag pole + ball
    const poleX = 192;
    setTile(poleX, 1, TT.GROUND); // base
    for (let y = 2; y < 11; y++) setTile(poleX, y, TT.POLE);
    setTile(poleX, 11, TT.FLAG); // top ball

    // -- powerup-bearing ? blocks (canonical SMB 1-1 picks first ? block = mushroom,
    //    high floating block above the early row = star)
    qBlockContents.set(tileKey(16, 4), 'mushroom');
    qBlockContents.set(tileKey(22, 8), 'star');
    qBlockContents.set(tileKey(78, 4), 'mushroom');
    qBlockContents.set(tileKey(168, 4), 'star');

    // -- enemy spawns --
    // Goombas
    enemySpawns.push({ type: 'goomba', x: 22 });
    enemySpawns.push({ type: 'goomba', x: 50 });
    enemySpawns.push({ type: 'goomba', x: 52 });
    enemySpawns.push({ type: 'goomba', x: 80 });
    enemySpawns.push({ type: 'goomba', x: 96 });
    enemySpawns.push({ type: 'goomba', x: 98 });
    enemySpawns.push({ type: 'goomba', x: 137 });
    enemySpawns.push({ type: 'goomba', x: 140 });
    enemySpawns.push({ type: 'goomba', x: 170 });
    // Koopa
    enemySpawns.push({ type: 'koopa', x: 110 });

    // -- coin placements --
    // air coins near early blocks
    coinSpawns.push([7.5, 2.5], [9.5, 2.5], [11.5, 2.5]);
    coinSpawns.push([16.5, 6], [21.5, 6], [23.5, 6]);
    // above pipes
    coinSpawns.push([30.5, 4.5], [41, 5.5], [49, 6.5]);
    // along coin-brick row at 77-79 (under)
    coinSpawns.push([77.5, 6.5], [78.5, 6.5], [79.5, 6.5]);
    // around 98 qblock and floating bricks
    coinSpawns.push([94.5, 6], [99.5, 6], [108.5, 6.5], [110.5, 6.5]);
    // floating platform over big pit
    coinSpawns.push([122.5, 8.5], [123.5, 8.5], [124.5, 8.5], [125.5, 8.5]);
    // mid-floating row at 133-136
    coinSpawns.push([133.5, 9.5], [134.5, 9.5], [135.5, 9.5], [136.5, 9.5]);
    // late game
    coinSpawns.push([147, 2.5], [165, 2.5], [173, 2.5]);
}

///////////////////////////////////////////////////////////////////////////////
// Sound
///////////////////////////////////////////////////////////////////////////////

const sfxJump  = new SoundGenerator({ volume:.55, frequency:420, attack:0, release:.16, slide:.04, randomness:.02 });
const sfxBump  = new SoundGenerator({ volume:.4,  frequency:160, attack:0, release:.08, shapeCurve:0.6, noise:.1 });
const sfxWin   = new SoundGenerator({ volume:.55, frequency:330, attack:0, release:.30, pitchJump:280, pitchJumpTime:.10, slide:-.08 });
const sfxCoin  = new SoundGenerator({ volume:.45, frequency:900, attack:0, release:.10, pitchJump:1200, pitchJumpTime:.02, shapeCurve:1.6 });
const sfxStomp = new SoundGenerator({ volume:.5,  frequency:240, attack:0, release:.10, slide:-.15, noise:.15 });
const sfxKick  = new SoundGenerator({ volume:.55, frequency:520, attack:0, release:.12, slide:.10, shapeCurve:1.2 });
const sfxHurt  = new SoundGenerator({ volume:.6,  frequency:200, attack:.01, release:.45, slide:-.12, pitchJump:-80, pitchJumpTime:.08 });
const sfxGrow    = new SoundGenerator({ volume:.55, frequency:330, attack:0,    release:.45, slide:.20, pitchJump:280, pitchJumpTime:.18, shapeCurve:1.5 });
const sfxStar    = new SoundGenerator({ volume:.55, frequency:660, attack:0,    release:.35, slide:.18, pitchJump:240, pitchJumpTime:.08, shapeCurve:2 });
const sfxBreak   = new SoundGenerator({ volume:.5,  frequency:240, attack:0,    release:.20, noise:.65, slide:-.10 });
const sfxShrink  = new SoundGenerator({ volume:.55, frequency:420, attack:0,    release:.35, slide:-.18, pitchJump:-220, pitchJumpTime:.15, shapeCurve:1.2 });

///////////////////////////////////////////////////////////////////////////////
// Coin pickup (collectible, hovers/bounces)
///////////////////////////////////////////////////////////////////////////////

let coinsCollected = 0;

class Coin extends EngineObject
{
    constructor(pos)
    {
        super(pos, vec2(.55));
        this.baseY = pos.y;
        this.phase = rand(9e9);
        this.setCollision(false, false, false, false);
    }
    updatePhysics() {}
    update()
    {
        this.pos.y = this.baseY + oscillate(2, 1, time + this.phase) * .14;
        if (!player || player.dead) return;
        const dx = abs(player.pos.x - this.pos.x);
        const dy = abs(player.pos.y - this.pos.y);
        if (dx < player.size.x*.5 + .35 && dy < player.size.y*.5 + .45)
        {
            coinsCollected++;
            sfxCoin.play(this.pos);
            this.destroy();
        }
    }
    render()
    {
        // spin: width oscillates so the coin looks like it's rotating about a vertical axis.
        // sign of the sine tells which face is showing (lighter front / darker back).
        const spin = time * 5 + this.phase * 2;
        const s = Math.sin(spin);
        const w = Math.abs(s) * .42 + .08;   // 0.08 .. 0.50
        const h = .85;
        const facing = s > 0;

        // dark outline
        drawEllipse(this.pos, vec2(w + .08, h + .08), rgb(.45, .28, .04));
        // body (face vs back side)
        drawEllipse(this.pos, vec2(w, h), facing ? rgb(1, .92, .25) : rgb(.78, .58, .12));
        // inner detail only when wide enough to see
        if (w > .18)
        {
            drawEllipse(this.pos, vec2(w * .55, h * .65),
                facing ? rgb(.95, .75, .12) : rgb(.55, .40, .08));
            if (facing)
                drawEllipse(this.pos.add(vec2(-w * .30, h * .12)),
                    vec2(w * .25, h * .30), rgb(1, 1, 1, .65));
        }
    }
}

// Popped from a ? block. Auto-counts, flies up, despawns.
class PopCoin extends EngineObject
{
    constructor(pos)
    {
        super(pos, vec2(.5));
        this.vel = vec2(0, .38);
        this.life = 0;
        this.setCollision(false, false, false, false);
    }
    updatePhysics() {}
    update()
    {
        this.life++;
        this.pos = this.pos.add(this.vel);
        this.vel.y -= .024;
        if (this.life > 28) this.destroy();
    }
    render()
    {
        const sx = .26 + Math.cos(this.life * .8) * .22;
        drawEllipse(this.pos, vec2(Math.abs(sx), .44), rgb(1, .88, .2));
        drawEllipse(this.pos, vec2(Math.abs(sx) + .04, .48), rgb(.6, .4, .05, .5));
    }
}

///////////////////////////////////////////////////////////////////////////////
// Brick chunks (when Big Mario breaks a brick)
///////////////////////////////////////////////////////////////////////////////

class BrickChunk extends EngineObject
{
    constructor(pos, vel)
    {
        super(pos, vec2(.35));
        this.vel = vel;
        this.life = 0;
        this.angle = 0;
        this.spin = (Math.random() - .5) * .4;
        this.setCollision(false, false, false, false);
    }
    updatePhysics() {}
    update()
    {
        this.life++;
        this.pos = this.pos.add(this.vel);
        this.vel.y -= .026;
        this.angle += this.spin;
        if (this.life > 70) this.destroy();
    }
    render()
    {
        // a small brick fragment (rough rotation via offsets)
        drawRect(this.pos, vec2(.35), rgb(.78, .35, .14), this.angle);
        drawRect(this.pos, vec2(.30, .08), rgb(.4, .15, .05), this.angle);
    }
}

///////////////////////////////////////////////////////////////////////////////
// Mushroom (Big-Mario power-up)
///////////////////////////////////////////////////////////////////////////////

const MUSHROOM_SPEED = .10;

class Mushroom extends EngineObject
{
    constructor(pos)
    {
        super(pos, vec2(.9, .9));
        this.vel = vec2(0, 0);
        this.facing = 1;
        this.onGround = false;
        // emerge: slowly rise out of the block before behaving as a walker
        this.emerging = true;
        this.emergeStartY = pos.y;
        this.emergeTargetY = pos.y + 1;
        this.emergeTimer = 36;
        this.setCollision(false, false, false, false);
    }
    updatePhysics() {}

    update()
    {
        if (this.emerging)
        {
            const t = 1 - this.emergeTimer / 36;
            this.pos.y = lerp(t, this.emergeStartY, this.emergeTargetY);
            this.emergeTimer--;
            if (this.emergeTimer <= 0)
            {
                this.emerging = false;
                this.vel.x = MUSHROOM_SPEED;
            }
            this.checkPickup();
            return;
        }

        // simple tile collision (walks off ledges, turns at walls)
        Enemy.prototype.moveAndCollideTiles.call(this, false);
        this.checkPickup();
    }

    checkPickup()
    {
        if (!player || player.dead) return;
        const dx = Math.abs(player.pos.x - this.pos.x);
        const dy = Math.abs(player.pos.y - this.pos.y);
        if (dx < (player.size.x + this.size.x) * .5 && dy < (player.size.y + this.size.y) * .5)
        {
            player.grow();
            this.destroy();
        }
    }

    render()
    {
        // cap (red with white spots)
        drawEllipse(this.pos.add(vec2(0, .12)), vec2(1.0, .70), rgb(.95, .15, .15));
        drawRect(this.pos.add(vec2(0, -.08)), vec2(1.0, .12), rgb(.95, .15, .15));
        // white spots
        drawEllipse(this.pos.add(vec2(-.27, .22)), vec2(.20, .14), rgb(1, 1, 1));
        drawEllipse(this.pos.add(vec2(.22, .17)),  vec2(.20, .14), rgb(1, 1, 1));
        drawEllipse(this.pos.add(vec2(0, .32)),    vec2(.16, .12), rgb(1, 1, 1));
        // cap rim
        drawRect(this.pos.add(vec2(0, -.10)), vec2(1.05, .08), rgb(.55, .03, .03));
        // stem (cream)
        drawRect(this.pos.add(vec2(0, -.28)), vec2(.55, .38), rgb(.98, .85, .65));
        // eyes
        drawRect(this.pos.add(vec2(-.12, -.25)), vec2(.06, .14), rgb(0, 0, 0));
        drawRect(this.pos.add(vec2(.12,  -.25)), vec2(.06, .14), rgb(0, 0, 0));
    }
}

///////////////////////////////////////////////////////////////////////////////
// Star (Starman invincibility)
///////////////////////////////////////////////////////////////////////////////

class Star extends EngineObject
{
    constructor(pos)
    {
        super(pos, vec2(.85, .85));
        this.vel = vec2(0, 0);
        this.facing = 1;
        this.onGround = false;
        this.emerging = true;
        this.emergeStartY = pos.y;
        this.emergeTargetY = pos.y + 1;
        this.emergeTimer = 28;
        this.setCollision(false, false, false, false);
    }
    updatePhysics() {}

    update()
    {
        if (this.emerging)
        {
            const t = 1 - this.emergeTimer / 28;
            this.pos.y = lerp(t, this.emergeStartY, this.emergeTargetY);
            this.emergeTimer--;
            if (this.emergeTimer <= 0)
            {
                this.emerging = false;
                this.vel = vec2(.14, .35);
            }
            this.checkPickup();
            return;
        }

        Enemy.prototype.moveAndCollideTiles.call(this, false);
        // continuous bounce
        if (this.onGround) this.vel.y = .42;

        this.checkPickup();
    }

    checkPickup()
    {
        if (!player || player.dead) return;
        const dx = Math.abs(player.pos.x - this.pos.x);
        const dy = Math.abs(player.pos.y - this.pos.y);
        if (dx < (player.size.x + this.size.x) * .5 && dy < (player.size.y + this.size.y) * .5)
        {
            player.starPower();
            this.destroy();
        }
    }

    render()
    {
        // pulsing rainbow 5-pointed star
        const pulse = .55 + Math.sin(time * 14) * .08;
        const hue = (time * 2.5 + this.pos.x * .05) % 1;
        const c = hsl(hue, 1, .65);
        const points = [];
        for (let i = 0; i < 10; i++)
        {
            const a = i * Math.PI / 5 - Math.PI / 2;
            const rad = (i % 2 === 0) ? pulse : pulse * .42;
            points.push(vec2(Math.cos(a) * rad, Math.sin(a) * rad));
        }
        drawPoly(points, c, .04, rgb(.25, .15, 0, 1), this.pos);
    }
}

///////////////////////////////////////////////////////////////////////////////
// Enemy base (custom tile collision, like the player)
///////////////////////////////////////////////////////////////////////////////

const ENEMY_GRAVITY = .025;
const ENEMY_TERMINAL = -.7;

class Enemy extends EngineObject
{
    constructor(pos, size)
    {
        super(pos, size);
        this.vel = vec2(0, 0);
        this.facing = -1;
        this.onGround = false;
        this.dead = false;
        this.deadTimer = 0;
        this.setCollision(false, false, false, false);
    }

    updatePhysics() {}

    // Returns true if collided horizontally this frame.
    moveAndCollideTiles(turnAtEdges = false)
    {
        const half = this.size.scale(.5);
        let bumpedWall = false;

        // gravity
        this.vel.y -= ENEMY_GRAVITY;
        this.vel.y = max(this.vel.y, ENEMY_TERMINAL);

        // ---- X ----
        this.pos.x += this.vel.x;
        if (this.vel.x)
        {
            const y0 = floor(this.pos.y - half.y + .001);
            const y1 = floor(this.pos.y + half.y - .001);
            if (this.vel.x > 0)
            {
                const xSide = floor(this.pos.x + half.x);
                for (let y = y0; y <= y1; y++)
                if (isSolidAt(xSide, y))
                {
                    this.pos.x = xSide - half.x;
                    this.vel.x = -Math.abs(this.vel.x);
                    this.facing = -1;
                    bumpedWall = true;
                    break;
                }
            }
            else
            {
                const xSide = floor(this.pos.x - half.x);
                for (let y = y0; y <= y1; y++)
                if (isSolidAt(xSide, y))
                {
                    this.pos.x = xSide + 1 + half.x;
                    this.vel.x = Math.abs(this.vel.x);
                    this.facing = 1;
                    bumpedWall = true;
                    break;
                }
            }
        }

        // ---- Y ----
        const wasOnGround = this.onGround;
        this.onGround = false;
        this.pos.y += this.vel.y;
        if (this.vel.y)
        {
            const x0 = floor(this.pos.x - half.x + .001);
            const x1 = floor(this.pos.x + half.x - .001);
            if (this.vel.y > 0)
            {
                const ySide = floor(this.pos.y + half.y);
                for (let x = x0; x <= x1; x++)
                if (isSolidAt(x, ySide))
                {
                    this.pos.y = ySide - half.y;
                    this.vel.y = 0;
                    break;
                }
            }
            else
            {
                const ySide = floor(this.pos.y - half.y);
                for (let x = x0; x <= x1; x++)
                if (isSolidAt(x, ySide))
                {
                    this.pos.y = ySide + 1 + half.y;
                    this.vel.y = 0;
                    this.onGround = true;
                    break;
                }
            }
        }

        // turn at ledges (Koopa)
        if (turnAtEdges && this.onGround && this.vel.x !== 0)
        {
            const aheadX = floor(this.pos.x + this.facing * (half.x + .1));
            const belowY = floor(this.pos.y - half.y - .1);
            if (!isSolidAt(aheadX, belowY))
            {
                this.vel.x = -this.vel.x;
                this.facing = -this.facing;
            }
        }

        // fell off the world
        if (this.pos.y < -10) this.destroy();

        return bumpedWall;
    }

    // AABB overlap helper
    overlaps(other)
    {
        return Math.abs(this.pos.x - other.pos.x) < (this.size.x + other.size.x) * .5
            && Math.abs(this.pos.y - other.pos.y) < (this.size.y + other.size.y) * .5;
    }

    // Death animation (flipped/squashed). Subclasses call when killed.
    deathFall()
    {
        this.deadTimer++;
        this.vel.y -= .03;
        this.pos = this.pos.add(this.vel);
        if (this.deadTimer > 50) this.destroy();
    }
}

///////////////////////////////////////////////////////////////////////////////
// Goomba
///////////////////////////////////////////////////////////////////////////////

const GOOMBA_SPEED = .04;

class Goomba extends Enemy
{
    constructor(pos)
    {
        super(pos, vec2(.9, .9));
        this.vel.x = -GOOMBA_SPEED;
        this.squished = false;
        this.squishTimer = 0;
    }

    update()
    {
        if (this.dead) { this.deathFall(); return; }

        if (this.squished)
        {
            this.squishTimer++;
            if (this.squishTimer > 30) this.destroy();
            return;
        }

        // walk + fall off edges
        this.moveAndCollideTiles(false);

        // collide with other enemies (turn around)
        for (const e of engineObjects)
        {
            if (e === this || !(e instanceof Enemy) || e.dead || e.squished) continue;
            if (this.overlaps(e))
            {
                // shell kicks kill goombas (handled by shell), but goomba-vs-goomba just swap
                if (e instanceof Koopa && e.state === 'kicked')
                {
                    this.kill(Math.sign(e.vel.x));
                    sfxKick.play(this.pos);
                    return;
                }
                if (e instanceof Goomba)
                {
                    if (Math.sign(this.pos.x - e.pos.x) !== Math.sign(this.vel.x))
                    {
                        this.vel.x = -this.vel.x;
                        this.facing = -this.facing;
                    }
                }
            }
        }

        // player interaction
        if (!player || player.dead) return;
        if (!this.overlaps(player)) return;

        if (player.isStarPowered())
        {
            this.kill(player.facing);
            sfxStomp.play(this.pos);
            return;
        }

        const dy = player.pos.y - this.pos.y;
        if (player.vel.y < -.05 && dy > .2)
        {
            // stomped
            this.squished = true;
            this.vel.x = 0;
            player.onStomp();
            sfxStomp.play(this.pos);
        }
        else
        {
            player.hurt();
        }
    }

    kill(dir)
    {
        this.dead = true;
        this.vel = vec2(.1 * (dir || 1), .35);
    }

    render()
    {
        if (this.dead)
        {
            // flipped upside-down
            drawRect(this.pos, vec2(.85, .55), rgb(.55, .30, .08));
            drawRect(this.pos.add(vec2(0, .25)), vec2(.7, .25), rgb(.7, .42, .15));
            return;
        }

        const sq = this.squished;
        const h  = sq ? .25 : .8;
        const yo = sq ? -.3 : 0;

        // body
        drawRect(this.pos.add(vec2(0, yo + .05)), vec2(.85, h), rgb(.55, .30, .08));
        // head highlight
        drawRect(this.pos.add(vec2(0, yo + .25)), vec2(.65, h * .35), rgb(.7, .42, .15));

        if (!sq)
        {
            // eyes
            drawRect(this.pos.add(vec2(-.18, .15)), vec2(.13, .18), rgb(1, 1, 1));
            drawRect(this.pos.add(vec2(.18, .15)),  vec2(.13, .18), rgb(1, 1, 1));
            drawRect(this.pos.add(vec2(-.16, .12)), vec2(.06, .12), rgb(0, 0, 0));
            drawRect(this.pos.add(vec2(.20, .12)),  vec2(.06, .12), rgb(0, 0, 0));
            // feet shuffle
            const fp = Math.sin(time * 10) * .06;
            drawRect(this.pos.add(vec2(-.22, -.42 + fp)), vec2(.24, .14), rgb(.35, .18, .05));
            drawRect(this.pos.add(vec2(.22, -.42 - fp)),  vec2(.24, .14), rgb(.35, .18, .05));
        }
    }
}

///////////////////////////////////////////////////////////////////////////////
// Koopa Troopa (walking → shell → kicked)
///////////////////////////////////////////////////////////////////////////////

const KOOPA_SPEED = .035;
const SHELL_SPEED = .35;

class Koopa extends Enemy
{
    constructor(pos)
    {
        super(pos, vec2(.85, 1.0));
        this.vel.x = -KOOPA_SPEED;
        this.state = 'walk';     // 'walk' | 'shell' | 'kicked'
        this.stateTimer = 0;
        this.kickCooldown = 0;   // prevents re-kick on same touch
    }

    update()
    {
        if (this.dead) { this.deathFall(); return; }

        this.stateTimer++;
        if (this.kickCooldown > 0) this.kickCooldown--;

        if (this.state === 'walk')
        {
            this.moveAndCollideTiles(true); // turn at edges
        }
        else if (this.state === 'shell')
        {
            this.vel.x = 0;
            this.moveAndCollideTiles(false);
            // shells stay shelled forever (no auto-revive — simpler)
        }
        else // kicked
        {
            const wallHit = this.moveAndCollideTiles(false);
            if (wallHit) sfxBump.play(this.pos);

            // kicked shell vs other enemies
            for (const e of engineObjects)
            {
                if (e === this || !(e instanceof Enemy) || e.dead) continue;
                if (e instanceof Koopa && e.state === 'kicked') continue;
                if (this.overlaps(e))
                {
                    if (e instanceof Goomba && !e.squished)
                    {
                        e.kill(Math.sign(this.vel.x));
                        sfxKick.play(this.pos);
                    }
                    else if (e instanceof Koopa)
                    {
                        if (e.state === 'walk') {
                            e.kill(Math.sign(this.vel.x));
                            sfxKick.play(this.pos);
                        }
                        else if (e.state === 'shell')
                        {
                            // bounce off shelled koopa, also kicks it
                            e.kickInDir(Math.sign(this.vel.x));
                        }
                    }
                }
            }
        }

        // player interaction
        if (!player || player.dead) return;
        if (!this.overlaps(player)) return;

        if (player.isStarPowered())
        {
            this.kill(player.facing);
            sfxStomp.play(this.pos);
            return;
        }

        const dy = player.pos.y - this.pos.y;
        const stomp = player.vel.y < -.05 && dy > .15;

        if (this.state === 'walk')
        {
            if (stomp)
            {
                this.state = 'shell';
                this.size = vec2(.95, .55);
                this.vel.x = 0;
                this.stateTimer = 0;
                player.onStomp();
                sfxStomp.play(this.pos);
            }
            else player.hurt();
        }
        else if (this.state === 'shell')
        {
            if (stomp)
            {
                // re-stomp on still shell does nothing extra
                player.onStomp();
                sfxStomp.play(this.pos);
            }
            else if (this.kickCooldown === 0)
            {
                this.kickInDir(player.pos.x < this.pos.x ? 1 : -1);
            }
        }
        else // kicked
        {
            if (stomp)
            {
                // stop it
                this.state = 'shell';
                this.vel.x = 0;
                this.kickCooldown = 8;
                player.onStomp();
                sfxStomp.play(this.pos);
            }
            else player.hurt();
        }
    }

    kickInDir(dir)
    {
        this.state = 'kicked';
        this.vel.x = SHELL_SPEED * dir;
        this.facing = dir;
        this.kickCooldown = 12;
        this.stateTimer = 0;
        sfxKick.play(this.pos);
    }

    kill(dir)
    {
        this.dead = true;
        this.vel = vec2(.1 * (dir || 1), .35);
    }

    render()
    {
        if (this.dead)
        {
            drawRect(this.pos, vec2(.95, .55), rgb(.95, .85, .25));
            return;
        }

        if (this.state === 'walk')
        {
            // legs (shuffle)
            const fp = Math.sin(time * 9) * .05;
            drawRect(this.pos.add(vec2(-.18, -.42 + fp)), vec2(.22, .14), rgb(.95, .78, .18));
            drawRect(this.pos.add(vec2(.18,  -.42 - fp)), vec2(.22, .14), rgb(.95, .78, .18));
            // body (shell)
            drawRect(this.pos.add(vec2(0, -.05)), vec2(.85, .55), rgb(.18, .65, .25));
            drawRect(this.pos.add(vec2(0, -.05)), vec2(.65, .35), rgb(.10, .45, .15));
            // shell rim
            drawRect(this.pos.add(vec2(0, .25)),  vec2(.92, .15), rgb(.9, .78, .18));
            // head
            drawRect(this.pos.add(vec2(this.facing * .15, .38)), vec2(.45, .35), rgb(.30, .80, .30));
            // eye
            drawRect(this.pos.add(vec2(this.facing * .28, .45)), vec2(.10, .10), rgb(1, 1, 1));
            drawRect(this.pos.add(vec2(this.facing * .31, .43)), vec2(.05, .07), rgb(0, 0, 0));
        }
        else
        {
            // shell on the ground
            const spinPhase = this.state === 'kicked' ? this.stateTimer * .6 : 0;
            drawRect(this.pos, vec2(.95, .55), rgb(.18, .65, .25));
            drawRect(this.pos.add(vec2(0, .18)), vec2(.95, .12), rgb(.10, .45, .15));
            // spinning pattern: an offset stripe
            const pxOff = Math.cos(spinPhase) * .25;
            drawRect(this.pos.add(vec2(pxOff, -.05)), vec2(.18, .35), rgb(.10, .45, .15));
            // rim
            drawRect(this.pos.add(vec2(0, .22)), vec2(1.0, .12), rgb(.95, .82, .18));
        }
    }
}

///////////////////////////////////////////////////////////////////////////////
// Player
///////////////////////////////////////////////////////////////////////////////

let player;
let cameraMinX = 0;

class Player extends EngineObject
{
    constructor(pos)
    {
        super(pos, vec2(.9, 1));
        this.vel = vec2();
        this.onGround = false;
        this.facing = 1;
        this.won = false;
        this.winTimer = 0;
        this.winStartY = 0; // captured at pole-touch; the height Mario slides from
        this.dead = false;
        this.deadTimer = 0;

        this.prevJumpDown = false;
        this.coyoteTimer = 0;
        this.bufferTimer = 0;
        this.jumpHolding = false;

        // power-up state
        this.powerState = 'small';   // 'small' | 'big'
        this.starTimer = 0;          // frames of star invincibility
        this.damageFlash = 0;        // frames of post-shrink invulnerability (flicker)

        this.setCollision(false, false, false, false);
    }

    isStarPowered() { return this.starTimer > 0; }

    grow()
    {
        if (this.powerState === 'big')
        {
            // already big: bonus coin (SMB behavior when picking up a second mushroom)
            coinsCollected++;
            sfxCoin.play(this.pos);
            return;
        }
        this.powerState = 'big';
        this.size = vec2(.9, 1.8);
        this.pos = this.pos.add(vec2(0, .4));
        sfxGrow.play(this.pos);
    }

    starPower()
    {
        this.starTimer = 600; // ~10s
        sfxStar.play(this.pos);
    }

    updatePhysics() {}

    // SMB-style tuning. Held jump = floaty ascent; release/fall = snappy.
    // Jump velocity scales with horizontal speed (Mario jumps higher when running).
    static WALK_ACCEL    = .009;
    static RUN_ACCEL     = .013;
    static WALK_MAX      = .18;
    static RUN_MAX       = .30;
    static AIR_ACCEL_MUL = .65;
    static SKID_DECEL    = .07;
    static IDLE_FRICTION = .89;
    static GRAVITY_RISE_HOLD = .020; // held jump = floaty ascent (lower = higher jump)
    static GRAVITY_RISE_FREE = .032; // released mid-jump = snappier
    static GRAVITY_FALL      = .036; // descending
    static JUMP_CUT          = .35;  // upward vel multiplier when jump released
    static JUMP_VEL_BASE     = .43;  // standing jump impulse
    static JUMP_VEL_RUN_BONUS = .05; // small bonus at full run speed (set to 0 to disable)
    static TERMINAL_VEL = -.75;      // max fall speed
    static STOMP_BOUNCE = .32;
    static STOMP_BOUNCE_HELD = .42;
    static COYOTE_FRAMES = 6;
    static BUFFER_FRAMES = 6;

    update()
    {
        if (this.dead)
        {
            this.deadTimer++;
            // hop + fall
            this.vel.y -= .025;
            this.pos = this.pos.add(this.vel);
            if (this.deadTimer > 60) respawn();
            return;
        }

        if (this.won)
        {
            this.runWinSequence();
            return;
        }

        const P = Player;

        if (this.starTimer > 0) this.starTimer--;
        if (this.damageFlash > 0) this.damageFlash--;

        const moveDirection = keyDirection();
        const left  = moveDirection.x < 0;
        const right = moveDirection.x > 0;
        const run   = keyIsDown('ShiftLeft') || keyIsDown('ShiftRight') || keyIsDown('KeyX');
        const jumpDown = keyIsDown('Space') || keyIsDown('ArrowUp') || keyIsDown('KeyZ');
        const jumpPressed = jumpDown && !this.prevJumpDown;

        const accel = run ? P.RUN_ACCEL : P.WALK_ACCEL;
        const maxSpeed = run ? P.RUN_MAX : P.WALK_MAX;

        if (this.onGround) this.coyoteTimer = P.COYOTE_FRAMES;
        else if (this.coyoteTimer > 0) this.coyoteTimer--;

        if (jumpPressed) this.bufferTimer = P.BUFFER_FRAMES;
        else if (this.bufferTimer > 0) this.bufferTimer--;

        if (!this.won)
        {
            // skid first
            if (this.onGround && left && this.vel.x > 0)
            {
                this.vel.x = max(0, this.vel.x - P.SKID_DECEL);
                this.facing = -1;
            }
            else if (this.onGround && right && this.vel.x < 0)
            {
                this.vel.x = min(0, this.vel.x + P.SKID_DECEL);
                this.facing = 1;
            }
            else if (left)
            {
                this.vel.x -= accel * (this.onGround ? 1 : P.AIR_ACCEL_MUL);
                this.facing = -1;
            }
            else if (right)
            {
                this.vel.x += accel * (this.onGround ? 1 : P.AIR_ACCEL_MUL);
                this.facing = 1;
            }
            else if (this.onGround)
                this.vel.x *= P.IDLE_FRICTION;

            this.vel.x = this.onGround
                ? clamp(this.vel.x, -maxSpeed, maxSpeed)
                : clamp(this.vel.x, -P.RUN_MAX, P.RUN_MAX);

            // jump: scale velocity with horizontal speed (SMB-style)
            if (this.bufferTimer > 0 && this.coyoteTimer > 0)
            {
                const speedFrac = Math.abs(this.vel.x) / P.RUN_MAX;
                this.vel.y = P.JUMP_VEL_BASE + P.JUMP_VEL_RUN_BONUS * speedFrac;
                this.coyoteTimer = 0;
                this.bufferTimer = 0;
                this.onGround = false;
                this.jumpHolding = true;
                sfxJump.play(this.pos);
            }

            // short hop
            const jumpReleased = !jumpDown && this.prevJumpDown;
            if (jumpReleased && this.vel.y > 0)
            {
                this.vel.y *= P.JUMP_CUT;
                this.jumpHolding = false;
            }
            if (!jumpDown) this.jumpHolding = false;
        }

        // gravity
        let g;
        if (this.vel.y > 0) g = this.jumpHolding ? P.GRAVITY_RISE_HOLD : P.GRAVITY_RISE_FREE;
        else                g = P.GRAVITY_FALL;
        this.vel.y -= g;
        this.vel.y = max(this.vel.y, P.TERMINAL_VEL);

        this.moveAndCollide();

        // goal: touching the pole (right edge of player overlaps pole column)
        if (this.pos.x >= 191.5)
        {
            this.won = true;
            this.winTimer = 0;
            this.winStartY = this.pos.y;
            this.pos.x = 192;        // snap so Mario's right side is on the pole
            this.vel = vec2(0, 0);
            this.facing = 1;
            sfxWin.play(this.pos);
        }

        this.prevJumpDown = jumpDown;

        // fell off — always lethal regardless of Big/Star state
        if (this.pos.y < -10 && !this.dead)
        {
            this.dead = true;
            this.deadTimer = 0;
            this.vel = vec2(0, .45);
            sfxHurt.play(this.pos);
        }
    }

    onStomp()
    {
        // bounce. held-jump = bigger bounce.
        this.vel.y = this.jumpHolding ? Player.STOMP_BOUNCE_HELD : Player.STOMP_BOUNCE;
    }

    runWinSequence()
    {
        this.winTimer++;
        const t = this.winTimer;
        const big = this.powerState === 'big';
        const baseY = big ? 2.9 : 2.5; // feet on top of the base block at the pole
        const hasSlide = this.winStartY > baseY + .1;

        if (hasSlide)
        {
            if (t <= 36)
            {
                this.pos.y = lerp(t / 36, this.winStartY, baseY);
                this.vel = vec2(0, 0);
                this.facing = 1;
                return;
            }
            if (t < 70)
            {
                this.pos.y = baseY;
                this.vel = vec2(0, 0);
                this.facing = 1;
                return;
            }
            if (t === 70)
            {
                // hop off the pole to the right
                this.pos.x = 193;
                this.vel = vec2(.18, .26);
            }
        }
        else
        {
            // walked into the pole at ground level: skip the slide, short pause
            if (t < 28)
            {
                this.pos.y = baseY;
                this.vel = vec2(0, 0);
                this.facing = 1;
                return;
            }
            if (t === 28)
            {
                this.pos.x = 193;
                this.vel = vec2(.18, .26);
            }
        }

        // walking phase: simple gravity + walk right, no controls
        this.vel.y -= Player.GRAVITY_FALL;
        this.vel.y = max(this.vel.y, Player.TERMINAL_VEL);
        this.moveAndCollide();
        if (this.onGround) this.vel.x = .14;
        if (this.pos.x > 210) this.vel.x = 0; // stop before the level edge
        this.facing = 1;
    }

    hurt()
    {
        if (this.dead || this.won) return;
        if (this.starTimer > 0 || this.damageFlash > 0) return;

        if (this.powerState === 'big')
        {
            // shrink + brief i-frames
            this.powerState = 'small';
            this.size = vec2(.9, 1);
            this.pos = this.pos.add(vec2(0, -.4));
            this.damageFlash = 90;
            sfxShrink.play(this.pos);
            return;
        }

        this.dead = true;
        this.deadTimer = 0;
        this.vel = vec2(0, .45);
        sfxHurt.play(this.pos);
    }

    moveAndCollide()
    {
        const half = this.size.scale(.5);

        // ---- X ----
        this.pos.x += this.vel.x;
        if (this.vel.x)
        {
            const y0 = floor(this.pos.y - half.y + .001);
            const y1 = floor(this.pos.y + half.y - .001);
            if (this.vel.x > 0)
            {
                const xSide = floor(this.pos.x + half.x);
                for (let y = y0; y <= y1; y++)
                if (isSolidAt(xSide, y))
                {
                    this.pos.x = xSide - half.x;
                    this.vel.x = 0;
                    break;
                }
            }
            else
            {
                const xSide = floor(this.pos.x - half.x);
                for (let y = y0; y <= y1; y++)
                if (isSolidAt(xSide, y))
                {
                    this.pos.x = xSide + 1 + half.x;
                    this.vel.x = 0;
                    break;
                }
            }
        }

        // ---- Y ----
        this.onGround = false;
        this.pos.y += this.vel.y;
        if (this.vel.y)
        {
            const x0 = floor(this.pos.x - half.x + .001);
            const x1 = floor(this.pos.x + half.x - .001);

            if (this.vel.y > 0)
            {
                const ySide = floor(this.pos.y + half.y);
                let hitX = -1;
                for (let x = x0; x <= x1; x++)
                if (isSolidAt(x, ySide))
                {
                    hitX = x;
                    this.pos.y = ySide - half.y;
                    this.vel.y = 0;
                    break;
                }
                if (hitX >= 0)
                {
                    const t = getTile(hitX, ySide);
                    const blockCenter = vec2(hitX + .5, ySide + .5);
                    if (t === TT.QBLOCK)
                    {
                        setTile(hitX, ySide, TT.USED);
                        bumpTile(hitX, ySide);
                        const content = qBlockContents.get(tileKey(hitX, ySide)) || 'coin';
                        if (content === 'mushroom')
                        {
                            new Mushroom(blockCenter);
                            sfxBump.play(blockCenter);
                        }
                        else if (content === 'star')
                        {
                            new Star(blockCenter);
                            sfxBump.play(blockCenter);
                        }
                        else
                        {
                            new PopCoin(vec2(hitX + .5, ySide + 1.2));
                            coinsCollected++;
                            sfxCoin.play(blockCenter);
                        }
                    }
                    else if (t === TT.BRICK)
                    {
                        if (this.powerState === 'big')
                        {
                            // shatter the brick
                            setTile(hitX, ySide, TT.EMPTY);
                            for (let i = 0; i < 4; i++)
                            {
                                const vx = (i < 2 ? -1 : 1) * (.08 + rand(0, .06));
                                const vy = .28 + rand(0, .12) + (i % 2) * .12;
                                new BrickChunk(blockCenter, vec2(vx, vy));
                            }
                            sfxBreak.play(blockCenter);
                        }
                        else
                        {
                            bumpTile(hitX, ySide);
                            sfxBump.play(blockCenter);
                        }
                    }
                    else
                        sfxBump.play(this.pos);
                }
            }
            else
            {
                const ySide = floor(this.pos.y - half.y);
                for (let x = x0; x <= x1; x++)
                if (isSolidAt(x, ySide))
                {
                    this.pos.y = ySide + 1 + half.y;
                    this.vel.y = 0;
                    this.onGround = true;
                    break;
                }
            }
        }
    }

    render()
    {
        if (this.dead && this.deadTimer < 4) return;

        // post-shrink invulnerability flicker (skip every other tick)
        if (this.damageFlash > 0 && Math.floor(time * 30) % 2 === 0) return;

        const big = this.powerState === 'big';
        const lean = this.facing * Math.min(.12, Math.abs(this.vel.x) * .4);

        // star power cycles palette
        let bodyC, shirtC, hatC, skinC;
        if (this.starTimer > 0)
        {
            const hue = (time * 12) % 1;
            bodyC  = hsl(hue, .9, .50);
            shirtC = hsl((hue + .3) % 1, .9, .60);
            hatC   = hsl((hue + .15) % 1, .9, .45);
            skinC  = hsl((hue + .5) % 1, .8, .70);
        }
        else
        {
            bodyC  = rgb(.85, .15, .15);
            shirtC = rgb(.95, .25, .15);
            hatC   = rgb(.65, .05, .05);
            skinC  = rgb(.95, .80, .60);
        }

        const walking = this.onGround && Math.abs(this.vel.x) > .02;
        const wp = walking ? Math.sin(time * 14) * .06 : 0;

        if (big)
        {
            // shoes
            drawRect(this.pos.add(vec2(-.18, -.82 + wp)), vec2(.26, .14), rgb(.40, .20, .05));
            drawRect(this.pos.add(vec2(.18,  -.82 - wp)), vec2(.26, .14), rgb(.40, .20, .05));
            // overalls / legs
            drawRect(this.pos.add(vec2(0, -.32)), vec2(.85, .85), bodyC);
            // buckles
            drawRect(this.pos.add(vec2(-.20, .10)), vec2(.10, .10), rgb(1, 1, .2));
            drawRect(this.pos.add(vec2(.20, .10)),  vec2(.10, .10), rgb(1, 1, .2));
            // shirt + arms
            drawRect(this.pos.add(vec2(lean * .3, .30)), vec2(.85, .50), shirtC);
            drawRect(this.pos.add(vec2(-.46 + lean * .3, .25)), vec2(.20, .40), bodyC);
            drawRect(this.pos.add(vec2(.46 + lean * .3, .25)),  vec2(.20, .40), bodyC);
            // face
            drawRect(this.pos.add(vec2(lean * .5, .56)), vec2(.62, .28), skinC);
            drawRect(this.pos.add(vec2(this.facing * .14 + lean * .5, .60)), vec2(.10, .14), rgb(0, 0, 0));
            drawRect(this.pos.add(vec2(this.facing * .12 + lean * .5, .48)), vec2(.26, .07), rgb(.20, .10, .05));
            // cap
            drawRect(this.pos.add(vec2(lean, .80)), vec2(.88, .24), hatC);
            drawRect(this.pos.add(vec2(this.facing * .28 + lean, .72)), vec2(.46, .12), hatC);
        }
        else
        {
            drawRect(this.pos.add(vec2(0, -.22)), vec2(.85, .55), bodyC);
            drawRect(this.pos.add(vec2(lean * .3, .18)), vec2(.78, .38), shirtC);
            drawRect(this.pos.add(vec2(-.42 + lean * .3, .12)), vec2(.18, .25), bodyC);
            drawRect(this.pos.add(vec2(.42 + lean * .3, .12)),  vec2(.18, .25), bodyC);
            drawRect(this.pos.add(vec2(lean, .45)), vec2(.8, .22), hatC);
            drawRect(this.pos.add(vec2(this.facing * .25 + lean, .37)), vec2(.42, .10), hatC);
            drawRect(this.pos.add(vec2(lean * .5, .28)), vec2(.55, .18), skinC);
            drawRect(this.pos.add(vec2(this.facing * .12 + lean * .5, .30)), vec2(.08, .12), rgb(0, 0, 0));
            drawRect(this.pos.add(vec2(this.facing * .12 + lean * .5, .20)), vec2(.22, .06), rgb(.20, .10, .05));
            drawRect(this.pos.add(vec2(-.14, -.12)), vec2(.08, .08), rgb(1, 1, .2));
            drawRect(this.pos.add(vec2(.14, -.12)),  vec2(.08, .08), rgb(1, 1, .2));
            drawRect(this.pos.add(vec2(-.18, -.46 + wp)), vec2(.24, .12), rgb(.40, .20, .05));
            drawRect(this.pos.add(vec2(.18,  -.46 - wp)), vec2(.24, .12), rgb(.40, .20, .05));
        }
    }
}

///////////////////////////////////////////////////////////////////////////////
function respawn()
{
    engineObjectsDestroy(true);
    buildLevel();

    coinsCollected = 0;
    for (const [x, y] of coinSpawns) new Coin(vec2(x, y));

    for (const e of enemySpawns)
    {
        if (e.type === 'goomba')      new Goomba(vec2(e.x + .5, 1.5));
        else if (e.type === 'koopa')  new Koopa(vec2(e.x + .5, 1.6));
    }

    player = new Player(vec2(2.5, 3.2));
    cameraMinX = 0;
}

///////////////////////////////////////////////////////////////////////////////
function gameInit()
{
    cameraScale = 60;
    inputWASDEmulateDirection = true;
    touchGamepadEnable = true;
    respawn();
}

///////////////////////////////////////////////////////////////////////////////
function gameUpdate()
{
    if (keyWasPressed('KeyR')) respawn();
}

///////////////////////////////////////////////////////////////////////////////
function gameUpdatePost()
{
    if (!player) return;

    const camY = 6.0;
    const targetX = max(player.pos.x, cameraMinX + 6);
    cameraMinX = max(cameraMinX, targetX - 6);
    setCameraPos(vec2(cameraMinX + 8, camY));

    const camSize = getCameraSize();
    const maxCamX = LEVEL_W - camSize.x/2;
    if (cameraPos.x > maxCamX)
        setCameraPos(vec2(maxCamX, camY));
}

///////////////////////////////////////////////////////////////////////////////
function drawTilePrimitive(x, y, t)
{
    const yOff = getTileBumpOffset(x, y);
    const pos = vec2(x + .5, y + .5 + yOff);

    if (t === TT.GROUND)
    {
        drawRect(pos, vec2(1), rgb(.55, .35, .15));
        drawRect(pos.add(vec2(0, .38)), vec2(1, .24), rgb(.65, .45, .22));
        // pebble specks
        drawRect(pos.add(vec2(-.25, -.18)), vec2(.10, .08), rgb(.40, .25, .10));
        drawRect(pos.add(vec2(.15, .05)),   vec2(.08, .06), rgb(.40, .25, .10));
    }
    else if (t === TT.BRICK)
    {
        drawRect(pos, vec2(1), rgb(.78, .35, .14));
        drawRect(pos.add(vec2(0, .38)), vec2(1, .12), rgb(.92, .50, .20));
        // mortar grid
        drawLine(pos.add(vec2(-.5, .15)), pos.add(vec2(.5, .15)), .05, rgb(.40, .15, .05));
        drawLine(pos.add(vec2(-.5, -.15)), pos.add(vec2(.5, -.15)), .05, rgb(.40, .15, .05));
        drawLine(pos.add(vec2(0, .5)),  pos.add(vec2(0, .15)),  .05, rgb(.40, .15, .05));
        drawLine(pos.add(vec2(-.25, -.15)), pos.add(vec2(-.25, -.5)), .05, rgb(.40, .15, .05));
        drawLine(pos.add(vec2(.25, -.15)),  pos.add(vec2(.25, -.5)),  .05, rgb(.40, .15, .05));
    }
    else if (t === TT.QBLOCK)
    {
        // pulsing yellow ? block
        const flash = .8 + Math.sin(time * 4 + x * 1.7) * .15;
        drawRect(pos, vec2(1), rgb(flash, flash * .75, .15));
        drawRect(pos.add(vec2(0, .38)), vec2(1, .12), rgb(1, .9, .35));
        // bordered ?
        drawRect(pos, vec2(.92, .92), rgb(flash * .9, flash * .65, .10));
        drawRect(pos.add(vec2(0, .12)),  vec2(.18, .14), rgb(.35, .18, .05));
        drawRect(pos.add(vec2(0, -.18)), vec2(.10, .10), rgb(.35, .18, .05));
        drawRect(pos.add(vec2(-.12, .26)), vec2(.10, .10), rgb(.35, .18, .05));
        drawRect(pos.add(vec2(.12, .26)),  vec2(.10, .10), rgb(.35, .18, .05));
    }
    else if (t === TT.USED)
    {
        drawRect(pos, vec2(1), rgb(.62, .42, .14));
        drawRect(pos.add(vec2(0, .38)), vec2(1, .12), rgb(.75, .55, .25));
        drawRect(pos, vec2(.92, .92), rgb(.50, .32, .08));
    }
    else if (t === TT.PIPE)
    {
        // body only; the wider cap is rendered in a second pass (drawPipeCap)
        drawRect(pos, vec2(1), rgb(.18, .70, .28));
        drawRect(pos.add(vec2(-.28, 0)), vec2(.18, 1), rgb(.10, .50, .18));
        drawRect(pos.add(vec2(.32, 0)),  vec2(.10, 1), rgb(.32, .92, .38));
    }
    else if (t === TT.FLAG)
    {
        // top ball of pole
        drawEllipse(pos, vec2(.55, .55), rgb(.95, .95, .25));
        drawEllipse(pos, vec2(.30, .30), rgb(.4, .4, .05));
    }
    else if (t === TT.POLE)
    {
        // skinny grey pole (non-solid)
        drawRect(pos, vec2(.14, 1), rgb(.85, .85, .85));
        drawRect(pos.add(vec2(-.04, 0)), vec2(.04, 1), rgb(.55, .55, .55));
    }
}

// Pipe cap: drawn as a separate pass on top of all tile bodies so the second
// column of the 2-wide pipe can't overpaint it. Only the left tile of a top row draws.
function drawPipeCap(x, y)
{
    const yOff = getTileBumpOffset(x, y);
    const center = vec2(x + 1, y + .5 + yOff + .35); // centered between the two columns
    drawRect(center, vec2(2.15, .35), rgb(.12, .55, .22));
    drawRect(center.add(vec2(0, .04)),  vec2(2.10, .14), rgb(.30, .85, .38));
    drawRect(center.add(vec2(0, -.13)), vec2(2.05, .08), rgb(.06, .35, .14));
}

// Flag: sits at the top of the pole until Mario grabs it, then slides down with him.
function drawFlagSlide()
{
    if (!player) return;
    const poleX = 192;
    let fy;
    if (!player.won)
        fy = 10.4;              // resting at the top of the pole
    else if (player.winTimer < 36)
        fy = lerp(player.winTimer / 36, 10.4, 2.8); // drop in sync with Mario's slide
    else
        fy = 2.8;               // settled at the base

    // banner with darker mast strip
    drawRect(vec2(poleX + .5, fy), vec2(.9, .55), rgb(.95, .25, .15));
    drawRect(vec2(poleX + .15, fy), vec2(.18, .55), rgb(.75, .12, .08));
}

///////////////////////////////////////////////////////////////////////////////
function gameRender()
{
    const camSize = getCameraSize();

    // SMB cornflower sky
    drawRect(cameraPos, camSize, rgb(.36, .58, .99));

    // far clouds (parallax)
    for (let i = 0; i < 8; i++)
    {
        const cx = cameraPos.x * .35 + i * 13 + 3;
        const cy = 11 + (i % 3) * 1.6;
        drawEllipse(vec2(cx, cy), vec2(2.6, .9), rgb(1, 1, 1, .8));
        drawEllipse(vec2(cx + 1.0, cy + .35), vec2(2.2, .7), rgb(1, 1, 1, .8));
        drawEllipse(vec2(cx - 1.2, cy + .25), vec2(1.8, .6), rgb(1, 1, 1, .8));
    }

    // hills (mid parallax)
    for (let i = 0; i < 6; i++)
    {
        const hx = cameraPos.x * .6 + i * 22 - (cameraPos.x * .6) % 22 - 8;
        drawEllipse(vec2(hx, .9), vec2(8, 4), rgb(.10, .55, .18));
        drawEllipse(vec2(hx - 1.5, 1.2), vec2(4, 2.4), rgb(.18, .65, .22));
    }

    // bushes (front decoration)
    for (let i = 0; i < 12; i++)
    {
        const bx = (cameraPos.x * .9 + i * 9) % (LEVEL_W) - 4;
        const by = 1.25;
        drawEllipse(vec2(bx, by), vec2(2.0, .8), rgb(.12, .55, .18));
        drawEllipse(vec2(bx + 1.0, by + .15), vec2(1.6, .7), rgb(.16, .65, .22));
        drawEllipse(vec2(bx - 1.0, by + .15), vec2(1.6, .7), rgb(.16, .65, .22));
    }

    // visible tiles
    const minX = floor(cameraPos.x - camSize.x/2) - 2;
    const maxX = floor(cameraPos.x + camSize.x/2) + 2;
    const minY = -1;
    const maxY = LEVEL_H + 2;

    // pass 1: tile bodies
    for (let y = minY; y <= maxY; y++)
    for (let x = minX; x <= maxX; x++)
    {
        const t = getTile(x, y);
        if (t) drawTilePrimitive(x, y, t);
    }

    // pass 2: pipe caps drawn on top of bodies (only the left tile of each top row)
    for (let y = minY; y <= maxY; y++)
    for (let x = minX; x <= maxX; x++)
    {
        if (getTile(x, y) !== TT.PIPE) continue;
        if (getTile(x, y + 1) === TT.PIPE) continue; // not a top row
        if (getTile(x - 1, y) === TT.PIPE) continue; // only left half draws
        drawPipeCap(x, y);
    }

    drawFlagSlide();
}

///////////////////////////////////////////////////////////////////////////////
function gameRenderPost()
{
    const help = 'Arrow/WASD: Move   Space/Z/Up: Jump   Shift/X: Run   R: Restart';
    drawTextScreen(help, vec2(mainCanvasSize.x/2, mainCanvasSize.y - 20), 18, hsl(0,0,1), 4, hsl(0,0,0));
    drawTextScreen(`COINS ${coinsCollected}`, vec2(mainCanvasSize.x - 140, 40), 26, rgb(1, 1, 1), 4, rgb(0, 0, 0), 'center', 'monospace');

    if (player?.won)
        drawTextScreen('GOAL!', vec2(mainCanvasSize.x/2, 80), 80, hsl(.12, .9, .65), 6, hsl(0, 0, 0));
}

///////////////////////////////////////////////////////////////////////////////
engineInit(gameInit, gameUpdate, gameUpdatePost, gameRender, gameRenderPost);

</script>
