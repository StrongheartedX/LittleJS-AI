<!DOCTYPE html><head>
<title>Micro Racer</title>
<meta charset=utf-8>
</head><body>
<script src="../dist/littlejs.js?1.18.0"></script>
<script>
'use strict';

// engine settings
debugWatermark = false;
showEngineVersion = false;
paused = false;

gravity = vec2(0, 0);
cameraPos = vec2(0, 0);
cameraScale = 24;

class SoundGenerator extends Sound
{
    constructor(params = {})
    {
        const {
            volume = 1, randomness = .05, frequency = 220, attack = 0,
            release = .1, shapeCurve = 1, slide = 0, pitchJump = 0,
            pitchJumpTime = 0, repeatTime = 0, noise = 0, bitCrush = 0, delay = 0,
        } = params;
        super([volume, randomness, frequency, attack, 0, release, 0, shapeCurve, slide, 0, pitchJump, pitchJumpTime, repeatTime, noise, 0, bitCrush, delay, 1, 0, 0, 0]);
    }
}

///////////////////////////////////////////////////////////////////////////////
// top-down RC racer — procedurally generated track rendered via TileLayer

const GRID_W      = 140;
const GRID_H      = 140;
const TILE_PX     = 16;
const LAYER_POS   = vec2(-GRID_W/2, -GRID_H/2);

const TERRAIN_GRASS     = 0;
const TERRAIN_ROAD      = 1;
const TERRAIN_ROAD_EDGE = 2;
const TERRAIN_SAND      = 3;

const TOTAL_LAPS  = 3;
const NUM_AI      = 3;
const ROAD_RADIUS = 4.0;   // inner drivable half-width (tiles / world units)
const EDGE_WIDTH  = 0.9;   // extra tiles for rumble/edge visual
const SAND_WIDTH  = 1.4;   // sand trap around road

// colors
const COL_GRASS_A = hsl(.30, .55, .38);
const COL_GRASS_B = hsl(.30, .55, .32);
const COL_GRASS_C = hsl(.30, .60, .29);
const COL_SAND    = hsl(.12, .45, .65);
const COL_ROAD    = hsl(0, 0, .28);
const COL_ROAD_EDGE = hsl(0, 0, .38);
const COL_FINISH_W = hsl(0, 0, .95);
const COL_FINISH_B = hsl(0, 0, .05);

// state
let tileLayer;
let terrain;                   // Uint8Array flat [x + y * GRID_W]
let trackPoints = [];          // centerline samples
let trackTangents = [];        // unit tangent at each sample
let trackSeed = 1;

let finishPos, finishNormal, finishTangent, finishSide;
let pickups = [];
let cars = [], player;
let raceTime = 0, countdown = 3, countdownTimer = 0;
let raceStarted = false, raceFinished = false, finalPlacements = [];

let sndCount, sndGo, sndLap, sndBump, sndBoost, sndWin;

///////////////////////////////////////////////////////////////////////////////
// small deterministic PRNG so 'N' can regenerate with a new seed
function mulberry32(a)
{
    return function()
    {
        a |= 0; a = a + 0x6D2B79F5 | 0;
        let t = a;
        t = Math.imul(t ^ t >>> 15, t | 1);
        t ^= t + Math.imul(t ^ t >>> 7, t | 61);
        return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
}

///////////////////////////////////////////////////////////////////////////////
// terrain helpers
function tIndex(x, y) { return x + y * GRID_W; }
function getTerrain(gx, gy)
{
    if (gx < 0 || gx >= GRID_W || gy < 0 || gy >= GRID_H) return TERRAIN_GRASS;
    return terrain[tIndex(gx, gy)];
}
function terrainAt(worldPos)
{
    const gx = Math.floor(worldPos.x - LAYER_POS.x);
    const gy = Math.floor(worldPos.y - LAYER_POS.y);
    return getTerrain(gx, gy);
}
function setTerrainIfHigher(gx, gy, t)
{
    // later passes overwrite earlier ones (ROAD > EDGE > SAND > GRASS)
    if (gx < 0 || gx >= GRID_W || gy < 0 || gy >= GRID_H) return;
    const cur = terrain[tIndex(gx, gy)];
    if (t > cur) terrain[tIndex(gx, gy)] = t;
}

///////////////////////////////////////////////////////////////////////////////
// Catmull-Rom through a closed loop of control points
function catmullRom(p0, p1, p2, p3, t)
{
    const t2 = t*t, t3 = t2*t;
    return vec2(
        0.5*((2*p1.x) + (-p0.x+p2.x)*t + (2*p0.x-5*p1.x+4*p2.x-p3.x)*t2 + (-p0.x+3*p1.x-3*p2.x+p3.x)*t3),
        0.5*((2*p1.y) + (-p0.y+p2.y)*t + (2*p0.y-5*p1.y+4*p2.y-p3.y)*t2 + (-p0.y+3*p1.y-3*p2.y+p3.y)*t3)
    );
}

///////////////////////////////////////////////////////////////////////////////
// generate a track, fill terrain array, pick finish line
function generateTrack(seed)
{
    const rnd = mulberry32(seed);

    // control points in polar coords to guarantee no self-intersection
    const numCP  = 10;
    const maxR   = Math.min(GRID_W, GRID_H) * 0.38;
    const center = vec2(GRID_W/2, GRID_H/2);
    const cps = [];
    for (let i = 0; i < numCP; i++)
    {
        const ang = i / numCP * 2 * Math.PI;
        const radius = maxR * (0.58 + rnd() * 0.42);
        cps.push(vec2(
            center.x + Math.cos(ang) * radius,
            center.y + Math.sin(ang) * radius
        ));
    }

    // sample the spline
    trackPoints = [];
    trackTangents = [];
    const samplesPerSeg = 40;
    for (let i = 0; i < numCP; i++)
    {
        const p0 = cps[(i - 1 + numCP) % numCP];
        const p1 = cps[i];
        const p2 = cps[(i + 1) % numCP];
        const p3 = cps[(i + 2) % numCP];
        for (let j = 0; j < samplesPerSeg; j++)
        {
            const t = j / samplesPerSeg;
            trackPoints.push(catmullRom(p0, p1, p2, p3, t));
        }
    }
    // tangents via forward differences
    const N = trackPoints.length;
    for (let i = 0; i < N; i++)
    {
        const a = trackPoints[i];
        const b = trackPoints[(i + 1) % N];
        trackTangents.push(b.subtract(a).normalize());
    }

    // reset terrain
    terrain = new Uint8Array(GRID_W * GRID_H);

    // stamp a disk of the given terrain type
    const stamp = (p, radius, type) => {
        const cx = p.x, cy = p.y;
        const r2 = radius * radius;
        const ri = Math.ceil(radius + 1);
        for (let dx = -ri; dx <= ri; dx++)
        for (let dy = -ri; dy <= ri; dy++)
        {
            if (dx*dx + dy*dy > r2) continue;
            setTerrainIfHigher(Math.floor(cx + dx), Math.floor(cy + dy), type);
        }
    };

    // three passes outermost -> innermost
    for (const p of trackPoints) stamp(p, ROAD_RADIUS + EDGE_WIDTH + SAND_WIDTH, TERRAIN_SAND);
    for (const p of trackPoints) stamp(p, ROAD_RADIUS + EDGE_WIDTH, TERRAIN_ROAD_EDGE);
    for (const p of trackPoints) stamp(p, ROAD_RADIUS, TERRAIN_ROAD);

    // pick finish line at trackPoints[0]
    const gridFinish = trackPoints[0];
    finishPos = vec2(LAYER_POS.x + gridFinish.x, LAYER_POS.y + gridFinish.y);
    finishTangent = trackTangents[0].copy();
    finishNormal = finishTangent.copy();                // cross direction
    finishSide = vec2(-finishTangent.y, finishTangent.x); // perpendicular (left of travel)

    // pickups: every Kth sample, avoid area near finish line
    pickups = [];
    const spacing = Math.floor(N / 5);
    for (let i = spacing; i < N - spacing/2; i += spacing)
    {
        const gp = trackPoints[i];
        const tan = trackTangents[i];
        const side = vec2(-tan.y, tan.x);
        // slight lateral offset so pickup isn't dead center
        const lateral = ((i / spacing) % 2 === 0 ? 1 : -1) * ROAD_RADIUS * 0.35;
        const pos = vec2(
            LAYER_POS.x + gp.x + side.x * lateral,
            LAYER_POS.y + gp.y + side.y * lateral
        );
        pickups.push({ pos, cooldown: 0 });
    }
}

///////////////////////////////////////////////////////////////////////////////
function buildTileLayer()
{
    // dispose previous
    if (tileLayer) tileLayer.destroy();

    // make a dummy TileInfo (no real texture needed for drawLayerRect use)
    const dummyCanvas = new OffscreenCanvas(TILE_PX, TILE_PX);
    const dummyTex = new TextureInfo(dummyCanvas, true);
    const info = new TileInfo(vec2(0, 0), vec2(TILE_PX, TILE_PX), dummyTex, 0, 0);

    // use WebGL so the layer and the cars (which also use WebGL) share
    // the same render canvas; the Canvas2D layer ends up above WebGL in the DOM
    // and would otherwise hide any WebGL-drawn objects underneath it.
    tileLayer = new TileLayer(LAYER_POS, vec2(GRID_W, GRID_H), info, -100, true);

    // paint all tiles onto the offscreen canvas
    tileLayer.redrawStart(true);
    for (let x = 0; x < GRID_W; x++)
    for (let y = 0; y < GRID_H; y++)
    {
        const t = terrain[tIndex(x, y)];
        let col;
        if (t === TERRAIN_ROAD)        col = COL_ROAD;
        else if (t === TERRAIN_ROAD_EDGE) col = COL_ROAD_EDGE;
        else if (t === TERRAIN_SAND)   col = COL_SAND;
        else
        {
            // grass variation: 3-tone hash for texture
            const h = ((x * 73856093) ^ (y * 19349663)) >>> 0;
            col = (h % 3 === 0) ? COL_GRASS_A : (h % 3 === 1) ? COL_GRASS_B : COL_GRASS_C;
        }
        tileLayer.drawLayerRect(vec2(x * TILE_PX, y * TILE_PX), vec2(TILE_PX, TILE_PX), col);
    }
    tileLayer.redrawEnd();
}

///////////////////////////////////////////////////////////////////////////////
// car

function wrapAngle(a)
{
    while (a >  Math.PI) a -= 2*Math.PI;
    while (a < -Math.PI) a += 2*Math.PI;
    return a;
}

function ordinalSuffix(n)
{
    const v = n % 100;
    if (v >= 11 && v <= 13) return 'th';
    return ['th','st','nd','rd','th','th','th','th','th','th'][n%10];
}

class Car
{
    constructor(startPos, startAngle, color, isPlayer, progressIdx)
    {
        this.startPos = startPos.copy();
        this.startAngle = startAngle;
        this.pos = startPos.copy();
        this.prevPos = startPos.copy();
        this.velocity = vec2(0, 0);
        this.angle = startAngle;
        this.size = vec2(1.4, 0.8);
        this.color = color;
        this.isPlayer = !!isPlayer;
        this.lap = 0;
        this.finished = false;
        this.finishTime = 0;
        this.progressIdx = progressIdx;   // nearest-track-index estimate
        this.boostTimer = 0;
        this.aiLaneOffset = 0;
    }

    forward() { return vec2().setAngle(this.angle, 1); }

    update()
    {
        if (this.finished || !raceStarted) return;
        this.prevPos = this.pos.copy();

        let throttle = 0, turn = 0;
        if (this.isPlayer)
        {
            const k = keyDirection();
            throttle = k.y;
            turn = k.x;
        }
        else
        {
            const ai = this.aiSteer();
            throttle = ai.throttle;
            turn = ai.turn;
        }

        const tType = terrainAt(this.pos);
        const onRoad = tType === TERRAIN_ROAD;
        const onEdge = tType === TERRAIN_ROAD_EDGE;
        const onSand = tType === TERRAIN_SAND;

        let MAX_SPEED = 0.42;
        let ACCEL = 0.014;
        let GRIP = 0.22;
        let FRICTION = 0.985;
        if (onEdge) { MAX_SPEED = 0.35; ACCEL = 0.012; GRIP = 0.18; FRICTION = 0.97; }
        else if (onSand) { MAX_SPEED = 0.18; ACCEL = 0.008; GRIP = 0.12; FRICTION = 0.93; }
        else if (!onRoad) { MAX_SPEED = 0.14; ACCEL = 0.007; GRIP = 0.07; FRICTION = 0.91; }

        const BRAKE = 0.024;
        const TURN_RATE = 0.08;
        const TURN_FULL = 0.14;

        // boost temporarily raises max speed and friction
        if (this.boostTimer > 0)
        {
            MAX_SPEED = Math.max(MAX_SPEED, 0.62);
            ACCEL *= 1.8;
            this.boostTimer -= 1/60;
        }

        const fwd = this.forward();
        const fwdSpeed = this.velocity.dot(fwd);
        const vFwd = fwd.scale(fwdSpeed * FRICTION);
        const vSide = this.velocity.subtract(fwd.scale(fwdSpeed)).scale(1 - GRIP);
        this.velocity = vFwd.add(vSide);

        if (throttle > 0 && fwdSpeed < MAX_SPEED)
            this.velocity = this.velocity.add(fwd.scale(ACCEL * throttle));
        else if (throttle < 0 && fwdSpeed > -MAX_SPEED * 0.4)
            this.velocity = this.velocity.add(fwd.scale(BRAKE * throttle));

        const speedNow = this.velocity.dot(fwd);
        const turnScale = clamp(Math.abs(speedNow) / TURN_FULL, 0, 1);
        const dir = speedNow >= 0 ? 1 : -1;
        this.angle += turn * TURN_RATE * turnScale * dir;

        this.pos = this.pos.add(this.velocity);

        // update progress index (local search)
        this.progressIdx = findNearestIdx(this.pos, this.progressIdx);

        // pickups
        for (const pu of pickups)
        {
            if (pu.cooldown > 0) continue;
            if (this.pos.distance(pu.pos) < 0.8)
            {
                pu.cooldown = 4;
                this.boostTimer = 1.3;
                if (this.isPlayer) sndBoost.play(this.pos);
            }
        }

        // finish line crossing
        this.checkLap();
    }

    aiSteer()
    {
        const N = trackPoints.length;
        const lookAhead = 18;
        const targetIdx = (this.progressIdx + lookAhead) % N;
        const gp = trackPoints[targetIdx];
        const tan = trackTangents[targetIdx];
        const side = vec2(-tan.y, tan.x);
        const targetWorld = vec2(
            LAYER_POS.x + gp.x + side.x * this.aiLaneOffset,
            LAYER_POS.y + gp.y + side.y * this.aiLaneOffset
        );
        const diff = targetWorld.subtract(this.pos);
        const desired = diff.angle();
        const delta = wrapAngle(desired - this.angle);
        const turn = clamp(delta / 0.18, -1, 1);

        // ease off throttle on hard turns
        const sharp = Math.abs(delta) > 0.9 ? 0.55 : 1;
        return { throttle: sharp, turn };
    }

    checkLap()
    {
        if (this.finished) return;
        // project movement against finish line plane (normal = finishNormal)
        const relPrev = this.prevPos.subtract(finishPos);
        const relCurr = this.pos.subtract(finishPos);
        const dPrev = relPrev.dot(finishNormal);
        const dCurr = relCurr.dot(finishNormal);
        if (dPrev < 0 && dCurr >= 0)
        {
            // also require lateral proximity to the line center (within road)
            const lat = relCurr.dot(finishSide);
            if (Math.abs(lat) < ROAD_RADIUS + EDGE_WIDTH)
            {
                this.lap++;
                if (this.isPlayer && this.lap < TOTAL_LAPS) sndLap.play(this.pos);
                if (this.lap >= TOTAL_LAPS)
                {
                    this.finished = true;
                    this.finishTime = raceTime;
                    if (this.isPlayer) sndWin.play(this.pos);
                }
            }
        }
    }

    progress()
    {
        return this.lap + this.progressIdx / trackPoints.length;
    }

    render()
    {
        // body
        drawRect(this.pos, this.size, this.color, this.angle);
        // windshield (forward half)
        const fwd = this.forward();
        drawRect(this.pos.add(fwd.scale(0.22)), vec2(0.5, 0.75), hsl(0,0,.9,.85), this.angle);
        // wheels
        const side = vec2().setAngle(this.angle + Math.PI/2, 0.45);
        const black = hsl(0,0,.08);
        for (const sx of [-0.45, 0.45])
        for (const sy of [-1, 1])
        {
            const wp = this.pos.add(fwd.scale(sx)).add(side.scale(sy));
            drawRect(wp, vec2(0.32, 0.18), black, this.angle);
        }
        // boost flame
        if (this.boostTimer > 0)
        {
            const flameLen = 0.8 + Math.random() * 0.4;
            const flamePos = this.pos.add(fwd.scale(-0.7 - flameLen * 0.5));
            drawRect(flamePos, vec2(flameLen, 0.4), hsl(0.08, .95, .55), this.angle);
            drawRect(flamePos, vec2(flameLen * 0.6, 0.2), hsl(0.15, .95, .75), this.angle);
        }
    }
}

///////////////////////////////////////////////////////////////////////////////
function findNearestIdx(pos, prevIdx)
{
    const N = trackPoints.length;
    // convert world to grid space (trackPoints are in grid coords)
    const gx = pos.x - LAYER_POS.x;
    const gy = pos.y - LAYER_POS.y;
    let best = prevIdx, bestD = Infinity;
    const search = 20;
    for (let i = -search; i <= search; i++)
    {
        const k = ((prevIdx + i) % N + N) % N;
        const p = trackPoints[k];
        const dx = p.x - gx, dy = p.y - gy;
        const d = dx*dx + dy*dy;
        if (d < bestD) { bestD = d; best = k; }
    }
    return best;
}

///////////////////////////////////////////////////////////////////////////////
function setupRace()
{
    generateTrack(trackSeed);
    buildTileLayer();

    // build starting grid: 4 cars behind the finish line along the track
    const N = trackPoints.length;
    cars = [];
    const colors = [
        hsl(0,    .85, .55),
        hsl(.15,  .85, .55),
        hsl(.55,  .85, .55),
        hsl(.75,  .85, .60),
    ];
    for (let i = 0; i < 4; i++)
    {
        // lay them out behind the finish line along the track, 2 cars per row
        const row = Math.floor(i / 2);
        const col = i % 2;
        const backIdx = (N - 4 - row * 4 + N) % N;
        const gp = trackPoints[backIdx];
        const tan = trackTangents[backIdx];
        const side = vec2(-tan.y, tan.x);
        const lateral = (col === 0 ? -1 : 1) * 1.4;
        const worldPos = vec2(
            LAYER_POS.x + gp.x + side.x * lateral,
            LAYER_POS.y + gp.y + side.y * lateral
        );
        const startAngle = tan.angle();
        const car = new Car(worldPos, startAngle, colors[i], i === 0, backIdx);
        if (!car.isPlayer)
        {
            // AI lane offset so they spread into a pack
            car.aiLaneOffset = (i === 1 ? -1.5 : i === 2 ? 0.8 : 1.6);
        }
        cars.push(car);
    }
    player = cars[0];

    raceTime = 0;
    countdown = 3;
    countdownTimer = 1;
    raceStarted = false;
    raceFinished = false;
    finalPlacements = [];
    cameraPos = player.pos.copy();
}

///////////////////////////////////////////////////////////////////////////////
async function gameInit()
{
    sndCount = new SoundGenerator({ frequency: 500, attack: .01, release: .2, volume: .5 });
    sndGo    = new SoundGenerator({ frequency: 900, attack: .01, release: .4, volume: .7, pitchJump: 300, pitchJumpTime: .05 });
    sndLap   = new SoundGenerator({ frequency: 700, attack: .01, release: .25, volume: .5, pitchJump: 200, pitchJumpTime: .1 });
    sndBump  = new SoundGenerator({ frequency: 140, release: .08, volume: .4, noise: .5 });
    sndBoost = new SoundGenerator({ frequency: 320, release: .3, volume: .6, slide: 2, pitchJump: 600, pitchJumpTime: .08 });
    sndWin   = new SoundGenerator({ frequency: 660, release: .5, volume: .8, pitchJump: 330, pitchJumpTime: .15, repeatTime: .3 });

    trackSeed = Math.floor(Math.random() * 1e9);
    setupRace();
}

function gameUpdate()
{
    if (keyWasPressed('KeyN'))
    {
        trackSeed = Math.floor(Math.random() * 1e9);
        setupRace();
        return;
    }
    if (raceFinished)
    {
        if (keyWasPressed('KeyR')) setupRace();
        return;
    }

    if (!raceStarted)
    {
        countdownTimer -= 1/60;
        if (countdownTimer <= 0)
        {
            if (countdown > 1)
            {
                countdown--;
                countdownTimer = 1;
                sndCount.play(cameraPos);
            }
            else if (countdown === 1)
            {
                countdown = 0;
                countdownTimer = 0.8;
                sndGo.play(cameraPos);
                raceStarted = true;
            }
        }
    }
    else
    {
        raceTime += 1/60;
        if (countdown === 0 && countdownTimer > 0)
            countdownTimer -= 1/60;
    }

    for (const c of cars) c.update();

    // pickup cooldown tick
    for (const pu of pickups) if (pu.cooldown > 0) pu.cooldown -= 1/60;

    // car-car separation
    for (let i = 0; i < cars.length; i++)
    for (let j = i+1; j < cars.length; j++)
    {
        const a = cars[i], b = cars[j];
        const d = b.pos.subtract(a.pos);
        const dist = d.length();
        const minDist = 1.2;
        if (dist > 0.001 && dist < minDist)
        {
            const push = d.scale((minDist - dist) / dist / 2);
            a.pos = a.pos.subtract(push);
            b.pos = b.pos.add(push);
            a.velocity = a.velocity.scale(0.85);
            b.velocity = b.velocity.scale(0.85);
            if ((a === player || b === player) && !player.finished)
                sndBump.play(player.pos);
        }
    }

    if (player.finished && !raceFinished)
    {
        raceFinished = true;
        const sorted = cars.slice().sort((a,b) => {
            if (a.finished && b.finished) return a.finishTime - b.finishTime;
            if (a.finished) return -1;
            if (b.finished) return 1;
            return b.progress() - a.progress();
        });
        finalPlacements = sorted;
    }
}

function gameUpdatePost()
{
    // camera follows player, lead slightly in direction of travel
    const speed = player.velocity.length();
    const lead = player.forward().scale(clamp(speed * 10, 2, 6));
    const target = player.pos.add(lead);
    cameraPos = cameraPos.lerp(target, 0.09);
}

///////////////////////////////////////////////////////////////////////////////
// gameRender runs BEFORE engine objects (tile layer). Keep empty so
// terrain tiles render on top of the clear color, and draw overlay
// content in gameRenderPost so it sits above the tile layer.
function gameRender() {}

function drawStartLine()
{
    // draw a checker line perpendicular to finishTangent at finishPos
    const cells = 10;
    const cellW = (ROAD_RADIUS * 2 + EDGE_WIDTH * 2) / cells;
    const cellH = 0.7;
    const tan = finishTangent;
    const side = finishSide;
    for (let r = 0; r < 2; r++)
    for (let c = 0; c < cells; c++)
    {
        const lateral = -(cells * cellW) / 2 + cellW * (c + 0.5);
        const along = -cellH / 2 + r * cellH;
        const p = finishPos.add(side.scale(lateral)).add(tan.scale(along));
        const col = ((r + c) & 1) ? COL_FINISH_W : COL_FINISH_B;
        drawRect(p, vec2(cellW, cellH), col, tan.angle());
    }
}

function drawPickups()
{
    const t = time;
    for (const pu of pickups)
    {
        if (pu.cooldown > 0) continue;
        const pulse = 0.6 + Math.sin(t * 6) * 0.15;
        drawRect(pu.pos, vec2(pulse, pulse), hsl(0.55, .9, .6), t * 2);
        drawRect(pu.pos, vec2(pulse * 0.55, pulse * 0.55), hsl(0.12, 1, .75), -t * 3);
    }
}

function gameRenderPost()
{
    // dynamic world objects above the tile layer
    drawStartLine();
    drawPickups();
    for (const c of cars) c.render();

    // ---- HUD (screen space) ----
    const w = mainCanvasSize.x, h = mainCanvasSize.y;
    const white = hsl(0,0,1), black = hsl(0,0,0);

    const lapNum = Math.min(player.lap + 1, TOTAL_LAPS);
    drawTextScreen(`Lap ${lapNum}/${TOTAL_LAPS}`, vec2(90, 34), 28, white, 4, black, 'center');

    // live standings
    const sortedLive = cars.slice().sort((a,b) => {
        if (a.finished && b.finished) return a.finishTime - b.finishTime;
        if (a.finished) return -1;
        if (b.finished) return 1;
        return b.progress() - a.progress();
    });
    const place = sortedLive.indexOf(player) + 1;
    drawTextScreen(`${place}${ordinalSuffix(place)} / ${cars.length}`, vec2(90, 68), 28, white, 4, black, 'center');

    drawTextScreen(`${raceTime.toFixed(2)}s`, vec2(w - 90, 34), 28, white, 4, black, 'center');
    drawTextScreen(`seed ${trackSeed}`, vec2(w - 90, 68), 18, hsl(0,0,.8), 3, black, 'center');

    // countdown overlay
    if (!raceStarted)
    {
        const label = countdown > 0 ? `${countdown}` : 'GO!';
        drawTextScreen(label, vec2(w/2, h/2), 140, hsl(.12,.9,.6), 8, black);
    }
    else if (countdown === 0 && countdownTimer > 0)
    {
        drawTextScreen('GO!', vec2(w/2, h/2), 140, hsl(.12,.9,.6), 8, black);
    }

    // finish screen
    if (raceFinished)
    {
        drawRect(vec2(w/2, h/2), vec2(w, h), hsl(0,0,0,.55), 0, false, true);
        const p = finalPlacements.indexOf(player) + 1;
        const head = p === 1 ? 'YOU WIN!' : `${p}${ordinalSuffix(p)} PLACE`;
        const headColor = p === 1 ? hsl(.15,.9,.6) : white;
        drawTextScreen(head, vec2(w/2, h/2 - 120), 72, headColor, 6, black);

        for (let i = 0; i < finalPlacements.length; i++)
        {
            const c = finalPlacements[i];
            const pos = i + 1;
            const name = (c === player) ? 'YOU' : `CPU ${i+1}`;
            const t = c.finished ? `${c.finishTime.toFixed(2)}s` : 'DNF';
            const line = `${pos}. ${name}   ${t}`;
            drawTextScreen(line, vec2(w/2, h/2 - 40 + i * 40), 32,
                c === player ? hsl(.05,.9,.65) : white, 4, black);
        }
        drawTextScreen('press R to restart — N for new track',
            vec2(w/2, h/2 + 150), 26, white, 3, black);
    }

    // idle hints
    if (!raceStarted && !raceFinished)
    {
        drawTextScreen('Arrow keys to drive — 3 laps — press N for new track',
            vec2(w/2, h - 40), 22, white, 3, black);
    }
}

///////////////////////////////////////////////////////////////////////////////
engineInit(gameInit, gameUpdate, gameUpdatePost, gameRender, gameRenderPost);

</script></body>
