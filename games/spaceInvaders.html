<script>
'use strict';

// engine settings
debugWatermark = false;
showEngineVersion = false;
// (menus.js auto-moves the debug-overlay key off Escape to ` on first createMenu)

// Touch gamepad: 8-way digital + 1 face button (fire). Player moves left/right
// only, so digital is plenty.
touchGamepadEnable = true;
touchGamepadAnalog = false;
touchGamepadButtonCount = 1;
touchGamepadAlpha = .35;

// ------------------------------------------------------------
// Game constants

const levelSize = vec2(60, 34);
const playMin = vec2(0, 0);
const playMax = levelSize;

const playerY = 3;
const barrierY = 8;

// ------------------------------------------------------------
// Global game state

let player;
let aliens = [];
let bullets = [];
let bombs = [];
let barriers = [];
let ufo = null;

let score = 0;
let lives = 3;
let playerShotsFired = 0; // total player shots; drives arcade-style UFO scoring
let nextBonusLife = 1000;
let currentLevel = 1;

let gameOver = false;
let gameWin = false;
let titleScreen = true;
let titleAliens = [];
let levelAnnounce = 0; // frames to show level announcement
let respawnTimer = 0; // frames to wait before respawning
let playerHidden = false; // true when player is dead and waiting to respawn
let gameOverTimer = 0; // frames before can click to return to title
let inputMode = 'mouse'; // 'mouse' or 'keyboard'
let titleTimer = 0;

let invaderDir = 1;
let invaderSpeed = .08;        // world units per frame (20% slower)
let invaderDrop = 1.0;         // world units
let invaderAnimTick = 0;

let alienShootTimer = 0;
let alienShootMin = 6;          // frames (2x faster firing)
let alienShootMax = 20;         // frames

let ufoSpawnTimer = 0;
let marchTimer = 0;
let marchBeat = 0;

// Sounds
const sfxShoot    = new SoundGenerator({volume:.22, frequency:520, release:.02, shapeCurve:.4, noise:.15});
const sfxExplode  = new SoundGenerator({volume:.35, frequency:120, release:.22, noise:.2, shapeCurve:1.6, slide:-.4});
const sfxHit      = new SoundGenerator({volume:.28, frequency:280, release:.08, shapeCurve:1.2});
const sfxLoseLife = new SoundGenerator({volume:.40, frequency:180, release:.25, shapeCurve:1.8, slide:-.2});
const sfxUFO      = new SoundGenerator({volume:.22, frequency:350, release:.08, shapeCurve:.6, slide:.15});
const sfxBonusLife = new SoundGenerator({volume:.45, frequency:440, release:.35, shapeCurve:.5, pitchJump:220, pitchJumpTime:.1});
const sfxAlienDeath = new SoundGenerator({volume:.32, frequency:380, release:.12, shapeCurve:1.4, slide:-.3, pitchJump:-80, pitchJumpTime:.05});
// Marching sounds - 4 alternating notes (higher frequency so they're audible)
const sfxMarch1   = new SoundGenerator({volume:.25, frequency:180, release:.08, shapeCurve:1.2});
const sfxMarch2   = new SoundGenerator({volume:.25, frequency:160, release:.08, shapeCurve:1.2});
const sfxMarch3   = new SoundGenerator({volume:.25, frequency:140, release:.08, shapeCurve:1.2});
const sfxMarch4   = new SoundGenerator({volume:.25, frequency:120, release:.08, shapeCurve:1.2});

// ------------------------------------------------------------
// Helpers

function clampToPlayfield(pos, halfSize)
{
    pos.x = clamp(pos.x, playMin.x + halfSize.x, playMax.x - halfSize.x);
    pos.y = clamp(pos.y, playMin.y + halfSize.y, playMax.y - halfSize.y);
    return pos;
}

function aabbOverlap(a, b)
{
    return isOverlapping(a.pos, a.size, b.pos, b.size);
}

function randIntInclusive(a, b)
{
    return (rand(a, b+1) | 0);
}

// Arcade-style UFO scoring: the 23rd shot scores 300, then every 15th after that.
// Other shots cycle through a fixed 50/100/150 pattern so the value is deterministic
// but feels varied. Driven by the bullet's shot index, not the UFO.
function ufoPointsFor(shotIndex)
{
    if (shotIndex === 23 || (shotIndex > 23 && (shotIndex - 23) % 15 === 0))
        return 300;
    const cycle = [50, 50, 100, 50, 100, 150, 100, 50, 100, 150, 100, 50, 100, 100, 50];
    return cycle[shotIndex % cycle.length];
}

// ------------------------------------------------------------
// Sprite bitmaps — each '#' is a lit pixel, drawn on a uniform grid

const SPRITE_PIXEL = 0.19; // world units per pixel

const SPRITE_SQUID_A = [
    '...##...',
    '..####..',
    '.######.',
    '##.##.##',
    '########',
    '.#.##.#.',
    '#.#..#.#',
    '.#....#.'
];
const SPRITE_SQUID_B = [
    '...##...',
    '..####..',
    '.######.',
    '##.##.##',
    '########',
    '..#..#..',
    '.#.##.#.',
    '#.#..#.#'
];

const SPRITE_CRAB_A = [
    '..#.....#..',
    '...#...#...',
    '..#######..',
    '.##.###.##.',
    '###########',
    '#.#######.#',
    '#.#.....#.#',
    '...##.##...'
];
const SPRITE_CRAB_B = [
    '..#.....#..',
    '#..#...#..#',
    '#.#######.#',
    '###.###.###',
    '###########',
    '.#########.',
    '..#...#..#.',
    '.#.#...#.#.'
];

const SPRITE_OCTOPUS_A = [
    '....####....',
    '.##########.',
    '############',
    '###.####.###',
    '############',
    '..##.##.##..',
    '.##..##..##.',
    '##........##'
];
const SPRITE_OCTOPUS_B = [
    '....####....',
    '.##########.',
    '############',
    '###.####.###',
    '############',
    '...##..##...',
    '..##.##.##..',
    '.##......##.'
];

const SPRITE_PLAYER = [
    '......#......',
    '.....###.....',
    '.....###.....',
    '.###########.',
    '#############',
    '#############',
    '#############',
    '#############'
];

const SPRITE_UFO = [
    '....########....',
    '.##############.',
    '################',
    '################',
    '################',
    '.###.######.###.',
    '..##........##..',
    '...#..####..#...'
];

function drawSpriteBitmap(centerPos, bitmap, pixelSize, color)
{
    const rows = bitmap.length;
    const cols = bitmap[0].length;
    const startX = centerPos.x - (cols - 1) * pixelSize * 0.5;
    const startY = centerPos.y + (rows - 1) * pixelSize * 0.5;
    const cellSize = vec2(pixelSize, pixelSize);
    for (let y = 0; y < rows; y++)
    {
        const row = bitmap[y];
        for (let x = 0; x < cols; x++)
        {
            if (row[x] !== '.')
                drawRect(vec2(startX + x * pixelSize, startY - y * pixelSize), cellSize, color);
        }
    }
}

function drawSpriteBitmapScreen(centerScreenX, centerScreenY, bitmap, pixelSize, color)
{
    const rows = bitmap.length;
    const cols = bitmap[0].length;
    // Snap to integer pixel grid so cell edges don't anti-alias into stripes
    const px = Math.round(pixelSize);
    const startX = Math.round(centerScreenX - cols * px * 0.5);
    const startY = Math.round(centerScreenY - rows * px * 0.5);
    mainContext.fillStyle = color.toString();
    for (let y = 0; y < rows; y++)
    {
        const row = bitmap[y];
        for (let x = 0; x < cols; x++)
        {
            if (row[x] !== '.')
                mainContext.fillRect(startX + x * px, startY + y * px, px, px);
        }
    }
}

// One drifting/fading pixel from a sprite-shaped explosion.
class SpritePixel extends EngineObject
{
    constructor(pos, vel, color, life, pixelSize)
    {
        super(pos, vec2(pixelSize, pixelSize));
        this.vel = vel;
        this.baseColor = color;
        this.life = life;
        this.maxLife = life;
        this.renderOrder = 30;
    }
    update()
    {
        this.pos = this.pos.add(this.vel);
        this.vel = this.vel.scale(.94); // damping so the cloud settles
        if (--this.life <= 0) this.destroy();
    }
    render()
    {
        const a = this.life / this.maxLife;
        const c = this.baseColor;
        drawRect(this.pos, this.size, rgb(c.r, c.g, c.b, (c.a ?? 1) * a));
    }
}

// Destroy effect: each lit pixel of the sprite becomes a particle that drifts
// outward from the sprite center and fades. The shape is briefly recognizable
// before it disperses. spreadScale tunes how energetic the blast is.
function spawnSpriteExplosion(centerPos, bitmap, pixelSize, color, spreadScale = 1)
{
    const rows = bitmap.length;
    const cols = bitmap[0].length;
    const startX = centerPos.x - (cols - 1) * pixelSize * .5;
    const startY = centerPos.y + (rows - 1) * pixelSize * .5;
    for (let y = 0; y < rows; y++)
    {
        const row = bitmap[y];
        for (let x = 0; x < cols; x++)
        {
            if (row[x] === '.') continue;
            const px = vec2(startX + x * pixelSize, startY - y * pixelSize);
            const dir = px.subtract(centerPos);
            const dlen = dir.length();
            const baseSpeed = (.07 + rand(0, .08)) * spreadScale;
            // Outward velocity from sprite center; jittered, with random fallback for center pixels
            const outward = dlen > 0.01
                ? dir.scale(baseSpeed / dlen)
                : vec2(rand(-baseSpeed, baseSpeed), rand(-baseSpeed, baseSpeed));
            const jitter = vec2(rand(-.04, .04), rand(-.04, .04)).scale(spreadScale);
            const life = 35 + randInt(0, 25); // ~0.6-1.0s
            new SpritePixel(px, outward.add(jitter), color, life, pixelSize);
        }
    }
}

function goToTitleScreen()
{
    // Clean up all game objects
    engineObjectsDestroy(true);
    aliens.length = 0;
    bullets.length = 0;
    bombs.length = 0;
    barriers.length = 0;
    ufo = null;
    player = null;
    levelAnnounce = 0;
    respawnTimer = 0;
    playerHidden = false;
    gameOverTimer = 0;
    initTitleScreen();
}

function resetInvaderState(resetSpeed = true)
{
    // Reset invader movement direction
    invaderDir = 1;
    
    // Only reset speed on new level, not on respawn
    if (resetSpeed)
        invaderSpeed = .06 + (currentLevel - 1) * .01;
    
    // Reset shooting timers (doubled for slower firing)
    const levelShootBonus = (currentLevel - 1) * 2;
    alienShootMin = max(6, 12 - levelShootBonus);
    alienShootMax = max(20, 40 - levelShootBonus * 2);
    alienShootTimer = 60; // 1 second delay before enemies shoot
    
    // Reset march
    marchTimer = 40;
    marchBeat = 0;
}

function resetGame()
{
    // clear objects
    engineObjectsDestroy(true);

    aliens.length = 0;
    bullets.length = 0;
    bombs.length = 0;
    barriers.length = 0;
    ufo = null;

    score = 0;
    lives = 3;
    nextBonusLife = 1000;
    currentLevel = 1;
    playerShotsFired = 0;
    gameOver = false;
    gameWin = false;

    startLevel();
}

function startLevel()
{
    // Clear remaining projectiles
    for (const b of bullets) b.destroy();
    for (const bomb of bombs) bomb.destroy();
    bullets.length = 0;
    bombs.length = 0;
    
    // Destroy old aliens if any
    for (const a of aliens) a.destroy();
    aliens.length = 0;
    
    // Destroy old barriers
    for (const br of barriers) br.destroy();
    barriers.length = 0;

    invaderDrop = 1.0;
    invaderAnimTick = 0;
    resetInvaderState();
    
    ufoSpawnTimer = randIntInclusive(300, 600);

    if (!player || player.destroyed)
        player = new Player(vec2(levelSize.x/2, playerY));
    else
        player.pos = vec2(levelSize.x/2, playerY);
    
    // Show level announcement for 2 seconds (120 frames)
    levelAnnounce = 120;
        
    createBarriers();
    createAliens();
}

// ------------------------------------------------------------
// Objects

class RectObject extends EngineObject
{
    constructor(pos, size, color)
    {
        super(pos, size);
        this.color = color || WHITE;
        this.renderOrder = 0;
    }
    render()
    {
        drawRect(this.pos, this.size, this.color);
    }
}

class Player extends RectObject
{
    constructor(pos)
    {
        super(pos, vec2(3.2, 1.4), rgb(.2,.9,.95));
        this.renderOrder = 10;
        this.shotCooldown = 0; // minimum frames between shots even when last bullet died
    }
    update()
    {
        if (gameOver || gameWin || levelAnnounce > 0 || respawnTimer > 0)
            return;

        // Switch input mode based on most recent activity. Stick/D-pad press
        // counts as keyboard-mode (uses the same "compute X delta" path).
        const stick = gamepadStick(0);
        const stickActive = abs(stick.x) > .3;
        const kbdX = keyDirection().x;
        if (kbdX || stickActive)
            inputMode = 'keyboard';

        // Switch to mouse mode if mouse clicked
        if (mouseWasPressed(0))
            inputMode = 'mouse';

        if (inputMode === 'keyboard')
        {
            // Keyboard / gamepad: integrate per-frame horizontal velocity
            // Analog stick adds in; clamp to [-1, 1] so combined isn't faster than max.
            const move = clamp(kbdX + stick.x, -1, 1);
            this.pos.x += move * .55;
        }
        else
        {
            // Mouse mode - follow mouse X position instantly
            if (mousePos.x >= playMin.x && mousePos.x <= playMax.x)
                this.pos.x = mousePos.x;
        }

        clampToPlayfield(this.pos, this.size.scale(.5));

        // Shooting — arcade single-bullet rule plus a small min-interval so you
        // can't spam-fire by destroying your bullet immediately against a barrier.
        if (this.shotCooldown > 0) this.shotCooldown--;
        const wantsShoot = inputMode === 'keyboard'
            ? (keyIsDown('Space') || keyIsDown('KeyK') || gamepadIsDown(0))
            : mouseIsDown(0);
        const hasActiveBullet = bullets.some(b => !b.destroyed && b.fromPlayer);
        if (wantsShoot && !hasActiveBullet && this.shotCooldown === 0)
        {
            this.shotCooldown = 12; // ~0.2s between consecutive shots
            playerShotsFired++;
            const b = new Bullet(this.pos.add(vec2(0, 0.1)), vec2(0, 1.2), true);
            b.shotIndex = playerShotsFired;
            bullets.push(b);
            sfxShoot.play(this.pos);
        }
    }
    
    render()
    {
        // Don't draw if hidden (dead, waiting to respawn)
        if (playerHidden)
            return;

        drawSpriteBitmap(this.pos, SPRITE_PLAYER, SPRITE_PIXEL, this.color);
    }
}

class Alien extends RectObject
{
    constructor(pos, row)
    {
        const colors = [
            rgb(.95,.2,.2),   // row 0 - red (top)
            rgb(.2,.95,.2),   // row 1 - green
            rgb(.25,.85,.95), // row 2 - cyan
            rgb(.95,.4,.95),  // row 3 - magenta
            rgb(.95,.95,.2)   // row 4 - yellow (bottom)
        ];
        const base = colors[row % 5];
        super(pos, vec2(2.3, 1.6), base);
        this.row = row;
        this.renderOrder = 5;
        this.animOffset = randIntInclusive(0, 15); // stagger animation per alien
        this.originalPos = pos.copy(); // store spawn position for reset
    }
    // Arcade-style per-row scoring: squid 30, crab 20, octopus 10
    get pointValue() { return this.row === 0 ? 30 : this.row <= 2 ? 20 : 10; }
    get currentBitmap()
    {
        const frame = ((invaderAnimTick + this.animOffset) >> 3) & 1;
        if (this.row === 0) return frame === 0 ? SPRITE_SQUID_A : SPRITE_SQUID_B;
        if (this.row <= 2)  return frame === 0 ? SPRITE_CRAB_A  : SPRITE_CRAB_B;
        return frame === 0 ? SPRITE_OCTOPUS_A : SPRITE_OCTOPUS_B;
    }
    render()
    {
        drawSpriteBitmap(this.pos, this.currentBitmap, SPRITE_PIXEL, this.color);
    }
}

class Bullet extends RectObject
{
    constructor(pos, vel, fromPlayer)
    {
        super(pos, fromPlayer ? vec2(.45, 1.0) : vec2(.25, 1.2), fromPlayer ? rgb(.95,.95,.95) : rgb(.95,.3,.3));
        this.vel = vel; // per frame
        this.fromPlayer = fromPlayer;
        this.renderOrder = 20;
    }
    update()
    {
        this.pos = this.pos.add(this.vel);
        if (this.pos.y > playMax.y + 2 || this.pos.y < playMin.y - 2)
            this.destroy();
    }
    render()
    {
        // Thinner, taller bullets
        drawRect(this.pos, this.size, this.color);
    }
}

class Bomb extends RectObject
{
    constructor(pos)
    {
        super(pos, vec2(.5, 1.6), rgb(.95,.95,.2)); // Larger, yellow for visibility
        this.vel = vec2(0, -0.32);
        this.renderOrder = 20;
        this.animTick = 0;
    }
    update()
    {
        if (gameOver || gameWin)
            return;

        this.pos = this.pos.add(this.vel);
        this.animTick++;
        if (this.pos.y < playMin.y - 2)
            this.destroy();
    }
    
    render()
    {
        // Animated bomb - squiggly effect (larger)
        const frame = (this.animTick >> 2) % 4;
        const offset = [-.2, -.07, .07, .2][frame];
        drawRect(this.pos.add(vec2(offset, .5)), vec2(.4, .5), this.color);
        drawRect(this.pos.add(vec2(-offset, 0)), vec2(.4, .5), this.color);
        drawRect(this.pos.add(vec2(offset, -.5)), vec2(.4, .5), this.color);
    }
}

// Shield: arcade-style pixel-eroded barrier. Owns a 2D grid of "alive" cells;
// projectile hits carve a small organic splash, the alien formation wipes any
// cells it touches. Replaces the old per-block BarrierBlock approach.
class Shield extends EngineObject
{
    constructor(centerPos, gridW, gridH, pixelSize, template)
    {
        const totalSize = vec2(gridW * pixelSize, gridH * pixelSize);
        super(centerPos, totalSize);
        this.gridW = gridW;
        this.gridH = gridH;
        this.pixelSize = pixelSize;
        this.alive = new Uint8Array(gridW * gridH);
        this.color = rgb(.95,.25,.25);
        this.renderOrder = 8;
        this.origin = centerPos.subtract(totalSize.scale(.5)); // world-space bottom-left

        // Stamp the template (visually top-down strings of '#' = alive) into the grid,
        // upscaling if the grid is larger than the template.
        const tH = template.length, tW = template[0].length;
        const sx = gridW / tW, sy = gridH / tH;
        for (let ty = 0; ty < tH; ty++)
        {
            const row = template[ty];
            for (let tx = 0; tx < tW; tx++)
            {
                if (row[tx] !== '#') continue;
                const gx0 = (tx * sx) | 0, gx1 = ((tx + 1) * sx) | 0;
                const gyT0 = (ty * sy) | 0, gyT1 = ((ty + 1) * sy) | 0;
                for (let gyT = gyT0; gyT < gyT1; gyT++)
                for (let gx = gx0; gx < gx1; gx++)
                {
                    const gy = gridH - 1 - gyT; // flip: template top → world bottom
                    this.alive[gy * gridW + gx] = 1;
                }
            }
        }
    }

    cellCenter(gx, gy)
    {
        return vec2(this.origin.x + (gx + .5) * this.pixelSize,
                    this.origin.y + (gy + .5) * this.pixelSize);
    }

    // Find the first alive cell a swept AABB would touch in the direction of motion.
    sweptFirstHit(sweptCenter, sweptSize, velY)
    {
        const px = this.pixelSize;
        const gx0 = max(0,             Math.floor((sweptCenter.x - sweptSize.x/2 - this.origin.x) / px));
        const gx1 = min(this.gridW - 1, Math.floor((sweptCenter.x + sweptSize.x/2 - this.origin.x) / px));
        const gy0 = max(0,             Math.floor((sweptCenter.y - sweptSize.y/2 - this.origin.y) / px));
        const gy1 = min(this.gridH - 1, Math.floor((sweptCenter.y + sweptSize.y/2 - this.origin.y) / px));
        if (gx0 > gx1 || gy0 > gy1) return null;
        if (velY > 0)
        {
            for (let gy = gy0; gy <= gy1; gy++)
            for (let gx = gx0; gx <= gx1; gx++)
                if (this.alive[gy * this.gridW + gx]) return {gx, gy};
        }
        else
        {
            for (let gy = gy1; gy >= gy0; gy--)
            for (let gx = gx0; gx <= gx1; gx++)
                if (this.alive[gy * this.gridW + gx]) return {gx, gy};
        }
        return null;
    }

    // Carve a roughly elliptical splash around (gx,gy) with random edge nibble.
    eraseSplash(gx, gy, rx, ry)
    {
        const dxMax = Math.ceil(rx), dyMax = Math.ceil(ry);
        for (let dy = -dyMax; dy <= dyMax; dy++)
        for (let dx = -dxMax; dx <= dxMax; dx++)
        {
            const fx = dx / rx, fy = dy / ry;
            const d2 = fx*fx + fy*fy;
            if (d2 > 1) continue;
            if (d2 > 0.55 && rand() < 0.35) continue; // organic edge
            const x = gx + dx, y = gy + dy;
            if (x >= 0 && x < this.gridW && y >= 0 && y < this.gridH)
                this.alive[y * this.gridW + x] = 0;
        }
    }

    // Wipe any alive cells inside an AABB (alien formation overlapping shield).
    eraseAABB(aabbCenter, aabbSize)
    {
        const px = this.pixelSize;
        const gx0 = max(0,             Math.floor((aabbCenter.x - aabbSize.x/2 - this.origin.x) / px));
        const gx1 = min(this.gridW - 1, Math.floor((aabbCenter.x + aabbSize.x/2 - this.origin.x) / px));
        const gy0 = max(0,             Math.floor((aabbCenter.y - aabbSize.y/2 - this.origin.y) / px));
        const gy1 = min(this.gridH - 1, Math.floor((aabbCenter.y + aabbSize.y/2 - this.origin.y) / px));
        let any = false;
        for (let gy = gy0; gy <= gy1; gy++)
        for (let gx = gx0; gx <= gx1; gx++)
        {
            const i = gy * this.gridW + gx;
            if (this.alive[i]) { this.alive[i] = 0; any = true; }
        }
        return any;
    }

    isEmpty()
    {
        for (let i = 0; i < this.alive.length; i++)
            if (this.alive[i]) return false;
        return true;
    }

    render()
    {
        const ps = this.pixelSize;
        const half = ps * .5;
        const ox = this.origin.x, oy = this.origin.y;
        const sz = vec2(ps, ps);
        for (let gy = 0; gy < this.gridH; gy++)
        {
            const py = oy + gy * ps + half;
            const rowStart = gy * this.gridW;
            for (let gx = 0; gx < this.gridW; gx++)
            {
                if (this.alive[rowStart + gx])
                    drawRect(vec2(ox + gx * ps + half, py), sz, this.color);
            }
        }
    }
}

class UFO extends RectObject
{
    constructor()
    {
        const dir = rand() < .5 ? 1 : -1;
        const startX = dir > 0 ? -3 : levelSize.x + 3;
        super(vec2(startX, levelSize.y - 2), vec2(3, 1.4), rgb(.95,.25,.25));
        this.velocity = vec2(dir * .08, 0);
        this.renderOrder = 15;
        this.soundTimer = 0;
    }
    
    update()
    {
        this.pos = this.pos.add(this.velocity);
        
        // Play UFO sound every ~60 frames (1 second)
        this.soundTimer++;
        if (this.soundTimer >= 60)
        {
            this.soundTimer = 0;
            sfxUFO.play(this.pos);
        }
        
        if (this.pos.x < -5 || this.pos.x > levelSize.x + 5)
            this.destroy();
    }
    
    render()
    {
        const t = time * 5;

        // Saucer body
        drawSpriteBitmap(this.pos, SPRITE_UFO, SPRITE_PIXEL, this.color);

        // Flashing lights inset along the equator (overdraw single body pixels)
        const lightColors = [rgb(1,1,0), rgb(0,1,1), rgb(1,0,1), rgb(0,1,0)];
        const lightSize = vec2(SPRITE_PIXEL*2);
        for (let i = 0; i < 4; i++)
        {
            const offset = (i - 1.5) * SPRITE_PIXEL * 4;
            const flash = Math.sin(t + i * 1.5) > 0 ? 1 : 0.4;
            drawRect(this.pos.add(vec2(offset, .1)), lightSize, lightColors[i].scale(flash, 1));
        }
    }
}

// ------------------------------------------------------------
// Level creation

function createAliens()
{
    const cols = 11;
    const rows = 5;
    const startX = levelSize.x/2 - (cols-1)*2.8/2;
    const startY = levelSize.y - 6;
    const spacing = vec2(2.8, 2.3);

    for (let r=0; r<rows; r++)
    for (let c=0; c<cols; c++)
    {
        const p = vec2(startX + c*spacing.x, startY - r*spacing.y);
        aliens.push(new Alien(p, r));
    }
}

// Shield bitmap — '#' is a block. Read visually top-down; rounded dome on top,
// arched bottom opening so the player can shoot up through the centre.
const SHIELD_TEMPLATE = [
    '.....######.....',
    '...##########...',
    '..############..',
    '.##############.',
    '################',
    '################',
    '################',
    '################',
    '####........####',
    '###..........###'
];
// Shield grid resolution — 2× the template gives organic pixel erosion without
// flooding the renderer (32×20 cells × 4 shields = 2560 cells/frame, batched WebGL).
const SHIELD_GRID_W = 32;
const SHIELD_GRID_H = 20;
const SHIELD_PIXEL = 0.25;

function createBarriers()
{
    const barrierCount = 4;
    const gap = levelSize.x / (barrierCount + 1);
    for (let i = 1; i <= barrierCount; i++)
    {
        const center = vec2(gap * i, barrierY);
        barriers.push(new Shield(center, SHIELD_GRID_W, SHIELD_GRID_H, SHIELD_PIXEL, SHIELD_TEMPLATE));
    }
}

// ------------------------------------------------------------
// Game loop

function gameInit()
{
    saveDataInit('spaceInvaders');
    setCanvasFixedSize(vec2(960, 540));
    setCameraPos(levelSize.scale(.5));
    cameraScale = 16; // pixels per world unit


    setSoundVolume(.8);
    // Title screen runs an attract-mode demo (animated wave / falling
    // letters), so don't pause the engine while it's up — only pause once
    // the player has actually started a run.
    installAutoPause(() => !titleScreen);

    // CRT vibe: scanlines + bloom + static + vignette over the whole frame
    // (includeMainCanvas=true pulls HUD text/menus through the shader too)
    new PostProcessPlugin(tvShader, true);

    buildMenus();
    initTitleScreen();
}

function startGame()
{
    // Destroy title-screen aliens before starting fresh.
    for (const a of titleAliens) a.destroy();
    titleAliens = [];
    titleScreen = false;
    resetGame();
}

function quitToTitleWithCleanup()
{
    quitToTitle(goToTitleScreen);
}

function buildMenus()
{
    if (typeof createMenu !== 'function') return;

    // Title is canvas-drawn (LITTLEJS / INVADERS with glow). Suppress the DOM
    // title so the menu panel doesn't double up on the heading.
    createTitleMenu({
        title: '',
        onPlay: startGame,
        revealOnClick: false,
        canReveal: () => titleScreen,
        itemsBefore: [
            {type:'label', id:'hiLabel', text:`HI-SCORE ${getBestScore()}`},
        ],
        items: [
            {type:'button', label:'OPTIONS',     onClick: () => pushMenu('options')},
            {type:'button', label:'HOW TO PLAY', onClick: () => pushMenu('about')},
        ],
        onShow: () => {
            const m = getMenu('title');
            if (m) m.getItem('hiLabel')?.setLabel(`HI-SCORE ${getBestScore()}`);
        },
    });

    createOptionsMenu();

    createMenu({
        id: 'about', title: 'HOW TO PLAY', onHide: popMenu,
        items: [
            {type:'text', text:
                'Defend Earth from the descending invaders.\n\n' +
                'MOVE with ←/→ (A/D, D-pad, or stick).\n' +
                'FIRE with Space, K, A button, or click.\n' +
                'Mouse mode tracks the cursor; switching to keyboard or pad ' +
                'toggles back to keyed control.\n\n' +
                'Hide behind the barriers — they crumble. The fewer aliens ' +
                'left, the faster they march. Esc pauses.'},
            {type:'separator'},
            {type:'button', label:'BACK', onClick: () => hideMenu('about')},
        ],
    });

    createPauseMenu({
        onRestart: startGame,
        onQuit:    quitToTitleWithCleanup,
        extraItems: [
            {type:'button', id:'options', label:'OPTIONS', onClick: () => pushMenu('options')},
        ],
    });

    createMenu({
        id: 'gameOver', title: 'GAME OVER', dismissable: false,
        onShow: () => {
            const m = getMenu('gameOver');
            if (!m) return;
            m.getItem('finalScore')?.setLabel(`SCORE     ${score}`);
            m.getItem('hiScore')?.setLabel(   `HI-SCORE  ${getBestScore()}`);
            m.getItem('levelReached')?.setLabel(`LEVEL    ${currentLevel}`);
        },
        items: [
            {type:'label', id:'finalScore',   text:'SCORE     0'},
            {type:'label', id:'hiScore',      text:'HI-SCORE  0'},
            {type:'label', id:'levelReached', text:'LEVEL     0'},
            {type:'separator'},
            {type:'button', label:'PLAY AGAIN',    onClick: () => { hideMenu('gameOver'); startGame(); }},
            {type:'button', label:'QUIT TO TITLE', onClick: quitToTitleWithCleanup},
        ],
    });

    installDefaultToolbar();

    // Show the title menu immediately — no click-to-reveal step.
    showMenu('title');
}

function initTitleScreen()
{
    titleScreen = true;
    titleTimer = 0;
    titleAliens = [];
    
    // Create floating aliens for title screen using real Alien objects
    for (let i = 0; i < 15; i++)
    {
        const row = randIntInclusive(0, 4);
        const worldX = rand(5, 55);
        const worldY = rand(20, 32);
        const alien = new Alien(vec2(worldX, worldY), row);
        alien.titleSpeed = rand(0.02, 0.06);
        alien.titlePhase = rand(0, PI*2);
        alien.titleScale = rand(0.8, 1.4);
        titleAliens.push(alien);
    }
}

function gameUpdate()
{
    // Title screen — menu PLAY button drives startGame; we just keep the
    // attract animation alive here.
    if (titleScreen)
    {
        titleTimer++;
        invaderAnimTick++; // Keep animation running

        // Update floating aliens (real Alien objects)
        for (const a of titleAliens)
        {
            a.pos.x += a.titleSpeed;
            a.pos.y += Math.sin(titleTimer * 0.02 + a.titlePhase) * 0.02;
            if (a.pos.x > 65) a.pos.x = -5;
        }
        return;
    }

    // Pause hotkey: Esc / gamepad Start. Skipped if gameOver menu already up.
    const endMenuShowing = (typeof getTopMenu === 'function') && getTopMenu()?.id === 'gameOver';
    if (!endMenuShowing &&
        (keyWasPressed('Escape') || gamepadWasPressed(9)))
    {
        if (typeof playMenuSound === 'function') playMenuSound('activate');
        if (typeof showMenu === 'function') showMenu('pause');
        inputClearKey('Escape');
        inputClearKey(9, 1, false, true, false);
        return;
    }

    // Surface gameOver menu once the on-canvas delay (gameOverTimer) elapses.
    if (gameOver && gameOverTimer <= 0 && !endMenuShowing)
    {
        submitBestScore(score);
        if (typeof showMenu === 'function') showMenu('gameOver');
        return;
    }
    
    // Level announcement pause
    if (levelAnnounce > 0)
    {
        levelAnnounce--;
        invaderAnimTick++; // Keep aliens animating
        return; // Don't update gameplay during announcement
    }
    
    // Respawn timer - wait before respawning after death
    if (respawnTimer > 0)
    {
        respawnTimer--;
        invaderAnimTick++; // Keep aliens animating
        if (respawnTimer === 0)
        {
            doRespawn();
        }
        return;
    }

    invaderAnimTick++;

    if (gameOver || gameWin)
    {
        if (gameOverTimer > 0) gameOverTimer--;
        return;
    }

    updateInvaders();
    updateUFO();
    updateCollisions();
    cleanupArrays();
    updateMarchingSound();

    // win condition - start next level
    if (!aliens.length)
    {
        currentLevel++;
        startLevel();
    }
    
    // Debug: hold X to kill enemies quickly for testing
    if (keyIsDown('KeyX') && aliens.length > 0 && frame % 5 === 0)
    {
        const a = aliens[0];
        spawnSpriteExplosion(a.pos, a.currentBitmap, SPRITE_PIXEL, a.color);
        score += a.pointValue;
        a.destroy();
        checkBonusLife();
        sfxAlienDeath.play(a.pos);
    }
}

function gameUpdatePost()
{
    setCameraPos(levelSize.scale(.5));
}

function gameRender()
{
    // Pure black background
    drawRect(cameraPos, levelSize.add(vec2(20,20)), rgb(0,0,0));

    if (titleScreen)
    {
        // WebGL-batched parallax starfield, drawn under everything else
        drawTitleStars(titleTimer);
        return;
    }

    // playfield
    drawRect(cameraPos, levelSize, rgb(0,0,0));

    // Red floor line right below the player
    drawRect(vec2(levelSize.x/2, playerY - 0.8), vec2(levelSize.x, .15), rgb(1, 0, 0));
}

// 32-bit hash → [0,1) — used so each star index gets a deterministic position/tint
function starHash(i, salt)
{
    let h = (i * 2654435761 + salt * 1597334677) | 0;
    h ^= h >>> 13; h = (h * 1274126177) | 0; h ^= h >>> 16;
    return ((h >>> 0) / 4294967296);
}

function drawTitleStars(timer)
{
    const w = mainCanvasSize.x;
    const h = mainCanvasSize.y;
    // 4 parallax layers — far/dim/slow → near/bright/fast
    const layers = [
        { count: 320, size: 1, speed: 0.06, alpha: 0.45 },
        { count: 180, size: 2, speed: 0.18, alpha: 0.70 },
        { count: 80,  size: 2, speed: 0.42, alpha: 0.95 },
        { count: 30,  size: 3, speed: 0.85, alpha: 1.00 }
    ];
    let i = 1;
    for (const L of layers)
    {
        const sz = vec2(L.size, L.size);
        for (let n = 0; n < L.count; n++, i++)
        {
            const sx = (starHash(i, 1) * w + timer * L.speed) % w;
            const sy = starHash(i, 2) * h;
            const tint = starHash(i, 3);
            let col;
            if (tint < 0.08)      col = rgb(1.0, 0.78, 0.55, L.alpha);     // amber
            else if (tint < 0.18) col = rgb(0.70, 0.85, 1.00, L.alpha);    // blue-white
            else                  col = rgb(1, 1, 1, L.alpha);
            // screenSpace=true → WebGL pipeline batches all stars
            drawRect(vec2(sx, sy), sz, col, 0, true, true);

            // Occasional twinkle on the brightest layer
            if (L.size > 2 && Math.sin(timer * 0.08 + n) > 0.85)
                drawRect(vec2(sx, sy), vec2(L.size + 2, 1), col, 0, true, true);
        }
    }
}

function gameRenderPost()
{
    // Title screen
    if (titleScreen)
    {
        renderTitleScreen();
        return;
    }
    
    // Classic arcade HUD
    const hudY = 30;
    const color = rgb(.2,.95,.25);
    
    // SCORE at top left
    drawTextScreen('SCORE', vec2(80, hudY), 26, color);
    drawTextScreen(String(score).padStart(4, '0'), vec2(80, hudY + 32), 26, rgb(.95,.95,.95));
    
    // HI-SCORE on top right only
    drawTextScreen('HI-SCORE', vec2(mainCanvasSize.x - 100, hudY), 26, color);
    drawTextScreen(String(max(score, getBestScore())).padStart(4, '0'), vec2(mainCanvasSize.x - 100, hudY + 32), 26, rgb(.95,.95,.95));
    
    // Lives indicator with ship icons at bottom - below the green line
    const livesY = mainCanvasSize.y - 18;
    for (let i = 0; i < lives - 1 && i < 5; i++)
    {
        const px = 50 + i * 45;
        drawSpriteBitmapScreen(px, livesY, SPRITE_PLAYER, 3, rgb(.2,.9,.95));
    }
    
    // Level indicator at bottom right (cyan like player)
    drawTextScreen(`LEVEL ${currentLevel}`, vec2(mainCanvasSize.x - 80, livesY + 3), 26, rgb(.2,.9,.95));

    // Level announcement
    if (levelAnnounce > 0)
    {
        const pulse = 0.7 + Math.sin(levelAnnounce * 0.15) * 0.3;
        const announceColor = rgb(.2 * pulse, .95 * pulse, .25 * pulse);
        drawTextScreen(`LEVEL ${currentLevel}`, vec2(mainCanvasSize.x/2, mainCanvasSize.y/2), 90, announceColor, 10, rgb(0,0,0));
        
        // Show "GET READY" below
        if (levelAnnounce < 90)
            drawTextScreen('GET READY', vec2(mainCanvasSize.x/2, mainCanvasSize.y/2 + 60), 36, rgb(.95,.95,.95), 6, rgb(0,0,0));
    }
    
    // Brief on-canvas banner while the delay timer runs; the gameOver menu surfaces after.
    if (gameOver && gameOverTimer > 0)
    {
        drawTextScreen('GAME OVER', vec2(mainCanvasSize.x/2, mainCanvasSize.y/2 - 20), 80, rgb(.95,.25,.25), 8, rgb(0,0,0));
    }
}

// ------------------------------------------------------------
// Title Screen

function renderTitleScreen()
{
    const ctx = mainContext;
    const w = mainCanvasSize.x;
    const h = mainCanvasSize.y;
    const t = titleTimer * 0.02;

    // Stars are drawn in gameRender via WebGL drawRect (under the engine objects)

    // Planet ring — wide Saturn-style annulus (filled band)
    const ringCX = w * 0.8, ringCY = h * 0.55;
    const ringTilt = -0.3;
    const ringOuterRX = 215, ringOuterRY = 48;
    const ringInnerRX = 92,  ringInnerRY = 20;
    // Cassini gap (thin dark stripe roughly 2/3 of the way out)
    const gapRX = 165, gapRY = 36;
    // Overlap each half slightly past the major-axis seam to hide the join
    const ringSeamEps = 0.06;

    // Back half — drawn before planet
    ctx.fillStyle = '#96c896';
    ctx.beginPath();
    ctx.ellipse(ringCX, ringCY, ringOuterRX, ringOuterRY, ringTilt, PI - ringSeamEps, PI * 2 + ringSeamEps);
    ctx.ellipse(ringCX, ringCY, ringInnerRX, ringInnerRY, ringTilt, PI * 2 + ringSeamEps, PI - ringSeamEps, true);
    ctx.closePath();
    ctx.fill();
    // Gap stripe on back half
    ctx.strokeStyle = '#284';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.ellipse(ringCX, ringCY, gapRX, gapRY, ringTilt, PI - ringSeamEps, PI * 2 + ringSeamEps);
    ctx.stroke();

    // Planet in background (right side)
    const gradient = ctx.createRadialGradient(ringCX, ringCY, 0, ringCX, ringCY, 100);
    gradient.addColorStop(0, '#4a6');
    gradient.addColorStop(0.5, '#284');
    gradient.addColorStop(1, '#051');
    ctx.fillStyle = gradient;
    ctx.beginPath();
    ctx.arc(ringCX, ringCY, 80, 0, PI * 2);
    ctx.fill();

    // Front half — drawn after planet
    ctx.fillStyle = '#96c896';
    ctx.beginPath();
    ctx.ellipse(ringCX, ringCY, ringOuterRX, ringOuterRY, ringTilt, -ringSeamEps, PI + ringSeamEps);
    ctx.ellipse(ringCX, ringCY, ringInnerRX, ringInnerRY, ringTilt, PI + ringSeamEps, -ringSeamEps, true);
    ctx.closePath();
    ctx.fill();
    // Gap stripe on front half
    ctx.strokeStyle = '#284';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.ellipse(ringCX, ringCY, gapRX, gapRY, ringTilt, -ringSeamEps, PI + ringSeamEps);
    ctx.stroke();
    
    // Player ship in foreground (large, bottom left) — same bitmap as in-game
    const shipX = w * 0.22;
    const shipY = h * 0.72;
    const shipBob = Math.sin(t * 2) * 5;
    const shipPx = 12; // pixel size — sprite is 13x8 → 156x96 image
    drawSpriteBitmapScreen(shipX, shipY + shipBob, SPRITE_PLAYER, shipPx, rgb(.2,.9,.95));

    // Engine exhaust: soft ambient halo under the ship, then a tapered flame
    // from each nozzle with hot white core → blue → yellow → orange → transparent.
    const flameTop = shipY + shipBob + 4 * shipPx;
    const flameH = shipPx * 4;
    const flameW = shipPx * 2;

    // Ambient halo
    const haloR = shipPx * 5;
    const haloY = flameTop + flameH * .3;
    const halo = ctx.createRadialGradient(shipX, haloY, 0, shipX, haloY, haloR);
    halo.addColorStop(0, 'rgba(120,190,255,0.30)');
    halo.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = halo;
    ctx.beginPath();
    ctx.arc(shipX, haloY, haloR, 0, PI * 2);
    ctx.fill();

    const drawFlame = (cx, seed) =>
    {
        const flicker = 1 + Math.sin(t * 14 + seed) * .12 + Math.sin(t * 23 + seed * 2) * .06;
        const w = flameW * flicker;
        const tipW = w * .22;
        const tipSway = Math.sin(t * 8 + seed * 1.7) * w * .15;
        const grad = ctx.createLinearGradient(0, flameTop, 0, flameTop + flameH);
        grad.addColorStop(0,    'rgba(255,255,255,0.95)');
        grad.addColorStop(0.18, 'rgba(180,225,255,0.85)');
        grad.addColorStop(0.40, 'rgba(255,210,100,0.78)');
        grad.addColorStop(0.70, 'rgba(255,90,40,0.50)');
        grad.addColorStop(1,    'rgba(120,0,0,0)');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.moveTo(cx - w/2, flameTop);
        ctx.lineTo(cx + w/2, flameTop);
        ctx.lineTo(cx + tipSway + tipW/2, flameTop + flameH);
        ctx.lineTo(cx + tipSway - tipW/2, flameTop + flameH);
        ctx.closePath();
        ctx.fill();
    };
    drawFlame(shipX - shipPx * 3, 1.0);
    drawFlame(shipX + shipPx * 3, 2.5);
    
    // Title text with glow
    const titleY = 90;
    const pulse = 0.8 + Math.sin(t * 3) * 0.2;
    
    // Glow effect
    ctx.shadowColor = '#0f0';
    ctx.shadowBlur = 20 * pulse;
    
    // SPACE
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 72px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('LITTLEJS', w/2, titleY);
    
    // INTRUDERS
    ctx.fillStyle = '#3f3';
    ctx.font = 'bold 84px Arial';
    ctx.fillText('INTRUDERS', w/2, titleY + 80);
    
    ctx.shadowBlur = 0;

    // (CLICK TO START removed — the menus.js title menu owns the PLAY button.)
}

// ------------------------------------------------------------
// Invaders movement + shooting

function updateInvaders()
{
    if (!aliens.length)
        return;

    // compute formation bounds
    let minX = 1e9, maxX = -1e9, minY = 1e9;
    for (const a of aliens)
    {
        const half = a.size.x/2;
        minX = min(minX, a.pos.x - half);
        maxX = max(maxX, a.pos.x + half);
        minY = min(minY, a.pos.y - a.size.y/2);
    }

    const nextMinX = minX + invaderDir * invaderSpeed;
    const nextMaxX = maxX + invaderDir * invaderSpeed;

    let hitEdge = false;
    if (nextMinX < playMin.x + 1.2) hitEdge = true;
    if (nextMaxX > playMax.x - 1.2) hitEdge = true;

    if (hitEdge)
    {
        invaderDir *= -1;
        for (const a of aliens)
            a.pos.y -= invaderDrop;

        // speed up as they descend
        invaderSpeed = min(invaderSpeed + .02, .5);
        alienShootMin = max(alienShootMin - 1, 3);
        alienShootMax = max(alienShootMax - 2, 8);
    }
    else
    {
        // Speed scales inversely with remaining aliens (like original)
        // Uses fourth root so speed increase is more gradual
        const aliveCount = aliens.length;
        const speedMultiplier = Math.pow(55 / aliveCount, 0.25); // max ~2.7x at 1 alien
        for (const a of aliens)
            a.pos.x += invaderDir * invaderSpeed * speedMultiplier;
    }

    // lose if invaders reach the player line
    if (minY < playerY + 2.5)
        doGameOver();

    // Aliens marching into a shield wipe any pixels they overlap.
    for (const a of aliens)
    {
        if (a.destroyed) continue;
        for (const sh of barriers)
        {
            if (sh.destroyed) continue;
            if (!isOverlapping(a.pos, a.size, sh.pos, sh.size)) continue;
            if (sh.eraseAABB(a.pos, a.size) && sh.isEmpty()) sh.destroy();
        }
    }

    // invader shooting - scale rate by number of aliens alive
    if (alienShootTimer > 0) alienShootTimer--;
    if (alienShootTimer === 0)
    {
        alienFire();
        // Fewer aliens = slower shooting (scales linearly with alien count)
        const aliveCount = aliens.length;
        const shootScale = max(0.2, aliveCount / 55); // 20% rate minimum when few aliens
        const scaledMin = alienShootMin / shootScale;
        const scaledMax = alienShootMax / shootScale;
        alienShootTimer = randIntInclusive(scaledMin, scaledMax);
    }
}

function updateUFO()
{
    // Spawn UFO randomly
    if (!ufo || ufo.destroyed)
    {
        ufoSpawnTimer--;
        if (ufoSpawnTimer <= 0)
        {
            ufo = new UFO();
            ufoSpawnTimer = randIntInclusive(600, 1200); // 10-20 seconds
            sfxUFO.play(ufo.pos);
        }
    }
}

function updateMarchingSound()
{
    if (!aliens.length) return;
    
    // Speed up marching based on number of aliens left
    const aliveCount = aliens.length;
    const maxDelay = 40;
    const minDelay = 8;
    const delay = max(minDelay, maxDelay - (55 - aliveCount));
    
    marchTimer--;
    if (marchTimer <= 0)
    {
        marchTimer = delay;
        const sounds = [sfxMarch1, sfxMarch2, sfxMarch3, sfxMarch4];
        // Use center of alien formation for positional audio
        const centerPos = vec2(levelSize.x/2, levelSize.y/2);
        sounds[marchBeat % 4].play(centerPos);
        marchBeat++;
    }
}

function alienFire()
{
    if (!aliens.length)
        return;

    // pick a random column from the alive aliens, then choose the lowest one in that column
    const colSize = 2.8;
    const cols = {};
    for (const a of aliens)
    {
        const col = (a.pos.x / colSize) | 0;
        const best = cols[col];
        if (!best || a.pos.y < best.pos.y)
            cols[col] = a;
    }

    const keys = Object.keys(cols);
    if (!keys.length)
        return;

    const pick = cols[keys[(rand(0, keys.length) | 0)]];
    bombs.push(new Bomb(pick.pos.add(vec2(0, -1.2))));
}

// ------------------------------------------------------------
// Collisions

function updateCollisions()
{
    // bullets vs aliens/barriers/UFO
    for (const b of bullets)
    {
        if (b.destroyed) continue;

        // vs UFO — arcade scoring: value depends on which shot # the bullet was
        if (ufo && !ufo.destroyed && aabbOverlap(b, ufo))
        {
            b.destroy();
            score += ufoPointsFor(b.shotIndex);
                checkBonusLife();
            spawnSpriteExplosion(ufo.pos, SPRITE_UFO, SPRITE_PIXEL, rgb(.95,.25,.25), 1.4);
            ufo.destroy();
            sfxExplode.play(ufo.pos);
            continue;
        }

        // vs aliens
        for (const a of aliens)
        {
            if (a.destroyed) continue;
            if (!aabbOverlap(b, a)) continue;

            b.destroy();
            spawnSpriteExplosion(a.pos, a.currentBitmap, SPRITE_PIXEL, a.color);
            score += a.pointValue;
            a.destroy();
                checkBonusLife();
            sfxAlienDeath.play(a.pos);
            break;
        }

        if (b.destroyed) continue;

        // vs shields — swept hit against each shield's pixel grid; pick the cell
        // closest to bullet's previous position (lowest worldY for upward bullet).
        const sweptCenter = b.pos.subtract(b.vel.scale(.5));
        const sweptSize = vec2(b.size.x + abs(b.vel.x), b.size.y + abs(b.vel.y));
        let bestShield = null, bestHit = null;
        let bestY = b.vel.y > 0 ? Infinity : -Infinity;
        for (const sh of barriers)
        {
            if (sh.destroyed) continue;
            if (!isOverlapping(sweptCenter, sweptSize, sh.pos, sh.size)) continue;
            const hit = sh.sweptFirstHit(sweptCenter, sweptSize, b.vel.y);
            if (!hit) continue;
            const worldY = sh.origin.y + (hit.gy + .5) * sh.pixelSize;
            if (b.vel.y > 0 ? worldY < bestY : worldY > bestY)
            {
                bestY = worldY;
                bestShield = sh;
                bestHit = hit;
            }
        }
        if (bestShield)
        {
            b.destroy();
            bestShield.eraseSplash(bestHit.gx, bestHit.gy, 2, 3);
            sfxHit.play(bestShield.cellCenter(bestHit.gx, bestHit.gy));
            if (bestShield.isEmpty()) bestShield.destroy();
        }
    }

    // bombs vs player/barriers
    for (const bomb of bombs)
    {
        if (bomb.destroyed) continue;

        // vs player
        if (player && !player.destroyed && aabbOverlap(bomb, player))
        {
            bomb.destroy();
            loseLife();
            continue;
        }

        // vs shields — swept hit; bomb travels down so pick the highest worldY cell
        const sweptCenter = bomb.pos.subtract(bomb.vel.scale(.5));
        const sweptSize = vec2(bomb.size.x + abs(bomb.vel.x), bomb.size.y + abs(bomb.vel.y));
        let bestShield = null, bestHit = null, bestY = -Infinity;
        for (const sh of barriers)
        {
            if (sh.destroyed) continue;
            if (!isOverlapping(sweptCenter, sweptSize, sh.pos, sh.size)) continue;
            const hit = sh.sweptFirstHit(sweptCenter, sweptSize, bomb.vel.y);
            if (!hit) continue;
            const worldY = sh.origin.y + (hit.gy + .5) * sh.pixelSize;
            if (worldY > bestY)
            {
                bestY = worldY;
                bestShield = sh;
                bestHit = hit;
            }
        }
        if (bestShield)
        {
            bomb.destroy();
            bestShield.eraseSplash(bestHit.gx, bestHit.gy, 2.5, 3.5);
            sfxHit.play(bestShield.cellCenter(bestHit.gx, bestHit.gy));
            if (bestShield.isEmpty()) bestShield.destroy();
        }
    }
}

function loseLife()
{
    lives--;
    spawnSpriteExplosion(player.pos, SPRITE_PLAYER, SPRITE_PIXEL, rgb(.2,.9,.95), 1.3);
    sfxLoseLife.play(player.pos);

    if (lives <= 0)
    {
        doGameOver();
        return;
    }

    // Clear all projectiles
    for (const b of bullets) b.destroy();
    for (const bomb of bombs) bomb.destroy();
    bullets.length = 0;
    bombs.length = 0;
    
    // Destroy UFO if present
    if (ufo && !ufo.destroyed)
    {
        ufo.destroy();
        ufo = null;
    }
    
    // Hide player during respawn wait (don't move them, just hide)
    playerHidden = true;
    
    // Start respawn timer (2 seconds = 120 frames)
    respawnTimer = 120;
}

function doRespawn()
{
    // Push next UFO out a full 10-20s after death so it doesn't pile right back in
    ufoSpawnTimer = randIntInclusive(600, 1200);
    
    // Reset all remaining aliens to their original spawn positions
    for (const a of aliens)
    {
        if (!a.destroyed)
            a.pos = a.originalPos.copy();
    }
    
    resetInvaderState(false); // Keep current speed based on aliens killed
    
    // Respawn player at center
    player.pos = vec2(levelSize.x/2, playerY);
    playerHidden = false; // show player again
    
    // Show level announcement again (player must wait before shooting)
    levelAnnounce = 120;
}

function doGameOver()
{
    if (gameOver) return;
    gameOver = true;
    gameOverTimer = 120; // 2 second delay before can click
    spawnSpriteExplosion(player.pos, SPRITE_PLAYER, SPRITE_PIXEL, rgb(.2,.9,.95), 1.6);
    sfxExplode.play(player.pos);
}

function checkBonusLife()
{
    if (score >= nextBonusLife)
    {
        lives++;
        nextBonusLife += 1000; // Next bonus at +1000 points
        sfxBonusLife.play(player.pos);
    }
}

function cleanupArrays()
{
    // remove destroyed references
    aliens = aliens.filter(o=>!o.destroyed);
    bullets = bullets.filter(o=>!o.destroyed);
    bombs = bombs.filter(o=>!o.destroyed);
    barriers = barriers.filter(o=>!o.destroyed);
}

// ------------------------------------------------------------
// CRT post-process shader: scanlines + horizontal bloom + static + vignette.
// Tuned slightly milder than the demo so HUD text stays readable.
const tvShader = `
float hash(vec2 p)
{
    p = fract(p * .3197);
    return fract(1. + sin(51.*p.x + 73.*p.y) * 13753.3);
}

void mainImage(out vec4 c, vec2 p)
{
    vec2 uv = p;
    p /= iResolution.xy;
    c = texture(iChannel0, p);

    // faint static noise
    const float staticAlpha = .06;
    const float staticScale = .002;
    c += staticAlpha * hash(floor(p / staticScale) + mod(iTime * 500., 1e3));

    // scan lines
    const float scanlineScale = 1.;
    const float scanlineAlpha = .35;
    c *= 1. - scanlineAlpha * cos(p.y * 2. * iResolution.y / scanlineScale);

    {
        // soft bloom
        const float blurSize = .002;
        const float bloomIntensity = .18;
        vec4 bloom = vec4(0);
        bloom += texture(iChannel0, p + vec2(-2.*blurSize, 0)) * .12;
        bloom += texture(iChannel0, p + vec2(   -blurSize, 0)) * .24;
        bloom += texture(iChannel0, p)                         * .28;
        bloom += texture(iChannel0, p + vec2(    blurSize, 0)) * .24;
        bloom += texture(iChannel0, p + vec2( 2.*blurSize, 0)) * .12;
        bloom += texture(iChannel0, p + vec2(0, -2.*blurSize)) * .12;
        bloom += texture(iChannel0, p + vec2(0,    -blurSize)) * .24;
        bloom += texture(iChannel0, p)                         * .28;
        bloom += texture(iChannel0, p + vec2(0,     blurSize)) * .24;
        bloom += texture(iChannel0, p + vec2(0,  2.*blurSize)) * .12;
        c += bloom * bloomIntensity;
    }

    // dark vignette around edges
    const float vignette = 2.;
    const float vignettePow = 6.;
    float dx = 2.*p.x - 1., dy = 2.*p.y - 1.;
    c *= 1. - pow((dx*dx + dy*dy) / vignette, vignettePow);
}`;

// ------------------------------------------------------------
// Start engine
engineInit(gameInit, gameUpdate, gameUpdatePost, gameRender, gameRenderPost);
