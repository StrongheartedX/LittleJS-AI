<!DOCTYPE html><head>
<title>LittleJS Baseball</title>
<meta charset=utf-8>
</head><body style="background:#000">
<script src="../dist/littlejs.js?1.18.15"></script>
<script src="../dist/box2d.wasm.js"></script>
<script src="../templates/soundGenerator.js"></script>
<script src="../templates/menus.js"></script>
<script>
'use strict';

// engine settings, do not remove
debugWatermark = false;
showEngineVersion = false;

///////////////////////////////////////////////////////////////////////////////
// Top-Down Baseball (Box2D physics, gravity-free 2D field)

// Field layout (Y is north toward pitcher, X is east toward first base)
const platePos      = vec2(0, 0);
const pitcherPos    = vec2(0, 18);
const batterPos     = vec2(-1.4, 0);    // right-handed, 3B side of plate
const catcherPos    = vec2(0, -1.6);
const moundCenter   = vec2(0, 18);
const fenceRadius   = 42;
const backstopY     = -3.0;             // backstop wall south of catcher
const foulAngleHalf = PI/4;             // ±45° from north defines fair territory

// Strike zone (AABB centered at home plate)
const zoneHalf      = vec2(.75, .55);

// Bat & ball
const batLength     = 3.5;
const batThickness  = .25;
const swingDuration = .26;
const ballRadius    = .35;

// Pitch settings
const pitchSpeedMin = 26;
const pitchSpeedMax = 34;

// Game state
let ball, backstopObj;
let pitchNumber = 0, balls = 0, strikes = 0, hits = 0, perfectHits = 0, homeRuns = 0;
let bestDistance = 0;
let lastResultText = '';
let resultColor = hsl(.14, .9, .7);
let resultTimer = new Timer();
let autoPitchTimer = new Timer();

// 'idle' = ball at pitcher
// 'pitch' = ball flying from pitcher toward plate
// 'play' = ball was hit
let ballState = 'idle';
let pitchOutcomeLocked = false; // strike/ball already decided for current pitch
let zoneEntered = false;        // did pitch pass through strike zone?
let swungAtPitch = false;       // did the player swing during this pitch?

// Aim & swing state
let swingTimer = new Timer();
let swingConnected = false;

// menu / session state
let isPlaying = false;

// Particles
const puffs = [];

// Sounds
const sfxSwing   = new SoundGenerator({volume:.45, frequency:170, attack:0, release:.08, slide:.2, shapeCurve:1.5});
const sfxHit     = new SoundGenerator({volume:.6,  frequency:160, attack:0, release:.14, noise:.07, shapeCurve:1.2, slide:.2});
const sfxCrack   = new SoundGenerator({volume:.7,  frequency:380, attack:0, release:.22, noise:.18, shapeCurve:.8, slide:-1});
const sfxStrike  = new SoundGenerator({volume:.42, frequency:90,  attack:0, release:.16, slide:-.4, shapeCurve:2});
const sfxBall    = new SoundGenerator({volume:.32, frequency:380, attack:0, release:.14, slide:-.2, shapeCurve:1.5});
const sfxPitch   = new SoundGenerator({volume:.35, frequency:260, attack:0, release:.08, noise:.1,  slide:-.8});
const sfxCatcher = new SoundGenerator({volume:.4,  frequency:130, attack:0, release:.14, noise:.5,  shapeCurve:2});
const sfxRoll    = new SoundGenerator({volume:.2,  frequency:80,  attack:0, release:.12, noise:.3,  shapeCurve:2});
const sfxHomerun = new SoundGenerator({volume:.55, frequency:520, attack:0, release:.45, slide:.3});

///////////////////////////////////////////////////////////////////////////////
// Helpers

function distPointToSegment(p, a, b)
{
    const ab = b.subtract(a);
    const ap = p.subtract(a);
    const abLen2 = ab.lengthSquared();
    if (abLen2 <= 1e-6) return ap.length();
    const t = clamp(ap.dot(ab) / abLen2, 0, 1);
    return p.distance(a.add(ab.scale(t)));
}

function smoothstep01(t)
{
    t = clamp(t, 0, 1);
    return t*t*(3 - 2*t);
}

function inStrikeZone(p)
{
    // any part of the ball overlapping the zone counts (matches the visual)
    return abs(p.x - platePos.x) <= zoneHalf.x + ballRadius
        && abs(p.y - platePos.y) <= zoneHalf.y + ballRadius;
}

function inFairTerritory(p)
{
    // fair = angle from +X is between 45° and 135° (north-pointing wedge)
    const a = Math.atan2(p.y, p.x);
    return a > PI/2 - foulAngleHalf && a < PI/2 + foulAngleHalf;
}

///////////////////////////////////////////////////////////////////////////////
// Ball

class Ball extends Box2dObject
{
    constructor()
    {
        super(pitcherPos.copy(), vec2(ballRadius*2), 0, 0, hsl(0, 0, .97));
        this.addCircle(ballRadius*2, vec2(), 1.2, .4, .55);
        this.setBullet(true);
        this.setLinearDamping(.2);
        this.setAngularDamping(.5);
        this.setGravityScale(0); // top-down: no gravity
        this.parkAtMound();
    }

    parkAtMound()
    {
        this.setPosition(pitcherPos.copy());
        this.setLinearVelocity(vec2());
        this.setAngularVelocity(0);
        ballState = 'idle';
        pitchOutcomeLocked = false;
        zoneEntered = false;
        swungAtPitch = false;
    }

    pitch()
    {
        const startPos = pitcherPos.copy();
        this.setPosition(startPos);
        this.setAwake(true);
        swungAtPitch = false;

        // ~65% strikes, ~35% balls (outside the zone)
        const aimStrike = rand() < .65;
        let target;
        if (aimStrike)
        {
            target = vec2(
                rand(-zoneHalf.x*.85, zoneHalf.x*.85),
                rand(-zoneHalf.y*.85, zoneHalf.y*.85));
        }
        else
        {
            // pick a side outside the zone
            const side = randInt(4);
            const wide = vec2(zoneHalf.x + rand(.4, 1.3), rand(-zoneHalf.y*1.2, zoneHalf.y*1.2));
            const high = vec2(rand(-zoneHalf.x*1.2, zoneHalf.x*1.2), zoneHalf.y + rand(.4, 1.0));
            target =
                side === 0 ? wide :
                side === 1 ? vec2(-wide.x, wide.y) :
                side === 2 ? high :
                             vec2(high.x, -high.y);
        }

        const speed = rand(pitchSpeedMin, pitchSpeedMax);
        const dir = target.subtract(startPos).normalize();
        this.setLinearVelocity(dir.scale(speed));
        this.setAngularVelocity(rand(-12, 12));
        ballState = 'pitch';
        pitchOutcomeLocked = false;
        zoneEntered = false;
    }

    beginContact(other)
    {
        if (ballState !== 'play') return;
        if (other === backstopObj)
            sfxCatcher.play(this.pos);
    }

    render()
    {
        // soft shadow
        drawCircle(this.pos.add(vec2(.08, -.08)), ballRadius*2.1, hsl(0,0,0,.25));
        // ball
        drawCircle(this.pos, ballRadius*2, this.color);
        // stitching (rotates with body)
        const a = this.angle;
        const r = ballRadius*.7;
        drawLine(this.pos.add(vec2().setAngle(a, r)),
                 this.pos.add(vec2().setAngle(a+PI, r)),
                 .06, hsl(0, .55, .45));
        drawLine(this.pos.add(vec2().setAngle(a+PI/2, r)),
                 this.pos.add(vec2().setAngle(a-PI/2, r)),
                 .06, hsl(0, .55, .45));
    }
}

///////////////////////////////////////////////////////////////////////////////
// Bat

// Right-handed swing: bat pivots at the hand and sweeps CCW from idle (pointing
// back/south behind batter) through east (over the plate) to north-west
// follow-through. LittleJS angle convention: 0=+Y(N), +π/2=+X(E), π=-Y(S).
const batIdleAngle = 2.6;            // ~149° — bat tip rests south-east-ish behind batter
const batSwingArc  = -3.0;           // sweep ~172° CCW (decreasing angle)

function getBatInfo()
{
    const swingT = swingTimer.active() ? swingTimer.getPercent() : 0;
    const eased = smoothstep01(swingT);
    const angle = batIdleAngle + (swingTimer.active() ? batSwingArc * eased : 0);

    const hand = batterPos.add(vec2(.4, .3));
    const dir = vec2().setAngle(angle, batLength);

    return {a: hand, b: hand.add(dir), angle, swingT};
}

function trySwing()
{
    if (swingTimer.active()) return;
    if (ballState === 'play') return;
    swingConnected = false;
    swingTimer.set(swingDuration);
    if (ballState === 'pitch') swungAtPitch = true;
    sfxSwing.play(batterPos);
}

function checkBatContact()
{
    if (ballState !== 'pitch') return;
    if (!swingTimer.active() || swingConnected) return;

    const t = swingTimer.getPercent();
    if (t < .15 || t > .8) return;

    const {a, b} = getBatInfo();
    const d = distPointToSegment(ball.pos, a, b);
    const contactDist = ballRadius + batThickness;
    if (d <= contactDist)
    {
        swingConnected = true;

        // contact quality: sweet-spot position along bat + how centered on segment
        const ab = b.subtract(a);
        const along = clamp(ball.pos.subtract(a).dot(ab) / ab.lengthSquared(), 0, 1);
        const sweet  = 1 - clamp(abs(along - .8) / .5, 0, 1); // sweet spot near tip
        const center = 1 - clamp(d / contactDist, 0, 1);
        const quality = clamp(sweet*.65 + center*.35, 0, 1);

        registerHit(quality);
    }
}

///////////////////////////////////////////////////////////////////////////////
// Game logic

function startPitch()
{
    if (ballState !== 'idle') return;
    pitchNumber++;
    ball.pitch();
    sfxPitch.play(pitcherPos);
}

function endPitch()
{
    pitchOutcomeLocked = true;
    ball.parkAtMound();
    autoPitchTimer.set(1.0);
}

function registerStrike(text)
{
    if (pitchOutcomeLocked) return;
    strikes++;
    lastResultText = text;
    resultColor = hsl(0, .8, .7);
    resultTimer.set(1.3);
    sfxStrike.play(platePos);
    endPitch();

    if (strikes >= 3)
    {
        lastResultText = '3 STRIKES — OUT!';
        resultColor = hsl(0, 1, .65);
        resultTimer.set(1.8);
        balls = strikes = 0;
        autoPitchTimer.set(1.8);
    }
}

function registerBall(text)
{
    if (pitchOutcomeLocked) return;
    balls++;
    lastResultText = text;
    resultColor = hsl(.6, .6, .8);
    resultTimer.set(1.3);
    sfxBall.play(platePos);
    endPitch();

    if (balls >= 4)
    {
        lastResultText = 'BALL FOUR — WALK!';
        resultColor = hsl(.55, .9, .75);
        resultTimer.set(1.8);
        balls = strikes = 0;
        autoPitchTimer.set(1.8);
    }
}

function registerHit(quality)
{
    hits++;
    if (quality > .9) perfectHits++;
    balls = strikes = 0; // a hit resets the count

    // launch direction: perpendicular to the bat axis, 90° CCW
    // (matches the direction the bat is sweeping for our CCW swing)
    const {a, b} = getBatInfo();
    const batAxis = b.subtract(a).normalize();
    const launchDir = vec2(-batAxis.y, batAxis.x);

    const speed = lerp(22, 60, quality);
    ball.setLinearVelocity(launchDir.scale(speed));
    ball.setAngularVelocity(rand(-18, 18));
    ballState = 'play';
    pitchOutcomeLocked = true;

    // contact puffs at ball
    for (let i = 0; i < 18; i++)
    {
        puffs.push({
            p: ball.pos.copy(),
            v: randVec2(rand(2, 6)),
            t: rand(.25, .5),
            c: hsl(.1, .3, .85)
        });
    }

    const label = quality > .9 ? 'PERFECT!' : quality > .65 ? 'Solid hit!' : 'Contact!';
    lastResultText = `${label} (${(quality*100|0)}%)`;
    resultColor = quality > .9 ? hsl(.14, 1, .65) : hsl(.55, .7, .8);
    resultTimer.set(1.6);

    sfxHit.play(ball.pos);
    if (quality > .8) sfxCrack.play(ball.pos);
}

function endPlay()
{
    if (ballState !== 'play') return;
    const dist = ball.pos.length();
    if (!resultTimer.active())
    {
        lastResultText = `In play: ${dist.toFixed(1)}m`;
        resultColor = hsl(.55, .5, .85);
        resultTimer.set(1.4);
    }
    ball.parkAtMound();
    autoPitchTimer.set(.9);
}

function resetSession()
{
    pitchNumber = balls = strikes = hits = perfectHits = homeRuns = 0;
    bestDistance = 0;
    lastResultText = '';
    resultTimer.unset();
    swingTimer.unset();
    swingConnected = false;
    ball.parkAtMound();
    autoPitchTimer.set(.6);
}

///////////////////////////////////////////////////////////////////////////////
// Menus

function startGame()
{
    resetSession();
    isPlaying = true;
    clearSubmenuStack();
    hideAllMenus();
}

function quitToTitle()
{
    isPlaying = false;
    clearSubmenuStack();
    hideAllMenus();
    showMenu('title');
}

function buildMenus()
{
    if (typeof createMenu !== 'function') return;

    // Only pause when a game is actually running. Title menu sits over
    // the canvas without freezing anything.
    installAutoPause();

    createTitleMenu({
        title: 'BASEBALL',
        subtitle: '',
        onPlay: startGame,
        revealOnClick: false,
    });

    createPauseMenu({
        onRestart: startGame,
        onQuit:    quitToTitle,
    });

    installDefaultToolbar();
}

///////////////////////////////////////////////////////////////////////////////
// Engine hooks

async function gameInit()
{
    await box2dInit();

    cameraScale = 14;
    cameraPos = vec2(0, 18);
    gravity = vec2(0, 0); // top-down
    canvasClearColor = hsl(.25, .35, .22); // foul territory / dark green

    // backstop south of the catcher (catches missed pitches)
    backstopObj = new Box2dStaticObject(vec2(0, backstopY));
    backstopObj.addBox(vec2(8, .6), vec2(), 0, 0, .3, .1);
    backstopObj.render = ()=>{};

    ball = new Ball();
    autoPitchTimer.set(.8);

    buildMenus();
    showMenu('title');
}

function gameUpdate()
{
    if (bindPauseKey({when: () => isPlaying})) return;
    if (!isPlaying) return;

    if (keyWasPressed('Space') || mouseWasPressed(0)) trySwing();
    if (keyWasPressed('Enter')) startPitch();
    if (keyWasPressed('KeyR')) resetSession();

    if (ballState === 'pitch')
    {
        // tracking: did the pitch pass through the strike zone?
        if (!zoneEntered && inStrikeZone(ball.pos))
            zoneEntered = true;

        // pitch ends when the ball crosses south of the plate
        if (ball.pos.y < platePos.y - zoneHalf.y - .25)
        {
            if (swungAtPitch)    registerStrike('Swinging Strike!');
            else if (zoneEntered) registerStrike('STRIKE!');
            else                  registerBall('BALL');
        }
    }
    else if (ballState === 'play')
    {
        const dist = ball.pos.length();
        const fair = inFairTerritory(ball.pos);

        if (dist > fenceRadius)
        {
            if (fair)
            {
                homeRuns++;
                if (dist > bestDistance) bestDistance = dist;
                lastResultText = 'HOME RUN!';
                resultColor = hsl(.13, 1, .65);
                resultTimer.set(2.2);
                sfxHomerun.play(ball.pos);
                for (let i = 0; i < 40; i++)
                {
                    puffs.push({
                        p: ball.pos.copy(),
                        v: randVec2(rand(3, 11)),
                        t: rand(.5, 1.1),
                        c: hsl(rand(.08, .18), .9, .7)
                    });
                }
            }
            else
            {
                if (dist > bestDistance) bestDistance = dist;
                lastResultText = `Foul ball — ${dist.toFixed(1)}m`;
                resultColor = hsl(.0, .6, .75);
                resultTimer.set(1.6);
            }
            ball.parkAtMound();
            autoPitchTimer.set(1.2);
        }
        else
        {
            // ball has stopped rolling
            const v = ball.body.GetLinearVelocity();
            const speed2 = v.get_x()*v.get_x() + v.get_y()*v.get_y();
            if (speed2 < .25) endPlay();
        }
    }

    checkBatContact();

    if (autoPitchTimer.elapsed())
    {
        autoPitchTimer.unset();
        startPitch();
    }
}

function gameUpdatePost()
{
    // gentle camera pan toward action
    let target = vec2(0, 18);
    if (ballState === 'play')
    {
        target = vec2(
            clamp(ball.pos.x * .5, -18, 18),
            clamp(10 + ball.pos.y * .55, 6, 26));
    }
    cameraPos = cameraPos.lerp(target, .06);
}

///////////////////////////////////////////////////////////////////////////////
// Rendering

function drawField()
{
    // build the fair-territory polygon: home plate at apex, arc along the fence
    const fairArcSegs = 32;
    const a0 = PI/2 - foulAngleHalf;
    const a1 = PI/2 + foulAngleHalf;
    const fairPoly = [platePos];
    for (let i = 0; i <= fairArcSegs; i++)
    {
        const t = a0 + (a1-a0)*i/fairArcSegs;
        fairPoly.push(vec2(cos(t)*fenceRadius, sin(t)*fenceRadius));
    }
    drawPoly(fairPoly, hsl(.32, .55, .32));

    // warning track: dirt-colored thick line along the inside of the fence
    for (let i = 0; i < fairArcSegs; i++)
    {
        const t0 = a0 + (a1-a0)*i/fairArcSegs;
        const t1 = a0 + (a1-a0)*(i+1)/fairArcSegs;
        const r = fenceRadius - .9;
        drawLine(
            vec2(cos(t0)*r, sin(t0)*r),
            vec2(cos(t1)*r, sin(t1)*r),
            1.6, hsl(.08, .35, .38));
    }

    // dirt infield diamond (square rotated 45° around mound area)
    drawRect(moundCenter.add(vec2(0, -9)), vec2(20, 20), hsl(.08, .45, .35), PI/4);

    // dirt cutout around home plate
    drawCircle(platePos.add(vec2(0, .5)), 5, hsl(.08, .45, .35));

    // outfield fence (white line along the arc)
    for (let i = 0; i < fairArcSegs; i++)
    {
        const t0 = a0 + (a1-a0)*i/fairArcSegs;
        const t1 = a0 + (a1-a0)*(i+1)/fairArcSegs;
        drawLine(
            vec2(cos(t0)*fenceRadius, sin(t0)*fenceRadius),
            vec2(cos(t1)*fenceRadius, sin(t1)*fenceRadius),
            .3, hsl(0, 0, .92));
    }

    // foul lines from home plate to fence
    drawLine(platePos, vec2(cos(PI-foulAngleHalf)*fenceRadius, sin(PI-foulAngleHalf)*fenceRadius), .15, WHITE);
    drawLine(platePos, vec2(cos(foulAngleHalf)*fenceRadius, sin(foulAngleHalf)*fenceRadius), .15, WHITE);

    // bases (white squares at 1B, 2B, 3B)
    const baseSize = vec2(1.2, 1.2);
    const firstBase = vec2(cos(PI/4) * 20, sin(PI/4) * 20);
    const secondBase = vec2(0, 28);
    const thirdBase = vec2(cos(3*PI/4) * 20, sin(3*PI/4) * 20);
    drawRect(firstBase, baseSize, WHITE, PI/4);
    drawRect(secondBase, baseSize, WHITE, PI/4);
    drawRect(thirdBase, baseSize, WHITE, PI/4);

    // pitcher's rubber on the mound
    drawCircle(moundCenter, 4, hsl(.08, .38, .42));
    drawRect(moundCenter, vec2(1.2, .35), WHITE);

    // home plate (pentagon approximated as a small white pentagon-ish shape via two rects)
    drawRect(platePos, vec2(1.2, 1.0), WHITE);
    drawRect(platePos.add(vec2(0, -.6)), vec2(1.0, .5), WHITE, PI/4);

    // strike zone overlay (visible to player)
    drawRect(platePos, zoneHalf.scale(2), hsl(.16, .9, .6, .18));
    // box outline simulated with 4 thin rects
    const zw = zoneHalf.x*2, zh = zoneHalf.y*2;
    drawRect(platePos.add(vec2(0,  zoneHalf.y)), vec2(zw + .06, .06), hsl(.16, 1, .65, .9));
    drawRect(platePos.add(vec2(0, -zoneHalf.y)), vec2(zw + .06, .06), hsl(.16, 1, .65, .9));
    drawRect(platePos.add(vec2( zoneHalf.x, 0)), vec2(.06, zh + .06), hsl(.16, 1, .65, .9));
    drawRect(platePos.add(vec2(-zoneHalf.x, 0)), vec2(.06, zh + .06), hsl(.16, 1, .65, .9));

    // batter's box (rectangle next to plate)
    drawRect(batterPos.add(vec2(0, 0)), vec2(1.6, 2.4), hsl(0, 0, .85, .15));
    drawRect(batterPos.add(vec2(0, 0)), vec2(1.6, 2.4), hsl(0, 0, 1, .35), 0);

    // batter (top-down: head circle + shoulder oval)
    drawEllipse(batterPos.add(vec2(.05, .15)), vec2(1.6, 1.9), hsl(.6, .35, .25));
    drawCircle(batterPos.add(vec2(.05, .25)), 1.0, hsl(.08, .25, .82));

    // catcher (south of plate, crouched)
    drawCircle(catcherPos, 1.6, hsl(.55, .45, .25));
    drawCircle(catcherPos.add(vec2(0, .35)), .85, hsl(.08, .2, .82));

    // pitcher on mound
    drawCircle(pitcherPos.add(vec2(0, -.2)), 1.4, hsl(0, .45, .35));
    drawCircle(pitcherPos.add(vec2(0, 0)), .85, hsl(.08, .25, .82));
}

function drawBat()
{
    const {a, b, swingT} = getBatInfo();

    // bat barrel
    drawLine(a, b, batThickness*2, hsl(.08, .35, .42));
    // grain lines
    const dir = b.subtract(a).normalize();
    for (let i = 1; i < 4; i++)
    {
        const p = a.add(dir.scale(batLength * i/4));
        drawLine(p.subtract(dir.scale(.04)), p.add(dir.scale(.04)),
            batThickness*1.5, hsl(.08, .25, .28));
    }

    // grip wrap
    const gripDir = a.subtract(b).normalize(1);
    const gripEnd = a.add(gripDir.scale(.8));
    drawLine(a, gripEnd, batThickness*2.4, hsl(0, 0, .12));

    // swing-arc hint
    if (swingTimer.active())
        drawCircle(a, 1.0 + swingT*2.2, hsl(.55, .6, .8, .07));
}

function drawParticles()
{
    for (let i = puffs.length; i--;)
    {
        const p = puffs[i];
        p.t -= timeDelta;
        if (p.t <= 0) { puffs.splice(i, 1); continue; }
        p.v = p.v.scale(.96); // air drag
        p.p = p.p.add(p.v.scale(timeDelta));
        const fade = clamp(p.t / .6, 0, 1);
        drawCircle(p.p, lerp(.1, .9, p.t/.6), p.c.scale(1, fade));
    }
}

function gameRender()
{
    drawField();
    drawBat();
    drawParticles();
}

function gameRenderPost()
{
    const cx = mainCanvasSize.x/2;
    const line1 = `BATTING PRACTICE   •   Pitch ${pitchNumber}   •   ${balls}-${strikes}`;
    const line2 = `Hits ${hits}   •   Perfect ${perfectHits}   •   HR ${homeRuns}   •   Best ${bestDistance.toFixed(1)}m`;
    drawTextScreen(line1, vec2(cx, 40), 28, hsl(0,0,1), 4, hsl(0,0,0));
    drawTextScreen(line2, vec2(cx, 76), 22, hsl(0,0,1), 4, hsl(0,0,0));

    if (resultTimer.active() && lastResultText)
    {
        const t = clamp(resultTimer.getPercent(), 0, 1);
        const size = lerp(54, 38, t);
        drawTextScreen(lastResultText, vec2(cx, 140), size, resultColor, 6, hsl(0,0,0));
    }
}

///////////////////////////////////////////////////////////////////////////////
// Startup LittleJS Engine
engineInit(gameInit, gameUpdate, gameUpdatePost, gameRender, gameRenderPost);

</script>
</body>
</html>
