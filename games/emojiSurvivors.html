    Bomb:           {passive: 'Magnet',    name: 'Nuke',         emoji: '☢️',
                     ctor: () => new NukeWeapon()},
    DaggerSlash:    {passive: 'Heart',     name: 'Axe',          emoji: '🪓',
                     ctor: () => new AxeWeapon()},
};

function findAvailableEvolution()
{
    for (const w of player.weapons)
    {
        if (w.evolved) continue;
        if (w.level < 5) continue;
        const baseKey = w.constructor.name.replace(/Weapon$/, '');
        const evo = EVOLUTIONS[baseKey];
        if (!evo) continue;
        const hasPassive = player.passives.some(p => p.name === evo.passive);
        if (!hasPassive) continue;
        return {weapon: w, evo};
    }
    return null;
}

class Bomb extends EngineObject
{
    constructor(pos, damage, radius)
    {
        super(pos, vec2(.8), sprites.bomb);
        this.damageAmount = damage;
        this.radius = radius;
        this.fuse = .9;
        setupKinematicProp(this);
        this.velocity = vec2();
        this.tint = null;
        this.additive = null;
    }

    update()
    {
        super.update();
        this.renderOrder = -baseY(this);

        this.fuse -= 1 / 60;
        // pulse faster as the fuse runs out
        // pulse faster as the fuse runs out: 6Hz at fresh, 20Hz at boom
        const pulseRate = lerp(20, 6, clamp(this.fuse / .9, 0, 1));
        const pulse = Math.sin(time * pulseRate) * .5 + .5;
        this.additive = new Color(.6 * pulse, .1 * pulse, .1 * pulse, 0);

        if (this.fuse <= 0)
        {
            radialBlast(this.pos, this.radius, this.damageAmount);
            this.destroy();
        }
    }

    render()
    {
        if (!isOnScreen(this.pos, this.size.scale(2))) return;
        drawEmoji(this.pos, this.size, sprites.bomb, this.tint, this.additive);
    }
}

// Persistent destructibles scattered across the map — 📦 crates (common, coin
// drops) and 🛢️ barrels (rare, gold-glow, premium drops). Pre-spawned at run
// start, no respawn. Slotted into the `enemies` array so projectiles and AOE
// weapons can damage them with no per-weapon plumbing; target-acquisition
// helpers (nearestEnemy etc.) skip them so auto-aim never wastes a shot.
const breakables = [];

class Breakable extends EngineObject
{
    constructor(pos, isBarrel)
    {
        super(pos, vec2(isBarrel ? 1.1 : 1.0),
              isBarrel ? sprites.barrel : sprites.crate);
        // Halved from 60 / 25 after playtest — was a bit too chewy. Still
        // takes a few solid hits each, just not a small project per crate.
        this.hp = isBarrel ? 30 : 12;
        this.maxHp = this.hp;
        this.isBarrel = isBarrel;
        this.isBreakable = true;
        this.dmg = 0;
        setupKinematicProp(this);
        this.hitFlashTimer = 0;
        this.bobPhase = rand(2 * PI);
        // Fake type so any defensive read of .type.key (none today outside
        // Enemy.render, which Breakable overrides) gets a benign value.
        this.type = {key: 'breakable'};
        enemies.push(this);
        breakables.push(this);
    }

    update()
    {
        super.update();
        this.renderOrder = -baseY(this);
        // Breakables no longer chip on player contact in normal play —
        // only weapons damage them. The one exception is AI test mode:
        // the AI can't aim at a specific crate, so it would just clip
        // through them forever. Walk-into break stays on for the AI so
        // balance runs don't deadlock on a crate field.
        if (playerAI && isOverlapping(this.pos, this.size, player.pos, player.size))
            this.takeDamage(this.hp);
    }

    render()
    {
        if (!isOnScreen(this.pos, this.size.scale(2))) return;
        let additive = null;
        if (this.isBarrel)
        {
            // cyan breathe — distinct from chest's gold pulse so a player
            // can tell premium evolution chests apart from loot barrels.
            const pulse = .5 + .5 * sin(time * 3.5 + this.bobPhase);
            additive = new Color(.05 * pulse, .55 * pulse, .55 * pulse, 0);
        }
        if (this.hitFlashTimer > 0)
        {
            this.hitFlashTimer -= 1 / 60;
            additive = new Color(.85, .85, .85, 0);
        }
        // Small angle wobble so the prop looks alive instead of frozen on
        // the floor. ~±4.5° at a slow rate, independent per-instance via
        // bobPhase so a cluster of crates doesn't sway in unison.
        const sway = sin(time * 1.4 + this.bobPhase) * .08;
        drawEmoji(this.pos, this.size, this.tileInfo, WHITE, additive, sway);
        // Twinkles painted ON the sprite catch the eye in a busy field.
        // Cyan on barrels (premium hue), warm cream on crates so they
        // still read as distinct at a glance.
        const half = this.size.scale(.45);
        const twinkleColor = this.isBarrel
            ? new Color(.55, .95, 1, 1)
            : new Color(1, .95, .7, 1);
        drawTwinkles(this.pos, half, this.isBarrel ? 4 : 3,
                     twinkleColor, this.bobPhase);
    }

    takeDamage(amount)
    {
        this.hp -= amount;
        this.hitFlashTimer = .08;
        if (this.hp <= 0) this.destroy();
    }

    destroy()
    {
        const i = enemies.indexOf(this);
        if (i >= 0) enemies.splice(i, 1);
        const j = breakables.indexOf(this);
        if (j >= 0) breakables.splice(j, 1);
        if (this.hp <= 0)
        {
            const table    = this.isBarrel ? BARREL_DROP_TABLE   : CRATE_DROP_TABLE;
            const fallback = this.isBarrel ? barrelCoinFallback  : crateCoinFallback;
            // Brief un-grabbable window on every loot pickup spawned inside
            // this rollDrop — Pickup's constructor reads the hint. Reset
            // immediately after so future enemy-kill drops grab as fast as
            // they used to (only crate/barrel loot needs the breather).
            pickupSpawnDelay = .45;
            rollDrop(table, this.pos.copy(), this, fallback);
            pickupSpawnDelay = 0;
            if (sounds.chest && sounds.chest.play) sounds.chest.play(this.pos);
        }
        super.destroy();
    }
}

function preSpawnBreakables()
{
    const totalCrates  = 30;
    const totalBarrels = 6;
    const playerSafeRadiusSq = 36;   // keep a 6 wu clearing around (0,0)
    for (let i = 0; i < totalCrates + totalBarrels; ++i)
    {
        const isBarrel = i >= totalCrates;
        let pos;
        for (let tries = 0; tries < 6; ++tries)
        {
            pos = vec2(rand(ARENA_MIN_X + 2, ARENA_MAX_X - 2),
                       rand(ARENA_MIN_Y + 2, ARENA_MAX_Y - 2));
            if (pos.lengthSquared() > playerSafeRadiusSq) break;
        }
        new Breakable(pos, isBarrel);
    }
}

// Used by the spawner cap check — breakables share `enemies` so they have
// to be filtered out of the live-enemy count.
function countLiveEnemies()
{
    let n = 0;
    for (const e of enemies) if (!e.isBreakable) ++n;
    return n;
}

///////////////////////////////////////////////////////////////////////////////
// PASSIVES — in-run stat upgrades. Each passive caps at 5 levels and applies
// its bonus by multiplying the relevant player.*Mult field. recomputeMultipliers
// resets all mults to 1 and walks player.passives to reapply, so it's safe
// to call after any add/levelUp.

class Passive
{
    constructor(name, emoji)
    {
        this.name = name;
        this.emoji = emoji;
        this.level = 1;
    }
    levelUp() { this.level = min(this.level + 1, 5); }
    apply()   {}   // override to mutate player.*Mult fields
}

class FlexPassive       extends Passive { constructor(){ super('Flex',        '💪'); } apply(){ player.dmgMult        *= 1 + this.level * .18; } }
class StopwatchPassive  extends Passive { constructor(){ super('Stopwatch',   '⏱️'); } apply(){ player.fireRateMult   *= 1 + this.level * .14; } }
class MagnifierPassive  extends Passive { constructor(){ super('Magnifier',   '🔍'); } apply(){ player.areaMult       *= 1 + this.level * .12; } }
class RocketPassive     extends Passive { constructor(){ super('Rocket',      '🚀'); } apply(){ player.projSpeedMult  *= 1 + this.level * .14; } }
class MagnetPassive     extends Passive { constructor(){ super('Magnet',      '🧲'); } apply(){ player.magnetMult     *= 1 + this.level * .30; } }
class HeartPassive      extends Passive { constructor(){ super('Heart',       '💗'); } apply(){ player.maxHpMult      *= 1 + this.level * .20; } }
class SneakerPassive    extends Passive { constructor(){ super('Sneaker',     '👟'); } apply(){ player.moveSpeedMult  *= 1 + this.level * .10; } }
class SproutPassive     extends Passive { constructor(){ super('Sprout',      '🌱'); } apply(){ player.xpGainMult     *= 1 + this.level * .12; } }
class PlusOnePassive    extends Passive { constructor(){ super('Plus One',    '➕'); } apply(){ player.extraProjectiles += this.level; } }
class SnackPassive      extends Passive { constructor(){ super('Snack',       '🍗'); } apply(){ player.foodMult      *= 1 + this.level * .25; } }

// Single source of truth for which passives exist + how to spawn one. The
// order of keys here is the order they show up in ALL_PASSIVES below.
const PASSIVE_CTORS = {
    'Flex':      FlexPassive,
    'Stopwatch': StopwatchPassive,
    'Magnifier': MagnifierPassive,
    'Rocket':    RocketPassive,
    'Magnet':    MagnetPassive,
    'Heart':     HeartPassive,
    'Sneaker':   SneakerPassive,
    'Sprout':    SproutPassive,
    'Plus One':  PlusOnePassive,
    'Snack':     SnackPassive,
};
const ALL_PASSIVES = Object.keys(PASSIVE_CTORS);

function makePassiveByName(name)
{
    const C = PASSIVE_CTORS[name];
    return C ? new C() : null;
}

function recomputeMultipliers()
{
    if (!player) return;
    const prevMaxHp = player.maxHp;
    player.dmgMult = player.fireRateMult = player.areaMult = 1;
    player.projSpeedMult = player.magnetMult = 1;
    player.maxHpMult = player.moveSpeedMult = player.xpGainMult = 1;
    player.extraProjectiles = 0;
    player.foodMult = 1;
    player.coinGainMult = 1;
    for (const p of player.passives) p.apply();
    // hero bonuses applied on top of passives
    if (currentHero && currentHero.stats)
    {
        for (const key in currentHero.stats)
            player[key] = (player[key] || 1) * currentHero.stats[key];
    }
    // permanent power-ups (shop-purchased, persisted)
    player.dmgMult       *= 1 + powerUps.might    * .05;
    player.maxHpMult     *= 1 + powerUps.heart    * .10;
    player.moveSpeedMult *= 1 + powerUps.speed    * .05;
    player.fireRateMult  *= 1 + powerUps.cooldown * .05;
    player.magnetMult    *= 1 + powerUps.magnet   * .20;
    player.xpGainMult    *= 1 + powerUps.growth   * .08;
    player.coinGainMult  *= 1 + powerUps.greed    * .10;
    // Curse Mode — harder enemies, but XP and coin gain scale to match.
    const curseFactor = 1 + curseLevel * .5;
    player.xpGainMult   *= curseFactor;
    player.coinGainMult *= curseFactor;
    // mystery-pickup temporary damage boost (decays in Player.update)
    if (player.damageBoostTimer > 0) player.dmgMult *= 2;
    // if maxHpMult grew (Vigor level-up, hero swap, shop), top up current
    // HP by the delta so the bar visibly grows instead of just exposing
    // empty space at the right end.
    const newMaxHp = playerMaxHp * player.maxHpMult;
    if (newMaxHp > prevMaxHp) player.hp += (newMaxHp - prevMaxHp);
    player.maxHp = newMaxHp;
}

const SPAWN_RADIUS = 20;
const ENEMY_CAP    = 800;

const spawner = {
    timer: 0,
    interval: 1.5,
};

// Per-stage enemy weight mixes. Meadow keeps its original elapsed-time
// ramp; later stages return a static map keyed by enemy.key. Weights need
// not sum to 1 — pickWeightedType normalises by total.
function meadowMixForTime(seconds)
{
    if (seconds < 15)  return {ant:.60, zombie:.40};
    if (seconds < 40)  return {ant:.40, zombie:.30, bat:.30};
    if (seconds < 80)  return {ant:.25, zombie:.25, bat:.20, snail:.10, skull:.10, duck:.10};
    if (seconds < 150) return {ant:.20, zombie:.15, bat:.15, snail:.10, skull:.10, clown:.10, duck:.10, ghost:.10};
    if (seconds < 300) return {ant:.10, zombie:.10, bat:.15, snail:.10, skull:.10, clown:.10, duck:.10, ghost:.10, fireImp:.075, iceImp:.075};
    return                    {ant:.05, zombie:.05, bat:.10, snail:.15, skull:.10, clown:.15, duck:.10, ghost:.10, fireImp:.10, iceImp:.10};
}

function pickWeightedType(elapsed)
{
    const mix = currentStage.mixFn(elapsed);
    let total = 0;
    for (const k in mix) total += mix[k];
    const r = rand() * total;
    let acc = 0;
    for (const k in mix)
    {
        acc += mix[k];
        if (r < acc) return ENEMY_TYPES_BY_KEY[k] || ENEMY_TYPES[0];
    }
    return ENEMY_TYPES[0];
}

function spawnBoss(def)
{
    // synthesize an ENEMY_TYPES-compatible record so Enemy can consume it
    const synth = {
        key:        def.key,
        sprite:     def.sprite,
        hp:         def.hp,
        dmg:        def.dmg,
        speed:      def.speed,
        xpDrop:     def.xpDrop,
        size:       def.size,
        splitInto:  def.splitInto,
        splitCount: def.splitCount,
    };
    const pos = player.pos.add(vec2().setAngle(rand(2 * PI), 22));
    const boss = new Enemy(pos, synth, null, def);
    activeBoss = boss;
    if (sounds.bossSpawn && sounds.bossSpawn.play) sounds.bossSpawn.play(boss.pos);
    if (typeof showMenuToast === 'function')
        showMenuToast({icon: '⚠️', title: 'BOSS', text: def.name,
                       duration: 3, position: 'bottom-left'});
}

function updateSpawner()
{
    // boss schedule check — fires once per boss when elapsedTime crosses .time
    for (const boss of BOSS_SCHEDULE)
    {
        if (elapsedTime >= boss.time && !bossesSpawned.has(boss.key))
        {
            bossesSpawned.add(boss.key);
            spawnBoss(boss);
        }
    }
    // Final boss at runDuration — each stage swaps this (Meadow = Reaper,
    // Graveyard = Ogre, Beach = Kraken, Frozen = Frost Giant, Volcano = Dragon).
    // Escalation: every 60 s past runDuration spawns ANOTHER copy of the same
    // final boss at full HP and they don't despawn, so a kiter eventually
    // gets overwhelmed. Killing any one of them still triggers victory.
    if (!gameOver && !runVictory && elapsedTime >= runDuration)
    {
        const expected = 1 + Math.floor((elapsedTime - runDuration) / 60);
        while (finalBossesSpawned < expected)
        {
            finalBossesSpawned++;
            spawnBoss(currentStage.finalBoss);
            // Stages can opt into an ominous tint that overrides the default
            // gold boss-glow (e.g. red for the Reaper, green for the Dragon).
            if (activeBoss && currentStage.finalBoss.finalBossTint)
                activeBoss.eliteAdditive = currentStage.finalBoss.finalBossTint;
        }
    }

    // Spawn pacing — VS-style: ~1 enemy/sec early, ramps to ~11/sec by 3 min.
    // CRITICAL: must use elapsedTime (resets per run) NOT engine `time`
    // (lifetime of the page). Using `time` here was the restart bug —
    // after a death-restart, time was huge → interval at minimum →
    // 15-enemy burst on frame 1 = instant mob.
    // Curse Mode shortens the interval (more spawns per second).
    const curseFactor = 1 + curseLevel * .5;
    spawner.interval = lerp(enemySpawnIntervalBase, 0.35,
                            min(elapsedTime / 180, 1)) / curseFactor;

    spawner.timer -= 1 / 60;
    if (spawner.timer > 0) return;
    spawner.timer = spawner.interval;

    if (countLiveEnemies() >= ENEMY_CAP) return;

    // Burst spawning — 1 enemy/tick early, +1 every 60s of elapsed run
    // time, caps at 4. With the .35s late-game interval, peak is ~11/sec.
    const burst = min(1 + Math.floor(elapsedTime / 60), 4);
    for (let n = 0; n < burst; ++n)
    {
        if (countLiveEnemies() >= ENEMY_CAP) break;
        const type = pickWeightedType(elapsedTime);
        let pos;
        for (let tries = 0; tries < 4; ++tries)
        {
            pos = player.pos.add(vec2().setAngle(rand(2 * PI), SPAWN_RADIUS));
            if (pos.x >= ARENA_MIN_X && pos.x <= ARENA_MAX_X &&
                pos.y >= ARENA_MIN_Y && pos.y <= ARENA_MAX_Y) break;
        }
        // elite chance ramps 0 → 5% over 30s..240s of elapsedTime
        const eliteChance = elapsedTime < 30 ? 0
            : min(.05, (elapsedTime - 30) / 4200);
        const eliteKey = rand() < eliteChance
            ? ELITE_KEYS[randInt(ELITE_KEYS.length)]
            : null;
        new Enemy(pos, type, eliteKey);
    }
}

let magnetRadius = 3;
let playerSpeed = 6;
let playerMaxHp = 100;
let enemySpawnIntervalBase = .66;  // 10% slower than .6 — early game felt too crowded
let xpToNextBase = 5;
let fireballDamage = 2;
let pizzaSpinRate = .4;        // rad/sec tumble for PizzaToss + SpicyPizza slices

let elapsedTime = 0;
let killCount = 0;
let coinsRun = 0;       // coins earned in the current run
let gameOver = false;
let gameOverFrameCount = 0;


// Sound effects bag — populated in gameInit so the user-gesture audio gate
// has fired by the time anything calls .play().
const sounds = {};
let _lastPickupSoundT = 0;
function playPickupSound(s, pos)
{
    // throttle so a magnet pulling 50 gems doesn't become 50 simultaneous tones
    if (time - _lastPickupSoundT < .04) return;
    _lastPickupSoundT = time;
    if (s && s.play) s.play(pos);
}

function isHeroUnlocked(h)
{
    if (!h.unlock) return true;
    if (h.unlock === 'survive10') return survived10Min;
    return false;

let currentHero = HEROES[0];
let coins = 0;          // lifetime persistent
let bestTime = 0;       // lifetime longest survival
let firstVictory = false;  // unlocks Curse Mode on the title screen
let curseLevel = 0;     // 0 = off, 1 = +50%, 2 = +100% (HP/speed/spawn ↔ XP/coin)
// Stage keys the player has beaten. Drives the stage-select unlock chain
// (beat one → unlock the next). Meadow is always playable.
let stagesWon = new Set();
// Unlock flag for the 🧛 Vamp hero — earned by surviving 10 minutes on any
// stage in any single run.

function isStageUnlocked(stageKey)
{
    const idx = STAGES.findIndex(s => s.key === stageKey);
    if (idx <= 0) return true;                      // Meadow / unknown → open

// Permanent power-ups — spent at the title-screen shop with 💰 coins.
// Effects apply on every future run via recomputeMultipliers. Caps at

const POWER_UPS = [
    {key:'might',    emoji:'💪', name:'Might',     desc:'+5% damage'},
    {key:'heart',    emoji:'❤️', name:'Vigor',     desc:'+10% max HP'},
    {key:'speed',    emoji:'👟', name:'Speed',     desc:'+5% move speed'},
    {key:'cooldown', emoji:'⏱️', name:'Haste',     desc:'+5% fire rate'},

    {key:'growth',   emoji:'🌱', name:'Growth',    desc:'+8% XP gain'},
    {key:'greed',    emoji:'💰', name:'Greed',     desc:'+10% coin gain'},
];
const powerUps = {might: 0, heart: 0, speed: 0,
                  cooldown: 0, magnet: 0, growth: 0, greed: 0};
function powerUpCost(level) { return 50 + level * 50; }    // 50/100/150/200/250

function loadMetaState()
{

    if (data.powerUps)

function saveMetaState()
{

              stagesWon: Array.from(stagesWon), powerUps});

function applyHero(hero)
{
    // Just records the choice — the player sprite is whichever hero tile
    // (slot 0-3) was already painted in gameInit. New Player() reads
    // currentHero.spriteKey to pick the right tile.
    currentHero = hero;
}

// Hero-picked → always surface the stage select so the locked stages are
// visible as upcoming content (per the launch spec's discoverability rules).
function onHeroPicked(hero)
{
    currentHero = hero;
    pushMenu('stageSelect');
}

// Wipe every run-scoped entity and timer back to a clean board. Called by
// startRun (before spawning the new run) and goToTitle (before resetting
// the title backdrop). Kept in one place so adding a new entity class only
// needs the instanceof line touched once.
function tearDownRun()
{
    for (const e of enemies.slice()) e.destroy();
    enemies.length = 0;
    breakables.length = 0;
    for (const obj of engineObjects.slice())
    {
        if (obj === player || obj instanceof Enemy || obj instanceof Projectile ||
            obj instanceof Pickup || obj instanceof Bomb ||
            obj instanceof Chest || obj instanceof StarToss ||
            obj instanceof CometProjectile || obj instanceof NukeBomb ||
            obj instanceof NukeField || obj instanceof Breakable ||
            obj instanceof BackdropProp)
            obj.destroy();
    }
    chainFlashes.length = 0;
    explosions.length = 0;
    damageNumbers.length = 0;
    aiSmoothedDir = vec2(1, 0);
    timeSlowTimer = 0;
    bossesSpawned.clear();
    activeBoss = null;
    finalBossesSpawned = 0;
    runVictory = false;
    gameOver = false;
    gameOverFrameCount = 0;
    elapsedTime = 0;
}

function startRun(hero, stage)
{
    applyHero(hero);
    currentStage = stage || currentStage || STAGES[0];
    // Floor colour swaps per stage; gameRender already clears with
    // canvasClearColor every frame so this picks up immediately.
    canvasClearColor = currentStage.floorColor;
    // Fresh run state — same teardown that restartGame uses, but starts
    // with the hero's chosen weapon instead of the default fireball.
    tearDownRun();
    spawner.timer = 0;
    spawner.interval = 1.5;
    killCount = 0;
    coinsRun = 0;

    player = new Player();
    player.weapons = [makeWeaponByName(hero.weapon)];
    player.passives = [];
    recomputeMultipliers();

    // Scatter the breakable props across the arena. Must run after the
    // teardown loop above (so a restart starts from a clean board) and
    // after player creation (so the safe-radius check has a player at
    // origin to keep away from).
    preSpawnBreakables();
    // Reroll road layout per run and spawn the y-sorted backdrop props
    // (trees / headstones / etc.) randomly across the arena.
    rebuildRoadStrips();
    spawnBackdropProps();

    setPlaying(true);
    hideAllMenus();
}

// AI auto-player — toggle with the T key. Useful for balance testing.
// Movement only (weapons auto-fire anyway), random level-up picks, and
// an automatic restart ~1.5s after death so a long balance pass loops.
let playerAI = false;
// Debug god-mode toggle (window.godMode() flips it). When true the player
// takes no damage AND no contact reaction at all — same gate as the AI
// test mode so hurt-flash, hurt-sound, and the enemy knockback bounce are
// all skipped, not just the HP subtraction.
let godMode = DEBUG_GOD_MODE_DEFAULT;

// Smoothed heading for the AI auto-player so a goal-switch doesn't flip
// direction abruptly. The AI itself just chases the nearest loot; see
// aiDirection() below.
let aiSmoothedDir = vec2(1, 0);

// Pointer direction — press anywhere on the canvas and the player walks
// toward that point. Since the camera centers on the player, "the
// direction from screen center" IS "the direction from the player".
// Works for both mouse and touch (touch routes through mouse state).
// Returns a unit vector so movement is full-speed regardless of how
// far the press is from center; 30px center deadzone for stability.
function touchDirection()
{
    if (!mouseIsDown(0)) return vec2();
    const cs = mainCanvasSize;
    const dx = mousePosScreen.x - cs.x / 2;
    const dy = mousePosScreen.y - cs.y / 2;
    const len = Math.sqrt(dx * dx + dy * dy);
    if (len < 30) return vec2();
    // screen y grows downward; world y grows upward — flip dy
    return vec2(dx / len, -dy / len);
}

// Vision range for the AI auto-player — anything farther than this is
// invisible to it, so it doesn't run across the whole map for a single
// distant crate or barrel it shouldn't realistically be able to see.
// Roughly matches the visible camera area at cameraScale = 40 with a
// little margin (camera shows ~24×16 wu, this is a ~30 wu radius bubble).
const AI_VISION_RANGE = 30;
const AI_VISION_RANGE_SQ = AI_VISION_RANGE * AI_VISION_RANGE;

function aiDirection()
{
    // AI is invuln in test mode, so there's no reason to fear enemies —
    // chasing loot keeps it moving and naturally pulls weapons through the
    // swarm. Priority: a real Pickup > a Breakable (loot source) > the
    // nearest enemy (so weapons have something to fire at). Falls back to
    // origin if nothing's within vision range.
    let goal = null;
    let goalD2 = AI_VISION_RANGE_SQ;

    for (const obj of engineObjects)
    {
        if (!(obj instanceof Pickup) || obj.destroyed) continue;
        const d = player.pos.distanceSquared(obj.pos);
        if (d < goalD2) { goalD2 = d; goal = obj.pos; }
    }
    if (!goal)
    {
        for (const b of breakables)
        {
            const d = player.pos.distanceSquared(b.pos);
            if (d < goalD2) { goalD2 = d; goal = b.pos; }
        }
    }
    if (!goal)
    {
        for (const e of enemies)
        {
            if (e.isBreakable) continue;
            const d = player.pos.distanceSquared(e.pos);
            if (d < goalD2) { goalD2 = d; goal = e.pos; }
        }
    }
    if (!goal) goal = vec2(0, 0);

    // EMA-smooth the heading so a goal switch doesn't flip direction
    // mid-frame and look like a teleport.
    const heading = goal.subtract(player.pos);
    const target = heading.length() > .01 ? heading.normalize() : vec2(1, 0);
    aiSmoothedDir = aiSmoothedDir.scale(.85).add(target.scale(.15));
    return aiSmoothedDir.length() > .01 ? aiSmoothedDir.normalize() : target;
}

async function gameInit()
{
    saveDataInit('emojiSurvivors');
    initDrawToTexture(8);
    DEBUG_SPRITES && showAtlasOverlay();

    // hero sprites — painted once at startup; HEROES[*].spriteKey selects
    // which one the player uses. Avoids any mid-game atlas re-upload.
    // ─── Atlas layout (8×8) ─────────────────────────────────────────────
    // Row 0 — Utility + Heroes
    // Row 1 — Common enemies
    // Row 2 — Theme enemies + bolt + 1 breakable (barrel)
    // Row 3 — Bosses + Volcano backdrops

    sounds.levelUp   = new SoundGenerator({frequency: 523,  release: .4,  pitchJump: 392, pitchJumpTime: .12, volume: .5});
    sounds.hurt      = new SoundGenerator({frequency: 120,  release: .18, noise: .35, volume: .55});
    sounds.bossSpawn = new SoundGenerator({frequency: 60,   release: 1.2, noise: .25, slide: -8, volume: .6});
    sounds.chest     = new SoundGenerator({frequency: 660,  release: .5,  pitchJump: 880, pitchJumpTime: .15, volume: .55});

    sounds.victory   = new SoundGenerator({frequency: 523,  release: .9,  pitchJump: 784, pitchJumpTime: .25, volume: .6});

    // a backdrop. startRun() recreates the player when the user picks a hero.

    // default stage. startRun rebuilds both when a real run begins.

    createMenu({
        id: 'title',
        title: '🎉 EMOJI SURVIVORS 🎉',
        subtitle: 'Survive the ☠️ Reaper',
        dismissable: false,
        onShow: () =>
        {
            const m = getMenu('title');
            if (!m) return;
            const best = m.getItem('bestLabel');
            const coinsLabel = m.getItem('coinsLabel');
            if (best) best.setLabel('🏆 Best: ' + formatTime(bestTime));
            if (coinsLabel) coinsLabel.setLabel('💰 Total Coins: ' + coins);
            const curseBtn = m.getItem('curseBtn');
            if (curseBtn)
            {
                curseBtn.setVisible(firstVictory);
                curseBtn.setLabel('💀 Curse: ' + curseLabel(curseLevel));

        },
        items: [
            {type: 'label',     id: 'bestLabel',  text: '🏆 Best: 0:00'},

            {type: 'button',    label: 'SHOP',    onClick: () => pushMenu('shop')},

                                label: '💀 Curse: OFF',
                                title: 'Curse Mode boosts enemy HP, speed, ' +
                                       'and spawn rate. XP and coin gain ' +
                                       'scale up to match.',
                                onClick: cycleCurse},
            {type: 'button',    label: 'ABOUT',   onClick: () => pushMenu('about')},
        ],
    });

    // Power-Up shop — spend lifetime coins for permanent stat boosts.
    // Labels are refreshed in onShow + after each purchase so the level,
    // cost, and 💰 counter stay in sync without re-creating the menu.
    // Total coins spent on a single power-up at its current level — the
    // sum of costs for levels 0..(lvl-1). Closed form: 25*lvl*(lvl+1).
    function totalSpentOn(lvl) { return 25 * lvl * (lvl + 1); }
    function totalRefundable()
    {
        let t = 0;
        for (const k in powerUps) t += totalSpentOn(powerUps[k]);
        return t;
    }
    function refreshShopLabels()
    {
        const m = getMenu('shop');
        if (!m) return;
        const coinsLabel = m.getItem('shopCoins');
        if (coinsLabel) coinsLabel.setLabel('💰 ' + coins);
        for (const p of POWER_UPS)
        {
            const item = m.getItem(p.key);
            if (!item) continue;
            const lvl = powerUps[p.key];
            const maxed = lvl >= 5;
            const cost = powerUpCost(lvl);
            const lvlBar = '★'.repeat(lvl) + '☆'.repeat(5 - lvl);
            const label = maxed
                ? p.emoji + ' ' + p.name + ' ' + lvlBar + ' MAX'
                : p.emoji + ' ' + p.name + ' ' + lvlBar +
                  ' — ' + cost + '💰 (' + p.desc + ')';
            item.setLabel(label);
            item.setDisabled(maxed || coins < cost);
        }
        const refundItem = m.getItem('refund');
        if (refundItem)
        {
            const refund = totalRefundable();
            refundItem.setLabel(refund > 0
                ? '↩ Refund All (+' + refund + '💰)'
                : '↩ Refund All');
            refundItem.setDisabled(refund <= 0);
        }
    }
    function buyPowerUp(p)
    {
        const lvl = powerUps[p.key];
        if (lvl >= 5) return;
        const cost = powerUpCost(lvl);
        if (coins < cost) return;
        coins -= cost;
        powerUps[p.key] = lvl + 1;
        saveMetaState();
        refreshShopLabels();
    }
    function refundAllPowerUps()
    {
        const refund = totalRefundable();
        if (refund <= 0) return;
        for (const k in powerUps) powerUps[k] = 0;
        coins += refund;
        saveMetaState();
        refreshShopLabels();
    }
    createMenu({
        id: 'shop',
        title: '💰 POWER-UP SHOP',
        subtitle: 'Permanent bonuses, apply to every future run',
        dismissable: true,
        onShow: refreshShopLabels,
        // Surface the title screen on every real dismiss (BACK / Esc /
        // backdrop). Avoids submenuStack altogether — the confirm dialog's
        // YES handler calls clearSubmenuStack() and would leave popMenu()
        // with nothing to surface. Push events (sub-dialog opens) carry
        // reason 'push' and are ignored here.
        onHide: reason => { if (reason === 'dismiss') showMenu('title'); },
        items: [
            {type: 'label', id: 'shopCoins', text: '💰 0'},
            {type: 'separator'},
            ...POWER_UPS.map(p => ({
                type: 'button',
                id: p.key,
                label: p.emoji + ' ' + p.name,   // refreshed by onShow
                title: p.desc + ' Applies to every future run, caps at Lv 5.',
                onClick: () => buyPowerUp(p),
            })),
            {type: 'separator'},
            {type: 'button',
                id: 'refund',
                label: '↩ Refund All',
                onClick: () =>
                {
                    const refund = totalRefundable();
                    if (refund <= 0) return;
                    showConfirmDialog({
                        icon: '↩️',
                        title: 'Refund All Power-Ups?',
                        message: 'Reset every power-up to Lv 0 and return ' +
                                 '💰 ' + refund + ' coins.',
                        yesLabel: 'REFUND',
                        noLabel:  'CANCEL',
                        // showConfirmDialog's YES handler intentionally
                        // calls clearSubmenuStack() (so quit-to-title-style
                        // navigations work cleanly), which wipes the back
                        // chain. Re-show the shop explicitly afterward.
                        onYes: () => { refundAllPowerUps(); showMenu('shop'); },
                    });
                }},
            {type: 'button', label: 'BACK', onClick: () => hideMenu('shop')},
        ],
    });

    // Hero select — picks one, then surfaces the stage select. All heroes
    // appear; locked ones are greyed and labelled with their unlock hint so
    // players can see the depth that's coming.
    createMenu({
        id: 'heroSelect',
        title: 'PICK YOUR HERO',
        dismissable: true,
        onShow: () =>
        {
            const m = getMenu('heroSelect');
            if (!m) return;
            for (const h of HEROES)
            {
                const item = m.getItem('hero-' + h.key);
                if (!item) continue;
                const unlocked = isHeroUnlocked(h);
                const lockMark = unlocked ? '' : ' 🔒';
                item.setLabel(h.emoji + '  ' + h.name + ' — ' + h.blurb + lockMark);
                item.setDisabled(!unlocked);
            }
        },
        // Only surface the title menu again if the user dismissed via BACK/Esc.
        // If a hero pick is in flight, startRun() set isPlaying=true and is
        // about to hideAllMenus() — re-showing title here would clobber the
        // run before it starts. Also branch on the reason so pushing the
        // stage-select doesn't pop heroSelect off the stack (BACK from
        // stage-select needs to come back here, not skip to title).
        onHide: reason => { if (reason === 'dismiss' && !isPlaying()) popMenu(); },
        items: HEROES.map(h => ({
            type: 'button',
            id: 'hero-' + h.key,
            label: h.emoji + '  ' + h.name + ' — ' + h.blurb,
            title: h.unlock && !isHeroUnlocked(h)
                ? '🔒 ' + h.unlockHint

            onClick: () => onHeroPicked(h),
        })).concat([
            {type: 'separator'},
            {type: 'button', label: 'BACK', onClick: () => hideMenu('heroSelect')},
        ]),
    });

    // Stage select — only surfaces after a second stage is unlocked, per
    // the design doc ("don't show a one-option choose-your-stage menu").
    // Each row mirrors a STAGES entry; locked rows are disabled and labelled.
    createMenu({
        id: 'stageSelect',
        title: 'CHOOSE STAGE',
        dismissable: true,
        onShow: () =>
        {
            const m = getMenu('stageSelect');
            if (!m) return;
            for (const s of STAGES)
            {
                const item = m.getItem('stage-' + s.key);
                if (!item) continue;
                const unlocked = isStageUnlocked(s.key);
                const won      = stagesWon.has(s.key);
                const wonMark  = won      ? ' 🏆' : '';
                const lockMark = unlocked ? ''   : ' 🔒';
                item.setLabel(s.emoji + '  ' + s.name + wonMark + lockMark);
                item.setDisabled(!unlocked);
            }
        },
        onHide: reason => { if (reason === 'dismiss' && !isPlaying()) popMenu(); },
        items: STAGES.map(s => ({
            type: 'button',
            id: 'stage-' + s.key,
            label: s.emoji + '  ' + s.name,
            onClick: () => startRun(currentHero, s),
        })).concat([
            {type: 'separator'},
            {type: 'button', label: 'BACK', onClick: () => hideMenu('stageSelect')},
        ]),
    });

    // About — explains the loop briefly.
    createMenu({
        id: 'about',
        title: 'ABOUT',
        dismissable: true,
        onHide: popMenu,
        items: [
            {type: 'text', text:
                'Move with WASD or arrows. Weapons fire automatically.\n\n' +
                'Defeat enemies to collect 💎 XP and level up. Pick weapons and ' +
                'passive items to grow. Bosses 🦇 🧟 🤡 drop 🎁 chests — open them ' +
                'with the right combo of weapon-at-max-level + matching passive to ' +
                'evolve a weapon.\n\n' +
                'Survive until 15:00 and kill the ☠️ Reaper to win.'},
            {type: 'separator'},
            {type: 'button', label: 'BACK', onClick: () => hideMenu('about')},
        ],
    });

    // Pause menu — surfaced by Esc / gamepad Start via bindPauseKey().
    createPauseMenu({
        onQuit:      goToTitle,
        confirmQuit: false,
    });

    // HUD toolbar — top-right corner. Always visible; the hamburger grays
    // out when the title menu is on top.
    installDefaultToolbar();

    tweakEngineDefaults();
    tweakDivider('Emoji Survivors');
    tweak('playerSpeed',              {min: 2,   max: 12});
    tweak('playerMaxHp',              {min: 50,  max: 300});
    tweak('enemySpawnIntervalBase',   {min: .2,  max: 3});
    tweak('xpToNextBase',             {min: 2,   max: 20});
    tweak('fireballDamage',           {min: 1,   max: 10});
    tweak('magnetRadius',             {min: 1,   max: 10});
    tweak('runDuration',              {min: 60,  max: 1800});
    tweak('pizzaSpinRate',            {min: 0,   max: 20});

    if (DEBUG_AUTOSTART) startRun(HEROES[0], STAGES[0]);
    else                 showMenu('title');
}

    Bomb:           {ctor: BombWeapon,           emoji: '💣', displayName: 'Bomb'},
    DaggerSlash:    {ctor: DaggerSlashWeapon,    emoji: '🗡️', displayName: 'Dagger Slash'},
    StarToss:       {ctor: StarTossWeapon,       emoji: '⭐', displayName: 'Star Toss'},
    HeartDrain:     {ctor: HeartDrainWeapon,     emoji: '💓', displayName: 'Heart Drain'},
};

function displayNameForWeapon(name)
{
    const info = WEAPON_INFO[name];
    return info && info.displayName ? info.displayName : name;
}
const ALL_WEAPONS = Object.keys(WEAPON_INFO);

function makeWeaponByName(name)
{
    const info = WEAPON_INFO[name];
    return info ? new info.ctor() : null;
}

function emojiForWeapon(name)
{
    const info = WEAPON_INFO[name];
    return info ? info.emoji : '?';
}
