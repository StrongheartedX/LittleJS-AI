// Fan weapons — the only ones Plus One affects. Used to gate Plus One offers
// so a player with no fan weapon never gets a dead-pick option.
const FAN_WEAPONS = new Set(['PizzaToss', 'SpicyPizza', 'StarToss', 'StarStorm']);

function ownsFanWeapon()
{
    if (!player || !player.weapons) return false;
    for (const w of player.weapons)
        if (FAN_WEAPONS.has(w.constructor.name.replace(/Weapon$/, '')))
            return true;
    return false;
}

// Fired when no upgrade choice exists — keeps late-game level-ups and
// recipe-less chests from feeling dead. Heal 15 HP + 3 coins is small
// but visible.
function grantMaxBuildReward()
{
    if (!player) return;
    player.hp = min(player.maxHp, player.hp + 15);
    coinsRun += 3;
    coins    += 3;
    saveMetaState();
    if (typeof showMenuToast === 'function')
    {
        showMenuToast({icon: '🎁', title: 'MAX BUILD',
                       text: '+15 HP   +3💰',
                       duration: 2.5, position: 'bottom-right'});
    }
}

function buildUpgradeChoices()
{
    const choices = [];
    const hasFan = ownsFanWeapon();
    const banished = (player && player.banishedUpgrades) || new Set();

    // Level-up existing weapons that aren't capped
    for (const w of player.weapons)
    {
        if (w.level < 5)
        {
            const baseKey = w.constructor.name.replace(/Weapon$/, '');
            choices.push({
                key: 'wlvl:' + baseKey,
                label: emojiForWeapon(baseKey) +
                       ' ' + w.name + ' → Lv ' + (w.level + 1),
                title: WEAPON_DESCRIPTIONS[baseKey] || '',
                apply: () => w.levelUp(),
            });
        }
    }
    // Unlock new weapons (cap at 5 total)
    if (player.weapons.length < 5)
    {
        const have = new Set(player.weapons.map(w =>
            w.constructor.name.replace(/Weapon$/, '')));
        for (const name of ALL_WEAPONS)
        {
            if (have.has(name)) continue;
            choices.push({
                key: 'wnew:' + name,
                label: emojiForWeapon(name) + ' Unlock ' + displayNameForWeapon(name) + ' (Lv 1)',
                title: WEAPON_DESCRIPTIONS[name] || '',
                apply: () => player.weapons.push(makeWeaponByName(name)),
            });
        }
    }

    // Level-up existing passives that aren't capped. Plus One is suppressed
    // when no fan weapon is owned (it only affects fan-shot weapons).
    for (const p of player.passives)
    {
        if (p.level >= 5) continue;
        if (p.name === 'Plus One' && !hasFan) continue;
        choices.push({
            key: 'plvl:' + p.name,
            label: p.emoji + ' ' + p.name + ' → Lv ' + (p.level + 1),
            title: PASSIVE_DESCRIPTIONS[p.name] || '',
            apply: () => { p.levelUp(); recomputeMultipliers(); },
        });
    }
    // Unlock new passives (cap at 5 owned)
    if (player.passives.length < 5)
    {
        const haveP = new Set(player.passives.map(p => p.name));
        for (const name of ALL_PASSIVES)
        {
            if (haveP.has(name)) continue;
            if (name === 'Plus One' && !hasFan) continue;
            const proto = makePassiveByName(name);
            choices.push({
                key: 'pnew:' + name,
                label: proto.emoji + ' Unlock ' + proto.name + ' (Lv 1)',
                title: PASSIVE_DESCRIPTIONS[name] || '',
                apply: () =>
                {
                    player.passives.push(makePassiveByName(name));
                    recomputeMultipliers();
                },
            });
        }
    }

    // Strip banished choices before picking.
    const live = choices.filter(c => !banished.has(c.key));

    // Random shuffle and pick up to 3
    for (let i = live.length - 1; i > 0; --i)
    {
        const j = randInt(i + 1);
        [live[i], live[j]] = [live[j], live[i]];
    }
    return live.slice(0, 3);
}

// Per-level-up state. Reroll counter scales cost; banish-mode flag turns the
// three choice rows into "tap to remove" targets; limitBreak flips the menu
// into Limit Break mode where only the choices are shown (no reroll / skip /
// banish — there's nothing left to thin or skip). All reset when a fresh
// level-up enters showLevelUpMenu (not on rebuild).
let levelUpRerolls    = 0;
let levelUpBanishes   = 0;     // banish-uses this level-up; doubles cost
let levelUpBanishMode = false;
let levelUpLimitBreak = false;
let levelUpChoices    = [];

// Max-build detector — the design's trigger for Limit Break: every weapon
// slot and every passive slot full, every entry at Lv 5.
function isMaxBuild()
{
    if (!player || !player.weapons || !player.passives) return false;
    if (player.weapons.length  < 5) return false;
    if (player.passives.length < 5) return false;
    for (const w of player.weapons)  if (w.level < 5) return false;
    for (const p of player.passives) if (p.level < 5) return false;
    return true;
}

// Apply a Limit Break pick to a weapon: non-evolved weapons keep leveling
// past 5 (formula scales freely); evolved weapons gain a +8% damage stack.
function limitBreakWeapon(w)
{
    if (w.evolved) w.lbBonus = (w.lbBonus || 1) * 1.08;
    else           w.level++;
}

// Build three random "push this maxed weapon" picks plus the "+10 coins"
// option. Player owns 5 weapons at this point so the shuffle distinguishes
// which three get offered each level-up.
function buildLimitBreakChoices()
{
    const choices = [];
    const pool = player.weapons.slice();
    for (let i = pool.length - 1; i > 0; --i)
    {
        const j = randInt(i + 1);
        [pool[i], pool[j]] = [pool[j], pool[i]];
    }
    const picks = pool.slice(0, 3);
    for (const w of picks)
    {
        const baseKey = w.constructor.name.replace(/Weapon$/, '');
        const label = w.evolved
            ? '✨ ' + emojiForWeapon(baseKey) + '  ' + w.name + ' — Limit Break (+8% dmg)'
            : '✨ ' + emojiForWeapon(baseKey) + '  ' + w.name + ' — Limit Break (Lv ' + (w.level + 1) + ')';
        const title = w.evolved
            ? '+8% damage to ' + w.name + ' on top of any previous Limit Breaks.'
            : 'Push ' + w.name + ' past its Lv 5 cap — its per-level scaling continues.';
        choices.push({
            key: 'lb:' + baseKey + ':' + (w.lbBonus || w.level),
            label,
            title,
            apply: () => limitBreakWeapon(w),
        });
    }
    choices.push({
        key: 'lb:coins',
        label: '💰 Take 10 coins',
        title: 'Skip the Limit Break and bank 10 coins instead.',
        apply: () =>
        {
            coins    += 10;
            coinsRun += 10;
            saveMetaState();
        },
    });
    return choices;
}

const REROLL_BASE_COST  = 10;
const BANISH_BASE_COST  = 20;
const SKIP_XP_FRACTION  = .2;   // +20% of next-level XP

function levelUpRerollCost() { return REROLL_BASE_COST + levelUpRerolls * REROLL_BASE_COST; }
// Banish cost doubles per use within a single level-up (20 → 40 → 80 → …),
// mirroring reroll's "expensive to repeat" feel but harsher since banish
// is permanent for the run. Resets per level-up so you always get one
// cheap banish per ding.
function levelUpBanishCost() { return BANISH_BASE_COST * (1 << levelUpBanishes); }

// Finish handling the current pending level-up — close the menu and either
// show the next queued one or stop.
function finishLevelUp()
{
    const m = getMenu('levelup');
    if (m) { hideMenu('levelup'); m.destroy(); }
    levelUpBanishMode = false;
    levelUpLimitBreak = false;
    player.pendingLevelUps--;
    if (player.pendingLevelUps > 0)
        requestAnimationFrame(showLevelUpMenu);
}

// Re-pull choices from the world (post-banish or post-reroll) and either
// rebuild the menu or fall through to the max-build reward if nothing's left.
function refreshLevelUpChoices()
{
    levelUpChoices = buildUpgradeChoices();
    if (levelUpChoices.length === 0)
    {
        grantMaxBuildReward();
        finishLevelUp();
        return;
    }
    rebuildLevelUpMenu();
}

function showLevelUpMenu()
{
    levelUpRerolls = 0;
    levelUpBanishes = 0;
    levelUpBanishMode = false;
    levelUpLimitBreak = false;
    // Once the build is fully maxed every level-up turns into a Limit Break
    // pick — there's nothing left to upgrade normally and a flat reward
    // would waste the moment.
    if (isMaxBuild())
    {
        levelUpLimitBreak = true;
        levelUpChoices = buildLimitBreakChoices();
        rebuildLevelUpMenu();
        return;
    }
    levelUpChoices = buildUpgradeChoices();
    if (levelUpChoices.length === 0)
    {
        grantMaxBuildReward();
        player.pendingLevelUps--;
        if (player.pendingLevelUps > 0)
            requestAnimationFrame(showLevelUpMenu);
        return;
    }
    rebuildLevelUpMenu();
}

// Evolution hint rows — surface for each Lv 5 non-evolved weapon, telling
// the player either which passive it still needs or that it's ready and
// they should grab a chest. Skipped under Limit Break (build is maxed, no
// more evolutions can happen).
function buildEvolutionHints()
{
    const hints = [];
    if (!player || !player.weapons) return hints;
    for (const w of player.weapons)
    {
        if (w.evolved || w.level < 5) continue;
        const baseKey = w.constructor.name.replace(/Weapon$/, '');
        const evo = EVOLUTIONS[baseKey];
        if (!evo) continue;
        const has = player.passives.some(p => p.name === evo.passive);
        const proto = makePassiveByName(evo.passive);
        const pEmoji = proto ? proto.emoji : '';
        const head = emojiForWeapon(baseKey) + '  ' + w.name + ' Lv 5  →  ' +
                     evo.emoji + ' ' + evo.name;
        hints.push({type: 'label', id: 'hint-' + baseKey,
                    text: has
                      ? head + '  — READY! grab a 🎁 chest'
                      : head + '  — needs ' + pEmoji + ' ' + evo.passive + ' + 🎁'});
    }
    if (hints.length) hints.push({type: 'separator'});
    return hints;
}

function rebuildLevelUpMenu()
{
    const existing = getMenu('levelup');
    if (existing) existing.destroy();

    const title = levelUpLimitBreak ? '✨ LIMIT BREAK' : 'LEVEL UP';
    const subtitleBase = 'Lv ' + player.level + '   💰 ' + coins;
    let subtitle = subtitleBase;
    if (levelUpLimitBreak)
        subtitle = subtitleBase + '\nMax build — push a maxed weapon further';
    else if (levelUpBanishMode)
        subtitle = subtitleBase + '\n🚫 Pick which choice to banish';

    // Evolution hints sit at the top of the menu so they teach the system
    // exactly when it's relevant (player is looking at a level-up menu and
    // has a Lv 5 weapon waiting to evolve).
    const hintItems = levelUpLimitBreak ? [] : buildEvolutionHints();

    const choiceItems = levelUpChoices.map((c, i) => ({
        type: 'button',
        id: 'choice-' + i,
        label: levelUpBanishMode ? '🚫 ' + c.label : c.label,
        title: levelUpBanishMode
            ? 'Banish this choice for the rest of the run (20💰).'
            : (c.title || ''),
        onClick: () => onLevelUpChoiceClick(i),
    }));

    // Limit Break mode shows ONLY the choice rows — reroll/banish/skip would
    // have nothing to act on once the build is maxed.
    const tailItems = levelUpLimitBreak ? [] : [
        {type: 'separator'},
        {type: 'button', id: 'reroll',
            label: '🔄 Reroll  ' + levelUpRerollCost() + '💰',
            title: 'Re-draw all three offers. Cost grows by ' +
                   REROLL_BASE_COST + '💰 each use this level-up.',
            onClick: onLevelUpReroll},
        {type: 'button', id: 'banish',
            label: levelUpBanishMode
                ? '🚫 CANCEL BANISH'
                : '🚫 Banish  ' + levelUpBanishCost() + '💰',
            title: levelUpBanishMode
                ? 'Cancel banish mode — no coins spent.'
                : 'Spend ' + levelUpBanishCost() + '💰 to permanently remove ' +
                  'a choice for the rest of the run. Cost doubles for each ' +
                  'extra banish this level-up.',
            onClick: onLevelUpBanish},
        {type: 'button', id: 'skip',
            label: '⏭️  Skip  (+20% XP)',
            title: 'Take no upgrade. Gain 20% of next-level XP toward future ' +
                   'levels.',
            onClick: onLevelUpSkip},
    ];

    createMenu({
        id: 'levelup',
        title,
        subtitle,
        dismissable: false,
        items: [...hintItems, ...choiceItems, ...tailItems],
    });

    // Disable affordance gates — reroll/banish grey out when you can't pay.
    // Skip is always free, banish-cancel doesn't cost anything either.
    const m = getMenu('levelup');
    if (m && !levelUpLimitBreak)
    {
        const rerollCost = levelUpRerollCost();
        const r = m.getItem('reroll');
        if (r) r.setDisabled(coins < rerollCost || levelUpBanishMode);
        const b = m.getItem('banish');
        if (b) b.setDisabled(!levelUpBanishMode && coins < levelUpBanishCost());
        const s = m.getItem('skip');
        if (s) s.setDisabled(levelUpBanishMode);
    }
    showMenu('levelup');
}

function onLevelUpChoiceClick(i)
{
    const c = levelUpChoices[i];
    if (!c) return;
    if (levelUpBanishMode)
    {
        // Cost doubles per banish use within this level-up — second is 40,
        // third is 80, fourth is 160. Reset between level-ups via showLevelUpMenu.
        const cost = levelUpBanishCost();
        if (coins < cost) return;
        coins -= cost;
        saveMetaState();
        player.banishedUpgrades.add(c.key);
        ++levelUpBanishes;
        levelUpBanishMode = false;
        refreshLevelUpChoices();
        return;
    }
    c.apply();
    finishLevelUp();
}

function onLevelUpReroll()
{
    if (levelUpBanishMode) return;
    const cost = levelUpRerollCost();
    if (coins < cost) return;
    coins -= cost;
    saveMetaState();
    ++levelUpRerolls;
    refreshLevelUpChoices();
}

function onLevelUpBanish()
{
    if (levelUpBanishMode)
    {
        // Cancel — no charge yet, no banish recorded.
        levelUpBanishMode = false;
        rebuildLevelUpMenu();
        return;
    }
    if (coins < levelUpBanishCost()) return;
    levelUpBanishMode = true;
    rebuildLevelUpMenu();
}

function onLevelUpSkip()
{
    if (levelUpBanishMode) return;
    // Grant a partial chunk toward the next level's XP. Cap below the
    // threshold so we don't cascade a fresh level-up out of skipping.
    const needed = xpToNext(player.level);
    player.xp = min(needed - 1, player.xp + Math.floor(needed * SKIP_XP_FRACTION));
    if (typeof showMenuToast === 'function')
    {
        showMenuToast({icon: '⏭️', title: 'SKIPPED',
                       text: '+' + Math.floor(needed * SKIP_XP_FRACTION) + ' XP',
                       duration: 2, position: 'bottom-right'});
    }
    finishLevelUp();
}

function endRun()
{
    // commit run results to persistent meta state
    if (elapsedTime > bestTime) bestTime = elapsedTime;
    saveMetaState();
}

// Curse Mode helpers — tier 0/1/2 maps to OFF / +50% / +100%. The label
// is shown on the title button; cycleCurse advances and persists.
function curseLabel(level)
{
    if (level <= 0) return 'OFF';
    if (level === 1) return '+50%';
    return '+100%';
}
function cycleCurse()
{
    curseLevel = (curseLevel + 1) % 3;
    saveMetaState();
    const m = getMenu('title');
    if (m)
    {
        const btn = m.getItem('curseBtn');
        if (btn) btn.setLabel('💀 Curse: ' + curseLabel(curseLevel));
    }
}

function restartGame()
{
    // restart with the same hero and stage — startRun handles the teardown
    for (const id of ['gameover', 'victory'])
    {
        const m = getMenu(id);
        if (m) { hideMenu(id); m.destroy(); }
    }
    startRun(currentHero, currentStage);
}

function goToTitle()
{
    // Tear down the run and surface the title menu so the player can
    // pick a different hero or just inspect their stats.
    tearDownRun();
    setPlaying(false);

    // Reset the title backdrop to the default wizard hero on the Meadow.
    currentHero = HEROES[0];
    currentStage = STAGES[0];
    canvasClearColor = currentStage.floorColor;
    player = new Player();
    player.weapons = [];
    player.passives = [];
    recomputeMultipliers();
    rebuildRoadStrips();
    spawnBackdropProps();

    for (const id of ['gameover', 'victory'])
    {
        const m = getMenu(id);
        if (m) { hideMenu(id); m.destroy(); }
    }
    showMenu('title');
}

// Results-screen helper — formats the run's best weapon row. Highest level
// wins; ties prefer evolved weapons (and then a higher lbBonus stack).
function bestWeaponLine()
{
    if (!player || !player.weapons || player.weapons.length === 0)
        return '🔱  (no weapons)';
    const sorted = player.weapons.slice().sort((a, b) =>
    {
        if (!!b.evolved !== !!a.evolved) return (b.evolved ? 1 : 0) - (a.evolved ? 1 : 0);
        if (b.level !== a.level) return b.level - a.level;
        return (b.lbBonus || 1) - (a.lbBonus || 1);
    });
    const w = sorted[0];
    const baseKey = w.constructor.name.replace(/Weapon$/, '');
    if (w.evolved)
    {
        // Find the matching EVOLUTIONS entry so we can show its glyph.
        for (const k in EVOLUTIONS)
            if (EVOLUTIONS[k].name === w.name)
                return '🔱  ' + EVOLUTIONS[k].emoji + '  ' + w.name + '  ✨ EVOLVED';
        return '🔱  ✨ ' + w.name;
    }
    return '🔱  ' + emojiForWeapon(baseKey) + '  ' + w.name + '  Lv ' + w.level;
}

function buildResultsItems(isNewBest)
{
    const items = [];
    if (isNewBest)
    {
        items.push({type: 'label', text: '🎉  NEW BEST!  🎉'});
        items.push({type: 'separator'});
    }
    items.push({type: 'label', text: '⏱  ' + formatTime(elapsedTime)});
    items.push({type: 'label', text: '💀  ' + killCount + ' kills'});
    items.push({type: 'label', text: '⭐  Reached Lv ' + player.level});
    items.push({type: 'label', text: '💰  +' + coinsRun + ' coins'});
    items.push({type: 'label', text: bestWeaponLine()});
    items.push({type: 'separator'});
    return items;
}

function showGameOverMenu()
{
    const isNewBest = elapsedTime > bestTime;
    endRun();
    if (sounds.gameOver && sounds.gameOver.play) sounds.gameOver.play();
    const existing = getMenu('gameover');
    if (existing) existing.destroy();
    const items = buildResultsItems(isNewBest);
    // Single button — back to title so the player goes through the
    // hero / stage selection flow again rather than instant-restarting on
    // the same hero. Keeps the run-setup deliberate.
    items.push({type: 'button', label: 'BACK TO TITLE', onClick: goToTitle});
    createMenu({
        id: 'gameover',
        title: 'YOU DIED',
        subtitle: '',
        dismissable: false,
        items,
    });
    showMenu('gameover');
}

function showVictoryMenu()
{
    const isNewBest = elapsedTime > bestTime;
    endRun();
    // Mark the stage as cleared so the next stage on the spine unlocks.
    // First-ever Reaper kill also flips firstVictory, which exposes the
    // Curse Mode cycle button on the title screen.
    let changed = false;
    if (currentStage && !stagesWon.has(currentStage.key))
    {
        stagesWon.add(currentStage.key);
        changed = true;
    }
    if (!firstVictory)
    {
        firstVictory = true;
        changed = true;
    }
    if (changed) saveMetaState();
    if (sounds.victory && sounds.victory.play) sounds.victory.play();
    const existing = getMenu('victory');
    if (existing) existing.destroy();
    const items = buildResultsItems(isNewBest);
    items.push({type: 'button', label: 'PLAY AGAIN', onClick: restartGame});
    items.push({type: 'separator'});
    items.push({type: 'button', label: 'TITLE',      onClick: goToTitle});
    createMenu({
        id: 'victory',
        title: '🏆 VICTORY',
        subtitle: 'You felled ' + currentStage.finalBoss.name + '!',
        dismissable: false,
        items,
    });
    showMenu('victory');
}

///////////////////////////////////////////////////////////////////////////////
function gameUpdate()
{
    // Esc / gamepad Start surfaces the pause menu when actively playing.
    // Per the menus.js helper docs, call this every frame (per-frame poll)
    // and early-return when it fires — menus.js auto-pauses via the
    // setMenuVisibilityCallback wiring already in place.
    if (bindPauseKey({when: () => isPlaying() && !gameOver && !runVictory}))
        return;

    elapsedTime += 1 / 60;
    // 10-minute unlock — exposes 🧛 Vamp on the hero-select screen once a
    // single run survives this long. Fires once; subsequent runs no-op.
    if (!survived10Min && elapsedTime >= 600)
    {
        survived10Min = true;
        saveMetaState();
        if (typeof showMenuToast === 'function')
            showMenuToast({icon: '🧛', title: 'HERO UNLOCKED',
                           text: 'Vamp is now available',
                           duration: 4, position: 'top-right'});
    }
    if (player.pendingLevelUps > 0)
    {
        if (playerAI)
        {
            // pick a random offered choice for each queued level-up;
            // max-build queues land on a Limit Break pick instead of the
            // consolation reward so the AI keeps stacking damage.
            while (player.pendingLevelUps > 0)
            {
                if (isMaxBuild())
                {
                    const choices = buildLimitBreakChoices();
                    choices[randInt(choices.length)].apply();
                }
                else
                {
                    const choices = buildUpgradeChoices();
                    if (choices.length === 0) grantMaxBuildReward();
                    else choices[randInt(choices.length)].apply();
                }
                player.pendingLevelUps--;
            }
        }
        else if (!isMenuVisible())
        {
            showLevelUpMenu();
            return;
        }
    }
    updateSpawner();
    for (const w of player.weapons) w.update();
}
function gameUpdatePost()
{
    cameraPos = player.pos;

    // Input checks live here (NOT in gameRenderPost) because the engine
    // clears the "was pressed" bit in inputUpdatePost which runs after
    // gameUpdatePost but before gameRenderPost. gameUpdatePost runs every
    // frame including while paused, so this works on the game-over menu.
    if (keyWasPressed('KeyT')) playerAI = !playerAI;

    if (gameOver &&
        (keyWasPressed('KeyR') || (playerAI && gameOverFrameCount > 90)))
        restartGame();
}
// Pick a deterministic per-cell value from a coordinate pair.
function cellHash(x, y)
{
    return (x * 73856093 ^ y * 19349663) >>> 0;
}

// Y-sorted background prop (tree, snowman, etc.). Replaces the
// per-cell scatter — fewer, larger, and walks behind via renderOrder so the
// player and enemies can pass in front of / behind them like 2.5D depth.
class BackdropProp extends EngineObject
{
    constructor(pos, sprite, size)
    {
        super(pos, vec2(size), sprite);
        setupKinematicProp(this);
        // Static prop — set order once, never moves. Use the base (where
        // the shadow sits) so a big tree's canopy doesn't sort like it's
        // hovering above shorter sprites at the same world-y.
        this.renderOrder = -baseY(this);
    }
    render()
    {
        // Hundreds of props across the arena; only render the on-screen
        // few. Pad the cull by the prop's own size since they're large.
        if (!isOnScreen(this.pos, this.size.scale(1.2))) return;
        drawEmoji(this.pos, this.size, this.tileInfo);
    }
}

// Roads / paths painted over the ground palette. Rebuilt once per run in
// startRun so each level has its own layout but it stays stable while
// playing. Each strip is a wiggling band (horizontal or vertical).
let roadStrips = [];
function rebuildRoadStrips()
{
    roadStrips = [];
    // 1–2 horizontal roads, sometimes a vertical one too.
    const horizCount = randInt(1, 3);
    for (let i = 0; i < horizCount; ++i)
        roadStrips.push({
            axis: 'h',
            center: randInt(ARENA_MIN_Y + 15, ARENA_MAX_Y - 15),
            halfWidth: randInt(2, 4),
            wiggleAmp: rand(.5, 2.5),
            wigglePhase: rand(2 * PI),
        });
    if (rand() < .6)
        roadStrips.push({
            axis: 'v',
            center: randInt(ARENA_MIN_X + 20, ARENA_MAX_X - 20),
            halfWidth: randInt(2, 4),
            wiggleAmp: rand(.5, 3),
            wigglePhase: rand(2 * PI),
        });
}
function cellInRoad(x, y)
{
    for (const r of roadStrips)
    {
        if (r.axis === 'h')
        {
            const yC = r.center + sin(x * .15 + r.wigglePhase) * r.wiggleAmp;
            if (abs(y - yC) <= r.halfWidth) return true;
        }
        else
        {
            const xC = r.center + sin(y * .15 + r.wigglePhase) * r.wiggleAmp;
            if (abs(x - xC) <= r.halfWidth) return true;
        }
    }
    return false;
}

// Spawn the stage's backdrop props (trees, headstones, etc.) at random
// positions across the whole arena. Called once at run start.
function spawnBackdropProps()
{
    const propMap = currentStage.backdropProps;
    if (!propMap) return;
    // Resolve sprite keys to [{sprite, sizeMult}] entries. Equal pick odds.
    const entries = [];
    for (const k in propMap)
        if (sprites[k]) entries.push({sprite: sprites[k], sizeMult: propMap[k]});
    if (!entries.length) return;
    const count = currentStage.propCount || 500;
    const baseSize = currentStage.propSize || 4.0;
    const safeR2 = 25;     // keep a 5wu clearing around the player spawn
    for (let i = 0; i < count; ++i)
    {
        let pos;
        for (let attempt = 0; attempt < 4; ++attempt)
        {
            pos = vec2(rand(ARENA_MIN_X + 1, ARENA_MAX_X - 1),
                       rand(ARENA_MIN_Y + 1, ARENA_MAX_Y - 1));
            if (pos.lengthSquared() > safeR2) break;
        }
        const e = entries[randInt(entries.length)];
        const size = baseSize * e.sizeMult * rand(.85, 1.2);
        new BackdropProp(pos, e.sprite, size);
    }
}

function drawGround()
{
    // Paint the visible arena cells as solid-color 1×1 rects from the
    // stage's groundPalette. A coarse patch hash makes adjacent cells share
    // a color so accents read as clumpy patches; road strips (rebuilt once
    // per run) overlay a different color along wiggling bands.
    const palette = currentStage.groundPalette;
    if (!palette) return;
    const roadColor = currentStage.roadColor;
    const cam = cameraPos;
    const half = getCameraSize().scale(.5);
    const minX = max(Math.floor(cam.x - half.x), ARENA_MIN_X);
    const maxX = min(Math.ceil(cam.x + half.x), ARENA_MAX_X);
    const minY = max(Math.floor(cam.y - half.y), ARENA_MIN_Y);
    const maxY = min(Math.ceil(cam.y + half.y), ARENA_MAX_Y);
    // 1.01 sized cells so float rounding never opens a hairline gap.
    const cellSize = vec2(1.02);
    for (let y = minY; y <= maxY; ++y)
    for (let x = minX; x <= maxX; ++x)
    {
        let color;
        if (roadColor && cellInRoad(x, y))
            color = roadColor;
        else
        {
            // patch hash — 4×2 grid of shared cells so accents form clumps
            const ph = cellHash(x >> 2, y >> 1) % 100;
            color = ph < 65 ? palette[0]
                  : ph < 88 ? palette[1]
                  :           palette[2];
        }
        drawRect(vec2(x + .5, y + .5), cellSize, color);
    }
}

function drawWalls()
{
    // mountain border just outside the arena rect; cull to visible camera rect.
    // We collect positions and sort by y descending so northern (higher y)
    // pieces draw first and southern pieces overlap them — proper 2.5D depth.
    const cam = cameraPos;
    const half = getCameraSize().scale(.5);
    const minVX = cam.x - half.x - 1, maxVX = cam.x + half.x + 1;
    const minVY = cam.y - half.y - 1, maxVY = cam.y + half.y + 1;
    const size = vec2(1.6);

    const positions = [];
    // top + bottom rows
    for (let x = ARENA_MIN_X; x <= ARENA_MAX_X; ++x)
    {
        if (x < minVX || x > maxVX) continue;
        if (maxVY >= ARENA_MAX_Y + 1) positions.push(vec2(x, ARENA_MAX_Y + 1));
        if (minVY <= ARENA_MIN_Y - 1) positions.push(vec2(x, ARENA_MIN_Y - 1));
    }
    // left + right columns (skip corners already added above)
    for (let y = ARENA_MIN_Y + 1; y <= ARENA_MAX_Y - 1; ++y)
    {
        if (y < minVY || y > maxVY) continue;
        if (maxVX >= ARENA_MAX_X + 1) positions.push(vec2(ARENA_MAX_X + 1, y));
        if (minVX <= ARENA_MIN_X - 1) positions.push(vec2(ARENA_MIN_X - 1, y));
    }
    // higher y first → drawn first → lower screen rows draw on top
    positions.sort((a, b) => b.y - a.y);
    const borderSprite = sprites[currentStage.borderKey] || sprites.wall;
    for (const p of positions) drawTile(p, size, borderSprite);
}

function drawWeaponVisuals()
{
    if (!player || !player.weapons) return;
    for (const w of player.weapons)
        if (w.draw) w.draw();
}

function gameRender()
{
    // Ground first (opaque colored cells), then shadows on top of it so the
    // soft radial shadows still read against the tinted floor; otherwise the
    // ground paint would erase any shadows drawn underneath.
    drawGround();
    drawShadows();
    drawWalls();
    drawWeaponVisuals();
    drawChainFlashes();
    drawExplosions();
    drawDamageNumbers();
}
function formatTime(s)
{
    const m = Math.floor(s / 60);
    const sec = Math.floor(s % 60);
    return m + ':' + (sec < 10 ? '0' : '') + sec;
}

function drawHUD()
{
    const cs = mainCanvasSize;
    const pad = 20;

    // TOP-LEFT stack: HP bar, then timer / kills / coins underneath.
    const hpW = 260, hpH = 28;
    const hpX = pad + hpW / 2, hpY = pad + hpH / 2;
    drawRect(vec2(hpX, hpY), vec2(hpW, hpH), new Color(0,0,0,.6), 0, false, true);
    const hpFrac = max(0, player.hp / player.maxHp);
    drawRect(vec2(hpX - hpW/2 + hpW*hpFrac/2, hpY), vec2(hpW * hpFrac, hpH),
             new Color(.85, .15, .2), 0, false, true);
    // Round both for display — Vamp's 1.10 maxHpMult gives a maxHp of
    // 100 × 1.1 = 110.000000000000014 in IEEE-754, which used to print
    // ceil(hp)=111 over a raw 110.0000…1 max. The underlying hp / maxHp
    // values are equal; only the displayed integers were misleading.
    drawTextScreen('❤ ' + max(0, Math.round(player.hp)) + ' / ' +
                   Math.round(player.maxHp),
                   vec2(hpX, hpY + 2), 18, WHITE, 3, BLACK);

    // Stats stack under HP bar — timer (turns red near end, REAPER countdown
    // in last 10s), then kills, then coins.
    const remaining = max(0, runDuration - elapsedTime);
    const timerColor = remaining < 60 ? new Color(1, .3, .3) : WHITE;
    const rowY = pad + hpH + 22;
    if (remaining > 0 && remaining < 10 && finalBossesSpawned === 0)
    {
        const flash = sin(time * 12) > 0;
        drawTextScreen('☠️ REAPER ' + Math.ceil(remaining),
                       vec2(pad, rowY), 22,
                       flash ? new Color(1, .2, .2) : new Color(1, .7, .7),
                       3, BLACK, 'left');
    }
    else
    {
        drawTextScreen('⏱ ' + formatTime(elapsedTime) + ' / ' +
                       formatTime(runDuration),
                       vec2(pad, rowY), 20, timerColor, 3, BLACK, 'left');
    }
    drawTextScreen('💀 ' + killCount,
                   vec2(pad, rowY + 26), 20, WHITE, 3, BLACK, 'left');
    drawTextScreen('💰 ' + coinsRun,
                   vec2(pad, rowY + 52), 20,
                   new Color(1, .9, .35), 3, BLACK, 'left');

    // BOTTOM-CENTER: XP bar with level label above it. Symmetrically balances
    // the top-left stack and keeps the right side free for the toolbar.
    const xpW = cs.x * .5, xpH = 18;
    const xpX = cs.x / 2, xpY = cs.y - pad - xpH / 2;
    drawRect(vec2(xpX, xpY), vec2(xpW, xpH), new Color(0,0,0,.6), 0, false, true);
    const xpFrac = player.xp / xpToNext(player.level);
    drawRect(vec2(xpX - xpW/2 + xpW*xpFrac/2, xpY), vec2(xpW * xpFrac, xpH),
             new Color(.2, .7, 1), 0, false, true);
    drawTextScreen('Lv ' + player.level,
                   vec2(xpX, xpY - xpH - 4),
                   20, WHITE, 3, BLACK);
}

// Edge-of-screen indicators — needed once the camera can't show the whole
// arena. Per the launch spec only off-screen bosses and dropped boss chests
// get arrows. Boss arrows carry a small HP fill of their own so the player
// can see how close a kited boss is to dying even when they can't see it.
// Iterates all boss enemies so the Reaper escalation's stacked bosses each
// get their own indicator.
function drawOffScreenIndicators()
{
    if (isMenuVisible()) return;
    const cs = mainCanvasSize;
    const cx = cs.x / 2, cy = cs.y / 2;
    const pad = 50;
    const targets = [];
    for (const e of enemies)
    {
        if (!e.isBoss || e.destroyed) continue;
        targets.push({
            pos:   e.pos,
            icon:  '⚠️',
            color: new Color(1, .35, .35, 1),
            hpFrac: max(0, min(1, e.displayHp / e.maxHp)),
        });
    }
    for (const obj of engineObjects)
        if (obj instanceof Chest && !obj.destroyed)
            targets.push({pos: obj.pos, icon: '🎁',
                          color: new Color(1, .9, .35, 1)});

    for (const t of targets)
    {
        const screen = worldToScreen(t.pos);
        if (screen.x >= pad && screen.x <= cs.x - pad &&
            screen.y >= pad && screen.y <= cs.y - pad) continue;
        // Off-screen — project onto the inner rect edge along the
        // center-to-target ray.
        const dx = screen.x - cx;
        const dy = screen.y - cy;
        if (abs(dx) < .01 && abs(dy) < .01) continue;
        const halfW = cs.x / 2 - pad;
        const halfH = cs.y / 2 - pad;
        const scale = min(halfW / max(abs(dx), .01),
                          halfH / max(abs(dy), .01));
        const ex = cx + dx * scale;
        const ey = cy + dy * scale;
        drawTextScreen(t.icon, vec2(ex, ey), 36, t.color, 4, BLACK);
        // Boss arrows carry a small HP fill so a kited boss's status is
        // visible at the edge. The on-screen and off-screen bars hand off:
        // one or the other is always showing while the boss is alive.
        if (t.hpFrac !== undefined)
        {
            const barW = 56, barH = 6;
            const barY = ey + 28;
            drawRect(vec2(ex, barY), vec2(barW + 4, barH + 4),
                     new Color(0, 0, 0, .85), 0, false, true);
            drawRect(vec2(ex, barY), vec2(barW, barH),
                     new Color(.12, .12, .12, .9), 0, false, true);
            if (t.hpFrac > 0)
                drawRect(vec2(ex - barW / 2 + barW * t.hpFrac / 2, barY),
                         vec2(barW * t.hpFrac, barH),
                         new Color(1, .22, .22, 1), 0, false, true);
        }
    }
}

// Tiny debug-shape helpers. drawLine in world space draws on top of the
// entity batch when called from gameRenderPost, so outlines stay visible
// over their sprites.
function drawDebugBox(pos, size, color)
{
    const hw = size.x / 2, hh = size.y / 2;
    const tl = vec2(pos.x - hw, pos.y + hh);
    const tr = vec2(pos.x + hw, pos.y + hh);
    const br = vec2(pos.x + hw, pos.y - hh);
    const bl = vec2(pos.x - hw, pos.y - hh);
    drawLine(tl, tr, .05, color);
    drawLine(tr, br, .05, color);
    drawLine(br, bl, .05, color);
    drawLine(bl, tl, .05, color);
}
function drawDebugCircle(pos, radius, color)
{
    // drawCircle(pos, size = diameter, fill, lineWidth, lineColor) — pass
    // CLEAR_WHITE fill so only the outline shows up, no faceted polygon
    // segments to look junky.
    drawCircle(pos, radius * 2, CLEAR_WHITE, .08, color);
}

// Collision-shape overlay — auto-turns on when the engine's debug overlay
// is toggled (press ~ in a run). Shows the AABB for things that use
// isOverlapping (player, enemies, projectiles) and a ring for things that
// use a distance check (magnet, pickup, chest, AOE blasts, lava pools,
// nuke field). Colour-coded so player / enemy / boss / breakable / friendly-
// projectile / enemy-projectile read at a glance.
function drawCollisionDebug()
{
    if (!debugOverlay) return;

    const playerC    = new Color( 0,   1,    0,   .9);
    const enemyC     = new Color( 1,  .25,  .25,  .9);
    const bossC      = new Color( 1,   0,    0,   .9);
    const breakableC = new Color(.7,  .5,    0,   .9);
    const projC      = new Color( 1,   1,    0,   .9);
    const enemyShotC = new Color( 1,   0,    1,   .9);
    const magnetC    = new Color(.4,  .6,   1,   .55);
    const pickupC    = new Color( 0,   1,    1,   .8);
    const chestC     = new Color( 1,  .85,   0,   .8);
    const aoeC       = new Color( 1,  .5,    0,   .7);
    const fieldC     = new Color(.6,   1,   .4,   .65);

    if (player)
    {
        drawDebugBox(player.pos, player.size, playerC);
        drawDebugCircle(player.pos,
            magnetRadius * (player.magnetMult || 1), magnetC);
    }
    // Enemies + breakables share the `enemies` array.
    for (const e of enemies)
    {
        const c = e.isBreakable ? breakableC : e.isBoss ? bossC : enemyC;
        drawDebugBox(e.pos, e.size, c);
    }
    // Projectiles, AOE fields, pickups, chests — single sweep of engineObjects.
    for (const obj of engineObjects)
    {
        if (obj.destroyed) continue;
        if (obj instanceof Projectile ||
            obj instanceof StarToss ||
            obj instanceof CometProjectile)
            drawDebugBox(obj.pos, obj.size, projC);
        else if (obj instanceof EnemyProjectile)
            drawDebugBox(obj.pos, obj.size, enemyShotC);
        else if (obj instanceof Pickup)
            drawDebugCircle(obj.pos, .8, pickupC);
        else if (obj instanceof Chest)
            drawDebugCircle(obj.pos, 1.2, chestC);
        else if (obj instanceof Bomb || obj instanceof NukeBomb)
            drawDebugCircle(obj.pos, obj.radius, aoeC);
        else if (obj instanceof NukeField)
            drawDebugCircle(obj.pos, obj.fieldRadius, fieldC);
    }
}

function gameRenderPost()
{
    if (gameOver) gameOverFrameCount++;
    else          gameOverFrameCount = 0;

    drawCollisionDebug();
    drawHUD();
    drawOffScreenIndicators();

    if (playerAI)
    {
        // bottom-center banner that's hard to miss
        drawTextScreen('🤖 AI TEST MODE',
                       vec2(mainCanvasSize.x / 2, mainCanvasSize.y - 28),
                       32, new Color(.5, 1, .5), 4, BLACK);
    }
}

///////////////////////////////////////////////////////////////////////////////
// Debug helpers — call from the browser DevTools console. Both persist
// immediately via saveMetaState() so a reload picks them up.
window.giveCoins = function(amount)
{
    const n = (typeof amount === 'number' && amount > 0) ? Math.floor(amount) : 1000;
    coins    += n;
    coinsRun += n;
    saveMetaState();
    console.log('💰 +' + n + ' coins. Total: ' + coins);
    return coins;
};

window.unlockAll = function()
{
    firstVictory = true;
    survived10Min = true;
    // Every stage in the spine flips to "won" so every stage is unlocked
    // (isStageUnlocked checks the prior stage's win).
    for (const s of STAGES) stagesWon.add(s.key);
    // Curse is a setting, not an unlock — leave it at the player's chosen
    // tier rather than forcing it on.
    saveMetaState();
    console.log('🔓 All stages + heroes unlocked, Curse Mode available.');
    return Array.from(stagesWon);
};

// Force a level-up right now. Queues one onto pendingLevelUps and surfaces
// the menu directly so you can test the reroll / banish / skip / evolution
// hint flow without grinding gems.
window.levelUp = function()
{
    if (!player)
    {
        console.warn('levelUp: no player yet — start a run first.');
        return;
    }
    player.level++;
    player.pendingLevelUps = (player.pendingLevelUps || 0) + 1;
    if (sounds.levelUp && sounds.levelUp.play) sounds.levelUp.play();
    if (!isMenuVisible()) showLevelUpMenu();
    console.log('⭐ Forced level-up → Lv ' + player.level);
};

// Drop a 🎁 chest right next to the player so you can test the evolution
// flow without waiting for a scheduled boss. Pair with maxBuild() to also
// have all the recipe passives in hand.
window.spawnChest = function()
{
    if (!player)
    {
        console.warn('spawnChest: no player yet — start a run first.');
        return;
    }
    const pos = player.pos.add(vec2(1.5, 0));
    new Chest(pos);
    console.log('🎁 Chest spawned at ' + pos.x.toFixed(1) + ', ' + pos.y.toFixed(1));
};

// Grant every base weapon in ALL_WEAPONS that the player doesn't already
// own. Goes past the normal 5-slot cap so you can pile on all 9 at once
// to test fire patterns and projectile interactions. Pair with maxBuild()
// to also crank them all to Lv 5.
window.giveAllWeapons = function()
{
    if (!player)
    {
        console.warn('giveAllWeapons: no player yet — start a run first.');
        return;
    }
    const owned = new Set(player.weapons.map(w =>
        w.constructor.name.replace(/Weapon$/, '')));
    let added = 0;
    for (const name of ALL_WEAPONS)
    {
        if (owned.has(name)) continue;
        const w = makeWeaponByName(name);
        if (!w) continue;
        player.weapons.push(w);
        ++added;
    }
    console.log('🗡️ Added ' + added + ' weapons. Now own ' +
                player.weapons.length + ': ' +
                player.weapons.map(w => w.name).join(', '));
    return player.weapons.map(w => w.name);
};

// Flip the `godMode` debug flag. Skips HP loss AND the rest of the hit
// reaction (hurt-flash, hurt-sound, enemy knockback bounce) — same gate
// path as AI test mode. Reusable toggle: call it again to turn off.
window.godMode = function()
{
    godMode = !godMode;
    console.log('🛡️ God Mode ' + (godMode ? 'ON' : 'OFF'));
    return godMode;
};

// Spawn one of every regular enemy type in a ring around the player so you
// can visually QA all the sprites + wobble animations side by side. Skips
// bosses — they'd dominate the frame. Each enemy's wobble phase is per-
// instance so the ring reads as a chorus rather than a sync'd row.
window.spawnAllEnemies = function()
{
    if (!player)
    {
        console.warn('spawnAllEnemies: no player yet — start a run first.');
        return;
    }
    const radius = 6;
    for (let i = 0; i < ENEMY_TYPES.length; ++i)
    {
        const a = i * 2 * PI / ENEMY_TYPES.length;
        const pos = player.pos.add(vec2().setAngle(a, radius));
        new Enemy(pos, ENEMY_TYPES[i]);
    }
    console.log('🎯 Spawned ' + ENEMY_TYPES.length +
                ' enemies (one of each type) in a ring around you.');
    return ENEMY_TYPES.map(t => t.key);
};

// In-run cheat — drops the player straight into max-build territory so
// you can test evolutions / Limit Break without grinding a real run.
// Levels every owned weapon to Lv 5, grants every passive at Lv 5 (going
// past the normal 5-slot cap, which is fine for debug), then refreshes
// multipliers. Next chest will offer the matching evolution.
window.maxBuild = function()
{
    if (!player || !player.weapons)
    {
        console.warn('maxBuild: no player yet — start a run first.');
        return;
    }
    for (const w of player.weapons) w.level = 5;
    for (const name of ALL_PASSIVES)
    {
        let p = player.passives.find(pp => pp.name === name);
        if (!p) { p = makePassiveByName(name); player.passives.push(p); }
        p.level = 5;
    }
    recomputeMultipliers();
    console.log('✨ Build maxed: ' + player.weapons.length + ' weapons + ' +
                player.passives.length + ' passives, all at Lv 5');
    return {weapons: player.weapons.length, passives: player.passives.length};
};

engineInit(gameInit, gameUpdate, gameUpdatePost, gameRender, gameRenderPost);
