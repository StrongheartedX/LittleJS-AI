// that direction" scheme instead of the built-in analog touch gamepad.

///////////////////////////////////////////////////////////////////////////////
// EMOJI SURVIVORS
//
// Vampire Survivors-style auto-battler with emoji sprites.
// See docs/superpowers/specs/2026-05-26-emoji-survivors-design.md

// Arena ~3× the original footprint so the camera-follows-player feel
// is real exploration, not just a slightly bigger room. Spawn (within
// ~20 wu of player) and despawn (past ~50 wu) are already player-
// relative so they don't need any change.
const ARENA_MIN_X = -150, ARENA_MAX_X = 150;
const ARENA_MIN_Y = -100, ARENA_MAX_Y = 100;

const sprites = {};

// Universal emoji draw helper — all entity rendering goes through here.
// tint multiplies (won't lighten the emoji's black outline);
// additive adds (glows through the outline). Pair them for status effects:
//   red tint + red additive  = burning
//   blue tint                = frozen / slowed
//   green tint               = poisoned
//   gold additive            = elite
//   white additive flash     = hit feedback
function drawEmoji(pos, size, sprite, tint, additive, angle = 0, mirror = false)
{
    drawTile(pos, size, sprite, tint || WHITE, angle, mirror, additive);
}

// Disable engine-driven physics + collision so we can drive position by
// hand. Every game prop in this file wants this — player, enemies, pickups,
// projectiles, bombs, breakables, ground decals — so it lives in one place.
function setupKinematicProp(obj)
{
    obj.damping       = 1;
    obj.friction      = 1;
    obj.gravityScale  = 0;
    obj.angle         = 0;
    obj.setCollision(false, false, false, false);
}

// World-y of a ground-touching sprite's BASE — where the shadow sits, not
// the sprite's center. Use this (not pos.y) for renderOrder on grounded
// entities so big sprites like trees layer correctly against smaller ones
// at the same world-y. Mirrors the .45 offset in drawShadows().
function baseY(obj) { return obj.pos.y - obj.size.y * .45; }

let player;

class Player extends EngineObject
{
    constructor()
    {
        super(vec2(0, 0), vec2(1.2),
              sprites[(currentHero && currentHero.spriteKey) || 'heroWizard']);
        this.maxHp = playerMaxHp;
        this.hp = this.maxHp;
        this.speed = playerSpeed;
        setupKinematicProp(this);   // hand-driven velocity, no engine collision
        this.hurtTimer = 0;
        this.xp = 0;
        this.level = 1;
        this.pendingLevelUps = 0;
        this.passives = [];
        // mystery-pickup temp buff timers
        this.damageBoostTimer = 0;
        this.invulnTimer = 0;
        // multipliers populated by recomputeMultipliers() — passives mutate these
        this.dmgMult        = 1;
        this.fireRateMult   = 1;
        this.areaMult       = 1;
        this.projSpeedMult  = 1;
        this.magnetMult     = 1;
        this.maxHpMult      = 1;
        this.moveSpeedMult  = 1;
        this.xpGainMult     = 1;
        this.extraProjectiles = 0;
        this.foodMult        = 1;
        this.coinGainMult     = 1;
        // Run-scoped set of choice keys the player has banished. Filtered
        // out of buildUpgradeChoices so banished options never reappear.
        this.banishedUpgrades = new Set();
    }

    update()
    {
        this.speed = playerSpeed * this.moveSpeedMult;
        this.maxHp = playerMaxHp * this.maxHpMult;
        // tick down mystery-pickup buff timers
        if (this.damageBoostTimer > 0)
        {
            this.damageBoostTimer -= 1 / 60;
            if (this.damageBoostTimer <= 0) recomputeMultipliers();
        }
        if (this.invulnTimer > 0) this.invulnTimer -= 1 / 60;
        if (timeSlowTimer > 0) timeSlowTimer -= 1 / 60;
        const dir = playerAI
            ? aiDirection()
            : keyDirection().add(gamepadStick(0)).add(touchDirection());
        const move = dir.length() > 1 ? dir.normalize() : dir;
        this.velocity = move.scale(this.speed / 60);  // velocity is per-frame

        super.update();

        // arena clamp
        this.pos.x = clamp(this.pos.x, ARENA_MIN_X + .6, ARENA_MAX_X - .6);
        this.pos.y = clamp(this.pos.y, ARENA_MIN_Y + .6, ARENA_MAX_Y - .6);

        this.renderOrder = -baseY(this);

        if (playerAI && this.hp < 1) this.hp = 1;

        if (this.hp <= 0 && !gameOver)
        {
            gameOver = true;
            showGameOverMenu();
        }
    }

    render()
    {
        // Soft pulsing halo so the player is always findable in a busy
        // swarm. Drawn first so the player emoji renders on top of it.
        const pulse = .5 + .5 * sin(time * 2.5);
        const haloSize = this.size.x * (1.7 + pulse * .25);
        drawTile(this.pos, vec2(haloSize), sprites.shadow,
                 new Color(.55, .9, 1, .18 + pulse * .1));

        let tint = WHITE, additive = null;
        if (this.hurtTimer > 0)
        {
            this.hurtTimer -= 1 / 60;
            tint = new Color(1, .55, .55);
            // pulse the additive on/off every .1s so the player visibly strobes when hit
            if (this.hurtTimer % .1 < .05)
                additive = new Color(.5, 0, 0, 0);
        }
        drawEmoji(this.pos, this.size, this.tileInfo, tint, additive);
    }
}

class Chest extends EngineObject
{
    constructor(pos)
    {
        super(pos, vec2(1.4), sprites.chest);
        setupKinematicProp(this);
        this.velocity = vec2();
        this.spawnTime = time;
    }

    update()
    {
        super.update();
        this.renderOrder = -baseY(this) + 100;   // float above ground entities
        // bobbing wiggle so the chest catches the eye in a busy screen
        const age = time - this.spawnTime;
        this.angle = Math.sin(age * 4) * .12;
        if (player.pos.distance(this.pos) < 1.2)
        {
            this.open();
            this.destroy();
        }
    }

    open()
    {
        // evolution check first — if any owned weapon meets its recipe,
        // evolve it (this is the only way to get evolved weapons)
        const evolution = findAvailableEvolution();
        if (evolution)
        {
            const idx = player.weapons.indexOf(evolution.weapon);
            const oldName = evolution.weapon.name;
            player.weapons[idx] = evolution.evo.ctor();
            if (typeof showMenuToast === 'function')
            {
                showMenuToast({icon: evolution.evo.emoji, title: 'EVOLVED!',
                    text: oldName + ' → ' + evolution.evo.name,
                    duration: 4, position: 'bottom-right'});
            }
        }
        else
        {
            // fallback — grant 3 random upgrades like a triple level-up
            let applied = 0;
            for (let i = 0; i < 3; ++i)
            {
                const choices = buildUpgradeChoices();
                if (!choices.length) break;
                choices[randInt(choices.length)].apply();
                ++applied;
            }
            if (applied === 0)
            {
                // fully maxed build — fall through to the consolation prize
                grantMaxBuildReward();
            }
            else if (typeof showMenuToast === 'function')
            {
                showMenuToast({icon: '🎁', title: 'Chest!',
                               text: '+' + applied + ' upgrade' +
                                     (applied === 1 ? '' : 's'),
                               duration: 2.5, position: 'bottom-right'});
            }
        }
        // fireworks burst — radial chainFlashes for the reward moment
        emitRadialFlashes(this.pos, 3, 16, null, .5);
        if (sounds.chest && sounds.chest.play) sounds.chest.play(this.pos);
    }

    render()
    {
        if (!isOnScreen(this.pos, this.size.scale(2))) return;
        const age = time - this.spawnTime;
        // pulsing gold additive so the chest screams "come collect me"
        const pulse = .5 + .5 * Math.sin(age * 6);
        drawEmoji(this.pos, this.size, sprites.chest, WHITE,
                  new Color(.45 * pulse, .35 * pulse, 0, 0), this.angle);
        // Sparkle ring — small twinkling motes orbit the chest so it reads
        // as the premium evolution object, clearly different from a barrel.
        drawSparkleRing(this.pos, this.size.x * .85, age, 1.55,
                        new Color(1, .95, .55, 1));
        // Plus a few twinkles ON the sprite for extra premium polish —
        // the ring tells you something's special, the on-sprite glints
        // make it feel actively magical.
        drawTwinkles(this.pos, this.size.scale(.4), 4,
                     new Color(1, .95, .6, 1), this.spawnTime + this.angle);
    }
}

// Generic sparkle decoration — draws a few small twinkling motes around a
// world-space center. Used by 🎁 chests and 🛢️ barrels so the player can
// tell premium pickups apart from regular ground props at a glance.
function drawSparkleRing(centerPos, radius, phase, speed, color)
{
    const count = 5;
    for (let i = 0; i < count; ++i)
    {
        const a = phase * speed + i * (2 * PI / count);
        const breathe = .5 + .5 * sin(phase * 3 + i);
        const r = radius * (.85 + .2 * sin(phase * 1.7 + i));
        const sx = centerPos.x + cos(a) * r;
        const sy = centerPos.y + sin(a) * r;
        const alpha = .25 + .55 * breathe;
        drawTile(vec2(sx, sy), vec2(.22 + .08 * breathe), sprites.circle,
                 new Color(color.r, color.g, color.b, alpha));
    }
}

// Twinkle dots placed ON the sprite (not orbiting around it). Each dot
// drifts slowly across the sprite area on its own lissajous curve and
// pulses its alpha independently — reads as a few quick glints catching
// the light, not a steady halo. Cheaper than a real particle emitter for
// this many props.
function drawTwinkles(centerPos, halfSize, count, color, phase)
{
    for (let i = 0; i < count; ++i)
    {
        const ph    = phase + i * 2.3;
        const x     = centerPos.x + cos(time * .8 + ph * 1.1) * halfSize.x;
        const y     = centerPos.y + sin(time * 1.1 + ph * 1.3) * halfSize.y;
        const wink  = sin(time * 3 + ph);
        const alpha = max(0, wink * .85 - .05);
        if (alpha <= 0) continue;
        drawTile(vec2(x, y), vec2(.18 + .06 * alpha), sprites.circle,
                 new Color(color.r, color.g, color.b, alpha));
    }
}

const enemies = [];

class Enemy extends EngineObject
{
    constructor(pos, type, eliteKey = null, bossDef = null)
    {
        const elite = eliteKey ? ELITE_TYPES[eliteKey] : null;
        const baseSz = type.size != null ? type.size : 1.0;
        const sz = baseSz * (elite ? elite.sizeMult : 1);
        super(pos, vec2(sz), sprites[type.sprite]);
        // Curse Mode multiplies enemy HP and speed; XP/coin gain on the
        // player side already compensates via recomputeMultipliers.
        const curseFactor = 1 + curseLevel * .5;
        this.type     = type;
        this.hp       = type.hp * (elite ? elite.hpMult : 1) * curseFactor;
        this.maxHp    = this.hp;
        // Smoothed HP for the in-world boss bar — lerps toward this.hp so
        // damage drains over ~.1 s instead of snapping. Initial value = hp
        // so the bar opens full.
        this.displayHp = this.hp;
        this.dmg      = type.dmg * (elite ? elite.dmgMult : 1);
        this.speed    = type.speed * (elite ? elite.speedMult : 1) * curseFactor;
        this.xpDrop   = type.xpDrop * (elite ? elite.xpMult : 1);
        this.isElite  = !!elite;
        this.eliteKey = eliteKey;
        this.eliteAdditive = elite ? elite.additive : null;
        this.isBoss   = !!bossDef;
        this.bossDef  = bossDef;
        // bosses always glow gold so they read against a swarm of regulars
        if (this.isBoss && !this.eliteAdditive)
            this.eliteAdditive = new Color(.55, .42, 0, 0);
        setupKinematicProp(this);
        enemies.push(this);
        this.hitCooldown = 0;
        this.hitFlashTimer = 0;
        this.frozenTimer = 0;
        this.burnTimer = 0;
        this.burnDps   = 0;
        this.slowTimer = 0;
        this.tint = null;
        this.additive = null;
        // per-instance phase so a wave of enemies doesn't sync up
        this.bobPhase = rand(2 * PI);
        // integrated rotation for entities that roll (skull) — advances with
        // velocity.x so a ball moving right rolls clockwise, left rolls CCW.
        this.rollAngle = 0;
        this.shootTimer = 0;
        // Skeleton revival state — set by takeDamage when a revivable enemy
        // hits 0 HP. While > 0 the enemy is "down" (no AI, no contact, no
        // hit-box), then stands back up at half HP.
        this.revivingTimer = 0;
        this.hasRevived    = false;
        // Sprite-mirror flag for facing. Sticky — only flips when the enemy
        // actually moves horizontally, so a frozen enemy stays oriented the
        // way it last walked instead of snapping back to right.
        this.facingLeft    = false;
        // Brief post-spawn invuln window so split children (clown → ants,
        // skeleton → bone shards) aren't insta-killed by lingering player
        // weapons sitting on their parent's death position. Default 0;
        // the split logic in destroy() sets it on each new spawn.
        this.spawnInvulnTimer = 0;
    }

    render()
    {
        // Off-screen cull — Enemy is the hottest render path (up to 800 on
        // the board, ~25 visible). isOnScreen takes a bit of size padding
        // to account for the wobble offsets and bigger boss sizes.
        if (!isOnScreen(this.pos, this.size.scale(1.6))) return;
        // Collapsed-to-bones pose during the revival window. Drawn small,
        // grey, and tilted so it visibly reads as "not standing yet."
        if (this.revivingTimer > 0)
        {
            drawTile(this.pos, this.size.scale(.7), this.tileInfo,
                     new Color(.7, .7, .7, .55), this.bobPhase + PI/2);
            return;
        }
        let tint = this.tint || WHITE;
        let additive = this.additive;
        // elite glow acts as the base layer; status effects (burn etc.)
        // override it because the status is more gameplay-relevant
        if (!additive && this.eliteAdditive) additive = this.eliteAdditive;
        if (this.hitFlashTimer > 0)
        {
            this.hitFlashTimer -= 1 / 60;
            // white additive briefly punches through the outline so a hit
            // is visible even on a 50-pixel sprite in a swarm of hundreds
            additive = new Color(.8, .8, .8, 0);
        }

        // per-type wobble so the swarm reads as alive. Frozen enemies skip
        // it so a frozen pose is visibly static.
        let renderPos = this.pos;
        let renderAngle = 0;
        let renderSize = this.size;
        if (this.frozenTimer <= 0)
        {
            const k = this.type.key;
            const ph = this.bobPhase;
            if (k === 'zombie') renderAngle = sin(time * 5  + ph) * .14;
            else if (k === 'bat')       renderPos = this.pos.add(vec2(0, sin(time * 7 + ph) * .18));
            else if (k === 'ant')       renderAngle = sin(time * 12 + ph) * .12;
            else if (k === 'snail')     renderAngle = sin(time * 2  + ph) * .05;
            else if (k === 'skull' || k === 'skeleton' || k === 'boneShard')
                                        renderAngle = this.rollAngle;
            else if (k === 'clown')     renderAngle = sin(time * 8  + ph) * .18;
            else if (k === 'reaper')    renderAngle = sin(time * 3  + ph) * .1;
            else if (k === 'duck')      renderAngle = sin(time * 6  + ph) * .15;
            else if (k === 'ghost')     renderPos = this.pos.add(vec2(0, sin(time * 2.5 + ph) * .12));
            else if (k === 'fireImp')   renderAngle = sin(time * 10 + ph) * .1;
            else if (k === 'iceImp')    renderAngle = sin(time * 3  + ph) * .08;
            else if (k === 'megaSnake')
            {
                const s = sin(time * 8 + ph) * .35;
                renderSize = vec2(this.size.x - s, this.size.y + s);
                renderPos = this.pos.add(vec2(0, s * .5));
            }
        }

        let finalTint = tint;
        if (this.type.key === 'ghost' && finalTint === WHITE)
            finalTint = new Color(1, 1, 1, .7);
        // Post-spawn invuln fade-in — children start translucent and ramp to
        // opaque over the .5 s window so the player can see they're alive
        // but not yet damageable.
        if (this.spawnInvulnTimer > 0)
        {
            const t = 1 - this.spawnInvulnTimer / .5;
            const a = .35 + .65 * t;
            const c = finalTint || WHITE;
            finalTint = new Color(c.r, c.g, c.b, a);
        }
        drawEmoji(renderPos, renderSize, this.tileInfo, finalTint, additive, renderAngle, this.facingLeft);

        // In-world boss HP bar — floats just above the sprite, scaled to the
        // boss's width so a small boss gets a small bar and a giant boss
        // gets a giant one. Per-boss so the multi-Reaper escalation reads
        // naturally. Regular enemies are too short-lived to need a bar; the
        // existing additive glow tells you when they're elite already.
        if (this.isBoss)
        {
            const w   = this.size.x * .9;
            const h   = .15;
            const yOff = this.size.y * .55 + .25;
            const center = vec2(this.pos.x, this.pos.y + yOff);
            const frac = max(0, min(1, this.displayHp / this.maxHp));
            // Outline — slightly larger black backing rect for legibility
            // against any floor or backdrop.
            drawRect(center, vec2(w + .08, h + .08), new Color(0, 0, 0, .9));
            // Frame backdrop flashes white briefly on hit, matching the
            // existing enemy hit-flash juice. hitFlashTimer is already
            // decremented inside Enemy.render above, so we just sample it.
            const frame = this.hitFlashTimer > 0
                ? new Color(1, 1, 1, .95)
                : new Color(.12, .12, .12, .9);
            drawRect(center, vec2(w, h), frame);
            // Red fill, left-aligned so it drains rightward → leftward.
            if (frac > 0)
            {
                const fillW = w * frac;
                const fillX = center.x - w / 2 + fillW / 2;
                drawRect(vec2(fillX, center.y), vec2(fillW, h),
                         new Color(1, .22, .22, 1));
            }
        }
    }

    update()
    {
        // Smooth the displayed HP toward the real HP every frame. Boss bars
        // sample displayHp, so this gives the bar a ~.1 s drain animation
        // when the boss takes damage instead of snapping in single frames.
        // Per-frame factor .18 → ~62% of the gap closes in 6 frames (.1 s).
        this.displayHp = lerp(this.displayHp, this.hp, .18);
        // Tick down the post-spawn invuln so the AI / movement still run —
        // only damage is blocked while the timer is active.
        if (this.spawnInvulnTimer > 0) this.spawnInvulnTimer -= 1 / 60;
        // Skeleton revival — collapsed enemies skip AI, contact, and the
        // physics step entirely until the timer expires. Then they pop back
        // up to half HP and resume normal behaviour.
        if (this.revivingTimer > 0)
        {
            this.revivingTimer -= 1 / 60;
            this.renderOrder = -baseY(this);
            return;
        }
        // tick status effects — priority order: freeze > burn > slow > none.
        // tint/additive are reset each frame; hit flash in render() overrides.
        let moveScale = 1;
        this.tint = null;
        this.additive = null;

        if (this.frozenTimer > 0)
        {
            this.frozenTimer -= 1 / 60;
            moveScale = 0;
            this.tint = new Color(.45, .75, 1);
        }
        else if (timeSlowTimer > 0)
        {
            // Mystery-pickup global time slow — applied to every enemy at
            // once. Visualized with a pale blue tint to make the effect
            // obvious without overriding more-specific status effects.
            moveScale = .3;
            this.tint = new Color(.7, .85, 1);
        }
        else if (this.burnTimer > 0)
        {
            this.burnTimer -= 1 / 60;
            // DOT applied directly (not through takeDamage) so we don't
            // spam the white hit-flash 60 times per second while burning
            this.hp -= this.burnDps / 60;
            if (this.hp <= 0) { this.destroy(); return; }
            this.tint = new Color(1, .55, .35);
            const flicker = Math.sin(time * 28) * .5 + .5;
            this.additive = new Color(.45 * flicker, .15 * flicker, 0, 0);
        }
        else if (this.slowTimer > 0)
        {
            this.slowTimer -= 1 / 60;
            moveScale = .35;
            this.tint = new Color(.7, .85, 1);
        }

        // walk toward the player — clamped so we don't tunnel through.
        // Fast enemies like 🦇 were stepping past player.pos in a single
        // frame, which read as a glitchy snap. Now we stop within touch
        // range and let contact damage + knockback handle the bump.
        // AI test mode lets enemies pass through the player so the AI
        // never gets pinned by a ring of clumping mobs.
        const toPlayer = player.pos.subtract(this.pos);
        const dist = toPlayer.length();
        if (dist > .01)
        {
            const targetStep = this.speed * moveScale / 60;
            const contactDist = playerAI ? 0 : (this.size.x + player.size.x) * .4;
            const usableDist = max(0, dist - contactDist);
            const stepLen = min(targetStep, usableDist);
            let dir = toPlayer.normalize();
            if (this.type.key === 'duck')
            {
                const perp = vec2(-dir.y, dir.x);
                const wobble = sin(time * 4 + this.bobPhase) * .8;
                dir = dir.add(perp.scale(wobble));
                if (dir.length() > .01) dir = dir.normalize();
            }
            this.velocity = stepLen > 0 ? dir.scale(stepLen) : vec2();
            // Stickily update facing — only flips on real horizontal motion,
            // so frozen / time-slowed enemies keep their last orientation.
            if      (this.velocity.x >  .001) this.facingLeft = false;
            else if (this.velocity.x < -.001) this.facingLeft = true;
        }

        // Boss ranged attack — fires an EnemyProjectile every `shootEvery` seconds.
        if (this.bossDef && this.bossDef.shootEvery)
        {
            this.shootTimer -= 1 / 60;
            if (this.shootTimer <= 0)
            {
                this.shootTimer = this.bossDef.shootEvery;
                const dir = player.pos.subtract(this.pos);
                if (dir.length() > .1)
                    new EnemyProjectile(this.pos.copy(), dir, 5, this.dmg, 4,
                                        sprites[this.bossDef.shootSprite]);
            }
        }

        super.update();

        this.renderOrder = -baseY(this);

        // rolling integrator — advances with velocity.x so rolling enemies
        // (skulls) rotate clockwise when moving right, CCW when moving left.
        // Factor 2 ≈ "1 radian per .5 unit of horizontal travel" which reads
        // as a ball rolling at its physical circumference.
        this.rollAngle += this.velocity.x * 2;

        // tick contact cooldown
        if (this.hitCooldown > 0) this.hitCooldown -= 1 / 60;

        // contact damage to player — fully blocked while ✨ invuln is active
        // and in AI test mode (so the AI can wade through swarms unbothered)
        if (this.hitCooldown <= 0 &&
            player.invulnTimer <= 0 &&
            !playerAI && !godMode &&
            isOverlapping(this.pos, this.size, player.pos, player.size))
        {
            player.hp -= this.dmg;
            player.hurtTimer = .25;
            this.hitCooldown = .4;
            // hurt sound plays from the enemy's position so the player hears
            // which direction they were hit from
            if (sounds.hurt && sounds.hurt.play) sounds.hurt.play(this.pos);
            // small knockback so we don't re-hit instantly
            const away = this.pos.subtract(player.pos).normalize(.5);
            this.pos = this.pos.add(away);
        }

        // despawn if dragged too far from the player or fully outside arena —
        // bosses are exempt (they persist until killed)
        if (!this.isBoss)
        {
            const farFromPlayer = player.pos.distance(this.pos) > 50;
            const outsideArena = this.pos.x < ARENA_MIN_X - 2 || this.pos.x > ARENA_MAX_X + 2 ||
                                 this.pos.y < ARENA_MIN_Y - 2 || this.pos.y > ARENA_MAX_Y + 2;
            if (farFromPlayer || outsideArena)
                this.destroy();
        }
    }

    destroy()
    {
        const i = enemies.indexOf(this);
        if (i >= 0) enemies.splice(i, 1);
        if (this.hp <= 0)  // only drop on death, not despawn
        {
            killCount++;
            // split into smaller enemies if the type or boss def defines a split
            const splitInto = this.type.splitInto ||
                              (this.bossDef && this.bossDef.splitInto);
            if (splitInto)
            {
                const child = ENEMY_TYPES.find(t => t.key === splitInto);
                if (child)
                {
                    const count = this.bossDef && this.bossDef.splitCount
                                ? this.bossDef.splitCount
                                : (this.type.splitCount || 3);
                    // Bosses spread their spawn ring wider since they're big.
                    // Non-bosses now scale by parent size + a small random
                    // jitter per child so the spawn never lines up neatly.
                    const baseSpread = this.isBoss ? this.size.x * .5 : this.size.x * 1.1;
                    for (let i = 0; i < count; ++i)
                    {
                        const spread = baseSpread * rand(.8, 1.2);
                        const offset = vec2().setAngle(rand(2 * PI), spread);
                        const e = new Enemy(this.pos.add(offset), child);
                        // Half-second invuln so the new spawn survives any
                        // weapon still firing into the parent's death spot
                        // (Smiley's auto-aim sat right on top of it, etc.).
                        e.spawnInvulnTimer = .5;
                        // Randomize the rolling enemies' starting angle so
                        // bone shards / mini-skulls don't all face the same
                        // way at the moment of the split.
                        e.rollAngle = rand(2 * PI);
                    }
                }
            }
            if (this.isBoss)
            {
                if (this.bossDef && this.bossDef.isFinalBoss)
                {
                    // killing the stage's final boss wins the run
                    runVictory = true;
                    showVictoryMenu();
                }
                else
                {
                    // regular bosses drop a 🎁 chest instead of the usual gem/food
                    new Chest(this.pos.copy());
                }
                // bosses always drop a chunky coin pile
                for (let i = 0; i < 5; ++i)
                {
                    const off = vec2().setAngle(rand(2 * PI), rand(.5, 1.5));
                    new Pickup(this.pos.add(off), sprites.coin, 'coin', 10);
                }
                if (activeBoss === this) activeBoss = null;
            }
            else
            {
                // Per-row chances live in ENEMY_DROP_TABLE — edit one row to
                // tune one drop without touching the others.
                rollDrop(ENEMY_DROP_TABLE, this.pos.copy(), this);
            }
        }
        else if (this.isBoss && activeBoss === this)
        {
            // covers the despawn-by-restart edge case
            activeBoss = null;
        }
        super.destroy();
    }

    takeDamage(amount)
    {
        // While collapsed, skeletons take no damage — the player has to
        // wait out the revive (or move on) before re-engaging.
        if (this.revivingTimer > 0) return;
        // Post-spawn invuln window — split children (clown ants, bone shards)
        // get a brief moment to scatter before weapons start chipping them.
        if (this.spawnInvulnTimer > 0) return;
        this.hp -= amount;
        this.hitFlashTimer = .08;
        // throttle damage numbers — multiple weapons hitting the same enemy
        // every frame would otherwise flood the screen
        if (!this._lastDmgT || time - this._lastDmgT > .12)
        {
            spawnDamageNumber(this.pos, amount);
            this._lastDmgT = time;
        }
        if (this.hp <= 0)
        {
            // Skeleton-style revive — first kill collapses to bones, second
            // kill drops loot normally. Bosses are never revivable.
            if (this.type && this.type.revivable && !this.hasRevived && !this.isBoss)
            {
                this.hasRevived    = true;
                this.hp            = this.maxHp * .5;
                this.revivingTimer = 4;
                if (sounds.hurt && sounds.hurt.play) sounds.hurt.play(this.pos);
                return;
            }
            this.destroy();
        }
    }
}

class Projectile extends EngineObject
{
    constructor(pos, dir, speed, damage, lifetime, sprite, piercing = false, onHit = null)
    {
        super(pos, vec2(.6), sprite);
        this.velocity = dir.normalize(speed / 60);
        this.damage   = damage;
        this.lifetime = lifetime;
        this.lifetimeMax = lifetime;   // kept so render can fade over last 10%
        this.piercing = piercing;
        this.onHit    = onHit;
        this.hitSet   = new Set();
        setupKinematicProp(this);
        // ring buffer of recent (pos, angle) for the motion trail
        this.trail = [];
        this.maxTrail = 5;
    }

    update()
    {
        // Snapshot previous frame's pose BEFORE super.update moves it,
        // so the oldest ghost sits where we used to be.
        this.trail.push({pos: this.pos.copy(), angle: this.angle});
        if (this.trail.length > this.maxTrail) this.trail.shift();

        super.update();

        this.renderOrder = -this.pos.y;

        this.lifetime -= 1 / 60;
        if (this.lifetime <= 0) { this.destroy(); return; }

        for (const e of enemies)
        {
            if (this.hitSet.has(e)) continue;
            if (isOverlapping(this.pos, this.size, e.pos, e.size))
            {
                e.takeDamage(this.damage);
                if (this.onHit) this.onHit(e);
                this.hitSet.add(e);
                if (!this.piercing) { this.destroy(); return; }
            }
        }
    }

    render()
    {
        // Off-screen cull — trail extends ~5 frames back, so pad the size
        // a bit before the visibility check (otherwise a trail's leading
        // ghost would flicker on/off at the edge).
        if (!isOnScreen(this.pos, this.size.scale(3))) return;
        // Rapid fade-out over the last 10% of life so the projectile (and
        // its trail) doesn't just vanish. Sprite + every trail ghost get
        // multiplied by the same fade factor so the streak collapses to
        // zero in lockstep.
        const lifeFrac = this.lifetimeMax ? this.lifetime / this.lifetimeMax : 1;
        const fade = lifeFrac < .2 ? max(0, lifeFrac * 5) : 1;
        // Draw ghost copies of recent positions, oldest (lowest alpha) first,
        // then the current position at full alpha last. Gives a motion trail
        // without needing a particle system. Honors `mirror` so direction-
        // mirrored projectiles (e.g. left-thrown dagger) flip horizontally.
        const mirror = !!this.mirror;
        const n = this.trail.length;
        for (let i = 0; i < n; ++i)
        {
            const g = this.trail[i];
            const alpha = (i + 1) / (n + 2) * .55 * fade;
            drawTile(g.pos, this.size, this.tileInfo,
                     new Color(1, 1, 1, alpha), g.angle, mirror);
        }
        drawTile(this.pos, this.size, this.tileInfo,
                 new Color(1, 1, 1, fade), this.angle, mirror);
    }
}

class EnemyProjectile extends EngineObject
{
    constructor(pos, dir, speed, damage, lifetime, sprite)
    {
        super(pos, vec2(.7), sprite);
        this.velocity = dir.normalize(speed / 60);
        this.damage   = damage;
        this.lifetime = lifetime;
        setupKinematicProp(this);
        this.angleVelocity = 6;   // visible spin
    }

    update()
    {
        super.update();
        this.renderOrder = -this.pos.y;
        this.lifetime -= 1 / 60;
        if (this.lifetime <= 0) { this.destroy(); return; }

        // arena despawn so a stray shot off-screen doesn't linger
        if (this.pos.x < ARENA_MIN_X - 2 || this.pos.x > ARENA_MAX_X + 2 ||
            this.pos.y < ARENA_MIN_Y - 2 || this.pos.y > ARENA_MAX_Y + 2)
        {
            this.destroy();
            return;
        }

        // player contact — respects invuln, same gate as Enemy contact
        // (also skipped in AI test mode so the AI never bleeds to wizard bolts)
        if (player.invulnTimer <= 0 && !playerAI && !godMode &&
            isOverlapping(this.pos, this.size, player.pos, player.size))
        {
            player.hp -= this.damage;
            player.hurtTimer = .25;
            if (sounds.hurt && sounds.hurt.play) sounds.hurt.play(this.pos);
            this.destroy();
        }
    }

    render() { if (isOnScreen(this.pos, this.size.scale(2))) super.render(); }
}

// Boomerang projectile — flies outward, reverses to seek back to the player.
// Piercing with a per-enemy hit cooldown so on the return trip it can re-hit
// enemies it caught on the way out.
class StarToss extends EngineObject
{
    constructor(pos, dir, speed, damage, range)
    {
        super(pos, vec2(.7), sprites.starToss);
        this.startPos = pos.copy();
        this.speedPerFrame = speed / 60;
        this.velocity = dir.normalize(this.speedPerFrame);
        this.damageAmount = damage;
        this.range = range;
        this.returning = false;
        this.hitMap = new Map();
        setupKinematicProp(this);
        this.angleVelocity = 10;       // visible spin (LittleJS naming!)
        this.life = 3.0;                // hard timeout if we never reach player
    }

    update()
    {
        super.update();
        this.renderOrder = -this.pos.y;
        this.life -= 1 / 60;
        if (this.life <= 0) { this.destroy(); return; }

        if (!this.returning)
        {
            // flip to return mode once we've travelled out far enough
            if (this.pos.distance(this.startPos) >= this.range)
                this.returning = true;
        }
        else
        {
            // re-aim at the (possibly-moved) player every frame; slightly
            // faster on the return so the round-trip doesn't drag
            const toPlayer = player.pos.subtract(this.pos);
            const d = toPlayer.length();
            if (d < .8) { this.destroy(); return; }
            this.velocity = toPlayer.normalize(this.speedPerFrame * 1.4);
        }

        // damage — piercing with .3s per-enemy hit cooldown so the same
        // enemy can be hit twice (once out, once back)
        for (const e of enemies)
        {
            if (!isOverlapping(this.pos, this.size, e.pos, e.size)) continue;
            const next = this.hitMap.get(e) || 0;
            if (time < next) continue;
            e.takeDamage(this.damageAmount);
            this.hitMap.set(e, time + .3);
        }
    }

    render() { if (isOnScreen(this.pos, this.size.scale(2))) super.render(); }
}

class StarTossWeapon
{
    constructor() { this.level = 1; this.name = 'Star Toss'; this.cooldown = 0; }
    levelUp() { this.level = min(this.level + 1, 5); }
    damage()  { return 5 + this.level * 2; }

    update()
    {
        this.cooldown -= 1 / 60;
        if (this.cooldown > 0) return;
        this.cooldown = 1.4 / player.fireRateMult;

        const target = nearestEnemy(player.pos, 14 * player.areaMult);
        if (!target) return;
        const dirToTarget = target.pos.subtract(player.pos);
        const baseAng = dirToTarget.angle();

        // Small fan — 1 at Lv1 up to 5 at Lv5, ±.18 rad spread (≈10°)
        const count = this.level + player.extraProjectiles;
        const spread = count === 1 ? 0 : .18;
        const dmg = this.damage() * player.dmgMult;
        const speed = 10 * player.projSpeedMult;
        const range = 6 * player.areaMult;
        for (let i = 0; i < count; ++i)
        {
            const t = count === 1 ? .5 : i / (count - 1);
            const ang = baseAng + lerp(-spread, spread, t);
            const d = vec2().setAngle(ang, 1);
            new StarToss(player.pos.copy(), d, speed, dmg, range);
        }
    }
}

function xpToNext(level) { return xpToNextBase + level * level * 2; }

// Temporary buff state — driven by the 🍀 mystery pickup. Each timer
// ticks down in Player.update; the effects are checked at use-sites.
let timeSlowTimer = 0;   // enemies move at 30% while > 0

function applyRandomBuff(pos)
{
    if (!player) return;
    const buffs = [
        () => {
            player.damageBoostTimer = 8;
            recomputeMultipliers();     // bakes the 2× into dmgMult
            toastBuff('💪', '2× DAMAGE', '8 seconds');
        },
        () => {
            const heal = player.maxHp - player.hp;
            player.hp = player.maxHp;
            toastBuff('🍔', 'FULL MEAL', '+' + Math.ceil(heal) + ' HP');
        },
        () => {
            timeSlowTimer = 5;
            toastBuff('⏳', 'TIME SLOW', 'enemies at 30% for 5s');
        },
        () => {
            player.invulnTimer = 4;
            toastBuff('✨', 'INVINCIBLE', '4 seconds');
        },
        () => {
            // pull every gem on screen toward the player
            let count = 0;
            for (const obj of engineObjects)
            {
                if (obj instanceof Pickup && obj.kind === 'gem' && !obj.destroyed)
                {
                    obj.magnetting = true;
                    ++count;
                }
            }
            toastBuff('🧲', 'GEM VACUUM', count + ' gems incoming');
        },
        () => {
            for (let i = 0; i < 20; ++i)
            {
                const off = vec2().setAngle(rand(2 * PI), rand(.5, 2));
                new Pickup((pos || player.pos).add(off),
                           sprites.coin, 'coin', 5);
            }
            toastBuff('💰', 'COIN RAIN', '+100💰');
        },
    ];
    buffs[randInt(buffs.length)]();
}
function toastBuff(icon, title, text)
{
    if (typeof showMenuToast === 'function')
        showMenuToast({icon, title, text, duration: 2.5, position: 'bottom-right'});
}

// Brief un-grabbable window applied to newly-spawned pickups. Read once by
// the Pickup constructor; reset to 0 by callers when they're done bracketing
// a spawn burst. Lets crates / barrels drop their loot and have the player
// see what fell out before sucking it all up.
let pickupSpawnDelay = 0;

class Pickup extends EngineObject
{
    constructor(pos, sprite, kind, value, sizeMult = 1)
    {
        super(pos, vec2(.6 * sizeMult), sprite);
        this.kind  = kind;   // 'gem', 'food', or 'coin'
        this.value = value;
        setupKinematicProp(this);
        this.damping = .98;            // soft float toward magnet
        this.magnetting = false;
        // per-instance phase so a pile of dropped gems doesn't sparkle in sync
        this.sparklePhase = rand(2 * PI);
        // Initial pickup-block window (0 by default). Set via the global
        // pickupSpawnDelay hint so the spawning code can bracket-set it.
        this.pickupTimer = pickupSpawnDelay;
    }

    render()
    {
        if (!isOnScreen(this.pos, this.size.scale(2))) return;
        // sparkle additive per pickup kind — gives "this is good to grab"
        // visual readability. Tinted pulse via sin so each gem twinkles.
        const t = time * 5 + this.sparklePhase;
        const pulse = .25 + .25 * sin(t);
        let additive = null;
        if (this.kind === 'gem')        additive = new Color(.1 * pulse, pulse, pulse, 0);
        else if (this.kind === 'food') additive = new Color(pulse, .15 * pulse, .25 * pulse, 0);
        else if (this.kind === 'coin')  additive = new Color(pulse, pulse * .8, .1 * pulse, 0);
        else if (this.kind === 'mystery')
        {
            // rainbow-shift hue so the rare drop screams "GRAB ME"
            const h = (time * .35 + this.sparklePhase * .2) % 1;
            const big = .55 + .45 * sin(t * 1.5);
            additive = new Color(big * (1 - h), big * h, big * .8, 0);
        }
        drawEmoji(this.pos, this.size, this.tileInfo, WHITE, additive);
    }

    update()
    {
        // Crate / barrel drops set a brief pickupTimer so the player gets
        // a moment to see what fell out before it's vacuumed up. Skip both
        // magnet AND pickup while it's running.
        if (this.pickupTimer > 0)
        {
            this.pickupTimer -= 1 / 60;
            super.update();
            this.renderOrder = -baseY(this);
            return;
        }
        // magnet — scaled by player.magnetMult passive
        const toPlayer = player.pos.subtract(this.pos);
        const dist = toPlayer.length();
        const effectiveMagnet = magnetRadius * player.magnetMult;
        if (this.magnetting || dist < effectiveMagnet)
        {
            this.magnetting = true;
            const pull = toPlayer.normalize(min(.3, dist * .2));
            this.velocity = this.velocity.add(pull);
        }

        super.update();

        this.renderOrder = -baseY(this);

        // pickup
        if (dist < .8)
        {
            if (this.kind === 'gem')
            {
                player.xp += this.value * player.xpGainMult;
                playPickupSound(sounds.pickup, this.pos);
                while (player.xp >= xpToNext(player.level))
                {
                    player.xp -= xpToNext(player.level);
                    player.level++;
                    player.pendingLevelUps = (player.pendingLevelUps || 0) + 1;
                    if (sounds.levelUp && sounds.levelUp.play) sounds.levelUp.play();
                }
            }
            else if (this.kind === 'food')
            {
                player.hp = min(player.maxHp, player.hp + this.value * player.foodMult);
                if (sounds.food && sounds.food.play) sounds.food.play(this.pos);
            }
            else if (this.kind === 'coin')
            {
                const gain = max(1, Math.round(this.value * player.coinGainMult));
                coinsRun += gain;
                coins    += gain;
                playPickupSound(sounds.coin, this.pos);
                // Persist immediately so a tab close mid-run never costs
                // the player coins they actually grabbed.
                saveMetaState();
            }
            else if (this.kind === 'mystery')
            {
                applyRandomBuff(this.pos);
                if (sounds.chest && sounds.chest.play) sounds.chest.play(this.pos);
            }
            this.destroy();
        }
    }
}

// Auto-aim picker for weapons that need a single target (Fireball, Comet,
// ChainLightning first hop, StarStorm, etc). Default order: enemy first,
// breakable as fallback so the player isn't wasting shots on crates during
// a swarm. The 🧙 Wizard hero flips this — its `preferBreakables` flag
// makes auto-aim hunt crates and barrels first since those are hard to
// hit by hand and the Wizard's whole identity is AOE / cleanup.
function nearestEnemy(fromPos, maxDist)
{
    let bestEnemy = null,     bestEnemyD = maxDist;
    let bestBreakable = null, bestBreakableD = maxDist;
    for (const e of enemies)
    {
        const d = fromPos.distance(e.pos);
        if (e.isBreakable)
        {
            if (d < bestBreakableD) { bestBreakable = e; bestBreakableD = d; }
        }
        else if (d < bestEnemyD)    { bestEnemy = e;     bestEnemyD = d; }
    }
    if (currentHero && currentHero.preferBreakables)
        return bestBreakable || bestEnemy;
    return bestEnemy || bestBreakable;
}

// Tiered XP gem drop — small/medium/large by xpDrop, with elites always
// scoring large. Value is unchanged; only the visual + render size change
// so the player can SEE which kills are worth crossing the swarm for.
function dropGem(pos, xpDrop, isElite)
{
    if (isElite || xpDrop >= 5)
        return new Pickup(pos, sprites.gemLarge,  'gem', xpDrop, 1.9);
    if (xpDrop >= 2)
        return new Pickup(pos, sprites.gemMedium, 'gem', xpDrop, 1.4);
    return     new Pickup(pos, sprites.gem,       'gem', xpDrop, 1.0);
}

// Drop tables — each row carries its OWN per-row chance (not cumulative).
// Edit one number without re-doing the math on every other row. `rollDrop`
// walks the table in order subtracting each row's chance from a single
// rand(); the first row that covers what's left fires. Anything left over
// runs `fallback(pos, ctx)` if provided (used by crate / barrel for the
// guaranteed coin pile in the leftover band), otherwise the kill drops
// nothing. `ctx` carries the source object so spawn callbacks can read
// per-instance fields like xpDrop / isElite.
function rollDrop(table, pos, ctx, fallback)
{
    let roll = rand();
    for (const entry of table)
    {
        if (roll < entry.chance) { entry.spawn(pos, ctx); return; }
        roll -= entry.chance;
    }
    if (fallback) fallback(pos, ctx);
}

// Regular enemy kills. Total of these rows = 33.8 %, so ~66 % of kills
// drop nothing — that's intentional, gem scarcity is what makes them
// feel earned.
const ENEMY_DROP_TABLE = [
    {chance: .005, spawn: pos      => new Pickup(pos, sprites.clover, 'mystery', 0)},
    {chance: .03, spawn: pos      => new Pickup(pos, sprites.coin,   'coin', 1)},
    {chance: .02, spawn: pos      => new Pickup(pos, sprites.food,  'food', 20, 1.6)},
    {chance: .25, spawn: (pos, e) => dropGem(pos, e.xpDrop, e.isElite)},
];

// 📦 Crate. Explicit rolls are mystery (.04) + food (.14) = 18 %; the
// remaining 82 % falls into the coin-pile fallback.
const CRATE_DROP_TABLE = [
    {chance: .04, spawn: pos => new Pickup(pos, sprites.clover, 'mystery', 0)},
    {chance: .14, spawn: pos => new Pickup(pos, sprites.food,  'food', 20, 1.6)},
];
function crateCoinFallback(pos)
{
    const n = 1 + randInt(3);
    for (let k = 0; k < n; ++k)
    {
        const off = vec2().setAngle(rand(2 * PI), rand(.2, .7));
        new Pickup(pos.add(off), sprites.coin, 'coin', 2);
    }
}

// 🛢️ Barrel — premium pool. Explicit rolls = big gem (.35) + mystery (.20)
// = 55 %; remaining 45 % falls into the chunky coin-pile fallback.
const BARREL_DROP_TABLE = [
    {chance: .35, spawn: pos => new Pickup(pos, sprites.gemLarge, 'gem', 8, 1.9)},
    {chance: .20, spawn: pos => new Pickup(pos, sprites.clover,   'mystery', 0)},
];
function barrelCoinFallback(pos)
{
    for (let k = 0; k < 8; ++k)
    {
        const off = vec2().setAngle(rand(2 * PI), rand(.3, 1.1));
        new Pickup(pos.add(off), sprites.coin, 'coin', 5);
    }
}

class FishOrbitWeapon
{
    constructor()
    {
        this.level = 1;
        this.name = 'Fish Orbit';
        this.angle = 0;
        this.hitMap = new Map();
    }
    levelUp() { this.level = min(this.level + 1, 5); }
    damage()  { return 1 + this.level; }

    update()
    {
        this.angle += 4 * player.fireRateMult / 60;  // faster spin with Stopwatch

        const radius = 2.5 * player.areaMult;
        const orbSize = .7 * player.areaMult;
        const dmg = this.damage() * player.dmgMult;
        const now = time;
        for (const [e, t] of this.hitMap)
            if (!e.parent && (e.destroyed || t < now - 5)) this.hitMap.delete(e);

        // damage check only — drawing moved to draw() because update() runs
        // during gameUpdate (before render). drawTile from update batches GL
        // vertices that the next frame's enginePreRender then asserts on.
        // Limit-Break can grow level past 5; soft-cap the fish count at 8
        // so a long run doesn't tank the frame rate while damage keeps rising.
        const orbCount = min(this.level, 8);
        for (let i = 0; i < orbCount; ++i)
        {
            const a = this.angle + i * 2 * PI / orbCount;
            const pos = player.pos.add(vec2().setAngle(a, radius));
            for (const e of enemies)
            {
                if (!isOverlapping(pos, vec2(orbSize), e.pos, e.size)) continue;
                const next = this.hitMap.get(e) || 0;
                if (now < next) continue;
                e.takeDamage(dmg);
                this.hitMap.set(e, now + .5);
            }
        }
    }

    draw()
    {
        const radius = 2.5 * player.areaMult;
        const orbSize = .7 * player.areaMult;
        const orbCount = min(this.level, 8);
        for (let i = 0; i < orbCount; ++i)
        {
            const a = this.angle + i * 2 * PI / orbCount;
            const pos = player.pos.add(vec2().setAngle(a, radius));
            drawTile(pos, vec2(orbSize), sprites.fish, WHITE, a + 2*time);
        }
    }
}
class HeartDrainWeapon
{

        const radius = 2.0 * player.areaMult;
        const heartSize = .65 * player.areaMult;
        const dmg = this.damage() * player.dmgMult;
        const heal = this.healPerHit();
        const now = time;
        for (const [e, t] of this.hitMap)
            if (!e.parent && (e.destroyed || t < now - 5)) this.hitMap.delete(e);

        // damage check only — drawing moved to draw() because update() runs
        // during gameUpdate (before render). drawTile from update batches GL
        // vertices that the next frame's enginePreRender then asserts on.
        const count = this.heartCount();
        for (let i = 0; i < count; ++i)
        {

// Transient lightning segments — drawn fading by drawChainFlashes() each frame.
const chainFlashes = [];

// Floating damage numbers — small text that rises and fades for hit feedback.
// Per-enemy throttled in Enemy.takeDamage so 60Hz DOTs / multi-orbit hits
// don't flood the screen.
const damageNumbers = [];
const DAMAGE_NUMBER_LIFETIME = .7;

function spawnDamageNumber(pos, value, color)
{
    damageNumbers.push({
        pos: pos.copy(),
        value: max(1, Math.ceil(value)),
        t: time + DAMAGE_NUMBER_LIFETIME,
        color: color || new Color(1, .95, .85),
    });
}

function drawDamageNumbers()
{
    for (let i = damageNumbers.length - 1; i >= 0; --i)
    {
        const d = damageNumbers[i];
        const remaining = d.t - time;
        if (remaining <= 0) { damageNumbers.splice(i, 1); continue; }
        const age = DAMAGE_NUMBER_LIFETIME - remaining;
        const yOffset = age * 1.8;
        const alpha = remaining / DAMAGE_NUMBER_LIFETIME;
        const c = d.color;
        drawText(String(d.value),
                 vec2(d.pos.x, d.pos.y + yOffset),
                 .75,
                 new Color(c.r, c.g, c.b, alpha),
                 .12, new Color(0, 0, 0, alpha * .9));
    }
}

// Drop shadows — only for the player and bosses so we don't drown the screen
// in shadows when the swarm hits hundreds of enemies. Drawn in gameRender
// after the floor so they sit under everything else.
function drawShadows()
{
    // Lay an ellipse-scaled soft radial under every ground-level entity.
    // Includes player, enemies, pickups, bombs, and chests so the world
    // reads as having a consistent floor. Skips projectiles (in the air)
    // and fire zones (already a ground decal). Cull off-screen entities —
    // on the bigger map only a small fraction of the swarm is visible
    // each frame.
    const shadowTint = new Color(0, 0, 0, .45);
    for (const obj of engineObjects)
    {
        if (obj.destroyed) continue;
        const isShadowed = obj === player ||
            obj instanceof Enemy ||
            obj instanceof Pickup ||
            obj instanceof Bomb ||
            obj instanceof Chest ||
            obj instanceof BackdropProp;
        if (!isShadowed) continue;
        if (!isOnScreen(obj.pos, obj.size.scale(1.6))) continue;
        // shadow center sits at the bottom of the sprite
        const pos = vec2(obj.pos.x, obj.pos.y - obj.size.y * .45);
        const size = vec2(obj.size.x * 1.2, obj.size.y * .5);
        drawTile(pos, size, sprites.shadow, shadowTint);
    }
}

class ChainLightningWeapon
{
    constructor()
    {
        this.level = 1;
        this.name = 'Chain Lightning';
        this.cooldown = 0;
    }
    levelUp() { this.level = min(this.level + 1, 5); }
    damage()  { return 3 + this.level; }

    update()
    {
        this.cooldown -= 1 / 60;
        if (this.cooldown > 0) return;
        const range = 8 * player.areaMult;
        const first = nearestEnemy(player.pos, range);
        if (!first) return;
        this.cooldown = max(.4, 2.0 - this.level * .2) / player.fireRateMult;

        const hops = min(this.level + 1, 8);   // soft cap for Limit-Break runs
        const chainRange = 5 * player.areaMult;
        const dmg = this.damage() * player.dmgMult;
        const hit = new Set();
        let from = player.pos;
        let current = first;
        for (let h = 0; h < hops && current; ++h)
        {
            current.takeDamage(dmg);
            hit.add(current);
            chainFlashes.push({a: from, b: current.pos.copy(), t: time + .15});
            from = current.pos;
            let best = null, bestD = chainRange;
            for (const e of enemies)
            {
                if (e.isBreakable) continue;   // chain shouldn't waste a hop on a crate
                if (hit.has(e)) continue;
                const d = from.distance(e.pos);
                if (d < bestD) { best = e; bestD = d; }
            }
            current = best;
        }
    }
}

function drawChainFlashes()
{
    for (let i = chainFlashes.length - 1; i >= 0; --i)
    {
        const f = chainFlashes[i];
        const remaining = f.t - time;
        if (remaining <= 0) { chainFlashes.splice(i, 1); continue; }
        const lifetime = f.lifetime || .15;
        const alpha = remaining / lifetime;
        const c = f.color || new Color(1, 1, .4, 1);
        drawLine(f.a, f.b, .15, new Color(c.r, c.g, c.b, alpha));
    }
}

// Emit an N-spoke chainFlash burst radiating from a point. Used standalone
// by chest fireworks and as the visual half of radialBlast.
function emitRadialFlashes(pos, radius, rayCount = 12, rayColor, rayDuration = .25)
{
    for (let i = 0; i < rayCount; ++i)
    {
        const a = i * 2 * PI / rayCount;
        const tip = pos.add(vec2().setAngle(a, radius));
        const flash = {a: pos.copy(), b: tip, t: time + rayDuration};
        if (rayColor) flash.color = rayColor;
        chainFlashes.push(flash);
    }
}

// Pre-baked starburst explosion polygons. Each entry caches its own random
// point list + rotation so re-rendering the same explosion across frames is
// stable (just fades out + expands slightly). Drawn by drawExplosions().
const explosions = [];

// Queue an animated star-burst explosion at `pos`. Two concentric jagged
// polygons (5–7 points each, per-vertex radius jitter, random rotation):
// a larger orange shell with a white outline, then a smaller redder core
// painted on top. Fades + expands over ~.35 s.
function pushExplosion(pos, radius)
{
    const pointCount = randInt(5, 8);             // 5, 6, or 7 points
    const outerPts = [];
    const innerPts = [];
    for (let i = 0; i < pointCount; ++i)
    {
        // Even base angle + a small jitter so points aren't perfectly spaced.
        const a = i * 2 * PI / pointCount + rand(-.18, .18);
        outerPts.push(vec2().setAngle(a, radius * rand(.82, 1.18)));
        innerPts.push(vec2().setAngle(a, radius * .55 * rand(.8, 1.2)));
    }
    explosions.push({
        pos: pos.copy(),
        outerPts, innerPts,
        outerAngle: rand(2 * PI),
        innerAngle: rand(2 * PI),
        t: time + .35,
        duration: .35,
    });
}

function drawExplosions()
{
    for (let i = explosions.length - 1; i >= 0; --i)
    {
        const e = explosions[i];
        const remaining = e.t - time;
        if (remaining <= 0) { explosions.splice(i, 1); continue; }
        const f = remaining / e.duration;        // 1 → 0 as it ages
        const scale = 1 + (1 - f) * .18;         // small expansion as it fades
        const a = f;
        // Outer shell — orange w/ white outline. Draw first so the core
        // lands on top.
        const outer = e.outerPts.map(p => p.scale(scale));
        drawPoly(outer,
            new Color(1,  .55, .15, a * .85),    // orange fill, alpha eased
            .14,                                 // line width
            new Color(1,  1,   .92, a),          // creamy-white outline
            e.pos, e.outerAngle);
        // Inner core — redder, no outline, slightly brighter alpha so it
        // punches against the orange shell.
        const inner = e.innerPts.map(p => p.scale(scale));
        drawPoly(inner,
            new Color(1,  .22, .12, a),
            0, BLACK,
            e.pos, e.innerAngle);
    }
}

// Damage every enemy in `radius` and emit a radial chainFlash burst plus
// a starburst explosion polygon. Bomb / NukeBomb / Comet all want this
// same shape; the only differences are spoke count, colour, and ray
// lifetime — pass them in.
function radialBlast(pos, radius, damage, rayCount = 12, rayColor, rayDuration = .25)
{
    for (const e of enemies)
        if (e.pos.distance(pos) < radius)
            e.takeDamage(damage);
    emitRadialFlashes(pos, radius, rayCount, rayColor, rayDuration);
    pushExplosion(pos, radius);
}
class FireballWeapon
{

                       this.damage() * player.dmgMult,
                       1.2, sprites.fireball);
        // Lv1 = .7s between shots, Lv5 = .14s. Faster than VS's whip but

}

class PizzaTossWeapon
{
    constructor()
    {
        this.level = 1;
        this.name = 'Pizza Toss';
        this.cooldown = 0;
        this.facing = vec2(1, 0);
    }
    levelUp() { this.level = min(this.level + 1, 5); }
    damage()  { return 4 + this.level * 2; }

    update()
    {
        // Aim: prefer the player's last movement direction. If standing still,
        // aim at the nearest enemy so a stationary player still throws toward
        // a threat instead of firing off-screen.
        if (player.velocity.length() > .005)
        {
            this.facing = player.velocity.normalize();
        }
        else
        {
            const target = nearestEnemy(player.pos, 25);
            if (target)
                this.facing = target.pos.subtract(player.pos).normalize();
            // else keep last facing
        }

        this.cooldown -= 1 / 60;
        if (this.cooldown > 0) return;
        this.cooldown = 1.1 / player.fireRateMult;

        // fan-shot — one slice at level 1, three at level 3, five at level 5
        const slices = 1 + (this.level - 1) + player.extraProjectiles;
        const spread = slices === 1 ? 0 : .35;
        const baseAng = this.facing.angle();
        const dmg = this.damage() * player.dmgMult;
        const speed = 11 * player.projSpeedMult;
        for (let i = 0; i < slices; ++i)
        {
            const t = slices === 1 ? .5 : i / (slices - 1);
            const ang = baseAng + lerp(-spread, spread, t);
            const dir = vec2().setAngle(ang, 1);
            const proj = new Projectile(player.pos.copy(), dir, speed,
                dmg, 1.6, sprites.pizza, true);
            proj.angleVelocity = pizzaSpinRate;
        }
    }
}

class IceCubeWeapon
{
    constructor() { this.level = 1; this.name = 'Ice Cube'; this.cooldown = 0; }
    levelUp() { this.level = min(this.level + 1, 5); }

    update()
    {
        this.cooldown -= 1 / 60;
        if (this.cooldown > 0) return;
        this.cooldown = 1.5 / player.fireRateMult;

        // fire `level` ice cubes at random enemies within range; freezes on hit
        const range = 11 * player.areaMult;
        const candidates = enemies.filter(e => !e.isBreakable && e.pos.distance(player.pos) < range);
        const dmg = this.damage() * player.dmgMult;
        const speed = 14 * player.projSpeedMult;
        for (let i = 0; i < this.level && candidates.length > 0; ++i)
        {
            const idx = randInt(candidates.length);
            const target = candidates[idx];
            candidates.splice(idx, 1);
            const dir = target.pos.subtract(player.pos);
            new Projectile(player.pos.copy(), dir, speed, dmg, 1.0,
                sprites.ice, false, e => { e.frozenTimer = 1.5; });
        }
    }
}

// Dagger Slash — the only directional short-range melee in the roster, in
// the spirit of VS's first-character whip. Throws a slow, spinning, piercing
// dagger horizontally in the direction the player last moved on the X axis
// (vertical-only input keeps the previous facing). Just a Projectile with a
// short lifetime + slow speed + heavy spin — no custom hitbox needed.
// Replaces Water Splash, which was mechanically redundant with Ice Cube.
class DaggerSlashWeapon
{
    constructor()
    {
        this.level = 1;
        this.name = 'Dagger Slash';
        this.cooldown = 0;
        this.facing = 1;       // initial run state per spec — right
    }
    levelUp() { this.level = min(this.level + 1, 5); }
    damage()  { return 5 + this.level * 2; }
    // ~4–5× the dagger's own size (which matches the player). Grows modestly
    // with level so higher-level Smiley reaches a bit farther forward.
    range()   { return 8.0 + (this.level - 1) * .25; }   // 5.0 → 6.0 wu

    update()
    {
        // Track horizontal facing — read player velocity since keyDirection /
        // gamepadStick / touchDirection all feed into it. Vertical-only input
        // leaves facing unchanged.
        if      (player.velocity.x >  .005) this.facing =  1;
        else if (player.velocity.x < -.005) this.facing = -1;

        this.cooldown -= 1 / 60;
        if (this.cooldown > 0) return;
        this.cooldown = .9 / player.fireRateMult;

        // Throw speed bumped 2× per playtest — was hard to see the spin and
        // felt too lazy at 6 wu/sec. Lifetime = range / speed gives an exact
        // stop-at-range without per-frame distance checks.
        const speed = 12 * player.projSpeedMult;       // wu/sec
        const range = this.range() * player.areaMult;
        const dmg   = this.damage() * player.dmgMult;
        const dir   = vec2(this.facing, 0);
        const proj  = new Projectile(player.pos.copy(), dir, speed, dmg,
            range / speed, sprites.dagger, true);
        // Size the dagger to roughly match the player so it reads as a
        // weapon-in-hand silhouette rather than a tiny shuriken. Projectile
        // collision uses this.size for AABB checks, so a larger size also
        // gives the slash a more forgiving hitbox.
        proj.size = vec2(1.2);
        // Mirror the sprite for left-facing throws so the dagger's blade
        // visually points the way it's flying instead of always up-right.
        proj.mirror = this.facing < 0;
        // angleVelocity is PER-FRAME in LittleJS (engine line
        // `angle += angleVelocity *= angleDamping`), so 2 turns/sec at 60fps
        // is 4π / 60 rad/frame ≈ .209. Sign mirrors the throw direction so
        // right-throws spin clockwise, left-throws counter-clockwise.
        proj.angleVelocity = this.facing * 4 * PI / 60;
        // Inherit the player's current velocity so a dagger thrown while
        // running gets carried along — adds momentum to the throw and
        // makes the motion feel like it's actually leaving your hand.
        proj.velocity = proj.velocity.add(player.velocity);
    }
}

class SpicyPizzaWeapon
{
    constructor()
    {
        this.level = 5; this.evolved = true; this.name = 'Spicy Pizza';
        this.cooldown = 0; this.facing = vec2(1, 0);
    }
    levelUp() {}   // already maxed
    damage() { return 14 * (this.lbBonus || 1); }

    update()
    {
        if (player.velocity.length() > .005)
            this.facing = player.velocity.normalize();
        this.cooldown -= 1 / 60;
        if (this.cooldown > 0) return;
        this.cooldown = .9 / player.fireRateMult;

        // wider, denser fan that burns on hit
        const slices = 7 + player.extraProjectiles, spread = .55;
        const baseAng = this.facing.angle();
        const dmg = this.damage() * player.dmgMult;
        const speed = 13 * player.projSpeedMult;
        for (let i = 0; i < slices; ++i)
        {
            const t = i / (slices - 1);
            const ang = baseAng + lerp(-spread, spread, t);
            const dir = vec2().setAngle(ang, 1);
            const proj = new Projectile(player.pos.copy(), dir, speed, dmg,
                1.8, sprites.pizza, true,
                e => {
                    e.burnTimer = 1.5;
                    if (6 > e.burnDps) e.burnDps = 6;
                });
            proj.angleVelocity = pizzaSpinRate * 1.4;
        }
    }
}

class FishStormWeapon
{
    constructor()
    {
        this.level = 5; this.evolved = true; this.name = 'Fish Storm';
        this.angle = 0; this.hitMap = new Map();
    }
    levelUp() {}
    damage() { return 8 * (this.lbBonus || 1); }

    update()
    {
        this.angle += 6 * player.fireRateMult / 60;
        const radius = 4 * player.areaMult;
        const orbSize = 1.1 * player.areaMult;
        const dmg = this.damage() * player.dmgMult;
        const now = time;
        for (const [e, t] of this.hitMap)
            if (!e.parent && (e.destroyed || t < now - 5)) this.hitMap.delete(e);

        const orbits = 7;
        for (let i = 0; i < orbits; ++i)
        {
            const a = this.angle + i * 2 * PI / orbits;
            const pos = player.pos.add(vec2().setAngle(a, radius));
            for (const e of enemies)
            {
                if (!isOverlapping(pos, vec2(orbSize), e.pos, e.size)) continue;
                const next = this.hitMap.get(e) || 0;
                if (now < next) continue;
                e.takeDamage(dmg);
                this.hitMap.set(e, now + .35);
            }
        }
    }

    draw()
    {
        const radius = 4 * player.areaMult;
        const orbSize = 1.1 * player.areaMult;
        const orbits = 7;
        for (let i = 0; i < orbits; ++i)
        {
            const a = this.angle + i * 2 * PI / orbits;
            const pos = player.pos.add(vec2().setAngle(a, radius));
            drawTile(pos, vec2(orbSize), sprites.shark, WHITE, a + 2*time);
        }
    }
}

    {

        this.cooldown = .5 / player.fireRateMult;

        // strike up to 5 random enemies in a wide radius — no chain, all
        // simultaneous, like the screen got hit by a sudden storm
        const range = 14 * player.areaMult;
        const candidates = enemies.filter(e => !e.isBreakable && e.pos.distance(player.pos) < range);

        for (let i = 0; i < strikes; ++i)
        {
            const idx = randInt(candidates.length);
            const target = candidates[idx];
            candidates.splice(idx, 1);
            target.takeDamage(dmg);
            chainFlashes.push({a: player.pos.copy(), b: target.pos.copy(),
                               t: time + .2});
        }
    }
}

            const dmg = this.damage() * player.dmgMult;

        const ringSize = .6 * player.areaMult;

// Comet — homing meteor with AOE on impact. Re-acquires target if its
// original prey dies before contact so it never wastes a shot.
class CometProjectile extends EngineObject
{
    constructor(pos, target, damage)
    {
        super(pos, vec2(.8), sprites.comet);
        this.target = target;
        this.damage = damage;
        this.life = 2.5;
        setupKinematicProp(this);
        this.angleVelocity = 4;
        this.speedPerFrame = 18 * player.projSpeedMult / 60;
    }

    update()
    {
        super.update();
        this.renderOrder = -this.pos.y;
        this.life -= 1 / 60;
        if (this.life <= 0) { this.destroy(); return; }

        if (!this.target || this.target.destroyed)
            this.target = nearestEnemy(this.pos, 25);
        if (!this.target) return;

        const toTarget = this.target.pos.subtract(this.pos);
        if (toTarget.length() < 1.0)
        {
            const aoeR = 2.5 * player.areaMult;
            radialBlast(this.pos, aoeR, this.damage,
                        8, new Color(1, .55, .2, 1));
            this.destroy();
            return;
        }
        this.velocity = toTarget.normalize(this.speedPerFrame);
    }

    render() { if (isOnScreen(this.pos, this.size.scale(2))) super.render(); }
}

class CometWeapon
{
    constructor()
    {
        this.level = 5; this.evolved = true; this.name = 'Comet';
        this.cooldown = 0;
    }
    levelUp() {}
    damage() { return 12 * (this.lbBonus || 1); }

    update()
    {
        this.cooldown -= 1 / 60;
        if (this.cooldown > 0) return;
        this.cooldown = .6 / player.fireRateMult;

        // 3 nearest enemies — pick distinct targets so the volley spreads
        const range = 20 * player.areaMult;
        const used = new Set();
        const targets = [];
        for (let i = 0; i < 3; ++i)
        {
            let best = null, bestD = range;
            for (const e of enemies)
            {
                if (e.isBreakable) continue;
                if (used.has(e)) continue;
                const d = player.pos.distance(e.pos);
                if (d < bestD) { best = e; bestD = d; }
            }
            if (!best) break;
            used.add(best);
            targets.push(best);
        }
        if (targets.length === 0) return;
        const dmg = this.damage() * player.dmgMult;
        for (const t of targets)
            new CometProjectile(player.pos.copy(), t, dmg);
    }
}

// Nuke — bigger Bomb that drops a lingering damage field after blast.
// NukeField is a ground decal that ticks 4x/sec for 2s within its radius.
class NukeField extends EngineObject
{
    constructor(pos, damagePerTick, radius)
    {
        super(pos, vec2(radius * 2), sprites.circle);
        this.damagePerTick = damagePerTick;
        this.fieldRadius = radius;
        this.life = 2.0;
        this.lifeMax = 2.0;
        this.tickTimer = 0;
        setupKinematicProp(this);
        this.velocity = vec2();
    }

    update()
    {
        super.update();
        // sit below entities so it reads as a ground hazard
        this.renderOrder = -this.pos.y - 500;
        this.life -= 1 / 60;
        if (this.life <= 0) { this.destroy(); return; }
        this.tickTimer -= 1 / 60;
        if (this.tickTimer <= 0)
        {
            this.tickTimer = .25;
            for (const e of enemies)
                if (e.pos.distance(this.pos) < this.fieldRadius)
                    e.takeDamage(this.damagePerTick);
        }
    }

    render()
    {
        if (!isOnScreen(this.pos, this.size)) return;
        const t = this.life / this.lifeMax;
        const pulse = .5 + .5 * sin(time * 6);
        const alpha = t * (.35 + .25 * pulse);
        drawTile(this.pos, this.size, sprites.circle,
                 new Color(.55, .95, .25, alpha));
    }
}

// Axe — Dagger Slash's evolution. Heavy spinning throw in the player's
// last 2D movement direction (omnidirectional, no auto-aim). Larger and
// harder-hitting than the dagger, same horizontal-mirror logic so the axe
// blade reads as flying left or right correctly; on purely-vertical throws
// the Y-axis sign decides the mirror.
class AxeWeapon
{
    constructor()
    {
        this.level = 5; this.evolved = true; this.name = 'Axe';
        this.cooldown = 0;
        this.facing = vec2(1, 0);   // last 2D facing — initialise right
    }
    levelUp() {}
    damage() { return 14 * (this.lbBonus || 1); }

    update()
    {
        // Track 2D facing — whenever the player is moving, that's the
        // direction the next axe is going. No auto-aim, no fallback to
        // nearest enemy — the player is in control of where it flies.
        if (player.velocity.length() > .005)
            this.facing = player.velocity.normalize();

        this.cooldown -= 1 / 60;
        if (this.cooldown > 0) return;
        this.cooldown = 1.4 / player.fireRateMult;

        const speed = 10 * player.projSpeedMult;
        const range = 8   * player.areaMult;
        const dmg   = this.damage() * player.dmgMult;
        const proj  = new Projectile(player.pos.copy(), this.facing, speed, dmg,
            range / speed, sprites.axe, true,
            e => { e.slowTimer = 2.5; });
        proj.size  = vec2(1.8 * player.areaMult);   // 1.5× the dagger — bigger but not unwieldy
        // Mirror by horizontal direction first (matches the dagger). When
        // the throw is purely vertical (x == 0) the y axis decides instead
        // so straight-up and straight-down throws still get a consistent
        // sign. Default: no mirror (right-facing).
        const sign = this.facing.x !== 0 ? this.facing.x : this.facing.y;
        proj.mirror = sign < 0;
        // Spin like the dagger — sign mirrors the throw direction so a
        // right/up throw spins clockwise and a left/down throw counter-
        // clockwise. angleVelocity is PER-FRAME, so 2 turns/sec = 4π / 60.
        proj.angleVelocity = (sign >= 0 ? 1 : -1) * 4 * PI / 60;
        // Inherit the player's velocity — same momentum carry as the
        // dagger. Lets you fling an axe forward extra hard by sprinting
        // into the throw.
        proj.velocity = proj.velocity.add(player.velocity);
    }
}

    HeartDrain:     {passive: 'Snack',     name: 'Heart Spiral', emoji: '💖',
                     ctor: () => new HeartSpiralWeapon()},
    StarToss:       {passive: 'Plus One',  name: 'Star Storm',   emoji: '🌟',

    Fireball:       {passive: 'Sneaker',   name: 'Comet',        emoji: '☄️',
