<!DOCTYPE html><head>
<title>Emoji Survivors</title>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
</head><body style="background:#000">
<script src="../dist/littlejs.js?1779932166044"></script>
<script src="../templates/menus.js?1779932166044"></script>
<script src="../templates/gameFx.js?1779932166044"></script>
<script src="../templates/textureGenerator.js?1779932166044"></script>
<script src="../templates/tweakables.js?1779932166044"></script>
<script>
'use strict';

// engine settings, do not remove
debugWatermark = false;
showEngineVersion = false;
paused = false;
tilesPixelated = false;

// engine settings
gravity = vec2(0, 0);
cameraPos = vec2(0, 0);
cameraScale = 40;
canvasMaxSize = vec2(2048, 2048);

// Touch input — we use a Frogger-style "tap a screen quadrant to move
// that direction" scheme instead of the built-in analog touch gamepad.
// Disabled here; see touchDirection() below.
touchGamepadEnable = false;

///////////////////////////////////////////////////////////////////////////////
// EMOJI SURVIVORS
//
// Vampire Survivors-style auto-battler with emoji sprites.
// See docs/superpowers/specs/2026-05-26-emoji-survivors-design.md

// Arena ~3× the original footprint so the camera-follows-player feel
// is real exploration, not just a slightly bigger room. Spawn (within
// ~20 wu of player) and despawn (past ~50 wu) are already player-
// relative so they don't need any change.
const ARENA_MIN_X = -150, ARENA_MAX_X = 150;
const ARENA_MIN_Y = -100, ARENA_MAX_Y = 100;

const sprites = {};

// Returns a draw function compatible with drawToTexture(). Renders one
// emoji glyph centered in the 250px drawable cell. sizeMul leaves a few
// px of breathing room so the glyph never clips the cell edge. The
// vertical fudge compensates for emoji glyphs sitting slightly above
// the math-center of their em box.
function paintEmoji(emoji, sizeMul = .85)
{
    return ctx =>
    {
        ctx.font = `${240 * sizeMul}px serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(emoji, 125, 135);
    };
}

// Universal emoji draw helper — all entity rendering goes through here.
// tint multiplies (won't lighten the emoji's black outline);
// additive adds (glows through the outline). Pair them for status effects:
//   red tint + red additive  = burning
//   blue tint                = frozen / slowed
//   green tint               = poisoned
//   gold additive            = elite
//   white additive flash     = hit feedback
function drawEmoji(pos, size, sprite, tint, additive, angle = 0)
{
    drawTile(pos, size, sprite, tint || WHITE, angle, false, additive);
}

let player;

class Player extends EngineObject
{
    constructor()
    {
        super(vec2(0, 0), vec2(1.2),
              sprites[(currentHero && currentHero.spriteKey) || 'heroWizard']);
        this.maxHp = playerMaxHp;
        this.hp = this.maxHp;
        this.speed = playerSpeed;
        // Disable engine-driven physics — we want exact velocity control.
        this.damping = 1;
        this.friction = 1;
        this.gravityScale = 0;
        this.angle = 0;  // emoji is upright; don't let it spin
        this.setCollision(false, false, false, false);  // no built-in collisions
        this.hurtTimer = 0;
        this.xp = 0;
        this.level = 1;
        this.pendingLevelUps = 0;
        this.passives = [];
        // mystery-pickup temp buff timers
        this.damageBoostTimer = 0;
        this.invulnTimer = 0;
        // multipliers populated by recomputeMultipliers() — passives mutate these
        this.dmgMult        = 1;
        this.fireRateMult   = 1;
        this.areaMult       = 1;
        this.projSpeedMult  = 1;
        this.magnetMult     = 1;
        this.maxHpMult      = 1;
        this.moveSpeedMult  = 1;
        this.xpGainMult     = 1;
        this.extraProjectiles = 0;
        this.heartMult        = 1;
        this.coinGainMult     = 1;
        // Run-scoped set of choice keys the player has banished. Filtered
        // out of buildUpgradeChoices so banished options never reappear.
        this.banishedUpgrades = new Set();
    }

    update()
    {
        this.speed = playerSpeed * this.moveSpeedMult;
        this.maxHp = playerMaxHp * this.maxHpMult;
        // tick down mystery-pickup buff timers
        if (this.damageBoostTimer > 0)
        {
            this.damageBoostTimer -= 1 / 60;
            if (this.damageBoostTimer <= 0) recomputeMultipliers();
        }
        if (this.invulnTimer > 0) this.invulnTimer -= 1 / 60;
        if (timeSlowTimer > 0) timeSlowTimer -= 1 / 60;
        const dir = playerAI
            ? aiDirection()
            : keyDirection().add(gamepadStick(0)).add(touchDirection());
        const move = dir.length() > 1 ? dir.normalize() : dir;
        this.velocity = move.scale(this.speed / 60);  // velocity is per-frame

        super.update();

        // arena clamp
        this.pos.x = clamp(this.pos.x, ARENA_MIN_X + .6, ARENA_MAX_X - .6);
        this.pos.y = clamp(this.pos.y, ARENA_MIN_Y + .6, ARENA_MAX_Y - .6);

        this.renderOrder = -this.pos.y;

        if (playerAI && this.hp < 1) this.hp = 1;

        if (this.hp <= 0 && !gameOver)
        {
            gameOver = true;
            showGameOverMenu();
        }
    }

    render()
    {
        // Soft pulsing halo so the player is always findable in a busy
        // swarm. Drawn first so the player emoji renders on top of it.
        const pulse = .5 + .5 * sin(time * 2.5);
        const haloSize = this.size.x * (1.7 + pulse * .25);
        drawTile(this.pos, vec2(haloSize), sprites.shadow,
                 new Color(.55, .9, 1, .18 + pulse * .1));

        let tint = WHITE, additive = null;
        if (this.hurtTimer > 0)
        {
            this.hurtTimer -= 1 / 60;
            tint = new Color(1, .55, .55);
            // pulse the additive on/off every .1s so the player visibly strobes when hit
            if (this.hurtTimer % .1 < .05)
                additive = new Color(.5, 0, 0, 0);
        }
        drawEmoji(this.pos, this.size, this.tileInfo, tint, additive);
    }
}

const ENEMY_TYPES = [
    {key:'ant',     sprite:'ant',     hp: 1,  dmg: 3,  speed: 1.0, xpDrop: 1, size: .55},
    {key:'zombie',  sprite:'zombie',  hp: 3,  dmg: 10, speed: 1.5, xpDrop: 1, size: 1.0},
    {key:'bat',     sprite:'bat',     hp: 1,  dmg: 5,  speed: 4.0, xpDrop: 1, size: .85},
    {key:'snail',   sprite:'snail',   hp: 25, dmg: 5,  speed: .7,  xpDrop: 5, size: 1.2},
    {key:'skull',   sprite:'skull',   hp: 8,  dmg: 15, speed: 1.2, xpDrop: 3, size: 1.0},
    {key:'clown',   sprite:'clown',   hp: 5,  dmg: 8,  speed: 1.8, xpDrop: 2, size: 1.0,
                                      splitInto: 'ant', splitCount: 3},
    {key:'duck',    sprite:'duck',    hp: 2,  dmg: 6,  speed: 2.2, xpDrop: 1, size: .85},
    {key:'ghost',   sprite:'ghost',   hp: 3,  dmg: 8,  speed: 1.6, xpDrop: 1, size: .9},
    {key:'fireImp', sprite:'fireImp', hp: 4,  dmg: 8,  speed: 1.6, xpDrop: 2, size: .85},
    {key:'iceImp',  sprite:'iceImp',  hp: 4,  dmg: 8,  speed: 1.2, xpDrop: 2, size: .85},
];

// Elite variants — color-coded by additive glow + stat multipliers.
// Spawn chance ramps from 0 → ~5% over the first 3 minutes (after a 30s
// grace period) so early game stays clean.
const ELITE_TYPES = {
    red:    {hpMult: 1.5, speedMult: 1.5, dmgMult: 1.2, xpMult: 3,
             sizeMult: 1.15, additive: new Color(.6,  .05, .05, 0)},
    gold:   {hpMult: 3.0, speedMult: 1.0, dmgMult: 1.0, xpMult: 5,
             sizeMult: 1.2,  additive: new Color(.55, .42,  0,  0)},
    purple: {hpMult: 2.0, speedMult: 1.0, dmgMult: 1.8, xpMult: 4,
             sizeMult: 1.2,  additive: new Color(.4,   0,  .55, 0)},
};
const ELITE_KEYS = Object.keys(ELITE_TYPES);

// Boss schedule — each boss spawns once when elapsedTime crosses .time.
// Each carries an Enemy-compatible synth so Enemy class handles AI/contact.
const BOSS_SCHEDULE = [
    {time: 180, key: 'giantBat',   sprite: 'bat',    name: 'Giant Bat',
        hp: 300, dmg: 20, speed: 2.0, size: 3.5, xpDrop: 0},
    {time: 300, key: 'bigZombie',  sprite: 'zombie', name: 'Big Zombie',
        hp: 700, dmg: 30, speed: 1.0, size: 4.0, xpDrop: 0},
    {time: 480, key: 'clownKing',  sprite: 'clown',  name: 'Clown King',
        hp: 900, dmg: 25, speed: 1.5, size: 3.5, xpDrop: 0,
        splitInto: 'clown', splitCount: 4},
    {time: 600, key: 'evilWizard', sprite: 'evilWizard', name: 'Evil Wizard',
        hp: 600, dmg: 18, speed: 1.2, size: 3.0, xpDrop: 0,
        shootEvery: 2.0, shootSprite: 'bolt'},
    {time: 750, key: 'megaSnake',  sprite: 'megaSnake', name: 'Mega Snake',
        hp: 1200, dmg: 25, speed: 1.4, size: 4.0, xpDrop: 0},
];

const bossesSpawned = new Set();
let activeBoss = null;

// Run duration — Reaper ☠️ spawns when the timer hits this. Tweakable so a
// playtester can shorten it for fast iteration.
let runDuration = 900;          // 15 minutes per design doc §17
let reaperSpawned = false;
let runVictory   = false;

const REAPER_DEF = {
    key: 'reaper', sprite: 'reaper', name: '☠️ THE REAPER',
    hp: 2500, dmg: 40, speed: 6.0, size: 3.2, xpDrop: 0,
    isReaper: true,
};

class Chest extends EngineObject
{
    constructor(pos)
    {
        super(pos, vec2(1.4), sprites.chest);
        this.damping = 1;
        this.friction = 1;
        this.gravityScale = 0;
        this.angle = 0;
        this.setCollision(false, false, false, false);
        this.velocity = vec2();
        this.spawnTime = time;
    }

    update()
    {
        super.update();
        this.renderOrder = -this.pos.y + 100;   // float above ground entities
        // bobbing wiggle so the chest catches the eye in a busy screen
        const age = time - this.spawnTime;
        this.angle = Math.sin(age * 4) * .12;
        if (player.pos.distance(this.pos) < 1.2)
        {
            this.open();
            this.destroy();
        }
    }

    open()
    {
        // evolution check first — if any owned weapon meets its recipe,
        // evolve it (this is the only way to get evolved weapons)
        const evolution = findAvailableEvolution();
        if (evolution)
        {
            const idx = player.weapons.indexOf(evolution.weapon);
            const oldName = evolution.weapon.name;
            player.weapons[idx] = evolution.evo.ctor();
            if (typeof showMenuToast === 'function')
            {
                showMenuToast({icon: evolution.evo.emoji, title: 'EVOLVED!',
                    text: oldName + ' → ' + evolution.evo.name,
                    duration: 4, position: 'bottom-right'});
            }
        }
        else
        {
            // fallback — grant 3 random upgrades like a triple level-up
            let applied = 0;
            for (let i = 0; i < 3; ++i)
            {
                const choices = buildUpgradeChoices();
                if (!choices.length) break;
                choices[randInt(choices.length)].apply();
                ++applied;
            }
            if (applied === 0)
            {
                // fully maxed build — fall through to the consolation prize
                grantMaxBuildReward();
            }
            else if (typeof showMenuToast === 'function')
            {
                showMenuToast({icon: '🎁', title: 'Chest!',
                               text: '+' + applied + ' upgrade' +
                                     (applied === 1 ? '' : 's'),
                               duration: 2.5, position: 'bottom-right'});
            }
        }
        // fireworks burst — radial chainFlashes for the reward moment
        for (let i = 0; i < 16; ++i)
        {
            const a = i * 2 * PI / 16;
            const tip = this.pos.add(vec2().setAngle(a, 3));
            chainFlashes.push({a: this.pos.copy(), b: tip, t: time + .5});
        }
        if (sounds.chest && sounds.chest.play) sounds.chest.play(this.pos);
    }

    render()
    {
        const age = time - this.spawnTime;
        // pulsing gold additive so the chest screams "come collect me"
        const pulse = .5 + .5 * Math.sin(age * 6);
        drawEmoji(this.pos, this.size, sprites.chest, WHITE,
                  new Color(.4 * pulse, .3 * pulse, 0, 0), this.angle);
    }
}

const enemies = [];

class Enemy extends EngineObject
{
    constructor(pos, type, eliteKey = null, bossDef = null)
    {
        const elite = eliteKey ? ELITE_TYPES[eliteKey] : null;
        const baseSz = type.size != null ? type.size : 1.0;
        const sz = baseSz * (elite ? elite.sizeMult : 1);
        super(pos, vec2(sz), sprites[type.sprite]);
        // Curse Mode multiplies enemy HP and speed; XP/coin gain on the
        // player side already compensates via recomputeMultipliers.
        const curseFactor = 1 + curseLevel * .5;
        this.type     = type;
        this.hp       = type.hp * (elite ? elite.hpMult : 1) * curseFactor;
        this.maxHp    = this.hp;
        this.dmg      = type.dmg * (elite ? elite.dmgMult : 1);
        this.speed    = type.speed * (elite ? elite.speedMult : 1) * curseFactor;
        this.xpDrop   = type.xpDrop * (elite ? elite.xpMult : 1);
        this.isElite  = !!elite;
        this.eliteKey = eliteKey;
        this.eliteAdditive = elite ? elite.additive : null;
        this.isBoss   = !!bossDef;
        this.bossDef  = bossDef;
        // bosses always glow gold so they read against a swarm of regulars
        if (this.isBoss && !this.eliteAdditive)
            this.eliteAdditive = new Color(.55, .42, 0, 0);
        this.damping = 1;
        this.friction = 1;
        this.gravityScale = 0;
        this.angle = 0;
        this.setCollision(false, false, false, false);
        enemies.push(this);
        this.hitCooldown = 0;
        this.hitFlashTimer = 0;
        this.frozenTimer = 0;
        this.burnTimer = 0;
        this.burnDps   = 0;
        this.slowTimer = 0;
        this.tint = null;
        this.additive = null;
        // per-instance phase so a wave of enemies doesn't sync up
        this.bobPhase = rand(2 * PI);
        // integrated rotation for entities that roll (skull) — advances with
        // velocity.x so a ball moving right rolls clockwise, left rolls CCW.
        this.rollAngle = 0;
        this.shootTimer = 0;
    }

    render()
    {
        let tint = this.tint || WHITE;
        let additive = this.additive;
        // elite glow acts as the base layer; status effects (burn etc.)
        // override it because the status is more gameplay-relevant
        if (!additive && this.eliteAdditive) additive = this.eliteAdditive;
        if (this.hitFlashTimer > 0)
        {
            this.hitFlashTimer -= 1 / 60;
            // white additive briefly punches through the outline so a hit
            // is visible even on a 50-pixel sprite in a swarm of hundreds
            additive = new Color(.8, .8, .8, 0);
        }

        // per-type wobble so the swarm reads as alive. Frozen enemies skip
        // it so a frozen pose is visibly static.
        let renderPos = this.pos;
        let renderAngle = 0;
        let renderSize = this.size;
        if (this.frozenTimer <= 0)
        {
            const k = this.type.key;
            const ph = this.bobPhase;
            if (k === 'zombie') renderAngle = sin(time * 5  + ph) * .14;
            else if (k === 'bat')       renderPos = this.pos.add(vec2(0, sin(time * 7 + ph) * .18));
            else if (k === 'ant')       renderAngle = sin(time * 12 + ph) * .12;
            else if (k === 'snail')     renderAngle = sin(time * 2  + ph) * .05;
            else if (k === 'skull')     renderAngle = this.rollAngle;
            else if (k === 'clown')     renderAngle = sin(time * 8  + ph) * .18;
            else if (k === 'reaper')    renderAngle = sin(time * 3  + ph) * .1;
            else if (k === 'duck')      renderAngle = sin(time * 6  + ph) * .15;
            else if (k === 'ghost')     renderPos = this.pos.add(vec2(0, sin(time * 2.5 + ph) * .12));
            else if (k === 'fireImp')   renderAngle = sin(time * 10 + ph) * .1;
            else if (k === 'iceImp')    renderAngle = sin(time * 3  + ph) * .08;
            else if (k === 'megaSnake')
            {
                const s = sin(time * 8 + ph) * .35;
                renderSize = vec2(this.size.x - s, this.size.y + s);
                renderPos = this.pos.add(vec2(0, s * .5));
            }
        }

        let finalTint = tint;
        if (this.type.key === 'ghost' && finalTint === WHITE)
            finalTint = new Color(1, 1, 1, .7);
        drawEmoji(renderPos, renderSize, this.tileInfo, finalTint, additive, renderAngle);
    }

    update()
    {
        // tick status effects — priority order: freeze > burn > slow > none.
        // tint/additive are reset each frame; hit flash in render() overrides.
        let moveScale = 1;
        this.tint = null;
        this.additive = null;

        if (this.frozenTimer > 0)
        {
            this.frozenTimer -= 1 / 60;
            moveScale = 0;
            this.tint = new Color(.45, .75, 1);
        }
        else if (timeSlowTimer > 0)
        {
            // Mystery-pickup global time slow — applied to every enemy at
            // once. Visualized with a pale blue tint to make the effect
            // obvious without overriding more-specific status effects.
            moveScale = .3;
            this.tint = new Color(.7, .85, 1);
        }
        else if (this.burnTimer > 0)
        {
            this.burnTimer -= 1 / 60;
            // DOT applied directly (not through takeDamage) so we don't
            // spam the white hit-flash 60 times per second while burning
            this.hp -= this.burnDps / 60;
            if (this.hp <= 0) { this.destroy(); return; }
            this.tint = new Color(1, .55, .35);
            const flicker = Math.sin(time * 28) * .5 + .5;
            this.additive = new Color(.45 * flicker, .15 * flicker, 0, 0);
        }
        else if (this.slowTimer > 0)
        {
            this.slowTimer -= 1 / 60;
            moveScale = .35;
            this.tint = new Color(.7, .85, 1);
        }

        // walk toward the player — clamped so we don't tunnel through.
        // Fast enemies like 🦇 were stepping past player.pos in a single
        // frame, which read as a glitchy snap. Now we stop within touch
        // range and let contact damage + knockback handle the bump.
        // AI test mode lets enemies pass through the player so the AI
        // never gets pinned by a ring of clumping mobs.
        const toPlayer = player.pos.subtract(this.pos);
        const dist = toPlayer.length();
        if (dist > .01)
        {
            const targetStep = this.speed * moveScale / 60;
            const contactDist = playerAI ? 0 : (this.size.x + player.size.x) * .4;
            const usableDist = max(0, dist - contactDist);
            const stepLen = min(targetStep, usableDist);
            let dir = toPlayer.normalize();
            if (this.type.key === 'duck')
            {
                const perp = vec2(-dir.y, dir.x);
                const wobble = sin(time * 4 + this.bobPhase) * .8;
                dir = dir.add(perp.scale(wobble));
                if (dir.length() > .01) dir = dir.normalize();
            }
            this.velocity = stepLen > 0 ? dir.scale(stepLen) : vec2();
        }

        // Boss ranged attack — fires an EnemyProjectile every `shootEvery` seconds.
        if (this.bossDef && this.bossDef.shootEvery)
        {
            this.shootTimer -= 1 / 60;
            if (this.shootTimer <= 0)
            {
                this.shootTimer = this.bossDef.shootEvery;
                const dir = player.pos.subtract(this.pos);
                if (dir.length() > .1)
                    new EnemyProjectile(this.pos.copy(), dir, 5, this.dmg, 4,
                                        sprites[this.bossDef.shootSprite]);
            }
        }

        super.update();

        this.renderOrder = -this.pos.y;

        // rolling integrator — advances with velocity.x so rolling enemies
        // (skulls) rotate clockwise when moving right, CCW when moving left.
        // Factor 2 ≈ "1 radian per .5 unit of horizontal travel" which reads
        // as a ball rolling at its physical circumference.
        this.rollAngle += this.velocity.x * 2;

        // tick contact cooldown
        if (this.hitCooldown > 0) this.hitCooldown -= 1 / 60;

        // contact damage to player — fully blocked while ✨ invuln is active
        // and in AI test mode (so the AI can wade through swarms unbothered)
        if (this.hitCooldown <= 0 &&
            player.invulnTimer <= 0 &&
            !playerAI &&
            isOverlapping(this.pos, this.size, player.pos, player.size))
        {
            player.hp -= this.dmg;
            player.hurtTimer = .25;
            this.hitCooldown = .4;
            // hurt sound plays from the enemy's position so the player hears
            // which direction they were hit from
            if (sounds.hurt && sounds.hurt.play) sounds.hurt.play(this.pos);
            // small knockback so we don't re-hit instantly
            const away = this.pos.subtract(player.pos).normalize(.5);
            this.pos = this.pos.add(away);
        }

        // despawn if dragged too far from the player or fully outside arena —
        // bosses are exempt (they persist until killed)
        if (!this.isBoss)
        {
            const farFromPlayer = player.pos.distance(this.pos) > 50;
            const outsideArena = this.pos.x < ARENA_MIN_X - 2 || this.pos.x > ARENA_MAX_X + 2 ||
                                 this.pos.y < ARENA_MIN_Y - 2 || this.pos.y > ARENA_MAX_Y + 2;
            if (farFromPlayer || outsideArena)
                this.destroy();
        }
    }

    destroy()
    {
        const i = enemies.indexOf(this);
        if (i >= 0) enemies.splice(i, 1);
        if (this.hp <= 0)  // only drop on death, not despawn
        {
            killCount++;
            // split into smaller enemies if the type or boss def defines a split
            const splitInto = this.type.splitInto ||
                              (this.bossDef && this.bossDef.splitInto);
            if (splitInto)
            {
                const child = ENEMY_TYPES.find(t => t.key === splitInto);
                if (child)
                {
                    const count = this.bossDef && this.bossDef.splitCount
                                ? this.bossDef.splitCount
                                : (this.type.splitCount || 3);
                    // bosses spread their spawn ring wider since they're big
                    const spread = this.isBoss ? this.size.x * .5 : .6;
                    for (let i = 0; i < count; ++i)
                    {
                        const offset = vec2().setAngle(rand(2 * PI), spread);
                        new Enemy(this.pos.add(offset), child);
                    }
                }
            }
            if (this.isBoss)
            {
                if (this.bossDef && this.bossDef.isReaper)
                {
                    // killing the Reaper wins the run
                    runVictory = true;
                    showVictoryMenu();
                }
                else
                {
                    // regular bosses drop a 🎁 chest instead of a gem/heart
                    new Chest(this.pos.copy());
                }
                // bosses always drop a chunky coin pile
                for (let i = 0; i < 5; ++i)
                {
                    const off = vec2().setAngle(rand(2 * PI), rand(.5, 1.5));
                    new Pickup(this.pos.add(off), sprites.coin, 'coin', 10);
                }
                if (activeBoss === this) activeBoss = null;
            }
            else
            {
                const roll = rand();
                if (roll < .005)
                    new Pickup(this.pos.copy(), sprites.clover, 'mystery', 0);
                else if (roll < .035)
                    new Pickup(this.pos.copy(), sprites.coin, 'coin', 1);
                else if (roll < .085)
                    new Pickup(this.pos.copy(), sprites.heart, 'heart', 20);
                else if (roll < .585)
                    dropGem(this.pos.copy(), this.xpDrop, this.isElite);
                // else: no drop (~41.5% of kills)
            }
        }
        else if (this.isBoss && activeBoss === this)
        {
            // covers the despawn-by-restart edge case
            activeBoss = null;
        }
        super.destroy();
    }

    takeDamage(amount)
    {
        this.hp -= amount;
        this.hitFlashTimer = .08;
        // throttle damage numbers — multiple weapons hitting the same enemy
        // every frame would otherwise flood the screen
        if (!this._lastDmgT || time - this._lastDmgT > .12)
        {
            spawnDamageNumber(this.pos, amount);
            this._lastDmgT = time;
        }
        if (this.hp <= 0) this.destroy();
    }
}

class Projectile extends EngineObject
{
    constructor(pos, dir, speed, damage, lifetime, sprite, piercing = false, onHit = null)
    {
        super(pos, vec2(.6), sprite);
        this.velocity = dir.normalize(speed / 60);
        this.damage   = damage;
        this.lifetime = lifetime;
        this.piercing = piercing;
        this.onHit    = onHit;
        this.hitSet   = new Set();
        this.damping = 1;
        this.friction = 1;
        this.gravityScale = 0;
        this.angle = 0;
        this.setCollision(false, false, false, false);
        // ring buffer of recent (pos, angle) for the motion trail
        this.trail = [];
        this.maxTrail = 5;
    }

    update()
    {
        // Snapshot previous frame's pose BEFORE super.update moves it,
        // so the oldest ghost sits where we used to be.
        this.trail.push({pos: this.pos.copy(), angle: this.angle});
        if (this.trail.length > this.maxTrail) this.trail.shift();

        super.update();

        this.renderOrder = -this.pos.y;

        this.lifetime -= 1 / 60;
        if (this.lifetime <= 0) { this.destroy(); return; }

        for (const e of enemies)
        {
            if (this.hitSet.has(e)) continue;
            if (isOverlapping(this.pos, this.size, e.pos, e.size))
            {
                e.takeDamage(this.damage);
                if (this.onHit) this.onHit(e);
                this.hitSet.add(e);
                if (!this.piercing) { this.destroy(); return; }
            }
        }
    }

    render()
    {
        // Draw ghost copies of recent positions, oldest (lowest alpha) first,
        // then the current position at full alpha last. Gives a motion trail
        // without needing a particle system.
        const n = this.trail.length;
        for (let i = 0; i < n; ++i)
        {
            const g = this.trail[i];
            const alpha = (i + 1) / (n + 2) * .55;
            drawTile(g.pos, this.size, this.tileInfo,
                     new Color(1, 1, 1, alpha), g.angle);
        }
        drawTile(this.pos, this.size, this.tileInfo, WHITE, this.angle);
    }
}

class EnemyProjectile extends EngineObject
{
    constructor(pos, dir, speed, damage, lifetime, sprite)
    {
        super(pos, vec2(.7), sprite);
        this.velocity = dir.normalize(speed / 60);
        this.damage   = damage;
        this.lifetime = lifetime;
        this.damping = 1;
        this.friction = 1;
        this.gravityScale = 0;
        this.angle = 0;
        this.angleVelocity = 6;   // visible spin
        this.setCollision(false, false, false, false);
    }

    update()
    {
        super.update();
        this.renderOrder = -this.pos.y;
        this.lifetime -= 1 / 60;
        if (this.lifetime <= 0) { this.destroy(); return; }

        // arena despawn so a stray shot off-screen doesn't linger
        if (this.pos.x < ARENA_MIN_X - 2 || this.pos.x > ARENA_MAX_X + 2 ||
            this.pos.y < ARENA_MIN_Y - 2 || this.pos.y > ARENA_MAX_Y + 2)
        {
            this.destroy();
            return;
        }

        // player contact — respects invuln, same gate as Enemy contact
        // (also skipped in AI test mode so the AI never bleeds to wizard bolts)
        if (player.invulnTimer <= 0 && !playerAI &&
            isOverlapping(this.pos, this.size, player.pos, player.size))
        {
            player.hp -= this.damage;
            player.hurtTimer = .25;
            if (sounds.hurt && sounds.hurt.play) sounds.hurt.play(this.pos);
            this.destroy();
        }
    }
}

// Boomerang projectile — flies outward, reverses to seek back to the player.
// Piercing with a per-enemy hit cooldown so on the return trip it can re-hit
// enemies it caught on the way out.
class StarToss extends EngineObject
{
    constructor(pos, dir, speed, damage, range)
    {
        super(pos, vec2(.7), sprites.starToss);
        this.startPos = pos.copy();
        this.speedPerFrame = speed / 60;
        this.velocity = dir.normalize(this.speedPerFrame);
        this.damageAmount = damage;
        this.range = range;
        this.returning = false;
        this.hitMap = new Map();
        this.damping = 1;
        this.friction = 1;
        this.gravityScale = 0;
        this.angle = 0;
        this.angleVelocity = 10;       // visible spin (LittleJS naming!)
        this.setCollision(false, false, false, false);
        this.life = 3.0;                // hard timeout if we never reach player
    }

    update()
    {
        super.update();
        this.renderOrder = -this.pos.y;
        this.life -= 1 / 60;
        if (this.life <= 0) { this.destroy(); return; }

        if (!this.returning)
        {
            // flip to return mode once we've travelled out far enough
            if (this.pos.distance(this.startPos) >= this.range)
                this.returning = true;
        }
        else
        {
            // re-aim at the (possibly-moved) player every frame; slightly
            // faster on the return so the round-trip doesn't drag
            const toPlayer = player.pos.subtract(this.pos);
            const d = toPlayer.length();
            if (d < .8) { this.destroy(); return; }
            this.velocity = toPlayer.normalize(this.speedPerFrame * 1.4);
        }

        // damage — piercing with .3s per-enemy hit cooldown so the same
        // enemy can be hit twice (once out, once back)
        for (const e of enemies)
        {
            if (!isOverlapping(this.pos, this.size, e.pos, e.size)) continue;
            const next = this.hitMap.get(e) || 0;
            if (time < next) continue;
            e.takeDamage(this.damageAmount);
            this.hitMap.set(e, time + .3);
        }
    }
}

class StarTossWeapon
{
    constructor() { this.level = 1; this.name = 'Star Toss'; this.cooldown = 0; }
    levelUp() { this.level = min(this.level + 1, 5); }
    damage()  { return 5 + this.level * 2; }

    update()
    {
        this.cooldown -= 1 / 60;
        if (this.cooldown > 0) return;
        this.cooldown = 1.4 / player.fireRateMult;

        const target = nearestEnemy(player.pos, 14 * player.areaMult);
        if (!target) return;
        const dirToTarget = target.pos.subtract(player.pos);
        const baseAng = dirToTarget.angle();

        // Small fan — 1 at Lv1 up to 5 at Lv5, ±.18 rad spread (≈10°)
        const count = this.level + player.extraProjectiles;
        const spread = count === 1 ? 0 : .18;
        const dmg = this.damage() * player.dmgMult;
        const speed = 10 * player.projSpeedMult;
        const range = 6 * player.areaMult;
        for (let i = 0; i < count; ++i)
        {
            const t = count === 1 ? .5 : i / (count - 1);
            const ang = baseAng + lerp(-spread, spread, t);
            const d = vec2().setAngle(ang, 1);
            new StarToss(player.pos.copy(), d, speed, dmg, range);
        }
    }
}

function xpToNext(level) { return xpToNextBase + level * level * 2; }

// Temporary buff state — driven by the 🍀 mystery pickup. Each timer
// ticks down in Player.update; the effects are checked at use-sites.
let timeSlowTimer = 0;   // enemies move at 30% while > 0

function applyRandomBuff(pos)
{
    if (!player) return;
    const buffs = [
        () => {
            player.damageBoostTimer = 8;
            recomputeMultipliers();     // bakes the 2× into dmgMult
            toastBuff('💪', '2× DAMAGE', '8 seconds');
        },
        () => {
            const heal = player.maxHp - player.hp;
            player.hp = player.maxHp;
            toastBuff('❤️', 'FULL HEAL', '+' + Math.ceil(heal) + ' HP');
        },
        () => {
            timeSlowTimer = 5;
            toastBuff('⏳', 'TIME SLOW', 'enemies at 30% for 5s');
        },
        () => {
            player.invulnTimer = 4;
            toastBuff('✨', 'INVINCIBLE', '4 seconds');
        },
        () => {
            // pull every gem on screen toward the player
            let count = 0;
            for (const obj of engineObjects)
            {
                if (obj instanceof Pickup && obj.kind === 'gem' && !obj.destroyed)
                {
                    obj.magnetting = true;
                    ++count;
                }
            }
            toastBuff('🧲', 'GEM VACUUM', count + ' gems incoming');
        },
        () => {
            for (let i = 0; i < 20; ++i)
            {
                const off = vec2().setAngle(rand(2 * PI), rand(.5, 2));
                new Pickup((pos || player.pos).add(off),
                           sprites.coin, 'coin', 5);
            }
            toastBuff('💰', 'COIN RAIN', '+100💰');
        },
    ];
    buffs[randInt(buffs.length)]();
}
function toastBuff(icon, title, text)
{
    if (typeof showMenuToast === 'function')
        showMenuToast({icon, title, text, duration: 2.5, position: 'bottom-right'});
}

class Pickup extends EngineObject
{
    constructor(pos, sprite, kind, value, sizeMult = 1)
    {
        super(pos, vec2(.6 * sizeMult), sprite);
        this.kind  = kind;   // 'gem', 'heart', or 'coin'
        this.value = value;
        this.damping = .98;
        this.friction = 1;
        this.gravityScale = 0;
        this.angle = 0;
        this.setCollision(false, false, false, false);
        this.magnetting = false;
        // per-instance phase so a pile of dropped gems doesn't sparkle in sync
        this.sparklePhase = rand(2 * PI);
    }

    render()
    {
        // sparkle additive per pickup kind — gives "this is good to grab"
        // visual readability. Tinted pulse via sin so each gem twinkles.
        const t = time * 5 + this.sparklePhase;
        const pulse = .25 + .25 * sin(t);
        let additive = null;
        if (this.kind === 'gem')        additive = new Color(.1 * pulse, pulse, pulse, 0);
        else if (this.kind === 'heart') additive = new Color(pulse, .15 * pulse, .25 * pulse, 0);
        else if (this.kind === 'coin')  additive = new Color(pulse, pulse * .8, .1 * pulse, 0);
        else if (this.kind === 'mystery')
        {
            // rainbow-shift hue so the rare drop screams "GRAB ME"
            const h = (time * .35 + this.sparklePhase * .2) % 1;
            const big = .55 + .45 * sin(t * 1.5);
            additive = new Color(big * (1 - h), big * h, big * .8, 0);
        }
        drawEmoji(this.pos, this.size, this.tileInfo, WHITE, additive);
    }

    update()
    {
        // magnet — scaled by player.magnetMult passive
        const toPlayer = player.pos.subtract(this.pos);
        const dist = toPlayer.length();
        const effectiveMagnet = magnetRadius * player.magnetMult;
        if (this.magnetting || dist < effectiveMagnet)
        {
            this.magnetting = true;
            const pull = toPlayer.normalize(min(.3, dist * .2));
            this.velocity = this.velocity.add(pull);
        }

        super.update();

        this.renderOrder = -this.pos.y;

        // pickup
        if (dist < .8)
        {
            if (this.kind === 'gem')
            {
                player.xp += this.value * player.xpGainMult;
                playPickupSound(sounds.pickup, this.pos);
                while (player.xp >= xpToNext(player.level))
                {
                    player.xp -= xpToNext(player.level);
                    player.level++;
                    player.pendingLevelUps = (player.pendingLevelUps || 0) + 1;
                    if (sounds.levelUp && sounds.levelUp.play) sounds.levelUp.play();
                }
            }
            else if (this.kind === 'heart')
            {
                player.hp = min(player.maxHp, player.hp + this.value * player.heartMult);
                if (sounds.heart && sounds.heart.play) sounds.heart.play(this.pos);
            }
            else if (this.kind === 'coin')
            {
                const gain = max(1, Math.round(this.value * player.coinGainMult));
                coinsRun += gain;
                coins    += gain;
                playPickupSound(sounds.coin, this.pos);
                // Persist immediately so a tab close mid-run never costs
                // the player coins they actually grabbed.
                saveMetaState();
            }
            else if (this.kind === 'mystery')
            {
                applyRandomBuff(this.pos);
                if (sounds.chest && sounds.chest.play) sounds.chest.play(this.pos);
            }
            this.destroy();
        }
    }
}

function nearestEnemy(fromPos, maxDist)
{
    let best = null, bestD = maxDist;
    for (const e of enemies)
    {
        if (e.isBreakable) continue;   // auto-aim ignores crates / barrels
        const d = fromPos.distance(e.pos);
        if (d < bestD) { best = e; bestD = d; }
    }
    return best;
}

// Tiered XP gem drop — small/medium/large by xpDrop, with elites always
// scoring large. Value is unchanged; only the visual + render size change
// so the player can SEE which kills are worth crossing the swarm for.
function dropGem(pos, xpDrop, isElite)
{
    if (isElite || xpDrop >= 5)
        return new Pickup(pos, sprites.gemLarge,  'gem', xpDrop, 1.9);
    if (xpDrop >= 2)
        return new Pickup(pos, sprites.gemMedium, 'gem', xpDrop, 1.4);
    return     new Pickup(pos, sprites.gem,       'gem', xpDrop, 1.0);
}

class HeartDrainWeapon

// Transient lightning segments — drawn fading by drawChainFlashes() each frame.
const chainFlashes = [];

// Floating damage numbers — small text that rises and fades for hit feedback.
// Per-enemy throttled in Enemy.takeDamage so 60Hz DOTs / multi-orbit hits
// don't flood the screen.
const damageNumbers = [];
const DAMAGE_NUMBER_LIFETIME = .7;

function spawnDamageNumber(pos, value, color)
{
    damageNumbers.push({
        pos: pos.copy(),
        value: max(1, Math.ceil(value)),
        t: time + DAMAGE_NUMBER_LIFETIME,
        color: color || new Color(1, .95, .85),
    });
}

function drawDamageNumbers()
{
    for (let i = damageNumbers.length - 1; i >= 0; --i)
    {
        const d = damageNumbers[i];
        const remaining = d.t - time;
        if (remaining <= 0) { damageNumbers.splice(i, 1); continue; }
        const age = DAMAGE_NUMBER_LIFETIME - remaining;
        const yOffset = age * 1.8;
        const alpha = remaining / DAMAGE_NUMBER_LIFETIME;
        const c = d.color;
        drawText(String(d.value),
                 vec2(d.pos.x, d.pos.y + yOffset),
                 .75,
                 new Color(c.r, c.g, c.b, alpha),
                 .12, new Color(0, 0, 0, alpha * .9));
    }
}

// Drop shadows — only for the player and bosses so we don't drown the screen
// in shadows when the swarm hits hundreds of enemies. Drawn in gameRender
// after the floor so they sit under everything else.
function drawShadows()
{
    // Lay an ellipse-scaled soft radial under every ground-level entity.
    // Includes player, enemies, pickups, bombs, and chests so the world
    // reads as having a consistent floor. Skips projectiles (in the air)
    // and fire zones (already a ground decal). Cheap — WebGL handles a
    // thousand quads easily.
    const shadowTint = new Color(0, 0, 0, .45);
    for (const obj of engineObjects)
    {
        if (obj.destroyed) continue;
        const isShadowed = obj === player ||
            obj instanceof Enemy ||
            obj instanceof Pickup ||
            obj instanceof Bomb ||
            obj instanceof Chest;
        if (!isShadowed) continue;
        // shadow center sits at the bottom of the sprite
        const pos = vec2(obj.pos.x, obj.pos.y - obj.size.y * .45);
        const size = vec2(obj.size.x * 1.2, obj.size.y * .5);
        drawTile(pos, size, sprites.shadow, shadowTint);
    }
}

class ChainLightningWeapon
{
    constructor()
    {
        this.level = 1;
        this.name = 'Chain Lightning';
        this.cooldown = 0;
    }
    levelUp() { this.level = min(this.level + 1, 5); }
    damage()  { return 3 + this.level; }

    update()
    {
        this.cooldown -= 1 / 60;
        if (this.cooldown > 0) return;
        const range = 8 * player.areaMult;
        const first = nearestEnemy(player.pos, range);
        if (!first) return;
        this.cooldown = max(.4, 2.0 - this.level * .2) / player.fireRateMult;

        const hops = this.level + 1;
        const chainRange = 5 * player.areaMult;
        const dmg = this.damage() * player.dmgMult;
        const hit = new Set();
        let from = player.pos;
        let current = first;
        for (let h = 0; h < hops && current; ++h)
        {
            current.takeDamage(dmg);
            hit.add(current);
            chainFlashes.push({a: from, b: current.pos.copy(), t: time + .15});
            from = current.pos;
            let best = null, bestD = chainRange;
            for (const e of enemies)
            {
                if (e.isBreakable) continue;   // chain shouldn't waste a hop on a crate
                if (hit.has(e)) continue;
                const d = from.distance(e.pos);
                if (d < bestD) { best = e; bestD = d; }
            }
            current = best;
        }
    }
}

function drawChainFlashes()
{
    for (let i = chainFlashes.length - 1; i >= 0; --i)
    {
        const f = chainFlashes[i];
        const remaining = f.t - time;
        if (remaining <= 0) { chainFlashes.splice(i, 1); continue; }
        const lifetime = f.lifetime || .15;
        const alpha = remaining / lifetime;
        const c = f.color || new Color(1, 1, .4, 1);
        drawLine(f.a, f.b, .15, new Color(c.r, c.g, c.b, alpha));
    }
}

class PizzaTossWeapon
{
    constructor()
    {
        this.level = 1;
        this.name = 'Pizza Toss';
        this.cooldown = 0;
        this.facing = vec2(1, 0);
    }
    levelUp() { this.level = min(this.level + 1, 5); }
    damage()  { return 4 + this.level * 2; }

    update()
    {
        // Aim: prefer the player's last movement direction. If standing still,
        // aim at the nearest enemy so a stationary player still throws toward
        // a threat instead of firing off-screen.
        if (player.velocity.length() > .005)
        {
            this.facing = player.velocity.normalize();
        }
        else
        {
            const target = nearestEnemy(player.pos, 25);
            if (target)
                this.facing = target.pos.subtract(player.pos).normalize();
            // else keep last facing
        }

        this.cooldown -= 1 / 60;
        if (this.cooldown > 0) return;
        this.cooldown = 1.1 / player.fireRateMult;

        // fan-shot — one slice at level 1, three at level 3, five at level 5
        const slices = 1 + (this.level - 1) + player.extraProjectiles;
        const spread = slices === 1 ? 0 : .35;
        const baseAng = this.facing.angle();
        const dmg = this.damage() * player.dmgMult;
        const speed = 11 * player.projSpeedMult;
        for (let i = 0; i < slices; ++i)
        {
            const t = slices === 1 ? .5 : i / (slices - 1);
            const ang = baseAng + lerp(-spread, spread, t);
            const dir = vec2().setAngle(ang, 1);
            const proj = new Projectile(player.pos.copy(), dir, speed,
                dmg, 1.6, sprites.pizza, true);
            proj.angleVelocity = pizzaSpinRate;
        }
    }
}

class IceCubeWeapon
{
    constructor() { this.level = 1; this.name = 'Ice Cube'; this.cooldown = 0; }
    levelUp() { this.level = min(this.level + 1, 5); }

class SpicyPizzaWeapon

        this.cooldown = 0; this.facing = vec2(1, 0);

        this.cooldown -= 1 / 60;

class FishStormWeapon

    {

        this.angle = 0; this.hitMap = new Map();
    }
    levelUp() {}
    damage() { return 8; }

    update()
    {
        this.angle += 6 * player.fireRateMult / 60;
        const radius = 4 * player.areaMult;
        const orbSize = 1.1 * player.areaMult;
        const dmg = this.damage() * player.dmgMult;
        const now = time;
        for (const [e, t] of this.hitMap)
            if (!e.parent && (e.destroyed || t < now - 5)) this.hitMap.delete(e);

        const orbits = 7;
        for (let i = 0; i < orbits; ++i)
        {
            const a = this.angle + i * 2 * PI / orbits;
            const pos = player.pos.add(vec2().setAngle(a, radius));
            for (const e of enemies)
            {
                if (!isOverlapping(pos, vec2(orbSize), e.pos, e.size)) continue;
                const next = this.hitMap.get(e) || 0;
                if (now < next) continue;
                e.takeDamage(dmg);
                this.hitMap.set(e, now + .35);
            }
        }
    }

    draw()
    {
        const radius = 4 * player.areaMult;
        const orbSize = 1.1 * player.areaMult;
        const orbits = 7;
        for (let i = 0; i < orbits; ++i)
        {

            const pos = player.pos.add(vec2().setAngle(a, radius));
            drawTile(pos, vec2(orbSize), sprites.shark, WHITE, a + time);

// Comet — homing meteor with AOE on impact. Re-acquires target if its
// original prey dies before contact so it never wastes a shot.
class CometProjectile extends EngineObject
{
    constructor(pos, target, damage)
    {
        super(pos, vec2(.8), sprites.comet);
        this.target = target;
        this.damage = damage;
        this.life = 2.5;
        this.damping = 1;
        this.friction = 1;
        this.gravityScale = 0;
        this.angle = 0;
        this.angleVelocity = 4;
        this.setCollision(false, false, false, false);
        this.speedPerFrame = 18 * player.projSpeedMult / 60;
    }

    update()
    {
        super.update();
        this.renderOrder = -this.pos.y;
        this.life -= 1 / 60;
        if (this.life <= 0) { this.destroy(); return; }

        if (!this.target || this.target.destroyed)
            this.target = nearestEnemy(this.pos, 25);
        if (!this.target) return;

        const toTarget = this.target.pos.subtract(this.pos);
        if (toTarget.length() < 1.0)
        {
            const aoeR = 2.5 * player.areaMult;
            for (const e of enemies)
                if (e.pos.distance(this.pos) < aoeR)
                    e.takeDamage(this.damage);
            const rays = 8;
            const flameColor = new Color(1, .55, .2, 1);
            for (let i = 0; i < rays; ++i)
            {
                const a = i * 2 * PI / rays;
                const tip = this.pos.add(vec2().setAngle(a, aoeR));
                chainFlashes.push({a: this.pos.copy(), b: tip, t: time + .25,
                                   color: flameColor});
            }
            this.destroy();
            return;
        }
        this.velocity = toTarget.normalize(this.speedPerFrame);
    }
}

class CometWeapon
{
    constructor()
    {
        this.level = 5; this.evolved = true; this.name = 'Comet';
        this.cooldown = 0;
    }
    levelUp() {}
    damage() { return 12; }

    update()
    {
        this.cooldown -= 1 / 60;
        if (this.cooldown > 0) return;
        this.cooldown = .6 / player.fireRateMult;

        // 3 nearest enemies — pick distinct targets so the volley spreads
        const range = 20 * player.areaMult;
        const used = new Set();
        const targets = [];
        for (let i = 0; i < 3; ++i)
        {
            let best = null, bestD = range;
            for (const e of enemies)
            {
                if (e.isBreakable) continue;
                if (used.has(e)) continue;
                const d = player.pos.distance(e.pos);
                if (d < bestD) { best = e; bestD = d; }
            }
            if (!best) break;
            used.add(best);
            targets.push(best);
        }
        if (targets.length === 0) return;
        const dmg = this.damage() * player.dmgMult;
        for (const t of targets)
            new CometProjectile(player.pos.copy(), t, dmg);
    }
}

// Nuke — bigger Bomb that drops a lingering damage field after blast.
// NukeField is a ground decal that ticks 4x/sec for 2s within its radius.
class NukeField extends EngineObject
{
    constructor(pos, damagePerTick, radius)
    {
        super(pos, vec2(radius * 2), sprites.circle);
        this.damagePerTick = damagePerTick;
        this.fieldRadius = radius;
        this.life = 2.0;
        this.lifeMax = 2.0;
        this.tickTimer = 0;
        this.damping = 1;
        this.friction = 1;
        this.gravityScale = 0;
        this.angle = 0;
        this.setCollision(false, false, false, false);
        this.velocity = vec2();
    }

    update()
    {
        super.update();
        // sit below entities so it reads as a ground hazard
        this.renderOrder = -this.pos.y - 500;
        this.life -= 1 / 60;
        if (this.life <= 0) { this.destroy(); return; }
        this.tickTimer -= 1 / 60;
        if (this.tickTimer <= 0)
        {
            this.tickTimer = .25;
            for (const e of enemies)
                if (e.pos.distance(this.pos) < this.fieldRadius)
                    e.takeDamage(this.damagePerTick);
        }
    }

    render()
    {
        const t = this.life / this.lifeMax;
        const pulse = .5 + .5 * sin(time * 6);
        const alpha = t * (.35 + .25 * pulse);
        drawTile(this.pos, this.size, sprites.circle,
                 new Color(.55, .95, .25, alpha));
    }
}

    constructor(pos, damage, radius)
    {
        super(pos, vec2(1.4), sprites.nuke);
        this.damageAmount = damage;
        this.radius = radius;
        this.fuse = 1.2;
        this.damping = 1;
        this.friction = 1;
        this.gravityScale = 0;
        this.angle = 0;
        this.setCollision(false, false, false, false);
        this.velocity = vec2();
        this.additive = null;
    }

    update()
    {
        super.update();
        this.renderOrder = -this.pos.y;
        this.fuse -= 1 / 60;
        const pulseRate = lerp(20, 6, clamp(this.fuse / 1.2, 0, 1));
        const pulse = sin(time * pulseRate) * .5 + .5;
        this.additive = new Color(.25 * pulse, .65 * pulse, .15 * pulse, 0);

        if (this.fuse <= 0)
        {
            for (const e of enemies)
                if (e.pos.distance(this.pos) < this.radius)
                    e.takeDamage(this.damageAmount);
            const rays = 24;
            const greenGlow = new Color(.7, 1, .3, 1);
            for (let i = 0; i < rays; ++i)
            {
                const a = i * 2 * PI / rays;

                chainFlashes.push({a: this.pos.copy(), b: tip, t: time + .4,
                                   color: greenGlow});
            }
            // lingering field — half blast damage spread across 8 ticks
            new NukeField(this.pos.copy(), this.damageAmount / 16, this.radius);
            this.destroy();
        }
    }

    render()
    {
        drawEmoji(this.pos, this.size, sprites.nuke, null, this.additive);

}

    HeartDrain:     {passive: 'Snack',     name: 'Heart Spiral', emoji: '💖',
                     ctor: () => new HeartSpiralWeapon()},
    StarToss:       {passive: 'Plus One',  name: 'Star Storm',   emoji: '🌟',

                     ctor: () => new CometWeapon()},
    Bomb:           {passive: 'Magnet',    name: 'Nuke',         emoji: '☢️',
                     ctor: () => new NukeWeapon()},
    WaterSplash:    {passive: 'Heart',     name: 'Tsunami',      emoji: '🌊',
                     ctor: () => new TsunamiWeapon()},
};

function findAvailableEvolution()
{
    for (const w of player.weapons)
    {
        if (w.evolved) continue;
        if (w.level < 5) continue;
        const baseKey = w.constructor.name.replace(/Weapon$/, '');
        const evo = EVOLUTIONS[baseKey];
        if (!evo) continue;
        const hasPassive = player.passives.some(p => p.name === evo.passive);
        if (!hasPassive) continue;
        return {weapon: w, evo};
    }
    return null;
}

class Bomb extends EngineObject
{
    constructor(pos, damage, radius)
    {
        super(pos, vec2(.8), sprites.bomb);
        this.damageAmount = damage;
        this.radius = radius;
        this.fuse = .9;
        this.damping = 1;
        this.friction = 1;
        this.gravityScale = 0;
        this.angle = 0;
        this.setCollision(false, false, false, false);
        this.velocity = vec2();
        this.tint = null;
        this.additive = null;
    }

    update()
    {
        super.update();
        this.renderOrder = -this.pos.y;

        this.fuse -= 1 / 60;
        // pulse faster as the fuse runs out
        // pulse faster as the fuse runs out: 6Hz at fresh, 20Hz at boom
        const pulseRate = lerp(20, 6, clamp(this.fuse / .9, 0, 1));
        const pulse = Math.sin(time * pulseRate) * .5 + .5;
        this.additive = new Color(.6 * pulse, .1 * pulse, .1 * pulse, 0);

        if (this.fuse <= 0)
        {
            // damage all enemies in radius
            for (const e of enemies)
                if (e.pos.distance(this.pos) < this.radius)
                    e.takeDamage(this.damageAmount);
            // visual blast: emit chainFlashes radiating outward
            const rays = 12;
            for (let i = 0; i < rays; ++i)
            {
                const a = i * 2 * PI / rays;
                const tip = this.pos.add(vec2().setAngle(a, this.radius));
                chainFlashes.push({a: this.pos.copy(), b: tip, t: time + .25});
            }
            this.destroy();
        }
    }

    render()
    {
        drawEmoji(this.pos, this.size, sprites.bomb, this.tint, this.additive);
    }
}

// Persistent destructibles scattered across the map — 📦 crates (common, coin
// drops) and 🛢️ barrels (rare, gold-glow, premium drops). Pre-spawned at run
// start, no respawn. Slotted into the `enemies` array so projectiles and AOE
// weapons can damage them with no per-weapon plumbing; target-acquisition
// helpers (nearestEnemy etc.) skip them so auto-aim never wastes a shot.
const breakables = [];

class Breakable extends EngineObject
{
    constructor(pos, isBarrel)
    {
        super(pos, vec2(isBarrel ? 1.1 : 1.0),
              isBarrel ? sprites.barrel : sprites.crate);
        this.hp = isBarrel ? 25 : 10;
        this.maxHp = this.hp;
        this.isBarrel = isBarrel;
        this.isBreakable = true;
        this.dmg = 0;
        this.damping = 1;
        this.friction = 1;
        this.gravityScale = 0;
        this.angle = 0;
        this.setCollision(false, false, false, false);
        this.hitFlashTimer = 0;
        this.bobPhase = rand(2 * PI);
        // Fake type so any defensive read of .type.key (none today outside
        // Enemy.render, which Breakable overrides) gets a benign value.
        this.type = {key: 'breakable'};
        enemies.push(this);
        breakables.push(this);
    }

    update()
    {
        super.update();
        this.renderOrder = -this.pos.y;
        // Walk-into break — the player can shoulder-check a crate. Each
        // overlap frame chips off some HP; the player crosses too quickly
        // for this to feel like a wall.
        if (isOverlapping(this.pos, this.size, player.pos, player.size))
            this.takeDamage(5);
    }

    render()
    {
        let additive = null;
        if (this.isBarrel)
        {
            // gold breathe so the rare drop reads as "go out of your way"
            const pulse = .5 + .5 * sin(time * 3.5 + this.bobPhase);
            additive = new Color(.55 * pulse, .42 * pulse, 0, 0);
        }
        if (this.hitFlashTimer > 0)
        {
            this.hitFlashTimer -= 1 / 60;
            additive = new Color(.85, .85, .85, 0);
        }
        drawEmoji(this.pos, this.size, this.tileInfo, WHITE, additive);
    }

    takeDamage(amount)
    {
        this.hp -= amount;
        this.hitFlashTimer = .08;
        if (this.hp <= 0) this.destroy();
    }

    destroy()
    {
        const i = enemies.indexOf(this);
        if (i >= 0) enemies.splice(i, 1);
        const j = breakables.indexOf(this);
        if (j >= 0) breakables.splice(j, 1);
        if (this.hp <= 0)
        {
            if (this.isBarrel)
            {
                // Premium roll — big gem, mystery clover, or a coin pile.
                const roll = rand();
                if (roll < .35)
                    new Pickup(this.pos.copy(), sprites.gemLarge, 'gem', 8, 1.9);
                else if (roll < .55)
                    new Pickup(this.pos.copy(), sprites.clover, 'mystery', 0);
                else
                {
                    for (let k = 0; k < 8; ++k)
                    {
                        const off = vec2().setAngle(rand(2 * PI), rand(.3, 1.1));
                        new Pickup(this.pos.add(off), sprites.coin, 'coin', 5);
                    }
                }
            }
            else
            {
                // Common roll — mostly coins, occasional heart or screen-clear.
                const roll = rand();
                if (roll < .04)
                    new Pickup(this.pos.copy(), sprites.clover, 'mystery', 0);
                else if (roll < .18)
                    new Pickup(this.pos.copy(), sprites.heart, 'heart', 20);
                else
                {
                    const n = 1 + randInt(3);
                    for (let k = 0; k < n; ++k)
                    {
                        const off = vec2().setAngle(rand(2 * PI), rand(.2, .7));
                        new Pickup(this.pos.add(off), sprites.coin, 'coin', 2);
                    }
                }
            }
            if (sounds.chest && sounds.chest.play) sounds.chest.play(this.pos);
        }
        super.destroy();
    }
}

function preSpawnBreakables()
{
    const totalCrates  = 30;
    const totalBarrels = 12;
    const playerSafeRadiusSq = 36;   // keep a 6 wu clearing around (0,0)
    for (let i = 0; i < totalCrates + totalBarrels; ++i)
    {
        const isBarrel = i >= totalCrates;
        let pos;
        for (let tries = 0; tries < 6; ++tries)
        {
            pos = vec2(rand(ARENA_MIN_X + 2, ARENA_MAX_X - 2),
                       rand(ARENA_MIN_Y + 2, ARENA_MAX_Y - 2));
            if (pos.lengthSquared() > playerSafeRadiusSq) break;
        }
        new Breakable(pos, isBarrel);
    }
}

// Used by the spawner cap check — breakables share `enemies` so they have
// to be filtered out of the live-enemy count.
function countLiveEnemies()
{
    let n = 0;
    for (const e of enemies) if (!e.isBreakable) ++n;
    return n;
}

///////////////////////////////////////////////////////////////////////////////
// PASSIVES — in-run stat upgrades. Each passive caps at 5 levels and applies
// its bonus by multiplying the relevant player.*Mult field. recomputeMultipliers
// resets all mults to 1 and walks player.passives to reapply, so it's safe
// to call after any add/levelUp.

class Passive
{
    constructor(name, emoji)
    {
        this.name = name;
        this.emoji = emoji;
        this.level = 1;
    }
    levelUp() { this.level = min(this.level + 1, 5); }
    apply()   {}   // override to mutate player.*Mult fields
}

class FlexPassive       extends Passive { constructor(){ super('Flex',        '💪'); } apply(){ player.dmgMult        *= 1 + this.level * .18; } }
class StopwatchPassive  extends Passive { constructor(){ super('Stopwatch',   '⏱️'); } apply(){ player.fireRateMult   *= 1 + this.level * .14; } }
class MagnifierPassive  extends Passive { constructor(){ super('Magnifier',   '🔍'); } apply(){ player.areaMult       *= 1 + this.level * .12; } }
class RocketPassive     extends Passive { constructor(){ super('Rocket',      '🚀'); } apply(){ player.projSpeedMult  *= 1 + this.level * .14; } }
class MagnetPassive     extends Passive { constructor(){ super('Magnet',      '🧲'); } apply(){ player.magnetMult     *= 1 + this.level * .30; } }
class HeartPassive      extends Passive { constructor(){ super('Heart',       '💗'); } apply(){ player.maxHpMult      *= 1 + this.level * .20; } }
class SneakerPassive    extends Passive { constructor(){ super('Sneaker',     '👟'); } apply(){ player.moveSpeedMult  *= 1 + this.level * .10; } }
class SproutPassive     extends Passive { constructor(){ super('Sprout',      '🌱'); } apply(){ player.xpGainMult     *= 1 + this.level * .12; } }
class PlusOnePassive    extends Passive { constructor(){ super('Plus One',    '➕'); } apply(){ player.extraProjectiles += this.level; } }
class SnackPassive      extends Passive { constructor(){ super('Snack',       '🍗'); } apply(){ player.heartMult      *= 1 + this.level * .25; } }

const ALL_PASSIVES = ['Flex','Stopwatch','Magnifier','Rocket','Magnet','Heart','Sneaker','Sprout','Plus One','Snack'];

function makePassiveByName(name)
{
    if (name === 'Flex')       return new FlexPassive();
    if (name === 'Stopwatch')  return new StopwatchPassive();
    if (name === 'Magnifier')  return new MagnifierPassive();
    if (name === 'Rocket')     return new RocketPassive();
    if (name === 'Magnet')     return new MagnetPassive();
    if (name === 'Heart')      return new HeartPassive();
    if (name === 'Sneaker')    return new SneakerPassive();
    if (name === 'Sprout')     return new SproutPassive();
    if (name === 'Plus One')    return new PlusOnePassive();
    if (name === 'Snack')      return new SnackPassive();
    return null;
}

function recomputeMultipliers()
{
    if (!player) return;
    const prevMaxHp = player.maxHp;
    player.dmgMult = player.fireRateMult = player.areaMult = 1;
    player.projSpeedMult = player.magnetMult = 1;
    player.maxHpMult = player.moveSpeedMult = player.xpGainMult = 1;
    player.extraProjectiles = 0;
    player.heartMult = 1;
    player.coinGainMult = 1;
    for (const p of player.passives) p.apply();
    // hero bonuses applied on top of passives
    if (currentHero && currentHero.stats)
    {
        for (const key in currentHero.stats)
            player[key] = (player[key] || 1) * currentHero.stats[key];
    }
    // permanent power-ups (shop-purchased, persisted)
    player.dmgMult       *= 1 + powerUps.might    * .05;
    player.maxHpMult     *= 1 + powerUps.heart    * .10;
    player.moveSpeedMult *= 1 + powerUps.speed    * .05;
    player.fireRateMult  *= 1 + powerUps.cooldown * .05;
    player.magnetMult    *= 1 + powerUps.magnet   * .20;
    player.xpGainMult    *= 1 + powerUps.growth   * .08;
    player.coinGainMult  *= 1 + powerUps.greed    * .10;
    // Curse Mode — harder enemies, but XP and coin gain scale to match.
    const curseFactor = 1 + curseLevel * .5;
    player.xpGainMult   *= curseFactor;
    player.coinGainMult *= curseFactor;
    // mystery-pickup temporary damage boost (decays in Player.update)
    if (player.damageBoostTimer > 0) player.dmgMult *= 2;
    // grant the player any new max HP from a fresh Heart pickup
    const newMaxHp = playerMaxHp * player.maxHpMult;
    if (newMaxHp > prevMaxHp) player.hp += (newMaxHp - prevMaxHp);
    player.maxHp = newMaxHp;
}

const SPAWN_RADIUS = 20;
const ENEMY_CAP    = 800;

const spawner = {
    timer: 0,
    interval: 1.5,
};

// Returns a weights array aligned with ENEMY_TYPES:
//   [ant, zombie, bat, snail, skull, clown]
function enemyMixForTime(seconds)
{
    // weights aligned with ENEMY_TYPES:
    //   ant, zombie, bat, snail, skull, clown, duck, ghost, fireImp, iceImp
    if (seconds < 15)  return [.60, .40,   0,   0,   0,   0,   0,   0,   0,   0];
    if (seconds < 40)  return [.40, .30, .30,   0,   0,   0,   0,   0,   0,   0];
    if (seconds < 80)  return [.25, .25, .20, .10, .10,   0, .10,   0,   0,   0];
    if (seconds < 150) return [.20, .15, .15, .10, .10, .10, .10, .10,   0,   0];
    if (seconds < 300) return [.10, .10, .15, .10, .10, .10, .10, .10, .075, .075];
    return                    [.05, .05, .10, .15, .10, .15, .10, .10, .10, .10];
}

function pickWeightedType(elapsed)
{
    const w = enemyMixForTime(elapsed);
    const r = rand();
    let acc = 0;
    for (let i = 0; i < ENEMY_TYPES.length; ++i)
    {
        acc += w[i];
        if (r < acc) return ENEMY_TYPES[i];
    }
    return ENEMY_TYPES[0];
}

function spawnBoss(def)
{
    // synthesize an ENEMY_TYPES-compatible record so Enemy can consume it
    const synth = {
        key:        def.key,
        sprite:     def.sprite,
        hp:         def.hp,
        dmg:        def.dmg,
        speed:      def.speed,
        xpDrop:     def.xpDrop,
        size:       def.size,
        splitInto:  def.splitInto,
        splitCount: def.splitCount,
    };
    const pos = player.pos.add(vec2().setAngle(rand(2 * PI), 22));
    const boss = new Enemy(pos, synth, null, def);
    activeBoss = boss;
    if (sounds.bossSpawn && sounds.bossSpawn.play) sounds.bossSpawn.play(boss.pos);
    if (typeof showMenuToast === 'function')
        showMenuToast({icon: '⚠️', title: 'BOSS', text: def.name,
                       duration: 3, position: 'top-right'});
}

function updateSpawner()
{
    // boss schedule check — fires once per boss when elapsedTime crosses .time
    for (const boss of BOSS_SCHEDULE)
    {
        if (elapsedTime >= boss.time && !bossesSpawned.has(boss.key))
        {
            bossesSpawned.add(boss.key);
            spawnBoss(boss);
        }
    }
    // ☠️ Reaper at runDuration ends the run — boss with isReaper flag
    if (elapsedTime >= runDuration && !reaperSpawned && !gameOver && !runVictory)
    {
        reaperSpawned = true;
        spawnBoss(REAPER_DEF);
        // override the default gold boss glow with ominous red
        if (activeBoss) activeBoss.eliteAdditive = new Color(.65, 0, 0, 0);
    }

    // Spawn pacing — VS-style: ~1 enemy/sec early, ramps to ~11/sec by 3 min.
    // CRITICAL: must use elapsedTime (resets per run) NOT engine `time`
    // (lifetime of the page). Using `time` here was the restart bug —
    // after a death-restart, time was huge → interval at minimum →
    // 15-enemy burst on frame 1 = instant mob.
    // Curse Mode shortens the interval (more spawns per second).
    const curseFactor = 1 + curseLevel * .5;
    spawner.interval = lerp(enemySpawnIntervalBase, 0.35,
                            min(elapsedTime / 180, 1)) / curseFactor;

    spawner.timer -= 1 / 60;
    if (spawner.timer > 0) return;
    spawner.timer = spawner.interval;

    if (countLiveEnemies() >= ENEMY_CAP) return;

    // Burst spawning — 1 enemy/tick early, +1 every 60s of elapsed run
    // time, caps at 4. With the .35s late-game interval, peak is ~11/sec.
    const burst = min(1 + Math.floor(elapsedTime / 60), 4);
    for (let n = 0; n < burst; ++n)
    {
        if (countLiveEnemies() >= ENEMY_CAP) break;
        const type = pickWeightedType(elapsedTime);
        let pos;
        for (let tries = 0; tries < 4; ++tries)
        {
            pos = player.pos.add(vec2().setAngle(rand(2 * PI), SPAWN_RADIUS));
            if (pos.x >= ARENA_MIN_X && pos.x <= ARENA_MAX_X &&
                pos.y >= ARENA_MIN_Y && pos.y <= ARENA_MAX_Y) break;
        }
        // elite chance ramps 0 → 5% over 30s..240s of elapsedTime
        const eliteChance = elapsedTime < 30 ? 0
            : min(.05, (elapsedTime - 30) / 4200);
        const eliteKey = rand() < eliteChance
            ? ELITE_KEYS[randInt(ELITE_KEYS.length)]
            : null;
        new Enemy(pos, type, eliteKey);
    }
}

function startRun(hero)
{
    applyHero(hero);

    // with the hero's chosen weapon instead of the default fireball.
    for (const e of enemies.slice()) e.destroy();
    enemies.length = 0;
    breakables.length = 0;
    for (const obj of engineObjects.slice())
    {
        if (obj === player || obj instanceof Enemy || obj instanceof Projectile ||
            obj instanceof Pickup || obj instanceof Bomb ||
            obj instanceof Chest || obj instanceof StarToss ||
            obj instanceof CometProjectile || obj instanceof NukeBomb ||
            obj instanceof NukeField || obj instanceof Breakable)
            obj.destroy();
    }
    chainFlashes.length = 0;
    damageNumbers.length = 0;
    aiSmoothedDir = vec2(1, 0);
    timeSlowTimer = 0;
    spawner.timer = 0;
    spawner.interval = 1.5;
    elapsedTime = 0;
    killCount = 0;
    coinsRun = 0;
    gameOver = false;
    gameOverFrameCount = 0;
    bossesSpawned.clear();
    activeBoss = null;
    reaperSpawned = false;
    runVictory = false;

    player = new Player();
    player.weapons = [makeWeaponByName(hero.weapon)];
    player.passives = [];
    recomputeMultipliers();

    // Scatter the breakable props across the arena. Must run after the
    // teardown loop above (so a restart starts from a clean board) and
    // after player creation (so the safe-radius check has a player at
    // origin to keep away from).
    preSpawnBreakables();

    setPlaying(true);
    hideAllMenus();
}

// AI auto-player — toggle with the T key. Useful for balance testing.
// Movement only (weapons auto-fire anyway), random level-up picks, and
// an automatic restart ~1.5s after death so a long balance pass loops.
let playerAI = false;

// Smoothed heading for the AI auto-player so a goal-switch doesn't flip
// direction abruptly. The AI itself just chases the nearest loot; see
// aiDirection() below.
let aiSmoothedDir = vec2(1, 0);

// Pointer direction — press anywhere on the canvas and the player walks
// toward that point. Since the camera centers on the player, "the
// direction from screen center" IS "the direction from the player".
// Works for both mouse and touch (touch routes through mouse state).
// Returns a unit vector so movement is full-speed regardless of how
// far the press is from center; 30px center deadzone for stability.
function touchDirection()
{
    if (!mouseIsDown(0)) return vec2();
    const cs = mainCanvasSize;
    const dx = mousePosScreen.x - cs.x / 2;
    const dy = mousePosScreen.y - cs.y / 2;
    const len = Math.sqrt(dx * dx + dy * dy);
    if (len < 30) return vec2();
    // screen y grows downward; world y grows upward — flip dy
    return vec2(dx / len, -dy / len);
}

function aiDirection()
{
    // AI is invuln in test mode, so there's no reason to fear enemies —
    // chasing loot keeps it moving and naturally pulls weapons through the
    // swarm. Priority: a real Pickup > a Breakable (loot source) > the
    // nearest enemy (so weapons have something to fire at). Falls back to
    // origin if the arena is completely clean.
    let goal = null;
    let goalD2 = Infinity;

    for (const obj of engineObjects)
    {
        if (!(obj instanceof Pickup) || obj.destroyed) continue;
        const d = player.pos.distanceSquared(obj.pos);
        if (d < goalD2) { goalD2 = d; goal = obj.pos; }
    }
    if (!goal)
    {
        for (const b of breakables)
        {
            const d = player.pos.distanceSquared(b.pos);
            if (d < goalD2) { goalD2 = d; goal = b.pos; }
        }
    }
    if (!goal)
    {
        for (const e of enemies)
        {
            if (e.isBreakable) continue;
            const d = player.pos.distanceSquared(e.pos);
            if (d < goalD2) { goalD2 = d; goal = e.pos; }
        }
    }
    if (!goal) goal = vec2(0, 0);

    // EMA-smooth the heading so a goal switch doesn't flip direction
    // mid-frame and look like a teleport.
    const heading = goal.subtract(player.pos);
    const target = heading.length() > .01 ? heading.normalize() : vec2(1, 0);
    aiSmoothedDir = aiSmoothedDir.scale(.85).add(target.scale(.15));
    return aiSmoothedDir.length() > .01 ? aiSmoothedDir.normalize() : target;
}

    sprites.coin      = drawToTexture(27, paintEmoji('💰'), 'a gold coin or money bag');

    // Soft radial gradient circle — white center fading to transparent. Used
    // for shadows (tinted dark) and any "soft glow" effects. Painted in white
    // so we can color it via the tint argument at draw time. Radius shrunk
    // slightly from 122→114 so the soft alpha edge stays a few pixels inside

    sprites.shadow    = drawToTexture(28, ctx =>
    {

        grad.addColorStop(1,   'rgba(255,255,255,0)');

        ctx.beginPath();
        ctx.arc(125, 125, 114, 0, Math.PI * 2);
        ctx.fill();
    }, 'a soft white radial gradient circle');

    // Solid white circle — for hard-edged filled circles, range indicators,
    // pickup auras. Tint to color, scale to size.
    sprites.circle    = drawToTexture(29, ctx =>
    {
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(125, 125, 114, 0, Math.PI * 2);

    sprites.water     = drawToTexture(31, paintEmoji('💧'), 'a blue water droplet');

    sprites.evilWizard  = drawToTexture(37, paintEmoji('🧙'), 'an evil wizard');
    sprites.megaSnake   = drawToTexture(38, paintEmoji('🐍'), 'a large green snake');
    sprites.ghost       = drawToTexture(39, paintEmoji('👻'), 'a pale ghost');

    sprites.shark       = drawToTexture(41, paintEmoji('🦈'), 'a grey shark');

    sprites.tsunami     = drawToTexture(44, paintEmoji('🌊'), 'a cresting blue wave');
    sprites.heartSpiral = drawToTexture(45, paintEmoji('💖'), 'a sparkling pink heart');

    // Tiered XP gems — same 💎 glyph baked at three hues so big gems pop in

    sprites.gemMedium = drawToTexture(46, ctx =>

    sprites.gemLarge = drawToTexture(47, ctx =>

    }, 'a hue-shifted diamond gem');

    // Breakables — 📦 crate (common) and 🛢️ barrel (rare, gold-glow).
    sprites.crate     = drawToTexture(48, paintEmoji('📦'), 'a wooden crate');
    sprites.barrel    = drawToTexture(49, paintEmoji('🛢️'), 'an oil barrel');

    // ground / decor 32-35 — trees scattered across the arena, mountains line the edges
    sprites.tree1     = drawToTexture(32, paintEmoji('🌳'), 'a deciduous tree');
    sprites.tree2     = drawToTexture(33, paintEmoji('🌲'), 'an evergreen pine tree');
    sprites.tree3     = drawToTexture(34, paintEmoji('🌴'), 'a palm tree');

    canvasClearColor = hsl(.3, .35, .18);  // mossy grass green

    inputWASDEmulateDirection = true;

    // menus.js wiring — pause whenever a menu is visible during a run.
    installAutoPause();

    // Gameplay sound effects — via SoundGenerator (zzfx wrapper). Volumes are
    // intentionally low because they layer with weapon fire / hit flashes a lot.
    sounds.pickup    = new SoundGenerator({frequency: 880,  release: .08, pitchJump: 240, pitchJumpTime: .03, volume: .25});
    sounds.coin      = new SoundGenerator({frequency: 1320, release: .15, pitchJump: 660, pitchJumpTime: .05, volume: .35});
    sounds.heart     = new SoundGenerator({frequency: 660,  release: .25, pitchJump: 330, pitchJumpTime: .08, volume: .4});
    sounds.levelUp   = new SoundGenerator({frequency: 523,  release: .4,  pitchJump: 392, pitchJumpTime: .12, volume: .5});
    sounds.hurt      = new SoundGenerator({frequency: 120,  release: .18, noise: .35, volume: .55});
    sounds.bossSpawn = new SoundGenerator({frequency: 60,   release: 1.2, noise: .25, slide: -8, volume: .6});
    sounds.chest     = new SoundGenerator({frequency: 660,  release: .5,  pitchJump: 880, pitchJumpTime: .15, volume: .55});
    sounds.gameOver  = new SoundGenerator({frequency: 220,  release: .9,  slide: -80, volume: .6});
    sounds.victory   = new SoundGenerator({frequency: 523,  release: .9,  pitchJump: 784, pitchJumpTime: .25, volume: .6});

    loadMetaState();

    // Idle player exists during title / hero-select so the world renders as
    // a backdrop. startRun() recreates the player when the user picks a hero.
    player = new Player();
    player.weapons = [];
    player.passives = [];
    recomputeMultipliers();

    // Title screen — stats refresh each time it's shown.
    createMenu({
        id: 'title',
        title: '🎉 EMOJI SURVIVORS 🎉',
        subtitle: 'Survive the ☠️ Reaper at 15:00',

        onShow: () =>
        {
            const m = getMenu('title');
            if (!m) return;
            const best = m.getItem('bestLabel');
            const coinsLabel = m.getItem('coinsLabel');
            if (best) best.setLabel('🏆 Best: ' + formatTime(bestTime));
            if (coinsLabel) coinsLabel.setLabel('💰 Total Coins: ' + coins);
            const curseBtn = m.getItem('curseBtn');
            if (curseBtn)

        },

            {type: 'label',     id: 'bestLabel',  text: '🏆 Best: 0:00'},
            {type: 'label',     id: 'coinsLabel', text: '💰 Total Coins: 0'},
            {type: 'separator'},
            {type: 'button',    label: 'PLAY',    onClick: () => pushMenu('heroSelect')},
            {type: 'button',    label: 'SHOP',    onClick: () => pushMenu('shop')},
            {type: 'button',    id: 'curseBtn',
                                label: '💀 Curse: OFF',
                                onClick: cycleCurse},
            {type: 'button',    label: 'ABOUT',   onClick: () => pushMenu('about')},
