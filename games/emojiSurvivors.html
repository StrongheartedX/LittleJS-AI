<!DOCTYPE html><head>
<title>Emoji Survivors</title>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
</head><body style="background:#000">
<script src="../dist/littlejs.js?1.18.15"></script>
<script src="../templates/menus.js"></script>
<script src="../templates/soundGenerator.js"></script>
<script src="../templates/textureGenerator.js"></script>
<script src="../templates/tweakables.js"></script>
<script>
'use strict';

// engine settings, do not remove
debugWatermark = false;
showEngineVersion = false;
paused = false;

// engine settings
gravity = vec2(0, 0);
cameraPos = vec2(0, 0);
cameraScale = 40;
canvasMaxSize = vec2(2048, 2048);

///////////////////////////////////////////////////////////////////////////////
// EMOJI SURVIVORS
//
// Vampire Survivors-style auto-battler with emoji sprites.
// See docs/superpowers/specs/2026-05-26-emoji-survivors-design.md

const ARENA_MIN_X = -60, ARENA_MAX_X = 60;
const ARENA_MIN_Y = -40, ARENA_MAX_Y = 40;

const sprites = {};

// Returns a draw function compatible with drawToTexture(). Renders one
// emoji glyph centered in the 250px drawable cell. sizeMul leaves a few
// px of breathing room so the glyph never clips the cell edge. The
// vertical fudge compensates for emoji glyphs sitting slightly above
// the math-center of their em box.
function paintEmoji(emoji, sizeMul = .85)
{
    return ctx =>
    {
        ctx.font = `${250 * sizeMul}px serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(emoji, 125, 135);
    };
}

let player;

class Player extends EngineObject
{
    constructor()
    {
        super(vec2(0, 0), vec2(1.2), sprites.player);
        this.maxHp = 100;
        this.hp = this.maxHp;
        this.speed = 6;
        // Disable engine-driven physics — we want exact velocity control.
        this.damping = 1;
        this.friction = 1;
        this.gravityScale = 0;
        this.angle = 0;  // emoji is upright; don't let it spin
        this.setCollision(false, false, false, false);  // no built-in collisions
    }

    update()
    {
        const dir = keyDirection().add(gamepadStick(0));
        const move = dir.length() > 1 ? dir.normalize() : dir;
        this.velocity = move.scale(this.speed / 60);  // velocity is per-frame

        super.update();

        // arena clamp
        this.pos.x = clamp(this.pos.x, ARENA_MIN_X + .6, ARENA_MAX_X - .6);
        this.pos.y = clamp(this.pos.y, ARENA_MIN_Y + .6, ARENA_MAX_Y - .6);
    }
}

///////////////////////////////////////////////////////////////////////////////
async function gameInit()
{
    initDrawToTexture(8);

    sprites.player    = drawToTexture(0,  paintEmoji('🧙'), 'a wizard in robes, facing forward');

    // enemies 8-10
    sprites.zombie    = drawToTexture(8,  paintEmoji('🧟'), 'a green zombie shambling forward');
    sprites.bat       = drawToTexture(9,  paintEmoji('🦇'), 'a black bat with spread wings');
    sprites.skull     = drawToTexture(10, paintEmoji('💀'), 'a white skull, menacing');

    // weapons / projectiles 16-18
    sprites.fireball  = drawToTexture(16, paintEmoji('🔥'), 'a fireball, orange and yellow flames');
    sprites.star      = drawToTexture(17, paintEmoji('🌟'), 'a yellow glowing star');
    sprites.bolt      = drawToTexture(18, paintEmoji('⚡'), 'a yellow lightning bolt');

    // pickups 24-25
    sprites.gem       = drawToTexture(24, paintEmoji('💎'), 'a cyan diamond gem');
    sprites.heart     = drawToTexture(25, paintEmoji('❤️'), 'a red heart');

    // ground / decor 32-34
    sprites.grass1    = drawToTexture(32, paintEmoji('🌿'), 'a green herb tuft');
    sprites.grass2    = drawToTexture(33, paintEmoji('🌱'), 'a green seedling sprout');
    sprites.rock      = drawToTexture(34, paintEmoji('🪨'), 'a gray rock');

    canvasClearColor = hsl(.3, .15, .05);  // dark forest-floor green

    inputWASDEmulateDirection = true;

    // menus.js wiring — any visible menu auto-pauses the engine.
    setMenuVisibilityCallback(v => paused = v);
    const sound_select   = new Sound([.5,,910,,,.02,2,.07,-5,-33,,,,,,,,.25]);
    const sound_activate = new Sound([.7,,30,.01,,.02,1,3.4,94,,,,,,,,,.67]);
    setMenuSounds({
        select:   () => sound_select.play(),
        activate: () => sound_activate.play(),
    });

    player = new Player();
}

///////////////////////////////////////////////////////////////////////////////
function gameUpdate() { }
function gameUpdatePost()
{
    cameraPos = player.pos;
}
function gameRender() { }
function gameRenderPost() { }

///////////////////////////////////////////////////////////////////////////////
engineInit(gameInit, gameUpdate, gameUpdatePost, gameRender, gameRenderPost);

</script></body></html>
