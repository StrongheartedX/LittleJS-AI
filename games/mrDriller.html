<!DOCTYPE html><head>
<title>Mr. Driller - LittleJS</title>
<meta charset="utf-8">
</head><body style="background:#000">
<script src="../dist/littlejs.js?1.18.0"></script>
<script>
'use strict';

// engine settings, do not remove
debugWatermark = false;
showEngineVersion = false;
paused = false;

// engine settings
gravity = vec2(0, 0);
cameraPos = vec2(0, 0);
cameraScale = 38;

class SoundGenerator extends Sound
{
    constructor(params = {})
    {
        const {
            volume = 1,
            randomness = .05,
            frequency = 220,
            attack = 0,
            release = .1,
            shapeCurve = 1,
            slide = 0,
            pitchJump = 0,
            pitchJumpTime = 0,
            repeatTime = 0,
            noise = 0,
            bitCrush = 0,
            delay = 0,
        } = params;

        super([volume, randomness, frequency, attack, 0, release, 0, shapeCurve, slide, 0, pitchJump, pitchJumpTime, repeatTime, noise, 0, bitCrush, delay, 1, 0, 0, 0]);
    }
}

///////////////////////////////////////////////////////////////////////////////
// Mr. Driller (LittleJS prototype, piece-based)
// The shaft is filled with 2x2 colored pieces. Drilling any cell of a piece
// dissolves the whole piece. When a falling piece lands adjacent to a piece
// of the same color, both dissolve -> chain. Generation guarantees no two
// adjacent pieces share a color, so nothing breaks until you drill.

const COLS = 6;
const MAX_DEPTH = 300;
const DRILL_TIME = 0.28;
const WALK_TIME = 0.14;
const GRAVITY_TICK = 0.12;
const PLAYER_FALL_TIME = 0.10;
const AIR_DRAIN = 0.55;
const CAPSULE_AIR_GAIN = 30;
const CAPSULE_CHANCE = 0.06;

const NUM_COLORS = 5;
const COLORS = [
    rgb(.95, .30, .30),
    rgb(.30, .65, .95),
    rgb(.95, .85, .30),
    rgb(.35, .80, .40),
    rgb(.80, .40, .90),
];
const CAPSULE_COLOR = rgb(.55, .90, 1);

const TYPE_COLOR   = 0;
const TYPE_CAPSULE = 1;

const WALL = -1;

// Pre-computed tilings of a 4x6 band. Each pattern is a list of 6 pieces;
// each piece is a list of [localX, localY] cells. All patterns cover every
// cell of the 4x6 rectangle exactly once.
const BAND_PATTERNS = [
    // all O-pieces
    [
        [[0,0],[1,0],[0,1],[1,1]],
        [[2,0],[3,0],[2,1],[3,1]],
        [[4,0],[5,0],[4,1],[5,1]],
        [[0,2],[1,2],[0,3],[1,3]],
        [[2,2],[3,2],[2,3],[3,3]],
        [[4,2],[5,2],[4,3],[5,3]],
    ],
    // 2 I-horizontal + 4 O
    [
        [[0,0],[1,0],[2,0],[3,0]],
        [[0,1],[1,1],[2,1],[3,1]],
        [[4,0],[5,0],[4,1],[5,1]],
        [[0,2],[1,2],[0,3],[1,3]],
        [[2,2],[3,2],[2,3],[3,3]],
        [[4,2],[5,2],[4,3],[5,3]],
    ],
    // 2 I-vertical + 4 O
    [
        [[0,0],[0,1],[0,2],[0,3]],
        [[1,0],[2,0],[1,1],[2,1]],
        [[3,0],[3,1],[3,2],[3,3]],
        [[4,0],[5,0],[4,1],[5,1]],
        [[1,2],[2,2],[1,3],[2,3]],
        [[4,2],[5,2],[4,3],[5,3]],
    ],
    // 6 I-vertical
    [
        [[0,0],[0,1],[0,2],[0,3]],
        [[1,0],[1,1],[1,2],[1,3]],
        [[2,0],[2,1],[2,2],[2,3]],
        [[3,0],[3,1],[3,2],[3,3]],
        [[4,0],[4,1],[4,2],[4,3]],
        [[5,0],[5,1],[5,2],[5,3]],
    ],
    // 4 I-horizontal + 2 O
    [
        [[0,0],[1,0],[2,0],[3,0]],
        [[0,1],[1,1],[2,1],[3,1]],
        [[4,0],[5,0],[4,1],[5,1]],
        [[0,2],[1,2],[2,2],[3,2]],
        [[0,3],[1,3],[2,3],[3,3]],
        [[4,2],[5,2],[4,3],[5,3]],
    ],
    // L + J + O interlock (top and bottom halves: L + J + O each)
    [
        [[0,0],[1,0],[2,0],[0,1]],       // L
        [[3,0],[1,1],[2,1],[3,1]],       // J
        [[4,0],[5,0],[4,1],[5,1]],       // O
        [[0,2],[1,2],[2,2],[0,3]],       // L
        [[3,2],[1,3],[2,3],[3,3]],       // J
        [[4,2],[5,2],[4,3],[5,3]],       // O
    ],
    // horizontal-flipped version of the L/J/O pattern
    [
        [[3,0],[4,0],[5,0],[5,1]],       // J (flipped)
        [[2,0],[2,1],[3,1],[4,1]],       // L (flipped)
        [[0,0],[1,0],[0,1],[1,1]],       // O
        [[3,2],[4,2],[5,2],[5,3]],       // J (flipped)
        [[2,2],[2,3],[3,3],[4,3]],       // L (flipped)
        [[0,2],[1,2],[0,3],[1,3]],       // O
    ],
];

let grid;
let pieces;
let nextPieceId;
let player;
let air, depth, score, chain, gameOver, won;
let gravityTimer;
let pendingMatchCheck;
let shakeTime;
let destroyedFx;

let sfxDrill, sfxClear, sfxChain, sfxCapsule, sfxDeath, sfxLand, sfxWin, sfxStep;

function colorLighten(c, a) { return rgb(Math.min(1, c.r+a), Math.min(1, c.g+a), Math.min(1, c.b+a), c.a); }
function colorDarken(c, a)  { return rgb(Math.max(0, c.r-a), Math.max(0, c.g-a), Math.max(0, c.b-a), c.a); }

///////////////////////////////////////////////////////////////////////////////
// grid + pieces

function getGridCell(x, y)
{
    if (x < 0 || x >= COLS) return WALL;
    if (y < 0) return null;
    if (y >= MAX_DEPTH + 4) return WALL;
    if (!grid[y]) return null;
    const v = grid[y][x];
    return v === undefined ? null : v;
}

function setGridCell(x, y, v)
{
    if (x < 0 || x >= COLS || y < 0) return;
    if (!grid[y]) grid[y] = new Array(COLS).fill(null);
    grid[y][x] = v;
}

function getPieceAt(x, y)
{
    const v = getGridCell(x, y);
    if (typeof v !== 'number' || v <= 0) return null;
    return pieces[v] || null;
}

function createPiece(type, color, cells)
{
    const id = nextPieceId++;
    const p = { id, type, color, cells: cells.map(c => ({x:c.x, y:c.y})), alive: true };
    pieces[id] = p;
    for (let i=0; i<cells.length; i++) setGridCell(cells[i].x, cells[i].y, id);
    return p;
}

function dissolvePiece(id, fxDuration)
{
    const p = pieces[id];
    if (!p || !p.alive) return;
    p.alive = false;
    destroyedFx.push({
        cells: p.cells.map(c => ({x:c.x, y:c.y})),
        color: p.color,
        type: p.type,
        timer: fxDuration,
        duration: fxDuration,
    });
    for (let i=0; i<p.cells.length; i++)
    {
        const c = p.cells[i];
        setGridCell(c.x, c.y, null);
    }
    delete pieces[id];
}

function pickColorForShape(cells)
{
    const cellSet = new Set();
    for (let i=0; i<cells.length; i++)
        cellSet.add(cells[i].x + ',' + cells[i].y);
    const forbidden = new Set();
    for (let i=0; i<cells.length; i++)
    {
        const c = cells[i];
        const ns = [[c.x+1,c.y],[c.x-1,c.y],[c.x,c.y+1],[c.x,c.y-1]];
        for (let n=0; n<4; n++)
        {
            const nx = ns[n][0], ny = ns[n][1];
            if (cellSet.has(nx + ',' + ny)) continue;
            const np = getPieceAt(nx, ny);
            if (np && np.type === TYPE_COLOR) forbidden.add(np.color);
        }
    }
    const avail = [];
    for (let c = 0; c < NUM_COLORS; c++) if (!forbidden.has(c)) avail.push(c);
    if (avail.length === 0) return Math.floor(Math.random() * NUM_COLORS);
    return avail[Math.floor(Math.random() * avail.length)];
}

function generateBand(py)
{
    const pattern = BAND_PATTERNS[Math.floor(Math.random() * BAND_PATTERNS.length)];
    for (let i = 0; i < pattern.length; i++)
    {
        const local = pattern[i];
        const cells = [];
        for (let j = 0; j < local.length; j++)
            cells.push({ x: local[j][0], y: py + local[j][1] });
        if (Math.random() < CAPSULE_CHANCE)
            createPiece(TYPE_CAPSULE, -1, cells);
        else
            createPiece(TYPE_COLOR, pickColorForShape(cells), cells);
    }
}

function resetGame()
{
    grid = {};
    pieces = {};
    nextPieceId = 1;
    destroyedFx = [];
    grid[0] = new Array(COLS).fill(null);
    grid[1] = new Array(COLS).fill(null);
    for (let py = 2; py <= MAX_DEPTH; py += 4) generateBand(py);
    player = {
        gx: 3, gy: 1,
        drilling: false, drillDir: null, drillTimer: 0, drillTarget: null,
        fallTimer: 0, falling: false, walkTimer: 0, deathReason: null,
        facing: 1,
    };
    air = 100;
    depth = 0;
    score = 0;
    chain = 0;
    gameOver = false;
    won = false;
    gravityTimer = 0;
    pendingMatchCheck = false;
    shakeTime = 0;
    cameraPos = vec2(0, -4);
}

function cellWorldPos(gx, gy)
{
    return vec2(gx - (COLS-1)/2, -gy);
}

///////////////////////////////////////////////////////////////////////////////
// piece gravity

function canPieceDrop(p)
{
    const pieceCellSet = new Set();
    for (let i=0; i<p.cells.length; i++)
        pieceCellSet.add(p.cells[i].x + ',' + p.cells[i].y);
    for (let i=0; i<p.cells.length; i++)
    {
        const c = p.cells[i];
        const bx = c.x, by = c.y + 1;
        if (pieceCellSet.has(bx + ',' + by)) continue;
        const below = getGridCell(bx, by);
        if (below === null) continue;
        return false;
    }
    for (let i=0; i<p.cells.length; i++)
    {
        const c = p.cells[i];
        if (player.gx === c.x && player.gy === c.y + 1) return false;
    }
    return true;
}

function dropPiece(p)
{
    for (let i=0; i<p.cells.length; i++) setGridCell(p.cells[i].x, p.cells[i].y, null);
    for (let i=0; i<p.cells.length; i++) p.cells[i].y += 1;
    for (let i=0; i<p.cells.length; i++) setGridCell(p.cells[i].x, p.cells[i].y, p.id);
}

function applyGravityStep()
{
    const list = [];
    for (const id in pieces) list.push(pieces[id]);
    // drop lowest pieces first so stacks cascade in a single tick
    list.sort((a, b) => {
        let ay = -Infinity, by2 = -Infinity;
        for (let i=0;i<a.cells.length;i++) if (a.cells[i].y > ay)  ay  = a.cells[i].y;
        for (let i=0;i<b.cells.length;i++) if (b.cells[i].y > by2) by2 = b.cells[i].y;
        return by2 - ay;
    });
    const moved = [];
    for (let i=0; i<list.length; i++)
    {
        const p = list[i];
        if (!p.alive) continue;
        if (canPieceDrop(p))
        {
            dropPiece(p);
            moved.push(p);
        }
    }
    return moved;
}

function checkCrush(movedPieces)
{
    if (player.falling) return;
    // crush if a piece that just fell has a cell directly above the player AND
    // has 2+ cells in the player's column (i.e. a stack, not a single block)
    for (let i=0; i<movedPieces.length; i++)
    {
        const p = movedPieces[i];
        let landed = false, colCount = 0;
        for (let j=0; j<p.cells.length; j++)
        {
            const c = p.cells[j];
            if (c.x !== player.gx) continue;
            colCount++;
            if (c.y === player.gy - 1) landed = true;
        }
        if (landed && colCount >= 2)
        {
            killPlayer('crushed');
            return;
        }
    }
}

function findAdjacentColorMatches()
{
    const dissolve = new Set();
    for (const id in pieces)
    {
        const p = pieces[id];
        if (p.type !== TYPE_COLOR) continue;
        for (let j=0; j<p.cells.length; j++)
        {
            const c = p.cells[j];
            const neighbors = [[c.x+1,c.y],[c.x-1,c.y],[c.x,c.y+1],[c.x,c.y-1]];
            for (let n=0; n<4; n++)
            {
                const np = getPieceAt(neighbors[n][0], neighbors[n][1]);
                if (!np || np.id === p.id) continue;
                if (np.type !== TYPE_COLOR) continue;
                if (np.color === p.color)
                {
                    dissolve.add(p.id);
                    dissolve.add(np.id);
                }
            }
        }
    }
    return dissolve;
}

function settleAndMatch()
{
    const moved = applyGravityStep();
    checkCrush(moved);
    if (gameOver) return;
    if (moved.length > 0) return;
    if (!pendingMatchCheck) return;

    const dissolve = findAdjacentColorMatches();
    if (dissolve.size > 0)
    {
        chain += 1;
        const count = dissolve.size;
        score += Math.floor(count * 100 * (1 + chain * 0.5));
        const ids = [];
        dissolve.forEach(id => ids.push(id));
        for (let i=0; i<ids.length; i++) dissolvePiece(ids[i], 0.3);
        if (chain >= 2) sfxChain.play();
        else sfxClear.play();
        shakeTime = Math.max(shakeTime, 0.2);
        pendingMatchCheck = true;
    }
    else
    {
        chain = 0;
        pendingMatchCheck = false;
    }
}

///////////////////////////////////////////////////////////////////////////////
// player

function startDrill(dir)
{
    const dx = dir === 'left' ? -1 : dir === 'right' ? 1 : 0;
    const dy = dir === 'down' ? 1 : 0;
    const tx = player.gx + dx, ty = player.gy + dy;
    if (tx < 0 || tx >= COLS) return false;
    const p = getPieceAt(tx, ty);
    if (!p) return false;
    player.drilling = true;
    player.drillDir = dir;
    player.drillTarget = p.id;
    player.drillTimer = DRILL_TIME;
    if (dir === 'left') player.facing = -1;
    else if (dir === 'right') player.facing = 1;
    return true;
}

function completeDrill()
{
    const p = pieces[player.drillTarget];
    if (p && p.alive)
    {
        if (p.type === TYPE_CAPSULE)
        {
            air = Math.min(100, air + CAPSULE_AIR_GAIN);
            sfxCapsule.play();
        }
        else
        {
            score += 40;
            sfxDrill.play();
        }
        dissolvePiece(p.id, 0.18);
        shakeTime = Math.max(shakeTime, 0.08);
    }
    if (player.drillDir === 'left')  player.gx -= 1;
    else if (player.drillDir === 'right') player.gx += 1;
    player.drilling = false;
    player.drillDir = null;
    player.drillTarget = null;
    chain = 0;
    pendingMatchCheck = true;
}

function processInput()
{
    if (player.drilling || player.falling) return;
    if (player.walkTimer > 0) { player.walkTimer -= timeDelta; return; }
    const down  = keyIsDown('ArrowDown')  || keyIsDown('KeyS');
    const left  = keyIsDown('ArrowLeft')  || keyIsDown('KeyA');
    const right = keyIsDown('ArrowRight') || keyIsDown('KeyD');
    if (down && startDrill('down')) return;
    if (left && !right)
    {
        player.facing = -1;
        const sideP = getPieceAt(player.gx - 1, player.gy);
        if (!sideP)
        {
            if (player.gx > 0) { player.gx -= 1; player.walkTimer = WALK_TIME; sfxStep.play(); }
        }
        else startDrill('left');
        return;
    }
    if (right && !left)
    {
        player.facing = 1;
        const sideP = getPieceAt(player.gx + 1, player.gy);
        if (!sideP)
        {
            if (player.gx < COLS-1) { player.gx += 1; player.walkTimer = WALK_TIME; sfxStep.play(); }
        }
        else startDrill('right');
        return;
    }
}

function updatePlayer()
{
    if (gameOver) return;
    if (player.drilling)
    {
        player.drillTimer -= timeDelta;
        if (player.drillTimer <= 0) completeDrill();
        return;
    }
    const below = getGridCell(player.gx, player.gy + 1);
    if (below === null)
    {
        player.falling = true;
        player.fallTimer += timeDelta;
        if (player.fallTimer >= PLAYER_FALL_TIME)
        {
            player.fallTimer = 0;
            player.gy += 1;
            if (player.gy > depth) depth = player.gy;
        }
    }
    else
    {
        if (player.falling) sfxLand.play();
        player.falling = false;
        player.fallTimer = 0;
    }
}

function killPlayer(reason)
{
    if (gameOver) return;
    gameOver = true;
    player.deathReason = reason;
    shakeTime = 0.5;
    sfxDeath.play();
}

///////////////////////////////////////////////////////////////////////////////
async function gameInit()
{
    setCanvasFixedSize(vec2(720, 960));

    sfxDrill   = new SoundGenerator({volume:.28, frequency:300, release:.12, shapeCurve:1.2, pitchJump:180, pitchJumpTime:.04, noise:.2});
    sfxClear   = new SoundGenerator({volume:.40, frequency:480, release:.25, shapeCurve:1.1, pitchJump:320, pitchJumpTime:.05, delay:.03});
    sfxChain   = new SoundGenerator({volume:.50, frequency:600, release:.35, shapeCurve:1.1, pitchJump:520, pitchJumpTime:.07, delay:.08, repeatTime:.10});
    sfxCapsule = new SoundGenerator({volume:.35, frequency:520, release:.20, shapeCurve:1.4, pitchJump:380, pitchJumpTime:.06});
    sfxDeath   = new SoundGenerator({volume:.45, frequency:240, release:.7,  shapeCurve:1.8, slide:-.6, noise:.15});
    sfxLand    = new SoundGenerator({volume:.18, frequency:140, release:.10, shapeCurve:1.3, noise:.25});
    sfxWin     = new SoundGenerator({volume:.45, frequency:440, release:.4,  shapeCurve:1.2, pitchJump:660, pitchJumpTime:.08, delay:.06});
    sfxStep    = new SoundGenerator({volume:.10, frequency:320, release:.04, shapeCurve:1.5});

    resetGame();
}

///////////////////////////////////////////////////////////////////////////////
function gameUpdate()
{
    if (keyWasPressed('KeyR')) { resetGame(); return; }
    if (gameOver) return;

    air -= AIR_DRAIN * timeDelta;
    if (air <= 0) { air = 0; killPlayer('suffocated'); return; }

    if (player.gy >= MAX_DEPTH) { won = true; gameOver = true; sfxWin.play(); return; }

    processInput();
    updatePlayer();

    gravityTimer += timeDelta;
    if (gravityTimer >= GRAVITY_TICK)
    {
        gravityTimer = 0;
        settleAndMatch();
    }

    if (shakeTime > 0) shakeTime -= timeDelta;
    for (let i = destroyedFx.length - 1; i >= 0; i--)
    {
        destroyedFx[i].timer -= timeDelta;
        if (destroyedFx[i].timer <= 0) destroyedFx.splice(i, 1);
    }
}

///////////////////////////////////////////////////////////////////////////////
function gameUpdatePost()
{
    const target = vec2(0, -player.gy - 4);
    cameraPos = cameraPos.lerp(target, 0.18);
    if (shakeTime > 0)
    {
        const s = Math.min(0.3, shakeTime);
        cameraPos = cameraPos.add(vec2((Math.random()-.5)*s, (Math.random()-.5)*s));
    }
}

///////////////////////////////////////////////////////////////////////////////
function gameRender()
{
    const camSize = getCameraSize();
    const darkness = Math.min(1, player.gy / 200);
    const bgTop = rgb(.10 - .08*darkness, .13 - .10*darkness, .20 - .12*darkness);
    const bgBot = rgb(.04, .05, .08);
    drawRectGradient(cameraPos, camSize, bgTop, bgBot);

    const wallC  = rgb(.22, .18, .14);
    const wallHL = rgb(.32, .26, .20);
    const leftX  = -(COLS-1)/2 - 1;
    const rightX =  (COLS-1)/2 + 1;
    drawRect(vec2(leftX,  cameraPos.y), vec2(2, camSize.y), wallC);
    drawRect(vec2(rightX, cameraPos.y), vec2(2, camSize.y), wallC);
    drawRect(vec2(leftX  + 0.45, cameraPos.y), vec2(0.08, camSize.y), wallHL);
    drawRect(vec2(rightX - 0.45, cameraPos.y), vec2(0.08, camSize.y), wallHL);

    const topRow = Math.max(0, Math.floor(-cameraPos.y - camSize.y/2 - 1));
    const botRow = Math.floor(-cameraPos.y + camSize.y/2 + 1);
    for (let y = Math.ceil(topRow/10)*10; y <= botRow; y += 10)
    {
        const wp = cellWorldPos(0, y);
        drawRect(vec2(leftX + 0.9, wp.y), vec2(0.3, 0.08), rgb(.6,.5,.35));
        drawText(y + 'm', vec2(leftX - 0.4, wp.y), 0.45, rgb(.85,.75,.55), 0.08, rgb(0,0,0));
    }

    if (topRow <= 0)
        drawRect(vec2(0, 0.6), vec2(COLS + 4, 0.5), rgb(.35, .30, .22));

    const goalWP = cellWorldPos(0, MAX_DEPTH);
    if (goalWP.y > cameraPos.y - camSize.y/2 - 2 && goalWP.y < cameraPos.y + camSize.y/2 + 2)
    {
        drawRect(vec2(0, goalWP.y + 0.5), vec2(COLS + 2, 0.25), rgb(1, .85, .3));
        drawText('GOAL', vec2(0, goalWP.y - 0.2), 0.9, rgb(1, .9, .3), 0.18, rgb(0,0,0));
    }

    // pieces
    for (const id in pieces)
    {
        const p = pieces[id];
        if (!p.alive) continue;
        drawPiece(p);
    }

    // dissolve fx
    for (let i=0; i<destroyedFx.length; i++)
    {
        const d = destroyedFx[i];
        const t = d.timer / d.duration;
        const a = Math.max(0, t);
        const base = d.type === TYPE_CAPSULE ? CAPSULE_COLOR : COLORS[d.color];
        const c = rgb(base.r, base.g, base.b, a);
        const inflate = 1 + (1 - a) * 0.35;
        for (let j=0; j<d.cells.length; j++)
        {
            const wp = cellWorldPos(d.cells[j].x, d.cells[j].y);
            drawRect(wp, vec2(inflate, inflate), c);
        }
    }

    drawPlayer();
}

function drawPiece(p)
{
    const isCapsule = p.type === TYPE_CAPSULE;
    const base = isCapsule ? CAPSULE_COLOR : COLORS[p.color];
    const drilling = player.drilling && player.drillTarget === p.id;
    let fill = base;
    if (drilling)
    {
        const pulse = 0.5 + 0.5 * Math.abs(Math.sin(time * 30));
        fill = colorLighten(base, 0.15 + 0.25 * pulse);
    }
    const light = colorLighten(base, 0.18);
    const dark  = colorDarken(base, 0.35);

    // fill
    for (let i=0; i<p.cells.length; i++)
    {
        const wp = cellWorldPos(p.cells[i].x, p.cells[i].y);
        drawRect(wp, vec2(1, 1), fill);
    }

    // inner highlight (bevel) in each cell
    for (let i=0; i<p.cells.length; i++)
    {
        const wp = cellWorldPos(p.cells[i].x, p.cells[i].y);
        drawRect(wp.add(vec2(-0.14, 0.14)), vec2(0.68), light);
        drawRect(wp.add(vec2( 0.14,-0.14)), vec2(0.68), colorDarken(base, 0.18));
        drawRect(wp, vec2(0.48, 0.48), fill);
    }

    // outer edge borders (draw only where neighbor is NOT the same piece)
    for (let i=0; i<p.cells.length; i++)
    {
        const c = p.cells[i];
        const wp = cellWorldPos(c.x, c.y);
        // top edge: grid (x, y-1) neighbor; world +y offset
        if (getGridCell(c.x, c.y - 1) !== p.id)
            drawRect(wp.add(vec2(0, 0.47)), vec2(1.0, 0.10), dark);
        // bottom edge
        if (getGridCell(c.x, c.y + 1) !== p.id)
            drawRect(wp.add(vec2(0, -0.47)), vec2(1.0, 0.10), dark);
        // left edge
        if (getGridCell(c.x - 1, c.y) !== p.id)
            drawRect(wp.add(vec2(-0.47, 0)), vec2(0.10, 1.0), dark);
        // right edge
        if (getGridCell(c.x + 1, c.y) !== p.id)
            drawRect(wp.add(vec2(0.47, 0)), vec2(0.10, 1.0), dark);
    }

    if (isCapsule)
    {
        let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
        for (let i=0; i<p.cells.length; i++)
        {
            if (p.cells[i].x < minX) minX = p.cells[i].x;
            if (p.cells[i].x > maxX) maxX = p.cells[i].x;
            if (p.cells[i].y < minY) minY = p.cells[i].y;
            if (p.cells[i].y > maxY) maxY = p.cells[i].y;
        }
        const centerWP = vec2((minX + maxX)/2 - (COLS-1)/2, -(minY + maxY)/2);
        drawCircle(centerWP, 1.0, rgb(1,1,1,.85));
        drawText('O2', centerWP, 0.7, rgb(.1, .3, .6), 0.08, rgb(0,0,0));
    }
}

function drawPlayer()
{
    const p = cellWorldPos(player.gx, player.gy);
    drawCircle(p, 0.92, rgb(.95, .95, 1));
    drawRect(p.add(vec2(0, -0.15)), vec2(0.72, 0.55), rgb(.95, .25, .25));
    drawCircle(p.add(vec2(0, 0.08)), 0.66, rgb(.30, .55, .95));
    drawCircle(p.add(vec2(-0.14 * player.facing, 0.22)), 0.22, rgb(.85, .95, 1));
    drawCircle(p.add(vec2(-0.10, 0.05)), 0.10, rgb(0,0,0));
    drawCircle(p.add(vec2( 0.14, 0.05)), 0.10, rgb(0,0,0));

    let bx = 0, by = -0.50;
    if (player.drillDir === 'left')       { bx = -0.50; by = -0.05; }
    else if (player.drillDir === 'right') { bx =  0.50; by = -0.05; }
    else if (player.drillDir === 'down')  { bx =  0;    by = -0.55; }
    const wobble = player.drilling ? Math.sin(time*50) * 0.06 : 0;
    const bitColor = player.drilling
        ? rgb(1, .75 + 0.25*Math.sin(time*40), .25)
        : rgb(.85, .85, .90);
    drawRect(p.add(vec2(bx + wobble, by)), vec2(0.28, 0.28), bitColor);
    if (!gameOver && player.drilling)
    {
        for (let i=0; i<3; i++)
        {
            const a = Math.random() * 6.28;
            const r = 0.3 + Math.random() * 0.3;
            drawCircle(p.add(vec2(bx + Math.cos(a)*r, by + Math.sin(a)*r)), 0.08, rgb(1, .9, .4));
        }
    }
}

///////////////////////////////////////////////////////////////////////////////
function gameRenderPost()
{
    const sw = mainCanvasSize.x, sh = mainCanvasSize.y;

    drawRect(vec2(sw/2, 44), vec2(sw, 88), rgb(0,0,0,.65), 0, false, true);
    drawRect(vec2(sw/2, 88), vec2(sw, 2), rgb(1,1,1,.15), 0, false, true);

    const barW = 320, barH = 20;
    const barCx = 20 + barW/2;
    drawTextScreen('AIR', vec2(24, 22), 18, rgb(1,1,1), 3, rgb(0,0,0), 'left');
    drawRect(vec2(barCx, 54), vec2(barW, barH), rgb(.08,.08,.12), 0, false, true);
    drawRect(vec2(barCx, 54), vec2(barW-4, barH-4), rgb(.18,.18,.22), 0, false, true);
    const frac = Math.max(0, air/100);
    const airC = air > 40 ? rgb(.3,.95,1) : air > 20 ? rgb(1,.85,.3) : rgb(1,.3,.3);
    const innerW = (barW-4) * frac;
    drawRect(vec2(barCx - (barW-4)/2 + innerW/2, 54), vec2(innerW, barH-4), airC, 0, false, true);
    drawTextScreen(Math.ceil(air) + '%', vec2(barCx, 54), 14, rgb(0,0,0), 0, rgb(0,0,0), 'center');

    drawTextScreen('DEPTH', vec2(sw - 24, 22), 18, rgb(1,1,1), 3, rgb(0,0,0), 'right');
    drawTextScreen(player.gy + ' / ' + MAX_DEPTH + ' m', vec2(sw - 24, 54), 22, rgb(1, .95, .7), 3, rgb(0,0,0), 'right');

    drawTextScreen('SCORE ' + score, vec2(sw/2, 26), 18, rgb(1,1,1), 3, rgb(0,0,0), 'center');
    if (chain > 1)
        drawTextScreen('CHAIN x' + chain + '!', vec2(sw/2, 56), 26, rgb(1, .7, .3), 4, rgb(0,0,0), 'center');

    if (gameOver)
    {
        drawRect(vec2(sw/2, sh/2), vec2(sw, 240), rgb(0,0,0,.78), 0, false, true);
        const msg = won ? 'YOU ESCAPED!' :
            player.deathReason === 'suffocated' ? 'OUT OF AIR' : 'CRUSHED';
        const mc = won ? rgb(1, .9, .3) : rgb(1, .4, .4);
        drawTextScreen(msg, vec2(sw/2, sh/2 - 40), 60, mc, 6, rgb(0,0,0), 'center');
        drawTextScreen('Depth: ' + player.gy + ' m     Score: ' + score,
            vec2(sw/2, sh/2 + 16), 24, rgb(1,1,1), 3, rgb(0,0,0), 'center');
        drawTextScreen('Press R to restart', vec2(sw/2, sh/2 + 56), 22, rgb(.8,.9,1), 3, rgb(0,0,0), 'center');
    }

    drawTextScreen('< / > walk or drill    v drill down    R restart',
        vec2(sw/2, sh - 20), 16, rgb(.75, .85, .95), 2, rgb(0,0,0), 'center');
}

///////////////////////////////////////////////////////////////////////////////
engineInit(gameInit, gameUpdate, gameUpdatePost, gameRender, gameRenderPost);
