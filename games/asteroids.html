<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>LittleJS — Asterblast</title>
  <style>
    /* Keep the page clean and let LittleJS manage the canvas */
    html, body { margin: 0; padding: 0; background: #000; overflow: hidden; }
  </style>
</head>
<body>
<script src="../dist/littlejs.js?1780071765370"></script>
<script src="../templates/gameFx.js?1780071765370"></script>
<script src="../templates/menus.js?1780071765370"></script>
<script>
'use strict';

// engine settings
debugWatermark = false;
showEngineVersion = false;

// on-screen touch gamepad (analog stick + face buttons) for mobile
touchGamepadEnable = true;
touchGamepadAnalog = true;
touchGamepadButtonCount = 4;
touchGamepadAlpha = .35;

// ============================================================
// Sound (no external assets)
const sShoot  = new SoundGenerator({volume:.6, frequency:820, release:.06, slide:-1.6, shapeCurve:.6, noise:.02});
const sBoom   = new SoundGenerator({volume:1,  frequency:90,  release:.35, slide:-.7,  shapeCurve:1.2, noise:.12, delay:.02});
const sHit    = new SoundGenerator({volume:.8, frequency:220, release:.18, slide:-.4,  shapeCurve:1.1, noise:.08});
const sThrust = new SoundGenerator({volume:.35, frequency:120, release:.12, slide:.2,  shapeCurve:.2, noise:.18});
const sZap    = new SoundGenerator({volume:.6, frequency:520, release:.12, slide:1.4,  shapeCurve:.8, noise:.05});

// UFO sounds (woo-woo alternating tones + fire + extra-life)
const sUfoLargeHi = new SoundGenerator({volume:.32, frequency:175, release:.22, shapeCurve:1.4, noise:.0});
const sUfoLargeLo = new SoundGenerator({volume:.32, frequency:140, release:.22, shapeCurve:1.4, noise:.0});
const sUfoSmallHi = new SoundGenerator({volume:.32, frequency:340, release:.18, shapeCurve:1.4, noise:.0});
const sUfoSmallLo = new SoundGenerator({volume:.32, frequency:280, release:.18, shapeCurve:1.4, noise:.0});
const sUfoFire    = new SoundGenerator({volume:.55, frequency:380, release:.12, slide:-1.0, shapeCurve:.7, noise:.06});
const sExtraLife  = new SoundGenerator({volume:.55, frequency:1320, release:.4, slide:1.5, shapeCurve:.3, noise:0});

// ============================================================
// Game constants
// ============================================================
const FIXED_RES = vec2(1920, 1080);
const CAMERA_SCALE = 28;          // pixels per world unit
const WRAP_MARGIN = 1.5;          // extra margin so objects wrap smoothly

const SHIP_RADIUS = 0.275; // half size
const SHIP_TURN_SPEED = 0.045;    // radians/frame
const SHIP_THRUST = 0.009;        // accel/frame (slower)
const SHIP_MAX_SPEED = 0.12;      // slower top speed
const SHIP_DAMPING = 0.975;       // stronger damping to keep drift manageable

const BULLET_SPEED = 0.22;        // slower bullets
const BULLET_LIFE = 1.6;          // seconds (longer since bullets are slower)
const BULLET_COOLDOWN = 0.12;     // seconds
const BULLET_MAX = 5;

const ROCK_RADII = [0, 1.25, 2.05, 3.2]; // index = sizeTier (1..3)

// Single knob for the vector-line look. Everything else scales from this.
const LINE_WIDTH = 0.08;
const LINE_WIDTH_THIN  = LINE_WIDTH * 0.75;   // fine details (cockpit, debris)
const LINE_WIDTH_UFO   = LINE_WIDTH * 0.875;  // saucer body
const LINE_WIDTH_FAINT = LINE_WIDTH * 0.625;  // background border

// ============================================================
// Globals
// ============================================================
let worldSize = vec2(30, 18);
let worldHalf = vec2(15, 9);

let ship;
let bullets = [];
let rocks = [];
let debris = [];
let ufos = [];
let ufoBullets = [];

let score = 0;
let lives = 3;
let level = 1;
let gameOver = false;
let nextExtraLifeAt = 10000;
let gameOverTimer = new Timer;     // delays the GAME OVER menu surfacing

let respawnTimer = new Timer();
let invulnTimer = new Timer();
let shootTimer = new Timer();
let thrustSoundTimer = new Timer();
let hyperTimer = new Timer();
let ufoSpawnTimer = new Timer();

// simple star field
let stars = [];

// ============================================================
// Helpers
// ============================================================
const TAU = Math.PI * 2;
const clamp01 = (v)=> clamp(v, 0, 1);

function angleToVec(a) { return vec2(Math.sin(a), Math.cos(a)); } // up is 0 in LittleJS style

function wrapPos(p)
{
    // wrap around the camera bounds (centered at cameraPos)
    const left   = cameraPos.x - worldHalf.x - WRAP_MARGIN;
    const right  = cameraPos.x + worldHalf.x + WRAP_MARGIN;
    const bottom = cameraPos.y - worldHalf.y - WRAP_MARGIN;
    const top    = cameraPos.y + worldHalf.y + WRAP_MARGIN;

    if (p.x < left)  p.x = right;
    if (p.x > right) p.x = left;
    if (p.y < bottom)p.y = top;
    if (p.y > top)   p.y = bottom;

    return p;
}

function dist2(a,b)
{
    const dx = a.x - b.x, dy = a.y - b.y;
    return dx*dx + dy*dy;
}

function circlesHit(posA, rA, posB, rB)
{
    const rr = rA + rB;
    return dist2(posA, posB) <= rr*rr;
}

// ============================================================
// Pre-bloom: every visible primitive is drawn as a core + halos
// so the post-process shader has soft glow to amplify. Single
// place to tune the layered-draw look.
// ============================================================
// Keep halo widths modest relative to the smallest shape (~0.4 world
// units for the small UFO body / ship triangle) so wide halos don't
// overlap and fill the interior. The post-process bloom does the
// long-range spread; pre-bloom just provides soft edges to amplify.
const GLOW_LAYERS = [
    { width: 1.0, alpha: 1.00 }, // core
    { width: 1.8, alpha: 0.32 }, // inner halo
    { width: 3.0, alpha: 0.12 }, // outer haze
];

function drawGlowLine(a, b, width, col)
{
    for (const g of GLOW_LAYERS)
        drawLine(a, b, width * g.width, rgb(col.r, col.g, col.b, col.a * g.alpha));
}

function drawGlowCircle(pos, diameter, col)
{
    for (const g of GLOW_LAYERS)
        drawCircle(pos, diameter * g.width, rgb(col.r, col.g, col.b, col.a * g.alpha));
}

function drawGlowLineList(points, width, col, wrap=false, pos=vec2(), angle=0)
{
    for (const g of GLOW_LAYERS)
        drawLineList(points, width * g.width, rgb(col.r, col.g, col.b, col.a * g.alpha), wrap, pos, angle);
}

// Call drawFn(ghostPos) at the object's real position AND at any wrapped
// "ghost" copies that peek into view near a screen edge, so objects slide
// seamlessly across the wrap seam instead of popping. `radius` is the
// object's draw radius (used to decide which ghosts are on-screen). The wrap
// period matches wrapPos exactly (view size + 2*WRAP_MARGIN), so a ghost sits
// precisely where the object lands when it teleports — no visible jump.
function drawWrapped(pos, radius, drawFn)
{
    const spanX = 2 * (worldHalf.x + WRAP_MARGIN);
    const spanY = 2 * (worldHalf.y + WRAP_MARGIN);
    const viewL = cameraPos.x - worldHalf.x, viewR = cameraPos.x + worldHalf.x;
    const viewB = cameraPos.y - worldHalf.y, viewT = cameraPos.y + worldHalf.y;
    for (let ix = -1; ix <= 1; ix++)
    for (let iy = -1; iy <= 1; iy++)
    {
        const gx = pos.x + ix * spanX;
        const gy = pos.y + iy * spanY;
        // skip copies whose bounding circle can't touch the visible view
        if (gx + radius < viewL || gx - radius > viewR) continue;
        if (gy + radius < viewB || gy - radius > viewT) continue;
        drawFn(vec2(gx, gy));
    }
}

function randEdgeSpawn(minDistanceFromCenter = 4)
{
    // spawn just outside the view bounds
    const side = randInt(4);
    const x = rand(worldHalf.x, -worldHalf.x);
    const y = rand(worldHalf.y, -worldHalf.y);

    let p;
    if (side === 0) p = vec2(cameraPos.x - worldHalf.x - 2, cameraPos.y + y);
    if (side === 1) p = vec2(cameraPos.x + worldHalf.x + 2, cameraPos.y + y);
    if (side === 2) p = vec2(cameraPos.x + x, cameraPos.y - worldHalf.y - 2);
    if (side === 3) p = vec2(cameraPos.x + x, cameraPos.y + worldHalf.y + 2);

    // ensure not too close to the ship spawn area
    if (p.distance(cameraPos) < minDistanceFromCenter)
        p = p.subtract(p.subtract(cameraPos).normalize(minDistanceFromCenter));

    return p;
}

function clearAll()
{
    engineObjectsDestroy(true);
    ship = undefined;
    bullets = [];
    rocks = [];
    debris = [];
    ufos = [];
    ufoBullets = [];
}

function resetGame()
{
    clearAll();
    score = 0;
    lives = 3;
    level = 1;
    gameOver = false;
    nextExtraLifeAt = 10000;
    ufoSpawnTimer.set(rand(22, 14));

    spawnShip(true);
    spawnWave(level);
}

function startGame()
{
    resetGame();
    setPlaying(true);
}

function quitToTitleWithCleanup()
{
    quitToTitle(() => {
        clearAll();
        score = 0;
        lives = 3;
        level = 1;
        gameOver = false;
        spawnAttractField();
    });
}

// Title-screen attract: a few rocks tumbling behind the menu
function spawnAttractField()
{
    for (let i = 0; i < 6; i++)
    {
        const p = randEdgeSpawn(6);
        const a = rand(TAU);
        const v = angleToVec(a).scale(rand(.025, .01));
        const tier = randInt(3) + 1;
        new Rock(p, tier, v);
    }
}



function spawnShip(centered=false)
{
    const pos = centered ? cameraPos.copy() : vec2(cameraPos.x, cameraPos.y - worldHalf.y*.35);
    ship = new Ship(pos);
    respawnTimer.set(0);
    invulnTimer.set(2.0);
}

function spawnWave(wave)
{
    const count = 3 + wave;
    for (let i=0;i<count;i++)
    {
        const p = randEdgeSpawn(5);
        const a = rand(TAU);
        // 3x slower asteroids
        const v = angleToVec(a).scale(rand(.023, .01) + wave*.002);
        new Rock(p, 3, v);
    }
}

function addScore(points)
{
    score += points;
    while (score >= nextExtraLifeAt)
    {
        lives++;
        nextExtraLifeAt += 10000;
        sExtraLife.play();
    }
    submitBestScore(score);
}

function explodeAt(pos, intensity=1)
{
    const pieces = Math.floor(10 + 18*intensity);
    for (let i=0;i<pieces;i++)
    {
        const a = rand(TAU);
        const sp = rand(.22, .03) * (1 + intensity);
        new Debris(pos.copy(), angleToVec(a).scale(sp), rand(TAU), rand(.9, .35));
    }
}

// ============================================================
// Objects
// ============================================================
class Ship extends EngineObject
{
    constructor(pos)
    {
        super(pos, vec2(SHIP_RADIUS*2));
        this.mass = 1;
        this.damping = 1;       // we handle damping manually for a more asteroids-like feel
        this.angleDamping = 1;
        this.setCollision(false, false, false, false);

        this.angle = 0;
        this.velocity = vec2();
        this.dead = false;
    }

    update()
    {
        if (gameOver) return;
        if (this.dead) return;

        // analog stick (touch or physical gamepad merged into the same API)
        const stick = gamepadStick(0);
        const kbd = keyDirection();

        // rotation: keyboard arrows/AD, D-pad, or left-stick X-axis
        const rot = clamp(kbd.x + stick.x, -1, 1);
        this.angle += SHIP_TURN_SPEED * rot;

        // thrust: keyboard up/W, stick forward (Y > 0 in LittleJS), A button (0)
        const thrust = kbd.y > 0 || stick.y > .35 || gamepadIsDown(0);
        if (thrust)
        {
            const dir = angleToVec(this.angle);
            this.velocity = this.velocity.add(dir.scale(SHIP_THRUST));

            // little exhaust particles
            if (randBool(.35))
            {
                const back = this.pos.subtract(dir.scale(SHIP_RADIUS*1.3));
                const pv = dir.scale(-rand(.09,.03)).add(randVec2(rand(.02,.0)));
                new Debris(back, pv, rand(TAU), rand(.25,.12), true);
            }

            // occasional thrust sound
            if (!thrustSoundTimer.isSet() || thrustSoundTimer.elapsed())
            {
                sThrust.play(this.pos, .45);
                thrustSoundTimer.set(.11);
            }
        }

        // manual damping + max speed
        this.velocity = this.velocity.scale(SHIP_DAMPING);
        const sp2 = this.velocity.lengthSquared();
        if (sp2 > SHIP_MAX_SPEED*SHIP_MAX_SPEED)
            this.velocity = this.velocity.normalize(SHIP_MAX_SPEED);

        // hyperspace: Shift / X / Y-button (3)
        if ((!hyperTimer.isSet() || hyperTimer.elapsed()) &&
            (keyWasPressed('ShiftLeft') || keyWasPressed('KeyX') || gamepadWasPressed(3)))
        {
            sZap.play(this.pos, .6);
            this.pos = vec2(
                rand(cameraPos.x + worldHalf.x - 2, cameraPos.x - worldHalf.x + 2),
                rand(cameraPos.y + worldHalf.y - 2, cameraPos.y - worldHalf.y + 2)
            );
            this.velocity = randVec2(rand(.16, .04));
            hyperTimer.set(1.2);
            invulnTimer.set(1.2);
            explodeAt(this.pos, .25);
        }

        // shooting: Space / Z / B-button (1)
        if (!shootTimer.isSet() || shootTimer.elapsed())
        {
            if (keyWasPressed('Space') || keyWasPressed('KeyZ') || gamepadWasPressed(1))
            {
                if (bullets.length < BULLET_MAX)
                {
                    shootTimer.set(BULLET_COOLDOWN);
                    this.fire();
                }
            }
        }

        // move
        this.pos = this.pos.add(this.velocity);
        wrapPos(this.pos);
    }

    fire()
    {
        const dir = angleToVec(this.angle);
        const p = this.pos.add(dir.scale(SHIP_RADIUS*1.55));
        // bullets inherit only a little ship velocity so they don't feel "too fast" while drifting
        const v = this.velocity.scale(.25).add(dir.scale(BULLET_SPEED));
        new Bullet(p, v);
        sShoot.play(p, .55);
    }

    kill()
    {
        if (this.dead) return;
        this.dead = true;

        sBoom.play(this.pos, 1);
        explodeAt(this.pos, 1.15);
        this.destroy();

        lives--;
        if (lives < 0)
        {
            gameOver = true;
            return;
        }

        respawnTimer.set(1.35);
    }

    render()
    {
        if (this.dead) return;

        // blink when invulnerable
        if (invulnTimer.isSet() && invulnTimer.active() && (time*10|0)%2)
            return;

        const col = rgb(1,1,1);
        const dir = angleToVec(this.angle);
        const right = angleToVec(this.angle - Math.PI/2);

        // triangle points
        const nose = this.pos.add(dir.scale(SHIP_RADIUS*1.45));
        const l = this.pos.subtract(dir.scale(SHIP_RADIUS*1.0)).add(right.scale(SHIP_RADIUS*0.95));
        const r = this.pos.subtract(dir.scale(SHIP_RADIUS*1.0)).subtract(right.scale(SHIP_RADIUS*0.95));

        drawGlowLineList([nose, l, r], LINE_WIDTH, col, true);

        // tiny cockpit line
        drawGlowLine(this.pos.add(dir.scale(SHIP_RADIUS*.35)), this.pos.subtract(dir.scale(SHIP_RADIUS*.25)), LINE_WIDTH_THIN, col);
    }
}

class Bullet extends EngineObject
{
    constructor(pos, vel)
    {
        super(pos, vec2(.18));
        this.mass = 0; // no solver
        this.setCollision(false, false, false, false);
        this.velocity = vel;
        this.life = new Timer(BULLET_LIFE);

        bullets.push(this);
    }

    update()
    {
        this.pos = this.pos.add(this.velocity);
        wrapPos(this.pos);

        if (this.life.elapsed())
            this.destroy();
    }

    destroy(immediate=true)
    {
        super.destroy(immediate);
        bullets = bullets.filter(b=> b !== this && !b.destroyed);
    }

    render()
    {
        drawGlowCircle(this.pos, .12, rgb(1,1,1));
    }
}

class Rock extends EngineObject
{
    constructor(pos, sizeTier=3, vel=vec2())
    {
        const r = ROCK_RADII[sizeTier];
        super(pos, vec2(r*2));

        this.mass = 0;
        this.setCollision(false, false, false, false);

        this.tier = sizeTier;
        this.r = r;
        this.velocity = vel.lengthSquared() ? vel : randVec2(rand(.033, .013));
        this.angle = rand(TAU);
        this.angleVelocity = rand(.004, -.004);

        // build a jaggy outline (local points)
        const verts = 11;
        this.points = [];
        for (let i=0;i<verts;i++)
        {
            const a = (i/verts)*TAU;
            const rr = r * rand(1.05, .65);
            this.points.push(vec2(Math.sin(a)*rr, Math.cos(a)*rr));
        }

        rocks.push(this);
    }

    update()
    {
        this.pos = this.pos.add(this.velocity);
        this.angle += this.angleVelocity;
        wrapPos(this.pos);
    }

    split(fromVel)
    {
        const tier = this.tier;
        if (tier <= 1) return;

        const newTier = tier - 1;
        const baseSpeed = rand(.047, .023) + (3-newTier)*.007;

        for (let i=0;i<2;i++)
        {
            const a = rand(TAU);
            const v = angleToVec(a).scale(baseSpeed).add(fromVel.scale(.25));
            const p = this.pos.add(randVec2(.35));
            new Rock(p, newTier, v);
        }
    }

    destroy(immediate=true)
    {
        super.destroy(immediate);
        rocks = rocks.filter(r=> r !== this && !r.destroyed);
    }

    render()
    {
        drawWrapped(this.pos, this.r * 1.15, p =>
            drawGlowLineList(this.points, LINE_WIDTH, rgb(1,1,1), true, p, this.angle));
    }
}

class Debris extends EngineObject
{
    constructor(pos, vel, angle, lifeSeconds=.5, small=false)
    {
        super(pos, vec2());
        this.mass = 0;
        this.setCollision(false, false, false, false);

        this.velocity = vel;
        this.angle = angle;
        this.spin = rand(.25, -.25);
        this.life = new Timer(lifeSeconds);
        this.length = small ? rand(.18, .08) : rand(.55, .18);

        debris.push(this);
    }

    update()
    {
        this.pos = this.pos.add(this.velocity);
        this.velocity = this.velocity.scale(.985);
        this.angle += this.spin;
        wrapPos(this.pos);

        if (this.life.elapsed())
            this.destroy();
    }

    destroy(immediate=true)
    {
        super.destroy(immediate);
        debris = debris.filter(d=> d !== this && !d.destroyed);
    }

    render()
    {
        const t = this.life.getPercent();
        const a = 1 - clamp01(t);
        const col = rgb(1,1,1,a);
        const dir = angleToVec(this.angle);
        const aPos = this.pos.subtract(dir.scale(this.length*.5));
        const bPos = this.pos.add(dir.scale(this.length*.5));
        drawGlowLine(aPos, bPos, LINE_WIDTH_THIN, col);
    }
}

class Ufo extends EngineObject
{
    constructor(small)
    {
        const r = small ? .42 : .75;
        const dirX = randBool() ? 1 : -1;
        const startY = rand(worldHalf.y*.75, -worldHalf.y*.75);
        const startX = dirX > 0 ? cameraPos.x - worldHalf.x - 1 : cameraPos.x + worldHalf.x + 1;
        super(vec2(startX, startY), vec2(r*2));

        this.mass = 0;
        this.setCollision(false, false, false, false);

        this.small = small;
        this.r = r;
        this.dirX = dirX;
        this.exitX = dirX > 0 ? cameraPos.x + worldHalf.x + 1.5 : cameraPos.x - worldHalf.x - 1.5;

        const speed = small ? .075 : .05;
        this.velocity = vec2(dirX * speed, 0);

        this.zigzagTimer = new Timer(rand(1.3, .5));
        this.fireTimer   = new Timer(small ? rand(1.3, .7) : rand(2.0, 1.2));
        this.tonePhase   = 0;
        this.toneTimer   = new Timer(.4);

        ufos.push(this);
    }

    update()
    {
        // zigzag vertical motion
        if (this.zigzagTimer.elapsed())
        {
            const baseSpeed = this.small ? .075 : .05;
            this.velocity.y = rand(-baseSpeed*.7, baseSpeed*.7);
            this.zigzagTimer.set(rand(1.3, .5));
        }

        this.pos = this.pos.add(this.velocity);

        // wrap vertically only; despawn when crossing exit side
        if (this.pos.y < cameraPos.y - worldHalf.y - WRAP_MARGIN) this.pos.y = cameraPos.y + worldHalf.y + WRAP_MARGIN;
        if (this.pos.y > cameraPos.y + worldHalf.y + WRAP_MARGIN) this.pos.y = cameraPos.y - worldHalf.y - WRAP_MARGIN;
        if ((this.dirX > 0 && this.pos.x > this.exitX) ||
            (this.dirX < 0 && this.pos.x < this.exitX))
        {
            this.destroy();
            return;
        }

        // shoot
        if (this.fireTimer.elapsed())
        {
            this.fire();
            this.fireTimer.set(this.small ? rand(1.4, .9) : rand(2.2, 1.3));
        }

        // woo-woo
        if (this.toneTimer.elapsed())
        {
            if (this.small)
                (this.tonePhase ? sUfoSmallLo : sUfoSmallHi).play(this.pos, .6);
            else
                (this.tonePhase ? sUfoLargeLo : sUfoLargeHi).play(this.pos, .6);
            this.tonePhase ^= 1;
            this.toneTimer.set(.4);
        }
    }

    fire()
    {
        let aim;
        if (this.small && ship && !ship.dead)
        {
            // lead the player; accuracy ramps with score
            const accuracy = clamp01(score / 35000);
            const bSpeed = .19;
            const dist = ship.pos.distance(this.pos);
            const predT = dist / bSpeed;
            const leadAmount = .35 + accuracy * .65;
            const target = ship.pos.add(ship.velocity.scale(predT * leadAmount));
            aim = target.subtract(this.pos).normalize();
            // add aim noise that shrinks with score
            const noise = (1 - accuracy) * .55;
            const jitter = rand(-noise, noise);
            aim = vec2(
                aim.x * Math.cos(jitter) - aim.y * Math.sin(jitter),
                aim.x * Math.sin(jitter) + aim.y * Math.cos(jitter)
            );
        }
        else
        {
            // large UFO: random direction
            const a = rand(TAU);
            aim = vec2(Math.sin(a), Math.cos(a));
        }
        const v = aim.scale(.19);
        new UfoBullet(this.pos.add(aim.scale(this.r * 1.1)), v);
        sUfoFire.play(this.pos, .55);
    }

    destroy(immediate=true)
    {
        super.destroy(immediate);
        ufos = ufos.filter(u => u !== this && !u.destroyed);
    }

    render()
    {
        const col = rgb(1, 1, 1);
        const r = this.r;
        // saucer outline (hex-disc with cockpit dome)
        const lw = LINE_WIDTH_UFO;
        const body = [
            vec2(-r,        r*.08),
            vec2(-r*.55,    r*.32),
            vec2( r*.55,    r*.32),
            vec2( r,        r*.08),
            vec2( r*.6,    -r*.22),
            vec2(-r*.6,    -r*.22),
        ];
        drawGlowLineList(body, lw, col, true, this.pos);
        // dome (open polyline)
        const dome = [
            vec2(-r*.32, r*.32),
            vec2(-r*.18, r*.5),
            vec2( r*.18, r*.5),
            vec2( r*.32, r*.32),
        ];
        drawGlowLineList(dome, lw, col, false, this.pos);
        // belt
        drawGlowLine(this.pos.add(vec2(-r, r*.08)), this.pos.add(vec2(r, r*.08)), lw*.85, col);
    }
}

class UfoBullet extends EngineObject
{
    constructor(pos, vel)
    {
        super(pos, vec2(.18));
        this.mass = 0;
        this.setCollision(false, false, false, false);
        this.velocity = vel;
        this.life = new Timer(1.6);
        ufoBullets.push(this);
    }

    update()
    {
        this.pos = this.pos.add(this.velocity);
        wrapPos(this.pos);
        if (this.life.elapsed())
            this.destroy();
    }

    destroy(immediate=true)
    {
        super.destroy(immediate);
        ufoBullets = ufoBullets.filter(b => b !== this && !b.destroyed);
    }

    render()
    {
        // distinct from player bullet: warm red-orange glow
        drawGlowCircle(this.pos, .13, rgb(1, .35, .35));
    }
}

function maybeSpawnUfo()
{
    if (gameOver) return;
    if (!ufoSpawnTimer.elapsed()) return;
    if (ufos.length) return;

    // small-saucer chance ramps from 0 at score 0 to ~0.85 above 35k
    const smallChance = clamp01(score / 35000) * .85;
    const small = randBool(smallChance);
    new Ufo(small);

    // next spawn delay shrinks with score (22-14s at start, ~10-6s late)
    const t = clamp01(score / 25000);
    const base = lerp(18, 8, t);
    ufoSpawnTimer.set(rand(base + 4, base - 4));
}

// ============================================================
// Core callbacks
// ============================================================
function gameInit()
{
    saveDataInit('asteroids');
    setOrientationLock('landscape');
    setShowSplashScreen(false);
    setCanvasFixedSize(FIXED_RES);
    setCameraScale(CAMERA_SCALE);
    setCameraPos(vec2());

    // We do our own collisions; keep the physics solver off for speed/simplicity
    setEnablePhysicsSolver(false);
    setGravity(vec2());

    // ============================================================
    // Vector-arcade post-process. Two stacked bloom passes (tight
    // halo + wide haze) over the pre-bloomed geometry, plus a
    // soft vignette. HUD is composited in so it glows too.
    // ============================================================
    const televisionShader = `
    // 5-tap cross-pattern blur, reused at multiple radii
    vec4 bloomPass(vec2 p, float blurSize)
    {
        vec4 bloom = vec4(0);
        bloom += texture(iChannel0, p + vec2(-2.*blurSize, 0)) * .12;
        bloom += texture(iChannel0, p + vec2(   -blurSize, 0)) * .24;
        bloom += texture(iChannel0, p)                         * .28;
        bloom += texture(iChannel0, p + vec2(    blurSize, 0)) * .24;
        bloom += texture(iChannel0, p + vec2( 2.*blurSize, 0)) * .12;
        bloom += texture(iChannel0, p + vec2(0, -2.*blurSize)) * .12;
        bloom += texture(iChannel0, p + vec2(0,    -blurSize)) * .24;
        bloom += texture(iChannel0, p)                         * .28;
        bloom += texture(iChannel0, p + vec2(0,     blurSize)) * .24;
        bloom += texture(iChannel0, p + vec2(0,  2.*blurSize)) * .12;
        return bloom;
    }

    void mainImage(out vec4 c, vec2 p)
    {
        p /= iResolution.xy;
        c = texture(iChannel0, p);

        // stacked bloom: tight halo + wide haze
        c += bloomPass(p, .001) * .9;
        c += bloomPass(p, .002) * .2;

        // black vignette around edges
        const float vignette = 2.;
        const float vignettePow = 6.;
        float dx = 2.*p.x-1., dy = 2.*p.y-1.;
        c *= 1.-pow((dx*dx + dy*dy)/vignette, vignettePow);
    }`;
    new PostProcessPlugin(televisionShader, true);

    // stars
    stars = [];
    const starCount = 210;
    for (let i=0;i<starCount;i++)
    {
        // place in a slightly larger range so the edges don't feel empty
        const p = vec2(rand(35, -35), rand(20, -20));
        const s = rand(.09, .03);
        stars.push({p, s, tw: rand(3, 1)});
    }

    setSoundVolume(.8);
    installAutoPause(() => isPlaying());   // title screen stays live so the attract rocks keep tumbling

    buildMenus();
    spawnAttractField();
}

function buildMenus()
{
    if (typeof createMenu !== 'function') return; // menus.js not loaded — fail gracefully

    createTitleMenu({
        title: 'ASTERBLAST',
        subtitle: 'A LittleJS prototype',
        onPlay: startGame,
        revealOnClick: false,
        canReveal: () => !isPlaying(),
        showBest: true,
        formatBest: n => 'BEST ' + n,
        items: [
            {type:'button', label:'OPTIONS',     onClick: () => pushMenu('options')},
            {type:'button', label:'HOW TO PLAY', onClick: () => pushMenu('about')},
        ],
    });

    createOptionsMenu();

    createMenu({
        id: 'about',
        title: 'HOW TO PLAY',
        onHide: popMenu,
        items: [
            {type:'text', text:
                'Blast the asteroids and saucers — don\'t crash.\n\n' +
                'ROTATE with ←/→ (or A/D, or left stick).\n' +
                'THRUST with ↑ (W, or push stick up, or A button).\n' +
                'FIRE with Space or Z (or B button).\n' +
                'HYPERSPACE with Shift or X (or Y button) — random teleport, briefly invulnerable.\n\n' +
                'Small asteroids score 100, medium 50, large 20.\n' +
                'Small saucers 1000, large 200. Extra life every 10,000.'},
            {type:'separator'},
            {type:'button', label:'BACK', onClick: () => hideMenu('about')},
        ],
    });

    createPauseMenu({
        onQuit: quitToTitleWithCleanup,
        extraItems: [
            {type:'button', label:'OPTIONS', onClick: () => pushMenu('options')},
        ],
    });

    createMenu({
        id: 'gameOver',
        title: 'GAME OVER',
        dismissable: false,
        onShow: () =>
        {
            const m = getMenu('gameOver');
            if (m)
            {
                m.getItem('finalScore')?.setLabel(`SCORE  ${score}`);
                m.getItem('bestScore')?.setLabel(`BEST   ${getBestScore()}`);
                m.getItem('levelReached')?.setLabel(`LEVEL  ${level}`);
            }
        },
        items: [
            {type:'label', id:'finalScore',   text:'SCORE  0'},
            {type:'label', id:'bestScore',    text:'BEST   0'},
            {type:'label', id:'levelReached', text:'LEVEL  0'},
            {type:'separator'},
            {type:'button', label:'PLAY AGAIN', onClick: () =>
            {
                hideMenu('gameOver');
                startGame();
            }},
            {type:'button', label:'QUIT TO TITLE', onClick: quitToTitleWithCleanup},
        ],
    });

    installDefaultToolbar();

    // Show the title menu immediately — no click-to-reveal step.
    showMenu('title');
}

function gameUpdate()
{
    // Pause hotkey: Esc or Start. Gated on isPlaying so it doesn't fire from title.
    if (isPlaying() && !gameOver &&
        (keyWasPressed('Escape') || gamepadWasPressed(9)))
    {
        if (typeof playMenuSound === 'function') playMenuSound('activate');
        if (typeof showMenu === 'function') showMenu('pause');
        inputClearKey('Escape');
        inputClearKey(9, 1, false, true, false);
        return;
    }

    // Attract mode: rocks keep tumbling, but no gameplay logic
    if (!isPlaying()) return;

    // Game over: brief on-canvas hold, then surface the menu
    if (gameOver)
    {
        if (gameOverTimer.isSet() && gameOverTimer.elapsed())
        {
            gameOverTimer.unset();
            if (typeof showMenu === 'function') showMenu('gameOver');
        }
        return;
    }

    // respawn
    if (respawnTimer.isSet() && respawnTimer.elapsed() && !ship)
        spawnShip(false);

    // collisions
    handleCollisions();

    // Player just died this frame (lives bottomed out) — start hold timer and bail.
    if (gameOver)
    {
        if (!gameOverTimer.isSet()) gameOverTimer.set(2.0);
        return;
    }

    // UFO spawning
    maybeSpawnUfo();

    // next wave (only when rocks AND ufos cleared, like arcade)
    if (rocks.length === 0 && ufos.length === 0)
    {
        level++;
        spawnWave(level);
        invulnTimer.set(1.2);
    }
}

function handleCollisions()
{
    if (gameOver) return;

    // bullets vs rocks
    for (const b of bullets)
    {
        if (b.destroyed) continue;
        for (const r of rocks)
        {
            if (r.destroyed) continue;
            if (circlesHit(b.pos, .12, r.pos, r.r))
            {
                b.destroy();

                sHit.play(r.pos, .85);
                explodeAt(r.pos, r.tier/3);

                // arcade scoring: small=100, med=50, large=20
                addScore([0, 100, 50, 20][r.tier]);
                const prevVel = r.velocity.copy();
                r.split(prevVel);
                r.destroy();
                break;
            }
        }
    }

    // ship vs rocks
    if (ship && !ship.destroyed)
    {
        const invuln = invulnTimer.isSet() && invulnTimer.active();
        if (!invuln)
        {
            for (const r of rocks)
            {
                if (r.destroyed) continue;
                if (circlesHit(ship.pos, SHIP_RADIUS, r.pos, r.r*.92))
                {
                    ship.kill();
                    ship = undefined;
                    break;
                }
            }
        }
    }

    // player bullets vs ufos
    for (const b of bullets)
    {
        if (b.destroyed) continue;
        for (const u of ufos)
        {
            if (u.destroyed) continue;
            if (circlesHit(b.pos, .12, u.pos, u.r))
            {
                b.destroy();
                sBoom.play(u.pos, .9);
                explodeAt(u.pos, .9);
                addScore(u.small ? 1000 : 200);
                u.destroy();
                break;
            }
        }
    }

    // ufo bullets vs ship
    if (ship && !ship.destroyed)
    {
        const invuln = invulnTimer.isSet() && invulnTimer.active();
        if (!invuln)
        {
            for (const b of ufoBullets)
            {
                if (b.destroyed) continue;
                if (circlesHit(ship.pos, SHIP_RADIUS, b.pos, .13))
                {
                    b.destroy();
                    ship.kill();
                    ship = undefined;
                    break;
                }
            }
        }
    }

    // ufo bullets vs rocks (split but no score)
    for (const b of ufoBullets)
    {
        if (b.destroyed) continue;
        for (const r of rocks)
        {
            if (r.destroyed) continue;
            if (circlesHit(b.pos, .13, r.pos, r.r))
            {
                b.destroy();
                sHit.play(r.pos, .85);
                explodeAt(r.pos, r.tier/3);
                const prevVel = r.velocity.copy();
                r.split(prevVel);
                r.destroy();
                break;
            }
        }
    }

    // ufo vs ship (ramming)
    if (ship && !ship.destroyed)
    {
        const invuln = invulnTimer.isSet() && invulnTimer.active();
        if (!invuln)
        {
            for (const u of ufos)
            {
                if (u.destroyed) continue;
                if (circlesHit(ship.pos, SHIP_RADIUS, u.pos, u.r))
                {
                    sBoom.play(u.pos, .9);
                    explodeAt(u.pos, .9);
                    u.destroy();
                    ship.kill();
                    ship = undefined;
                    break;
                }
            }
        }
    }
}

function gameUpdatePost()
{
    // keep camera centered
    setCameraPos(vec2());

    // cache world bounds
    worldSize = getCameraSize();
    worldHalf = worldSize.scale(.5);
}

function gameRender()
{
    // background: subtle vignette
    drawRect(cameraPos, worldSize.scale(1.2), rgb(.02,.02,.03), 0);

    // stars
    for (const s of stars)
    {
        const twinkle = .55 + .45*Math.sin((time*s.tw) + s.p.x*1.7);
        drawCircle(s.p, s.s*twinkle, rgb(1,1,1, .65*twinkle));
    }

    // faint border
    const w = worldHalf.x, h = worldHalf.y;
    const col = rgb(1,1,1,.08);
    drawLineList([vec2(-w,-h), vec2(w,-h), vec2(w,h), vec2(-w,h)], LINE_WIDTH_FAINT, col, true);
}

function gameRenderPost()
{
    if (!isPlaying()) return; // title screen \u2014 menu owns the display

    // HUD
    const hud = `SCORE  ${score}\nLIVES  ${Math.max(0,lives)}   LEVEL  ${level}`;
    drawTextScreen(hud, vec2(20, 36), 24, rgb(1,1,1), 3, rgb(0,0,0), 'left', 'monospace');

    if (gameOver)
    {
        drawTextScreen('GAME OVER', vec2(mainCanvasSize.x/2, mainCanvasSize.y/2 - 30), 70, rgb(1,1,1), 6, rgb(0,0,0), 'center', 'monospace');
    }
    else if (!ship && respawnTimer.isSet() && respawnTimer.active())
    {
        drawTextScreen('Get Ready...', vec2(mainCanvasSize.x/2, mainCanvasSize.y/2 + 10), 30, rgb(1,1,1,.9), 4, rgb(0,0,0), 'center', 'monospace');
    }
}

// ============================================================
// Startup
// ============================================================
engineInit(gameInit, gameUpdate, gameUpdatePost, gameRender, gameRenderPost);

</script>
